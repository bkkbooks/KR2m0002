body:
  text: 宋王溥撰轉運鹽鐵總叙皇朝自武德永徽以後姜行本薛大鼎諸使皆以漕運上言然未能通濟其後監察御史王師順運晉絳之粟於河渭之間增置渭橋倉自師順始也開元二年河南尹李傑為水運使大興漕事十八年宣州刺史裴耀卿上言請依舊法敖倉於河口立輸場以受米置河隂縣及河陽柏崖集津三門倉議鑿崖開山以車運數十里積於太原倉以利漕運上從之拜耀卿江淮轉運使仍以鄭州刺史崔希逸河南少尹蕭炅為之副轉運鹽鐡之有副使自此始也耀卿主之三年凡運七百萬石省陸運之傭四十萬舊制東都含嘉倉積江淮之米載以大輿運而西至於陕三百里率兩斛計傭錢千此耀卿所省之數也明年耀卿拜侍中而蕭炅代焉二十五年運米一百萬石二十九年陜郡太守李齊物鑿三門山以通運闢三門巔輸岩險之地俾負索引艦升於安流自齊物始也天寶三載韋堅代蕭炅以滻水作廣運潭於望春樓之東以通河渭是年楊釗以殿中侍御史為水陸運使以代韋堅先是米至京師或砂礫糠粃雜乎其間開元初詔使揚擲而較其虛實揚擲之名自此始也天寶十四載八月詔水陸運宜停一年天寶以來楊國忠王鉷皆兼重使以𣙜天下故轉運之事自耀卿以降罕聞肅宗初第五琦始以錢穀得見請於江淮分置租庸使市輕貨以救軍食遂拜監察御史為之使乾元元年加度支郎中尋兼中丞為鹽鐵使始立鹽鐵法就山海井竈收𣙜其鹽立鹽院官吏其舊業户洎浮人欲以鹽為業者免其雜徭𨽻鹽鐵使盜煮私鹽罪有差亭户自租庸以外無得橫賦人不益稅而國用饒明年琦以户部侍郎同平章事詔兵部侍郎吕諲代之寶應三年元載以中書侍郎代吕諲時淮河阻兵飛挽路絶鹽鐵租賦皆泝淮而上以侍御史穆寧為河南道轉運租庸鹽鐵使尋加户部員外遷鄂州刺史以總東南貢賦時議以冦盜未戢關東漕運宜有倚辦遂以通州刺史劉晏為户部侍郎京兆尹度支鹽鐵轉運使鹽鐵兼漕運自晏始也二年拜吏部尚書同平章事依前充使晏始以鹽利為漕傭自江淮至渭橋率十萬斛傭七千緍補綱吏督之不發丁男不勞郡縣自古未之有也晏以書遺元載曰浮於淮泗達於汴入於河西經底柱硤石楚帆越客直抵建章長樂此安社稷之竒業也晏賔於東朝猶有官謗公終始故舊不信流言賈誼復召宣室𢎞羊重興功利敢不悉力以答所知驅馬陜郊見三門渠津遺跡到河陰鞏洛見宇文愷立梁公堰分河入渠及李傑新堤故事飾像河廟凜然如生步步探討知昔人用心則潭衡桂陽必多積穀可以淪波挂席西指長安三秦待此而飽六軍待此而强天子無憂都人胥悅四方旅拒者可以破膽三河流離者於兹請命公匡輔明主為富人侯此今之切務也僕願湔洗瑕穢一罄愚誠以副公之心且晏勤於官不辭水火然運之利病各有四五焉晏自尹京入為計相共五年矣京師三輔百姓唯苦稅畝傷多若每年得江湖二三十萬石即徭賦頓减歌舞皇澤其利一也東都殘毁百無一存若米運流通饑人皆附村落邑屋從此滋多命之日引海陵之倉以食鞏洛其利二也諸將有在邊者諸戎有侵敗王略者或聞三江五湖陳陳紅粒雲帆桂楫輸納帝鄉可以震耀夷夏其利三也自古帝王書同文車同軌日月所照莫不率俾今舟車既通商賈來往百貨雜集航海梯山漸及貞觀永徽之盛其利四也所可疑者函陜凋殘東周尤甚過宜陽熊耳至成臯五百里中編户千餘而已人烟蕭條輿必脫輻牛必羸角棧車亦不易求今於無人之境興此勞人之運固難就矣其病一也汴流渾渾不修則澱頃因冦難曾未疏决澤滅木岸善崩役夫需於沙津吏旋於濘千里洄上罔水行舟其病二也東亘底柱澠池二陵北河運處五六百里戍卒久絶奪攘奸宄窟穴囊槖夾河為藪豺狼狺狺舟行所經冦亦能往其病三也東自淮陰西臨蒲坂亘三千里屯戍相望中軍皆鼎司元侯賤卒亦儀同青紫每云食半菽又云無挾纊挽漕所至船到便留即非單車使折簡書所能制矣其病四也是願畢其思慮奔走之惟中書評其利病裁成之晏見一水不通願荷鍤先往見一粒不運願負米先趨焦心苦形期報明主丹誠未貫漕引多虞屏營中流掩泣獻狀自此每歲運米數十萬石自江淮北列置巡院搜擇能吏以主之廣牢盆以來商賈凡所制置皆自晏始廣德二年正月復以第五琦専判度支鑄錢鹽鐵事而晏以檢校户部尚書為河南及江淮以東轉運使乃與河南副元帥計㑹開决汴河水永泰二年晏為東道轉運常平鑄錢鹽鐵使琦為關內河東劍南三州轉運常平鑄錢鹽鐵使大厯五年詔停關內河東三州轉運常平鹽鐵使自此晏與户部侍郎韓滉分領關內河東山南劍南租庸青苗使至十四年天下財賦皆以晏掌之建中元年詔曰朕以征稅多門郡邑凋耗聼於羣議思有變更將致時雍宜遵古訓其江淮米凖㫖轉運入京者及諸軍糧儲冝令庫部郎中崔河圖權領之今年夏稅以前諸道財賦多輸京師者及鹽鐡財貨委江州刺史包佶權領之天下錢榖皆歸金倉部委中書門下簡兩司郎官凖格式條理尋貶晏為忠州刺史晏既罷黜天下錢榖歸尚書省既而出納無所統乃復置使領之是年三月以韓洄為戶部侍郎判度支金部郎中杜佑權勾當江淮水陸運使行劉晏韓滉舊制先是晏為宰臣楊炎所惡貶忠州刺史尋殺於忠州兵興以來凶荒相屬京師斗斛萬錢官厨無兼時之食百姓在畿甸者拔榖挼穗以供禁軍晏既遺元載書陳轉稅米利病歲入米數十萬斛以濟關中代第五琦鹽務法益精密初年入錢六十萬季年則十倍其初大厯末通天下之財而計其所入總一千二百萬貫而鹽利過半李靈耀之亂河南節度使據土不奉法賦稅不上州縣益减晏以羡餘相補人不加賦所入仍舊議者稱之其商榷財用之術者必一時之選故晏沒後二十餘年韓洄元琇裴腆包佶盧貞李衡相繼分掌財賦皆出晏門下屬吏在千里外奉教如目前四方水旱及軍府纎芥莫不先知焉其年詔曰天下山澤之利當歸王者宜總𨽻鹽鐵使三年以包佶為左庶子汴東水陸運鹽鐡租庸使崔縱為右庶子汴西水陸運鹽鐡租庸使四年度支侍郎趙贊議常平事竹木茶漆盡稅之茶之稅肇於此矣貞元元年元琇以御史大夫為鹽鐡水陸運使其年七月以尚書右僕射韓滉統之滉殁宰相竇參代之五年十二月度支轉運鹽鐡奏比年自揚子運米皆分配緣路觀察使差長綱發遣運路既逺實為勞人今請當使諸院自差綱節級般運以救邊食從之八年詔東南兩稅財賦自河南江淮嶺南山南東道至渭橋以户部侍郎張滂主之河東劍南山南西道以户部尚書度支使班宏主之今户部所領三川鹽鐡轉運自此始也其後宏滂互有短長宰相趙憬陸贄以其事上聞由是遵大厯故事如劉晏韓滉所分焉九年張滂奏立稅茶法郡國有茶山及商賈以茶為利者委院司分置諸場立三等時常為價為什一之稅是歲得緡四十一萬茶之有稅自滂始也自後裴延齡專判度支與鹽鐡益殊塗而理矣十年潤州刺史王緯代之理於朱方數年而李琦代之鹽院津堰攻張侵剝不知紀極私路小堰厚斂行人多自錡始時鹽鐡轉運有上都留後以副使潘孟陽主之王叔文權傾朝野亦以鹽鐡副使兼學士為留後故鹽鐡副使之俸至今獨優順宗即位有司重奏鹽法以杜佑判度支鹽鐡轉運使理於揚州元和二年三月以李巽代之先是季錡判使天下榷酷漕運由其操割專事貢獻牢其寵渥中朝秉事者悉以利交鹽鐡之利積於私室而國用日耗巽既為鹽鐡使大正其事其堰埭先𨽻浙西觀察使者悉歸之因循權置者盡罷之增置河陰敖倉置桂陽監鑄平陽銅山為錢又奏江淮河南峽內兖鄆嶺南鹽法鹽院去年收鹽價緡錢七百二十七萬比舊法虛張估一千七百八十餘萬非實數也今請以其數除為煮鹽之外付度支收其數鹽鐡使煮鹽利繫度支自此始也又以程异為揚子留後四月五日巽卒自榷估之興唯劉晏得其術而巽次之雖初年之利不如晏季年之利則三倍于晏矣舊制每嵗運江淮米五十萬斛至河隂留十萬四十萬送渭倉晏殁久不登其數惟巽秉使三載無升斗之缺焉六月以河東節度使李鄘代之五年鄘為淮南節度使以宣州觀察使盧坦代之六年坦奏每年江淮運糙米四十萬石到渭橋近日缺闕大半請旋收糴遞年貯偹從之坦改户部侍郎以京兆尹王播代之播遂奏元和五年江淮河南嶺南峽中兖鄆等鹽利錢六百九十八萬貫比量改法已前鹽利時價四倍虛估即此錢當為千七百四十餘萬貫矣請付度支收管從之其年詔曰兩稅法悉委郡國初極便人但緣約法之時不定物估今度支鹽鐵泉貨是司各有分巡置於都㑹爰命帖職周視四方簡而易從庶叶權便政有所弊事有所宜皆得舉聞副我憂寄以揚子鹽鐡留後為江淮已南兩稅使江陵留後為荆衡漢沔東界彭蠡南及日南兩稅使度支山南西道分巡院官充三川兩稅使峽內煎鹽五監先屬鹽鐵使今宜各屬度支便委山南西道兩稅使兼知糶賣峽內鹽屬度支自此始也七年王播奏去年鹽利除割峽內鹽收錢六百八十五萬從實估也又奏商人于户部度支鹽鐡三司飛錢謂之便換八年以崔倰為揚子留後淮嶺以東兩稅使崔祝為江陵留後荆南以東兩稅使十三年播又奏以軍興之時財用是切頃劉晏領使皆自按置租庸至於州縣否臧錢穀利病物之虛實皆得而知今臣守務在城不得自往請令臣副使程异出巡江淮具州府上供錢榖一切勘問從之閏五月异至江淮得錢一百八十五萬貫以進其年以播守禮部尚書以衛尉卿程异代之明年异以本官兼御史大夫平章事十四年异卒以刑部侍郎栁公綽代之長慶初王播復代公綽四年王涯以戶部侍郎代播敬宗初播復以鹽鐵使為揚州節度使文宗即位入覲以宰相判使其後王涯復判二使表請使茶山之人移植根舊有貯積皆使焚棄天下怨之九年以事誅而令孤楚以户部尚書右僕射主之以是年茶法大壞奏請付州縣而入其租於户部人人悅焉開成元年李石以中書侍郎判收茶法復貞元之制也三年以户部尚書同平章事楊嗣復主之多革前監院之陳事自是年至大中壬申凡十五年多任元臣以集其務崔珙自刑部尚書拜杜悰以淮南節度使領之既而皆踐公台薛元賞李執方盧𢎞正馬植敬晦五人於九年之中相踵理之植亦自是居相位大中五年二月以户部侍郎裴休為鹽鐡轉運使明年八月以本官平章事依前判使始者漕米嵗四十萬斛其能至渭倉者十不三四漕吏狡蠧敗溺百端官舟之沉多者嵗至七十餘隻緣河奸犯大紊晏法休使寮屬按之委河次縣令董之自江津達渭以四十萬斛之傭計緡二十八萬悉使歸諸漕吏巡院胥吏無得侵牟舉之為法凡十事奏之六年五月又立稅茶之法凡二十條陳奏上大悅詔曰裴休興利除害深見奉公盡可其奏由是三歲漕米至渭濱積一百二十萬斛無升合沉棄焉十年裴休出鎮澤潞尋以栁仲郢夏侯孜杜悰迭判之皆稱其任咸通五年南蠻攻安南府連嵗用兵饋挽不集詔江淮鹽鐡巡院和雇舟船運淮南浙西道米至安南乾符中又以崔彥昭王凝判之二年凝以所補吏生賦改官復命裴垣判之後髙駢自潤州移鎮淮南亦就判使務中和元年黃巢犯闕車駕出狩興元府又以蕭遘韋昭度判之及命侍中王鐸為行營都統率諸道之兵收復京城慮調發不時乃以昭度兼供軍使至光啓中所在征鎮自擅兵賦皆不供嵗時但貢奉而已由是江淮轉運路絶國命所能制者唯河西山南劍南嶺西道洎宦官田令孜自蜀中扈從召募新軍號左右神䇿共四十四都并南衙官屬僅萬餘三司轉無調發之所舊日兩池榷鹽稅課鹽鐡使特置鹽官以總其事自亂離之後河中節度王重榮兼領榷務歲出課鹽三千車以進至是令孜以軍食闕供乃舉廣明故事請以兩池榷務歸之鹽鐡詔下重榮上章論計竟不能奪天復初朱全忠兼鎮河中兩池鹽課始加至五十車自天順年後又以孔緯杜讓能崔昭緯嗣薛王知柔徐彥若韓建崔𦙍裴樞栁燦相次判之漕運舊制凡陸行之馬程日七十里步及驢五十里車三十里水行之程舟之重者泝河日三十里江四十里餘水四十五里空舟泝河四十里江五十里餘水六十里浩流之舟即輕重同制河口一百五十里江一百里餘水七十里其如底柱之類不拘此限若遇風水淺不得行者即於隨近官司申牒檢記聽拆半印武德八年十二月十八日水部郎中姜行本請於隴州開五節堰引水通運許之永徽元年薛大鼎為滄州刺史界內有無棣河隋末填塞大鼎奏之引魚鹽於海百姓歌之曰新河得通舟楫利直達滄海魚鹽至當日徒行今騁駟美哉薛公德滂被顯慶元年十月苑西面監禇朗請開砥柱三門鑿山架險擬通車陸運於是發卒六千人一月而功畢後水漲引舟竟不能進咸亨三年關中饑監察御史王師順奏請發晉絳州倉以贍之上委以漕運河渭之間舟楫相繼置倉於渭南東師順之始也大厯元年六月九日於東都立德坊南穿新潭安置諸州租船神龍二年滄州刺史姜師度於薊州之北漲水為溝以偹契丹奚之入寇畢約舊渠傍海穿漕號為平冦渠以避海難運糧者至今賴焉開元二年河南尹李傑奏汴州東有梁公堰破江淮漕運不通傑奉發汴鄭丁夫以濬之省功速就公私深以為利刻石水濱以紀其績九年五月二十五日敕水運米揚擲四五六七月米一㪷缺五合三八月米一㪷缺四合二九月米一㪷缺三合正十十一月十二月米一㪷缺二合並與納十五年正月十二日令將作大匠范安友檢行鄭州河口斗門先是洛陽人劉宗器上言請塞汜水舊汴河於下流滎澤界開梁公堰置斗門以通淮汴擢拜宗器左衛率府胄曹至是新漕填塞行舟不通貶宗器為循州安懷戍主安友遂發河南府懷鄭汴滑衛三萬人疏决開舊河口旬日畢二十年京師榖價踴起上召京兆尹裴耀卿問以救人之術耀卿奏曰昔貞觀永徽之際祿重米廣每嵗不過二萬石便足今國用漸廣漕運數倍猶不能支從都至陕河路艱險既用陸運無由廣致能開漕運變陸為水則有所餘動盈萬計且江南租船候水始進吳人不便漕挽由是所在停留日月既淹遂生竊盜臣望於河口置一倉納河東租米便放船歸從河口即分入河洛官自雇船載運至三門之東置一倉三門既水險即於河岸用小車運十數里至三門之西又置一倉每運至倉即搬下貯納水通即運水細便止自大原倉泝河入渭更無留停所省巨萬前漢都關中年月稍久及隋亦在京師緣河皆有舊倉所以國用常贍上深然其言至二十二年八月十四日置河陰縣及河隂倉河西柏崖倉三門東集津倉三門西鹽倉開三門山十八里陸路以避湍險自江淮而泝鴻溝悉納河隂倉自河隂送納含嘉倉又遞納太原倉所謂北運自太原倉浮渭以實關中上大悅尋以耀卿充江淮轉運使以鄭州刺史崔希逸河南少尹蕭炅為副三年凡運七百萬石省腳三十萬貫或說耀卿進所省腳錢以表其功答曰此並公事豈宜以小道邀名求寵也河隂上倉天寶後廢大厯四年户部尚書劉晏奏置汴口倉二十六年十一月五日潤州刺史齊浣奏常州北界隔吳江至瓜步江為限每船渡繞瓜步江沙尾沿緣六十里多為風濤所損臣請於京口埭下直截渡江二千里開伊婁河二十五里即達揚子縣無風水灾又減租腳錢歲收利百億又立伊婁埭皆官收其課迄今用之二十八年九月魏州刺史盧暉開通濟渠自石灰窠引流至州城西都注魏博夾州製樓百餘間以貯江淮之貨二十九年十一月陜郡太守李齊物鑿三門上路通流便於漕運開渠得古黎鏵三於石下背有文曰平陸遂改河北縣為平陸縣至天寶元年正月二十五日渠成其年陜郡太守韋堅奏引滻水開廣運潭於望春樓東自華陰永豐倉以通河渭潭成至二年三月二十六日敕古之善政貴於足食欲求富國必先利人朕以關輔之間尤資殷贍比來轉輸未免艱辛故置此潭以通漕運萬代之利一朝而成其潭宜以廣運為名其年京兆尹韓朝宗分渭水入自金光門置潭於西市之西街以貯材木永泰二年七月十日鑿運水渠自京兆府直東至薦福寺東北街至國子監正東至於城東街正北至景風門逾近喜門入西苑濶八尺深丈餘京兆尹黎幹奏也貞元二年五月敕漕運通流國之大計其河水每至春夏之時多被兩岸由來盜開斗門舟船停滯職此之由宜委汴宋等州觀察使選清强官專知分界勾當其鄭州徐州泗州界各仰刺史凖此處分仍令知汴州支遣院官計會勾當十五年二月于頔奏移轉運汴州院於河隂以汴州纍遇兵亂失散錢帛故也元和三年四月增置河隂倉屋一百五十間十一年十二月始置淮潁水運揚子等諸縣米自淮隂泝流至夀州西四十里入潁口又泝流至潁州沈丘界五百里至於陳州項城又泝流五百里入於澱河又三百里輸於郾城得米五十萬石附之以茭一千五百萬束計其功省汴運七萬六千貫寶厯二年正月鹽鐵使王播奏揚州城內舊漕河水淺舟船澀滯轉輸不及期程今從閶門外古七里港開河南東屈曲取禪智寺橋東通舊官河計長一十九里其功役所費當使自方圓從之咸通三年五月南蠻陷交趾徴諸道兵赴嶺南詔湖南水運自湘江入澪渠并江西水運以饋行營諸軍湘澪泝運功役艱難軍屯廣州乏食潤州人陳磻石詣闕上書言江西湖南泝流運糧不濟軍期臣有竒計以饋南軍帝召見因奏臣弟聽思昔曽任雷州刺史家人隨海船至福建往來大船一隻可致千石自福建不一月至廣州得船數十艘便可致三五萬石又引劉裕海路進軍破孫循故事乃以磻石為鹽鐡巡官往揚子縣專督海運於是軍不闕供八年三月安南都護髙駢奏安南至小邑管水路湍險已令工人鑿去巨石漕船無滯詔褒美之轉運使開元二十一年八月侍中裴耀卿充江南淮南轉運使二十二年九月太府少卿蕭炅充江淮處置轉運使天寶二年四月陕郡太守韋堅加兼勾當緣河及江淮轉運使四年八月楊釗除殿中侍御史充水陸轉運使乾元元年三月第五琦除度支郎中充諸色轉運使二年十二月兵部侍郎吕諲充勾當轉運使元年建子月户部侍郎元載充江淮轉運使寶應元年六月二十八日户部侍郎劉晏充勾當轉運使廣德二年正月户部侍郎第五琦充諸道轉運永泰元年正月劉晏充東畿淮南浙江東西湖南山南東道轉運使第五琦充畿關內河南劍南山南西道轉運使大厯四年三月劉晏除吏部尚書兼御史大夫充東都河南江淮山南東道轉運使建中二年十一月度支郎中杜佑兼御史中丞江淮水陸運使三年十二月二十日包佶除庶子充汴東水陸運使崔縱除右庶子充汴西水陸運使貞元元年三月元琇加御史大夫充諸道水陸運使其年七月尚書右僕射韓滉江淮轉運使五年二月中書侍郎竇參諸道轉運使八年三月張滂除侍郎充諸道轉運使十年十月潤州刺史王緯兼諸道轉運使五年十二月以浙西觀察使李錡充諸道轉運使永貞元年以司空平章事杜佑再兼諸道轉運使元和元年四月兵部侍郎李巽充諸道轉運使三年六月刑部尚書李鄘充諸道轉運使五年十二月盧坦除刑部侍郎充諸道轉運使六年四月刑部侍郎王播充諸道轉運使長慶元年二月王播復為刑部尚書充諸道轉運使四年四月王涯為户部侍郎充諸道轉運使寶厯元年正月王播為淮南節度又充諸道轉運使太和九年十二月右僕射令狐楚充諸道轉運使開成元年四月户部尚書平章事李䂖充諸道轉運使三年十月楊嗣復除户部尚書諸道轉運使五年二月户部尚書崔珙充諸道轉運使會昌四年七月左僕射充平章事杜悰充諸道轉運使六年四月以大理卿馬植為刑部侍郎充諸道轉運使大中五年刑部侍郎裴休充諸道轉運使十一年兵部侍郎柳仲郢充諸道轉運使十一年二月户部侍郎夏侯孜充諸道轉運使十四年尚書左僕射杜悰復充諸道轉運使咸通五年十二月户部侍郎劉鄴充諸道轉運使六年十月兵部侍郎于琮充諸道轉運使乾符元年二月崔彥昭為兵部侍郎充諸道轉運使其年又以兵部尚書王凝充諸道轉運使二年二月兵部侍郎裴坦充諸道轉運使四年六月以宣歙觀察使髙駢為潤州刺史充諸道轉運使六年移節淮南領使如故中和元年兵部侍郎蕭遘充諸道轉運使其年中書侍郎平章事韋昭度充諸道轉運使光啓二年三月刑部尚書孔緯充諸道轉運使大順二年門下侍郎杜讓能充諸道轉運使景福二年十一月吏部尚書平章事崔昭緯充諸道轉運使乾寧二年京兆尹嗣薛王知柔為户部尚書充諸道轉運使其年九月門下侍郎平章事徐彥若充諸道轉運使光化三年八月左僕射平章事崔𦙍充諸道轉運使天祐元年右僕射裴樞充諸道轉運使其年門下侍郎平章事栁璨充諸道轉運使河南水陸運使開元二年閏二月陕郡刺史李傑除河南少尹充水陸運使至三年十二月畢構為河南尹不帶水陸運使至天寶三年十一月李齊物除河南尹又帶水陸運使貞元十年二月河南尹齊抗充河南水陸運使至元和六年十月敕河南水陸運使宜停陕州水陸運使先天元年十月李傑為刺史充水陸運使自此始也已後刺史常帶使天寶十載五月崔無詖除太守不帶水陸運使度支使楊國忠奏臣請自勾當遂加國忠陕郡水陸運使至十二年正月二十一日敕陕運使宜令陕郡太守崔無詖充使楊國忠充都使勾當至貞元十三年四月陕虢觀察使于頔兼陕州水陸運使至元和六年十月敕陕州水陸運使宜停開元十三年五月二十八日敕陕州水陸運使令别自置印二十五年六月二十三日詔河南陕運兩使每年常運一百八十萬石米送京近已减八十萬石今據太倉米數支計有餘其今年所運一百萬石亦冝停建中二年十二月停江淮水陸運使轉運事委度支處置三年八月分置汴東西水陸運使兩稅鹽鐡使貞元三年正月諸道水陸運使及度支巡院江淮轉運使並宜停唐㑹要卷八十七
