body:
  text: 唐㑹要卷四十六宋王溥撰前代功臣永徽三年九月詔以周司沐大夫裴融贈尚書左丞封孝琰有功前代擢其子孫旌之其年五月詔隋儀同三司豆盧毓御史中丞㳺楚客齊侍中崔季舒給事黄門侍郎裴澤並標忠烈其子孫令所司量材叙用先是有詔追録前代忠鯁子孫周相州總管尉遲迥曽孫文禮訴言迥忠於周室為隋所誅上遣議之太常卿江夏王道宗等議皆以迥死節於周宜有甄録禇遂良進曰竊窺史籍咸以救君難為忠不救則為逆春秋趙穿弑晉靈公趙盾為正卿不討賊太史書曰趙盾弑其君由此言之尉遲迥受周重寄既聞隋文作相稱兵鄴下南通於陳北逹突厥頓兵六十餘日不赴國難免其罪惡為幸若謂之忠鯁臣所深惑羣議然之封建雜録上崔氏曰蘇冕所載封建篇盖以貞觀初太宗文皇帝嘗欲法周漢故事分圭以王子弟裂地以封功臣諸儒議論紛紜事卒停寢故有表疏可編自後封諸王或王功臣但崇以爵等食其租封而已劉秩所謂設爵無土署官不職者也今子弟功臣封爵者皆列之髙祖受禪以天下未定廣封宗室以威天下皇從弟及姪年始孩童者數十人皆封為郡王太宗即位因舉屬籍問侍臣曰封宗子於天下便乎尚書右僕射封徳彛對曰不便歴觀往古封王者今日最多兩漢以降惟封帝子及親兄弟若宗室逺疎者非有大功如周之郇滕如漢之賈澤並不得濫叨名器所以别親疎也先朝敦睦九族一切分王爵命既崇多給力役蓋以天下為私殊非至公馭物之道也太宗曰然朕理天下本為百姓非欲勞百姓以養已之親於是卒以屬疎降爵唯有功者數人得王餘並封為縣公武徳元年六月立世子建成為皇太子封皇子元吉為齊王封宗室子孝基為永安王道𤣥為淮陽王叔良為長平王神通為永康王神符為襄邑王徳良為長樂王道素為竟陵王博乂為隴西王奉國為渤海王八月涼州賊帥以其地來降封為涼王十月封從弟琛為襄武王瓊為廬江王十二月封桂國李孝長為義安王三年六月封皇子元景為趙王元昌為魯王元亨為酆王皇孫承宗為太原王承道為安陸王承乾為恒山王恪為長沙王泰為宜郡王四年二月徒封宜郡王泰為衛王四月封皇子元方為周王元禮為鄭王元嘉為宋王元則為荆王元茂為越王十二月徒封宋王元嘉為徐王貞觀二年正月徒封漢王恪為蜀王衛王泰為越王楚王祐為燕王五年正月封皇弟元裕為鄶王元名為譙王靈䕫為魏王元祥為許王元曉為密王又封皇子愔為梁王貞為漢王惲為郯王慎為申王囂為江王簡為代王十年正月徒封趙王元景為荆王魯王元昌為漢王鄭王元禮為徐王徐王元嘉為韓王荆王元則為彭王滕王元懿為鄭王吳王元軌為霍王豳王元鳳為虢王陳王元慶為道王魏王靈䕫為燕王蜀王恪為吳王越王泰為魏王燕王祐為齊王梁王愔為蜀王郯王惲為蔣王漢王正為越王申王慎為紀王十一年正月徒封鄶王元裕為鄧王譙王元名為舒王六月徒封任城王道宗為江夏王趙郡王孝恭為河間王許王元祥為江王十三年六月封皇弟元嬰為滕王二十一年八月封皇子明為曹王永徽元年二月封皇子孝為許王上金為把王素節為雍王六年正月封皇子𢎞為代王賢為潞王顯慶二年二月徒封雍王素節為郇王文明元年三月徒封把王上金為畢王郇王素節為葛王嗣聖元年改封上金為澤王素節為許王垂拱元年五月封皇子成義為恒王其年十一月改封千金王復為零陵王三年正月封皇子範為衛王業為趙王聖歴三年十二月封皇太子男重潤為邵王重福為平恩王重俊為義興王重茂為北海王景龍元年五月封韓王元嘉男訥為嗣韓王故霍王元軌長子江都王緒男暉為嗣霍王虢王元鳳男巨為嗣虢王故紀王慎男安封郡王鐡成為嗣紀王故魯王靈䕫孫范陽郡王藹長男道堅為魯王故曹王明孫𦙍為嗣曹王各賜實封四百户又封皇從兄境為歸政郡王睿宗子成器為蔡王千里為夀春郡王禧為天水郡王初侍中敬暉以唐室中興削武氏諸王封宗姓為王爵故有是命也唐隆元年六月進封皇子衡陽郡王成義為申王巴陵郡王隆範為岐王彭城郡王隆業為薛王景雲元年十月以故吳王恪孫禕為嗣江王其年九月封皇太子男嗣直為許昌郡王嗣謙為真定郡王先天元年八月封皇太子男嗣升為陜王嗣直為郯王嗣謙為郢王開元二年十一月封皇第四子嗣真為鄶王第五子嗣初為鄂王第六子嗣𤣥為甄王十二年四月封皇再從兄將作大匠禕為廣川郡王再從叔太子員外率更令嗣密王徹為濮陽郡王再從兄太子家令嗣越王琚為中山郡王敇曰傍繼國王禮有停廢以朕紹承休緒永念懿親列於藩輔其禕等可並封郡王十三年二月封皇第八子琚為光王第十二子濰為儀王第十三子澐為頴王第十六子澤為永王第十八子清為夀王第二十子泗為延王第二十一子沐為盛王第二十二子溢為濟王二十一年九月封皇子沔為信王泚為義王灌為陳王澄為豐王潓為恒王淀為梁王滔為利王二十八年九月封皇太子之子僖為南陽郡王倓為建寜郡王佖為西平郡王僅為新城郡王僴為潁川郡王又封慶王子儼為新平郡王伸為平原郡王封棣王子僎為汝南郡王僑為宜都郡王封榮王子俌為濟陽郡王偕為北平郡王封儀王子侁為豫章郡王健為廣陵郡王封永王子偒為襄城郡王封夀王子伾為河間郡王封延王子倬為彭城郡王封濟王子傃為永嘉郡王至徳二年十二月進封南陽王傑為趙王新城王僅為彭城王潁川王僴為兖王第九男侹為襄王第十男倕為興王第十一男偲為把王第十二男侗為定王元年建丑月封皇太子第二男邈益昌郡王第三男迥延慶郡王越王長男建為武威郡王第二男逌為興道郡王彭王長男邃為常山郡王大厯十年二月封第四子述為睦王充嶺南節度度支營田大使第五子逾為郴王充渭北鄜坊等州節度大使第六子連為恩王充汴宋等州節度大使第八子遘為鄜王第十三子造為忻王充昭義軍節度大使第十四子暹為韶王第十五子運為嘉王第十六子遇為昭王苐十七子適為循王苐十八子通為恭王苐十九子逹為原王苐二十子逸為雅王十四年六月封元子誦為宣王次子謨為舒王誦為通王諒為虔王詳為肅王又封皇子迺為益王迅為隨王又封彭王苐三男適為湯陰郡王襄王長男遥為伊吾郡王把王長男連為同昌郡王頴王苐六男僤為歙國公延王苐八男代為兖國公陳王苐五男佼為潭陽郡王義王苐八男佖為南川郡王恒王長男循為清河郡王又封蜀王長男訓為東平郡王徳王長男謂為恭化郡王長男讃為武都郡王諮為馮翊郡王建中元年八月封嗣舒王藻為嗣郢王三年正月封涇王䢔男為延徳郡王四年六月徙封彬王逾為丹王鄜王遘為簡王豫章郡王侁為汧陽郡王興元元年八月合川郡王李晟改封西平郡王樓煩郡王渾瑊改封咸寜郡王晉元元年四月改封晉王誼為舒王四年四月封皇苐七子諒為邕王仍拜開府儀同三司皇太子長子淳開府儀同三司封廣陵郡王二子渙為建康郡王三子沔為洋川郡王四子洵殿中監臨淮郡王五子浼秘書監𢎞農郡王六子沐漢東郡王七子湜少府監晉陵郡王八子淑國子祭酒髙平郡王九子滋雲安郡王十子凖太常卿宣城郡王十一子浚徳陽郡王十五子浥光禄卿河東郡王十六子況衛尉卿洛交郡王舒王第二子涉太僕卿寧塞郡王三子汭太府卿清河郡王睦王子諷太常卿洪源郡王丹王子訪宗正卿寜邦郡王恩王子誨大理卿景城郡王簡王子証司農卿平恩郡王忻王子諸太常卿武威郡王韶王子詡鴻臚卿晉昌郡王嘉王子訢太常卿新安郡王端王子誠衛尉卿新興郡王循王子䕶光禄卿平樂郡王二十一年四月封苐十弟諤為欽王苐十一弟誠為珍王男建康郡王沔為均王改名緯臨淮郡王洵為溆王改名縱𢎞農王浼為莒王改名紓漢東郡王泳為密王改名綱晉陵郡王湜為郇王改名總髙平郡王淑為邵王改名約雲安郡王滋為宋王改名結宣城郡王淮為集王改名緗徳陽郡王湑為冀王改名綵河東郡王浥為和王改名綺苐十七男絢封衛王十九男纁封㑹王二十男綰封福王二十一男紘封撫王二十三男緄封岳王二十四男紳封袁王二十五男綸封桂王二十七男繕封翼王􅏤戌封皇太子長子寜為平原郡王二子寛為同安郡王三子宥為延安郡王四子察為彭城郡王五子寰為髙密郡王六子寮為文安郡王元和元年八月制封皇太子男平原郡王寜為鄧王同安郡王寛為灃王延安郡王察為深王髙密郡王寰為洋王文安郡王寮為絳王苐十男審為建王長慶元年三月封弟憬為鄜王悅為瓊王恂為沔王懌為婺王㥉為茂王忱為光王恊為淄王憺為衢王㤝為澶王皇子湛為鄂王淄為江王湊為漳王澶為潁王令有司擇禮冊命鄂王尋改為景王太和八年十月三日敕灃王長子漢可封東陽郡王次男源可封安陸郡王次男潢可封臨川郡王故深王長男潭封河内郡王次男淑封吳興郡王故絳王長男封新安郡王次男滂封髙平郡王故洋王長男沛封潁川郡王淄王長男幹封許昌郡王沔王長男瀛封晉陵郡王鄜王長男溥封平陽郡王開成二年八月敬宗皇帝苐二子休復封梁王苐三子執中封襄王苐四子言揚封紀王苐六子成器封陳王五年三月故襄王男寀封樂安郡王故陳王苐十六男儼封宣城郡王㑹昌六年五月敇長男温可封鄲王苐二男涇可封雅王苐三男滋可封䕫王苐四男沂可封慶王大中二年二月封苐五男澤為濮王三年十一月封憲宗皇帝苐十七男惕為彭王五年封苐六子潤為鄂王六年十一月封憲宗皇帝第十八男惴為棣王八年封苐七子洽為懐王第八子汭為昭王第九子汶為康王十一年封第十子灌為衛王第十一子澭為廣王十四年封憲宗子憻為信王咸通三年封長子佾為魏王苐二子侹為涼王第三子佶為蜀王四子偘為威王初封郡王封憲宗子㥽為榮王八年封順宗苐二十二子緝為蘄王十三年封第六子保為吉王第八子倚為睦王中和元年九月十六日封長子震為建王光啓三年十一月十四日封第二子陛為益王乾寜元年十月十八日封第二子祤為棣王第三子禊為䖍王第四子禋為沂王第五子禕為遂王四年正月二十二日封六子祕為景王第七子祺為校王光化二年十一月十九日封第八子禎為雅王第十子祥為瓊王封建雜録上貞觀二年十二月十六日太宗以宇内晏清思以致理謂公卿曰朕欲使子孫長乆社稷永安其理如何尚書右僕射宋國公蕭瑀對曰臣觀前代國祚所以長乆者莫不封建諸侯以為磐石之固秦并六國罷侯置守二世而亡漢有天下㕘建藩屏年踰四百魏晉廢之不能永乆封建之法實可遵行上然之始議分封裂土之制禮部侍郎李百藥議曰周氏以鑒夏殷之長乆遵黄唐之並建維城磐石深根固本雖王綱弛廢而枝榦相扶故使逆節不生宗祀不絶秦氏背師古之訓棄先王之道翦華持險罷侯置守子弟無尺土之邑兆庶罕共理之憂故一夫號澤七廟隳祀臣以為自古皇王君臨宇内莫不受命上𤣥飛名帝籙締搆遇興王之運殷憂屬啓聖之期雖魏武攜養之資漢髙徒役之賤非止意有覬覦推之不能去也若其獄訟不歸菁華已竭雖帝堯之光被四表大舜之上齊七政非止存情揖讓守之亦不可固焉以放勲重華之徳尚不能克昌厥後是知祚之長短必在天時政或盛衰有闗人事宗周卜世三十卜年七百雖淪胥之道斯極而文武之器猶在斯則龜鼎運祚已懸之於杳㝠也至使南征不返東遷避逼禋祀如綫郊畿不守此乃陵夷之漸有累於封建焉暴秦運距閏餘數鍾百六受命之主徳異禹湯繼世之君才非啓誦借使李斯王綰之輩咸開四履將閭子嬰之徒俱啓千乗豈能逆帝王之勃興抗龍顔之祚命者也然則得失成敗各有由焉而著述之家多守常轍莫不情忘今古理蔽澆淳欲以百王之季行三代之法天下五服之内盡封諸侯王畿千里之間俱為采地是則以結繩之化行虞夏之朝用象刑之典理劉曹之末鍥船求劍未見其可膠柱成文彌所多惑徒知問鼎請隧有懼霸王之師白馬素車無復藩籬之援不悟望夷之釁未甚羿浞之災復思髙貴之殃寜異申鄫之酷此乃欽明昏亂自繫安危固非守宰公侯以成興廢且數代之後王室寖微自藩屏化為仇敵家殊俗國異政强凌弱衆暴寡疆場彼此干戈侵伐狐駘之役女子盡髽崤陵之師隻輪不返斯蓋畧舉一隅其餘不可勝數陸士衡方規規然云嗣王委其九鼎凶族據其大邑天下晏然以理待亂斯言之謬也而設官分職任賢使能以循良之才膺共理之寄刺符分竹何代無人至使地或呈祥天不愛寳人稱父母政比神明昔曹元首方區區然稱與人共有其樂者人必憂其憂與人同其安者人必拯其危豈容委以侯伯則同其安危任之牧宰則殊其憂樂何斯言之妄也封君列國藉慶門資㤀先業之艱難輕自然之崇貴莫不代増滛虐時益驕侈離宫别館切漢凌雲或刑人力而將盡或召諸侯而共樂陳靈則君臣悖禮共侮徴舒衛宣則父子聚麀終誅夀朔乃云為已思豈若是乎内外羣官選自朝廷者擢士庶以任之澄水鏡以鑒之年勞優其階品考績明其黜陟爵非代及用賢之路斯廣人無定主附下之情不固此乃愚智所辨安可惑哉至如滅國弑君亂常千紀春秋二百年間畧無寜嵗次睢咸秩遂用玉帛之君魯道有蕩每等衣裳之㑹縱使西漢哀平之際東漢桓靈之時下吏淫暴必不至此為政之理可以一言蔽焉陛下獨照宸𠂻永懐前古將復五等而修舊制建萬國而親諸侯竊以漢魏以還餘風之弊未盡勛華既往至公之道斯革請待琢琱成樸以質代文刑措之教一行登封之禮云畢然後定疆理之制議山河之賞未為晚焉中書侍郎顔師古論封建表曰伏聞前年陛下親發聖慮特降明敇博問卿士議欲封建既合事宜實惟理要然而議者不一各執異端或欲追法殷周逺遵上古天下之地盡為封國庶姓羣官皆錫茅社或云凋弊之後人稀土廣封建之事蓋未可行此皆不臻至理兩失其衷臣愚以為當今之要莫若量其逺近分置王國均其户邑强弱相濟畫野分疆不得過大間以州縣雜錯而居互相維持永無傾奪使各守其境而不能為非協力同心則足扶京室陛下然後分命諸子各就封之為置官僚皆一省選用法令之外不得擅作威刑朝貢禮儀具為條式一定此制萬代永乆則狂狡絶暴慢之心本朝無怵惕之慮特進魏徴議曰臣聞三代之利建藩屏保乂皇家兩漢之大啓山河同奬王室故楚國不恭齊桓有召陵之舉諸吕搆難朱虚奮北軍之謀九鼎危而復安諸侯傲而還肅比夫秦之孤立子弟為匹夫魏氏虚名藩捍若囹圄豈可同年而語哉至於同憂共樂之談百足不僵之義曹冏六代陸機五等論之詳矣陛下發明詔封五等事雖盡善特時未遑何也自隋氏亂離百殃俱起黎元塗炭十不一存始䝉敷至仁以流𤣥澤沐春風而霑夏雨一朝棄之為諸侯之𨽻衆心未定或致逃亡其未可一也既立諸侯當建社廟禮樂文物儀衛左右頓闕則理必不安粗修則事有未暇其未可二也大夫卿士咸資禄俸薄賦則官府困窮厚歛則人不堪命其未可三也王畿千里地稅不多至於貢賦所資在於侯甸之外今若並為國邑京師府藏必虚諸侯朝宗無所取給其未可四也今燕秦趙代俱帶蕃夷黠羌旅拒匈奴未滅追兵内地逺赴邉庭不堪其勞將有他變難安易動悔或不追其未可五也夫聖人舉事貴在相時時或未可理資通變敢進蒭蕘之議唯明主擇焉六年監察御史馬周上疏曰伏見詔書令宗室勲賢作鎮藩部貽厥子孫嗣守其政非有大故則無黜免臣竊惟陛下封之者誠愛之重之欲使其𦙍裔承守而與國無疆也臣以為如詔㫖者陛下思所以安存之富貴之未可使為世官也何則以堯舜之父猶有朱均之子儻有孩童嗣職萬一驕愚則兆庶被其殃而國家受其敗正欲絶之則子文之理猶在正欲留之而欒黶之惡已彰與其毒害於見存之百姓則寜使割恩於已亡之一臣明矣然則向所愛之者乃適所以傷之也臣謂宜賦以茅土疇其户邑必有材行隨器方授則雖其翰翮非强亦可以獲免尤累昔漢光武不任功臣以吏事所以終全其代者良得其術也願陛下深思其宜使夫得奉大恩而子孫終其福禄也十一年六月六日詔曰設百司以制海内建藩屏以輔王室莫不明其典章義存於至理崇其賢戚志在於無疆者也今採按部之嘉名㕘建侯之舊制共理之職重矣分土之實存矣已有詔書陳其至理繼世垂範貽厥後昆維城作固同符前列荆州都督荆王元景涼州都督漢王元昌徐州都督徐王元禮潞州都督韓王元嘉遂州都督彭王元則鄭州刺史鄭王元懿絳州刺史霍王元軌虢州刺史虢王元鳳豫州刺史道王元慶夀州刺史舒王元名鄧州刺史鄧王元裕幽州都督燕王靈䕫蘇州刺史許王元祥安州都督吳王恪相州都督魏王恭齊州都督齊王祐益州都督蜀王愔襄州刺史蔣王惲揚州都督越王貞并州都督晉王治秦州都督紀王慎或地居旦奭夙聞詩禮或望擬間平早稱才藝並爵崇土宇寵兼車服誠教孝之心無忘於造次報政之譽克著於朞月宜冠藩垣胙以休命其所署刺史咸令子孫世世承襲唐㑹要卷四十六
