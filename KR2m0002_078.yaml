body:
  text: 唐會要卷七十八宋王溥撰諸使中黜陟使貞觀八年將發十六道黜陟大使畿內未有其人上問房玄齡此道事最重誰可充使尚書右僕射李靖曰畿內事宜非魏徴莫可上曰朕今欲向九成宫事亦不小朕每行不欲與其相離者乃為其見朕過必無所隱乃令李靖充使二十年遣大理卿孫伏伽等以六條巡察四方黜陟官吏開元二十二年四月二十一日遣使以崔翹等為之天寶五載七月遣使以席豫等為之至德二載十二月遣使以虢王等為之建中元年正月制諸道宜分遣黜陟使觀風俗問疾苦自艱辛以來徴賦名目繁雜委黜陟使與諸道觀察使刺史計資産作兩稅法比來新舊徴科色目一切停罷兩稅外輒别配率以枉法論乾元元年與採訪使並權罷至是復有之自建中己後至今未嘗置初司封郎中韋正為山南黜陟使薦興鳳兩相團練使嚴震理行為山南第一特賜上下考封鄖國公在鳳州十四年能政不替採訪取置使宰相張九齡奏置開元二十二年二月十九日初置十道採訪取置使以御史中丞盧絢等為之至三月二十三日諸道採訪取置使華州刺史李尚隱等奏請各使置印許之二十五年十二月二十四日命諸道採訪使考課官人善績三年一奏永為常式至二十七年二月七日赦文三載考績黜陟幽明允叶大猷以勸天下比來諸道所通善狀但優仕進之輩與為選調之資責實循名或乖古義自今已後諸道使更不須善狀每三年朕常自擇使臣觀察風俗有清白政理著聞者當别擢用二十六年三月敕諸道採訪使判官等自今已後並須首末經三年其緣事故停不得滿年限者承優節文準開元二十四年二月十九日敕處分二十九年七月敕採訪使等所資按部恤隱求瘼巡撫處多事須周細不可匆遽徒有往來宜依刺史例入奏天寶九載三月十二日敕本置採訪使令舉大綱若大小必由一人豈能兼理自今已後採訪使但察訪善惡舉其大綱自餘郡務所有奏請並委郡守不須干及十二載二月河南道採訪取置使河東郡太守李憕河南道採訪處置使陳留郡大守王濬等奏請依舊通前置兩員文使望以周載許依元敕酬功處分敕諸道準此黔中道各一人宜依舊定乾元元年四月十一日詔曰近緣狂寇亂常每道分置節度其管內緣徴遣及文牒兼使命來往州縣官非不艱辛若更加採訪轉益煩擾其採訪使置來日久并諸道黜陟使便宜且停待後當有處分其年改為觀察處置使大厯十二年五月中書門下奏開元末置諸採訪使許其専停刺史務廢置由己請自今已後刺史有犯贓等色本道但具狀聞奏不得輒追赴使及専擅停務差人權攝其刺史亦不得輒詣使出界有違者皆按常刑五坊宫苑使五坊謂雕鶻鷹鷂狗共為五坊宫苑舊以一使掌之自寶應二年後五坊使入𨽻內宫苑使近又有間廏使兼宫苑之職焉開元十九年金吾將軍楊崇慶除五坊宫苑使其後來曜牛仙客李元裕韋衢章仇兼瓊王鉷吕崇貴綦輔國彭體盈藥子昂等為之大厯十四年五月詔鷹隼豹貀獦犬皆放之自永徽以來撣國纍貢馴象三十有二皆豢于禁中有善舞者以備元會充庭之飾因是于鷹隼之類同放之元和二年六月初五坊户諸色影占者多宜令府縣收管三年七月五坊品官朱超宴王志忠放縱鷹隼入常安富人家旋詣其居廣有求取上知之立召二人各笞二十奪其職自是貢鷙鳥略大者皆斥之貞元末五坊小兒張捕鳥雀于閭里者皆為暴橫以取人錢物或有張羅網于門不許人出入者或以張井上使不得汲者近之輒曰汝驚供奉鳥雀即痛毆之出錢物求謝乃或相聚于食市酒肆醉飽而去賣者或不知就索其直多被毆詈或時留蛇一囊為質曰此所以致鳥雀而捕之者今留付汝幸善飼之勿令飢渴賣者愧謝求哀乃攜挈而去憲宗在春宫時知其弊嘗欲奏禁之及即位遂推而行人情大悅十三年十月上怒五坊使楊朝汶追捕平人命殺之事具宰相忠諫門皇城使天祐三年閏十二月皇城使奏伏以皇城之內咫尺禁圍伏乞準元敕條流鼓聲絶後禁斷人行近日軍人百姓更點動後尚恣夜行特乞再下六軍止絶從之元帥武德元年六月七日秦王世民加西封元帥上元三年三月相王旦除涼州道元帥周王亨除洮河道元帥升儲後至聖厯元年九月又除河北道行軍大元帥亦稱大行臺元帥大足元年六月相王旦除安北道行軍元帥至長安二年九月又除并州道行軍元帥自後親王為銜者甚多其元帥之號自武德已來唯王始拜至天寶十五載正月哥舒翰除諸道兵馬元帥始臣下為之乾元二年三月郭子儀除山南東道拜河南道諸道節度防禦兵馬元帥後上元二年七月李光弼除淮南河南淮西山南東道荆南五節度行營元帥此並副元帥也至德元年以廣平王為天下兵馬元帥統大軍東征以子儀為副其載九月吏部尚書平章事房琯特請兵一萬人自為元帥以收兩京詔許之以兵部尚書王思禮為副分為三軍使楊希文將南軍自宜夀入劉貴哲將中軍自武功入李光進將北軍自奉天入而琯以中軍為元帥次便橋二軍先遇賊戰于陳濤王師敗績時琯以車二千乘以馬步夾之為乘車之戰賊順風揚塵鼓噪牛皆振駭因縳草縱火焚之人畜大亂故敗琯自將南軍又戰不利楊希文劉貴哲降于賊琯幕府偏禆等奔赴行在肉袒請罪詔並宥之四載九月以舒王謨為揚州大都督持節充荆南襄江鄂等道節度諸軍行營兵馬都元帥仍賜名誼改封晉王大開幕府文武僚屬之盛前後出師未見其比天福三年三月以輝王祚為諸道兵馬元帥其年十二月十三日敕國史所書元帥之任並以天下為名乃自近年設為諸道宜却復為天下兵馬元帥都統乾元元年十二月户部尚書李峘除都統淮南江東江西節度宣慰觀察處置等使都統之號始于此上元二年八月李若幽除户部尚書充朔方鎮西北庭興平陳鄭等九節度行營兵馬及河中節度都統處置使建中元年十二月以汴州節度使李勉充河南汴州宋滑亳河陽等道都統使元和四年九月以邠寧夏三州節度高崇文充西京都統大中五年五月以特進守司空兼門下侍郎平章事白敏中充邠寧節度使招討南山平夏黨項兵馬都統取置等使元和四年九月以宣武軍節度韓𢎞充淮西諸軍行營兵馬都統乾符五年黃巢大掠江淮宰相王鐸進奏曰臣忝宰執之長在朝不足分陛下之憂願自帥諸軍蕩滌羣寇朝議然之乃拜守司空平章事荆南節度使諸道行營兵馬都統其年以鎮海軍節度使高駢為諸道行營兵馬都統中和二年復以宰相王鐸為京城四面諸道行營兵馬都統以崔安潛副之至大順元年五月以宰臣張濬為京東北面兵馬都統節度使每使管內軍附武德元年因隋舊制呼為大總管其年六月七日諸州總管加號使持節至七年二月十八日改大總管為大都督貞觀三年八月李靖除定襄道行軍大總管貞觀三年已後行軍即稱總管本道即稱都督永徽已後除都督帶使持節即是節度使不帶節者不是節度使景雲二年四月賀拔延嗣除涼州都督充河西節度使此始有節度之號遂至于今不改朔方節度使開元元年十月六日敕朔方行軍大總管宜準諸道例改為朔方節度使其定逺豐安軍西中城單于豐勝靈夏鹽銀匡長安樂等州並受節度至十四年七月除王浚帶關內支度營田等使十五年五月除蕭嵩又加鹽池使二十年四月除牛仙客又加押諸蕃部落使二十九年除王忠嗣又加水運使天寶五載十二月除張齊邱又加管內諸軍採訪使已後遂為定額豐安軍在靈州黃河西去郡一百八十里定逺軍在靈州北二百里先天二年正月郭元振置貞觀十三年三月十五日置朔使以護突厥即舊朔方節度之號河東節度使開元十一年以前稱天丘軍節度其年三月四日改為太原已北諸軍節度至十八年十二月宋之悌除河東節度已後遂為定額大同軍置在朔方州本大武軍調露二年裴行儉改為神武軍天授二年改為平狄軍大定元年五月十八日改為大武軍開元十二年三月四日改為大同軍橫塞軍初置在飛狐復移于薪州開元六年六月二十三日張嘉貞移于右代都大安城南以為九姓之援天寶十三載十二月一日改為大德軍岢嵐軍武德中為鎮永淳二年改為柵隸平狄軍長安三年李回秀改為軍張仁亶置移軍朔方留一千人充守捉屬大武軍開元十二年崔隱甫又置軍十五年李嵩又廢為鎮其後又改為軍天興軍聖厯二年四月置大足元年五月十八日廢長安元年八月又置景雲元年又廢開元五年六月二十四日張嘉貞又置十一年三月四日改為太原已北諸軍節度使清塞軍貞元十五年四月以清塞城為軍開元九年十一月四日敕河東河北不須别置支度並令節度使自支度隴右節度使開元元年十二月鄯州都督闕矩除隴右節度自此始有節度之號至十五年十二月除張志亮又兼經略度支營田等使已後為定額臨洮軍置在狄道縣開元七年移洮州縣就此軍焉河源軍置在遑州東西又云本道充國亭侯也白水軍開元五年郭知運張懷亮置安人軍置在星宿州鄯州西北界開元七年三月置積石軍置在廓州逹化縣西界本吐谷渾居地貞觀三年吐谷渾叛置靜邊鎮儀鳳二年置軍額焉英門軍置在洮州儀鳳二年置軍開元十七年洮州移隸臨潭百姓隸岷州置臨州二十年七月又改為洮州今為臨洮軍是也振武軍置在鄯州鄯城縣西界吐蕃鐵仭城亦名石堡城開元十八年三月二十四日信安王拔之置四月改為鎮武軍又二十九年十二月六日蓋嘉運不能守遂陷吐蕃天寶八載六月哥舒翰又拔之閏六月三日改為神武軍威戎軍置在鄯州界開元中杜希望收吐蕃新城置鎮西軍置在河州開元二十六年八月置神䇿軍天寶十三載七月十七日隴右節度哥舒翰以前年收黃河九曲請分其地置洮陽郡內置軍焉以成如璆為太守充神䇿軍使去臨洮軍二里宛秀軍同前年分九曲置澆河郡內置軍焉以臧奉忠為太守充軍使保義軍元和元年二月改隴右經略使為軍河西節度使景雲二年四月賀拔廷嗣為涼州都督充河西節度使自此始有節度之號至開元二年四月除楊執一又兼赤水九姓本道度支營田等使十一年四月除張敬忠又加經略使十二年十月除王君􅎢又加長行轉運使自後遂為定額也赤水軍置在涼州西城本赤烏鎮有泉水赤因以為名武德二年七月安修仁以其地來降遂置軍焉軍之大者莫過于此新泉軍大定元年郭元振奏置開元五年改為守捉使天斗軍本是守捉使開元十六年改為天斗軍焉建庫軍置在甘肅二州界證聖元年王孝傑開西鎮回以兩州界曠逺置此軍焉寧寇軍舊同在城等守捉天寶元年五月五日遂置焉王門軍本廢王門縣開元六年置軍焉墨離軍本是月支舊國武德初置軍焉豆盧軍置在沙州神龍元年九月置軍白亭軍天寶十四載正月三日置開元十四年三月二日敕河西長安行轉運九姓即隸入節度使宜加度支判官一人安西四鎮節度使開元六年三月楊嘉惠除四鎮節度經略使自此始有節度之號十二年已後或稱磧西節度或稱四鎮節度至二十一年十二月王斛斯除安西四鎮節度遂為定額又先天元年十一月史獻除伊西節度魚瀚海軍使自後不改開元十五年三月又分伊西北庭為兩節度至二十九年十月二十九日移隸伊西北庭都屬四鎮節度使至天寶十二載三月始以安西四鎮節度封常清兼伊西北庭節度瀚海軍使伊吾軍本昆吾國也置在伊州景龍四年五月置天山軍置在西州漢車師前王故國地形高敞改名髙昌貞觀十四年置瀚海軍置在北都護府本烏孫王境也貞觀十四年置庭州文明元年廢州置焉長安十二年二月改為燭龍軍三年郭元振奏置瀚海軍大軍並在碎葉城范陽節度使先天二年甄道一除幽州節度經略鎮守使開元十五年除李尚隱又帶河北度支營田使二十七年除李適之加河北海運使天寶元年除裴寬為范陽節度使經略河北度支營田河北海運使遂為定額經略軍置在范陽城內延載元年置漁陽軍在幽州北盧龍右塞開元十九年改為靜塞軍清夷軍垂拱二年媯州刺史鄭崇古奏置威武軍大定元年置在檀州北平軍在定州西三里恆陽軍恆州郭下高陽軍本瀛州開元二十年移在易州唐興軍在莫州橫海軍在滄州並開元十四年四月十二日置各以刺史為使懷柔軍在蔚州界先天元年八月八日置鎮安軍貞元二年四月二十二日於燕城守捉置懷逺軍在故遼城天寶二年二月安祿山奏置焉平盧軍節度使開元七年閏七月張敬忠除平盧軍節度使自此始有節度之號八年四月除許欽琰又帶管內諸軍諸蕃及度支營田等使二十八年二月除王斛斯又加押兩畨及渤海黑水等四府經略處置使遂為定額平盧軍在桞城本古遼西之地盧龍軍置有北平郡古孤竹國天寶二年置開元十三年三月二十日敕平盧軍幽州太原朔方河西隴右劍南等七道節度使宜各置木契行勘劒南節度使開元五年二月齊景昌除劒南節度使度支營田兼姚巂等州處置兵馬使因此使有節度之號至八年除李濬始下兼兵馬使二十七年除仇兼瓊又兼山南西道採訪使其後或兼或不兼無定制至上元二年二月分為西川廣德二年正月八月合為一道大厯二年正月二十日又分為兩州至今不改貞元十一年九月韋臯為節度就加統攝近界諸蠻兼西山八國雲南安撫等使天寶軍置在雍州開元二十九年置洪源軍置在黎州漢黎郡地開元三年置軍昆明軍置在巂州開元十七年十一月置嶺南節度使至德二載正月賀蘭進明除嶺南五府經略兼節度使自此始有節度之號已前但稱五府經略自此遂為定額又杜佑為嶺南節度使德宗興元朝執政往往出為節度故嶺南節度常兼五管經略使佑獨不兼蓋一時之誤後遂不帶五管經略名目至咸通三年五月分為兩節度以廣州為嶺南東道雍州為嶺南西道清海軍天寶元年置在思州柔逺軍貞元七年三月二十三日置淮南河南江東道乾元元年三月六日置節度使鎮州節度使大厯十四年四月名其軍曰成德至天祐二年九月改為武順汴宋亳節度使建中三年二月二日名其軍曰宣武浙江節度使建中二年六月分浙江東西節度使尋改為鎮海軍以團練為節度徙理潤州元和五年十一月團練使奏丹陽軍北因置節度改為鎮海今請依前置鎮海軍從之滑州節度使貞元元年五月罷滑州永平軍其年四月名其軍曰義成淮西節度使貞元二年二月改淮西節度為淮寧軍申光蔡等道節度使貞元十四年正月名其軍曰彰義易定節度使貞元十五年三月滿城縣置永清軍建中三年五月名其軍曰義武安黃節度使貞元十九年二月名其軍曰奉義陳許節度使貞元二十年四月名其軍曰忠武徐州節度使貞元二十一年三月名其軍曰武寧至咸通四年四月降為支郡隸兖州至十一年十一月改為感化軍劒南節度使元和二年二月改天威軍荆南節度使元和六年八月敕制荆南是賦稅之地與關右諸鎮及河南河北有重兵處體例不同節度使之外不合更置軍額因循已久煩弊實深嚴綬所請停永安軍額宜依其合收錢米委嚴綬于當府諸縣蠲除不支濟人户均藏訖聞奏天平軍節度使元和十四年三月平李師道以所管十二州分三節度使總為天平軍節度其一為兖海沂密節度一為平盧軍節度仍加押新羅渤海兩蕃使仍舊為平盧軍賜兩蕃使印一面河陽節度使會昌四年十月平賊以河陽三城鎮遏使為孟州號河陽軍額懌二州隸焉歸義軍節度大中五年八月沙州刺史張義潮以瓜沙伊肅等十一州户口來獻自河隴陷蕃百餘年至是悉獲故地乃以沙州為歸義軍授義潮節度使戎昭軍節度使天佑二年九月以金州置軍額三年四月復以為州義昌軍節度使太和五年正月以滄景德州號義昌軍山南東道節度使乾元元年置節度元和十年十月分為兩節度以户部侍郎李遜為襄復郢等節度使右羽林大將軍高霞寓為唐鄧隋節度使景雲二年正月二十九日敕諸道節度使除緣兵馬外不得别理百姓訴訟事元和六年十月詔曰朕于百執事羣有司方澄源流以責實效其諸都都團練使足修武備以靜一方而别置軍額因加吏祿亦既虛設頗為浮費思去煩以循本期省事以便人潤州鎮海軍宣州采石軍越州義勝軍洪州南昌軍福州靜海軍等使額並宜停所收使以下俸科等事以上各委本道充代百姓闕額兩稅仍具數聞奏庶幾愛人之心不至于惜費立制之意必在於正名十三年二月襄陽節度使李訴奏請判官大將已下一百五十員上不悅謂裴度曰李訴誠立竒功然奏請過當遂留中不下其年七月詔曰事關軍旅並屬節務繫州縣悉歸察廉二使所領不同管轄諸道度支營田承前各别置使自艱虞以後事稍因循方鎮除授之時或有兼帶此職遂領所在各殊今者務修舊章思一法度去煩就理衆心為正唯别置營處其使且令仍舊其忠武鳳翔武寧魏博山南東南橫海邠寧義成河陽等道度支營田使及淮南度攴近已定省其餘諸道並準此處分初景雲開元間節度度支營田等使諸道並置又一人兼領者甚少艱難以來優寵節將天下擁旄者常不下三十人例銜節度度支營田觀察使其邊界藩鎮增置名額者又不一前後十餘年雖嘗增減官員及使額而度支營田以兩河諸將兼領故朝廷不議停廢至是羣盜漸息宰臣等奏罷之乾符三年以宰臣鄭從讜為北京留守河東節度使詔許自擇賓佐親王遙領節度使貞觀二年正月蜀王恪除使持節大都督益綿卭維眉雅等八州諸軍事益州刺史越王泰除使持節大都督揚州常和潤楚舒盧濠夀歙蘇杭宣東睦南和等十六州諸軍事揚州刺史開元四年正月二十九日郯王嗣直除安西大都護充安撫河東關內隴右諸蕃部落大使陜王嗣升為西都護仍充河西道及四領諸蕃部落大使安西大都護張知運為副都護親王遙領節度自兹始也其在軍節度即稱節度副大使知節度事十五年五月以慶王潭為涼州都督兼河西節度大使忠王浚為單于大都護朔方節度大使棣王洽為太原已北諸軍節度大使鄂王涓為幽州都督河北節度大使營王滉為京北牧隴節度大使光王涺廣州都督五府節度大使儀王濰河南牧穎王澐安東都護平盧節度大使永王澤荆州大都督夀王法益州都督劒南節度大使延王洄安西大都護磧西節度大使盛王沐揚州大都督建中元年八月以舒王諲為涇原節度大使貞元四年七月以虔王諒為光隨蔡節度觀察大使七年七月以雍王謜為義武軍節度易定等州觀察使九年十二月以通王諶為宣武節度使十年七月復以雍王謜為昭義軍節度使十一年五月復以通王諶為河東節度大使西都留守十六年九月以開府儀同三司虔王諒為除州節度大使觀察度支營田等使元和二年八月以建王審為鄆州大都督平盧節度觀察等使陸運海運押新羅兩蕃等使九年三月以遂王宥開府儀同三司充彰義軍節度管內營田申光蔡等州觀察處置等使寶厯元年十二月以晉王普為昭義軍節度副大使知節度事以劉悟子前將作監主簿從諫為節度留後太和八年十二月以通王諶為幽州經略盧龍軍節度副大使知節度事以勾當幽州兵馬元忠為留後開成五年十二月以福王綰開府儀同三司行魏州大都督充魏博等州節度觀察處置等使會昌二年正月以撫王紘開府儀同三司行幽州大都督充幽州盧龍軍節度觀察處置押奚契丹兩蕃經略盧龍軍等四年十一月以皇子諤為開府儀同三司朔方軍節度副大使知節度事時以黨項叛命故以親王制之大中十一年以昭王汭為開府儀同成德軍節度副大使知節度事以佐司馬王紹知成德軍兩使留後咸通十年十二月以蜀王佶為開府儀同三司劒南西川節度副大使知節度使以盧耽知西川事乾符四年正月以夀王傑為開府儀同三司幽州經略盧龍軍節度副大使知節度事以李可舉知幽州兵馬事宰相遙領節度使開元十五年十一月兵部尚書河西節度副大使知節度事蕭嵩除同中書門下平章事節度如故宰相遙領節度使自兹始也至二十六年正月中書令李林甫遙領隴右節度天寶十載十一月楊國忠又遙領劒南節度蕭嵩以牛仙客為留後李林甫以杜希望為留後楊國忠以崔圓為留後諸使雜録上卷附貞觀元年四月發諸道檢點使咸亨三年十二月領下檢點格其年五月十一日敕中書門下兩省供奉官及尚書省御史臺見任郎官御史自今已後請便不得奏請保使永為常式二年三月十一日關內道覆囚使邵師德等奉辭上謂曰州縣諸囚未斷甚廢田作令遣爾等理之非遣殺之無濫刑也至開元十年十月宇文融除殿中侍御充覆囚使儀鳳二年十二月二十七日詔宜令關內河東簡練有膂力雄果者即以猛士為名三年正月二十五日遣左金吾將軍曹懷舜李知十等分往河南河北以募猛士萬歲通天元年九月令山東近境州置武騎團兵至聖厯元年臘月二十五日河南河北置武騎團以備默啜每一百五十户共出兵十五人馬一匹先天二年正月十五日詔往者計户充兵使二十二人募六人出軍既憚劬勞咸欲逃匿不有釐革將何致理天下衛士取年二十五已上充十五年放出頻經征鎮者十年放出自今已後羽林飛騎先于衛士中簡擇長夀三年正月許諸州大都督及上州刺史大都督府長史諸軍經略鎮守大使一子為宿衛官開元十年六月七日敕度支營田若一使專知宜同為一額共置判官兩人十一年二月二十九日敕同華兩州精兵所出地資輦轂不合外支自今已後更不得聚同華兵防容其休息二十一年正月二十四日敕令百寮尋勝因置檢校尋勝使以厚其事天寶七載十一月給事中楊釗充九成宫使其使及水炭使並是岐州刺史勾當入釗至是移屬權臣其時劒南監倉使農出納錢物召募劒南健兒兩京大含嘉倉出納召募河西隴右健兒催諸道租庸等事蘇氏駮曰九寺三監東宫三寺十二衛及京兆河南府是王者之有司各勤所守以奉職事尚書舊章立程度以頒之御史臺按格令採姦濫以繩之中書門下立百司之體要察羣吏之能否善績著而必進敗德聞而且貶政有恆而易為事歸本而難失經逺之理捨此奚據自姦臣廣言利以邀恩多立使以示寵尅小民以厚斂張虛數以獻狀上心蕩而益侈人望怨而成禍使天子有司守其位而無其事受厚祿而虛其用宇文融首倡其端楊慎矜王鉷繼遵其軌楊國忠成其亂仲尼云寧有盜臣而無聚斂之臣誠哉是言前車既覆後轍未改欲求化本不亦難乎十二載十二月二十二日左相陳希烈充祕書省圖書使十四載十一月安祿山叛命諸山當賊衝者始置防禦使至寶應元年五月十九日停諸州防禦使乾元二年七月九日敕宜令御史大夫充彍騎使令御史充判官廣德二年九月以太子詹事李峴為江南東西及福建等道知選事并勸農宣慰使大厯十二年五月十日中書門下狀奏諸州團練守捉使請一切並停其敕使日有持節諸軍旅司馬即同副使之任其判司既帶參軍事望令司兵判兵司按司倉判軍糧按司事判甲仗按具兵士量險隘召募謂之健兒給春冬衣并家口糧當上百姓名曰團練春秋歸冬夏追集日給一身糧及醬菜其月十一日諸道先置上都留後使宜令並改為上都進奉縣官十三日諸道觀察都團練使判官各置一人支使一人推官一人餘並停十四年二月四日敕諸都諸道上都知進奏院官自今已後並不須與正官六月一日敕郎官御史充使絶本司務者宜改與檢校及內供奉裏行其月五日敕御史中丞董晉中書舍人薛蕃給事中劉乃宜充三司使仍取右金吾廳一所充使院并于西朝室置幕屋收詞訟至建中二年十月停後不常置有大獄即命中丞刑部侍郎大理卿充謂之大三司使其次以刑部員外郎御史大理寺官為之以決疑獄謂之三司使待事畢日罷建中二年正月二十五日潭開宜依舊置防禦使二月十八日却置京畿觀察使以長史袁高充使三年九月九日御史中丞楊瑱奏見任官或被諸司使奏使移文牒充判官伏請自今已後應見任州縣正官非承制敕差補不得輒離任敕旨依焉其月二十三日停建中元年四月一日門下侍郎楊炎充刪定格式使五月闕日刑部侍郎蔣況充副使二年七月中書侍郎張鎰與盧杞同充格式使貞元三年三月二十三日敕杜亞宜兼充管內營田使其楚州營田使宜停四年二月敕諸道幕府判官及諸軍將比奏改官例多超遷應從散慢入清望官並折資處分十三年六月加劒南西山運糧使檢校户部員外郎韋肇兼御史大夫員外兼大夫新例十四年六月罷宣歙池三州鄂嶽沔三州都團練觀察使陜虢西州都防禦觀察使以其地分隸諸道置東畿觀察以留臺御史中丞為之十六年十二月敕諸道觀察都團練防禦及度支營田經略招討等使應奏副使行軍判官支使參謀掌書記推官巡官請改轉臺省官宜三周年以上與改轉其緣軍務急功事迹殊常即奏聽進止元和二年正月鄂嶽等州觀察使吕元膺奏親妹壻京兆府咸陽尉馬縫授試大理評事充京兆觀察度支使為憲司所劾密親佐幕有虧典法敕諸使府參佐檢校釋元膺之罪時咸非之七年七月敕諸使府參佐檢校應試官員日計如是五品已上官及臺省官經三十箇月外任奏與改轉餘官經三十六箇月奏改如經考試别有事故及停替官本限之外更加十箇月即往申奏從之十三年二月浙東觀察使孟簡受代詔書到日按故事署留後而行及常州堂牒勒還舊鎮待割使事而後行初李修授浙西觀察使中謝日請留所替以待交割使事至是因舉為例非舊制也十三年七月以宣歙觀察使事至重因舉王遂為淄清四面行營供軍使其年九月詔諸道新授節度觀察經略等使自敕出後使未到以前或前使尚在本鎮或已發差知留軍務等官其軍府職員多停省改易自今以後切令禁止縱先有此色新使道到並令仍舊十四年二月詔諸道節度使團練都防禦經略等使所管諸郡除本州軍事外别置鎮遏守捉兵馬者並令屬刺史等本州團練都防禦鎮遏等使其兵馬額便隸此使如無别使即屬軍事其有邊徼溪洞接連蕃蠻之處建城鎮不關州郡者即不在此限自軍興以來天下有軍將帥之權尤重過於所管州郡其月山南東道觀察使孟簡舉均州鄖鄉縣鎮遏兵馬使趙潔充本縣令有紊條章罰一月俸料其年四月命中官五人為京西和糴使諫議大夫鄭覃右補闕高釴等同上疏論上覽之即日罷其使其年八月以侍省姚文夀充京西京兆行營宣慰計會使六月制以左金吾衛大將軍胡證充京西京北巡邊使所經過州鎮與節度防禦使敕詳審商量利害具事實聞奏因程異之請也七月罷晉州防禦使八月浙東觀察使薛戎奏準敕諸道所管支郡别置鎮遏守捉兵馬者宜並屬刺其邊徼溪洞接連蠻夷之處時建城鎮者則不在此限合當道望海鎮明州去七十里餘俯臨大海東與新羅日本諸蕃接界諸度支不屬明州許之十五年十二月中書門下奏因外六品已下正員官諸道諸使奏充掌職比限兩考及授官經二年已上方許奏請然後依資改轉有才在下位者不免留滯請今後諸道諸使應奏請正員官充職掌經一周年即與依資改轉未一周年與同類試官從之舊制使府判官二周年始許改轉通許二考謂之得資與同類試官今不依舊典物議非之長慶三年三月敕諸道軍府大將帶監察己上官者三周年與改轉如是加敕合非時與改者不在此限其大將未曾奏官者即亦仰奏焉四年二月敕諸道節度使去任日宜準元和十五年七月十五日敕處分其交割狀限新使到任後一箇月內分析聞奏并報中書門下據替限委中書門下據報狀磨勘聞奏以憑殿最寶厯元年十二月江西觀察使殷侑奏管內州縣官大半勾當留在京師而當道兩稅外又有旨支米見在官稅兩充細者今請下有司上從之仍敕諸道準此唐會要卷七十八
