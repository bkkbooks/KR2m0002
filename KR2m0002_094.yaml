body:
  text: 唐㑹要卷九十四宋王溥撰北突厥下嗣聖三年九月以突厥斛瑟羅為繼往絶可汗四年七月骨篤祿冦朔州武后遣黑齒常之等擊之骨篤祿走磧北六年九月武后以僧懐義討之十年九月骨篤祿死弟黙啜五十一年三月復遣僧懐義討黙啜十二年十月黙啜遣使請降十四年三月黙啜請為其女求昏武后遣嚴知㣲等冊為遷善可汗其先降者處于豐勝靈夏朔代六州至是黙啜求之乃悉驅降户歸之幷許其昏由是黙啜益强盛十五年八月太后以武承嗣子延秀入突厥納其女黙啜謂知㣲等曰我世受李氏恩欲以女嫁李氏安用武氏兒聞李氏惟兩兒在我将兵輔立之以知㣲為南面可汗發兵冦媯澶等州移書曰我可汗女當嫁天子兒武小姓罔冐為婚我為此起兵欲取河北耳九月陷趙州武后以帝為皇太子河北道元帥狄仁傑副之将兵討黙啜北遁追之不及十六年十月黙啜立其弟咄悉匐為右廂察骨篤祿子黙矩為左廂察各主兵二萬餘其子匐俱為小可汗位在兩察上主處木昆等十姓兵四萬餘又號為拓西可汗十八年七月黙啜冦鹽夏遂冦并州遣薛季昶等禦之神龍二年十二月黙啜冦鳴沙進冦原㑹等州掠隴右牧馬萬餘匹而去詔訪羣臣禦冦計䇿景龍二年十一月突厥施烏質勒卒子娑葛自立為可汗故将闕啜忠節不服數相攻擊遣馮嘉賔持節安撫忠節吕守素處置四鎮以牛師奨為西安副都䕶發甘凉兵兼徵吐蕃以討娑葛忠節逆嘉賔於討舒河口娑葛遣兵襲之擒忠節殺嘉賔守素牛師奨與娑葛戰敗遂陷西安斷四鎮路遂赦娑葛立為可汗三年七月娑葛遣使請降景雲二年正月黙啜遣使請和遣和逢堯使突厥逢堯説黙啜曰處宓堅昆聞可汗結昏於唐皆當歸附何不襲唐冠帶使之聞之黙啜許訥明日幞頭紫衫再拜稱臣開元三年黙啜既請和稱臣於是復圍北庭九月遣薛訥討之四年六月黙啜為㧞曳固斬首来降九年三月突厥毘伽遣使求和帝賜書諭之曰果有誠心則共保遐福不然無煩使者往来若仍侵邊亦有以待之其審圗之十五年九月吐蕃冦𤓰州遺突厥毗伽書欲與俱入冦毗伽獻其書於朝上嘉之聽於西受降互市于是遣使入貢二十二年十二月毗伽為其臣梅錄啜毒死子登利立二十九年七月登利從叔二人分典兵馬號左右察登利惡其専誘右察斬之左察判闕特勒攻殺登利骨咄葉䕶自立為可汗天寳元年秋七月突厥㧞悉宻囘紇葛邏祿自為左右葉䕶餘衆共立判闕特勒之子為烏蘇可汗朔方節度使王忠嗣説㧞悉宻等攻之烏蘇遁去突厥西葉䕶阿布思等帥餘衆千餘帳相次来降突厥由是遂㣲弱三載八月㧞悉宻攻殺突厥烏蘇可汗國人立其弟為白眉可汗於是勅忠嗣乗亂破其左廂十一部㑹囘紇葛邏祿共攻㧞悉宻頡跌伊施殺之囘紇骨力裴羅自立為骨咄祿毗伽闕可汗上冊拜裴羅為懐仁可汗四載正月懐仁為白眉所殺其子摩延啜立自號葛勒可汗西突厥西突厥曷娑那可汗入朝于隋留之國人立其叔父射匱可汗射匱者達頭之孫既立拓地東至金山西至海遂與北突厥為敵建庭於龜兹北三彌山射匱卒弟綂葉䕶可汗立勇而有謀北幷鐵勒控弦十萬據烏孫故地又移庭於石國北千泉西域諸國皆臣之葉護各遣人督征賦武徳元年八月以西突厥曷娑那可汗為歸義王曷娑那獻大珠帝曰珠誠至寳然朕寳王赤心珠無所用之竟還之二年八月曷娑那在長安北突厥遣使請殺之不許羣臣皆曰保一人而失一國後必為患秦王曰人窮歸我殺之不義久之引曷娑那入内殿既而送中書省縱北突厥使者殺之八月西突厥髙曷各遣使入貢八年夏四月統葉䕶遣使請昏帝問裴矩矩對曰今北冦方强國家且當逺交而近攻臣謂宜許其昏以威頡利俟數年之後徐思其宜上從之貞觀八年十月西突厥咄陸可汗死其弟沙鉢羅咄咥利立十二年十二月西突厥分為十部毎部豪長各賜一箭謂之十箭又分左右廂左廂號五咄亦置五大啜右廂號弩失畢置五大俟斤通謂之十姓至是咥利失失衆心為其臣所逐遂走焉耆尋復得其故地西部遂立欲谷設為乙毘咄陸可汗中分其地十三年十二月西突厥咥利失可汗死子乙毘沙鉢羅䕶立號南庭咄陸為北庭十五年五月咄陸可汗殺沙鉢羅可汗十六年咄陸既幷沙鉢羅之衆自恃強盛遣兵冦伊州安西都䕶郭孝恪擊破之是年咄陸擊破米國不分所獲與其下又斬其将泥孰啜泥孰啜部将胡祿屋襲擊之咄陸走保白水湖城所部詣闕請廢之上遣使立莫賀咄之子為乙毗射匱可汗率諸部擊咄陸敗之使人招其故部落皆曰使我千人戰死一人獨存亦不汝從咄陸自知不為衆附乃奔吐火羅十九年六月乙毘射匱可汗遣使入貢且請昏許之使割龜兹于闐踈勒朱俱波葱嶺五國以為聘禮二十二年四月葉䕶賀魯来降咄陸既奔吐火羅部落亡散其葉䕶阿史那賀魯帥其餘衆數千帳内屬詔以為瑶池都督永徽三年七月賀魯招集離散廬帳漸盛聞太宗崩遂叛擊破射匱滅之勝兵數十萬與乙毘咄陸連兵處月處宻及西城諸國多附之進冦庭州攻陷金嶺城詔梁建方契苾何力發兵及囘紇以討之四年十二月乙毘咄陸死子頡苾達度設號真珠葉䕶與沙鉢羅有隙尋為沙鉢羅所倂六年五月屯衛大将軍程知節将兵討沙鉢羅不克顯慶二年正月遣蘇定方等復擊沙鉢羅定方至曳咥河西沙鉢羅帥十萬拒戰擊敗之會大雪平地二尺定方曰彼恃雪深謂我不能進亟追之可及也又斬獲數萬沙鉢羅脱走趣石國諸部各歸所居乃命蕭嗣業追獲之遂分其地置崑陵濛陵二都䕶以彌射為興昔亡可汗押五咄陸部落步真為繼往絶可汗押五弩失畢部落龍朔二年十月勅興昔亡繼往絶二可汗發兵與蘇海政討龜兹繼往絶素與興昔亡有怨密請海政矯勅收斬之其部落亡走海政追討平之繼往絶尋死十姓無主附於吐蕃三年十月西突厥冦庭州刺史来濟将兵拒之不能禦遂赴敵死永淳元年四月阿史那車簿圍弓月安西都䕶王方翼救之三姓咽麫與車簿合兵拒方翼戰於熱海分遣禆将襲破之擒其豪長三百人西突厥遂平嗣聖七年十月西突厥十姓自垂拱以来為東突厥所侵掠散亡畧盡繼往絶可汗斛瑟羅收其餘衆入居内地武后以為竭忠事主可汗二十一年正月周以阿史那懐道為西突厥十姓可汗西陁突厥貞觀十二年九月上以薛延陁强盛恐後難制分封其二子皆為小可汗各賜鼓纛外示優崇實分其勢十五年十一月薛延陁真珠可汗聞将東封竟内已虚我此時取思摩奴如拉朽乃命其子大度設發諸部兵合二十萬擊突厥思摩不能禦率部落入長城保朔州遣使告急詔遣李世勣等分道擊之十二月世勣敗薛延陁於諾真水捕獲五萬餘大度設脫走十六年十月上謂侍臣曰薛延陁屈强今禦之有二䇿茍非發兵殄滅之則與之婚姻以撫之房𤣥齡曰兵凶戰危臣以為和親便即命兵部侍郎崔敦禮持節使薛延陁許以新興公主妻之十七年真珠使其姪来納聘獻羊馬契苾何力上言薛延陁不可與昏上曰我許之矣可食言乎何力曰願且遷延𠡠奚男使親迎彼必不敢来則絶之矣上乃召真珠可汗㑹禮真珠欲行其臣不可謂往必不返真珠謂天子聖明逺近朝服今親幸靈州以愛主妻我我得見天子死亦不恨薛延陁何患無君因多以羊馬為聘禮經沙磧耗死過半乃責以聘禮不備絶之褚遂良上䟽曰往者天下咸言陛下欲安百姓不愛一女莫不懐徳今忽有改悔之心得少失多竊為國家惜之嫌隙既生必搆邊患彼國蓄見欺之怒此民懐負約之慚恐非所以服逺人訓戎士也不聽薛延陁本無府庫至是厚歛諸部以充聘財諸部怨叛延陁由是衰弱十九年九月真珠二子長曰曳莽次曰㧞灼初分立為小可汗至是真珠死㧞灼殺其兄曳莽而自立是為多彌可汗十二月薛延陁冦夏州二十年正月夏州兵擊薛延陁大破之二十一年八月多彌猜褊好殺廢父時貴臣専用已所親眤國人不附囘紇諸部落擊之大敗上詔王道宗等将兵擊之國中驚擾多彌出走囘紇殺之盡據其地餘衆西走猶七萬共立真珠兄子咄摩支遣使奉表請居鬱督軍山之北詔遣使安集之鐵勒九姓豪長聞其来皆懼朝議亦恐其為磧北之患乃遣李世勣圗之上自幸靈州招撫之世勣至鬱督軍山咄摩支降道宗兵既渡磧薛延陁拒戰道宗擊破之遣使招諭鐵勒諸部其酋長皆喜請入朝駕至浮陽囘紇等十一姓各遣使歸命乞置官司上喜遣使納之詔曰朕聊命偏師遂擒頡利始𢎞廟畧已滅延陀鐵勒百餘萬户請為州郡混元以降書未前聞宜偹禮告廟仍頒示普天上又為詩曰雪耻酬百姓除凶報千古勒石於靈州吐谷渾初隋煬帝征吐谷渾可汗伏允奔党項煬帝立其質子順為主不果入㑹中國喪亂伏允還收其故地仍自稱為吐谷渾可汗武徳二年二月凉李軌奉書於帝稱從弟大凉皇帝臣軌帝怒議討之遣使與伏允連和使引兵擊李軌許以順還之伏允喜起兵擊軌數遣使入貢請其質子順帝遣還之四年七月吐谷渾冦洮岷二州遣岐州刺史柴紹救之為其所圍且乗髙射之天下如雨紹遣軍士彈琵琶二女子對舞衆怪之相與聚觀紹察其無偹潜遣精騎出其陣後擊之衆大潰八年正月吐谷渾突厥各請互市詔皆許之先是中國喪亂民乏耕牛至是資於戎狄雜畜被野貞觀八年十月吐谷渾可汗伏允老耄其臣天柱王用事數入塞侵盜詔大舉兵討之上欲以李靖為将因其老不欲重勞之靖聞之請行上大悦以靖為西海道行軍大總管節度諸軍討之九年五月李靖悉燒野草輕兵走入磧諸将以為馬無草未可深入侯君集曰彼一敗之後䑕逃鳥散取之易於拾芥此而不乗後必悔之靖從之分軍為兩道敗吐谷渾於牛心堆又敗諸赤水源令君集追伏允于烏海與戰大破之靖襲破伏允牙帳伏允子順斬天柱王来降伏允為左右所殺國人立順為可汗詔以為西平王後順為國人所殺上遣侯君集将兵立其子諾曷鉢為可汗十年三月吐谷渾請頒厯遣子入侍永徽三年正月吐谷渾遣使入貢咸亨三年二月徙吐谷渾於靈州其故地皆入於吐蕃乾寜元年六月李克用大破吐谷渾唐㑹要卷九十四
