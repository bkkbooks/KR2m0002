body:
  text: 唐會要卷十上宋王溥撰親拜郊正月祈穀高祖武德初定令孟春辛日祈穀祭感帝于南郊玄帝配用蒼犢二舊唐書禮儀志高宗顯慶二年詔南郊祈穀祭昊天上帝罷感帝祠文獻通考高宗顯慶二年禮部尚書許敬宗與禮官等議曰六天出於緯書而南郊圜丘一也玄以為二物郊及明堂本以祭天而康成皆以為祭太微五帝傳曰凡祀啓蟄而郊郊而後耕故郊祀后稷以祈豐事而玄謂周祭蒼帝靈威仰配以后稷因而祈穀皆謬論也由是盡黜玄説而南郊祈穀祭昊天上帝唐書禮樂志蕭德言傳子子儒字文舉議月令孟春祈穀上帝春秋啓蟄而郊郊而後耕故郊祀后稷以祈農事春夏祈穀于上帝皆祭天也著之感帝尤為不稽請郊明堂罷六天説止祀昊天詔曰可乾封元年詔祈穀復祀感帝唐書禮樂志乾封初詔依舊祀感帝司禮少常伯郝處俊等奏曰顯慶新禮廢感帝之祀改為祈穀祀昊天上帝以高祖太武皇帝配檢舊禮感帝以世祖元皇帝配今既奉敕依舊祭感帝今改祈穀為感帝以高祖配者高祖依新禮見配圜丘昊天上帝若更配感帝便恐有乖古禮案禮記周人禘嚳而郊稷之義今若禘郊一祖同配恐無所據從之舊唐書禮儀志開元中起居舍人王仲邱議曰案貞觀禮祈穀祀感帝而顯慶禮祀昊天上帝傳曰郊而後耕詩曰噫嘻春夏祈穀于上帝禮記亦曰上辛祈穀于上帝而鄭玄乃云天之五帝迭王王者之興必感其一因别祭尊之故夏正之月祭其所生之帝于南郊以其祖配之故周祭靈威仰以后稷配因以祈穀然則祈穀非祭之本意乃因后稷為配爾此非祈穀之本義也夫祈穀本以祭天也然五帝者五行之精所以生九穀也宜于祈穀祭昊天而兼祭五帝唐書禮樂志王仲邱傳開元中上言貞觀禮正月上辛祀感帝于南郊顯慶禮祀昊天上帝于圜丘以祈穀臣謂詩春夏祈穀于上帝禮上辛祈穀于上帝則上帝當昊天矣鄭玄曰天之五帝遞王王者必感一以興故夏正祭所生于郊以其祖配之因以祈穀感帝之祀貞觀用之矣請因祈穀之壇遍祭五方帝五帝者五行之精九穀之宗也請二禮皆用詔可開元二十年改撰新禮祀天一嵗有四正月上辛祈穀祀昊天上帝于圜丘以高祖配五方帝從祀其上帝配帝籩豆等同冬至之數五方帝太樽著樽犧樽山罍各一籩豆等亦同冬至之數舊唐書禮儀志天寶六載正月戊子親祀圜丘禮畢大赦天下舊唐書玄宗本紀建中元年春正月辛未有事于南郊大赦唐書德宗本紀元和二年正月辛卯有事于南郊大赦唐書憲宗本紀元和二年正月己丑朔上親獻太清宫太廟辛卯祀昊天上帝于郊丘是日還宫御丹鳳樓大赦天下先是將及大禮隂晦浹旬宰臣請改日上曰郊廟事重齋戒有日不可遽更享獻之辰景物晴霽人情欣悅舊唐書憲宗本紀元和十五年十二月將有事于南郊穆宗問禮官南郊卜日否禮院奏伏凖禮令祠祭皆卜自天寶已後凡欲郊祀必先朝太清宫次日饗太廟又次日祀南郊相循至今並不卜日從之及明年正月南郊禮畢有司不設御榻上立受羣臣慶賀及御樓仗退百竂復不于樓前賀及受于興慶宫二者闕禮有司之過也舊唐書禮儀志長慶元年正月辛丑有事于南郊大赦改元唐書穆宗本紀長慶元年正月己亥朔上親薦獻太清宫太廟是日法駕赴南郊日抱珥宰臣賀于前辛丑祀昊天上帝于圜丘即日還宫御丹鳳樓大赦天下改元長慶內外文武及致仕官三品以上賜爵一級四品以下加一階陪位白身人賜勳兩轉應緣大禮移仗宿衛御樓兵仗將士普恩之外賜勳階有差仍凖舊例賜錢物二十萬四千九百六十端匹禮畢羣臣于樓前稱賀仗退上朝太后于興慶宫舊唐書穆宗本紀寶厯元年春正月辛亥有事于南郊唐書敬宗本紀會昌元年春正月辛巳有事于南郊大赦改元五年正月辛亥有事于南郊大赦作仙臺于南郊唐書武宗本紀大中元年正月甲寅有事于南郊大赦改元七年春正月戊申有事于南郊大赦唐書宣宗本紀咸通四年春正月庚午有事于南郊唐書懿宗本紀乾符二年春正月辛卯有事于南郊唐書僖宗本紀親迎氣武德貞觀之制神祇大享之外每嵗立春之日祀青帝于東郊帝宓羲配勾芒嵗星三辰七宿從祀立夏祀赤帝于南郊帝神農氏配祝融熒惑三辰七宿從祀季夏土王日祀黃帝于南郊帝軒轅配后土鎮星從祀立秋祀白帝于西郊帝少昊配蓐收太白三辰七宿從祀立冬祀黑帝于北郊帝顓頊配玄冥辰星三辰七宿從祀每郊帝及配座用方色犢各一籩豆各四簠簋各二㽅俎各一勾芒已下五星及三辰七宿每宿牲用少牢每座籩豆簠簋㽅俎各一舊唐書禮儀志永昌元年即嗣聖六年敕天無二稱帝是通名從前諸儒互生同異乃以五方之帝亦謂為天假有經傳互文終是名實未當稱號不别尊卑相混自今郊祀之禮惟昊天上帝稱天自餘五帝皆稱帝通典玄宗開元十一年正月十日制獻嵗之吉迎氣方始敬順天時無違月令所由長吏可舉舊章通考立春日祀青帝于東郊以太昊配勾芒嵗星三辰七宿從祀立夏日祀赤帝于南郊以炎帝配祝融熒惑三辰七宿從祀季夏日祀黃帝于南郊以軒轅配后土鎮星從祀立秋日祀白帝于西郊以少昊配蓐收太白三辰七宿從祀立冬日祀黑帝于北郊以顓頊配玄冥辰星三辰七宿從祀正座配座籩豆各十二五辰五官三辰七宿籩豆各二餘各一也通考以上樂用本音皆以黃鍾為均三成準周禮云圜鍾之均六變天神皆降可得而禮記云天神皆降明五帝日月星辰皆天神也又準周禮樂三變唯致丘陵之祇今改用六變通考齋戒攝事祀官齋戒如圜丘儀前祀七日平明太尉誓百官于尚書省曰某月某日祀青帝于東郊各揚其職不供其事國有常刑皇帝散齋四日致齋三日如圜丘儀陳設前祀三日尚舍直長施大次于外壝東門之內道北南向尚舍奉御鋪御座攝事則衛尉設祀官公卿以下次于道南北向西上衛尉設陳饌幔于內壝東門之外道南北向設文武侍臣次又設祀官及從祀羣官諸州使蕃客等次前祀二日大樂令設宫懸之樂于壇南壝之內設鐘與磬于壇上各如圜丘之儀右校掃除壇之內外郊社令積柴于燎壇其壇于樂懸之南外壝之內攝事則其壇于神壇之左內壝之外方一丈高丈二尺開上南出户方六尺前祀一日奉禮設御位在壇之東南西向攝事則設祀官公卿位于內壝東門之內道北執事位于道南每等異位重行西向以北為上設望燎位于柴壇之北南向設祀官公卿位于內壝東門之外道南分獻之官于公卿之南執事位于其後設祀官及從祀羣官位及門外等位一如圜丘攝事則御史位于壇上設牲榜于東壝之外當門西向配帝牲榜少退南上設廩犧令位于牲西南御史陪其後俱北向設諸太祝位于牲東各當牲後祝史陪其後俱西向設太常卿省牲位于牲前近北南向設青帝夏赤帝季夏黃帝秋白帝冬黑帝酒樽于壇之上下太樽二著樽二犧樽二山罍二在壇上東南隅北向象樽二壺樽二山罍二在壇下皆于南陛之東北向西上設配帝著樽二犧樽二象樽二山罍二在壇上于青帝酒樽之東北向西上嵗星三辰勾芒氏夏祝融季夏后土秋蓐收冬玄冥以下放此俱象樽二各設于神座之左皆右向七宿壺樽二設于神座之右而左向上帝配帝之樽置于坫星辰以下樽藉以席皆加勺羃設爵于樽下設御洗于壇南陛東南亞獻之洗又于東南俱北向罍水在洗東篚在洗西南肆篚實以巾爵設星辰之樽罍洗篚各于其方陛道之左俱內向執樽罍篚羃者各于其後又設玉幣之篚于壇上下樽坫之所祀日未明五刻太史令郊社令設青帝靈威仰神位赤帝赤熛怒黃帝含樞紐白帝白招拒黑帝汁光紀于壇上北方南向席以藁秸設帝太昊氏神座夏神農季夏軒轅秋少昊冬顓頊以下放此于東方西向席以莞設嵗星三辰之座于壇之東北七宿之座于壇之西北各于其壇南向相對為首設勾芒氏之座于壇之東面西向席皆莞設神位各于座首省牲器如初儀鑾駕出宫如圜丘儀奠玉帛祀日未明三刻諸祀官各服其服郊社令良醖令各率其屬入實樽罍玉幣凡六樽之次太樽為上實以泛齊著樽次之實以醴齊犧樽次之實以盎齊象樽次之實以醍齊壺樽次之實以沈齊山罍為下實以三酒配座著樽為上實以泛齊犧樽次之實以醴齊象樽次之實以盎齊其嵗星三辰勾芒氏之象樽俱實以醍齊七宿之壺樽俱實以泛齊玄酒各實于五齊之上樽禮神之玉東方以青圭南方以赤璋中央以黃琮西方以騶虞北方以玄璜其幣各隨方色長丈八尺太官令帥進饌者實籩豆簠簋入設于內壝東門之外饌幔內未明二刻奉禮帥贊者先入就位贊引引御史博士諸太祝及令史祝史與執樽罍篚羃者入自東壝門當壇南重行北面西上立定奉禮曰再拜贊者承傳御史已下皆再拜訖執樽罍篚羃者各就位贊引引御史博士諸太祝詣卯陛升行掃除于上令史祝史行掃除于下訖引就位車駕將至謁者贊引引祀官通事舍人分引從祀羣官諸方客使先至者各就門外位駕至犬次門外回輅南向將軍降立于輅右侍中進當鑾駕前跪奏稱侍中臣某言請降輅俯伏興還復位皇帝停大次通事舍人各引文武九品已上從祀羣官就壝外位攝則無車駕將至下至壝外儀太樂令帥工人二舞次入就位文舞入陳于懸內武舞立于懸南道西謁者引司空入陳掃除訖出復位如常儀皇帝停大次半刻頃通事舍人贊引各引從祀羣官介公酅公諸方客使先入就位太常博士引太常卿立于大次門當門北向侍中版奏外辦攝則初司空入謁者引祀官贊引引執事俱就門外位司空掃除訖各引入就位贊再拜謁者進太尉之左白有司謹具請行事無皇帝停大次下至太常卿奏謹具儀皇帝服大裘而冕夏服衮冕出次華蓋侍衛如常儀博士引太常卿太常卿引皇帝凡太常卿前導皆博士先引至內壝外殿中監進大圭尚衣奉御又以鎮圭授殿中監殿中監受進皇帝搢大圭執鎮圭華蓋仗衛停殿門近侍者從入如常謁者引禮部尚書太常少卿陪從如常儀皇帝至版位西向立每立定太常卿博士即立于左謁者贊引各引祀官次入就位立定太常卿前奏稱請再拜退復位皇帝再拜奉禮曰衆官再拜衆官在位者皆再拜其先拜者不拜太常卿前奏有司謹具請行事退復位協律郎跪俯伏舉麾鼓柷奏角音夏徵音季夏宫音秋商音冬羽音乃以黃鍾之均文舞之舞樂六成偃麾戛敔樂止太常卿前奏稱請再拜退復位皇帝再拜攝事拜奉禮曰衆官再拜衆官在位者皆再拜上下諸太祝俱取玉幣于篚各立于樽所其奠玉幣及毛血並如圜丘儀攝則太尉為初獻受玉幣登預作元和之樂餘亦如圜丘攝事之儀進熟皇帝既升奠玉帛其設饌盥洗奠皆如圜丘之儀攝事如圜丘攝事儀太祝持版進于神座之右東向跪讀祝文曰維某年嵗次某月朔某日子嗣天子臣某攝事云嗣天子臣某謹遣太尉臣某名敢昭告于青帝靈威仰獻春伊始時維發生品物昭蘇式遵恆禮敬以玉帛犧齊粢盛庶品肅恭燔祀暢兹和德帝太昊氏配神作主尚饗訖興夏云昭告于赤帝赤熛怒朱明戒序長贏馭節庶品蕃碩用遵恆典敬以玉帛犧齊粢盛庶品恭敬禋祀肅昭養德帝神農氏配神作主季夏云黃帝含樞紐爰兹溽暑實惟土潤戊巳統位黃鍾在宫敬以玉帛犧齊粢盛庶品恭修燔祀式虔厚德帝軒轅氏配神作主秋云白帝白招拒素秋伊始品物收成祗率舊章展其恆禮帝少昊氏配神作主冬云黑帝汁光紀玄冥戒序庶類安寧資此積嵗祗率恆典帝顓頊氏配神作主皇帝再拜初讀祝文訖樂作太祝進奠版于神座前興還樽所皇帝拜訖樂止太常卿引皇帝詣配帝酒樽所執樽者舉羃侍中取爵侍中贊酌泛齊訖樂作太常卿引皇帝進當太昊氏神座前東向跪奠爵俯伏興太常卿引皇帝少退東向立樂止太祝持版進于神座之左北向跪讀祝文曰維某年嵗次某月朔某日子開元神武皇帝臣某敢昭告于帝太昊氏爰始立春盛德在木用致燔燎於青帝靈威仰惟帝布兹仁政叨叶上元謹以制幣犧齊粢盛庶品備兹明薦配神作主尚饗訖興夏云昭告于帝神農氏時維孟夏火德方融用兹明禋于赤帝赤熛怒惟帝表功協德允斯作對謹以制幣犧齊粢盛庶品式陳明薦配神作主季夏云告于帝軒轅氏時維季夏位膺土德式奉明禋于黃帝含樞紐惟帝功施厚地道合上元謹以云云秋云告于帝少昊氐時維立秋金德在馭用致燔燎于白帝白招拒惟帝立兹義政叶此神功謹以云云冬云告于帝顓頊氏時維立冬水德在馭用兹禋燎于黑帝汁光紀惟帝道合乾元允兹升配謹以云云其飲福及亞獻至還宫並同圜丘之儀攝事同圜丘攝事儀開元禮開元二十五年十月一日制自今已後每年立春之日朕當帥公卿親迎春于東郊其後夏及秋常以孟月朝于正殿讀時令仍令禮官即修撰儀注既為常式及是常禮務從省便無使勞煩也文獻通考開元二十六年正月丁丑迎氣于東郊唐書玄宗本紀開元二十六年又親往東郊迎氣祀青帝以勾芒配嵗星及三辰七宿從祀其壇本在春明門外玄宗以配所隘狹始移于滻水之東面西位望春宫其壇一成壇上及四面皆青色勾芒壇在東南嵗星已下各為一小壇在青帝壇之北親祀之時有瑞雪壇下侍臣及百竂拜賀稱慶舊唐書禮儀志肅宗元年建卯月一日赦文朕敬授人時慎徽月令庶無極憊以獲休徵自今已後每至四孟月迎氣之日令所司明案典禮宣讀時令朕當與百辟卿士共舉行之文獻通考德宗貞元元年十月二十七日詔郊祀之義本于至誠制定禮名合從事實使名實相副尊卑有倫五方配帝上古哲王道濟蒸民禮著明祀論善計功則朕德不類統天御極則朕位攸同而祝文所有稱臣以祭既無益于誠敬徒有黷于等威宜從改正以敦至禮自今以後祀五方配帝祝文並不須稱臣其餘禮數如舊舊唐書禮儀志舊唐書郭崇敬傳時有衛士臣彭祖上疏云大唐土德千年合符請每四季郊祀天地詔禮官儒者議之崇敬議曰案舊禮立春之日迎氣于東郊祭青帝立夏日迎夏于南郊祭赤帝先立秋十八日迎黃靈于中地祀黃帝秋冬各于其方黃帝于五行為土王在四季生于火故火用事之末而祭之三季則否漢魏周隋共行此禮國家土德乘時亦以每嵗六月土王之日祀黃帝于南郊以后土配所謂合禮今彭祖請用四季祠祀多憑緯候之書且據隂陽之説事涉不經恐難行用又議祭五人帝不稱臣云太昊五帝人帝也于國家即為前後之禮無君臣之義若于人帝而稱臣則于天帝復何稱也議者或云五人帝列于月令分配五時則五神五音五祀五蟲五臭五穀皆以備其時之色數非必别有尊崇也后土方丘武德初令每嵗夏至祭皇地祇于方丘亦以景帝配其壇在京城之北十四里壇制再成下成方十丈上成五丈每祀則地祇及配帝設位于壇上神州及五嶽四鎮四瀆四海五方山林川澤丘陵墳衍原隰並皆從祀神州在壇之第二等五嶽以下三十七座在壇下外壝之內丘陵等三十座在壝外其牲地祇及配帝用犢三神州用黝犢一嶽鎮以下加羊豕各五焉孟冬祭神州于北郊景帝配用黝犢二舊唐書禮儀志太宗貞觀時奉高祖配地郊通典中書令房玄齡與禮官議以為禮有益于人則祀之神州者國之所託餘八州則又不相及近代通祭九州今除餘州等八座惟祭皇地祇及神州以正祀典高宗永徽中廢神州之祀通考禮部尚書許敬宗議方丘在祭地之外别有神州謂之北郊分地為二既無典據理又不通請合于一祀以符古義仍並循附式令永垂後則可之唐書蕭德言傳方丘既祭地又祭神州北郊皆不經請止一祠詔曰可乾封初詔依舊祀神州皇地祇壇依舊于渭水安置通考太常博士陸遵等議北郊之月古無明文漢光武正月辛未始建北郊東晉成帝咸和中議北郊用正月皆無指據武德來禮令即用十月為是隂用事故于此時祭之請依舊十月致祭從之武后天册萬嵗元年親享南郊合祭天地通考睿宗景雲三年將祀南郊有司請設皇地祇位通考先天元年夏五月戊寅有事于北郊辛巳大赦改元曰延和賜內外官陪禮者勳一轉民酺五日唐書睿宗本紀開元十一年二月壬子如汾隂祀后土唐書玄宗本紀開元十一年上將還西京便幸并州兵部尚書張説進言曰陛下今因行幸路由河東有漢武后土之祀此禮亦闕歷代莫能行之願陛下紹斯墜典以為三農祈穀此誠萬姓之福至十二年二月二十二日祠后土于汾隂睢上太史奏榮光出河休氣四塞祥風繞壇日揚其光初有司奏修壇掘地獲古銅鼎二其大者容四升小者容一升色皆青又獲古甎長九寸有篆書千秋萬嵗字及長樂未央字又有赤兔見于壇側舊祠堂為婦人素像則天時移河西梁山神素像就祠中配焉至十一年有司遷梁山神像于祠外之别室焉詔以中書令張嘉貞為壇場使將作少監張景為壇場副使張説為禮儀使文獻通考開元二十年九月乙巳中書令蕭嵩等奏上開元新禮十一月庚午祀后土于睢上大赦天下舊唐書玄宗本紀開元二十年十一月庚申如汾陰祠后土唐書玄宗本紀開元二十年車駕欲幸太原中書令蕭嵩上言云十一年親祀后土為蒼生祈穀自是神明昭祐纍年豐登有祈必報禮之大者且漢武親祠睢上前後數回伏請準舊事至后土行報賽之禮上從之至十一月二十一日祀后土于睢上其文曰恭惟坤元道昭品物廣大茂育暢于生成庶憑休和惠及黎獻博厚之位粵在汾隂肅恭時巡用昭舊典敬以琮幣犧牲粢盛庶品備兹瘞禮式展誠慤睿宗皇帝配神作主禮畢令所司刊石于祠所上自為文文獻通考開元二十年蕭嵩為中書令改撰新禮祀地一嵗有二舊唐書禮儀志祭地儀夏至日祭皇地祇于方丘壇上以髙祖神堯皇帝配座每座籩豆各十二簠簋篚俎各一百七十二座祭神州地祇於壇第一等籩豆各四餘如上也祭五嶽四鎮四海四瀆五山五川五林五澤五丘五陵五墳五衍五原五隰于內壝之外各依方所每座籩豆各一簠簋篚俎各一皆凖舊禮為定立冬後祭神州地祇于北郊以太宗文武聖皇帝配座每座籩豆各十二簠簋篚俎各一也舊樂用姑洗三成準周禮云函鍾之均八變則地祇皆降可得而禮鄭玄云祭地有二一是大地崑崙為皇地祇則宗伯黃琮所祭者二是帝王封域內之神州則兩圭有邸所祭者後禮則不立神州之祀今依前禮為定既曰地祇其樂合用函鍾之均八變並開元禮皇帝夏日至祭方丘儀后土同孟冬祭神州及攝事並附齋戒前祭七日戒誓皇帝服衮冕前祭二日太尉告高祖神堯皇帝廟如常告之儀告以配神作主孟冬祭神州則告太宗文武聖皇帝廟餘並如圜丘之儀陳設前祭三日尚舍直長施大次於外壝東門之外道北南向攝事衛尉設祭官公卿以下次于東壝外道南北向西上尚舍奉御鋪御座衛尉設文武侍臣次于大次之後文官在左武官在右俱南向設祭官次于東壝之外道南北向西上三師于南壝之外道東諸王于三師之南俱西向北上文官九品以上于祭官之東北向西上介公酅公于南壝之外道西東向諸州使人東方南方于諸王東南西向西方北方于介公酅公西南東向皆北上諸國之客東方南方于諸州使人之南西向西方北方于諸州使人之南東向皆北上武官三品以下七品以上于西壝之外道南北向東上其褒聖侯于文官三品以下攝事無御座以下至此儀設陳饌幔于內壝東門西門之外道北面南向壇上及神州東方南方之饌陳于東門外西向西方北方之饌陳于西門外東向神州無西門之饌前祭二日大樂令設宫縣之樂于壇南內壝之外樹靈鼓于北縣之內道之左右餘如圜丘儀又為瘞坎于壇之壬地內壝之外方深取足容物南出陛前祭一日奉禮設御位攝事無御位于壇之東南西向設望瘞位于壇西南當瘞坎北向設祭官公卿位于內壝東門之外道南分獻官于公卿之南執事者位于其後每等異位俱重行西向北上設御史位于壇上正位于東南隅西向副位西南隅東向設奉禮位于樂縣東北贊者二人在南差退俱西向北上設奉禮贊者位于瘞坎西南東向南上設協律郎位于壇上南陛之西東向設太樂令位于北縣之間當壇北向設從祭之官三師位于縣南道東諸王位于三師之東俱北向西上介公酅公位于道西北向東上文官從一品以下九品以上位于執事之南每等異位重行西向武官三品以下九品以上位于西方當文官每等異位重行東向皆北上諸州使人位東方南方于諸王東南重行北面西上西方北方于介公酅公西南重行北面東上設諸國客使位于內壝南門之外東方南方于諸州使人之東每國異位重行北面西上西方北方於諸州使人之西每國異位重行北面東上攝事無三師以下至此儀設門外位祭官公卿以下皆于東壝之外道南每等異位重行北面西上三師位于南壝之外道東諸王于三師之南俱西向介公酅公于道西東向皆北上文官從一品以下九品以上位于東壝之外祭官之南每等異位重行北向西上武官三品以下九品以上位于西壝之外道南每等異位重行北面東上諸州使人位東方南方于諸王東南重行西面西方北方于介公酅公西南重行東面俱北上設諸國客位東方南方于諸州使人之南每國異位重行西面西方北方于諸州使人之南每國異位重行東面皆北上攝事無三師以下至此儀牲榜于東壝之外當門西向黃牲一居前又黃牲一在北少退玄牲一在南少退設廩犧令位于牲西南祝史陪其後俱北向設諸太祝位于牲東各當牲後祝史陪其後俱西向設太常卿省牲位于牲前近北南向設皇地祇酒樽于壇之上下太樽二著樽二犧樽二山罍一在壇上東南隅北向象樽二壺樽二山罍二在壇下皆于南陛之東北向俱西上設配帝著樽二象樽二山罍一在壇上皆于皇地祇酒樽之東北向西上孟冬北郊酒樽于神州酒樽之東同夏至之儀神州太樽二在第一等每方嶽鎮海瀆俱山樽二山川林澤俱蜃樽二丘陵墳衍原隰俱概樽二凡樽各設于神座之左而右向神州以上之樽置于坫以下之樽俱藉以席皆加勺冪設爵于樽下孟冬儀壇上之樽置于坫壇下之樽藉以席設御洗及設玉幣之篚等並如圜丘儀孟冬祭同祭日未明五刻太史令郊社令各服其服帥其屬升設皇地祇神座于壇上北方南向席以藁秸設高祖神堯皇帝神座孟冬神州則設太宗文武聖皇帝神座于東方西向席以莞設神州地祇神座于第一等東南方席以藁秸又設嶽鎮海瀆以下之座于內壝之內各于其方皆有原隰丘陵墳衍之座又設中嶽以下之座于壇之西南俱內向自神州以下六十八位席皆以莞設神位各于座首省牲器如别儀鑾駕出宫服以衮冕餘如上辛圜丘儀孟冬北郊同圜丘奠玉帛祭日未明三刻諸祭官各服其服郊社令良醖令各帥其屬入實尊罍玉幣凡六樽之次太樽為上實以泛齊著樽次之實以醴齊犧樽次之實以盎齊象樽次之實以醍齊壺樽次之實以沈齊山罍為下實以三酒配帝著樽為上實以泛齊犧樽次之實以醴齊象樽次之實以盎齊以上孟冬同神州太樽實以沈齊五樽實以清酒玄酒各實于諸齊之上樽禮神之玉皇地祇以黃琮其幣以黃配帝之幣亦如之神州之玉以兩圭有邸其幣以玄孟冬同嶽瀆以下之幣各從方色太官令帥進饌者入實饌及禮官就位御史太祝行掃除等並如圜丘儀孟冬同駕將至謁者贊引各引祭官從祭官客使等俱就門外位駕至大次門外回輅南向將軍降立于輅左侍中進當鑾駕前跪奏稱侍中臣某言請降輅俯伏興還復侍位五品以上從祭之官皆就壝外位攝事無駕至大次下儀大樂令帥工人二舞次入就位文舞入陳于縣內武舞立于縣南道西謁者引司空入行掃除訖出復位皇帝停大次半刻頃謁者贊引各引祝官通事舍人分引從祀羣官介公酅公諸方客使皆先入就位太常博士引太常卿立于大次門外當門北向侍中版奏外辦皇帝服衮冕孟冬神州大裘而冕出次華蓋侍衛如常儀侍中負寶陪從如式博士引太常卿太常卿引皇帝至中壝門外殿中監進大圭尚衣奉御又以鎮圭授殿中監皇帝搢大圭執鎮圭華蓋仗衛停于門外侍者從入謁者引禮部尚書太常少卿陪從如常儀皇帝至版位太常卿請再拜及請行事並如圜丘儀攝事如圜丘攝事儀協律郎舉麾工鼓柷奏順和之樂乃以林鍾為宫太蔟為商姑洗為徵南吕為羽作文武之舞樂舞八成林鍾太蔟姑洗南吕皆再成偃麾戛敔樂止太常卿前奏稱請再拜退復位皇帝再拜奉禮曰衆官再拜在位者皆再拜皇帝奠玉幣及奏樂之節並如圜丘攝事則太尉奠玉帛下放此登歌作肅和之樂以應鍾之均太常卿引皇帝進北向跪奠于皇地祇孟冬神州神座俯伏興及奠配座並如圜丘儀攝事同圜丘攝事儀進熟皇帝既升奠玉幣太官令陳饌之儀如圜丘俎初入門奏雍和之樂以太蔟之均自後接神之樂用太蔟饌至陛樂止祝史俱進跪徹毛血之豆降自東陛以出皇地祇之饌升自南陛配帝之饌升自東陛神州之饌升自北陛孟冬神州升自南陛諸太祝迎引于壇上各設于神座前設訖謁者引司徒太官令帥進饌者降自東陛以出司徒復位諸太祝還樽前又進設嶽鎮以下之饌相次而畢太常卿引皇帝詣罍洗樂作其盥洗酌獻跪奠奏樂之儀並如圜丘攝事如圜丘攝事儀太祝持版進于神座之右東向跪讀祝文曰維某年嵗次月朔日子嗣天子臣某攝則云謹遣太尉臣名下放此敢昭告于皇地祇乾道運行日躔北至景風應序離氣效時嘉承至和肅若舊典敬以玉帛犧齊粢盛庶品備兹祗瘞式表誠慤高祖神堯皇帝配神作主尚饗太祝俯伏興孟冬神州云包含區夏育植羣生溥被域中咸賴厚德式遵彝典報此元神敬以玉帛犧齊粢盛庶品明薦厥誠備兹祗瘞皇祖太宗文武聖皇帝配神作主皇帝再拜攝則太尉再拜初讀祝文訖樂作太祝進跪奠版于神座興還樽所皇帝拜訖樂止太常卿引皇帝詣配帝酒樽所執樽者舉冪侍中取爵于坫進皇帝受爵侍中贊酌泛齊訖樂作太常卿引皇帝進高祖神堯皇帝神座前東向跪奠爵俯伏興太常卿引皇帝少退東向立樂止太祝持版進于神座之右北向跪讀祝文曰維某年嵗次月朔日子孝孫開元神武皇帝臣某敢昭告于高祖神堯皇帝時維夏至肅若訓典用祗祭于皇地祇維高祖德叶二儀道兼三統禮膺光配敢率舊章孟冬云皇曽祖太宗文武聖皇帝德被乾坤格于上下昭配之儀欽率舊章謹以制幣犧齊粢盛庶品肅雍明薦作主侑神尚饗太祝俯伏興皇帝再拜初讀祝文訖樂作太祝進奠版于神座興還樽前皇帝飲福受胙及亞獻終獻盥洗酌獻飲福並如圜丘儀唯皇地祇太尉亞獻酌醍齊時武舞作合六律六吕為異耳初太尉將升獻謁者一人引獻官詣罍洗盥洗匏爵訖升自巳陛詣酒樽所執樽者舉冪酌泛齊進奠于神州座前引降還本位謁者五人次引獻官各詣罍洗盥洗訖各詣酒樽所俱酌醍齊訖引獻官各進奠爵于諸方嶽鎮海瀆首座餘座皆祝史助奠相次而畢引還本位又贊引五人各引獻官詣罍洗盥洗詣酒樽所酌沈齊獻山川林澤如嶽鎮之儀訖又引獻官詣罍洗盥洗訖詣酒樽所俱酌清酒獻丘陵以下及齋郎助奠如上儀訖各引還本位武舞六成樂止舞獻俱畢諸祝徹豆及賜胙皇帝再拜奏樂並如圜丘儀太常卿前奏請就望瘞位太常卿引皇帝樂作皇帝就望瘞位北向立樂止於羣官將拜上下諸祝各執篚進神座前取玉帛齋郎以俎載神州以上牲體稷黍飯爵酒各由其陛降壇北行當瘞坎西行諸太祝以玉幣饌物置于坎諸祝又以嶽鎮以下之禮幣及牲體皆從瘞奉禮曰可瘞坎東西廂各二人置土半坎太常卿前奏禮畢引皇帝還大次樂作從祀羣官諸方客使御史以下出並如圜丘儀其祝版燔于齋所鑾駕還宫如圜丘儀開元禮開元二十一年詔夏至日祀皇地祇于方丘以高祖配立冬祭神州于北郊以太宗配通考天寶五年詔皇王之典聿修于百代郊祭之儀允屬于三靈聖人既因時以制宜王者亦緣情以定禮且尊莫大于天地禮莫崇于祖宗嚴配昭升豈宜異數今蒸嘗之獻既著于常式南北之郊未展于時享自今以後每嵗四時孟月先擇吉日祭昊天上帝其皇地祇合祭以次日祭九宫壇皆令宰臣行禮奠祭務崇蠲潔稱朕意焉通考册府元龜代宗大厯十二年秋八月增修北郊壇齋宫二十五間唐文宗太和三年六月太常寺奏北郊祀皇地祇壇先闕齋宫請準祠列置一所可之后土社稷武德九年二月戊寅親祠社稷舊唐書高祖本紀武德貞觀之制仲春仲秋時戊日祭大社大稷社以勾龍配稷以后稷配社稷各用太牢一牲色並黑籩豆簠簋各二鉶俎各三季冬蠟之明日又祭社稷于社宫如春秋二仲之禮禮儀志通典唐社稷亦在含光門內之右册府元龜武德九年正月丙子詔曰厚地載物社主其祭嘉穀養民稷惟元祀列聖垂範昔王通訓建邦正位莫此為先爰暨都邑建于州里冢土之濱咸極莊敬所以勸農務本修始報功敦序教義整齊風俗末代澆浮祀典虧替時逢喪亂仁惠弛薄壇壝闕昭備之禮鄉閭無紀合之訓朕握圖受厯菲食卑宫奉圭璧以尊嚴潔粢盛而禋燎尚想躬稼厲精治本永言享祀宜存億紀是以吉日維戊親祀大社率從百僚以祈九穀今既南畝俶載東作方興九州致祀宜盡祇肅四方之民咸勤殖藝隨其姓類命為宗社京邑庶士臺省羣官里閈相從共遵社法以時供祀各申祈報兼行宴醑之義用洽鄉黨之歡且立節文明為典制進退俯仰登降折旋明加誨厲遞相勸奬齊之以禮有恥且格布告天下即宣遵用戊寅親祀社稷通典唐初為帝社亦曰籍田壇貞觀三年太宗將親耕給事中孔穎達議曰禮天子籍田南郊諸侯東郊晉武帝猶南郊今帝社乃東壇未合于古太宗曰書稱平秩東作而青輅黛耜順春氣也吾方位少陽田宜于東郊乃耕于東郊咸亨五年五月己未詔春秋二社本以祈農如聞此外别為邑會此後除二社外不得聚集有司嚴加禁止舊唐書高宗本紀長壽元年九月大赦改元改用九月社唐書武后本紀神龍元年五月乙酉立太廟社稷于東都唐書中宗本紀先農初為帝社亦曰籍田壇垂拱中武后籍田壇曰先農壇神龍元年禮部尚書祝欽明議曰周頌載芟春籍田而祈社稷禮天子為籍千畝諸侯百畝則緣田為社曰王社侯社今曰先農失王社之義宜正名為帝社太常少卿韋叔夏博士張齊賢等議曰祭法王者立太社然後立王社所置之地則無傳也漢興已有官社未立官稷乃立于官社之後以夏禹配官社以后稷配官稷臣瓉曰高祖立漢社稷所謂太社也官社配以禹所謂王社也至光武乃不立官稷相承至今魏以官社為帝社故摯虞謂魏氏故事立太社是也晉或廢或置皆無處所或曰二社並處而王社居西崔氏皇甫氏皆曰王社在籍田案衛宏漢儀春始東耕于籍田引傳先農則神農也又五經要義曰壇于田以祀先農如社魏秦靜議風伯雨師靈星先農社稷為國六神晉太始四年耕于東郊以太牢祀先農周隋舊儀及國朝先農皆祭神農于帝社配以后稷則王社先農不可一也今宜于籍田立帝社帝稷配以禹棄則先農帝社並祠叶于周之載芟之義欽明又議曰籍田之祭本王社古之祀先農勾龍后稷也烈山之子亦謂之農而周棄繼之皆祀為稷共工之子曰后土湯勝夏欲遷而不可故二神社稷主也黃帝以降不以羲農列常祀豈社稷而祭神農乎社稷之祭不取神農耒耜大功而專于共工烈山蓋以三皇洪荒之迹無取為教彼秦靜何人而知社稷先農為二而籍田有二壇乎先農王社一也皆后稷勾龍異名而分祭牲以四牢欽明又言漢祀禹謬也今欲立王社先農之號而未決乃更加二祀不可叔夏齊賢等乃奏言經無先農禮曰王自為立社曰王社先儒以為在籍田也永徽中猶曰籍田垂拱後乃為先農然則先農與社一人今先農壇請改為帝社壇以合古王社之義其祭凖令以孟春吉亥祠后土以勾龍氏配于是為帝社壇又立帝稷壇于西如太社太稷而壇不設方色以異于太社禮樂志張齊賢傳齊賢遷博士時東都置太社禮部尚書祝欽明問禮官博士周宗田主用所宜木今社主石奈何齊賢與太常少卿韋叔夏國子司業郭山惲尹知章等議春秋君以軍行祓社釁鼓祝奉以從故曰不用命戮于社社主用石以可奉而行也崔靈恩曰社主用石以地産最實歟吕氏春秋言殷人社用石後魏天平中遷太社石主其來尚矣周之田主用所宜木其民間之社歟非太社也於是舊主長尺有六寸方尺七寸問博士云何齊賢等議社主之制禮無傳天子親征載以行則非過重禮社祭土主隂氣韓詩外傳天子太社方五丈諸侯半之五土數社主宜長五尺以凖數五方二尺以凖隂偶剡其上以象物生方其下以象地體埋半土中本末均也請度以古尺云又問社稷壇墮四方用色而中不數尺冒黃土謂何齊賢等曰天子太社度廣五尺分四方上冒黃土象王者覆被四方然則當以黃土覆壇上舊壇上不數尺覆被之狹乖于古于是以方色飾壇四面及陛而黃土全覆上焉祭牲皆太牢其後改先農曰帝社又立帝稷皆齊賢等參定起居舍人王仲邱撰成百五十卷名曰大唐開元禮二十年九月頒所司行用焉以社稷及帝社為中祀州縣之社稷為小祀舊唐書禮儀志社稷之壇廣五丈以五土為之社以后土配稷以后稷配以太樽實醍齊著樽實盎齊皆二山罍一州縣之社稷以象樽二實醍齊以兩圭有邸幣以黑小祀幣以白籩豆皆十簋二簠二鉶三俎三州縣祭籩豆皆八簋二簠二俎三春秋祭牲皆太牢以黑孟春祭帝社及配座籩豆皆十簋二簠二㽅三鉶三俎三通考仲春仲秋上戊祭太社太稷舊樂用姑洗之均三變社稷之祀于禮為尊豈同丘陵止用三變合依地祗用函鍾之均八變之樂通考皇帝仲春仲秋上戊祭太社太稷儀攝事附齋戒如方丘儀陳設前祭三日尚舍直長施大次于社宫西門之外道北南向尚舍奉御鋪御座衛尉設文武侍臣次于大次之後文官在左武官在右俱南向設諸祭官次于齋坊之內攝事無設大次儀但守臣設祭官次三師于北門之外諸王于三師之北俱東向南上文官從一品以下九品以上于齋坊南門之外重行東向北上介公酅公于北門之外道東西向以南為上諸州使人東方南方于諸王西北東面西方北方于介公酅公東北俱南上武官三品以下九品以上于東門之外道北南向以西為上諸國之客于東門之外東方南方于武官東北南向西方北方于道南北向俱以西為上攝事無三師以下至此儀前祭二日太樂令設宫縣于壇北東方西方磬簴起南鐘簴次之南方北方磬簴起東鐘簴次之設十二鎛鐘于編懸之間各依辰位樹靈鼓于南懸之內道之左右植建鼓于四隅置柷敔于懸內柷在左敔在右設歌鐘歌磬各于壇上近北南向皆磬簴在西其匏竹者各立于壇下南向相對為首凡懸皆展而編之諸工人各位于懸後東方西方以