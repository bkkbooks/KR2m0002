人終千畝廩犧令二人一人奉耒耜授司農卿以五品六品清資官攝一人掌耒耜太常寺用本官三公九卿諸侯耕牛四十其十副也牛各一人庶人耕牛四十各二牛一人庶人耒耜二十具鍤二具木為刃主籍田縣令一人具朝服當耕時立田側畢乃退畿甸諸縣令先期集以常服陪耕所耆艾二十人陪于庶人耕位南三公從者各三人九卿諸侯從者各一人以助耕皆絳服介幘用其本司隸是時雖草具其儀如此以水旱用兵而止唐書禮樂志九宫壇天寶三年有術士蘇嘉慶上言請于京東朝日壇東置九宫貴神壇其壇三成成三尺四階其上依位置九壇壇尺五寸東南曰招搖正東曰軒轅東北曰太隂正南曰天一中央曰天符正北曰太一西南曰攝提正西曰咸池西北曰青龍五為中戴九履一左三右七二四為上六八為下符于遁甲四孟月祭尊為九宫貴神禮次昊天上帝而在太清宫太廟上用牲牢璧幣類于天地神祇玄宗親祀之如有司行事即宰相為之肅宗乾元三年正月又親祀之初九宫神位四時改位呼為飛位乾元之後不易位太和二年八月監察御史舒元輿奏七月十八日祀九宫貴神臣次合監祭職當檢察禮物伏見祝版九片臣伏讀既竟竊見陛下親署御名及稱臣于九宫之神臣伏以天子之尊除祭天地宗廟之外無合稱臣者王者父天母地兄日姊月比以九宫為目是宜分方而守其位臣又觀其名號及太一天一招搖軒轅咸池青龍太隂天符攝提此九神于天地猶子男也于日月猶侯伯也陛下尊為天子豈可反臣于天之子男耶臣竊以為過縱隂陽者流言其合祭則陛下當合稱皇帝遣某官致祭于九宫之神不宜稱臣與名臣實愚瞽不知其可伏緣行事在明日雞初鳴時成命已行實不敢滯伏乞聖慈異日降明詔禮官詳議冀明萬乘之尊無所虧降悠久誤典因此可正詔部省議皆如元輿之議乃降為中祀祝版稱皇帝不署名會昌元年十二月中書門下奏凖天寶三年十月六日敕九宫貴神實司水旱功佐上帝德庇下民冀嘉穀嵗登災害不作每至四時初節令中書門下往攝祭者凖禮九宫次昊天上帝壇在太清宫太廟上用牲牢璧幣類于天地天寶三載十二月玄宗親祠乾元三年正月肅宗親祀伏自纍年以來水旱愆候恐是有司禱請誠敬稍虧今屬孟春合修祀典望至明年正月祭日差宰臣一人禱請向後四時祭並請差僕射少師少保尚書太常卿等官所冀稍重其事以申嚴敬臣等十一月二十五日已于延英面奏伏奉聖旨令檢儀注進來者今欲祭時伏望令有司崇飾舊壇務于嚴潔敕旨依奏二年正月四日太常禮院奏準監察御史關牒今月十三日祀九宫貴神已敕宰相崔珙攝太尉行事合受誓誡及有司徒司空否伏以前件祭本稱大祀凖太和三年七月二十四日敕降為中祀昨據敕文祗稱崇飾舊壇務于嚴潔不令别進儀注更有改移伏恐不合却用大祀禮料伏候裁旨中書門下奏曰臣凖天寶三年十月六日敕九宫貴神實司水旱臣等伏覩既經兩朝親祀必是祈請有徵况自太和以來水旱愆候陛下常憂稼穡每念蒸黎臣等合副聖心以修墜典伏見太和三年禮官狀云縱司水旱兵革品秩不過列宿今者五星悉是從祀日月猶在中祀竊詳其意以星辰不合比天官曽不知統而言之則為天地在于辰象自有尊卑謹按後魏玉鈎志北辰第二星盛而常明者乃為元星露寢天帝常居始由道奧而為交通之迹又天皇大帝其精曜魄寶蓋萬神之祕圖河海之命紀皆稟焉據玄説即昊天上帝也天一掌八氣九精之政令以佐天極徵明而有常則隂陽序大運興太一掌十有六神之法度以輔人極徵明而得中則神人和而王道升平又北斗有權衡二星天一太一參居其間所以財成天地輔相神道也若一概以列宿論之實為淺也按漢書曰天神貴者太一佐曰五帝古者天子以春秋祭太一列于祀典其來久矣今五帝猶為大祀則太一無宜降祀稍重其祀固為得所劉向有言曰祖宗所立神祇舊典誠未易動又曰古今異制經無明文至尊至重難以疑説正也其意不欲非祖宗舊典以劉向之博通尚難于改作况禮官等學不究于天人識尤懵于祀典欲為參酌恐未得中伏望更令太常卿與學官同詳定庶獲明據從之檢校左僕射太常卿王起廣文博士盧朝等議曰伏以九宫貴神位列衆星禳災致福詔立祠壇降至尊以稱臣朝東郊以親拜在祀典雖云過禮庇羣生豈患無文思福黔黎特申嚴奉誠聖人屈已以安天下之心也厥後祝史不明精誠亦怠禮官建議降處中祀今聖德憂勤期臻壽域兵荒水旱寤寐軫懷爰令台臣緝興墜典伏惟九宫所稱之神即太一攝提軒轅招搖天符青龍咸池太隂天一者也謹案黃帝九宫經及萬嵩五行大義一宫其神太一其星天篷其卦坎其行水其方白二宫其神攝提其星天芮其卦坤其行土其方黑三宫其神軒轅其星天衝其卦震其行木其方碧四宫其神招搖其星天輔其卦巽其行木其方緑五宫其神天符其星天禽其卦離其行土其方黃六宫其神青龍其星天心其卦乾其行金其方白七宫其神咸池其星天柱其卦兌其行金其方赤八宫其神太隂其星天任其卦艮其行土其方白九宫其神天一其星天英其卦離其行火其方紫觀其統八卦運五行土飛于中數轉于極雖敬事迎釐不聞經見而範圍亭育有助昌時以此兩朝親祀而臻百祥也然以萬物之精上為列星星之運行必繫于物貴而居者則必統八氣總萬神斡權化于混茫賦品彚于隂隲與天地日月誠相參也豈得繄賴于敷祐而屈降于等夷如據太尉攝祀九宫貴神舊議前七日受誓誡于尚書省散齋四日致齋三日牲用犢祝版御署稱嗣天子臣圭幣樂成比類中祀則無等級今據江都集禮又開元禮蠟祭之日大明夜明二座及朝日夕月皇帝致祝皆率稱臣若以為非泰壇配祀之時得主日報天之義卑緣厭屈尊用德伸不以著在中祀取類常祀此則中祀用大祀之義也又據太社太稷開元之制列在中祀天寶三載二月十四日敕改為大祀自後因循復用前禮長慶三年正月禮官致議始凖前敕稱為大祀唯御署祝文稱天子謹遣某官某昭告文義以為殖物粒人則宜增秩致祝稱禱有異方丘不以伸為大祀遂屈尊稱此又大祀用中祀之禮也參之日月既如彼考之社稷又如此所為功巨者因之以殊禮位稱者不敢易其文是前聖後儒陟降之明徵也今九宫貴神既司水旱降福禳災人將賴之追舉舊章誠為得禮然以立祠非古宅位有方分職既異其司存致祝必參乎等列求之折中宜有變通稍重之儀有以為比伏請自今以後却用大祀之禮誓官備物無有降差唯御署祝文以社稷為本伏緣已稱臣于天帝無二尊故也敕旨依之付所司舊唐書禮儀志皇后親蠶貞觀元年三月癸已皇后親蠶唐書太宗本紀唐先蠶壇在長安宫北苑中高四尺周回三十步文獻通考太宗貞觀九年三月文德皇后率內外命婦有事于先蠶髙宗永徽三年三月七日制以先蠶為中祀后不祭則皇帝遣有司享之如先農文獻通考有司言案周官宗伯后不祭則攝而薦豆籩徹明王后之事而宗伯得攝行之伏以農桑乃衣食萬民不宜獨闕先蠶之祀無已則皇帝遣有司享之如先農可也顯慶元年三月辛巳皇后親蠶唐書髙宗本紀總章二年三月癸巳皇后親蠶唐書髙宗本紀咸亨五年三月皇后親蠶文獻通考上元元年三月己巳皇后親蠶唐書髙宗本紀二年三月丁巳天后親蠶唐書髙宗本紀開元元年正月辛巳皇后親蠶唐書玄宗本紀自嗣聖以來廢闕此禮至是始重行焉文獻通考乾元二年三月己巳皇后親蠶唐書肅宗本紀后親蠶苑中儀物甚盛唐書張皇后傳顯慶元年皇后武氏先天二年皇后王氏乾元二年皇后張氏並有事于先蠶其儀備開元禮通典皇后季春吉已享先蠶儀攝事附齋戒先祀五日散齋三日于後殿致齋二日于前殿前致齋一日尚寢設御幄于正殿西序及室中俱東向致齋之日晝漏上水一刻尚儀版奏請中嚴尚服帥司仗布侍衛司賔引內命婦陪位並如式六尚以下各服其服詣後殿奉迎尚儀版奏外辦上水三刻皇后服鈿叉禮衣結珮乘輿出自西房華蓋侍衛警蹕如常儀皇后即御座東向坐六尚以下侍衛如常一刻頃尚儀前跪奏稱尚儀妾姓言請降就齋室興退復位皇后降座乘輿入室六尚以下各還寢直衛者如常司賔引陪位者退散齋之日內侍帥內命婦之吉者使蠶於蠶室攝事無以上儀凡應享之官散齋三日于其寢致齋二日一日于其寢一日于享所亞獻終獻則致齋二日皆于其所六尚以下應從升者及從享內外命婦各于其寢清齋一宿諸應享之官致齋之日給酒食及明衣各習禮于齋所光祿卿監取明水火太官令取水于陰鑑取火于陽燧火以供爨水以實樽前享一日諸衛令其屬未後一刻各以其器服守衛壝門每門二人每隅一人享日未明給使代執與女工人等俱清齋一宿攝事同陳設前享三日尚舍直長施大次于外壝東門之內道北南向尚舍奉御鋪御座尚舍直長設內命婦及六尚以下次于大次之後俱南向守宫設外命婦次大長公主長公主公主以下于南壝之外道西三公夫人以下在其南俱重行每等異位東向北上設陳饌幔于內壝東門之外道南北向攝事守宫設享官次于東壝內道南北向西上設陳饌幔于內壝東門外道南北向前享一日大樂令設宫懸之樂于壇南內壝之內如圜丘儀諸女工人各為位于懸後東方西方以北為上南方北方以西為上右校掃除壇之內外又為瘞坎于壇之壬地內壝之外方深取足容物南出陛又為採桑壇於壇南二十步所方三丈高五尺四出陛尚舍量施帷幛于外壝之外四向開門其東門使容厭翟車前享一日內謁者設御位于壇之東南西向設望瘞位于壇之西南當瘞坎西向設亞獻終獻位于內壝東門之內道南執事者位于其後每等異位俱重行西向北上設典正位于壇下一位于東南西向一位于西南東向女使各陪于後設司贊位于樂懸東北掌贊二人在南差退俱西向又設司贊掌贊位于瘞坎西南東面南上設典樂舉麾位于壇上南陛之西東向設司樂位于北懸之間當壇北向設內命婦位于終獻之南每等異位重行西面北上設外命婦位于中壝南門之外大長公主以下于道東西向當內命婦位差退太夫人以下于道西去道逺近準公主俱每等異位重行相向北上又設御採桑位于採桑壇上東向設內命婦採桑位于壇下當御位東北每等異位南向西上設外命婦採桑位于壇下當御位東南每等異位北向西上設執御鈎筐者位于內命婦之西少南西上尚功執鈎司製執筐設內命婦執鈎筐者位各于其採桑位之後尚功以下四典執鈎司製下女史執筐設門外位享官于東壝之外道南從享內命婦于享官之東俱每等異位重行北向西上從享外命婦于南壝之外道西如設次之式攝事內謁者設三獻位于內壝東門之內道北執事位于道南每等異位重行西向以北為上又設望瘞位于壇之東北當瘞坎道西向又設典正位于壇下一位于東南西向一位于西南東向女史各陪其後糾察違失設掌贊位于樂懸東北女史二人在南差退俱西向設掌贊女史位于瘞坎西南東向南上設典樂舉麾位于壇上南陛之西東向設司樂位于北懸之間當壇北向設三獻以下門外位于東壝之外道南每等異位北向西上無設御位下至此儀設酒樽之位于壇上東南隅北向西上犧樽二象樽二山罍二樽皆加勺冪有坫以置爵設御洗于壇南陛東南攝事無御洗亞獻之洗又于東南俱北向罍水在洗東篚在洗西南肆篚實以中爵執樽罍篚冪者位于樽罍篚冪之後設幣篚于壇上樽坫之所晡後內謁者帥其屬以樽坫罍洗篚冪入設于位升壇者自東陛享日未明十五刻太官令帥宰臣以鸞刀割牲祝史以豆取毛血置于饌所遂烹牲其神廚及諸司供事便次守宫與金吾相之量于壇東張設享日未明五刻司設服其服升設先蠶氏神座于壇上北方南向席以莞設神位于座首車駕出宫前享一日金吾奏請外命婦等應集壇所者並聽夜行其應採桑者四人各具女侍者進筐鈎載之而行監門先奏請享日未明四刻開所由苑門諸親及命婦以下以次入詣壇南次所各服其服其應採桑者筐鈎各具女侍者執授內謁者監內謁者監受之以授執鈎筐者享日未明三刻捶一鼓為一嚴三嚴時節前日內寺奏裁未明二刻捶二鼓為再嚴尚儀版奏請中嚴內命婦各服其服所司陳車駕鹵簿未明一刻捶三鼓為三嚴司賓引內命婦入立于庭重行西面以北為上六尚以下各服其服俱詣室奉迎尚服負寶如式內僕進厭翟車于閣外尚儀版奏外辦馭者執轡皇后服鞠衣乘輿以出華蓋侍衛警蹕如常內命婦從出門皇后升車尚功司製進筐鈎載之仗衛如常內命婦及六尚等乘車陪從如式其內命婦應採桑者四人各服其服典製者進筐鈎載之諸翊駕之官皆乘馬駕動警蹕如常不鳴鼓吹諸衛前後督攝如常內命婦宫人以次從饋享享日未明二刻諸享官各服其服尚儀及司醖各帥其屬攝事則女史及司醖各帥其屬入實樽罍及幣犧樽實以醴齊象樽實以盎齊山罍實以清酒齊加明水酒加玄酒各實于上樽其幣以黑太官令實諸籩豆簠簋俎等內謁者帥其屬詣廚奉饌入設于饌幔內內侍之屬與司膳等掌之其牲之肉不上神俎者亦太官付內謁者同時進入以供頒胙目餘供享之物並請祀前一日先入駕將至女相者引先置享官內典引引命婦俱就門外位女相者以尚儀下女史充攝事質明女相者引享官以下就壝外位掌贊帥女史先入就位女相者引典正女祝女史祝史典女執樽罍篚冪者入自東門當壇南北面西上立定掌贊曰再拜女史承傳典正以下皆再拜訖典正以下各就位司樂帥女工人就位女祝以典贊充女祝史以典贊下女史充駕至大次門外回車南向尚儀進車前奏稱尚儀妾姓言請降車興退復位皇后降車乘輿之大次華蓋繖扇侍衛如常儀尚儀以祝版進御署訖奉出奠于坫初皇后降車訖尚功司製進受鈎筐以退其內命婦鈎筐則內命婦降車訖典製等進受之典贊引亞獻及從享內命婦就門外位司贊帥掌贊先入就位女相者引尚儀典正女史祝史女祝史以尚儀下女史充典女執樽罍篚冪者入自東門當壇南北面西上立定司贊曰再拜掌贊承傳凡司贊有詞掌贊皆承傳尚儀以下皆再拜訖尚儀以下各就位司樂帥女工人入就位典贊引亞獻終獻女相者引執事者司贊引內命婦內典引引外命婦俱入就位皇后停大次半刻頃司言引尚宫立于大次門外當門北向尚儀版奏外辦皇后出次華蓋侍衛如常尚服負寶陪從如式司言引尚宫尚宫引皇后凡尚宫前導皆司言前引入自東門華蓋仗衛停于門外近侍者從入如常皇后至版位西向立每立定尚宫與司言退立于左立定尚宫前奏稱請再拜退復位皇后再拜司贊曰衆官再拜享官及內外命婦在位者皆再拜其先拜者不拜尚宫前奏有司謹具請行事退復位攝事女相者各引享官入就位立定掌贊曰再拜在位者皆再拜女相者進尚宫之左白有司謹具請行事無駕至以下至此儀典樂跪舉麾凡取物者皆跪而取以興奠物亦跪奠訖而後興鼓柷奏永和之樂以姑洗之均自後壇下享神之樂皆奏姑洗三成偃麾戛敔樂止凡樂皆典樂舉麾工鼓柷而後作偃麾戛敔而後止尚宫前奏稱請再拜退復位皇后再拜司贊曰衆官再拜享官及內外命婦在位者皆再拜壇上尚儀跪取幣于篚興立于樽所攝事掌贊曰再拜在位者皆再拜女祝史跪取幣于篚興立于樽所尚宫引皇后正和之樂作皇后每行皆作正和之樂皇后詣壇升自南陛攝事女相者引尚宫升壇以下皆尚宫行事六尚以下量人從升以下升皆如之皇后升壇北面立樂止尚儀奉幣東向進皇后受幣登歌作肅和之樂以南吕之均尚宫引皇后進北向跪奠于神座興尚宫引皇后少退北向再拜訖登歌止尚宫引皇后樂作降自南陛還版位西向立樂止初內外命婦拜訖女祝史奉毛血之豆立于內壝東門之外于登歌止女祝史奉毛血入升自南陛尚儀迎引于壇上進跪奠于神座前興女祝史退立于樽所皇后既升奠幣攝事尚宫既升奠幣下倣此司膳出帥女進饌者奉饌陳于內壝東門之外皇后既降復位司膳引饌入俎初入門雍和之樂作攝事自後酌獻皆奏雍和之樂饌至陛樂止女祝史跪徹毛血之豆降自東陛以出饌升南陛尚儀迎引于壇上攝事女祝史迎引于壇上設于神座前籩豆蓋冪先徹乃升簠簋既奠却其蓋于下設訖司膳帥女進饌者降自東陛復位尚儀攝事女祝還樽所尚宫引皇后詣罍洗樂作攝事女相者引尚宫無樂皇后至罍洗樂止尚儀跪取匜盥沃水司言跪取盤興承水皇后盥手又司言跪取巾于篚興進皇后帨手訖司言受巾跪奠于篚司言跪取爵于篚興進皇后受爵尚儀酌罍水司言奉盤皇后洗爵司言受巾皆如初皇后拭爵訖尚儀奠匜司言奠盤巾皆如常尚宫引皇后樂作詣壇升自南陛樂止尚宫引皇后攝事無皇后至罍洗以下至此儀但女相者引尚宫詣酒樽所詣酒樽所執樽者舉冪尚儀贊酌醴齊訖壽和之樂作皇后每酌獻及飲福皆作壽和之樂攝事奏雍和尚宫引皇后少退北向立樂止尚儀持版進于神座之右東向跪讀祝文曰維某年嵗次月朔日皇后某氏敢昭告于攝事女祝持版祝云皇后某氏謹遣某官妾姓敢昭告于先蠶氏維神肇興蠶織功濟黔黎爰擇嘉時式遵令典謹以制幣犧齊粢盛庶品明薦于神尚饗訖興皇后再拜初讀祝文訖樂作尚儀進跪奠版于神座興還樽所皇后拜訖樂止尚儀以爵酌上樽福酒西向進攝事女祝以爵酌罍福酒進于尚宫之右西向立皇后再拜受爵跪祭酒啐奠興尚儀帥女進饌者持籩豆進尚儀減神前三牲胙肉以取前腳第二骨各置一俎上又以籩取稷黍飯共置一籩尚儀先以飯籩西向進皇后受以授左右尚儀又以胙俎以次進皇后每受以授左右皇后跪取爵遂飲卒爵尚儀進受復于坫皇后興再拜訖樂止尚宫引皇后樂作降自南陛還版位西向立樂止自此以上若攝事儀皆尚宫行事女相女祝贊之以下倣此皇后獻將畢典贊引貴妃詣罍洗盥手洗爵訖攝事則女相者引尚儀為亞獻典贊引貴妃自東陛升壇詣象樽所執樽者舉冪貴妃酌盎齊典贊引貴妃詣神座前北向跪奠爵興典贊引貴妃少退北向再拜尚儀以爵酌罍福酒持爵進貴妃之右西向立貴妃再拜受爵跪祭酒遂飲卒爵尚儀進受爵復于坫貴妃再拜典贊引貴妃降自東陛復位如初貴妃獻將畢又典贊引昭儀攝事女相者引尚食為終獻詣罍洗盥手洗爵升酌盎齊終獻如亞獻之儀訖典贊引昭儀降復位尚儀進神座前跪徹豆興還樽所徹者籩豆各一少移于故處司贊曰賜胙掌贊唱衆官再拜在位者皆再拜已飲福酒者不拜攝事賜胙則掌贊唱賜胙女史唱再拜也永和之樂作尚宫前奏稱請再拜退復位皇后再拜司贊曰衆官再拜在位者皆再拜樂一成止尚宫前奏攝事女相者白請就望瘞位司贊帥掌贊就瘞坎西南位尚宫引皇后樂作至望瘞位西向立樂止于衆官將拜尚儀執筐進神座前取幣自北陛降壇西行詣瘞坎以幣置于坎訖司贊曰可瘞坎東西各四人置土半坎尚宫前贊禮畢請就採桑位尚宫引皇后樂作詣採桑壇升自西陛東向立樂止初白禮畢司贊帥掌贊還本位親桑皇后將詣望瘞位司賓引內外命婦採桑者俱就採桑位內外命婦一品各二人二品各一人諸執鈎筐者各就位皇后既至採桑位尚功奉金鈎自北陛升壇進典製奉筐從升皇后受鈎採桑典製奉筐受桑皇后採桑三條止尚功前受鈎典製以筐俱退復位皇后初採桑典製等各以鈎授內外命婦皇后採桑訖內外命婦以次採桑女史執筐者受之內外命婦一品各採五條二品三品各採九條止典製者受鈎與執筐者退復位司賓各引內外命婦採桑者退復位司賓引婕妤一人詣蠶室尚功帥執鈎筐者以次從至蠶室尚功以桑授蠶母蠶母受桑切之以授婕妤婕妤食蠶灑一薄訖司賓引婕妤還本位尚儀前奏禮畢退復位尚宫引皇后還大次樂作入大次訖樂止司賓引內命婦內典引引外命婦各還其次尚儀典正以下俱復執事位立定司贊曰再拜尚儀以下皆再拜訖出女工人以次出其祝版燔于齋所車駕還宫皇后既還大次內侍版奏請解嚴將士不得輒離部伍皇后停大次一刻頃捶一鼓為一嚴轉仗衛于還塗如來儀三刻捶三鼓為三嚴內典引引外命婦出次就門外位司賓引內命婦出次序立于大次之前六尚以下依式奉迎內僕進厭翟車于大次門外南向尚儀版奏外辦馭者執轡皇后乘輿出次華蓋侍衛警蹕如常皇后升車鼓吹振作而行內命婦以下乘車陪從如來儀車駕過內典引引外命婦退還第駕至正殿門外回車南向尚儀進當車前跪奏稱尚儀妾姓言請降車興退復位皇后降車乘輿入侍衛如常內侍版奏請解嚴將士各還其所勞酒車駕還宫之明日內外命婦設會于正殿如元會儀唯不賀不上壽為異元開禮唐會要卷十下
