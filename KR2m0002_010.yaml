朕見居少陽之地田于東郊蓋其宜矣于是遂定自後每嵗常令有司行事舊唐書禮儀志皇帝孟春吉亥享先農遂以耕籍前享一日奉禮設御坐于壇東西向望瘞位于壇西南北向從官位于內壝東門之內道南執事者居後奉禮位于東門東北贊者在南又設御耕籍位于外壝南門之外十步南向從耕三公諸王尚書卿位于御坐東南重行西向以其推數為列其三公諸王尚書卿等非耕者位于耕者之東重行西向北上介公酅公于御位西南東向北上尚舍設御耒席于三公之北少西南向奉禮又設司農卿之位于南少退諸執耒耜者位于公卿耕者之後非耕者之前西向御耒耜一具三公耒耜三具諸王尚書卿各三人合耒耜九具以下耒耜太常卿各令籍田農人執之皇帝已享先農乃以金根車載耒耜于御者間皇帝乘車自行宫降大次乘黃令以耒耜授廩犧令橫執之左耜置于席遂守之皇帝將望瘞謁者引三公及從耕侍耕者司農卿與執耒耜者皆就位皇帝出就耕位南向立廩犧令進耒席南北向解韜出耒執以興少退北向立司農卿進受之以授侍中奉以進皇帝受之耕三推侍中前受耒耜反之司農卿司農卿反之廩犧令廩犧令復耒于韜執以興復位皇帝初耕執耒者皆以耒耜授侍耕者皇帝耕止三公諸王耕五推尚書卿九推執耒者前受之皇帝還入自南門出內壝東門入大次享官從享者出太常卿帥其屬耕于千畝皇帝還宫明日班勞酒于太極殿如元會不賀不為壽籍田之穀斂而貯之神倉以供粢盛及五齊三酒穰藁以食牲先農唐初為帝社亦曰籍田壇唐書禮樂志永徽三年正月丁亥耕籍田唐書高宗本紀丁亥親享先農御耒耜率公卿耕于籍田賜羣官帛各有差册府元龜乾封二年正月行籍田之禮躬秉耒耜而九推禮官奏陛下合三推上曰朕以身帥下自當過之恨不終千畝耳文獻通考初將耕籍田閲耒耜有雕刻文飾者謂左右曰田器農人執之在于朴素豈尚文飾乎乃命撤之儀鳳二年正月乙亥耕籍田唐書高宗本紀帝親耕籍田于東郊禮畢作籍田賦以示羣臣三年五月幸籍田所觀區種手種數區册府元龜景雲三年親耕籍田文獻通考則天時改籍田壇為先農舊唐書禮儀志神龍元年禮部尚書祝欽明議曰周頌載芟春籍田而祈社稷禮天子為籍千畝諸侯百畝則緣田為社曰王社侯社今曰先農失王社之義宜正名為帝社太常少卿韋叔夏博士張齊賢等議曰祭法王者立太社然後立王社所置之地則無傳也漢興已有官社未立官稷乃立于官社之後以夏禹配官社以后稷配官稷臣瓚曰高祖立漢社稷所謂太社也官社配以禹所謂王社也至光武乃不立官稷相承至今魏以官社為帝社故摯虞謂魏氏故事立太社是也晉或廢或置皆無處所或曰二社並處而王社居西崔氏皇甫氏皆曰王社在籍田案衛宏漢儀春始東耕于籍田引詩先農則神農也又五經要義曰壇于田以祀先農如社魏秦靜議風伯雨師靈星先農社稷為國六神晉太始四年耕于東郊以太牢祀先農周隋舊儀及國朝先農皆祭神農于帝社配以后稷則王社先農不可一也今宜于籍田立帝社帝稷配以禹棄則先農帝社並祠叶于周之載芟之義欽明又議曰籍田之祭本王社古之祀先農勾龍后稷也烈山之子亦謂之農而周棄繼之皆祀為稷共工之子曰后土湯勝夏欲遷而不可故二神社稷主也黃帝以降不以羲農列常祀豈社稷而祭神農乎社稷之祭不取神農耒耜大功而專于共工烈山蓋以三皇洪荒之迹無取為教彼秦靜何人而知社稷先農為二而籍田有二壇乎先農王社一也皆后稷勾龍異名而分祭牲以四牢欽明又言漢祀禹謬也今欲正王社先農之號而未決乃更加二祀不可叔夏齊賢等乃奏言經無先農禮曰王自為立社曰王社先儒以為在籍田也永徽中猶曰籍田垂拱後乃為先農然則先農與社一神今先農壇請改曰帝社壇以合古王社之義其祭凖令以孟春吉亥祠后土以勾龍氏配于是為帝社壇又立帝稷壇于西如太社太稷而壇不設方色以異于太社唐書禮樂志先天元年正月戊子耕籍田唐書睿宗本紀睿宗太極元年親祀先農躬耕帝籍禮畢大赦改元舊唐書禮儀志開元十九年正月丙子耕于興慶宫唐書玄宗本紀十九年停帝稷而祀神農氏于壇上以后稷配唐書禮樂志玄宗開元二十二年冬禮部員外郎王仲邱又上疏請行籍田之禮舊唐書禮儀志親祀神農于東郊以勾芒配禮畢躬御耒耜于千畝之甸時有司進儀注天子三推公卿九推庶人終畝玄宗欲重勸耕籍遂進耕五十餘步盡隴乃止禮畢還齋宫大赦侍耕執牛官皆等級賜帛舊唐書禮儀志開元二十三年正月十八日親祀先農禮畢降至耕位侍中執耒太僕秉轡帝謂左右曰帝籍之禮古則三推朕今九推庶九穀之報也贊導者跪而奏曰先王制禮不可踰越帝曰夫禮豈不在濟人治國勤事務功乎朕發乎至誠深惟嘉殖將以勸南畝供粢盛豈非禮意也于是九推而止公卿以下終其田畝制曰昔者受命為君體元立極未有不謹于禮而能見教于人今嗣嵗初吉農事將起禮先本于耕籍義緣奉于粢盛是何嚴祗敢不敬事故躬載耒耜親率公卿以先萬姓遂籍千畝謂敦本之為務何有澤之更深宜有順于發生俾無偏于行惠可大赦天下册府元龜皇帝吉亥享先農攝事附齋戒前祀五日皇帝散齋三日于别殿致齋二日一日于太極殿一日于行宫餘同上辛儀陳設前享三日陳設如圜丘儀前享二日太樂令設宫懸樂如圜丘儀唯懸樂樹路鼓為瘞坎于壇壬地外壝之內為異前享一日奉禮郎設御位如圜丘儀唯設望瘞位于內壝東門之內道南又設奉禮位于瘞坎西南東面南上為異攝事右校掃除壇之內外前享二日衛尉設享官公卿以下次于外壝東門外道南北向西上設陳饌幔于內壝東門外道南北向太樂令設宫懸前享一日奉禮郎設享官公卿位于內壝東門內道北執事位于道南西向北上設御史位于壇下如式又設奉禮位于樂懸東北贊者二人在南差後俱西向北上又設奉禮贊者位于瘞坎東面南上設協律郎位于壇上南陛之西東向太樂令位于北懸間享官門外位皆于東壝外道南如式又設御耕籍位于外壝南門之外十步所南向設從耕位三公諸王諸尚書諸卿位于御座東南重行西向各依推數為列其公王尚書卿等非耕者位于耕者之東重行西向俱北上介公酅公位于御位西南東向以北為上尚舍設御耒席于三公之北少西南向奉禮又設司農卿位于御耒席東少南西向廩犧令位于司農卿之南少退諸執耒耜者位于公卿耕者之後非耕者之前西面御耒耜一具三公耒耜三具諸王尚書卿各三人合耒耜九具以下耒耜太常卿各令籍田農人執之攝事無設御耕籍位以下至此儀設酒樽之位于壇上神農氏犧樽二象樽二山罍二東南隅北向后稷氏犧樽二象樽二山罍二在神農酒樽之東俱北向西上樽皆加勺冪有坫以置爵設御洗于壇南陛東南亞獻之洗于東陛之南俱北向執樽罍篚冪者各位于樽罍篚冪之後設幣篚于壇上各于樽坫之所晡後郊社令帥齋郎以坫罍洗篚冪入設于位升壇者自東陛謁者引光祿卿詣廚視濯溉凡導引者每曲一逡巡贊引引御史詣廚省饌具光祿卿以下每事訖各還樽所享日未明十五刻太官令帥宰人以鸞刀割牲祝史以豆取毛血各置于饌所遂烹牲未明五刻太史令郊社令各服其服升設神農氏神座于壇上北方南向設后稷氏神座于東方西向席皆以莞設神位于座首鑾駕出宫乘金根車于太極殿餘同圜丘儀饋享享日未明三刻諸享官及從享之官各服其服郊社令良醖令帥其屬入實樽罍及幣犧樽實以醴齊象樽實以盎齊山罍實以酒齊皆加明水酒皆加玄酒各實于上樽幣皆用青太官令帥進饌者實諸籩豆簠簋等入設于饌幔內未明二刻奉禮帥贊者先入就位其御史及禮官等入再拜掃除及就位如圜丘儀未明一刻謁者贊引各引享官以下就門外位司空行掃除及從享羣官客使等次入就位並如圜丘儀攝事自未明三刻至此與正儀同初未明三刻諸衛列大駕仗衛陳設如式侍中版奏外辦請中嚴乘黃令進金根車于宫南門外回車南向若行宫去壇稍逺嚴警如式未明一刻侍中版奏外辦質明皇帝服衮冕乘輿以出繖扇華蓋侍衛如常儀侍中負璽隨從如式皇帝升車訖乘黃令進耒耜太僕受載如初黃門侍郎奏請鑾駕發引還復位鑾駕動之大次並如圜丘儀郊社令以祝版進御署訖近臣奉出郊社令受各奠于坫如圜丘儀初皇帝降車訖乘黃令受耒耜授廩犧令而橫執之于左其耜置于席遂守之凡執耒耜者皆橫之授則先其耒後其耜皇帝停大次半刻頃其奏辦出次太常卿請行事並如圜丘儀攝事衆官拜訖謁者白太尉有司謹具請行事無初未明三刻下至此儀協律郎舉麾工鼓柷以角音奏永和之樂以姑洗之均自後接神皆奏姑洗作文武舞樂舞三成偃麾戛敔樂止太常卿前奏稱請再拜退復位皇帝再拜及奠玉幣奏樂之節並如圜丘儀攝事謁者引太尉升奠幣太常卿引皇帝進北面跪奠于神農氏神座俯伏興太常卿引皇帝少退北向再拜訖太常卿引皇帝又立于西方東向又太祝以幣授侍中侍中奉幣北向進皇帝受幣太常卿引皇帝進東面跪奠于后稷氏神座俯伏興太常卿引皇帝少退東面再拜訖登歌止太常卿引皇帝樂作皇帝降自南陛還版位西向立樂止初羣官拜訖祝史奉毛血之豆立于門外于登歌止祝史奉毛血入升自南陛配座升自東陛太祝迎取于壇上進奠于神座前太祝退立于樽所皇帝既奠幣太官令出帥進饌者奉饌陳于內壝門外謁者引司徒出詣饌所司徒奉神農之俎皇帝既至版位樂止攝事無太官令引饌入俎初入門雍和之樂作饌至陛樂止祝史進徹毛血之豆降自東陛以出神農氏之饌升自南陛配座之饌升自東陛太祝迎引于壇上各設于神座前籩豆蓋冪先徹乃升簠簋既奠却其蓋于下設訖謁者引司徒以下降自東陛復位太祝各還樽所太常卿引皇帝攝事謁者引太尉詣罍洗樂作其盥洗奏樂及齋郎奉俎並如圜丘之儀太常卿引皇帝詣神農氏酒樽所執樽者舉冪侍中贊酌醴齊訖壽和之樂作皇帝每酌獻及飲福皆作壽和之樂太常卿引皇帝進神農氏神座前北向跪奠爵俯伏興太常卿引皇帝少退北向立樂止太祝持版進于神座之右東面跪讀祝文曰維某年嵗次月朔日開元神武皇帝某攝事云謹遣太尉某臣名敢昭告于帝神農氏獻春伊始東作方興率由典則恭事千畝謹以制幣犧齊粢盛庶品肅備常祀陳其明薦以后稷氏配神作主尚饗訖興皇帝再拜攝事太尉再拜下倣此初讀祝文訖樂作太祝進跪奠版于神座興還樽所皇帝拜訖樂止太常卿引皇帝詣后稷氏酒樽所酌獻樂作並如神農氏唯皇帝東向立為異太祝持版進于神座之右北向跪讀祝文曰維某年嵗次月朔日開元神武皇帝某敢昭告于后稷氏土膏脈起爰修耕籍用薦常祀于帝神農氏唯神功協稼穡實允昭配謹以制幣犧齊粢盛庶品式陳明薦作主侑神尚饗訖興皇帝再拜初讀祝文訖樂作太祝進跪奠版于神座俯伏興還樽所皇帝拜訖樂止太常卿引皇帝進神農氏神座前北向立樂作太祝各以爵酌上樽福酒攝事太祝酌罍福酒其飲福受胙樂舞等並如圜丘儀攝事亦同圜丘攝事初皇帝將復位謁者引太尉詣罍洗攝事謁者引太常卿為亞獻盥手洗爵訖謁者引太尉自東陛升壇詣神農氏象樽所執樽者舉冪太尉酌盎齊武舞作謁者引太尉進神農氏神座前北向跪奠爵興謁者引太尉少退北向再拜謁者引太尉詣后稷氏象樽所取爵于坫