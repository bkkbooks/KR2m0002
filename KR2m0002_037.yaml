body:
  text: 唐㑹要卷三十七宋王溥撰五禮篇目武徳初朝廷草創未遑制作郊祀享宴悉用隋代舊制至貞觀初詔中書令房𤣥齡祕書監魏徴禮官學士修改舊禮著吉禮六十一篇賔禮四篇軍禮十二篇嘉禮四十二篇凶禮六篇國恤禮五篇總一百三十篇分為一百卷初𤣥齡與禮官建議以為月令蜡法惟祭天宗謂日月已下近代蜡五天帝五人帝五地極皆非古典今並除之神州者國之所託餘八州則義不相及近代通祭九州今惟祭皇地祇及神州以正祀典又皇太子入學及太常行山陵天子大射告朔陳五兵于太社農隙講武納皇后行六禮四孟月讀時令天子上陵朝廟養老于辟雍之禮皆周隋所闕凡增二十九件餘並依古禮七年正月二十四日獻之詔行用焉蘇氏曰五禮等威三代沿革葢上聖有作情必備於吉凶後世遵行事豈變於文質源清則流永根正則苗長我唐始基刋定禮樂去亡隋之繁雜備前古之雅正作萬代法成四海家光闡皇猷永固帝業而修禮官不達睿㫖坐守拘忌近移凶禮置於末篇斯為佞矣房梁公魏鄭公庶務事殷一心有限雖統其事無暇參詳為禮官所誤不然者白圭無斯玷矣暨乎永徽之初再修典禮遂刪去國恤禮以為預凶事非臣子之所宜言此又乖也且禮凡即位後有所謂嵗一漆而藏之者漢則三分租賦而一奉陵寢周漢之制豈謬誤耶是正禮也且東園祕器曾不廢于有司國恤禮文便謂預於凶事何貴耳而賤目背實而向聲有以見敬宗義府之大佞也永徽二年議者以貞觀禮未備又詔太尉長孫無忌中書令杜正倫中書侍郎李義府中書侍郎李友益黄門侍郎劉祥道許圉師太子賓客許敬宗太常少卿韋琨太常博士史道𤣥符璽郎孔志約太常博士蕭楚材孫自覺賀紀等重加緝定勒成一百三十卷二百二十九篇至顯慶三年正月五日奏上之高宗自為之序詔中外頒行焉初五禮儀注自前代相沿吉㓙備舉蕭楚材孔志約以國恤禮為預凶事非臣子之宜言敬宗義府深然之于是刪而定之其時以許敬宗李義府用事其所損益多涉希㫖學者紛議以為不及貞觀禮至上元三年二月勅五禮行用已久並依貞觀年禮為定至儀鳳二年八月又詔顯慶已來新修禮多不師古其五禮悉宜依周禮行事自是禮司益無慿毎有大事皆參㑹古今禮文臨時撰定開元十年詔國子司業韋縚為禮儀使專掌五禮十四年通事舍人王嵒疏請撰禮記削去舊文而以今事編之詔付集賢院學士詳議右丞相張説奏曰禮記漢朝所編遂為厯代不刋之典今去聖乆逺恐難改易今之五禮儀注貞觀顯慶兩度所修前後頗有不同其中或未折衷望與學士等更討論古今刪改行用制從之初令學士右散騎常侍徐堅左拾遺李鋭太常博士施敬本等撿撰厯年不就說卒後蕭嵩代為集賢學士奏起居舍人王仲丘撰成一百五十卷名曰唐開元禮二十九年九月頒所司行用焉元和十三年八月禮官王彦威集開元二十一年已後至元和十三年五禮裁制勅格為曲臺新禮上䟽曰臣聞禮之所始及損益之文布于前書不敢悉數開元中命禮官大臣改撰新禮五禮之儀始備又按自開元二十一年已後迄于聖朝垂九十餘年矣法通沿革禮有廢興或後勅已更裁成或當司别禀詔命貴從權變以就便宜又國家每有禮儀大事則命禮官博士約舊為之損益修撰儀注以合時變然後宣行即臣今所集開元已後至元和十三年奏定儀制不惟與古禮有異與開元儀禮已自不同矣又撿修禮官故事毎詳定儀制訖則約文為之禮科以移責於百司又約之以供備然後禮事畢舉禮科者名數之總與儀注相扶而行者也闕一不可臣今所集備禮科之單復具肅給之司存欲使謁者贊引之徒官長辟除之吏開卷盡在按文易徴其他五禮之儀式或舊儀所不載而與新創不同者莫不次第編録竊以聖朝于元和中集録又曲臺者實禮之義故名曰元和曲臺新禮并目錄勒成三十卷謹詣光順門奉表以聞伏乞裁下從之禮儀使高祖禪代之際温大雅與竇威陳叔達恭定禮儀自後至開元初奏定禮儀者並不入銜無由檢叙開元九年正月韋縚除國子司業仍知太常禮儀事至二十三年二月凡四改官至太常卿並帶禮儀事又至天寳九載正月除太子少師方罷禮儀事至天寳九載正月置禮儀使以太子左庶子韋述為之至十五載六月更不改易至徳二載閏八月二十九日御史中丞崔器除兼户部侍郎知禮儀事至乾元元年四月太常少卿王璵兼知禮儀事其月十八日除中書侍郎同中書門下平章事充禮儀祠祭等使二年九月七日太常少卿于休烈除工部侍郎充禮儀使廣徳元年太常卿杜鴻漸充禮儀使永泰二年八月十三日禮部尚書裴士淹除禮儀使大厯五年三月二十六日勅停禮儀使事歸太常至七年正月十九日復置使以太常卿楊綰為之十四年五月二十日吏部尚書顔真卿除禮儀使建中元年停自後不置毎有南郊大禮權置使畢日停服紀上貞觀十四年太宗嘗從容謂禮官曰同㸑尚有緦麻之恩而嫂叔無服又舅之與姨親踈相似而服紀有殊理未為得宜集學者詳議餘有親重而服輕者亦附奏聞祕書監顔師古議曰竊以舊館脱驂尚云出涕鄰里有殯且輟巷歌况乎昆季之親嚴親是奉夫之昆季資業本同遂乃均諸百姓絶于五服當其喪沒闔門縞素已獨晏然𤣥黄不改静言至理殊匪𢎞通無益防閑實開偷薄相為制服孰謂非宜又外氏之親俱縁于母姨舅一例等屬齊尊姨既小功舅乃緦麻曲生異義兹亦未安愚謂昆季之妻服當五月夫之昆弟咸亦如之為舅小功同于姨服則親踈中節名數有倫至如舅姑為婦其服太輕冢婦止于大功衆婦小功而已但著代之重事義特崇饋奠之勤誠愛兼極畧其恩禮有虧慈惠猶子之婦普服大功己子之妻翻與減降今請冡婦朞服衆婦大功既表授室之親又答執笄之養叔仲之後諸婦齊同則周洽平均更無窒礙矣侍中魏徴禮部侍郎令狐徳棻等與禮官定議曰夫親族有九服紀有六隨恩以厚薄稱情以立文原夫舅之與姨雖為同氣權之於母輕重相懸何則舅為母之本宗姨乃外戚他族考之經文舅誠為重故周王念齊毎稱舅甥之國秦伯懷晉實切渭陽之詩今在舅服止一時為姨居喪五月循名䘮實逐末棄本葢古人之情有所未寤今之損益實在兹乎禮記曰嫂叔之無服葢推而逺之也禮繼父同居則為之朞未嘗同居則不為服從母之夫舅之妻二夫人相為服或曰同㸑緦然則繼父之徒並非骨肉之親服重由乎同㸑恩輕在乎異居故知制服雖繫于名葢亦縁恩之厚薄者也或有長年之嫂遇孩童之叔劬勞鞠養情若所生分饑共寒契濶偕老譬同居之繼父方他人之同㸑情義之深淺寧可同日而言哉在其生也愛之同於骨肉及其死則曰推而逺之求之本源深所未喻推而逺之為是則不可生而共居生而共居為是則不可死同行路重其生而輕其死厚其始而薄其終稱情立義其義安在今謹按曽祖父母舊服齊衰三月請加為齊衰五月嫡子婦舊服大功請加為朞衆婦舊服小功今請與兄弟子婦同為大功九月嫂叔舊無服今請服小功五月其弟妻及夫兄亦小功五月舅舊服緦麻請與從母同服小功制曰可二十三年五月禮部尚書許敬宗奏言伏奉遺詔臣下喪服以日易月皆從三十六日之限但大行在殯皇帝主喪山陵事畢方釋衰絰依禮近臣君服斯服敢縁斯義請延至葬畢後除從之顯慶二年九月二十九日修禮官長孫無忌等奏曰依古喪服甥為舅緦麻舅報甥亦同此制貞觀年中八座議舅服同姨小功五月而今律疏舅報於甥服猶三月謹按傍親之服禮無不報已非正尊不敢降之也故甥為從母五月從母報甥小功甥為舅緦麻舅亦報甥三月是其義矣今甥為舅使同從母之䘮則舅宜進甥以同從母之報修律䟽人不知禮意舅報甥尚止緦麻於例不通理須改正今請修改律䟽舅報甥亦小功又曰庶母古禮緦麻新禮無服謹按庶母之子即是巳之昆季昆季為之杖朞而已與之無服同氣之内吉凶頓殊求之禮情深為非理請依典故為服緦麻制從之龍朔二年八月司文正卿蕭嗣業嫡繼母改嫁身亡請申心制有司奏稱據令繼母改嫁及父為長子並不解官乃下勅曰雖云嫡母終是繼親據理縁情須有定制令所司議定奏聞司禮太常伯隴西郡王博乂等奏議曰緬尋喪服母名斯定嫡繼慈養皆在其中唯出母之制特言出妻之子明非生已則皆無服是以令著母嫁之服又出妻之子出言其子以明所生嫁則言母通包養嫡俱當解任並合心喪其不解者惟有繼母之嫁繼母為名止據前妻之子嫡于諸孽禮無繼母之文甲令今既見行嗣業理申心制然奉勅議定方垂永則令有不安亦須釐正竊以嫡繼慈養皆非所生出之與嫁並同行路嫁雖比出稍輕于父終為義絶繼母之嫁既殊親母慈嫡義絶豈合心喪望請凡非所生父卒而嫁為父後者無服非承重者杖朞並不心喪一同繼母有符情禮無玷舊章又心喪之制惟施厭降杖朞之服不悉解官而令文三年齊斬亦入心喪之制杖朞解官又有妻服之舛又依禮庶子為其母緦麻三月既定所生母服准例亦合解官令文漏而不言於事終須修附既以嫡母等嫁同一令條總請改理為允愜者依文武官九品以上議得司衛正卿房仁裕等七百三十六人議請一依司禮狀嗣業不合解官得右金吾衛將軍薛弧吳仁等二十六人議請解嗣業官不同司理狀者母非所生出嫁義絶仍令解職有紊縁情杖朞解官不甄妻服三年齊斬謬曰心喪庶子為母緦麻漏其終制並令文踈舛理難因襲望請依房仁裕等議總加修附垂之不朽其禮及律䟽有相關涉者亦請准此改正嗣業既非嫡母改醮不合解官詔從之上元元年十二月二十七日天后上表曰夫禮縁人情而立制因時事而為範變古者未必是循舊者不足多也至如父在為母止服一朞雖心喪三年服由尊降竊謂子之於母慈養特深生養勞瘁恩斯極矣所以禽獸之情猶知其母三年在懷理宜崇報若父在為母止一朞尊父之敬雖伸報母之慈有缺且齊斬之制是為差減更令同以一朞恐傷人子之志今請父在為母終三年之服遂下詔依行焉當時亦未行用至垂拱年中始編入格至開元五年左補闕盧履氷上言准禮父在為母一周除靈三年心喪則天皇后請同父沒之服三年然後始除靈雖則權行有紊彛倫今陛下孝理天下動合禮經請仍舊章庶協通典於是下制令百官詳議并舅及嫂叔服不依舊禮亦令議定刑部郎中田再思建議曰乾尊坤卑天一地二陰陽之位分矣夫婦之道配焉至若死喪之戚降殺之等禮經五服之制齊斬有殊考妣三年之喪貴賤無隔以報免懷之徳思酬罔極之恩稽之上古喪期無數自周公制禮之後孔父刋經以來方殊厭降之儀以標服紀之節重輕從俗斟酌隨時自古以來升降不一三年之制説者紛然鄭𤣥以為二十七月王肅以為二十五月又改葬之禮鄭𤣥云服緦麻三月王肅云訖葬而除又繼母出嫁鄭𤣥云皆服王云從子繼育乃為之服又無服之殤鄭𤣥云子生一月哭之一日王肅云以哭之日易服之月鄭王等祖經宗傳各有異同荀摰采古求遺互為損益方知去聖轉逺殘缺彌多也故曰㑹禮之家名為聚訟寧有定哉而父在為母三年行之已踰四紀編之於格服之已乆前王所是䟽而為律後王所是著而為令何必乖先帝之㫖阻人子之情虧仁孝之心背徳義之本而欲服之周年與伯叔母齊焉與姑姊妹同焉夫三年之喪如白駒之過隙君子喪親有終身之憂何况再周乎服之有制使愚人企及衣以斬衰使見之摧痛以此防人人猶有朝死夕忘者以此制人人猶有釋服從吉者方今漸歸淳朴須敦孝義抑賢引愚理資寧戚食稻衣錦所不忍聞禮記云父之親子也親賢而下無能母之親子也賢則親之無能則憐之今據齊斬異數麄細已降何忍節制減至於朞使後代士盡忘枯骨循古未必是依今未必非也又舅及姨之服並太宗之制行之百年矣輒為刋復實則有疑於是紛議不定履氷又上䟽曰禮女在室以父為天出嫁以夫為天又在家從父出嫁從夫夫死從子本無自專抗尊之法即喪服四制云天無二日土無二王國無二君家無二尊以一理之也所以父在為母服朞者避二尊也伏惟陛下正持家國孝理天下而不斷於宸衷詳正此禮但隨末俗顧念兒女之情臣恐後代復有婦奪夫政之敗者䟽奏未報履氷又上表曰臣聞夫婦之道人倫之始尊卑法于天地動静合于陰陽陰陽和而天地生成夫婦正而人倫式序自家形國牝雞無晨四徳之禮不愆三從之義斯在即喪服四制云天無二尊以一理之也故父為母朞者見無二尊也准舊儀父在為母一周立靈再周心喪父必三年而後娶者達子之志焉豈先聖無情於所生固有意於家國者矣原夫上元肇年則天已濳秉政將圖僣簒先自光崇請升慈愛之喪以抗尊嚴之禮雖齊衰之儀不改而几筵之制遂同數年之間尚未通用天皇晏駕中宗䝉塵垂拱之初始編入格垂拱之末果行聖母之偽符載初之元遂啓外氏之深釁孝和雖則反正韋氏復效晨鳴孝和非意暴崩韋氏旋即稱制不䝉陛下英筭宗廟何由克復且臣所獻者葢請正夫婦之綱豈忍忘子母之道諸議所非者大凡只論罔極之恩喪也寧戚禽獸識母而不識父豈得與伯叔母服同豈得與姑姊妹等此並道聴而塗説之言未習先王之㫖又安足以議經邦理俗之禮乎臣前狀單畧議者未識臣之懇誠謹重以聞請付中書門下商量處分左散騎常侍元行沖奏議曰古之聖人徴性識本縁情制服則有申有厭天父天夫故斬衰三年情理俱盡者因心立極也生則齊體死則同穴狀陰陽而配合同兩儀之化成而妻喪杖朞情禮殺者葢逺嫌疑尊乾道也父為嫡子三年斬衰而不去職者葢尊祖重嫡崇禮殺情也資于事父以事君孝莫大于嚴父故父在為母罷職齊周而心喪三年謂之尊厭者則情申而禮殺也斯制也可以異于飛走别于華夷羲農堯舜莫之易也文武周孔所同尊也今若捨尊厭之重虧嚴父之義畧純素之嫌貽非聖之責則事不師古有傷名教矣姨兼從母之名又即母之女黨加於舅服有理存焉嫂叔不服避嫌疑也若引同㸑之緦以忘推逺之踪既乖前聖亦謂難從謹詳三者之儀並請依古為當自是百寮議竟不决至七年八月二十六日詔曰周公制禮當厯代不刋况子夏為傳乃孔門所受格令之内有父在為母齊衰三年此有為而為非申厭之義與其改作不如師古諸服紀宜一依喪服文自是卿士之家父在為母行服不同議者是非紛然元行沖謂人曰聖人制厭降之禮豈不知母恩之深但尊祖貴禰欲其逺别禽獸以禮制情故也人情易揺淺識者衆一紊其度其可正乎至二十年蕭嵩與學士改修五禮又議請依上元元年勅父在為母齊衰三年為定及頒禮乃一切依行焉聖厯元年太子左庶子王方慶書問太子文學徐堅曰女子年幼稚而早孤其母貧寠不能守志携以適人為後夫之所鞠養及長出嫁不復同居母後夫亡欲制繼父服不知可否世之士庶此例甚衆至於服紀有何等差前代通儒若為議論堅答曰儀禮喪服繼父同居齊衰朞謂子無大功之親與之適人而所適者亦無大功之親所適者以其貨財為之築宫廟嵗時使之祀焉者也鄭𤣥曰大功之親同財者也築宫廟於家門之外神不歆非族也以恩服耳未嘗同居則不服也小戴禮記繼父服並有明文斯禮經之正説也至於馬融王肅賀循等並稱逹禮更無異文惟傅𤣥著書以為父無可繼之理不當制服此禮焚書之後俗儒妄造也袁凖作論亦以為此則自制父也亂名之大者竊以父為天地愛敬斯極豈冝靦貎繼以他人哉然而藐爾孤女不能自立既隨其母託命他宗本族無鞠養之人因託得存其世嗣在其生也實頼其長育及其死也頓同之行路重其生而輕其死篤其始而薄其終稱情立文豈應如是故袁傅之駁不可為同居者施焉昔朋友之死同爨之喪並制緦麻詳諸經典比之子此葢亦何嫌繼父之服宜依正禮今女子母攜重適人寄養他門所適慈流情均膝下長而出嫁始不同居此則笄總之儀無不殫備與築宫立廟實無異焉葢有繼父之道也戴徳喪服注曰女子適人者為繼父服齊衰三月不分别同居異居梁氏集説亦云女子適人者為繼父服齊衰服繼父與不同居者同今為服齊衰三月竊為折衷方慶深善其答其年四門博士王𤣥感云三年之喪合三十六月鳳閣侍郎張柬之駁曰三年之喪二十五月不刋之典也春秋魯僖公三十三年十二月乙巳薨文公二年冬公子遂如齊納幣左傳云禮也此則春秋三年之喪二十五月之明騐也尚書伊訓云成湯既沒太甲元年惟元祀十有二月伊尹祠于先王奉嗣王祇見厥祖孔安國注云湯以元年十一月崩據此二年十一月小祥三年十一月大祥故太甲中篇云惟三祀十有二月朔伊尹以冕服奉嗣王歸于亳此尚書三年之喪二十五月之明騐也禮記曾子問曰三年之喪二十五月而畢又小記云再朞之喪三年也九月之喪四時也七月之喪三時也三月之喪一時也此禮記三年之喪二十五月之明騐也儀禮士虞禮云期而小祥又期而大祥中月而禫是月也吉祭此禮周公所制則儀禮三年之喪二十五月之明騐也此四騐並禮經正文或周公所制或仲尼所述吾子豈得以禮記戴聖所修輒欲排毁也議者以柬之所駁頗合于禮典神龍元年五月十八日皇后表請天下士庶出母終者同制服三年至天寳六載正月十二日赦文五服之紀所宜企及三年之數以報免懷齊斬之紀雖存出母之制顧復之慕何申孝子之心其出嫁之母宜終服三年開元二十三年正月十八日赦文服紀之制有所未通宜令禮官學士詳議具奏太常卿韋縚奏曰謹案喪服舅緦麻三月從母小功五月傳曰何以小功以名加也堂姨舅母恩所不及外祖父母小功五月傳曰何以小功以尊加也舅緦麻三月並以親情而服屬踈者外祖至尊同於從母之服姨舅一等服則輕重有殊堂姨舅親既未踈恩絶不相為服親舅母來承外族同㸑之禮不如竊以古意猶有所未暢者且以外祖小功此則正尊情甚親而服屬踈者也請加至大功九月姨舅儕類親既無别服宜齊等請為舅加至小功五月堂姨舅踈降一等親舅母從服之例先無服制之文並望加至袒免望付尚書省集衆官更詳議務從折衷永為典則太子賔客崔沔議曰竊聞大道既隠天下為家聖人因之然後制禮教之所設本于正家家道正而天下定矣正家之道不可以二總一之義理歸本宗父以尊崇母以厭降豈忘愛敬宜存倫序是以内有齊斬外服皆緦尊名所加不過一等此先王不易之道也前聖所志後賢所傳其來久矣昔辛有過伊川見被髪而祭於野者曰不及百年此其戎乎其禮先亡矣貞觀修禮時改舊章漸廣渭陽之恩不尊洙泗之典及𢎞道之後唐隆之間國命再移于外族此則禮亡徴兆因斯見矣天人之際可不戒哉開元初補闕盧履氷進狀論喪服輕重勅令僉議于時衆議紛挐各安積習太常禮部奏依舊定陛下運稽古之思發獨斷之明開元八年特降别勅一依古禮事符典故人知向方式固宗盟社稷之福更圖異議竊所未詳願守八年明㫖以為萬代成法職方郎中韋述議曰上自高祖下至𤣥孫以及其身謂之九族由近以及逺稱情以立文差其輕重遂為五服雖則或以義降或以名加教有所存理不踰等百王不易三代可知日月同懸咸所仰也謹按儀禮喪服傳曰外親之服皆緦鄭𤣥謂外親異親正服不過緦麻外祖父母小功五月以尊加也從母小功五月以名加也舅甥外孫中外昆弟皆依本服緦麻三月若以匹敵外祖則祖也舅則伯叔父也父母之恩不殊而獨殺於外氏聖人之心良有以也喪服傳曰禽獸知母而不知父野人父母何算焉都邑之士則知尊禰矣大夫及學士則知尊祖矣諸侯及其太祖天子及其始祖聖人究天道而厚於祖禰繫姓族而親其子孫近則别於賢愚逺則異於禽獸由此言之母黨比於本族不可同貫明矣且家無二尊喪無二斬人之所奉不可二也特重於大宗者降其小宗為人後者減其父母之服女子出嫁殺其本宗之喪葢所存者逺而所抑者私也今若外祖及舅更加一等堂舅及姨列於服紀之内則中外之制相去幾何廢禮徇情所務者末且五服有上殺之義必循源本方及條流伯叔父母本服大功九月並以其出於祖其服不得過於祖也從祖祖父母從祖父母從祖昆季皆小功五月以其出於高祖其服不得過於高祖也族祖父母族父母昆季皆緦麻三月以其出於高祖其服不得過于高祖也其堂舅姨既出於外曾祖若為之制服即外曾祖父母及伯叔父母亦宜制服矣外祖加至大功九月則外曽祖合至小功外髙祖合至緦麻若舉此而舍彼事則不均棄親録疎理則不順推而廣之是與本族無異服皆有報則堂外甥外曾孫姪女之子皆須服矣聖人豈薄其骨肉背其恩愛情之親者制服乃輕葢本於公者薄於私存其大者畧其細義有所斷不得不然苟可加也亦可減也往聖可得而非則禮經亦可得而隳矣先王之制謂之彛倫奉以周旋猶恐失墜一紊其叙庸可正乎且舊章淪胥為日已久所存無幾又欲棄之雖曰未遑不知其可請依儀禮喪服為定禮部員外郎楊仲昌議曰臣聞儀禮曰外服皆緦又曰外祖父母以尊加從母以名加並為小功五月其為舅緦麻鄭文貞公已議同從母例加至小功五月訖今之所加豈異前㫖雖文貞賢也而周孔聖也以賢改聖後學何從堂舅堂姨舅母並升為袒免則何以祖述禮經乎如以外祖父母加至大功則豈無加報于外孫乎如服外孫為報大功則本宗庶孫何同䓁而相淺乎竊恐内外乖序親踈奪倫况夫喪服之紀先王大猷奉以周旋以匡人道一詞寧措千載是遵涉於異端豈曰𢎞教伏望各依正禮以厚儒風太常所請增加愚見以為不可户部郎中楊伯成右監門錄事參軍劉秩並同是議與沔等畧同議奏上又謂侍臣等曰朕以為親姨舅服小功則舅母於舅有三年之喪是受我而厚以服制情則舅母之服不得全降於舅宜服緦麻堂姨舅今古未制服朕思敦睦九族引而親之宜服袒免又鄭𤣥注禮記曰同㸑緦麻若比堂姨舅於同㸑親則厚矣又喪服傳云外親之服皆緦亦是不隔於堂姨舅也若以所服不得過本而復為外曾祖父母外伯叔祖父母服制亦何傷乎是皆親親敦本之意卿等更熟詳之侍中裴耀卿中書令張九齡禮部尚書李林甫等奏曰外族之親無厭降外甥既為舅母制服舅母還合報之夫之外甥既合報服則與夫之姨舅以類是同外甥之妻不得無服所增者頗廣所引者漸䟱㣲臣愚䝉猶有未達上又手制曰從服有五此其一也降殺之制禮無明文此皆自身率親用為服數所在抑引盡是推恩朕情未有安故令詳議非欲茍求變古以示不同卿等以為外族之親禮無厭降報服之節所引者䟱且姨舅者屬從之至近也以親言之則亦姑伯之匹敵也豈可所引者䟱而降所親者服又婦從夫者也夫之姨舅夫既有服從夫而服尤是睦親實欲令不肖者及賢者俯就卿等宜熟詳之耀卿等奏曰陛下體至仁之徳廣推恩之道將𢎞引進以示睦親再發徳音更令詳議臣等謹按大唐新禮親舅加至小功與從母同服此盖當時特令不以輕重遞増盖不欲叅于本源慎于變禮者也今聖制親姨舅小功更制舅母緦麻堂姨舅袒免等服取類新禮垂示將來通於物情自我作古則羣儒夙議徒有稽留並望制施行從之唐㑹要卷三十七
