body:
  text: 唐會要卷五十六宋王溥撰起居郎起居舍人貞觀六年移起居舍人於門下省改為起居郎顯慶三年十二月十五日又為中書省起居舍人兩貟品同起居郎龍朔年改為左右史神龍元年復為起居舍人焉蘇氏曰貞觀中每日仗進退後太宗與宰臣參議政事即令起居郎一人報簡記録由是貞觀注記稱為畢備及髙宗朝會端拱無言有司唯奏辭見二事其後許敬宗李義府用權多妄論奏恐史官直書其短遂奏令隨仗便出不得備聞機務因為故事貞觀元年上問中書令房玄齡曰往者周隋制敕文案並在否玄齡對曰義寧之初官曹草創將充故紙雜用今見並無太宗曰周隋官蔭今並收敘文案既無若為慿據因詰中書侍郎劉林甫曰蕭何入關先收圖籍卿多日在內何因許行此事林甫對曰臣當時任起居舍人不知省事上謂公卿曰為長官不可自専自専必敗臨天下亦爾每事須在下量之至如林甫即推不知也又謂侍臣曰朕每日坐朝欲出一言即思此言於百姓有利益否所以不能多言給事中兼起居杜正倫進曰君舉必書言存左史臣職當修起居注不敢不盡愚直陛下若一言乖於道理則千載纍于聖德非直當今有損于百姓陛下慎之上大恱開元十五年禮部尚書蘇頲卒優贈之制不出起居舍人韋述上疏曰臣伏見貞觀永徽之時每有公卿大臣薨卒皆輟朝舉哀所以成終始之恩厚君臣之義也上有旌賢録舊之德下有生榮死哀之美列于史册以示將來故禮部尚書蘇頲纍葉輔弼世傳忠清頲又服事軒陛二十餘載入參謨猷出總藩牧成績斯著操履無虧天不憗遺奄違聖代伏願陛下思帷蓋之舊念股肱之親循先朝之盛事鑒晉平之逺迹為之輟朝舉哀以明同體之義使沒者荷德于泉壤存者盡莭于周行凡百卿士孰不幸甚上即日舉哀洛城南面輟朝兩日贈尚書右丞相貞元十二年正月宰相賈耽盧邁皆假故趙憬獨對延英上問曰近日起居所注記何事憬奏曰古者左史記事右史記言人君動止有言有事即隨記録今起居之職是也國朝自永徽以後起居雖得對仗承旨仗下後謀議皆不得聞其所注記但於制敕內採録更無他事所以長夀中姚璹知政事以為親承德旨謨訓若不宣自宰相史官無從得書遂請仗下後所言軍樞政要専知撰録號為時政每月送史館無何此事又廢上曰君舉必書義存勸誡既嘗有時政紀宰相宜依故事為之元和十二年九月敕記言記事史官是職昭其法誡著在典常如聞近者難得詳實思有釐改用存舊章舉而必書朕所深望自今以後每坐日宰臣及諸司對仗如有事可稱勸誡合紀述者按其日承旨宰相宣示左右起居令其綴録仍準舊例每季送史館以為常例自隋氏因前代史官有起居注故置起居舍人以紀君舉國朝因之貞觀初置中書省舍人顯慶中始兩置之分侍左右仗下秉筆隨相入禁殿命令謨猷皆詳録若仗在紫宸閣內則夾香案分立殿下正直第二螭首和墨濡翰皆即螭首之坳處由是諺傳謂螭頭有水官既密侍號為清美永徽之後始與百官仗下俱退長夀年中姚璹為相以史官不聞獻替表請宰臣一人撰録軍國政要號為時政紀隨月移之史館及起居既録自宰臣事同銘述於是推美讓善之義行而信史直書之義闕既而嵗月稍久樞務復繁注記漸簡未幾皆廢其後執事者時或修綴百無一二而右史所守猶因于制敕時存筆札至于左史職在記言但編集書繕寫而已至是起居舍人唐敬休上疏求復故事纍請于時宰皆樂復焉既陳奏而制行故事漸復公議稱美十四年十月出起居舍人裴潾為江陵令上近年垂意方士及李道古薦桞珌上益信金丹藥石之説推心服之無疑焉裴潾抗疏論諫聽用方士故及於貶或有竊知者傳言時頗惜之其疏曰臣間除天下之害者受天下之利共天下之樂者饗天下之福故上自黃帝顓頊堯舜禹湯下及文王武王咸以功濟生靈德配天地天皆報之以上夀垂祚于無疆伏惟陛下以大孝安宗廟以至仁育黎元自踐阼以來剗積代之妖凶開削平之洪業而又敬禮宰輔待以始終內能大斷外寬小故夫此神功聖化皆自古聖主明君所不能及今陛下躬親行之實光映千古矣是則天地神祗必報陛下以山嶽之夀宗廟聖靈必福陛下以億萬之齡四海蒼生咸祈陛下以覆載之永自然萬靈保佑聖夀無疆伏自去年以來諸處薦藥術之士有韋山甫桞泌等或更相稱引迄今薦送漸多臣伏以古真仙有道之士皆匿其名無求於世潛遁山林滅影雲壑唯恐人見唯恐人聞豈有干謁公卿自鬻其術今者所奏有夸衒其藥術者必非知道之士咸為求利而來自言飛鍊為神以誘權貴賄賂大言怪論驚聽惑時及其假偽敗露曽不恥于遁逃如此情狀豈可信其術親餌其藥哉禮曰夫人食味别聲被色而生者也春秋左氏傳曰味以行氣氣以實志又曰水火醯醢鹽梅以烹魚肉宰夫和之濟之以味君子食之以平其心夫三牲五穀稟自五行發為五味蓋天地生以奉人是以聖人莭而食之以致康強之福若夫藥石者前聖以之療疾蓋非常食之物况金石皆含酷烈熱毒之性加之燒治動經嵗月既兼烈火之氣必恐難為防制若乃逺徵前史則秦漢之君皆信方士至于盧生徐福欒大李少君其後皆姦偽事發藥竟無成事著史記漢書皆可驗視禮曰君之藥臣先嘗之親之藥子先嘗之臣子一也所有金丹之藥伏乞先令鍊藥之人及所薦之人皆先服一年以考其真偽則自然驗矣伏惟元和聖文神武法天應道皇帝陛下合日月照臨之明稟乾元利貞之德崇正若指南受諫如轉規是必發精金之刃斷可疑之網所有藥術虛誕之徒伏乞特賜置遣禁其幻惑使浮雲盡徹朗日增輝道化侔羲農悠久配天地實在於此矣伏以貞觀以來左右起居有褚遂良杜正倫呂向韋述等咸能竭其忠誠悉心規諫臣謬參侍從職奉起居侍臣之中最近左右傳曰近臣盡規則近侍之臣上達忠欵實其本職也太和九年十二月敕宣令起居郎起居舍人準故事入閣日齎紙筆於螭頭下記言記事開成三年魏謨自左補闕授起居舍人紫宸中謝日文宗謂之曰以卿論事忠切有文貞之風故不循月限授此官又謂之曰卿家有何舊書詔謨對曰比多失墜惟簮笏見存上遂令進來時宰相鄭覃奏曰在人不在笏文宗曰鄭覃殊不會我意此即甘棠之義非在笏也謨將退又召誡之曰事有不當即須論奏對曰臣頃為諫官合伸規諷今居史職職在記言臣不敢輒踰職分文宗曰凡兩省官並合論事勿拘此言尋以本官兼值𢎞文館大中六年九月敕郎官御史遺補皆有月限唯起居未有分明制置自今以後特恩超擢外宜中滿二十個月為改轉左右補闕拾遺垂拱元年二月十九日敕記言書事每切於旁求補闕拾遺未𢎞於厯選瞻言共理必藉衆才寄以登賢期之進善可置左右補闕各二貟從七品左右拾遺各二人從八品命掌供奉諷諫行次立于左右史之下仍附甲令至天授二年二月五日各加置三貟通前五員大厯四年十二月一日補闕拾遺各置內供奉兩貟又七年五月十一日補闕拾遺各加置兩貟天寶三年左補闕薛謙光上疏曰戎夏不雜自古所誡蕃戎無信易動難安故斥居塞外不入中國前史所稱其來已久然而帝德廣被有時朝謁願受向化之誠請納梯山之禮貢事畢則歸其父母之國導以指南之車此三王之盛典也自漢魏以來遂革其風務飾虛名徵求侍子諭令解甲使襲衣冠築室京師不令歸國此又中葉之故事也較其利害則三王是而漢魏非論其得失則拒邉長而徵質短殷鑒在乎往世豈可不懷經逺之慮哉昔郭欽獻䇿于武皇江統納簡于惠主咸以為夷狄處中夏必為變更二主不納二臣之逺䇿好慕向化之虛名縱其習史漢等書官之以五部都尉皆失計也竊惟突厥吐蕃契丹等往因入侍並叨殊奬或執戟丹墀䇿名戎秩或曳裾庠序髙步黌門服改氊裘語兼中夏明習漢法覩衣冠之儀目擊朝章知經國之要窺成敗於圖史察安危于古今識邉塞之盈虛知山川之險易或委以經略之功令其展效或矜其首邱之志放使歸蕃於國家雖有冠帶之名在戎狄廣其縱橫之智雖有慕化之美苟恱于當時而狼子辜恩旋生于過後及歸部落鮮不稱兵邉鄙罹災實由于此故老子曰國家之利器不可以示人在于齊人猶不以示之况于戎寇乎又按漢桓帝遷五部丐奴于汾晉其後卒有劉石之難向使五部不徙則晉祚猶未可量也鮮卑不遷幽州則慕容無中原之僣又按漢書陳湯云胸奴兵五而當漢兵一何者兵刃朴鈍弓弩不利今聞頗得漢工然猶三而當一由是言之利兵尚不當使之得法况處之中國而使其習見哉臣竊計漢初冒頓之強盛乘中國之虛敝髙祖餒厄平城而冒頓不能入中國者何也非兵不足以侵諸夏力不足以破汾晉其所以解圍而縱髙祖者為不習中土之風不知中國之美生長磧漠之北以穹廬賢于城邑以氊罽美于章紱既安其所習而樂其所生是以無中國之心者為生不在漢故也豈有心不樂漢而欲深入者乎劉元海五部離散之餘而卒能自振于中國者為少居內地明習漢法元海恱漢而漢亦恱之一朝背誕四面響應遂鄙單于之號竊帝王之寶賤沙漠而不居推平陽而鼎峙者為居漢故也向使元海不曾內徙止當劫邉人繒綵趜蘖以歸隂山之北安能使王彌崔懿為其用耶當今皇風遐覃含生革面凡有虺性莫不懷馴方使由余效忠日殫盡節以愚臣慮者國家方傳丕祚于後脫備守不謹邉防失圖則搆釁稱兵不在外方非所以肥中國制四方經營萬乘之業貽厥孫謀之道也臣愚以為願充侍子者皆一禁絶必若先在中國者亦不可更使歸蕃則夷人保疆邊邑無事矣疏奏不納萬嵗通天元年孫萬榮等陷河北數州河內王懿宗擁兵不敢進比賊敗懿宗奏請族誅滄瀛等州百姓為詿誤者左拾遺王求禮廷折之曰此百姓等素無良吏教習城池又不完固見賊畏懼苟且從之今請殺之是將違背天道而懿宗擁強兵數聞賊將至輒退賊入城池罪當誅戮今乃移禍于草澤詿誤之人以求自免豈是為臣之道請先斬懿宗以謝河北百姓羣官愕然謂之切當遂令魏州刺史狄仁傑充使安撫流移長夀二年右補闕朱敬則以冝絶告密羅織之徒上疏曰臣聞李斯之相秦也行申商之法重刑名之家杜私門強公室棄無用之費損不急之官惜日愛功急耕疾戰人繁國富遂並諸侯此救弊之術也故曰刻薄可施于趨進變詐可陳于攻戰兵猶火也不戢自焚况鋒鏑已銷石城又毁諒可易之以寬泰潤之以淳和八風之樂以柔之三代之禮以導之秦既不然淫虐滋甚往而不返卒至土崩此不知變之禍也陸賈叔孫通之事漢王也當滎陽城皋之間糧饋已窮智勇已竭不敢開一説效一奇進豪猾之材薦貪暴之客及區宇適平干戈向戢金鼓之聲未歇傷痍之病尚聞二子顧盼雍容綽有餘態乃陳詩書説禮樂闡王道謀帝圖髙皇帝忿然曰吾以馬上得之安事詩書乎對曰陛下馬上得之安可馬上理之乎髙皇默然於是陸賈著新語叔孫通定禮儀始知天子之尊方覺帝王之貴此則知變之善也向使髙皇排二子而不顧重攻戰之吏尊首級之材復道爭功張良已知其變拔劍擊柱若屬不得無謀即晷漏難逾何十二帝乎亡秦是續何二百年乎故曰仁義者聖人之蘧廬禮樂者先王之陳迹然則祝詞向畢芻狗須焚滑稽已流糟粕可棄仁義尚舍况輕于此者乎自文明草昧天地屯蒙三叔流言四凶構難不設鉤距無以應天順人不峻刑名不可摧姦息暴故置神匭以開告端曲直之影必呈包藏之心盡露神道助直無罪不除人心保能無妖不戮以兹妙算窮造化之幽深用此神謀入天人之袐術故能計不下席聽不出闈蒼生晏然紫宸易主大哉偉哉無得而稱也豈比造攻鳴條大戰牧野血變草木頭折不周可同年而語乎然而急行無善迹促柱少和聲拯溺不規行療飢非鼎食即向時之妙䇿乃當今之芻狗也伏願覽秦漢之得失考時事之合宜審糟粕之可遺覺蘧廬之須毁見幾而作豈勞終日乎陛下必不可偃蹇太平徘徊中路伏願改法制立章程下怡愈之詞流曠蕩之澤剗萋菲之牙角頓姦險之鋒鋩杜告訐之源絶羅織之迹使天下蒼生坦然大恱豈不樂哉神龍元年二月十四日追贈后父韋玄貞為上洛郡王左拾遺賈虛己上疏曰臣聞孔子曰惟名與器不可以假人其非劉氏而王自古盟書所棄今陛下創制謀始垂範將來為皇王之令圖子孫之明鏡匡復未幾后父有私臣庸愚尚知不可史官執簡必直書今萬姓顒然聞一善令莫不歌頌向風欣然慕化日恐不及陛下奈何行私惠使樵夫議之即先朝贈太原王殷鑒不逺同雲生于膚寸尋木起于蘖栽誠可惜也如渙汗已行憚改成命臣望皇后抗表固辭使天下知引讓之風彤管著謙沖之譽是則巍巍聖德無得而稱疏奏不納二年八月莭愍太子之亂兵部尚書宗楚客侍御史冉宗雍共劾安國相王及太平公主與太子連謀請收付詔獄右補闕吳兢上疏曰臣聞庶物不可以自生隂陽以之亭育大寶不可以獨守子弟成其藩翰武王聖主也成王賢嗣也然封建魯衛以匡社稷所以龜鼎相傳七百餘載始皇繼昭襄之業承戰爭之弊忽先王之典制比宗親于黔首孤立無輔二代而亡漢諸呂用權將傾劉氏朱虛為其心腹絳侯作其牙瓜劉氏復安豈非宗子之力國之安危在于藩屏故設官分職先親後疏且安國相王者陛下之同氣六合至廣親莫加焉今賊臣同謀欲置極法此禍亂之漸不可不察伏願陛下降明旨曉羣邪下全棠棣之美上慰罔極之心則羣生幸甚景雲元年左補闕辛替否論時政上疏曰臣請以有唐以來理之得失陛下之所眼見者以為言陛下聽之太宗文皇帝陛下之祖得至理之體設簡要之方省其官清其吏舉天下之職司無一虛設用天下之財帛無一枉費不多造寺觀而福德日至不多度僧尼而殃咎自滅自古帝王未有若斯之神聖也陛下何不取而則之孝和皇帝陛下之兄居先人之業忽先人之化不取賢良之言而恣妻女之意官爵非擇虛食祿者數千人封建無功妄食土者百餘户造寺不止枉費錢數百億度人不休免租庸者數千萬倉不停卒嵗之儲庫不停兩年之帛奪百姓口中之食以養貪殘剝萬人體上之衣以塗土木於是人怨神怒水旱不調享國不永受終於凶婦人此陛下之所眼見何不棄而改之今陛下旌阿韋之凶宗而不改阿韋之亂政忍棄太宗文皇之理本不忍棄孝和之亂階陛下又何以繼祖宗而觀萬國昔陛下在阿韋之時危亡是懼常切齒于羣凶今貴為天子富有四海內不改羣凶之事臣恐復有切齒于陛下者也先朝之時愚智知敗人雖有口而不敢言言未發聲禍將及矣韋月將受誅于丹徼燕欽融見殺于紫庭此人皆不惜其身而納忠于主身既死矣主亦危矣是故先朝誅之陛下賞之是陛下知直言之事有禆于國臣今日愚言亦當代之直伏惟察之先天元年正月大酺睿宗御安福門觀百司宴酺經月不息右拾遺嚴挺之上疏曰夫酺者因人所利合醵為歡無相奪倫不至糜弊且臣卜其畫史䇿猶存君舉必書帝王重慎今乃暴衣冠于路上羅妓樂于中宵雜鄭衛之音縱娼優之樂陛下還淳復古宵衣旰食不矜細行恐非聖德所宜臣以為一不可也誰何警夜伐鼓通晨以備非常古之善教今陛下不深惟戒慎輕違動息重門弛禁巨猾多徒倘有躍馬奔車流言駭叫一塵聽覽有纍宸衷臣以為二不可也一人向隅滿堂不樂一物失所納隍增慮倘令有司跛倚下人飢倦陛下近有不恤况于逺乎臣以為三不可也且正元首祚大禮頻光百姓喁喁咸謂業盛配天功垂曠代今陛下恩已薄於衆聖酺即過于往年王公大人各承徽旨州縣坊曲競為課稅損萬民之財營百戲之資臣以為四不可也伏願晝則歡娛暮令休息若令繼夜無益聖明從之廣德二年九月二十一日敕諫官令每月一上封事指陳時政得失永泰元年正月二十三日敕諫官奏事不須限官品次第於每月奏事官數內聽一人奏對大厯十二年四月十二日敕自今以後諫官所獻封事不限早晚任封狀即時進十二年七月賜右補闕姚南仲緋遷左拾遺何士幹為左補闕時葬貞懿皇后代宗恩寵所屬令繕陵寢邇章敬寺後為遊幸近地左右莫敢言南仲等上疏極諫代宗覽表歎息立從其議因錫南仲緋遷士幹官以褒之是日遣常內侍吳承情宣慰百僚令數事元和元年九月以拾遺杜從郁為祕書丞從郁司徒佑之子初自太子司議郎為右補闕左拾遺崔羣韋貫之右拾遺獨孤郁等奏以為宰相之子不合為諫諍之官於是降左拾遺羣等又奏云拾遺與補闕雖資品不同而皆是諫官父為宰相而子為諫官若政有得失不可使子論父於是改授十五年八月山陵始復土先是追邠寧節度使李光顔徐泗節度使李訴赴闕或言欲重陽莭與百寮內宴拾遣李珏宇文鼎溫會韋瓘馮約等上疏曰臣聞人臣之節本于忠藎苟有所見宜即上陳况臣等為陛下諫官食陛下美祿豈得隱默孤負恩榮聞諸道路不知信否皆云追光訴及重陽令節欲內宴百寮倘誠有之乃陛下親羣臣宏德澤之慈旨也然伏以元朔未改園陵尚新雖陛下就易月之期俯從人欲而禮經著三年之制猶服心喪遵同軌之會適去于中邦告逺夷之使未復其誠命遏密弛禁蓋為齊人合宴內廷事將未可夫明主行為天下則言為天下法臣恐王言忽降其出如綸苟紊皇猷徒彰直諫臣等是以昧死上聞曲突徙薪義實在此其光顔李訴久統戎旅皆有忠勞今者時當盛秋務切邉冦及是之日陛下降恩召見詢訪才謀褒其舊勳付以疆事如此則與夫歌鐘賜宴酒食邀歡固不同年而語矣臣竊見陛下自臨御以來施號發令無非孝理因心屢形于詔敕行已實感于人倫惟在敬慎威儀保全聖德臣等不敢緘默輒貢狂言懼不允當伏待刑憲寶厯元年閏七月右拾遺薛延老與同僚入閣奏事曰臣伏見近日除拜往往不由中書進擬多是內中宣出恐紀綱漸壞姦邪恣行上曰更諫何事拾遺舒元褒曰近宫室修造太多延老曰臣等職在諫官凡有所聞即合論奏乞勿罪其言上改容勞之其年十一月以右拾遺內供奉史館修撰薛延老為河中府臨晉令時鄭權因交通鄭注得嶺南莭度權到任後盡以庫中所有輦送京師酬遺權幸延老周知上疏請按由是釁結中外人盡危之延老性本強直未幾又議張權與程昔範不宜居諫官之列事皆不行遂自請假滿十旬為宰相李逢吉所出二年九月以新授濠州刺史陳岵為太常少卿岵常好釋氏學佛經中尤好維摩自為有得即加注釋輒復上獻遂有宣令與好官乃追前命列在清賢羣議紛然諫官劉寬夫等七人同疏論奏謂岵由徑求事因供奉僧進經上覽疏謂所言不實宣與宰相等云陳岵所進經實不因僧諫官何處得此語卿等可即勘問并推排頭首奏來左補闕劉寬夫上表自言昨論岵之時不記得先後唯執筆草狀即是微臣今既論事不當臣合當罪若令尋究根本自相推排恐或遽相誣執有損事體凡所論差誤臣盡甘當罪疏奏敕諫官六人各罰一季俸劉寬夫獨能當罪釋放然岵尋改少府監太和元年十一月敕以右補闕髙允中為侍御史允中自為諫官甚舉職業危言直論不避時忌寶厯中常上疏云東頭勢重于南衙樞密權傾于宰相敬宗感悟久之雖無明賞而直名昭然人情危懼恐有禍及終至非辜至是稍遷正人相賀三年五月左拾遺舒元褒等奏今年四月左補闕李虞與御史中丞溫造街中相逢溫造怒李虞不回避遂提李虞祗承人車從送臺中禁身一宿與脊杖十下者臣等謹按國朝故事供奉官行除宰相外無迥回避今溫造滅棄朝廷典故陵陛下近官恣行胸臆曽無畏忌伏以事雖小而關分理者不可失也分理失亂由之而生拾遺補闕官秩雖卑乃陛下侍臣也御史中丞官秩雖髙乃陛下法吏也侍臣見凌是不廣敬法吏壞法何以持繩臣等又聞元和長慶中御史中丞行李遵從不過半坊今乃逺至兩坊謂之籠街喝道唯以尊崇自處不思僣擬之嫌陛下若不因此時特有懲革伏恐從此供奉官輩便須回避中丞纍聖制度失自陛下臣等官參諫列實為陛下惜之敕憲綱之設在指佞觸邪不在行李自大侍臣之職在獻可替否不在道途相髙其臺官與供奉官同道聽先後而行遇途但祗揖而過其參從各隨本官之後少相回避勿信衝突自今已後應各有遵從官行李傳呼前後並不過三百步會昌四年六月中書門下奏諫官論事臣等商量望令各陳所見不要連狀涉于糾雜如有大假意見及朝廷重事必須連狀者即令同商量進狀不得輒有代署敕旨依奏咸通四年十一月以長安縣尉令狐滈為左拾遺左拾遺劉蛻起居郎張雲奏滈父綯秉權之日廣納賂遺取李琢財物除安南致蠻寇侵擾不當居諫官之列時綯鎮淮南上表論訴乃貶雲興元少尹蛻華隂令符寶郎本名符璽郎延載元年五月十一日改為符寶郎神龍元年正月二十二日復改為符璽郎開元元年十一月十日敕傳國八璽既改為寶其符璽郎宜改為符寶郎矣舊制天子八寶一曰神寶所以承百王鎮萬國二曰受命寶所以修封禪禮神祗三曰皇帝行寶答疏於王公則用之六曰天子行寶答四夷書則用之七曰天子之寶慰撫蠻夷則用之八曰天子信寶發畨國兵用之貞觀十六年太宗刻受命玄璽白玉為螭首其文曰皇天景命有德者昌天寶五載六月十一日敕玉璽既改為寶其璽書可從之至十載正月後改傳國寶為承天寶典儀皇朝置二人隸門下省初用人皆輕至貞觀末李義府為之是後常用士人焉唐會要卷五十六
