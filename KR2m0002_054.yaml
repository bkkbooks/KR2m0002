body:
  text: 唐㑹要卷五十四宋王溥撰省號上門下省武徳初因隋舊制為門下省龍朔二年二月四日改為東臺咸亨元年十二月二十三日改為門下省光宅元年九月改為鸞臺神龍元年二月四日改為門下省開元元年十二月一日改為黄門省五年九月六日改為門下省至今不改中書省武德元年因隋舊制曰内書省三年三月十日改為中書省龍朔年改為鳯閣神龍初年復中書省改元元年改紫㣲省五年復舊為中書省故事凡王言之制有七一曰册書立后建嫡封樹藩屏寵命尊賢臨軒備禮則用之二曰制行大賞罰授大官爵釐革舊政赦宥降恩則用之三曰慰勞制書褒賢贊能勸勉勤勞則用之四曰發日敕謂御畫發敕也増減官員廢置州縣徴發兵馬除免官爵授六品以下官處流以下罪用庫物五百段錢二百千倉糧五百石奴婢五十人馬五十疋牛五十頭羊五百口以上則用之五曰敕㫖謂百司之承㫖而為程式奏事請施行者六曰論事敕書慰諭公卿誡約臣下則用之七曰敕牒隨事承㫖而不易舊典則用之也皆宣署申覆而施行焉舊制册書詔敕總名曰詔天授元年避諱改詔曰制凡下之通於上有六一曰奏抄謂祭祀之支度國用授六品以下官斷流以下罪及除免當者並為奏抄二曰奏彈謂御史紏劾百司不法之事也三曰露布謂諸軍破賊申尚書兵部而聞奏焉四曰議謂朝之用事下公卿議理有異同奏而裁之五曰表六曰日狀皆審署申覆而施行焉覆奏畫可訖留門下省為案更寫一通侍中注制可印署送尚書省施行者武徳三年髙祖嘗有敕而中書門下不時宣行髙祖責遲由内史令蕭瑀曰臣大業之日見内史宣敕或前後相乖者所司行之不知何所承用所謂易雖在前難必在後臣在中書日久備見其事今皇階初構事涉安危若逺方有疑恐失機㑹比每授一敕臣必審勘使與前敕不相乖背者始敢宣行遲晚之愆實由於此髙祖曰卿能用心若此我有何憂貞觀元年上謂侍臣曰中書門下機要之司擢才而居委任實重詔敕如有不便皆須執論比來唯覺阿旨頤情事即有過遂無言諫諍者豈是道理若惟署敕文書而已人誰不堪何須簡擇以相委付自今已後詔勅疑有不穩必須執言聖厯三年四月三日敕賜物中書門下省官正三品凖二品四品凖三品其年四月三日敕應賜外國物者宜令中書具録賜物色目附入敕凾内神龍三年二月十九日敕諸色理訴兼抑論内狀出付中書應制敕處分者留為商量自餘並封本狀牒送所司處分景龍三年八月九日敕應酬賞賜須依格式迄無明文隨時比例制敕不言自今已後乃永為恒式者不得攀引為例開元七年八月十日敕中書門下㕑雜料破用外有餘者宜分取三年十月始用黄麻紙冩詔至上元三年二月詔制勅並用黄麻紙九年四月二十六日勅加階入三品并授官及勲封甲并諸色闕等進畫出至門下省重加詳覆有駁正者有便即落下墨塗訖仍於甲上具注事由并牒中書省二十一年閏三月十三日敕每月當畨武官畨滿日過中書門下天寶八載七月中書門下奏比來諸司使及諸郡并諸軍應縁奏事或有請中書門下商量處分者凡所陳奏皆斷自天心在於臣下但宣行制勅奏文内則不合列請商量乃承前因循有此乖越自今已後應奏事一切更不合請付中書門下如有奏達聴進止勅旨從之乾元三年四月二十六日勅諸司使諸州府進奏文狀應合宣行三紙已上皆自寫宣付四本中書省宣過中書省將兩本與門下省寶應二年四月二十二日内外六品以下正員自今已後差主事一人令史四人専知至建中三年閏正月十八日中書門下奏准貞觀故事京常㕘官及外官五品已上每有除拜中書門下皆立簿書謂之具眞取其年資以為遷授此國之大經也自艱難已來此法遂廢垂拱三十載伏望自大厯十四年已來量署具員據前資見任員量與改轉從今已後刺史四考郎中起居侍御史各兩考餘官各三考與轉其升進黜退並准故事處分仍下天下州縣審勘責前資見任其鄉貫厯任官諱同具狀中書門下廣徳二年三月十四日勅中書門下兩省直省自今已後所補不得取郎將已上官大厯十三年四月十六日勅中書門下先置法官兩人宜停建中三年六月詔中書門下兩省各置印一面四年六月中書門下兩省狀應送諸司文狀檢勘節限中考文狀等並是每年長行之事尚書省各依限録奏舊例經一宿即出如經三日不出請本司更修單狀重奏又三日不出即請本司長官面奏取進止其内狀到各令本司兩日内具省案及宜黄送到中書依前件所定限勘㑹宣下即事免稽滯及准開元十九年四月勅應加階并授及勲封甲并諸色闕等進畫出至門下省重加詳覆駮正者宜便注簿落下以墨塗訖仍於申上宜注事由牒中書省敕旨從之二年五月二十八日勅中書門下兩省供奉官及尚書省御史臺現任郎官御史等自今已後諸司諸使並不得奏請任使仍永為恒式長慶元年正月制自今已後中書門下所有除授宜依元和二年具員勅處分太和三年四月中書門下奏内外文武官除授伏以為官擇人寔資進選舉能考績固切旁求必當按實循名聴言觀行事合先於詢衆道必惡於自媒進退之間風俗所繫近日人多争競跡罕貞修或日詣宰司自陳功狀或上凟宸衷曲祈恩授無受爵讓能之賢啓矜能伐善之弊亦有粗因勞績以授官榮及居今任别無課効唯引向前所事狀祗希更與遷陞凡是此流稍要立制伏望自今後應縁官闕須有除授先選吏跡有聞行已務寔者隨才奬用如有志涉浮躁事近激求者量加擯斥所覬官修其方人思勵行勅旨宜依其年五月中書門下奏内外常㕘官改轉伏以建官蒞事曰賢與能古之王者用以致理不聞其積日以取貴踐年而遷秩者也况常人自有常選停年限考式是舊規然猶慮拘條格或失茂異遂於其中設博學宏詞書判拔萃三禮三𫝊三史等科目以待之令不限選數聴集其實限年考者非擇賢能之術也故予違汝弼唯繫人才黜幽陟明在課職業今據元和二年五月十八日具敕敕内常㕘官並限年考各與遷轉則官修者沈滯職曠者僥倖恐非朝廷循名責實之意奬厲賢勞之道頻奉進止數遣商量須令百吏勤職衆官得人舉直措枉行於授受之際伏望從今以後内外常㕘官並不論年考議事而遷位位均以才才均以望位望均然後以日月班之而第用之則冀有司竭力盡知務修其職而以赴功唯御史臺刑憲是司憂責頗重其三院御史望納舊敕例比量處分敕旨依奏九年十二月勅中書門下吏部各有甲厯名為三庫以防踰濫如聞近日請處奏官不經司檢尋未免姦偽日起今已後諸司諸使諸道應奏六品以下諸色人稱舊有官及出身請改轉并請授官可與商量者除進士及登科衆所聞知外宜令先下吏部及中書門下及三庫委給以舎人吏部格式郎中各與甲庫官同檢勘具有無申報中書門下審無異同者然後依資進擬如諸司諸道奏論不實以有為無者臨時各加懲罰務使仕進稽實永絶僥倖開成二年十二月中書門下奏武官舍下郎將等其堪送名者請中書門下准吏部送名例磨勘仍先過堂然後批擬從之三年二月敕中書文狀悉在中書斷割裁量須歸根本如關錢穀刑獄等事有宣付諸司處置者宜更令覆奏候正敕施行門下侍郎龍朔二年改為東臺侍郎咸亨二年改為黄門侍郎垂拱元年二月二日改為鸞臺侍郎神龍元年復為黄門侍郎天寶元年二月二十日改為門下侍郎乾元元年改為黄門侍郎大厯二年十一月四日復為門下侍郎其年月九日陞為正三品中書侍郎同門下之稱至今不改武徳二年四月温大雅為黄門侍郎至五年三月弟彦博又為中書侍郎對居近禁髙祖謂曰我起義晉陽為卿一門耳貞觀十八年黄門侍郎褚遂良上疏曰即日内外官人諸王僚佐咸云陛下供給皇弟頓少於親王大臣深知形跡不奏私說竊語殊非光益臣伏事聖主奉若天心豈不恐其多財縱溢或至自敗必不得積貨驕盈寧使儉急不足雖不比於皇子亦須微允物望臣是以謹訪荆韓漢魯四弟自足資財滕宻霍道四王尤為缺少臣於芳春殿冒死奏聞伏惟天明必記臣語若厚於諸弟人皆聞見六月四日詔便是至公若供給諸弟事皆儉陋即似陛下于昆季情薄臣是以不避斧鉞更敢陳聞昔漢明帝每賜子弟必語羣臣云不得使朕子多於先帝子美哉斯言王者徳音終後漢皆以明帝為法臣聞君施敎令謂之風人隨上行謂之俗陛下厚於諸弟太子亦厚於諸弟相承恩篤豈不美哉伏願陛下疑闕短者因而賜之所用不多徳音流布神龍元年五月武三思恃寵嘗請託於黄門侍郎宋璟正色謂曰當今復子明辟王宜以侯就第何得尚干朝政王獨不見産祿之事乎開元二年八月李嶠為黄門侍郎多所校正紫微令姚崇遂薦為紫微侍郎外託薦賢其實引在已下去其糺駮之權建中二年十月門下侍郎盧把宻啓中書主事過咎逐之楊炎怒曰中書吾局也吏有過吾自治之奈何相侵耶中書侍郎武徳元年因隋舊制號内史侍郎三年三月十日改為中書侍郎龍朔中改為西臺侍郎咸亨中改為中書侍郎垂拱元年二月改為鳳閣侍郎神龍元年二月四日又為中書侍郎開元元年十二月一日改為紫微侍郎大厯二年十一月十四日升為正三品五年九月六日復為中書侍郎貞觀十九年中書侍郎許敬宗以太子承乾官僚多被除削乆未收叙上疏曰竊見廢官僚五品以上除名棄斥頓厯寒温但庶人疇昔之年身處不疑之地包藏悖逆隂結宰臣所同奸謀多連宗戚禍生慮表非可防萌宫内官僚迥無關及今乃投䑕及器孰謂無寃焚山毁玉稍同遷怒伏尋先典例有可原昔吳國陪臣則爰絲不坐於劉濞昌邑中尉則王吉免縁於海昏譬諸欒布乃䇿名於彭越比於田叔亦委質於張敖主以凶逆䧟于誅夷臣以忠良荷彼收擢今張𤣥素令孤徳棻趙𢎞智裴宣機蕭鈞等並砥節勵操有望於當朝經明行修播芳名於天下或以直言而遭箠撲或以忤旨而見猜嫌一概雷同並罹天憲恐於王道傷在未𢎞其年四月中書侍郎顔師古以譴免職温彦博言於太宗曰師古諳練政事長於文誥時無逮者冀上復用之太宗曰我自舉一人公勿憂也於是以岑文本為中書侍郎専典機宻及遷中書令歸家有憂色其母怪而問之岑文本曰非勲非舊濫登寵榮位髙責重古人所以憂耳親賓有來賀者輒曰今日受弔不受賀及興遼東之役凡所支度一切委之神用頓竭太宗見而憂之謂左右曰文本今與同行恐不與我同返至幽州遇疾暴卒時年五十一垂拱三年鳳閣侍郎劉褘之嘗竊謂人曰太后何用臨朝稱制不如返政以安天下之心則天聞之特令肅州刺史王本立推鞫本立宣敕示褘之褘之曰不經鳳閣鸞臺宣過何名為敕則天大怒以為拒捍制使特賜死開元元年十二月上詔宰臣謂曰從工部侍郎有得中書侍郎者否對曰任賢用能非臣等所及上曰蘓頲可除中書侍郎仍令宰臣宣旨秘入政事院便供政事食明日加知制誥今知制誥有政事食者自頲始也及入謝固辭上曰朕常欲用卿每一好官缺即望諸宰相論及此皆卿之故人遂無言卿者朕常歎息中書侍郎朕極重惜自陸象先故官後朕每思之無出卿者二年弟詵除給事中頲屢陳情上曰古來有内舉不避親耶頲曰晉大夫祁奚是也上曰若然朕自用蘓詵何得屢言近日卿父子猶同在中書兄弟有何不得卿言非至公也三年二月上謂曰前朝有李嶠蘇味道時人謂之蘓李朕今有卿及李嶠亦不讓之卿所制文朕自識之自今以後每進書皆别録一本云臣某進朕與留中迄今已為故事十一年九月中書令張說薦崔沔為中書侍郎或謂沔曰今日之中書皆是宰相承宣制命侍郎雖是副貳但署位而已甚無謂也沔曰不然設官分職下上相維各申所見方為制理豈可俛然偷安而懷禄仕也自是每有制敕及曺事沔多異同張說頗不恱焉建中元年中書侍郎平章事崔祐甫薨册贈太𫝊故事中書侍郎未嘗有三師者上以祐甫謇謇有大節特寵異之左右散騎常侍武徳令以為從三品散官貞觀十七年六月四日改為職官置兩貟以黄門侍郎劉洎為之隷門下省顯慶三年十二月二十八日分左右各兩員其左隷門下省右𨽻中書省龍翔年改左右侍極咸亨年改為左右常侍郎廣徳二年五月二十二日陞為正三品中書門下省各加置四貟興元元年正月二十九日各加一員貞元四年正月一日敕元額四員其新貟宜依元數貞觀十七年散騎常侍劉洎諫詰難公卿表曰臣聞帝王之與凡庶聖哲之與庸愚上下相懸擬倫斯絶是知以至愚而對至聖以極卑而對極尊徒思自强不可得也陛下降恩旨假慈顔凝旒以聴其言虚襟以納其說猶恐羣下未敢對揚况動神機縱天辯飾詞以折其理援古以排其議欲令凡庸何階應答臣聞皇天以無言為貴聖人以不言為徳老君稱大辨若訥莊生言至道無文此皆不欲煩也是以齊侯讀書輪扁竊笑漢皇慕古長孺陳譏此亦不欲勞也且多記則損心多語則損氣心氣内損形神外勞初雖不覺後必為累須為社稷自愛豈為性好自傷乎竊以今日昇平皆陛下力行所至欲其長久匪由辨愽但當忘彼愛憎慎兹取舍每事敦樸無非至公若貞觀之初則可矣至如秦政强辨失人心於自矜魏文宏才虧衆望於虗說此才辨之累較然可知矣伏願畧兹雄辯浩然養氣簡披緗圖淡焉怡目固萬夀於南岳齊百姓於東邱則天下幸甚手詔答曰非慮無以臨下非言無以述慮比有談論遂至煩多輕物驕人恐由兹道神形心氣非足為勞今聞讜言虚懷以改寶應二年五月一日敕散騎常侍宜各置㕘官兩人令自簡擇聞奏㕘典亦置兩人興元元年二月以奉天解圍百僚稱賀右常侍賈隱林拜舞因質言曰陛下性多太急不能容忍若舊性不改雖朱泚敗亡臣亦恐憂未艾也上虚懐納之貞元四年二月敕左右散騎常侍是中書門下正三品官謂之侍極宰臣次列除特委方面者餘不合兼任使先已授者宜改與别官自今已後更不得注授長慶四年五月諫議大夫李渤奏據六典常侍奉規諷其官久不舉職習以成例若設官不責其事不如罷之以省其費苟未能罷臣請特勅令准故事行其職業從之太和五年二月神䇿中尉王守澄誣奏宰相宋申錫謀逆文宗即令追捕左散騎常侍崔𤣥亮極諫上乃改容勞之申錫方免死責授開州司馬給事中武徳元年因隋舊制為給事郎三年三月十日改為給事中龍朔中改為東臺舍人咸亨改為給事中貞觀十五年太宗臨軒謂侍臣曰朕所以不能恣情欲取樂當年而勵精苦心正為蒼生且我為人主兼持將相之事豈不是奪公等名昔漢髙得蕭曹韓彭天下寧晏舜禹湯武有稷卨伊呂四海乂安此事朕並兼之給事中張行成諫曰陛下聖徳含光規模宏逺雖文武之烈實兼將相何用臨朝對衆與並校量以萬乘至尊共臣下争功哉臣聞天何言哉四時行焉臣輒陳狂直伏待葅醢十六年刑部奏請反叛者兄弟並坐給事中崔仁師駮之曰誅其父子足警其心此而不恤何憂兄弟議遂寢開元二十一年二月定安公主初降王皎後降韋濯又降博陵崔銑銑又卒及公主薨皎子駙馬王繇請與皎合葬敕旨依給事中夏侯銛駁之曰公主初昔降婚梧桐半死逮乎再醮琴瑟兩亾則生存之時已與前夫義絶殂謝之日合從後夫禮葬今若依繇所請却祔舊姻但恐魂若有知王皎不納於幽壤死而可作崔銑必訴於𤣥天國有典章事難逾越原繇此意雖申㒺極之情本禮而行或致不稽之誚銛謬膺駁正敢曠司存請旁移禮官并求指定下太常寺請議公主令與王皎合葬可否報之貞元十八年二月以前攝浙東團練副使試大理評事兼監察御史齊總為衢州刺史羣議以為超奬過當至門下給事中許孟容上表封還曰臣伏見今恩制除衢州刺史齊總臣愚竊有所慮恐驚物聴不敢聞於陛下若以兵戎之地或有不得已非次擢授者今衢州無他虞齊總無殊績忽有此超授羣情驚駭又齊總是判官今詔敕擢浙東觀察留後攝都團練副使向來未有敕令使用此下詔尤恐不可總若可㧞不假此舉致使人疑陛下臨御以來凡所選用皆為至公既非聖情所難改移即臣下安得不動有論諍若齊總必有可録陛下必須酬能即明書勞課超一兩資與改今臣聞四海舉朝之人不知齊總功能衢州浙東大郡自大理評事兼監察授之遐邇不甘凶惡騰口伏乞聖慈少回神理覧臣所奏允臣之請陛下若謂臣不切不懇伏乞陛下試停此詔宻使人察聴必賀聖明聞納必賀聖朝無私臣授中官謝具日已面奏詔敕有不便者伏請封進今齊總詔謹隨狀封進時左補闕王武右補闕劉伯芻復上疏言之由是詔書留中不出後數日不得雨不親事特開延英召孟容對上慰諭開納曰使百事皆如卿朕何憂也給事中自袁髙俞盧已後未嘗有可否時齊總竭浙東進奉超授逾等江淮之間人多困急無不罪總及此四方聞者皆感上聖明虚心之徳嘉孟容之當官不面從其年八月以嶺南節度掌書記試大理評事張貞元為邕州經畧使給事中許孟容上疏張貞元次非遷授右補闕張正一劉伯芻繼有封章上命中使宣諭孟容詔亦遂止十九年六月給事中孟容上疏曰臣竊聞陛下數勅有司走於羣望祈於百神而宻雲不雨首種未入豈觴醪有闕巫祝非誠抑隂陽適然豐歉前定何聖意精至甘澤未答也臣厯觀自古天人交感未有不由百姓利病之急者切者邦家教令之大者逺者京師是萬國所㑹强幹弱枝自古通規其一年稅錢及地租出入一百萬貫石伏冀陛下即日下令全放免之其次三分放二使旱涸之際免更流亡若播種無望征斂如舊則必愁怨遷徙不顧墳墓矣臣愚以為徳音一發膏澤立應變災為福期在斯須户部所收掌錢非度支嵗計本防緩急别用今此歉旱直支一百餘萬貫代京兆百姓一年差科寔陛下巍巍睿謀天下鼓舞歌揚者也復省察庶政之中有流移征防當還而未還者徒罪禁錮當釋而未釋者逋懸饋送當免而未免者沉滯鬱抑當伸而未伸者有一於此則特降明命令有司條晰三日内聞奏其當還當釋當免當伸者仍詔下之日所在即時施行臣愚以為如此而天不鍳嵗不稔從古未之有也疏寢不報元和三年以國子司業李藩為給事中時制敕有不可遂於黄敕後批之吏白宜别奏藩曰祗是文狀豈曰批敕裴垍言於上以為有宰相器俄而鄭絪罷免遂拜藩門下侍郎平章事四年三月以淮南節度判官孔戡為衞尉寺丞分司東都勘嘗為左昭義莭度使盧從史數以事争論不從因謝病去從史强以禮遣而隂銜之居東都為淮南節度使李吉甫所辟而從史忿嫉累請貶降始元中姑息節將其從事有不合意或知其邪心欲免去則誣以他罪論奏更不驗理或黜或徙訖貞元軍府化之至是上雖不許猶授以散員制既下給事中呂元膺封還奏曰孔戡以公正為盧從史所忌且厯職已久吉甫以宰相出鎮辟請非涉嫌疑推類言之河陽節度行軍司馬楊同皎史官崔周正或處禁近或萃戎府皆為吉甫奏在幕庭今從史以嫌忿干黷朝典豈可曲徇其志且孔戡官序雖非黜退但因此改易則長奸邪之心臣恐忠正之士各懷疑懼事不可許上令中使宣諭元膺制書乃下其年十月以同州刺史呂元膺復為給事中初元膺自給事中除同州刺史及入謝上問以時政得失元膺論奏詞甚激切上嘉其剛正異日謂宰臣曰呂元膺有讜言直氣今欲留左右使言得失卿等以為何如李藩裴垍進賀曰陛下納諫超冠前王乃宗社無疆之福臣等不能廣求直士又不能數進直言孤負聖心合當罪責今請以元膺復給事中以備顧問上恱而從之七年七月瓊林庫使奏巧兒舊挾名敕外别定一千三百四十六人請宣下内府為定額特免差役時給事中薛存誠以為此皆奸人竄名以避徭役不可以許又咸陽尉袁儋與鎮軍相競軍人兼理逺肆侵誣儋反受罰一敕繼志存誠皆執之上聞甚恱命中使嘉勞由是選拜御史中丞十四年三月以撫州司馬正令狐通為右衞將軍給事中崔植封詔上言通嘗刺夀州用兵失律前罪未塞不宜遂加奬用上命宰相諭植以通父彰有功不忍棄其子詔遂行其年六月判度支皇甫鏄重奏諸道州府監院每年送上兩稅𣙜酒鹽利米價等疋段加估定數又奏近年天下所納鹽酒等利擡估者一切追徵詔既可給事中崔植抗論以為用兵嵗久百姓凋殘往者雖估踰其實今固不可復追疏奏命宰臣召植宣㫖嘉諭許輟已行之詔物議美之十五年閏正月上曰諫官給事中若除授有司政乖允當各令論駁舉其職業時以李遜為浙東道監察使有政能入遷為給事中嘗宻論時政以為事君之義有犯無隱陳誡豈必擇辰今君臣敷奏乃俟隻日是畢嵗臣下睹天顔獻可替否能㡬憲宗嘉之遷戸部侍郎長慶初穆宗皇帝觀諸軍雜樂嘗召給事中丁公著問曰比聞外間自公卿至庶士多為酣宴皆極歡娛此葢時和人安有足撫慰公著對曰誠有此事然以臣愚見風俗如此亦不足佳百司所職漸恐煩勞聖慮上曰何故公著對曰賓嘉之禮古人所重皆務達誠展敬不繼以淫詩人所以美樂且有儀譏其屢舞前代名士㑹賓客者或清談賦咏雅歌投壺期以杯觴獻酬不至扵亂國家自天寶已後風俗奢靡宴處羣飲以諠譁沉湎為樂而居重位乘大權者優雜倨肆於公吏之前曽無愧恥公私相效漸以成俗由是物務多廢獨聖心求理安得不勞宸慮乎陛下方𢎞本革弊特降訓命禁其過差則天下幸甚上嘉其言太和二年八月敕凡制命須行事有不可給事中職合封進省審既畢宣布百司稽停晷刻皆著律令自今尚書省御史臺所有制敕及官属除不當封章上論其有事狀分明亦在舉按指事據實更言風聞及滯詔㫖并不放上如郎官御史出使訪聞按舉自凖前後敕文不在此限五年將作監王堪修奉太廟弛慢罰俸仍改官為太子賓客制出給事中李固言封還曰東宮調䕶之地不可令被罰弛慢之人處之乃改均王傅開成三年八月敕給事中封駁制敕冝令季終具所駁聞奏如無亦宜聞奏㑹昌五年十二月給事中韋𢎞景上疏抗論中書權重三司錢穀不合相府兼領宰相李徳裕論奏曰臣等昨於延英候對恭聞聖㫖常欲朝廷尊臣下肅此是陛下深究理本也臣按管子云凡國之重器莫重於令令重則君尊君尊則國安國安在於尊名尊名在於行令君人之理莫要乎出令故曰虧令者死益令者死不行令者死不從令者死又曰行令于上而下論可否是上失其柄下繋于人也自太和以來其風大弊令出于上非之于下昨韋𢎞景所論宰相不合兼領錢穀臣等輒以事體陳聞昔匡衡云所謂大臣者國家之股肱萬姓所瞻仰明主所慎擇𫝊曰下輕其上賤人圖柄則國家揺動𢎞景受人指道輒獻封章是賤人圖柄矣蕭望之漢朝名儒為御史大夫奏云今嵗首日月少光罪在臣等上以望之意輕丞相乃下御史詰責賈誼有云人主如堂羣臣如陛陛髙則堂髙亦由將相重則君上尊其勢然也昔東漢處士横議遂有黨錮事起此事深要懲絶上然之𢎞景乃坐貶官時李徳裕在相位久朝臣為其所抑者皆怨望之洎崔鉉杜悰罷相後中貴人屢言徳裕太尃上不恱故白敏中敎𢎞景有此奏唐會要卷五十四
