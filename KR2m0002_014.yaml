body:
  text: 唐會要卷十四宋王溥撰禘祫下貞元十二年禘祫祭太廟近例祫祭及親拜郊令中使引傳國寶至壇所昭示武功也至是上以傳國大事中使引之非宜乃令禮官一人就內庫監引領至太廟焉十九年三月給事中集賢學士陳京奏禘祫是審諦大合祖宗次序之祭必尊太祖之位以正昭穆今年遇禘伏思須定所議之禮是月勑禘祫之祭禮之大者先有衆議猶未精詳宜令百寮集議聞奏尚書左僕射姚南仲等奏議狀五十七道有進止送尚書省更集百寮都商議定奏聞户部尚書王紹等五十人奏議請奉遷獻祖懿祖神主祔于德明興聖廟為修廟未成今月十五日內移獻祖主於德明興聖廟中一處安置九室數已定請於德明興聖廟東北量地之宜權設幕屋為行廟奉安神主候新廟成凖禮遷祔神主入新廟每至禘祫年各于本室行享禮其月十五日户部尚書王紹等又奏請於德明興聖廟添造兩室奉安神主今緣就舊廟增修則德明興聖廟殿南垣內陳設四室權安神主庶為宜稱勑旨從之是月十五日徙二祖神主于德明興聖廟二十四日有司行禘享于太廟自此景皇帝始居東向之尊元皇帝已下依左昭右穆之列矣時鴻臚卿王權議曰按祭法曰周人祖文王而宗武王故毛詩清廟章云清廟祀文王也不言太王王季也又按雍禘章疏云太王王季已上皆祔于后稷之廟蓋以太祖東向之位至公也太王王季之尊私禮也祔之后稷之廟天下為公不敢以私奪公也又按鄭玄注云祭法曰古者先王遷廟之主以昭穆合藏於始祖廟今獻祖懿祖之主愚臣竊以為宜祔于興聖廟不當祭於太廟也如此則太祖東向之位得其尊獻祖懿祖之位得其所也時前後議者亦多言祔于興聖廟然引據無文上意不決自寶厯已前太祖尚在昭穆位故虛東向以待太祖廣德二年太廟室數已滿二祖居夾室方正太祖東向之位凡十七年建中二年冬祫祭有司誤引東晉蔡謨議請虛東向當晉蔡謨議本請築宫廟以居潁川京兆以上四府君其宫廟未成以前請復虛東向之位待别廟成遷四府君神主于别廟然後太祖正東向之位雖有此議屬晉室兵革議不暇行建中初雖有司引蔡謨議虛東向之禮終亦不行乃誤以宣皇帝居東向降太祖在昭穆之位是時上覽羣臣之議以太祖居東向是百代不刋之典以二祖皆是追崇非有土宇人民之尊禮當别祔廟及覽權議引據詩禮成文上意遂定遷二祖于德明興聖廟每禘祫年一享遂正太祖東向之位乃下詔曰奉遷獻祖懿祖神主正太祖景皇帝東向之位虔告之禮當任重臣宜令檢校司空平章事杜佑攝太尉告太清宫門下侍郎平章事崔損攝太尉告太廟又下詔曰國之大事式在于明禋王者孝享莫重於殷祭所以尊祖而重昭穆也朕承列聖之休德荷上天之眷命虔奉牲幣二十五年永惟宗廟之位禘嘗之序夙夜祗栗不敢自専是用延訪公卿稽參古禮博考羣議至于再三敬以令辰奉遷獻祖宣帝神主懿祖光皇帝神主祔於德明興聖皇帝廟太祖景皇帝正向東之位宜令所司備禮務極嚴重祗肅祀典載深感惕咨爾中外宜悉朕懷會昌六年十月太常禮院奏嘗祀禘祫祝文稱號穆宗皇帝敬宗皇帝文宗皇帝武宗皇帝緣從前但序親以穆為皇兄未合禮文得修撰官朱儔狀稱伏以禮序尊尊不序親親陛下於穆宗敬宗武宗祝文恐須但稱嗣皇帝臣某昭告於穆宗以下四室勑旨令禮官同商量聞奏者臣與今博士閔慶之修撰官朱儔檢討官王皥同考禮經更無别議請依前狀從之仍付所司文德元年四月將行禘祭有司引舊儀禘德明興聖二廟及獻祖懿祖神主祔德明興聖廟通為四室時黃巢之亂廟已焚毁及是將行禘俾議其儀太常博士殷盈孫議曰臣以德明等四廟功非創業義止追封且于今朝年代極遙昭穆甚逺可依晉韋泓屋毁乃已之例因而廢之敕下百僚會議禮部員外郎薛昭緯奏議曰伏以禮貴從宜過猶不及祀有常典禮當據經謹按德明實為遐逺推諸厯代莫有其倫自古典禮該詳無踰周室后稷實始封之祖文王乃建極之君且不聞后稷之前别議立廟以至兩漢之於劉纍梁魏之於蕭曹稽彼簡書並無追號逮于興聖事非經據蓋以始王于涼遂列為祖類長沙於後漢之代等楚元於宋髙之朝悉無尊祀之名足為憲章之驗重以獻祖懿祖皆非宗有德而祖有功親盡宜祧禮當毁瘞遷于二廟亦出一時且武德之初議宗廟之事神堯聽之太宗參之碩學通儒森然在列而不議立臯陶涼武昭之廟蓋知其非所宜立也尊太祖代祖為帝而以獻祖為宣簡公懿祖為懿王卒不加帝號者謂其親盡則毁矣春秋左氏傳曰孔子在陳聞魯廟災曰其桓僖乎已而果如其言蓋以親盡不毁宜致天災炯然之徴不可忽也據太常禮院狀所引至德二年克復後不作𢎞農府君廟神主及晉韋泓屋毁乃已之議頗為明據深協禮經其興聖等四室請依禮院之議從之大順元年將行禘祭有司請以三太后神主附享於太廟三后者孝明太皇太后鄭氏宣宗皇帝母恭僖皇太后王氏敬宗皇帝母貞獻皇太后韋氏文宗皇帝母三后之崩皆作神主有故不當入太廟當時禮官建議並置别廟每年五享三年一禘五年一祫皆於本廟行事無奉神主入太廟之文至是亂離之後舊章散失禮院憑曲臺禮欲以三太后祔享太廟太常博士殷盈孫獻議非之曰臣謹按三太后憲宗穆宗之后也二帝已祔太廟三后所以立别廟者不可入太廟故也與帝在位皇后别廟不同今有司誤用王彥威曲臺禮禘别廟太后於太廟乖戾之甚臣竊究事體有五不可曲臺禮云别廟皇后禘祫於太廟祔於祖姑之下此乃皇后先崩已造神主夫在帝位如昭成肅明元獻昭德之比昭成肅明之崩也睿宗在位元獻之崩也玄宗在位昭德之崩也肅宗在位四后於太廟未有本室故創别廟當為太廟合食之主禘祫乃升太廟故未有位但祔祖姑之下今恭僖貞獻二太后皆穆宗之后恭僖會昌四年造神主合祔穆宗廟室時穆宗廟已祔武宗母宣懿皇后神主故為恭僖别立廟其神主直題云皇太后明其終安置别室不入太廟故也貞獻太后太中元年作神主别立廟其神主亦題為太后並與恭僖義同孝明咸通五年作神主合祔憲宗廟室憲宗廟已祔穆宗之母懿安皇后故孝明亦立别廟是懿宗祖母故題其神主為太皇太后與恭僖貞獻亦同帝在位后先作神主之例今以别廟太后神主禘祭升享太廟一不可也曲臺禮别廟皇后禘祫於太廟儀注云內常侍奉别廟皇后神主入置於廟庭赤黃褥位奏云某諡皇后禘祫祔享太廟然後以神主升今即須奏云某諡太皇太后且太廟中皇后神主二十一室今忽以皇太后入列於昭穆二不可也若但云某諡皇后即與所題都異神不可憑依此三不可也古今禮要云舊典周立薑嫄别廟四時祭薦及禘祫與七廟皆祭惟不可入太祖廟為别配魏文思甄后明帝母廟及寢依薑嫄之廟四時及禘皆與諸廟同此舊禮明文得以為證今以别廟太后禘祫於太廟四不可也所以置别廟太后以孝明不可與懿安並祔憲宗之室今禘享乃處懿安於舅姑之上此五不可也且祫合祭也合猶不入太祖之廟而况於禘乎竊以為並皆禘於廟為宜且恭僖貞獻二廟比在朱陽坊禘祫祔赴太廟皆須備法駕典禮甚重儀衛至多咸通之時纍遇大享耳目相接年代未遙人皆見聞事可詢訪非敢以臆斷也或曰以三廟故禘祫於别廟或可矣而將來有可疑焉謹按睿宗親盡已祧今昭成肅明二后同在夾室如或後代憲宗穆宗親盡已祧三太后神主其得不入夾室乎若遇禘祫即如之何對曰此又大誤也三太后若親盡合祧但當閟而不享安得處於夾室禘祫則就别廟行之厯代已來何嘗有别廟神主復入太廟夾室乎時宰相孔緯以大祭日迫不可邃改時人非之獻俘武德元年十一月二十三日秦王平薛仁杲凱旋獻俘于太廟二年五月二十四日秦王破宋金剛復并州地凱旋獻捷于太廟四年七月九日秦王平東都被金甲陳鐵馬一萬甲士三萬俘王世充竇建德及隋神器輦輅獻捷於太廟貞觀四年三月二十九日李靖俘頡利可汗獻捷于太廟二十三年正月阿史那社爾執龜茲王訶利布失畢及其相那利等獻于社廟太宗釋之以為左武衛大將軍永徽元年九月七日髙侃執單鼻可汗獻太廟顯慶三年十一月蘇定方俘賀魯到京師上謂侍臣曰賀魯背恩今欲先獻俘于昭陵可乎許敬宗對曰古者出師凱還則飲至策勳於廟若諸侯以王命討不庭亦獻俘於天子近代將軍征伐克捷亦用斯禮未聞獻俘于陵所也伏以園陵嚴敬義同清廟陛下孝思所發在禮無違亦可行也十五日還獻于昭陵十七日告于太廟皇帝臨軒大會文武百寮夷狄君長蘇定方戎服操賀魯獻于樂懸之北上責之不能對攝刑部尚書長孫沖跪于階下奏曰伊儼道獻俘賀魯請付所司大理官屬受之以出詔免其死顯慶五年正月左驍衛大將軍蘇定方討思結關俟斤都曼獻俘於東都上御乾陽殿定方操都曼等以獻法司請斬之定方請曰都曼反叛罪合誅夷臣欲生致闕廷與之有約述陛下好生之德必當待以不死今既面縛待罪臣望與其餘命上曰朕屈法申恩全卿信誓乃宥之總章元年十二月以髙麗平獻俘於含光殿大會李績及部將已下大陳設于廷乾封元年十月二十一日李績平髙麗還上令領髙藏等俘囚便道獻于昭陵仍備軍容奏凱歌于京城獻于太廟永隆二年十月定襄道大總管裴行儉執降俘突厥阿史那伏念等獻之初行儉以伏念許不死侍中裴炎害其功乃奏曰伏念為副將程務挺逼逐窘急而降上乃命斬于都市封行儉聞喜縣公行儉嘆曰渾濬前事古今同之但恐殺降之後無復來者因稱疾不出開元二十六年六月幽州節度使副大使張守圭大破契丹林胡遣使獻捷擇日告廟二十八年八月二十日敕幽州節度奏破奚契丹宜擇日告廟自後諸軍每有尅捷必先告廟上元元年閏四月赦節文其諸軍所獲首級除元惡之外一切不得傳送元和元年十月東川節度使髙崇文平西蜀生擒逆賊劉闢以獻上御興安門觀之命中使詰其叛狀劉闢曰臣不敢反五院子弟為惡臣不能制上曰朕遣中使送旌節等何為不受闢引罪無詞命斬于子城之西南隅二年八月平浙西擒逆賊李錡至闕下上御興安門親詰其反狀錡曰臣本不反張子良教臣上曰汝以宗臣為統帥子良為惡何不斬之而後入告錡不能對命獻太清宫太廟太社即與其男師回並腰斬于子城之西北隅十二年十一月唐鄧隋節度使李訴平淮西擒逆賊吳元濟以獻上御興安門大陳甲士旌旗於樓南文武羣臣皇親諸幕使人皆列位元濟既獻于太廟太社露布引之令武士執曳樓南攝刑部尚書王播奏請付所司制曰可大理卿受之以出斬於子城之西南隅十四年二月魏博節度使田𢎞正奏今月九日淄青兵馬使劉悟斬李師道二人首級請降上御興安門受田𢎞正所獻馘賊羣臣稱賀於樓下授劉悟義成軍節度使封彭城郡王李師道妻魏氏并女沒入掖庭堂弟師和配流嶺表長慶元年四月中書門下奏伏以太宗平突厥髙宗平髙麗皆告陵廟蓋以髙祖嘗蓄憤於突厥太宗鋭意于髙麗武功未終後聖繼志亦既平蕩所宜啓告伏以鎮冀一道幽薊八州不勞干戈盡復區宇豈必獻俘函首布告清廟下禮官擇日撰儀薦告太廟從之太和三年五月宣慰使諫議大夫柏耆奏斬李同捷于將陵倉丁亥御興安門下受滄州所獻俘其李同捷母妻并男元達等詔並宥之于湖南安置百僚稱賀於樓前翌日貶宣慰使柏耆為循州司户宣慰判官殿中侍御史沈亞之為虔州南康尉以擅入滄州取李同捷為諸鎮所怒奏論故也會昌四年二月河東監軍吕義忠奏擒賊楊辨元榮并同謀大將軍五十四人獻俘于闕下其年八月平澤路梟逆賊劉正傳首京師十八日御興安門受獻其日先告宗廟社稷畢文武及在京九品官宗子諸親蕃各諸道使客等並在樓前立班稱賀中元四年七月徐州節度使時溥函送黃巢首級以獻帝受俘獻於行廟光啓二年車駕幸興元邠州節度使朱玫立嗣襄王熅於京城十二月敗奔河中為王重榮斬首以獻上御興元城門閲俘受賀時太常博士殷盈孫獻議曰伏以偽熅違背宗社僭竊乘輿已就誅夷所宜稱賀然物議之間或有未允臣按禮經公族有罪獄既具有司聞于君曰某之罪在大辟君曰赦之如是者三有司走出致刑君復謂之曰雖然固當赦之有司曰不及矣君為之素服不舉樂三日今偽熅皇族也雖犯誅死之罪宜就屠戮其可以朝羣臣而賀乎臣以偽熅迫脅之際不能守節效死而乃甘心逆謀宜出為庶人絶其屬籍其首仍委所在以庶人禮葬其大捷之慶當以朱玫首級到日稱賀從之龍紀元年二月汴州行軍司馬李璠檻送秦宗權并妻趙氏上御延喜門受俘百寮稱賀于樓前以之徇市告社廟斬于獨栁樹乾寧二年十一月邠州行營兵馬都統斬王行瑜函首級獻于京師上御延喜門受俘馘百僚稱賀于樓前唐會要卷十四
