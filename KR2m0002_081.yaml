body:
  text: 唐㑹要卷八十一宋王溥撰勳舊制勳官上柱國已下至武騎尉為十二等有戰功者各隨髙下以受岑文本謂資髙而勳卑者皆從卑叙至貞觀十九年四月九日太宗欲重征遼之賞因下制授以勳級本據有功若不優異無申勸奬今討髙麗其從駕爰及水陸諸軍戰陳有功者並可聼從髙品上纍加六軍大悅顯慶元年九月二十二日置驃騎大將軍為武官散位從一品五年八月二十四日制郡公出身正六品下縣公從六品上侯正七品上伯正七品下子從七品上男從七品下龍朔五年七月詔諸王子承嫡者封郡王出身從四品下衆子封郡王出身從五品下咸亨五年二月以國初勳官名號與今日不同乃下詔申明各以類相比武德初光祿大夫比今日上柱國左光祿大夫比柱國右光祿大夫及上將軍比上護軍金紫光祿大夫及大將軍比護軍銀青光祿大夫及上開府比上輕車都尉正議大夫及開府比輕車都尉通議大夫上儀國比上騎都尉朝請大夫及儀同比騎都尉上大都督比驍騎尉大都督比飛騎尉郎都督比雲騎尉都督比武騎尉神龍亢年十月三日勑賜爵准式與國公者纍至郡公外餘爵聼廽授子孫若制勑四階先是四品已上者每階廽賜爵一級如及郡公外亦許廽授即計升至正六品上及正四品上准格例未合入五品三品者每一階廽賜勳一轉開元十七年十月諸叙勳應加轉者皆于勳官上加若無勳官一品驍騎尉叙三品于飛騎尉叙四品于雲騎尉叙五品已下于武騎尉叙其官當及免官免所居官計隆卑于此法者聼從髙叙司勳格加纍勳須具小勳攤銜送中書省及門下省勘㑹并注毁小勳甲然許纍加授武騎尉每一轉加一等諸勳官犯除名應叙者二品于驍騎尉等官二十四年二月五日勑凡刺史縣令與朕共理百姓寄任尤切等數宜加諸州都督刺史五府長史都護及縣令每有制加勳階賜物并同京官太和四年五月十五日司勳奏應考少未合叙三品階人准格請廽階充勳者每階聼廽充勳一轉如申文解到省檢勘差錯其勳便請落下㑹昌五年正月制上柱國前代勳謂之八柱國品居第一宜峻寵章自後非特恩不在纍叙之限天祐二年六月十六日敕司勳所掌勳及十一月二轉上柱國柱國上護軍護軍上輕車都尉輕車都尉上騎都尉騎都尉驍騎尉飛騎尉雲騎尉武騎尉等勳有遷陟以顯勤勞近年以來止叙柱國耻轉輕車殊不知一柱國已比二品上輕車已比四品官既叙烈勳頗亦近降今後宜復故事施行庶止僥幸之路階舊制叙階之法有以封爵謂嗣王郡王初出身從四品下叙親王諸子封郡王者從五品王國公縣公侯及伯子男遞减一等有以親戚謂皇親緦麻已上及皇太后周親正六品上叙皇太后大功親皇后周親從六品上皇袒免皇太后小功緦麻皇太后大功正七品上皇后小功緦麻皇太后妃周親從七品上外戚各依本降二等娶郡主正六品上娶縣主正七品上郡主出身從七品上縣主子從八品上叙有以勳庸謂上柱國正六品上叙柱國已下遞减一等有以資䕃謂一品子正七品上叙至從三品子遞降一等四品五品各有從正之差亦遞降一等從五品并國公子八品下叙三品已上䕃曽孫五品已上䕃孫孫降子一等曽孫降孫一等贈官降正官一等散官同執事若三品帶勳官即依勳官品同職事䕃四品降一等五品降二等郡縣公子准從五品孫縣男已上子降一等勳官一品子又降一等二王後子孫准正三品䕃有以秀孝謂秀才上上第正八品上叙以下遞降一等明經通一經進士明法甲第從九品上乙第降一等明經通二經已上每經加一階凡孝義旌表門閭者出身從九品上叙有以勞考內外六品已下四考滿皆中中考者進一階每中上考又進一階每一上下考進兩階若兼有下考得以上考除之應入三品五品者皆待别制而進之不然則否乾封元年正月十日敕文內外官九品以下加一階七品以上宜加一階八品已下更加勳一轉泛階自此始也至𢎞通元年十二月四日赦文見任內外官五品已上經四考及守五品經三考六品已下兩三考政有清勤狀無私犯者各加一階蘇氏記曰乾封已前未有泛階之恩應入三品者以恩舊制特拜入五品者因選叙計階至朝散大夫已上奏取進止每年量多少進取餘並從本品授官若滿三計者即一切聼人乾封以後始有泛階入五品三品者永淳元年正月詔曰比來文武官計至五品一計至者多未甄擢再計至者隨例必升賢愚一貫深乖奬勸今後一計至已上有在官清愼材堪應務者所司具狀録奏當與進階若公正無聞循然自守及未經任州縣官雖已屢經計至亦不在加階之限萬嵗通天元年七月四日制文武官加階應入五品者並須出身厯十三考已上進階之時見居六品及七品已上清官者應入三品取出身二十五考已上進階之時見居四品者自外縱計階應入並不在進階限其奇才異行别效殊功者不拘此例至開元十一年二月五日敕自今以後泛階應入五品以十六考為定及三品以三十考為定其名賢宿德及異跡殊狀雖不逄泛階或應改至次年始與節限同者亦以名聞仍永為恆式至其月二十八日內外官承泛階應入五品者制出日經三十考見任四品官本階正四品上其考須先己申考訖階須已授告身其新考雖未校成檢勘無勾留别犯亦許通計為考其校中侍御史補闕詹事司直京兆河南府判司太常博士應入品並同六品官例證聖元年懷州獲嘉縣尉劉知幾上表曰臣聞君不虛授臣無虛受授受無失是曰能官又曰妄受不為忠妄施不為惠此皆聖賢之通論也准漢世有賜爵一級恩澤封侯此曠古殊逄千載一遇非是頻煩渥澤每嵗常行者也今皇家始自文明迄于證聖其間不過十餘年耳海內具竂九品已上每嵗逄赦必賜階勳無功復獲賞徼幸實為深矣其釐務當官尸素尤衆無論官途規求仕進不希考第取達唯擬遭遇便遷或言得一品未脫碧衣待一階方被朱服遂乃早求笏帶先辦衫𫀆今日御承天門必是加勳一轉明日饗賔宣陽宫多應賜給一班既而於願果諧依期必獲得之者自謂已力受之者不以為慙至于野外宴聚公私集㑹緋服衆于青𫀆象板多于木笏望自今後稍節斯恩使士林載清人倫有叙聖厯二年三月制有能通九經者授朝議大夫通三經已上者進兩階並隨材擢用神龍元年八月二十一日敕六品以下官緣州縣改入上中下階品與元授不同者宜依舊任考滿日依本資選叙不須改動開元三年八月十七日敕官不濫升才無虛授惟名與器不可以假人左賢右戚豈資于繆賞駙馬都尉從五品階受自光朝頗虧前式逮穠華甫降紫艾先登不循舊章有紊彛典宜遵古訓已革踰弊俾九族無私千官有叙自今以後駙馬階宜依令式仍借紫金魚袋大厯十三年正月特加朝議郎守門下侍郎同平章事常衮九階為銀青光祿大夫貞元二年十月庫部郎中知制誥張濛奏伏准貞元元年十一月制三品已上賜爵一級四品以下加一階者臣謹詳制㫖本以三品已上其階已貴故賜爵四品以下其階未貴故加階伏緣請條不標所限司封據品通取職官其有官是三品已上階是四品以下者遂以階叙官又以官叙階爵比于官階等者受賜偏優臣欲准狀覆成則慮于比濫檢條破格復無以依慿官既隨用則遷階乃纍考方至泛恩叙爵理合從階若許參約職官伏恐競為僥覬臣今謹具賜爵例如前望為永式敕㫖依奏三年正月中書舍人髙參奏准貞元二年一月敕准制三品已上賜爵一級並以三品階為限者其有以五品受賜者並未標格限所司檢勘不備其貞元元年十二月制五品已上賜爵一級亦請以五品為限仍望為常式依奏六年六月吏部奏准格內外官承泛階應入五品者制出日須經一十六考見任六品官正階正六品上應入三品者制出日經三十考見任四品官本階加正四品自建中元年六月初有特敕諸道將士准制加泛階爵勳等特許不檢勘注擬其正員官不在此限日後有司因循以例破格應試官叙階並不限官品其中或官是九品階稱朝議郎或官是六品階稱正議大夫加一泛階並入三品五品伏以元敕令或不檢勘無不限官階之文若以例判或即隱違格令請别立條限漸歸舊章應將士兼試官叙泛階奏敕已到令入三品者矜其勞效須有優奬其官階相當並請不限考數檢當任一銜委實許與結叙其階髙官卑者請准格處分十年五月敕諸軍功狀內其判官等既各有年限并諸色文資官不合軍行自今以後更不得叙入戰功其掌書記及禮目官等亦宜准此如有灼然功效可録任具狀奏聞十二年四月裴延齡自朝請大夫特加銀青光祿大夫十五年十二月敕內侍省自今以後髙品官白身等官至五品已上合結朝散大夫等階及准各母妻合得邑號并結階纍勳階者並宜當司磨勘具狀銜奏來元和十三年六月制書云舊例皆云三品以上賜爵三品為銀青光祿大夫雲麾將軍已上若職是官雖是三品散官四品以下並不得叙爵但有三品以上散官雖四品職事官並合叙爵其所叙爵止于郡公其郡公更䝉賜爵即聼廽授其國公及封王並須特恩云在叙限其國公及封王准賜爵亦聼廽授其制書中有諸色職掌臨時處分其職掌即不限髙卑准制便叙有司更不得妄授須三品階例近日有司起請中往往有言其效叙爵須限職事三品官此乃深昧典章紊亂綱紀其叙階據制書舊例四品已下階四品謂正議大夫征武將軍部冗繁職官內外官叙三品者皆須文武散官至四品上叙五品者皆須文武散官至六品上如四品階並是通議大夫比武將軍以下六品階承議郎昭武副尉以下雖制書中纍加散階亦在不叙三品五品之限如一制中纍加散階亦不得先叙一階至正議大夫忠武將軍朝議郎昭武校尉因續取制書中所賜皆叙三品五品永宜禁斷如兩制書日月相近亦准前不得直須制書出時以正議大夫忠武將軍朝議郎昭武校尉已成方得叙三品縱制書中有優勞合加數階入三品止于銀青光祿大夫雲麾將軍入五品至于朝散大夫游擊將軍不在纍叙金紫光祿大夫冠軍大將軍以上階並須特恩不合纍叙其外命婦封內外官母妻各視其夫及子散官品今不得約職事官品文武五品階為縣君四品階為郡君三品以上階為郡夫人即止其國夫人須待特恩不在叙例如至郡夫人又有制書賜封即改為郡夫人受新恩履厯而已十三年六月中書省奏應叙録將士兼試官加泛階入正三品五品伏准貞元六年六月二十七日吏部所奏具有科條近日因循多不遵守遂名器踰濫升進無章須重申明冀絶僥幸自今以後應叙録入五品三品階者並請准前敕處分其餘正三品以上階准格式須有特恩不在用考纍叙之限從之㑹昌四年正月內侍省奏內侍省叙階長定格著紫供奉官及銜內有賜紫官叙階不得過金紫光祿大夫著緋供奉官及銜內有賜緋官叙階不得過正議大夫著緑供奉官及銜內有賜緋官叙階不得過朝議郎敕㫖內侍省官叙階起今以後宜依前件其有㑹昌二年四月准制合與擬階者便依此處分其銜內無賜緋官先校朝散大夫以上階者宜令仍舊不得輒與改轉以後如有特恩敕别宣與改轉者即不在此限永為定規用廕景龍二年七月七日皇后表請諸婦人不因夫子而加邑號者許同見任執事官聼子孫用廕制令施行開元四年十二月敕諸用廕出身者一品子正七品上二品子正七品下正三品子從七品上從三品子從七品下正四品子正八品上從四品子正八品下正五品子從八品上從五品子從八品下三品以上廕曽孫五品以上廕孫孫降子一等曽孫降孫一等贈官降正官廕一等死王事者與正官同散官同職事若三品帶勳者官即依勳官廕四品降一等五品降二等四品五品帶勳官者不在廕曽孫之限郡縣公子准從五品孫縣男已上子降一等勳官二品子又降一等即二王後子孫准正三品廕户部格敕應用五品以上官廕者須頭銜告身三道若厯任官少據所厯任勘如申送入色有假濫者州縣長官上佐判官録事參軍並與下考仍聼人糾告每告一家賞錢五十千錢出廕人及與廕家天寶二年九月二十七日詔頃叙功勞纍增勳級上柱國外許及周親是請賞延載榮宗族廽充賜物匪厚朝恩其准格上柱國外有餘勳無周親析給賜物宜停仍永為恆式六年正月十二日赦文內外文武官五品已上官父祖無替廕者其所用廕宜同子孫用廕之例大中十四年十二月鄭勳為吏部侍郎時有德音官階至朝散大夫許封贈至正議大夫廕一子至光祿大夫門設棨㦸一日內侍省髙品以階至正議請廕子仍校大厯中魚朝恩舊例上批曰正議大夫誠宜廕子比同髙品不拘此例自是無復請者考上武德二年二月上親閲羣臣考績以李綱孫伏伽為上第上初受禪以舞人安叱奴為散騎侍郎綱上疏論諌伏伽亦諌賞獻琵琶弓箭者及請擇正人為太子諸王師友皆言詞激切故皆陟其考第以旌寵之貞觀三年尚書右僕射房𤣥齡侍中王圭掌內外官考治書侍御史權萬紀奏其不平追按勘問王圭不伏舉按上付侯君集推問祕書監魏徴奏稱必不可推鞫且𤣥齡王圭國家重臣俱以忠直任使其所考者既多或一人兩人不當終非有阿私若即推繩此事便不可信任何以堪當重委假令錯謬有實未足虧損國家窮鞫若虛失委大臣之體且萬紀比來恆在考堂必有乖違足得論正當鑒見切無陳說身不得考方始糾彈徒發在上瞋怒非是誠心為國無益于上有損于下所惜傷于理體不敢有阿疏奏遂釋不問六年監察御史馬周上疏曰臣竊見流內九品已上令有等第而自比年入多者不過中上未有得上下以上考者臣謂今設九等正考當今之官必不施之于異代也縱朝廷實無好人猶應于見在之內比校其猶善者以為上第豈容皇朝之士遂無堪上下之考者朝廷獨知貶一惡人可以懲惡不知褒一善人足以勸善臣謂宜每年選天下政術尤最者一二人為上上其次為上中其次為上下則中人以上可以自勸十一年正月十五日敕散仕一切以門廕結階品然依勞進叙凡入仕之後遷代則以四考為限四考中中進年勞一階每一考進一階一考上上進二階五品已上非特恩刺史無進階之令上元二年大理寺丞狄仁傑考中正上考使尚書左僕射劉仁軌以新任不録大理卿張文瓘稱獨知理司之要仁軌大驚問分斷幾何獄文瓘曰嵗竟凡斷一萬七千八百人仁軌乃權為上下考高宗時滕王元嬰為金州刺史頗縱驕逸動作無度高宗書戒之極為至切又敕之曰朕以王骨肉至親不能致王于理今書王下下考以愧王心開耀元年十一月二十三日敕縣令有聲績可稱先宜進考員外郎侍御史京兆河南判司及自餘清望官先于縣令內簡擇開元三年正月五日敕內外官考未滿所司預備替人名為守闕特宜禁斷縱後有闕所由不得令上其年六月八日敕刺史能否郎官御史出日較量殿最定為五等奏聞考集日考使與左右丞戶部長官重詳覆類例考限內録奏以憑升黜四年四月七日敕選人既多比銓注過謝了皆不及考遂使每年選人即虛破一年闕在于公私俱不利便自今以後官人初上年宜聽計年終已來滿二百日許其成考仍准遷考例至來年考時併較永為恆式十四年御史大夫崔隱甫充校外官考事舊例皆委參問經春未定隱甫召天下朝集使一時集省中一日校考便畢時人伏其敏斷十七年三月中書舍人張垍其父左丞相說知京官考時注垍考曰父教子忠古之善訓祁奚舉午義不務私至潤色王言章施帝道載參墳典例絶常功恭聞前烈尤難委任豈以嫌疑敢撓綱紀考以上下時刑部尚書盧從願頻年充校京官考使中丞宇文融承恩用事以檢户口功本司校上下考從願抑不與之頗以為恨遂密奏從願廣占良田至有百頃上嘗擇宰相有薦從願者以此遂寢十八年敕京官考滿帶祿選有本司要籍奏留請不用闕者所有選數不須與成勞二十二年十二月十三日敕諸州考使六品已下朔望日朝宜准例賜食二十八年三月二日敕先是內外六品應補授官四考滿待替為滿是日制今以嵗為滿不待替縣令知倉庫供奉伎術及權充綱領等不在此限至其年十二月十六日敕內外六品已下官依舊待替其無替者五考滿後停天寶二年八月五日考功奏准考課令考前釐事不滿二百日不合成考者釐事謂都論在任日至考時有二百日即成考請假停務並不合破日比來多不㑹令文以為不入曹局即不為釐事因此破考臣等參量但請俸祿即同釐事請假不滿百日停務不至解免事雪却上其考並令不破若有停務逾年不可更請祿料兼與成考敕㫖從之八年正月二十三日敕所校內外官考准令京官正月二十日進單數二月二十日進挾名外官二月三十進單數三月三十日進挾名自今以後並了日一時挾名奏不須更進單數六月七日吏部侍郎李彭年奏准例出身以來並合檢覆中間已叙五品勘責皆有所憑今重檢尋恐為煩擾如曾經勘責叙任者請從五品以下勘檢其五品已前但勘考數足即為進叙敕㫖依乾元二年二月御製郭子儀李光弼苗晉卿李麟李輔國考辭寶應元年十月吏部奏准今年五月敕州縣官自今以後宜令三考一替者今數州申解疑三考後為復待替到為復便勒停請處分者今望令已校三考官待替到如替人不到請校四考後停二年正月考功奏請凡京外按察司京察連御史臺分察使外察連諸道觀察使各訪察官吏善惡其功過稍大事當奏者使司案成便奏每年九月三十日以前具狀報考功其功過雖小理堪懲勸者按成即報考功至校考日參事跡以為殿最閠月考功奏凡內外員外郎官等除合在定數外准敕並任其所適既不入曽無憑檢者比來或中者即與見在同奏檢勘之時或破不一文案混雜條流未明臣等啇量望請自今以後內外文武員外同正及試官除合在任外一切不在申校之限並聼從授日計考准中中例叙用從之大厯十三年正月敕捉獲造僞及光火強盜等賊合上考者本州府當申刑部建中初嚴震為興鳯兩州團練使治行為山南第一特賜上下考封鄖國公其年六月門下侍郎平章事盧耽奏准六典中書舍人給事中充監中外官考使依奏至三年閠正月復置監考使貞元元年九月以刑部尚書關播吏部侍郎班寵為校內外曹考使其年十二月敕六品已下本州申中上考者納銀錢一千市筆墨朱膠等者元置本五分生利吏部見有餘自今以後其外官京官考錢並停二年九月考功奏校京官外官考使准舊例差定聞奏敕其校考使宜停其考課赴所司准式校定三年三月詔以停减天下官員其停官計日成兩考者准舊成貫資准常式兩考以下至來年三月三十日處分四年正月𠡠文九品已上正員及額內官得省替者委諸長吏聞薦見任者三考勒停七年八月考功奏准考課今諸司官皆據每年功過行能定其考第又准開元天寶以前𠡠朝官每司有中上考亦有中中考自三年來諸司並一同申中上考亦且課績之義不合雷同事久因循遂廢朝典自今以後諸司朝官皆須據每年功過行能仍比類格文定其升降以書考第不得一例申中上考應諸司官長書考不當三品已上具銜牒上中書門下四品已下依格令各准所失輕重降考是月考功奏准諸司皆據功過三考過自至德後一切悉申中上考今請覆其能否以定升降過於至德從之自諌議大夫給事中郎官有書中中考者尚書左丞趙憬言前薦果州刺史韋正坐贓廢請降其考校考使吏部尚書劉滋以憬能言過奏中上考其年十二月校外官考使奏准考課今三品以上官及同中書門下平章事考並奏取裁注云親王及大都督亦同伏詳此文則職位崇重考績褒貶不在有司皆合上奏今緣諸州觀察刺史大都督府長史及上中下都督都護等有帶節度使者方鎮既崇名禮當異每嵗考績亦請奏减其非節度觀察等州府長官有帶臺省官者請由吏部八年七月班寵遷刑部侍郎兼京官校考使時右僕射崔寧兵部侍郎劉乃上下考究正議曰今要荒靖難專在節制尺籍伍符不校省司夫上多虛美之名下開趨競之路上行阿容下必朋黨因削去之乃謝之曰乃雖不美敢掠一美以徼二罪乎其年十月以刑部尚書劉滋為校外官考使吏部侍郎杜黃裳為校京官考使給事中李巽宜監京官考中書舍人鄭珣瑜宜監外官考九年七月制縣令以四考為限無替者宜至五考十年二月刑部奏准建中元年正月十七日敕諸司州五品以上正員及額內上佐宜四考停其佐降官不在此限者五品不降既不許停祿料六品已下未復資已經四考者未量移間其祿料伏望亦許准給敕㫖祿料宜准天寶六載七月十四日敕處分餘依常式十四載六月盧邁自司門郎中遷右諌議纍上表言時事轉給事中屬校定考課邁固讓以授官日近未有政績不敢當上考時人重之元和二年五月中書門下舉今年正月敕文上言國家故事于中書置具員簿以序內外庶官爰自近年因循遂廢清源正本莫急于斯今請京常參官五品已上前資見任起元和二年量定考數置具員簿應諸刺史次赤府少尹次赤令諸陵令五府司馬及東宫官除左右庶子王府官四品已下並請五考其臺官先定月數今請侍御史滿十三月殿中侍御史滿十八月監察侍御史依前二十五箇月與轉三省官並三考外餘官並四考外其文武官四品已下並五考商量與改尚書省四品已上餘文武官三品已上緣品秩已崇不可限以此例須有進改並聼特奏取進止其權知官須至兩考然後正授未經正授不得權用權知官資改轉其中緣官闕要人及緣事須有改移者即不在常格叙遷之限諸道及諸司副使行軍司馬判官參謀掌書記支使推官巡官等有敕充職掌帶檢校五品以上官及臺省官三考與改轉餘官四考與改轉元和七年敕使府參佐檢校試官從元授官月日計如是五品已上官及臺省官經三十箇月外任與改轉餘官經二十箇月奏改轉若是未經考使有故事及停替官本限之外更加十箇月即任申奏十四年十二月考功奏自今以後應注考狀但直言某邑行能某邑異政某邑樹置某邑勞效推斷某邑獄糾舉某邑事便言善惡不得更有虛美閒言其中以下考亦各言事狀然注考並不得失于褒貶如違據所失輕重准令降書考官考又奏自今以後其有政能卓異清苦絶倫者不在止于上下考限依奏尋又奏據寶應二年敕御史臺御史臺分察使及諸道觀察使訪察官吏善惡功過稍大事當奏聞者每年九月三十日具狀報考功至校日參驗事跡以為殿最伏以近日功過都不牒報今後諸司不申報者州府本判官便與下考在京諸司追節級紏處本判官敕課日量事大小黜陟敕㫖從之十五年刑部郎中權判考功馮宿奏宰相及三品已上官故事內校考别封以追翰林學士職居內署事莫能知請依前書上考課官御史亦仍舊並書中上考長慶元年正月考功員外郎李渤書宰相等下考太和六年七月敕今後諸州五品長馬權知者權知正授通計六考滿停其勒留官未滿六考停給課料准此却給唐㑹要卷八十一
