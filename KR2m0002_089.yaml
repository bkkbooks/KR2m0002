body:
  text: 唐會要卷八十九宋王溥撰疏鑿利人武德元年長孫操除陜東道行臺金部郎中遂自陜東引水入城以代井汲百姓賴之七年四月九日同州治中雲得臣開渠自龍門引黃河溉田六千餘頃貞觀十一年揚州大都督府長史李襲譽以江都俗好商賈不事農業譽乃引雷陂水又築句城塘溉田八百餘頃百姓獲其利大厯四年五月十五日敕注堰監先廢宜令却置十二年京兆尹黎幹開決鄭白二水支渠及稻田磑碾復奏浚水道以就陸田建中三年四月宰相楊炎不習邊事請于豐州置屯田發關輔人開陵陽渠人頗苦之京兆尹嚴郢嘗從事朔方曉其利害乃具五城舊屯及兵募倉儲等數奏曰按舊屯沃饒之地今十不耕一若力可墾闢不俟浚渠其諸屯水利可種之田甚廣蓋功力不及因致荒廢今若發兩京關輔人于豐州浚渠營田徒擾兆庶必無其利臣不敢逺引他事請以內園植稻明之且秦地膏腴田稱第一其內園丁皆京兆人于當處營田月一替其易可見然每人月給錢八千糧食在外內園丁猶僦募不給奏令府司集事計一丁一歲當錢九百六十米七斛二斗計所僦丁三百每歲合給錢二萬八千八百貫米二千一百六十斛不知歲終收穫幾何臣計所得不補所費况二千餘里發人出屯田一歲方替其糧榖從太原轉餉糟運價值至多又每人須給錢六百三十米七斛二斗私出資費數又倍之據其所收必不登本而關輔之人不免流散是虛擾畿甸而無益軍儲與天寶以前屯田事殊臣至愚不敢不熟計惟當省察疏奏不報郢又上奏曰伏以五城舊屯之數至廣臣前揭名聞奏訖其五城軍士若以今日所運開渠之糧貸諸城官田至冬輸之又以所送開渠功直布帛先給田者至冬令據時估輸穀如此即關輔免于徴發五城豐厚力農闢田比之浚渠十倍利也郢奏不省卒開陵陽渠而竟棄之貞元四年六月二十六日涇陽縣三白渠限口京兆尹鄭叔則奏六縣分水之處實為要害請凖諸堰例置監及丁夫守之奉敕旨依八年三月嗣曹王臯為荆南節度使觀察先是江陵東北七十里廢田旁漢右堤壤決凡二處每夏則為浸溢臯至命塞之廣良田五千頃畝收一種又規江南廢洲為廬舍架江為二橋流人自占者二千餘户自荆至樂鄉凡二百餘里旅舍鄉聚凡千數大者皆數百家楚俗佻薄舊不鑿井悉飲陂澤乃令合錢鑿井人以為便十三年七月詔曰昆明池俯近都城蒲魚所産宜令京兆尹韓臯充使修堰十六年十一月以東渭橋納給使徐班兼白渠漕渠及升原城國等渠堰使元和八年孟簡為常州刺史開漕右孟瀆長四十里得沃壤四十餘頃觀察使舉其課遂就賜金紫焉其年四月以神策軍士修城南灰渠其年十二月魏博觀察使田𢎞正奏凖詔開衛州黎陽縣古黃河道從鄭滑節度使薛平之請也先是滑州多水災其城西去黃河二里每夏漲溢則浸壞城郭水及羊馬之半平詢諸將吏得古河道于衛州黎陽縣界遣從事裴𢎞泰以水患告于𢎞正請開古河用分水力𢎞正遂與平皆上聞詔許之乃于鄭滑兩郡役徒萬人鑿古河南北長十四里東西闊六十步深二丈七尺決舊河以注新河遂無水患詔並褒美焉十三年湖州刺史于頔復城縣方山之西湖西湖南朝疏鑿溉田三千頃歲久堙廢至是復之粳稻捕魚之利賴以濟長慶二年溫造為朗州刺史奏開復鄉渠九十七里溉田二千頃郡人利之名為右史渠至太和五年七月造復為河陽節度使奏浚懷州方渠枋口堰役工四萬溉濟源河內溫武陟舊縣田五千頃四年七月詔疏靈州時逐渠置營田六百頃大厯二年二月以昭應令劉仁師充修渠堰副使初仁師為髙陵令上言鄭白渠可利者逺而涇陽獨有之條理上聞其弊遂革關中大賴焉其年三月內出水車樣令京兆府造水車散給沿鄭白渠百姓以溉水田磑碾開元九年正月京兆少尹李元紘奏疏三輔諸渠王公之家沿渠立磑以害水功一切毁之百姓大獲其利至廣德二年三月户部侍郎李栖筠奏請刑部侍郎王翊充京兆少尹翊奏拆京城北白渠上王公寺觀碾磑七十餘所廣水田之利計歲收粳稻三百萬石大厯十三年正月四日敕白渠下碾有妨廢合拆總四十四所自今已後如更置者即宜録奏其年正月壞京畿白渠八十餘所先是黎幹奏以鄭白支渠磑碾壅隔水利人不得溉灌請皆毁廢從之時升平公主上之愛女有磑兩輪乞留上曰吾為蒼生爾識吾意可為衆先遂即日毁之元和六年正月京城諸僧有以請莊磑免稅者宰臣李吉甫奏曰錢米所徴素有定額寬緇徒有餘之力配貧下無告之氓必不可許從之八年十二月敕應賜王公郡主并諸色莊宅碾磑等並任典貼貨賣其率稅夫役委府縣收管泉貨武德四年七月十日廢五銖錢行開元通寶錢徑八分重二銖四絫十文重一兩一千文重六斤四兩以輕重大小最為折𠂻逺近甚便之其錢文給事中歐陽詢製詞及書時稱其功其字含八分及篆𨽻二體其詞先上後下次右後左讀之自上及左回環讀之其義亦通流俗謂之開通元寶錢鄭虔會稡云詢初進蠟模因文德皇后捻一甲迹故錢上有捻文十八日置錢監于洛并幽益等諸州秦王齊王賜三爐鑄錢裴寂賜一爐敢有盜鑄者身死家口籍沒至五年三月二十四日桂州置錢監顯慶五年九月以天下惡錢多令為市取五惡錢酬一好錢至十月以好錢一文博惡錢兩文至儀鳳四年四月以天下惡錢多甚令東都出逺年糙米及粟就市糶斗别納惡錢百文其惡錢令少府司農相知即令搗破其重合斤兩者任將行用至先天元年九月二十七日京中用錢惡貨物踴貴諫議大夫楊虛受上疏曰伏見市井用錢不勝濫惡有加鐡錫即非公鑄虧損正道惑亂平人銅錫亂雜偽錢豐多正刑漸失于科條明罰未加于守長帝京三市人雜五方淫巧競馳侈偽成俗至于商賈積滯富豪擁鏹兼并之人歲增儲蓄貧素之士日有空虛公錢未益于時須禁法當求其大要其惡錢臣望官為傳取納鑄錢州京城並以好錢為用書奏付中書門下議詳以為擾政不行至開元六年正月十八日敕禁斷惡錢行三銖四分已上舊錢更收人間惡錢鎔破復鑄凖樣式錢敕禁出之後百姓喧然物價騰起商人不敢交易宰相宋璟蘇頲奏請出太府錢萬貫分于南北兩京平價買百姓問所賣之物堪貯庫官須者庶得好錢散行人間從之又降敕近斷惡錢恐人少錢行用其兩京文武官夏季平定物價宜即先給錢待後季任取所配物貨賣凖數還官七年二月詔天下惡錢並令禁斷禁令初下或恐艱辛冝量出米十萬石令府縣太府寺選交易穩便處所分置依時價糶與百姓收取惡錢便送少府監捶碎乾封元年五月二十三日盜鑄轉多遂改鑄新文曰乾封泉寶徑寸重二銖六分其開元通寶之舊錢並行用其新錢一文當舊錢之十周年之後舊錢並廢其後寤錢文之誤米帛增價乃議却用舊錢至二年正月二十九日詔比以偽濫斯起所以採乾封之號改鑄新錢靜而思之將為未可髙祖撥亂反正爰創軌模太宗立極承天無所改作今廢舊造新恐乖先旨其開元泉貨宜依舊施行為萬代法乾封新鑄錢令所司貯納更不須鑄仍令天下置爐之處並鑄開元通寶錢至乾元元年七月十六日詔錢貨之興其來久矣代有沿革時為重輕故周興九府實啓流泉之利漢造五銖亦𢎞改鑄之法必令小大兼適母子相權事有益于公私理宜循于通變御史中丞第五琦奏請改錢以一當十别為新鑄不廢舊錢兾實三官之資用收十倍之利所為于人不擾從古有經宜聽其請别鑄一當十錢其文曰乾元重寶琦又請鑄重輪錢一當五十以二十斤成貫仍令鑄錢使即勾當起鑄至三年十三日詔頃屬權臣變法非良遂使貨物相沿榖帛騰踴求之輿議弊實由斯今欲仍從舊貫漸罷新錢又慮權行轉實艱急如或猶循所務永塞其源實恐物價虛騰黎人失業靜言體要用藉良圖宜令文武百官九品以上並于尚書省集議委中書門下詳議聞奏至上元元年六月七日詔其重輪五十價錢宜減作三十文用其開元舊錢宜一錢十文行用乾元十當錢宜依前行用仍令京中及畿縣依此處分諸州待候進止至七月二十五日敕曰重稜五卜價錢先令畿外減三十價行其天下諸州並宜凖此至十二月二十九日詔應典貼莊宅店鋪田地碾磑等先為實錢與貼者令還以實錢贖先少虛錢與貼者令少虛錢贖其餘交關並依前用十當錢由是錢有虛實之稱至寶應元年五月十九日赦文應開元乾元重稜錢並宜凖一文用不須計以虛數開元二十二年三月二十一日敕布帛不可以尺寸為交易菽粟不可以杪忽貨有無古之立制以通貨幣豈無變通往者漢文之時已有放鑄之令雖見非于賈誼亦無廢于賢君况古往今來時異事反且欲不禁私鑄其理如何公卿百僚詳議可否祕書監崔沔議曰夫國之有錢時所通用若許私鑄人必競為各徇所求小如有利漸忘本業國計斯貧是以賈生之陳七福規于更漢令太公之創九府將以貧殷人况依法則不成違法則有利謹按漢書文帝雖降盜鑄錢令而不得雜以鉛錢為他巧者然則雖許私鑄不容姦錢鑄者無利則私鑄自息斯則除之與不除為法正等能謹於法而節其用令行而詐不起事變而姦不生斯所以稱賢君也今若聽其私鑄嚴斷惡錢官必得人人皆知禁誠則漢政可侔猶恐未若皇唐之舊也今若稅銅折役則官治可成計估度庸則私錢無利易而可久簡而難誣謹守舊章無越制度且夫錢之為物貴以通貨利不在多何待私鑄然後足用也左監門録事參軍劉秩議曰古者以珠玉為上幣黃金為中幣刀布為下幣管子曰夫三幣握之則非有補于暖也捨之則非有損于飽也先王以守財物以御人事而平天下也是以命之曰衡衡者使物一髙一下不得有常故與之在君奪之在君富之在君貧之在君是以人戴君如日月親君如父母用此術也是謂人主之權今之錢即古之下幣也陛下若捨之任人則上無以御下下無以事上其不可一也夫物賤則傷農錢輕則傷賈故善為國者觀物之貴賤錢之輕重夫物重則錢輕錢輕由乎物多多則作法收之使少則重重則作法布之使輕輕重之本必由乎是奈何而假于人其不可二也夫鑄錢不雜以鉛錫則無利雜以鉛錫則惡惡不重禁之不足以懲息且方今塞其私鑄之路人猶冒死以犯之况啓其源而欲人之從令乎是設陷穽而誘之入其不可三也夫許人鑄錢無利則人不鑄有利則人去南畝者衆去南畝者衆則草萊不墾草萊不墾又鄰于寒餒其不可四也夫人富溢則不可以賞勸貧餒則不可以威禁故法令不行人之不理皆由貧富之不齊也若許其鑄錢則貧者必不能為臣恐貧者彌貧而服役于富室富室乘之則益恣昔漢文之時吳濞諸侯也冨埒天子鄧通大夫也財侔王者此皆鑄錢之所致也必欲許其私鑄是與人利權而捨其柄其不可五也陛下必以錢重而傷本工費而利寡則臣願言其失以效愚計夫錢重者由人日滋于前而爐不加于舊又公錢重與銅之價頗等故盜鑄者破重為輕錢禁寬則行禁嚴則止止則棄矣此錢之所以少也夫鑄錢用不贍者在乎銅貴銅貴之由在于採用者衆夫銅以為兵則不如鐡以為器則不如漆禁之無害陛下何不禁于人禁于人則銅無所用銅無所用則銅益賤賤則錢之用給矣夫銅不布下則盜鑄者無因而鑄無因而鑄則公錢不破公錢不破則人不犯死刑錢又日增農末均利是一舉而四善也伏惟陛下熟察之其年十月六日敕貨物兼通將以利用而布帛為本錢刀是末賤本貴末為弊則深富教之間宜有變革自今以後所有莊宅口馬交易並先用絹布綾羅絲緯等其餘市價至一千以上亦令錢物兼用違者科罪二十六年于宣潤等州置錢監乾元元年七月户部侍郎第五琦以國用未足幣重貨輕乃先鑄乾元重寶錢以一當十用及作相請更鑄重輪乾元錢以當五十與乾元錢開元通寶錢三品並行既而物價騰貴餓逃死亡枕藉道路又盜鑄爭起中外皆以為琦變法之弊封聞奏日遂貶忠州長史四年六月判度支侍郎趙贊以常賦不足用乃請採鄆州白銅鑄大錢以一當十權其輕重建元元年九月户部侍郎韓洄上言江淮錢監嵗出錢四萬五十貫輸于京師度工用轉送之費每貫計錢二千匹夲反倍利也今商州紅崖冶出銅益多又有洛源監久廢不理請增工鑿山以取銅與洛源故監鑄錢以嵗計出錢七萬二十貫度用轉送之費計錢九百則利浮夲矣其江淮七監請皆停罷從之二月八日諸道鹽鐵使包佶奏江淮百姓近日市肆交易錢文益粗惡博擇納官者三分才有二分饒並鉛錫銅蕩不敷斤兩致使絹價騰貴惡錢並漸多訪聞諸州山野地窖皆有私錢轉相貨易姦隘漸深今委夲道觀察使明立賞罰切加禁斷貞元九年正月張滂奏諸州府公私諸司邑鑄造銅器雜物等伏以國家錢少損失多門興販之徒潛將鋪錢一千為銅六斤造寫雜用器物則斤直六百餘有利饒後銷鑄遂多江淮之間錢實減耗伏請凖從前敕文除鑄鏡外一切禁斷十年六月敕今後天下鑄造買賣銅器並不須禁止其器物約每斤價直不得過一百六十文委所在長吏及巡院同勾當訪察如有銷鑄為銅以盜鑄錢論罪十四年十二月鹽鐵使李選奏請諸道州府多以近日泉貨數少繒帛價輕禁止見錢不令出界致使課利有缺商賈不通諸指揮見錢其直往來勿使禁止從之元和元年二月禁私錢三年二月詔曰錢貴物賤傷農害工權其輕重須有通變比銅鉛無禁鼓鑄有妨其江淮諸州府收市銅鉛等先已令諸道知院官勾當緣令初出未各頒下宜委諸道觀察使等與知院官嚴切勾當事畢日仍委鹽鐡使據所得數會聞奏其年四月禁鉛錫錢三年五月鹽鐡使李選上言得湖南院中郴州平陽髙亭兩縣界有平陽冶及馬迹曲水等古銅坑納二百八十餘井差官撿覆實有銅錫今請郴州舊桂陽監置兩爐採銅鑄錢每日約二十貫計一年鑄成七千貫有益于人從之其年六月詔曰錢貨之法義在通流若錢有所壅貨當益賤故藏錢者得乘人之急居貨者必損己之資今欲著錢令以出滯藏加鼓鑄以資流布使商賈知禁農桑獲安義切救時情非欲利若革之無漸恐人或相驚應天下商賈先畜見錢者委所在長吏令收市貨物官中不得輒有程限逼迫商人任其貨易以求便利計周歲之後此法遍行朕當别立新規設蓄錢之禁所以先有告示許其方圓意在他時行法不貸又天下有銀之山必有銅礦銅者可資於鼓鑄銀者無益于民人權其重輕使務專一天下自五嶺以北見採銀坑並宜禁斷恐所在坑户不免失業各委本州府長吏課勸令其採銅助官中鑄作仍委鹽鐡使條疏聞奏四年閠三月敕京城時用錢每貫頭除二十文陌內欠錢及有鉛錫錢等貞元九年三月二十六日敕陌內欠錢法當禁斷慮因捉搦或亦生姦使人易從切于不擾自今以後有因交關用欠陌錢者宜但令本行頭及居停主人牙人等撿察送官如有容隱兼許賣物領錢人糾告其行頭主人牙人重加科罪府縣所由祗承人等並不須干擾若非因買賣自將于街衢行者一切勿問其年六月敕嶺已北所有銀坑依前任百姓開採禁見錢出嶺六年二月制公私交易十貫錢已上即須監用匹假委度支鹽鐵使及京兆尹即具作分數條疏聞奏茶商等公私使換見錢並須禁斷其年三月河東節度使王鍔奏請于當管蔚州界加置爐鑄銅錢廢管內銅器詔許之仍令加至五爐七年五月兵部尚書判户部事王紹户部侍郎判度支盧坦鹽鐡使王播等奏伏以京都時用多重見錢官中支計近日殊少蓋緣比來不許商人使換因兹家有滯藏所以物價轉高錢多不出臣等今商量伏請許令商人于户部度支鹽鐡三司任便換見錢一切依舊禁約伏以比來諸司諸使等或有便商人錢多留城中逐時收貯積藏私室無復流通伏請自今以後嚴加禁約從之八年四月敕以錢重貨輕出內庫五十萬貫令兩市收市布帛每端匹估加十之一十一年九月敕今後應內外支用錢宜每貫除墊一百外量抽五十文仍委本道本司本使據數逐季收計其諸道錢便差綱部送度支收管以偹軍須時以淮西用兵從有司之請也十二年正月敕泉貨之設故有常規將使重輕得宜是資斂散有節必通其變以利于人今繒帛轉賤公私俱弊宜出見錢五十萬貫令京兆府揀擇要便處開場依市價交易選清強官吏切加勾當仍各委本司先作處置條件聞奏必使事堪經久法可通行又敕近日布帛轉輕見錢漸少皆緣所在壅塞不得通流宜令京城內自文武寮不問品秩髙下并公郡縣主中使等下至士庶商旅寺觀坊市所有私貯見錢並不得過五千貫如有過此許從敕出後限一月內任將市别物收貯如錢數校多處置未了其任便于限內于地界州縣陳狀更請限縱有此色亦不得過兩月若一家內必有宅舍店鋪等所貯錢並須計同此數其兄弟本來異居曽經分拆者不在此限如限滿後有違犯者白身人等宜付所司決痛杖一頓處死其文武官及王公並委府司聞奏當重紏貶戚屬中使亦具名銜聞奏其見貯錢不限多少並勒納官數內五分取一分充賞錢止于五千貫此外察獲及有人論告亦重科處分并量給告者時京師里閭區肆所積多方鎮錢如王鍔韓𢎞李惟簡少者不下五十萬貫于是競買第屋以變其錢多者聽里巷傭僦以歸其直而髙資大賈者多依倚左右軍官錢為名府縣不得窮檢法竟不行十四年六月敕應屬諸軍使有犯時用錢每貫除二十文足陌內欠錢及有鉛錫銅者宜令京兆府枷項收禁牒報本軍本使府司差人就軍及看決二十如情狀難容復有違拒者仍令府司聞奏十五年八月中書門下奏伏凖庫官所議鑄錢或請收市人間銅物令州縣鑄錢當開元以前未置鹽鐵使亦令州郡勾當鑄造令若兩稅納匹段或慮兼要通用見錢欲令諸道公私銅器各納所在節度團練防禦經略使據元敕給與價直並折兩稅仍令本處軍人鎔鑄其鑄本請以留州使年支未用物充所鑄錢便充軍府州縣公用當處軍人自有糧賜亦校省本所資衆力并收衆銅天下併功速濟時用待一年後鑄器物盡則停其州府有出銅鉛可以開爐鑄處具申有司便令同諸鹽冶例每年與本充鑄其收市銅器期限並禁鑄造買賣銅物等待議定便令有司條疏聞奏其工部鑄錢及收銅器續處分將欲頒行尚資周慮請令中書門下兩省御史臺并諸司長官商量重議聞奏從之寶厯元年八月敕令銷鑄見錢為佛像者同盜鑄錢論長慶元年九月敕泉貨之義所貴流通如聞比來用錢所在除陌不一與其禁人之必犯未若從俗之所宜交易往來務令可守其外內公外給用錢從今以後宜每貫一例除墊八十以九百二十文成貫不得更有加除及陌內欠少太和三年六月中書門下奏凖元和四年閠三月敕應有鉛錫錢並合納官如有人糾得一錢賞百錢者當時敕條貴在峻切今詳事實必不可行祗如造一錢賞百錢則有告一百貫錫錢須賞一萬貫銅錢執此而行是無畔際昨因任清等犯罪施行不得遂參酌事理量為給賞或恐已後更有犯者宜立節文令可遵守臣等商量自今已後有用鉛錫錢交易者一貫以下以州府常行杖決脊杖二十十貫以下決六十徒三年過十貫以上所在集衆決殺其受鉛錫錢交易者亦凖此處分其所用鉛錫錢仍納官其能糾告者每貫賞錢五千文不滿一貫凖此例纍賞止于三百千仍取其官錢給付其所犯人罪不至死者仍徴家資充填賞錢其元和四年閏二月敕便望刪去敕旨依奏四年十一月敕應私鑄見錢家除合貯數外一萬貫至十萬貫限一周年內處置畢十萬至二十萬貫以下者限二周年內處置畢如有不守期限安然蓄積過本限即任人糾告及所由覺察其所犯家錢並凖元和十二年敕納官據數五分取一分充賞糾告人賞錢數止于五千貫應犯錢法人色目決斷科取凖元和十二年敕處分其所由覺察亦量賞一半事竟不行五年二月鹽鐵使奏湖南管內諸州百姓私鑄告到錢伏緣衡道數州連接嶺南山洞深邃百姓依模監司錢樣競鑄成脆惡姦錢轉將賤價博易與好錢相和行用其江西鄂嶽桂管嶺南等道應有出銅錫之處亦慮私鑄監錢並請委本道觀察使條疏禁絶敕旨宜依會昌六年二月敕緣諸道鼓鑄佛像鐘磬等新錢已有次第須令舊錢流布絹價稍增文武百寮俸料宜起三月一日並給見錢其一半先給虛估匹假對估價支給敕比緣錢重弊輕因令加鼓鑄必在流行通變救時莫切于此宜申先甲之令以戒居貨之徒京城及諸道起今年十月已後公私行用並取新錢其舊錢權停三數年如有違犯同用鉛錫惡錢例科斷其舊錢並納官事竟不行天佑二年四月敕凖向來事例每貫抽除外以八百五文為貫每陌八十五文如聞坊市之中多以八十為陌更有除折今後委河南府指揮市肆交易並須以八十五文為陌不得更改移唐會要卷八十九
