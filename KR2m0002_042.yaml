body:
  text: 唐會要卷四十二宋王溥撰厯武德元年五月太史令唐儉丞傳奕上言東都道士傅仁均能為厯算於是下詔令仁均與儉等議造唐厯是歲九月厯成仁均奏新術七事其一曰昔洛下閎以漢武太初元年歲在丁丑更厯起元元在丁丑今大唐以戊寅年受命甲子日登極所造之厯即上元之歲歲在戊寅命日又起甲子以三元之法一百八十去其積歲武德元年戊寅為上元之首則日月如合璧五星如連珠合於今日其二曰堯典云日短星昴以殷仲冬前代造厯莫能允合臣今創法五十餘年冬至輒差一度則却檢周漢千載無違其三曰經書日蝕毛詩為先十月之交朔日辛卯臣今立法却推得周幽王六年十月辛卯朔蝕即明其中間並皆符合其四曰春秋命厯序云魯僖公五年壬子朔旦冬至諸厯莫能符合臣今造厯却推僖公五年春正月壬子朔旦冬至則自斯以降並無差爽其五曰古厯日蝕或在于晦或在二日月蝕或有望前或在望後臣今立法月有三大小則日蝕常在于朔月蝕常在于望却檢魯史並無違爽其六曰前代造厯命辰不從子半命度不起虛中臣今造厯命辰起子半命度起于虛六度命辰得中于子符隂陽之始會厯術之宜其七曰前代諸厯月行或有晦猶東見朔以西朓臣今以遲速定朔永無此病疏奏上善之擢拜仁均員外散騎常侍尋改太史令明年遂施行戊寅元厯至武德三年大史奏正日望及二月八日朔當蝕比不效其後中書令封德彛奏言厯詔吏部郎中祖孝孫考其得失孝孫使算學博士王孝通以甲辰厯法駁仁均所繆仁均援引答難孝孫乃略去尤疏濶者餘依仁均舊時武德六年九月詔大理卿崔善為考正厯數善為所改凡三十餘條至貞觀元年將仕郎李淳風又奏駁太史􅍓十有八事詔下善為課二家得失其七改從淳風餘一十一條並依舊也十四年十一月甲子朔旦冬至初太史令傳仁均定厯以癸亥為朔旦詔下公卿八座詳議公卿已下奏曰伏見李淳風表猶古厯分目于子半勘得今歲十一月甲子朔子初一刻冬至故太史令傅仁均欲茍異張曹玄法減餘稍多子初為三刻用乖天正又南宫子明薛頤等並云自初及半日月全未相風子午之法推校春秋已來晷度薄蝕事皆符合奏勑付所司集衆詳加考定謹與國子祭酒孔頴達等一十一人尚書八座參議得失惟仁均定朔事有微差淳風推校理尤精密請從淳風議至十八年太史丞李淳風與司厯使士通等上言故太史令傅仁均武德初定厯代已來日月薄蝕或差于朔望者此由一月大一月小晦朔或致參錯應所制法三大三小日月之蝕必在朔望今依仁均造法一十九年為一章以定朔望之期然次年九月後四月頻大即仁均之術于古法有違詔令集諸解厯者詳之不能定其後制令所造厯還依傳仁均平朔法迄于麟德元年至二年十月二十日以袐閣郎李淳風所撰麟德厯頒于天下詔曰朕仰觀九曜傍總五家去其繁衍裁以要密古所未通今即備載而改之初占厯歲推甲子得於天正合朔之夜應以嘉祥五緯若連珠二曜如合璧此授農升平可致昔洛下閎漢厯律云後八百歲當有聖人受之自此以來將年八百矣當仁朕亦何讓宜即宣布永為詔範可名曰麟德來年以後行用之又太史瞿曇羅上經緯厯法九卷詔令與麟德厯參行𢎞道元年十二月太史頒厯是月當小盡去八月有勑來年正月宜用朔故加癸未焉三十日癸未神功二年閏十月二十六日制改正月為閏十月臘月二日為正月一日臘月詔曰頃者所司造厯以臘月為閏稽考史籍便紊舊章遂令歲之中晦仍見月重更尋討果差一日可以本月為閏十月來月為正月是歲得甲子合朔冬至神龍元年太史丞南宫説奏麟德厯加時浸踈乃詔更理乙巳厯至景龍中厯成詔令施用及睿宗即位寢廢不行開元十六年八月十六日特進張説進開元太衍厯命有司行用之先是九年太史頻奏日蝕不驗詔沙門一行刋定律厯上本顓頊下至麟德泊十五年一行遂奉詔旨成之因編以勒成一部經章十卷長厯五卷厯議十卷立成法天竺九厯二卷古今厯書二十四卷凡例奏章一卷凡五十二卷乾元元年六月十七日頒山人韓頴等所造新厯每節後加舊厯四刻代宗用郭獻之五紀厯德宗用徐承嗣貞元厯元和二年二月司天造新厯成獻之詔名元和觀象厯渾儀圖貞觀初李淳風上言靈臺候儀是後魏遺範法制踈略難為占步上因令淳風改造渾儀鑄銅為之至七年三月十六日直太史將仕郎李淳風鑄渾天黃道儀成奏之置于凝暉閣其制度以銅為之表裏三重下據準基如十字末樹鼇足以表四極焉第一儀名六合儀有天經雙規金渾規相結于四極之內備二十八宿十干三辰經緯三百五十五度第二儀名三辰儀圜徑八尺有璿璣規黃道規月逰規天宿短度七曜所行並備於此轉於六合之內第三儀名四逰儀玄樞為軸以連玉衡逰筒而貫約拒地軸傍轉于內又玉衡在樞之間而南北逰仰以觀天之辰宿下以識器之晷度因撰法象志七卷以論前代渾儀得失之差開元八年六月十五日左金吾衛長史南宫説奏渾天圖空有其書今臣既修九曜占書須要量校星象望請造兩枚一進內一留曹司占驗許之至九年太史頻奏日蝕不效詔改新厯沙門一行奏云今欲創厯立元須知黃道進退請更令太史測候星度有司云承前唯依赤道推步官無黃道逰儀無由測候時率府兵曹參軍梁令瓚待制于麗正書院因起遊儀本樣甚為精密一行乃上言曰黃道逰儀古有其術而無其器以黃道隨天運動難用常儀格之故昔人潛思皆不能得今梁令瓚創造此圖日道月交莫不自然契合既于推步尤要望就書院更以銅為之庶得考驗星度無有差舛從之至十二年造成又上疏曰舜典云在璿璣玉衡以齊七政説者以為取其運轉者為樞持正者為衡皆以玉為之用齊七政之變知其盈縮進退七政之所在即古太史渾天儀也自周室衰微疇人喪職其制度儀象莫有傳者漢興丞相張蒼首創律厯之學至武帝詔司馬遷等更造漢厯乃定東西立晷儀下漏刻以追二十八宿相距晷度與古不同故唐都分天部洛下閎運算轉厯今赤道厯度則其遺法也後漢永元中左中郎將賈逵奏曰臣前上傅安等用黃道度日月弦望多合近太史官一以赤道度之不與天合願請太史官日月宿簿及星辰晷度與待詔星象考校奏可得典星待詔姚崇等十二人皆曰星圖有規法日月實從黃道官無其器不知施行甘露二年大司農中丞耿壽昌奏以圖儀度日月行考驗天運日月行赤道至牽牛東井日行十五度至婁角日行一度月行十三度此前代所共知也是歲永元四年也明年始詔太史造黃道銅儀冬至日在斗十九度四分度之一與赤道儀定差二度史官以校日月弦望雖密近而不為望日銅儀黃道與度運轉難候驗是以少條其事其後劉洪因黃道渾儀以考月行出入遲速而後世理厯者不遵其法更從赤道命之以驗賈逵所言差謬益甚此理之大惑也今靈臺鐵儀後魏明元時都匠斛蘭所造規製朴略度刻不均赤道不動乃如膠柱不置黃道進退無準此據赤道月行以驗入厯遲速多者或至十七度少者僅出十度不足以上稽天象敬授人時近祕閣郎中李淳風著法象志備載黃道渾儀法以玉衡旋規别帶日道傍引二百四十九交以推月逰用法煩雜其術竟寢臣伏承恩旨更造遊儀使赤道運行以追列舍之變因二分之中以立黃道交于軫奎之間二至陟降凡二十四度黃道之內又施白道月環用究隂陽朓朒之數動合天運簡而易從足以制器垂象永傳不朽于是上親為制銘置之于靈臺以考星度二十八宿及中外官與古經不同者凡數十條又詔一行與梁令瓚及諸術士更造渾天儀鑄銅為之若圓天之象上具列宿赤道及周天度數注水激輪令其自轉一日一夜天轉一周又别立二輪絡在天外綴以日月令得運行每天西轉一匝日東行一度月行十三度十九分度之七凡二十九轉有餘而日月會三百六十五轉而日行匝仍置木匱以為地平令儀半在地上半在地下晦明朔望遲速有準又立二木人于平地之上前置鍾鼓以候辰刻每一刻則自然擊鼓每一辰則自然撞鍾皆于匱中各施軸鈎交錯關鎖相持既與天道合同當時甚稱其妙鑄成命之曰水運渾天俯視圖置于武成殿前以示百寮無幾而銅鐵漸澀不能自轉遂收置于集賢院不復行測景儀鳳四年五月太常博士檢校太史令姚玄辨奏于陽城測景臺依古法立八尺表夏至日中測景有一尺五寸正與古法同調露元年十一月十一日所得圭長一丈二尺七寸開元十二年四月二十三日命太史監南宫説及太史官大相元太等馳傳往安南朗蔡蔚等州測候日影回日奏聞數年伺候及還京與一行師一時校之安南景北極髙二十一丈六分冬至日影七尺九寸四分春秋二分影二尺九寸三分夏至影在表南三寸三分測影使者大相元太云交州望極緩出地三十餘度以八月自海中南望老人星殊髙老人星下環星粲然其明大者甚衆史不載莫辨其名大率去南極二十度已上其星皆見乃古渾天家以為常沒地中伏而不見之所也蔚州橫野軍北髙四十度冬至影一丈五尺八寸九分春秋二分影六尺六寸二分夏至影在表北二寸九分此正所為中土南北之極其即兖蔡許河南府滑太原等州各有使往並差不同一行以南北日影校量用勾股法算之云大約南北極相去才八萬餘里其諸州測影尺寸如左林邑國北極髙十七度冬至影在表北六尺九寸定春秋分影在表北二尺八寸五分夏至影在表南五寸七分安南都護府北極髙二十一度六分冬至影在表北七尺九寸四分定春秋分影在表北二尺九寸三分夏至影在表南三寸三分朗州武陵縣北極髙二十九度五分冬至影在表北一丈五尺三分定春秋分影在表北四尺四寸七分夏至影在表北七寸七分襄州常春分影在表北四尺八寸蔡州武津館北極高三十度八分冬至影在表北一丈二尺三寸八分定春秋分影在表北五尺二寸八分夏至影在表北一尺四寸四分許州扶溝北極髙三十四度三分冬至影在表北一丈一尺五寸定春秋分影在表北五尺三寸七分夏至影在表北一尺四寸四分河南府郜城北極髙三十四度七分冬至影在表北一丈二尺七寸一分定春秋分影在表北五尺四寸五分夏至影在表北一尺四寸九分汴州浚儀大嶽臺北極髙三十四度八分冬至影在表北三丈二尺八寸五分定春秋分影在表北五尺五寸夏至影在表北一尺五寸三分滑州白馬北極髙三十五度三分冬至影在表北一丈三尺定春秋分影在表北五寸六分夏至影在表北五寸七分太原府常春分影在表北六尺蔚州橫野軍北極髙三十度冬至影在表北一丈五尺八寸九分定春秋分影在表北六尺六寸二分夏至影在表北二尺二寸九分地震貞觀十二年正月二十一日松叢二州地震壞人廬舍二十年九月十五日靈州地震有聲如雷二十三年八月晉州地震壞人廬舍壓死者五千餘人三日震十一月五日又震永徽元年四月一日又震六月十二日又震上以晉州屢震謂羣臣曰朕政教不明使晉地屢有震動侍中張行成曰天陽也地陰也陽君象陰臣象君宜轉動臣宜安靜今晉州地震彌旬不休將恐女謁用事大臣陰謀且晉州陛下本封今地屢震尤彰其應伏願深思逺慮以杜其萌開元二十二年二月十八日秦州地震令倉部員外郎韋伯陽宣慰又令左丞相蕭嵩致祭山川所損之家委隨事處置聞奏先是秦州百姓聞州西北地下殷殷有聲俄而地震廨宇及居人廬舍悉崩毁地裂而復合連時不定計殺官吏及百姓四千餘人至德元年十一月河西地震有聲坼裂陷廬舍張掖酒泉尤甚二年三月河西又震大厯四年二月十六日夜京師地震有聲如雷建中四年三月甲子京師地震生毛或白或黃有長尺餘者其年五月辛巳夜京師地又震貞元二年十一月京師地夕三震巢鳥驚散東都關輔地並震四年正月庚戌上御丹鳳門宣赦是夕京師地震辛亥又震丁卯又震庚午又震詔修政以答天譴癸酉又震乙亥又震是月金州房州地震尤甚江溢山裂屋宇摧壞至二月辛未又震甲申又震乙酉又震丙申又震己未京師又震庚午又震三月甲寅又震四月丙寅又震八月甲午又震其聲如雷上謂宰相曰朕寡德地數震當修政道以答災譴甲午又震九年四月辛酉京師地震有聲如雷河中關輔尤甚壞屋壁廬舍或地裂湧出水十年夏四月戊申京師地震癸丑又震十三年七月乙未司天監奏今日午時地震從東來須臾而止元和七年八月京師地震上謂宰臣曰昨者地震草樹皆動搖何祥也宰相李綘曰在昔玄元皇帝以大聖明睿通于天人之理因周三川之震云天地之氣不過其序若過其序人政亂也人政乖錯則上感陰陽之氣陽伏而不能出陰迫而不能勝于是有地震日蝕蓋地載萬物日為君象政有感傷天地變異春秋書之示戒用警後王伏願陛下勉保虔恭之誡動以利萬物綏萬方為慮則變異自銷休徵可致九年三月丙辰嶲州地震晝夜八十震壞廬舍死傷者百餘人十五年閏正月京師地震半刻已下太和九年四月京師地震瓦屋皆墮二年十一月乙丑京師地震大中三年十一月京師地震振武天德靈武夏州鹽州皆奏地大震壞軍城廬舍雲迦鎮使及荆南押防秋兵馬小使並壓死儀卒死者數十輩十四年五月庚戌京師地震山谷禽獸驚走咸通八年五月丁未河中晉絳上言地大震廬舍壓仆傷人乾符三年雅州奏自六月地震至七月不止日蝕髙祖朝四武德元年十月壬申朔四年八月丙戌朔六年十二月壬寅朔九年十月丙辰朔太宗朝十五貞觀元年閏三月癸丑朔九月庚戌朔二年三月戊申朔七月乙巳朔三年八月己巳朔四年正月丁卯朔六年正月乙卯朔九年閏四月丙寅朔十一年三月丙戌朔十二年閏二月庚辰朔十三年八月辛未朔十七年六月己卯朔十八年十月辛丑朔二十年閏三月癸巳朔二十二年八月己酉朔髙宗朝十二顯慶五年六月庚午朔乾封二年八月己丑朔總章二年六月戊申朔咸亨元年六月壬寅朔二年十一月甲午朔三年十一月壬申朔上元元年三月辛亥朔調露二年四月乙巳朔十一月壬申朔開耀元年十月丙寅朔永淳元年四月甲子朔十一月庚申朔天后朝十三垂拱二年二月辛未朔四年六月丁亥朔天授二年四月壬寅朔如意元年四月丙申朔長夀二年九月丁亥朔三年九月壬午朔延載元年九月壬午朔證聖元年二月己酉朔聖厯三年五月乙酉朔久視元年五月己酉朔長安二年九月乙丑朔三年三月壬戌朔九月庚寅朔中宗朝二神龍三年六月丁卯朔景龍元年十二月己丑朔睿宗朝一太極元年二月丁卯朔玄宗朝十七先天元年九月丁卯朔開元三年七月庚辰朔六年五月乙丑朔七年五月己丑朔九年九月乙巳朔十二年閏十二月丙辰朔十七年十月戊午朔二十年二月癸酉朔八月辛未朔二十一年七月乙丑朔二十二年十二月戊子朔二十三年閏十一月壬午朔二十六年九月丙申朔二十八年三月丁亥朔天寶元年七月癸卯朔五載五月壬子朔十三載六月乙丑朔肅宗朝二上元二年七月己未朔既大星見至德元年十月辛巳朔代宗朝二大厯三年己巳朔四年正月庚午朔德宗朝七貞元三年八月辛巳朔日有蝕之有司準禮將伐鼓于社未許大常卿董晉奏曰伐鼓于社所以責羣隂助陽光也所宣詔命不合經義奏請不報竟不伐鼓六年正月戊戌朔先是有司奏元日太陽虧遂罷朝會至時不蝕百寮稱賀七年六月庚寅先是司天奏是日太陽虧至時以隂雲不見百寮稱賀八年十一月壬子朔日有蝕之上不視朝司天監徐承嗣奏據厯數合蝕八分今退蝕三分計減強半準占君盛明則隂匿而潛退請宣示朝廷編諸史册詔付所司十年三月壬寅司天奏四月癸卯朔太陽虧已後五刻食既未後五刻復滿者舊例合宣行太常博士薑公復狀奏準開元禮太陽虧皇帝不視事其朝會合停勑旨依奏至時隂雲不見百官表賀十二年八月朔十七年五月壬戌朔憲宗朝五元和三年七月癸巳上謂宰臣曰昨太史奏太陽虧及朔日上瞻如言皆驗其故何也又素服救日之儀有何所憑李吉甫對曰日月運行遲速不齊凡周天三百六十五度有餘日行一度月行十二度有餘卒二十九日半而與日會又月行有南北九道之異或進或退若晦朔之交又南北同道即日為月之所掩故有薄蝕之變雖自然常數可以推步然日為陽精當人君之象若君行有緩急即日為之遲速稍逾常制為月所掩即隂侵於陽亦猶人君行或失中應感所致故禮記云男教不修陽事不得謫見于天日為之蝕婦順不修隂事不得謫見于天月為之蝕古者日蝕則天子素服而修六官之職月蝕則后素服而修六宫之職皆所以懼天戒自省惕也君人者居物之上易為驕盈故聖人制禮務乾乾夕惕以奉順天道茍德備則天人合應百福來臻陛下恭已嚮明日慎一日又顧憂天譴則聖德益固升平何逺伏望長保睿志以永無疆之休臣等不勝欣感之至因與同列稱賀上深然其言謂吉甫等曰書傳皆言天之交感妖祥應事蓋如卿説且素服救日乃自貶之旨朕自惟不德實懼有以致譴咎載深兢惕卿等當悉務理匡我不逮也十年八月己亥朔十三年六月壬子朔穆宗朝一長慶二年三月太禮院奏四月一日太陽虧準開元禮其日廢務皇帝不視事居數日上謂户部尚書韋綬曰災可禳福可禱乎對曰可以德禳宋景公善言而妖星為之退舍是也福不可以求致故漢文帝於祠祀命有司敬而不祈用能變已成之災享自致之福著于史傳其理甚明今人或不慎行以祈災銷媚于神而冀福至神茍有知當因致譴上深然其言文宗朝三太和八年二月壬午朔開成元年正月丙辰朔二年十二月庚寅朔司天奏是日太陽虧至時隂雪不見武宗朝四會昌三年二月庚申朔四年三月甲寅朔五年七月丙午朔六年十二月戊辰朔宣宗朝一大中二年五月己未朔昭宗朝一天祐元年十月辛卯朔蝕在心宿初度十五分之三哀帝朝一天祐三年四月癸未朔蝕在十三度屬趙分太常禮院奏準故事伐鼓于社皇帝素服避正殿百官素服各守本局于廳事前重行每等異位向日端立俟復明而止月蝕髙祖朝八武德元年九月丁巳望二年閏二月己卯望四年十二月丁卯望六年六月庚申望十二月丁巳望七年十一月乙卯望八年四月乙卯望九年十月庚午望太宗朝十八貞觀二年二月壬辰望三年二月丁亥望八月甲申望四年七月戊寅望六年六月丁酉望十一月乙未望七年五月辛卯望九年九月戊申望十一年九月丁酉望十三年正月乙未望十四年七月庚戌望十二月丁未望十五年十二月乙酉望十七年十月辛酉望十八年十月乙卯望二十一年八月庚申望二十二年四月乙巳望二十三年十二月乙酉望髙宗朝二十五永徽元年六月壬午望十二月辛巳望二年六月丁丑望十一月甲戌望四年十月癸巳望五年九月戊子望顯慶二年閏正月甲辰望七月辛丑望龍朔元年十一月丙午望二年五月甲申望麟德元年九月庚申望乾封二年閏十二月辛未望總章元年十二月庚申望咸亨元年六月丁巳望三年四月壬戌望十月癸丑望四年四月庚午望上元二年八月丙戌望儀鳳元年二月甲申望二年七月乙亥望永隆元年九月乙酉望十二月丁酉望永淳元年三月戊申望二年九月庚子望天后朝十九文明元年二月丁巳望八月甲午望垂拱二年七月癸丑望三年十月乙巳望四年六月辛巳望永昌元年十月甲子望載初元年四月辛酉望天授二年十月乙酉望長夀二年二月乙亥望證聖元年七月辛酉望通天二年六月乙酉望聖厯二年正月癸未望三年正月丙寅望九月辛卯望大足元年九月乙酉望長安二年九月庚辰望三年八月癸酉望四年正月壬寅望七月戊戌望中宗朝三神龍元年正月丙申望二年十二月甲申望景龍元年十月己丑望睿宗朝二景雲二年八月丁巳望太極元年三月乙卯望八月辛未望玄宗朝十一開元二年十二月戊辰望三年十二月壬戌望四年六月庚申望五年五月甲寅望六年十月丙子望十年二月丁亥望十一年正月辛巳望七月戊寅望十二年七月癸酉望天寶三年十一月丁未望肅宗朝二乾元二年二月癸酉望八月丁卯望代宗朝二寶應元年十二月庚申望永泰三年三月辛未望蘇氏曰載月甚詳然仲尼修春秋二百四十二年日星之變必書而月蝕不紀解之者云月諸侯道也外蕃象也彼有虧則王者中國之政勝矣故不謂為災或云蓋取詩人彼月而蝕則惟其常之義會要亦國史之支也學于史宜取法春秋以是皆不書唐會要卷四十二
