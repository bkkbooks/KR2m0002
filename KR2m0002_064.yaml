body:
  text: 唐㑹要卷六十四宋王溥撰史館雜録下長安三年張易之昌宗欲作亂將圖皇太子遂譛御史大夫知政事魏元忠昌宗奏言可用鳳閣舍人張說為證說初不許遂賂以髙官說被逼迫乃僞許之昌乃奏元忠與太平公主所寵司禮丞髙戩交通密謀搆造飛語曰主上老矣吾屬當挾皇太子可謂耐久時則天春秋髙惡聞其語鳳閣侍郎宋璟恐說阿意乃謂曰大丈夫當守死善道殿中侍御史張廷圭又謂曰朝聞道夕死可矣起居郎劉知幾又謂曰無汚青史為子孫纍明日上引皇太子相王及宰相等於殿庭遣昌宗與元忠髙戩對於上前上謂曰具述其事說對曰臣今日對百寮請以實録因厲聲言魏元忠實不反總是昌宗令臣誣枉耳是日百寮震懼上聞說此對謂宰相曰張說傾巧翻覆小人且總收禁侍更勘問異日又召依前對問昌宗乃屢誘掖逼促之說視昌宗言曰乞陛下看取天子前尚逼臣如此况元忠實無反語奈何欲令臣空虛加誣其罪今大事去矣伏願記之易之昌宗必亂社稷天后默然令所司且收掌諌議大夫知政事朱敬則密表奏曰魏元忠素稱忠正張說又所坐無名俱令抵罪恐失天下之望願加詳察乃貶元忠為髙要尉說流欽州時人議曰昌宗等包藏禍心遂與說計議欲擬謀害大臣宋璟等知說巧詐恐損良善遂與之言令其內省向說元來不許昌宗虛證元忠必無今日之事乃是自招其咎賴識通變轉禍為福不然皇嗣殆將危矣後數年說拜黃門侍郎同中書門下平章事因至史館讀則天實録見論證對元忠事乃謂著作佐郎兼修史吳兢曰劉五修實録劉五即子𤣥也論魏齊公事乃不相饒假與說毒手當時說驗知是吳兢書之所以假託劉子𤣥兢從容對曰是兢書之非劉公修述草本猶在其人已亡不可誣在於幽魂令相公有怪耳同修史官蘇宋等見兢此對深驚異之乃嘆曰昔董狐古之良史即今是焉說自後頻祈請刪削數字兢曰若取人情何名為直筆景龍二年四月二十日侍中紀處訥中書令楊再思兵部侍郎宗楚客中書侍郎蕭至忠並監修國史其後史官太子中允劉知幾以監修者多甚為國史之弊於是求罷史職奏記於蕭至忠曰知幾自䇿名仕伍侍罪朝列三為史臣再入東觀竟不能勒成國典貽彼後來者何哉靜言思之有不可五也何者古之國史皆出自一家如魯漢之丘明子長晉齊之董狐南史咸能立言不朽藏諸名山未聞藉以衆功方云絶筆唯後漢東觀大集羣儒著述無序條章靡立由是伯度譏其不實公理以為可焚張蔡二子糾之於當代傅范兩家嗤之於後葉今者史司取士有倍東京人自以為荀袁家自稱於政駿每欲記一事載一言皆閣筆相視含毫不斷故首白可期而汗青無日其不可一也前漢郡國計書先上太史副上丞相後漢公卿所撰始集公府乃上蘭臺由是史官所修載事為博爰自近古此道不行史臣編録唯自詢採而左右二史闕注起居衣冠百家罕通行狀求風俗于州縣視聽不該討沿革於臺閣簿籍難見其不可二也昔董狐之書法也以示於朝南史之書弒也執簡以往近代史局皆通籍禁門幽居九重欲人不見尋其義者蓋由杜彼顔面防諸請謁故也然今館中作者多士如林皆願長喙無聞䶦舌倘有五始初成一字加貶言未絶口而朝野具知筆不灑毫而縉紳咸誦夫孫盛實録取嫉權門王韶直書見讎貴族人之情也能無畏乎其不可三也今史官注記多取稟監修楊令公則云必須直詞宋尚書則曰宜多隱惡十羊九牧其命難行一國三公適從焉在其不可四也竊以史官監修雖無古式尋其名號可得而言夫監者蓋總領之義耳如創紀編年則年有斷限草𫝊叙事則事有豐約或可略而不略或應書而不書此刋削之務也屬詞比事勞逸宜均揮鉛奮墨勤惰須等某帙某篇付之此職某紀某𫝊歸之彼官此銓配之理也斯並宜明立科條審定區域倘人思自勉則書可立成監之者既不指授修之者又無遵奉坐變炎凉徒延嵗月其不可五也而時談物議焉得笑僕編次無聞者哉至忠惜其才不許解史職宗楚客嫉其正直謂諸史官曰此人作書如是欲置我於何地知幾又著史通二十卷開元五年十月十八日詔曰王者欽若天道率由時令考六官之化循五紀之法故得災害不生休徵洊委夫正月東郊祈春賞士孟冬北陸迎寒恤孤參四序之運行稽五材之動用不協所尚或罹於咎自今已後每八月史官條奏應所行事當斟酌典禮用孚於休宣布朝廷使知朕意至德二年六月二十三日上謂史官于休烈曰君舉必書朕有過卿宜書之休烈對曰臣聞禹湯罪已其興也勃焉有德之君不忘書過臣不勝慶永貞元年九月河陽三城節度使元韶卒史臣曰凡功名不足以垂後而善惡不足以為誡者雖富貴人苐書其卒而已陶清劉舍許昌薛澤莊青翟趙周皆為漢相爵則通侯而良史以為齷齪廉謹備員而已無能發明功名者皆不立𫝊伯夷莊周墨翟魯連王符徐稚郭泰皆終身匹夫或讓國立節或飬德著書或出奇排難或守道避禍而𫝊與周召管晏同列故富貴者有所屈貧賤者有所伸孔子曰齊景公有馬千駟死之日人無得而稱焉伯夷叔齊餓于首陽之下人到于今稱之然則志士之欲以光輝于後者何待于爵位哉富貴之人排肩而立卒不能自垂於後者德不修而輕義重利故也自古及今可勝數乎元和四年正月减集賢寫御書二十人付史館收管史館奏當館舊制例只有楷書無御書各額請改正楷書從之六年四月史官左拾遺樊紳右拾遺韋處厚太常博士林寶並停修撰守本官以考功員外郎獨孤郁充史館修撰兼判官事又以兵部尚書裴垍為太子賔客垍以疾罷相拜兵部尚書久未任朝請宰相李吉甫自淮南至復監修史與垍有隙又以垍投病方退不宜以貞元實録上進故史官皆罷垍亦更移散秩七年六月上讀肅宗實録見大臣𫝊多浮詞虛美因宣與史官記事每要從實不得虛飾八年十月宰臣以下候對于延英殿上以時政記問於宰臣監修國史李吉甫對曰是宰相記天子事以授史官之實録也古者左史記言今起居郎是也右史記動今起居舍人是也永徽中宰臣姚璹監修國史慮其造膝之言或不下聞因請隨奏對而記于仗下以授史官今時政記是也上曰其間或修或不修者何也吉甫對曰凡面奉德音未及施行總謂機密固不可書以送史其間謀議有發自臣下者又不可自書以付史官及事已行者制㫖昭然天下皆得聞知即史官之記不待書以授也且臣觀時政記者姚璹修於長夀及璹罷而事廢賈耽齊抗修於貞元及耽罷而事廢然則關於政化者不虛美不隱惡謂之良也十二年九月詔記事史官是職昭其法誡著在舊章舉而必書朕所深望自今以後每坐日宰臣及諸司對後如事可備勸誡合在記述者委承㫖宰相宣示左右起居綴録仍准舊例每季送史館時起居舍人庾敬休上疏請行故事因有是詔既而宰相以事關機密不以告之事竟不行自左右史失職于今幾一百五十年中間往往有時政記出焉既録因宰相事同稱贊推美讓善之道將如信史直書之義闕然於時尚十得其四五今則全廢君子惜之十四年四月史官李翺奏臣等謬得秉筆史館以記録為職夫勸善懲惡正言直筆記聖朝功德述忠賢事業載姦佞醜行以𫝊無窮者史官之任也凡人之事跡非大善大惡則衆人無由知之舊例皆訪問於人又取行狀諡議以為一據今之行狀者非門生即其故吏莫不虛加仁義禮智妄言忠肅惠和如此不唯處心不實茍欲虗美於所受恩而已也蓋亦為文者既非遊夏遷雄之列務於華而忘其實溺於詞而棄其理故為文則失六經之古風紀事則非史遷之實録不然則詞句鄙陋不能自成其文矣由是事失其本文害於理而行狀不足以取信若使指事書實不飾虛言則必有人知其真僞不然者縱使門生故吏為之亦不可謬作德善之事而加之矣臣今請作行狀者但指事說實直載其詞則善惡功跡皆據事足以自見矣假令𫝊魏徴但記其諌諍之詞自足以為正直矣如𫝊段秀實但記其倒用司農寺印以追逆兵又以象笏擊朱泚自足以為忠烈矣若考功定諡行狀之不依此者不得言諡依此者乃下太常及牒史館太常定諡後亦以諡議牒送史館則行狀之言縱未可以一一皆信與虛加妄言都無事實者猶山澤髙下之不同也史氏記録須得本末茍憑往例皆是虛言則使史官何所為據伏乞下臣所奏使考功守行臣等要知事實輒敢陳論制可其年六月史館奏當館楷書准元敕同集賢例五考足放選今選務集賢年數仍舊當館更加三年同𢎞文館例八年放選緣當館一例長上𢎞文館分畨上下事理實屈請依元敕處分敕㫖依奏長慶元年正月史館奏寫國史楷書元額三十員內十員館司前後停減五員吏部奏减今只十五員見在伏請却復吏部先減五員敕㫖宜量與三員其年二月史館奏楷書典書等授官次叙伏請敕吏部同集賢例比擬敕二日宜凖集賢例處分其年四月修聖政紀中書門下奏伏以堯舜之政二典存焉君臣之間吁俞之㫖罔不備載厥後雖代有史官多才出於追書所以其事或絶其言蓋略太宗文皇帝躬勤庶政朝多良臣論思獻替動可紀録故能逺繼堯舜煥乎其文章朝廷舊制每正衙奏事史官載筆於玉階之下所有議論政事悉得聞之及永徽後仗下便退宰臣謀議外莫得聞長夀二年宰相姚璹以為聖王謀訓不可闕於紀述史官疏逺無因得書請自今已後所論軍國政要委宰相一人撰録號為時政記此事久廢史官不復得聞唯寫誥詞記除授而已臣等常竊悱憤大懼皇猷未有以光揚于天下伏望天恩許臣等每坐日所有謀議事關政事者便日撰録號為聖政記書紀緘封至嵗末則付史官永為常式庶得睿謀所載如日月髙懸聖政惟新與天地廣運臣等不勝大願從之太和二年中書侍郎監修國史路隨奏曰臣昨面奏聖㫖以順宗實録頗非詳實委臣等重加刋正畢日聞奏伏以史冊之作勸誡所存事有當書理宜歸實匹夫善惡尚不可誣人君得失無容虗載况貞觀已來纍朝實録有經重撰不敢固辭緣此書成於韓愈今史官李漢蔣係皆愈之子壻若遣參校或致私嫌臣既職編修合命詳正及經奏請事遂施行今庶寮競言表章交奏既迫羣議輒冒上聞且韓愈所書亦非已出元和之後已是相循縱其密親豈害公理使歸本職實謂正名其實録伏望取舊記最錯誤者宣付史館委之修定詔曰其實録中所書德宗順宗朝禁中事起於謬𫝊殊非信史宜令史官詳正其他不要更修初韓愈撰順宗實録說禁中事頗切直內官惡之於上前言其不實故令刋正也開成三年二月中書門下奏延英對宰相須紀録伏以陛下躬勤庶政超邁百王每對宰臣日旰忘倦正衙決事二史在前便殿坐日全無紀録長夀初宰臣姚璹奏置時政紀寢而不行貞元中宰臣趙憬請復故事無何又廢恭惟聖政必在發明今請每至延英坐日對宰臣往復之詞關教化政刑之事委中書門下直日紀録月終送史館所兾政猷不墜國史有倫昨日延英靣奏已䝉允許敕㫖依奏㑹昌三年十月中書門下奏時政紀起居注紀修國史體例等伏以時政紀長夀二年宰臣姚璹以為帝王謨訓不可闕於紀述史官疏逺無因得書請自今已後所論軍國政要宰臣一人撰録號為時政紀厥後因循多闕紀述臣等商量爾後坐日每聞聖言如有慮及生靈事關興替可昭示百代貽謀後昆者宰臣獻替謀猷有益風教並請依國朝故事其日知印宰相撰録連名封印至嵗末送史館起居注紀比者不逐季撰録至有去官三五年後猶未送納者伏以每度延英奏事後向外𫝊說三事猶兩事虛謬豈有起居注紀皆三數年後托拾𫝊聞耳目已隔固非實事向後起居注紀事望每季初即送納向前一季文書與史館納訖具狀申中書門下史館受訖亦申報中書門下其起居改轉望已注紀遲速為殿最如有軍國大政𫝊聞疑誤仍許政事都堂見宰相等臨時酌量如事已施行非關機密並一一向說所冀書存信實免有疑誤修史體例臣等伏見近日實録多云禁中者伏以君上與宰臣及公卿言皆須衆所聞見方合書於史策禁中之語向外何由得知或得於𫝊聞多出邪佞便載史筆實纍鴻猷向後日録中如有此類並請刋削更不得以此紀述又宰臣及公卿論事行與不行須有明據或奏議允愜必見褒稱或所論乖僻固有懲責在藩鎮獻表者有答詔居要官啓事者亦合著明並當昭然在衆人耳目或取捨在於堂案或與奪形於詔敕前代史書載名目奏議無不由此近見實録多載密疏言不彰其明聽事不顯於當時得自其家實難取信向後所載羣臣章奏其可否得失須朝廷共知者方可紀述密疏並請不載如此則書必可法人皆守公愛憎之志不行褒貶之言必信伏見近日實録事多紕繆若詳求托實須舉舊章敕㫖宜依大中四年四月史館奏當館寫國史楷書典書等與集賢院寫書人等承前一例並校成五考便勒赴選自太和八年已後被吏部條奏疏五考滿後待受散三年今集賢院以其勞役年深不得補入去年三月十三日具事由申奏已蒙敕下並免三年受散訖今當館未蒙處分伏請依例並勒校成五考便許參選敕㫖依奏八年正月監修國史鄭朗奏當館修撰直館共四員准故事以未通籍為直館伏以修史重事合置修撰諸臣秩次或卑筆削不稱其直館伏請停廢更添修撰二員從之其舊館萬年尉張範涇陽尉李節勒守本官以户部郎中孟穆駕部員外郎李渙並充修撰通舊為四員分修四季之事天祐元年十月十三日前絳州曲沃縣令髙處魯進史館亡書三百六十卷授兼監察御史賜緋𢎞文館武德四年正月于門下省置修文館至九年三月改為𢎞文館至其年九月太宗初即位大闡教于𢎞文殿聚四部羣書二十餘萬卷於殿側置𢎞文館精選天下賢良文學之士虞世南褚亮姚思廉歐陽詢蔡允恭蕭德言等以本官兼學士令更宿直聽朝之隙引入內殿講論文義商量政事或至夜分方罷今褚遂良檢校館務號為館主因為故事其後得劉禕之范履氷並特敕相次為館主貞觀三年移於納義門西九年乂移於門省南其後移仗大明宫其館亦在門下省南儀鳳中以館中多圖籍置詳正學士校理之神龍元年十月十九日改為昭文館避孝敬諱故也二年又改為修文館至景龍二年四月二十二日修文館增置大學士四員學士八員直學士十二員徵攻文之士以充之二十三日敕中書令李嶠兵部尚書宗楚客並為大學士二十五日敕祕書監劉憲中書侍郎崔湜吏部侍郎岑義太常卿鄭愔給事中李適中書舍人盧藏用李文太子中舍劉子𤣥並為學士五月五日敕吏部郎中薛稷考功員外郎馬懷素户部員外郎宋之問起居舍人武平一國子主簿杜審言並為直學士十月四日兵部侍郎趙彥昭給事中蘇頲起居郎沈佺期並為學士景雲元年館中學士多以罪被貶黜宰臣遂令給事中一人權知館事二年三月八日復改為昭文館至開元七年九月四日依舊改為𢎞文館學生三十八人補𢎞文館如崇文學生例皇緦麻已上親皇太后大功已上親散官一品中書門下三品同中書門下平章事六尚書功臣身食實封者京官職事正品供奉官三品子孫京官職事從三品中書黃門侍郎子並聽預簡選性識聰敏者充貞觀元年敕見在京官文武職事五品已上子有性愛學書及有書性者聽于館內學書其書法內出其年有二十四人入館敕虞世南歐陽詢教示楷法黃門侍郎王圭奏學生學書之暇請置博士兼𨽻業焉敕太學助教侯孝遵授以經典著作郎許敬宗授以史學至二年王圭又奏請為學生置講經博士考試經業准式貢舉兼學書法開元二年正月𢎞文館學士直學士學生情願夜讀書及寫供奉書人榻書人願在內宿者亦聽之又𢎞文館令學士一人専判館事并差給事中一人差知勾當明為簿厯其學生既在官宿博士及直館每夜各一人遞直開元七年十二月三日省𢎞文崇文兩館讐校置𢎞文館校書四員崇文館校書兩員二十二年二月二十五日省𢎞文館校書兩員長慶二年閏十月𢎞文館奏楷書榻書典書元額三十五員七員先停減今請于先減數內量補五員并見在員數並勒長寫書及功課年勞官資請依史官例處分敕㫖宜依三年二月𢎞文館奏請添修屋宇及造書樓伏以儒學之科政化根本茍或隳廢則人何觀伏望賜敕所司遂急補修庶使已成之業免墜𢎞闡之義再揚敕㫖依奏其年七月𢎞文館奏按六典當館先有學士直學士詳正學校理直館讐校錯誤講經博士等雖職事則同名目稍異須有定制使可遵行今請准集賢史館兩司元和中停減雜名目例其登朝五品以上充學士六品已下充直學士未登朝官一切充直𢎞文館其餘並請停減兾得典故不煩職業咸在敕㫖依奏大中四年七月𢎞文館奏當館楷書典書等與集賢史館楷書等承前流例並勒校成五考赴選自太和八年以後被吏部條流更加授散三年今集賢史館奏勞役年深補召不得已䝉勑下免三年授散訖今當館請准例處分勑㫖依奏六年六月𢎞文館奏伏以三館制置既同事例宜等比來無事未敢申論今緣准敕修續㑹要以來官僚入日稍頻因緣費用其數至多紙筆雜物等不敢别有申請其厨料從前缺少伏請准兩館流例增添給用之間庶得濟辦敕㫖宜事畢日停文學館武德四年十月秦王既平天下乃鋭意經籍於宫城之西開文學館以待四方之士于是以僚屬大行臺司勳郎中杜如晦記室考功郎中房𤣥齡及于志寧軍咨祭酒蘇世長天冊府記室薛收文學褚亮姚思廉太學博士陸德明孔頴達李𤣥道天冊倉曹李守素記室參軍虞世南蔡允恭顔相時著作佐郎攝天冊記室許敬宗薛元敬太學助教蓋文達軍咨典籖蘇朂等並以本官兼文學館學士及薛收卒徴東虞州録事參軍劉孝孫入館令庫直閻立本圖其狀具題其爵里命褚亮為文贊號曰十八學士寫真圖藏之書府用彰禮賢之重也諸學士食五品珍膳分為三畨更直宿閣下每日引見討論文典得入館者時人謂之登瀛洲崇文館顯慶元年三月十六日皇太子𢎞請於崇賢館置學士并置生徒詔許之始置二十員其東宫三師三少賔客詹事左右庶子左右衛率及崇賢館三品學士子孫亦宜通取至上元二年八月二十七日改崇賢館為崇文館避章懷太子諱也永隆二年二月六日皇太子親行釋奠之禮禮畢上表請博延耆碩英髦之士為崇文館學士許之於是薛元超表薦鄭祖𤣥鄧𤣥挺楊炯崔融等並為崇文學士至貞元八年四月二十八日崇文館宜令左春坊勾當集賢院西京在光順門大衢之西命婦院北本命婦院之地開元十一年分置北院全取命婦院舊屋東都在明福門外大街之西本太平公主宅十年三月始移書院於此西向開門院內屋並太平公主所造興慶宫院在和風門外橫街之南二十四年駕在東都張九齡遣直官魏光祿先入京造此院華清宫院在宫北橫街之西二十八年敕造書直及寫御書一百人開元五年十二月敕于祕書省昭文館兼廣召諸色能書者充皆親經御簡後又取前資常選三衛散官五品已上子孫各有年限依資甄叙各有至十九年敕有官者為直院開元五年十一月題為麗正修書院以祕書監馬懷素右散騎常侍褚無量充使初置院經始皆無量處置至八年正月以散騎常侍元行冲充使檢校院內修撰官初無量奏前聞喜縣尉盧撰前江陽縣尉陸𤣥泰前左監門胄曹參軍王擇從武陵縣尉徐楚璧分庫檢校至六年已後祕書丞殷承業右贊善大夫魏哲通事舍人陸元愷右內率府兵曹參軍劉懷信胡履恭陸令言陸紹伯扶風縣丞馬利貞並别敕收入院八年十月敕學士等入經三年已上為年深若校理精勤紕繆多正及不詳覆無所發明委修書使録奏别加褒貶九年冬幸東都時集賢院四庫書總八萬九十卷經庫一萬三千七百五十三卷史庫二萬六千八百二十卷子庫二萬一千五百四十八卷集庫一萬九千八百六十九卷至二十四年車駕還西京敕百司行從皆令减省集書籍三分留一貯在庫者至天寶三年六月四庫更造見在庫書籍經庫七千七百六卷史庫一萬四千八百五十九卷子庫一萬六千二百八十七卷集庫一萬五千七百二十二卷從天寶三年至十四載四庫續寫書又一萬六千八百三十二卷十三年四月五日因奏封禪儀注敕中書門下及禮官學士等賜宴于集仙殿上曰今與卿等賢才同宴于此宜改集仙殿麗正書院為集賢院乃下詔曰仙者捕影之流朕所不取賢者濟理之具當務其實院內五品已上為學士六品已下為直學士中書令張說充學士知院事散騎常侍徐堅為副禮部侍郎賀知章中書舍人陸堅並為學士國子博士康子元為侍講學士考功員外郎趙東曦監察御史咸廙業左補闕韋述李釗陸𤣥泰吕向拾遺毋照太學助教余欽四門博士敬㑹默校書郎孫季良並直學士太學博士侯行果四門博士敬㑹直右補闕馮暉並侍講學初以張說為大學士辭曰曰學士本無大稱中宗欲以崇寵大臣景龍中修文館有大學士之名如臣豈敢以大為稱上從之貞元四年正月敕減集賢寫御書一十人付史館收管其年六月集賢院准六典有學士及直學士准集賢注記外有校理待制留院入院侍講刋校修撰修書及直院等色類徒多等目無益今請登朝官五品已上准六典為學士六品已下為直學士學士中取一人最髙者判院事闕學士即以直學士中髙者充自餘非登朝官不問品秩並為校理其餘名一切勒停仍永為常式從之其年五月十一日中書侍郎同中書門下平章事李泌奏伏蒙以臣為集賢殿大學士竊尋故事中書令張說中朝元老碩德鴻儒懇辭大字衆稱達禮其後至德二年崔圓為相加集賢殿大學士其後因循遂成恆例伏望削去大字崇文館大學士亦准此敕依八年六月十三日置集賢殿校書四員正字兩員仍于祕書省見任校書正字中量減祕書省所減官員便據數置十八年上問神䇿軍起置之由相府討求不知所出乃召集賢學士蔣乂問之又徴引根源事皆詳悉宰臣髙郢鄭珣瑜曰集賢有人矣翌日制判集賢院事乂集賢院學士蔣明之子其父常以亂兵之後圖籍溷雜乃白執政攜乂入院編次於是宰相張鎰置乂為集賢編録元和二年七月集賢院奏伏准六典集賢院置學士及校理修撰官纍聖崇儒不失此制至貞元八年判院事官陳京始奏停校理分祕書郎四員正字兩員為集賢殿校理正字今請校書郎正字並却歸祕書省當司請依舊置校理官庶循名實且復開元故事又直官請減五人寫御書請減十人從之其年閏十二月集賢殿大學士中書侍郎平章事武元衡奏以厨料缺少更請本錢一千貫文收利充用置捉錢四人其所置請用直官及寫御書各兩員每員捉錢二百五十貫文為定額即免額外置人敕㫖已配捉錢人宜至年滿准舊例處分其闕便停不得更補餘依奏太和五年正月集賢殿奏應投勘宣素書籍等伏請凖前年三月十九日敕權抽祕書省及春坊𢎞文館崇文館見任校正作畨次就院同校其厨料請凖元敕處分事畢日停從之開成元年四月集賢殿御書院請鑄小卬一面以御書為印文從之大中六年正月校理楊收逄侍御史馮緘與三院退朝入臺收不為之却乃追捕僕人笞之時宰臣大學士馮植論奏始著令三館學士不避行臺自植始也崇𤣥館開元二十九年正月三日于𤣥元皇帝廟置崇𤣥博士一員令學生習道德經莊子文子列子待習業成後每年隨貢舉人例送至省准明經例考試天寶元年五月中書門下奏兩京及諸郡崇𤣥館學生等准開元二十九年正月十五日制前件舉人合習道德南華通𤣥沖虛等四經又准天寶元年二月十日制改庚桑子為洞靈真經准條補崇𤣥學生亦合習讀伏准後制合通五經其洞虛真經人間少本近令諸觀尋訪道士等全無習者本既未廣業實難成并通𤣥沖虛二經亦恐文字不定𤣥教方闡學者宜精其洞靈真經等三經望付所司各寫十本校定訖付諸道採訪使頒行其貢舉司及兩京崇𤣥學亦望各付一本今冬崇𤣥學舉人望准開元二十九年敕條考試其洞靈真經請待業成然後准式從之二年正月十五日改崇𤣥學為崇𤣥館博士為學士助教為學士更置大學士二員天下諸郡崇𤣥學改為通道學博士為學士二月四日以門下侍郎陳希烈兼崇𤣥館學士其年二月十二日敕兩京𤣥元宫及道院等並委崇𤣥館學士都檢校貞元六年十二月給事中盧微奏太清宫崇𤣥館元置楷書二十人寫道經已足請不更補置敕㫖依奏唐㑹要卷六十四
