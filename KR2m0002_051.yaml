body:
  text: 唐會要卷五十一宋王溥撰侍中隋為納言武徳元年因隋舊制不改至二年三月十日改為侍中龍朔二年四月四日改為東臺左相咸亨元年十二月二十三日改為侍中光宅元年九月五日改為納言神龍元年二月四日改為侍中開元元年十二月一日改為黄門監五年九月六日改為侍中天寳二年二月二十日改為左相至徳二載十二月十五日改為侍中舊是三品大厯二年十一月九日改為正二品與中書令同中書令武徳元年為内史令三年改為中書令龍朔二年改為西臺右相至咸亨年改為中書令開元元年為紫微令五年為中書令天寳二年為右相至徳二年為中書令舊制宰相常為門下省議事謂之政事堂故長孫无忌魏徴房𤣥齡皆知門下事至永淳二年七月中書令裴炎以中書執事其政事堂令在中書遂移在中書省至開元十一年張説奏改政事為中書門下其政事印亦改為中書門下之印至徳二載三月宰相分直主政事執筆每一人知十日至貞元十年五月八日又分每日一人執筆名稱武徳元年六月裴寂除尚書左僕射知政事貞觀元年九月御史大夫杜淹除叅議朝政三年二月魏徵除秘書監叅議朝政四年二月蕭瑀除御史大夫與宰相叅議朝政戴胄除民部尚書與左右僕射侍中中書令並平章國計七年十二月岑文本兼中書侍郎專典機宻八年十一月詔李靖加特進患若小瘳每三日兩日至門下中書平章政事九年十一月蕭瑀特進叅議政事十月六日魏徵改特進知門下省事朝章國典叅議得失十三年十一月劉洎除黄門侍郎叅知政事十七年正月李勣除太子詹事同中書門下三品其年髙士㢘除開府儀同三司仍同中書門下平章政事二十二年正月崔仁師除中書侍郎叅知機務永淳元年四月郭待舉等各守本官並加同中書門下同承受進止平章事初上欲用待舉等謂叅知政事崔知温曰待舉等厯任尚淺未可與卿等同名稱自是外司四品已下知政事者以平章事為名稱十二月劉齊賢除黄門侍郎同中書門下平章事神龍元年六月尚書左僕射豆盧欽望加平章軍國重事景雲三年七月竇懐貞除尚書右僕射軍國重事宜共平章唐隆元年六月劉幽求中書舍人㕘議機務蘓氏駁曰同中書門下三品是李勣除太子詹事創有此號原夫立號之意以侍中中書令是中書門下正三品官而令同者以本官品卑恐位及望雜不等故立此號與之同等也勣至二十三年七月遷開府儀同三司八月又改尚書左僕射並同尚書門下三品且開府是從一品僕射是從二品又令同者豈不與立號之意乖乎謹按後漢殤帝以鄧隲為車騎將軍儀同三司觀其創置之意亦可上企三公也可以為證矣永隆二年閏七月崔知温薛元超除中書令並云同中書門下三品又大乖也元和二年正月司徒平章事杜佑告老詔起之令以後每月三度入朝便至中書商量軍國事務亦冀延英殿内沃朕虗心太和四年五月制以司空兼門下侍郎同平章事裴度可司徒平章軍國事待疾損日每三日一度入中書散官勲封如故度勲望特髙以疾在假淹時上將去相印而又惜之故有是詔以示優寵識量上貞觀六年二月二十日御史大夫杜淹奏諸司文卷恐有稽失請令御史就諸司檢校上問尚書右僕射封徳彛曰此事何如徳彛曰分理庶務各有司存御史見有愆違乃須弹紏若復搜案求疵則太為煩碎淹黙然而止上謂淹曰何不更執論淹曰臣荷重寄唯思報國至公之理善則從之徳彛所奏亦是大體臣伏詳其議更先所論上曰公等各舉其事朕甚悦之七年遣使詣西域立葉䕶可汗未還又别遣使多齎金銀錢帛將厯諸國市馬侍中魏徵諫曰今發國使以立可汗為名可汗未立便厯諸國市馬彼必謂意在市馬不為專立可汗可汗得立則不甚懐恩不得立為深怨諸蕃聞之必不重中國但願使彼安寜則諸國之馬不求自至上納其言而止八年蜀王妃父楊譽在省競婢為都官郎中薛仁方留身勘問未及與奪其子為千牛於殿庭陳訴云五品以上不合留身以是國親故生節目不肯斷决淹厯歳年上聞之大怒曰知是我之親戚故作如此艱難即令杖二百解所任官侍中魏徵進曰仁方既是職司能為國家守法豈可横加嚴罰以成外戚之私乎此源一開萬端爭起後必悔之將無所及自古能禁斷此事唯陛下一人先備不虞國家之常道豈可以水未横流欲自毁隄防臣竊思度未見其可上曰誠如公言向者實不思之十五年太子少師房𤣥齡尚書右僕射髙士廉於路逢少府少監竇徳素問北門近來更有何營造徳素以聞上乃謂𤣥齡等曰卿但知南衙事我北門小小營造何妨君事𤣥齡等拜謝特進魏徵進曰臣不解陛下責亦不解𤣥齡士廉拜謝𤣥齡等旣任大臣即陛下股肱耳目有所營造何容不知責其訪問官司臣所未解且所為有利害役功有多少陛下所為若是當助陛下所為不是雖營造當奏罷之此君使臣臣事君之道𤣥齡等不識所守但知拜謝臣亦不解上深然之二十年太宗於寢殿側置一室令太子居之絶不令往東宫黄門侍郎㕘綜朝政褚遂良諌曰臣聞文王問安三至必退漢儲侍膳五日乃來前賢作法規模𢎞逺禮曰男子十年出就外傅出就於外學書計也然則古之逹者豈無慈心減兹私愛欲使成立凡人尚猶如此况君之世子乎自當春誦夏絃親近師傅體人間之庶事識君臣之大道况新樹太子莫不欣然既云廢昏立明須稱天下瞻望而教成之道實深乖闕不離膝下常居宫内保傅之説無暢經籍之談蔑如伏願逺覽殷周近遵漢魏不可頓革事須階漸但計旬日半遣還宫專學藝以潤身布芳聲於天下則微臣雖死猶曰生年上從之總章元年十月七日東天竺烏茶國長年婆羅門盧伽逸多受詔合金丹上將餌之東臺侍郎郝處俊諌曰脩短有天命未聞萬乘之主輕服蕃服之藥昔貞觀末年先帝令婆羅門僧那羅邇娑寐依其本國僊方合長生神藥神僧既有異術徵求靈草秘石厯年而成先帝服之竟無異效大漸之際名醫莫知所為議者欲歸罪於前方將申大戮又恐取笑中外法遂不行龜鑑若是惟陛下深察上納之遂不服其藥儀鳯元年四月上以風疹欲下詔令天后攝理國政與宰臣議之中書令郝處俊曰臣聞禮經云天子理陽道后理隂徳外内和順國家以理然則帝之與后猶日之與月陽之與隂各有所主不相奪也若失其序上則謫見於天下則禍成於人昔魏文帝著令雖有少主尚不許皇后臨朝所以追鑒成敗杜其萌也况天下者髙祖太宗之天下陛下正合謹守宗廟傳之子孫誠不可持國與人有私于后且曠古以來未有此事伏乞特垂詳審中書侍郎李義琰曰處俊所引經典其言至忠聖慮無疑則蒼生幸甚上元元年九月上御含元殿東翔鸞閣觀大酺時京城四縣及太常音樂分為東西兩朋帝令雍王賢為東朋周王顯為西朋務以角勝為樂中書令郝處俊進諌曰臣聞禮所示童子無誑者恐其欺詐之心生也伏以二王春秋尚少意趣未定當須推功讓羙相視如一今忽分為二朋遞相誇競且俳優小人言辭無度酣樂之後難為禁止恐為交爭勝負譏誚失禮非所以導仁義示和睦也髙宗瞿然曰卿之逺識非衆人所及也遂命止之天授二年太學生王修之上表以鄉有水澇乞假還上臨軒曰情有所切特宜許之地官侍郎狄仁傑跪而言曰臣聞君人者當深視髙居黈纊塞耳唯生殺之柄不以假人至於簿書期會之間則有司存之而已故左右丞已下不勾左右丞相流已上方判以其漸貴所致况天子乎且學生假盖一丞簿事耳若特降一勑則效者相尋胄子三千凡須㡬勑為恩不普聚怨方深若聖㫖𢎞慈不欲違願請降明制以諭之上曰微卿之言何以聞善如意元年七月洛陽人王慶之上表請立武承嗣為皇太子則天命内史李昭徳詰問昭徳遂杖殺之因密奏曰承嗣陛下之姪又為親王不宜處機衡以惑衆庶且自古帝王父子之間猶有簒奪况姑姪乎臣又聞文武之道布在方册豈有姪為天子而為阿姑立廟者乎皇嗣陛下子也陛下正合傳之子孫為萬代計天子之子續莫重焉陛下承天皇顧託而有天下若立承嗣臣恐天皇不血食矣則天寤之乃止神功元年則天嘗詔天官侍郎陸元方問以外事對曰臣備位宰相有大事即奏人間碎務不敢以煩聖覽聖厯二年九月則天内出梨花一枝示宰臣曰是何祥也諸宰臣曰陛下徳及草木故能秋木再花雖周文徳及行葦無以過也鳯閣侍郎杜景儉獨曰謹按洪範五行傳隂陽不相奪倫凟之即為灾春秋云冬無愆陽夏無伏隂春無凄風秋無苦雨今已秋矣草木黄落而忽生此花凟隂陽也臣恐陛下布教施令有虧禮典又臣等忝為宰臣助天理物理而不和臣之罪也於是再拜謝罪則天曰卿真宰相也三年臘月張易之兄弟貴寵踰戚分懼不全請計於天官侍郎吉頊頊曰公兄弟承恩深矣非有大功於天下罕有全者唯有一䇿苟能行之豈止全家亦當茅土之封耳除此之外非頊敢謀易之兄弟涕泣請之頊曰天下思唐徳乆矣主上春秋已髙武氏諸王殊非所屬意公何不從容請相王廬陵以繼生人之望易之乃乘間屢言之則天意乃易既知頊之謀乃詔問頊頊曰廬陵相王皆陛下子髙宗初託於陛下當有所主上意乃追悔焉其事密至景雲中睿宗乃發明遂追贈頊為御史大夫制云王命中否人謀未輯首陳反正之議克創祈天之本長安二年鸞臺侍郎韋安石嘗於内殿賜宴張易之引蜀商宋覇子等數人博於上前言辭犯禮安石奏曰商估賤類不合㕘登此筵乃顧左右逐出之時坐者失色陸元方退而告人曰向見韋公叱博徒吾等為之寒心此真宰相四年八月則天卧疾宰相不得召見者累月及疾少間鸞臺侍郎知政事崔𤣥暐奏曰皇太子相王仁明孝友足可親侍湯藥至於宫禁事重伏願不令異姓人入則天謂曰深領卿厚意景龍三年九月蘓瓌除尚書右僕射時公卿大臣初拜官例許獻食名曰燒尾瓌因内宴將作大匠宗晉卿謂曰拜僕射竟不燒尾豈不喜耶帝黙然瓌奏曰臣聞宰相者主調隂陽助天理物今粒食踴貴百姓不足臣見宿衛兵至有三日不得食者臣愚不稱職所以不敢燒尾至四年中宗遺制韋庶人輔少主知政事安國相王㕘謀輔政中書令宗楚客謂韋温曰今既請皇太后臨朝宜停相王輔政且皇太后於相王居嫂叔不通問之地甚難為儀注理全不可瓌獨正色拒之謂曰遺制是先帝意若改何名遺制楚客大怒竟削相王輔政而宣行焉景雲二年二月睿宗謂侍臣曰有術士言五日内有急兵入宫卿等為朕備之中書侍郎張説進曰此是讒人詭計揺動東宫陛下若使太子監國則君臣分定窺窬望絶姚元之曰如説之言社稷之計上大悦是日下制太子監國其月上召中書令韋安石謂曰聞朝廷傾心東宫卿可察也安石對曰陛下何得亡國之言此必太平之計太子有大功於社稷仁明孝友天下所稱願陛下無信䜛言以致惑也睿宗瞿然曰朕知之矣卿勿言也開元五年令中書門下為皇太子制名及封邑並公主等邑號又令别進一佳名者侍中宋璟中書侍郎蘓頲奏曰七子均養百王至仁今若同等别封或縁母寵子愛骨肉之際人所難言天地之中典有常度昔袁盎降慎夫人之席文帝竟納之慎夫人亦不以為嫌羙其得乆長之計臣等今並同進更不别封上彰覆載無偏之徳上稱嘆乆之二十一年范陽節度使張守珪使安禄山奏事中書令張九齡見之謂侍中裴光庭曰亂幽州者必此人也及禄山為平盧將軍失利守珪奏請斬之九齡批曰穰苴平軍必誅莊賈孫武行令亦斬宫嬪守珪軍令若行禄山不宜免死上惜其勇鋭但令免官使白衣展効九齡執請誅之上曰卿豈以王夷甫識石勒便臆斷禄山難制耶𤣥宗至蜀追恨不從九齡之言遣中使至曲江祭酹之至建中元年十一月五日上以九齡先覩未萌追贈司徒大厯十四年閏五月中書侍郎平章事崔祐甫以尚父子儀年老乆掌兵權其下禆將皆已崇貴慮子儀一旦謝世而難相統攝遂罷子儀而命懷光等分統其衆論者服焉建中二年六月宰臣崔祐甫在相位神䇿軍使王駕鶴掌禁軍十餘年權傾中外上初即位欲以白琇珪代之懼其生變祐甫召駕鶴與語留連乆之琇珪已赴北軍視事矣時淄青節度使李正已畏懼上威徳表請進錢三十萬貫上欲納之復慮以他計逗遛如止之又未有其詞顧問祐甫進曰正已多譎詐誠如聖慮臣請因使往淄青便令宣慰將士以所進錫賚軍人且遣深荷聖慈又令外方知朝廷不重財貨上悦從之正已大慚而心畏服祐甫謀猷啟沃多所𢎞益天下以為復貞觀開元之太平也三年正月太僕卿趙縱貶循州司馬初縱家奴當千發縱隂事縱下御史留當千於内侍省於是宰相張鎰上疏諫曰伏見趙縱為奴所告下獄人皆震懼未測聖情貞觀二年三月太宗謂侍臣曰比有奴告其主謀逆此極弊法特須禁斷假令有謀反者必不獨成自有他人論之豈藉其奴告也自今以後奴告主者皆不須受盡令斬决由是賤不得干貴下不得凌上教化之本既正悖亂之漸不生為國之經百代難改欲全其體貴在防㣲頃者長安李濟得罪因奴萬年令崔鶠得罪因婢愚賤之輩悖壊成風主反畏之動遭誣告充溢府縣不能斷决建中元年五月二十八日詔書曰凖鬭競律諸奴婢告主非誣叛以上同自首法並准决處分自此奴婢復順獄訟稍息縱事非叛逆奴實奸凶奴在禁中縱獨下獄考之法理或恐未正將相之功莫大乎子儀人臣之位莫髙於尚父身歿未㡬墳土僅乾兩壻前以當辜趙縱今又下獄設令縱實抵法所告非奴纔經數旬連罪三壻録勲念舊或猶可容况在章程本宜宥免陛下方誅羣賊大用武臣雖見寵於當時恐息望於他日太宗之典尚在陛下明詔行之一朝背違不與衆守於教化恐失於刑法恐頗所益悉無所傷至廣臣非私趙縱非惡此奴叨居股肱職在匡弼斯是大體敢不極言伏乞聖慈納臣愚懇於是上以縱所告雖重左貶而已當千殺之鎰乃令召子儀家僮數百人以死奴示之興元元年門下侍郎平章事蕭復充宣撫等使囬與諸相對訖獨留奏曰陛下自還宫闕勲臣已䝉官賞唯旌善懲惡未有區分陳少㳺將相之寄最崇首貶臣節韋臯名位最卑特建忠義請令韋臯代少㳺則天下昭然知逆順之理上從之復出諸相李勉盧翰劉從一同歸中書中使續至揖從一附耳語退諸相各歸閤從一詣曰中使宣㫖令與公商量朝來所奏便進擬來勿令李勉盧翰知復曰適來奏對亦聞斯㫖然未諭聖心而已陳論上意尚爾復未敢言所陳事又曰唐虞有僉曰之論朝廷每事上合與公卿同議今李勉盧翰不可在相位即去之既在合同商量何獨避之此一節事且與公行之無爽但恐浸以成俗此政之弊也竟不言於從一奏之上寖不悦復之言先是淮南節度使陳少㳺首稱臣於李希烈鳳翔將李楚琳殺節度使張鎰以應朱泚鎰判官韋臯先知隴州以隴之判卒數百人拒泚故復請行勸懲之命焉貞元三年正月上命玉工為帶有一銙誤墜地壊焉工者六人私以錢數萬市玉以補壊者既與諸銙相埒矣及獻上即指其所補者曰此銙光彩何不相類工人叩頭伏罪上震怒令於京兆府各决重杖處死責其欺㒺詔至中書宰相柳渾執奏曰陛下若便賜死則已今事下有司請存詳理况玉工之罪或未詳審只縁人命至重所以獄讞有疑且方春極刑恐傷和氣容臣條奏以正刑典遂案律文但罪先壊玉者以誤傷乘輿器服杖一人餘五人並釋之以聞詔可其奏先韓滉自淛西入覲上虗已待之至於調兵食籠鹽鐵勾官吏贓罰鋤豪强兼幷上委仗焉每奏事或踰日旰他相充位而已公卿救過不暇莫敢枝梧者滉嘗於省中榜吏至死渾雖滉所引惡其專權正色謂之曰先相公狷察為相不經年而罷况省闥非刑人之地相公奈何蹈前非行於今日專立威福豈尊主卑臣之道滉感悟媿悔為霽威焉時渾判門下省吏曰當過官渾悄然曰守職宜委有司更紛擾之非賢者用心也士或千里辭家以干㣲禄小邑主辦豈慮無能况旌善進賢事不在此其年吏曹擬官無量退者及渾瑊與吐蕃會盟於平涼其日上御便殿謂宰臣曰和戎息師國之大計今日將帥與卿同歡馬燧前賀曰此之一盟國家將百年内更無蕃冦之患渾跪對曰五帝無誥誓三王無盟詛是知盟詛之興在於季末今盛明之朝豈可復行吐蕃不知禮義易以兵制難以信結今日會約臣竊憂之李晟繼前曰臣生邉城備知蕃人動先詐偽今日之事誠如柳渾所憂上變色曰柳渾書生未逹邉事大臣智術英果亦有斯言乎渾晟咸頓首俯伏遂令歸中書其夜三更邠寜節度使韓逰環遣使叩開苑門奏云盟會不成將士覆沒上驚翌日臨軒慰勉渾曰卿文儒之士乃知軍戎情偽言成先覺有足嗟賞自此驟加禮異八年四月宰臣陸贄奏請臺省長官自薦屬官有曠敗則連坐舉主上許之俄㫖曰外議以諸司所舉多引用親黨兼通賂遺不得實才今後卿等宜自選擇贄曰今之臺省長官皆是當朝華選孰有狥私妄舉以傷名取利耶所謂臺省長官即僕射尚書左右丞侍郎及御史大夫中丞是也陛下比擇輔相多亦出於其中今之宰臣即徃日臺省長官也今之臺省長官即將來之宰相也但是職名暫異固非行業頓殊豈有為長官之時不能擇一二属吏居宰相之位則可擇千百具僚物議悠悠其惑頗甚上竟不行二十一年三月左僕射平章事賈耽以王叔文用事稱疾歸第鄭珣瑜亦稱疾不起二相皆天下重望相次歸臥諸宰臣方㑹食於中書故事百僚無敢通見者王叔文召直省令報直省懼入白韋執誼起迎就其舍語時杜佑高郢皆停筯以待報云王嗣使索飯索飯韋相公與之同食佑郢心知不可畏而不敢言玽瑜獨嘆曰吾豈可復處此乎顧左右索馬徑歸不起叔文亦無所顧忌焉元和元年九月平西蜀初劉闢作亂上不欲用兵羣議未决宰臣杜黄裳堅請討之以髙崇文為行營節度俱文珍為都監數月無功黄裳奏曰往年討呉少誠于淮西韓全義兵敗縁當時所徴之兵各有主將又制自監軍故也今日用兵與貞元時不異臣竊為陛下惜之若獨任崇文必濟上從之及蜀平諸相入賀上獨勞黄裳曰卿之功也黄裳自始經營討闢至于成功指授崇文素憚保義軍節度使劉澭黄裳謂曰若不盡命以劉澭代之由是得崇文之死力時宿將專征者甚衆自謂當選詔出用崇文人人大驚及王師入成都擒劉闢以獻詔刻石紀功于鹿頭山下二年二月上謂宰相曰朕常覧前史見厯代帝王或怠於聼理或煩於親政互有得失其理安在杜黄裳對曰帝王之務在於修已簡易擇賢任之宵衣旰食以求人瘼捨已從人以務厚下固不可怠肆安逸然事有綱領大小當務知其逺者大者至如簿書獄讞官吏能否夲非一人之所自任也秦始皇自程决事見嗤前代諸葛亮伯國之相耳二十罰以上自省之亦下為敵國所誚知不乆堪魏明帝欲案尚書省疑事陳橋稱不可隋文帝日昃聴政毎命衛士𫝊餐太宗文皇帝亦笑其煩察則為人上之體固不可代下司職但擇人委任責其功效賞罰苟信誰不盡心𫝊稱帝舜之徳曰夫何為哉恭已而已能舉十六相去四凶豈與勞神疲體自任耳目之主同年而語哉但人主之道患其不能推誠人臣之道患其不能自竭由是上疑下詐禮貌或虧欲求共理自然難致苟去此弊何患不至于理上深然其言十月淮西節度使李錡請朝覲上問宰臣武元衡曰不可且錡先請來朝覲詔既許之即又稱疾是可否在錡也今陛下新臨寳位天下屬耳目焉若使奸臣得遂其私則威令從此去矣上曰然遽命追之錡果詐窮而反三年十一月上問為治之要何先宰臣裴垍對曰先正其心上深然之五年正月上謂宰臣􅓙灾祈福之説其事信否李藩對曰臣竊觀自古聖賢皆不禱祠故楚昭王有疾卜者謂河為祟昭王以河不在於楚非所獲罪孔子以為知天道仲尼疾病門人子路請禱仲尼以為天道助順繫於所行已既全徳無愧屋漏故答子路云丘之禱乆矣書云惠廸吉從逆凶言順道則吉從逆則凶詩云自求多福則禍福之來感應行事若苟為非道則何福可求是以漢文帝每有祭祀使有司敬而不祈其見超然可謂盛徳若使神明無知則安能降福必其有知則私已求媚之事君子尚不可恱之也况於神明乎由此言之則履信思順自天祐之茍異扵此實難致福故堯舜之務唯求脩已以安百姓管仲云義於人者知其神盖以人為神主故但務安人而已虢公求神以致危亡王莽妄祈以速漢兵古今明誡書傳所紀伏乞陛下以漢文孔子之意為準則百福俱臻矣上深嘉之唐㑹要卷五十一
