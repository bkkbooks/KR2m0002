body:
  text: 唐㑹要卷六十三宋王溥撰史館移置武德初因隋舊制隸秘書省著作局貞觀三年閏十二月移史館于門下省北宰相監修自是著作局始罷史職及大明宫初成置史館於門下省之南開元十五年三月一日官臣李林甫監史以中書地切樞宻記事者宜其附近史官諫議大夫尹愔遂奏移於中書省北其地本尚藥局内藥院諸司應送史館事例祥瑞禮部毎季具錄送天文祥異太史毎季并所占候詳騐同報蕃國朝貢毎使正遇臚勘同土地風俗衣服貢獻道里逺近并其主名字報蕃戎入㓂及來降表狀中書錄狀報露布兵部錄報軍運還日軍將具錄陷破城堡傷殺吏人掠據畜産數變改音及新造曲調太常寺具所由及樂詞報州縣廢置及孝義旌表户部有即報法令變改斷獄新議刑部有即報有年及饑并水旱蟲霜風雹及地震流水泛溢户部及州縣毎有即勘其年月日及賑貸存恤同報諸色封建司府勘報襲封者不在報限京諸司長官及刺史都督都䕶行軍大總管副總管除授並錄制詞文官吏部送武官兵部送刺史縣令善政異跡有灼然者本州錄附考使送碩學異能髙人逸士義夫節婦州縣有此色不限官品勘知的實毎年錄附考使送京諸司長官薨卒本司責由歴狀跡送刺史都督都䕶及行軍副大總管已下薨本州本軍責由歴狀附便使送公主百官定諡考績錄行狀諡議同送諸王來朝宗正寺勘報已上事並依本條所由有即勘報史館修入國史如史官訪知事有堪入史者雖不與前件色同亦任直牒索承牒之處即依狀勘並限一月内報建中元年十一月二十八日史館奏前件事條雖標格式因循不舉日月已深伏請申明舊制各下本司從之大厯十四年正月已後至今年十月已前所有事跡各限勅到一月日報從此已後外州縣及諸軍諸使毎年一度附考使送納在京即毎季申便為恒例勅㫖依修前史武徳四年十一月起居舍人令狐德棻嘗從容言於髙祖曰宋代已來多無正史梁陳及齊猶有文籍至於周隋多有遺闕當今耳目猶接尚有所憑如更十數年後恐事跡埋没無可紀錄至五年十二月二十六日詔司典序言史官紀事考論得失盡究變通所以裁成義類懲惡勸善自有魏至乎陳隋莫不自命正朔懸歴嵗祀各殊徽號刪定禮儀然而簡牘未編紀𫝊咸闕炎凉已積謡俗遷訛餘烈遺風冺焉將墜頋彼湮落用深軫悼有懐撰次實資正直中書令蕭瑀給事中書王敬業著作郎殷聞禮可修魏史侍中陳叔達秘書丞令狐徳棻太史令庾儉可修周史中書令封徳彛中書舍人顔師古可修隋史大理崔善為中書舍人孔紹安太子洗馬蕭德言可修梁史太子詹事裴矩吏部郎中祖孝孫前秘書丞魏徴可修齊史秘書監竇璡給事中歐陽詢秦王府文學姚思廉可修陳史綿歴數載竟不就而罷修撰之源自徳棻始至貞觀三年於中書置秘書内省以修五代史貞觀十年正月二十日尚書左僕射房𤣥齡侍中魏徴散騎常侍姚思廉太子右庶子李百藥孔頴達禮部侍郎令狐徳棻中書侍郎岑文本中書舍人許敬宗等撰成周隋梁陳齊五代史上之進階頒賜有差二十年閏三月四日詔令修史所更撰晉書銓次舊聞裁成義類其所須可依修五代史故事若少學士量事追取於是司空房𤣥齡中書令褚遂良太子左庶子許敬宗掌其事又中書舍人來濟著作郎陸元佐著作郎劉翼太史令李淳風太子舍人李義府薛元超起居郎上官儀主客員外郎劉行功刑部員外郎辛丘馭著作郎劉𦙍之光祿寺主簿楊仁卿御史臺主簿李延夀校書郎張文恭並分功撰錄又令前雅州刺史令狐德棻太子司議郎敬播主客員外郎李安期屯田員外郎李懐儼詳其條例量加考正以臧榮緒書為本及十紀十志七十列𫝊三十載紀其太宗所著宣武二帝及陸機王羲之贊稱制焉房𤣥齡已下稱史臣凡起例皆播獨創焉以其書賜皇太子及新羅使者各一部顯慶元年五月四日史官修梁陳齊周隋五代志三十卷太尉無忌進之四年二月太子司更大夫吕才著隋紀二十卷其年符璽郎李延夀撮近代諸史南起自宋終於陳北始自魏卒於隋合一百八十篇號為南北史上自製序景龍三年十二月太常少卿元行冲以本族出於後魏為未有編年之文乃撰魏典三十卷事詳文簡為學者所稱初魏明帝時西栁谷瑞石有牛繼馬後之象魏明後史以為晉元帝是牛氏之子因姓司馬氏以應石文行冲雜尋事跡以後魏道武帝名之健繼晉受命又考校䜟符特著論以明光化三年直史館栁㻮以劉子𤣥所撰史通議駁經史過當紀子𤣥之失别纂成十卷號栁氏析㣲國史貞觀十七年七月十六日司空房𤣥齡給事中許敬宗著作郎敬播等上所撰髙祖太宗實錄各二十卷太宗遣諌議大夫褚遂良讀之前始讀太宗初生祥瑞遂感動流涕曰朕於今日富有四海追思膝下不可復得因悲不自止命收卷仍遣編之秘閣并賜皇太子及諸王各一部京官三品已上欲寫者亦聽永徽元年閏五月二十三日史官太尉無忌等修貞觀實錄畢上之起貞觀十五年至二十三年五月勒成二十卷顯慶元年七月三日史官太尉無忌左僕射于志寧中書令崔敦禮國子祭酒令狐徳棻中書侍郎李義府著作郎劉𦙍之楊仁卿起居郎李延夀秘書郎張文恭等修國史成起義寧盡貞觀末凡八十一卷藏其書于内府至四年二月五日中書令許敬宗中書侍郎許圉師太師令李淳風著作郎楊仁卿著作郎顧𦙍受詔撰貞觀二十三年以後至顯慶三年實錄成二十卷添成一百卷是日封敬宗子選為新城縣國公圉師封平恩縣公淳風封昌樂男仁卿及𦙍並加諫議大夫賞修實錄之功上以敬宗所紀多非實錄謂仁卿等曰先朝躬擐甲胄親履兵鋒戎衣霑馬汗兜鍪生蟣蝨削平區宇康濟生靈數年之間四海寧晏方始歸功上帝臨馭下人昨觀國史所書多不周悉卿等必須窮微索隠原始要終盛業鴻勲咸使詳備至如先朝作威鳯賦意属元舅及士廉敬宗乃移向尉遲敬德𫝊内又嘗幸温湯教習長圍四合萬隊俱前忽雲霧晝昏部伍錯亂先聖既覩斯事恐其挂法者多遂潛隠不出待其整理然後臨觀顧謂朕曰振旅訓兵國之大典此之錯失於法不輕我若見之必須行法一虧軍政得罪人多我今不出良為於此今乃移向魏徴𫝊内稱是徴之諫語此皆乖於實錄何以垂之後昆朕嘗從幸未央宫辟仗已過忽於草中見一人身帯横刀其人云辟仗至怕不敢出仗家搜索不覺遂不敢動先聖斂轡即還顧謂朕曰此事若發數人合死汝可於後堂伺看早放出之史家唯此一事差似不失其真郝處俊奏曰先聖仁恩觸類皆是臣弟處傑往年宿衛之日被差腰轝供奉見有三衛誤拂御衣此人怕懼五情無主先聖謂之曰此間無御史我不謂汝作罪過不須怕懼上謂處俊曰此亦須入史至三月詔太子左庶子同中書門下三品劉仁軌吏部侍郎同三品李敬𤣥中書侍郎郝處俊黄門侍郎髙智周等並修史仁軌等於是引左史李仁實専掌其事將加刋改㑹仁實卒官又止長安三年正月一日勅宜令特進梁王三思納言李嶠正諫大夫朱敬則司農少卿徐彦伯鳯閣舍人魏知古崔融司封郎中徐堅左史劉知幾直史館呉兢等修唐史採四方之志成一家之言長縣楷則以貽勸誡神龍二年五月九日左散騎常侍武三思中書令魏元忠禮部尚書祝欽明及史官太常少卿徐彦伯秘書少監栁冲國子司業崔融中書舍人岑義徐堅等修則天實錄三十卷文集一百二十卷上之賜物各有差開元四年十一月十四日修史官劉子𤣥呉兢撰睿宗實錄二十卷則天實錄三十卷中宗實錄二十卷成以聞又引古義白於執政姚崇奏曰伏見貞觀十七年監修國史房𤣥齡與史官給事中許敬宗著作佐郎敬播修髙祖實錄二十卷太宗實錄二十卷成制封𤣥齡一子為縣男賜物一千叚封敬宗南陽男賜物七百段敬播授司議賜物五百段並降璽書褒美又神龍三年五月監修史中書令魏元忠與史官大常少卿徐彦伯國子司業崔融等修則天實錄三十卷成封元忠一子為縣男物一千段彦伯等各賜爵二等物五百段自餘卑官加兩階物段准處分仍並降璽書褒美今史官劉子𤣥呉兢等撰睿宗實錄又重修則天中宗實錄並成進訖准撰太宗實錄例監修官已下加爵及賜今子𤣥援引古今欲臣聞奏臣謹尋故實例有恩賞事属當時不可為凖于𤣥等始末修撰誠亦勤勞叙事紀言所錄雖重承恩賜命固不在多子𤣥等請各賜物五百段許之至徳二年十二月二十七日修史官太常少卿于休烈奏曰國史一百六卷開元實錄四十七卷起居注并餘書三千六百八十二卷在興慶宫史館並被逆賊焚燒且國史實錄聖朝大典修撰多時今並無本望委御史臺推勘史館所由並令府縣搜訪有人收得國史實錄能送官司重加購賞并捨其罪得一部超授官一卷賞十疋數月准得一兩卷前修史官工部侍郎韋還賦䧟城入東京其家先藏國史一百一十三卷送官大厯三年起居舍人兼修史令狐峘修成實錄一百卷峘著述雖精属喪亂之後起居注亡失纂開元天寳間事唯得諸家文集編其詔冊名臣𫝊記十無三四後人以漏畧稱之建中元年七月左拾遺史館修撰沈既濟以呉兢所撰國史則天事為本紀奏議駁之曰史氏之作本乎懲勸以正君臣以維家邦前端千古後法萬代使其生不敢差死不忘懼緯人倫而經世道為百王凖的不止属辭比事以日繫月而已故善惡之道在乎勸誡勸誡之柄在乎褒貶是以春秋之義尊卑輕重升降幾微髣髴一字二字必有微㫖存焉况鴻名大綂其可以貸乎伏以則天皇后初以聰明睿哲内輔時政厥功茂矣及𢎞道之際孝和以長君嗣位而太后以専制臨朝俄又廢帝或幽或陟既而握圖稱籙移運革名牝司鷰啄之蹤難乎備述其後五王建䇿皇運復興議名之際得無降損必將義以親隠禮從國諱茍不損下當如其常安可横絶彛典超居帝籍昔仲尼有言必也正名夏殷二代為帝者三十世矣而周人通名之曰王呉楚越之君為王者百餘年而春秋書之為子葢髙下自乎彼而是非稽乎我過者抑之不及者援之不以弱減不為僣奪握中持平不振不傾使其求不可得而葢不可掩斯古君子所以慎其名也夫則天體自坤順位居乾極以柔乗剛天紀倒張進以强有退非德譲今史臣追書當稱之為太后不宜曰上孝和雖迫於母后之命降居藩邸而體元繼代本吾君也史臣追書宜稱曰皇帝不宜曰廬陵王睿宗在景龍已前天命未集徒稟后制假臨天室於倫非次於義無名史臣追書宜曰相王未宜曰帝若以得失既往遂而不舉則是非褒貶安所辨正載筆執簡謂之何哉則天廢國家厯數用周正朔廢國家太廟立周七廟鼎命革矣徽號易矣旂裳服色已殊矣今安得以周氏年厯而列為唐書帝紀徴諸禮經是謂亂名且孝和繼天踐祚在太后之前而叙年置紀居太后之下方之躋僖是謂不智詳今考古並未為可或曰班馬良史也編述漢事立髙后以續帝載豈有非之者乎答曰昔髙后稱制因其曠嗣獨有分王諸吕負于漢約無遷鼎革命之甚况其時孝惠已没孝文在下後宫之子非劉氏種不紀吕后將誰紀焉雖云其然議者猶為不可况遷鼎革命者乎或曰若天后不紀帝緒缺矣則二十二年行事何所繫乎答曰孝和以始年登大位以季年復舊業雖尊名奪而天命未改足以首事足以表年何所拘閡裂為二紀昔魯昭之出也春秋嵗書其居曰公在乾侯且君在雖失位不敢廢也今請併天后紀合孝和紀毎於嵗首必書孝和所在以統之書曰某年春正月皇帝在房陵太后行某事改某制云云則紀稱孝和而事述太后俾名不失正而禮不違常名禮兩得人無間矣其姓氏名諱入宫之由歴位之資才藝智畧年辰崩𦵏别纂錄入皇后列𫝊於廢后王庶人之下題其篇曰則天順聖武皇后事雖不行而史氏稱之貞元元年九月監修國史宰臣韋執誼奏伏以皇王大典實存簡冊施于千載𫝊述不輕竊見自頃已來史臣所有修撰皆於私家紀錄其本不在館中褒貶之間恐傷獨見編紀之際或慮遺文從前已來有此乖闕自今已後伏望令修撰官各撰日厯凡至月終即於館中都㑹詳定是非使置姓名同共封鏁除已成實錄撰進宣下者其餘見修日厯並不得私家置本仍請永為常式從之元和二年七月太僕寺丞令狐丕進亡父故史官峘所撰代宗實錄四十卷詔付史館五年十月宰臣裴垍與史官蔣武等撰德宗實錄五十卷獻之長慶二年十月勅翰林侍讀學士諫議大夫路隨中書舍人韋處厚兼充史館修撰憲宗實錄仍分日入史館修實錄未畢之前且許不入内署仍放朝參㑹昌元年四月勅憲宗實錄宜令史館再修撰進入其先撰成本不得注破并與新撰本同進來者至三年十月宰臣兼監修國史李紳與修史官鄭亞等修畢進上賜銀器錦綵有差至大中二年十一月又降勅曰憲宗實錄宜施行舊本其新本委天下諸州府察訪知有冩得者並送館不得隠藏大中五年七月宰臣崔龜從等撰續唐厯二十卷八年三月宰臣監修國史魏謩修成文宗實錄四十卷上之史官給事中盧躭太常少卿蔣偕司勲員外郎王渢右補闕盧吉頒賜銀器錦綵有差大順二年二月勅吏部侍郎栁玭等修宣宗懿宗僖宗實錄始丞相監修國史杜讓能三朝實錄未修乃奏吏部侍郎栁玭右補闕裴延裕左拾遺孫泰駕部員郎李𦙍太常博士鄭光庭等十五人修之踰年竟不能編錄一字惟延裕採宣宗朝耳目聞覩撰成三卷目曰東觀奏紀納於史館又龍紀中有處士沙仲穆纂野史十卷起自太和終於龍紀目曰太和野史在外修史開元八年十二月二十日詔右羽林將軍檢校并州大都督府長史燕國公張説多識前志學於舊史文成微婉詞潤金石可以昭振風雅光揚軌訓可兼修國史仍賫史本就并州隨軍修撰十四年七月六日太子左庶子呉兢上奏曰臣往者長安景龍之嵗以左拾遺起居郎兼修國史時有武三思張易之張昌宗紀處訥宗楚客韋温等相次監領其職三思等立性邪佞不循憲章茍飾虚詞殊非直筆臣愚以為國史之作在乎善惡必書遂潜心積思别撰唐書九十八卷唐春秋三十卷用藏于私室雖綿歴二十餘年尚刋削未就但微臣私門凶釁頃嵗以丁憂去官自此便停知史事竊惟帝載王言所書至重倘有廢絶實深憂懼於是彌綸舊紀重加刪緝雖文則不工而事皆從實斷自隋大業十三年迄於開元十四年春三月即皇家一代之典盡在於斯矣既將撰成此書于私家不敢不奏又卷軸稍廣繕寫甚難特望給臣楷書手三數人并紙墨等至絶筆之日當送上史館於是勅兢就集賢院修成其書俄又令就史館及兢遷荆州司馬其書未能就兢所修草本兢亦自將上令中使往荆州取得五十餘卷其紀事踈畧不堪行用十五年六月二十六日詔左承相張説在家修史中書侍郎李元紘奏曰國史者記人君善惡國政損益一字褒貶千載稱之今張説在家修史呉兢又在集賢院撰錄令國之大典散在數所且太宗别置史館在於禁中所以重其職而秘其事望勒説等就史館參詳撰錄則典冊舊章不墜矣從之長慶三年六月中書侍郎平章監修國史杜元頴奏臣去年奉詔命各據見在史官分修憲宗實錄今緣沈𫝊師改官若更求人選擇非易沈𫝊師當分雖搜羅未周條目紀綱已粗有緒竊以班固居鄉里而成漢書陳夀處私家而専精國志𤣥宗國史張説在本鎮兼修代宗編年令狐峘自外郡奏上逺考前代近參本朝皆可明徴實有成例其沈𫝊師一分伏望勒就湖南修畢先送史館與諸史官參詳然後聞奏庶使官業責成有始終之効𫝊聞摭實無同異之差制可修史官咸亨元年十一月二十一日詔修撰國史義存典實自今已後宜令所司於史官内簡擇堪修人錄名進内自餘居史職不得輒聞見所修史及行用國史等事長安一年鳯閣舍人修國史劉允濟嘗云史官善惡必書言成軌範使驕主賊臣有所知懼此亦權重理合貪而樂道也昔班生受金陳夀求米僕視之如浮雲耳但百寮善惡必書足為千載不朽之美談豈不盛哉三年七月朱敬則請擇史官上表曰國之要者在乎記事之官是以五帝𤣥風資其筆削三王盛業藉以垂名此才之難其難甚矣何以知其然昔平王東遷厯數六百齊桓之九合天下晉文之一戰諸侯秦穆公逺覇西戎楚莊王利盡南海禮樂文物闃爾無聞今之所存獨載魯史向若魯無君子記𫝊則遺雄覇逺圖必墜于地可不惜哉且如齊周小國之主尚能留意于史冊齊神武嘗謂著作郎魏收曰卿勿見陳元康楊遵彦等在吾目前趨走謂吾以為勤勞我後代聲名在于卿手最是要事勿謂我不知及文宣即位又嘗勅曰收好直筆勿畏懼我終不作魏太武誅史官又周文帝之為相也納栁虬之説特命書法不諱隠其志在懲勸如此伏以陛下聖徳鴻業誠可垂範將來倘不遇良史之才則大典無由而就也且董狐南史豈祇生于往代而獨無於此時在乎求與不求好與不好耳今若訪得其善者伏願朂之以公忠期之以逺大更超加羙職使得行其道則天下幸甚鄭惟忠嘗問劉子𤣥曰自古文士多而史才少何也對曰史才須有三長謂才也學也識也夫有學而無才猶有良田百頃黄金滿籝而使愚者營求終不能置於貨殖矣如有才而無學猶思兼匠石巧若公輸而家無楩柟斧斤終不能成其宫室矣猶須好是正直善惡必書使驕主賊臣所以知懼則為虎傅翼矣時人以為知言開元二十五年正月八日以道士尹愔為諫議大夫集賢院學士兼知史館事特賜朝散階愔上表懇讓優詔許衣道士服視事愔乃受職貞元九年十二月以前河南府王屋縣尉蔣武為右拾遺史館修撰上重難其職制未下前召見於延英殿至是方命官十二年正月以工部郎中史館修撰如故其年二月又命為左諫議大夫遷秘書少監修撰如故時裴延齡貴欲異同宰府乃言於上曰諫議大夫論朝廷得失之官史臣修撰紀朝廷得失之事其領史職者不宜為諫官從之元和四年六月宰臣集賢殿學士裴垍奏史館請登朝官入館者並為修撰非登朝並為直館修撰中以一人官髙者判館事其餘名目並請不置仍為常式從之太和六年七月以諫議大夫王彥威户部郎中楊漢公祠部員外郎蘇滌右補闕裴休並充史館修撰故事修撰不過三員或至兩員今四人並命論者非之天祐二年五月二十九日勅翰林學士職方郎中兼史館修撰張榮今修撰職名稍卑不稱内廷宻重宜充兼修國史雜錄上貞元九年十月諌議大夫朱子奢上表曰今月十六日陛下出聖㫖發德音以起居記錄書帝王臧否前代但藏之史官人主不見今欲親自觀覽用知得失愚以為聖德在躬舉無過事所述義歸盡善陛下獨覽之于事無失若以此法𫝊示子孫竊有未喻大唐雖七百之祚天命無改至於曾𤣥之後或非上智但中主庸君飾非䕶短見時史直辭極陳善惡必不省躬罪已唯當致怨史官但君上尊崇臣下卑賤有一於此何地逃刑既不能效朱雲廷折董狐無隠排霜觸電無顧死亡唯應希風順㫖全身逺害悠悠千載何所聞乎所以前代不觀葢為此也十六年四月二十八日太宗謂諫議大夫褚遂良曰卿知起居記錄何事大抵人君得觀之否對曰今之起居古之左右史以紀人君言行善惡必書庶幾人主不為非法不聞帝王躬自觀史太宗曰朕有不善卿必記之耶遂良曰守道不如守官臣職當筆君舉必書黄門侍侍郎劉洎曰設令遂良不記天下之人皆記之矣太宗謂房𤣥齡曰國史何因不令帝王觀見對曰國史善惡必書恐有忤㫖故不得見也太宗曰朕意不同今欲看國史若善事固不須論若有惡事亦欲以為鑒誡卿可撰錄進來房𤣥齡遂刪畧國史表上太宗見六月四日事語多㣲文乃謂𤣥齡曰昔周公誅管蔡而周室安季友鴆叔牙而魯國寧朕之所以安社稷利萬人耳史官執筆何煩有隠宜即改削直書其事至七月八日又謂遂良曰爾知起居記何事善惡朕今勤行三事望爾史官不書吾惡一則逺鑒前代敗事以為元龜二則進用善人共成政道三則斥棄羣小不聽讒言誓能守之終不轉也鷹犬平生所好今亦罷之雖有順時冬狩不踰旬而返亦不曾絶域訪奇異逺方求珍羞比日已來饌無兼味自非膏雨有年師行尅捷未嘗與公等舉杯酒奏管絃朕雖毎日兢懼終藉公等匡翊各宜勉之二十二年二月七日太宗以鐵勒諸蕃歸國謂羣臣曰吾知勞逸不同者有二鐵勒輸忱歸國去危就安邊夷無事豈不逸樂而窮髪之地盡為齊人古昔已來書史不載今日起居記朕功業亦為劬勞顯慶二年二月已後禮部尚書許敬宗常修國史自掌知國史記事阿曲初虞世南兄與許敬宗父同為宇文化及所害封德彛時為内史舍人備見其事因謂曰虞世基被戮世南則匍匐而請死許善心被殺敬宗則舞蹈以求生敬宗聞而銜之及為徳彛𫝊傳咸加其罪惡敬宗嫁女與左監門大將軍錢九隴本皇家隸人敬宗利其資而與之婚乃與九隴曲叙門閥妄加功貴并昇與劉文静長孫順徳同卷敬宗子娶尉遲寳琳孫女多得賂遺及作寳琳父敬徳𫝊乃云太宗作威鳯賦以錫之其威鳯賦本是與長孫無忌又白州人龎孝恭蠻首凡品率鄉兵從征高麗賊知其懦襲破之敬宗又納其寳貨稱漢將驍徤者唯蘇定方龎孝恭耳曹繼叔劉伯英皆出其下其虚謬也如此高祖太宗實錄敬播所修頗多詳直敬宗又輒以己愛憎曲事刪改論者尤之長夀二年修時政紀先是永徽已後左右史唯得對仗承㫖仗下後謀議皆不聞文昌左丞姚璹以為帝王謀訓不可遂無紀述若不宣自宰相即史官踈逺無得而書之是日遂表請仗下所言軍國政要即宰相一人撰錄號為時政紀自璹始也唐㑹要卷六十三
