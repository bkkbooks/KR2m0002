body:
  text: 唐會要卷四十八宋王溥撰議釋教下大中六年十二月祠部奏當司伏凖纍年赦文及别敇建置佛堂并剃度僧尼等伏以陛下護持釋教以濟羣生自出聖慈孰不知感非欲華飾寺宇廣度僧尼興作勞人匱竭物力近日天下未諭聖心建置漸多剃度彌廣相尚以日繫時臣恐黎毗因兹受弊臣職司其局不敢曠官當陛下求理納諫之時是小臣罄竭肝膽之日伏乞允臣所奏明立新規舊弊永除天下知禁如此見佛法可久民不告勞時宰臣因是上言伏以西方之教清淨為宗拯濟為業國家𢎞闡已久實助皇風然度僧不精則戒法隳壞造寺無節則損費過多有司舉陳實當職分但須酌量中道使可久行自今後應諸州凖元敇置寺外如有勝地名山古蹤靈迹實可留情為衆所知者即任量事修建却依舊名其諸縣有户口繁盛商旅輻湊願依香火以濟津梁亦任量事各置院一所於州下抽三五人住其有山谷險難道途危苦羸車重負須暫憩留亦任因依舊基却置蘭若並須是有力人自發心營造不得令姦黨因此遂抑斂鄉閭此外更不得輒有起建如引别敇處分不在此限其僧尼踰濫之源皆緣私度本教遮止條律極嚴不得輒有建如可容姦必在禁絶犯者凖元敇科斷訖仍具鄉貫姓號申祠部上文歷其官度僧尼數內有闕即仰本州集律僧衆同議揀擇聰敏有道性已經修鍊可以傳習參學者度之貴在教法得人不以年齒為限若惟求長老即難奉律議剃度訖仍具鄉貫姓號申祠部請告牒其僧中有志行堅精願尋師逰但有本州公驗即任逺近逰行在所關防切宜覺察不致真偽相雜藏庇姦人制可咸通二年上以志奉釋氏怠於朝政左散騎常侍蕭倣上疏論之曰臣聞玄柤之道用慈儉為先素王之風以仁義為本如佛者尚外之教非帝王所能慕也昔貞觀中髙宗在東宫以長孫皇后疾厲上言度僧以資福事后曰佛者異方之教存而勿論豈以一女子而紊王道乎故諡曰文德且母后之論尚能若此哲王之心安可反是哉疏奏上甚嘉之六年尚書右丞李尉復上疏諫曰臣聞孔某聖者也言必稱周任之言苻融賢者也議必稱王猛之諫誠以事求師古辭貴逹誠陛下自纘丕圖克崇佛事臣纍採本朝名臣啓奏之言以證奉佛始終之要天后時曽營大像狄仁傑諫曰功不使鬼必在役人物不天來皆從地出中宗時公主貴戚奏度僧尼姚崇諫曰佛不在外求之于心睿宗為金仙玉真二公主造二道宫辛替否諫曰自夏以來淫雨不解榖荒於壠麥爛於場陛下聖人也逺無不知陛下明君也細無不見而造不急之觀賈六合之怨又諫造寺曰釋教以清淨為基慈悲為主三時之月穿池沼損命也殫府庫損人也廣殿宇營身也損命則不慈悲營身則不清淨臣觀仁傑天后時上公也崇開元時賢相也替否睿宗之直臣也每覽斯言未嘗不廢卷痛惜其言之行也伏望詳前事之安危覽昔賢之啓奏營繕之間稍宜停減疏奏優詔嘉之寺西京開業寺在豐樂坊本隋仙都宫武德元年髙祖為尼明照廢宫置證果寺貞觀九年廢寺立為髙祖别廟號靜安宫儀鳳元年十一月十五日敇廢宫立開業寺其宫中人內移就獻陵會昌寺在金城坊本隋海陵公賀若誼宅義寧元年義師入關太宗領兵於此武德元年因置為寺崇義寺在長夀坊本隋延公于銓宅武德三年桂陽宫主為駙馬趙慈景所立楚國寺在晉昌坊本隋廢興道寺髙祖起義太原第五子智雲在京為留守隂世師所害後追封楚王因此立寺興聖寺在通義坊本髙祖龍舊宅武德元年以為通義宫貞觀元年立為尼寺龍興寺在頒政坊貞觀五年太子承乾立為並光寺神龍元年二月改名興福寺在修德坊本王君廓宅貞觀八年太宗為太穆皇后追福立為𢎞福寺神龍元年改名西明寺在延康坊本隋越國公楊素宅武德初萬春公主居住貞觀中賜濮王泰泰死乃立為寺慈恩寺在晉昌坊隋無漏廢寺貞觀二十二年十二月二十四日髙宗在春宫為文德正后立為寺故以慈恩為名寺內浮圖永徽三年沙門玄奘所立青龍寺在新昌坊本隋廢靈感寺龍朔二年宜城公主奏立為觀音寺景雲二年改名崇敬寺在靜寧坊本隋廢寺髙祖為長安公主立為尼髙祖崩後改為宫以為别廟後又為寺資聖寺在崇仁坊本太尉長孫無忌宅龍朔三年為文德皇后追福立為尼咸亨四年復為僧寺招福寺在崇儀坊本乾封二年睿宗在藩所立其地本隋正覺慶寺南北門額並睿宗親題之崇福寺在休祥坊本侍中楊恭仁宅咸亨二年九月二日以武后外氏宅立太原寺垂拱三年十二月改為魏國寺載初元年五月六日改為崇福寺光宅寺在光宅坊儀鳳二年望氣者言此坊有異氣敇令掘得石留得舍利萬粒遂於此地立為寺薦福寺在開化坊半已東隋煬帝在藩舊宅武德中賜尚書右僕射蕭瑀為園後瑀子銑尚襄城公主不欲與姑異居遂於園後地造宅公主卒後官市為英王宅文明元年三月十二日敇為髙宗造太后立為罔極寺獻福寺至六年十一月賜額改為薦福寺也興唐寺在太寧坊神龍元年三月十二日敇太平公主為天后立為罔極寺開元二十年六月七日改為興唐寺永夀寺在永樂坊景龍三年為永夀公主所立安國寺在長樂坊景雲元年九月十一日敇捨龍舊宅為寺便以本封安國為名章敬寺在通化門外大厯二年七月十九日內侍魚朝恩請以城東莊為章敬皇后立為寺因坼哥舒翰宅及曲江百司看屋及觀風樓造焉寶應寺在道正坊大厯四年正月二十九日門下侍郎王縉捨宅奏為寺以年號為名寺東京龍興寺在寧仁坊貞觀七年立為衆香寺至神龍元年二月改為中興寺右補闕張景佚上疏曰伏見天下諸州各置一大唐中興寺觀固以式標昌運光贊鴻名竊有未安芻言是獻至如永昌登封創之為縣名者是先聖受圖勒名之所陛下思而奉之不令更改今聖善報慈題之為閣者是陛下深仁至孝之德古先帝代未之前聞况唐運自崇周親撫政母子成業周替唐興雖有三朝而化侔一統况承顧復非謂中興夫言中興者中有阻間不承統厯既奉成周之業實揚先聖之資君親臨之厚莫之重中興立號未益前規以臣愚見所置大唐中興寺觀及圖史并出制誥咸請除中興之名直以臣愚見所置大唐中興寺龍興為名庶望前後君親俱承正統周唐寶厯共叶神聽上納之因降敇曰文叔之起舂陵少康之因陶正中興之號理異於兹思革前非以歸事實自今以後不得言中興之號其天下大唐中興寺觀諸如此例並即令改天宫寺在觀善坊髙祖龍舊宅貞觀六年立為寺天女寺在敦業坊貞觀九年置為景福寺武太后改之敬愛寺在懷仁坊顯慶二年孝敬在宫為髙宗武太后立之以敬愛寺為名制度與西明寺同天授二年改為佛授記寺其後又改為敬愛寺福先寺在逰藝坊武太后母楊氏宅上元二年立為太原寺垂拱三年二月改為魏國寺天授二年改為福先寺長夀寺在嘉善坊長夀元年武后稱齒生髮變大赦改元仍置長夀寺崇先寺證聖元年正月十八日以崇先府為寺開元二十四年九月一日改為廣福寺聖善寺在章善坊神龍元年二月立為中興寺二年中宗為武太后追福改為聖善寺寺內報慈閣中宗為韋后所立景龍三年正月二十八日制東都改造聖善寺更開拓五十餘步以廣僧房計破百姓數十家監察御史宋務光上疏諫曰陛下孝思罔極崇建明因土木之功莊嚴斯畢僧房精舍宴坐有餘禪宇道場經營已足更事開拓奪人便利貧者有顛擠之憂富者無安堵之所行非急切何至於斯以陽和發生播植伊始興復丁匠廢業農功一夫不耕必有飢者三時之務安可奪焉臣聞失鬼神之心可因巫祝而謝失君長之心可因左右而謝失父母之心可因親戚而謝惟失百姓之心不可解也陛下以萬邦為念何用傷一物之心應須拓寺諸俟農隙疏奏上不納安國寺在宣教坊本節愍太子宅神龍二年立為崇恩寺後改為衛國寺景雲元年十二月六日改為安國寺荷澤寺在宜人坊太極元年二月十七日睿宗在藩為武太后追佛所立初名慈澤寺神龍二年改為荷澤寺其時於西京亦立荷恩奉國寺在修行坊本張易之宅未成而易之敗後賜太平公主乳母奉國夫人尋奏為寺昭成寺在道光坊本沙苑監之地景龍元年韋庶人立為安樂寺韋氏誅改為景雲寺尋為昭成皇后追福改為昭成寺華嚴寺在景行坊景雲三年立為寺開元二十一年改為同德寺唐興寺貞觀二年十二月一日詔有隋失道九服沸騰朕親總元戎致兹明伐誓牧登陑曽無寧嵗思所以樹立福田濟其營魄可於建議以來交兵之處為義士凶徒隕身戎陳者各建寺剎招延勝流望法鼓所振變炎火於青蓮清梵所聞易苦海於甘露所司宜量定處所並立寺名支配僧徒及修院宇具為事修以聞仍命虞世南李百藥禇遂良顔師古岑文本許敬宗朱子奢等為碑記銘功業破劉武周於汾州立𢎞濟寺宗正卿李百藥為碑銘破宋老生於莒州立普濟寺著作郎許敬宗為碑銘破宋金剛於晉州立慈雲寺起居郎禇遂良為碑銘破王世充於邙山立昭覺寺著作郎虞世南為碑銘破竇建德於汜水立等慈寺祕書監顔師古為碑銘破劉黑闥於洺州立昭福寺中書侍郎岑文本為碑銘已上並貞觀四年五月建造畢慈德寺在京兆府武功縣慶善宫西百步貞觀五年為太穆皇后故並以慈德名之永徽六年正月三日昭陵側置一寺尚書右僕射禇遂良諫曰關中既是陛下所都自長安而制四海其間衛士已上悉是陛下牙爪陛下必欲乘釁敕遼若不役關中人不能濟事由此言之理須愛惜今者昭陵為公造寺惟欲早成其功名雖云知顧皆是催迫發遣豳州已北岐州已西或一百里或二百里皆來赴作遂積時月豈其所願陛下昔嘗語𢎞福寺僧云我義活蒼生最為功德且又今者所造制度凖禪定寺則大𢎞福寺自不可大於𢎞福既有東道征役此寺亦宜漸次修營三二年得成亦未為遲乾封元年正月十七日充州置觀寺各三所其觀以紫雲仙鶴萬嵗為稱寺以封嶽非煙重輪為名各度二十人天授元年十月二十九日兩京及天下諸州各置大雲寺一所至開元二十六年六月一日並改為開元寺景雲二年七月左拾遺辛替否疏諫曰夫釋教以清淨為本慈悲為主故恆體道以濟物不為利欲以損人故恆去已以全真不為營身以害教三時之月掘山穿池損命也殫府虛帑損人也廣殿長廊營身也損命則不慈悲損人則不濟物營身則不清淨豈大聖大神乎臣以為非崇教也自像王西下佛教東傳青螺不入於周前白馬方行於漢後風流雨散千帝百王飾彌盛而國彌空信彌重而禍彌大覆車繼軌曽不改圖晉臣以奉佛取議梁王以捨身搆隟若以造寺為其理體養人不足以經邦則殷周已往皆暗亂漢魏以降皆聖明殷周已往為不長漢魏已降為不短臣聞夏為天子二十餘代而殷受之殷為天子二十餘代而周受之周為天子三十餘代而漢受之自漢已後歷代可知也何者有道之長無道之短豈因其窮金玉修塔廟方見享祚乎臣以為減雕琢之費以賑貧人是有如來之德息穿掘之苦以全昆蟲是有如來之仁罷營搆之直以給邉陲是有湯武之功回不急之祿以購亷清是有唐虞之理陛下緩其所急急其所緩親未來而疏見在失真實而冀虛無重俗人之所為輕天子之功業臣竊痛之矣當今出財依勢者盡度為沙彌避役姦訛者盡度為沙彌其所未度惟貧與善人爾將何以作範乎將何以租賦乎將何以力役乎臣以為出家者捨塵俗離朋黨無私愛是致人以毁道非廣道以求人伏見今之宫觀臺榭惟京師之與洛陽不增修飾猶恐奢麗陛下嘗欲填池塹捐苑囿以贍貧人無産業者今天下佛寺蓋無其數一寺堂殿倍陛下一宫壯麗甚之矣用度過之矣是十分天下之財而佛有其七八陛下何有之矣百姓何食之矣臣竊痛之景龍二年九月并州清源縣尉吕元泰上疏曰陛下六合為家萬邦作宗布慈悲於沙界樹功業於玄穹霓旌寶蓋接影都畿鳳剎龍宫相望都邑然釋氏真教平等為宗本之以慈悲加之以布施伏願陛下廣平施之德成養育之恩回營搆之資充疆場之費則如來布施之法也賜之榖帛惠及飢寒則如來慈悲之化也經綸既行中化胥恱則如來平等之教也臣謹按金剛般若經云若以色見我以音聲求我是人行邪道不能見如來是知大乘之宗聲色不見豈釋迦之意在雕琢之功今之作者臣所未諭三年正月二十七日宴侍臣近親於梨園因問以時政得失絳州刺史成珏對曰夫釋教之設以慈悲為主蓋欲饒益萬姓濟牧羣生若乃邃宇珍臺層軒寶塔耗竭府庫勞役生人俱非菩薩善利之心或異如來大悲之旨臣備職方嶽叨膺洪運敢陳芻蕘狂妄死罪中書令蕭至忠奏曰方今百姓貧乏邉境未寧府藏內空倉廪不實誠宜節財用之費省土木之功務存農事愛惜人力寺觀之役實可且停成珏之言伏希採納兵部尚書同中書門下三品韋嗣立上疏曰臣竊見比者營造寺觀其數極多皆務宏博競崇瓌麗大則費一二十萬小則尚用三五萬餘略計都用資財動至千萬已上運轉木石人牛不停廢人功害農務事既非急時多怨咨故曰不作無益害有益功乃成不貴異物賤用物人乃足誠哉此言且玄象祕妙歸於空寂茍非修心定慧諸法皆涉有為至如土木雕刻諸功惟是殫竭人力但學相誇壯麗豈關降伏身心凡所興功皆須掘鑿蟄蟲在土種類最多每日殺傷動即萬計連年如此損害可知於至道既有乖在生人極為損陛下豈不深思之貞元十三年四月敇曲江南彌勒閣宜賜名貞元普濟寺元和二年九月敇成都府宜置聖夀南平二佛寺十月河中觀察使薛平奏中條山蘭若營搆之初有兩泉湧出請賜額為太和寺從之十二年二月置元和聖夀佛寺於右神策軍長慶元年三月劉總請以幽州私第為佛寺詔以報恩名之仍遣中官焦仙晟以寺額賜之會昌五年七月中書門下奏天下諸州府寺據令式上州以上並合國忌日集官吏行香臣等商量上州已上合行香州各留寺一所充國忌日行香列聖真容便移入合留寺中其下州寺並合廢毁敇旨所合留寺如舍宇精華者即留如是廢壞不堪者亦宜毁除但國忌日當州宫觀內行香不必定取寺名餘依其月又奏請兩街合留寺十所每寺留僧十人敇旨宜每街各留寺兩所每寺各留三十人六年正月左右街功德使奏準今月五日赦書節文上都兩街先各留寺兩所依前委功德使收管其所添寺於廢寺中揀擇堪修建者臣今左街謹具揀擇置寺八所及數內回改名額分析如後兩所依前名額興唐寺保夀寺六所改名舊額僧寺四所寶應寺改為資善寺青龍寺改為護國寺菩提寺改為保唐寺清輝寺改為安國寺緣間架數少取華陽寺連接充尼寺二所法雲寺改為唐安寺崇敬寺右街置八所二所先準敇留西明寺請改為福祐寺莊嚴寺八所添置二所請依舊名額僧寺一所千聖寺尼寺一所興聖寺六所請改名僧寺五所化度寺改為崇福寺永奏寺改為萬夀寺清福寺改為崇聖寺經行寺改為龍興寺奉恩寺改為興福寺尼寺一所萬善寺改為延唐寺謹定揀擇添置及改名額分析如前敇旨宜依大中元年閏三月敇會昌季年并省寺宇雖云異方之教無損為政之源中國之人久行其道釐革過當事體未𢎞其靈山勝境天下州府會昌五年四月所廢寺如有舊宿名僧復能修創一任住持所由不得禁止二年正月三日敇節文上都除元置寺外每皆更名添置寺五所東都共添置五所二所尼寺仍每寺度五十人益荆楊潤汴并蒲襄等八道除元置寺五所外更添置僧寺一所尼寺一所諸道節度刺史州除元置寺外更添置各一所並充僧寺合度三十人諸道管內州未置寺處宜置僧尼寺各一所每寺度三人五臺山宜置僧寺四所尼寺一所如有見存者便令修飾每寺度五十人其僧尼年幾限約并諸條流並凖會昌六年五月五日條例處分五年正月詔京畿及郡縣士庶要建寺宇村邑勿禁兼許度僧尼住持營造七月宰臣奏陛下崇奉釋教臣子皆願奔走慮士庶等物力不逮擾人生事望令兩畿及州府長吏與審度事宜撙節聞奏不必廣為建造驅役黎氓其所請度僧亦須選有道行為州縣所稱信者不得容隱凶惡之流却非敬道望委長吏精加揀擇其村邑佛堂望且待兵罷後建置為便十月十七日宰臣等上言近有敇許罷兵後建置佛堂蘭若若今邉事寧息必恐奏請繼來若不先議條流臨事恐難止約伏以釋門之教本貴正真奉之精嚴則人用加敬今諸州府寺宇新添功悉未畢百姓等若志願崇奉則宜併力同修自今已後有請置佛堂蘭若者望所在長吏分明曉示待一切畢後或有去州府逺處大縣即許量事建置一所其餘村坊不在更置佛堂蘭若限制可唐會要卷四十八
