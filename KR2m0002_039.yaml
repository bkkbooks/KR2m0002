body:
  text: 唐會要卷三十九宋王溥撰定格令髙祖初入關除苛政約法十二條唯制殺人劫盜背軍叛逆餘並蠲除之武德元年六月一日詔劉文靜與當朝通識之士因隋開皇律令而損益之遂制為五十三條務從寬簡取便於時其年十一月四日頒下仍令尚書令左僕射裴寂吏部尚書殷開山大理卿郎楚之司門郎中沈叔安內史舍人崔善為等更撰定律令十二月十二日又加內史令蕭瑀禮部尚書李綱國子博士丁孝烏等同修之至七年三月二十九日成詔頒於天下大略以開皇為準格五十三條凡律五百條並入於新律他無所改正貞觀十一年正月十四日頒新格於天下凡律五百條分為十二卷減死罪入徒者七十一條合為三十卷二十七篇一千五百九十條格七百條以為通式至永徽二年閏九月十四日上新刪定律令格式太尉長孫無忌開府儀同三司李績尚書左僕射于志寧尚書右僕射張行成侍中髙季輔黃門侍郎宇文節桞奭尚書右丞假志玄吏部侍郎髙敬言刑部侍郎劉燕容太常少卿令狐德棻給事中趙文中書舍人李友益刑部郎中賈敬行少府監丞張行實大理丞元紹太府丞王文端等同修勒成律十二卷令三十卷式四十卷頒於天下遂分格為兩部曹司常務者為留司格天下所共者為散頒格散頒格下州縣留司格本司行用至二年五月詔律學未有定疏每年所舉明經遂無定準宜廣召解律人按義疏奏聞仍使中書門下監定參撰律疏成五十卷太尉長孫無忌司空李績尚書左僕射于志寧刑部尚書唐紹大理卿段志玄尚書右丞劉燕容御史中丞賈敬行等同撰四年十一月九日上之詔頒于天下龍朔二年二月改易官名勑司刑太常伯源直心等重定格式唯改曺局之名而不易篇第至麟德二年奏上之至儀鳯二年三月九日又刪輯格式畢上之尚書左僕射劉仁軌尚書右僕射戴至德侍中張文瓘中書令李敬玄太子左庶子郝處俊黃門侍郎來恆太子右庶子髙智周吏部侍郎裴行儉馬戴兵部侍郎蕭德裴炎工部侍郎李義琰刑部侍郎張楚金右司郎中盧律師等至垂拱九年三月二十六日刪改格式加計帳及勾帳式通舊式成三十卷又以武德以來垂拱已前詔敕便於時者編為新格二卷內史裴居道秋官尚書岑長倩鳯閣侍郎韋方質與刪定官袁智宏等十餘人同修則天自製序其二卷之外别編六卷堪為當司行用為垂拱留司格時韋方質詳練法理又委其事於咸陽縣尉王守慎有法理之才故垂拱格式最為詳密其律唯改二十四條文有不便者大抵仍舊至神龍元年六月二十七日又刪定垂拱格及格後勑尚書左僕射唐休璟中書令韋安石散騎常侍李懷逺禮部尚書祝欽明尚書右丞蘇瓌兵部郎中薑師度户部郎中狄光嗣等同刪定至神龍二年正月二十五日前制勑為散頒格七卷又刪補舊式為二十卷表上之制令頒於天下景龍元年十月十九日以神龍元年所刪定格式漏略命刑部尚書張錫集諸明於法理人重加刪定至景雲元年勑又令刪定格令太極元年二月二十五日奏上之名為太極格户部尚書岑義中書侍郎陸象先左散騎常侍徐堅右司郎中唐詔刑部員外郎邵知新大理丞陳義左衛長史張處盛大理評事張名播左衛倉曹參軍羅思直刑部左事閻顗等同修開元三年三月又敕刪定格式令上之名為開元格六卷黃門監盧懷慎刑部尚書李義紫微侍郎蘇頲紫微舍人李延祚給事中魏奉古大理評事高智韓靜雄縣丞侯郢璡瀛州司法參軍閻顗等同修至七年三月十九日修令格仍舊名曰開元後格吏部尚書宋璟中書侍郎蘇頲尚書左丞盧從願吏部侍郎裴瓘慕容珣户部侍郎楊縚中書舍人劉令植大理司直髙知靜陜州司功參軍侯郢璡等同修十九年侍中裴光庭中書令蕭嵩又以格後制敕行用之後與格文相違於事非便奏令有司刪撰格后長人勑六卷頒於天下二十五年九月一日復刪輯舊格式律令中書李林甫侍中牛仙客中丞王敬從前左武衛胄曺參軍崔冕衛州司户參軍直中書陳承信酸棗縣尉直刑部俞元祀等共加刪輯總七千九十八條一千三百二十四條於事非要並刪除之二千一百八十條隨事損益三千五百九十四條仍舊不改總成律十二卷律疏三十卷式二十卷開元新格十卷又撰格式律令事類四十卷以類相從便於省覽奉敕於尚書都省寫五十本頒于天下二十五年九月三日兵部尚書李林甫奏今年五月三十日已前敕不入新格式者並望不在行用限至元年十月尚書省進貞元定格後敕三十卷留中不出至元和二年七月詔刑部侍郎許孟容大理少卿謝登吏部郎中房式兵部郎中熊執易度支郎中崔光禮部員外郎韋貫之等刪定開元格後敕其月刑部奏改律卷第八為制敕至十年十月刑部尚書權德輿奏自開元二十五年修格式律令事類及奏定處分長行敕等自大厯十四年六月元和二年正月兩度制刪之並施行伏以諸司所奏茍便一時事非經久或舊章既具徒更煩文獄理重輕繫人性命其元和二年準制刪定至元和五年刪定畢所奏三十卷歲月最近伏望且送臣本司其元和五年已後續有敕文合長行望令諸司録送刑部臣請與本司侍郎郎官參詳錯綜同編入本續具聞奏庶人知守法吏絶舞文從之至十三年八月鳯翔節度使等同詳定格後敕三十卷左司郎中崔郾吏部郎中陳諷禮部員外郎庾敬休及著作郎王長文集賢校理元從質國子博士林寶同修上其年刑部侍郎許孟容等尋又奉詔刪定格後敕勒成三十卷刑部尚書劉伯芻等考定修為二十卷至長慶三年正月刑部奏請户部郎中王貞司門員外郎齊推詳正敕格從之其月又請奏本司郎中裴潾司門郎中文格本司員外郎孫革王永大理司直楊倞與本司尚書崔植侍郎景重詳正敕格奏可至開成元年三月刑部奏伏準今年正月十日制刑法科條頗聞繁冗主吏縱捨未有所徴宜擇刑部大理官即令商量條要害重修格式務於簡當焚去冗長以正刑名者伏以律令格式著自漢初其後經歷代增修皇朝貞觀開元又重刪定理例精詳難議刋改自開元二十六年刪定格令後至今九十餘年中外百司皆有奏請各司其局不能守至公其間或恩出一時便為永式前後矛盾是非不同吏緣為姦人受其屈伏見自貞元已來纍曽别勑選重臣置院刪定前後數四徒涉歷三十嵗卒未堪行今若止令刑部大理官商量重修格式遽焚冗長伏恐姦吏翻緣此舞文伏請但集蕭昕刪定建中已來制敕分明比類刪去前後矛盾及理例重錯者條流編次具卷數聞奏行用所刪去者伏請不焚官同封印付庫收貯仍慎擇法官處置省寺所斷刑獄有不當者官吏重加貶黜所冀人知自效吏不敢欺上副陛下哀矜欽恤之意敕旨宜依至大中五年四月刑部及大理卿等奉勑修大中刑法律令為六十卷起貞觀二年六月二十日至大中五年四月十三日凡二百二十四年雜勑都計六百四十六門二千一百六十五條至十年五月一日左衛率府倉曹參軍張戣集録律令格式條件相類者一千一百五十條分為一百二十門號曰刑律統類上之景龍三年八月九日初應酬功賞頒依格式格式無文乃始比例其制敕不言自今以後及永為常式者不得攀引為例文明元年四月十四日敕律令格式為政之本內外官人退食之暇各宜尋覽仍以當司格令書於在官廳事之壁俯仰觀瞻使免遺忘錯誤開元十四年九月三日敕如聞用例破敕及令深非道理自今已後宜禁斷貞元二年七月二十三日刑部侍郎韓洄奏刑部掌律令定刑名大理申寃滯及諸州應奏之事並無諸司尋檢格式之文比年諸司每有與奪若出檢尋下緣以生姦法乃因之輕重又先明敕當司格令並書於廳事之壁此則百司皆合自有程式不唯刑部獨有典章訛弊日深事須改正敕旨宜委諸曺司各以本司雜錢置所要律令格式其中要節仍準舊例録在官廳壁左右丞勾當事畢日聞奏其餘諸司於刑部檢事待本司寫格令等畢日停寶厯二年十月大理卿裴向進前本司丞盧紓所撰經法要録十卷太和四年七月大理卿裴誼奏當寺格後勑六十卷付丞謝登伏準御史臺近奏從今已後刑部大理寺詳斷刑獄並以最後敕為定會昌元年九月庫部郎中知制誥淳于敬等奏準刑部奏犯贓官五品已上合抵死刑請準獄官令賜死於家者伏請永為定式敕旨宜依議刑輕重武德九年八月吏部尚書權檢校左武衛大將軍長孫無忌被召不解佩刀入東上閣門尚書右僕射封德彛議以監校尉不覺合死無忌誤帶入徒三年罰銅二十斤詔從之大理少卿戴胄駁曰校尉不覺與無忌帶入同為誤耳臣子之於君父不得稱誤準律云供御湯藥食飲舟船誤不如法者皆論死陛下若録功捨過非憲司所決若當罪據法罰銅未為得中太宗曰法者非朕一人之法也何得以無忌國親便欲阿之更令重議德彞執議如初胄又駁曰校尉緣無忌致罪法當輕若論其過誤則是其情一也生死頓殊敢以固請乃免校尉死刑其年九月盛開選舉或有詐偽資蔭者上令自首不首者死俄有詐蔭者大理少卿戴胄斷流上曰朕下敕不首者死今斷流示天下以不信卿欲賣獄乎胄曰陛下當即殺之非臣所及今既付所司臣不敢虧法上曰卿自守法而令我失信耶胄曰法者國之所以布大信于天下言者當時怒之所發耳陛下發一朝之忿而曰殺之既知不可置之於流此乃忍小忿而存大信若順忿違信臣竊為陛下惜之上曰法有所失公能正之朕何憂也貞觀元年三月蜀王府法曺參軍裴宏獻駁律令不便于時者三十事宏獻於是與房玄齡建議以為古者五刑刖居其一及肉刑既廢制為死流徒杖笞五等以備五刑今復設刖是謂六刑然減死意在於寬刖足又加煩峻乃與八座定議奏聞於是又除斷趾法改為加役流三千里作三年又舊條兄弟分後蔭不相及連坐俱死祖死孫配流會有同州人房強弟任統軍於岷州以謀反伏誅強從坐太宗嘗録囚徒聞其將死令百寮詳議玄齡等復定議曰按禮孫為王父尸案令祖有蔭孫之義然則祖孫親重而兄弟屬輕應重反流合輕反死據理論情深為未愜請定律祖孫與兄弟緣坐俱配流其以惡言犯法不能為害者情狀稍輕兄弟免死配流為允從之十一年五月上問大理寺卿劉德威曰近來刑網稍密何也對曰誠在君上不由臣下主好寬則寬好急則急律文失入減三等失出減五等今則反是失入則無辜失出則獲大罪所以吏各自愛競執深文畏罪之所致耳太宗然其言由是失入者各依律文十六年七月敕今後自害之人據法加罪仍從賦役自隋季政亂徵役繁多人不聊生又自稱為折手跛足以避征戌或自戕折無賴之徒故習未除故立此例十八年九月茂州童子張仲文忽自稱天子口署其流輩數人為官司大理以為指斥乘輿雖會赦猶斬太常卿攝刑部尚書韋挺奏仲文所犯止當妖言今既會赦即當免死上怒挺曰十五年懷州人吳至浪入先置鈎陳口稱天子大理刑部皆言指斥乘輿咸斷處斬今仲文稱妖乃同罪異罰卿乃作福于下而歸虐于上耶挺拜謝趨退自是憲司不敢以聞數日刑部尚書張亮復奏仲文請依前以妖言論上謂亮曰韋挺不識刑典以重為輕當時怪其所執不為處斷卿今日復為執奏不過欲自取刪正之名耳屈法要名朕所不尚亮默然就列上因謂之曰爾無恨色而我有猜心夫人君含容屈在於我可申君所請屈我所見其仲文宜處以妖言二十一年刑部奏言準律謀及大逆父子皆坐死兄弟處流此則輕而不懲望請改重法制遣百寮詳議司議郎敬播議曰昆季孔懷天倫雖重比于父子情理已殊生有異室之文死則别宗之義今有髙官重爵本蔭惟逮子孫胙土析圭餘光不及昆季豈有不霑其蔭輒受其辜背理違情恐為太甚必其反茲春令踵彼秋荼創刺骨於道德之辰建深文於刑措之日臣將不及物誰謂宜詔從之永徽二年七月二十五日華州刺史蕭齡之前任廣州都督受左智逺及馮盎妻等金銀奴婢等詔付羣臣議奏上怒令於朝堂處盡御史大夫唐臨奏曰臣聞國家大典在于刑賞古先哲王惟刑是恤今天下太平合用堯舜之典比來有司多行重法敘勳必須刻削論罪務從重科非是憎惡前人止欲自為身計今議齡之之事有輕有重重者至流輕者除名以齡之受委大藩贓罪狼藉原情取事死有餘辜然既遣詳終須近法臣竊以律為八議並依周禮舊文務其異於衆臣所以特制議法禮王族刑於僻處所以議親刑不上大夫所以議貴明知重其親貴議欲緩刑非為嫉其賢能謀致深法今議官必於常法之外議令入重正與堯舜相反不可為萬代法臣既處法官敢不以聞詔遂配流嶺南神龍元年正月趙冬曦上書臣聞夫令之律者昔乃有千餘條近者隋之姦臣將弄其法故著律曰犯罪而律無正條者應出罪則舉重以明輕應入罪則舉輕以明重立夫一條而廢其數百條自是迄今竟無刋革遂使死生罔由乎法律輕重必由乎愛憎受罰者不知其然舉事者不知其犯臣恐賈誼見之必為之慟哭矣夫立法者貴乎下人盡知則天下不敢犯耳何必飾其文義簡其科條哉夫科條省則下人難知文義深則法吏得便下人難知則暗陷機穽矣安得無犯法之人哉法吏得便則比附而用之矣安得無弄法之臣哉臣請律令格式復更刋定其科條言罪直書其事無假文飾其以準加減比附量情及舉輕以明重不應得為而為之類皆勿用之使愚夫愚婦聞之必悟則相率而逺之矣亦安有知而故犯哉茍有犯者雖貴必坐則宇宙之內肅肅然咸服矣故曰法明則人信法一則主尊書曰刑期無刑誠哉是言開元十年十月前廣州都督裴胄先下獄中書令張嘉貞奏請決杖兵部尚書張説進曰臣聞刑不上大夫以近於君也故曰士可殺不可辱臣今秋巡遣中途聞薑皎朝堂決杖流皎是三品亦有微功不宜決杖廷尉以卒伍待之且律有八議勳貴在焉今胄先既不可輕豈可決罰上然其言嘉貞不可退而謂説曰何言事之深也説曰宰相者時來即為豈能長據若貴臣盡當可杖但恐吾等行當及之此言非為胄先乃為天下士君子也天寶六年正月十三日敕自今已後所斷絞斬刑者宜削除此條仍令法官約近例詳定處分上元二年十二月十四日刑部奏準名律法云獄成謂贓狀露驗及尚書省斷訖未奏疏曰贓謂所犯之贓見獲本物狀謂殺人之類得狀為驗雖在州縣並為獄成若尚書省斷訖未奏即刑部覆訖未奏亦為獄成今法官啇量若款自承伏已經聞奏及有敕付法刑名更無可移者請獄成臣今與法官審加詳議將為穩便如天恩允許仍永為常式敕旨依二年六月十四日刑部奏謹按五刑笞杖徒流死是也今準勑除削絞死唯有四刑每定罪頒降死刑不免還計斬絞敕律平用法理難明又應決重杖之人今式先無分析京城知是蠧害決者多死外州見流嶺南決不至死決有兩種法開二門勑旨斬絞刑宜依格律處分至寶應元年九月八日刑部大理奏準式制敕處分與一頓杖者決四十至别與一頓及重杖一頓並決六十無文至死者望請式處分又制敕或有令決痛杖一頓者式文既不載杖數請準至到與一頓決六十並不至死敕旨依至建中三年八月二十七日刑部侍郎任宏奏其十惡中惡逆已上四等罪請準律用刑其餘犯别罪應合處斬刑自今已後並請決重杖一頓處死以代極法重杖既是死刑諸司使不在奏請決重杖限敕旨依元和二年十一月斬李錡并男師回於子城西南隅初詔書削錡屬籍宰臣鄭絪李吉甫等議其所坐親疏未定乃召兵部郎中蔣武問曰詔罪錡一房當是大功內耶武曰大功是錡堂兄弟即淮安王神通之下錡即淮安王五代孫也淮安有大功于國陪陵配饗事著史册今若以錡一人所為獲罪而上纍淮安非也吉甫又問曰錡親兄弟當連坐否武曰錡親兄弟即是若幽之子若幽纍著功勳死於王事即使錡之兄弟從坐若幽便當籍沒揆於典禮亦所未安宰臣頗以為然五年五月敕李師古嘗經任待以始終雖是師道近親典重宜有差降其妻裴氏及女宜於鄧州安置又敕李宗奭比於凶逆自抵誅夷用戒猖狂合從孥戮兹從解網貸以刑章特示令宏載寬緣坐其妻常氏及男女等先收在掖庭並宜放出前數日上謂宰臣曰李師古雖自襲祖父然朝廷待以始終其妻於師道即嫂叔也雖曰逆人親屬量其輕重宜降等又宗奭雖抵嚴憲其事情比之大逆亦有不同其妻士族也今與其子女俱在掖庭於法皆似過深卿等曽留意否崔羣對曰聖情仁惻罪止凶魁其妻子近屬倘獲寬恕實合宏覆之道上遂出之準法逆人親屬得原免者唯止一身至是其奴婢資貨悉令還付長慶二年四月刑部員外郎孫革奏準京兆府申雲陽力人張涖欠羽林官騎康憲錢米懲理之涖乘醉拉憲氣息將絶憲男買得年十四將救其父以涖角抵力人不敢揮解遂將木鍤擊涖之首見血後三日致死者準律父為人所毆子往救擊其人折傷減比鬬三等至死者依常律即買得合當死刑伏以律令者用防凶暴孝行者以開教化今買得救父難是性孝非暴擊張涖是心切非凶以髫丱之嵗正父子之親若非聖化所加童子安能及此王制稱五刑之理必原父子之親春秋之義原心定罪周書所以訓諸罰有權今買得生被皇風幼符至孝哀矜之宥伏在聖慈職當讞刑合申善惡謹先具事由陳奏伏冀下中書門下商量敕旨康買得尚在童年能知子道雖殺人當死而為父可哀若從沈命之科恐失原情之義宜付法司減死罪一等處分寶厯三年京兆府有姑鞭婦致死者奏請斷以償死刑部尚書桞公綽議以尊驅卑非鬭也且其子在以妻而戮其母非教也遂減死焉太和四年十二月刑部員外郎張諷大理少卿崔玘等奏議親議貴事其一議親曰皇帝至太皇太后皇后親有內外服同者皆在議條伏以親踈之序既有等衰即雨露之恩皆宜沾洽此實皇王大猷自家刑國親九族叶萬邦之旨也近者綘州刺史裴鋭所犯贓罪至深陛下以太皇太后之親下尚書省集議此乃陛下知刑賞之理重與衆共之伏請今後親有任刺史監臨主守犯贓罪得蒙減死者必重其過直以贓罪為汚纍定刑流決外其後子孫並不得任理人官及為監臨主守庶得家知其耻人革非心其一議貴曰謹按禮經貴謂近於君也非獨髙秩厚俸之為貴今後刺史非在朝文武職事三品官任者於所部犯贓抵死罪並不得以刺史品秩議貴徴司議條免所犯罪如先任在朝三品合在議條者即準議親條決流外子孫皆不得任理人官及監臨主守如有法官及本官推官不詳官品妄有引議請科違敕罪其功勤賔故等有犯贓罪同者並請準親貴之法敕官必任賢親貴無宜輕授罰不及嗣經訓具有明文若坐子孫慮傷事理此一節宜且仍舊餘依六年五月興平縣人管興因醉殺人而亡官捕其父囚之興自歸有司請罪京兆尹杜悰御史中丞宇文鼎以興自首免父之囚其孝可奬請免死詔兩省官參議皆言殺人者死古今共守興不可免久不決上竟從京兆尹御史中丞等議免死決杖八十配流靈州開成三年五月刑部奏準今年二月八日赦書官典犯罪不在此限者伏以律載贓名其數有六官典有犯並麗刑科其間有入已者罪即懸别今請監主守將官物私自貸用并借貸人及百端欺詐等不在赦限如將官物還充公用文記分明者並請原免敕旨宜依會昌元年十二月都省奏準開成五年十二月十四日中書門下奏準律竊盜五匹已工加徒流今自兩河南北建于牧守所在為政寬猛不同或以百錢以下斃踣至數十千不死輕重既違法律多以收禁為名法自専行人皆異政然禁嚴則盜賊屏息閭里皆安政緩則攘竊盜行平人受弊定其取捨在峻典刑自今已後天下州府竊盜賊計贓幾貫須處極法臣等商量望委中書門下五品已上尚書省四品已上御史臺五品已上與京兆尹同議奏聞仍編入格令所冀巽懦者政無寬縱剛猛者刑不至殘各奉朝章法歸畫一其強盜賊法律已重不在此限仍委出使郎官御史及度支鹽鐡巡院察訪務令遵守不得隳違者伏以竊盜本無死刑遂使刑法不一臣等既奉詔旨敢不盡心臣請自今已後大不應竊盜賊贓至絹三匹即處極法如未滿二匹即任節級科處不失罪人其計贓數即請準律以所在上估絹為定其兩京及軍府浩攘之地或事繁一時制斷有異則請許量情定罪務在得中然後法禁不虧刑名可守勑旨朝廷施令所貴必行合於事情方可經久自今以後竊盜計贓至錢一貫已上處極法抵犯者便準法處分不得以收禁為名其奴婢本主及親戚同居行盜並許減等任長使酌度輕重處分如再四抵犯及有徒黨須重懲不在此例三年十二月澤潞劉稹平欲定其母裴氏罪令百寮議之刑部大理等議曰周禮司寇之職男子入於罪𨽻女子入於舂稿漢律云妻子殁為奴婢鍾繇曰自古帝王罪及妻子又晉朝議在室之女從父母之罰既適之婦從夫家之罰謹按奴婢舂稿罪罰之類名則為重而非罪刑然事出一時法由情斷裴氏為惡有素為姦已成分衣固其人心申令安其逆志臣等參議宜從重典從之五年正月三日制節文據律已去任者公罪流已下勿論公罪之條情有輕重茍涉欺詐豈得勿論自後公罪有情狀難恕並不在勿論之限大中四年正月敕攘竊之興起於不足近日刑法頗峻盜竊者刑網一干便處極法輕人性命重彼貨財既多殺傷且乖教化况非舊章自應議改其會昌元年二月二十六日敕宜令所司重詳定條流聞奏時刑部及大理卿同議奏請依建中三年三月十四日敕每有盜賊贓估價自絹三匹已上決設數不充量情科處五年十月敕今後有官典犯贓及諸色取受但是全未發覺已前能經陳首即準律文與減等如知事發已有明兆雖未被追捕勘問亦不許陳首之限乾符四年正月五日敕法律有去任勿論之條頗為僥幸今後應刪唐會要卷三十九
