body:
  text: 唐會要卷三十五宋王溥撰學校武德元年十一月四日詔皇族子孫及功臣子弟於祕書外省别立小學貞觀五年以後太宗數幸國學太學遂增築學舍一千二百間國學太學四門亦增生員其書算等各置博士凡三千二百六十員其屯營飛騎亦給博士授以經業無何髙麗百濟新羅髙昌吐蕃諸國部長亦遣子弟請入國學於是國學之內八千餘人國學之盛近古未有光宅二年梓州進士陳子昻上疏曰臣竊獨有私恨者陛下方欲興崇大化而不知國家太學之廢積以嵗月久矣學堂蕪穢略無以詩書禮樂相聞習者陛下明詔尚未及之愚臣所以私恨也臣聞天子立太學所以聚天下賢英為政之首故君臣上下之禮於是興焉揖讓樽俎之節於此生焉是以天子得賢臣由此也今則荒廢委而不論而欲睦人倫興禮讓失之於本而求之於末豈可得哉三年不為禮禮必壞三年不為樂樂必崩奈何天子之政而棄禮樂哉陛下何不詔天下胄子使歸太學而習業乎斯亦國家之大務也聖厯二年十月鳳閣舍人韋嗣立上疏曰臣聞禮記曰化人成俗必由乎學學之於人其用蓋博故立太學以教於國設庠序以化於邑王之諸子卿大夫士之子及國之俊選皆造焉自天子至于庶人未有不須學而成者國家自永淳以來二十餘載國學廢散胄子衰缺時輕儒學之官莫存章句之選貴門後進競以僥幸升班寒族常流復因凌替弛業考試之際秀茂罕登驅之臨人何以從政又垂拱以後文明在辰盛典鴻休日書月至因藉際會入仕尤多陛下誠能下明制發德音廣開庠序大敦學校三館生徒即令追集王公已下子弟不容别求仕進皆入國學服膺訓典崇飾館廟尊尚師儒盛陳奠菜之儀宏敷講説之會使士庶觀聽有所發揚𢎞奬道德於是乎在則四海之內靡然向風矣神龍二年九月敕學生在學各以長幼為序初入學皆行束修之禮於師國子本學各絹三匹四門學絹二匹俊士及律書算學州縣各絹一匹皆有酒酺其束修三分入博士二分助教以每年國子監所管學生國子監試州縣學生當州試並選藝業優長者為試官仍長官監試其試者通計一年所受之業口問大義十條得八已上為上得六已上為中得五以上為下及其學九年律生則六年不貢舉者並解追其從縣向州者年數下第並須通計服闋重仕者不在計限不得改業開元二十一年五月敕諸州縣學生年二十五已下八品九品子若庶人生年二十一通一經已上及未通經精神超悟有文詞吏學者每年銓量舉選所司簡試聽入四門學充俊士即諸色人省試不第情願入學者聽國子監所管學生尚書省補州縣學生所在長官補諸州縣學生既習正業之外仍令兼習吉凶禮公私有禮事處令示儀式餘皆不得輒使許百姓任立私學其欲寄州縣受業者亦聽二十六年正月十九日敕古者鄉有序黨有孰將以𢎞長儒教誘進學徒化人成俗率由於是其天下州縣每鄉之內各增置一學仍擇師資令其教授貞元三年正月右補闕宇文炫上言請京畿諸縣鄉村廢寺並為鄉學并上制書事二十餘件疏奏不報太和七年八月赦節文應公卿士族子弟取來年正月以後不先入國學習業者不在應明經進士之限會昌五年正月制公卿百官子弟及京畿內士人寄客修明經進士業者並宜𨽻名太學外州寄土人並𨽻名所在官學褒崇先聖先師已下附武德二年六月一日詔曰盛德必祀義在方册達人命世流慶後昆爰始姬旦贊翊周邦創設禮樂大明典憲啓生民之耳目窮法度之本源粵若宣尼天資濬哲四科之數歷代不刋三千之徒風流無歇惟兹二聖衛道生人宗祀不修孰明褒尚宜令有司於國子監立周公孔子廟各一所四時致祭仍博求其後具以名聞詳考所宜當加爵土貞觀二年十二月尚書左僕射房玄齡國子博士朱子奢建議云武德中詔釋奠於太學以周公為先聖孔子配享臣以周公尼父俱是聖人庠序置奠本緣夫子故晉宋梁陳及隋大業故事皆以孔子為先聖顔回為先師厯代所行古人通允伏請停祭周公升夫子為先聖以顔回配享詔從之十一年七月二十四日修宣尼廟於兖州給户二十充享祀焉二十一年二月十五日詔以左丘明卜子夏公羊髙穀梁赤伏勝髙堂生戴聖毛萇孔安國劉向鄭衆杜子春馬融盧植鄭康成服子慎何休王肅王輔嗣杜元凱范寧等二十一人代用其書垂於國胄自今有事於太學並令配享尼父廟堂顯慶二年七月十一日大尉長孫無忌等議曰按新禮孔子為先聖顔回為先師崇祀不祧興朝之良法又準貞觀二十一年以孔子為先聖更以左丘明等二十一人與顔回俱配尼父於太學並為先師今據永徽令文改用周公為先聖遂黜孔子為先師顔回左丘明並為從祀謹按禮記云凡學春官釋奠于先師鄭玄注曰官謂詩書禮樂之官也先師者若禮有髙堂生樂有制氏詩有毛公書有伏生可以為師者又禮記曰始立學釋奠於先聖鄭玄注曰若周公孔子也據禮為定昭然自别聖則非周即孔師則偏著一經漢魏以來取舍各異顔回夫子互作先師宣父周公迭為先聖求其節文遞有得失所以貞觀之末新降綸言依禮記之明文酌康成之奧説正夫子為先聖加衆儒為先師永垂制於後昆革往代之紕繆而今新令不詳制旨輒事刋改遂違明詔但成王幼年周公踐極制禮作樂功比帝王所以舜禹湯文武成王周公為六君子又説明王孝道乃述周公嚴配此即姬旦鴻業合同王者祀之儒官就享實貶其功仲尼生衰周之末極文喪之弊祖述堯舜憲章文武𢎞聖教於六經闡儒風於千祀故孟軻稱生靈以來一人而已自漢已降奕葉封侯崇奉其聖迄于今日胡可降兹上哲俯入先師且丘明之徒見行其學貶為從祀亦無故事今請改令從詔於義為允其周公仍依别禮配享武王詔從之三年文宣王廟樂詔用宣和之舞國子博士范頵撰樂章乾封元年正月三十日追贈孔子為太師至天授元年封孔子為隆道公總章元年二月一日顔回贈太子少師曾參贈太子少保至太極元年二月十六日追贈顔回為太子太師曾參為太子太保並配享孔子廟至開元二十七年八月二十四日詔曰𢎞我王化在乎師儒能發此道啓迪含靈則生人以來未有如夫子者也所謂自天攸縱將聖多能德配乾坤身揭日月故能立天下之大本成天下之大經美政教移風俗君君臣臣父父子子人到于今受其賜不其猗歟嗚呼楚王莫封魯公不用俾夫大聖才列陪臣栖遑旅泊固可嘆矣年祀寢逺光靈益彰雖大有褒稱而未為崇峻不副於實人其謂何夫子既稱先聖可追諡為文宣王令三公持節册命其後嗣褒聖侯改封嗣文宣王昔周公南面夫子西坐今位既有殊豈宜依舊宜補其墜典永作成式其兩京國子監及天下諸州夫子南面坐十哲等東西行列且門人三千見稱十哲包夫衆美實越等夷暢玄聖之風規發人倫之耳目並宜褒贈以寵賢明其顔子既云亞聖須優其秩顔子贈兖國公閔子騫贈費侯冉伯牛贈鄆侯仲弓贈薛侯冉有贈徐侯子路贈衛侯宰我贈齊侯端木子貢贈黎侯子遊贈吳侯卜子夏贈魏侯又夫子格言參也稱魯雖居七十之數不載四科之目頃雖參於十哲終未殊於等倫久稽先旨俾循舊位庶乎禮得其序人焉式瞻二十二日命尚書右丞相裴耀卿攝太尉持節就國子廟册命畢所司奠祭亦如釋奠之禮又遣太子少保崔琳往東都就廟行册禮二十七日敕兩京及兖州舊宅廟像宜改服冕衮其州及縣廟宇既小但移南面不須改其衣服兩京樂用宫懸春秋二仲上下令三公攝行事七十子並宜追贈曾參贈郕伯顓孫師陳伯淡臺滅明江伯宓子賤單伯原憲原伯公冶長莒伯南宫適郯伯公哲哀郳伯曽點宿伯顔路杞伯商瞿蒙伯髙柴共伯漆雕開滕伯公伯寮任伯司馬牛向伯樊遲柳蕭樊伯有若卞伯公西華郜伯巫馬期鄫伯梁鱣梁伯顔伯冉孺紀伯曹恤曹伯伯虔聊伯公孫龍黃伯冉季東平伯秦子男少梁伯漆雕哆武城伯顔髙琅琊伯漆雕徒父須句伯壤駟赤北衛伯商澤睢陽伯石作蜀石邑伯任不齊任城伯公夏守亢孺伯公良孺東牟伯后處營丘伯秦開彭衙伯奚容蒧下邳伯公肩定新田伯顔相臨沂伯鄡單銅鞮伯句井強淇陽伯罕父黑乘丘伯秦商上洛伯申黨召陵伯公祖子之期思伯榮子期雩婁伯縣成巨野伯左人郢臨淄伯燕伋漁陽伯鄭子徒榮陽伯秦非􅊈陽伯施之常乘氏伯顔噲朱虛伯步叔乘淳于伯顔之僕東武伯原兊萊蕪伯樂劾昌平伯廉潔莒父伯顔何開陽伯叔仲會瑕丘伯狄黑臨濟伯邽伯巽平陸伯孔忠汶陽伯公西輿如重丘伯公西蒧祝阿制曰聖道可褒豈限今古追贈之典旌德有焉夫子十哲之外曽參六十七人同升孔門傳習經術子之四教爾實行之親授微言式揚大義是稱達者不其盛歟欽若古風載崇輔聖至於十哲被寵章而曽子之倫未有謂稱宜亞四科之士以流五等之封俾與先師咸膺盛禮神龍元年正月一日赦文諸州孔子廟堂有不向南者改向正南其年五月二十八日制鄒魯之邑百户為太師隆道公采邑用供薦饗太極元年詔給宣尼廟三十户以供灑掃開元八年三月十八日國子司業李元瑾奏兩京國子監廟堂先聖孔宣父配坐先師顔子今其像見立侍準禮授坐不立授立不跪况顔子道亞生知才充入室改當配享其像見立請據禮文合從坐侍又四科弟子閔子騫等並服膺儒術親承聖教雖復列像廟堂不參享祀謹按列祠如何休等二十二賢猶霑從祀豈有升堂入室之子獨不霑配享之條望請春秋釋奠列享在二十二賢之上七十子者則文翁之壁尚不闕如豈有國庠遂無圖繪請令有司圖形於壁兼為立贊庶敦勸儒風光崇聖烈曽參孝道可崇獨受經於夫子望準二十二賢從享詔曰顔回等十哲宜為坐像悉令從祀曾參大孝德冠同列特為塑像坐於十哲之次因圖畫七十弟子及一十二賢於廟壁上以顔子亞聖親為製贊書於石仍令當朝文士分為之贊題其壁焉蘇氏冕曰嘗檢貞觀顯慶年敕並稱三十二賢又檢太極開元年敕即稱三十二賢將前敕及學令比類於服虔之下有十二賢未知何年月附入建中三年閠正月以文宣王三十七代孫齊卿為兖州司馬襲文宣王元和四年二月以文宣王三十八代孫惟昉為兖州參軍十三年正月以文宣王三十八代孫惟晊襲文宣王會昌二年十月以文宣王三十九代孫榮為國子監丞襲文宣一王大中三年十一月國子祭酒馮審奏文宣王廟始太宗立之睿宗書額武后初政之日改篆題大周二字請削去從之大順元年二月宰臣兼國子祭酒孔緯奏文宣王祠廟經兵火焚毁有司釋奠無所請內外之臣各於本官料錢上每一緡抽千文助修國學從之釋奠武德七年二月十七日幸國子學親臨釋奠引道士沙門與博士雜相駁難久之貞觀十四年二月十日幸國子監親臨釋奠二十年二月詔皇太子於國學釋奠於先聖先師皇太子為初獻國子祭酒張復胤為亞獻光州刺史攝司業趙𢎞智為終獻既而就講𢎞智演孝經忠臣孝子之義右庶子許敬宗上四言詩以美其事二十一年中書侍郎許敬宗等奏按禮記文王世子凡學春官釋奠於先師鄭玄注曰官謂詩書禮樂之官也彼謂四時之學將習其道故儒官釋奠各於其師既非國家行禮所以不及先聖至於春秋二時合樂之日則天子視學命有司興秩節總祭先聖先師焉秦漢釋奠無文可檢至於魏氏則使太常行事自晉宋紹降時有親行而學官為主全無典實且名國學樂用軒懸樽俎威儀並皆官備在於臣下理不合專況凡在小神猶皆遣使行禮釋奠既準中祀據理必須稟命今後國學釋奠令國子祭酒為初獻祝詞稱皇帝謹遣仍令司業為亞獻國子博士為終獻其諸州刺史為初獻上佐為亞獻博士為終獻縣學縣令為初獻丞為亞獻博士既無秩請主簿通為終獻若缺並以次差攝州縣釋奠既請遣刺史縣令親為獻主望準祭社給明衣修附禮令為永式學令祭以太牢樂用軒懸六佾之舞並登歌一部與大祭祀相遇改用中丁州縣常用上丁無樂祭用少牢總章元年二月二十九日皇太子𢎞釋奠於國學開耀元年二月十九日皇太子釋奠國學永隆二年二月皇太子親行釋奠之禮景龍二年七月皇太子親釋奠於國學有司草儀注令從臣皆乘馬著衣冠太子左庶子劉子玄進議曰古者自大夫巳上皆乘車馬而以馬為騑服魏晉已降迄於隋世朝士又駕牛車至如李廣北征解鞍憩息馬援南伐據鞍盼顧則鞍馬之設行於軍旅戎服所乘貴於便習者也按江左官尚書郎而輒乘馬則為御史所彈又顔延年罷官後好騎馬出入閭里當世稱其放誕此則專車慿軾可擐朝衣單馬御鞍冝從褻服求之近古灼然之明驗也褒衣博帶方履高冠本非馬上所施自是車中之服且言長裾廣袖襜如翼如鳴佩紆組鏘鏘奕奕馳驟於風塵之內出入於旌棨之間倘馬有驚逸人從顛墜遂使屬車之右遺履不收清道之旁絓驂相續因以受嗤行路有損威儀其乘馬衣冠竊謂宜從廢改皇太子令付外宣行仍編入令以為常式太極元年二月二十八日皇太子親釋奠開講筵國子司業禇無量執經開元七年十一月十一日以貢舉人將謁先師質問疑義敕皇太子及諸子宜行齒胄禮二十一日皇太子謁先聖皇太子初獻亞獻終獻並以胄子充有散騎常侍禇無量講孝經并禮記文王世子篇初詔侍中宋璟為亞獻中書侍郎蘇頲為終獻及臨享上思齒胄之義乃改焉十一年九月七日敕春秋二時釋奠諸州府並停牲牢惟用酒脯自今已後永為常式二十六年正月敕諸州鄉貢見訖令引就國子監謁先師學官為之開講質問疑義所司設食𢎞文崇文兩館學生及監內舉人亦聽參焉遂為常式每年行之二十八年二月五日敕文宣王廟春秋釋奠宜令三公行禮著之常式二十日國子祭酒劉瑗奏準故事釋奠之日羣官道俗皆合赴監觀禮依故事著之常式制可建中三年二月國子司業歸崇敬奏上丁釋奠其日準舊例合集朝官講論五經文義自大厯五年以前常行不絶其年八月以後權停講論今既日逼恐須復依舊奏貞元二年二月釋奠自宰臣已下畢集於國學學官升講座陳五經大義及先聖之道九年九月太常奏以十一月舉貢人謁先師令與親享太廟日同準六典上丁釋奠若與大祀同日即用中丁謁先師請别擇日從之十五年四月歸崇敬為膳部郎中奏時議每年春秋二時釋奠祝版御署訖揖北面而立以為禮太重按大戴禮師尚父授周武王丹書武王東面受之請參酌輕重庶得其宜元和九年十一月禮部貢院奏貢舉人見謁訖先師準格學官為開講質定疑義常參及致仕官觀禮舊例至時舉奏詔宜謁先師餘並停自後雖每年舉奏並不復行經籍武德五年祕書監令狐德棻奏今乘喪亂之餘經籍亡逸請購募遺書重加錢帛增置楷書吏令繕寫數年間羣書畢備至貞觀二年祕書監魏徴以喪亂之後典章紛雜奏引學者校定四部書數年之間祕府粲然畢備乾封元年十月十四日上以四部羣書傳寫訛謬並亦缺少乃詔東臺侍郎趙仁本兼蘭臺侍郎李懷嚴兼東臺舍人張文瓘等集儒學之士刋正然後繕寫文明元年十月敕兩京四庫書每年正月據舊書聞奏每三年比部勾覆具官典及攝官替代之日據數交領如有欠少即徴後人景雲三年六月十七日以經籍多缺令京官有學行者分行天下搜撿圖籍開元三年右散騎常侍禇無量馬懷素侍宴言及內庫及祕書墳籍上曰內庫書皆是太宗髙宗前代舊書省比日常令宫人主掌所有欠缺未能填補篇卷錯亂尋檢甚難卿試為朕排比至七年五月降敕於祕書省昭文館禮部國子監太常寺及諸司許官及百姓等就借寫之及整比四部書成上令百姓官人入乾元殿東廊觀書無不驚駭七年九月敕比來書籍缺亡及多錯亂良由簿厯不明綱維失錯或須披閲難可校尋令麗正殿寫四庫書各於本庫每部為目録其有與四庫書名目不類者依劉歆七略排為七志其經史子集及人文集以時代為先後以品秩為次第其三教珠英既有缺落宜依舊目隨文修補十九年冬車駕發京師集賢院四庫書總八萬九千卷經庫一萬三千七百五十二卷史庫二萬六千八百二十卷子庫二萬一千五百四十八卷集庫一萬七千九百六十卷其中雜有梁陳齊周及隋代古書貞觀永徽麟德乾封總章咸亨舊奉制敕二十四年十月車駕從東都還京有敕百司從官皆令減省集賢書籍三分留一貯在東都至天寶三年六月四庫更造見在庫書目經庫七千七百七十六卷史庫一萬四千八百五十九卷子庫一萬六千二百八十七卷集庫一萬五千七百二十卷從三年至十四年庫續寫又一萬六千八百四十三卷天寶三年七月敕先王令範莫越於唐虞上古遺書莫隆於訓誥雖百篇奧義前代或亡而六體奇文舊規尤在其寫書應古體文字並依今字繕寫施行其舊本仍藏書府其載十二月敕自今已後宜令天下家藏孝經一本精勤教習學校之中倍加傳授州縣官長明申勸課焉十一年十月敕祕書省檢覆四庫書與集賢院計會填寫貞元七年十二月祕書監包佶奏開元禮所與月令相涉者請選通儒詳定從之開成元年七月詳定使奏祕書省四庫見在新舊書籍共五萬六千四百七十六卷並無文集及新寫文書自今已後所填補舊書及别寫新書並隨日校勘並勒創立文案别置納厯隨月申臺並觀察使每嵗末計課申數具狀聞奏從之太和三年正月祕書省據御史臺牒準開成元年七月敕應寫書及校勘書籍至嵗末聞奏者今勘楷書等從今年正月後應寫書四百一十七卷四年二月集賢院奏大中二年正月一日以後至年終寫完貯庫及填缺書凡三百六十五卷計用小麻紙一萬一千七百七張五年正月祕書省牒報御史臺從今年正月已後當司應校勘書四百五十二卷書法太宗嘗於晉史右軍傳後論之曰鍾書布纎濃分疏密霞舒雲卷無所間然但其體古而不今字長而逾制獻之雖有父風殊少新巧疏瘦如凌冬之枯樹雖槎枿而無屈伸拘束若嚴家之餓𨽻惟羇羸而不放縱蕭子雲無丈夫之氣行行如縈春蚓步步如綰秋蛇卧王濛於紙中坐徐偃於筆下以兹播美豈濫名耶所以詳察古今研精篆素盡善盡美其惟王逸少乎觀其點曵之工裁成之妙煙霏露結狀若斷而還連鳳翥龍蟠勢如斜而反直玩之不覺為倦覽之莫識其端心慕力追此人而已貞觀六年正月八日命整理御府古今工書鍾王等真迹得一千五百一十卷至十年太宗嘗謂侍中魏徴曰虞世南死後無人可與論書徴云禇遂良下筆遒徑甚得王逸少體太宗即日召命侍讀嘗以金帛購求王羲之書迹天下爭出其書詣闕以獻當時莫能辨其真偽遂良備論所出一無舛誤十四年四月二十二日太宗自為真草書屏風以示羣臣筆力遒徑為一時之絶初購求人間書凡真行二百九十紙裝為七十卷草二十紙裝為八十卷每聽政之暇則臨看之嘗謂朝臣曰書學小道初非急務時或留心猶勝玩日凡諸藝業未有學而不得者也病在心力懈惰不能專精耳朕少時為公子喜戰陳適義旗之始乃平冦亂執金鼓必自指揮觀其陳即知強弱每取我弱對其強以我強對其弱敵犯我弱追奔不踰百數十步我擊其弱必突過其陳自背擊之無不大潰多用此制勝思得其理深也我今臨古人之書殊不學其形勢惟在求其骨力及得骨力而形勢自生耳然我知所為皆先作意是以果能成也初置𢎞文館選貴臣子弟有性識者為學生內出書命之習學又人間有善書追徴入官十數年間海內從風至十八年二月十七日召三品已上賜宴於玄武門太宗操筆作飛白書羣臣乘酒就太宗手中相競散騎常侍劉洎登御牀引手然後得之其不得者咸稱洎登牀罪當死請付於法太宗笑曰昔聞倢妤辭輦今見常侍登牀貞觀十八年五月太宗為飛白書作鸞鳳蟠龍等字筆勢驚絶謂司徒長孫無忌吏部尚書楊師道曰五日舊俗必用服玩相賀朕今各賜君飛白扇二枚庶動清風以增美德龍朔二年四月上自為書與遼東諸將者許敬宗曰許圉師常自愛書可於朝堂開示圉師見而驚喜私謂朝官曰圉師見古迹多矣魏晉已後惟有二王然逸少少力而妍子敬妍而少力今見聖迹兼絶二王鳳翥鸞回實古今聖書神功元年五月上謂鳳閣侍郎王方慶曰卿家多書合有右軍遺迹方慶奏曰臣十代再從伯祖羲之書先有四十餘卷貞觀十二年太宗購求先臣並以進訖惟有一卷見在今亦進訖臣十一代祖導十代祖洽九代祖珣八代祖曇首七代祖僧綽六代祖仲寶五代祖騫髙祖規曾祖褒并九代三從伯祖晉中書令獻之已下二十八人書共十卷上之上御武英殿示羣臣仍令中書舍人崔融為寶章集以敘其事復賜方慶當時以為榮開元六年正月三日命整理御府古今工書鍾王等真迹得一千五百一十卷十六年五月內出二王真迹及張芝張昶等古迹總一百六十卷付集賢院依文榻四本進內分賜諸王初貞觀中搜訪王羲之等真迹人間古本畢集令魏徴虞世南禇遂良等定其真迹及小王張芝等亦各隨多少勒為卷帙以貞觀字為印印縫及卷之首尾其墨迹又令遂良真書小字貼紙影其古本亦有是梁隋官本者梁則滿騫徐增朱異等隋則江總姚察等署記太宗又令魏禇等卷下更書名記其後蘭亭一本相傳云將入昭陵又一本長安神龍之際太平安樂公主嘗奏借出拓寫因此遂失所在開元五年敕陸元悌魏哲劉懷信等檢校臨模標為兩卷總八十卷餘並墜失元悌又嘗云前代名賢押署之迹惟以已之名氏代焉上自書開元二字為印以印記之王右軍凡一百三十卷小王二十卷張芝張昶書各一卷右軍真行書惟有黃庭告誓等四卷存焉元和十四年九月考功郎中蕭祐進古今書畫二十卷開成三年以諫議大夫桞公權為工部侍郎依前翰林侍書學士公權初學王書遍閲近代筆法體勢徑媚自成一家所書西明寺金剛經碑備有鍾王歐虞禇之體上嘗以夏日與學士聨句上曰人皆苦炎熱我愛夏日長公權曰薰風自南來殿閣生微涼上吟久之因令題於殿壁字方圓五寸帝曰鍾王復生無以加焉帝召升殿御前書三紙軍容使西門李玄捧硯樞密使崔巨源過筆一紙真書十字曰衛夫人傳筆法於王右軍一紙行書十一字曰永禪師真草千字文得家法一紙草書八字曰謂語助者焉哉乎也常評硯以青州石為第一言墨則首絳州墨硯次之唐會要卷三十五
