body:
  text: 唐會要卷二十四宋王溥撰受朝賀舊制元日大陳設皇太子獻夀次上公中書令奏諸州表黃門侍郎奏祥瑞戶部尚書奏諸州貢獻禮部尚書奏諸蕃貢獻大史奏雲物侍中奏禮畢然後中書令又與供奉官獻夀時殿上皆呼萬嵗按舊儀闕供奉官獻壽禮但依位次立禮畢竟無拜賀開元二十五年李林甫革其舊儀奏而行之冬至亦然貞觀十三年十月三日尚書左僕射房玄齡奏天下太平萬幾事簡請三日一臨朝詔許之至二十三年九月十一日太尉無忌等奏請視朝坐日上報曰朕登大位日夕孜孜尤恐壅滯衆務自今以後每日常坐其後至永徽二年八月二十九日下詔來月一日太極殿受朝此後每五日一度太極殿視事朔望朝即永為常式顯慶二年二月太尉長孫無忌等奏以天下無虞請隔日視事許之聖厯三年正月制朝官有期喪大功未葬不得朝賀神龍元年二月朝則天皇帝於上陽宫因敕每十日一朝左臺侍御史盧懷慎上表曰臣聞昔漢祖受命五日一朝太公於櫟陽宫今日陛下豈不欲為此乎臣度其事業與此有異夫漢祖起布衣登皇極有天下尊歸於父故行於此耳今陛下守文繼統嗣武開基奉三聖之休烈當千齡之寶命順天立極蓋曰其常不知何為更用此道逺自三五洎乎夏殷聖帝明王臣所覽見未有用此者陛下安所取哉臣聞事不師古匪説攸聞禮煩則瀆抑其有義况應天去提象才至二里餘騎不得行列車不得方軌於兹屢出假令愚人萬一有犯屬車之塵者陛下雖罪之何及縱使萬全亦非慎重之道也臣望陛下從今以後遵其內朝一則有暢於凊溫二則無煩於出入敬慎之道誰曰不然必長至在辰元正布厯應天納祜行慶有期則願陛下備法駕周羽儀然後出朝亦示天下大禮也居常之日竊願陛下思之其年四月二十七日上以時屬炎暑制令每隔日不坐右拾遺靳恆上疏諫曰臣聞昔漢制反支日亦通奏事又光武在軍躬自覽疏明帝撫運夜必讀書豈以四氣炎寒妨于政理况陛下紹登大位初啓中興六合之內莫不延首傾聼威恩未著忠信未孚勤勞者未逹寃滯者未舉逋逃者未還浮偽者未息兼之國用凋敝倉廩空虛獄訟猶繁澆淳尚雜外逼凶冦調發未寧內切飢寒衣食不足人思陛下企望太平久矣陛下固宜兢兢業業居安慮危絶嗜欲之源從清靜之化宵衣旰食以答蒼生之望簡賢任能以救蒼生之弊使天下翕然一變化俗奈何以其微熱遂闕一日萬幾之事六合之內家到户説必謂陛下安其宫室重其宴間忽於黎庶怠於聽政復何以逹堯心於天下復何以垂令範於後代臣愚竊為陛下有所嘆息開元八年九月初正冬朝會宴見蕃國王臨軒設樂懸陳車輅備麾仗其朝日受朝儀注減半其年十一月十三日中書門下奏曰伏以十四日冬至一陽初生萬物潛動所以自古聖帝明王皆以此日朝萬國觀雲物禮之大者莫逾是時其日亦祀圜丘皆令聽攝官行事質明既畢日出視朝國家以來更無改易緣修新格將其日祀圜丘遂改用小冬日受朝若親拜南郊受賀須改既令攝祭理不可移伏請改正從之因敕自今以後冬日受朝永為常式至天寶三載十一月五日甲子冬至敕伏以昊天上帝義在尊嚴恭惟祭典每因冬至既於是日有事圜丘更受朝賀實深兢惕自今以後冬至宜取以次日受朝仍永為常式至永泰二年十一月三日詔以十三日甲子冬至令有司祭南郊於含元殿受朝賀至建中二年十一月二十日敕宜以冬至受朝賀天寶六載十二月二十七日敕中書門下奏承前諸道差使賀正十二月早到或有先見或有不見其所賀正表但送省司又不通進因循日久於禮全乖望自今以後應賀正使並取元日隨京官例序立便見通事舍人奏其表直送四方館元日仗下候一時同進敕旨依大厯九年十一月八日敕故源王發引遷神廢冬至朝賀十四年十二月三十日敕元日門下侍郎奏祥瑞宜停至貞元四年十一月十三日中書侍郎李泌奏冬至朝賀請準元日中書令讀諸方表敕旨宜依建中元年十一月朔御宣政殿朝集使及貢士見自兵興以來典禮廢墜州郡不上計內外不會同者二十五年至此始復舊典州府計至者一百七十有三二年正月朔御含元殿四方貢獻列為庭實復舊例也貞元七年四月二十八日敕昔者聖賢仰觀法象因天地交會之序為父子相見之儀沿襲成風古今不易王者制事在於因人酌其情而用中順其俗而為禮咸覿之義既行父子之間資事之情豈隔君臣之際申恩卿士自我為初自今以後每年五月一日御宣政殿與文武百寮相見京官九品以上外官同朝奏在京者并聽就列宜令所司即量定儀注頒示仍永編禮式本以五月一日隂生臣子道長君父道衰非善月也因創是日朝見之儀初欲冕服御宣政殿屬塗潦乃以常服御紫宸殿至元和三年四月詔五月一日御宣政殿受朝賀禮儀停先是創有此禮自後亦不多行至是上以術數之説禮經不載遂罷之九年正月朔上御紫宸殿受朝賀退賦觀仗歸營詩十一年十一月月南至不受朝賀以司徒馬燧出葬故也會昌二年四月中書門下奏元日御含元殿百官就列惟宰相及兩省官皆未索扇前立於檻欄之內及扇開便侍立於御前三朝大慶萬拜稱賀惟宰相侍臣同介胄武夫竟不拜至尊而退酌於禮意事未得中臣等商量請御殿日昧爽宰相兩省官對班於香案前俟扇開通事贊兩省官再拜訖遂升殿侍立從之咸通四年五月朔宴回鶻於上清殿非常例也諸侯入朝貞觀元年十一月梁州都督竇軌請入朝上曰君臣共事情猶父子外官久不入朝情或疑懼朕亦須數見之問以人間風俗許令入朝至十五年正月上謂侍臣曰古者諸侯入朝有湯沭邑芻禾百車待以客禮漢家故事為諸州刺史郡守創立邸舍於京城頃聞都督刺史充考便至京師皆賃房與商人雜居既復禮儀不足必是人多怨嘆至十七年十月一日下詔令就京城間坊為諸州朝集使造邸第三百餘所上親觀焉至永淳二年關中飢乏諸州邸舍漸漸殘毁至神龍元年司農卿趙履溫希媚權要奏請出賣並盡至建中元年十月二十九日敕每州邸第令本州量事依舊營置至三年五月十四日戶部奏若令州府自買事又煩費伏請以官宅三十所分配共住過事却收敕旨宜依二十年有司上言按漢儀注朝賀正月常一王四侯十餘載一至又按史記諸侯王朝凡四見留長安不過三十日今諸王入朝者甚多非謂示之簡要𢎞之禮節既乖古制有虧前典臣請每嵗二王入朝禮畢還藩敢以義請從之顯慶二年十二月敕諸都護刺史入朝日及新授未辭因便在京朝會一事以上並同京官先天二年十月敕諸蕃使都府管羈縻州其類極廣每州遣使朝集頗成勞擾應須朝賀委當蕃都督與上佐及管內刺史自相通融明為次第每年一蕃令一人入朝給左右不得過二人仍各分頒諸州貢物於都府點檢一時録奏開元八年十月敕諸督刺史上佐每年分蕃朝集限十月二十五日到京十一月一日見其年十一月十二日敕諸州朝集使長官上佐分蕃入計如次到有故判司代行未經考者不在禁限其員外同正員次正官後集十四年二月敕嶺南五府管內郡武安萬安等三十二州不在朝集之限其承前貢物者並附都府貢進十八年十一月敕靈勝涼相代黔雟豐洮朔蔚媯檀安東疊廓蘭鄯甘肅瓜沙嵐鹽翼戎慎威西牢當郎茂歡安北庭單于會河岷扶柘安西靜悉姚雅播容燕順欣平靈臨薊等五十九州為邉州揚益幽潞荆秦澧廣桂安等十州為要州都督刺史並不在朝集之例二十二年十一月敕諸朝集使十日一參朔望依常式應須設食等準例處分永泰元年正月宰臣王縉等奏春秋之義臣子一例今後有大臣入朝百寮望請朝罷於中書行相見之禮其宴餞準故事於鴻臚亭集從之時上優寵大臣入覲之日建百官朝罷行相見之禮大厯十四年六月敕諸州刺史上計如式建中二年七月二十二日敕諸州府今年朝集使宜且權停其貢物及文解等準例今考典赴一都貞元十三年徐州節度使張建封來朝及命歸鎮上御製詩以賜之牧守共所重才賢生為時宣勞自擢授越次膺藩維入覲展遐戀臨軒慰來思忠誠在方寸感激陳情辭報國爾所尚恤人余是資歡宴不盡懷車馬當還期穀雨將應候行春應未遲勿以千里遙而云無已知又命中使齎所執鞭以賜之曰以卿大節嵗寒不移故賜此鞭以表之十七年閏正月夏州節度使右僕射韓全義來朝自入覲及歸不見不辭于正朝時全義自夏州節度使為蔡州招討及赦吳少誠全義至闕不見不辭于正朝也元和十四年六月魏博節度使田𢎞正來朝賜宴于麟德殿其大將三百餘人賜物有差十五年二月敕淄青統押海蕃每年皆有朝事比差部領人數校多今後差官正試相兼不得過五人長慶四年敕節度觀察使入朝不得别有進獻會昌元年六月敕東川節度使鄭復雖稱有疾擅離本道宜釋放以後藩鎮如更違越必舉憲章大中五年正月敕自今以後諸道節使防禦經略等使有請覲者但先獻表章請得詔旨許允即任進發務使行止之際臨時不失事機二王三恪武德元年五月二十二日詔曰革命創業禮樂變於三王修廢繼絶德澤隆於三代是以鳴條克罰把用夏郊牧野降休宋承殷祀爰及魏晉禪代相仍山陽賜號於當塗陳留受封於典午上天回眷授厯朕躬隋氏順時遜其寶位敬承休命敢不對揚永作我賓宜開土宇其以莒之酅邑奉隋帝為酅公行隋正朔車旗服色一依舊章仍立周後介國公其為二王後至二年五月酅公薨追崇為隋帝諡曰恭貞觀二年八月制曰二王之後禮數宜崇寢廟不嚴廪餼多闕非所以追崇先代式敬國賓可令所司量置國官營立廟宇永昌元年十一月一日制以周漢之後為二王仍封舜禹成湯之裔為三恪至神龍元年五月十日制宜依舊以周隋為二王後開元三年二月敕二王後每年四時享廟牲及祭服祭器並官給及帷幄几案有闕亦官給主客司四時省問子孫準同正三品蔭隋後每年給絹三百匹米粟三百石周後每年賜絹二百匹粟二百石並春秋支給仍準見承襲人親兄為分襲者與三分餘各一分兄弟有得職事官者其物即還見襲人十五年閏九月敕二王後為賓者會賜同京官正三品其夫人亦同諸王公以下無子孫以兄弟之子曾經侍養者聽承襲贈爵者亦準此若死王事雖不曾經侍養亦聽承襲又二王後犯罪當除爵者改立次賢天寶七載五月十三日制自古帝王建邦受命必敬先代周備禮文既存三恪之位漢從損益惟立二王之後自兹以降且復因循將廣繼絶之恩式𢎞復古之道宜於後魏子孫中擇揀灼然相承者一人封為韓公準酅介公例立為三恪九載六月六日處士崔昌上封事推五行之運國家上承周漢其周隋不合為二王後請廢詔下尚書省集公卿議昌負獨見之明羣議不能屈會集賢學士衛包抗表陳論議之夜四星聚於尾宿天象昭然上心遂定乃求殷周漢後為三恪廢韓介酅等公以昌為贊善大夫包為虞部員外郎至十二年五月九日魏周隋依舊為三恪及二王復封韓介酅等公其周漢魏晉齊梁帝王廟依舊祭六月九日崔昌衛包等俱貶官太和五年正月酅國公楊元溱奏臣先祖隋文帝等陵四所在鳳翔一所揚州兩所京兆府一所準去年四月九日敕二王後介國公先祖陵例每陵每月合給看守丁三人鳳翔府已蒙給丁訖其京兆府及揚州未蒙準敕例給敕旨各令州府準元敕處分開成五年十月敕介公宇文士元亡宜輟今月五日朝參便為常式會昌三年八月中書門下奏二王後為國賓又是一品前年方與輟朝請編入令式從之朔望朝參貞觀二十二年十月八日令百寮朔望日服袴褶以朝永徽元年十月五日京官文武五品依舊五日一參神龍元年四月十四日初令文武官五品以上每朔望參日升殿食先天二年十月敕文武官朝參著袴褶珂繖者其有不著入班者各奪一月俸若無故不到者奪一季祿其行香拜表不到亦準此頻犯者量事貶降其衣冠珂繖仍許著到曹司開元中蕭嵩奏每月朔望皇帝受朝於宣政殿先列仗衛及文武四品以下於庭侍中進外辦上乃步自序西門出升御座朝罷又自御座起步入東序門然後放仗散臣以為宸儀肅穆升降俯仰衆人不合得而見之乃請備羽扇於殿兩廂上將出所司承旨索扇扇合上座定乃去扇給事中奏無事將退又索扇如初令為常式開元二十五年御史大夫李通奏每至冬至及緣大禮應朝參官并六品清官並服朱衣餘六品以下許通著袴褶如有喪故準式不合著朱衣袴褶者其日聽不入朝自餘應合著而不著者請奪一月俸以懲不恪制曰可天寶三載二月三十日敕百官朔望參應服袴褶并著珂繖至閏二月一日宜停自今以後每逢此閏仍永為常式六載九月二十一日敕自今以後每朔望朝晚於常儀一刻進外辦每座喚仗奉朝從容至閶門入至陛外不須趨走百司無事至午後放歸無為守成宜知朕意至十二載十一月十三日御史中丞吉溫奏請京官朔望朝參者朱衣袴褶五品以上著珂繖制曰可十三載九月御史中丞吉溫奏朔望朝參望自今以後除伎術官外餘官不到兩人以上者及本司官長各奪一季祿五人以上者奏聽處分至冬應合著袴褶并珂繖者不具者請準敕彈奏從之十四載三月一日敕常參官分日入朝尋勝宴樂乾元三年四月十五日敕員外郎五品以上常參官自今以後非朔望日許不入賊平之後依舊常參時安史據河洛故也廣德二年九月一日敕朝官遇泥雨準儀制令停朝參軍國事殷若準式停恐有廢闕泥既深阻許延三刻傳點待道路通依常式以後亦宜準此天厯七年六月御史大夫李栖筠奏伏以朝廷之儀義當祗肅今者以手力資錢比俸祿舊罰請準永泰元年八月敕為定其一司之中有三人以上是參官其日並不到者本司長官請罰一月手力資錢其一月內三度不到者雖每度有罰亦準前罰一月資錢每月仍便於左藏庫折納其有久不朝謁并假過百日以上者望令本司録奏如相容隱臺司訪察彈奏餘請依敕處分從之又文武常參官或有晚入并全不到及班列失儀查御史臺録名牒所由奪一月俸經三度以上者彈奏準開元二十二年三月敕如聞朝官仗下多出側門及中書門下不散自今以後宜令臺司檢察除公事見宰相一切從正門出違者彈奏又準乾元元年敕朝參官無故不到奪一月祿貞元二年八月一日御史中丞竇參奏準儀制令泥雨合停朝參伏以軍國事殷恐有廢闕請令每司長官一人入朝有兩員并副二亦許分日其夜甚雨至明不止許令仗下後到外廊食訖入中書其餘官及王府長官並請停朝任於本司勾當公事泥雨經旬亦望準此七年十一月詔常參官入門不得奔走其有周以下喪者禁襂服復衣綾袍金玉帶初金吾將軍沈房有弟喪公服不衣襂服入門上問宰臣董晉對曰準式朝官有周以下喪者許服絁縵衣不合淺色上曰南班何得有之對曰因循而然又曰在式朝官皆以綾為袍五品以上服金玉帶取其文綵華飾以奉上也昔尚書郎含香此意也八年十月復命金吾置門籍十二年四月御史中丞王顔奏吏部兵部禮部侍郎郎中員外郎共一十二員起去年十一月一日至今年三月三十日並不朝參此謂選限內不朝又憑格敕去三月二十一日輟朝前件官並闕奉慰臣按中書門下省并兵部吏部敕格無文伏以國朝故事開元以前自假節日百官盡入朝至天寶五載始放旬節假日不入近年又賜分日伏緣優貸之厚反致慢易之愆請自今以後吏部兵部尚書侍郎除試人銓注曹官并禮部侍郎兵部南曹官試人及入宿日其餘朝參等官並準式尋為吏部兵部禮部奏舉詔又可之十三年正月御史臺奏諸司常奏文官隔假三月以上並橫行奏假其武班每月先配九參比來或經冬至及嵗寒食等三節假滿不足本配入日並不橫行事實乖闕請從自今以後每經三節假滿縱不是本配入日亦請依文官例參從之其年六月十二日敕卿等朝謁是常或隂雨不聞鼓聲則不免奔波走馬忽有墜損深軫朕懷自今以後縱鼓聲差池亦不得走馬及時暑稍甚雨雪泥潦亦量放朝參十五年四月膳部郎中歸崇敬以百官朔望朝服袴褶非古禮上疏曰按三代典禮兩漢史籍並無袴褶之制亦未詳所起之由隋代以來始有服者事不師古請罷之奏可元和元年三月準吏部兵部尚書侍郎郎官并禮部侍郎御史中丞武元衡奏前件等司近起十月至來年三月稱在先選舉限內不奉朝參令式無之禮敬斯闕一年之內半嵗不朝去貞元十二年中丞王顔奉敕釐革載在明文尋又因循輒自便改若以兵部禮部舉選限內事繁即中書門下御史臺度支京兆府公事至重朝請如常而况旬節已賜歸休常參又許分日一月之內才奉十日朝參其間甚熱甚寒皆蒙預放臣以為王顔舉奏甚詳當時敕文處分甚備請準貞元十一年四月敕旨自今以後永為常式他年妄改條請委臺司彈奏庶使班行式序典法無虧依奏二年十二月御史臺奏文武常參官準乾元元年三月敕如有朝堂相弔慰及跪拜待漏行立不序談笑喧譁入衙門執笏不端行立遲慢至班列立不正趨拜失儀言語微喧穿班仗出閣門不即就班無故離位廊下食行坐失儀語閙入朝及退朝不從正衙出入非公事入中書每犯奪一月俸今商量舊條每罰各減一半有犯必舉不敢寬如所由指揮尚抵拒飾非即請準舊例録奏貶官從之四年十月御史中丞李夷簡奏準貞元十二年四月中丞王顔元和元年三月中丞武元衡奏兵部吏部禮部侍郎官每年舉選限內不奉朝參又今年所造選格不詳敕文復請明日朝參臣合彈奏敕宜準貞元十二年四月敕處分九年十二月敕起來年正月以後每朔望日刑部侍郎郎中員外大理卿少卿及中丞一人侍對其日宰相并次對中朝官並不用來十年三月壬申朔御延英殿召對宰臣故事朔望日御宣政殿見羣臣謂之大朝玄宗始以朔望陵寢薦食不聽政其後遂以為常今之見宰臣特以事召也其年六月敕御史臺自今以後常參官每入班以見到人名銜進來其朔望及雙日勿進是月詔自今以後許寅後二刻傳點及是質明後朝騎有尚在街中者特坐紫宸殿久之而朝班未至因命宰臣宣諭之乃復時命宰臣戒九卿御史以中丞裴度遇盜故也十四年二月詔朔望據錢多少每貫罰二十五文仍委御史臺檢察聞奏大中四年十月望不視朝以大祀故也太和元年六月敕文武常參官朝參不到御史中丞魏謨奏準兵部吏部禮部三司尚書侍郎等官一十三員主舉選試五箇月不朝參近已降流聞奏訖奉敕前後敕文處分有司不合妄更奏論準貞元十二年元和四年彈奏前件三司除試人及入宿外並不合不朝參敕文曾未經年三司復此論奏今具前後敕文如前敕者本是五箇月不朝今許不過一兩月奏不權放必恐壅滯準兵部選事勞逸尤與吏部不同選限內遇公事繁併日準具事由牒臺尋常不在放朝參限天祐二年十二月敕漢宣帝中興五日一聽朝歷代通規宜為常式今後每月只許一五九日開延英計九度其入閣日仍于延英日一度指揮如有大段公事中書門下具榜子奏請開延英不拘日數三年六月敕文武百僚每月一度入閣於貞觀殿貞觀大殿朝廷正衙正至之辰受羣臣朝賀比來視朔依貞觀儀今後於崇勳殿入閣廊下食貞觀四年十二月詔所司於外廊置食一頓出國朝故事正史檢不獲貞元二年九月舉故事置武班朝參其廊下食等亦宜加給唐會要卷二十四
