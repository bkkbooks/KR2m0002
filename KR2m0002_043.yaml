body:
  text: 唐㑹要卷四十三宋王溥撰彗孛武德九年二月十三日有星孛於胃昴之間二十八日又有星孛於卷舌貞觀八年八月二十三日有星孛於虛危厯𤣥枵凡十一日乃滅太宗問虞世南曰是何妖也對曰齊景公時有彗見晏嬰對曰穿池畏不深起臺榭畏不高行刑畏不重是以彗為公誡耳景公懼而修德十六日而星滅臣聞政德不修雖麟鳳數見終無補也茍政教無闕雖有災變何損於時伏願陛下勿以功髙古人而自矜大勿以太平而自驕惰慎終如始彗何足憂太宗曰吾十有八舉義兵二十四定天下二十九即帝位三代以來撥亂之主莫臻於此頗有自矜之意以輕天下之士此吾之罪也上天見變良有是乎秦始皇平六國隋煬冨有四海既驕且逸一朝而敗吾亦何得自驕也言念於此不覺惕懼魏徴進曰自古帝王未有無災變者但能修德灾變自銷溫彥博進曰宋公一言星三徙陛下見變而懼灾其銷乎十三年三月二十二日有星孛於畢昴十五年六月十九日有星孛於太微犯郎位七月甲戌滅總章元年四月有彗見於五車之上避正殿减膳令內外五品已上各上封事極言得失許敬宗上言星雖孛而光芒小此非國眚不足上勞聖慮請御正殿復常膳不從敬宗又進曰星孛於東北王師問罪此髙麗將滅之徴上曰我為萬國之主豈得推過於小藩哉二十一日星滅上元二年十月十三日彗見於角亢之南長五尺三年七月二十一日彗見於東井指北河積薪長三尺餘漸向東北光芒益長半天掃中台指文昌宫經五十八日乃滅永隆二年九月一日萬年縣女子劉靜凝乘白馬著白衣男子從者八九人入太史局升令㕔床座問比見有何灾異太史令姚𤣥辨執之以聞是夜彗見天市中長五尺漸小向東行出天市至河鼓左旗十七日滅永淳二年三月十八日彗見於五車之北凡二十五日滅文明元年七月二十二日西北方有彗長丈餘經四十二日滅光宅元年九月二十九日有星如半月見西方景龍元年十月十八日彗見於西方四十二日滅二年七月七日孛見於胃昴之間三年八月八日有孛於紫微宫太極元年七月四日有彗入太微宫延和元年六月彗自軒轅入太微至大角滅時睿宗以為彗者除舊布新之象乃下詔𫝊位太子開元十八年六月十一日彗見於五車三十日孛見於畢昴二十六年三月八日有星孛於紫微垣厯北斗魁十餘日皆隂雲不見乾元三年四月二十七日彗見於東方在婁角間色白長四尺疾行向東北厯昴畢觜參井鬼桞軒轅宿至太微西右執法星西七尺許滅凡經五十餘日上元元年閠四月二十一日妖星見於西方長數丈至五月滅大厯元年十二月十七日彗見於匏瓜侵宦者星長尺餘色赤二旬滅五年四月二十七日彗出於五車長五丈餘六月二十八日滅元和十二年正月戊子彗見於畢南指西南凡三十日南近參旗滅長慶元年正月二十一日有孛於東南方二十九日又有孛於辰上太和二年七月甲辰彗出右攝提南二尺八年九月辛亥夜彗起太微近郎位西北五尺乃滅庚申彗復出艮方張三尺芒耀甚偉開成二年二月丙午夜彗出東方長七尺在危西指辛酉彗復出長丈餘直西行稍南指在虛一度半壬戌夜漸長二丈餘廣三尺在女九度三月乙丑夜彗長丈岐分兩尾其一指氐其一掩房至戊申漸長八丈西北行在張十四度敕尚食云自後每一日食料分為十日仍停內中修造以答天譴三年三月十九日有彗於辰上長二丈餘二十日又見於辰上長三丈五尺二十一日又見於辰長三丈餘西指軫東南星二十二日又見於辰長三丈五尺餘西指軫魁四年正月三十日有彗見於室南厯壁奎婁胃等宿至閠月二十三日又見於卷舌北凡三十有三日後二十四日二十五日隂二十六日晴已滅㑹昌元年十一月六日有彗見於西南室宿之分凡五十六日滅大中十一年九月乙未彗出於房長三尺光啓二年五月有孛於箕尾厯北斗攝提天祐二年四月甲辰夜彗起北河貫文昌長三丈在西北方詔特放京畿諸司禁囚常赦不原外罪每遞减一等限三月內踈理其年五月乙酉夜西北彗星長六十餘尺自軒轅大角及天市西垣光芒甚偉其長竟天五星臨犯武德五年十二月甲戌太白犯軒轅七年六月二日熒惑犯左執法尚書右僕射蕭瑀上表遜位不許八年九月二十二日熒惑入太微九年五月𫝊奕密奏太白見秦秦國當有天下髙祖以狀授太宗及太宗即位召傅奕謂汝前奏事幾纍於我然今日之後但須悉心盡言無以為慮貞觀十三年五月熒惑犯右執法司空長孫無忌上表請遜位不許十五年二月十五日熒惑逆行犯太微東藩上相十七年正月十七日特進魏徴卒闕四月六日吏部尚書闕六月十九日尚書右僕射高遜位闕七月二十日司空房𤣥齡闕憂十七年三月七日熒惑守心前星十九日退權萬紀及齊州平賜祐子宅其月二十二日又犯鈎陳四月一日大理囚紇干承基上變稱太子承乾漢王元昌等謀反六日太子廢為庶人元昌並賜死九月二十九日熒惑犯太微西藩上將十九年九月二十四日太白在太微左執法光芒相及十二月十四日侍中劉洎賜死永徽三年六月二日熒惑犯左執法三日太白入太微犯右執法闕顯慶五年二月三日熒惑入南斗麟德元年七月十四日太白犯太微左執法乾封三年五月十日熒惑入軒轅咸亨元年十二月熒惑入太微上元二年正月九日熒惑犯房星儀鳳四年四月九日熒惑入羽林調露二年五月二十四日太白經天長安四年八月及鎮星犯天關太史令嚴善思奏曰法有亂臣伏罪臣下謀上之象嵗餘誅張易之兄弟神龍元年九月十一日熒惑犯左執法闕景龍三年六月八日太白晝見於東井景雲二年二月二十七日太白入羽林太極元年二月三日熒惑入東井四月十三日熒惑與太白守東井先天元年八月十六日太白襲月開元十年七月二十九日熒惑入南斗天寶十三年五月熒惑守心五十餘日至德元年十一月二十六日熒惑與太白同犯昴大厯四年三月三日熒惑守上相經二十一日退入氐房七月十二日熒惑入羽林九年六月十三日熒惑入太微貞元三年閠五月戊寅太白晝見四十餘日其年六月癸邜熒惑退行入羽林六年五月戊辰太白與月并間容一指戊寅熒惑犯鎮星不及者一十八年十月乙酉太白犯太微左執法十年夏四月太白晝見貞元十一年八月熒惑太白犯上將星其年北平王馬燧薨二十一年正月己酉太白犯昴永貞元年十二月己酉嵗星犯太微西垣元和十五年七月庚申熒惑退行入羽林長慶元年八月壬辰太白犯太微西垣四年二月辛巳太白犯東井北轅三月甲子熒惑犯嵗星壬申太白犯東井八月丁丑熒惑犯鎮星癸未犯東井丁亥復入東井己丑太白犯軒轅在角寶厯元年九月癸未太白犯南斗太和六年九月癸邜熒惑入太微犯右執法九年八月二日太白犯太微其年九月八日熒惑犯氐西南星二十八日又犯鈎鈐開成元年十月三日熒惑入氐二年五月十二日太白犯畢十月二十五日又犯房三年五月五日又犯輿鬼其年六月一日太白犯熒惑二十八日犯右執法十月七日又犯南斗㑹昌元年九月癸巳熒惑犯輿鬼閠九月丁酉貫鬼宿戊戌在鬼中二年六月乙丑熒惑犯歲星丙寅太白犯東井三年七月癸巳熒惑合赤色動搖於井中至八月十六日犯輿鬼四年五月戊午太白犯鎮五年二月五日太白掩昴北側在昴宿一度五月辛酉太白入畢口巨星東南一尺八月七日太白犯軒轅大星九月二十九日熒惑犯上將星大中十一年八月熒惑犯東井星聚武德二年三月二十七日太白辰鎮聚於東井九年六月十一日辰嵗㑹於東井二十三日辰嵗又㑹於東井貞觀十八年五月太白辰合於東井十九年九月太白入太微時太宗平髙麗初下白巖城也二十年七月丁未嵗星守東壁景雲二年七月太白鎮同在張宿太極元年四月熒惑太白同守東井至德二年四月乙酉太白與熒惑集於東井乾元元年四月庚戌熒惑與鎮星聚於營室闕大厯三年七月五星聚於東井九月四星聚於井貞元四年乙亥熒惑嵗鎮三星聚營室三十餘日六年閠四月庚戌太白辰聚於東井元和十一年五月丁邜辰星與嵗合東井六月己未辰星嵗星合於東井相去一尺十一月戊子鎮熒惑合於虛危十三年八月丁丑太白辰星嵗星聚於軫太和九年八月三日太白熒惑合於角五度開元四年正月丙辰熒惑太白辰合於斗流星武德三年十月三十日有流星墜於東都城內殷殷有聲髙祖謂侍臣曰此何祥也起居舍人令狐德棻曰司馬懿之伐遼東也有流星墜遼東梁水上尋而其主敗走晉軍追之至其星墜所斬之此即三凶滅亡之兆也貞觀十二年五月甲辰有星狀如月西南流三丈乃滅十八年五月五日有星大如斗出東壁光照地景龍二年二月十九日天保星墜於西南有聲如雷野雞雊景龍二年八月十七日東方有流星出五車至上台又嵗星犯左執法蘇氏議曰吉凶悔吝惟人所召人守中道天不上變豈有位登宰輔名踐國公以諂諛為政事用姦妄為身計而欲上無灾異下就乂寧其可得乎先天之誅天道不昧矣其年九月十二日北方有流星出中台至相滅十月三日幸安石郭元振張說李日知並罷相太極元年正月二十一日有流星出太微至相而滅天寶三年閠二月十七日有流星如月墜於東南有聲元和二年十二月己巳西北角有流星有尾迹散落亘天九年四月辛巳北方有大流星尾迹長五丈光照地至右攝提西三尺滅十一年正月壬辰夜有流星長二丈餘出天井之西有尾迹十三年七月庚寅有星色白尾長一丈五尺東南入濁八月未東方一大流星其色赤西流至危滅十五年五月己亥西北有大流星長二丈餘出北斗魁南抵軒轅而滅其年七月癸亥有大流星出鈎陳南至婁北滅寶厯元年閠七月庚子有流星出北極至南斗柄滅二年七月丙戌日初出有流星向南滅八月丙申北方有大星長四丈餘出王良流至北斗柄滅長慶元年正月丙辰南方有大流星色赤尾迹長三丈光明照地出狼星北三尺東北流至七里南三尺滅其年六月己丑東方有大流星色黃有尾迹長六尺光明照地出參西北西流至羽林滅二年八月丙子東方有大星西流至昴滅有聲如雷四年七月丙子有大星出大將軍東北流入相滅其年十一月甲午夜西北有流星出閣道至北極滅太和四年六月辛未南方有流星尾迹凝著天良久不滅九年六月二十三日有流星縱橫大小約有二十餘出沒多近天河開成元年十一月十日西方有流星大如一斗器光明照地尾跡凝著天良久不滅出上台經中台西北滅三年四月二十一日東方有流星尾迹凝著天良久不滅出天市中帛星經宗人星東南滅其年七月六日未後東北方有流星尾迹光明三丈餘滅其聲如雷九月五日上方有流星尾迹凝著天光明照地至室宿向南滅四年二月三十六日從四更至五更上方及四方約有流星大小共二百餘並西流皆有尾迹長二丈或三丈至五丈三月二十三日一更至五更上方及四方有流星凡百餘交橫出滅其年八月卒未夜有流星出羽林尾長八十餘尺滅後有聲如雷十月二十六日南方有流星尾迹凝著天光明照地出參右足近九斿南滅㑹昌元年六月二十九日從一更至五更有小流星五十餘於四方交橫散流七月二日北方有流星光明照地東北流有聲如雷十一月六日有大流星光明照地東北流有聲如雷六年二月丁酉東北流星色赤其光燭地尾迹入大角西流穿紫微山摧石隕武德六年七月二十日巂州山崩逺水咽流貞觀八年七月七日隴右山崩大蛇屢見太宗問祕書監虞世南曰是何災異對曰春秋時梁山崩晉侯召伯宗而問焉對曰國主山川故山崩水竭君為之不舉樂降服出次祝幣以禮焉晉侯從之故得無害漢文帝九年齊楚地二十九山同日崩文帝出令郡國無來獻施惠於天下逺近歡洽亦不為灾後漢靈帝時青蛇見御座晉惠帝時大蛇長三百步經市入廟今蛇見山澤中深山大澤實生龍蛇亦不足怪也唯修德可以銷變上然之永徽四年八月二十日隕石十八於同州馮翊光曜有聲如雷上問于志寧此何祥也當由朕政之有闕也對曰春秋隕石於宋五內史過曰是隂陽之事非吉凶之生自古灾變竟不可測但恐物之自然未必關於人事今陛下發書誡懼責躬自省未必不為福也開元十七年四月五日大風震電藍田山開百餘步大厯十三年十一月桞州黃岑山摧震殺數百人貞元十五年正月桞州藍山縣山摧得古鐘四枚水災貞觀十一年七月一日黃氣竟天大雨穀水溢入洛陽宫深四尺壞左掖門毁宫寺一十九所損六百餘家中書舍人岑文本上疏曰伏惟陛下覽古今之事察安危之機上以社稷為重下以億兆在念明選舉慎刑罰進賢才退不肖聞過即改從諌如流為善在於不疑出令期於必信頥神養性省畋逰之娛去奢從儉減工役之費務靜方內而不求闢土載櫜弓矢而無忘武備凡此數者唯陛下行之不怠當轉禍為福變咎為祥况水之為患隂陽常理豈可謂之天譴而係聖心哉特進魏徴諌曰昔貞觀之始聞善若驚暨五六年間猶恱以從諌自兹厥後漸惡直言雖或勉强時有所容非復曩時之豁如也謇諤之士稍避龍鱗便佞之徒肆其巧辨謂同心者為朋黨謂告訐者為至公謂强直者為擅權謂忠讜者為誹謗謂之朋黨雖忠信而可疑謂之至公雖矯僞而無咎强直者畏擅權之議忠讜者慮誹謗之尤至於竊斧生疑投杼致惑正人不得盡其言大臣莫能與之爭熒惑視聽鬱於大道妨理損德其在兹乎而欲無水之災不可得也其月十三日詔曰暴雨為灾大水泛濫靜思厥咎朕甚懼焉文武百寮各上封事極言朕過無有所諱諸司供進悉令减省凡所作役量事停廢遭水之處賜帛有差二十日廢明德宫及飛山宫之𤣥圃院分給河南洛陽遭水戶九月黃河泛濫溢壞陕州河北縣及太原倉毁河陽中潭白馬圾以觀之永徽五年六月七日滹池河水泛溢損千三百家總章二年七月冀州大雨壞居人屋宇凡一萬三千三百九十家害田四千四百九十六頃九月十八日處州海水翻上壞永嘉安固二縣百姓廬舍六千八百四十三家溺死人九千七十牛五百頭苗四千一百五十頃咸亨四年七月二十七日婺州暴雨山水泛溺死者五千人永淳元年五月十四日連㴻雨二十三日洛水溢壞天津橋損居人千餘家文明元年七月溫州大水損四千餘家如意元年七月一日洛水溢損居人五千餘家神龍元年七月洛水暴漲壞百姓廬舍二千餘家溺死者數百人八月一日以水災令文武九品以上直言極諌右衛騎參軍宋務光上疏曰伏見明制令文武九品以上直言極諌大哉德音真堯舜之用心禹湯之罪已也臣嘗謂天人相與之際休咎冥符之兆有感必通其間甚密是以政失於此變生於彼亦猶影之象形響之赴聲動而輒隨各以類應故曰天垂象見吉凶聖人象之竊見自夏已來水氣勃戾郡國多罹其灾去月二十七日洛水暴漲漂損百姓臣謹案五行𫝊曰簡宗廟廢祠祀則水不潤下夫王者即位必郊祀天地嚴配祖宗是故鬼神歆饗多獲福助自陛下光臨寶極綿厯炎凉郊廟遲留不得殷薦山川寂寞未議懷柔水之貽灾殆因此發臣又按水者隂類臣妾之道隂氣盛滿則水泉迸溢加以虹霓紛雜㴻雨滯霪雖丁厥時而汨常度亦隂勝之沴也臣恐後庭近習或有離中饋之職干外朝之政伏願陛下深思天變杜絶其萌以萬方為念不以聲色為娛以百姓為憂不以犬馬為樂暫勞宵旰用緝明良豈不休哉夫灾變應天實繫人事故日食修德月食修刑若乃雨暘或愆則貌言為咎雩灾禜患之法存乎禮典今暫降霖雨即閉坊門棄先聖之明訓遵後來之淺術時偶中者安即神耶蓋當屏翳收津豐隆戢響之日也豈有一坊一市遂能感召皇靈暫開暫閉使欲發揮神道必不然矣何其謬哉至今巷議街談共呼坊門為宰相謂能節宣風雨燮理隂陽天工人代乃為虛設悠悠蒼生復何望哉尚書右僕射唐休璟以水雨為害咎在主司上表曰臣聞天運其工以人代之而理神行其化為政資之以和得其理則隂陽以調失其和則灾沴斯作故舉才而授帝惟其難論道於邦官不必備頃者始自中夏及乎首秋郡國水灾屢為人害夫水隂氣也臣實主之臣忝職右樞致此隂沴是不能調理其氣而乃曠居其官雖運屬堯年卒無治水之用位侔殷相且闕濟川之功猶負明刑坐逃皇譴皇恩不棄其若天何昔漢家故事丞相以天灾免職臣竊遇聖朝豈敢􅌤顔居位乞解所任待罪私門冀移隂咎之徴復免夜行之責二年四月洛水漲壞天津橋損居人廬舍死者數千人唐㑹要卷四十三
