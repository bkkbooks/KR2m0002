body:
  text: 唐㑹要卷九上宋王溥撰郊祭武德四年十一月甲申有事于南郊唐書髙祖本紀武德初定令每歲冬至祀昊天上帝于圜丘以景帝配其壇在京城明德門外道東二里壇制四成各髙八尺一寸下成廣二十丈再成廣十五丈三成廣十丈四成廣五丈每祀則昊天上帝及配帝設位于平座藉用藁秸器用陶匏五方上帝日月内官中官外官及衆星並皆從祀其五方帝及日月七座在壇之第二等内官五星以下五十五座在壇之第三等二十八宿以下百三十五座在壇之第四等外官百二十座在壇下外壝之内衆星三百六十座在外壝之外其牲上帝及配帝用蒼犢二五方帝及日月用方色犢各一内官以下加羊豕各九舊唐書禮儀志圜丘壇北辰北斗天一太一紫微五帝座並差在行位前餘内官諸座及五星十二辰河漢四十九座在二等十有二陛之間中官市垣帝座七公日星帝席大角攝提太㣲五帝太子明堂軒轅三台五車諸王月星織女建星天紀十七座及二十八宿差在前列其餘中官一百四十二座皆在第三等十二陛之間外官一百五在内墻之内衆星三百六十在内墻之外五星三辰以象尊實醍齊七宿以壺尊實沈齊皆二五星十二辰二十八宿籩豆各二簠簋爼各一四時祭風師雨師靈星司中司命司人司禄籩八豆八簋一簠一爼一牲皆少牢席皆以莞唐書禮樂志貞觀二年十一月辛酉有事於南郊唐書太宗本紀案裴寂𫝊貞觀二年太宗祠南郊命寂與長孫無忌同昇金輅寂辭讓太宗曰以公有佐命之勲無忌亦宣力于朕同載参乘非公而誰遂同乘而歸劉黒闥𫝊初秦王建天䇿府其弧矢制倍於常復餘大弓一長矢五藏之武庫每郊祀重禮必陳於儀物之首以識武功云五年十一月丙子有事于南郊唐書太宗本紀自周衰禮樂壊於戰國而廢絶於秦漢興六經在者皆錯亂散亡雜偽而諸儒方共補緝以意解詁未得其眞而䜟緯之書出以亂經矣自鄭𤣥之徒號稱大儒皆主其說學者由此牽惑沒溺而時君不能斷決以為有其舉之莫可廢也由是郊丘明堂之論至於紛然而莫知所止此天也𤣥以為天皇大帝者北辰耀魄寶也又曰兆五帝於四郊此五行精氣之神也𤣥以為青帝靈威仰赤帝赤熛怒黄帝含樞紐白帝白招拒黑帝汁光紀者五天也由是有六天之說後世莫能廢焉唐初貞觀禮冬至祀昊天上帝于圜丘正月辛日祀感生帝靈威仰於南郊以祈榖而孟夏雩於南郊季秋大享于明堂皆祀五天帝其配神之主貞觀初圜丘明堂北郊以髙祖配而元帝惟配感帝禮樂志冬至祀昊天于圜丘樂章八首貞觀二年祖孝孫定雅樂貞觀六年褚亮虞世南魏徵等作此詞今行用舊唐書音樂志降神用豫和上靈睠命兮膺㑹昌盛德殷薦叶辰良景福降兮聖德逺𤣥化穆兮天厯長皇帝行用太和穆穆我后道應千齡登三處大得一居貞禮惟崇德樂以和聲百神仰止天下文明登歌奠玉帛用肅和闓陽播氣甄耀垂明有赫圓宰深仁曲成日麗蒼璧烟開紫營聿遵䖍享式降鴻禎迎爼入用雍和欽惟大帝載仰皇穹始命田燭爰啓郊宫雲門駭聽雷鼓鳴空神其享祀景祚斯融酌獻飲福用壽和八音斯奏三獻畢陳寶祚惟永煇光日新送文舞出迎武舞入用舒和疊璧凝影皇壇路編珠流彩帝郊前已奏黄鐘歌大吕還符寶厯祚昌年武舞用凱安昔在炎運終中華亂無象豐郊赤烏見邙山黒雲上大賚下周車禁暴開殷網幽明同叶賛鼎祚齊天壤送神用豫和歌奏畢兮禮獻終六龍馭兮神將昇明德感兮非黍稷降福簡兮祚休徵又郊天樂章一首太樂舊有此辭名不詳所起送神用豫和蘋蘩禮著黍稷誠微音盈鳯管彩駐龍旂洪歆式就介福攸歸送樂有闋靈馭遄飛貞觀十四年冬十一月甲子朔日南至有事于圜丘舊唐十七年十一月己卯有事於南郊唐書太宗本紀貞觀十七年十月甲寅詔曰朕聞上靈之應疾于影響茂祉之興積于年代朕嗣膺寶厯君臨區宇凴宗社之和福頼文武之同心時無風塵之警野有京坻之積厚地降祉貞石表祥縈翠色而流光發素質而成字前紀厥初之徳次陳卜年之永後述儲貳之美並名字昭然楷則相次曠代之所未聞耆老之所未覩自天之祐豈惟一人無疆之福方覃九土自非大報泰壇稽首上帝則靡申奉天之志寧副臨下之心今年冬至有事南郊所司率由舊典十一月己卯有事于南郊太宗升壇皇太子從奠于時累日隂雪是旦猶雲霧晦冥及太宗升壇烟氛四散風景清朗文物昭映禮畢祝官讀謝天瑞文曰嗣天子臣世民敢昭告于昊天上帝世民纂成鴻基君臨宇縣夙興旰食無忘于政道𨗳徳齊禮良媿于前聖爰有成命表夫瑞石文字昭然厯数惟永既旌髙廟之業又錫眇身之祚逮于皇太子某亦降禎符並具紀姓氏兼列名字仰瞻雲漢寔銘大造俯惟寡薄彌増寅懼敢因大禮重薦玉帛上謝明靈之貺以申祗栗之誠皇太子亦恭至泰壇䖍拜于蒼昊庶因眷祐之德永膺無疆之休初十六年太宗遣刻受命𤣥玉璽用白玉為螭首其文云皇天景命有德者昌並神筆隸書然後鐫勒是日侍中負之以從䇿府元龜永徽二年冬十一月辛酉有事于南郊唐書髙宗本紀髙宗永徽二年以太宗配祀明堂而有司乃以髙祖配五天帝太宗配五人帝太尉長孫無忌等與禮官議以謂自三代以來歴漢魏晉宋無父子同配于明堂者祭法曰周人禘嚳而郊稷祖文王而宗武王鄭𤣥以祖宗合為一祭謂祭五帝五神于明堂以文武共配而王肅駁曰古者祖功宗德自是不毁之名非謂配食于明堂春秋𫝊曰禘郊祖宗報五者國之典祀也以此知祖宗非一祭于是以髙祖配于圜丘太宗配于明堂禮樂志永徽二年太尉長孫無忌等奏議曰據祠令及新禮並用鄭𤣥六天之義圜丘祀昊天上帝南郊祀太微感帝明堂祭太微五天帝臣等謹案鄭𤣥此義惟據緯書所說六天皆為星象而昊天上帝不屬穹蒼故注月令及周官皆為圜丘所祭昊天上帝為北辰星耀魄寶又說孝經郊祀后稷以配天明堂嚴父配天皆為太微五帝考其所說乖謬特深按易云日月麗乎天百榖草木麗乎土又云在天成象在地成形足以明辰象非天草木非地毛詩𫝊云元氣昊大則稱昊天逺視蒼蒼則稱蒼天此則天以蒼昊為體不入星辰之例且天地各一是為兩儀天尚無二焉得有六是以王肅羣儒咸駮此義又檢太史圜丘圖昊天上帝座外别有北辰座與鄭義不同得太史令李淳風等狀稱昊天上帝圖位自在壇上北辰自在第二等與北斗並列為星官内座之首不同鄭𤣥據緯之說此乃羲和所掌觀象制圖推歩有恒相縁不謬又案史記天官書等太微宫有五帝者自是五精之神五星所奉以其是人主之象故况之曰帝如房心為天王之象豈是天乎周禮云兆五帝于四郊又云祀五帝則掌百官之誓戒唯稱五帝皆不言天此自太微之神本非穹昊之祭又孝經唯云郊祀后稷别無圜丘之文王肅等以為郊即圜丘圜丘即郊猶王城京師異名同實符合經典其義甚明而今從鄭之説分為兩祭圜丘之外别有南郊違棄正經理深未允且檢吏部式唯有南郊陪位更不别載圜丘式文既遵王肅祀令仍行鄭義令式相乖理宜改革又孝經云嚴父莫大于配天下文即云周公宗祀文王于明堂以配上帝則是明堂所祀正在配天而以為但祭星官反違明義詔從無忌等議存祀太微五帝于南郊廢鄭𤣥六天之義通典禮部尚書許敬宗等又奏稱於新禮祭畢收取玉帛牲體置于柴上然後燔柴燔壇又在神壇之右臣等謹按祭祀之禮必先降神周人尚臭祭天則燔柴祭地則瘞血祭宗廟則焫蕭灌鬯皆尚氣臭用以降神禮經明白義釋甚詳燔柴在祭初禮無所惑是以三禮義宗等並云祭天以燔柴為始然後行正祭祭地以瘞血為先然後行正祭又禮説晉太常賀循上言積柴舊在壇南燎祭天之牲用犢左胖漢儀用頭今郊天用脇之九个太宰令奉牲脇太祝令奉珪瓚俱奠燔薪之上即晉代故事亦無祭末之文唯周魏以降妄為損益約告廟之幣事畢瘞埋因以燔柴將為祭末事無典實禮闕降神又燔柴正祭牲玉皆别蒼璧蒼犢之流柴之所用四珪騂犢之屬祝之所須故郊天有四珪猶廟之有珪瓉是以周官典瑞文義相因並事畢收藏不在燔燎之例今新禮引用蒼璧不顧珪瓉遂亦俱燔義既有乖理難因襲詔從之通典敬宗等又議籩豆之數曰案今光禄式祭天地日月岳鎭海瀆先蠶等籩豆各四祭宗廟籩豆各十二祭社稷先農等籩豆各九祭風師雨師籩豆各二尋此式文事深乖謬社稷多于天地似不貴多風雨少于日月又不貴少且先農先蠶俱為中祭或六或四理不可通又先農之神尊于釋奠籩豆之數先農乃少理既差舛難以因循謹案禮記郊特牲云籩豆之薦水土之品不敢用䙝味而貴多品所以交于神明之義也此即祭祀籩豆以多為貴宗廟之數不可踰郊今請大祀同為十二中祀同為十小祀同為八釋奠準中祀自餘從座並請依舊式詔並可之遂附于禮令舊唐書禮儀志總章元年十二月丁卯有事于南郊唐書髙宗本紀舊唐書髙宗本紀咸亨四年十一月丙寅上製樂章有上元二儀三才四時五行六律七政八風九宫十洲得一慶雲之曲詔有司諸大祠享即奏之上元三年十一月丁卯勅新造上元舞圜丘方澤享太廟用之餘祭則停唐書韋萬石𫝊上元中遷太常少卿當時郊廟燕㑹樂曲皆萬石與太史令姚元辯増損之乾封初髙宗東封迴又詔依舊祀感帝及神州司禮少常伯郝處俊等奏曰顯慶新禮廢感帝之祀改為祈榖昊天上帝以髙祖太武皇帝配檢舊禮感帝以世祖元皇帝配今既奉敕依舊復祈榖為感帝以髙祖太武皇帝配神州又髙祖依新禮見配圜丘昊天上帝及方丘皇地祇若更配感帝神州便恐有乖古禮案禮記祭法云有虞氏禘黄帝而郊嚳夏后氏亦禘黄帝而郊鯀殷人禘嚳而郊㝠周人禘嚳而郊稷鄭𤣥注云禘謂祭上帝于南郊又案三禮義宗云夏正郊天者王者各祭所出帝于南郊即大𫝊所謂王者禘其祖之所自出以其祖配之是也此則禘須逺祖郊須始祖今若禘郊同用一祖恐于典禮無據舊唐書禮儀志乾封二年十二月詔曰昔周京道䘮秦室政乖禮樂淪亡經典殘滅遂使漢朝博士空說六宗之文晉代鴻儒爭陳七祀之議或同昊天于五帝或分感帝于五行其後遞相祖述禮儀紛襍自今以後祭圜丘五方明堂五帝神州髙祖太武皇帝太宗文皇帝崇配仍總祭昊天上帝及五帝于明堂舊唐書禮儀志則天垂拱元年詔有司議卒用元萬頃范履氷之說郊丘諸祠以髙祖太宗髙宗並配唐書禮樂志垂拱元年成均助教孔元義奏嚴父莫大配天天于萬物為最大推父偶天孝之大極也易稱先王作樂崇徳殷薦之上帝以配祖考上帝天也昊天之祭宜祖考並配請以太宗髙宗配上帝于圜丘神堯皇帝配感帝南郊祭法祖文王宗武王祖始也宗尊也一名而有二義經稱宗祀文王文王當祖而云宗包武王以言也知明堂以祖考配與二經合伯儀曰有虞氏禘黄帝而郊嚳祖顓頊而宗堯夏后氏禘黄帝而郊鯀祖顓頊而宗禹殷人禘嚳而郊冥祖契而宗湯周人禘嚳而郊稷祖文王而宗武王鄭𤣥曰禘郊祖宗皆配食也祭昊天圜丘曰禘祭上帝南郊曰郊祭五帝五神明堂曰祖宗此為最詳虞夏退顓頊郊嚳鯀殷舍契郊㝠去取違舛唯周得禮之序至明堂始兩配焉文王上配五帝武王下配五神别父子也經曰嚴父莫大于配天又曰宗祀文王于明堂以配上帝不言嚴武王以配天則武王雖在明堂未齊于配雖同祭而終為一主也緯曰后稷為天地主文王為五帝宗若一神而兩祭之則薦獻數瀆此神無二主也貞觀永徽禮實專配由顯慶後始兼尊焉今請以髙祖配圜丘方澤太宗配南北郊髙宗配五天帝鳯閣舍人元萬頃范履冰等議今禮昊天上帝等五祀咸奉髙祖太宗兼配以申孝也詩昊天章云二后受之易薦上帝配祖考有兼配義髙祖太宗既先配五祀當如舊請奉髙宗厯配焉自是郊丘三帝並配云沈伯儀𫝊文獻通考馬氏曰並配之制始于唐自鄭康成有六天之說魏晉以來多遵用之以為曜魄寶亦天也感生帝亦天也均之為天則配天之祖其尊一也至唐人始以為曜魄寶五帝皆象之屬當從祀南郊而不當以祀天之禮事之善矣然感帝之祠既罷旋復雖復其祠而以為有天帝之分尊卑之别遂于郊與明堂所配之祖不無厚薄之疑乃致每祭並配而後得稱為嚴父之禮然則周人亦豈厚于后稷而薄于文王乎則曷若一遵初議若郊若明堂皆専祀昊天各以一祖配之于禮意人情為兩得乎永昌元年九月勅天無二稱帝是通名承前諸儒互生同異乃以五方之帝亦謂為天假有經𫝊互文終是名實未當稱號不别尊卑相混自今郊祀之禮唯昊天上帝稱天自餘五帝皆稱帝通典證聖元年九月親祀南郊加尊號改元天冊萬歲舊唐書則天皇后本紀則天革命天冊萬歲元年加號為天冊金輪大聖皇帝親享南郊合祭天地以武氏始祖周文王追尊為始祖文皇帝后父應國公為無上孝明髙皇帝以二祖同配如乾封之禮禮儀志古者祭天于圜丘在國之南祭地于澤中之方丘在國之北所以順隂陽因髙下而事天地以其𩔖也其方位既别而其燎壇瘞坎樂舞變數亦皆不同而後世有合祭之文則天天冊萬歲元年親享南郊始合祭天地唐書禮樂志長安二年十一月戊子親享南郊大赦天下舊唐書則天皇后本紀長安二年九月勅祠明堂圜丘神座並令著牀便為恒式通典景龍三年十一月乙丑親祀南郊皇后登壇亞獻左僕射舒國韋巨源為終獻中宗本紀蘇瓌𫝊將拜南郊國子祭酒祝欽明希庶人㫖建議請皇后為亞獻安樂公主為終獻瓌深非其議嘗于御前靣折欽明帝不悟竟從欽明所奏褚無量𫝊中宗將親祀南郊詔禮官學士修定儀注國子祭酒祝欽明司業郭山惲皆希㫖請以皇后為亞獻無量獨與太常博士唐紹蔣欽緒固爭以為不可時左僕射韋巨源等阿㫖叶同欽明之議竟不從無量所奏無量上皇后不合祭南郊議議曰夫郊祀者明王之盛事國家之大禮行其禮者不可以臆斷不可以情求皆上順天心下符人事欽若稽古率由舊章然後可以交神明可以膺福祐然禮文雖衆莫如周禮周禮者周公致太平之書先聖極由衷之典法天地而行教化辨方位而敘人倫其義可以幽賛神明其文可以經緯邦國備物致用其可忽乎至如冬至圜丘祭中最大皇后内主禮甚尊崇𫝊作禮位甚尊若合郊天助祭則當具著禮典今遍檢禮經𫝊作周官無此儀制葢由祭天南郊不以地配惟以始祖為主不以祖妣配天故惟皇帝親行其禮皇后不合預唐䇿作助也謹案大宗伯職云若王不與祭祀則攝位注云王有故代行其祭事下文云凡大祭祀王后不與則攝而薦豆籩徹若皇后合助祭承此下文則當云若不祭祀則攝而薦豆籩今于文上更起凡明𫝊作則是别生餘事夫事與上異則别起凡凡者生上起下之文不専繫于本職周禮一部之由此例極多備在文中不可具録又王后助祭親薦豆籩而不徹案九嬪職云凡祭祀贊后薦徹豆籩注云后進之而不徹則知中徹者為宗伯生文若宗伯攝祭則宗伯親徹不别使人又案外宗掌宗廟之祭祀王后不與則贊宗伯此一文與上相證何以明之按外宗惟掌宗廟祭祀不掌郊天足明此文是宗廟祭也又按王后行事總在内宰職中撿其職文唯云大祭祀后祼獻則賛瑶爵亦如之鄭注云謂祭宗廟也注所以知者以文之祼獻祭天無祼所以傳作以此得知又祭天之器則用陶匏亦無瑶爵注以此得知是宗廟也又内司服掌王后六服無祭天之服而巾車職掌王后之五輅亦無后祭天之輅祭天七獻無后亞獻以此諸文參之故知后不合助祭天也唯漢書郊祀志則有天地合祭皇后預唐䇿作助享之事此則西漢末代强臣擅朝舊本作權悖亂彛倫黷神諂祭不經之典事渉誣神故易𫝊曰誣神者殃及三代泰誓曰王稽古立功立事可以永年承天凝丕天之大績斯史䇿之良誡豈可不知今南郊禮儀事不稽古臣忝守經術不敢黙然舊本作緘黙請旁詢碩儒俯循𫝊作摭舊典遵𫝊作訪曲䑓之故事行圜丘之正儀使聖朝叶昭曠之塗天下知文物之盛豈不幸甚唐䇿作美文苑英華蔣欽緒𫝊中宗始親郊國子祭酒祝欽明建言皇后應亞獻以媚韋氏天子疑之詔禮官議衆曲意阿徇欽緒獨抗言不可諸儒壯其節唐書欽緒駁祝欽明請南郊皇后充亞獻議議曰周禮凡言祭祀享三者皆祭之互名本無定議何以明之按周禮典瑞職云兩圭有邸以祀地則祭地亦稱祀也又司几筵云設祀先王之昨讀作胙席明一作則祭宗廟亦稱祀也又内宗職云掌宗廟之祭祀此又非獨天稱祀地稱祭也又按禮記云惟聖人為能享帝此即祀天帝亦言享也又按孝經云春秋祭祀以時思之此即宗廟亦言祭祀也經典此文不可備數據此則欽明所執天曰祀地曰祭廟曰享未得為定明矣又周禮凡言大祭祀者祭天地宗廟之總名非一作不獨天地為大祭祀也何以明之按鬱人職云大祭祀與量人受舉斚之卒爵按尸與斚皆宗廟之事則宗廟亦稱大祭祀又欽明狀引九嬪職大祭祀后祼獻則瓚瑶爵據天無祼亦無瑶爵此乃宗廟稱大祭祀之明文欽明所執舊本作云大祭祀即為祭天地未得為定明矣又周禮大宗伯職云凡大祭祀王后有故不預舊本作赴則攝而薦豆籩欽明惟執此文以為王后有祭天地之禮欽緒等據此乃是王后薦宗廟之禮非祭天地之事何以明之按此文凡祀大神祭大祇享大鬼臨一作帥執事而卜日宿視滌濯涖玉鬯省牲鑊奉玉齍制一作詔大號理其大禮三字一作禮制相天王之大禮若王不與舊本有大字祭祀則攝位此已上一舊本作云凡直是王兼祭天地宗廟之事故通言大神大祇大鬼六字舊本作大祭今以舊唐書祝欽明傳増入之祭也已下文云凡大祭祀王后不與則薦豆籩徹此一凡直是王后祭宗廟之事故惟言大祭祀也若云王后合助祭天地不應重起凡大祭祀之文也為嫌王后有祭天地之疑故重起後凡以别之耳王后祭宗廟自是大祭祀何故取上凡相天王之禮以混下凡王后祭宗廟之文此是本經科段明白又按周禮外宗掌宗廟之祭祀佐王后薦玉豆凡王后之獻亦如之王后不預則賛宗伯按此王后有故不預則宗伯攝而薦豆籩外宗賛之内宗外宗所掌皆佐王后宗廟之薦本無佐祭天地之禮但天地尚質宗廟尚文玉豆宗廟之器初非祭天所設請問欽明若王后助祭天地在周禮使何人贊佐若宗廟攝后薦豆祭天又命一作合何人贊佐並請明徵禮文即知攝薦是宗廟之禮明矣按周禮司服云王祀昊天上帝則服大裘而冕享先王則衮冕内司服掌王后祭服無王后祭天之服按三禮義宗明王后六服謂褘衣揺周禮文及唐史並作揄英華則作揺翟闕翟鞠衣展衣褖衣也褘衣從王祭先王則服之揺翟從王祭先公則服之闕翟享諸侯則服之鞠衣以采桑則服之展衣以禮見王及見賓客則服之褖衣燕居則服之王后無助祭于天地但自先王已下又三禮義宗明王夫人之服云后不助祭天地五岳故無助祭天地四望之服按此則王后無祭天之服明矣又三禮義宗明王后五輅謂重翟厭翟安車翟車輦車也重翟者后從王祭先王先公所乘也厭翟者后從王享諸侯所乘也安車者后宫中朝夕見于王所乗也翟車者后採桑所乘也輦車者后遊宴所乘也按此則皇后無祭天之車明矣又禮記郊特牲義贊云祭天無祼鄭𤣥注云惟人道宗廟有祼天地大神至尊不祼圜丘之祭與宗廟袷同朝踐王酌泛齊以獻是一獻后無祭天之事大宗伯次酌醴齊以獻之是為二獻按此則祭圜丘大宗伯次王為獻非攝王后之事欽明等所執王后有故不預則宗伯攝薦豆籩更明攝王后宗廟之薦非攝天地之祀明矣欽明建議只泛引禮記祭統曰夫祭也者必夫婦親之按此是王與后祭宗廟之禮非關祀天地之義按漢魏晉宋後魏齊梁周陳隋等歴代典一作史籍興王令主郊天祀地代有其禮史不闕書並不見往代王后助祭之事又髙祖神堯皇帝太宗文武聖皇帝南郊祀天無皇后助祭處髙宗天皇大帝永徽二年十一月辛酉親有事于南郊又總章元年十二月丁夘親祀南郊亦並無皇后助祭處又按大唐禮亦無皇后助祭南郊之禮欽緒等幸忝禮官親承聖問竭盡聞見不敢依隨伏以主上稽古志遵舊典所議助祭寔無正一作明文若以王者制禮自我作古明主立斷非臣所敢言謹議文苑英華舊唐書祝欽明𫝊自入為國子祭酒景龍三年中宗將親祀南郊欽明與國子司業郭山惲二人奏言皇后亦合助祭遂建議曰謹案周禮天神曰祀地祇曰祭宗廟曰享大宗伯職曰祀大神祭大祇享大鬼理其大禮若王有故不預則攝位凡大祭祀王后不預則攝而薦豆籩徹又追師職掌王后之首服以待祭祀又内司服職掌王后之六服凡祭祀供后之衣服又九嬪職大祭祀后祼獻則贊瑶爵亦如之據此諸文即皇后助皇帝祀天神祭地祇明矣故鄭𤣥注内司服云闕狄后助王祭羣小祀之服然則小祀尙助王祭中大推理可知闕狄之上猶有兩服第一褘衣第二揺狄第三闕狄此三狄皆助祭之服闕狄即助祭小祀即知揺狄助祭中祀褘衣助祭大祀鄭舉一隅故不委説祭宗廟周禮王有兩服先王衮冕先公鷩冕鄭𤣥因此以后助祭宗廟亦分兩服云褘衣助祭先王揺狄助祭先公不言助祭天地社稷自宜三隅而反且周禮正文凡祭王后不預既不專言宗廟即知兼祀天地故云凡也又春秋外𫝊云禘郊之事天子親射其牲王后親舂其粢故代婦職但云詔王后之禮事不主言宗廟也若専主宗廟者則内宗外宗職皆言掌宗廟之祭祀此皆禮文分明不合疑惑舊説以天子父天母地兄日姊月所以祀天于南郊祭地于北郊朝日于東門之外以事神訓人事君必躬親以禮文有故然後使攝此其義也禮記祭統曰夫祭也者必夫婦親之所以備外内之官也官備則具備又哀公問于孔子曰冕而親迎不已重乎孔子愀然作色而對曰合二姓之好以繼先聖之後以為天地宗廟社稷之主君何謂已重又漢書郊祀志云天地合祭先祖配天先妣配地天地合精夫婦判合祭天南郊則以地配一體之義也據此諸文則知皇后合助祭望請别修助祭儀注同進帝頗以為疑召禮官親問之太常博士唐紹蔣欽緒對曰皇后南郊助祭于禮不合但欽明所執是祭宗廟禮非祭天地禮謹案魏晉宋及齊梁周隋等厯代史籍至于郊天祀地並無皇后助祭之事帝令宰相取兩家狀對定欽緒與唐紹及太常博士彭景直又奏議曰周禮凡言祭祀享三者皆祭之互名本無定義何以明之案周禮典瑞職云兩珪有邸以祀地則祭地亦稱祀也又司几筵云設祀先王之胙席則祭宗廟亦稱祀也又内宗職云掌宗廟之祭祀此又非獨天稱祀地稱祭也又案禮記云唯聖為能享帝此即祀天帝亦言享也又案孝經云春秋祭祀以時思之此即宗廟亦言祭祀也經典此文不可備數據此則欽明所執天曰祀地曰祭廟曰享未得為定明矣又周禮凡言大祭祀者祭天地宗廟之總名不獨天地為大祭也何以明之案鬱人職云大祭祀與量人受舉斚之卒爵尸與斚皆宗廟之事則宗廟亦稱大祭祀又欽明狀引九嬪職大祭祀后祼獻則贊瑶爵據祭天無祼亦無瑶爵此乃宗廟稱大祭祀之明文欽明所執大祭祀即為祭天地未得為定明矣又周禮大宗伯職云凡大祭祀王后有故不預則攝而薦豆籩欽明唯執此文以為王后有祭天地之禮欽緒等據此乃是王后薦宗廟之禮非祭天地之事何以明之案此文凡祀大神祭大祇享大鬼帥執事而卜日宿視滌濯涖玉鬯省牲鑊奉玉齍制大號理其大禮制相天王之大禮若王不與祭祀則攝位此以上一凡直是王兼祭天地宗廟之事故通言大神大祇大鬼之祭也已下文云凡大祭祀王后不與則攝而薦豆籩徹此一凡直是王后祭廟之事故唯言大祭祀也若云王后助祭天地不應重起凡大祭祀之文也為嫌王后有祭天地之疑故重起後凡以别之耳王后祭廟自是大祭祀何故取上凡相王之禮以混下凡王后祭宗廟之文此是本經科段明白又案周禮外宗掌宗廟之祭祀佐王后薦玉豆凡后之獻亦如之王后有故不預則宗伯攝而薦豆籩外宗無佐祭天地之禮但天地尚質宗廟尚文玉豆宗廟之器初非祭天所設請問欽明若王后助祭天地在周禮使何人贊佐若宗伯攝后薦豆祭天又合何人贊佐並請明徵禮文即知攝薦是宗廟之禮明矣案周禮司服云王祀昊天上帝則服大裘而冕享先王則衮冕内司服掌王后祭服無王后祭天之服案三禮義宗明王后六服謂褘衣揺翟闕翟鞠衣展衣褖衣褘衣從王祭先王則服之揺翟祭先公及饗諸侯則服之鞠衣以採桑則服之展衣以禮見王及見賓客則服之褖衣燕居服之王后無助祭于天地之服但自先王以下又三禮義宗明王夫人之服云后不助祭天地五岳故無助天地四望之服案此則王后無祭天之服明矣三禮義宗明王后五輅謂重翟厭翟安車翟車輦車也重翟者后從王祭先王先公所乘也厭翟者后從王饗諸侯所乘也安車者后宫中朝夕見于王所乘也翟車者后采桑所乘也輦車者后遊宴所乘也案此則王后無祭天之車明矣又禮記郊特牲義贊云祭天無祼鄭𤣥注云唯人道宗廟有祼天地大神至尊不祼圜丘之祭與宗廟不同朝踐王酌泛齊以獻是一獻后無祭天之事大宗伯次酌醴齊以獻是為二獻案此則祭圜丘大宗伯次王為獻非攝王后之事欽明等所執王后有故不預則宗伯攝薦豆籩更明攝王后宗廟之薦非攝天地之祀明矣欽明建議引禮記祭統曰夫祭也者必夫婦親之案此是王與后祭宗廟之禮非關祀天地之義案漢魏晉宋後魏齊梁周陳隋等歴代史籍興王令主郊天祀地代有其禮史不闕書並不見徃代皇后助祭之事又髙祖神堯皇帝太宗文武聖皇帝南郊祀天無皇后助祭處髙宗天皇大帝永徽二年十一月辛酉親有事于南郊又總章元年十二月丁卯親拜南郊亦並無皇后助祭處又案大唐禮亦無皇后助祭南郊之禮欽緒等幸忝禮官親承聖問竭盡聞見不敢依隨伏以主上稽古志遵舊典所議助祭實無明文時尚書左僕射韋巨源又希㫖協同欽明之議上納其言竟以后為亞獻乃補大臣李嶠等女為齋娘以執籩豆及禮畢特召齋娘有夫壻者咸為改官景雲初侍御史倪若水劾奏欽明及郭山惲曰欽明等本是腐儒素無操行崇班列爵寔為叨忝而涓塵莫効諂佞為能遂使曲臺之禮圜丘之制百王故事一朝墜失所謂亂常改作希㫖病君人之不才遂至於此今聖明馭世賢良入用唯兹小人猶在朝列臣請並從黜放以肅周行于是左授饒州刺史祝欽明傳欽明與國子司業郭山惲隂迎韋后意謬立議帝雖不睿猶疑之召禮官質問時左僕射韋巨源助后掎掣帝奪政事即傅欽明議帝果用其言以皇后為亞獻景龍三年中宗將親祀南郊欽明與司業郭山惲隂迎韋后意謬立議曰周官天神曰祀地祇曰祭宗廟曰享大宗伯曰祀大神祭大祇享大鬼王有故不預則攝而薦追師掌后首服以待祭祀内司服掌后六服祭祀則供又九嬪凡大祭祀后祼獻則贊瑶爵然則后當助天子祀天神祭地祇鄭𤣥稱闕狄后助王祭羣小祀服小祀尚助况天地哉闕狄之上褘褕狄三服皆以助祭知褘衣助大祀也王祭服二曰先王衮冕先公鷩冕故后助祭亦以褘衣祭先王褕狄祭先公不言助祭天地舉此以明彼反三隅也春秋外𫝊禘郊天子親射其牲王后親春其粢世婦詔后之禮事不専主宗廟祭統曰祭也者必夫婦親之所以備内外之官也哀公問孔子曰冕而親迎不已重乎答曰合二姓之好以繼先聖之後以為天地宗廟社稷之主君何謂已重乎則知后宜助祭臣請由經誼制儀典帝雖不睿猶疑之召禮官質問于是太常博士唐紹蔣欽緒對欽明所引皆宗廟禮非祭天地者周隋而上無皇后助祭事帝令宰相參訂紹欽緒又引博士彭景直共議時左僕射韋巨源助后掎掣帝奪政事即傅欽明議帝果用其言以皇后為亞獻取大臣李嶠等女為齋娘奉豆籩禮成詔齋娘有夫者悉進官唐書唐書祝欽明𫝊欽明又請以安樂公主為終獻唐紹蔣欽緒固争乃止通典景龍三年中宗親祀昊天上帝樂章十首舊唐書音樂志降神用豫和天之厯數歸睿唐顧惟菲徳欽昊蒼選吉日兮表殷薦兾神鑒兮降闓陽皇帝行用太和圜鐘宫恭臨寶位肅奉瑶圖恒思解網每軫泣辜德慚巢燧化劣唐虞期我良弼式贊嘉謨告謝圜鐘宫得一流𤣥澤通三御紫宸逺叶千齡運遐銷九域塵絶瑞駢闐集殊祥絡繹臻年登慶西畝稔嵗賀盈囷登歌用肅和無射均之林鐘羽悠哉廣覆大矣曲成九𤣥著象七曜甄明珪璧是奠醖酎斯盈作樂崇德爰暢咸英迎俎用雍和圜鐘均之黄鐘羽郊壇展敬嚴配因心孤竹簫管空桑瑟琴肅穆大禮鏗鏘八音恭惟上帝希降靈歆酌獻用福和圜鐘宫九成爰奏三獻式陳欽承景福恭託明禋中宫助祭昇壇用函鐘宫坤元光至德柔順闡皇風芣苢芳聲逺螽斯美化隆叡範超千載嘉猷備六宫肅恭陪盛典欽若薦禋宗亞獻用函鐘宫三靈降饗三后配神䖍敷藻奠敬展郊禋送文舞出迎武舞入用舒和圜鐘均之中吕商已陳粢盛敷嚴祀更奏笙鏞協雅聲璇圖寳厯欣寧謐晏俗淳風樂太平武舞作用凱安圜鐘均之無射徵堂堂聖祖興赫赫昌基泰戎車盟津偃玉帛塗山會舜日啟祥輝堯雲卷征斾風猷被有截聲教覃無外景雲元年十一月十三日乙丑冬至祀圜丘時隂陽人盧雅侯藝等奏請從冬至就十二日甲子以為吉㑹右䑓侍御史唐紹奏曰禮所以冬至祭圜丘于南郊夏至祭方澤于北郊者以其日行躔次極于南北之際也日北極當晷度循半日南極當晷度環周是日一陽爻生為天地交際之始故易曰復其見天地之心乎即冬至卦象也一嵗之内吉莫大焉甲子但為六旬之首一年之内隔月常遇既非大㑹晷運未周唯總六甲之辰助四時而成嵗今欲避環周以取甲子是背大吉而就小吉也竟依紹議舊唐書禮樂志先天元年正月辛巳有事于南郊己丑大赦改元曰太極唐書睿宗本紀太極元年正月初將有事于南郊時有司議唯祭昊天上帝而不設皇地祇位諫議大夫賈曽上表謹案禮祭法曰有虞氏禘黄帝而郊嚳大𫝊曰大祭曰禘然則郊之與廟俱有禘名禘廟則祖宗之主俱合于太祖之廟禘郊則地祇羣望俱合于圜丘以始祖配享皆有事而大祭異于常祀之義三輔故事漢祭圜丘儀上帝位正南面后土位亦南面而少東又東漢記云光武洛陽城南為圜壇天地位其上皆南面西上案兩漢時自有后土及北郊祀而此已于圜丘設地位明是禘祭之儀今之南郊正當禘禮固宜合配天地咸秩百神請備設皇地祇並從祀等座則禮得稽古義合縁情時又將親享北郊竟寢曽表通典案賈曽𫝊天子親郊有司議不設皇地祇位曽請合享天地如古制并從配等座睿宗詔宰相禮官議皆如曽請案此年五月戊寅有事北郊新書禮樂志又云是時睿宗將祭地于北郊故曽之議寢據此是賈𫝊悞𤣥宗即位未郊見張九齡建言天百神之君王者所由受命也自古繼統之主必有郊配葢敬天命報所受也不以德澤未洽年榖未登而闕其禮昔者周公郊祀后稷以配天謂成王幼冲周公居攝猶用其禮明不可廢也漢丞相匡衡曰帝王之事莫重乎郊祀董仲舒亦言不郊而祭山川失祭之序逆于禮故春秋非之臣謂衡仲舒古之知禮皆以郊之祭所宜先也陛下紹休令緒于今五載而未行大報考之于經義或未通今百榖嘉生鳥獸咸若夷狄内附兵革用弭乃怠于事天恐不可以訓願以迎日之至升紫壇陳采席定天位則令典無遺矣唐書張九齡傳開元十一年九月癸未制宜以迎日之至允備郊天之禮所司詳擇舊典以聞册府元龜開元十一年十一月戊寅有事于南郊大赦唐書𤣥宗本紀案通典開元十一年十一月親享圜丘中書令張說為禮儀使衛尉少卿韋縚為副說建議以髙祖配祭始罷三祖同配之禮開元二十年九月乙巳中書令蕭嵩等奏上開元新禮舊唐書𤣥宗本紀開元二十年蕭嵩為中書令改撰新禮祀天一歲有四祀地有二冬至祀昊天上帝于圜丘髙祖神堯皇帝配中官加為一百五十九座外官減為一百四座其昊天上帝及配帝二座籩用十二簠簋㽅俎各一上帝則泰罇著罇犧罇象罇壺罇各二山罍六配帝則不設泰罇及壺罇减山罍之四餘同上帝五方帝座則籩豆各十簠簋㽅俎各一泰罇二大明夜明籩豆各八餘同五方帝内官每座籩豆二簋俎各一内官以上設罇于十二階之間内官每道間著罇二中官犧罇二外官著罇二衆星壺罇二正月上辛祈榖祀昊天上帝于圜丘以髙祖配孟夏雩祀昊天上帝于圜丘以太宗配季秋大享于明堂祀昊天上帝以睿宗配案祈榖雩祀明堂見本條下凡祀昊天上帝及配座用蒼犢各一五方帝五人帝各用方色犢一大明青犢一夜明白犢一若冬至祀圜丘加羊與豕各一凡肉皆載以俎其牲皆升右胖體十一前節三肩臂臑後節二肫胳正脊一脡脊一横脊一長脅一短脅一代脅一皆並骨凡供别祭用太牢者犢一羊一猪一酒二斗脯一段醢四合若用少牢去犢减酒一斗郊廟罇罍五齊三酒並見本儀中書凡用籩豆各十二籩實以石鹽乾魚乾棗栗黄榛子仁菱仁芡仁鹿脯白餅黒餅糗餌粉餈豆實以韮葅醓醢菁葅鹿醢芹葅兎醢笋葅魚醢脾折葅豚胉􅓞食糝食用簠簋各二簠實黍稷飯簋實稻粱飯又㽅實大羮鈃實肉羮皇帝冬日至祀圜丘儀正月上辛祈榖孟夏雩祀及攝事並附卜日于太廟南門外將卜前一日以右校掃除太廟南門之外守宫設太常卿以下次于門外之東皆西向其日平明太卜令卜正占者俱就次各服公服守宫布卜席于闑西閾外西向謁者告事具謁者引太常卿外立于門東西向賛引之太卜令卜正占者門西東向卜正先抱龜奠于席上西首灼龜之具奠于龜北乃執龜立於席東北向太卜令進受龜詣太常卿前示髙太常卿受視訖太卜令受龜少退俟太常卿曰皇帝以某日祗祀于某尚饗太卜令曰恪遵述命還即席西向坐命龜有曰假爾太龜有常興授卜正龜卜正負東扉坐作龜訖興太卜令進受龜示太常卿卿受反之太卜令退復位東向與衆占之訖不釋龜進告于太常卿占曰某日從授卜正龜謁者進太常卿之左白禮畢謁者引太常卿以下還次卜者徹龜守宫徹席以退若上旬不吉卜中旬中旬不吉卜下旬皆如初禮若卜吉日及非大事皆太卜令蒞卜之正占者視髙命龜作龜唐書唐㑹要卷九上欽定四庫全書唐㑹要卷九下宋王溥撰齋戒前祀七日皇帝散齋四日于别殿致齋三日其二日于太極殿一日于行宫前致齋一日尚舍奉御幄于太極殿西序及室内俱東向尚舍直長張帷于前楹下致齋之日質明諸衛勒所部屯門列仗晝漏上水一刻侍中版奏請中嚴諸衞之屬各督其隊入陳于殿庭如常儀通事舍人引文武五品以上袴褶陪位如式諸侍衞之官各服其器服諸侍臣並結珮凡齋者則結珮俱詣閤奉迎上水二刻侍中版奏外辦上水三刻皇帝服衮冕上辛服通天冠絳紗袍結珮乗輿出自西房曲直華蓋警蹕侍衞如常儀皇帝即御座東向坐侍臣夾侍如常一刻頃侍中前跪奏稱侍中臣某言請降就齋宫俛伏興還復位皇帝降座入宫文武侍臣各還本司直衞者如常通事舍人分引陪位者以次出凡應祀之官散齋四日致齋三日散齋皆于正寢致齋二日于本司一日于祀所其無本司者皆于祀所焉近侍官應從升者及從祀羣官諸方客使各于本司館清齋一宿無本司各于家正寢諸祀官致齋之日給酒食及明衣布各習禮于齋攝事無皇帝齋儀上辛雩祠同光祿卿監取明水火太官令取水于隂鑑取火于陽燧火以供爨水以寔鑑焉前祀二日太尉告髙祖神堯皇帝廟如常告之儀告配神之主雩祀至孟夏告太宗文武皇帝廟前祀一日直衞令其屬後一刻各以其器服守壝每門二人每限二人與大樂工人俱清齋宿焉凡大祀齋官皆前七日集尚書省太尉誓曰某月日祀昊天上帝于圜丘其誓各隨祭享祀事言之各揚其職不供其事國有常刑其散齋理事如舊夜宿止于家正寢惟不弔喪問疾不作樂不判署刑殺文書不行刑罰不經穢惡致齋惟祀事得行其餘悉斷凡大祀官散齋四日中祀三日小祀二日致齋大祀三日中祀二日小祀一日其致齋日三公于都省安置所司鋪設其餘官皇城内有本司者于本司無者于太常社郊太廟齋坊安置皆日未出前到齋所至祀前一日各從齋所晝漏上三刻向祀所仍令平明清所行路道次不得見諸凶穢衰絰過訖任行其哭泣之聲聞于祭所者權斷訖事非應散齋者惟清齋一宿于本司及祀所凡大祀中祀接神齋官祀前一日皆沐浴九品以上皆官給明衣齋郎升壇行事亦權給潔服應齋官所習禮臨時闕者通攝行事致齋之日先不食公糧及無本司者大官准品給食祈告一日清齋者設食亦如之凡散齋有大功已上喪致齋有周已上喪並聽赴即居緦麻已上喪者不得行宗廟之祭其在齋坊病者聽還死于齋所同房不得行事也陳設前祀三日尚舍直長施大次于外壝東門之内道北南面攝事守宫設祀官公卿等次于東壝之外道南北向西上焉尚舍奉御座衞尉設文武侍臣次上辛雩祀守宫設文武侍臣次焉于大次之前文官在左武官在右俱相向上辛雩祀于大次後俱南向設諸祀官次于東壝之外道南從祀文官九品以上于祀官之東東方南方朝集使于文官之東東方南方蕃客又于其東俱重行每等異位北向西上介公酅公于西壝之外道南武官九品以上于介公酅公之西西方北方朝集使于武官之西西方北方蕃客又于其西俱重行每等異位北向東上其褒聖侯若在朝位于文官三品之下攝事無大次褒聖等儀上辛雩祀同設陳饌幔于内壝東西門之外道北南向北門之外道東西向壇上及東方南方午陛之東饌陳于東門外西方及南方午陛之西饌陳于西門外北方之饌陳于北門外上辛雩祀但有壝東方之外饌焉前祀二日大樂令設宫懸之樂于壇南内壝之外東方西方磬簴起北鐘簴次之南方北方磬簴起西鐘簴次之設十二鎛鐘于編懸間各依辰位拊雷鼔于北懸之内道之左右植建鼓于四限置柷敔于懸内柷在左敔在右設歌鐘歌磬于壇上近南北向磬簴在西鐘簴在東其匏竹者立于壇下重行北向相對為首凡懸皆展而編之諸工人各位于懸後東方西方以北方為上南方北方以西為上右校掃除壇之内外郊社令積柴于燎壇其壇于神璮之旁内壝之外方一丈髙丈二尺開上南出户方六尺前祀一日奉禮設御位于壇東南西向設望燎位于柴壇之北南向設祀官公卿位于内壝東門之外上辛雩祀則東門内攝事亦然道南分獻之官于公卿之南上辛雩祀無分獻位以下皆然執事者位于其後每等異位俱重行西向北上設御史位于壇下一位于東南西向一位于西南東向設奉禮郎位于樂懸東北贊者二人在南差退俱西向又設奉禮贊者位于燎壇東北西向皆北上設協律郎位于壇上南陛之西東向設太樂令位于北懸之間當壇北向設從祀文官九品以上位于執事之南東方南方朝集使于文官之南東方南方蕃客又于其南俱每等異位重行西向北上介公酅公位于中壝上辛雩祀内壝西門之内道南武官九品以上位于介公酅公之南西方北方朝集使于武官之南西方北方蕃客又于其南俱每等異位重行東向北上其褒聖侯于文官三品下諸州使人各分位于朝集使之後攝事無褒聖已上至從祀位又設祀官及從祀羣官等門外位于東西壝門之外如設次之式設牲牓于東壝之外當門西向蒼牲一又青牲一在北少退南上次赤牲一黄牲一白牲一𤣥牲一雩祀五方色牲各二又赤牲一白牲一上辛雩祀無日月牲在南皆少退以北為上又設廩犧令位于牲西南祝史陪其後俱北面設諸太祝位于牲東各當牲後祝史陪其後俱西向設太常卿省牲位于牲前近北又設御史位于太常卿之西俱南向設酒罇之位上帝太罇二著罇二犧罇二山罍二在壇上東南隅北向象罇二壺罇二山罍二在壇下南陛之東北向俱西上設配帝著罇二犧罇二象罇二山罍二在壇上于上帝酒罇之東北向西上五帝日月各太罇二在第一等上辛則五帝各太罇一著罇二犧罇二日罍罇二在第一等神座之左而右向無月以下諸座攝事亦然也内官每陛間各象罇二在第二等中官每陛間各壺罇二在第三等外官每階間各概罇二在壇下衆星每道間各散罇二于内壝之外凡罇各設于神座之左而右向罇皆加勺羃五帝日月以上皆有坫以置爵雩祀無日月以下罇其五帝太罇犧罇各二罍一在第一等五人帝犧罇各二在第三等五官象罇各二在壇下設御洗于午陛東南亞獻終獻同洗于卯陛之南俱北向攝儀但設洗午陛東南北面雩祀設亞獻之洗于御東南五官洗于罇設分獻罍洗罍水在洗東篚在洗西南肆篚寔以巾爵篚羃各于其方陛道之左俱内向執罇罍篚羃者各于罇罍篚羃之後設玉幣之篚于壇上下罇坫之所祀前一日晡後上辛雩祀皆祀日未明五刻焉太史令郊社令各常服帥其屬升設昊天上帝神座于壇上北方南向席以藁秸設髙祖神堯皇帝神座雩祀則設太宗文武皇帝神座焉于東方西向席以莞設五方帝日月神座于壇第一等青帝于東陛之北赤帝于南陛之東黄帝于南陛之西白帝于西陛之南黒帝于北陛之西雩祀又設五人帝座于第二等如五方之陛位又設五官座于壇下東南西向北上無日月以下諸星位大明于東陛之南上辛並無大明以下位矣夜明于西陛之北席皆以藁秸又設五星十二辰河漢及内官五十五座于第二等十有二陛之間各依方面凡座皆内向其内官有北辰座于東陛之北曜魄寳于北陛之西北斗于南陛之東天一太一皆在北斗之東五帝内座于曜魄寳之東並差在行位前又設二十八宿及中官百五十九座于第三等其二十八宿及帝座七公日星帝席大角攝提太微太子明堂軒轅三台五車諸王月星織女建星天紀等十七座並差在行位前又設外官百五座于内壝之内又設衆星三百六十座于内壝之外各依方次十有二道之間席皆以莞設神位各于座首所司陳異寳及嘉瑞等于樂懸之北東西廂昊天上帝及配帝五方帝五星日月之座設訖都收至祀日未明五刻郊社令太史令各服其服升壇全設之其内官中官外官衆星等諸座一設定不收也省牲器省牲之日午後十刻去壇二百步所享明堂則于明堂所廟享廟所皆二百步所焉諸衞之屬禁斷行人廟享則太令整拂神幄焉晡後二刻郊社令丞帥府史三人諸儀二廟享則太廟令帥府史也及齋郎以罇坫篚羃入設于位廟享則籩豆簋鉶皆設位加以巾葢諸器物皆濯而陳之升壇者各由其陛升廟堂者升自東陛焉晡後三刻謁者贊引各引祀官公卿以下俱就東壝門外位廟享則無壝外公卿位焉諸太祝與廩犧令以牲就榜位謁者引司空諸儀並引太常卿也贊引引御史入詣壇東陛升行掃除于上降行樂懸于下訖出還本位初司空將升又謁者引太常卿贊引引御史入詣壇東陛升視滌濯于視濯罇者皆舉羃告潔廟享升東階訖引降就省牲位南向立廩犧令少前曰請省牲退復位太常卿省牲廩犧令又前舉手曰腯還本位諸太祝各循牲一匝四向疑作西向舉手曰充俱還本位諸太祝與廩犧令以次牽牲詣厨授太官謁者引光祿詣厨省鼎鑊申視濯溉謁者贊引各引祀官御史廟享但引御史省視饌具俱還齋所享廟則進饌者入徹籩豆簋簠鉶㽅以出而已祀日未明十五刻太官令帥宰人以鸞刀割牲祝史以豆取毛血各置于饌所遂烹牲廟享毛血每座共實一豆祝史洗肝于鬱鬯又取膟膋每座各實一豆俱置饌所膟膋腸間脂也鑾駕出宫前出宫三日本司宣攝内外各供其職尚舎設行宫于壇東南向隨地之宜守宫設從祀官五品以上次于承天門外東西朝堂如常儀前二日太樂令設宫懸之樂于殿庭如常儀駕出懸而不作其日晝漏上水五刻鑾駕發引發引前七刻搥一鼓為一嚴三嚴時節前一日侍中奏裁也侍中奏開宫殿門及城未明五刻搥二鼓為再嚴侍中版奏請中嚴奉禮郎設從祀羣官五品以上位文官于東朝堂之前西向武官于西朝堂之前東向俱重行北上從祀羣官五品以上依時刻俱集朝堂次各服其服其六品以下及介公酅公褒聖侯朝集使諸方客使等並駕出之日便赴祀所所司陳大駕鹵簿于朝堂發引前二刻搥三鼓為三嚴諸衞之屬各督其隊與鼓㦸以次入陳于殿庭通事舎人引從祀羣官各就朝堂前位諸侍衞之官各服其服侍中中書令以下俱詣西階奉迎侍中負寳如式乗黄令進玉輅于太極殿西階之前南向千牛將軍一人執長刀立于輅前北向黄門侍郎一人在侍臣之前贊者二人在黄門之前侍中版奏外辦太僕卿攝衣而升正立執轡皇帝服衮冕上辛服通天冠絳紗袍也乗輿以出降自西階稱警蹕如常千牛將軍執轡皇帝升輅太僕卿立授綏侍中中書令已下夾侍如常黄門侍郎臣奏稱請鑾駕進發俛伏興退還位凡黄門侍郎奏請皆進鑾駕前跪奏稱具官臣某言訖俛伏興鑾駕動又稱警蹕黄門侍郎與贊者夾引以出千牛將軍夾路而趨駕出承天門至侍臣上馬所黄門侍郎退稱侍臣上馬贊者承𫝊文武侍臣皆上馬諸侍衛之官各督其屬左右翊駕在黄麾内符寳郎奉六寳與殿中監後侍從在黄鉞内侍中中書令已下夾侍于輅前贊者在供奉官人内侍臣上馬畢黄門侍郎奏稱請勅車右升侍中前承制退稱制曰可黄門侍郎退復位鑾駕動稱警蹕不鳴鼓𫝊音如常鼓吹不得喧譁其從祀之官在𤣥武隊後如常儀駕將至諸祀官俱朝服結佩謁者引立于次前重行北向西上駕行宫南門外迴輅南向將軍降立于輅右侍中進當鑾駕前跪奏稱侍中臣某言請降輅俛伏興皇帝降輅乗輦入行宫徹扇華蓋侍衞警蹕如常儀宿衞如式謁者贊引各引祀官通事舎人分引文武羣官集行宫朝堂文左武右舎人承㫖勅羣官等各還次奠玉帛祀日未明三刻諸祀官及從祀之官各服其服郊社令良醖令各率其屬入實罇罍玉幣凡設罇之次太罇為上實汎齊著罇次之實以醴齊犧罇次之實以盎齊象罇次之實以醍齊壺罇次之實以沈齊山罍為下實以清酒配帝著罇為上實以汎齊犧罇次之實以醴齊象罇次之實以盎齊山罍為下實以清酒五帝日月俱以太罇實以汎齊其内官之象罇實以醍齊中官之壺罇實以沈齊外官之概罇實以清酒衆星之散罇實以㫖酒齊皆加明水酒皆加𤣥酒各實于上罇玉上帝以蒼璧青帝以青珪赤帝以赤璋白帝以騶虞黒帝以𤣥璜黄帝以黄琮日月以珪璧昊天上帝及配帝之幣以蒼其日月内官以下各從方色各長丈八尺上辛則五方帝各太罇為上實以汎齊著罇次之實以醴齊犧罇次之實以盎齊其用玉昊天上帝以四珪有邸餘同無日月以下罇雩祀同圜丘又有五人帝之幣亦放其方也太祝以玉幣置于篚太官令帥進饌者實諸籩豆簠簋等各設于饌幔内未明二刻奉禮郎帥贊者先入就位贊引引御史博士諸太祝及令史與執罇罍篚羃者入自東壝門當壇南重行北面西上凡引導者毎曲一逡巡也立定奉禮郎曰再拜贊者承𫝊凡奉禮有詞贊者各承傳御史以下皆再拜訖執罇罍篚羃者各就位贊引引御史諸太祝詣壇東陛御史一人太祝七人升行掃除于上及第一等御史一人太祝七人又行掃除于下上辛雩祝贊引引御史諸太祝掃除于上令史祝史掃除于下訖各引就位未明一刻謁者贊引各引祀官及從祀羣官客使等俱就門外位攝儀無從祀羣官客使上辛雩祀同太樂令帥工人二舞次入就位文舞入陳于懸内武舞于懸南道西其升璮者皆脱履于下降納如常謁者引司空入就位立定奉禮曰再拜司空再拜訖謁者引司空自壇東陛升行掃除于上降行樂懸于下訖引復位謁者贊者各引祀官及從祀羣官客使等次入就位初未明三刻諸衞列大駕仗衞陳設如式侍中版奏請中嚴乗黄令進玉輅于行宫南門外迴輅南向若行宫去璮稍遠嚴警如式焉未明一刻侍中版奏外辦皇帝服衮冕乗輿以出徹扇華蓋侍衞如常儀侍中負寳陪從如式皇帝升輅如初黄門侍郎奏請鑾駕進發還侍立鑾駕動稱警蹕如常千牛將軍夾路而趨若行宫去璮稍遠奏升輅如式駕至大次門外迴輅南向若將軍升輅即降立于輅右焉侍中進當鑾駕前奏稱侍中臣某請降輅俛伏興還侍立皇帝降輅乗輿之大次徹扇華蓋侍衞如常儀郊社令以祝版進御署訖近臣奉出郊社令各受奠于坫皇帝停大次半刻頃通事舍人各引從祀文武羣臣介公酅公諸方客使皆先入就位太常博士引太常卿立于大次門外當門北向侍中版奏外辦質明皇帝改服大裘而冕上辛雩祀蓋服衮冕出次華蓋侍衞如常儀侍中負寳陪從如式博士引太常卿太常引皇帝凡太常卿前導皆博士先引焉至中壝門外上辛雩祀内壝殿中監進大珪尚衣奉御又以鎮圭授殿中監殿中監受進皇帝搢大珪執鎮圭華蓋仗衞停于門外禮部尚書與近侍者陪從如常儀大圭如搢不便請立定近侍承奉焉皇帝至版位西向立每立定太常卿與博士退立于左太常卿前奏稱請再拜退復位皇帝再拜攝事無未明三刻下至此再拜儀上辛雩祀同奉禮郎曰衆官再拜衆官在位者皆再拜其先拜者不拜太常卿前奏攝則謁者進太尉之左白上辛雩祀同焉有司謹具請行事退復位協律郎跪俛伏舉麾凡取物者皆跪俛伏而取以興奠物則跪奠訖俛伏而後興他放此鼓奏元國諱改和之樂乃以圜鐘為宫黄鐘為商太簇為徴姑洗為羽作文武之舞樂舞六成圜鐘三奏黄鐘太簇姑洗各一奏也偃麾戛敔樂止凡樂皆協律郎舉麾工鼓柷而後作偃麾戛敔而後止太常卿前奏稱再拜退復位皇帝再拜攝事無太常卿至皇帝拜上辛雩祀同也奉禮郎曰衆官再拜衆官在位者皆再拜正座配座太祝跪取玉幣于篚各立于罇所諸太祝俱取玉及幣亦各立于罇所太常卿引皇帝太和之樂作皇帝每行皆作太和之樂攝則謁者引太尉已下皆謁者引太尉太和樂上辛雩祀同皇帝詣壇升自南陛侍中中書令以下及左右侍衞量人從升以下皆如之皇帝升壇北向立攝則太尉升南陛北向立樂止正座太祝加玉于幣以授侍中侍中奉玉幣東向進皇帝搢鎮圭受玉幣凡受物皆搢鎮圭跪奠訖執圭俛伏太常則搢笏登歌作肅和之樂以大吕之均太常卿引皇帝進北向跪奠于昊天上帝神座俛伏興太常卿引皇帝立于西方東向配座太祝以幣授侍中侍中奉幣北向進攝則太祝授太尉太尉奉玉幣進奠皇帝受幣太常引進髙祖神堯皇帝神座雩祀則太宗座俛伏興太常卿引皇帝少退東向再拜訖登歌止太常卿引皇帝樂作皇帝降自南陛還版位西向立樂止攝則太尉行還立無樂也初皇帝將奠配帝之幣謁者七人各分引獻官奉玉幣俱進跪奠于第一等神座上辛則謁者五人各分引獻官奉玉幣奠五方帝座攝事同雩祀五人帝五官相次而畢餘星座之幣謁者贊引各引官進奠于首座餘皆祝史齋郎助奠訖引還復位攝則太尉奠配座諸太祝及諸獻官各奉玉幣進于神座訖還罇所上辛無星以下座也初衆官再拜祝史各奉毛血之豆立于門外登歌止祝史奉毛血入各由其陛升諸太祝迎取于壇上俱進奠于神座諸太祝與祝史退立于罇所進熟皇帝既升攝則太尉升上辛雩祀同奠玉幣太官令出帥進饌者奉饌各陳于壝門外謁者引司徒出詣饌所司徒奉昊天上帝之俎初皇帝既至位樂止太官令引饌入攝事則于太祝奠毛血其太官引饌入土辛雩祀同俎初入門奏永和之樂黄鐘之均自後接神之樂皆奏黄鐘饌各至其陛樂止祝史俱進徹毛血之豆降自東陛以出上帝之饌升自午陛配帝之饌升自卯陛青帝之饌升自寅陛赤帝之饌升自已陛黄帝之饌升自未陛白帝之饌升自酉陛黒帝之饌升自子陛大明之饌升自辰陛夜明之饌升自戌陛其内官中官諸饌隨便而升上辛無大明以下饌攝事同雩祀五人帝饌各由其陛升諸太祝迎饌于壇上各設于神座前籩豆蓋羃先徹乃升簠簋既奠却其蓋于其下也設訖謁者引司徒太官令帥進饌者俱降自東陛以出司徒復位諸太祝各還罇所又進設外官衆星之饌相次而畢上辛無外官以下饌雩祀又進設五官饌並無衆星饌也初壇上設饌訖太常卿引皇帝詣罍洗攝則謁者引太尉詣罍洗上辛雩祀同也樂作皇帝至罍洗樂止侍中跪取匜興沃水又侍中跪取盤盥承水皇帝盥手黄門侍郎跪取巾于篚興進皇帝帨手訖黄門侍郎受巾跪奠于篚黄門侍郎又取匏爵于篚興進皇帝受爵侍中酌罍水又侍中奉盤皇帝洗爵黄門侍郎又授巾皆如初皇帝拭爵訖侍中奠盤匜黄門侍郎受巾奠于篚皆如初太常卿引皇帝樂作皇帝詣壇升自南陛樂止攝則太尉洗拭匏爵無樂作以下儀謁者引司徒升自東陛立于罇所齋郎奉爼從其後太常卿引皇帝詣上帝罇所執爵跪祭酒啐酒奠爵俛伏興太祝各率齋郎進俎太祝減神前胙肉皆取前脚第二骨也加于俎以胙等置一俎上太祝持俎以授司徒司徒奉俎西向進攝則言授皇帝受以授左右攝則太尉以授齋郎謁者引司徒降復位皇帝跪取爵遂飲卒爵侍中進受爵以授太祝太祝受爵復于坫皇帝俛伏興再拜樂止太常卿引皇帝樂作皇帝降自南階還版位西向立樂止文舞退鼓攬作舒和之樂退訖戛敔樂止武舞入鼓攬作舒和之樂立定戛敔樂止自此已上凡攝皆太尉為初獻其儀依皇帝行事賛佐皆謁者太祝齋郎初皇帝將復位謁者引太尉攝則太常卿為亞獻自下並改太尉為太常卿詣罍洗盥手洗拭匏爵訖謁者引太尉自東陛升壇詣昊天上帝著罇所執罇者舉羃太尉酌醴齊訖武舞作謁者引太尉進昊天上帝神座前北向跪奠爵興謁者引太尉少退北向拜訖謁者引太尉詣配帝犧罇所取爵于坫執罇者舉羃太尉酌醴齊訖謁者引太尉進髙祖神堯皇帝座前雩祀太宗東向跪奠爵太尉興謁者引太尉少退東向再拜上辛五方祀各取爵酌醴齊供罇訖還罇所雩祀同訖謁者引太尉進昊天上帝神座前北向立諸太祝各以爵酌罍福酒合置一爵太祝持爵進太尉之右西向立再拜受爵跪祭酒遂飲卒爵太祝進受爵復于坫太尉興再拜訖謁者引太尉却復位初太尉獻將畢謁者引光祿卿攝則同以光祿卿為終獻詣罍洗盥手洗拭匏爵升酌盎齊獻正座配座雩祀并獻五方帝也終獻如亞獻之儀上辛五帝祀亦各配獻之訖謁者引光祿卿降復位初太尉將升獻時攝則太常卿將升獻謁者七人分引五方帝及大明夜明等獻官詣罍洗盥手洗拭匏爵訖各由其陛升雩祀太尉升獻賛引引五帝獻官酌醴齊奠太昊氏配座齋郎助奠五帝將畢五帝獻官酌醍齊奠勾芒氏配座祝史助奠詣第一等俱酌汎齊訖各進跪奠于神座前興各還引降還本位初第一等獻官將升謁者五人次引獻官各由其陛升壇詣第二等罇者舉羃侍中贊酌汎齊訖壽和之樂作皇帝每酌獻及飲福皆作夀和之樂攝則謁者引太尉升自南陛詣上帝罇所執事者舉羃太尉酌汎齊訖樂作太常卿引皇帝進昊天上帝神座前北向跪奠爵興太常卿引皇帝少退北向立樂止攝儀皆謁者引太尉太祝持版進于神座之右東向跪讀祝文曰維某年嵗次月朔日嗣天子臣某敢昭告于昊天上帝攝則云天子某謹遣太尉臣某名敢昭告于昊天上辛雩祀同大明南至長晷初升萬物權輿六氣資始式遵彞典恪修禮物上辛云維神發育羣生財成庶品靈雨作施普博無私爰用啓蟄式遵農事雩祀云爰兹孟夏龍見紀辰方資長育式遵常禮敬呈玉帛犧牲粢盛庶品恭致燔祀表其寅肅敬以玉帛犧齊粢盛庶品備兹禋燎祗薦潔誠髙祖神堯皇帝配神作主凡攝事祝版應御署訖皇帝北向再拜侍臣奉版郊社令受遂奉出皇帝再拜攝則太尉再拜初讀祝文訖樂作太祝進跪奠版于神座興還罇所皇帝拜訖樂止太常卿引皇帝詣配帝酒罇所執罇者舉羃侍中取爵于坫進皇帝受爵侍中贊酌汎齊樂作太常卿引皇帝進髙祖神堯皇帝神座雩祀太宗東向跪奠爵俛伏興太常卿引皇帝少退東向立樂止上辛則謁者五人各引五方上帝太祝皆取爵于坫酌汎齊各進奠于神座訖還罇所雩祀同太祝持版進于神座之左北向跪讀祝文曰維某年嵗次月朔日有孝曽孫開元神武皇帝臣某攝則云皇帝臣某謹遣太尉臣某敢昭告于髙祖神堯皇帝履長伊始肅事郊禋用致燔祀于昊天上帝伏惟慶源長發徳冠思文對越昭升永有配命上辛云時惟孟春敬祈嘉穀用致禋祀昊天上帝伏惟髙祖濬哲徇齊欽明昭格祭祀之禮肅奉舊章雩祀云時惟正陽式遵恒典伏惟道叶乾元德施品物永有配命對越昭升謹以制幣犧齊粢盛庶品式陳明薦侑神作主尚饗訖興皇帝再拜初讀祝文訖樂作太祝進跪奠版于神座興還罇所皇帝再拜訖樂止太常卿引皇帝進昊天上帝神座前北向立樂作太祝各以爵酌上罇福酒合置一爵太祝持爵授侍中受爵西向進皇帝再拜受爵内官酒罇所俱酌醍齊各進跪奠爵于内官座首興餘座皆祝史齋郎助奠以次而畢謁者各引獻官還本位初第二等獻官將升謁者四人次引獻官俱詣罍洗盥手各由其陛升壇詣第三等中官酒罇所俱酌清酒沈齊攝儀盎齊以獻贊引四人次引獻官詣罍洗盥洗訖詣衆星酒罇所酌昔酒攝儀沈齊以獻其祝史齋郎酌酒興奠皆如内官之儀訖謁者贊引各引獻官還本位上辛雩祀無日月以下獻儀也諸獻俱畢武舞止上下諸祝各進跪徹豆興還罇所徹者籩豆各一少移于故處也奉禮郎曰賜胙贊者唱衆官再拜衆官在位者皆再拜已飲福者不拜元和之樂作太常卿前奏稱請再拜退復位皇帝再拜樂作一成止攝事則奉禮曰衆官再拜衆官在位者皆再拜太常卿前奏請就望燎位攝則謁者進太尉之左曰請就望燎位也太常卿引皇帝樂作皇帝就望燎位南向立樂止攝則謁者引太尉也于羣官將拜上下諸祝各執篚進神座前取玉幣祝版日月以上齋郎以俎載牲體黍稷飯及爵酒各由其陛降壇南行往柴壇西過壇東行自南陛登柴壇以玉幣祝版饌物置于柴上户内諸祝史又以内官已下之禮幣皆從燎上辛無日月已下牲幣雩祀有五帝幣奉禮郎曰可燎東西面各六人以炬燎火半柴太常卿前奏禮畢攝則謁者前白禮畢則太尉出太常卿引皇帝還大次樂作皇帝出中壝門上辛雩祀並内壝殿中監前受鎮珪以授尚衣奉御殿中監又前受大珪華蓋侍衞如常儀皇帝入次樂止謁者贊引各引祀官通事舎人分引從祀羣官諸方客使以次出贊引引御史太祝已下俱復執事位立定奉禮郎曰再拜御史以下皆再拜贊引引出工人二舞以次出鑾駕還宫上辛雩祀並同皇帝既還大次侍中版奏請解嚴將士不得輒離部位皇帝停大次一刻頃搥一鼓為一嚴轉仗衞于還塗如來儀三刻頃搥二鼓為再嚴將士布隊仗侍中版奏請中嚴皇帝服通天冠絳紗袍諸祀官服朝服學馬者服袴褶五刻頃搥三鼓為三嚴通事舍人分引羣官客使等序立于大次之前近南文武侍臣詣大次奉迎乗黄令進金輅于大次門外南向千牛將軍立于輅左侍中版奏外辦太僕卿升執轡皇帝乗輿出次徹扇侍衞警蹕如常儀皇帝升輅太僕卿立授綏黄門侍郎奏稱請鑾駕進發退復位鑾駕動稱警蹕如常儀黄門侍郎贊者夾引千牛將軍夾輅而趨至侍臣上馬所黄門侍郎奏稱請鑾駕權停勅侍臣上馬侍中乃前承㫖退稱制曰可黄門侍郎退稱侍臣上馬贊者承𫝊文武侍臣皆上馬畢黄門侍郎奏稱請勅車右升侍中前承制退稱制曰可黄門侍郎退復位千牛將軍升訖黄門侍郎奏稱請鑾駕進發退復位鼓𫝊音鑾駕動鼓吹振作而還文武羣臣導從如來儀諸方客使便還館駕至承天門外侍臣下馬所鑾駕權停文武侍臣皆下馬千牛將軍降立于輅右訖鑾駕動千牛將軍夾輅而趨駕入嘉徳門太樂令三撞蕤賔之鐘皆應鼓柷奏采齊之樂至太極門戛敔樂止入太極門鼔柷奏太和之樂駕至横街北當東上閣迴輅南向侍中進鑾駕前跪奏稱侍中臣某有請降輅俛伏興還復位皇帝降輅輿以入繖扇侍衞警蹕如常儀侍臣從至閣戛敔樂止初文武羣官至承天門外通事舍人承㫖勅羣官並還皇帝既入侍中版奏請解嚴扣鉦將士各還其所通典開元禮纂類開元年中唐子元徐堅同議南郊先燔後祭之義曰臣等謹案顯慶年修禮官長孫無忌等奏改燔柴在祭前狀稱祭祀之禮必先降神周人尚臭祭天則燔柴者臣等按周禮迎神之義樂六變而一作則天神降八變而一作則地祇出九變則鬼神可得而禮矣則降禮以樂周禮正文非謂燔柴以降神也按尚臭之義不為燔之先後假如周人尚臭祭天則燔柴容或燔臭先以迎神然則殷人尚聲祭天亦燔柴何聲可燔先迎神乎又按顯慶中無忌等奏稱晉氏之前猶遵古禮周魏以降妄為損益者今按郭璞晉南郊賦及註爾雅祭後方燔又案宋志所論亦祭後方燔又檢南齊北齊及梁郊祀亦先飲福酒訖燔燎一作後方燎又案後周及隋郊祀亦先祭後燔據此即周道後燔晉不先燔無忌之奏一作事事一作義乃相乖又案周禮大宗伯職以玉作六器以禮天地四方註云禮謂始告神時祭一作薦于神坐也又文一作下文云以蒼璧禮天以黄琮禮地皆有牲幣各放一作如其器之色又禮器云有以少為貴者祭天特牲是知蒼璧之與蒼牲俱合奠之神座理即作一節不惑又云四珪有邸以祀天旅上帝即明祀昊天上帝之時以旅五方天帝明矣其青珪赤璋白琥𤣥璜自是立春立夏立秋立冬之日各于其方迎氣所用自分别矣今按顯慶所改新禮以蒼璧與蒼牲蒼幣俱用先燔蒼璧既已燔矣所以遂加四珪有邸奠之神座牲既已燔矣所以更加騂牲充其寶一作寔爼混昊天于五帝同用四牲失特牲之明文加為二犢深乖禮制一作意事乃無憑請依貞觀舊禮先祭後燔庶允經義文苑英華天寳元年二月丁亥加上尊號帝親享𤣥元皇帝于新廟甲午親享太廟丙申合祭天地于南郊舊唐書𤣥宗紀𤣥宗既定開元禮天寳元年春遂合祭天地于南郊其後遂以為故事終唐之世莫能改也唐書禮樂志天寳元年二月丙戌詔曰凡所祭享必在躬親朕不親祭禮將有闕其皇地祇宜就南郊合祭三月丙申合祭天地于南郊册府元龜天寳元年二月二十日合祭天地於南郊自後有事圜丘皆天地合祭若册命大事告圜丘有司行事亦如之文獻通考天寶五載詔曰皇王之典聿修于百代郊祭之義允屬于三靈前人既因時以制宜王者亦縁情以革禮且尊莫大乎天地禮莫崇乎祖宗嚴配昭升豈宜異數今烝嘗之獻既著于恒式南北之郊未展于時享自今以後每載四時孟月先擇吉日祭昊天上帝其以皇地祇合祭以次日祭九宫壇皆令宰臣行禮奠祭務崇蠲潔稱朕意焉通典天寳五載十二月辛酉詔曰祈穀上帝春祀先王永惟因心敢忘如在頃以詳諸舊典創以新儀清廟陳牲加特于嘗餼昊天冬祭重増以時享況履兹霜露感愴惟深瞻彼郊壇有懷昭事宜以來嵗正月朕親謁太廟便于南郊合祭仍令中書門下即與禮官詳定儀注六載正月戊子親祀南郊遂祀皇地祇通典天寳九載十一月制自今告獻太清宫及太廟改為朝獻以告者臨下之義故也舊唐書𤣥宗紀十載正月壬辰朝獻太清宫癸巳朝饗太廟甲午有事于南郊合祭天地禮畢大赦天下舊唐書𤣥宗紀天寳十載五月以前郊祭天地以髙祖神堯皇帝配座故將祭郊廟告神堯皇帝室禮儀志天寶十載正月制曰自今以後攝祭南郊薦獻太清室薦享太廟其太尉行事前一日于致齋所具羽儀鹵簿公服引入朕親受祝版乃赴清齋以展誠敬册府元龜乾元元年四月甲寅上親享九廟遂有事于圜丘翌日御明鳯門大赦天下六月己酉初置太乙神壇于圜丘是日命宰相王璵攝行祠事舊唐書肅宗本紀上元二年九月去上元號稱元年以十一月為嵗首月以斗所建辰為名元年建丑月辛亥有事于南郊唐書肅宗本紀元年建子月詔曰皇王符瑞應協于靈祇典禮廢興式存于禋告頃以三代正朔所尚不同百王徽號無聞異稱顧兹薄徳思創常規爰因行慶之日將務惟新之典而建元立制册命厯符受于天地祖宗申于百辟卿士今既循諸古法讓彼虚名革故之宜已宣于臣下昭報之㫖未展于郊廟因時備禮擇日陳誠宜取來月一日祭圜丘及太乙壇建丑月辛亥朔拜南郊祭太乙壇禮畢還宫册府元龜廣德二年二月乙亥有事于南郊唐書代宗本紀代宗廣徳二年有事南郊從獨孤及議卒以太祖配天圖書集成天寶十載五月已前郊祭天地以髙祖神堯皇帝配座寶應元年杜鴻漸為太常卿禮儀使員外郎薛頎歸崇敬等議以神堯為受命之主非始封之君不得為太祖以配天地太祖景皇帝始受封于唐即殷之契周之后稷也請以太祖景皇帝郊祀配天地告請宗廟亦太祖景皇帝酌獻諫議大夫黎幹議以太祖景皇帝非受命之君不合配享天地二年五月幹進議狀為十詰十難曰歸崇敬薛頎等稱禘謂冬至祭天于圜丘周人則以遠祖帝嚳配臣幹詰曰國語曰有虞氏夏后氏俱禘黄帝商人禘舜周人禘嚳俱不言祭昊天于圜丘一也詩商頌曰長發大禘也又不言祭昊天于圜丘二也詩周頌曰雍禘太祖也又不言祭昊天于圜丘三也禮記祭法曰有虞氏夏后氏俱禘黄帝殷人周人俱禘嚳又不言祭昊天于圜丘四也禮記大𫝊曰不王不禘王者禘其祖之所自出以其祖配之又不言祭昊天于圜丘五也爾雅釋文曰禘大祭也又不言祭昊天于圜丘六也家語云凡四代帝王之所郊皆以配天也其所謂禘者皆五年大祭也又不言祭昊天于圜丘七也盧植云禘祭名禘者帝也事尊明禘故曰禘又不言祭昊天于圜丘八也王肅云禘謂于五年大祭之時又不言祭昊天于圜丘九也郭璞云禘五年之大祭又不言祭昊天于圜丘十也臣幹謂禘是五年宗廟之大祭詩禮經𫝊文義昭然臣見禮記祭法及禮記大𫝊商頌長發等三處鄭𤣥注或稱祭昊天或云祭靈威仰臣精詳典籍更無以禘謂祭天于圜丘及郊祭天者審如禘是祭之最大則孔子説孝經為萬代百王法稱周公大孝何不言禘祀帝嚳于圜丘以配天而反言郊祀后稷以配天是以五經俱無其説聖人所以不言輕議大典亦何容易猶恐不悟今更作十難其一難曰周頌雍禘祭太祖也鄭𤣥箋云禘大祭太祖文王也商頌云長發大禘也𤣥又箋云大禘祭天也夫商周之頌其文互説或云禘太祖或云大禘俱是五年宗廟之大祭詳覽典籍更無異同惟鄭𤣥箋長發乃稱是郊祭天詳𤣥之意因此商頌禘如大𫝊云大祭如春秋大事于太廟爾雅禘大祭雖云大祭亦是宗廟之祭可得便稱祭天乎若如所説大禘即云郊祭天稱禘即是祭宗廟又祭法説虞夏商周禘黄帝與嚳大𫝊不王不禘禘上俱無大字𤣥因何復稱祭天乎又長發文亦不歌嚳與感生帝故知長發之禘為非禘嚳及郊祭天明矣殷周五帝之大祭羣經衆史及鴻儒碩學自古立言著論序之詳矣俱無以禘為祭天何棄周孔之法言獨取康成之小注便欲違經非聖誣亂祀典謬哉其二難曰大𫝊稱禮不王不禘王者禘其祖之所自出以其祖配之諸侯及其太祖者此説王者則當禘其謂祭法虞夏商周禘黄帝及嚳不王則不禘所當禘其祖之所自出謂虞夏出黄帝殷周出帝嚳以近祖配而祭之自出之祖既無宗廟即是自外至者故同之天地神祇以祖配而祀之自出之説非但于父在母亦然左𫝊子産云陳則我周之自出此可得稱出于太微五帝乎故曰不王不禘王者禘其祖之所自出以其祖配之謂也及諸侯之禘則降于王者不得祭自出之祖只及太祖而已故曰諸侯及其太祖此之謂也鄭𤣥錯亂分禘為三注祭法云禘謂祭昊天于圜丘一也注左𫝊稱郊祭天以后稷配靈威仰箋商頌又稱郊祭天二也注周頌云禘大祭大于四時之祭而小於祫太祖謂文王三也禘是一祭𤣥析之為三顛倒錯亂皆率胸臆曽無典據何足為憑其三難曰虞夏商周已前禘祖之所自出其義昭然自漢魏晉以還千餘嵗其禮遂闕又鄭𤣥所説其言不經先儒棄之未曽行用愚以為錯亂之義廢棄之注不足以正大典其四難曰所稱今三禮行于代者皆是鄭𤣥之學請據鄭學以明之曰雖云據鄭學今欲以景皇帝為始祖之廟以配天復與鄭義相乖何者王制云天子七廟𤣥云此周禮也七廟者太祖及文武之祧與親廟四也殷則六廟契及湯與二昭二穆也據鄭學夏不以鯀及顓頊昌意為始祖昭然可知也而欲引稷契為例其義又異是爰稽邃古洎今無以人臣為始祖者惟殷以契周以稷夫稷契者皆天子元妃之子感神而生昔帝嚳次妃簡狄有娀氏之女吞𤣥鳥之卵因生契契長而佐禹治水有大功舜乃命契作司徒百姓既和遂封于商故詩曰天命𤣥鳥降而生商宅殷土芒芒此之謂也后稷者其母有邰氏之女曰姜嫄為帝嚳妃出野履巨跡歆然有孕生稷稷長而勤于稼穡堯聞舉為農師天下得其利有大功舜封于邰號曰后稷唐虞夏之際皆有令徳故詩曰履帝武敏歆居然生子即有邰家室此之謂也舜禹有天下稷契在其間量功比徳抑其次也舜授職則播百穀敷五教禹讓功則平水土宅百揆故國語曰聖人之制祀也功施于人則祀之以死勤事則祀之契為司徒而人輯睦稷勤百穀而死皆居前代祀典子孫有天下得不尊而祖之乎其五難曰既遵鄭説小徳配寡遂以后稷只配一帝尚不得全配五帝今以景皇帝特配昊天于鄭義可乎其六難曰衆難臣云上帝與五帝一也所引春官祀天旅上帝祀天旅四望旅訓衆則上帝是五帝臣曰不然旅雖訓衆出于爾雅又為祭名春官訓陳注有明文若如所言旅上帝便成五帝則季氏旅于泰山可得便是四鎮耶其七難曰所云據鄭學則景皇帝親盡廟主合祧却欲配祀天地錯亂祖宗夫始祖者經綸草昩體大則天所以元氣廣大萬物之宗尊以長至陽氣萌動之始日俱祀于南郊也夫萬物之始天也人之始祖也日之始至也掃地而祭質也器用陶匏性也牲用犢誠也兆于南郊就陽位也至尊至質不敢同于先祖禮也故白虎通曰祭天嵗一者何天至尊至質事之不敢䙝黷故因歲之陽氣始達而祭之今國家一歲四祭之黷莫大焉上帝五帝其祀遂闕怠亦甚矣黷與怠皆禮之失不可不知夫親有限祖有常聖人制禮君子不以情變易國家重光累聖歴祀百數豈不知景皇帝始封于唐當時通儒議功度德尊神堯克配彼天崇太宗以配上帝神有宅主為日已久今欲黜神堯配含樞紐以太宗配上帝則紫微五精上帝佐也以子先父是禮意乎非止神祇錯位亦以祖宗乖序何以上稱皇天祖宗之意哉若夫神堯之功太宗之徳格于皇天上帝臣以為郊祀宗祀無以加焉其八難曰欲以景皇帝為始祖既非造我區㝢經綸草昩之主故非夏始祖禹殷始祖契周始祖稷漢始祖髙帝魏始祖武皇帝晉始祖宣帝國家始祖神堯皇帝同功比徳而忽昇于宗祀圜丘之上為昊天匹曽謂圜丘不如林放乎其九難曰昨所言魏文帝丕以武帝操為始祖晉武帝炎以宣帝懿為始祖者夫孟徳仲達者皆人傑也擁天下之强兵挾漢魏之微主専制海内令行草偃服衮冕陳軒懸天子决事于私第公卿列拜于道左名雖為臣勢實凌君後主因之而業帝前王由之而禪代子孫尊而祖之不亦可乎其十難曰所引商周魏晉既不當矣則景皇帝不為始祖明矣我神堯㧞出羣雄之中廓清隋室拯生人于塗炭則夏虞之勲不足多成帝業于數年之間則漢祖之功不足比夏以大禹為始祖漢以髙祖為始祖則我唐以神堯為始祖法夏則漢于義何嫌今欲革皇天之祀易太祖之廟事之大者莫大于斯曽無按據一何寡陋不愧于心不畏于天乎以前奉詔令諸司各據禮經定議者臣幹忝竊朝列官以諫為名以直見知以學見達不敢不罄竭以禆萬一昨十四日具以議狀呈宰相宰相令朝臣與臣論難所難臣者以臣所見獨異莫不騰辭飛辯競欲碎臣理鉗臣口剖析毫釐分别異同序墳典之凝滯指子𫝊之乖謬事皆歸根觸物不礙但臣言有宗爾豈辨者之流也又歸崇敬薛頎等援引鄭學欲蕪祀典臣為明辯迷而不復臣輙作十詰十難援據墳籍昭然可知庶郊禘事得其真嚴配不失其序皇靈降祉天下䝉賴臣亦何顧不蹈鼎鑊謹敢聞達伏増悚越議奏不報舊唐書禮儀志二年春夏旱言事者云太祖景皇帝追封于唐髙祖實受命之祖百神受職合依髙祖今不得配享天地所以神不降福以致愆陽代宗疑之詔百寮㑹議太常博士獨孤及獻議曰禮王者禘其祖之所自出以其祖配之凡受命始封之君皆謂太祖繼太祖已下六廟則以親盡迭毁而太祖之廟雖百代不遷此五帝三王所以尊祖敬宗也故受命于神宗禹也而夏后氏祖顓頊而郊鯀纘禹黜夏湯也而殷人郊㝠而祖契革命作周武王也而周人郊稷而祖文王則明自古必以首封之君配昊天上帝惟漢氏崛起豐沛豐公太公無位無功不可可以為祖宗故漢以髙皇帝為太祖其先細微也非足為後代法伏惟太祖景皇帝以柱國之任翼周弼魏肇啟王業建封于唐高祖因之為有天下之號天所命也亦如契之封商后稷之封邰禘郊祖宗之位宜在百代不遷之典郊祀太祖宗祀髙祖猶周之祖文王而宗武王也今若以髙祖創業當躋其祀是棄三代之令典尊漢氏之末制黜景皇帝之大業同豐公沛公之不祀反古違道失孰大焉夫追尊景皇廟號太祖髙祖太宗所以崇尊之禮也若配天之位既異則太祖之號宜廢祀之不修廟亦當毁尊祖報本之道其墜于地乎漢制擅議宗廟以大不敬論今武徳貞觀憲章未改國家方將敬祀事和神人禘郊之間恐非所宜臣謹稽禮文參諸往制請仍舊典竟依歸崇敬等議以太祖配享天地焉廣徳二年正月十六日禮儀使杜鴻漸奏郊太廟大禮其祝文自今已後請依唐禮版上墨書其玉簡金字者一切停廢如允臣所奏望編為常式勅曰宜行用竹簡禮儀志廣徳二年二月癸酉上親薦獻太清宫乙亥祀昊天上帝于圜丘即日還宫代宗紀永泰二年禮儀使太常卿杜鴻漸奏冬至祀昊天上帝夏至祀皇地祇請以太祖景皇帝配饗孟春祈穀祀昊天上帝請以太宗配饗季秋于大享明堂祀昊天上帝請以肅宗配饗臣與禮官學士憑據經文事皆明著徳音詳定久未施行勅㫖依通典大厯五年冬十一月庚寅日長至命有司祀昊天上帝于南郊七年冬十一月辛卯日長至命有司祀昊天上帝于南郊不視朝八年冬十一月辛丑日長至不視朝命有司祀昊天上帝于南郊十一年冬十一月丙辰日長至命有司祀昊天上帝于南郊不受朝賀十三年冬十一月丁卯日長至命有司祀昊天上帝于南郊不視朝册府元龜大厯十三年十一月丁卯日長至有司祀昊天上帝於南郊上不視朝故也舊唐書代宗本紀貞元元年十一月癸卯上親祀昊天上帝於圜丘時河中渾瑊澤潞李抱真山南嚴震同華駱元光邠寧韓游瓌鄜坊唐朝臣奉誠康日知等大將侍祠郊壇還宫御丹鳳樓大赦天下徳宗本紀崔縱𫝊貞元元年天子郊祀為大禮使歲旱用屈縱撙裁文物儉而不陋貞元元年十一月十一日徳宗親祀南郊有司進圖勅付禮官詳酌博士柳冕奏曰開元定禮垂之不刋天寳改作起自權制此皆方士謬妄之説非禮典之文請一准開元禮從之禮儀志六年九月己卯詔十一月八日有事于南郊太廟行從官吏將士等一切並令自備食物其諸司先無公厨者以本司闕職物充其王府官度支量給廩物其儀仗禮物並仰御史撙節處分十月己亥文武百寮京城道俗抗表請上徽號上曰朕以春夏亢旱粟麥不登朕精誠祈禱獲降甘雨既致豐穰告謝郊廟朕倘因禋祀而受徽號是有為為之勿煩固請也十一月庚午日南至上親祀昊天上帝于郊丘禮畢還宫御丹鳳樓宣赦見禁囚徒减罪一等立仗將士及諸軍兵賜十八萬段匹徳宗本紀貞元六年十一月八日有事于南郊詔以皇太子為亞獻親王為終獻上問禮官亞獻終獻合受誓戒否吏部郎中柳冕奏凖開元禮獻官前七日於内受誓戒辭云各揚其職不供其事國有常刑今以皇太子為亞獻請改舊辭云各揚其職肅奉常儀從之禮儀志貞元九年十一月乙酉有事于南郊大赦唐書徳宗本紀册府元龜貞元九年十一月癸未帝朝獻太清宫畢事宿齋于太廟行宫甲申朝于太廟畢事齋于南郊行宫乙酉日南至郊祀初帝以是歲有年蠻夷朝貢思親告郊廟於祀事尤重慎及將散齋謂宰臣曰在祀散齋歸正寢攝心奉祀不可聞外事其常務勿奏乃齋于别殿及命皇太子諸王行祭者皆受誓一日命妃媵辭于别所故事祈壇宫廟内壇及殿庭帝步武所皆設黄道褥壇十一位又施赤黄褥將有事皆命徹之又故事設御史版位于郊廟咸藉以褥及是䖍禋拜首於地有司奉祠者莫不惕勵通典貞元十三年勅郊壇時祭燔柴瘞埋並依天寳十三年制自今以後攝祭南郊太尉行事前一日于致齋所具羽儀鹵簿公服引入親授祝版乃赴清齋所唐書韋武𫝊是時帝以反正告郊廟大兵後典章茍完執事者時時咨武武酌宜約用得禮之衷羣司奉焉文獻通考長慶三年太常禮院奏郊壇祠祀遇大雨雪廢祭其禮物條件如後御署祝版既未行祭禮無焚毁之文請於太常寺勅庫收貯而其小祀雖非御署准此玉幣燎柴神酒燎幣醴齊並榛栗脯醢及應行事燭等請令郊社署各牒充次祭支用牲牛參牲既未行祭禮無進胙賜胙之文請比附禮記及祠令牲死則埋之例委監察使及禮官于祠所瘞埋其小祀不全用牢牲舊例用猪羊肉亦准此粢盛𤓰葅笋葅應已造成饌物請隨牲瘞埋行事官明衣絹布等准式既祭前給訖合充潔服既已經用請便收破公卿已下明房油煖幕炭應齋宿日所破用物請收破㫖依永為定式寶厯元年正月乙巳朔辛亥親祀昊天上帝于南郊禮畢御丹鳳樓大赦改元舊唐書敬宗本紀太和三年十一月甲午有事南郊大赦唐書文宗本紀崔寧𫝊云黯開成初為監察御史奏郊廟祭祀不䖍文宗語宰相曰郊廟之禮朕當親之但千乗萬騎國用不給故使有司侍祠然是日朕正衣冠坐以俟旦今聞主者不䖍祭器敝惡豈朕事神蠲潔意耶公宜勅有司遵朕斯意黯乃具條以聞舊唐書王播𫝊弟起太和九年判太常卿充禮儀詳定使創造禮神九玉奏議曰邦國之禮祀為大事珪璧之儀經有前規謹案周禮以蒼璧禮天黄琮禮地青珪禮東方赤璋禮南方白琥禮西方黒璜禮北方又云四圭有邸以祀天兩圭有邸以祀地圭璧以祀日月星辰凡此九器皆祀神之玉也又云以禋祀祀昊天上帝鄭𤣥云禋烟也為玉幣祭訖燔之而升烟亦報陽也今與開元禮義同此則焚玉之騐也又周禮掌國之玉鎮大寶器若大祭既事而藏之此則收玉之證也梁代崔靈恩撰三禮義宗云凡祭天神各有二玉一以禮神一則燔之禮神者訖事却收祀神者與牲俱燎則靈恩之義合於禮經今國家郊天祀地祀神之玉常用守經據古禮神之玉則無臣等請下有司精求良玉創造蒼璧黄琮等九器祭訖則蔵之其燎玉即依常制從之㑹昌元年正月辛巳有事于郊廟禮畢御丹鳳樓大赦改元五年正月辛亥有事于郊廟禮畢御承天門大赦天下武宗本紀舊唐書武宗本紀㑹昌四年十二月勅郊禮日近獄囚數多案欵已成多有翻覆其兩京天下州府見繫獄囚已結正及兩度翻案伏欵者並令先事結斷訖申大中元年正月甲寅皇帝有事于郊廟禮畢御丹鳳樓大赦改元唐書宣宗本紀舊唐書宣宗本紀大中五年勅兩京天下州府起大中五年正月一日已後三年内不得殺牛如郊廟享祀合用者即與諸畜代咸通元年十一月丁未上有事于郊廟禮畢御丹鳳樓大赦改元四年正月庚午上有事于圜丘禮畢御丹鳳樓大赦舊唐書懿宗本紀龍紀元年十一月丁未朝獻于太清宫戊申朝享于太廟己酉有事于南郊大赦唐書昭宗本紀龍紀元年十一月己丑朔將有事于圜丘辛亥上宿齋于武徳殿宰相百寮朝服于位時兩軍中尉楊復恭及兩樞宻皆朝服侍上太常博士錢珝李綽等奏論之曰皇帝赴齋宫内臣皆服朝服臣檢國朝故事及近代禮令並無内官朝服典祭之文伏惟皇上陛下承天御厯聖祚中興祗見宗祧克承大禮皆稟髙祖太宗之成制必循虞夏商周之舊經軒冕服章式遵彞憲禮院先准大禮使牒稱得内侍省牒要知内臣朝服品秩禮院已准禮令報訖今叅詳近朝事例若内官及諸衞將軍必湏製冠服即各依所兼正官隨資品依令式服本官之服事存𫝊聽且可俯從然亦分明著在禮令乞聖慈允臣所奏狀入至晩不報錢珝又進狀曰臣今日己時進狀論内官冠服制度未奉聖㫖伏以陛下䖍事郊禋式遵彞範凡闗典禮必守憲章今陛下行先王之大禮而内臣遂服先王之法服来日朝獻太大聖臣贊導皇帝行事若侍臣服章有違制度是為非禮上凟祖宗臣期不奉勅臣謬當聖代叨備禮官獲正朝儀死且不朽脂膏泥滓是所甘心狀入降朱書御札曰卿等所論至當事可從權勿以小瑕遂妨大禮于是内四臣遂以法服侍祠甲寅圜丘禮畢御承天門大赦舊唐書昭宗本紀唐書殷侑𫝊孫盈孫為太常博士龍紀元年昭宗郊祀兩中尉及樞宻皆以宰相服侍上盈孫奏言先代令典無内官朝服侍祠必欲之當隨所攝資品雖無援據猶免僣逼詔可舊唐書孔緯𫝊十一月昭宗謁郊廟兩中尉内樞宻請朝服緯奏曰中貴不衣朝服助祭國典也陛下欲以權道寵内臣則請依所兼之官而為之服天子召諫官謂之曰大禮日近無宜立異為朕容之于是内官以朝服助祭天祐二年七月卜郊九月乙酉改卜郊十一月庚午三卜郊唐書哀帝本紀天祐二年五月庚午勅所司定今年十月九日有事郊丘其修製禮衣祭服宜令宰臣柳璨判祭器宜令張文蔚楊涉分判儀仗車輅宜令太常卿張廷範判六月辛卯太微宫使柳璨奏前使裴樞充宫使曰權奏請𤣥元觀為太清宫又别奏在京𢎞道觀為太清宫至今未有制置伏以今年十月九日陛下親事南禋先謁聖祖廟𢎞道觀既未修葺𤣥元觀又在北山若車駕出城禮非便穏今欲只留北邙山上老君廟一所其𤣥元觀請拆入都城于清化坊内建置太微宫以備車駕行事從之丙午全忠奏得宰相柳璨記事欲拆北邙山下𤣥元觀移入都内清化坊取舊昭明寺基建置太微宫凖備十月九日南郊行事緣延資庫鹽鐵並無物力令臣商量者臣已牒判六軍諸衞張全義指揮工作訖優詔嘉之九月乙酉勅先擇十月九日即事郊丘備物之間有所未辦宜改用十一月十九日十一月丙辰全忠自正陽渡淮而北至汝隂全忠深悔此行無益丁卯至大梁時哀帝以此月十九日親祠圜丘中外百司禮儀法物已備戊辰宰相已下於南郊壇習儀而裴迪自大梁回言全忠怒蔣𤣥暉張廷範栁璨等謀延唐祚而欲郊天改元𤣥暉柳璨大懼庚午勅曰先定此月十九日親禮南郊雖定吉辰改卜亦有故事宜改取来年正月上辛付所司十二月庚戌勅朕以謬荷丕圖禮合親謁郊廟先定來年正月上辛用事今以宫闈内亂播于醜聲難以慙恧之容入于祖宗之廟其明年上辛親謁郊廟宜停舊唐書哀帝本紀五代史梁本紀天子卜祀天于南郊王怒以蔣𤣥暉等欲祈天以延唐祚天子懼改卜郊十二月王遣人告樞宻使蔣𤣥暉與何太后私通殺𤣥暉而焚之遂弑太后于積善宫天子下詔以太后故停郊孔循𫝊循與蔣𤣥暉有隙哀帝即位將有事于南郊循與王殷即蔣殷冒王氏䜛于太祖曰𤣥暉私侍何太后與張廷範等奉天子郊天冀延唐祚太祖大怒時梁兵攻壽春敗歸帝遣裴迪勞軍太祖見迪怒甚迪還哀帝不敢郊蔣殷𫝊哀帝方卜郊殷與蔣𤣥暉有隙因譖之太祖言𤣥暉等教天子卜郊祈天且待諸侯助祭者以謀興復太祖大怒哀帝為改卜郊唐㑹要卷九下
