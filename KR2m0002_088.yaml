body:
  text: 唐㑹要卷八十八宋王溥撰鹽鐡開元元年十二月河中尹姜師度以安邑鹽池漸涸開拓疏决水道置為鹽屯公私大收其利其年十一月五日右拾遺劉彤論鹽鐡上表曰臣聞漢孝武為政廐馬三十萬後宫數萬人外討不庭内興宫室殫費之甚實百當今然而古費多而貨有餘今用少而財不足者何豈非古取山澤而今取貧人哉取山澤則公利厚而人歸於農取貧人則公利薄而人去其業故先王之法也山海有官虞衡有職輕重有術禁法有時一則專農二則饒國濟人盛事也臣實為當今疑之夫煮海為鹽採山鑄錢伐木為室豐餘之輩也寒而無衣饑而無食傭賃自資者窮苦之流也若能收山海厚利奪豐餘之人蠲調斂重徭免窮苦之子所謂損有餘而益不足帝王之道可不謂然乎故臣願陛下詔鹽鐡木等官各收其利貿遷於人則不及數年府有餘儲矣然後下寛貸之令蠲窮獨之徭可以惠羣生可以柔荒服雖戎狄降附堯湯水旱無足虞也奉天適變惟在陛下行之上令宰臣議其可否咸以鹽鐡之利甚益國用遂令將作大匠姜師度户部侍郎强循俱攝御史中丞與諸道按察使檢校海内鹽鐡之課至十年八月十日勅諸州所造鹽鐡每年合有官課比令使人勾當除此更無别求在外不細委知如聞稍有侵尅宣令本州刺史上佐一人檢校依令式收稅如有落帳欺沒仍委按察糺覺奏聞其姜師度除蒲州鹽池以外自餘更不須廵檢貞元十六年十二月史牟奏澤潞鄭等州多食私鹽請一切禁斷從之二十一年二月停鹽鐡使月進舊錢總悉入正庫以助經費而主此務者稍以市諸珍玩時新物充進獻以求恩澤其後益甚嵗進錢物謂之羡餘而經入益少及貞元末遂月獻焉謂之月進及是而罷元和二年九月給事中穆賛請州府鹽鐡廵院應决私鹽死囚請州縣同監免有寃濫從之其年十二月御史中丞李夷簡奏諸州使有兩稅外雜𣙜科歛違勅不法事請諸道鹽鐡轉運度支廵院察訪狀報臺司以憑聞奏從之五年正月度支奏鄜州邠州涇原諸將士請同當處百姓例食烏白兩池鹽六年閏十二月户部侍郎判度支盧坦奏河中兩池課鹽勅文祗許於京畿鳳翔陕虢河中澤潞河南許鄭等二十五州界内糶貨比來因循兼越興元府及洋州興鳳文成等六州臣移牒勘責得山南西道觀察使報其果閬兩鹽本土户人及巴南諸郡市糶又供營軍士馬尚有懸欠若兼數州自然闕絶又得興元府諸耆老狀申訴臣今商量河中鹽請放入六州界糶貨從之十年七月度支皇甫鎛奏加陕西内四監劒南東西兩川山南西道鹽估以利供軍從之十三年鹽鐡使程异奏應諸州府先請置茶鹽店收稅狀凖今年正月一日赦文其諸州府因用兵以來或慮有權置職名及擅加科配事非常制一切禁斷者伏以𣙜稅茶鹽本資財賦贍濟軍鎮蓋是從權兵罷自合便停事久實為重斂其諸道先所置店及收諸色錢物等雖非擅加有異常制伏請准赦文勒停從之十四年三月鄆青兖三州各置𣙜鹽院十五年閏正月鹽鐡使栁公綽奏當使諸鹽院塲官及專知納拾并吏人等有罪犯合結罪者比來推問祗罪本犯所由其監臨主守都無科處伏請從今後舉名例律每有官吏犯贓監臨主守同罪及不能覺察者並請准條科處所兾貪吏革心從之其年九月改河北稅鹽使為𣙜鹽使長慶元年三月勅河朔初平人希徳澤且務寛大使之獲安其河北𣙜鹽法宜權停仍令度支與鎮兾魏博等道節度審量如能約計縑利錢數都收管每年據數付𣙜鹽院亦在穩便自天寳末兵興以來河北鹽法覊縻而已暨元和中准皇甫鎛奏置稅鹽院同江淮兩池𣙜利人苦犯禁當鎮亦頻上訴故有是命其月鹽鐡使王播奏揚州白沙兩處納𣙜場請依舊為院又奏請鹽院糶鹽付商人請每斗加五十通舊三百文價諸處煎鹽場停置小舗糶鹽每斗加二十文通舊一百九十文價又奏應管煎鹽户及鹽商并諸鹽院停場官吏所由等前後制勅除兩稅外不許差役追擾如諸吏有違越者縣令奏聞貶黜刺史罰一季俸錢再犯者奏聴進止並從之二年三月王播為淮南節度使兼領鹽鐡轉運播請攜鹽鐡印赴鎮上都院請别給賜從之其年五月勅兵革初寧實資筦𣙜閭閻重困則在蠲除如聞淄青兖鄆三道徃年糶鹽價錢近收七十萬貫軍資給費優贍有餘自鹽鐡使收管已來軍府頓絶其利遂使經行陳者有停糧之怨服隴畎者興加稅之嗟雖官受利而郡益空若人獲安寧我能節用鹽鐡使先於淄青兖鄆等道管内置小鋪糶鹽及廵院納𣙜起長慶二年五月一日以後一切並停仍委薛苹馬總曹華約比年節度使自收管充軍府州縣逐急用度支仍均减管内貧下百姓兩稅錢數兼委節度觀察使至年終以來各具糶所得錢并减放貧下稅數聞奏四年五月勅東都江陵鹽鐡轉運留後並改為知院者從鹽鐡使王涯請也太和二年七月勅潼闗以東度支分廵院宜併入鹽鐡江淮河隂留後院開成元年閏五月七日鹽鐡使奏應犯鹽人凖貞元十九年太和四年已前勅條一石已上者止於决脊杖二十徴納罸錢至於太和四年八月二十已後前鹽鐡使奏二石已上者所犯人處死其居停并將船容載以及拒捕等人並凖犯鹽條處分近日科决殺人轉多𣙜課不加舊今謂却依貞元舊條其犯鹽一石已上至一石者請决脊杖二十補充當據捉鹽所由待捉得犯鹽人日放如犯三石已上者即是囊橐奸人背違法禁請决訖待瘡損錮身牒送西北邊諸州府効力仍每季多具人數及所配去處申奏挟持軍器與所由捍敵方就擒者即請凖舊條同光火賊例處分從之二年十月勅鹽鐡户部度支三使下監院官皆郎官御史為之使雖更改官不得陵替如顯有曠敗即具事以聞五年九月勅稅茶法起來年却付鹽鐡使管𣙜酤貞元二年十二月度支奏請於京城及畿縣行𣙜酒之法每斗𣙜酒錢百五十文其酒户與免雜差役從之元和六年京兆府奏𣙜酒錢除出正酒户外一切隨兩稅青苗錢據貫均率從之十二年四月十二日户部奏凖勅文如酤户出𣙜酒錢處即不得更置官店𣙜酤其中或恐諸州府先有不酤户出錢者即須𣙜酤請委州府長官據錢額約米麴時價收利應額足即上仍限起酤到後一月商量處分至十四年五月湖州刺史李應奏先是官中酤酒代百姓納𣙜嵗月既久為弊滋深伏望許令百姓自酤取舊額仍許入兩稅隨貫均出依舊例抑納輕貨送上都許之太和八年二月九日勅節文京邑之内本無酤𣙜自貞元用兵之後費用稍廣始定户店等第令其納𣙜殊非為民今後特宜停廢會昌六年九月勅揚州等八道州置𣙜麴并置官店酤酒代百姓納𣙜酒錢并充資助軍用各有𣙜許限揚州陳許汴州襄州河東五處𣙜麴浙西浙東鄂岳三處置官店酤酒如聞禁止私酤過於嚴酷一人違犯連累數家閭里之間不免咨怨宜從今已後如有人私酤酒及置私麴者但許罪止一身并所由容縱任據罪處分鄉井之内如不知情並不得追擾鹽池使景雲四年三月九日始置闗内鹽池使先天二年九月强循除豳州刺史充鹽池使此池即鹽州池也開元十五年五月兵部尚書蕭嵩除闗内鹽池使自是朔方節度常帶鹽池使鹽鐡使乾元元年度支郎中第五琦充諸道鹽鐡使上元元年五月户部侍郎劉晏充鹽鐡使元年建子月户部侍郎元載充鹽鐡使廣徳二年户部侍郎第五𤦺充諸道鹽鐡使永泰元年正月劉晏充東都淮南浙江東西湖南山南東道鹽鐡使第五𤦺充京畿闗内河東劒南山南西道鹽鐡使大厯四年三月劉晏除吏部尚書充東都江南淮東道鹽鐡使五年三月二十六日停建中三年十二月二十日包佶充汴東鹽鐡使崔縱充汴西鹽鐡使貞元二年十二月尚書左僕射韓滉加諸道鹽鐡使五年二月中書侍郎竇參充諸道鹽鐡使八年三月户部侍郎張滂充諸道鹽鐡使十年十月潤州刺史王緯充諸道鹽鐡使十五年以浙西觀察使李錡充諸道鹽鐡使永貞元年以司空平章事杜佑兼諸道鹽鐡使元和元年四月兵部侍郎李巽充諸道鹽鐡使三年六月刑部尚書李鄜充諸道鹽鐡使五年十二月盧坦除刑部侍郎充諸道鹽鐡使六年四月刑部侍郎王播充諸道鹽鐡使十四年五月刑部侍郎栁公綽充諸道鹽鐡使長慶元年二月王播復為刑部尚書諸道鹽鐡使四年四月王涯除户部侍郎諸道鹽鐵使寳厯元年王播復以節度使充諸道鹽鐵使太和九年十一月右僕射令狐楚充諸道鹽鐡使開成元年户部尚書李石充諸道鹽鐡使三年十月楊嗣復為户部尚書充諸道鹽鐡使五年二月户部尚書崔珙充諸道鹽鐡使㑹昌元年七月左僕射平章事杜悰充諸道鹽鐡使六年四月以大理卿馬植為刑部侍郎諸道鹽鐡使大中五年刑部侍郎裴休充諸道鹽鐡使十二年兵部侍郎栁仲郢充諸道鹽鐡使十二年二月户部侍郎夏侯孜充諸道鹽鐡使十四年右僕射杜悰復充諸道鹽鐡使咸通五年十一月户部侍郎劉鄴充諸道鹽鐡使六年十月兵部侍郎于琮充諸道鹽鐡使乾符元年二月崔彦昭為兵部侍郎充諸道鹽鐡使其年又以兵部侍郎王凝充諸道鹽鐡使二年二月兵部侍郎裴坦充諸道鹽鐡使四年六月宣歙觀察使髙駢為潤州刺史諸道鹽鐡使六年移節淮南領使如故中和元年兵部侍郎蕭遘充諸道鹽鐡使其年中書侍郎平章事韋昭度充諸道鹽鐡使光啟二年三月刑部尚書孔緯充諸道鹽鐡使大順二年門下侍郎杜讓能充諸道鹽鐡使景福二年十一月吏部尚書平章事崔昭緯充諸道鹽鐡使乾元二年京兆尹嗣薛王知柔為户部尚書諸道鹽鐡使其年九月門下侍郎平章事徐彦若充諸道鹽鐡使光化三年八月左㒒射平章事崔𦙍充諸道鹽鐡使天祐元年左僕射裴樞充諸道鹽鐡使其年門下侍郎平章事栁璨充諸道鹽鐵使安邑解縣兩池置𣙜鹽使一員推官一員巡官六員安邑院官一員解縣院官一員胥吏七十人防池官健及池户二百八十人先是兩池鹽務𨽻度支貞元十六年史牟以金部郎中主池務遂奏置使額至二十一年鹽鐵度支合為一使以杜佑兼領佑以度支既稱使其所管不宜更有使名遂與東渭橋使同奏罷之至元和三年七月判度支裴垍以兩池職轉繁劇復以留後為𣙜鹽鐡使鹽州境有五池而以烏池所産為最置𣙜税使一員𣙜官一員巡官兩員胥吏一百三十人防池官健及池户四百四十人温池置𣙜税使一員𣙜官兩員巡官兩員胥吏三十九人防池官健及池户百六十五戸大中四年三月因收復河隴勅令度支收管其鹽仍差靈州分巡院官専勾當至六年勅𨽻威州以新制置未立課額和落池在河東豐州界𨽻河東供軍使毎年鹽採至一萬四千餘石振武天徳兩軍及營田水運官健自大中四年党項羌叛擾饋運不通供軍使請權市河東白池鹽供食其白池屬河東節度使不繋度支長慶元年三月勅烏池每年糶鹽收博𣙜米以一十五萬石為定額太和二年三月度支奏京兆府奉化縣界鹵池側近百姓取水栢柴燒灰煎鹽每石灰得一十二斤一兩亂法甚於鹹土請行禁絶今後犯據灰計鹽一如兩池鹽法條例科斷從之三年四月勅安邑解縣兩池𣙜課以實錢一百萬貫為定額至大中元年正月勅但取疋叚精好不必計舊額錢數及大中六年度支收𣙜利一百二十一萬五千餘貫安邑池鹽在解縣朝邑小池在同州鹵池在京兆府奉化縣並禁斷不𣙜義倉及常平倉武徳元年九月四日置社倉其月二十二日詔曰特建農圃用督耕耘思俾齊民既庶且富鍾庾之量兾同水火宜置常平倉監官以均天下之貨市肆騰踴則减價而出田穯豐美則増價而收庶公私俱濟家給人足抑止兼并宣通擁滯至五年十二月廢常平監官貞觀二年四月三日尚書左丞戴胄上言曰水旱㓙灾前聖之所不免國無九年儲蓄禮經之所明戒今喪亂之後户口凋殘每歲納租未實倉廩隨即出給纔供常年若有凶灾將何賑恤故隋開皇立制天下之人節級輸粟多為社倉終文皇一代得無饑饉及大業年中國用不足並取社倉之物以充官費故至末塗無以支給今請自王公已下爰及衆庶計所墾田稼穯頃畆毎至秋熟凖其見在苖以理勸課盡令出粟麥稲之鄉亦同此税所在立為義倉年榖不登百姓饑饉當所州縣隨即取給則有無均平常免匱竭上曰既為百姓先作儲貯官為舉掌以備㐫年非朕所須横生賦斂利人之事深是可嘉宜下有司議立條制户部尚書韓仲良奏王公已下墾田畝納二升其粟麥稲之屬各依土地貯之州縣以備凶年制可之十三年十二月十四日詔於洛相函徐齊并秦蒲等州置常平倉永徽二年閏九月六日勅義倉據地收税實是勞頓宜令率户出粟上下户五石餘各有差六年八月二十九日京東西二市置常平倉顯慶二年十二月三日京常平倉置常平署官員咸亨元年閏九月六日置河陽倉𨽻司農寺三年六月十七日於洛州栢崖置敖倉容二十萬石至開元十年九月十一日廢開元二年九月二十五日勅天下諸州今年稍熟榖價全賤或慮傷農常平之法行之自古宜令諸州加時價三錢糴不得抑斂仍交相付領勿許懸久蠶麥時熟穀米必貴即令減價出糶豆穀等堪貯者熟亦凖此以時出入務在利人其常平所須錢物宜令所司支料奏聞四年五月二十一日詔州縣義倉本偹飢年賑給近年以來每三年一度以百姓義倉糙米逺送京納仍勒百姓私出脚錢自今以後更不得以義倉變造七年六月二十八日勅闗内隴右河南河北五道及荆揚襄夔緜益彭蜀漢劍茂等州並置常平倉其本上州三千貫中州二千貫下州一千貫每糴其本利與止倉帳同申十年九月十五日廢河陽栢崖坦縣等倉十六年十月二日勅自今歲普熟穀價至賤必恐傷農加錢收糴以實倉廩縱逢水旱不慮阻饑公私之間或亦為便宜令所在以常平本錢及當處物各於時價上量加三錢百姓有糶易者收糴事須兩和不得限數配糴訖其所用錢物及所收糴得物數具申所司仍令上佐一人専勾當二十二年八月九日勅應給貨糧令錄奏勅到三口以下給米一石六口以下給兩石七口以下給三石如給粟凖米計折二十八年正月勅諸州水旱比待奏報然後賑給道路恐逺往復淹遲宜令給訖奏聞天寳六載三月二十二日太府少卿張瑄奏凖四年五月八日并五年五月十六日勅節文至貴時賤價出糶賤時加價收糴若百姓未辦錢物者任凖開元二十年七月九日勅量事賖糶至粟麥熟時徵納臣使司商量且糶舊糴新不仝别用其賖糶者至納錢日若粟麥雜種等時價甚賤恐更廻易艱辛請加價便與折納廣徳二年正月二十五日第五琦奏每州置常平倉及庫使司商量置本錢隨當處米物時價賤則加價収糴貴則减價糶賣建中元年七月勅夫常平者常使穀價如一大豐不為之減大儉不為之加雖遇灾荒人無菜色自今已後或米價貴時宜量出官米十萬石麥十萬石每日量付兩市行人下價糶貨三年九月户部侍郎趙賛上言曰伏以舊制置倉儲粟名曰常平軍興以來此事寖廢因循未齊垂三十年其間或因凶荒流散餒死相食者不可勝紀古者平凖之法使萬室之邑必有萬鍾之藏春以奉耕夏以奉耘雖有大賈富家不得豪奪吾人者蓋謂能行輕重之法也自陛下登極以來許京城兩市置常平官糶鹽米雖經頻年少雨米價騰貴此乃即日明騐實要推而廣之當軍興之時與承平時或異自須兼儲布帛以偹時須臣今商量請於兩都并江陵成都揚汴蘓洪等州府各置常平輕重本錢上至百萬貫下至數十萬貫隨其所宜量定多少唯貯斛斗疋段絲麻等候物貴減價出賣物賤加價收糴權其輕重以利罷人從之賛於是條奏諸道津要都㑹之所皆置吏閲人財貨計錢每貫税二十文天下所出竹木茶漆皆十一税之以充常平本時國用稍廣常賦不足所税亦隨時而盡終不能為常平本貞元八年十月勅諸軍鎮和糴貯偹共五十三萬石本價之外更量與優饒其粟麻據米數凖折虚價直委度支以停减江淮運脚錢充並支綾絹絁緜勿令折估其所糶粟等委本道節度使監軍同勾當别貯非承特詔不得給用十四年六月詔以米價稍貴令度支出官米十萬石於兩街賤糶其月以久旱榖貴人流出太倉粟量給京畿諸縣其年七月詔賑給畿京麥種三萬石其年九月以歳饑出太倉粟三十萬出糶其年十二月以河南府榖貴人流令以含嘉倉七萬石出糶十五年二月以久旱歳饑出太倉粟十八萬石於諸縣賤糶十九年十月司農奏請依六典置太倉令兩員丞六員監事十員支計官驅使官三人典一人府史六人從之元和元年正月制嵗時有豐歉榖價有重輕將偹水旱之虞在權聚歛之術應天下州府每年所稅斛㪷以時糶糴務在救乏賑貸所宜速須聞奏六年二月制如聞京畿之内舊榖已盡宿麥未登宜以常平義倉粟二十四萬石貸借百姓諸道州府有乏少糧種處亦委所在官長用常平義倉米借貸淮南浙西宣歙等道元和二年四月賑貸並宜停徴容至豐年然後徴納其年八月司農少卿崔酆奏停太倉丞二員監事二員從之九年四月詔出太倉粟七十萬石開六塲糶之并賑貸外縣百姓秋熟徴納便於外縣收貯以防水旱十二年四月詔出粟二十五萬石分兩街降估出糶其年九月詔諸道應遭水州府河南府澤潞河東幽州江陵府等管内及鄚清滄景易定陳許晉隰蘓襄復台越唐隨鄧等州人户宜令本州厚加優䘏仍各以當處義倉斛斗據所損多少量事賑給訖具數聞奏其人户中有漂溺致死者仍委所在收瘞其屋宇摧倒亦委長吏量事勸課修葺使得安存十三年正月户部侍郎孟簡奏天下州府常平義倉等斛㪷請凖舊例减估出糶但以石數奏申有司更不收管内州縣得專逹以利百姓從之長慶二年十月詔江淮諸州旱損頗多所在米價不免踊貴委淮南浙西浙東宣歙江西福建等道觀察使各於本道有水旱處取常平義倉斛㪷據時估减半價出糶以惠貧民四年二月勅出太倉陳米三十萬石於兩街出糶其年三月制曰義倉之制其來日久近歳所在盜用沒入致使小有水旱生人坐委溝壑永言其弊職此之由宜令諸州錄事參軍專主勾當茍為長吏廹制許驛表上聞考滿之日户部差官交割如無欠負與减一選如欠者少者量加一選欠數過多户部奏聞節級科處太和四年八月勅今年秋稼似熟宜於闗内七州府及鳳翔府和糴一百萬石開成元年八月户部奏應諸州府所置常平義倉伏請起今後通公私畝田别納粟一升逐年添置義倉斂之至輕事必通濟嵗月稍久自致充盈縱逢水旱之灾永絶流亾之慮勅從之其年十一月忠武軍節度使杜悰邠寧軍節度使王源奏請當道常平義倉斛㪷除元額外别置十萬石以備凶年從之大中六年戸部奏諸州府收管常平倉斛㪷本防水旱賑䘏貧乏其有災沴州府地逺申報往復已至流亾今後如有灾荒水旱外請委所在長吏差清强官勘審如實便任開倉先從貧下户濟給貸訖具數分析申奏并報户部不得妄有給與富豪人户其斛㪷仍仰本州錄事參軍至當年秋熟専勾當據數追收如州府妄有給使其錄事叅軍本判官請重加殿罰長吏具名申奏勅㫖宜依其年十一月勅應畿内諸縣百姓軍户合送納諸倉及諸使兩稅送納斛㪷舊例每斗函頭耗物折除皆有數限訪聞近日諸倉所由分外邀額利索耗物致使京畿諸縣轉更凋弊農桑無利職此之由自今以來祗令依官額餘並禁斷雜錄長安元年十一月十三日勅負債出舉不得廻利作本并法外生利仍令州縣嚴加禁斷開元十五年七月二十七日勅應天下諸州縣官寄附部人興易及部内放債等並宜禁斷十六年二月十六日詔比來公私舉放取利頗深有損貧下事須釐革自今已後天下舉放祗宜四分收利官本五分取利二十年九月二十九日勅綾羅絹布雜貨等交易皆合通用如聞市肆必須見錢深非通理自今後與錢貨兼用違者凖法罪之元和五年十一月勅應中外官有子弟凶惡出告家長私舉公私錢無尊長同署文契者其舉錢主并保人各决二十仍均攤貨納應諸色買賣相當後勒買人面付賣人價錢如違牙人重杖二十京兆尹王播所奏也寳厯元年正月七日勅節文應京城内有私債經十年已上曽出利過本兩倍本部主及元保人死亡並無家産者宜令臺府勿為徴理唐㑹要卷八十八
