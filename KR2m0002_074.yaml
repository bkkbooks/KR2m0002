body:
  text: 唐會要卷七十四宋王溥撰選部上論選事舊制內外官皆吏部啓奏授之大則署置三公小則綜核流品自隋已降職事五品已上官中書門下訪擇奏然後下制授之唐承隋制初則尚書銓掌六品七品選侍郎銓掌八品選三年一大集每年一小集其後尚書侍郎通掌六品以下選其員外郎監察御史亦吏部謁訖尚書侍郎為之典自貞觀以後員外郎乃制授之又至則天朝以吏部權輕監察亦制授之其銓綜也南曺綜核之廢置與奪之銓曺注擬之尚書僕射兼書之門下詳覆之覆成而後與官至肅宗即位靈武強冦在郊始命中書以功狀除官非舊制也武德五年太僕卿張道源上表以吏曺文簿繁密易生姦欺請議減之髙祖下其議百竂僉同者惟太史傅奕言至當迫於衆議事竟不行貞觀元年正月侍中攝吏部尚書杜如晦上言曰比者吏部擇人惟取言辭刀筆不悉景行數年之後惡跡始彰雖加刑戮而百姓已受其弊上曰如何以得人如晦對曰兩漢取人皆行著州閭然後入用今每年選集尚數千人厚貌飾詞不可悉知選司但配其階品而已所以不能得才魏徴亦曰知人之事自古為難故考績黜陟察其善惡今欲求人必須審訪才行兼美始可任用上將依古法令本州辟召會功臣將行世封其事遂止二十年黃門侍郎禇遂良上表曰貞觀初杜淹為御史大夫檢校選事此人至誠在公實稱所使凡所採訪七十餘人比並聞其嘉聲積久研覆一人之身或經百問知其器能以此進舉身既染疾伏枕經年將臨屬纊猶進名不已陛下悉擢用之並有清亷幹用衆所服願大唐得人於斯為美陛下任一杜淹得七十餘人天下稱之此則偏委忠良不必衆舉之明效也顯慶二年黃門侍郎知吏部選事劉祥道上疏曰今選司取士傷多且濫每年入流數過一千四百人是傷多也雜色入流不加銓簡是傷濫也古之選者不聞為官擇人取人多而官員少也今官員有數而入流無限以有數供無限遂令九流繁總人隨嵗積謹約准所須人量支年别入流者令內外文武官一品以下九品以上一萬三千六百四十五員舉大數當一萬四千人壯室而仕耳順而退取其中數不過支三十年此則一萬四千人支三十年而略盡若年别入流者五百人三十年便得一萬五千人定數頃者一萬四千四百六十五人足充所須之數况三十年之外在官者猶多此便有餘不慮其少今年當入流者遂餘一千四百計應須數外恆餘兩倍又常選者仍停六七千人更復年别新加實非處置之法望請釐革稍清其選中書令杜正倫亦言入流者多為政之弊公卿以下憚於改作事竟不行蘇氏議曰冕每讀國史未嘗不廢書歎息况今河西隴右已非我境河北河南關中上計官員大數比天寶中三分減一入流之人比天寶中三分加一自然須作法造格增選加考設險阻進選司詆才能嗟乎士子二年守官十年待選欲使天下稱野無遺賢不可得也若比祥道所述且十倍不更弊乎開耀元年四月十一日敕吏部兵部選人漸多及其銓量十放六七既疲於來往又虛費資糧宜付尚書省集京官九品以上議崇文館直學士崔融議曰令皇家兩曹妙選三官備設拔其杞梓搴其蕭稂其有疾狀犯贓私罪當懲貶者此等既未合得伏望許同選例録以選勞又選人每年長名常至正月半後伏望速改銓簡促以程期因其物情亦何疲於來往順其人欲亦何費於資糧又所銓簡以德行為上功夫次之折衷之方庶幾此道尚書右僕射劉仁軌奏曰謹詳衆議條目雖廣其大略不越數途多欲使常選之流及負譴之類遞立年限如不令赴集便是壅自新之路塞取進之門或請增置其案廣授官之數加習藝業峻入仕之途亦恐非勸奬之通規乖省員之茂躅徒云變更實恐紛擾但升平日久人物滋殖解巾從事抑有多人頃嵗以來據員多闕臨時雖有權攝終是不能總理望請尚書侍郎依員備足髙班卑品准式分銓分銓則留放速了限速則公私無滯應選者暫集遠近無聚糧之勞合退者畢歸京師無索米之弊既循舊規且順人情如事有不便隨時釐革其殿負及初選及選淺自知未合得官者等色情願不集即同選部曺司商量望得久長安穩垂拱元年七月鸞臺侍郎兼天官侍郎魏𤣥同以吏部侍郎選舉不得人上表曰漢諸侯得自置吏四百石以下其傳相大官則漢為之置州郡掾吏督郵從事悉任之牧守爰自魏晉始歸吏部遞相祖襲以迄於今用刀筆以量才按簿書而察行法令之弊由來久矣蓋君子重因循而憚改作有不得已者亦當運獨見之明定卓然之議如今選司所行者非上理之令典乃近代之權道所宜遷革實為至要且天下之大士人之衆而可委之數人之手乎假如平如權衡明如水鏡力有所極照有所窮銓綜既多紊失斯廣又以比居此任時有非人情故既行何所不至悠悠風塵此焉奔競擾擾遊宦同乎市井加以厚貌深衷險如溪壑擇言觀行猶懼不勝今使考行究能折衷於一面百竂庶職専斷於一司不亦難乎况今諸色入流嵗有千計羣司列位無復新加官有常員人無定限選集之始霧積雲屯擢叙於終十不收一淄澠既混玉石難分用舍去就得失相半周穆王以伯冏為太僕正命之曰慎簡乃僚無以巧言亂色便僻側媚其惟吉士此則命其自擇下吏之文也太僕正中大夫耳尚以竂屬委之則三公九卿亦必然矣夫委任責成君之體也所委者衆所用者精故能得濟濟之多士盛芃芃之棫朴裴子野有言曰官人之難先王言之尚矣居家觀其孝友鄉黨取其誠信出入觀其志義憂難觀其知謀煩之以事以觀其能臨之以義以察其度始於學校掄於州里告諸六事而後貢之於王庭其在漢家尚猶然矣州郡積其功能乃為五府所辟五府舉其掾屬而升於朝三公參得除置內尚書奏之天子一人之身所關者衆一賢之進其課也詳故能官得其人鮮有敗事晉魏反是所失宏多子野所論蓋區區之宋耳猶謂不勝其弊而况於當今乎今不待州縣之舉直取於書判恐非先德行而後言語之意也臣乂聞漢書張耳陳餘之賔客厮役皆天下俊傑彼之蕞爾猶能若斯况以今國家而不建長久之䇿為無窮之根盡得賢取士之術而但顧望魏晉之遺風留意周隋之末事臣竊惑之伏願依周漢之規以分吏部之選即望所用精詳鮮於差失祕書省正字陳子昻上疏曰臣伏見陛下憂勤庶政而未以刺史縣令為念臣何以知陛下未以刺史縣令為念竊見吏部選人補縣令如補一縣尉耳但以資求考取從官遊歷即補之不論賢良德行何以化人而拔擢見補者縱使吏部侍郎時有知此弊而欲超越用人則天下小人已囂然相謗矣所以然者習於常也所以天下庸流皆任縣令庸流一雜賢不肖莫分但以資次為選不復以才能得職所以天下凌遲百姓無由知陛下聖德勤勞夙夜之念但以愁怨以為天子之令使如是也自有國以來此弊最深而未能除也神龍元年李嶠韋嗣立同居選部多引用權勢求取聲望因請置員外官一十餘員由是僥幸者趨進其員外官悉行形勢與正官爭事百司論競至有相毆擊者及嶠復入相乃深悟之見朝野喧議乃上疏曰自寶命中興鴻恩溥被惟以爵為惠不擇才能任官授職加階朝遷夕改正闕不足加以員外非復求實助理多是為人擇官接武隨肩填曹溢府無益政化虛請俸祿在京則府庫為之殫竭在外則黎庶被其侵漁伏願微惜班榮稍減除授使匪服之議不興於聖朝能官之謠復光於曩載開元三年左拾遺張九齡上疏曰古之選用取其聲稱或遙聞辟召或一見用之是以士修素行不圖僥幸臣以為吏部始造簿書以備人之遺忘今反求精於案牘不急於人才亦何以異遺劒中流而刻舟以紀去之彌遠可為傷心凡有稱吏部之能者則曰從尉與主簿從主簿與縣丞斯選曹執文而善知官次者也惟論合與不合不論賢與不賢大略如此豈不謬哉臣以為選部之法弊於不變變法之易在陛下渙然行之夫以一詩一判定其是非適使賢人君子從此遺逸而有識者之所嘆息也十三年十二月封嶽回以選限漸迫宇文融上表請置十餘銓禮部尚書蘇瓌刑部尚書韋杭工部尚書盧從願右散騎常侍徐聖户部侍郎宇文融朝集使蒲州刺史崔林魏州刺史崔沔荆州長史韋虛心鄭州刺史賈曾懷州刺史王丘等十人當時榜詩云員外却題銓裏榜尚書不得數中分尚書裴漼員外郎張均其年太子右庶子吳兢上表諌曰臣聞易稱君子思不出其位言各止其所不侵官也此實百王凖的伏見敕㫖令刑部尚書韋杭等十人分掌吏部銓選及試判將畢遽召入禁中决定雖有吏部尚書侍郎皆不得參議其事議者皆以陛下曲受讒言不信於有司也然則居上臨人之道經邦緯俗之規必在推誠方能感物抑又聞欲用天下之智力者莫若使天下信之也故漢光武置赤心於人腹良有㫖哉昔魏明帝嘗卒至尚書省尚書陳嶠跪問曰陛下欲何之帝曰欲案行省司文簿嶠曰此自臣之職分非陛下所宜臨若臣不稱職則宜黜退陛下宜還宫帝慙回車而返又陳平丙吉者漢家之宰相尚不問錢穀之數不問鬬死之人故知自天子至於卿士守其職分而不可侵越也况我大唐萬乘之君卓絶千古之上豈得下行選人之事頓取怪於朝野乎凡是選人書判並請委之有司仍停此十選銓分選依舊以三銓為定上元元年劉曉上疏曰臣聞論語有曰為政以德譬如北辰詩曰愷悌君子民之父母豈有使父養子而憂不得所者哉今國家以吏部為銓衡以侍郎為藻鑑鏡所鑑者貌也妍媸可知衡所平者法也年勞可驗至於心之善惡何以取之取之不精必貽後患今選曺以檢勘為公道以書判為得人夫書判者以觀其智也智及之仁不能守之可使從政者歟不可使之而或任之是貽患於天下也使有德行侔於甲科書判不能中的其可舍之乎况於書判借人者衆矣求士舉於鄉閭者可謂至矣且人不孝於其親者豈有忠於君乎不友於兄弟者豈肯順於長乎不恤於孤遺者豈肯恤百姓乎不義而取財者豈肯不犯贓乎不直而好僞者豈肯守恆乎強悖而任氣者其肯惠和乎博奕而畋逰者其肯正廉乎不以辱為辱者其肯敬慎乎夫士無此病則可任之以官也天寶十載吏部選才多濫選人劉乃獻議於知銓舍人宋昱曰虞書稱知人則哲能官人則惠巍巍唐虞舉以為難今吏部既始之以掄材終之以授位是則知人官人斯為重任昔在禹稷臯陶之衆聖猶曰載采有九德考績以九載近代主司獨委一二小冢宰察言於一幅之判觀行於一揖之內古今遲速何不侔之甚矣夫判者以狹辭短韻語有定規為體猶以一小冶而鼓衆金雖為鼎為鏞不可得也故曰判之在文至局促者夫銓者必以崇衣冠自媒耀為賢斯又士之醜行君子所病者引周公尼父於銓庭則雖圖書易象之訓以判體挫之曾不及徐庾雖有淵默罕言之至德以喋喋取之曾不若嗇夫嗚乎彼干霄蔽日誠巨樹也當求尺寸之材必後於椽杙龍吟虎嘯誠希聲也若尚頰舌之感必下於蛙黽觀察之際能不悲夫執事慮過龜䇿文含雅誥豈拘拘以瑣悉細故曲折因循哉誠能先咨以政事次徵以文學退觀其理家進察其臨節則龎大閎深之士亦可以窺其門戶矣貞元四年八月吏部奏伏以艱難以來年月積久兩都士類散在遠方三庫敕甲又經失墜因此人多冒濫吏或詐欺分見官者謂之擘名承已死者謂之接腳乃至制敕㫖甲皆被改張毁裂如此之色其類頗多比來因循遂使滋長所以選集加衆真僞混然實資檢責用甄涇渭謹具由歷狀樣如前伏望委諸州府縣於界內應有出身以上便令依樣通狀限敕牒到一月內畢令盡出不得遺漏其敕令度支急遞送府州司州司待約狀畢以州印印狀尾表縫相連星夜送觀察使司定判官一人専使専勾當都封印差官給驛遞驛送省至上都三百里內十二月上旬到千里外中旬到每遠校一千里外即加一旬雖五千里外一切正月下旬到盡黔中嶺南應不合比選人不納文狀限其狀直送吏曹不用都司發到入日所司造姓攢勘合即奸僞必露寃抑可明如須盤問即下所在州府責狀其隱漏未盡及在遠不及期限者亦任續通依前觀察使與送所勘責必有灼然踰濫事跡著明據輕重作條件商量聞奏庶稍澄流品永息踰濫敕㫖依奏至六年十二月詔吏部續流選人新授官者至來年二月之任初吏部侍郎劉滋李紓以去冬選人無缺員乃奏請自貞元五年授官計考成者三百五十員令至今年八月之任議者非之於是諫議大夫韓章抗疏曰竊見去年選授官者多以六月方至任所扶老擕幼不遠數千里以就一官到才經年遂見停替又見在留中人多有注貞元四年闕者准格至來年正月赴任其續流人注五年缺者遽以今年八月便任一等用闕一等授官五年闕者授替在前四年闕者仍在後事交非允者理實可矜今制命己行難於改易其所授官人請令至來年二月赴任從之元和元年十二月吏部奏比遠州縣官請量減選五選六選請減一選七選八選請減兩選十選十一選十二選各請減三選伏以比遠處都七十五州選人試後懼不及限者即狀請注擬雖有例不過一百餘人其比遠州縣皆是開元天寶中仁風樂土今者或以俸錢減少或以地在遠方凡是平流因循不注至若勸課耕種歸懷逃亡其所擇才急於近地有司若不注授所在惟聞假攝編氓益困田土益荒請減前件選敕㫖宜依十一年九月中書門下奏字人之官從古所重遂許聞薦兾得循良其或不依節文虛指事跡既開繆舉之路實扇僥求之風望自今以後所舉人事跡與節文不同及檢勘無據并到官後不稱職及有負犯等事並請量輕重坐其舉主輕則削奪重則貶謫伏以前後敕文雖有條約比來銓核多務因循今重申明所期畫一其舉人到省後所司勘檢如與節文不同即具事由並舉主名銜申中書門下如所司鹵莽便與判成察知事狀違越則所司與舉主同坐從之寶厯二年十二月吏部奏伏以吏部每年集人及定留放至於注擬皆約闕員近者入仕嵗增員闕日少實由諸道州府聼奏悉行致令選司士子無闕貧弱者凍餒滋甚留滯者喧訴益繁至有待選十餘年裹糧千餘里纍駮之後方敢望官注擬之時别遇敕授私惠行於外府怨謗歸於有司特望明立節文令自今以後使天下州府內選限不得奏六品以下官敕㫖依奏太和七年五月敕節文州縣録事參軍如在任績效明著兼得上下考及清白狀陟狀許非時放選仍優與處分其餘官見任得上下考語減三選如本官兩選以下者同非時人例處分開成二年四月中書門下奏天下之理在能官人古今以選委重吏部自循資授仕衡鏡失權立格去留簿書得計比緣今年三月選事方畢四月以後方修來年格文五月頒下及遠已屆秋期今請起今月與下長安格所在府州榜門曉示其前資官取本任解黃衣本貫解一千里內三月十日解到省二千里三千里遞加十日並本州齎送選人發解訖任各歸家其年七月十五日齊於所住州府看吏部長榜定留放其得留人並限其年十二月十日齊到省試注唱正月內銓門開永為定例如其年合用闕少選人文書無違犯可較則於本色闕內先集選深人年長久其餘既無缺可集南曹但為判成榜示所住州府許次年取本住州府公驗便依限赴集更不重取本住本貫解舊格己久不便更改事遂不行四年敕吏部去冬粟錯及長名駁放選人等如聞經冬在京窮悴頗甚街衢接訴有可哀矜宜委吏部檢勘條鈐轄如非踰濫正身不到缺考缺選大假瑕病之外即與重收以比遠殘闕注擬不得用平留闕如員不相當不唱不伏官者便住冬集不在更論訴限如未經中書門下陳狀敕下後不得續收今冬以後不得以為例㑹昌六年五月赦書節文吏部三銓選士祗憑資考多非實才許觀察使刺史有竒績異政之士聞薦試用大中六年五月敕大功以上親連任停解如己得資者依本官選數集如未得資及未上並同非時人例放選天祐二年四月敕應天下府州令録並委吏部三銓注擬自四月十一日以後中書並不除授或諸薦奏量留即度可否施行掌選善惡貞觀元年溫彥博為吏部郎中知選意在沙汰多所擯抑而退者不伏囂訟盈廷彥博惟騁辭辨與之相詰終日喧擾頗為識者所嗤四年杜如晦臨終請委選舉於民部尚書戴胄遂命檢校吏部尚書及在銓衡抑文雅而奬法吏不適輪轅之用物議咸以為太刻五年楊纂為吏部侍郎銓敘人倫稱為允當然而抑文雅進黠吏觀時任數亦為時論所譏八年十一月唐皎除吏部侍郎嘗引入銓問何方便穩或云其家在蜀乃注與吳復有云親老先任江南即唱之隴右論者莫能測其意十七年楊師道為吏部尚書貴公之子四海人物未能委練所署用多非其才而深抑勢貴及其親黨將以避嫌時論譏之又其年吏部尚書髙季輔知選凡所銓綜時稱允愜十八年於東都獨知選事太宗賜金背鏡一面以表其清鑑焉龍朔二年司列少常伯楊思𤣥恃外戚之貴待選流多不以禮而排斥之為選者夏侯彪所訟而御史中丞郎餘慶彈奏免官中書令許敬宗知楊吏部之敗或問之敬宗曰一彪一狼共看一羊不敗何待總章二年司列少常伯李敬𤣥典選纍年銓綜有序天下稱其能參選者嵗有萬人每於街衢見之莫不知其姓名其被放有欣者即口陳其書判錯失及身曾負殿略無差舛時人服其強記莫之敢欺𢎞道元年十二月吏部侍郎魏克己銓綜人畢放長榜遂出得留人名於是衢路喧譁大為冬集人援引指擲貶為太子中允遂以中書舍人鄧𤣥挺替焉𤣥挺無藻鑑之目又患消渴選人因號為鄧渴如意元年九月天官侍郎李至遠知典選時有選人姓刁又有王元忠並被放乃密與令史相知減其㸃畫刁改為丁王元忠改為士元中擬授官後即加文字至遠一覽便覺曰今年銓核數萬人總記識姓名安有丁士者此刁某王某也遽窮其姦登時首服省中以為神明長壽二年九月許子孺除吏部侍郎性無藻鑑所視銓綜皆委令史縱直謂直曰汝平配也久視元年七月顧琮除吏部侍郎時多權幸好行囑託琮性公方不堪其弊嘗因官齊至寺見壁上畫地獄圖因指示同行曰此亦稱君所為何不畫天官掌選耶景龍三年鄭愔與崔湜同執銓管數外倍留人及授擬不遍即探用三考一百日闕夏不行又用兩考一百日闕朝注夕改無復准定選人得官乃有三考不得上者有一人索遠得校書郎其或未能處置者即給公驗謂之比冬故選司綱維紊亂以崔鄭為口實景雲元年以盧從願為吏部侍郎精心條理大稱平允其冒名僞選及虛增狀功之類皆能擲發其事典選六年頗有聲稱時人云前有裴馬後有盧李開元十二年十二月吏部侍郎崔琳以舊例有遠惡官六七百員恆不用比冬因選深人以此闕銓日對面注各得穩便不入長名用此遠闕都盡十八年蘇晉為吏部侍郎而侍中裴光庭每選官應批退者但對衆披簿以朱筆㸃頭而已晉遂榜選院云門下㸃頭者更引注擬光庭以為侮己不悅時有門下主事閻麟之為光庭腹心專知吏部典選每麟之裁定光庭始下筆時人語曰麟之手光庭口天寶元年冬選六十四人判入等時御史中丞張倚男奭判入髙等有下第者嘗為薊令以其事白於安祿山祿山遂奏之至來年正月二十一日遂於勤政樓下上親自重試惟二十人比類稍優餘並下第張奭不措一詞時人謂之曵白吏部侍郎宋遙武當郡太守苗晉卿貶安康郡太守考官禮部郎中裴昢起居舍人張炟監察御史宋定昱左拾遺孟國朝並貶官十一年十一月楊國忠為右相兼吏部尚書奏請兩京選人銓日便定留放無長名於宅中引注虢國垂簾觀之或有老病醜陋者皆指名以笑雖士夫亦遭詬耻故事兵部注官訖於門下過侍中給事中省不過者謂之退量國忠注官呼左相陳希烈於坐隅給事中省於前曰既對注擬即見過門下了希烈等腹非而已侍郎韋見素張倚皆見衣紫與本曹郎官藩屏外排比案牘趨走咨事乃謂簾中楊氏曰兩個紫袍主事何如楊乃大笑選人于是爭附㑹其㫖焉二千餘選人率候於勤政樓設齊兼為國忠立碑於尚書省所注文部三銓選人務專鞅掌不能躬親皆委與令史及孔目官為之國忠但押一字猶不可遍貞元八年正月御史中丞韋正伯劾奏稱吏部貞元七年冬京兆府踰濫解送之人已授官總六百十六人或有不到京城銓試懸授官告又按選格銓狀自書試日書跡不同即與選放選殿違格文者皆不覆驗及降資不盡或與注官伏以承前曹選乖誤未有如此遂使衣冠以貧乏待缺姦濫以賄賂成名非陛下求才審官之意由是刑部尚書劉滋以前吏部尚書及吏部侍郎杜黃裳皆坐削階太和二年三月都省奏落下吏部三銓注今春二月申內超資官洪師敏等六七十人敕都省所執是格銓司所司是例互相陳列頗以紛紜所貴清而能通亦猶議事以制令選已滿方此爭論選人可哀難更停滯其三銓己授官都省落下者並依舊注重與團奏仍限五日內畢其如官超一資半資以令授稍優者至後選日量事降折尚書侍郎注擬不一致令都省以此有詞鄭絪丁公著宜罰一季俸東銓所落人數較少楊嗣罰兩月俸其今年選格仍分明標出近例異絶徼求時尚書左丞崔景以吏部注擬多不守支選人中僥幸者衆糾案其事落下甲選人革已成之官經宰相喧訴故特降此敕吏曹條例總章二年四月一日司列少常伯裴行儉始設長名榜引銓注期限等法又定州縣升降官資髙下以為故事仍撰譜十卷其年十一月吏部侍郎李敬𤣥委事於員外郎張仁禕仁禕有識略吏幹始造姓厯改修狀樣銓歷等程式敬𤣥用仁禕之法銓綜式序仁禕感國士見委竟以心勞嘔血而死開元十八年十一月侍中兼吏部尚書裴光庭奏用循資格至二十一年光庭薨中書令蕭嵩與光庭不協以循資格取士不廣因奏事言之六月二十八日詔古者諸侯舉士必本於鄉曲府庭署吏亦出於行能所以人自檢修官無敗政及乎魏承漢弊權立九品今之吏部用是因循入仕寖多為法轉密然於濟理求才未聞深識持衡處事徒為具文朕寤寐永懷每以怊悵夫琴瑟不調者改而更張法令不便者義復何異頃者有司限數及拘守循資遂令銓衡不得探拔天下賢俊屈滯頗多凡人三十始可出身四十乃得從事更造格限分品為差若如所制之文六十尚不離一尉有材能者始得如此稍敦朴者遂以終身由是言之豈為明恕自今以後選人每年總令赴集依舊以三月三十日為限其中有才優業異操行著明者一委吏部臨時擢用貴於取實何限常科雖遠郡下寮名跡稍著亦須甄拔令其勸勉俾人思為善之利俗知進取之途朕所責成實在吏部可舉其大略令有所依比者流外奏申乃引過門下簿書堆盈於璅闥胥吏填委於掖垣豈是合宜過為煩碎自今以後亦宜依舊二十八年八月以考功貢院地置吏部南院以懸選人文選或謂之選院其選院本銓之內至是移出之東都至二十一年七月以太常園置之二十二年七月六日吏部尚書李嵩奏曰伏見告身印與曹印文同行用參雜難以區分望請准司勳兵部印文加告身兩字從之二十四年十二月二十四日敕王子未出閣者侍講侍讀侍文侍書並取見任官充經三周年放選與處分習藝官諸色內教通取前資及常選人充經二年以上選日各於本色量減兩選與處分左右衛三衛及五品以上子弟經七年雜衛經八年勳官經九年並放選與處分貞元二年二月吏部奏伏准今年二月十三日敕除臺省常參官餘六品以下並准舊例都付本司處分者其六品以下選人中有人才書判無闕相當仍前准格皆送中書門下又立功狀奏請要有褒揚等令並委本司注擬即才同常格選人若無闕相當一一令待續闕事即停滯必招喧訴應緣功狀及非時與官合授正員額並選限內無闕注擬者伏請量事計日用成三考闕如臨時人數稍多注擬不足灼然處置發遣即請兼用兩考以上得資闕並量人才資序注擬訖准敕送中書門下詳定可否其六品以下有官資稍髙合入五品縱非五品亦請依前送各敕㫖兩考闕下在用限其三考闕亦非當年准格合用除别授官人外亦不在用限如闕員不足選人事處分者臨時奏聼進止餘例依其年三月敕旨五品官准式不合選補使注擬冝付吏部檢勘訖送中書門下其據資敘却合授六品已下官便任處分其年五月吏部奏伏准貞元元年七年七月二十五日敕諸州府及京五品以上官停使下郎官御史等宜付所司作條件聞奏者緣諸色人功優非時授官闕員稍多請作節限許集上州刺史兩府少尹四赤令停替後請許一月日於都省陳牒納文狀畢檢勘同具由歷每至月終送名中書門下仍請不試太原河中鳯翔江陵成都興元府少尹赤令及京兆次赤令中下州刺史諸使下停減郎官御史等停官當年並聽集六品以下常參官以理去任者當聽集具員官京兆府先申中書門下省檢勘未成失文厯者其中先東西在遠不及選集並請依後件合集人限所在陳牒隨例赴集選人有明經進士道舉明法出身人有經制舉宏詞拔萃及第判入等清白狀並曾有上下考校奏成及孝義名制及敕褒奬者或曾任郎官御史起居補闕拾遺太常博士兩府判司兩府畿赤官使下郎官觀察使節度都團練都防禦度支水陸團運鹽鐵使留守等判官支使推官書記等制敕分明貞元元年十二月已前離任者一切聼集並六府少尹雉赤令並在試例應未及一考以下被替丁憂服滿廢省患解侍親並隔絶不上州府縣升降等官並聼當年緣未得資望准六品以下選人例所試狀入下等望臨時據人材定當放其違程不上人經免殿者聼集仍却還本道本色官應准格未合集人其中有文詞宏贍學術精通灼然為人所知亦任於所在府州陳狀本州長官精加選擇堪奬拔者且解申送依例赴集至省審考核有才實相副别狀送名如有踰濫其本州署申解牒本判官量事科拔四品官中有衰疾情願任致仕官者但是正員不限考數任於所在州府陳牒依合集人狀樣通由歷准前送本道觀察使上省不用身到禮部附學官先及第人黃蘭吏部者並所集准例試狀定留放應集合試官並望准舊例狀一道仍准建中二年格例及大厯十一年六月敕請條委左右僕射兵部尚書侍郎同考試具狀考入上等其名所試狀依限送中書門下其考入下等者任還十一年十月罷吏部兵部司封司勳寫急獲告身凡九十員二十三年二月齊抗以太常卿代鄭餘慶為中書侍郎平章事先時每嵗吏部選人試判别奏官考覆第其上下既考中書門下覆奏擇官覆定以為例抗為相乃奏言吏部尚書已是朝廷精選不宜别考重覆其年他官考判訖俾吏部侍郎自覆明年遂不置考判官蓋因抗所論奏也太和三年八月敕㫖凡權知授官皆本資稍優未合便得藉不擢用故且權知若通知計五考即便同正授極為僥幸自今以後應謂州府五品長馬擢知正授通計六考滿停其勒留官如有未滿去考停給課料者便准此却與資給四年五月中書門下奏准太和元年九月敕釐革兩畿及諸州縣官考山劒三川硤內及諸州比遠許奏縣令録事參軍其餘停敕下以來諸道並有奏請如滄景德棣已三數員伏以敕令頒行不合違越茍有宜便則須改張自今以後山劒三川硤內及諸道比遠州縣官出身及前資正員官人中每道除令録外望各許三數員如河北滄景德棣之類經破蕩之後及靈夏邠寧鄜坊等州全無俸料有出身及正員官悉不肯去吏部從前多不注擬如假攝有勞望許於諸人中量事奏三數員其餘約及期限並請依太和九年九月二日敕處分從之其年七月吏部應遠道州縣課料錢元額計料支給不得更缺折當司據料前錢定數牒示選人使知委敕㫖宜依五年六月敕南曹檢勘廢置詳斷選人儻有屈事足以往覆辨明近年以來不問有理無理多經中書門下接訴致令有司失職莫知所守選人踰分惟望哀矜若無條約恐更滋甚起今以後其被駁選人若已依期限經廢置詳斷不成自謂有屈任經中書門下陳狀狀到吏部後銓曹及廢置當更為詳斷審事理可收即收如數至三人以上廢置郎官請牒都省罰置如至十人以上其事狀申中書門下處分如經廢置詳斷公然越許或有已經詳斷不錯輒更有投論者選人重遲兩選當日具格文榜示兾無寃濫亦免僥求八年八月敕吏部踈理諸色入仕人等令勘㑹諸司流外令史府史掌間禮生楷書畫工及諸司流外令史等總一千九百七十二員六百五十七員請權停一千三百七十二員請令請司守缺除見在外以後不得更置委御史臺察訪開成二年六月吏部南曹奏准今年五月敕長安選格加置南曹郎一人别制印一面敕依旨㑹昌五年七月敕應在京百司官典優成授官人等既云趨吏執舉簿書優成命官須居散秩近日僣越殊甚頗紊舊規纍資或直於登朝班序豈容於雜類自今以後如有改轉官宜於中下州長馬但不令登朝事貴得體永為常式天祐三年四月十九日吏部奏今後選人如是格式分送員闕任其穩便去處請官不得妄指補諸道假滿拋不到任停留官元闕及違程不上月限等闕從之唐㑹要卷七十四
