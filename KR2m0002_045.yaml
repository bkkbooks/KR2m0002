body:
  text: 唐會要卷四十五宋王溥撰功臣武德元年八月六日詔曰朕起義晉陽遂登皇極經綸天下實仗宏材尚書令秦王右僕射裴寂等或合契元謀或同心運始並蹈義輕生捐家殉節艱辛備履金石不移論此忠勤理宜優異官爵之榮抑惟舊典勳賢之議宜有别恩其罪非叛逆可聽恕一死及所司進簿尚書右僕射裴寂納言劉文靜加恕二死左驍衛大將軍長孫順德右驍衛大將軍劉𢎞基都水監趙文恪右屯衛大將軍竇琮衛尉少卿劉政會鴻臚卿劉世龍吏部侍郎殷開山左翊衛大將軍柴紹內史侍郎唐儉庫部郎中武士彠驃騎將軍張平髙左驍衛長史許世緒李思行李髙遷等並恕一死三年二月十日詔曰貴爵尚齒列代通規進善優賢有國彞訓尚書左僕射魏國公寂太子少保新昌縣公綱左武侯大將軍陳國公杭太常卿沛國公元夀納言漠東郡公叔達內史令宋國公瑀兵部尚書蔣國公通户部尚書滎陽郡公善果右武侯大將軍羅侯御史大夫滑國公無逸並職司近侍任兼心膂恩禮所加義從隆渥寂已下奏事及侍立並令升殿其年三月隋尚舍奉御郭宏道來歸引見帝泣曰臣識龍顔在天下之先今拜闕庭在衆人之後遂拜同州刺史每參見奏事並升殿九年九月二十四日詔曰褒賢昭德昔王令典旌善念功有國彞訓吏部尚書上黨縣公長孫無忌中書令臨淄縣侯房玄齡右武候大將軍尉遲敬德兵部尚書建平縣男杜如晦左衛將軍全椒縣子侯君集等或夙參謨謀綢繆帷幄竭心傾懇備申忠益或早從任使契闊戎麾誠著艱難績宣內外義冠終始志堅金石誓以山河實允朝議無忌封齊國公玄齡封邢國公敬德封吳國公如晦封萊國公君集封潞國公邑各三千户遣侍中陳叔達於殿階下以名唱之上謂曰朕敘公卿勳勞量定封邑恐不能盡當宜各自敘叔父淮安王神通進曰義旗初起臣率兵先至今房玄齡杜如晦等刀筆之人功居第一臣竊不服上曰義旗初起人皆有心叔父雖率悍兵未嘗身履行陳山東未定受委専征建德南侵全軍陷沒及劉闥翻動望風而破今計勳行賞玄齡等有籌謀帷幄定社稷之功所以漢之蕭何雖無汗馬指蹤推轂故得功居第一叔父於至親誠無所愛但以不可緣私濫與勳臣共賞耳初將軍邱師利等咸自矜其功或攘袂指天以手畫地及見淮安王理屈自相謂曰陛下以至公行賞不私其親吾屬何宜妄訴貞觀六年九月宴於慶善宫時有班居尉遲敬德上者敬德怒曰汝有何功合坐我上任城王道宗因解諭之敬德拳毆道宗目幾眇太宗不懌而罷嘗謂敬德曰朕舊覽漢史見漢髙祖功臣獲罪者多意常尤之及居大位以來恆欲保全功臣令子孫無絶然卿居官輒犯憲綱方知韓彭為戮非漢祖之薄國家大事唯賞與罰非分之恩不可數行勉自修飾無貽後悔數年敬德遂飛鍊金石間居服雲毋粉穿築池臺常奏清商樂以自奉養不與外人交通凡十六年至顯慶三年十月卒許敬宗請加贈上曰敬德功業誰之儔也對曰武德末年二凶搆亂經綸中興之業能置宗廟之安者敬德功當第一太尉無忌曰敬德早從征伐勳庸明著貞觀之初特效殊績比諸將帥超越等倫李靖南定荆吳北伐突厥外內之功雖别論其勳效實宜相凖上以為然遂贈司徒并州都督十七年二月二十八日詔曰自古皇王褒崇勳德既勒名於鐘鼎又圖形於丹青是以甘露良佐麟閣著其美建武功臣雲臺紀其迹司徒趙國公無忌故司空河間元王孝恭故司空萊國公如晦故太子太師鄭文貞公徴司空梁國公玄齡開府儀同三司鄂國公敬德故右僕射宋國公瑀故揚州都督忠壯公志玄輔國大將軍夔國公𢎞基故尚書左僕射蔣國公通故陜東道大行臺尚書右僕射鄖國公開山故荆州都督譙襄公紹故荆州都督邳襄公順德洛州都督鄖國公張亮吏部尚書陳國公侯君集故左驍騎大將軍郯襄公公謹左領軍大將軍盧國公程知節故禮部尚書永興文懿公虞世南故户部尚書渝襄公劉政會户部尚書莒國公唐儉兵部尚書英國公李世績故徐州都督胡莊公秦叔寶等二十四人宜酌故實𢎞兹令典可並圖畫凌煙閣庶念功之懷無謝於前載旌賢之義永貽於後昆永徽三年十二月二十八日敕功臣貞觀二十三年已來簡退者特宜同致仕例其太原元從及秦府左右仍各加階先有正四品者不在此例五年二月四日詔屈突通殷開山並贈司空長孫順德贈開府儀同三司竇琮贈特進史大奈贈輔國大將軍溫大雅贈尚書右僕射權宏夀贈太子少師劉政會武士彠並贈并州都督張公謹贈荆州都督李髙遷贈梁州都督李思行贈洪州都督張平髙贈潭州都督時武昭儀用事贈其父故引功臣以贈之總章元年二月六日詔太原元從西府舊臣今觀詳覽其為等給贈司徒士彠贈司空開山贈司空淮安王神通并州都督劉宏基並州都督劉政會并州都督唐儉左衛大將軍竇琮荆州都督長孫順德梁州都督史大奈贈幽州都督龎卿惲潭州都督錢九隴贈華州刺史柴紹贈潭州刺史張平髙贈工部尚書裴寂洪州都督李思行洪州都督秦行師靈州都督許世緒涼州都督李髙遷齊州刺史劉義節贈太尉髙士廉贈司空屈突通贈太尉房玄齡贈司空杜如晦贈司徒尉遲敬德揚州都督段志玄益州都督程知節徐州刺史秦叔寶涼州都督宇文士及荆州都督張公謹荆州都督杜君綽荆州都督公孫武達涼州都督李安逺代州都督鄭仁泰荆州都督李孟嘗幽州都督獨孤彥雲始州刺史劉師立並為第一功臣其家見在朝無五品已上官者子孫及曾孫擢一人授五品官若先有四品五品者加授子孫等一人兩階若三品已上加爵三等其第二等功臣見在朝無五品已上官者其子孫及曾孫擢一人授從六品若有五品已上者加一人階六品官者加兩階三品已上官者加爵一等時皇后欲褒崇其父特在功臣之上故也神龍元年二月制段志玄屈突通蕭瑀李靖秦叔寶長孫順德劉宏基宇文士及錢九隴龎卿惲竇琮苑君璋李子和張平髙張公謹梁洛仁安修仁秦行師獨孤彥雲蘇定方李安逺鄭仁泰杜君綽李孟嘗等二十六家所食實封並依舊給其年九月敕自𢎞道以前經任相三年已上及秦府晉府寮佐四品已上并食實封功臣雖經罪責不至破家子孫無任京官者特宜優與一官英府周府舊寮五品已上子孫亦宜凖此至德二年十二月十五日敕扈從劍南締搆靈武册勳共三十二人太子太師幽國公韋見素加開府儀同三司三百户開府儀同三司齊國公髙力士加封三百户右龍武大將軍潁川公陳元禮封蔡國公封三百户左龍武大將軍鴈門男田長文封鴈門郡公封三百户左龍武大將軍南陽男張崇俊封鴈門郡公封三百户左羽林大將軍鳯翔伯杜休祥封馮翊郡公封三百户尚書左僕射裴冕加開府儀同三司封冀國公封三百户殿中監同正判行軍李輔國加開封儀同三司行殿中監封五百户宗正卿兼工部侍郎李遵加特進封鄭國公封二百户鴻臚卿中軍都虞候李鼎加開府儀同三司封保寧郡公封一百户鴻臚卿同正中軍都知兵馬使管崇嗣封巨鹿郡公封三百户右武衛大將軍王兟加特進太原縣侯封一百户尚書左僕射同中書門下平章事朔方軍節度使子儀加司徒代國公封一千户鴻臚卿朔方兵馬使僕固懷恩封曺國公封二百户右金吾衛大將軍四鎮伊西北庭行軍兵馬使李嗣業加兼衛尉卿封虢國公封二百户司徒兼户部尚書太原尹同中書門下平章事薊郡公光弼加司空兼兵部尚書封薊國公封八百户御史大夫兼工部尚書招討兩京并定逺武衛興平等軍兼關內節度使河西隴右伊西四鎮行軍兵馬使王思禮加開府儀同三司封霍國公封五百户太常卿同正兼御史大夫淮南西道節度採訪使潁川郡公來瑱加開府儀同三司潁國公封二百户太僕卿南陽太守知襄陽郡事金卿公魯昊加開府儀同三司岐國公封二百户京兆尹京畿採訪計會招討宣慰使崔光逺加特進禮部尚書鄭國公封三百户開府儀同三司李光進封范陽郡公封二百户右相苖晉卿加特進行侍中韓國公封五百户憲郡尚書司中書門下平章事李麟加金紫光祿大夫封褒國公封五百户中書侍郎同中書門下平章事崔圓加特進行中書令趙國公封五百户中書侍郎同中書門下平章事河南節度採訪使張鎬加銀青光祿大夫南陽縣公太于少師房琯加金紫光祿大夫河南郡公太子少保虢王巨加光祿大夫御史大夫趙國公李峘加金紫光祿大夫户部尚書吏部尚書郇國公韋陟加光祿大夫禮部尚書李峴加光祿大夫行御史大夫兼京兆尹封梁國公户部侍郎蘇震加銀青光祿大夫吏部侍郎大厯十四年閏五月詔司徒兼中書令汾陽郡王子儀宜號尚父兼太尉中書今加實封通前二千户月給千五百人糧二百四馬芻穀其年六月一日制條武德已來宰相及實封功臣子孫沉翳者量與一人正員官七月二十六日吏部奏請委史館精加檢勘審定名迹至建中元年九月五日史館奏武德已來實封陪葬配饗功臣名迹崇高者一十一人第一等司空魏國公裴寂納言魯國公劉文靜太尉趙國公長孫無忌尚書左僕射衛國公李靖司空英國公李績中書令漢陽王張東之中書令崔元暐侍中平陽王敬暉侍中扶陽王桓彥範中書令南陽王袁恕已尚書左僕射徐國公劉幽求二十四人第二等司空河間王孝恭開府儀同三司鄂國公尉遲敬德特進莒國公唐儉輔國大將軍夔國公劉𢎞基輔國大將軍邳國公長孫順德行臺尚書左僕射蔣國公屈突通行臺尚書右僕射鄖國公殷開山户部尚書渝國公劉政會工部尚書應國公武士彠荆州都督譙國公柴紹揚州都督褒國公段志玄右驍騎大將軍郯國公張公謹右領軍大將軍盧國公程知節徐州都督胡國公秦叔寶禮部尚書永興縣公虞世南工部尚書武陽縣公李大亮散騎常侍豐城縣男姚思廉左武候大將軍邢國公蘇定方夏官尚書耿國公王孝傑右武衛大將軍韓國公張仁願光祿卿琅邪郡公王同皎兵部尚書代國公郭元振尚書左丞相燕國公張説兵部尚書中山郡公王晙等三十四人第三等司空淮安王神通特進江夏王道宗中書令郢國公宇文士及行臺左僕射鄼國公竇軌太府卿葛國公劉義節左屯衛大將軍襄武郡公劉師立右驍衛大將軍梁國公安興貴右武衛大將軍申國公安修仁左衛大將軍譙國公竇琮夔州都督息國公張長遜黔州都督吳國公李子和右光祿大夫羅國公張平髙左監門大將軍榮國公樊興左武候大將軍郇國公錢九隴右武候大將軍沔陽郡公孫武達左武衛大將軍懷寧縣公杜君綽右驍衛將軍安化縣公龎卿惲涼州都督廣德郡公李安逺涼州都督同安郡公鄭仁泰刑部尚書吳興郡公沈叔安右領軍大將軍虢國公張士貴右衛大將軍安國阿史那社爾右武衛大將軍琅琊郡公牛進達輔國大將軍嘉川郡公周護仁右武候大將軍天水郡公丘行恭尚書左僕射宋國公唐休璟右武衛大將軍遼陽王李多祚吏部尚書齊國公崔日用户部尚書越國公鍾紹京左武衛將軍平陽郡公薛訥右金吾大將軍涼國公李延昌光祿卿申國公許乾輔中書侍郎趙國公王琚特進鄧國公張暐等至德已來將相功效明著已亡歿者八人第一等尚書左僕射冀國公裴冕吏部尚書清河郡公房琯門下侍郎衛國公杜鴻漸開府儀同三司武城郡王李嗣業衛尉卿顔杲卿常山郡太守袁履謙御史中丞張巡將軍南霽雲八人第二等大尉臨淮王李光弼兵部尚書涼國公李抱玉司空霍國公王思禮御史大夫劉正臣范陽長史賈循尚書右僕射信都郡王田神功左羽林大將軍薛景仙睢陽太守許逺七人第三等太子太師豳國公韋見素侍中韓國公苗晉卿尚書左僕射趙國公崔圓尚書右僕射辛雲京尚書右僕射扶風郡王馬璘右散騎常侍太原尹鄧景山史館奏按史傳考詳事實約為三等具件如前勑旨宜付尚書省百寮與史官對定奏聞建中元年十二月敕國初以來將相功臣名迹崇髙功效明著者宜差次分為二等其月定武德以來宰臣以房玄齡杜如晦蕭瑀髙士廉魏徴王圭戴胄岑文本馬周劉洎禇遂良于志寧張行成髙季輔韓瑗來濟張文瓘郝處俊李義琰裴炎蘇良嗣狄仁傑婁師德王方慶王及善魏元忠姚崇朱敬則蘇瓌宋璟魏知古陸象先張嘉貞李元紘韓休張九齡三十七人為上等竇威陳叔達等四十人為次等功臣以裴寂劉文靜長孫無忌河間王孝恭李靖李績尉遲敬德屈突通殷開山劉𢎞基長孫順德唐儉柴紹段志玄劉政會張公謹程知節秦叔寶虞世南李大亮蘇定方王孝傑張柬之崔玄暐敬暉桓彥範袁恕已張仁願劉幽求崔日用郭元振張説王琚王晙三十四人為上等淮安王神通等五十人為次等至德已來將相既沒者以裴冕房琯杜鴻漸李嗣業劉正臣顔杲卿袁履謙張巡許逺盧奕南霽雲十一人為上等李光弼等十五人為次等二年六月中書令郭子儀自蒲來朝子儀勳伐居最代宗不名常呼為大臣洎幸陜還賜以鐵劵圖形凌煙閣及上即位恩禮益厚每謁見乘肩輿入自光順門以造內殿崇貴近古無匹及病上御紫宸殿命舒王謨制書省之是日子儀薨上聞傷痛久之為廢朝五日册命曰尊為尚父官協太師雖爵秩則同而禮望尤重斂以衮冕旌我元臣聖祖園陵所宜陪葬軾墓重文終之德象山追去病之勳千載如存九原可作可贈太師仍令所司備禮册命贈絹三千匹布千端米麥三千石凶喪所須並令官給及葬上御安福門臨哭送之百寮陪位特賜諡為忠武配饗代宗廟庭興元元年正月一日赦文諸軍諸使諸道應赴奉天及進收京城將士等宜並賜名奉天定難功臣身有過犯遞減罪三等子孫有過犯遞減二等四月詔諸軍從奉天隨從將士並賜名元從奉天定難功臣從谷口已來隨從將士賜名元從功臣貞元元年八月詔九廟配饗功臣封爵廢絶者宜令紹封以時饗祀三年三月册拜李晟為太尉兼中書令四年詔為晟立五廟贈晟髙祖芝隴州刺史贈曾祖嵩澤州刺史贈祖思恭幽州大都督及令官給牲牢祭器牀帳禮官贊儀以祔焉尋詔晟長子願為嫡嗣兼監察御史特拜銀青光祿大夫太子賔客賜上柱國使其得列棨戟五年九月晟與侍中馬燧召見于延英殿上嘉其有大勳力乃詔曰昔我烈祖乘乾坤之滌蕩掃隋季之荒屯體元御極作人父母則有熊羆之士不二心之臣左右經綸參翊締搆昭文德恢武功威不庭康不乂用端命于上帝俾懷柔于四方宇宙既清日月既貞王業既成太階既平乃圖厥容列於斯閣𢡟昭績效表式儀刑一以無忘於朝夕一以永垂于來裔君臣之義厚莫重焉貞元己巳嵗孟秋七月我行西宫瞻宏閣崇構見老臣遺像顒然肅然和敬在色想雲龍之叶應感致業之艱難覩彼思今取類非逺且功與時並才為代生苟藴其材遇其時尊主庇人何代不有在中宗則桓彥範等著推戴之績在玄宗則劉幽求等申翼奉之勳在肅宗則郭子儀掃殄氛祲今則李晟等保寧朕躬咸盡力肆勤光復宗祏繼之前烈夫豈多謝闕而未録孰謂旌賢況念功紀德文祖所為也在豫曷其敢怠有司宜敘年代先後各圖其像列於舊臣之次仍令皇太子書朕是命紀于壁焉庶永播嘉庸昭示天下俾後之來者知元勳之不朽於是史官考其功績第其前後以禇遂良蘇定方郝處俊等二十七人充之復命皇太子書其文以賜晟刻石於門左七年二月詔授張巡男去病涇陽令許逺男峴饒州司馬南霽雲男承嗣溫州别駕顔真卿男羣府河中户曺參軍顔杲卿孫謨左內率府兵曺參軍旌忠烈之後也九年八月太尉兼中書令西平郡王晟薨上聞之震悼出涕比大斂遣使親致書於柩前曰皇帝遣宫闈令第五守進伸旨於故前太尉兼中書令西平郡王贈太師之靈曰天祚我邦是生才傑稟隂陽之粹氣實山嶽之降靈宏濟艱難保祐王室掃蕩氛祲廓清上京忠誠感于人神功業施於社稷匡時定亂實賴元勳方將與國同休永為邦翰比嬰疾恙雖歷旬時日冀痊除重期相見弼豫在位終致和平豈圖藥餌無徴奄至薨落君臣之義追慟益深循省遺章倍增感切卿一門胤嗣朕必終始保持况願等兄弟承卿教訓朕之志義豈忘平生卿縱不言朕亦存信比者卿在之日却未見朕深心今朕與卿長乖冀知朕誠志無以為念發言涕零是用躬述數行遣申所懷得盡臨紙遣使不能飾辭魂而有知當體朕意時初城鹽州復鹽池上賜宰臣新鹽惻然思晟命致鹽於靈座又時遣中使至晟第存撫諸子教戒備至每聞其子願等有一善上喜形於色鴻猷盛業恩寵始終自古及今無與晟比其年十月司徒兼侍中馬燧對於延英殿初燧以足疾許不朝謁是日燧以冬首朝請上召命對無拜而坐謂之曰曩故太尉晟常與公俱來今獨睹公不覺悲慟欷歔久之既而燧請退病甚仆於地不能興上親起之送於階命中貴人扶掖燧頓首泣謝而出先是燧自平汴宋魏博河中其功益髙上乃下詔褒美遷光祿大夫兼侍中并賜宸扆台衡二銘并序勒石於起義堂西偏上為題額其恩寵如此十七年三月成德軍節度使檢校太尉兼中書令王武俊薨廢朝五日羣臣詣延英奉慰如渾瑊故事太常諡曰威烈上曰武俊竭忠奉國賜諡忠烈元和二年七月録配饗功臣之後以蘇瓌孫繫為京兆府司録參軍崔玄暐孫元方張説孫整並為監察御史狄仁傑孫玄範為右拾遺敬暉孫元亮袁恕已孫師德相次録用焉四年三月上覽貞觀故事嘉魏徵諌諍匪躬乃詔令京兆尹訪其子孫及故居則質賣已更數姓為九家矣上愍之出內庫錢二百萬贖之以賜其孫倜及善馮等禁其質賣六年九月敕奉天定難功臣子孫有犯殺人宜令所司凖法其餘並凖處分八年敕張茂昭立功河朔舉族歸朝義烈之風史册攸載嘗聞身殁之後家無餘財追懷舊勳特越常典宜歲賜絹二千匹春秋二時支給其年八月詔曰君臣運合故徇國以忘家勸賞義明在褒功而顯節存則酬其爵祿殁則録其子孫然後忠義不遺典章斯在故礠晉隰等州觀察使檢校兵部尚書康日知故徐州刺史兼御史大夫李涓等一十家皆有懋功藏于盟府故命搜訪後裔光賁前人今志寧等或服式著緒或從官有成或投迹軍府之中或滯才州縣之職咸皆甄録各茂官榮庶乎有祿者無忘于聿修懷忠者使知其必報勉膺光寵無替前勞十五年六月敕以大理正假文通為殿中侍御史前淮南營田副使為殿中侍御史顔顒為刑部員外郎長安縣縣丞顔諗權知大理正渭南縣尉郭承嘏為監察御史並凖二月五日制勳閥之後可任臺省官者故有此命太和二年六月詔曰朕詳觀列聖遺型祖風盛業昭然在前其或道有汚隆政有善否未始不繫乎當時輔弼常因便殿言諸宰臣勉其忠益叶心推戴且以去歲乙巳登應門敷大號俾疇賢相以訪遺裔或血食不繼宗祊有闕至如遂良之委笏而諍名垂史書仁傑之恢復廟社事形先覺宋璟之文吏骨鯁功參治平元紘之守規畫一持成有裕其胄僅存不絶若髮各授邑吏使其自試其故中書令禇遂良五代孫處可汝州臨汝縣尉內史狄仁傑曾孫元封懷州修武縣尉侍中宋璟曾孫滶嶽州沅江縣尉中書侍郎李元紘曾孫伉鄧州向城縣尉大中二年正月三日敕節文功臣墳墓無子孫者委所在長吏差人巡檢其年七月十一日史館奏續選堪上凌煙閣功臣除所有舊圖形并有子孫在中外任官令寫進外三十七人禮部尚書兼門下侍郎平章事李峴侍中永寧郡公王圭吏部尚書戴胄中書令岑文本中書令馬周中書令兼修國史韓瑗侍中兼修國史郝處俊納言婁師德文昌左相王及善同鸞臺鳯閣平章事朱敬則侍中梁國公魏知古尚書左丞中書門下同三品陸象先中書令張九齡司空魏國公裴寂納言魯國公劉文靜中書令漢陽郡王張東之中書令博陵郡王崔玄暐侍中扶陽郡王桓彥範尚書左僕射劉幽求兵部尚書郭元振吏部尚書房琯常山郡太守袁履謙北庭行營節度使李嗣業主客郎中河南節度副使張巡睢陽太守許逺御史中丞盧奕右驍衛將軍南霽雲中書侍郎蕭華中書侍郎張鎬司徒李勉平章事監修國史張鎰門下侍郎蕭復兵部侍郎平章事桞渾檢校司空平章事賈耽北平郡王馬燧東都留守李憕敕旨宜令御史臺散牒諸州尋訪子孫圖寫真形進送三年四月宰臣奏伏以勳德之後慶賞所延每有恩制多令訪録所以興廢繼絶尊賢報功事歸勸奬義主沉翳近日諸家自論者衆吏曹官闕合用者稀縱欲比擬亦未詳悉應前件兩色子孫凖前後制敕令搜訪與官者望許于吏部陳狀便委磨勘如審是嫡嗣未有官名者具狀聞奏非時與一正員解褐官如有出身及已曾任官者選日優與處分如自以才行嘗登科第及有諸房子孫不承祭祀并及先因奬録已授正官者並不在此限即冀所加恩例式叶本條敕旨冝依咸通九年正月五日安南觀察使高駢奏愛州日南郡北五里有故中書令河南元忠公禇遂良墓前都護崔耿大中六年因訪立墳别立碑記云顯慶三年歿于海上殯于此地二男一孫祔焉伏乞尋訪苗裔護喪歸葬從之仍敕嶺南各委本道搜訪如有禇氏事迹相類者尋訪聞奏當加優憫乾符六年十月京兆府奏故尚父子儀廟因霖雨倒塌敕減賜御膳錢三千貫顧丁匠修築仍令所司明年仲春以太牢祭于廟時禮部員外郎崔祐甫與諫官俱稱過當章疏屢上宰臣亦相次奏之惟中書舍人李拯上疏請行前詔乃以太牢祀之其月敕以故衛國公李德裕孫延吉起家為集賢校理天祐元年七月中書門下奏西都舊有凌煙閣盡圖國初功臣今遷都東京乞委營造一閣圖寫梁王全忠敕旨令于皇城內擇地營造仍賜名天祐旌功之閣唐會要卷四十五
