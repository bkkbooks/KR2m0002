body:
  text: 唐㑹要卷九十二宋王溥撰內外官料錢下長慶二年十月敕司徒兼中書令韓𢎞疾未全平尚須在假將息其俸料宜從敕下日便令所司支給四年五月敕近日訪聞京城米價稍貴須有通變以公濟私宜令户部應給百官俸料其中一半令給段匹者回給官中所糶粟每斗折錢五十文其段匹委别貯至冬糴粟填納太倉時人以為甚便太和四年七月吏部奏應比逺道州縣官課料錢請令依元額課料支給不得更有缺折敕㫖依奏是月又敕應外任官帶一品正京官縱不知政事其俸料宜付所司並令兼給七年二月户部侍郎庾敬休奏應文武九品已上每月料錢一半合給段匹絲綿等伏以自冬涉春久無雨雪米價少貴人心未安自德音放免逋懸賑恤貧户中外羣庶已感皇慈至于衣冠之家素乏儲蓄朝夕取給猶足為憂以臣愚見若令本官料錢內一半停給段匹絲綿等回給太倉粟每斗計七十文在衆庶必見歡康于公家無所虧減待至麥熟米價稍賤即依前却給段匹等酌于事理庶叶變通敕㫖宜依八年八月劍南東川觀察使楊嗣復奏管內普合渝三州刺史元請料錢每月各四十五貫請各添至六十貫敕㫖依奏九年六月敕宰相俸料宜依元和十四年以前舊例並給見錢開成二年八月户部侍郎李班奏京諸司六品以下官請假往外府違假不到本官停給料錢敕㫖違限停俸料餘依凖令式四年三月敕侍講學士兼太子少師王起宜兼給料錢五年三月中書門下奏準今年二月八日赦節文應京諸司勒留官令本處刻留手力雜給錢與攝官者臣等撿詳諸道正官料俸錢絶少雜給手力過多今正官勒留亦管公事俸入多少事未得中臣等商議其料錢雜給等錢望每貫割留二百文與攝官其職田祿米全還正官從之㑹昌二年中書門下奏河東隴右鄜坊邠等道同北逺官加給課料河東等道或興王舊邦或陪京近地州縣之職人合樂為祇緣俸課寡薄官同北逺伏準元和六年閏十二月十二日及元和七年十二月二十日敕河東鳳翔麟坊邠州易定等道令户部加給課料錢共當六萬二千五百貫文曹省出得平流官數百員時議以為至當自後訪聞户部聽給零碎兼不及時觀察使以其虛折皆别將破用徒有加給不及官人近地好官依前北逺臣等商議伏望今日以後令戶部與實物仍及時支遣諸道並委觀察判官專判此案隨月加給官人不得别將破用如有違越觀察判官逺貶觀察使奏取進止選人官成後皆于城中舉債到任填還致其貪求罔不由此其今年河東隴西麟坊邠州新授北逺官等望許連狀相保户部各借兩月加給料錢至任內外官職田原闕五品以上田各得十畝四品以上田各得十二畝五品以下各得田八畝四品以下各得田十一畝一品各得田三十畝二品各得田二十五畝三品各得田二十畝六品以下得田七畝六品以上各得田八畝七品各得田五畝七品以下附內閣殿宇敕俸以上俱內官貞觀元年秋七月敕刺史頒行天下凡屬外任官員田依職授田凡一品各得田四十畝二品各得田三十畝三品各得田二十五畝四品各得田二十畝五品田同四品六品各得田十八畝七品各得田十五畝七品以下附一品內授俸銀四兩穀十二擔景龍四年春三月敕㫖頒行天下凡屬文武官員五品以下各加田五畝五品以上各加田四畝長慶元年十月敕司馬兼中書令合屬內官各依舊外再加田五畝七品以下仍舊唐㑹要卷九十二
