body:
  text: 唐㑹要卷十三宋王溥撰親饗廟太宗二貞觀三年正月十日上有事於太廟十七年四月十一日親謁太廟謝承乾之過蘇冕曰貞觀六年監察御史馬周上疏云陛下踐阼已來宗廟之享未曾親事遂使大唐一代之史不書皇帝入廟之事將何以詒厥孫謀垂則來葉且貞觀三年已親饗廟矣未知何事致此不同髙宗四永徽三年正月十八日乾封元年四月八日總章元年十二月十九日儀鳳二年正月十四日中宗一神龍元年十月六日以安國相王與左羽林將軍李多祚為參乗侍御史王覿上疏諫曰多祚夷人有功於國適可加之寵爵豈宜逼奉至尊將帝弟而連衡與我君而共輦誠恐萬方之人不允所望昔漢文帝引趙談驂乘袁盎伏車前諫曰臣聞天子所與共六尺輿者皆天下英豪今漢雖乏人陛下獨奈何與刀鋸之餘共載于是斥而下之多祚雖無趙談之累亦非卿相之重不事循省無聞固譲豈國之良輔更無其人史官所書將示於後何袁盎之強諫獨㣲臣之不及睿宗一景雲三年正月一日𤣥宗七先天元年十月四日開元六年十月六日時有司撰儀注以祭祔之日車駕發宫上謂宰臣曰祭先齋所以齊心也據儀注祭之日發大明宫又質明行事縱見星早發是移辰方到質明之禮其可及乎又朕不宿齋宫即安正寢情所不敢宜於齋所設齋宫五日赴行宫宿六日質明行事庶合於禮宋璟等稱聖情深至請即施行詔有司改定儀注六日上自齋宫步詣太廟十七年十一月四日告巡陵也皇帝乘玉輅百官乘馬侍從禮畢乘馬還宫初儀注自大次施褥至殿前有勅一切不許及皇帝之出也履地而行禮畢祀行神于西門天寳元年二月十八日六載正月十七日十載正月九日至十日赦文云自今已後攝祭薦享太廟其太尉行事前一日致齋具羽儀鹵簿公服引入親授祝版乃赴齋所十三載二月八日上髙祖徽號肅宗二乾元元年四月十三日元年建子月二十九日代宗一廣徳二年二月二十七日徳宗四建中元年正月四日貞元元年十一月十日六年十一月七日九年十一月九日前一日有勅至廟行禮不得施褥至敬之所自合履地而行至南郊亦宜凖此憲宗一元和二年正月上親薦獻太清宫朝享於太廟初享諸宫室備極誠敬及享徳宗順宗流涕嗚咽不自勝侍臣及舉冊讀冊官等皆相顧而感泣也穆宗一長慶元年正月敬宗一寳厯元年正月文宗一太和三年十一月武宗二㑹昌元年正月五年正月宣宗一大中七年正月懿宗二咸通元年十一月四年正月僖宗一乾符二年十一月昭宗二龍紀元年十一月天復元年四月禘祫上上元三年十月三日有司祫享于太廟時議者以禮緯三年一祫五年一禘公羊𫝊云五年一禘而再殷祭兩義互文莫能决斷太學博士史𤣥璨議曰按禮記正義列鄭𤣥禘祫志云春秋𫝊僖公三十三年十二月薨文公二年八月丁夘大享於太廟公羊𫝊云大享者何祫也是三年喪畢新君二年當祫明年春禘于羣廟僖公宣公八年皆有禘則後禘去前禘五年以此定之則新君二年祫三年禘自爾之後五年而再殷祭六年當祫八年當禘昭公十一年齊歸薨至十三年喪畢當祫為平邱之㑹冬公如晉至十四年祫十五年禘𫝊云有事于武宫是也至十八年祫二十年禘二十三年祫二十五年禘昭公二十五年有事于襄公是也如上所云則禘已後隔三年祫祫已後隔二年禘此則有合禮經不違𫝊義自此禘祫之祭依𤣥璨議開元四年十月十日禘享太廟九室命有司攝行禮初唐禮祫昭穆禘各于其室時禮官太常少卿韋縚奏曰凖古禮五年殷祭一祫一禘其義聚昭穆定次序又孔安國王肅等先儒皆以為序昭穆惟鄭𤣥云禘各於其室若如鄭𤣥則與享不異恐鄭說謬於周經請依古禮如王肅等議序列昭穆許之初開元六年秋睿宗皇帝喪畢祫享於太廟自後相承三年一祫五年一禘各自紀年不相通數至二十七年凡經五禘七祫其年夏禘訖冬又當祫太常議曰禘祫二禮俱為殷祭祫為合食祖廟禘為禘序尊卑伸先君逮下之慈成羣祀奉親之孝事異常享有時行之然而祭不欲數數則瀆亦不欲疏疏則怠故王者法諸天道制祀典焉烝嘗象時禘祫如閏五嵗再閏天道大成宗廟法之再為殷祭也謹按禮記王制周官宗伯並云國君嗣位三年喪畢祫于太祖廟明年禘于羣廟自爾以後五年再殷一祫一禘漢魏故事貞觀已後並用此禮又按禮緯及魯禮祫禘注云三年一祫五年一禘所謂五年再殷祭也以為三年一閏天道小備五年再閏天道大備故也此則五年再殷通計其數一禘一祫迭相承矣今太廟禘祫各自數年兩歧俱不相通計或比年頻合或同嵗再序或一年之後併為再祫或五年之内驟有三殷法天象閏之期既違其說五嵗再殷之祭數又不同求之禮文頗為乖矣説者或云禘祫二禮大小不侔祭名有殊年數相去祫以三紀抵六而合禘以五斷至十而周有茲參差難為通計竊以三祫五禘之說本出禮緯五嵗再殷之數同在其篇㑹通二文非相詭也盖以禘後置祫二周有半舉以全數謂之三年譬如三年一閏只用三十二月其禘祫異稱各隨四時秋冬為祫春夏為禘譬如禴祠烝嘗其禮一也鄭𤣥謂祫大禘小𫝊或謂祫小禘大為殷則同肆陳之間或有增減通計之義初無異同葢象天之法相𫝊乆矣惟晉代陳舒有三年一殷之議自五年八年至十一年十四年尋其議文所引亦以象閏為言且六嵗再殷何名象閏五年一禘又奚所施矛盾之說固難憑也夫以法天之度既有指歸稽古之理若茲昭著禘祫二祭通計明矣今請以開元二十七年己夘四月禘至辛巳年十月祫至甲申年四月又禘至丙戌年十月又祫至己丑年四月又禘至辛夘年十月又祫自此五年再殷周而復始又祫禘之說非惟一家五嵗再殷之文既相師矣法天象閏之理大抵一同而禘後至祫或近或逺盈縮之度有二法焉鄭𤣥髙堂生則先三而後二徐邈之議則先二而後三謹按鄭氏所序先三之法約三祫五禘之文存三嵗五年之位以為甲年既禘丁年當祫己年又禘壬年又祫甲年又禘丁年又祫周而復始以此相承祫後去禘十有八月而近禘後去祫四十二月而遙分析不均粗於算矣假如攻乎異端置祫於秋則三十九月為前二十一月為後雖小有愈其間尚偏竊據本文皆云象閏二閏相去則平分矣兩殷之序何不等耶且又三年之言本舉全數二周有半實準三年於此置祫不違之矣何必拘滯隔三正乎蓋千慮一失通儒之蔽也徐氏之議有異於是研覈周審最為可憑以為二禘相去為月六十中分三十置一祫焉若甲年夏既禘丙年冬祫己年夏又禘有象閏法豪釐不偏三年一祫之文既無乖越五嵗再殷之制疎數又均校之諸儒義實長矣今請依據以定二殷先推祭月周而復始時禮部員外郎崔宗之駁下太常令更詳舊議太常又執前議不改中書令李林甫又令集賢學士陸善經更加詳覆善經以其為義允于是太常卿韋縚奏曰頃在四月已行禘享今指孟冬又申祫祭合食禮頻恐違先典臣忝在持禮職司討論輒據舊文定其倫序請以今年夏禘便為殷祭之源自此之後禘祫相代五年再殷周而復始其今年祫凖禮合停望令有司但行時享則嚴禋不黷庶合舊章從之天寳八年閏六月五日敕文禘祫之禮以存序位質文之變蓋取隨時國家系本仙宗業承聖祖重熙累盛既錫無疆之休合享登神思𢎞不易之典自今已後每禘祫並於太清宫聖祖前設位序正上以明陟配之禮欽若𤣥象下以盡恭祝之誠無違至道比來每縁禘祫其常享則停事雖適於從宜禮或虧於必備已後每縁禘祫其常享無廢享以素饌三焚香以代三獻建中二年九月四日太常博士陳京上疏言今年十月祫享太廟并合享遷廟獻祖懿祖二神主春秋之義毁廟之主陳於太祖未毁廟之主皆升合食于太祖太祖之位在西東向其下子孫昭穆相對南北為别無毁廟遷主不享之文徴是禮也自于周室而國朝祀典當與周異且周以后稷配太廟為始封之祖始封而下乃立六廟廟毁主遷皆太祖之後禘祫之時無先於太祖者故太祖東向之位全其尊而不疑然今年十月祫享太廟伏請據魏晉舊制為比則構築别廟東晉以征西等四君為别廟至禘祫之時則於太廟正祖之位以伸其尊别廟登髙皇太皇征西等四府君以敘其親伏以國家若用此義則宜别獻祖懿祖立廟祫祭之以重其親則太祖於太廟遂居東向以全其尊伏以徳明興聖二皇帝曩既立廟至禘祫之時常用享禮禮儀使太子少師顔真卿議曰議者或云獻祖懿祖親逺廟遷不當祫享宜永閟於西夾室又議者曰二祖若同祫享即太祖之位永不得正宜奉遷二祖神主祔藏於徳明皇帝廟又議者云二祖宜同祫享與太祖並列昭穆而空太祖東向之位臣伏以三議俱未為允且禮經殘缺既無明據儒者能比方義類斟酌其中則可舉而行之蓋協於正也伏惟太祖景皇帝以受命始封之君處百代不遷之廟配天崇享是極尊嚴且至禘祫之時暫居昭穆之位屈己伸孝敬奉祖宗縁齒族之禮廣尊先之道此實太祖明神蒸蒸之本意亦所以化被天下率循孝悌也請依晉蔡謨等議至五年十月祫享之日奉獻祖神主居東向之位懿祖太祖洎諸祖宗遵左昭右穆之例此有以彰國家重本尚順之明義足為萬代不易之令典也又議者請奉遷二祖神主於德明皇帝廟行祫祭之禮夫祫合也故公羊傳曰大事者何祫也若祫祭不陳於太廟而享於徳明廟斯乃分食也豈謂合食乎名實既乖尤失禮意固不可行也貞元七年十一月二十八日太常卿裴郁奏曰禘祫之禮殷周以遷廟皆出太祖之後故得合食有序尊卑不差及漢髙受命無始封祖以髙皇帝為太祖太上皇髙帝之父立廟享祀不在昭穆合食之列為尊於太祖故也魏武創業文帝受命亦即以武帝為太祖其髙皇處士君等為屬尊不在昭穆合食之列晉宣創業武帝受命亦即以宣帝為太祖其征西潁川等四府君亦為屬尊不在昭穆合食之列國家誕受天命累聖重光景皇帝始封唐公為太祖中間世數既近在三昭三穆之内故皇家太廟惟有六室其𢎞農府君宣光二祖尊於太廟親盡則遷不在昭穆之數著在禮志可舉而行開元中加置九廟懿獻二祖皆在昭穆是以太祖景皇帝未得居東向之尊今二祖已祧九室惟序則太祖之位又安可不正伏以太祖上配天地百世不遷而居昭穆獻懿二祖親盡廟遷而居東向徴諸故實有所未安請下百僚㑹議勅㫖依行八年正月二十三日太子左庶子李嶸等七人議曰王制曰天子七廟三昭三穆與太祖而七周制也七者太祖及文王武王之祧與親廟四也太祖后稷也殷則六廟契及湯與二昭二穆也夏則五廟無太祖禹與二昭二穆而已晉朝博士孫欽議曰王者受命太祖及諸侯始封之君其已前神主據已上數過五代即毁其廟禘祫不復及也禘祫所及者謂受命太祖之後迭毁上升藏于二祧者也雖百代禘祫及之伏以獻懿二祖則太祖已前親盡之主也擬三代已降之制則禘祫不及矣代祖神主則太祖已下已毁之主則公羊𫝊所謂已毁廟之主陳于太祖者是也謹按漢元帝下詔議罷郡國廟及親盡之祖丞相韋𤣥成議太上孝惠廟主皆親盡宜毁太上廟主宜瘞于園孝惠廟主遷于太祖廟奏可太上則太祖已前之主瘞於園禘祫不及故也則今獻懿二祖之比也自魏晉及宋齊梁陳隋相承始受命之君立六廟虚太祖之位自太祖之後至七代君則太祖當東向位乃成七廟太祖以前之主魏明帝則遷處士主置于園邑嵗時使令丞奉薦世數猶近故也至東晉明帝崩以征西等三祖遷入西除名之曰祧以凖逺廟至康帝崩穆帝立於是京兆遷入西除同謂之祧如前之禮並禘祫所不及國朝始享四廟宣光并太祖世祖神主祔于廟至貞觀九年將祔髙祖於太廟朱子奢請凖禮立廟其三昭三穆各置神主太祖依晉宋以來故事虚其位待遞遷方處之東向位于是始祔𢎞農府君及髙祖為六室虚太祖之位而行禘祫至二十三年太宗祔廟遷𢎞農府君乃藏于西夾室文明元年髙宗祔廟始遷宣光皇帝於西夾室開元十年𤣥宗特立九廟于是追尊宣皇帝為獻祖復列於室光皇帝為懿祖以備九室禘祫猶虚太祖之位祝文於三祖不稱臣明全廟數而已至徳二載尅復後新作九室神主遂不造𢎞農府君神主明禘祫不及故也至寳應二年祔𤣥宗肅宗於廟遷獻懿二祖於西夾室始以太祖當東向位以獻懿二祖為是太祖以前親盡神主凖禮禘祫不及凡十八年至建中二年十月將祫享禮儀使顔真卿狀奏合出獻懿二祖神主行事其布位次第及東面尊位請依東晉蔡謨等議為定遂以獻祖當東向以懿祖於昭位南向以太祖於穆位北向以次左昭右穆陳列行事且蔡謨當時雖有其議事竟不行而我唐廟祧豈可為凖臣嶸伏以嘗禘郊社尊無二上瘞毁遷藏禮有義斷以獻懿為親盡之主太祖已當東向之尊一朝改移實非典故謂宜復先朝故事獻懿神主藏於西夾室以類祭法所謂逺廟為祧去祧為壇去壇為墠壇有禱則祭無禱則止太祖既昭配天地位當東向之尊庶上守貞觀之首制中奉開元之成規下遵寶應之嚴式符合經義不失舊章吏部郎中栁冕等十二人議曰天子受命之君諸侯始封之祖皆謂太祖故雖天子必有尊也以尊太祖焉故雖諸侯必有先也亦以尊太祖焉故太祖以下親盡而毁洎秦滅學漢亦不及制禮不列昭穆不建迭毁晉既失之宋又因之于是有建王廟之制于是有虚太祖之位夫不列昭穆非所以示人有序也不建迭毁非所以示人有殺也建王廟之制非所以示人有别也虚太祖之位非所以示人有尊也此禮之所由廢也謹按禮父為士子為天子祭以天子葬以士今獻祖祧也懿祖亦祧也唐未受命亦猶士禮也是故髙祖太祖以天子之禮祭之不敢以太祖之位易之今若易之無乃亂先王之序乎昔周有天下追尊太王王季以天子之禮及其祭也親盡而毁之漢有天下追尊太上皇以天子之禮及其祭也親盡而毁之唐有天下追王獻懿二祖以天子之禮及其祭也親盡而毁之則不可代太祖之位明矣又按周禮有先公之祧有先王之祧先公之遷主藏乎后稷之廟其周未受命之祧乎先王之遷主藏乎文武之廟其周已受命之祧乎故有二祧所以異廟也今獻祖已下之祧猶先公也太祖已下之祧猶先王也請築别廟以居二祖則行周之禮復古之道故漢之禮因於周也魏之禮因於漢也隋之禮因於魏也皆立三廟有二祧又立私廟四于南陽亦後漢制也以為人之子事太宗降其私親故私廟所以尊本也太廟所以尊正統也雖古今異時文質異禮而知禮之情與問禮之本者莫不通其變酌而行之故上致其崇則太祖屬尊乎上矣下盡其殺則祧主親盡于下矣中處其中則王者主于祧中矣工部郎中張薦等議曰昔殷周以稷契始封遂為不遷之祖其毁廟之主皆稷契之後所以昭穆合祭尊卑不差如夏以禹始封遂為不遷之祖故夏五廟禹與二昭二穆而已據此則鯀之親盡其主已遷左氏既稱禹不先鯀足明遷廟之主雖屬尊於始封祖者亦在合食之位矣又據晉宋齊梁北齊周隋史其太祖已上並同禘祫未嘗限斷遷毁之主伏以南北八代非無碩學巨儒宗廟大事議必精博騐於史册其禮僉同又詳魏晉宋齊梁北齊周隋故事及貞觀顯慶開元禮所禘祫並虚東向既行之已乆實羣情所安太祖處清廟第一之室其神主雖百代不遷永歆烝嘗上配天地位於郊廟無不正矣若至禘祫之時暫居昭穆之列屈己伸孝以奉祖禰豈非伯禹烝烝敬鯀之道歟亦是魏晉及周隋之太祖不敢以卑壓尊之義也議者或欲遷二祖於興聖廟乃請别築室至禘祫年享之夫祫合也此乃分食殊乖禮意又欲藏於西夾室永不及祀無異漢代瘞園尤為不可輒敢徴據正經考論舊史請奉獻懿二祖與太祖並從昭穆之位而虚東向司勲員外郎裴樞議曰禮之必立宗子者蓋為收其族人東向之主亦猶是也若祔於逺廟無乃中有一間等上不倫西位常虚則太祖永壓於昭穆異廟别祭則祫饗事主乎合食永閟比於姜嫄則推詳禖祀而無事理禮云親親故尊祖尊祖故敬宗敬宗故收族收族故宗廟嚴宗廟嚴故重社稷由是言之太祖之上復有追尊之祖則親親尊祖之義無乃乖乎太祖之外輕置别祭之廟則宗廟無乃不嚴社稷無乃不重乎且漢丞相韋𤣥成請瘞于園晉徴士虞喜請瘞於廟兩階之間喜又引左氏說古者先王日祭於祖考月祀於曾祖時享及二祧嵗祫及壇墠終禘及郊宗石室是為郊宗之上復有石室之祖斯最近矣但當時議所處石室未有凖的喜請於夾室中愚以為石室可據處之之道未安何者夾室謂居太祖之下毁主非是安太祖之上藏主也未有卑處正位尊在旁居考理印心恐非允協今若建石室於園寢遷神主以永安採漢晉之舊章依禘祫之一祭修古禮之殘缺為國朝之典故庶乎春秋之祭皆中理焉考功員外郎陳京議曰臣前為太常博士已於建中二年九月四日奏議祫饗獻懿二祖所安之位請下百僚博採其議其時禮儀使顔真卿因是上狀與臣議異臣議未行伏見去年十一月二十八日詔下太常卿裴郁所奏大㫖與京舊議相合伏以興聖皇帝則獻祖之曾祖懿祖之髙祖夫以曾孫元孫祔列于髙曾之廟豈禮之不可哉實人情之大順也京兆尹韋武議曰凡三年一祫五年一禘祫則羣廟大合禘則各序其祧愚謂主遷彌遠祧室既修當祫之嵗宜以獻祖居於東向而懿祖序其昭穆以極所親若行禘禮則太祖復筵於西以衆主列其左右是則於太祖不為降屈於獻祖無所壓卑考禮酌情謂當行此為勝同官縣尉仲子陵議曰今儒者乃援子雖齊聖不先父食之語欲令己祧獻祖權居東向配天太祖屈居昭穆此不通之甚也凡左氏不先食之言且以正文公之逆祀儒者安知非夏后廟數未足之時而言禹不先鯀乎且漢之禘祫蓋不足徴魏晉已逺太祖皆近是太祖之上皆有遷主厯代所疑或引閟宫之詩而永閟或因虞主之義而瘞園或縁逺廟為祧以築宫或言太祖實卑而虚位惟東晉蔡謨憑左氏不先食以為説令征西東向詳其數事此最不安且蔡謨此議非晉所行前有司不本謨改築之言取征西東向之一句為萬代法此其不可甚也臣又思之永閟瘞園則臣子之心有所不安權虚正位則太祖之尊無時而定别築一室義差可安且興聖之於獻祖乃曾祖也昭穆有序享祀以時伏請奉獻懿二祖遷祔于徳明興聖廟此正大孝也或以祫者合也今二祖别廟是分食也何合之為臣以為徳明興聖二廟每禘祫之年亦皆饗薦是亦合食奚疑於二祖乎其有二十七日吏部郎中栁冕上禘祫議証凡一十四道以備顧問并議奏聞至三月十二日祠部奏郁議狀至十一年七月十二日勑于頎等議狀所請各殊理在討論用求精當宜令尚書省令百寮與國子監儒官切磋舊狀定其可否仍委所司具件奏聞其月二十八日左司郎中陸贄奏曰臣竊尋七年百寮所議雖有一十六狀其歸趣三端而已于頎等一十四狀並云復太祖之位張薦狀則云並列昭穆而虚東向之位韋武狀則云當祫之嵗獻祖居于東向行禘之禮太祖復筵於西謹按禮經及先儒之說復太祖之位正也義在不疑太祖之位既正獻懿二主當有所歸詳考十四狀其義有四一曰藏諸夾室二曰置之别廟三曰遷于園寢四曰祔于興聖藏諸夾室是無享獻之期異乎周人藏於二祧之義禮不可行也置之别廟始於魏明之說禮經實無其文晉義熈九年雖立此義已後亦無行者遷於園寢是亂宗廟之儀既無所憑殊乖禮志事不足徴也惟有祔于興聖之廟禘祫之嵗乃一祭之庶乎亡於禮者之禮而得變之正也寳應初𤣥宗神主祔廟始遷獻祖懿祖神主於西夾室是時有司以國喪畢將行祫享以太廟既位當東向獻祖懿祖屬尊于太祖若同祫享即太祖不得居正位于是永閟二祖神主於西夾室太常博士陳京議請凖晉魏以來祫禮奉二祖出同合享與太祖並列昭穆而虚東向之位又云若以太祖失尊位即請奉二祖神主於徳明皇帝廟合享詔下尚書省雜議禮儀使顔真卿請依晉蔡謨等立議至祫享之日奉獻祖神主居東向之位自懿祖太祖及諸祖宗遵左昭右穆之制是日宰臣百僚並同真卿之議奏留中不下将及祫享真卿又奏從之唐㑹要卷十三
