body:
  text: 唐會要卷二十宋王溥撰陵議貞觀九年髙祖崩詔定山陵制度令依漢長陵故事務在崇厚時限既促功役勞敝祕書虞世南上封事曰臣聞古之聖帝明王所以薄葬者非不欲崇髙光顯珍寶具物以厚其親然審而言之高墳厚壠珍物畢備此適所以為親之纍非曰孝也是以深思遠慮安於菲薄以為長久萬代之計割其常情以定之耳昔漢成帝造延昌之陵制度甚厚功費甚多諫議大夫劉向上書曰孝文帝君居霸陵愴悽悲懷顧謂羣臣曰嗟乎以北山石為槨用紵絮斫陳漆其間豈可動哉張釋之進曰使其中有可欲雖鑄南山猶有隙使其中無可欲雖無石槨又何戚焉夫死者無終極而國家有廢興釋之所言為無窮計也孝文悟焉遂以薄葬又漢氏之法人君在位三分天下貢賦以一分入山陵武帝歷年長久比葬陵中不復容物霍光暗於大體奢侈過度其後至更始之敗赤眉入長安破茂陵取物猶不能盡無故聚斂百姓為盜之用甚無謂也魏文帝於首陽東為夀陵作終制其略云昔堯葬夀陵因山為體無封樹無立寢殿園邑為棺槨足以藏骨為衣衾足以朽肉吾營此不食之地欲使易代之後不知其處無藏金玉銅鐵一以瓦器自古及今未有不亡之國是無不掘之墓喪亂以來漢氏諸陵無不發掘乃燒取玉匣金鏤骸骨並盡可不重痛哉若違詔妄有變改使我為戮尸於地下死而重死不忠不孝使魂而有知將不福汝以為永制藏之宗廟魏文此制可謂達於事矣向使陛下德止於秦漢之君臣則緘口而已不敢有言伏見聖德高遠堯舜猶所不逮而俯與秦漢之君同為奢泰捨堯舜殷周之節儉此臣所以尤戚戚也今為邱壠如此其內雖不藏珍寶亦無益也萬代之後人但見高墳大塜豈謂無金玉也臣之愚計以為漢之霸陵既因山勢雖不起墳自然高敞今之所卜地勢即平不可不起宜依白虎通所陳周制為三仞之墳其方中制度事事減少事竟之日刻石於陵側書今封大小高下之式明器前須皆以瓦木合於禮文一不得用金銀銅鐵使後代子孫並皆遵奉一通藏之宗廟豈不美乎且臣下除服用二十七日已依霸陵今為墳壠又以長陵為法恐非所宜伏願深覽古今為久長之慮書奏不報世南又上疏曰漢家即位之初便營陵墳近者十餘嵗遠者五十年方始成就今以數月之間而造數十年之事其於人力亦已勞矣又漢家大郡五十萬户即日人衆未及往時而功役與之相等此臣所以致疑也又公卿上奏請遵遺詔務從節儉太宗乃謂中書侍郎岑文本曰朕欲一如遺詔朕臣子之心不忍頓為儉素如欲稱朕崇厚之志復恐百代之後不免有廢毁之憂朕為此不能自決卿等平章必令得所勿置朕於不孝之地因出虞世南封事付所司詳議以聞司空房玄齡等議曰謹按高祖長陵高九丈光武陵高六丈漢文魏文並不封不樹因山為陵竊以長陵制度過為宏侈二丈立規又傷矯俗光武中興明主多依典故遵為成式實謂攸宜伏願仰遵顧命俯順禮經詔曰朕既為子卿等為臣愛敬罔極義猶一體無容固陳節儉陷朕於不義也今便敬依來議於是山陵制度頗有減省十八年太宗謂侍臣曰昔漢家皆先造山陵既逹始終身復親見又省子孫經營不費人功我深以此為是古者因山為墳此誠便事我看九峻山孤聳回繞因而傍鑿可置山陵處朕實有終焉之志乃詔曰禮記云君即位而為槨莊周云息我以死豈非聖人遠鑒深識著之典誥恐身後之日子子孫孫尚習流俗猶循常禮加四重之櫬伐百祀之木勞擾百姓崇厚墳陵今先為此制務從儉約於九嵕之上足容一棺而已木馬塗車土桴葦籥事合古典不為世用又佐命功臣義深舟楫追念在昔何日忘之漢氏將相陪陵又給東園祕器篤終之義恩意深厚自今以後功臣密戚及德業佐時者如有薨亡宜賜塋地一所以及祕器使窀穸之時喪事無闕至二十三年八月十八日山陵畢陵在醴泉縣因九嵕層峯鑿山南靣深七十五丈為玄宫緣山傍岩架梁為棧道懸絶百仭環繞二百三十步始達玄宫門頂上亦起遊殿文德皇后即玄宫後有五重石門其門外於雙棧道上起舍宫人供養如平常及太宗山陵畢宫人欲依故事留棧道準舊山陵因使閻立德奏曰玄宫棧道本留疑有今日今既始終永畢與前事不同謹按故事惟有寢宫安飬供奉之法而無陵上侍衛之儀望除棧道因同山嶽上嗚咽不許長孫無忌等援引禮經重有表請乃依奏上欲闡揚先帝徽烈乃令匠人琢石寫諸蕃君長貞觀中擒伏歸化者形狀而刻其官名突厥頡利可汗左衛大將軍阿史那咄苾突厥頡利可汗左衛大將軍阿史那十體苾突厥一沴泥熟俟利苾可汗左文衛大將軍阿史那李思摩突厥答布可汗右衛大將軍阿史那稱爾薛延陀真珠毗伽可汗吐蕃贊普新羅樂浪郡五金貞德吐谷渾河源郡王烏地枝勒豆可汗慕容諾曷銶龜兹王訶黎布失軍于闐信烏耆王龍交騎支高昌王左武衛將軍麴智勇林邑王范鎮利婆羅門帝那伏帝國王河羅那順等十四人列於陵司馬北門內九嵕山之隂以旌武功及又刻石為常所乘破敵馬六匹於闕下也神龍元年十二月將合葬則天皇后於乾陵給事中嚴善思上表曰臣謹按天元房録葬法云尊者先葬卑者不合於後開入臣伏聞則天大聖皇后欲開乾陵合葬然以則天皇后卑於天皇大帝欲開陵合葬即是以卑動尊事既不經恐非安穩臣又聞乾陵玄宫其門以石閉塞其石縫鑄鐵以固其中今若開陵其門必須鐫鑿然以神明之道體尚幽玄今乃動衆加功誠恐多所驚黷又若别開門道以入玄宫即往者葬時神位先定今更改作為害益深又以修築乾陵之後國頻有難遂至則天皇后權萬幾二十餘年其難始定今乃更加營作伏恐還有難生但合葬非古著在古昔在禮經緣情為用無定依準况今事有不安豈可復循斯制伏見漢時諸陵皇后多不合葬魏晉之後祚皆不長雖受命應期有因天假然循機享德亦在時文但陵墓所安必資勝地後之子姓用託靈根或有不安孫嗣固難長享伏望依漢朝之故事改魏晉之頽綱於乾陵之傍更擇吉地取生墓之深法别起一陵既得從葬之儀又成固本之業伏以合葬者緣人私情不合葬者前修故事若以神道有知幽塗自得通會若以死者無知合之復有何益然以山川精氣上為星象若葬得其所則神安後昌若葬失其宜則神危後損所以先哲垂範具立葬經欲使生人之道必安死者之神永奉伏望少回天眷俯覽臣言行古昔之明規割私情之愛欲使社稷長享天下永安疏奏百官詳議尋有勑令準遺詔以葬之開元十七年玄宗因拜橋陵至金粟山觀岡巒有龍盤鳯翔之勢謂左右曰吾千秋後宜葬於此地後追隨先旨葬焉天寶十三載二月制獻昭乾定橋五署改為臺令丞各升一階自後諸陵例皆稱臺又至德九年八月六日前興定陵署焦士炎上表請永康興寧二陵為署勑令中書門下召禮官定其可否太常禮院奏以禮記追王大王王季上祀先公以天子之禮上文言追王王季下又言上祀先公足明追者全用天子之禮先公惟祀事得用故鄭玄注言追王王季者以近起焉又言追王者改葬之矣葬且猶改則其餘可知伏以景皇帝並是追尊皆用天子之禮陸臺之號不合有殊從之建中元年德宗即位將厚奉元陵刑部員外郎令狐峘上疏諌曰臣聞傳曰近臣盡規禮記曰事君有犯而無隱臣讀漢書劉向傳而見論王者山陵之禮垂之史册萬古芬芳何者聖賢之心勤儉是務必求諸道不作無益故舜葬蒼梧不變其肆禹葬會稽不改其列周武葬於卑陌無邱壠之處漢文葬於霸陵因山谷之勢禹非不忠也啓非不順也周公非不悌也景帝非不孝也其奉君親皆從微薄耳宋公始為厚葬周蜃益車馬其臣華元樂舉春秋書為不臣秦始皇葬驪山魚膏為燈燭水銀為江海珍寶之藏不可勝計千載非之宋桓魋為石槨夫子曰不如速朽子遊問喪具夫子曰稱家之有無張釋之對孝文曰使其中無可欲雖無石槨又何戚焉漢文帝霸陵皆用瓦器不以金銀為飾由是觀之有德者葬愈薄無德者葬愈厚昭然可覩矣陛下自臨御天下聖政日新進忠去邪減膳節用不珍雲物之瑞不近鷹犬之娛有司給物悉依元祐利於人也遠方底貢惟供祀事薄於己也故澤州奏慶雲詔曰以歲豐為嘉祥雍州奏金坑詔曰以不貪為寶恭惟聖慮無非至理而獨六月一日制節文云緣應山陵制度務從優厚常竭帑藏以供費用者此誠仁孝之德切於聖衷伏以尊親之義貴於合禮陛下每下明詔發德音追蹤唐虞超邁周漢豈取恱凡常之口有違賢哲之心與失德之君競於奢侈者也臣又伏讀遺詔曰其喪儀制度務從儉約陛下恭順先志動無違者若制度優厚豈顧命之意耶疏奏優詔從之貞元十四年四月詔曰昭陵舊寢宫在山下置來多年曾野火燒爇摧毁略盡其宫尋移在瑶臺寺側今屬通年欲議修理緣供水稍逺百姓勞敝今欲於見住行宫處修造所冀久遠便安又為改移舊制恐在所未周宜令中書門下百官同商量可否聞奏於是吏部員外郎楊於陵議曰伏以陵園宫寢非三代之制自秦漢以來有之但相沿皆於陵旁制寢未聞去陵有遠近及步數之節在漢宣元之後諸儒韋玄成匡衡等迭建陵寢之議或興或廢亦無明徴陛下嚴恭禋祀至誠至慎俯擇羣議上參天心則葺修之理可得指事而言也竊以陵寢經界在柏城之內非遠於陵也若諸陵寢宫皆因高有定制去陵有定限則縱非太宗之寢雖遠井泉皆宜循舊不可移也如但止於柏城之內去陵遠近不一則昭陵舊寢焚爇既盡行宫所卜展敬多年今便於側近循造不出柏城之內則與諸陵寢廟復何異也議者或以太宗創業垂統功德巍巍寢宫舊規不合變易復山上已毁之地則為展孝就山下載安之所則為遠陵甚不然也何者因陵建寢當時之事也乘變改作順時之宜也夫園塋本於安靜繕建彰於動作燎火之恐當不安矣版築之勞斯為勤矣將欲崇閟宇於荒廢興大役於密邇慮非聖靈之所憑依區區財力之費曾何足計是則曩時之創立以近為便今日之改制以便為宜奚必於柏城封域之中生近陵之嫌也伏惟陛下虔奉祖宗盡心園寢上以追孝敬下以庇蒸黎民臣識陋學淺莫探往制罄竭所見謂宜改修太常博士韋彤奏議曰歷代禮書及國朝故事未見有不可改移之禮先王建都立邑以安人也有不便則為之遷况其有故乎伏以文皇寢園頃遇焚爇遂奉仙駕久移舊宫事則因災非無故也嵗月傳序神御已安就其修建可謂至順且陵旁置寢是秦漢之法擇其高爽務取清嚴去陵遠近本無著定是以今之制置里數不同各於柏城隨其便地又非皆在山下也臣訪聞昭陵舊寢經久之後人行遂少林莽隱蔽徑路欹危伏以玄宫尚幽所奉宜靜今若必須仍舊土木無功不惟負載至難亦恐喧囂太逼天道以變通則久聖人以適時為禮今陛下孝思所切營建惟新是則通於神明豈伊常情所及聖旨所示謂於瑶臺寺左側是必於昭陵柏城之內不在瑶臺寺明矣既不越封兆而力後易從俯近井泉則膳羞愈潔規模一定垂之無窮酌其便宜誠為允當初正月中令有司修葺陵寢以昭陵舊宫先因火焚毁故詔百官詳議議者多云舊宫既被焚爇請移就山下或有議請修舊宫者上意亦不欲遷移由是復以山下為定於是遣右諫議大夫平章事崔損充修八陵使及所司計料獻昭乾定泰五陵各造屋三百七十八間橋陵一百四十間元陵三十間惟建陵不復創造修葺而已所緣寢陵中惟幄牀褥一事以上並令制置上親閲焉寶厯二年二月太常奏追尊孝敬皇帝以下四陵宜停朝拜事孝敬皇帝恭陵讓皇帝惠陵奉天皇帝齊陵承天皇帝順陵前件四陵昔年追尊大號皆是恩制緣情而行當時已不合經典今乃二時朝拜上擬祖宗竊以情禮之差過猶不及謹按禮記及歷代禮文并國朝故事皇帝旁親無服又云五代而親屬盡伏以四陵親非祖宗事無功德緣情權制禮合變更有司因循尚為常典况今宗廟之上遷代數遠尊卑降殺朝謁須停勑旨依奏親謁陵自開元十七年後無親謁陵事貞觀十三年正月一日太宗朝於獻陵先是日宿設黃麾使周衛陵寢至是質明七廟子孫及諸侯百寮蕃夷君長皆陪列於司馬門內太宗至小次降輿納履哭於闕門西靣再拜慟絶不能興禮畢改服入於寢舍執饌閲視高祖及先后服御之物匍匐牀前悲慟左右侍御者莫不欷歔初甲辰之夜大雨雪及太宗入陵悲號嗚咽百辟哀慟有頃雲出於邱陵之上俄而彌布天地晦暝禮畢太宗出自寢宫步過司馬門泥行二百餘步於是風靜雪止天色開霽咸以為孝感之所致焉永徽六年正月一日親謁昭陵文武百官宗室子孫並陪上降輦易服行哭就位再拜劈踊禮畢又改服奉謁寢宫其從聖宫妃嬪大長公主以及秦趙二國太妃皆先於神座左右侍列如平生上既入寢宫踊絶於地進至東階西靣再拜號慟久之乃進太牢之饌加珍羞具品引太尉無忌司空績越王貞趙王福曹王明及左右屯衛將軍程知節並入執爵進爼上至神座前拜哭奠饌設先帝先后衣服拜辭訖行哭出寢北門乃御小輦還宫開元十七年十一月十日上朝於橋陵陵在奉先縣至壖垣西闕下馬悲泣步至神午門號劈再拜悲感左右禮畢還宮詔曰黃有軒臺漢尊陵邑名教之地因心則在宜進奉先縣職望班員一同赤縣所管萬三百户以供陵寢即為永例十二日朝於定陵如橋陵之禮陵在富平縣時每發行宫將謁天尚未曉給事中劉彤疏上諫曰將事發軫路猶曛黑紅塵四合白刃交馳往來不相知左右不相識假令有敗車逸馬枯木朽株則變在不慮患生所忽不可輕也伏願慮及細微以安宗社拜陵之日必假朝光凡百歡心普天幸甚制曰朕夙敬之志惟在昧爽卿重慎之誠欲及辨色國體宜爾用納良言然要須早朝稍盡夜漏耳十三日朝於獻陵十六日朝於昭陵陵在醴泉縣掌事者倣佛遙觀太宗玄神遊殿前及上入寢宫聞室中謦咳之音上又令寢宫門外設奠以祭陪陵功臣將相蕭瑀房玄齡等數十人如聞其抃蹈之聲十九日朝於乾陵陵在奉先縣諸陵各取側近六鄉百姓以供養寢陵之役公卿巡陵顯慶五年二月二十四日上以每年二時太常卿少卿分行二事陵重人輕文又不備鹵簿威儀有闕乃詔三公行事太常卿少卿為制太常造鹵簿事畢則納於本司仍著於令景龍二年三月右臺御史唐紹以舊制元無諸陵起居之禮惟貞觀式文但以春秋仲月命使巡陵太后遂行每年四季之月及忌日降誕日遣使往諸陵起居準諸故事元無此禮遂上表曰臣伏以既安域兆禮不祭墓所謂送形而往山陵為幽靜之宫迎精而返宗廟為享薦之室但以春秋仲月命使巡陵鹵簿衣冠禮容必備自天授以後時有起居因循至今乃為常事起者以起動為稱居者以居止為名參侯動止蓋非陵寢之法豈可以事上之道行之於時望停四季及忌日降誕日并節日起居陵使但準二時巡陵庶得義合禮經陵寢安謐手勑答曰乾陵每嵗正旦冬至寒食遣外使去二忌日遣內使去其諸陵並依來表開元十五年二月二十四日勑每年春秋二時公卿巡陵初發準式其儀伏出城欲至陵所十里內還具儀伏所須馬以當界府驛馬充其路以供遞車兩來載儀仗推輅三十人餘差遣並停所司别供須依常式二十七年八月十二日勑古者分命公卿巡陵率皆乘輅以備其儀雖則是常不可廢闕而事有適安亦在變通宜令太僕寺司每陵各支輅兩乘并儀仗等送之陵所貯掌既免勞煩無虧肅敬其公卿出城日如常儀至陵所準此二十八年七月十八日制伏以八代祖宣皇帝七代祖光皇帝六代祖景皇帝五代祖元皇帝自昔追尊號諡稽古有則而陵寢所奉須廣彛章其建初起運二陵仍準興寧陵例置署官及陵户自今以後每嵗至春秋仲月宜分命公卿準諸陵例分往巡謁仍命所司準數造輅於陵署收掌以充備禮之用其建初啓運興寧永康等四陵宜别四時及八節委所由州縣數與陵署相知造食進獻天寶六載八月一日勑每年春秋二時巡謁諸陵差公卿各一人奉禮郎一人右校署令一人其奉禮郎右校署令自今以後宜停至陵所差縣官及陵官攝行事其巡陵儀式宜令太常寺修撰一本送令管陵縣收掌長行用仍令博士助教習讀臨時讚相永為常式貞元四年二月國子祭酒包佶奏每年二月八日差公卿等朝拜諸陵伏見陵臺所由引公卿至陵前其禮簡略因循已久恐非盡敬謹按開元禮有公卿拜陵舊儀望宣傳所司詳定儀注稍令備禮以為永式勑旨宜令所司酌禮量宜取其簡敬於是太常約用開元禮制及勑文舊例修撰五月勑旨施行所司先擇吉日公卿待輅車鹵簿就太常寺發至陵所司先於陵南北步道東設次西向北上公卿等到次奉禮設公卿位於北門外之左西向陵官在公卿位東南執事官又於其南西向北上設奉禮位於陵官西靣贊者二人在南少退謁者引公卿出次就位贊引諸官就位立奉禮曰再拜贊者承傳在位者俱再拜謁者引公卿贊引引諸官出次以奉行畢退復位奉祭禮曰再拜贊者承傳在位者皆拜謁者引公卿贊引引諸官各就次以還若須灑掃及芟剃修理即隨事處分其奉禮郎與謁等應須權攝請準天寶六載八月勑所管縣及陵官博士助教等充又準開元皇帝行諸陵即設太牢之饌其公卿朝拜備奉巡檢之禮並無牲牢元和元年正月禮儀使杜黃裳奏二月公卿拜諸陵準禮太上皇升遐準祭天地社稷其拜陵及諸享祀並合權停制曰可長慶元年六月二十七日吏部奏公卿拜陵通取尚書省及四品以上清望官中書省及諸司五品以上清望官及京兆少尹充從之三年正月御史臺奏應差定拜陵公卿伏請除準式假外如吏部差定奏下後稱疾患事故者望同臨祭出齊例論罰人應拜陵公卿正衙辭後並合當日出城迎來因循轉不遵守動經纍日止宿於家受命不恭莫甚於此臣請申明舊制因事制酌宜計其道程前後辭發奏可記曰按開元禮春秋二仲月司徒司空巡陵春則掃除枯朽秋則芟剃繁蕪掃除者當發生之時欲使茂盛也芟剃者當秋殺之時除去擁蔽且慮火災也今巡陵公卿皆持斧擊樹三發謂之告神其為不經一何甚也唐會要卷二十
