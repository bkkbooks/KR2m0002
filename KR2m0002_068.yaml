body:
  text: 唐㑹要卷六十八宋王溥撰河南尹武徳四年平王世充廢東都置總管府以淮陽王道𤣥為之其年十一月十一日置洛州大行臺改為東都六年九月二十六日改東都為洛州九年六月十三日廢行臺置都督府以屈突通為之貞觀十一年三月十日改為洛陽宫十七年五月十三日廢都督府復為洛陽以裴懐節為長史顯慶三年六月五日勅洛陽州及河南洛陽二縣官同京官以段寳𤣥為長史其年十二月十三日勅宜改洛陽州宫為東都州縣官員階品並准雍州光宅元年九月五日改為神都至神龍元年二月五日復為東都開元元年十二月一日改為河南府以李傑為尹天寳元年二月二十日改為東京上元元年九月二十日停東京之號元年建夘月改為中都少尹自顯慶二年置司馬以許力士為之大足元年加一員分為左右司馬申光為左以孟詵為右開元元年改為少尹以劉岑為之開成五年四月東都奏河南尹髙銖與知臺御史盧罕街衢相逢髙銖乗肩輿無所避二人各引所見臺府喧競上乃詔曰尹正官重臺憲地髙道路相逢儀制不定各執詞理每有紛爭勝負取决於一時㕘詳未申於久制委有司斟酌典故聞奏都省議臺府相避比無明文令按前後例知雜御史與京兆尹相逢京尹迴避今東都知臺御史即一員兼得行中丞公事若不少加嚴重即恐人不稟承今㨿東臺所由狀從前河南尹皆迴避請依上都知雜御史例為制其上都御史人數稍衆若令京兆尹悉皆迴避事恐難行請自今已後京兆尹若逢御史即下路駐馬其隨從人亦皆留止待御史過任前進其東都知臺御史亦請准此為例其京兆尹若趨朝及遇宣朝不可留滯即任分路前進制可太原尹武徳元年五月二十六日并陜西道置總管府以竇静為長史七年二月十七日改為大都督府以李𢎞節為之龍朔二年二月又加大字長壽元年九月置北都改為太原府都督為長史以崔神慶為之神龍元年二月罷為大都督府以宋璟為之開元十一年正月置北都以韋凑為尹天寳元年正月改為北京上元二年九月停北京之號尋却復為北京少尹自開元已前為司馬與諸府同開元十一年正月改為少尹以游子騫為之成都尹武徳三年四月九日置益州行臺以魏王泰為之九年六月十三日廢置大都督府以竇軌為之貞觀二年二月二十日去大字龍朔二年十二月六日又為大都督以丘行恭為之麟徳二年十二月改為成都府稱南京以裴冕為尹上元元年九月去南京之號鳯翔府尹武徳元年六月十九日改隋扶風郡為岐州天寳元年正月改為扶風郡刺史為太守至徳元年七月改為鳳翔郡二年十二月改為鳳翔府稱西京李曄為尹元年建夘月改為西都上元二年九月停西都之號興徳府尹垂拱元年十月七日改為太州華隂縣為仙掌縣神龍元年二月郤為華州四月又改為太州唐隆元年七月郤復為華州元年建子月肅宗不豫術士復請改為太州華隂縣為太隂縣寳應二年皆復舊名光化元年六月升為興徳府刺史為尹以韓建為之左右為少尹河中府尹武徳二年置總管府以襄陵王深為之七年改為都督府以楊福為之九年七月廢都督府景雲二年六月又置都督府以崔元琮為之十一月廢開元九年正月改為河中府號中都以姜師度為尹六月三日停中都却為州乾元三年二月二十三日改為河中府以蕭華為尹元年建夘月一日號為中都元和三年三月復為河中府開元元年五月揚州功曹㕘軍麗正殿學士韓覃上疏曰臣聞禮記月令曰孟夏之月無起土功無聚大衆昔魯夏城中丘春秋書之垂為後誡今建國都乃長久之大業也祀天地之大義襲春秋之所書奪人盛農之時愚臣竊以為甚不可也至若兩都舊制分官衆多費耗用度尚以為損豈可更建中都乎夫河東者國之股肱郡也勁鋭强兵盡出於是其地隘狹今又置都使十萬之戸將安投乎一旦陋東都而幸西都又造中都樂一君之欲遺萬人之患務在郡國之多不恤危亡之變悦在逰幸之麗不顧兆庶之困非所以建根蔕不㧞之長䇿矣昔漢帝感鍾離之言息事徳陽之殿趙主採續咸之諌止造鄴都之宫臣愚誠願下明詔罷中都則福履無疆矣天下幸甚六月三日詔其中都冝停依舊為府江陵尹武徳四年平蕭銑始置大總管以趙郡王孝恭為之七年二月十八日改為大都督府以濮陽王瓌為之貞觀年三月二十日去大字龍朔二年十二月十八日又改為大都督府以獨孤雲卿為之上元元年九月七日改為江陵府稱南都以吕謹為尹興元府尹武徳元年六月十九日置總管府以李安逺為之七年二月改為都督府以韓文通為之貞觀十七年六月廢永徽七年正月置都督府以梁王忠為之興元元年六月改為興元府以嚴震為尹都督府武徳七年二月十二日改大總管府為大都督府管十州已上為上都督府不滿十州只為都督府至開元元年著令戸滿二萬已上為中都督府不滿二萬為下都督府景雲二年六月二十八日制於天下分置都府二十四令都督紀察所管州刺史已下官人善惡汴州管宋蔡曹滑許陳潁等七州齊州管青淄濟濮登萊等六州兖州管徐亳沂密海泗鄆等七州魏州管衛相洛徳貝博豫等七州冀州管恒邢趙定滄瀛鄚易等八州并州管澤潞汾儀嵐忻代朔蔚等九州蒲州管晉絳慈隰沁等五州鄜州管坊延綏丹銀等五州涇州管隴寧慶鹽原㑹等六州秦州管成武河渭岷蘭洮扶文宕疊等十一州益州管彭蜀漢簡眉卭嘉雅陵等九州綿州管梓隆始果龍等五州遂州管資榮普渝合等五州荆州管硤郢澧朗岳鄂等六州䕫州管忠萬歸涪黔施等六州通州管開渠巴蓬壁等五州梁州管利興鳳洋集等五州襄州管鄧金商均唐房等六州揚州管舒和滁廬楚壽等六州安州管沔復隨黄申蘄光䓁七州潤州管蘇常宣歙湖等五州越州管杭婺衢温處台等六州洪州管袁吉䖍撫饒江等六州潭州管栁衡道永邵連等六州其揚益并荆為大都督府長史正三品其雍洛州長史亦加至從三品汴兖魏冀蒲綿秦洪潤越為中都督府正三品齊鄜涇襄安潭遂通梁夔為下都督府從三品改錄事㕘軍為司舉從事合糾察管内官人每府置兩員並同京官資望比侍御史若糾不以實姦不能禁者令左右御史臺彈奏畿内州並不𨽻入都督府其年七月詔置都督議者以謂權重難制所授多非精選請罷之詔令九品已上議其事侍御史宋務光議曰漢氏懲周之弊矯秦之失初置刺史十三州任用得賢海内稱理國家下明詔發徳音憫黎元脩古法而拘文牽俗之黨喧然以為非期破其議或云權歸於下或以授非其人遂令方牧拜而未行朝典疑而將寢不其惜歟且授非其才或可詳擇權歸於下未之前聞且率計天下三百餘州矣今補二十四都督物議以為未允則良二千石安得三百餘人矣茍不賢則百姓怨而和氣傷比者雨旱不調未必不由此可建之理一也巡察使人數年一出馳軒按俗徃復如飛夫隠慝潜過朋戚不能知矣况使者車不停軌而能郡縣攘訟遏獄乎議者舉接多不周悉使車朝返姦吏夕生而訟者亦不全其軀命矣都督則不然久於其職無得茍且嵗時巡按物無竄情行者無逺詣之勞貪者有終身之懼方伯以委之御史以按之至愚之人猶知自勉况朝廷妙選乎可建之理二也秦人以役夫流賊豈監郡之過耶漢室以外氏專寵豈刺舉之罪耶古有明徵事無深惑可建之理三也今長史貪冒百姓流亡職所以安之者衆矣而多未安近時要一興古制此又持疑欲乂蒼生何可望也所願率而行之以俟成績太子右庻子李景伯中書舍人盧補等議曰牧伯之命非古也洎秦罷侯置寄方制萬里以綏兆人令出王廷威行郡國至漢初置刺史秩六百石掌察墨綬已下其黄綬已上則不察焉所以全長史之威行不擾之政至漢武帝時改置州牧秩二千石遂以秩髙自守而功業不著於是罷州牧又置刺史及東漢時復置州牧王綱不振寖以凌夷則事之汙隆詳於典䇿今天下諸州分𨽻都督撡糾舉之柄典刑賞之科若委非其人授受有失權柄既重疵釁或生豈所以强幹弱枝經邦軌物者也其所置都督事恐不便今巡察御史秩卑任重則漢代刺史之流也委以時巡姦宄自禁伏願慎考古道率由舊章法乾元之簡易守前王之令典俾夫化洽昇平務依貞觀制度矣吏部員外郎崔莅議曰為政之道尚簡也理人之道尚寛也寛則得衆簡即易行扇之以淳風施之以惠化務崇清浄之教不貴滋章之法且賢良者在君用與不用邦國者在君理與不理豈宜察察而勞司舉孜孜而用督責者哉老子曰理大國者若烹小鮮誠哉是言其可不信往者周武之有天下封建子弟以為藩翰當其初也親以同憂有磐石之固及其末也疎而相討成逆命之國强侵弱衆暴寡或諸侯犯境或天子䝉塵王室凌夷終於傾覆者實由枝繁必折尾大不掉之所致也前漢時吳楚大族山東諸豪並令遷徙長安充奉陵邑葢以虚外實内强幹弱枝之計也則天分割雍州為四益州為三所以减削其權不使專統葢以防微慮逺杜邪塞姦之䇿也何則惟名與器不可以假人寧容倒持太阿而授其柄始雖委任得人政頗有方後恐未必皆賢弊從此起矣貞觀故事足可依行棄而不遵臣所未取刺史上武徳元年六月十九日改郡為州置刺史别駕治中各一人天寳元年正月二十日改州為郡改刺史為太守至徳二年十二月十五日又改郡為州太守為刺史貞觀三年上謂侍臣曰朕每夜恒思百姓閱事或至夜半不寐唯思都督刺史堪養百姓所以前代帝王稱共理者唯良二千石耳雖文武百僚各有所司然理人之本莫如刺史最重也朕故屏風上録其姓名坐卧恒㸔在官如有善惡事跡具列於名下擬憑黜陟縣令甚是親人要職昔孔宣父以大聖之徳尚為中都宰至於升堂弟子七十二人惟有言偃子路宓子賤始得相繼為此官乃詔内外五品已上各舉堪為縣令十一年八月侍御史馬周上疏曰理天下者以人為本欲令百姓安樂惟在刺史縣令今縣令既不能皆賢若毎州得良刺史則境内蘓息天下刺史悉稱聖意則陛下可端拱巖廊之上百姓不慮不安自古郡守縣令皆妙選賢徳欲有擢升宰相必先試以臨人或有從二千石入為丞相及司徒太尉者今朝廷獨重内官刺史縣令遂輕其選刺史多是武夫勲人或京官不稱職方始外出邊逺之處用人更輕所以百姓未安殆由於此太宗因謂侍臣曰刺史朕當自簡縣令詔京官五品已上各舉一人垂拱元年秘書省正字陳子昻上疏曰臣竊惟刺史縣令之職實陛下政教之首也得其人則百姓家見而户聞不得其人但委棄有司而挂壁耳陛下欲使家傳禮讓吏朂清勤不重遷刺史縣令將何道以致之也臣比草茅為百姓久矣刺史縣令之化臣謂國家興衰莫不在此職也何者一州得賢明刺史以至公循良為政者則十萬家賴其福若得貪暴刺史以循私苛虐為政者則十萬家受其禍一州禍福猶且如是况天下之衆豈得勝道哉故臣以為陛下政化之首國家興衰在此職也伏願深思妙選以救此弊天授二年獲嘉縣主簿劉知幾上疏曰臣聞漢宣帝云與我共理天下其良二千石乎二千石者今之刺史也移風易俗其寄不輕求瘼字人僉屬斯在然則厯觀兩漢已降迄乎魏晉之年方伯岳牧臨州按郡或十年不易或一紀仍留莫不盡其化下之方責以理人之術既而日就月將風加草靡故能化行千里恩漸百城今之牧伯有異於是倐來忽往蓬轉萍流近則累月仍遷逺則踰年必徙將聽事為逆旅以下車為傳舍或云來嵗入朝必應改職或道今兹㑹計必是移藩既懐茍且之謀何假循良之績用使百城千邑無聞廉杜之歌萬國九州罕見趙張之政臣望自今已後刺史非三嵗已上不可遷官仍以明察功過精甄賞罰冀𢎞共理之風以贊垂衣之化長安四年三月則天與宰相議及州縣官納言李嶠等奏曰安人之方須擇刺史竊見朝廷物議莫不重内官輕外職每除牧伯皆再三披訴比來所遣外任多是貶累之人風俗不澄實由於此今望於臺閣寺監妙簡賢良分典大州共康庶績臣等請輟近侍率先具寮則天曰誰為此行鳳閣侍郎韋嗣立先對曰㕘知機務非臣所堪承乏外臺庻當盡節儻得垂採録臣願此行於是以本官兼汴州刺史神龍元年正月舉人趙冬曦上疏曰臣聞古之擇牧宰者皆出於臺郎御史以為榮遷何者以為親人之職人命所繫故貴其位而重其人也今則不然京職之不稱者乃左為外任大邑之負累者乃降為小邑近官之不能者乃遷為逺官夫常人之心未可卒革此之不稱彼焉能理率土之濵莫非王臣何必貴大邑而賤小邑重近人而棄逺人耶夫食君之禄而冒君之榮陛下賜之死可矣流之邊可矣於左遷貶降之例惡足為王者之政與夫如是則上下相同而官得其實而天下理矣景龍二年兵部尚書韋嗣立上疏曰刺史縣令理人之首近年已來不存簡擇京官有犯罪聲望下者方遣牧州吏部選人暮年無手筆者方擬縣令此風久扇上下同知將此理人何以致化今嵗非豐稔戸日流亡國用空虚租調减削陛下不以此留念將以理國乎臣望下明制且論前事使有司改換簡擇天下刺史縣令皆取才能有稱望者充自今已後應有遷除諸曹侍郎兩省臺及五品已上清資望官遷於刺史内取刺史無人然後餘官中求其御史員外郎等諸清要六品已上官先於縣令中取制中明言如是則人爭就刺史縣令矣得刺史縣令天下大理萬姓欣然豈非太平樂事哉其年御史中丞盧懐慎上疏曰臣竊見比來州牧上佐等在任多者一二年少者三五月遂即遷改不論課最爭求冒進不顧廉恥亦何暇為陛下宣風布化求瘼恤人哉戸口所以流散倉庫所以空虚百姓凋弊日更滋甚職為此也昔漢宣帝時黄霸増秩賜金而不遷於潁川可謂美政也臣請望諸州都督刺史上佐等在任未經四考已上不許遷除察其課効尤異者或錫以車裘或就加禄秩或降使臨問并璽書慰勉若公卿有缺則擢以勸能其政績無聞及犯貪者放歸田里則萬方之人一變於道致此之美革彼之弊易於反掌陛下何惜而不行之哉其年十月十六日勅内外之職出入須均更遞往來始成政理京官中有才幹堪理人者量與外官外官中有清慎著稱者量與京職至開元六年勅刺史兼於京官中簡擇厯任有善政者補置其司農太尉府少府等司既掌財物已知次第不在此限景雲元年十一月諫議大夫寗原悌上疏曰今天下諸州良牧葢寡何者古難其選今侮其職也然而代所重於京都時見輕於州縣者何也古者牧守政成擢登三事郎官特秀先宰一同誠願尚書曠職則於方伯求才即卿列闕官必須循材擢用兹令若行仁風扇矣開元八年六月二十八日勅自今已後諸司清望官闕先於牧守内精擇都督刺史等要人兼向京官簡授其臺郎下除改亦於上佐縣令中通取即宜銓擇以副朕懐十二年六月二十四日勅自今已後三省侍郎有缺先求曽任刺史者郎官缺先求曽任縣令者十九年七月十四日勅嶺南及逺府管内諸州并蕃州檢校及攝刺史皆録奏待勅到然後准式其嶺南逺府蕃州等刺史在任不得輒請宿衛二十二年八月勅刺史到任不得當年入考縣令闕不得差使二十五年五月夷州刺史楊濬犯贓詔令决六十配流左丞相裴耀卿曰臣以為刺史縣令與諸吏稍别人之父母風化所瞻一為本州長官即令終身致敬况本州刺史百姓所崇一朝對其吏人皆即加杖恐非敬官長勸風俗之意伏望凡刺史縣令本郡决杖特乞停减二十九年正月十五日令百官於親屬之中舉牧宰乃下制曰昔祁奚之舉祁午謝安之舉謝𤣥寧限嫌疑致有拘忌其内外官有親伯叔及兄弟子姪中有材術異能通嫺政理據資厯可任刺史縣令者各以名聞天寳十一載十二月勅牧宰字人所寄尤重至於禄料頗亦優豐自合飭躬勵節以肅官吏如聞或犯贓私深紊綱紀今後刺史犯贓宜加常式一等十二載九月勅簡擇刺史冀令撫字諸使等或奏兼别職掌政理有妨既闕親人仍乖本意自今已後更不得别奏請乾元二年九月勅比來刺史之任皆先奏州縣官屬今後除帶使次判官外一切不得奏改官吏到任之後察有罪累及不稱職者任具狀奏請然今所由與替其刺史非兼節度但有防禦使者副使判官委於本州官中權擇亦不得别奏人並委中書門下著為常式永泰二年四月勅郎中得任中州刺史員外郎得任下州刺史用崇岳牧之任兼擇臺郎之能貞元二十年贈故隋州刺史李惠登洪州都督惠登少為平廬軍禆將安禄山反遂從兵馬使董泰涉海戰收滄棣等州史思明反復陷於賊脱身投山南節度來瑱瑱奏試金吾將軍李希烈反授惠登兵令鎮隋州貞元初舉州歸順隨授隋州刺史時遭李希烈殱殘後野曠無人惠登朴質不知書率心為政皆與理順二十年聞田疇加辟人歌謡之時于頔為山南東道節度以其績上聞加御史大夫升其州為上及卒故有是贈元和二年正月制度支如刺史於留州數内妄有减削及非理破使委觀察使風聞按舉必當料加量貶以誡列城如刺史不奉制勅不得稱有公事請赴本使其録事㕘軍亦不得擅離本州三年正月許新除官及刺史等假内於軍政門外謝訖進辭便赴任其日授官於朝堂禮謝並不須候假開國朝舊制凡命都督刺史皆臨軒冊命特示恩禮近嵗雖無冊拜而牧守受命之後便殿召對仍賜衣服葢以親人之官恩禮不可廢也時新除河南尹裴復求速之任適遇寒食休假李吉甫復求之甥也特為奏請遂兼刺史有是命非舊典也四年閏三月勅如刺史不承使牒擅於部内科率者先加懲責仍委御史臺出使郎官御史察訪聞奏其年十二月嶺南觀察使楊於陵奏貞元中觀察使李復奏南方事宜素異地逺職卑上佐多是雜流太平刺史見闕請於判官中揀擇材吏令知州事臣伏見近日諸道差判官監領州務朝廷以為非宜臣謂南方州縣凋殘刺史闕員動經數嵗至僚佐悉是庸人若遣知州必致撓敗伏縁李復所奏降勑年月稍逺懼違朝㫖伏乞天恩許臣遵守當道所奏文量才差擇以便荒隅勅㫖依奏九年十二月袁州刺史李將順坐掊歛擾人貶道州司戸㕘軍時大潦有詣執政者以為刺史抵禁不經按試遽貶官不可乃追詔遣御史馳往推究十二年四月勑自今已後刺史如有利病可言皆不限時節任自上表聞奏不須申報節度觀察使見任得替後遂於當處置百姓莊宅或因替代情弊便破除正額兩稅不出差科自今已後此色並勒依元額輸稅寳厯元年正月七日勅節文刺史縣令若無犯非滿三年不得替如治行尤異但就加賞賚其有才宜他職灼然要籍者中書門下先具事由及授上年月日奏聽進止滿嵗遷代無闕者即與進改其年九月御史臺奏近日新除刺史赴官多違條限請准舊制在途十日如妄稱事故不發奏進止勅㫖從之太和三年五月中書門下奏増秩賜金有故事前史所載得者甚希近日方鎮所奏人數漸多自今已後刺史在任政績尤異檢勘不虚者觀察使具事狀及所差檢勘判官名銜同奏若他時察勘不實本判官量加削奪觀察使奏聴進止所陳善狀並須指實而言如增加戸口須云本若干戸在任増加若干戸如稱墾闢田疇則云本墾田若干頃在任已來加若干頃並須申所司附入簿籍如荒地及復業戸自有年限未合科配者亦聴申奏明言合至其年並收租賦如稱營田課徴所効須云本合得若干萬石在任已來加若干萬石以明覈實其所加配斛斗便請准數合度支所供本道本軍斛斗數如不是供本軍本道斛斗則申所司准管支遣以憑考覆不得虚為文飾謬有薦諭勅㫖依奏四年八月御史臺奏謹按大厯十二年五月一日勅刺史有故及缺使司不得差攝但令上佐依次知州事其上佐等多非其才亦望委外道使臣精加銓擇不勝任者具以狀聞昨者宣州觀察使于敖所差周墀知池州若據勅㫖便合奏剖今勘其由長史司馬並在上都皆職有錄事㕘軍顧監司之任若不重有條約所在終難守文伏請自今已後刺史未致上佐闕人及别有勾當處許左録事㕘軍知州事如録事㕘軍又闕則任别差判官仍具闕人事由分析聞奏并申中書門下御史臺所冀詔㫖必行繩違有據勑㫖依奏其年九月比部奏准太和三年十一月十日勅文天下州府迴殘羡餘准前後勅文許充諸色公用刺史每被舉按即以公坐論贓其應合用羡餘錢物並令明立條件散下州府者謹具起請條件如後應有城郭及公廨屋宇器械舟車什物等合建立脩理須創置添換者或有公私使客兼遇徵拜朝官送故迎新舊例合有供應宴餞贈貺者或僚屬將校所由等有巡檢非違追捕盗賊須行賞勸合給程糧者或百姓貧窮納稅不逮湏有矜放要添填元額者或遇年豐穀熟要收糴貯備以防災敝者右以上並任用當州所有諸色正額數内迴殘羡餘錢物等如不依此色即同贓犯其所費用者錢並須立文案以憑勘驗勅㫖宜依仍委御史臺准此勾當五年五月御史臺奏應諸州刺史謝官後限發赴任日准勅例刺史謝官後不計近逺皆限十日内發伏以刺史理人之官分陛下憂寄受命之後固宜速行或以道途稍遥私室貧乏限内不能辦集事須假故淹留虚懸促期多不遵守今請量其逺近次第限日應去京一千里内者限十日二千里内十五日三千里内限二十日三千里以外限二十五日如限内遇延英不開亦請准常例進狀候進止便發更有妄託事故逗留伏請當時奏聞量加懲責其貶授刺史即請准舊例發遣不依此限所冀事得中道久而不隳勅㫖宜依七年七月中書門下奏刺史序遷領憑顯効若非責賞無以勸人近者受代歸朝皆望超擢在郡理績無由盡知或自陳制置事條固難取信或别求本道薦狀多是狥情將明憲章在覈名實伏請自今已後刺史得替代待去任之後且復委知州上佐及録事㕘軍各下諸縣取耆老百姓等狀如有興利除害惠及生人廉㓗奉公肅清風教者各具事實申本道觀察使檢勘得實具以事條録奏不得少為文飾其薦狀仍與觀察使判官連署如事不可稱者不在薦限仍望委度支鹽鐡分巡院内官同訪察各申報本使録奏如除授後訪知所舉不實觀察判官分巡院官及知州上佐等並停見任一二年不得敘用其觀察使奏取止勅㫖依奏開成元年二月中書門下奏應諸州刺史諸府少尹次赤縣令州府五品已上官并常㕘官等在任之例約是三載命代之後遽即到京人數既多員缺常少稍經時月則訴饑寒伏准漢法免罷郡守自非詔徵不得到京師建中初勑常參官及外五品已上替後不得擅至京師者起今已後請據舊章刺史及五品已上常參官在外應受替去任非有徵詔不得到京宜委所在州府取其由厯每四月一度附驛申中書門下初狀仍具前任政績受代月日申中書門下准前置具員量人才據缺人才除授其有家在上都因自歸止者正衙見後仍令京兆府依外州府例與申勅㫖依奏其年閏五月中書門下奏伏准舊例刺史授官後皆於限内待延英開日候對奏發日詳度朝㫖葢重理人之官欲階下觀其去就察其言語亦所以杜塞宰相陳情故除刺史並往往進狀便辭葢恐對奏之時錯失乖誤自今已後除刺史並望延英對了奏發日地近限促不遇坐日亦望許於臺司通狀待延英開日辭了進發勅㫖依奏八月中書門下奏致治親人屬在守宰朝廷近日命官頗加推擇從今已後望令諸觀察使毎嵗終具所部刺史縣令司牧方䇿政事工拙上奏其有教化具脩人知敬讓賊盗逃去賄賂不行刑獄無偏賦稅平允撫綏孤弱不虐幼賤姦吏黠胥侵牟止絶田疇墾闢逃戸歸復道途平理郵傳脩節府無留事獄去繫囚糺匿繩違嫉惡樹善以公滅私絶去貨殖夙興夜寐宴戲省少人無謗議家有藏葢是謂循良之吏愷悌君子其能備此具美者仰以其尤薦聞朝廷特加褒賞増秩改章徵受顯重如或數科之中賴有提舉勤恪不怠處事無闕者仰以次等薦聞量加寵賞偕留未替以候成績其有昧此政經所向無取循資待錄無補於理散材凡器長在人上亦仰以實奏聞當請移於散秩如有加以貪殘黷貨枉法受贓寃訴不伸拷笞無罪有一於此具狀以聞當加以峻刑投諸荒裔賞善懲惡期於必行掾曹邑佐善惡特異者亦仰聞狀請頒示四方專委廉察仍令兩都御史臺併出使郎官御史及巡院法憲官常加採訪具以事狀奏申中書門下都比較諸道觀察使承制勤怠之狀每嵗孟春分析聞奏因議懲奬勅㫖依奏三年三月勅新授刺史如遇入闕中謝者其日各隨本班引入候班退刺史便接次對官立候次對官對訖通事舍人引至横階前通事舍人口奏云新授某州刺史某人等中謝如喚近前即引上龍墀如不喚即各自奏發日訖通事舍人即宣某人等可去如去贊拜訖便引出其年五月中書門下奏舊制刺史已除替人未到依前輩一應務并諸俸料待替到交割便聴東西據山南道所奏刺史得便令牒州停務别差官知州事待到交割方可東西臣以為刺史禄俸固薄留滯可矜又嶺南諸管及福建㸃府皆是逺僻須有商量並請除到後未交割以前據俸料雜給之中三分支一以資其停費惟戒黜不在此例制可四年三月中書門下奏嶺南小州多是本道奏散試官及州縣官充司馬知州事不三兩考便請正除僥倖之門莫甚於此須作定制令其得中應奏授上佐知州事起今已後一周年在本任無破缺即任奏請充權知刺史官途之内猶甚徑㨗仍須俟一周年考不得將兩處相續勅㫖依奏唐㑹要卷六十八
