body:
  text: 唐會要卷五十五宋王溥撰省號下中書舍人武德初因隋號為內史舍人三年三月十日改為中書舍人龍朔中改為西臺舍人咸亨元年復為中書舍人光宅改為龍閣舍人神龍復改為中書舍人開元元年十二月一日改為紫微舍人五年復為中書舍人貞觀九年中書舍人髙季輔上封事曰時已平矣功已成矣然而刑典未措何哉良由謀猷之臣不𢎞簡易之政臺閣之吏昧於經逺之道執憲者以深刻為奉公當官者以侵下為益國未有坦平恕之懷副聖明之旨伏願隨方訓誘使各揚其職敦朴素革澆浮使家識孝慈人知亷恥杜其利欲之心載以清淨之化自然家肥國富禍亂何由而作上善之特賜鍾乳一劑曰卿進藥石之言故以藥石相報咸亨元年二月二十一日西臺舍人徐齊聃上奏曰齊獻公陛下外氏雖子孫有犯不合上延於祖今周忠孝公廟甚修而齊獻公廟毁壞不審陛下將何以垂示海內以彰孝理之風上納之其年三月十九日敕令突厥酋長子弟入事東宫齊聃又上疏曰昔姬誦與伯禽同業晉儲以師曠為友匪惟専賴師資故亦詳觀近習皇太子自可招尋園綺寤寐應劉陛闥小臣必採於端士驅馳所任並歸於正人方流好善之風永播崇賢之美今使氈裘之子解辮而事春闈冒頓之苗削袵而陪望苑在於道義臣竊有疑詩云敬慎威儀以近有德書曰任官惟賢才左右惟其人蓋殷勤於防微之至也天授元年夀春郡王成器兄弟五人初出閣同日受册有司授選儀注忘載册文及百僚在列方知闕禮宰相相顧失色中書舍人王勮立召小吏五人各令執筆口授分寫同時須臾俱畢詞理典贍時人歎服大足元年則天常引中書舍人陸餘慶入令草詔餘慶回惑至晚竟不能裁一詞由是轉左司郎中景龍四年六月二日初定內難唯中書舍人蘇頲在太極殿後文詔填委動以萬計手操口對無毫釐差誤主書韓禮談子陽職書詔草屢謂頲曰望公稍遲禮等書不及恐手腕將廢中書令李嶠見之嘆曰舍人思若湧泉嶠所不測也開元二年十二月二十日紫微令姚崇奏中書舍人六貟每一人商量事諸舍人同押連署狀進訖凡事有是非理均與奪人心既異所見或殊抑使雷同情有不盡臣令商量其大事執見不同者望請便作量狀連本狀同進若狀語交詆恐煩聖思臣既是官長望于兩狀後略言二理優劣奏聽進止則人各盡能官無留事敕曰可五年髙仲舒為中書舍人侍中宋璟每詢訪故事時又有中書舍人崔琳達於政理璟等亦禮焉嘗謂人曰古事問髙仲舒今事問崔琳又何疑也十三年行封禪之禮中書令張説自定侍從之官多引兩省録事主書及已之親中書舍人張九齡言於説曰官爵者天下之公器德望為先勞舊次焉若顛倒衣裳則詛謗起矣今登封霈澤千載一遇清品髙流不沐殊恩胥吏末班先加章􅌧但恐制出之後四方失望今進草之際事猶可改唯審籌之不可貽後悔也説曰事已決矣悠悠之談何足慮也後果為宇文融所劾建中二年六月六日門下侍郎盧把奏六典云中書舍人給事中充監中外考使重其事也今者有知考使無監考使既闕相臨難令詳練請依舊置監使敕旨令依其年十月舊制中書舍人分押尚書六曹以慿奏報開元初廢其職至是門下侍郎盧把請復之中書侍郎楊炎固以為不可而止貞元初中書舍人五貟皆缺在省唯髙參一人未幾亦以病免唯庫部郎中張濛獨知制誥宰相張延賞李泌纍以才可者上聞皆不許其月濛以姊喪給假或須草詔宰相命他官為之中書省案牘不行者十餘日四年二月以翰林舉士職方郎中吳通微禮部郎中顧少連起居舍人吳通玄左拾遺常執誼並知制誥故事舍人六貟通微等與他部郎中張濛凡五人以他官知制誥而六貟舍人皆缺焉十八年八月中書舍人權德輿獨直禁掖數旬一歸家嘗上疏請除兩省官詔報曰非不知卿勞苦以卿文雅尚未得如卿等比者所以久難其人德輿居西掖八年其間獨掌者數嵗及以本官知禮部貢舉事畢仍掌命書元和十五年二月敕舊制刑憲皆大理寺刑部詳斷聞奏然後至中書裁量多不至兩司中書便自處置自今後先付法司具輕重聞奏下中書令舍人等參酌然後據事例裁斷十五年閏正月上曰中書舍人職事準故事合分押六司以佐宰臣等判按沿革日久頓復稍難宜漸令修舉有須慎重者便令參議知關機密者即且依舊長慶二年七月敕自今已後貟外郎知制誥復授本官者通計二周年然後各依本行轉郎中亦依二周年與正除如是中行後行郎中仍更轉前行一周年即與正除如更是卑官知制誥合轉貟外者亦以二周年為限諫議大夫知者同前行郎中給事中并翰林學士别宣並不在此限其年六月武儒衡以諫議大夫知制誥膳部郎中元稹繼掌命書稹常通結內官魏宏簡約車僕自詣其家不由宰臣而得掌誥時人皆鄙之莫敢言者獨儒衡一日會食公堂有青蠅入瓜上忽發怒命掣去之曰適從何所來而遽集于此一座皆愕然儒衡神氣自若太和四年七月中書門下奏伏以制誥之選參用髙卑遷轉之時合係勞逸頃者緣無定制其間多有不均長慶二年七月二十七日敕始令自貟外以上及卑官知者同以授職滿一年後各從本秩遞與轉官如至前項正郎即以周嵗為限皆計在職日月以為等差不論本官年考頗叶通理凡是因職轉敘皆與此文相當其有本官已是前行年郎中年已深方被奬用即授官數月合正除比類舊制却成僥幸將垂永久須有商量自今以後有從前即行中知者並不許計本官日月但約知制誥滿一周年即與正授其從諫議大夫知者亦宜凖此即遲速有據比類可遵並請依長慶二年七月二十七日敕處分敕旨依奏其年十月二十二日敕令後大理寺結斷用文不當刑部詳覆於事不精即委中書舍人舉書其輕重出入所失之事然後出會昌四年十一月中書門下奏請復中書舍人故事伏見天寶以前中書舍人六貟除樞密遷授之後其他政皆得商量宰臣姚崇奏云事有是非理均與奪人心既異所見或殊抑使雷同情有不盡臣既是官長望於狀後略言事理優劣奏進聽旨自兵難以來務從權便政頗去於臺閣事多係於軍期決遣繁機専在宰弼伏以陛下神武功成昧旦思理精核庶政在廣詢謀詩云不愆不忘率由舊章前漢魏相好觀故事以為古今異制方今務在奉行而已數條漢興以來國家便宜行事奏請施行臣等商量今日已後除機密及諸鎮奏請戎事有司支遣錢穀等其他臺閣常務關於沿革州縣奏請係於典章及刑獄等並令中書舍人依故事商量臣等詳其可否奏聞敕旨從之大中六年六月敕太和中敕旨條流制誥改轉事頗為得中實重官業自後因循不守有紊典章遂便遷轉頻繁近日却成壅滯自今以後宜舉太和四年舊敕便永遵行仍每選知制誥於尚書六行郎中官精擇有文學行實公論顯著者以備擢用不得偏取前行正郎餘凖太和四年七月十三日敕處分景福二年十月以翰林學士禮部尚書李磎為中書侍郎平章事宣制日水部郎中知制誥劉崇魯抱其麻哭之奏云李磎姦邪協附權幸不合為相乃左授太子少師時宰相崔昭緯與磎不協密遣崇魯沮之諫議大夫武德五年六月一日置四貟龍朔二年二月四日改為正諫議大夫神龍元年二月復為諫議大夫至德元年九月十日勑諫議大夫論事自今以後不須令宰相先知乾元二年四月四日勑兩省諫官十日一上封事直論得失無假文言冀成殿最用存董勸大厯七年三月十一日其四貟外內供奉不尊過正貢數貞元四年五月十五日分為左右加置八貟左右各兩員其右諫議隸中書省至元和元年閏六月詔却置四員罷左右名貞觀元年正月十五日上謂侍臣曰朕雖不明至於大好大惡容或知之幸諸公數相諫正諫議大夫王圭曰臣聞木從繩則正后從諫則聖故古聖王必設諫臣七人言而不用則繼以死自是中書門下及三品已上入內平章國計必使諫官隨入得聞政事有所開説太宗必虛已以納之其年上謂侍臣曰為政之道唯在得人須以德行學識為本諫議大夫王圭對曰人臣若無學業不識前言往行豈堪大任漢昭帝時時有詐稱衛太子聚觀者數萬人莫不致惑京兆尹雋不疑斷以蒯瞶之事由是衆皆信服昭帝曰大臣當用經術明于古義者此固非刀筆俗吏可以比擬上曰信如卿言十七年太宗問諫議大夫褚遂良曰舜造漆器禹雕綦組當時諫舜禹者十有餘人食器之間苦諫何也遂良對曰雕琢害農事綦組傷女工首創奢淫危亡之漸漆器不已必金為之金器不已必玉為之所以諍臣必防其漸及其滿盈無所復諫太宗以為然因曰夫為人君不憂萬姓而事奢淫危亡之機可反手而待也永徽四年九月一日左武候引駕盧文操踰垣盜左藏庫物上以引駕職在紏繩而身行盜竊命有司殺之諫議大夫蕭鈞進曰文操所犯情實難原然凖諸常法罪未至死今致之極刑將恐天下聞之必謂陛下輕法律賤人命任喜怒貴財物臣之所職以諫為名愚臣所懷不敢不奏上納之謂鈞曰卿職在司諫遂能盡規特為卿免其死顧侍臣曰真諫議也五年八月十七日太常樂工宋四通入內教因以宮人通傳消息上令處斬仍遣附律蕭鈞曰四通等所犯在未附律前不合至死上曰今喜得蕭鈞之言特免死配流逺處景龍三年中宗宴侍臣及朝集使酒酣令各為回波詞衆皆為諂佞之文及自邀榮位次至諫議大夫李景伯曰回波爾時酒巵微臣職在針規侍宴既過三爵喧譁竊恐非儀上不説中書令蕭至忠曰此真諫議大夫大厯十二年四月敕令自今以後諫官所獻封事不限旦晚任封狀進來所由門司不得輒有停滯如須側門論事亦任隨狀面奏即便令引對如有除拜不稱于職詔令不便于時法禁乖宜刑賞未當征求無節寃抑在人並宜極論得失無所回避以稱朕意其常詔六品以上亦宜準此貞元二年六月以袐書郎陽城為諫議大夫仍遣長安縣尉孟寧齎束帛詣城夏縣所據致禮城遂以褐衣赴京師且詣闕上表陳讓上使中使齎章服衣而召見賜帛五十匹其後陸贄李充等以讒毁受譴朝廷􅋏懼上怒未解勢不可測滿朝無敢言者城聞而起曰吾諫官也不可令天子殺無罪人即率拾遺王仲舒等數人守延英門上疏論延齡姦佞贄等無罪上大怒召宰臣入語將加城等罪良久乃解令宰相諭遣之於是金吾將軍張萬福武將不識文字亦知感激端笏詣城與諸諫官等泣而且拜曰今日始知聖朝有直臣時議以為延齡朝夕為宰相城獨謂同列曰延齡倘入相吾惟抱白麻慟哭後竟坐延齡事改為國子司業十三年八月以左諫議大夫薛之與為國子司業之與少居于海岱之間永泰中淄青莭度使李正已辟為從事因奉使京師之與逗遛不歸正已召之再三之與報曰大夫既未入朝之與焉敢歸使因逃匿於山險間十餘年建中後方復任官上知之故賞慰以為諫議大夫奏諫官所上封章事皆機密每進一封須門下中書兩省印署文牒每有封奏人且先知請别鑄諫院印須免漏泄又纍上言時事上不恱故改官未幾以事免元和四年正月先是諫議大夫段平仲充册立南詔及弔祭使諫議大夫呂元膺充河南江西宣慰議者以為諫官盡去恐乖大體於是元膺罷行平仲繼止六年十一月左衛上將軍知內侍省事吐突承璀出監淮南軍時劉希昂與承璀皆久居權任既黜後有李涉者託附承璀邪險求投匭上疏曰承璀公忠才用可輔政化既承恩寵不合斥棄諫議大夫知匭使孔戣覽其副章大怒命逐之涉乃以賂投光順門達其疏戣聞之因上陳古今之佞幸可為鑒戒者又言涉之姦險欺天請加顯戮上悟貶涉而黜承璀焉十二年十月以比部貟外郎張宿為權知諫議大夫初上欲以諫議大夫授宿宰臣崔羣王涯奏曰諫議大夫前時亦有拔自山林及起於卑位者其例則少用皆有由或道德章明不求聞達或材行卓異出于等倫以此選求實愜公議其或事迹未著恩由一時雖有例超遷皆于時論未允張宿本非文詞入用望實稍輕臣等所以纍有奏請依資且與郎中事貴適中非於一人有薄厚請授宿職方郎中上命如初羣乃請以權知命之宿為布衣時上在藩邸因軍使張茂宗得出入東宮辨譎敢言逮監撫登位之時驟承顧幸擢居諫列以舊恩數詔入禁中尋坐不密貶郴州郴縣尉十餘年徵入厯贊善補闕比部貟外郎擢為諫議大夫頗恃恩顧掌權者往往因之摶擊宿思逞其志頗害清直之士韋貫之出時人亦以為宿有力焉宿亦隂事左右以固恩寵及為淄青尉使卒于道路正直相賀焉十四年穆宗即位之始頻出遊晏時吐蕃寇邉諫議大夫鄭覃等進奏曰陛下即位以來遊晏過多畋遊無度今畨寇在境緩急奏報不知乘輿所在臣等忝備諫官不勝憂惕伏願稍減畋遊留心正道伏聞陛下晨夜昵狎倡優近習之徒賞賜太厚凡金銀貨帛皆出自生靈膏血不可使無功之人濫霑賞賜縱內帑有餘亦乞用之有節如邉上無急則支用警免令有司重斂百姓實天下幸甚穆宗初不恱其言顧宰相蕭俯曰此輩何人也俯對曰諫官也帝意乃解曰朕之過失臣下盡規忠也召覃謂曰閣中奏事殊不從容今後有事面陳延英相見時久無閣中奏事覃等抗論人皆相賀十五年十月諌議大夫鄭覃崔郾右補闕辛丘度左拾遺韋瓘溫會於閣中奏事諫以上宴樂過度上曰朕有所闕臣下能犯顔直諫豈非忠耶宰臣等皆拜舞賀上又謂覃等曰允卿所請至延英對宰臣又令慰諭焉長慶二年三月以處士李源為諫議大夫詔曰禮著死綏傳稱握莭殞身守位取重人倫為義甚明其風或替言念於此慨然興懷而朝之公卿有上言者稱天寶之季盜起幽陵振蕩生靈吞噬河洛贈司徒忠烈公李憕處難居守正色就屠兩河聞風再固危壁首立殊莭至今稱之其子源有曽閔之行可貫於神明有巢由之風可希於太古山林以寄其迹爵祿不入於心泊然無營五十餘載夫褒忠可以勸臣莭旌孝可以激人倫尚義可以鎮澆浮敬老可以厚風俗舉兹四者大警于時是用擢自衡門立於文陛處以諫職冀聞讜言仍加印綬式示光寵可守諫議大夫仍賜魚袋河南尹差官命所在敦諭發遣初李憕既為祿山所害源方八嵗為賊所虜流浪南北輾轉人家凡六七年逮洛陽平父之故吏有識認者以金帛贖之歸于親近代宗聞之授河南府參軍源遂絶酒肉不婚娶不役僮常依洛城北之慧林寺即憕之别墅也寓于一室依僧而食人未嘗見其所習之業齊榮辱混是非熙熙而處其中蓋自有得也先命穴其野以備終制時往眠其間至是御史中丞李德裕抗表薦故有是命時源年已八十餘四年八月以諫議大夫賈直言為撿校右庶子兼御史丞充昭義軍司馬仍賜金紫初直言父德宗時得罪死且飲之以毒藥直言在側為中使手中掣得藥一飲而盡中使蒼黃復奏德宗感其事遂不之罪直言飲藥迷死一日藥潰左股而出却得生活體遂偏枯久之李師道請為從事直言具以逆順諭師道遂以紙畫轞車二枚呈師道師道問是何物答曰此是轞車囚送罪人至京師者今天子神聖公為反逆不悛必當滅公父子同載于此車送都市顯戮豈不悲乎因大哭於前師道命殺之左右感其義莫有應者師道懼不敢殺遂牢囚之劉悟破師道得直言於狴獄中而用之鄆師輸情皆因之以歸軍士無動搖者後失師亦不變于前宰臣上陳謂宜寵其官秩遂非次除諫議大夫劉沔纍表乞留云軍中事非直言不可從其請故復有斯授其年三月十九日上坐朝甚晚自即位以來坐朝皆晚此日尤甚羣臣候朝至宣政門已立數刻至紫宸門又絶晚不召羣官有至不任端立欲頓仆者諫議大夫李渤出次白宰相曰昨已有疏論坐晚今又益晚不能回上意是某之罪遂出閣門赴仗頭待罪有頃喚入及朝百官趨出左拾遺劉栖楚獨進諫曰厯觀前王嗣位之初莫不躬勤庶政坐以待旦陛下即位以來放情嗜寢樂色忘憂安寢宫闈日晏方起西宫密邇未過山陵鼓吹之聲日喧于內臣伏見憲宗皇帝皆是長君勤恪庶政四方猶有叛亂陛下運當少主即位未幾惡德布聞恐福祚之不久也臣忝位諫官致陛下有此請碎首以謝陛下遂以額叩龍墀輾轉振響之聲聞于閣外門下侍郎李逢吉懼栖楚致死遂宣言曰栖楚休叩頭聽進止栖楚捧首起立又奏宦官中大行時有協比邪人動搖國本事又叩頭如前上為之動容以袖連揮栖楚栖楚又奏云可臣奏即退不可臣奏臣即碎首而死叩頭中書侍郎牛僧孺遽請宣付栖楚云所奏知門外待進止栖楚乃拜舞而出以袂掩血行至仗頭憊不能起矣栖楚出後宰臣于上前更贊其事上心乃白仗下遂降中書宣諭栖楚令歸私第是日聞者莫不感異以為耳目所聞見諫官論事未有如今日之盛後一日有進止令中使持緋衫牙笏就宅宣賜栖楚旌拜起居郎堅讓不起遂歸東洛至十二月又拜諫議大夫以旌直諫也會昌二年十二月檢校司徒兼太子太保牛僧孺等奏伏奉十一月二十八日敕中書門下奏諫議大夫巡六典隋氏門下省署諫議大夫七員從四品下正五品上自大厯二年門下中書侍郎為正三品兩省遂闕四品建官之制有所未備謹案左氏傳衮職有闕惟仲山甫補之能補過也仲山甫即周之大臣漢書汲黯稱願出入禁闥補過拾遺張衡為侍中常居幃幄從容諷議拾遺左右此皆大臣之任其秩峻其任重則君敬其言而用其道况蹇諤之地宜有老成之人秩不優崇則難用耆德其諫議大夫望升為正四品下分為左右以備兩省四品之缺向後為丞郎出入迭用以重其選伏以前代帝王建官設立之制互有沿革升降廢置並視一時所宜苟得其宜則為當代之美臣等伏據六典故事諫議大夫官厯代之品制位不常定至于諷議之所賴則古今之任不殊今陛下方啓納諫之門俾崇品秩迭用丞郎蓋千年一時之盛美也臣等又據故事諫議大夫掌規諫諷諭侍從贊相今分置左右以備兩省四品之缺臣等參詳事理衆議僉同伏請著于典章永為定制敕旨依奏匭垂拱二年六月置匭四枚共為一室列於廟堂東方木位主春其色青配仁仁者以亭育為本宜以青匭置之于東有能告朕以養人及勤農之事者可投書青名之曰延師匭南方火位主夏其色赤配信信者風化之本宜以丹匭置之于南有能正諫論時政之得失者可投書丹匭名之曰招諫匭西方金位主秋其色白配義義者以決斷為本宜以素匭置之于西有欲自陳抑屈者可投書于素匭名之曰申寃匭北方水位主冬其色玄配智智者謀慮之本宜以玄匭置之于北有能告朕以謀智者可投書于玄匭名之曰通玄匭宜令諫議大夫補缺拾遺一人充使于廟堂知匭事每日所有投書至暮並進入又三司授事本防枉滯如有人訴寃屈抑不得與投匭之列後方獲申則所由之官節級按罪所冀寰中靡隔天下無寃其始魚保宗上書引揚州道士蔡裕製造焉理匭以御史中丞侍御史一人充使先天元年侍御史徐有功上疏曰陛下所令朝堂受表設匭投狀空有其名竟無其實並不能直各自防間延引嵗時拖曳來去呌閽不達撾鼓不聞抱恨銜寃吁嗟而已至誠所感和氣必傷豈不由受任者不副天心是陛下務欲使申其寃而有司務在重增其枉塵埃聖德掩蔽宸聰者其三司受表及理匭申寃使不速與奪致令壅滯臣謹彈奏天寶九載三月十八日改為獻納使至德元年十月復改為匭令右補闕閻式請先視其事狀然後為投上責壅塞貶式為郎州武陵縣至大厯十二年十二月二日有敕理匭使但任投匭人投表狀於匭中依進來不須勘責副本并妄有盤問及方便止遏大厯十四年七月理匭使崔造奏亡官失職婚田兩競追理財物等并合先本司本司不理然後省司省司不理然後三司三司不理然後合報投匭進狀如進狀人未經三處理及事非寃屈輒妄來進狀者不在進限如有急切須上聞不在此限其妄進狀者臣今後請并狀牒送本司及臺府處理敕旨依奏建中二年六月六日敕御史中丞依前充理匭使擇諫議大夫一人充知匭使貞元三年十二月知匭使右諫議大夫裴信奏其使典前凖大厯十四年六月十四日敕用四人糧科今依六典置二人請置驅使官二人敕旨依奏長慶三年理匭使諫議大夫李渤奏今後有投匭進狀者請事之大者聞奏次申中書門下小者各牒諸司處理不當再來投匭即具事聞奏如無理妄訴本罪外加一等從之四年七月理匭使諫議大夫李渤奏伏凖寶應元年五月敕給事中韓賞中書舍人楊綰同充理匭使其時二人奏大理評事盧翰充判官又凖六典匭使常以御史中丞及侍御史為之臺中人吏強幹首控百司明敕特并入匭實同創置其官吏手力食料紙筆委本司條流聞奏至其年九月遂罷匭使初渤以故事至重請增置胥吏及添給課料事多不允渤遂請詔罷乃從之開成三年八月諫議大夫知匭事李中敏奏應舊例所有投匭進狀及書䇿文章皆先具副本呈匭使其有詭異難行不令進上檢尋文案不見降敕處所由等云貞元中奏宣恐特是一時之事臣以為之本置匭函每日從內將出日暮進入意在使寃濫無告有司不為申理或論時政或陳利害宜通其必達之路所以廣聰明而慮幽枉若使有司先裁其可否非重其事俾壅遏申於九重之意也臣伏請自今已後所有進狀及封章臣等但為狀引進取舍可否斷自宸衷庶使名實在兹明置匭之本意敕旨依奏其月知匭使諫議大夫李中敏奏伏凖今年八月一日敕朝廷本設諫匭將防漏塞若須副本恐不盡言依中敏所奏仍令本司及金吾所由須知進狀人姓名住居去處或要召問如過旬日無處分即任東西者伏以舊例詣光順門進狀即有金吾押官責問住處匭院投狀即本司收投使狀人名便差院子審復家第及主人旋牒報京兆府若又令牒金吾責狀恐進狀人勞擾又慮煩併今伏請凖前準牒京兆府敕旨依奏敕五年四月敕匭函所投貴達下情近者所投文狀頗甚煩碎極言不諱豈假匿名如知朝廷得失軍國利害實真寃屈有司不為申明者任投匭進狀所由畫時引進其餘並不在投匭之限宜與匭使準此勾當仍具副本投會昌元年四月敕應投匭進封事人等宜自今後並須將所進文書到匭院驗卷軸入匭函不得便進如軸稍大入函不得即依前降使宣取仍永為常式大中四年七月敕應投匭及詣光順門進狀人其中有曽進狀令所司詳考無可採取放任東西未經兩三個月又潛易姓名依前進擾公廷近日頗甚自今以後冝令知匭使及閣門使如有此色不得收狀與進狀如故違與進者必重書罰唐會要卷五十五
