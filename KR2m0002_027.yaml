body:
  text: 唐會要卷二十七宋王溥撰行幸武德六年四月幸故宅改為通義宫九年三月幸昆明池習水戰貞觀五年正月幸左藏庫賜二品已上帛盡量而出焉六年三月十五日幸九成宫監察御史馬周上疏曰伏見明敕以四月二日幸九成宫臣竊惟太上皇春秋已髙陛下所宜朝夕視膳而晨昏起居今所幸宮去京三百餘里鑾輿動軔嚴蹕經旬非可以旦暮至也脫太上皇情或思感而欲即見陛下者將何以赴之且車駕今幸本為避暑而往然則太上皇尚留熱所而陛下自逐涼處溫凊之道臣竊未安敕書既出事已成就願示速返之期以開衆惑其年七月幸興慶宫賦詩詩在雅樂卷其年冬幸洛陽至灞上命祭漢文帝至華隂祭漢太尉楊震上自為文因謂司空無忌等曰昔朕在隋朝數數經此買餐而食賃舍而宿自平定禍亂君臨四海越十餘載不涉此塗今者出關六軍清道自省德薄甚增祗懼上承文帝餘業海內殷阜若止兩京去來豈至傾敗不顧萬姓行役無休身戮國滅為天下笑雖帝祚長短委以玄天而福善禍淫亦由人事豈直其君而已近侍之臣相次滅誅若欲君臣長久國無危敗君有違失臣須極言我聞卿等言縱不能當時即從再三思量終擇善而用無忌等拜舞稱賀七年上將幸九成宫散騎常侍姚思廉進諫曰陛下髙居紫極寧濟蒼生應須以欲從人不可以人從欲然則離宫逰幸此秦皇漢武之事非堯舜禹湯之所為也上喻之曰朕有氣疾熱便頓劇故非情好逰幸甚嘉卿意十一年二月九日幸洛陽至十二年二月五日還京十二月幸河北縣觀砥柱因令勒名於上以陳盛德明年十月幸蒲州刺史趙元楷課父老服黃紗罩衣迎謁路左盛飾廨宇修營樓雉欲以求媚又潛飼羊百餘口魚數千頭將饋貴戚上知而數之曰朕省河洛經厯數州凡有所須皆資官物卿飼羊養魚雕飾院宇此乃亡隋弊俗不可復行當識朕心改卿舊習十四年上欲幸同州校獵櫟陽縣丞劉仁軌上疏曰四時搜狩前王常典事有沿革未必因循今年甘雨應時秋稼甚盛盡力收穫月半猶未畢功貧家無力下禾始擬種麥直據尋常科喚田家已有所妨今既祗供頓事無乏修理橋道縱大簡略費一二萬而百姓收斂實為狼狽臣願陛下少留萬乘之尊垂聽芻蕘之説退延旬日收刈總了則人盡間暇家得康寧鑾駕徐動公私交泰上降璽書勞之十九年正月上征遼親率領六軍發洛陽至定州詔皇太子監國至幽州大饗軍士車馬渡遼圍遼東城破之以其城為遼州又進次安市城依山大戰虜其將帥因名所幸山為駐蹕山遂還命中書侍郎許敬宗為文刻石以記其迹敬宗曰聖人與天地合德山名駐蹕蓋天意也乘輿不復東矣初上將發諫議大夫禇遂良上疏曰臣遍求史籍訖於近代為人之主無伐遼者人臣往征則有之矣漢則楊僕魏代則毋邱儉王頎司馬懿猶為人臣慕容直僭號之子皆為其主長驅髙麗虜其人畜削城平基陛下立功同於天地美化包於古昔自當超邁百王豈止俯同六子陛下昔剪平冦逆大有爪牙年齒未衰尤堪任用惟陛下之所使亦何行而不克今太子新立年實幼少自餘藩屏陛下所知今一朝棄金湯之全渡遼海之外臣每三思煩愁並集特乞天慈一垂省察二十年正月幸晉祠樹碑製文二十一年九月太宗辟人從兩騎幸故未央宫遇一衛士佩刀失車馬駕至惶懼待罪太宗謂之曰所司之失非汝之罪今若付法當死者便數矣因赦去之永徽五年車駕幸萬年宫中夜山水暴至衝突玄武門宿衛者散走右領軍郎將薛仁貴曰安有天子一有急輒敢懼死遂登門桄呌喚以警宫內上遽出乘髙俄而水入寢殿上使謂仁貴曰賴卿得免淪溺始知有忠臣也至上元中召謂曰往九成宫遭水無卿已為魚矣顯慶二年閏正月十四日幸洛陽敕每事儉約道路不許修理是日微雨至灞橋御馬蹶御史中丞許圉師劾進馬官監門將軍斛斯政則罪合死刑請付法上曰馬有蹶失不可責人特原之三年十月十七日上因於古長安城逰覽問侍臣曰朕觀故城舊址宫室似與百姓雜居自秦漢已來幾代都此禮部尚書許敬宗對曰秦都咸陽郭邑連跨渭水故云渭水灌都以象天河至漢惠帝始築此城其後苻堅姚萇後周並都之上又問曰昆明池是漢武帝何年開敬宗對曰武帝遣使通西南夷為昆明國所蔽故因滈之舊澤以穿此池用習水戰元狩三年事也上因命檢秦漢已來厯代宫室處所以聞龍朔元年九月幸天宫寺以髙祖龍潛時舊宅故也麟德二年十月二十九日發東都赴東嶽十一月二十日至濮陽上問右丞相竇德玄曰濮陽爽塏信良邑也古謂之帝邱何也德玄不能對禮部尚書許敬宗策馬前曰臣能知之昔者顓頊實居此地以王天下其後昆吾氏因之至春秋時衛成公自楚邱徙居之既是顓頊所居故謂之帝邱爰在漢晉𨽻于京師臣聞有德者啓其國土失道則喪其疆宇自古名都美邑居之者不一姓故有國有家者不可不慎也上曰濟水與濟源斷絶不可屬何故然對曰禹貢導沇水東流為濟入于河自此潛流地下過河而南侵出為滎澤又潛流至曹濮之間散出平地漸合而東流為汶水自南注之古者五行皆有官守水官不失其職故辨其味與色潛流復出合而更分皆能識之尚書所載與今同矣上曰濟水細微而稱四瀆何也對曰爾雅云瀆者獨也言不因餘水能獨赴海故也且天有五星運而為四時地有五嶽流而為四瀆人有五事用而為四支五陽數也陽者光曜隂者晦昧故辰星潛伏而難見濟水潛流而數絶狀雖微細其實尊也上稱善敬宗退而告人曰大臣不可無學我以德玄不能對心實恥之德玄聞之曰人各有能有不能善守其拙不強其所不能我所能也英國公李績曰敬宗多聞信美矣德玄之言亦善也總章二年八月一日詔以十月幸涼州時隴右虛耗議者咸云車駕西巡不便上聞之召五品以上謂曰帝王五載一巡狩羣后四朝此蓋常禮朕暫欲幸涼州如聞在外咸謂非宜何也宰臣已下莫有對者祥刑大夫來公敏曰陛下巡幸涼州遐宣王略求之故實未虧令典但隨時度事臣下竊有所疑既是明制施行所以不敢塵黷奉敕故問敢不盡言近髙麗雖平扶餘尚梗兼西道經略兵革未停且隴右諸州人户猶少供億鸞駕擬備稍難臣聞在外實有竊議上曰卿等既有此言我止渡隴存問故老搜狩即還竟下詔停西幸無何擢公敏為黃門侍郎賞能直言也調露元年九月七日幸并州以度支郎中狄仁傑為知頓使并州長史李知玄以道出妒女祠俗云盛衣服過者必致風雨雷雹之災遂發數萬人别開御道仁傑曰天子之行千乘萬騎風伯清塵雨師灑道何患妒女之害遽令罷之上聞歎曰真大丈夫聖厯三年七月幸三陽宫有西僧邀駕看葬舍利上許之千乘萬騎咸次於野內使狄仁傑跪於馬前曰佛者夷狄之神君王天下之主當重闈難見居安慮危上路﨑嶇既為難衛庸僧詭惑何足據憑且君舉必書不可不慎上中路而還曰庶成吾直臣之氣也長安四年正月幸西涼洛陽縣尉楊齊哲上書諫曰臣聞古先哲后咸以為獨智不可以任已專欲不可以違衆所以樹板徴謗懸鼓納諫思聞過而從善全直言而沃心用能綱紀天下統成大業經曰無為而治者其舜也與夫何為哉安人之道貴於省事陛下以大定元年冬乃眷咸京長安三年冬還洛邑四年又將西幸聖躬得無窮於車輿乎士卒得無弊於暴露乎扈從僚屬俶裝而不濟隨駕商旅栖泊而匪寧東周之人咸懷嗟怨昔者周穆王欲周行天下使皆有車轍馬迹祭公謀父作祈招之詩以止王心陛下玉琯四周金輿三駕車轍馬迹雖未出於內都巡狩省方事不師於五載雷動天轉海運山移儼彼六龍嵗適千里此亦近於形民之力矣安人之道臣用有疑此邦父老抗表留駕陛下告以吐蕃和親為詞臣愚以為未得也况吐蕃蕞醜西隅咫尺自京到洛曾不崇朝陛下乃欲務其艱逺惠然從之夫千鈞之弩尚不為鼷鼠發機况萬乘之君輕為邊戎枉駕夫民至賤而不可簡至愚而不可欺經曰可畏非民是民不可欺也今陛下此言是欺下也使國史何以書之臣朽才淺學切為陛下籌之陛下今幸長安乃是背逸就勞破益為損何者神都帑藏儲粟積年充實淮海漕運日夕流衍地當六合之中人恱四方之會陛下居之國無橫費長安府庫及倉庶事空缺皆藉洛京轉輸價直非率户徴科其物盡官庫酬給公私糜耗蓋亦滋多陛下居之是國有橫費人疲重徭由此言之陛下之居長安也山東之財力日匱在洛邑關西百姓賦役靡加背逸就勞破益為損殷監不逺伏惟念之帝王敬授民時所重惟穀今陛下鑾輅以明年正月即塗嵗首是就耕之初駕行非務農之意無乃不可乎神龍二年十月十七日敕行幸每頓人宿兵及三衛並令伍伍相保其押官責名品明作文簿别送與金吾景龍二年十二月幸新豐溫湯回幸兵部尚書韋嗣立山莊封為逍遙公改鳳凰原為清虛原鸚鵡谷為幽棲谷四年五月上微行與后觀燈都邑因幸中書令蕭至忠宅令宫女數千人看燈多有逃逸其年四月又幸龍慶池泛舟宴侍臣開元五年正月十日幸東都右散騎常侍禇無量陳意見上表曰臣聞巡方問俗大化所先故帝舜巡狩望秩山川遍于羣神漢景帝巡狩祀黃帝於橋山章帝東巡祀帝堯於咸陽武帝巡狩望祀虞舜於九疑景帝幸甘泉郊泰畤幸河東祀后土髙祖過魏祀無忌之墓過趙封樂毅之後章帝巡狩至沛祀桓談之冢魏武祀喬玄之墓自古巡狩咸致享祀略而言之有如此者伏願陛下行幸所過之處有名山大川邱陵墳衍古之帝王及忠臣烈士備在祀典皆合致祭望令所管州縣據圖經具録先報又天子巡狩所至之處命太師陳詩以觀人好惡不敬不孝削地黜爵有加於人加秩進賞蓋慮夫州牧縣宰德化未敷下情不得上通故親問風俗臣又聞堯都平陽舜都蒲坂禹都安邑今河東地也誠以欽明文思光宅天下堯之道也明四目達四聰舜之德也奠山川定貢賦禹之功也雖其人已沒而其教克明陛下將幸東都仍從北路豈不觀覽聖迹想像遺風且人主行幸禮必有名請下制書曉示天下知取北路之意自古受命之君必興滅繼絶崇德報功故禮曰武王克殷未下車而封帝舜之後於陳下車而封大禹之後於把漢武帝過洛陽以周子南君封於周後漢髙祖撥亂日不暇給猶修祀六國成帝追蕭何曹參周勃靳歙夏侯嬰陳平張良等一百餘人皆復爵紹家傳之不絶周以蕃屏為約事在繼代漢以山川為誓義存長久臣又聞之存人之國大於救人之災立人之後重于封人之墓伏願駕到東都先崇繼絶唐初已來至于今日有功臣名相並加收敘其有正嫡已絶請傳支庶故殷朝繼及無廢近親周室興亡貴存身後繼髙密者纍葉豈専鄧禹之主胤嗣平陽者纍世何必曹參之嫡孫臣愚謂生有其功死非其罪者雖在黎庶並聽承襲臣所上事如堪收録伏願裁之及車駕至永寧縣崤谷馳道隘陋車騎停擁河南尹李朝隱知頓使户部侍郎王怡並失其部署上令黜之侍中宋璟奏曰陛下富於春秋方事巡狩一以墊隘致罪大臣恐將來人受艱弊于是遽命捨之璟拜謝曰陛下捨之是怨歸於上而恩出於下請且使待罪於朝然後詔復其職則進退得其度矣上深善之十一年正月二日發東都北巡二十五日至并兵部尚書張説進言曰太原是國家大業所起陛下宜因行幸振威曜武并建碑紀德以申永思之意若便入京路由河東有漢武脽上后土之祀此禮久闕厯代莫能行之願陛下紹斯墜典以為三農祈穀此誠萬姓之福也上從其言十二年十一月四日幸東都十日至華州命刺史徐知仁與信安王禕勒石於華嶽祠南之通衢上親制文及詩舊路在嶽北因是移于嶽南也至十三年七月七日碑成乃打本立架張于應天門以示百寮十三年十月十一日發東都赴東岱十三日至嘉會頓上校獵引諸番豪長入仗並與之弓箭供奉左右時有兔起於御馬前上引弓旁射獲之突厥朝命使阿史那德吉利發便下馬捧兔跳躍蹈舞謂譯者曰天可汗神武天上則有人世無也上因問飢不對曰仰觀聖代如此十日不食猶為飽也自是常令突厥入仗馳射起居舍人吕向上疏諫曰鴟梟不鳴未為瑞鳥猛虎雖服豈齊馴獸由其醜性毒行久務常積也夫突厥者正同此類今陛下收其頃效雜以從官赴封禪之禮參玉帛之會詔許侍逰召入禁仗賜以馳逐操弓乘馬飛簇於前同獲獸之樂儻此等各懷犬吠交肆盜憎荆卿詭動何羅竊至暫逼嚴蹕稍冒清塵縱單于為醢穹廬為汙何塞過責伏願勿復親近使有分限待不失常歸於得所孰不幸甚太子左庶子吳兢諫曰陛下緣自洛邑告禪岱宗行經數州屢以畋獵為事伏恐外荒之攸漸誠非致治之所急况登封告成禮容甚大伏願罷此畋逰之事充備文物之儀又貞觀時太宗文皇帝凡有巡幸則博選識達古今之士以在左右每至前代興亡之地皆問其所由用為鑒誡伏願陛下遵而行之則與夫騁奔馬於澗谷要狡獸于叢林不慎垂堂之危不思馭朽之變安可同年而較其優劣也二十年十月十日自東都幸太原至太行坂路隘見禆車問左右曰車中何物左右奏曰禮天子出則載禆車以從先王之制也上曰焉用此命焚之天子出從無禆車自此始也二十四年十月二十一日敕兩京行幸緣頓所須應出百姓者宜令每頓取官錢一百千又作本取利充仍令所由長官専勾當不得抑配百姓貞元三年十二月上獵於新店幸野人趙光竒家問曰百姓樂乎對曰不樂上曰仍嵗頗稔何不樂乎對曰蓋由陛下詔令不信於人所以然也前詔云於稅之外悉無他徭今非兩嵗稅而誅求者殆過之後詔云和糴於百姓曾不識一錢而強取之始云所糴粟麥納于近次今則遣致於京西破産奉役不能支也百姓愁苦如此何有於樂乎雖頻降恤民之詔而有司多不奉令亦恐陛下深在九重未之知也上感異之因詔除其家七年七月幸章敬寺賦詩曰招提邇皇邑復道連重城法筵會早秋駕言訪禪扃嘗聞大仙教清淨宗無生七珍匪吾寶萬行先求成名相既雙寂繁華奚所榮金風扇微涼逺煙凝翠晶松院靜苔色竹房深磬聲境幽真慮恬道勝外物輕意適本非悅含毫空復情百寮畢和亦書於壁其後京兆尹薛珏請以上詩序皇太子書刻於石而填之以金從之十二年四月左右千軍使奏云鑾駕去冬巡幸諸營於銀臺門外立石碑以紀聖迹可之其碑立於左掖門外髙二丈二尺元和十五年六月時以皇太后居興慶宫穆宗皇帝六宫待行回幸左神䇿軍賜物有差自後凡三百纍幸左神䇿軍及晨輝樓九仙望仙等門觀角抵諸戲其年七月幸安國門觀盂蘭會其年八月幸勤政樓問人疾苦九月幸魚藻池大張樂觀競渡十一月二十日將幸華清宫溫湯宰臣疏請罷行御史大夫李絳率百僚與常侍崔元略等又疏諫三請不從又伏延英門及暮方退二十一日上以天未辨色由復道而往即日還宫闕十二月幸右軍擊鞠遂畋于城西長慶二年十月上由復道幸咸陽止於善因佛寺賜僧錢百萬縣令絹百尺其年十一月太后幸華清宫石甕寺命景王率禁軍五百騎侍翌日上幸華清宫迎太后遂狩於驪山四年二月上初聽政羣臣展入閣之儀退朝幸飛龍廄寶厯二年二月將幸東都敕檢修東都已來舊行宫上自臨御以來常欲東幸宰臣等無不諫上意益堅常正色謂宰臣曰朕去意已定李逢吉頓首言曰陛下貴為天子富有四海天下一家何往不可臣等以為不可者以干戈未甚戢邊鄙未甚寧竊恐國人之心搖矣伏惟稍回聖慮天下幸甚上竟不聽百執事相繼獻疏亦不省會裴度自興元入朝因别對奏云國家建立都邑蓋備巡逰然自艱難已來此事遂絶今東都宫闕營壘廨宇悉已荒廢陛下必欲行幸須緩修葺上曰如卿言即不去亦得何止後期遂罷行計其年三月上幸魚藻宫觀競渡六月幸凝碧池觀魚太和四年八月幸梨園會昌殿觀新樂九年八月幸左軍龍首殿因幸梨園會含元殿大合樂開成元年三月幸龍首池觀內人賽雨因賦暮春喜雨詩曰風雲喜際會雷雨遂流滋薦幣虛陳禮動天實精思漸侵九夏日復在三春時霡霂垂朱闕飄颻入緑墀郊坰既沾足黍稷有豐期百辟同康樂萬方佇雍熙大中十一年正月車駕將幸華清宫時兩省官進狀論奏乃下詔曰朕以驪山近宫真聖廟貌聽政之暇或議一行蓋崇禮敬之心非以盤逰為事卿等援經據古列狀獻章深覩盡忠已允來請咸通十二年五月幸安國寺賜講經僧沈香髙坐唐會要卷二十七
