body:
  text: 唐㑹要卷六十七宋王溥撰東宫官太子太師太傅太保隋朝秩二品皇朝因之少師少傅少保顯慶元年正月十九日置初無員品選髙名重德者為之遂以韓瓊來濟許敬宗兼之開元中始編入令置四員建中四年九月二十五日又加兩員興元元年正月二十九日又加四員貞元四年正月一日勑宜留元額四員餘並勒停詹事府龍朔二年改端尹府咸亨元年復為詹事府光宅元年改為宫尹府神龍元年又改為詹事府詹事一人貞觀元年置龍朔二年改為端尹咸亨元年復舊天授中改為宫尹神龍元年復為詹事少詹事一人貞觀初置龍朔二年改少尹咸亨中復舊天授中又為少尹神龍中復故丞二人龍朔二年改為端尹丞咸亨中復故天授中又改為宫尹丞神龍元年復故司直二人顯慶元年置龍朔二年二月九日改𨽻桂坊後罷桂坊却𨽻詹事府貞觀十五年魏王泰移居武德殿院太子太師魏徵諫曰此殿在內處所寬閒參候往來極為近便但魏王既是愛子陛下常欲其安全每事抑其驕奢不處嫌疑之地今移此殿便在東宫之西海陵昔居時人以為不可雖時移事異猶恐人之多言又王之本心亦不安息既能以寵為懼伏願成其美十七年十一月二十八日誕皇太子太孫宴宫寮於𢎞教殿太宗幸東宫自殿北門入謂宫臣曰頃來生業稍可非乏酒食而唐突公等宴㑹朕有甲館之慶故就公為樂耳謂太子曰爾國之儲二府藏是同金玉綺羅不足為賜但先王典籍可鑑誡耳因賜尚書毛詩孝經各部太子太傅蕭瑀曰今所賜書請陳其要上許之瑀乃先說孝經次述尚書末敘毛詩咸舉其要㫖申明義趣可為深誡者皆委曲言之上大恱以為師傅得人開成二年宰臣鄭覃兼太子太師欲于尚書省上事太子詹事馮定奏曰據太子太師𨽻詹事府不合于都省上乃詔於本府上事左春坊本門下坊龍朔中改為左春坊咸亨中復為門下坊景雲二年八月二十五日改為左春坊左右庶子龍朔二年改為左右中護咸亨元年復為庶子長安二年正月太子左庶子王方慶上言謹按典籍所載人臣與人主言及上表未可稱皇太子名者為太子皇儲其名尊重不可指斥所以不言晉尚書僕射山濤啓事稱皇太子而不言名濤中朝名士必稽典故其不稱名應有憑准朝臣尚猶如此宫臣諱則不疑今東宫殿及門名皆有觸犯臨時諭啓回避甚難孝敬皇帝為太子改𢎞教門為崇教門沛王為太子改為崇賢館為崇文館皆避名諱以尊典禮此則成例並為範模伏望天恩因循舊式付所司改從之貞元元年七月勑左右庶子准天寶三年勑合在左右侍丞郎之下諸司四品官之上今在少卿之下非也宜改正太和四年十一月左庶子孫革奏當司典膳等五局郎伏以青宫列局護翼元良必用卿相子弟先擇文學端士國朝不忘慎選用得其人或揚厯清資或致位丞相今以年月既久漸至訛替緣其俸祿稍厚近年時有流外出身者僥求授任稽諸故事未嘗聞流外得厠此官若不約絶實玷流品當司有司經局校書正字品秩至卑而文學之人趨競者蓋以必取其人無有塵雜故也今五局郎資序本是清品若使流外不已則此司官屬漸成蕪蔓伏請自今以後吏部不得更注擬流外人其見任官中有流外者許臣具名牒吏部至注官日注替勑㫖宜依其見任官是流外出身授者待終考秩自今後吏部更不得注擬中允武德初為內允三年三月十日改中允又𨽻門下坊永徽三年八月二十日又避皇太子諱改為內允中舍人改為內舍人顯慶元年太子廢復為中允龍朔二年改為左贊善大夫咸亨中復改為中允司議郎貞觀十八年十月四日皇太子上表曰臣聞漢書曰太子既冠成人乃有紀過之史今所以冒敢陳聞請遵故實願付史職用為針誡於是門下坊置司議郎四員正六品上掌侍奉規諫駁正啓奏并録東宫記注分别坊事以敬播來濟為之馬周歎曰所恨資品妄髙不得厯居此職不無恨焉儀鳳四年五月皇太子賢頗邇聲色司議郎韋承慶上書諫曰臣聞太子者君之二國之本也所以承宗廟之重繫億兆之心萬國以正四海屬望況殿下有少陽之位有天挺之姿片善而天下必聞小能而天下咸服豈有不為盡善盡美之事以取可久可大之名哉伏願博覽羣書以廣其德屏退聲色以抑其情為上嗣之稱首奉聖人之洪業左右諭德龍朔二年置左右春坊各一人左右贊善大夫龍朔二年改中允為贊善大夫至咸亨元年復為中允儀鳳四年二月十一日别置左右贊善大夫各十員以授諸王之子景雲二年二月五日始兼用庶姓開元七年各省五員貞元十六年五月以山崔芉為右贊善大夫充太子侍直新名也司經局龍朔二年二月九日改為桂芳罷𨽻左春坊崇賢館仍置太子文學兩員司直三員咸亨中改為司經局仍依舊𨽻左春坊其崇賢館及司直並依舊洗馬龍朔元年改為司經大夫三年三月九日改為桂坊大夫咸亨元年復舊典設局武德令為濟司局典設郎為太子齊郎乾封元年皇太子久在內不出稀與宫臣接見典膳丞邢文偉减膳上啓曰竊見禮大戴記曰太子既冠成人免於保傅之嚴則有司過之史虧膳之宰史之義不得不書過不書則死之宰之義不得不徹膳不徹則死之近者已來未甚延約談議不接謁見尚稀三朝之後但與內人獨居何由發揮聖智使濬哲文明者乎今史雖闕官宰當奉職忝備所司不敢逃死謹守禮經遽申减膳其年右史員闕宰臣進擬數人上曰邢文偉嫌我兒不讀書不肯與肉喫此人甚正宜可為右史遂拜之右春坊武德初因隋舊號典書坊龍朔元年改為右春坊咸亨元年又改為典書坊景龍元年改為右春坊舍人龍朔中改為右司議咸亨元年復舊家令寺龍朔二年改為宫府寺家令為大夫咸亨元年復為家令寺率更令龍朔二年改為司更寺令為司更大夫咸亨元年改為率更令僕寺龍朔二年改為馭僕寺僕為馭僕大夫咸亨元年復舊太子千牛龍朔二年改為左右奉裕咸亨中復舊王府官武德令師一人景雲二年十一月十九日改為傅開元二年九月六日省已後復置檢年月未獲武德年令又有王國常侍郎舍人等官開元初定令並除之寶厯三年六月瓊王府長史裴簡永狀請與諸王共置王府一所伏見諸王府本在宣平坊東西角摧毁多年因循不修至元和十三年七月十三日莊宅使收管其年八月二十五日賣與邠寧節度使髙霞寓伏以在城百官皆有曹局惟王府寮吏獨無公署每聖恩除授無處禮上胥徒散居難於管轄遂使下吏因兹弛慢王官為衆所輕雖䝉列在官班皆為偷安散秩伏以府因王制官列府中府既不存官司虛設伏乞賜官宅一區俾諸府合而共局庶寮㑹而同處如此則人吏可令衙集案牘可見存亡都城無廢闕之曹道路息是非之論勑㫖宜賜延康坊閻令琬宅一所仍令所司檢計與量修改及逐要量約什物二年十月敕諸衛及率府王府等司應與厨飯朝官等自今已後每放寺觀行香及有期集宜令依廊下料各與飯一餐仍令所由與京兆府計㑹行香即就寺觀别有期集即於側近店舍並委京兆府據人數使取當處幕次床榻鐺釡供借如行香分在兩處以上准隨中書門下一處即勒廊下所由勾當他處即京兆府使與本料與勾當造食太和六年上以魯王永年漸長擇名儒為其府屬用戶部侍郎庾敬休兼王傅戶部郎中李踐方兼司馬太常少卿鄭肅兼長史明年魯王為太子以鄭肅嘗侍魯王言論典正復令為吏部侍郎兼太子賔客東宫授經既而太子母妃失寵上有廢斥意肅兼長史因召見深陳邦國大本君臣父子之意上改容嘉之然太子竟以得罪致仕官舊制年七十已上應致仕若齒力未衰亦聽釐務凡請致仕五品已上奏聞六品已下由尚書省録奏貞觀二年九月一日詔內外文武羣官年老致仕抗表去職者參朝之班宜在本品見任之上顯慶元年正月制文武官五品以上者及病不因罪解并五品已上散官以禮停任者聽同致仕開元五年十月十四日勑致仕官應飭令所由送至宅三品已上並聽朝朔望其年十一月勑致仕官子弟無京官者其在外者聽一人停官侍養六年五月二十四日勑曽任髙品官不緣貶責為卑品官者致仕身亡並聽同髙品例二十年正月七日制曽任五品已上清資官以理去職者所司具録名奏老病不堪釐務者與致仕官天寶九載三月二十三日勑如聞六品已下致仕官四載之後准各並停念其衰老必藉安存豈限其髙卑而恩有差降應五品下致仕官並終其餘年仍永為常式建中三年九月十二日勑致仕官所請半祿料及賜物等並宜從勑出日於本貫及寄住處州府支給至貞元四年四月二十三日致仕官給半祿料其朝㑹及朔望朝參並依式自今已後宜准此貞元四年四月以前左散騎常侍致仕丘為復舊官初為致仕還鄉特給祿俸之半既丁母喪蘇州疑所給請於觀察使韓滉以為授官致仕今不理務特給祿俸惠養老臣也不可以在喪為異命仍舊給之唯春秋二時羊酒之直則不給雖程式無文見稱斬衰及是為服除乃復之五年三月以太子少傅兼吏部尚書蕭昕為太子少師右武衛上將軍鮑防為工部尚書前太子詹事韋建為祕書監並致仕仍給半祿及賜帛其俸料悉絶上念舊老特命賜其半焉致仕官給半祿料自昕等始也九年八月以太子右庶子史館修撰孔述睿為太子賔客賜紫金魚袋致仕述睿年未七十以疾免纍表方許賜帛百匹衣一襲故事致仕還鄉不給公乘上寵儒者命給公乘遣之長慶三年四月勑尚書左丞孔戣可守禮部尚書致仕仍委所在長吏嵗時親自存問兼致羊酒如至都其芻米什器之類委河南尹量事供送務從優禮筋力未衰堅請休退故示優禮太和元年四月檢校右僕射兼太子少傅楊於陵以左僕射致仕特恩令全給俸料上疏云臣以年力衰退陳乞休間伏䝉聖恩特賜矜免授尚書左僕射致仕全給俸料者臣伏以朝廷致祿本為職勞衰病乞閒自宜家食而半給之俸近古所行義誠屬於優賢事亦兼於養老以臣慵耄猥當料程伏惟恩施以為過幸今若入踰常制重啓殊恩錫端寮之厚俸為朽質之私費循躬撫事情所不安招損害盈臣所深懼伏乞俯回聖眷再勑有司得從半祿之文斯乃殘年之幸勑批云卿早更委任每著聲猷纍聞告老之辭勉遂懸車之請故優廩祿示以寵勞謙光有終雖君子之貞吉當仁不讓亦先哲之格言宜體至懷即斷來表明日又固讓從之其年九月勑請致仕官近日不限品秩髙卑一例致仕酌法循舊頗越典章自今以後常參官五品外官四品者然後許致仕餘停三年四月右庶子致仕滕珦奏伏䝉天恩致仕今欲歸家鄉在浙東道途遙逺官參四品伏乞特給婺州已來牒庶使衰羸獲安光榮鄉里勑㫖滕珦致仕還鄉家貧路逺宜假公乘允其請自今後更有此比便為定例員外官員外官及試官等夫設官分職董事置吏得人則天下自理尚書猶云官不必備惟其人則員外官之設可知也員外及檢校試官斜封官皆神龍已後有之開元大革前事多已除去唯皇親戰功之外不復除授今則貶責者然後以員外官處之永徽五年八月蔣孝章除尚藥局奉御員外特置仍同正員員外官自此始也又顯慶五年五月授廖紹文檢校書郎員外置同員外又云員外官自此始朱知孰是也神龍元年五月三日敕內外員外官及檢校試官宜令本司長官奏聞飭取資厯請止舊人分判曹事自外並不在判事之限其長官副二官不在此限景龍二年長慶宜城定安新都咸安等公主及皇后陸氏妹郕國夫人馮氏妹崇國夫人并昭容上官氏與其沛國夫人鄭氏尚官柴氏賀婁氏女夫弟五英兒隴西夫人趙氏樹朋黨咸能降墨勑斜封以授官其年十月侍中蘇瓌上封事曰臣聞蕭何載其清淨歌以寧一漢文垂拱無為幾致刑措光武吏員並合務在省官此即省事清心實禆政要關輔菽粟非賤又戍役煩數州縣先有定科官寮祿俸不加公廨利賤更令分給員外若妻子不贍理即侵漁望請省員以救時弊委巡察使及州正員有犯咸殿勘問伏以所在員外資次相當簡公方清幹者使即替授訖申聞正員懼替不敢僣違員外希遷自能勵勗將停員外漸得省官酸棗縣尉袁楚客奏記於中書令魏元忠曰官者將以理人非以亂人將以利人非以害人今天下困窮海內衰耗伏以縣牧宰選授多不得人自餘寮佐鮮有稱職不務公謹專於割剝比之馬也必除其害牧况之羊也必去其亂羣此道尚有所關而更員外置員所謂助桀為虐適足以速禍也斯輩自知員外恐人之不畏必峻法以懼之恐財之不積必枉道以奪之以有限之物供無厭之用欲其不用豈可得哉古人有言曰十羊九牧羊既不得食人亦不得息書曰官不必備惟其人孔子譏管仲曰官事不攝焉得稱儉據此正員之官猶不欲其備况正員之外更置員外此則朝廷之失君侯不正誰正之哉中書侍郎蕭至忠上疏曰臣聞官爵者公器也恩幸者私惠也只可金帛富之梁肉食之以存私也若以公器為私用則公義不行而勞人解體以私惠而妨至公則私謁門開而正言路塞昔漢館陶公主為子求郎明帝謂曰郎官上應列宿茍非其人則人受其殃賜錢十萬而已此則至公之道不虧恩私之情無替當今列位已廣冗員倍之祈求無厭日月增數陛下降不資之澤近戚有無涯之請賣官利己鬻法循私臺寺之內朱紫盈滿官秩益輕恩賞不貴才者莫用用者不才二事相形十中有五故人不效力而官匪為人欲求其理實亦難遂伏願審量材識官無虗授私不害公情無撓法天下幸甚兵部尚書韋嗣立上疏曰設官分職量事置吏官得其人天下自理古者取人必先採鄉曲之譽然後辟于州郡州郡有聲然後辟於五府才著五府然後升之天朝此則用一人所擇者甚悉推一士所厯者甚深用得其才則理用非其才則亂理亂所繫焉可不深擇之哉今之取人有異此道多未甚試效則頓至遷擢夫趨競者人之常情僥幸者人之常態而今務進不辟僥幸者接踵比肩布於文武之列補授無限員闕不供遂至員外置官數倍正闕官署典史困於祗承府庫倉儲竭於資俸國家大事豈甚於此古者懸爵待士唯有才者得之若任以無才則有才之路塞賢人君子所以遁跡消名常懷歎恨也御史中丞盧懷慎上疏曰臣聞唐虞稽古建官惟百夏商官倍亦克用又此省官之義也又云官不必備惟其人又云無曠庶官天工人其代之此為官擇人之義也臣竊見今諸司員外官委積多者數十倍近古以來未之有也官不必備此則有餘人代天工多不釐務廣有除拜無所禆益俸祿之費嵗巨億萬空竭府藏而已豈致理之具哉方今倉庫空虛百姓凋弊儻炎旱成災租賦减入水衡無貫朽之蓄京庾闕流衍之儲陛下將何以濟之乎員外官中或簮裾雅望或臺閣舊人或明習憲章或諳嫻政要皆一時之良幹多不司案牘空尸祿俸滯其才而不展其用尊其位而不盡其力周稱多士漢曰得人豈其然與臣望請員外官中有才能器識衆共聞知堪為州牧縣宰以上者並請選擢使宣力四方中其智效若有老病及不堪釐務者咸從省廢使賢不肖較然殊貫此當今之切務也安可謂之難哉左臺殿中侍御史崔蒞太子中允薛紹諷上疏曰先朝所授斜封官恩命已布而姚元之宋璟等沮先帝之明歸怨陛下道路謗讟天下稱寃奈何與萬人為仇敵恐致非意之變上以為然乃下詔曰諸緣斜封别勑授官先令停任宜並量材敘用姚元之宋璟並先奏各賜物一百段監察御史栁澤諫曰竊見神龍以來羣邪作孽法網不提綱維大紊實由內寵專命外嬖擅權因貴憑寵賣官鬻爵朱紫之榮出於僕妾之口賞罰之用乖於章程之典妃主之門有同商賈選舉之署實均闤闠資販之子悉由邪而謬官黜斥之人咸因姦而冒進天下愈亂而社稷幾危賴陛下聰明神武拯之將墜此陛下耳目之所親擊故可永為鑒誡豈不為寵愛謬誤親習請謁之所致也又如斜封授官皆是僕妾汲引迷謬先帝昧自前朝豈是孝和情之所憐心之所愛陛下初即位之時納姚元之宋璟之計所以咸令黜退頃日以來又令收之將為斜封之人不忍棄也以為先帝之意不可違也若斜封之人不忍棄也是韋月將燕欽融之流亦不可褒贈也李多祚鄭克義之徒亦不可清雪也陛下何獨不能忍於彼使善惡不定反覆相攻是陛下政令不一也又斜封之官不求殊澤得免罪戾已沐恩私旬月之中頻繁降㫖前教令至冬處分後又令替人却停奈何導人以為非勸人以為僻將何以懲風俗將何以正姦邪今海內咸稱太平公主令西僧惠範曲引此輩將有誤於陛下故語曰姚宋為相邪不如正太平用事正不如邪陛下豈不懲覆車之誡而欲遵覆車之軌惟陛下熟思之開元元年五月三日敕諸色員外試檢校官除皇親及諸親五品以上并戰陳要籍內侍省已外一切總停至冬放選量狀跡書判正員官今以後戰功以外非别勑不得輒注擬員外官十九年正月十九日京兆尹裴胄先奏曰神州務劇官僚尤多更置員外試官於事頗為繁冗京縣近有此色天恩已令即停猶恐選曹更有注擬望請當府及京畿等縣自今以後一切不置員外試官二十二年二月十六日敕應員外官所司注擬上州不得過四人中州三人下州及上縣各二人中縣下縣各一人天寶六年六月二十四日御史中丞蕭諒奏近緣有勞人等兼授員外官多分判曹務頗多煩擾前件官伏望一切不許知事如正員官總闕其長官簡清幹者權判並本官到日停敕㫖依奏五載正月二十二日敕內外六品已下員外官至考滿日一切並停各依選例自今已後更不得注擬其皇親幼小及諸色承恩授官軍功伎術內侍者左右龍武軍並諸蕃官等不在此例乾元二年九月二十三日詔州縣員外並任其所適計考滿後各與成資仍於本色內减一兩選與留如員外官中有材識幹濟曾經任使州縣所資者亦量留每上州不得過五人中州不得過四人上縣不得過三人中縣已下不得過一人貞元四年正月一日敕自今已後額內官如有闕中書門下及吏部更不須注擬見任者三考後勒試及斜濫官天授二年二月十五日十道使舉人石艾縣令王山輝等六十一人並授拾遺補闕懷州録事參軍霍獻可等二十四人並授侍御史并州録事參軍徐昕等二十四人授著作郎內黃縣尉崔宣道等二十三人授衛佐校書蓋天后收人望也故當時諺曰補闕連車載拾遺平斗量杷推侍御史腕脫校書郎試官自此始也其年十二月懷州獲嘉縣主簿劉知幾上疏曰昔有唐御厯列職命官國多刓印之譏人有積薪之歎自陛下臨朝頓革此風然矯枉過正亦為己甚矣至如六品已下職事清官遂乃方之土芥比之沙礫其有行無聞於十室即厠朝流識不反于三隅俄登仕伍斯固比肩咸是舉目皆然罕聞翹楚之歌唯見伐檀之刺尸祿謬官其流非一若遂不加沙汰臣恐有穢皇風神龍元年四月一日太白山人鄭普思以方術除祕書監左拾遺李雍上疏諌曰蓋聞人有感一餐之惠殞七尺之軀况臣為陛下官受陛下祿豈得目有所見口不言之陛下親政日近復在九重所以未聞在外羣下竊議道路籍籍皆云普思多行詭惑妄說妖祥唯陛下不知尚見驅使此道若行必撓亂朝政孔子云詩三百一言以蔽之曰思無邪陛下若以普思有竒術可致長生久視之道則爽鳩氏久應得之永有天下非陛下今日可得而求若以普思可致佛法則漢明梁武久應得之永有天下亦非陛下今日可得而求若以普思即致鬼道墨翟干寶各獻於至尊而二王得之永有天下亦非陛下今日可得而求此皆是涉虛妄厯代無效臣愚不願陛下復行之明時唯堯舜二帝自古稱聖臣觀所行固在人事敦睦九族平章百姓不聞以鬼神之道聽理天下伏願陛下察之則天下幸甚其年六月又除方術人蔡靜能為國子祭酒侍中桓彥範上疏曰陛下自龍飛寶位遽下制云軍國政化皆依貞觀故事昔貞觀中嘗以魏徵虞世南顔師古為祕書監孔穎達為國子祭酒至於普思等是方伎庸流豈足比蹤前列臣恐物議陛下官不擇人濫以天秩加於私愛惟陛下少加慎擇左衛騎曹參軍宋務光上疏曰夫爵賞者君之重柄傳曰惟名與器不可以假人自頃官賞頗示乖謬大勳未滿於人聽髙秩已越於朝倫貪天之功以為己力祕書監鄭普思國子祭酒蔡靜能或挾小道以登朱紫或因淺術以取銀黃既虧國經實悖天道書曰制理於未亂保邦於未危此誠理亂安危之秋也伏願欽祖宗之丕烈暢王業之艱難逺佞人親有德乳保之母妃主之家以時接見無令媟瀆酸棗縣尉袁楚客奏記於中書令魏元忠曰以正道事君者將以安天下也以非道事君者所以危天下也君有危天下之臣不可不逐之今國子祭酒蔡靜能及祕書監鄭普思等不修忠正以事君妄引鬼神而惑主然鬼神之事冥冥難知故左道之人因此自致其詐上惑清聼必據非才之位必食非德之祿此國蠧也傳曰國之將興聽於人將亡聽於神非細故也此朝廷之失君侯不正誰正之哉太和七年七月敕入蕃使不得與私覿正員官告量别支給以充私覿舊例使絶域者許賣正員官告取資自給以備私覿雖優假逺使殊非法典故革之十二年六月詔以淮西河北用兵募人入粟受官及减選超資十五年二月敕其入回鶻使宜仍舊與私覿正員官十三員入吐蕃使與八員伎術官故事伎術官皆本司定送吏部附申謂祕書殿中太常左春坊太僕等伎術之官唯得本司選轉不得外敘若本司無缺聽授散官有缺先授若再經考滿者聽外敘神功元年十月三日謂自今已後本色出身解天文者進官不得過太史令音樂者不得過太樂鼓吹署令醫術者不得過尚藥奉御隂陽卜筮者不得過太卜令解造食者不得過司膳署令有從勳官品子流外國官參佐親品等出身者自今已後不得任京清要著望等官若纍階應至三品者不須階進每一階酬勳兩轉垂拱三年十二月二十五日敕三輔及四大都督并衝要當路及四萬户已上州市令并長安等六縣録事並宜省補充開元七年八月十五日敕出身非伎術而以能任伎術官者聽量與員外官其選敘考勞不須拘伎術例天寶十三年五月吏部奏准格伎術官各於當色本局署員外置不得同正員之數從之太和五年七月敕諸色藝能授官今後如有罪犯停職者委本日牒報吏部不在敘用限留守貞觀十七年太宗親征遼東令太子太傅房𤣥齡充京城留守詔曰公當蕭何之任朕無西顧之憂矣軍戎器械戰士糧廩並委卿處分發遣東都留守以蕭瑀為之咸亨二年正月七日髙宗幸洛陽以雍州長史李晦為西京留守猶謂曰關中之事一以付卿但委用武人不可以成官政令式之外有利於人者隨即行不須聞奏儀鳳元年十一月四日司農卿韋𢎞機為東都留守時有道士朱欽遂為中官所使至都所為橫恣𢎞機執而囚之奏曰道士假稱中官驅使依倚形勢臣恐虧損皇明為禍患之漸髙宗特發中官賜書慰諭仍曰不須漏泄垂拱三年文昌右丞相蘇良嗣為京留守時尚方監裴匪躬檢校京苑當春時將鬻苑中果菜以收其利良嗣駁之曰昔公儀相魯猶能拔葵去織未聞萬乘之主鬻其果菜以與下人爭利也神龍二年三月侍中蘇瓌充西京留守時祕書監鄭普思謀為妖逆雍岐二州妖黨大發瓌收普思繫獄考訊之普思妻第五氏以鬼道為韋庶人所寵居止禁中由是中宗將慰諭令瓌釋普思之罪瓌上言普思幻惑罪當不赦尚書左僕射魏元忠奏曰瓌長者其忠懇如此願陛下察之遂配流普思於嶺外開元十一年正月二十八日敕太原尹為留守少尹為留守七月五日敕三都留守兩京每月一日起居北都每季一起居並遣使行幸未有處其三都留守三日一起居暫出行幸發處留守亦准此遞表元和三年五月敕承前東都留守無防禦使名往因權宜遂有制置俾從省使以復舊章其東都畿汝州都防禦使及副使宜停所管將士六千七百三十八人數內見所管將士都防鎮及營苑中營田河隂陽翟偃師等縣鎮遏使共四千六百三十人委留守收管襄城葉縣鎮遏使共二千一百人委汝州防禦使收管其年七月復置東都留守防禦兵士七百人九年十月勑東都留守創立新軍所召將士切資精進要得府縣共詳簿書况分正副留守都惟舊典宜令河南尹裴次元以本官充東都副留守其月以尚書左丞吕元膺為檢校工部尚書充東都留守舊例留守必賜旗甲與方鎮略同及元膺受任竟無所賜朝論以東有冦虞特用元膺尤不當削其儀以沮威望諫官上疏援華汝壽三州例賜戎械居守之重固宜寵借上曰此數處並不當與其後遂皆停十年十二月東都防禦使吕元膺請募山河子弟以衛宫城東都西南聨鄧虢山谷曠逺多麋鹿猛獸人習射獵不務耕稼春夏以其族黨遷徙無常俗呼為山棚前留守權德輿知其可縻而用將請之㑹詔徵故元膺繼請焉長慶二年七月以前義成軍節度使陳楚為東都留守判尚書省事東畿汝州防禦使故事東都留守牛僧孺徵拜左僕射上令左軍副使王元直賫告身宣賜舊例留守入朝無中使賜詔例上特寵異之京兆尹義慶元年五月十五日改隋京兆郡為雍州以别駕領州事以韋讓為之貞觀二十三年七月三日改别駕為長史領州事以髙履行為之開元元年十二月三日改為京兆府稱西京長史以張暐為之少尹武德元年改隋京兆郡丞為治中以襄邑玉神符為之貞觀二十三年改為司馬以劉翁孺為之開元元年改為少尹以韋維為之本一員大足元年七月二十日加一員分左右司馬舊為左新為右以楊𢎞胄為之元年建寅月敕京尹府縣官多避諸司奏請避難就易殊非奉公自今後諸使諸司諸州改官充判官支使使身軀使等准舊敕不得放去廣德三年三月十一日敕中書門下及兩省五品已上諸王駙馬朞周已上親及女壻不得任京兆府判司畿令赤縣丞簿尉長慶三年閏十月中書門下奏伏以所立隄防止緣權要今一概防間事誠太過今後諸應宰臣左右僕射御史大夫中丞給事舍人左右丞諸司尚書侍郎度支與鹽鐡使在城者并諸王駙馬朞周已上親并女壻外甥請准前後勑不得在京兆府判司畿縣令赤縣簿尉其餘官不在此限之例大厯二年李勉為京兆尹宦官魚朝恩為觀軍容使仍知國子監事前尹黎幹求媚於朝恩每候其將至監則盛設供具酒饌豐潔為百人之餼傾府之吏以辦之及勉蒞職旬月朝恩入監府吏莫至先置者請於勉勉曰軍容使判國子監事勉候於太學軍容固宜具主禮勉官忝京兆尹軍容儻恩顧至府豈敢不飭蔬饌乎朝恩深銜之自是不復至太學貞元十四年夏旱穀貴人多流亡京兆尹韓臯以政事不理黜之上召右金吾衛大將軍吳湊面授京兆尹即日令視事經宿方下制逾月湊論奏掌內廏彍騎飛龍內園芙蓉園及禁軍諸司等使雜供手力資課太多量宜减省從之元和四年九月許孟容為京兆尹有左神䇿軍吏李昱假長安富人錢八千貫三嵗不償孟容遣吏收捕械繫剋日命還之且曰不及期當死自興元以後因禁軍有功軍士益橫府縣不能制孟容剛正不懼以法繩之一軍盡驚寃訴於上立命中使宣㫖令送本軍孟容繫之不遣中使再至乃執奏云臣誠知不奉詔當誅然臣職司輦轂合為陛下彈抑豪强錢未盡輸昱不可得上嘉其意乃許之自此權右斂跡十三年正月京兆少尹知府事崔元略奏諸司諸軍諸使追府縣人吏所由及百姓等比來府縣除賊盜外所有推勘公事相關者皆行公牒近日多不行文牒不有擒捉禁繫之後府縣方知其中人吏所由亦有姦猾為無憑據妄生推住又難辨明其百姓等所被追捕緣無公牒多加恐動致有逃匿今後望降敕㫖應請諸軍諸使要追府縣人吏百姓等非盜賊外並令行移文牒所冀官曹免相侵擾從之長慶元年七月敕節文京兆府百姓屬諸軍諸使者宜令其按名一戶之內除已屬諸軍諸使其餘父兄子弟據令式年幾合入色役者明立簿籍同百姓例差遣三年四月敕京兆尹兼御史大夫韓愈特放臺參以後不得為例時議以為憲司之臨府縣著自甲令茍害於理自當革之暫使一人不得為例深非立制垂久之道也開成二年崔珙為京兆尹京畿旱奏滻水入內者十分請减九分賜貧民溉田從之三年正月盜發親仁里欲殺宰相李石其賊出於禁中珙捕之不獲坐奪俸㑹昌三年五月京兆府奏兩坊市閒行不事家業黥刺身上屠宰猪狗酗酒鬬打及僦賣關節下脫錢物摴蒱賭錢人等伏乞今後如有犯者許臣追捉若是百姓當時處置如屬諸軍諸使禁司奏聞從之大中三年九月中書門下奏京兆府判司及兩縣簿尉帶諸司職事伏以列官分職各有司存茍或侵踰則乖彛憲近日判府司及兩縣簿尉多繫諸司職掌遂使額外假稱一人兼判數曹易為因循難以責辦臣等商量自今已後諸司職掌改集賢館𢎞文館並不得帶府判司及兩縣簿尉集賢館𢎞文館仍每司不得過一員見在諸司充職者請勒歸本司敕㫖依奏唐㑹要卷六十七
