body:
  text: 唐會要卷三宋王溥撰皇后宣皇帝皇后張氏諡宣獻咸亨五年八月十五日追諡光皇帝皇后賈氏諡光懿咸亨五年八月十五日追諡景皇帝皇后梁氏諡景烈咸亨五年八月十五日追諡元皇帝皇后獨孤氏諡元貞武德元年六月二十二日追諡髙祖皇后竇氏武德元年六月二十二日追諡穆皇后貞觀九年五月九日追尊太穆神皇后天寶八載六月十五日追尊太穆順聖皇后太宗皇后長孫氏武德九年八月二十一日立為皇后貞觀十年五月二十六日崩于立政殿年四十六諡曰文德皇后咸亨五年八月追諡文德聖后天寶八載六月加尊號文德順聖皇后髙宗皇后王氏永徽元年正月立為皇后六年十月十三日廢為庶人天后武氏貞觀十年文德皇后崩太宗聞武士彠女有才貌召入宫以為才人時上在東宫因入侍悅之太宗崩隨嬪御之例出家為尼感業寺上因忌日行香見之武氏泣上亦澘然時蕭良娣有寵王皇后惡之乃召入宫潛令長髮欲以間良娣之寵既入宫待之踰于良娣立為昭儀良娣王皇后協心謀之遞相譖毁上終不納俄誣王皇后與母桞氏求厭勝之術昭儀所生女暴卒又奏王皇后殺之上遂有廢立之意上從容言后無子以風長孫無忌無忌竟不順旨永徽五年中書舍人李義府上表請廢王皇后立昭儀以厭衆庶之心上悅謂李績曰立昭儀之事褚遂良固執不從遂良既是顧命大臣事不可當止也績遂密奏曰此事陛下家事何須更問外人許敬宗又言于朝曰田舍翁積得十斛麥尚欲換却舊老婦况天子富有四海立一皇后有何不可關諸人何事妄生異議上意乃定遂立為皇后顯慶五年十月已後上苦風眩表奏時令皇后詳決自此參預朝政幾三十年當時畏威稱為二聖咸亨五年八月十五日稱天后𢎞道元年十二月髙宗崩十二月皇太子即位尊為皇太后臨朝攝政載初元年九月九日即位改國號稱周賜帝姓武氏神龍元年正月二十三日傳位于中宗二十六日徙居上陽宫二十七日上尊號則天大聖皇后十二月二十六日崩于洛陽宣居殿年八十一諡曰大聖則天皇后國子司業崔融為哀册文二年五月二十八日祔葬乾陵唐隆元年七月七日依舊為皇后景雲元年十月十八日改為大聖天祐延和元年六月十七日又改為天后其年八月五日改為聖后開元四年十二月改為則天后天寶八載六月十五日追尊號則天順聖皇后年號二十嗣聖二年二月七日改為文明文明元年九月五日改為光宅光宅二年正月一日改為垂拱垂拱五年正月一日改為永昌永昌五年十一月一日改為載初載初元年九月九日稱周改為天授天授三年四月四日改為如意如意元年九月九日改為長壽長壽三年五月十日改為延載延載二年三月一日改為證聖證聖元年九月二十九日改為天册萬歲天册萬歲二年臘月改為萬歲登封萬歲登封元年四月一日改為萬歲通天萬歲通天二年九月九日改為神功神功二年正月一口改為聖厯聖厯三年五月五日改為久視久視二年正月五日改為大足大足元年十月二十三日改為長安長安五年正月一日改為神龍宰相七十四人劉仁範薛元超裴炎岑長倩郭待舉魏玄同劉齊賢韋𢎞敏胡元範王德真劉褘之武承嗣騫味道崔察李景諶韋方質沈諒裴居道韋思謙蘇良嗣韋待價張光輔王本立范履冰邢文偉武攸寧傅逰藝史務滋宗秦客格武樂思誨任知古歐陽通裴行本狄仁傑楊執柔李逰道袁𢎞智崔神基崔元綜李紹德姚壽李元素王璿婁師德韋巨源陸元方豆盧欽望蘇味道王孝傑武士方楊再思杜景倫周允元孫元亨李道廣王方慶王及善宗楚客武三思吉頊李嶠張錫韋安石李懷道顧琮李迥秀朱敬則唐休璟韋嗣立崔玄暐張柬之房融韋承慶中宗皇后趙氏天寶八載六月十五日追尊思和皇后皇后初為英王妃母常樂公主得罪妃坐廢幽死于內侍省中宗崩將葬于定陵莫知瘞所將行招魂附葬之禮太常博士彭景曰招魂葬禮非古不可備棺椁置輼輬宜據漢書郊祀志葬黃帝衣冠于橋山遂以皇后褘衣于陵寢行宫招魂置衣魂輿以太牢告祭遷衣于玄宫御榻之右覆以夷衾焉皇后韋氏神龍元年十二月十二日立為皇后十一月二日尊為順天皇后三年八月十五日加順天翼聖皇后唐隆元年六月二十日降為庶人初神龍元年十二月侍中桓彥範上表曰昔孔子論詩關雎為始言后妃者人倫之本理亂之端也故皇英降而虞道興任姒歸而周宗盛桀奔南巢禍階末喜魯桓滅國惑以齊媛伏見陛下每臨朝聽政皇后必施帷幔坐于殿上得聞政事愚歷選列辟求詳往代帝王有與婦人謀及政者莫不破國亡身傾輈繼路且以隂乘陽違天也以婦凌夫違人也違天不祥違人不義由是古人譬以牝雞司晨惟家之索易曰無攸遂在中饋言婦人不得親于國政也伏願鑒古人之言察古人之意上以社稷為重下以蒼生為念宜令皇后無往正殿干及外朝專在中宫聿修隂教則坤儀式固鼎命維新睿宗皇后劉氏唐隆元年六月二十八日贈皇后景雲二年二月二十三日追諡肅明皇后天寶八載六月十五日追尊肅明順聖皇后皇后竇氏唐隆元年贈皇后景雲二年追諡昭成天寶八載追加昭成順聖皇后贈諡日月並與肅明皇后同玄宗皇后王氏長壽二年納為妃先天元年八月二十日立為皇后開元十二年七月二十一日廢為庶人皇后楊氏至德二年六月二十四日追尊皇后諡曰元獻立廟于太廟之西四時薦享皆凖太廟一室之儀至寶應二年四月遷神主于太廟祔玄宗室皇后武氏恆安王攸止女攸止卒後后尚幼隨例入宫及王皇后廢賜號惠妃宫中禮秩一同皇后開元二十五年十二月七日薨年四十贈皇后諡曰貞順仍立廟于京師昊天觀之角乾元之後享祀仍停初十四年四月侍御史潘好禮聞上欲以惠妃為皇后進疏諫曰臣嘗聞禮記曰父母之讎不共戴天公羊傳曰子不復父讎不子也昔齊襄公復九世之讎丁蘭報木母之恩春秋美其義漢史稱其孝陛下既不以齊襄為法丁蘭為戒豈得欲以武氏為國母當何以見天下之人乎不亦取笑于天下乎非止虧損禮經實恐汚辱名教又惠妃再從叔三思從父延秀等並干朝綱亂常遞窺神器豺狼同穴梟獍同林至如惡木垂隂志士不息盜泉飛波貞夫莫飲良有旨哉且匹夫匹婦欲結夫妻者尚相揀擇况陛下是纍聖之貴天子之尊乎伏願陛下詳察古今鑒戒成敗慎擇華族之女必在禮義之家稱神祇之心允億兆之望為國大計其在于兹且惠妃本是左右執巾幗者也不當參立之春秋書宋人夏父之會無以妾為夫人齊桓公誓命于葵丘亦曰無以妾為妻此則夫子恐開窺競之端深明嫡庶之别又漢成帝欲立趙氏為皇后劉輔極言漢桓帝欲立亳氏于中宫李雲切諫又見人間盛言尚書左丞相張説自被停知政事之後每諂附惠妃誘蕩上心欲取立后之功更圖入相之計伏願杜之于將漸不可悔之于已成且太子本非惠妃所生惠妃復自有子若惠妃一登宸極則儲位實恐不安皇太子既守器承祧為萬國之主本何可輕易輒有搖動古人所以見其漸者良以是也昔漢髙祖以戚夫人之故將易太子之位時有商山四皓雖不食漢庭之祿尚能輔翼太子况臣愚昧職參憲府慷慨關心感激懷憤陛下留神省察蘇冕駮曰此表非潘好禮所作且好禮先天元年為侍御史開元十二年為溫州刺史致仕表是十四年獻而云職參憲府若題年恐錯即武惠妃先天元年始年十四王皇后有寵未衰張説又未為右丞相竟未知此表是誰獻之肅宗皇后吳氏寶應元年五月十九日追尊皇后諡曰章敬皇后張氏至德二年十二月十五日良娣張氏册為淑妃乾元元年三月六日立為皇后寶應元年有罪幽死别所代宗皇后獨孤氏大厯十年追尊曰貞懿皇后十月十六日忌皇后沈氏開元末選入宫天寶末以祿山犯闕玄宗西狩棄妃故為賊所得拘于東都之掖庭代宗收東都見之留宫中及史思明再犯河洛遂失所在十餘年求之不得至德宗即位建中元年八月追尊為皇太后遂以睦王述為奉迎皇太后使工部尚書喬琳為副升平公主宜備起居候知行在即嚴扈法駕奉迎至二年二月羣臣以皇太后問至稱賀既而謬焉四方詐稱太后者數四至永貞元年九月禮儀使奏太皇太后沈氏厭代登真于今二十有七年大行孝皇帝至孝惟深哀思罔極建中初已發明詔舟車所至靡不周遍歲月滋深迎訪理絶謹按晉庾蔚之議云尋求三年之外又俟中壽而服之今參詳禮經博稽故事伏請以大行皇帝啓攢宫日皇帝百官舉哀于肅章門內之正殿先令有司造褘衣一副發哀日令內官以褘衣置于幄坐自後令宫人朝夕上食先告元陵次告宗廟上太皇太后諡册次造神主擇日祔代宗廟其褘衣奉法駕奉遷于元陵祠殿置于代宗皇帝衮衣之右便以今年十一月二日發哀為忌追册曰睿真皇后從之德宗皇后王氏貞元二年十一月册為皇后其月二十一日忌三年正月上尊諡曰昭德皇后其諡册文初令兵部侍郎李紓撰上以紓謂皇后為大行皇后非也詔學士吳通玄又云咨后王氏亦非也按貞觀中岑文本撰文德皇后諡册文曰皇后長孫氏斯得之矣其年二月皇后發引梓宫進辭太廟于永安門升顯輬車于安福門從隂陽之吉也三月以皇后廟樂章九首付有司令議廟舞之號禮官請號坤元之舞從之其樂章初令宰臣張延賞桞渾等撰及進留中不下又命翰林學士吳通玄為之時上務簡約不立廟令于陵所祠殿奉安神主三年正月十八日太常博士李吉甫奏曰準國朝故事昭成皇后肅明皇后元獻皇后並置别廟若于大行皇帝陵所祠殿奉安神主禮經典故檢討無文伏以元獻皇后廟在太社之西今請修葺以為大行皇后别廟敕旨宜依仍付所司至三年二月二十七日翰林待詔楊季炎等奏奉進止宜于兩儀殿虞祭畢擇日祔廟準經勘擇用三月十八日一時兩儀靈座便請除之詔下太常詳求典故太常卿董晉與博士李吉甫張薦等奏曰伏惟古禮合用今年七月卒哭祔廟國朝故事髙祖六月而葬睿宗十月而葬並葬訖便卒哭祔廟聖朝典故伏請遵仍令所司于今月十八日已前擇卒哭位哭訖以十八日祔廟制曰可順宗皇后王氏永貞元年八月册為皇后元和元年五月册為皇太后十一年三月四日忌憲宗皇后郭氏元和五年閏正月册為皇太后大中二年五月二十一日忌其年七月上尊諡曰懿安皇太后皇后鄭氏會昌六年四月上尊號曰皇太后大中元年上尊號曰孝明皇太后穆宗皇后王氏長慶四年二月册為皇太后會昌四年正月十二日忌五年四月上尊諡曰恭懿僖皇太后皇后蕭氏寶應三年三月册為皇太后大中元年四月十五日忌其年八月上尊諡曰正獻皇太后武宗母也敬宗皇后史闕文宗皇后史闕武宗皇后鄭氏宣宗皇后朝氏大中十三年九月上尊諡曰元昭皇太后懿宗皇后王氏咸通十四年八月册為惠安太后文德元年四月上尊諡曰恭獻皇太后僖宗皇后史闕昭宗皇后何氏光化元年四月册為皇后天祐元年册為皇太后居積善宫天祐二年十二月為梁王密遣人所害雜録開元四年正月大理少卿李衢奏奉進止令修皇后譜牒事伏請降明敕奉敕宜依仍令户部量事供其紙筆貞元二年十二月有司以皇后在殯請禁公私聲樂詔曰大行皇后喪民庶之間並以除服緣情制禮須使合宜其太常權停教習京城及諸府任舉樂音三年正月詔中書門下兩省及常參官各宜撰大行皇后挽歌詞三首其月詔內外諸親設祭于大行皇后並不假飾花果已後公私集會並宜凖此初皇后母郕國夫人鄭氏等請設祭可之自是宗室諸親及李晟渾瑊神策六軍大將皆請設祭自啓攢宫後日有數祭至于將遷座乃止元和十一年三月順宗皇后王氏崩于南內之咸寧殿諡曰莊憲初太常少卿韋勳進諡議公卿署定欲告天地宗廟禮院奏議曰謹按曾子問賤不誄貴幼不誄長禮也古者天子稱天以誄之皇后之諡則讀于廟江都集引白虎通曰皇后何以諡之諡之于廟又曰皇后無外事無為于郊傳曰故雖天子必有尊也凖禮賤不得誄貴子不得爵父母所以必諡于廟者諡宜受成于宗廟故天子諡成于郊皇后諡成于廟今請凖禮集百官連署諡狀訖讀于太廟然後上諡于兩儀殿既符其事允合禮經從之其年四月西川節度使李儀簡遣使往南詔告皇太后哀凡天子之喪嗣天子以卿大夫告于四夷太后皇后之喪則方鎮告之故事也時以太后崩不聽政欲凖故事冢宰以總百官宰相禮儀裴度獻議曰冢宰是殷周六官之首既掌邦禮實統百司故王者諒隂百官權聽之制後代設官既無此號不可虛設且國朝故事或置或否古今異制不必因循其諸司公事望請中書門下處分者從之其年七月禮儀使奏自秦漢以來天子之后稱皇后母稱皇太后祖母稱太皇太后加太字者所以加尊稱也國朝典禮皆稱舊制開成六年正月太常奏昭成皇太后諡號已牒禮部禮部以太字非之太常報曰入廟稱后義係于天在廟稱太后義係于祖並載在史策垂之不朽今百司文牒及奏狀參詳典故恐不合除太字如諡册入陵神主入廟即當去之奏可十五年五月莊憲皇太后弟故左金吾衛大將軍王用妻胡氏進狀云請用姑莊憲皇太后蔭補千牛申中書門下稱準格無條伏見貞元中沈翬用姑睿真皇太后蔭元和中妾弟二男浩亦用皇太后蔭伏乞天恩允妾所奏可之仍入格令天祐元年九月册昭宗皇后何氏為皇太后中書門下奏請太后宫請以積善為名從之內職舊制皇后之下有貴妃淑妃德妃賢妃各一人為夫人正一品昭儀昭容昭媛修儀修容修媛充儀充容充媛各一人為九嬪正二品婕妤九人正三品美人九人正四品才人九人正五品寶林二十七人正六品御女二十七人正七品采女二十七人正八品以備周禮六宫之數其外又有尚宫尚儀尚服尚食尚寢尚功分掌宫中服御藥膳之事宫正糾愆失彤史紀功書過龍朔二年改易官名置贊德二人正一品以代夫人宣儀四人正二品以代九嬪丞門五人正四品以代美人承旨五人正五品以代才人衛仙六人正六品以代寶林供奉八人正七品以代御女持節二十人正八品以代采女又置侍中三十人正九品咸亨二年復舊髙祖太宗黜隋之亂政未下車而大放宫女正位配尊惟其舊髙祖之職備員而已所謂刑于內以正乎外及髙宗永徽之後政出宫中公卿大夫罔不憚服其取威也多山陵未畢而冢嗣再廢遂掘翦王室改立宗社非一朝一夕之故其所由來漸矣及中宗追王韋氏崇寵三思使以先闕事尊訪之于是慶雲之瑞宣于朝廷桑女之歌布于天下防間之道大壞亂逆之謀預召矣卒以禍敗為後王誡懿宗淑妃郭氏生同昌公主帝在藩邸常經重疾妃侍醫藥見黃龍出入臥內既間妃以異告帝曰慎勿言之貴必不相忘婕妤崔氏王氏雜録貞觀十三年二月二十五日尚書八座議曰謹按王者正位作為人極朝有公卿之列室有嬪御之序內政修而家理外教和而國安爰自周代洎乎漢室名號損益時或不同然皆寤寐賢才博採淑令非唯德洽宫壼抑亦慶流邦國近代以降情溺私寵掖庭之選有乖故實或微賤之族禮訓蔑聞或刑戮之家怨憤充積而濫叨名級入侍宫闈即事而言竊未為得臣等伏請今日以後後宫及東宫內職員有闕者皆選有才行充之若內無其人則旁求于外采擇良家以禮聘納永徽六年十月武后未立上特號為宸妃侍中韓瑗中書令來濟奏言帝王嬪妃自有恆數今若别立妃號臣等竊以為不可乃止貞元六年七月九日太常卿崔縱奏謹按司封令及六典王母為太妃髙祖宇文昭儀生韓王元嘉後為韓國太妃太宗燕妃生越王貞後為越國太妃今諸王母未有封號請遵典故其月吏部郎中桞冕者狀稱歷代故事及六典無公主母稱號臣謹約文比義公主母既因公主而貴伏請降于王母一等命為太儀各以公主本封加太儀之上旨依元和四年德宗皇帝妃韋氏卒廢朝三日妃祖濯尚中宗女定安公主官至衛尉少卿父會昌中為義王駙馬妃少入宫性敏順善于承奉德宗重之遂册為妃六宫服其德崇陵復土畢于園寢終三年之制至是卒寶應元年四月禮院奏贈梁國夫人尚宫宋氏葬奉敕令所司供鹵簿凖故事只合給儀仗詔以鼓吹賜之宋氏姊妹五人皆有文學貞元中澤潞節度使李抱真貢至闕下德宗召入宫試兼問經史文義深加賞歎自後皇太子及諸王公主等多從受學姊妹中尚宫尤通達人事自憲宗穆宗呼為先生其名實根本具在憲宗實録其年七月敕殿中上奉御郭環曾祖故陳州刺史崇可封工部尚書曾祖母唐氏贈晉昌郡夫人祖母李氏可贈隴西郡夫人父右威衛將軍義可贈禮部尚書以姊妹才人有寵故也未為妃后一旦褒贈榮及祖禰前例無之天祐二年九月六日內出宣旨乳母楊氏可賜號昭儀乳母王氏可封郡夫人第二乳母先帝已封郡夫人可凖楊氏例改封中書奏議言乳母古無封夫人賜內職之例近代因循殊乖典故昔漢順帝以乳母宋氏為山陽君安帝乳母王聖曰野王君當時朝議猶或非之唯中宗封乳母于氏為平恩郡夫人尚食髙氏為蓚國夫人今國祚中興禮儀革舊臣等商量楊氏望賜號安聖君王氏福聖君第二王氏康聖君從之其年十二月敕宫嬪女職本備內任近年以來稍失禮儀今後每遇延英坐朝日只令小黃門祗候引從宫人不得擅出內出宫人武德九年八月十八日詔王者內職取象天宫上備列宿之序下供掃除之役肇自古昔具有節文宋代奢淫搜算無度朕顧省宫掖其數實多憫兹深閉久離親族一時減去各從娶聘自是中宫前後所出計三千餘人貞觀二年春三月中書舍人李百藥上封事曰自陛下受命已來昭示天下薄賦輕徭恤刑慎獄躬行節儉減損服御雖堯舜德音無以過此然隂氣鬱積亦恐是旱之咎徴往年雖出宫人未為盡善竊聞大安宫及掖庭內無用宫人動有數萬衣食之費固自倍多幽閉之寃足感和氣亢陽為害亦或由兹至七月三日上謂侍臣曰婦人幽閉深宫情實可愍隋氏末年求采無已此皆竭人力朕所不取且灑掃之餘更何所用今將出之任求伉儷非獨以省費息人亦各得遂其性於是命尚書右丞戴胄給事中杜正倫等于掖庭西門簡出之開元二年八月十日詔曰古者三夫人九嬪二十七世婦八十一御女以備內職焉朕恭膺大寶頗修舊號而六宫曠位未副于周禮八月算人不行于漢法至于薑后進諫永巷脫簪袁盎有言上林引席此則朕之所慕未曾忘也頃者人頗喧譁聞于道路以為朕求聲色選備掖庭豈余志之未孚何斯言之妄作往緣太平公主選人入宫朕以事雖順從未能拒抑見不賢莫若自省欲正謗莫若自修改更而張損之可也妃嬪已下朕當揀擇使還其家宜令所司將車牛今月十二日赴崇明門待進止大厯十四年五月出宫人數百人貞元二十一年三月出後宫人三百人其月又出後宫及教坊女妓六百人聽其親戚迎于九仙門百姓莫不叫呼大喜元和八年六月出宫人二百任其嫁配十年十二月出宫人七十人長慶四年二月敕先在掖庭宫人及逆人家口并配內園者並放出外任其所適其月赦文宫中老年及殘疾不任使役并有父母者並委所司選擇放出寶厯二年十二月敕在內宫人宜放三千人願嫁及歸近親並從所便不須尋問開成三年二月文宗以旱出宫人劉好奴等五百餘人送兩街寺觀任歸親戚翌日因對紫宸宰相李珏曰陛下放宫女數多德邁千古漢制八月算人晉武平吳亦多採擇仲尼所謂未見好德如好色者宰相鄭覃曰昔晉武以採擇之失中原由此解體千古可為殷鑒矣唐會要卷三
