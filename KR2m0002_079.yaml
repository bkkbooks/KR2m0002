body:
  text: 唐會要卷七十九宋王溥撰諸使下諸使雜録太和二年六月中書門下奏諸道觀察等使奏請供奉官及見任郎官御史充幕府貞元長慶己有敕文近見因循多不守舊酌時議禮事在變通如或統帥専征特恩開幕戎府初建軍幄籍才事關殊私别聼進止此外一切請準前後敕文處分敕旨宜依三年七月敕諸道進奏官等舊例多是本道差文武職掌官充自後遂有奏帶正官者近日又有請兼檢校官及憲官者遞相援引轉無章程自今以後更有奏請帶正官不得兼檢校官及憲官如凖諸道諸使職掌官例諸檢校官及兼憲官充則不得帶正員官其見在進奏官己有檢校官兼憲官者且聼仍舊至改轉時商量處分其年十二月中書門下奏伏準五月八日敕節文諸道諸使奏判官所奏雖官資相當並請限曽任正官經六考以上者比擬監察侍御史九考以上者與比擬殿中侍御史以上節級各加三考如曽諸色登科超資役官者不得在此限所奏憲官特置考限今防僥幸深合至公然節文之中或有未盡臣等再商量如京六品以上清資官并兩府判官及進士出身平判入等諸色登科任官又不在此限其在使府及監察已上者亦任凖元和七年八月二十二日敕節文依月限處分餘望準前敕施行依奏四年四月中書門下奏自元年以來頻有計代諸道薦送軍將其數漸多臣等商量應諸道軍將官至常侍大夫職兼知兵馬使都押衙功績顯著本道官職可奬者即任薦送其餘官職未髙才能可録所在軍鎮合驅使自今後軍官未至常侍及職兼都虞候都知兵馬使都押衙者不在薦送限但仰本道節使看其功績顯著與改轉職已至髙者檢校官兼官宜與奏改如有功績殊尤合不次超擢者即任别具事迹聞奏亦不在便薦送限又應諸方鎮或因移易停罷其使隨元從軍將只合本道量才驅使不情願住者一任東西不合更來朝廷别求僥幸敕旨依奏其年五月敕置疏決囚徒使以清強御史二人為之應京城諸司見禁囚徒宜令疏決處分具輕重聞奏其月敕西都兩京兆惟管一郡分置兼屬本因艱難若四方少事則舊制為便其都防禦觀察使額宜停所管兵馬使屬本州防禦使五年十月敕樓煩監收及造水等使宜共置判官一員巡官一員六年十二月敕隴州防禦使宜凖長慶二年九月十八日敕例置判官一員其兵馬留後判官勒停九月五日中書門下奏準太和七年七月十四日敕諸道進奏官令揀擇清慎人充非因過犯不得停罷如方鎮自要腹心委寄任於本道差見任官充又準太和元年九月十九日敕不許授别官今日以後並請凖元和敕處分如邊上無俸料處只得授近處官亦不得占江淮好闕其新進奏官仍須守職二年復無敗闕方得奏官敕旨依奏其年十二月左僕射合諸道奏諸節使新授具袙襪帶器仗省中參辭兵部尚書侍郎者伏以軍國異容古今定制苟不由舊是謂改常未聞省閣之門許入弓刀之器伏請停罷如須參謝任具公服到本縣交割兵馬指實申奏從之開成元年十一月中書門下奏準太和十一年七月二十六日敕諸道節度使下都押衙都虞候約五年以上方得改轉押衙兵馬使約七年以上方得改轉三萬人以上軍兵每年許奏四人其序遷合與憲官者以曽厯兩任奏授賔詹者與監察以次遷序止於侍御史其御史中丞以上官並須因戰功方得奏請諸道團練下萬人以上軍所奏不得過殿中侍御史如未有憲官者不在奏限萬人以下軍因戰功並不得奏論請敕旨依奏二年十二月中書門下奏諸道節度使觀察都團練使請朝官任使凖貞元二年敕中書門下有供奉官及尚書省御史臺見任郎官御史諸司諸使並不得奏請任使伏以周之列國咸有命卿漢代諸侯皆建傅相蓋以崇重五爵施之寵榮賈生為傅於長沙管仲讓王之上禮出其廷彥且命為卿經史垂文古制斯在况貞元之時戒慎之事比於今日頗謂不同聖朝授任惟公賢才是急實惟上介悉欲文行命職稍重而有才人涉厯練達武經出入往來便堪奬用是朝廷之所利誠方鎮之得人希古濟今匪宜專執酌於臨事可否在兹臣等商量諸節度觀察都團練使朝中素有相知者許奏一人軍副使章服凖太和三年五月八日敕如素無相知不奏亦聼其方鎮帶相及自廟堂平章事出鎮者任約舊例奏署庶使藩方益重委任程才其今日以前應奏署敕己行者雖關前敕人數至少或遵成命難又追移請自此已後不得違越敕旨依奏三年四月中書門下奏宰相帶平章事出鎮應朝官充使府職事任約舊例署庶使藩方益重委任程才謹詳敕文意在明許亦不定言人數及所請職名臣等商量起今以後宰相自朝廷出鎮奏請朝官及刺史佐幕前後更五人數內有遷轉停罷者或須填替任奏來如或辟用他官不奏亦得官至侍御史以上者即許奏章服便為例庶可通行敕旨依奏四年六月中書門下奏諸道節度使𠫭佐自副使至巡官共七員觀察使從事又在數內雖大藩雄鎮有藉才能而邉部遐方豈易供給况行軍之號本繫出師𠫭謀之職尤是冗長其行軍司馬及恭謀望勒停省見任人如本道有相當職員任奏請改轉其餘官序稍髙者許隨表赴京到日量才奬用侍御史下各合舉薦節度判官舊額雖有兩員近日請諸道亦不盡置起今已後望以一員為定其課料等本是供軍數內户部不可更支敕旨依奏七月敕諸道闕入仕人數轉多每年吏曹注擬無闕唯河北諸道河東澤潞劍南三川京兆西員官數多假攝之中實有勞效每年許奏三兩人仍須是元額闕不得替見任人其餘並不得奏入會昌三年四月敕諸道節度使觀察使以後發期悉不得過七日其年五月敕比來節將移改隨從將校過多非惟妨奪舊人職員兼亦費用軍資錢物節度使移鎮軍將至隨身不過六十人觀察使四十人經略都護等三十人宜委監察軍使及知留後判官具名奏如違此數知留後判官量加懲罰監軍使别有處分自今以後節度使等如罷鎮赴闕應將官吏將健隨赴上都者並隨使停解縱有帶憲官充職亦勒停其間或有是功勳重臣舊將校人數稍多者離鎮後已停解即須具人數聞奏當與量事宜處分四年二月御史臺奏凖會昌三年十一月十三日敕諸道奏官或有一人兼知四五道奏進兼並貨殖頗是幸門因緣交通為弊日甚向後兼知不得過兩道以上者各委本道差替聞奏仍委臺司檢勘並已各牒本道凖敕差替訖竊慮改名補職不離一家原是本身虛立名姓伏請從今以後如知兩道奏進外一家之內父子兄弟更不得知諸道奏進如有違犯臺司凖前察防敕旨依奏五年六月敕諸道所奏幕府及州縣官近日多預鄉貢進士奏請此事已曽釐革不合因循且無出身何名入仕自今以後不得更許如此仍永為定例其年九月中書門下奏條流諸道判官員額西川審有十二員望留八員莭度副使判官掌書記觀察判官支使推官雲南判官巡官淮南河東舊額各除向前職額外淮南留營田判官河東留守判官幽州淄青舊各有九員望各留七貟幽州除向前職額外留盧龍軍莭度推官淄青除向前職額外留押新羅渤海兩藩巡官山南東道鄭滑河陽京南汴州昭德鎮州易定鄆州魏博滄州及陳許徐州兖海鳯翔山南西道東川涇原邠寧河中嶺南以上舊各有八貟望各留六員節度副使判官掌書記推官觀察判官支使振武靈益夏州鄜坊舊各有八貟緣邉土地貧望各留五員節度副使判官掌書記推官觀察判官浙東浙西宣歙湖南江西鄂嶽福建以上舊各有六貟望各留五員團練副使判官觀察判官支使推官黔中舊有十員望各留六員經略副使判官招討判官觀察判官度支鹽鐵判官東都留守陕府舊有五員並望不減天德舊有三員亦望不減司州舊有四貟商州兩員並望不減防禦副使莘州泗州各有兩貟並望不減楚州夀州各有三員夀州望減團練副使一員楚州望減營田巡官一員汝州鹽州隴州舊各有一員望不減桂管舊有六員望減防禦巡官一員容管舊有五員望減招討巡官一員延州舊有兩員望減防禦推官一貟樓煩龍陂舊各有兩員望各減巡官一員右奉聖旨令商量減諸道判官約以六員為額者臣等商量須據舊額多少難於一例停減今據本鎮額量減數亦非少仍望令正職外不得更置攝職仍令御史臺及出使郎官御史専加察訪敕旨依奏大中二年七月中書門下奏黔中鹽鐵使判官開成中已停減不置臣等商量望黔中置經略推官一員其鹽鐵判官望令依舊額却置敕旨依奏其年十月中書門下奏伏以銀青借兼檢校賓客官及朝散大夫階並三品資厯白身不合虛竪奏官近年諸司使多虛竪此色頭腳奏請授官求中上州司馬及上州判司踰濫僥幸莫甚於此臣等商量自今以後諸司諸使應合奏授正官者並不得虛竪前件官階奏請如節使不守章程依前論請奏聼進止其諸道差知進奏官亦望準此處分敕旨依奏三年三月中書門下奏伏準太和六年六月御史臺奏本置官員藉其任守吏曹注擬皆是職司况調選須有出身合年十五以上比及於選入以十年則二十五足可以為成人矣今則皆稱年小奏請勾當所在皆承積習成例若實年小即不合早補身名若補實當年又何慮為官不了合請諸道方鎮子孫應選授及奏授官一切勒歸本任不得輒有奏留如或恩出殊常賜及一子者年十三以下即任奏聼進止奉敕冝依者臣等謹詳勑前約勒非不丁寧近日不守敕文例皆請奏臣等商量自今以後諸道節度觀察防禦經略等使如或特降恩賜制及一子官年十五以下者即望許奏請勾當留除外其餘並望準前敕處分其見在千牛進馬並準今年三月三日敕處分其年四月敕如聞朝臣出使外藩皆有遺賂是修敬上之心或多或少號為人事從前如此率為常例今邊上受命撫戎類須發使若每使許循舊例則十方竟至困窮如使前不與編攔又使臣難為辭拒其出使朝廷邊上一物以上並不得受領却到京後方鎮亦不得輒寄附其年五月敕藩鎮改移見在倉庫錢榖既已得替使屬新人向前曽有敕文更給留别嵗月深久官吏因循茍徇軍情不守朝典自今以後莭度觀察使除替改更不得給留别限仍勒知後判官及本曹官典功加檢舉如有違越當重科懲五年十月中書門下奏伏見諸道及州府知縣令録事𠫭軍有闕及見任官公事闕敗切要替換即任各舉所知聞奏及須蒞官曽有課績處已必能清亷如論薦不當舉主先議懲殿其判司𠫭軍文學縣尉丞簿不在奏限其河東潞府邠寧涇原靈武振武鄜坊滄德易定夏州三川等道或道路懸逺或俸料單微每年選人多不肯受若一例不許則都俸不在給留别限仍勒知後判官不許則都無正官今請前件數道除縣令録事恭軍外其判司縣尉丞簿每年豐許奏三員須是原額闕不得替考深入其闕一年吏部不注即注且差攝二年吏部不注然後許奏請仍資序不得超越如是散職及外身不得奏第二任官其京百司除職事外不在更奏官限敕旨依奏其月敕會昌三年六月八日已有明敕應文武官除授諸道節度觀察經略防禦使及就加官爵等起今以後與送官告旌節使人事物不得過三千匹為定制令諸道各有舊例有過三千匹者宜準敕減不得違越六年十二月中書門下奏應諸道節度使觀察團練使防禦經略等使所請俸料職田祿粟時服雜給並諸色人事用度等先奉聖旨令條疏奏來者伏以藩鎮之任寄切分憂一方慘舒繫在長吏近者所在軍府多稱窮空不給因緣增添費用滋廣不遵往例惟徇人情物力既困於公家誅斂終歸於百姓稍能釐革禆益實多處置之初必有定額歲月深逺或多更改望令諸道帥臣及長吏各詢訪事例僉尋簿書其間茍踰舊規及有新置並宜除去務至公於軍府州鎮經營利綱等項相承既久併絶則難有害於人亦宜禁止奉敕宜依其月中書門下奏觀察使職當亷問位重維藩受明王之寵寄同國家之休戚豈可但享榮貴惟務優遊羅聲色以自娛顧凋殘而莫問縱逃顯責必受隂誅自今以後並請責其成效専其事權使得展意盡心恢張皇化敬事以守法度節用以減征徭有利於國者必行不以近名為慮有害於人者必去不以徇例為辭絶連夜之酣歌務盡心於議讞常推此道方免曠官其巡屬州縣須知善惡嵗考校具以聞隱而不言罪歸亷帥應有所論薦須直書事迹不得虛詞有所舉聞須盡録姦贓不得隱漏懦弱不任職者奏免不得徇情清強能立事者上陳不得蔽善如此即上下相制逺近相臨同推至公共成致理敕旨卿等所條疏亷問牧宰等事實繫生靈慘舒宜依咸通九年十二月二十三日敕司農寺丞薛瓊可贊善大夫兖徐廬夀州招召鄉兵使十二年七月中書門下奏諸道節度防禦使下將校奏轉試官及憲御等每年量許五人都團練防禦使量許三人為定不得更於其外奏請其兼御史中丞以下即準敕文條疏須有軍功方可授任今後若顯有戰功任其事迹申奏檢勘不虛當以處分此外不得更有奏請其幽鎮魏三道宜且準舊例處分其年中書門下奏準今年六月十二日敕釐革諸道及諸司奏官並請章服事其諸道奏州縣官録事𠫭軍縣令或見任公事敗闕不理切要替換及前任實有勞效並見有闕員即任各舉所知每道奏請仍不得兩人其河東潞府邠寧涇原靈武鹽夏振武大德鄜坊滄德易定三州等道觀察防禦使嶺南五管每年除令録外許量奏簿尉及中下州判司縣丞共三人偏州不在奏州縣官限其黔中所奏州縣官及大將管內官即任準舊例處分在京諸司及諸道帶職奏官或非時受替考限未滿並却與移資官天祐元年四月敕令後除留宣徽兩院山馬坊置德庫御厨客省閣門飛莊院九使外餘並停廢其內園水井公事委河南府勾當至二年二月十六日敕只置宣徽院使以權知樞密事王殷充副使以趙殷衡充其樞密使並宣徽南院使並停所司勒歸中書宣徽院人吏不得私出本院與人交通諸道勾當事人亦不得到院凡有公事並於中書論請諡法上舊制諸職事官三品以上散官二品以上身亡考佐史録行狀申考功考功責厯任勘校下太常寺擬諡訖復申考功於都堂集省內官議是然後奏聞贈官司職事無不稱公若藴德邱園聲實明著雖無官爵亦奏賜諡曰先生也文按諡法經緯天地曰文勤學好問曰文能定典禮曰文錫民爵位曰文經邦定譽曰文贈中書令楚國公上官儀贈兖州都督沛郡公韋叔夏贈兖州都督扶風縣公蘇珣贈衛州刺史清河縣子崔融贈太子少保彭城縣東海縣公徐堅贈太子少保彭城縣公劉知柔贈幽州都督彭城郡公韋湊贈潤州刺史常山縣公馬懷素贈禮部尚書舒國公禇無量贈益州大都督固安縣公盧從願贈江陵大都督宿預縣公王丘贈江陵大都督襄陽縣侯席豫贈禮部尚書賈至贈禮部尚書韓愈贈右僕射潘炅贈太尉令狐楚贈左僕射權德輿故襄州莭度使李翺贈司徒李路故太子少傅白居易大中三年十二月中書侍郎平章事白敏中上書請行諡典從之下太常諡曰文武尅定禍亂曰武威強睿德曰武開土拓境曰武帥衆以順曰武折衝禦侮曰武贈太尉霍國公王思禮贈司徒扶風郡王馬璘太尉李訴慱士王士威請為李訴改諡以李訴父諡曰武已有武字不合同稱宜令所司重定博士方從實執中請依前諡武獻聰明睿知曰獻敏惠德元曰獻聖哲有謀曰獻太常卿邠隂男薛收贈禮部尚書常山郡公元行沖贈祕書監衛密贈太子太傅敬括懿溫柔聖善曰懿愛人質善曰懿柔克有光曰懿體和居中曰懿贈益州都督安德郡公楊師道贈兵部尚書武陽郡公李大亮贈吏部尚書永寧郡公王圭贈潤州刺史來恆贈太子少保張文瓘贈幽州都督鄭國公楊崇毅贈兵部尚書正平縣公裴漼贈禮部尚書源洧贈祕書監姚子彥贈左散騎常侍趙復贈揚州都督蕭昕兼御史大夫鄭叔則贈工部尚書蔣乂故禮部尚書許康佐故東川節度使馮宿贈左僕射辛祕贈左僕射馬總宣聖善周聞曰宣施而不祕曰宣善問周逹曰宣贈太傅盛王琦贈太子太師漢中郡王瑀贈幽州都督廣平郡公劉祥道國子祭酒趙𢎞智贈太尉魏王武承嗣贈太尉梁王武三思贈吏部尚書王延昌贈太子少保鮑防贈尚書左僕射歸崇敬贈兵部尚書陸贄贈工部尚書薛蘋贈右僕射鄭浣昭聖問周逹曰昭明德有功曰昭尚平陽公主贈並州都督固安郡公崔敦禮特進金城郡公李珍贈幽州都督趙國公李湛荆州大都督舒國公韋巨源景雲元年太常寺諡巨源曰昭户部貟外郎李雍駁曰三思引之為相阿韋證之為親無功而封無德而祿同族則配正安石他人則附邪楚客諡之曰昭良恐未當博士李處直固請前諡為定雍又駁曰夫古之諡議在乎觀德將使小人之業兾君子之風故為善者雖存不貴仕而歿有餘名此賢達所以守節也為惡者雖生有所幸而死有所懲此回邪所以易心也嗚呼巨源蒙被豢飬而乃聞義不從與惡相濟任訕上之志叶羣凶之謀茍容聖朝貪昧享祿故有宰臣之貴不崇朝而賈害者國家得而誅之也彼則匹夫之微未受命而行刑者匹夫得而誅之也幽明之憤斷焉可知天地之心自此而見今乃妄加褒述安能分謗者哉雖有此議竟諡為昭也贈吏部尚書齊國公崔日用贈户部尚書韋元甫贈刑部尚書李兼尚書左丞贈太師崔警贈司空李復贈司空鄭綱贈司徒趙宗儒元始建國都曰元行義悅人曰元恩能辨衆曰元至善行德曰元忠肅恭懿曰元宣慈惠和曰元贈司空河間郡王孝恭贈并州都督畢國公阿史那