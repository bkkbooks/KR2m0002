贈太子少傅杜亞贈太子少保崔俊贈司徒韓充莊威德剛武曰莊勝德尅亂曰莊死于原野曰莊好力致勇曰莊屡行征伐曰莊武而不遂曰莊敵國克服曰莊贈廣州都督建寧縣公龎孝恭贈幽州都督瑯琊郡公牛進逹贈邠寧總管鄜城郡公梁禮贈荆州都督東萊郡公公孫武達贈梁州都督順義郡公雲師端贈右武衛大将軍新城縣侯楊胄贈原州都督博陵郡公賀蘭整贈潤州刺史衛元貞贈右衛将軍王文慶贈涼州都督元禮臣恭尊賢貴譲曰恭愛人長悌曰恭既過能改曰恭執禮御賔曰恭率事以信曰恭贈司空㐮邑郡王神符贈荆州都督隴西郡王博父贈太尉濮王㤗左衛大将軍北平王阿史那鉢苾贈特進虞國公温彦博禮部尚書魏郡公晋文衍贈揚州大都督髙陽郡公許敬宗太常定謚慱士袁思古議曰敬宗位以才昇厯居清級棄長子於荒徼嫁少女於夷落聞詩學禮事絶于趨庭納采問名惟聞于黷貨白圭斯玷有累清塵易名之典湏慿實行按謚法名與實爽曰繆請謚為繆敬宗孫太子舍人彦伯訟稱思古與許氏先有嫌怨請改諡博士王福畤議曰諡者節終之稱也得失一朝榮辱千載若使嫌隙是實即合據法推繩如其不然未虧直道義不可奪官不可侵二三其德何以言禮請依思古議為是户部尚書戴至德謂福畤曰髙陽公任過如此何以定諡為繆答曰昔晋司空何曽既忠直且孝徒以日食萬錢所以貶為繆醜况敬宗忠孝不及于曾飲食男女之累有逾于曽而定諡為繆無負于許氏矣詔令尚書省集五品以上重議禮部尚書楊思敬議稱按諡法曰既過能改曰恭請諡為恭蘇氏駁曰宇文士及初諡為繆以在家侈縱劉洎駁之竟諡為繆許敬宗初諡為繆以于國邪佞楊思敬改之反諡為恭是非在於當時名實豈憑至行嗚呼思敬青於藍矣贈汴州刺史楊𢎞武贈幽州都督鉅鹿郡公竇德𤣥荆州大都督府長史薛大鼎并州大都督道國公戴至德贈潭州都督外黄縣男薛景仙贈并州都督鄭國公楊再思贈幽州都督龎承宗贈司空李揆太子賔客盧綸贈揚州都督張伯儀贈太子少保嗣吳王瓛贈吏部尚書韋武贈尚書左僕射程异贈陕州大都督髙固贈右僕射劉沔贈户部尚書韓公武唐㑹要卷七十九
