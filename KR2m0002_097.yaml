body:
  text: 唐㑹要卷九十七宋王溥撰吐蕃吐蕃者在長安西八千里本漢西羌之種也不知有國之所由或云南凉秃髪利鹿孤之子曰樊尼國滅之後西奔于羌中建國為衆所懐遂改姓為窣㪍野以秃髪為國號語訛謂之吐蕃歴魏及隋隔間諸羌未通中國國人號其王為賛普以統理國事無文字刻木結繩為約徵兵為金箭㓂至舉燧與臣下一年一小盟用羊狗獮猴三年一大盟用人馬牛驢以麥熟為歲首其國都號為邏婆城用法嚴整議事則自下而起因人所利而行之此其所以强且久也重壮賤老母拜于子重兵死惡病終以累世戰没者為甲門臨陣奔逃者懸狐尾於其首表其似狐之怯其賛普弄讃雄霸西域貞觀八年九月朝貢使至十四年遣其相祿東賛致禮請婚姻獻金五千兩自餘寳數百事十五年以文成公主妻之弄讃至栢海親迎于河源見王人執子壻之禮甚恭而歎大國禮儀之美俯仰有媿沮之色及與公主歸國謂所親曰我祖父未有通婚上國者今我得尚大唐公主為幸實多當為公主築一城以誇示後代遂築城立棟宇以居處之公主惡其赭面弄普遂下令禁之身釋氊裘襲䊵綺漸慕華風仍遣渠豪子弟請入國學以習詩書又請中國識文字之人典其表疏上征遼還獻大鵞黄金鑄成髙七尺可受酒三斛髙宗即位拜駙馬都尉封西海郡王致書于長孫無忌云天子初即位若臣下有不忠之心者當勒兵以助並獻金銀珠寳十五種置太宗靈座之前髙宗進封賨王因請蠶種及造酒碾磑紙筆之匠並許之永徽元年弄讃卒其子早卒立其孫年幼國事皆委祿東賛禄東賛有謀畧初太宗許降文成公主東賛来迎召見顧問進對合㫖乃拜為右衛大将軍又以琅邪公主孫女妻之東賛辭曰臣本國有婦父母所聘情不忍乖且賛普未謁公主陪臣安敢妄婚上嘉之東賛有子五人長悉若早卒次欽陵三賛婆四悉多于五渤論及東賛死欽陵兄弟復専其國咸亨元年薛仁貴討吐蕃敗于大非川上元二年李敬𤣥又敗于青海自是賛婆則専在東境欽陵主内政三十餘年恒為邊患儀鳳三年上以李敬𤣥初敗吐蕃為患轉甚召侍臣曰吐蕃小醜屢犯邊境置之則疆塲日駭圗之則未聞上䇿宜論其得失各書所懐給事中劉景先曰攻之則兵威不足鎮之則國力有餘且撫養士卒守禦邊境中書舍人郭正一曰吐蕃作梗年歲已深興師不絶非無勞費追討則徒損兵威深入則未窮巢穴臣望少發兵士且遣備邊明立烽候勿令侵掠待國用豐足一舉而滅之給事中皇甫文亮曰且令大将鎮撫畜養將士仍命良吏營田以收糧儲必待足兵足食方可以舉而取之上曰宿將舊人多從物故自非投戈俊傑安能克滅凶渠中書舍人劉禕之曰臣觀自古聖主明君皆有邊戎為梗今吐蕃憑陵未足為耻願養萬乗之威寛百姓之役給事中楊思忠曰聖人御物貴在從時今凶冦不能懐徳未肯畏威和好之謀臣謂非便中書侍郎薛元超曰臣以為敵不可縱縱敵則患生邊不可守守邊則卒老不如料簡士卒一舉滅之上顧謂黄門侍郎来恒李勣已後實無好將當今以張䖍朂紀及等差為優耳恒曰昨者洮河兵馬足堪制敵但為諸将失於部分遂無成功今無好將誠如聖㫖聖厯二年賛普器弩悉弄年長乃與大臣論巖宻圖欽陵召其親黨二千餘人殺之欽陵自殺景龍四年来請婚以左衛大将軍楊矩為送金城公主使後矩為鄯州都督吐蕃厚賂之因請河西九曲之地以為公主湯沐之邑矩遂奏與之吐蕃既得九曲其地肥良又與唐境接近自後復叛楊矩懼飲藥而死先天元年十月二十六日吐蕃遣使来朝吐蕃自漢界出鄯城五百里遇島海入吐部落彌多彌蘇毘及白蘭等國風雨雷電隔日有之夏氣如中國暮春之月山有積雪地有冷瘴令人氣急不甚為害其俗重漢繒而貴瑟瑟男女用為首飾其君長或居抜布州或居邏婆州有小城而不居坐大氊帳張大拂廬其大可容數百人兵衛極嚴而衙府甚狭俗養牛羊取乳酪供食兼取毛為褐而衣焉不食驢馬肉以麥為麫人死殺牛馬以殉取牛馬頭周壘於墓上正方壘石為之狀若平頭屋焉其臣與君自為友號曰共命人其數不過五人君死之日共命人皆日夜縱酒𦵏日于脚下刺血出盡及死便以殯𦵏又有親信人用力當腦縫鋸亦有将四尺木大如指刺兩肋下死者十有四五亦殉𦵏焉設官父死子代絶嗣則近親襲焉非其種類輙不相代其官章飾有五等一謂瑟瑟二謂金三謂金飾銀上四謂銀五謂熟銅各以方圎三寸褐上装之安膞前以辨貴賤其戰必下馬列行而陣死則逓收之終不肯退槍細而長于漢者弓矢弱而甲堅人皆用劍不戰亦負劍而行其驛以鐵箭為契其箭長七寸若急驛膊前加一銀鶻有草名速古芒葉二寸狀若斜蒿有䑕尾長于常䑕其國禁殺䑕殺之者加其罪有可䟦海去赤嶺百里方圎七里東南流入蠻與西洱河合流而東號為撲鼻水又南出㑹川為瀘水焉自赤嶺至邏婆川絶無樹木惟有楊栁人以為貴開元二年五月吐蕃宰相坌達延陁獻書于宰相曰兩國地界事資早定界定之後然後立盟其月吐蕃使其宰相尚欽蔵及御史名悉獵来獻盟書𤣥宗御承天門樓命有司引見置酒于内殿宴遣之其月坌達延陁率衆侵我渭源帝下制親征㑹薛訥遇賊數萬衆戰于武階驛大破之乃罷自五年至十年凡八来朝幷貢方物二十一年二月金城公主上言請以今年九月一日樹碑于赤嶺定蕃漢兩界時李暠使于蕃金城度其還期在暮秋故有是請及樹之日詔張守珪李行禕與其使莽布支同訖其事是月遣其大臣屬盧論莽蔵来朝及獻方物自二十二年每歲遣使賀正幷貢獻至二十年七月金城公主薨神龍元年其賛普器弩悉弄卒其子棄肆蹜賛嗣位賛時年七歲使来告喪中宗為之舉哀廢朝一日俄而棄肆祖母遣使獻金二千兩為棄肆求婚中宗遂養公主為女降嫁之自是頻歲貢獻然亦時犯西邊十三年遣使来賀不許十七年復遣使来朝詔王忠及皇甫惟明及内侍張元方使于吐蕃惟明既見賛普及公主皆欣然請和盡出貞觀以来𠡠書以示惟明又遣其重臣名悉獵随惟明入朝賛普既獻寳公主又獻金鴨盤等物名悉獵知書先是迎公主長安當時朝廷皆稱有才辨及引入賜宴與語甚禮之詔御史大夫崔琳充使宣諭于赤嶺各樹分界之碑約不相侵至是公主薨遣使告哀仍請和不許使到數月始命有司為公主于光順門發哀輟朝三日天寳中連事西討進收黄河九曲㧞其石堡城至徳二年三月復遣使請和且助國討逆詔遣南巨川報之明年二月又遣使来朝復請盟詔從之大厯元年至十年凡七来朝貢十三年正月遣将馬重英率衆四萬侵靈州奪我水口填漢渠御史渠以弊屯田建中元年正月入蕃使太常少卿韋倫至自大厯已後吐蕃陷我河隴諸州勅使前後數輩皆留之不遣邊上每傳獲其人亦令中官部紀徙之江嶺徳宗初即位務以徳綏逺方徵其俘囚五百人給衣一襲使韋倫給還其國與之約和仍勑邊将無得侵伐吐蕃使歸其人不之信及蕃俘入境部落皆畏威懐惠焉又命倫為太常卿復使蕃中其年十二月倫至自蕃中與其宰相論欽明思等五十五人皆至獻其方物吐蕃見倫再至甚歡既館聲樂以娱之留九日而旋兼遣其渠帥報命倫一歲再往絶域戎夷奉敎無此之速也二年三月以萬年縣令崔漢衡為殿中少監持節使西戎初吐蕃遣使求沙門之善講者至是遣僧良琇文素二人行每人歲一更之其年十二月入蕃使判官監察御史常魯與吐蕃使論悉羅等至自蕃中奏請改勅書以貢獻為進以賜為賞以領取為領之優詔降諭曰前相楊炎不修故事致此誤耳並從之三年九月崔漢衡與蕃使區頰賛至自吐蕃乃約靈州以賀蘭涇州以彈筝峡西口隴州以清水為漢界皆建碑以誌之遂以是年十月十五日相與同盟于境上其年十月以都督員外郎樊澤兼御史中丞充吐蕃計㑹使約以来年正月十日㑹盟于清水四年正月詔隴右節度使張鎰與吐蕃使尚結賛盟于清水㑹盟官崔漢衡等七人與結賛及宰相等七人俱昇壇為盟夏四月吐蕃将士僧尼等至自沙州凡八百人報元年之徳貞元元年九月遣左監門衛将軍康成使于蕃中且定界是月鳳翔節度使李晟遣兵襲吐蕃衆於堆沙堡大破之焚其儲積斬渠長扈屈律悉等七人傳首京師結賛等聞而大懼累遣使請和仍用永盟皆不許㑹馬燧自河東至且保明其誠至乃許之二年九月吐蕃遊騎及于好畤京師戒嚴遂遣左金吾衛将軍張獻甫等統兵屯于咸陽其月二萬餘衆又冦鳳翔城下李晟出兵禦之一夕而退其年十一月吐蕃陷我鹽州初賊之来冦也刺史杜彦光使以牛酒犒之吐蕃謂曰我欲州城以居之聽爾率其人而去彦光乃率衆歸麟州其年十一月吐蕃陷夏州亦令刺史拓跋乾曜率衆而復據其城自是又冦銀州銀州素無城壁居者奔散蕃亦棄之三年二月以前太子右諭徳崔澣為檢校左庻子兼御史中丞充入藩使四月至自鳴沙不數日澣復以鴻臚卿兼中丞又充入藩使令澣報蕃宰相尚結賛曰杜希全職在靈州不可出境李觀又已改官遣侍中渾瑊充盟㑹使約以五月二十四日復盟于清水又令告尚結賛以鹽夏二州歸于我然後就盟㑹其年夏吐蕃刼盟于平凉川八年山南西道節度使嚴農奏擊破吐蕃于芳州及黑水堡焚其積聚幷獻首獲九年劍南西川節度使韋臯攻吐蕃之維州獲大将軍論賛熱以獻十年五月劍南西川節度使韋臯又奏西山峨和城擊破吐蕃二萬餘衆攻㧞城柵斬首三千八百餘級獲其器械牛馬其年八月先沒蕃中使李朝清歸自吐蕃十三年正月賛普遣使農桑昔賫表請和好帝以其豺狼之性數負恩約不受表状放其使歸蕃七月韋臯奏去年二月十七日吐蕃于劍山馬嶺三路分軍下營僅往一月進軍逼臺登城巂州刺史曹髙任率諸将軍士幷東蠻子弟合勢接戰自朝及午大破之生擒大籠官七人陣上殺獲甚衆十七年七月吐蕃陷我麟州殺刺史郭鋒毁城隍大掠居人驅党項部落而去次鹽州西九十里横槽峰頓軍有畨卒傳呼州僧延素輩七人稱徐舍人召其大陣没勒支處引延素等疾超至帳前皆馬革梏手麻繩縲頸見一吐蕃年少身長六尺餘朱髪大目乃徐舍人也命解縳坐帳中曰師勿懼予本漢人司空英公五代孫也屬武后斵喪王室余髙祖建義中冺子孫流播絶域今三代矣雖代居戎職位掌兵要思本之心無涯顧血族無由自㧞耳此畨漢交境也復九十里至安樂州師無由東矣延素曰僧身孤親老敢祈全活悲不自勝又曰余奉命率師備邊因求資食遂渉漢疆展轉東進至麟州城下城既無備援兵又絶是以㧞之知郭使君是勲臣子孫必将活之不虞為亂兵所害適有飛鳥使至飛鳥猶中國驛騎也云使者上變召軍亟還遂解縳歸之時詔命韋臯分遣偏将勒步騎合二萬出都城西山南北九道並進逼樓離老翁故維州保州松州諸城以紓北邊故也其年九月韋臯又奏大破吐蕃于雅州十八年正月韋臯又破吐蕃生擒大首領論莽熟来獻至二十年二月吐蕃請和使其臣論乞再等五十四人来朝貢至二十一年三月以吐蕃賛普卒廢朝三日命工部侍郎兼御史大夫張薦予祭之七月賛普使論乞數勃藏奉獻徳宗皇帝山陵金銀衣服牛馬等陳于太極殿庭元和元年七月遣使論勃蔵等来朝幷獻方物二年春吐蕃人歸日西蕃幷遣後論思邪熟来朝幷歸鄭叔矩路泌之柩及叔矩男武延等一十三人叔矩貞元初平凉背盟所䧟凡二十餘年竟不屈節五年五月命宰臣杜佑等與吐蕃使議事于中書令㕔且言歸我秦原安樂州地自六年至十年遣使朝見幷獻方物相繼不絶十一年西川奏吐蕃賛普卒十二年吐蕃告哀使論乞髯獻馬十匹玉帶金器等十三年宴吐蕃使于中書八月吐蕃使論司熱等七人辭于宣政衙已事不退且徵國使詔有司諭之方出勅令後入迴鶻吐蕃南詔使所奏随從不得過三十人新羅使不得過二十人迴鶻吐蕃使下合授正官不得過十人南詔不得過五人其年十月吐蕃圍我宥州命夏州兵擊退之十四年三月詔蕃使論矩立蔵等幷後般来使並宜放歸本國八月冦我鹽州及慶州方渠下營大軍至河州界其年復遣矩立蔵来朝貢立蔵自稱請和好詔納其請遣還其年十月以太子中允張賈為太府少卿攝御史中丞持節充入蕃答請和好使尋貶賈為撫州司馬責其逗留不行也以卻同代之至其年十二月靈武奏吐蕃大軍營于黄河北煙塵數十里鳳翔進吐蕃表函一封西川奏吐蕃入雅州界時方鎮鄰接蕃界者皆奉詔備禦東川節度使王涯上言臣道當出軍徑入賊腹有兩路一路從龍州青州鎮入吐蕃界直抵故松州城是吐蕃舊置節度之所一路從綿州威蕃柵入蕃界直抵栖雞城是吐蕃險要之地涯又陳備禦吐蕃要畧曰臣伏願陛下不愛金帛之費以釣北蕃之心遣信臣與之定約曰西戎為邊患者數矣能制而伏者惟有北蕃如能發而深入殺若干人取若干地則投若干之賞開懐以示之厚利以啗之一戰之後西戎亦衰矣長慶元年四月遣尚綺力陀思来朝幷獻國信其月吐蕃使郭居簡朝貢兼遺宰臣馬又遣使論約蔵来請盟其年八月吐蕃請盟許之宰相欲重其事請告太廟太常禮院奏謹按肅宗代宗故事與吐蕃㑹盟並不告廟惟徳宗建中末㑹盟于延門欲重其誠信時令告廟至貞元三年㑹于平凉亦無告廟之文伏以事出一時又非經制䇿之典故亦無其文今㕘詳不合告從之十月命宰相崔植等十四人與吐蕃使論納蔵盟於郡城西王㑹寺十一月又遣使論答熱等来朝二年五月又遣使論賛等来朝幷進馬六十匹羊二百口及銀器玉帶等七月入蕃㑹盟使劉元鼎奏以五月六日與吐蕃盟于悶惶盧川是川葢普之夏衙也中有臧河流焉滿川多紫薇樹其月吐蕃使論悉諾息等随元鼎来謝十月命太僕少卿兼御史中丞杜載持節充答吐蕃謝㑹盟使三年正月遣使論答熱来賀正幷表進羊六百口四年遣使来求五臺山圗寳厯元年三月遣尚綺立熱来朝且請和好二年十一月詔遣光祿卿兼御史大夫李銑持節入蕃充答和好使太和五年正月遣使論乞熱来朝六年又遣使論董勃蔵来朝九年正月遣使論籠熱来朝開成元年遣使論悉立熱来朝正幷獻國信及馬二年遣使論監通等来朝先是遣宗正少卿兼御史中丞李從簡入蕃其年五月蕃中遣使進國信金銀器玉帶獺褐㹈牛尾朝霞㲲雜藥幷馬牛橐駞等詔以其信物頒賜宰臣已下四年遣使論焦熱等来朝㑹昌二年賛普卒至十二月遣論賛等来告喪詔廢朝三日仍令文武常㕘官四品已上就鴻臚寺弔其使者詔遣将作少監兼御史中丞李璟持節入西蕃充弔祭使三年正月璟至自吐蕃大中三年春吐蕃宰相尚恐熱因東道節度使以秦原安樂等三州幷石門木硤等七闗欵塞涇原節度使康季榮以状聞上命太僕卿陸耽往勞焉其年七月河隴耆老率長幼千餘人赴闕下上御延喜殿觀之莫不懽呼抃舞更相踊躍就冠帶於康衢然後命善地以處之觀者咸稱萬歲八月勅曰古帝王之有國也何嘗不文以守成武以集事㕘諸二柄歸乎太寜朕猥荷丕圗思𢎞景業憂勤戒惕四載于兹毎念河湟土疆綿亘遐濶天寳末西戎乗我多難無力禦奸遂縱侵略不逺京邑事更十葉時近百年進士試能靡不竭其長策朝廷下議亦皆聽其直詞盡以不生邊事為永圗且守舊地為明理荏苒于是收復無由今者天地儲祥祖宗垂佑逺人輸欵邊壘連降創業建功所謀必尅實賴樞衡妙筭将帥雄俊副𤣥元不争之文絶漢武逺征之悔甌脱頓空于内地斥堠全據于新封莫大之休指期而就况将士等櫛風沐雨暴露郊原披荆榛而刁斗夜嚴逐豺狼而窮廬曉破動皆如意古無與京念此職勲宜加寵賞涇原宜賜絹六萬疋並以户部産物充賞仍待康季榮收明等各領征師到本鎮度支差脚兩司各差人押領送至本道分付令充節級優賞四道牧州牧闕有功勞軍将各宜具名衘聞奏當議甄奨原州秦州威州幷七闗側近訪聞土地肥沃水草豐美如有百姓要墾闢耕種五年不加賦税五年已後量定户籍使任為産業溼地有鹽頗聞厚利如置𣙜税可贍邊陲仍委度支計㑹制置聞奏四道長吏如能各于鎮守處遣官健營田度支出牛糧種子毎年量得多少充軍糧亦不限約定數原州秦州威州幷七闗鎮守官健每人各給衣料兩分一分依常年例支給一分分度支加給仍二年一度替換其家口委長吏切加安存官健有庄田户籍者仰州縣放免雜差役秦州至隴州已来道路要置堡柵與秦州應接李玭與劉臯即便計度聞奏商賈往来興販貨物任擇利便一切聽從闗鎮不得邀詰其官健父兄子弟要往通傳家信不限多少任去如要墾闢種田依百姓例處分三州七闗如要器仗長吏與量據所要申奏除授刺史闗使後三五月内差人巡檢有如修築部署課績殊尤幷訓練有度者其刺史闗使雖新授官爵亦更與超升其官健節給更予優賞山南西道劍南西川邏界没蕃州縣量力復其兵士委本道差遣如要錢物接借亦具聞奏三州七闗創置戍卒且要務静如有羌戎潜来貿易輒不得容受委刺史闗吏切加禁斷或有投降吐蕃到邏上收取本道令長吏奏取進止其京城有犯事合流役囚徒從今已後一切配在十處收管嗚呼七闗要害三郡膏腴候館之殘址可尋唐人之遺風尚在遡懐往事良用興嗟夫取不在廣貴保其金湯得必有時詎計于遲速今則便務修築不進干戈必使足食足兵有備無患載洽亭育之道永致生靈之安逺邇臣僚宜體朕意咸通七年十月沙州節度使張義潮奏聞迴鶻首領僕固俊與吐蕃大将尚恐熱交戰大敗蕃冦斬尚恐熱傳首京師唐㑹要卷九十七
