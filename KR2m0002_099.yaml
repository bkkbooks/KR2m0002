body:
  text: 唐㑹要卷九十九宋王溥撰東謝蠻在黔州之西數百里南接守宫獠西連夷子北至白蠻土宜五榖無字刻木為契散在山谷依樹為居無税賦之事皆自為生業刀劍不離身男女椎髻以緋束之後垂向下其首領謝元深世為豪長謝氏一族法不育女自云髙姓不可下嫁也貞觀三年元深入朝冠烏熊皮冠若今之髦頭以金絡額身披毛帔韋皮行幐而著履中書侍郎顔師古奏言昔武王時天下太平逺國歸欵國史習其事為王㑹篇今萬國来朝至如此輩章服實可圗寫今請撰為王㑹圖從之以其地為應州拜元深刺史𨽻黔州都督府又有南謝首領謝强與西謝蠻連接共元深俱来朝拜為南夀州刺史後改為荘州貞元十三年正月西南蕃大豪長正議大夫檢校蠻州長史繼襲蠻州刺史資陽郡開國公賜紫金魚袋宋鼎左右大首領朝散大夫前檢校邛州刺史賜紫金魚袋謝汕左右大首領繼襲攝蠻州巴江縣令賜紫金袋宋萬傳界首子弟大首領朝散大夫䍧州録事參軍謝文經黔中經畧招討觀察使王礎奏前件刺史建中三年一度朝賀自後更不許隨例入朝今年懇訴稱州接䍧牱同被聲敎獨此排擯竊自慚恥謹遣随䍧牱等朝賀伏乞賜優諭兼同䍧牱刺史授官其䍧牱蠻兩州户口殷盛人力强大鄰側諸蕃悉皆敬憚請比兩州毎三年一度朝賀仍依䍧牱輪環差定幷以才幹位望為衆所推者充勅㫖宋鼎等已改官訖餘依奏西趙蠻在東謝之南其界東至夷子西至昆明南至西洱河山洞深阻莫知里數南北十八日行東西二十三日行其風俗與東謝同趙氏世為豪長有萬餘户口貞觀三年遣使入朝二十一年以其地為明州以首領趙摩為刺史䍧牱蠻亦姓謝氏西至昆明九百里土氣鬱熱稻再熟無徭役刻木為契風俗物産與東謝同貞觀二年首領謝龍羽遣使朝貢授䍧牱州刺史封夜郎郡公四年十二月遣使朝貢開元十年閏五月大豪長謝元齊死詔立其嫡孫嘉藝襲其官封至十五年其大豪長趙君道来朝且獻方物大厯中每歲遣使朝貢及貞元初朝獻不絶至七年二月授其豪長趙主俗官以其歲初朝貢不絶褒之也自七年後至十八年凡五遣使来朝貢元和二年五月勅自今以後委黔南觀察使差本道軍將充押領䍧牱昆明等使至四年正月又遣使来朝是月遣中使魏徳和領其使幷賫國信物赴䍧牱仍以璽書賜其王焉七年十二月遣使朝貢九年復遣使謝注二十人朝貢十一年正月遣使来朝拜其豪長等官仍賜告身一十六通遣還十二月又遣使二十五人賀正召對於三殿仍賜宴及銀器錦綵等長慶中朝貢不絶寳厯元年十二月遣使謝良震來朝自大和五年至㑹昌二年凡七遣使朝貢幷賀正皆寵以宴賜凡外蕃使將至遣中使郊驛迎勞既至恩禮甚厚將歸亦送以懐逺人今悉不書省文也南詔蠻北與邛州接部落四千餘户山有毒草沙蝨及蝮蛇人並樓居登梯而上號為干欄其人美髪為椎髻土多女少男為婚者女氏必先買求男族貧人無以為嫁女多賣與富人為婢俗皆婦執役其王姓朱氏號為劍荔王貞觀三年遣使内附以其地𨽻渝州大厯十四年十月吐蕃率南蠻二十萬衆来冦一入茂州過文川及灌且入扶文過方維白壩一入黎雅過卭郲連陷郡邑乃發禁兵四千人及幽州兵馬五千人同討大破之貞元十年三月劍南節度使韋臯奏雲南蠻王異牟尋領部落兵馬破吐蕃幷收鐵橋等以来城壘等擒吐蕃列土王五人歸降百姓一十二萬人約計三萬餘户大小城一十六所勅㫖宣付所司其年七月詔賜南蠻異牟尋鑄印一用黄金銀為窠其文曰貞元冊南詔印先是劍南西川節度使韋臯奏南詔前遣清平官尹求寛獻所授吐蕃印五二用黄金今賜印請以黄金從蠻夷所重從之九月南詔又使䝉凑羅棟及清平官尹求寛来獻鐸槊樂浪人劍及吐蕃印八䝉凑羅棟異牟尋之弟也既朝見于麟徳殿上所賜賚甚厚其年十月以南詔朝貢使尹求寛為檢校左散騎常侍其餘授官各有差至十一年九月異弁尋遣使獻馬六十匹至十二年韋臯奏于雅州㑹野路招受得投降蠻首領髙萬唐等六十九人蠻約七千户二萬口兼萬唐等先授吐蕃金字告身五十片至十四年十二月南詔異牟尋遣首望大将軍王邱各等賀正兼獻方物等至十九年春正月癸丑朔上御含光殿受南詔朝賀以其使楊漠龍武為試太僕少卿授黎州廓清道蠻首領襲恭化郡王劉志寧試太常卿永貞元年南詔遣使趙迦寛来赴徳宗山陵元和二年八月授南詔使者鄧傍傳試殿中監其年十二月復遣使朝賀三年十一月以南詔異牟尋卒廢朝三日辛未以諌議大夫段平仲兼御史中丞持節充冊立南詔及弔祭使仍命鑄元和冊南詔印司封員外郎李逢吉副之至四年正月以太常卿武少儀兼御史中丞充冊立及弔祭使先是諌議大夫段平仲充使朝廷以為諌官不合離闕因罷平仲使少儀遂有是行冊異牟尋之子驃信苴䝉閣勑為南詔至七年十二月南詔遣使朝貢十年十一月南詔蠻使楊還竒等二十九人来朝至十三年四月劍南西川節度使奏南詔請貢獻助軍牛羊奴婢等上發詔褒之不進獻太和三年宰臣杜元穎鎮守西川以文儒自髙不練戎事南蠻乗我無備入冦黎州牧守屢陳皆不信之十月黎州陷十一月犯我西川騷刼玉帛子女而去即日鄰境以状聞上大怒貶元穎為邵州刺史不入又貶為循州司馬命東川節度使郜釗代焉明年春正月其王䝉嵯顛以表自陳請罪兼䟽元穎過失國家方事柔逺尋宥過自後賦貢不絶開成四年正月上御龍徳殿入對朝賀正南詔酋趙莫三十七人賜官告幷錦綵銀器金銀帶衣服等有差至五年十二月上御三殿對歸國等十六人㑹昌二年正月三殿對還蕃南詔酋望張元佐等二十五人大中八年二月南蠻遣進犀牛詔還之咸通十年十一月南蠻驃信坦綽酋龍率衆二十萬冦巂州定邊軍節度都頭安再榮守清溪闗為賊所攻再榮退保太度河北去清溪問二百里隔水相射凡九日定邊軍節度使竇滂勒兵拒之十二月驃信遣清平官十餘人来偽和與竇滂語次蠻軍船栰競渡忠武武寜兵士結陳抗之蠻軍稍却竇滂懼将自縊於帳中徐州將苗全緒止之滂乃宵遁全緒乃夜入蠻軍萬弩亂發軍中大駭全緒等保軍而還蠻軍乗勝進攻西川朝廷以顔慶復為大渡河制劍南應接等使将兵數萬與忠武武寜之軍合勢戰于漢川之毘橋大㨗蠻軍走解西川之圍乾符元年十二月南蠻復冦西蜀詔河東河西山南西道東川之兵赴援節度使髙駢奏西川新舊軍差已衆况蠻小醜必易今已道路﨑嶇館驛窮困更有軍頓立見流移其左神䇿長武鎮鄜州河東所抽兵中人數不少况備辦軍食費損尤多又縁三道鎮書扼羌戎邊鄙未寜望不差發詔除河東路兵士令竇瀚不要差發外餘三處兵士委髙駢到日分布驅使三年十一月邕州節度使辛讜奏南詔遣使段琷寳等四人通和詔令答使許之至五年七月讜遣從事徐雲叟通和凡水陸四十七程至善闌府遇驃信華言君上也逰獵尚去雲南一十六程叙好而還進南詔錄三卷東女國西羌之别種以西海中有女國故稱東女國也俗以女為王東與茂州党項接隔女羅蠻及白狼夷有十八餘城王所别居名康延州中有弱水南流用牛皮為船以渡户口四萬女王號為賔就有女官號曰髙霸評議國事在外官寮並男夫為之五日一聽政女王若死國中多歛錢動至數萬更于王族求令女二人而立之大者為大王小者為小王若大王死則小王繼立或姑死而婦繼無簒奪所居皆起重屋王至九層國人至六層其王服青毛裙下領衫其袖委地重女而輕丈夫文字同于天竺以十一月為正毎歲至十月令巫者賫酒殽詣山中散糟麥于空大呪呼鳥俄頃有鳥如雉飛入巫者杯中因剖其腹視之有一榖来歲必登若有霜雪必多異災其俗信之名為鳥卜武徳中女王湯滂氏遣使貢方物永徽七年正月其國遣女使髙霸黎文幷其主男三盧等来朝垂拱五年其王歛臂遣大臣湯劔左来朝仍請官號則天拜歛臂為左衛員外将軍仍以瑞錦制蕃服賜之天授三年其主俄琰兒爾來朝萬歲通天元年又遣使来朝開元二十九年十二月其王趙曳夫遣子獻方物天寳元年五月命有司宴之于曲江令宰臣以下同宴又封曳夫為歸昌王授左金吾衛大将軍賜其子帛八十匹放還後復以男子為王貞元九年其王湯立悉與哥鄰國王董卧庭白狗國王羅陀忽逋租國王弟鄧吉知南水國王姪薛尚悉曩弱水國王董辟和悉董國王湯息賛清逺國王蘇唐磨咄霸國王董藐蓬各率其種落詣劍南西川内附其哥鄰等國皆散居西山弱水王即國初女國之弱水部落其悉董國在弱水之西故亦謂之弱水西悉董王舊皆分𨽻邊郡祖父例授将軍中郎果毅等官自中原多故皆為吐蕃所役屬其部落者大不過二三千各置縣令數人理之土有絲絮歲輸于吐蕃至是立悉與之同盟相率獻欵兼賫天寳中國家所賜官告共三十九通以進節度使韋臯處其衆于維霸保等州給以種糧耕牛咸樂生業立悉等數國王自来朝召見于麟徳殿授立悉銀青光祿大夫歸化州刺史鄧吉知試大府少卿兼丹州長史薛尚悉曩試少府少監兼霸州長史董卧庭行至綿州卒贈武徳州刺史命其子利羅為保寜都督府長史襲哥隣國王立悉妹乞悉漫頗有才智從其兄来朝封和義郡夫人其大首領董卧卿等皆授以官俄又授女國王兄湯厥銀青光禄大夫試太府卿清逺王弟蘇厯顛銀青光禄大夫試衛尉卿南國王薛莫庭及湯息讃董藐蓬女國唱後湯佛庭美王鉢南郎唐並授銀青光祿大夫試太僕卿其年西山松州羌王等二萬餘户相率内附其粘信部落主董夢葱龍諾部落主董辟忽皆授試衛尉卿立悉等並赴明年元㑹訖賜以金帛各遣還八月詔加韋臯統押近界諸蠻及西山國使其部落至今猶代襲刺史等官然亦潜通吐蕃故謂之兩面羌婆利國婆利國者南荒之國也在林邑東南海行可萬里其地延袤數千里暑熱恒如國中之盛夏榖一歲再熟王姓刹利邪伽名䕶路那婆世有其位人皆黒色穿耳附璫其王戴花飾以真珠瓔珞身坐金牀行則駕象鳴金擊鼓吹蠡貞觀四年四月使至婆利界有羅刹國其人極陋朱髪黑身獸牙鷹爪特與林邑人作市已夜而自掩其面其國出火珠状如水晶日正午時以珠承影取艾衣之即火出其年林邑國来獻云羅刹國得之或云出師子國其國在西海之中出竒寳商人到則不見但署寳物價直置于洲上商人依價貨之而去以其多子故以為國名倭國古倭奴國也在新羅東南居大海之中世與中國通其王姓阿每氏設官十二等俗有文字敬佛法椎髻無冠帶隋煬帝賜衣冠令以錦綵為冠飾衣服之制頗類新羅腰佩金花長八寸左右各數枚以明貴賤等級貞觀十五年十一月使至太宗矜其路逺遣髙表仁持節撫之表仁浮海數月方至自云路經地獄之門親見其上氣色蓊鬱又聞呼呌鎚鍜之聲甚可畏懼也表仁無綏逺之才與王子争禮不宣朝命而還由是復絶永徽五年十二月遣使獻琥珀瑪瑙琥珀大如斗瑪瑙大如五升器髙宗降書慰撫之仍云王國與新羅接近新羅數為髙麗百濟所侵若有危急王宜遣兵救之倭國東海嶼中野人有耶古波耶多尼三國皆附庸於倭北限大海西北接百濟正北抵新羅西南與越州相接亦頗有絲綿出瑪瑙有黄白二色其琥珀好者云海中湧出咸亨元年三月遣使賀平髙麗爾後繼来朝貢則天時自言其國近日所出故號日本國盖惡其名不雅而改之大厯十二年遣大使朝楫寜副使聰逹朝貢建中元年又遣大使真人興能判官調揖志自明州路奉表獻方物真人興能盖其官名也風調甚髙善書翰其本國紙似蠒而𦂳滑人莫能名貞元十五年其國有二百人浮海至揚州市易而還永貞元年十二月遣使真人逺誠等来朝貢開成四年正月遣使薛原朝常嗣等来朝貢大羊同國東接吐蕃西接小羊同北直于闐東西千里勝兵八九萬結髪氊裘畜牧為業地多風雪氷厚丈餘物産與吐蕃同無文字但刻木結繩而已豪長死抉去其腦實以珠玉剖其五臓易以黄金鼻銀齒以人為殉卜以吉辰蔵諸巖穴他人莫知其所多殺牸牛草馬以充祭其王姓姜葛有四大臣分掌國事自古未通中國貞觀五年十二月朝貢使至十五年聞中國威儀之盛乃遣使朝貢太宗嘉其逺来以禮答慰焉至貞觀末為吐蕃所滅分其部衆散至隟地烏羅渾國盖後魏烏洛侯也今亦謂之烏羅䕶東與靺鞨南與契丹北與烏丸為鄰風土與靺鞨同貞觀六年朝貢使至女國在葱嶺之西以女為王每居層樓侍女數百五日一聴政其王若死無女嗣位國人乃調歛金錢還于死王之族買女而立之其俗貴女子賤丈夫婦人為吏職男子為軍士女子貴者則多有侍男男子貴不得有侍女雖賤庻之女盡為家長猶有數夫焉生子皆從母姓男子披髪以青綠塗面婦人辮髪而縈之土宜六畜多駿馬貞觀八年十二月朝貢使至石國石國其俗善戰多良馬西北去𤓰州六千里貞觀八年十二月朝貢使至顯慶三年列其地噉羯城為大宛都督府仍以其王職吐屯攝舍提於屈昭穆為都督開元初其蕃王莫賀咄吐屯有功封為石國王加特進尋又冊為順義王二十九年其王伊吐屯屈勒遣使上表曰臣自干代以来於國忠赤祇如突厥騎施可汗忠赤之中部落安帖後背天可汗脚底大起今突厥屬天可汗在于西頭為患惟有大石莫踰突厥伏乞天恩不棄突厥部落打得大石諸國自然安帖天寳初累遣朝貢至五年封其王子那俱車鼻施為懐化王幷賜鐵劵九載安西節度使髙仙芝奏其王蕃禮有虧請討之其王約降仙芝使部送去開逺門數十里負約以王為俘獻于闕下斬之自後西域皆怨仙芝所擒王之子西走大石引其兵至怛羅欺城仙芝軍大為所敗自是西附于大石寳應二年及大厯七年並遣使朝貢吐火羅國在葱嶺之西數百里與揖怛離居勝兵五萬國近吐蕃多男子少婦人故兄弟通室婦人五夫則首戴五角十夫則首戴十角男子無兄弟則與他人結為昆季方始得妻不然則終身無婦矣被服文字與于闐畧同其有屋類頗黎山南岩穴中有神馬國人毎牧馬于其側産名駒汗血馬北界接西域大宛之地貞觀九年五月朝貢使至永徽元年獻大鳥髙七尺其色𤣥足如蛇鼓翅而行三百里能噉鐵夷俗謂之駝鳥三年其葉䕶那火烏涅波奉表告立髙宗遣置州縣使王名逺到其國所以理阿緩大城為月氏都督府仍分其小城為二十四州以烏涅波為都督五年烏涅波遣子伊室達官弩來朝龍朔元年授烏涇波使持節月支等二十五州諸軍事月支都督麟徳二年遣其弟祖紇多獻瑪瑙燈樹兩具髙三尺餘開元七年其葉䕶支汗那帝賖上表獻吐火之人暮闇請加試騐八年獻名馬及䮫至十二年遣使獻神藥乾陀婆羅等二百餘品十七年冊其首領骨咄祿頓達度為葉䕶其年葉䕶遣使獻須那伽帝釋麥十八年遣使獻紅頗梨碧頗梨青瑪瑙金精及質汗等藥天寳八載其葉䕶失理忙伽羅遣使上表曰臣鄰境有一賊號曰鴹師居在深山恃其險逺違背聖化親附吐蕃于國内置吐蕃城投勃律要路與吐蕃擬将兵入境臣毎憂懼思破凶徒望請安西兵馬来助五月到小勃律六月到大勃律伏乞允臣所奏事若不成請斬臣七段縁失蜜王向漢忠赤特望𠡠書宣殿使其感恩𤣥宗覽表許之十二年又遣使朝貢乾元元年七月與西域九國遣兵助國討逆詔宗令赴朔方行營曇陵國即吐火羅之屬國也居大州中其風俗土宜與吐火羅同貞觀十六年遣使朝貢康國本康居之苗裔也其王本姓温氏其人土著役屬於突厥先居祁連之北昭武城為匃奴所破南依葱嶺遂有其地枝庻强盛分王鄰國皆以昭武為姓氏不忘本也俗多蒲萄酒勝兵三千人深目髙鼻多鬚髯生子必以蜜納口中以膠置手内欲其成長口常甘言持錢如膠之粘物習書善賈争分銖之利男子二十即送之他國来過中夏利之所在無所不至以十二月為歲首有婆羅門為其占星候氣以定吉凶至十一月鼓舞乞寒以水相潑盛為戯樂武徳七年其王屈木支遣使獻名馬貞觀九年七月獻獅子太宗嘉其逺来使秘書監虞世南為之賦十一月又獻金桃銀桃詔令植于苑永徽中其國頻遣使告為大石所攻兼徵賦税顯慶三年髙宗遣果毅董寄生列其所居城為康居都督府仍以其王拂呼縵為都督萬歲通天元年則天封其大首領篤沙鉢提為王鉢提尋卒又冊立其子泥涅師師神龍中泥涅師師卒又冊立其子突昏開元初屢遣使獻鏁子甲水晶珠越諾及侏儒人胡旋女子兼狗豹之類十九年其王烏勒王表請封其子咄曷為曹國王黙啜為永國王許之二十七年烏勒卒遣使冊咄曷襲其父位天寳三載又封為欽化王其母可敦封為郡夫人十一載十三載並遣使朝貢盤盤國在林邑東南海曲中與狼牙之修國為隣習俗與扶南畧同以路逺不與中國通梁大同時来朝貢貞觀九年朝貢使至朱俱婆國在葱嶺之北二百里勝兵三千人其俗崇飾佛法文字同於婆羅門西與盤陀為鄰去𤓰州三千八百里貞觀十一年十二月朝貢使至甘棠國在大海之南崑崙人也貞觀十年與朱俱婆朝貢同日至太宗謂羣臣曰南荒西域自逺而至其故何哉房𤣥齡曰當中國乂安帝徳遐被也太宗曰誠如公言向使中國不安何縁而至朕何以堪之觀此蕃使益懐畏懼所望公等匡朕不逮也罽賔國在葱嶺之南其地有涇水皆南流注于南海人皆乗象土宜種稻多甘蔗葡萄草木凌寒不死尤信佛法南去舍衛國三千五百里罕通上國聞中夏有聖君故遣使来朝貞觀十一年遣使至上謂長孫無忌曰朕即位之初有上書者或言人主必須威權獨運不得委羣下或欲耀兵振武攝服四夷維魏徵勸朕偃武興文布徳施惠中國既安逺人自服朕從其語天下大寜絶域君長皆来朝貢九夷重譯相望于道路此皆魏徵之力也朕之任用豈不得人二十二年其國遣使獻俱物頭花丹白相問其香逺聞永徽二年獻褥特䑕喙尖尾赤能食蛇顯慶三年訪其國俗云王始祖磬薛今王曰曷襭支父子傳位已十二代其年列其城為修鮮都督府龍朔初授其王修鮮等十一州諸軍事兼修鮮都督開元七年遣使獻天文經及秘要藥方八年詔遣冊其王為葛羅達支特勒二十七年其王烏散特勒灑以年老上表請嫡子拂䔉罽婆罽嗣位許之仍降使冊命天寳四載又冊其子㪍匐凖為襲罽賔及烏萇國王仍授右驍衛將軍乾元元年又遣使朝貢流鬼國去京師一萬五千里邊北海多温澤有漁鹽之利地氣沍寒毎堅氷之後以木廣六寸長七尺施系于其上以踐層氷遂及奔獸俗多狗以其皮毛為裘褐勝兵萬人南與萬設靺鞨鄰接未嘗通聘中國貝觀十四年三月重譯而来朝貢史國居近獨莫水北與康國同域中有神祠毎祭羊十口自隋以来國漸强盛乃創置使為城郭都邑二萬餘家貞觀十六年正月朝貢使至顯慶三年遣果毅董寄生列其所治為祛沙州以其王昭武失阿曷為刺史開元十五年其王阿忽必多延屯遣使獻胡旋女子及豹二十七年多延屯卒冊立其子阿忽鉢為王二十九年其王斯謹提立首領勃帝未施朝貢天寳中詔使其國為来成國其那色波國亦謂之小史國為史國役屬拂菻國一名大秦在西海之國北東南與波斯接地方萬里列城四百邑居連屬其宫室柱梲多以水晶琉璃為之有貴臣十二共理國正事常使一人將嚢随王車百姓有事者即以事投嚢中王至宫省發理其枉直其王無常人簡賢者立之國有災異及風雨不時即廢之有鳥似鶴其毛綠色常在王邊倚枕上坐每進食有毒其烏輒鳴户十萬餘南臨大海城東面有一大門髙二十丈飾以黄金凡有大門三重第二大門之樓懸一金秤以金丸十二枚係于衡端以候日之十二時焉為一金人其大如人立於側毎至一時其金丸輒落鏗然發聲金人即應聲引唱以紀日時毫釐無差其殿以瑟瑟為柱黄金為地象牙為門扇香木為棟梁無瓦以白石末塗屋上如玉石焉盛夏之時引水潜上屋四簷飛溜激氣成凉風有羊生于土中其國人候其欲萌乃築墻以院之防外獸所食然其臍與地連割之則死惟人著甲走馬及擊銅鼓以駭之其羊驚鳴而臍絶便逐水草諸珍寳多出其國隋焬帝常欲通之竟不能致貞觀十七年其王波多力遣使獻赤頗璃石綠金精等物後臣大食國乾封元年遣使獻底陀伽大定二年復遣使朝貢開元十年正月遣吐火羅大首領獻獅子二羚羊二四月又遣大徳僧来朝烏萇國在中天竺南一名烏枝那地方千餘里百姓殷實人性懦弱頗詭詐尤工禁呪之術篤信佛法與天竺同而天竺不及之自古未通中國焉貞觀十六年十一月朝獻使至開元八年四月遣使冊立其王時大食東與烏萇隣境扇誘為虐其王與骨咄王俱位王皆守節不應亦潜輸欵誠𤣥宗深美之故並降冊命陀洹國吐火羅西北其王姓察失利字婆那其國海行五月至廣州土無蠶桑以白疊朝霞布為衣榖有稻麥俗皆樓居謂之干欄父母死停喪在室輒數日不食燔屍之後男女並剔頭臨池先浴然後進食貞觀十八年遣使来朝貢唐㑹要卷九十九
