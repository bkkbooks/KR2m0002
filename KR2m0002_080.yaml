body:
  text: 唐會要卷八十宋王溥撰諡法下敬令善與法曰敬衆方克就曰敬夙夜警戒曰敬夙夜就事曰敬夙興夜寐曰敬齋莊中正曰敬廣直勤正曰敬難不忘君曰敬陳善閉邪曰敬受命不遷曰敬贈并州都督渤海王奉慈贈襄州都督武安縣公楊虔盛贈特進長平縣男竇琮贈同州刺史安邑縣男裴矩贈特進譙國公竇奉節贈荆州大都督范陽郡公張延師贈幽州都督長平縣男楊纂贈工部尚書武陵郡公柏季纂贈禮部尚書夀陵縣男栁亨懷州刺史孝昌縣男許智仁贈工部尚書譙國公周範涼州都督南康郡公韓孝威贈齊州都督武都郡公權萬紀贈太常卿濟南縣男唐皎贈荆州大都督樂安縣男任雅相國子祭酒北平縣男楊嶠贈工部尚書宋慶禮開元七年卒太常博士張星曰慶禮太剛則折至察無徒從事東北所亡萬計所為害于國家按諡法好功自是曰專請諡為專禮部員外郎張九齡駁之曰營州鎮北戎夷扼喉斷臂逆則致其死命用為其主人士稱樂抑其來尚矣尋罷海運用廣歲儲邉亭宴然河朔無擾試與興師之費轉輸之勞較其優劣孰為利害而云所亡萬計一何謬哉安有踐其迹以制實貶其諡以詢虛乘慮始以謗聲忘經逺之權利義非得所孰謂可行請以所議更下太常庶表行之迹可尋而易名之典不墜也星復執前議慶禮兄子辭玉稱寃乃諡曰敬太子少保徐國公劉幽求光祿卿清河縣公張宥贈户部尚書鄧景山贈禮部尚書程鎮之贈尚書左僕射蕭國公班宏贈太子太傅劉從一贈刑部尚書周皓贈吏部尚書劉贊贈僕射劉公濟故兵部尚書東都留守顧少連贈太子少傅衛次公贈工部尚書劉伯芻故太子賓客李翼贈尚書右僕射杜羔贈左僕射王虔休故華州刺史崔植故兵部侍郎裴潾贈右僕射王紹贈司空髙承簡故宣州觀察使穆贊僖質美受諫曰僖小心畏忌曰僖小心恭慎曰僖左衛將軍考城縣伯獨孤開逺贈工部尚書彭城郡公劉審禮隱隱拂于成曰隱不明誤國曰隱懷情不盡曰隱太子建成貞觀二年三月有司奏諡息王為戾上令改議諡杜淹奏改靈又不許乃諡曰隱贈刑部尚書韋渠牟贈太尉韓𢎞悼遭難守禮曰悼恐懼從禮曰悼未中年而夭曰悼贈司空酆王元亨贈益州大都督蜀王愔贈益州大都督原王孝夏王一襄辟土有得曰襄因事有功曰襄贈并州大都督莒國公唐儉贈開府儀同三司邳國公長孫順德贈荆州都督譙國公柴紹贈輔國大將軍夔國公劉𢎞基贈荆州都督平陽縣公王長諧贈并州都督渝國公劉政會贈禮部尚書彭城郡公劉德威贈左金吾大將郕國公薑行本贈荆州都督郯國公張公謹贈荆州總管談國公丘和贈吏部尚書安吉郡公杜淹贈工部尚書上原縣公賀蘭皓贈越州都督譙郡公周道務荆州都督文水郡公邱行恭贈代州都督同安郡公鄭仁泰贈荆州都督懷寧縣公杜君綽贈工部尚書中山郡公崔日知贈太子少傅王承業太子詹事吳仲孺贈右僕射張鎰贈靈州大都督韓逰瓌太子太傅薊國公李叔明贈刑部尚書任迪簡贈司徒張建封初博士林寶諡曰忠博士崔詔改諡曰襄胡保人耆艾曰胡稱年夀考曰胡左監門大將軍應國公李粲愍佐國邅憂曰愍禍亂方作曰愍佐國逢難曰愍使人悲傷曰愍恆山郡王承乾贈幽州都督道國公周法明贈工部尚書髙彥昭按彥昭初事李正已及子納叛國彥昭以濮州降于河南都統劉玄佐納怒殺其妻子女九嵗見其母兄將就害拜天而祝仍問其故曰以天之神明將有祈也女曰天如神明豈使我效順而就戮也不拜而死上聞之乃下太常議諡曰愍哀恭仁短折曰哀早孤短折曰哀楚王智雲懷王敏汴王璥殤童蒙短折曰殤短折不成曰殤江王囂襄王重思追悔前過曰思柔能自勉曰思通明爽願曰思深慮道逺曰思彭王元則安定公主荒凶年無穀曰荒昏亂紀度曰荒縱樂無厭曰荒內外淫亂曰荒好樂怠政曰荒從禽無厭曰荒從樂不反曰荒右衛大將軍贈歸義郡王阿史那咄苾剌暴慢九卿曰剌狠愎遂過曰剌不思安樂曰剌巢王元吉醜怙威肆行曰醜尚父贈太傅博陵郡王李輔國繆名與實爽曰繆贈司空留國公封德彞太宗初諡曰明後治書侍御史唐臨追駁曰包藏之狀死而後發猥加贈諡未正嚴科太宗令百官詳議禮部尚書唐儉等議曰罪暴身後恩結生前所歷之官不可追奪請降贈改諡詔從之乃諡曰繆贈勝州都督執失思力贈太子太保裴延齡太子太保李程勇率義恭用曰勇率義死國曰勇致命為仁曰勇奮身為義曰勇持義不撓曰勇知死不避曰勇贈潭州都督巢國公錢九隴贈左武衛將軍彭城郡公吳志意贈代州都督許洛仁贈左監門將軍成三郎贈靈州都督拓跋守寂贈司空李懷讓莊威而不猛曰莊贈司徒虢王元鳯贈幽州都督邢國公蘇定方贈侍中明崇儼太子詹事廣平郡公陸餘慶贈司空崔元戎幽州節度使贈太師張仲武溫德性寬柔曰溫絳州刺史昌武縣子孔禎贈禮部尚書扶陽縣公韋承慶良小心敬事曰良理順習善曰良贈禮部尚書滑國公皇甫無逸太常考行諡曰孝禮部尚書王圭駁其官蜀之初自當扶侍老母與之同去申其色飬而乃留在京師子道未足何能為孝乃諡為良中散大夫守少府監胡珦故太子少傅閻濟美贈金紫光祿大夫長孫敬密追補前過曰密祕書監武陽縣侯蕭德言贈司空鄭國公竇抗縱諡法無縱字贈左衛大將軍宇文士及初諡為恭黃門侍郎劉洎駁之曰士及居家侈縱不宜為恭竟諡為縱贈工部尚書馬暢太常博士林寶諡議曰敬工部郎中崔備駁議曰謹按諡法敬字之義與馬暢始終名迹不同考行之義尚乖易名之典未正事須更牒禮院請重議者且馬暢墳土猶濕物議尚存皆可徴言盡堪覆視在春秋隱惡之義可也如史册虛美之命難乎况尚書都堂集議攸重奉常禮院考行須詳責實當究其是非易名宜存乎褒貶夫國之禮法懸在不刋而壬人多病于愧詞史臣或許其佳傳舊章既失後代何觀雖以德之愛久無而亂名之責豈絶幸稽前事用勵後人其馬暢所諡為敬請更恭議尚書兵部員外郎韋奕駁曰太常考馬暢之行舉夙夜就事亷方經正之敬以易其名兾于無所茍于言也比建中興元間暢以父有征討之勳推恩而受爵位父薨家富于財以酒色自娛貞元中嘗傾産交中官進獻田宅以求幸德宗薄其人而終不信用生前與孤姪寡婦分居析財醜聲聞于時歿後使孽子孀妾被姦挾訟公言盈于庭此皆章著于視聼者何以諡為敬乎議者云先司徒之籌畫而暢揚厲者䇿無遺焉暢恭計于闈庭之內茍所言屢中而不可隱當指明其效實而書之俾行道者無所憾不然則莊武公之才略光于典册矣而乃飾虛辭以攘其善得非謬妄之甚耶又稱名儒端士皆從之逰未知孰謂其田蘇耶孟軻云尹公他端人也其取友必端矣夫為端士而逰乎暢之門者以其績用可紀非謂其曠日引月以至乎終身也况諡法夙夜就事亷方經正則暢處已行事未嘗造次而踐其途焉何以諡為敬乎大凡言功伐議德行尊其迹有以勸善貶其名有以懲惡固無庸爭辨也如暢之輩烏足以黷典法哉若有司以有為而為之則宜乎貶之類也請下太常重定其議博士翟韶改諡曰縱議曰馬暢承藉故業歷居通顯家富于財以奢縱自處不能撫安娣姪使之離析其干進也趨利如轉圜其居家也揉下如束溼故時論鄙之謹按國史宇文士及居家侈縱禮諡為縱暢之行已同于士及請以縱為諡可也慤諡法無慤字工部尚書楊昉果諡法無果字定州刺史定襄郡公于匡濟勤諡法無勤字廣州都督謝方叔靈贈尚書右僕射朱忠亮厲贈太子賓客于頔太常博士王彥威議曰于頔剛毅特立博逹文藝藴開物成務之略從橫倜儻之才刺湖州復南朝舊陂以溉人田由是瀉鹵生時大利得丁壯之物籍者取什一代貧人租入故輕以濟江南卑濕送終者無懸窆封樹之髙不可及深則及泉矣或至露胔頔悉命以官地收葬當時稱之為蘇州則繕完隄防疏鑿畎澮川樹以表道決水以溉田其為襄陽當吳少誠弄兵王師有征軍不乏見糧師未嘗退舍嘗克其偏師生得賊將遽以兵柄授之推誠于人有古將略然惜其不得善終如始奉初以還跋扈立名滿盈不戒則有司擬議之降安可不善善而惡惡哉元洪刺郡以官事被謫中貴人銜命部領便道送貶所路出于漢頔遽命武士持刃捕之洪既就執王人徒歸又不奉詔出師而西抵于鄧軍聲甚雄人聼日駭夫師出以律其出不命時人不能識其指歸王者功成而作樂諸侯則否頔之反旅於蔡也作文武頌聖樂貞元御宇遂求寵綏有司請編優詔莫逆事出一時之澤樂非諸侯之應良可惜哉然則如頔者是知樂之可作而不知禮之不可作者也迹其馭衆為政之術蓋在興利除害以為己任令行禁止其源出于法家者流文深意苛有犯無赦至有屋誅同命之慘然未嘗别白其罪以示顯戮人到于今而寃之洎乎天恩下浹元侯入覲朝廷申婚姻之好復以宰相待之則又無罪貶官而連起國獄縉紳之論寖益非之謹按諡法殺戮不辜曰厲請諡為厲或曰太保由文學政事而􅤬歷中外卒當登壇補衮之寄推于事任可謂難能則易其名者宜兼舉美惡二字以正褒貶今特諡為厲或有未安愚以為不然夫類能而授聖王之勸勉議諡貴當有司之職分禮經言諡蓋莭以一惠至于論撰之際要當美惡咸在細大無遺以易名則無略迹春秋之義也况援其功不足以補過潔其美不足以掩瑕其馭下也任威少恩其事上也失忠與敬諡之為厲不亦宜乎敕賜諡曰思尚書丞張正甫封敕書奏不答留中不下然賜諡敕封在都省亦不下至明年張正甫改為同州刺史取中書門下處分宰相令都省收管竟不施行太常博士王彥威又上表云臣聞古之聖王立諡法之意所以彰善惡垂勸戒使一字之褒寵逾紱冕之錫片言之貶辱過市朝之刑此邦家之禮典而陛下勸懲之大柄也伏以故太子賔客致仕于頔頃擁莭麾恣行暴虐人臣所怒法令不容擅舉全師僣作王樂侵辱中使擒拘制囚殺戮不辜誅求無度故臣定諡為厲今陛下不忍改賜思誠為聖慈實害聖政伏以陛下自臨宸極懋建大中聞善若驚從諫不倦况當統天立極之始所謂執法慎名之時一垂恩光盡望徼幸且如頔之不法不道而陛下不忍焉臣恐將來不逞之徒不法不道必有如頔者衆矣比其諡也則又引頔為例則陛下何以處是恩發于前而弊生于後矣又臣比見長藩鎮服大僚者率多驕淫不道誅求自封貨足以藩身威足以鉗口而法吏顧望自處或不能虔糾天刑生前網已漏鯨歿後戮而就木若以李吉甫近嘗賜諡引之則吉甫之相也豈犯上殺人乎以頔况之恐非倫比如或以頔嘗入錢助國改過來覲兩使藩國可以贖論夫傷財而害人剝下以奉上進家財以求幸尤不可長烏有兩河宿兵垂七十年王師徂征瘡疣不絶其後張子昭以易定來程權以滄景來故國家髙爵以勸戎臣申思以徯來者而襄陽名鎮也于頔大吏也居肘腋之下有屈強之名賜之姻親始修覲禮豈可持此况彼而以朝覲為功乎若然者則頔雖有遊夏文學龔黃政令班超之絶漠非躬卜式之持錢助國亦終恐不足以彌縫惡迹降減罪名伏惟陛下以至聖至明之姿用無偏無黨之道忍由義斷政以禮成使褒貶道彰徼幸路絶則天下幸甚又補闕髙釴上疏曰夫諡者所以懲惡勸善激濁揚清使忠臣義士知勸亂臣賊子畏罪忠臣義士雖受屈生前死獲美名亂臣賊子雖竊位于當時沒加惡諡者所以懲暴戾垂沮勸孔子修春秋亂臣賊子知懼蓋為此也垂範如此尚不能救况又墮其典法乎又臣風聞此事是徐泗莭度使奏請李訴勳臣莭將陛下寵其勳勞賜其爵祿車服第宅則可若亂朝廷典法將何以沮勸仲尼曰唯名與器不以假人名器君之所司也若以假人是與之政也政亡則國家從之矣于頔頃鎮襄漢殺戮不辜恣行凶暴移軍襄鄧迫脅朝廷擅留逐臣邀遮天使當先帝嗣位之始貴安反側以清四方幸免鈇鉞之誅得全腰領而斃誠宜諡為繆戮以沮凶邪豈可特加美以奬姦惡如此則是于頔生為姦臣死獲美諡竊恐天下有識之士以為聖朝無人有此倒置伏請速追前諡却依太常諡為厲使典法無虧國章不紊信贈工部尚書渾鍊毅贈尚書右僕射楊朝晟懷贈太尉王鍔裕贈太子少保張煦夷贈太子賔客羅珦傾贈左散騎常侍房式太常博士陸亘請諡曰傾吏部郎中韋乾度駁曰詳觀貞元之末西蜀之事逆豎劉闢搆難之初凶邪叶謀噭嘯相聚年深事逺百不計一然而磈磊不平創巨痛深者藏在骨髓請舉其梗概一二焉式自忠州刺史故太師奏授劒南西川度支副使後兼御史中丞又剖符蜀州是時貞元十八年也式因晝日昏睡如醉經宿乃窹訊其左右僮僕不知其所從來後逾年却復職會故使太師薨歿則劉闢扇逆謀禍亂始胎式遂幸之又意為夢寐之語謂闢曰乃者蜀州昏病之中見公為上相盧文若為侍郎儀衛甚盛富貴極矣他日無相忘賊聞大喜布滿軍縣自以為神授非人力也賊每接賔客肆談論撫羣邪伸號令未嘗不以是為先遂自以為祥兆也豈不因式作異言鼓妖孽惑亂平人堅壯凶險不然何區區之蜀璅璅之冦王師討伐經費萬計﨑嶇險阻留年乃拔何哉蓋以式深為浹洽之辭激切堅固不然何盤根固蒂之甚也故太師永貞元年八月薨其時乾度被逐攝蘭州刺史名雖守郡其實困之明年四月追回勒攝成都縣令其時授闢西川莭度詔命初下東川之圍未解乃召募亡命兼收管內鎮兵張皇虛聲熒惑州郡發兵七千馬畜三萬號為十五萬人轉牒盩厔以來縣道郵次酒肉畢具芻蕘無匿署牒首曰闢副曰式恭謀曰符載令下之日妖氛坌興下愚沸騰貪墨姦黨奔走叛命肩摩轂擊爭死恐後當此之時卭蜀震驚田野廢業竄伏山谷邑居人吏分散道路如此之事非得之于人皆親所聞覩時賊圍逼梓州幸王師諸軍稍稍繼至猖狂凶寇不復張矣然常察其人柔而善侫不顧不義不然何劉闢文若喬觀符載皆咨諏執禮拳拳以事之以斯而言可以知其所止矣伏以聖上法維天之度崇納汚之𢎞雖玄澤滂流鼓蕩昭洗然易名之典在正根源茍非其人不可加美如式西蜀之事大莭已虧缺矣何面目以求諡焉傾之為諡頗乖前狀請下太常慱士李虞仲重議曰式之在西蜀也入人耳目其事熟矣固非愛之者所能粉飾而文其論惡之者所能披抉而裝其説蜀之此時雖女子小人亦知凶闢斷頭之有日然為其用者乃救死于夢語其無勇烈之心可罪矣豈可盡被其附麗之名乎如式之于劉闢既不能去又不能死可謂求生害仁者也而駮者曰大莭已愧無乃過言歟何從聞之闢之走西川也召所疑畏者十數輩于庭將盡殺之而後去而式在其間賴倉皇之際闢黨有護持者僅免于難推嚮之論則不當如是明矣然居此時有將見危授命之義殺身成仁之道示之者稱式無愧色吾不信也不如是則式之去希烈也理河南也亷宣城也何以無忠敬之日歟愚論之曰不疾任永之目不閉吉挹之口乃罪也無王皓棄家之心無譙玄受毒之志其罪也闢之反天子棄墳墓乃曰賴式説一夢以結其心署一牒以張其勢豈其然乎豈其然乎夫人臣不幸罹于是惟死而已矣然孟子曰生吾所欲也矧自軻以下哉使死之易則王諒李業虞悝馮信不足貴也意者將不可必死望于人乎以不死罪之懷生貶之是篤論也夫諡者易其名者也夫子曰名以出信又曰名之必可言也名不正則言不順以至于刑罰不中正謂此耳夫豈容易哉語曰于其所不知蓋闕如也恍惚之夢傳説于外人者懼非所以昭示後世虞書曰五刑五用哉言用刑必當其罪也刑其肢體于一時猶須當其罪矧刑其行義揭之于千萬年歟康誥曰敬用乃罰請依前諡為傾復字諡贈太子郡王重潤懿德贈太子重俊節愍景雲元年十月太府少卿韋湊上疏駁議曰臣聞王者發號施令必法乎天道使三綱攸敘五等咸若者善善明惡惡著也善善者懸爵賞以勸之也惡惡者刑罰以懲之也其賞罰所不加者則考行立諡以褒貶之所以勸戒將來也並至公之大猷非私情之可徇故箕微獲榮管蔡為戮諡有臣諡其君子諡其父而曰靈曰厲者不敢以私亂大猷也則其餘安可失衷哉臣竊見故太子重俊權北軍犯宸居破扉斬關突禁而入騎騰紫禁兵集黃屋孝和移御玄武門避其鋭凶威既逼躬出樓門親降德音以諭順逆而太子據鞍自若督衆不停俄而其黨悔非轉逆為順或廽兵討賊或投仗自拘多祚等伏誅太子逃竄向使同惡相濟以成不道其為禍也胡可勝言于時臣任將作少匠兼通事舍人明日孝和引見羣臣兩淚交集幾不共卿相見其為危懼不亦甚乎今聖朝雪罪禮葬諡為莭愍臣竊惑焉當時韋氏逆莭未彰韋則母也太子豈有廢母之理乎又非中宗之命而廢是劫父廢母也借使聲言父有桀紂之行人子無廢殺之理漢武末年江充為巫蠱陷太子遂矯莭斬充因敗逃匿非稱兵詣闕無逆謀于父然身死于湖不葬無諡至太子遜立為天子是曰孝宣太子方獲葬諡曰戾今莭愍太子之行比之豈可同年而語其于陛下猶于也而可諡為莭愍乎伏望改諡務合禮經申王撝惠莊岐王範惠文薛王業惠宣榮王琬靖恭興王紹恭懿睿宗皇后竇氏昭成開元六年正月太常諡議上禮部員外郎崔宗之駁曰昭成皇后諡不以聖真冠后諡之上而誤加太字若取單諡追尊合去太稱昭成皇后且太穆皇后武德元年五月追諡為穆皇后貞觀元年五月六日又追尊為太穆皇后上元中又追尊太穆神后文德皇后貞觀年中諡曰文德上元中追尊文德聖皇后即後漢皇后紀之所論明矣太常議曰范史著書每引帝號標于后諡之上自是一紀摽目何關連諡舊名考德撰行須存本迹豈有婦人立操必與夫同夫尊婦卑沒便連諡為名不可之甚也漢諸后單諡者多隂后曰烈馬后曰德鄧后曰熹閻后曰思韋忠所引薄后諡曰髙皇后豈非大謬乎且閔帝懿獻皇后帝諡元非后諡曰欲將桓帝兩字為懿之諡其可得乎入廟稱后后繫于夫后朝稱太義緣于子文母既生前之名文王乃既沒之諡周公逹禮豈令夫從于婦乎當令太常定之昭容上官氏惠文景雲二年七月追諡初昭容嘗引其弟昱為拾遺昱不受謂其母鄭氏曰主上在房州則武氏得志矣今有天命以能興天之所命不可二也而后三思有異志天下知之必不能成昭容為上所信而附會三思誠破家之徴願姨思之鄭以為然言于上官上官笑曰昱謬言勿信之及三思被誅李多祚索韋氏及上官始懼以昱言有徴遂乃歸心王室及草中宗遺制引相王輔政及難作以草本呈劉幽求幽求言于玄宗玄宗不許命殺之以其有功故此追贈開元初玄宗收其舊文勒成集令中書令張説親為其序孔夫子追諡文宣殷比干追諡忠烈太公追諡武成魯國夫人楊氏正烈母也朝臣復諡文獻贈司徒申國公髙士亷并州大都督樂城縣公劉仁軌贈太子太保梁國公姚崇贈太尉博陵王崔玄暐禮部尚書徐國公劉幽求贈司空趙城縣公裴耀卿贈荆州大都督始興縣公張九齡贈司徒贊皇縣公李栖筠贈尚書右僕射鄭珣瑜太常博士徐復議請諡珣瑜文獻兵部侍郎李異駁曰夫諡所以昭德也德既昭矣則文無以加焉故相國鄭公端操特立寡言慎行及居台司有蠲逋恤人之美有知難不汚之節雖無文若之進拔孟子之是非無賑施之仁無謇諤之義然足以稱賢相也夫文者大則經緯天地次則潤色王猷周文以至德為西伯季孫以道事其主咸諡曰文為美無以加也亦焉用兩字然後為備哉竊以兩字義或有兼得一字不足以盡盛德之形容故有兩字生焉然而興于近古非三代兩漢之事也夫舉典之道信其正不信其邪春秋之大旨也則兩字之諡非春秋之正也故相國鄭公之諡為文足矣焉用獻哉為獻可矣焉用文哉兩字兼諡竊所未喻詣下太常重議博士徐復議曰鄭珣瑜令德清規坐鎮風俗理人而善政浹洽作相而謀猷密勿其終始事迹當時罕儔所以表賢易名實曰文獻夫文者煥乎大行獻者軒然髙名合而褒之厥有經義亦猶貞惠文子纍數其功至於再三以勸事君者今奉駁議議其無進拔無是非無賑恤無蹇諤且曰二字之諡非三代兩漢之事以愚為異之駁所謂進拔者豈不以推擇羣萃致之於庭乎珣瑜往司銓衡既當鈞軸流品式敘英髦在朝若無奬拔之明則何以至此但如來議寡言慎行故其端兆不可得而窺也當先朝之初上體不平姦臣王叔文擅權作朋將害于國其視丞相如無也徑詣相府不修舊章珣瑜意雖能誅力固不足移疾髙謝萬情所歸則是非之明孰大于此所謂賑施者在禮家施不及國賢人君子廣愛為心莫不開裕物之源生厚之政曩者恤災患免逋租亦既當之矣其于篤親庇族善無常主踐名教者誰則不行若以分孤寡之資同于賑施珣瑜之所羞言也奚謂無哉至如蹇蹇匪躬前議已書其微婉矣既承髙論敢不指名德宗季年李實為京兆尹殊恩畫接貴幸無比而實以羡餘稱職莫之敢非珣瑜衆情所由上陳利害且曰取于人而未酬其直焉得有餘是其言不可謂之無蹇諤矣伏以國朝宰輔諡文而兼字者代有人焉故房玄齡諡曰文昭狄仁傑諡曰文惠魏徴陸象先蘇瓌宋璟張説崔祐甫並諡曰文貞劉仁軌劉幽求姚元崇裴耀卿張九齡並曰文獻李元紘韓休並曰文忠薛元超曰文懿盧懷慎曰文成蘇頲曰文憲楊綰曰文簡其餘不可悉數若以文包美不宜以他字配之則房玄齡狄仁傑以降昭惠貞獻忠懿成簡皆不得正矣我唐聲名文物垂二百年更厯羣才發揮王度豈議名之典獨未得中耶不然何輕沮之為駁正所設但論諡之當否不宜詰字之多少茍有不當雖一字可乎若皆允宜二字何害如韋巨源附會凶黨李北海奪其佳名所言至公人皆悅服今既曰賢相而又非之君子于其言豈可得而茍乎若云二字非三代兩漢之規則又異乎愚所學者矣夫威烈慎靚周王之諡也文忠文成漢祖之佐命也霍光為宣成孔光為簡烈中代之勳德也劉寬為昭烈楊賜為文烈東都之鼎臣也得謂其無二字哉况文之為名其義多矣有經緯天地焉有忠信接禮錫民爵位堅強不暴焉有敏而好學不恥然下問焉夫非一端各有所當若皆如西伯季孫之德後稱文則魯文公與伯歜之類皆不為文矣故諡之制因時旌别若前狀議珣瑜之行曰為一代之名臣斯其旨歟謹上探禮經旁視舊史恭諸國典以定二名請依前諡曰文獻兵部侍郎李巽再議曰夫諡者春秋褒貶之旨也仲尼書法隨類推廣雖一字褒貶其文猶傳蓋欲指明事業昭示後代俾後之人懲其惡而揚其善故不可茍夫諡一字正也堯舜禹湯周公召公是也兩字非正也故諡法不載或人臣不守彛章竒逞異端考烈愼靚是也或時王之權以功德加厚于臣者蕭何霍光房玄齡魏徴是也不當加而加僣也孔光劉寬薛元超李元紘是也三字過也貞惠文子是也亦諡法所不載也古今無有也公叔文子是衛君之過也衛之亂制也不然執是説也一美加一字即堯舜禹湯當纍數十字以諡矣禮記非盡聖賢之意非盡宣尼之所述也當時雜記也昔后倉為曲臺記其弟子戴聖增損刋定為小戴禮今禮記是也若盡宣尼之所述即戴聖豈得而增也昔宣尼修春秋遊夏不能措一詞以知禮記非盡宣尼所述也故戴聖後可增損也則貞惠文子之諡衛君亂制也古今無有也非宣尼所述又何足法哉如珣瑜之制行始終無缺可謂美矣至于議行考功而度越等輩比于鄼文成梁文昭魏文貞則不侔而諡號無差輕用國典失春秋之旨矣向者鄼梁數公皆經綸草昧輔翼聖主以道輔君致于化洽彰灼千古言之者凛然生敬而以珣瑜齒之豈無愧于心哉夫數公者皆時王感風雲之會懷謨明之美故加于常典以明其德亦所以篤君臣之義也然非正也權制也若後之人非數賢之比則當循常以避賢地也其劉仁軌薛元超等加字之諡皆黷國典而昧彛倫言之可謂寒心豈當舉之為訓也其餘姚元崇宋璟劉幽求輔相一代致理平之化或忘身徇難成中興之業又豈珣瑜以典選為進善以辭疾為嫉惡邪皆尚口偽辨非守典確論也夫以典選者皆為進善耶若然者則國家有天下二百年何裴行儉馬戴盧從願等數賢獨見稱于時也循資署置謂為進善異乎余所聞也又珣瑜之病數月而終豈偽疾也借使偽疾尤可罪也昔子路之冗食家臣猶殺身殉難而珣瑜履台輔之重當危難之際居平則食其髙爵厚祿見危則奉身自保以此為是非之明耶即董狐之書趙盾為妄作也珣瑜之辭疾可責于太常舉以為德信君臣之義非常人所知也珣瑜之下詰李實誠中其病可謂美矣然則珣瑜自始筮以至于啓手足垂四十年歷諫職持風憲其忠規激發恐有過于此者今第舉其不詰李實未為多也謂為蹇諤者衆矣豈能使汲黯魏徴有慚色哉前巽議云三代兩漢無兩字之諡此未學之過也茍令君之進善無孟軻之是非無文子之賑施無周舍之蹇諤以珣瑜之行清而無缺可謂掩之不足辨也今所議兩字之諡亦又不當其議故不足斥也前巽之言過也但兩字之諡加等之美以蕭何房玄齡言不在珣瑜也巽雖不敏至于言諡美以惑人聽此常所激而不平也終不欲有僭齒於蕭何房玄齡之宗又不欲有造次擬于魏文正姚元崇宋璟劉幽求之讜言偉論茂績殊勳也夫前車之覆後車所以易轍也前有司之失後有司當以矯之也不矯之則逶迤遂逺以至于亂制也此有國之誡也威烈愼靚以至於劉寬薛元超之同于禹湯文武蕭何霍光房玄齡魏徴前有司之過也後之専筆削者宜有以矯之也不矯之禮典寢亂矣有司不可以尤而效之也不以有所見而遂僣典鄭珣瑜兩字諡請下太常重議若一字不足盡珣瑜之盛德必須兩字則敢俟再告竟從復議諡文獻文貞贈太尉鄭國公魏徴贈司空許國公蘇瓌贈尚書右丞相兖國公陸象先贈太尉廣平郡公宋璟贈太師燕國公張説太常卿初諡為文貞左司郎中楊伯威駁曰諡者德之表行之迹將以激勵風俗檢束名教固無虛譽是存實録凖張説罷相制云不肅細微之人頗乖周慎之旨又致仕制云行愧半石防闕周身求免瓜李之嫌而喧衆多之口且玉之有瑕尚可磨也人之斯玷焉可逭也諡曰文貞何成勸沮請下太常更據行事定諡工部侍郎張九齡又議請依太常為定衆論未決上為制碑文賜諡曰文貞由是始定贈太傅崔祐甫贈太子太師牛僧孺大中十三年十二月中書侍郎平章事白敏中上疏請行贈諡上從之請下太常諡之文懿贈禮部尚書永興縣公虞世南貞觀十二年十一月敕虞世南學綜古今行篤終始志好忠正士多𢎞益易名之典抑有舊章前雖諡懿未盡其美可諡曰文懿贈太師韓國公苖晉卿初太常諡為懿獻及敕出改為文懿贈司徒李回贈太尉王超文昭贈太尉梁國公房玄齡贈司徒鄭畋文忠贈尚書右僕射河南縣公禇遂良贈太子少傅清水縣公李元紘贈太子少師宜陽縣公韓休贈司徒魯郡公顔真卿文康贈太常卿陽翟縣公禇亮文惠贈司空梁國公狄仁傑文憲贈尚書右僕射許國公蘇頲贈太尉衛國公杜鴻漸文成贈荆南大都督漁陽縣公盧懷慎文孝贈禮部尚書王珣文簡贈司徒楊綰初太常諡楊綰為文貞比部郎中蘇端駁曰古者美惡無私褒貶必當將以嘉善而退惡為列辟之明典也可不慎與今謹詳前諡文貞者稽法考事恐非平允時論發揚來訓矣夫道德博聞曰文清白守節曰貞且元載與司徒友敬殊深推為長者首舉清要人莫與京及司徒寵望漸髙載畏其逼又知載隳壞綱紀心二于君既懼其疑因而踈間有口皆知載惡而獨綰無一言或有發載之惡證告未明抱誣坐法者司徒時居上列奏達非難不能因此披𠂻正詞全志士之命破凶狡之私而乃晏安自泰優遊過日使元蠔禍大深勞聖上防伺之慮豈守節不隱耶豈懷道無毒耶非謂文貞明矣泊元載將謀不忠錮聰蔽聖嗇恩于下招怨于上使北塞人勞有過時之戍西郊寇入無弔災之惠懷貞抱義之士將死復生梁宋傷夷之人或寒或暖搜訪旌恤中外所急載皆絶之使王澤不及于下為行路所嘆而楊公當聖上維新之時居天下得賢之望誠宜不俟終日造膝進言乃寥寂起悟噤閉謨猷食萬錢之賜虛承一心之顧使防河之人家聞采緑之嘆近甸亦多興祈父之憂豈慈惠愛人乎既曰不慈不惠何以謂之文有隱有毒何以謂之貞乎古者諸侯有國卿大夫有家上以報祖宗下以處子孫之義也楊公歷處厚俸人謂儒宗曾不立家又無私朝寧使人老闕敬祖之禮位極無祭你之宮凡在衣冠誰不嘆恨又乖大義深非懷仁接禮之義矣曰文與貞曷可以當聖人立諡有公無私所以周宣不敢私于父諡曰厲漢宣不敢私于祖諡曰戾百王明制列聖通則公叔文子有死衛之莭修班制之勤社稷不辱方居此諡逮及太宗初魏公徴有匡救公直之忠中宗末蘇瓌有保安不奪之莭所以諸賢甚衆諡文貞者不過數公至于燕公張説先朝輸能名莭昭著省司尚謂不可至今人故稱之由是言之焉可比德請牒太常更詳他諡以守彛常庶乎青史之筆不乖于周漢黃泉之魂免慚于蘇魏大厯十二年二月二十二日别敕諡為文簡也贈司空鄭肅懿文太子太保薛元超景武贈司徒衛國公李靖貞武贈太尉英國公李績忠武贈司徒鄂國公尉遲敬德贈太師汾陽郡王郭子儀贈太師西平郡王李晟莊武贈太傅北平郡王馬遂贈太師劉濟武烈贈太尉霍國公王忠忠獻贈太師魏國公裴光庭開元二十三年慱士孫琬以其用循資格非奬勸之道請諡為平光庭與蕭嵩不叶時人以為希嵩意上聞特下詔賜諡光庭曰忠獻忠簡贈太尉樂壽王武攸暨忠烈贈中山郡公王晙贈太子少傅薛景仙贈太尉假秀實興元元年二月諡初朱泚盜據宮闕也泚以秀實常為涇原莭度頗得士心後罷兵權以為蓄憤旦夕必肯同惡乃召與謀秀實初詐從之隂説大將劉海賔何明禮姚令言判官岐靈嶽同謀殺泚以兵迎乘輿三人者皆秀實夙所奬遇遂皆許諾泚時遣其將韓旻領馬步三千疾趨奉天時倉皇之中未有武偹秀實以為宗社之危期于頃刻乃使人走諭靈嶽教其竊令言印不遂乃以司農印倒印符以追兵旻至洛驛得牒莫辨其印遑遽而廽秀實謂海賔等曰旻之來吾黨危矣我當摶殺泚不得則死終不能向此賊稱臣及與海賔約事急為繼而令言明禮應于外明日泚召秀實議事源休姚令言季子平皆在坐秀實戎服與泚並語至僣位秀實勃然而起執休腕奪其象笏奮躍而前唾泚面大罵曰狂賊吾悢不斬汝萬假我豈從汝反耶遂擊之泚舉臂自捍才中其顙流血匍匐而走凶徒愕然不敢動而海賔等不至秀實乃曰我不同汝反何不殺我凶黨羣至遂遇害焉至是加褒贈贈太師王武俊贈太尉張允伸忠壯贈揚州大都督褒國公段志玄贈瀛州刺史平源縣公劉玄感忠孝贈尚書右僕射郇國公韋陟忠貞贈司空邠國公韋見素忠惠贈户部尚書太原縣公王翊忠勇贈武威郡王李嗣業忠肅贈太傳韓國公韓滉贈太子太師王處存贈觀軍容使楊復光貞褊贈司空宋國公蕭瑀太常初諡尚書省諡曰肅太宗以易名之典必考其行蕭瑀性多猜二有失其真更據實諡曰貞褊公貞穆贈工部尚書范陽郡公張庭圭贈司空李圭貞肅贈尚書右丞相魏縣公杜暹初諡貞肅右司員外郎劉同升都官員外郎韋亷駁曰暹有忠孝之美太常所諡不盡其行博士裴總執曰杜尚書往以墨縗受職事雖奉國不得為孝請依舊為定暹子孝友詣闕陳訴上聞而更令所司詳定竟諡曰貞肅貞簡贈太傅汧國公李勉贈司徒李藩貞烈贈侍中頴川縣公韓瑗贈兵部尚書盧奕太常慱士獨孤及議曰盧奕剛毅朴忠直方而清勵精吏事所居可紀天寶十四載洛陽縣沒于時東京人士狼狽鹿駭猛虎磨牙而爭其肉居位者皆欲保性命而全妻子或競先䇿蹇爭脫羿彀或不恥茍活甘飲盜泉奕獨正身守位義不去以死全莭擔不辱勢窘力屈以朝服就執猶慷慨數賊梟獍之罪觀者股栗奕不變色西面辭君而後受害雖古烈士方之者鮮矣或曰洛陽之存亡操兵者實任其咎非執法吏能抗師敗將奔去之可也委身寇讐以死誰懟及以為不然勇者禦而忠者守社稷是衛則死生以之危而去之是智免也忠于何有荀息殺身于晉不食其言也仲由結纓于衛不避其難也玄冥勤其官而水死守位而忘軀伯姬待姆而火死先禮而後身也彼四人者死之日皆于事無補夫豈愛死而賈禍以為死輕于義而捐生古史書之使事君者勸然則祿山亂大于里丕奕亷察之任切于玄冥之官分命所擊不啻于保姆逆黨兵威烈于水火于斯時也與能執干戈者同其戮力挽之不來推之不去豈不以師可虧義不可苟身可殺莭不可奪故全其特操于白刃之下孰與夫懷安偷生者同其風義謹案諡法圖國忘死曰貞秉德忠業曰烈奕執憲戎馬之間志藩王室可謂圖國之危不能極而繼之以死可謂忘死歷官十一任言必信事必果而清莭不撓去日若始至可謂秉德矣黃門以直道佐時奕嗣之誠可謂遵業請諡曰貞烈從之貞憲贈太傅趙憬肅愍贈秦州都督平陽王敬暉昭定贈太常卿河東郡公薛訥恭肅贈益州大都督河東郡公張嘉貞故刑部尚書贈左僕射李遜獻穆贈太尉冀國公裴冕襄愍贈户部尚書史簡懷贈開府儀同三司王璵成肅贈太保張延賓贈太傅薛平莊威贈司空李元諒獻武贈太師張茂昭威武贈宣武節度使劉玄佐贈司徒髙崇文忠穆贈太保嚴震贈太傳王景崇襄武贈太尉劉悟敬勇贈司空李麟毅勇贈禮部尚書崔無詖忠愍贈司徒武元衡故鎮州莭度使贈太師田𢎞正貞惠贈禮部尚書劉通貞孝贈太子太保權臯贈太師崔安潛贈司空楊於陵宣憲贈司空杜黃裳宣簡贈吏部尚書崔邠景襄贈司徒王士貞懿穆贈太尉烏重胤元靖贈太傅賈耽恭惠贈太傅董晉贈司徒竇易直繆醜贈尚書右僕射韋綬諡士劉端夫博通醜士權安復諡為繆醜武烈贈司徒曲環安簡贈太傅杜佑太常博士栁應規請諡簡大夫慱士尉遲汾又議曰佑之寬容得衆全和褒光不病于物以顯其能得不為和好不爭乎自卑仕而極重任一心于理以惠物纍行亷恥正人無尤怨得不為一德不懈乎請諡為安簡靈愍贈兵部尚書盧虔成縱贈故中書侍郎同中書門下平章事元載太常慱士崔詔請諡曰荒左司郎中韋𢎞景請下太常重議博士王炎改諡成縱未幾炎卒故事不行爾後太常復伸王彥威議曰元載諡成則不得為縱諡縱則不得為成成縱兼諡美惡齊致竊以為不通于經夫蕭瑀諡貞詔命加𥚹事出權制不可據依爾后崔昭以平厲諡揚炎以壯繆易伊慎此皆惑於貞𥚹混淆兩可之文詳在駁議今明其説恐誤後來平厲故左僕射楊炎初諡肅愍左丞孔戣駁請下太常重議而太常博士崔昭請諡曰平厲刑部侍郎劉伯芻又駁請下太常更加議定太常未報壯繆贈太子太保伊慎崔昭請諡曰壯繆吏部尚書韓臯駁未報宣武贈太師范希朝太常博士馮定請諡忠武禮部員外郎王源中駁請下太常重定太常請如前諡忠武王源中重駁博士王孰改諡宣武未經會議聞奏故不載其文恭懿贈禮部尚書齊映贈司徒李吉甫太常博士尉遲汾請諡吉甫曰敬憲度支郎中張仲方駁議曰古者易名請諡禮之典也處大位者舉其巨莭蔑論細行昭範當代彰示後人然後書之垂于不朽善善惡惡不可以誣故稱一字則至明焉定褒貶之宜泯同異紛綸之論李吉甫稟氣生材乘時佐治慱涉多知含章炳文燮贊隂陽經緯邦國惜乎通敏資性而便媚取容故載踐樞衡疊補名衮大權在已沉議罕成好惡徇情輕諾寡信諂媚在臉遇便則流巧言如簧應機必發夫大臣之翊戴元后者端恪致治孜孜夙夜緝熙庶績平章百揆兵者凶器不可從我始及乎伐罪則料敵以成功至使內有害輔臣之盜外有懷毒萬民師徒暴野戎馬生郊皇上旰食宵衣公卿大夫且慚且恥農人不得在畝紡婦不得在桑耗斂賦之常資散帑庫之中積徴邊徼之備竭運挽之勞僵尸血流胔骼成嶽毒虐者號呼無辜勦絶逮今四載禍亂之兆實始其謀遺君父之憂而豈謂之為先覺者乎夫古之論大功者不可以力取不可以偽當削平西蜀乃言語侍從之臣擒剪東吳則姦謀廊廟之輔駁其德則有異言其力則不倫何取其所輕而捨其所重録其所小而略其所大且奢靡是嗜而曰愛人以儉受授無守而曰慎才以廉斥諫諍于外豈不近之蔽聰乎私其近親豈不近之溺愛乎烏有蔽聰溺愛家範無制而能垂法立程憲章百度謹按諡法曰敬者夙夜警戒敬以直內內而不肅何以刑于外憲也者刑也法也戴記曰憲章文武又發慮憲義以為敬恪終始載厯顯仕未嘗效一法建一功逮及居重位以安和平易寬柔自處考其行與其名不類研其事與其道不侔一定之辭惟精審慎異日詳制始請史官請俟蔡寇將平天下無事然後都堂叢議論議未遲尉遲汾執申敬憲未定張仲方尋出為遂州司馬敕諡曰恭懿莊肅贈太師北平王羅𢎞信孝穆贈右僕射楊嗣復昭襄贈太子太師崔圓貞壯贈尚書令羅紹威雜録貞元十一年司徒馬燧葬有司諡曰景武上曰景太宗皇帝諡改莊武可也元和三年鎮州王士貞薨其子承宗不順不加諡太常博士馮宿以為懷柔之義不可遺其忠勞請加美諡從之其年中書門下上言故中書令漢陽郡王張柬之故侍中平陽郡王敬暉故中書令扶陽郡王桓彥範故中書令博陵郡王崔玄暐故中書令南陽郡王袁恕巳等五人得史館報並未有諡詔張柬之等皆書勳國史配享廟庭賜諡易名義光百代宜令所司即與定諡聞奏時柬之曽孫曛以諡事詣中書陳訴宰臣上聞因令有司授曛官其年四月有司奏上功臣五王諡議請諡張柬之為文貞桓彥範為忠烈敬暉為貞烈崔玄暐為文忠袁恕已為貞烈從之五年二月考功奏當司三品以上凖格合請諡官凖貞元七年格內所舉寶應二年正月十八日敕莭文佐吏録行狀陳請考功司覆訖下太常定諡者近日以來撰録行狀多非佐吏既乖事實又違格文伏請從今後請諡行狀凖敕文須是佐吏敕旨宜令門下佐吏撰録行狀以憑詳覆十四年都省奏合請諡家子弟及門生故吏請限未葬以前陳狀其家在遐逺及别有事故者任至一年內陳狀到考功一月內檢勘下太常禮院受牒後一月日內定牒報考功疏德邱園節行特異無官及位卑者任所在長吏奏請仍許不拘年限未立節限以前合請諡未請者家在城者任六箇月內于所司申請家在外者亦許至一年內申請立節限後如過限久令不請諡其中有善惡尤著可存勸誡請委考功訪察行實便請牒下太常禮院定諡庶使善必見稱惡無幸免都省奏伏凖太常博士李虞仲奏凡官秩合得請諡者必先葬期請于考功牒送太常寺禮院然後一月內定諡者伏奉三月二十五日敕宜令尚書都省與考功及太常禮院更審條流明立節限聞奏者今與考功郎中蕭祐太常博士李虞仲等商議具條流節限如前敕旨依奏唐會要卷八十
