body:
  text: 唐會要卷二十三宋王溥撰武成王廟開元十九年四月十八日兩京及天下諸州各置太公廟一所以張良配享春秋取仲月上戊日祭諸州賓貢武舉人准明經進士行鄉飲酒禮每出師命將辭訖發日便就廟引辭仍簡取自古名將功成業著𢎞濟生人准十哲例配享至乾元元年九月十二日太常少卿于休烈奏臣比者因秋享漢祖廟見傍無侍臣享太公廟有張良在側伏以子房生于漢楚翊奉高祖坐帷幄定天下考其年代不接太公自古配食廟庭陪葬陵寢皆取當時佐命同受哀榮太公人臣不合以張良配享請移於漢祖廟勅㫖依上元元年閏四月十九日勅文定禍亂者必先于武徳拯生靈者諒在于師貞昔周武創業克寧區夏惟師尚父寔佐興王况德有可師義當禁暴稽諸古昔爰崇典禮其太公望可追封為武成王有司依文宣王置廟仍委中書門下擇古今名將准文宣王置亞聖及十哲等享祭之典一同文宣王至建中三年閏正月二十五日禮儀使顔真卿奏武成王廟用樂臣伏以自太公封武成王追封之禮與諸侯王名位義同廟庭用樂合准諸侯之數今請每至釋奠奏軒懸之樂勅㫖宜付所司至七月十一日史館奏伏奉今年五月十五日勅武成王廟配享人等宜令史館參詳定名聞奏者又准開元十九年四月勅宜揀取自古名將十人充十哲漢太子少傅張良先已配享齊大司馬田穰苴呉將軍孫武魏河西太守呉起燕昌國君樂毅秦武安君白起漢淮隂侯韓信蜀丞相諸葛亮尚書右僕射衛國公李靖司空英國公李勣七十二弟子齊將孫臏越相國范蠡趙將信平君亷頗齊將管仲齊將安平君田單趙將馬服君趙奢大將軍武安君李牧秦將王翦漢相平陽侯曹參梁王彭越右丞相絳侯周勃太尉絳侯周亞夫大司馬冠軍侯霍去病大將軍長平侯衛青後將軍營平侯趙充國前將軍李廣後漢太傅高密侯鄧禹大司馬廣平侯呉漢征西將軍夏禹侯馮異建咸將軍好畤侯耿弇執金吾冦恂佐將軍膠東侯賈復伏波將軍新息侯馬援太尉新豐侯叚熲魏太尉鄧艾征東將軍晉陽侯張遼太尉魏里侯皇甫嵩蜀前將軍夀亭侯闗公車騎將軍西鄉侯張飛呉南郡太守周瑜南都太守孱陵侯吕䝉大司馬陸抗丞相陸遜晉征南將軍南城侯羊祜鎮南將軍當陽侯杜元凱撫軍將軍襄陽侯王濬太尉長沙公陶侃車騎將軍康樂侯謝𤣥前秦丞相王猛前燕太宰慕容恪宋司空武陵侯檀道濟征虜將軍王鎮惡後魏太尉長孫嵩北齊左僕射太原慕容紹宗右丞相咸陽王斛律光梁太尉王僧辨周大冡宰宇文獻太傅燕國公于謹右僕射鄭國公韋孝寛陳司空南平公呉明徹隋尚書令趙國公楊素右武侯將軍宋國公賀若弼上柱國新義公韓擒虎上柱國太平公史萬嵗皇朝司空河間王孝恭右武候將軍鄂國公尉遲敬德右武衛大將軍邢國公蘇定方禮部尚書聞喜縣公裴行儉夏官尚書王孝傑左武候將軍韓國公張仁亶兵部尚書中山郡公王晙兵部尚書代國公郭元振太尉臨淮王李光弼太尉汾陽王郭子儀天寶六年正月勅鄉貢武舉人上省先令謁太公廟每拜大將及行師克捷亦宜告捷貞元二年二月刑部尚書知删定闗播奏上元詔擇古今名將十人于武成王廟配饗如文宣廟之儀伏以太公古稱大賢今其下置亞聖賢之有聖于義不安且孔門十哲皆是當時弟子今所擇名將年代不同於義既乖於事又失臣請刪去名將配享之儀及十哲之稱從之四月詔武成王廟樂章並未奏撰宜令于邵等撰進四年八月十三日兵部侍郎李紓奏准開元十九年勅置廟以張良配享准式以太常卿少卿丞等充三獻官祝文云皇帝遣某官敢昭告于至上元元年追贈為武成王享祭之典一同文宣王有司因差太尉充獻兼進禮于親署臣以今月三日䝉差攝祭方覩廟儀伏以太公即周之太師張良漢之少傅聖朝列于祀典已極褒崇載在祠官必資折衷理或過當神何敢當今者屈禮于至尊施敬于臣佐每謂御署並稱昭告于上下之祭竊謂非宜一同文宣王恐未為允臣以為文宣王垂教百代宗師五常三綱非其訓不明有國有家非其制不立故孟軻稱自生人以來一人而已由是正素王之法加先聖之名樂用宫懸獻差太尉尊師崇道雅合正經且太公述作止于六韜勲業形于一代豈可擬其盛德均其殊禮哉前件祝文請自今更不進署其敢昭告請准式差太常卿以下詔令百寮集議聞奏兼大理卿于頎等四十六人議同李紓尚書右司侍郎中嚴涗等議曰謹按李紓所奏援引訓典比量禮度祝文輕重之殺獻官尊卑之節誠至當矣推而廣之抑未盡也夫人名徽號先聖所以褒前哲令德之人謂其言可以範圍其行可以施百代其業可以振千古茍未至也則不虛美夫以太公兵權竒計之人適當殷辛失德八百諸侯皆歸於周時惟鷹揚以為佐命在周有大功矣于殷謂之何哉祀典不云法施于人則祀之如仲尼之祖述堯舜憲章文武刪詩書定禮樂使君君臣臣父父子子後王及學者皆宗師之可謂法施于民矣貞觀中以其兵家者流始令磻溪立廟開元中漸著上戊釋奠之禮其于進寵不為薄矣上元之際執事者茍以兵戎之急遂尊武成封王之號擬議于文宣王優劣萬殊不可以訓禮不云乎擬人必於其倫太公之于聖人非倫太史公以韓非與老子同𫝊人到于今非之高祖封韓信為侯自恥於絳灌等列况聖朝褒美之稱其可雷同乎愚以為宜去武成及王字依舊令為齊太公廟人無間言矣享獻之事餘依李紓所奏刑部員外郎陸淳等六人議曰臣聞統天下者禮法也救天下者權數也拯難者常以權變禮以數易法有國者則尚德而賤數尊禮而晦權何者禮法行則人安其分務于修身權數騁則人思變常務于茍得安其分理之源也思變常亂之本也故救一時之弊者事不可貽于將來垂萬世之法者道必不行于當代竊以武成王殷臣也見紂之暴不能諫而佐武王以傾之于周則社稷之臣矣於殷謂之何哉且夫尊其道者必師其人必尚其行使天下之人入是廟也登是堂也稽其人可以思見師其道所由致法則俾夫立節死義之士安所措其心乎聖人所以尊堯舜賢夷齊不法桓文不贊伊吕先之以敬讓尊之以禮樂葢謂此也使武成之名與文宣為偶權數之畧與道德齊衡恐非不刋之典也臣愚謂宜罷上元追封立廟之制依貞觀於磻溪置祠令有司以時享奠斯得禮之正也左領軍大將軍令狐建等二十四人議曰當今兵革未偃宜崇武教以尊古重忠烈以權今欲有貶損恐非激勸之道也追尊王位以時祀之為武教之至若不尊其禮則無以重其教也文武二教固同其偏廢亦不可况其典禮之制已歴三聖今欲改之恐非其宜也至九月十六日有勅以上將軍以下充獻官餘依李紓所奏天祐二年八月十三日中書門下奏遷都以來武成王廟元未置立今請改為武名王選地建造其制度配享皆准故事從之寒食拜掃龍朔二年四月十五日詔如聞父母初亡臨喪嫁娶積習日久遂以為常亦有送葬之時共為歡飲遞相酬勸酣醉始歸或寒食上墓復為歡樂坐對松檟曾無戚容既玷風猷並宜禁㫁開元二十年四月二十四日勅寒食上墓禮經無文近代相傳浸以成俗士庶既不合廟享何以用展孝思宜許上墓用拜掃禮於塋南門外奠祭徹饌訖泣辭食餘于他所不得作樂仍編入禮典永為常式二十九年正月十五日勅凡庶之中情禮多闕寒食上墓便為燕樂者見任官典不考前資殿三年白身人決一頓貞元四年正月詔比來常參官請假往東郊拜掃多曠廢職事自今以後任遣子弟以申情禮元和三年正月勅朝官寒食拜掃又要出城並任假内往來不須奏聽進止長慶三年正月勅寒食掃墓著在令文如聞比來妄有妨阻朕欲令羣下皆遂私誠自今以後文武百官有墓塋域在城外并京畿内者任往拜掃但假内往來不限日數有因此出城假開不到者委御史臺勾當仍自今以後内外官要覲親于外州及拜掃並任准令式年限請假太和三年正月勅文武常參官拜掃據令式五年一給假宜本司准令式處分如登朝未經五年不在給假限開成四年二月中書門下奏常參官寒食拜掃奉進止准往例給公劵者臣等謹按舊制承前常參官應為私事請假于州往來並給劵牒又奉前年八月勅釐革應縁私事並不許給公劵令臣等商量伏惟寒食拜掃著在令式銜恩乘驛以表哀榮其應縁私事及拜掃不出府界假内往來者並不在給劵限庶存經制可乆遵行從之縁祀裁製舊儀每祭籩豆之數各異至顯慶二年始一例大祀籩豆各十二中祀每十小祀各八舊儀注大祀中祀並前七日筮日小祀並前五日筮日皆於太廟南門之外卜吉而行之其遇廢務日並不迴避貞元十五年十二月一日太常卿齊抗等奏每年大中小祀都七十祭其四立二分二至臘上辛吉亥等日葢為氣節也其後寅後申後亥後丑等日葢謂星次也伏以氣行有時刻星位有次舎或定用日或定用辰不可改移請依舊制其或有别禱祭即是太卜署擇日並請准四月六日勅廢務日不用遂為故典舊儀注無日食廢祭之文元年建丑月祠部奏曰來年建寅月一日祈穀祀昊天上帝是月司天臺預奏其日太陽虧時禮儀使于休烈奏曰臣謹按曾子問曰當祭而日食其祭也如之何夫子曰接祭而已矣牲至未殺則廢漢初平四年正月當祭南郊日食又行冠禮博士臣與八座議以為正月元日太陽虧而冠有裸獻之禮有金石之樂是為聞灾不肅見異不怵惕也伏望下太常别擇日其二日祭太一准禮儀物同祠所既縁日食各守本司亦望同下太常更擇日制曰可舊制每嵗大中小祀凡七十九祭皆刻定日辰著為祀典其與本文相當則祭更不卜日三十四祭准禮但言時月不定日辰太卜署至時擇日正月一十二祭上辛祈穀祀昊天上帝于圜丘祀前一日祭高祖一室立春日祀青帝于東郊亥日享先農于東郊立春後丑日祀風師于國城東北立春日祭東岳天齊王東鎮東安公東海廣德王東瀆長源公以上准禮令著定日薦獻太清宫享太廟祀九宫貴神于東郊以上至時卜日二月十祭上丁釋奠文宣王上戊釋奠武成王春分祀朝日于東郊社日祭太社太稷以上准禮令著定日祭五龍壇祭馬祖開冰井祭司寒之神祭東冰井西冰井享文敬太子惠昭太子廟並同日以上至時卜日四月十祭立夏日祀赤帝於南郊立夏後申日祀雨師雷師于國城西郊立夏日祀南岳司天王南鎮永興公南海廣利王南瀆廣利公以上著定日期薦獻太清宫享太廟雩祀昊天上帝于圜丘祀前二日告太宗一室以上至時卜日五月四祭夏至日祭皇地祇于方丘祭前二日祭太宗一室以上著定日期祭先牧享文敬太子惠昭太子廟以上至時卜日六月四祭季夏土王日禮黄帝于南郊同日祭中霤中岳中天王以上著定日期是月復祭廣德王七月八祭立秋日祭白帝于西郊立秋後辰日祀靈星于國城西南立秋日祭西岳金天王西鎮成德公西海廣潤王西瀆靈源公以上著定日期薦獻太清宫享太廟以上至時卜日八月八祭上丁釋奠文宣王上戊釋奠武成王秋分祀夕月於西郊社日祭太社太稷以上著定日期祭馬祖享文敬太子惠昭太子廟以上至時卜日九月二祭季秋大享明堂享前二日告憲宗一室以上至時卜日十月十祭立冬祀黑帝於北郊立冬後亥日祀司中司命司人司禄於國城西北立冬日祭北岳安天王北鎮廣寕公北海廣澤王北瀆清源公以上著定日期薦獻太清宫享太廟祭神州地祇於北郊祭前二日告高祖一室以上至時卜日十一月六祭冬至日祀昊天上帝于圜丘祀前二日告太祖一室以上著定日期貢舉人謁先師祭馬歩享文敬太子惠昭太子廟以上至時卜日十二月六祭寅日蜡祭百神于南郊夘日祭太社太稷辰日臘享太廟奏祥瑞以上著定日期季冬太清宫奏祥瑞藏冰祭司寒東冰井西冰井並同日用以上至時卜日開元九年六月五日太常奏曰伏准唐禮祭五岳四瀆皆稱嗣天子祝版皆進署切以舜典五岳視三公四瀆視諸侯則不合稱嗣天子及親署其祝文伏請稱皇帝謹遣某官某致祭于岳瀆之神從之二十三年正月七日勅承前所給明衣多於齋夕付物既不先造徒有其名自今以後明衣絹布並祠前五日先給𫝊監祭使具㸃閱仍永為常式至大厯六年十一月三日勅自今以後五品以上及監察御史太常博士宜准式給明衣絹及浴巾餘准常例其布絹支左藏庫青苗物充其月二十日詔自今以後有大祭宜差丞相特進少保少傅尚書賓客御史大夫攝行事至天寶七年六月八日勅自今已後每差攝祭官宜令吏部採擇朝廷有德望者充天寶五年五月専知祠祭使王璵奏諸色祭官等並寛縱日久不懼刑憲當祭之日或逢泥雨或值節序盡皆請假曾無形跡今後臣皆私自察訪實無事故妄請假及不肅敬者録名奏聞望加貶責應縁行事或稍後到小疎遺望請董事大小便牒所司奪其俸禄勅㫖從之九年十一月三日制曰春秋祭享用存昭敬祝史陳信必在正辭茍名位之或乖於上下而非便承前有事宗廟皆稱告享兹乃臨下之辭頗乖尊上之義静言斯稱殊未為允自今以後每親告享太清太微宫改為朝獻有司行事為薦享凡諸陵改為朝拜有司行事為拜陵應縁諸事告宗廟者並改為奏其郊天后土及諸祀祝文云敢昭告並改為敢昭薦以為告者臨下之制故也式從變禮庶表誠心宣示中外令知朕意其載四月二十九日制頃者每祀黄帝乃就南郊義實有乖禮亦非便稽諸體式理固不然宜於皇城内西南就坤地改置黄帝壇朕當親祀以昭誠敬仍令中書門下與禮官等更深詳定聞奏至十二月三日詔禮神以玉奠取其誠精潔表心温潤合德自馮紹貞奏後有司用珉禮所謂君子貴玉而賤珉不可用也况國家之富有萬方之助祭豈於天地宗廟奠玉有虧自今以後禮神六器宗廟奠玉並用真玉諸祀用珉如以玉難得大者寧小其制度以取其真寶應三年五月四日吏部尚書劉晏奏諸色祠祭委禮儀使撰禮料為常式祭前㸃檢祭器及饌物明衣有不在者所由量事科決其行事官若出齋宫及不到明衣及科不得妄制曰可上元元年四月赦文有司所立秘祝之法或移于嵗或移於人君人之心寧所忍也自今以後削去其法其中祀下祀并雜祭禮等一切停其諸應合祭禮列于常典所用祭料一依古制務從減省以副朕心至貞元元年二月十七日太常卿崔縱奏立春後丑日祀風師立夏後申日祀雨師立秋後辰日祀靈星立冬後亥日祀司中司命司人司禄准上元元年制中祀小祀一切並停至永泰二年有勅復風師雨師其靈星司中司命等壇宜令所司准開元禮配享大厯七年八月禮儀使楊綰奏祀官祀前一日從齋所集於太常寺一時赴祭所如祭在皇城内者則不集制從之仍永為常式至十四年六月十八日大内皇城留守張景所奏得御史臺牒景風安上等門每至祠祭日縁祭官到尚書省受誓誡了赴朝准舊例合早開又准監門式皇城門無文早開勅㫖自今以後祠祭受誓誡官其日既赴尚書省不須入朝貞元六年正月詔書官有私喪公除者聽赴宗廟之祭初御史監察者闗白禮凢有緦麻以上喪不得享薦於是吏部奏申明格令使行之可守九月襂服既葬公除及聞哀已滿者請許告服赴宗廟之祭其同宫未葬雖公除者請依前禁之輕重有倫以一王法從之八年七月將作監元亘當攝太尉薦祭享昭德皇后廟以其私忌日不受誓戒為御史劾奏令尚書與禮官法官集議於是尚書左丞相盧邁等奏曰謹按禮記云大夫士將奏祭于公既視濯于父母死猶是奉祭也又按唐禮散齋有大功喪致齋有周親喪齋中疾病則還家不奉祭祀皆無忌日不受誓戒之文雖假寧令忌日有給假一日春秋之義不以家事辭王事今一旦以假寧常式而廢攝祭新命酌其輕重誓戒則崇祀之嚴校其禮式忌日乃循常之制詳求典據縁薦獻不宜以忌日為辭由是亘坐罰元和三年四月太常禮院上言太廟時享乃告廟朔望薦食同日謹按禮祭不欲數伏以太廟禘祫祭禮重于時享准禮時享與禘祫同月即其月但行禘祫不行時享蓋不欲煩是禮先重者今時享月于朔望薦食詳求禮情參酌輕重于時享之月其朔望薦食亦合便停若兩禮兼行即祭恐煩黷伏請每至時享及臘享但行享禮其月朔望薦食請停餘月一准舊制如告廟日與朔望薦食日同伏請先行告禮然後薦食所冀疎數有節合于禮中從之長慶二年十一月監察使監察御史蘇景𦙍奏祠祭稱定出齋宫等舊例准廟參不到四品以上罰二千文五品以上罰一千文伏縁所罰稍輕更請加罰詔曰郊廟之儀本於恭恪罰輕生慢須議稍加自今以後有臨祭出齋者宜罰一月俸仍委監察使每具所罰官名銜聞奏太和九年十一月兵部尚書判太常卿充禮儀詳定使王起請創造禮神元寶玉奏議曰邦國之禮祀為大事拜璧之儀經有前規謹按周禮祀天地四方以蒼璧祀天黄琮禮地青珪禮東方赤璋禮南方白琥禮西方𤣥璜禮北方又有四珪以禮天兩圭有邸以禮地圭璧以祀日月星辰凡此九品器皆禮神之玉也又云以禋祀昊天上帝鄭𤣥云禋烟也為玉幣祭訖燔之而升烟以報陽也今與開元禮儀同此則焚玉之騐也又周禮掌國之玉鎮大寶器若大祭訖事而藏之此則收玉之証也梁代崔靈恩撰三禮義宗云凢祭天神各有二玉一以禮神一則燔之禮神者訖事却收祀神者與牲供燎則靈恩之義合于禮經今國家郊天地祀神之玉常用禮神之玉則無臣等請下有司精求良玉創造蒼璧黄琮等九器祭訖則藏之其燎則依常式從之牲牢武德元年十一月九日詔祭祀之本皆以為身窮民事神有乖正直殺牛不如禴祭明德即是馨香望古推今民神一揆其祭圜丘方澤宗廟以外並可止用少牢舊用者宜用特牲待時和年豐然後克修常禮開元二十二年正月一日勅自古聖帝明王岳瀆海鎮祭用牲牢餘並以酒脯充奠天寶二年閏二月勅祭必奉牲禮有歸胙蓋將興施惠之教以廣神明之福比來胙肉所進頗多自兹以後即宜少進仍分賜祭官及應入衙常參官厨共食六載正月赦文祭祀之典犠牲所備將有逹於䖍誠蓋不資於廣殺自今以後每大祭祀應用騂犢且令所司量減其數仍永為常式其年起請天地合祭四時各用二犢五常迎氣各用一犢冬至圜丘用一犢夏至方澤用一犢九宫貴神四時祭每祭各用一犢神州用一犢太廟五享每用一犢東京准上文宣王三祭每祭各用一犢京三祭五岳每載一祭各用一犢右據舊料每載用犢五百一十四頭今請減一百六十五頭既用三十九頭餘祠享並請停用犢至上元二年九月二十二日赦文國之大事郊祀為先貴其至誠不美多品黍稷雖設猶或非馨牲牢空多未為能享圜丘方澤任依常式宗廟諸祠但臨時獻熟用懷明德之馨庶合西隣之祭其年起請昊天上帝太廟各太牢一羊豕各三餘祭隨事而供太廟羊豕舊各九頭大厯六年十二月三日勅五方上帝九宫並大祀朝日夕月百神大社先農釋奠並中祀自今以後大祀用犢中祀用猪羊各一委所司支給送太常入滌其副准前貞元十八年五月太僕奏每年四季送太常入滌羊犢送後或稱暴死准式埋訖慮有侵冒真偽難明伏以毛色羊犢甚難擇採如有病死者望還太僕卿准數送替庶易辨明永為常式制曰可忌日貞觀十九年太宗親征高麗以五月五日行至遼陽既屬高祖忌日八座奏言臣等謹按禮云君子有終身之憂而無一朝之樂此所謂星迴嵗改親沒同辰思其居處不為樂事今陛下親御六軍已登冦境庶務繁擁伏待制決可以尊先聖之常經畧近代之一志望請所有軍機要務百司依式聞奏手詔答曰今既以軍戎大事不可失在機速所以仰順古風俯從今請神功元年七月清邉道大總管建安王攸宜破契丹凱還欲以是日詣闕獻俘内史王及善以為軍將入城例有軍樂今既國家忌月請備而不奏鳳閣侍郎王方慶奏曰臣按禮經但有忌日而無忌月晉穆帝納后用九月其月是康帝忌月于時疑不定下太常禮官荀訥議稱只有忌日無忌月若有忌月即有忌時忌嵗益無禮據當時從訥所議軍樂是軍容與常樂不等臣謂振作於事無嫌貞元五年八月勅天下諸上州並宜國忌日准式行香十二年五月詔先聖忌辰纔經叙慰戚里之内固在肅恭而乃遽從燕遊飲酒作樂既乖祀法須有所懲前邠州長史郭煦宜於袁州安置前南郭縣尉郭晅於栁州安置曹自慶配流冰州其駙馬郭曖王仕平仍令勒歸私第先是初經代宗忌辰駙馬諸親悉詣銀臺奉慰及迴王仕平遂邀駙馬郭曖張昭賢張怙及曖女婿嗣許王昭曖堂弟煦晅用教坊音聲詣曹自慶並于宅中歡樂上怒之因有此詔尋亦許曖及士平出入永貞元年十二月中書門下奏昭成皇后竇氏按國史長壽二年正月二日崩其時縁則天臨御用十一月建子為嵗首至中宗復舊用夏正即正月行香廢務日須改正以十一月二日為忌元和元年正月修撰官太學博士韋公肅上疏曰准禮無忌月禁樂今太常及教坊以正月是國家忌月停習郊廟享宴之音中外士庶咸罷慶樂伏尋經典切恐乖宜臣謹按禮記有忌日不樂無忌月之文漢魏以降代襲斯㫖惟晉穆帝將納后以康帝忌月下議禮官荀訥王洽曹躭王彪之並當時知禮者皆稱有忌日無忌月若有忌月即有忌時忌嵗益無禮據時從其議伏以仍前所禁皆在二十五月之中今既代逺禮須改革臣又聞統人立法必守先王之常經企及俯就不違聖哲之明訓下盡羣言上留𤣥鑒不以私懷而踰于禮節又記曰禫月從樂明王制禮漸去其情不應以追逺而立禮反重也今太常停習郊廟之樂是反重而慢神有司禁中外之音是無故而去樂詳其前典情禮不倫考其沿襲又無所據儻陛下正因循之越度法經典之明文得禮之宜𫝊于史册天下幸甚詔𫝊中書門下令召太常卿與禮官等學官詳議可否中書門下奏曰忌日太常寺及教坊悉停閱習中外士庶亦皆禁㫁准禮及歴代典故並無忌月禁樂請依常教習者勅㫖宜依其士庶之家亦宜准此開成四年十月戸部侍郎崔蠡奏臣伏以國忌行香事不師古聖心求理動法典章臣頃于延英奏陳願有釐革陛下令史官尋討起置無文昨日閣中再承顧問雖因循未變亦無損于盛朝而除去不經冀流著於異日勅㫖朕以郊廟之禮奉在祖宗備物盡誠庶幾昭格恭惟忌日之感所謂終身之憂而近代以來歸依釋老徴二教而設食㑹百辟以行香將以仰奉聖靈㝠資福祐有異皇王之術頗乖教義之宗昨因崔蠡奏論遂遣討尋本末經文令式曾不該載世俗因循雅重釐革其京城及天下州府國忌日寺觀設齋行香起自今以後並宜停其月御史臺奏請國忌日天下依舊不舉樂不視事不鞭笞伏以道釋二教漫澶虚無陛下審所歸依誠契至理但以列聖忌日行香及兹修崇示人廣孝兼以天下州縣不舉樂不視事不鞭笞以此海内蒼生常知列聖廟號令既停罷行香之後勅内又無其日徹樂廢公止行如舊之文伏恐遐逺之地迷其所向便與居常之日率皆無殊臣思此事終闗聖慮禮曰君子有終身之憂而無一朝之患故忌日不樂謂不舉吉事也伏願陛下聖睿留想若以設齋資福事屬不經起今罷之已有詔㫖其日天下州縣不舉音樂不視公事不行鞭笞伏請重下明制依前遵守則凡在遐陬逮于蠻貊不忘廟號有禆孝理之源勅㫖設齋行香近已釐革遏密停務自有典常臺司舉奏意在詳密宜依至宣宗即位奉勅先以列聖忌辰行香既久合申㝠助用展孝思其京城及天下州府諸寺觀國忌行香一切仍舊太和七年三月勅准令國忌日惟禁飲酒舉樂至于科罰人吏部無明文但縁其日不合釐務官曹即不得決㫁刑獄大小笞責在禮律固無所妨起今後縱有此類臺府更不要舉奏均王傅王堪男損國忌日于私第決責從人為御史臺所奏遂下此勅十五年五月太常禮院奏睿宗神主祧遷其六月二十日忌并昭成皇后十二月二日忌准禮合廢從之開成四年五月太常寺奏今月二十二日祀先農於東郊其日與穆宗皇帝忌日同太和七年十二月八日季冬蜡祭百神與敬宗皇帝忌日同准其年十二月六日勅近廟忌辰奏樂非便冬季蜡祭又不可移變禮從宜古有明據宜令其日懸而不樂庶叶典經今月二十二日祀先農欲准先勅懸而不樂從之天祐二年八月八日太常禮院奏今月十二日昭宗皇帝忌其日百官閣門奏慰後赴寺行香請為永式從之諱武德九年六月太宗居春宫總萬幾下令曰依禮二名義不偏諱尼父逹聖非無前㫖近代以來曲為節制兩字兼避廢闕已多率意而行有違誥令其官號人名及公私文籍有世及民兩字不連續者並不須避永徽二年十月七日尚書左僕射于志寧奏言依禮舍故而諱新故謂親盡之祖今皇祖𢎞農府君神主上遷請依禮不諱從之顯慶五年正月一日詔孔宣設教正名為首戴聖貽範嫌名不諱比見抄寫古典至于朕名或缺其㸃畫或隨便改換恐六籍雅言會意多爽九流通義指事全違誠非立書之本自今以後繕寫舊典文書並宜使成不須隨義改易延和元年賈曾除中書舎人固辭以父名忠同音議者以為中書是曹司名又與曾父音同字别於禮無嫌曾乃就職永貞元年十二月改淳州為蠻州睦州還淳縣為清溪縣横州淳風縣為從化縣淳于姓改為于以音與憲宗名同也論者以古不諱嫌名若禹與雨驅與區臨文不諱若文王名昌武王名發周詩曰克昌厥後又曰一之日觱發魯莊公名同春秋曰同盟于幽宣公名午書曰陳侯午卒之類是也今古時變故廣避焉初憲宗為廣陵王順宗詔下將册為皇太子數日兵部尚書王詔上陳請改名紹本名與憲宗諱同時君子非之曰皇太子亦人臣也東宫之臣當請改耳奈何非其屬而遽請改名以避豈得為以禮事上耶左司員外郎李藩曰歴代故事皆因無經學之臣而失之卒不可復正多此類是時常貫之為監察御史名與東宫同獨不請改既而下詔以陸淳為給事中改名質充皇太子侍讀貫之不得已乃上疏改今名大臣溺于風俗以為細事而不正之非故事也開成元年十一月中書舎人崔龜從奏前婺王府參軍宋昻與御名同十年不改昨日參選追騐正身改更稍遲殊戾勅㫖宜殿兩選會昌六年四月二十日勅中外官寮有名與御名同者及文字㸃畫相似今後即任奏改音韻文字㸃畫不同不在奏改之限咸通十二年七月待御史李谿以奏狀内字與廟諱音同罰一季俸復執奏曰臣按禮記不諱嫌名又職制律諸犯廟諱嫌名不坐注云若禹與雨謂聲則同而字則異也今若受罰是違典例乃免之天祐元年二月二十九日中書門下奏太常寺止鼓兩字敔字上犯御名請改曰肇從之唐會要卷二十三
