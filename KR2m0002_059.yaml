body:
  text: 唐會要卷五十九宋王溥撰尚書省諸司下度支使乾元元年第五琦除度支郎中河南五道度支使二年十二月吕諲除兵部侍郎同中書門下平章事充勾當度支使上元元年五月除劉晏户部侍郎勾當度支使元年建子日元載除户部侍郎勾當度支使貞元二年二月韓滉加度支使五年二月竇參中書門下平章事度支使八年三月停建中元年五月十七日度支奏諸色錢物及鹽井利等伏緣財賦新有釐革支計闕供在臣職司夙夜憂負今後望指揮諸州若不承度支文牒輒有借使及擅租賃回換本州府録事參軍本縣令専知官並請同入已枉法贓科罪庶物無蔽隱事有條流其應合徵收諸色錢物所由官有違程限致闕軍需請停給祿料敕旨依奏其年八月宰臣楊炎奏曰夫財賦邦國之大本生人之喉命天下治亂輕重皆由焉是以前代歷選重臣主之猶懼不集往往覆敗大計一失則天下搖矣先朝權制中臣領其職以五尺宦豎操邦國之本豐儉盈虛雖大臣不得知無以計天下利害臣愚待罪宰輔陛下至德惟人是恤參校蠧弊無斯之甚請出之以歸有司然後可以議政上然之詔今後財賦皆歸左藏庫一用舊式每嵗量進二三十萬入太盈而度支先以全數聞奏初國家舊制天下財賦皆納于左庫藏而太府四時以聞尚書比部覆其出入上下相轄無甚欺誤及第五琦為度支鹽鐵使時京師多豪將求取無節琦不能禁乃悉以租賦進入太盈內庫以中人主之意天子以取給為便故不復出是以天下公賦為人君私積有司不得窺其多少國用不能計其贏縮逮二十年中官以冗名持簿書領其事者三百人皆奉給其間連結根固不可動及炎作相片言復之中外稱美焉貞元初度支杜佑讓錢穀之務引李巽自代先是度支以制用惜費漸權百司之職廣置吏員繁而難理佑始奏營繕歸之將作木炭歸之司農染練歸之少府綱條頗整公議多之二年十二月度支奏請於京城及畿縣行𣙜酒法每豫𣙜一百五十文其酒户並蠲免雜役從之永貞元年八月度支使奏當司别貯庫往年裴延齡領使務始奏置之只將正庫物減充别貯唯是虛言更無實益又創置官典守人等不免加彼料糧伏請併入正庫庶事且費省從之長慶二年三月以鴻臚卿判度支張平叔為户部侍郎依前判度支時幽鎮行營諸軍已出境仰給度支者十五餘萬人魏博滄景之師皆壓賊境而壘亦藉兵數徵計司所給自河北置供軍院其布帛衣賜往往不至供軍院遽為諸軍強奪懸師前鬭者反無支給其饋餉主吏由此得罪者前後相次平叔知國用空乏遂以邪計得司邦賦至是又寵之地卿然竟無術以救其闕驟塵顯級人皆罪之尋又上言度支所管𣙜鹽舊法為弊年深臣令官中自糶鹽法可以富國強兵勸農積貨疏其利害十八件詔下其奏令公卿議之中書舍人韋處厚抗論不可以平叔條制不周經畫未盡以為利者反害以為簡者至煩乃即其條目隨以設難事多不載末云臣竊以古人云利不百不變法功不十不易器改更之事自古所難臣於平叔無讎所陳者非挾情所議者歸利害唯聖主獨斷歸于至公然強人之所不能事必不立禁人之所必犯法必不行臣嘗為開州刺史當時被鹽監吏人橫擾官政亦欲鹽歸州縣總領其權常試研求事有不可蓋設法施行須徇風俗或東州便即西州害欲南州易即北州難且據山南一道明之興元巡管不用見錢山谷貧人隨土交易布帛既少食物隨時市鹽者或一斤麻或一兩絲或蠟或漆或魚或雞瑣細叢雜皆因所便今逼之布帛則俗且不堪其弊官中貨之以易絹勞而無功伏惟聖慮裁擇時平叔輕巧恃恩自謂言無不允及處厚駁奏上覽之稱善令示平叔詞屈其法遂罷元和十四年六月判度支皇甫鏄奏諸道州府監院每年送上都兩稅𣙜酒鹽吏料支米價等縀匹價估定數從之給事崔直抗論以為用兵嵗久百姓凋弊往者雖估逾其實不可復追疏奏不從會昌六年十一月刑部尚書判度支崔元式奏諸道所出縀匹綾絹紗等宜禁斷其舊織並不得行使仍令所在官中收納如更織造買賣同罪咸通八年十月户部判度支崔彥昭奏當司應收管江淮諸道州府今年已前兩𣙜酒諸色屬省錢準舊例逐年商人投收便換自南蠻用兵以來置供軍使當司在諸州府場院有商人便換齎省司便換文牒至本州府請領皆被州府稱準供軍使指揮占留以此商人疑惑乃致當司支用不充乞下諸道州府場監依限送納及給還商人不得託示占留從之别官判度支開元二十二年九月蕭炅除太府少卿知度支事二十三年八月李元祐除太府少卿知度支事天寶七載楊釗除給事中兼御史中丞權判度支貞元八年三月户部尚書班宏専判度支其年七月司農少卿裴延齡加權判度支十二年三月改為户部尚書判度支其年九月蘇辨除度支郎中兼御史中丞副知度支貞元已前他官來判者甚衆自後多以尚書侍郎主之别官兼者稀矣故事度支按郎中判入員外判出侍郎總統押案而已官行不言専判度支開元以後時事多故遂有他官來判者或尚書侍郎専判乃曰度支使或曰判度支或曰知度支事或曰勾當度支使雖名稱不同其事一也建中初欲使天下錢穀皆歸金部倉部終亦不行户部郎中隋為民部郎中貞觀改户部郎中自後改復名號與侍郎同天寶八載郎中張傳濟廢帳房為户部員外郎廳次北為户部郎中廳皆至宏麗又於省街東奏取都水監地以諸州籍帳錢造考常制度又過於省中移都水監於省西北割右武衛園地置之乾元以後毁拆並盡今為户部園户部員外郎改復並與郎中冃開元四年五月二十九日敕蠲符每年令當州取緊厚紙背上皆書某州某年及紙次第長官勾當同署印記京兆河南六百張上州四百張中州三百張下州二百張南安道桂廣容等五府準下州數管內州同蠲此紙不别書題州名並赴朝集使送戶部本判官掌納依次用之二十九年七月十七日每鄉置鄉望天下諸州上縣不得過二十人中縣不得過十五人下縣不得過十人其長年萬年每縣以五十人為限太原上黨晉陽三縣各以三十人為限並取耆年宿望諳識事宜灼然有景行者充天寶十二載七月十三日敕諸郡父老宜改為耆夀會昌元年二月中書門下奏伏以南省六曺皆有職分若各守官業即不因循比來户部度支兩司尚書侍郎多奏請諸行郎官判錢穀文案遂令本司郎吏束手間居至於廳事皆為他官所處臣等商量請自今已後其度支户部錢穀文案望悉令本行郎官分判不在更請行郎官限仍委尚書侍郎同諸司例自於行內選擇差判不必更一一聞奏其户部行郎官仍望委中書門下皆選擇與公務相當除授如本行員數欠少任于諸行稍間司中選其才識資序相當者奏請専授所冀蒞事有常分官無曠庶或可久以革從權敕旨依奏度支郎中隋為度支郎武德初加中字龍朔二年改為司度大夫咸亨元年復為度支郎中度支員外郎改復與郎中同開元二十四年三月六月户部尚書同中書門下三品李林甫奏租庸丁防和糴雜支春綵稅户稅草諸色旨符承前每年一造據州府及諸司計紙當五十餘萬張仍差百司抄寫事甚勞煩條目既多詳檢難遍緣無定凖支稅不恆因此涉情兼長姦偽臣今與採訪使朝集使商量有不穩便於人非當土所出者隨事沿革務從允便即望人知定凖政必有恆編成五卷以為常行旨符省司每年但據應支物數進書領行每州不過一兩紙仍附驛送敕旨依開元十二年九月以倉庫郎中判度支案蘇辨授度支郎中副知度支事仍命立于正郎之首有副知之號自辨始也元和三年十月度支使鄭元奏當司判案郎官先有六員今請用四員為定從之四年十一月加度支判案郎官一員長慶三年十二月度支奏主客員外郎判度支案白行簡當司判案郎官刑部郎中韋詞近差使西京勾當和糴遂請白行簡判案今韋詞却回其白行簡合歸本司伏以判案郎官比有六人近或止四員伏請更置郎官一員判案留白行簡充敕旨依奏金部郎中隋為金部郎武德三年加中字龍朔二年改為司珍大夫咸亨元年復舊天寶十一年三月七日改為司金郎中至德二年十二月十五日復舊金部貟外郎改復與郎中同倉部郎中隋為倉部郎武德三年加中字龍朔二年改為司庾大夫咸亨元年復舊天寶十一載三月七日改為司儲郎中至德二載十二月十五日復舊倉部員外郎改復與郎中同天寶三載七月二十三日金倉令史不許轉選及充使典建中二年正月詔天下錢穀皆歸金部倉部中書門下簡兩司郎官準格式條理鑄錢使開元二十五年二月監察御史羅文信充諸道鑄錢使天寶三載九月楊慎矜除御史中丞充鑄錢使六載十一月度支郎中楊釗充諸道鑄錢使上元元年五月劉晏除户部侍郎充勾當鑄錢使其年五月二十五日殿中監李輔國加京畿鑄錢使寶應元年六月二十八日劉晏又除户部侍郎充勾當鑄錢使廣德二年正月第五琦除户部侍郎充諸道鑄錢使其年六月三日禮部尚書除兼御史大夫充江南西道勾當鑄錢使永泰元年正月十三日劉晏充東都淮南浙東西湖南山南東道鑄錢使第五琦充京圻關內河東劍南山南西道鑄錢使大厯四年三月劉晏除吏部尚書充東都河南淮南山南東道鑄錢使五年三月二十六日停延資庫使會昌五年九月敕置備邉庫收納度支户部鹽鐵三司錢物至大中三年十月敕改延資庫初以度支郎中判至四年八月敕以宰相判右僕射平章事白敏中崔鉉相繼判其錢三司率送初年户部每年二十萬貫匹度支鹽鐵每年三十萬貫匹次年以軍用足三分減其一諸道進奉助軍錢物則收納焉咸通五年七月延資庫使夏侯孜奏鹽鐵户部先積欠當使咸通四年已前延資錢絹三百六十九萬餘貫匹從大中十二年至咸通四年九月已前除納收外欠一百五十萬五千七百一十四貫匹當使録户部積欠數多先具奏請於諸道州府場監院合納户部所收八十文除陌錢內應割十五文屬當使自收管敕命雖行所送稽緩今得户部牒稱所收管除陌錢除錢絹外更有諸雜物貨延資庫稱收不便請起今年令納延資庫錢物一時便足其已前積欠候物力稍充積漸填塞其所割十五文錢即當司仍舊收管又緣纍嵗已來嶺南用兵多支户部錢物當使不欲堅論舊欠請依户部商量合納今年額色錢絹須足明年即依舊制三月九日兩限送納畢其已前積欠仍令户部自立項納期限者敇旨依之八年九月延資庫使曹確奏户部每年合送當使三月九日兩限絹二十一萬四千一百匹錢五萬貫自大中八年已後至咸通四年積欠一百五十萬五千七百餘貫匹前使杜悰申奏起請咸通二年正月以後於諸道州府場監院合送户部八十文除陌錢內割十五文當使收管以填積欠續據户部牒稱州除陌錢有折色零碎請起咸通五年所合送延資庫錢絹逐年兩限須足其除陌十五文當司仍舊收管前使夏侯孜具事由申奏且請依户部論請期限其咸通五年錢絹户部已送納自六年至八年其錢絹依前不全送又積欠三十六萬五百七貫文者伏以所置延資庫初以備邉為名至大中三年始改今號若財貨不充則名額虛設當置之時所令三司逐分減送當使收管元敕只有錢數但令本司減割送庫不定目色以此因循漸隳舊制年月既久積欠轉多既無計以徵收乃指色以取濟稍待備邉名號得遵元敕指揮乃割户部除陌八十文內十五文收管及户部請逐年送庫須且稟從今既積欠又多終慮不及期限臣今酌量請諸道州府場監院合送户部錢絹內分配今勒留不合送延資庫數目令本處别為綱運與户部直納延資庫則户部免有逋懸不至纍年積欠從之出納使開元二十六年九月侍御史楊眘充太府出納使天寶二年六月殿中侍御史張瑄充太府出納使四載八月殿中侍御史楊釗充司農出納錢物使六載三月楊眘改户部侍郎充兩京合嘉倉出納使其載楊釗替充兩京合嘉倉出納使乾元元年度支郎中第五琦充兩京司農太府出納使禮部尚書龍朔二年改為司禮太常伯咸亨元年復舊光宅元年改為春官尚書神龍元年復為禮部尚書太和七年八月敕每年試帖經官以國子監學官充禮部不得别更奏請其𢎞文崇文兩館生齋郎並依令試經仍差都省郎官兩人覆試禮部侍郎改復與尚書同開元十二年三月十二日以考功貟外郎李昂為舉人所訟乃下詔曰每嵗舉人頃年以來惟考功郎所職位輕務重名實不倫欲盡委長官又銓選委積但六官之列體國是問况宗伯掌禮冝主賓薦自今以後每年諸色舉人及齋郎等簡試並于禮部集既衆務煩雜仍委侍郎専知貞元十五年十月髙郢為禮部侍郎時應進士多務朋遊以取聲名唯務謙柔罕理其業郢性専介尤疾其風既領職拒絶請託雖同列通熟無敢言者志在經義専考試凡三嵗掌貢士進幽獨抑聲名浮濫之風一變元和九年二月韋貫之為禮部侍郎選士皆抑浮華先行實由是趨競息焉禮部郎中隋號儀曹郎武德初因隋舊號不改三年二月改為禮部郎中龍朔二年改為司禮大夫咸亨三年復為禮部郎中光宅元年改為春官郎中神龍元年復為禮部郎中禮部員外郎改復與郎中同貞元十二年二月授許孟容禮部貟外郎有公主之子請補兩館生孟容舉令式不許主訴于上命中使問狀孟容執奏竟不可奪遷本曹郎中元和二年少府監金忠義以機巧進請蔭其子為兩館生禮部員外郎韋貫之上疏論奏曰工商之子不當仕忠義以藝通權幸不冝汚辱朝廷竟罷去之太廟齋郎開元二十四年三月十二日敕齋郎簡試並於禮部集至二十五年正月七日敕諸陵廟並宜隸宗正寺其齋郎命司封補奏至天寶十二載五月十一日陵廟依舊隸太常寺齋郎遂屬禮部至大厯二年八月二十五日敕陵廟宜令宗正寺檢校其齋郎司封又收補聞奏至貞元三年九月二十六日禮部尚書蕭昕奏太廟齋郎準式禮部補大厯三年後被司封官稱管陵廟便補奏齋郎亦無格敕文準建中元年正月五日制每事並歸有司其前件齋郎合于禮部補奏敕旨依付所司準格式處分至今禮部員外郎補貞元十二年十月朝廷欲以太學生令於郊廟攝事將去齋郎以從省便太常博士裴堪因奏議曰嚴奉宗廟時享月祭帝王展孝之重典也故致齋清宮設郎執事使夫習肄虔恪肅恭神人內盡其敬也太學置生徒服勤儒業宏闡教化發明德義用嚴師以訓之懸美祿以待之限其課第考其否臧外奬其學也夫如是齋郎官員焉可廢也太學生徒焉可亂也若慮不素潔則無以觀其敬矣志不宿著則無以成其業矣故提其名而目之表其從事也績其勤而祿之使其服志也罷齋郎則失重祭之義用學生則撓敬業之道將何以見促數之節肅敬之容強立之成待問之奧知必不能至矣况國家有典崇儒有制豈以齋郎瀆易是病而思去之學生冗惰無取而思役之誠宜名分有殊課第自别使俎豆有楚冶弓知訓供職有賞勤之利敦學得樂羣之至禮舉舊典人知向方庶乎簡牘無能代之煩監寺絶往來之弊矣將敦要本在别司存俾不相參庶合事體從之元和六年十一月禮部奏準今年九月吏部所奏敕應補太廟齋郎用蔭官並五品已上子六品常參官子補者今詳節文所用五品六品蔭者惟許子並不該孫又節文其應補太廟齋郎郊社齋郎孫用祖蔭子用父蔭即孫之與子並許收補恐前後文字有所差錯今格限已及須守敕文其孫用祖五品以上蔭者恐須準舊例收補敕旨冝令準格收補寶厯元年九月禮部奏準今年四月制當司合釐革條流兩館生齋郎資蔭年限等據舊敕應補兩館生所用蔭第皆門地清華勳賢胄胤近者時有源流或屬全疏罔冒門資變易昭穆今請如有此色自本司磨勘得實坐其家長所用蔭告身用本司印印官押署更不在行用之限保官具事由申上中書門下請諸司官典撿報不實並請準法科處分其太廟郊社齋郎亦並準此處分若用蔭曽經流貶未復本資或便身亡不曽申雪即用舊蔭竊恐非宜請更駁放其太廟齋郎亦準此處分伏緣兩館生員闕不多請補者衆今請一家不得用兩蔭許隔二年收補每用蔭補人請明置簿厯具注所補人年名日月用本司印郎官押署至補人數足後給其告身不在用限太廟齋郎準開元六年九月敕取五品已上子孫六品清資常參官子補充郊社齋郎用祖蔭官階並須五品以上用父蔭須六品以上常參官及兩府司録判司詹事府丞大理司直并有五品階者所補齋郎皆用互保其保請以六品已上清資官充其一家不得周年保兩人仍不得頻年用蔭並請準兩館生例處分敕旨依奏祠部郎中隋為祠部郎武德三年加中字龍朔二年改為司禋大夫咸亨元年復為祠部郎中祠部員外郎改復與郎中同延載元年五月十一日敕天下僧尼道士隸祠部不須屬司省開元十年正月二十三日敕祠部天下寺觀田宜準法據僧尼道士合給數外一切管收給貧下欠田丁其寺觀常住田聽以僧尼道士女冠退田充一百人以上不得過十頃五十人已上不得過七頃五十人以下不得過五頃二十五年正月七日道士女道士割隸宗正寺僧尼令祠部檢校膳部郎中隋為膳部郎武德三年加中字龍朔二年改為司膳大夫咸亨元年復為膳部郎中膳部員外郎改復與郎中冃主客郎中隋為司蕃郎皇朝為主客郎中龍朔二年改為司蕃大夫咸亨元年復為主客郎中主客員外郎改復與郎中同景龍二年九月三日敕應差敕册立諸國使並須選擇漢官不得差蕃官去祠祭使天寶六載十一月度支郎中楊釗充祠祭使至德三載五月二十四日中書侍郎王璵兼知祠祭使兵部尚書龍朔二年改為司戎太常伯咸亨元年復為兵部尚書光宅元年改為夏官尚書神龍元年復為兵部尚書天寶十一載二月二十八日改為武部尚書至德二年二月五日復為兵部尚書舊制凡武舉每歲孟冬亦與計偕有二科一曰平射試射長垜三十發不出第三院為第二曰武舉其試有七一射長垜二騎射三馬槍四步射草人五材貌六言語七舉重翹關其勳官五品以上并三衛執仗乘若品子年考已滿者並放選勳官六品以下并應宿衛人及品子五考以上者並授散官餘並帖仗然後授散官開元十七年正月二十日敕兵部兩銓令史各與一第一人簿帳共與一人並準吏部銓史第一人官員注擬十九年四月二十六日敕兵部選人請武選者宜取強壯身材六尺以上籍年四十以下堪統領者其吏部選人請文選者宜取材堪理人工于書判並無負犯十二日內定品奏聞一送以後並不在却關之限廣明元年正月敕入仕之門兵部最濫全無根本頗壞紀綱近者武官多轉入文官依資除授冝懲僭幸以辨品流今後武官不得輒入文官選改內司不在此限兵部侍郎改復與尚書同總章二年四月二日加一員以李處繹為之長夀二年正月二十四日又加一員以侯知一為之通前三員長安四年十二月三日減一員長安二年正月十七日敕天下諸州宜教武藝每年準明經進士貢舉例送開元二十六年十一月十四日敕所設武舉以求材實仕進之漸期為根本取舍之間尤宜審慎比來所試但委郎官品位既卑焉稱其事自今已後試武舉人等宜令侍郎専知天寶元年十月十三日敕自今已後應試選舉人長垜宜以十隻箭為限並入第一院與兩單上八隻入第一院兩隻入第二院與一單上次上十隻不出第三院與單上十隻不出苐四院與次上餘依恆式三載閏二月八日敕習武入官已經精簡隨畨更試事頗為煩其武官自今已後因畨試及過中門下宜停建中元年四月十七日敕兵部闕送吏部武官自今已後宜停貞元十四年九月敕鄉貢武舉并應百隻箭人等今年宜權停時諌議大夫田敦因蒙召對奏言兵部武舉每年常數百人挾持弓矢出入皇城間恐非所宜上聞而矍然故命停之其實武舉每歲不過數十人時議惡敦虛辭輒亂舊章以圖稱旨自是訖于貞元更不復元和三年五月兵部奏伏準貞元十四年九月敕鄉貢舉人權停者伏以取士之方文武並用舉選之制國朝舊章參調者既積資勞入仕者必先貢舉自經停廢今已十年别趨幸門漸絶根本典彞具在可舉而行其鄉貢舉恐須準武選處置敕旨依奏六年八月中書門下奏得兵部侍郎許孟容等狀當司準六月二日減省官員及釐革三衛等應管京官及外官共三千三百二十九員京官七百六員武官員數不多俸錢比文官較少又任中書門下兩省御史臺左右神䇿及諸軍諸使挾敕驅使員闕至少難議停省並請仍舊外官二十六萬二十三員所管諸府自折衝以下總無料錢例多闕乏空有府額其鎮戍官等或有任者不過數員縱使停減並無損益伏請存舊例六畨三衛都四千九百六十三人縱使分畨當上配役處多移牒勘會須得詳請續商量聞奏敕旨依奏十年六月盜殺宰相武元衡并傷議臣裴度時淮夷逆命凶威方熾王師問罪未有成功言事者繼上章疏請罷及盜賊竊發人情愈惑兵部侍郎許孟容詣中書流涕而言曰昔漢廷有一汲黯耳姦臣尚為寢謀今主上英聖朝廷未有過失而狂賊敢爾無狀寧謂國有人乎然轉禍為福此其時也莫若上聞起裴中丞為相令主兵柄大索賊黨窮其姦源後數日度果為相而下詔行誅時謂孟容議論有大臣風采太和五年三月兵部奏準四年五月起請節文伏以三衛出入禁署子弟期于恪恭近日頑弊皆非正身諸司公言納資訪聞亦不顧召士庶假蔭混雜縉紳此隙一開姦濫紛入其資三衛並請停廢敕旨宜依其他釐革三衛事條至多故不具載大中五年十月中書門下兩省奏應赴兵部武選門官驅使官等今年新格令守選二年得驅使官盧華等狀稱各在省驅使實緣長官辛苦事力不濟所以假此武官若廢舊格貧寒不逮即須漸請停解公事交見廢闕敕旨兩省御史臺人吏前例不選數許赴集宜令依舊例放選兵部郎中隋為兵部郎武德三年加中字龍朔二年改為司戎大夫咸亨元年復為兵部郎中員外郎改復與郎中同本兩員大定元年更加一員以趙履溫為之職方郎中隋為職方郎武德初加中字龍朔二年改為司城大夫咸亨元年復為職方郎中員外郎改復與郎中同建中元年十一月二十九日請州圖每三年一送職方今改至五年一造送如州縣有創造及山河改移即不在五年之限後復故駕部郎中隋為駕部郎武德初加中字龍朔中改司輿大夫咸亨元年復為駕部郎中員外郎改復與郎中同庫部郎中隋為庫部郎武德初加中字龍朔中改為司庫大夫咸亨元年復為庫部郎中員外郎改復與郎中同開元十八年十月四日敕衙內甲仗經行從者三年一換不經行從者四年一換非理欠損者勒陪刑部尚書龍朔二年改為司刑太常伯咸亨元年復為刑部尚書光宅元年改為秋官尚書神龍元年復為刑部尚書天寶十一載改為憲部尚書至德二載復為刑部尚書刑部侍郎改復與尚書同垂拱四年四月十一日加一員以魏尚德為之長安四年十二月減一員元和十年以御史中丞裴度兼刑部侍郎時度宣慰淮西回所言軍機多合上旨故以兼官寵之自徴兵討淮西凡十餘鎮之兵皆環于申蔡未立戰功裴度使還且令與諸朝賢詳議行人奏曰臣觀諸將唯李光顔見義能勇必能立功果首敗賊于時曲上尤賞之寶厯元年四月宣中書以諌議大夫劉栖楚為刑部侍郎丞郎宣授自栖楚始也刑部郎中隋為憲部郎唐因之武德三年改刑部加中字龍朔二年改為司刑大夫咸亨元年復為刑部郎中員外郎改復與郎中同元和十年五月信州刺史姚冀舉奏員外司馬盧南史贓犯鞫按南史準例配得直典一人每月請紙錢一千文南史以官間冗無職事放典令歸納其紙筆直前後五年計贓六十萬貫又云南史私買鉛燒黃丹是日令監察御史鄭楚相刑部員外郎裴澥大理寺評事陳正誼充三司同往覆按之將行並召於延英上謂曰卿等必須詳審推按無令漏罪銜寃三人將退澥獨留奏曰臣仔細詳覽姚冀奏狀只如所按南史取直典紙筆計贓六十餘萬貫文雖公法有違既非巨蠧或可矜恕上曰此事亦應甚有但未知燒鉛事如何澥曰燒鉛為黃丹格令不禁姚冀所奏準天寶十三載敕鉛銅錫並不許私家買賣貨易蓋防私鑄錢本文亦不言不許黃丹然南史違敕買鉛不得無罪伏以陛下自登寶位及天寶大厯以來未曽降三司使至江南今忽緣此小事差三司使損耗州縣亦恐逺方聞之各懷憂懼臣聞開元中張九齡為五嶺按察使有録事參軍告其非法朝廷唯令大理評事往按近大厯中鄂嶽觀察使吳仲儒與轉運使判官劉長卿紛競仲儒奏長卿犯贓二十萬貫時監察御史留丕就推今所奏姚冀事既無多臣若堪任此行即請獨往恐不要令三司盡行上曰卿言是也可召楚相等兩人來及入並賜坐上謂曰朕懵于理道處事未精適裴澥所奏深協事宜亦不用三人總去著一人往按問即得卿可宣付宰臣太和五年四月敕鹽鐵判官守尚書刑部郎中李石宜守本官自今已後刑部郎中諸司諸使更不得奏請充職都官郎中隋為都官郎置二人皇朝因之置一人武德三年加中字龍朔二年改為司僕大夫咸亨元年復為都官郎中都官員外郎改復與郎中同比部郎中隋為比部郎唐因之武德三年加中字龍朔二年改為司計大夫咸亨元年復為比部郎中比部員外郎改復與郎中同建中元年四月比部狀稱天下諸州及軍府赴勾帳等格每年諸色勾徵令所由長官録事參軍本判官據案狀子細勾會其一年勾獲數及勾當名品申比部一千里已下正月到二千里已下二月到餘盡三月到盡省司撿勘續下州知都至六月內結數關度支便入其年支用旨下之後限當年十二月三日內納足者諸軍支使亦準此又準大厯十二年六月十五日敕諸州府請委當道觀察判官一人每年専按覆訖準限比部者自去年以來諸州多有不到今請其不到州府委黜陟使同觀察使計會勾當發遣申省庶皆齊一法得必行敕旨依奏貞元八年閏十二月十七日尚書右丞盧邁奏伏詳比部所勾諸州不更勾諸縣唯京兆府河南府既勾府并勾縣伏以縣司文案既己申府府縣并勾事恐重煩其京兆府河南府請同諸州不勾縣案敕旨依奏十一年正月制令比部復舊敕勾京兆留府稅租長慶元年六月比部奏準制諸道年終勾帳宜依承前敕例如聞近日刺史留州數內妄有減削非理破使者委觀察使風聞按舉必重加科貶以誡刻減者其諸州府仍請各委録事參軍每年據留州定額錢物數破使去處及支使外餘剩見在錢物各具色目分明造帳依格眼申比部準常限每限五月三十日都給奏旨下之後更送户部若違限及隱漏不申録事參軍及本判官並牒吏部科罪敕旨宜從太和四年九月比部奏準太和三年十一月十八日赦文天下州府兩稅占留支用有定額其殘欠羡餘錢物並合明立條件散下諸州府者伏以德澤𢎞深優裕羣國申明舊敕曉示新規使其政有凖繩法無差繆實天下幸甚又諸州應有城郭及公𪠘屋宇器械舟車什物等合建立修理須創制添換又當州或屬將校所由有巡檢非違追捕盜賊須行賞勸合給程糧者又當州或百姓貧窮納稅不逮須矜放要添貨額者又當州遇年穀豐熟要收糴貯備以防災歉者敕旨宜依司門郎中隋為司門郎武德三年加中字龍朔二年改司門大夫咸亨元年復為司門郎中司門貟外郎改復與郎中司開元二年閏二月十日敕諸司進狀奏事並長官封題仍令本司牒所進衙門并差一官送進諸司使奏事亦準此除有告謀反大逆者任自封進工部尚書隋為起部尚書武德元年因而不改三月改為工部尚書龍朔二年改為司平太常伯咸亨元年復為工部尚書光宅元年改為冬官尚書神龍元年復為工部尚書大厯六年十二月十一日敕京城內諸坊市宅舍輒不得毁拆有犯聞奏十四年六月一日敕諸坊市邸店樓屋皆不得起樓閣臨市人家勒百日內毁拆至九月二十日京兆尹嚴郢奏坊市邸店舊樓請不毁從之工部侍郎改復與尚書同工部郎中隋為起部郎武德三年改工部郎加中字龍朔二年改司平大夫咸亨元年復為工部郎中工部員外郎改復與郎中同屯田郎中隋為屯田郎武德三年加中字龍朔二年改司田大夫咸亨元年復為屯田郎中屯田員外郎改復與郎中同長春宫使開元八年六月同州刺史薑師度兼營田長春宫使二十年三月左衛郎將皇甫惟明攝侍御史充長春宫使天寶六載三月御史中丞王鉷兼長春宮使上元元年六月四日殿中監李輔國充長春宫使寶應元年殿中監樂子昻充長春宫使至大厯九年宋誨除同州刺史充長春宮使自後遂令同州刺史充長春宫使至開元九年十二月十七日敕同蒲絳河東西并沙苑內無問新舊注田蒲藺並冝收入長春宮使檢校二十九年十一月十七日敕新豐朝邑屯田令長春宫使檢校朝邑屯田開元八年十月七日同州刺史薑師度開置虞部郎中隋為虞部郎武德三年加中字龍朔二年改司虞大夫咸亨元年復為虞部郎中虞部員外郎改復與郎中同大厯十四年八月虞部奏準式山澤之利公私共之者比來除長春宫所收私占甚多望令關內州府審勘頃畝先均給貧下百姓據厚薄莭給輕稅五分之一徵納訖市輕貨送上都如所由輒有隱漏及收管不盡並請準條科罪敕旨依奏水部郎中隋為水部郎武德三年加中字龍朔二年改司川大夫咸亨元年復為水部郎中水部員外郎改復與郎中同開元十一年正月二十一日改丹水為懷水天寶五載正月七日詔天下山水名稱或同義且不經多因于里諺事若仍舊何成區别宜令所司各據圖籍改定訖聞奏十一載五月潼關口河壖上有樹五株雖水暴長亦不漂沒時人謂之女媧墓是日因大風遂失所在至乾元二年六月十八日虢州刺史刺史王奇光奏所部閿鄉縣界女媧墓天寶間失所在今月一日夜河上側近忽聞雷聲曉見其墓湧出上有雙柳樹下有巨石其柳各髙丈餘貞元元年十二月九日敕立春日內外兩井納冰總二千五百段每段長一尺厚一尺五寸宜令府縣勾當澄濾淨潔供進開成五年七月河南尹奏皇城內伊洛等四水伏以伊洛四水載在典墳今人所呼其名甚著其第三水字御名同東周之人所以請更其名者臣遂牒所府官司録以下參議其名今得司録參軍韋瓊等狀謹按尚書周公將營洛邑卜澗水東瀍水西惟洛食孔安國傳云初卜黎水上不吉逮卜此二水之間吉伏請改第三水字為吉水者臣竊以周居洛宅卜年惟永今改此水雅叶祥符謹具如前敕旨宜依唐會要卷五十九
