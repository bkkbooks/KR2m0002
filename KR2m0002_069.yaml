body:
  text: 唐㑹要卷六十九宋王溥撰刺史下㑹昌元年正月制刺史雖非假日或有賔客須申宴餞者聽之四年八月中書門下奏比縁向外除授刺史多經半年已上方至本任或稱勅牒不到或假故滯留刺史未到前知州官屬惟務因循不急於理百姓受弊罔不由兹臣等商量今日已後勅到南省限兩日内牒本道便令進奏院遞去到本道復委觀察使勾當去任一千里内限十日進發二千里已上限十五日三千里已上限二十日仍並勒取便進發不得託以事故别取他路經過刺史於先三十箇月為限向後並望以任後計日如有前刺史諸道居住未赴闕廷者各委觀察使每季應管内有無申臺或憂制及疾廢者並須一一具言臺司待諸處報都申中書門下所冀人皆守法朝免遺才勅㫖依奏六年五月勅諸州刺史委中書門下省選擇非奉公潔已素共知者不得妄有除授到官之後理行著稱未三周年勿使移改如有才堪拔擢與人地政績須替換者不在此限又凡刺史交割之時非因災荒大郡走失七百戸以上小郡走失五百戸以上三年不得録用兼不得更與理人官増加一千戸以上者超與遷改仍令觀察使審勘諸實聞奏如涉虚妄本判官重加貶責大中元年正月勑古者郎官出為邑宰公卿外領郡符以重理人之官急為政之才也自澆風興扇此道稍削頡頏清途便至顯貴理人之術未嘗經心欲使究百姓之艱危通天下之利病不可得也朕為政之始思厚時風軒墀近臣蓋備顧問如不周知病苦何得應朕訪求自今以後諫議大夫給事中中書門下舍人未當曽任刺史縣令及在任有敗累者並不在進擬之列三年二月中書門下奏諸州刺史到郡有條勘須先申觀察使與本判官商量利害皎然分明即許施行如幸是前政利物狥公事不得輒詐移改如不存勾當踵前因循判官重加殿責觀察使聴進止仍委出使郎官御史常切詢訪舉察勅㫖依奏五年九月中書門下奏諸刺史交割及初到任下擔得替後資送下裝事應諸州刺史除替後新人在途者動經三四箇月不到任從便送處亦或一兩箇月不到舊人在既不理務又須一切州縣祗供將吏依舊衙㕘祗候守分者固難自處多端者猶能害人自今已後望令應刺史得替已除官者即勅到後交割了便赴任如未除官者勅到後與知州官分明交割倉庫及諸色事並分明交割以便令舊刺史離本任行牒所勘問結前刺史如大段差謬即委具事狀奏聞其知州官别議推罷郡刺史未别除官者准㑹昌九年勅文已令所司在州縣供給伏恐日月久深不遵舊制望令所在經過州縣准舊節文處分勿使羈旅州許供三日縣許供二日應諸州刺史初到任准例皆有一擔什物離任時亦例有資送成例已久州司各有定額准乾元元年及至徳二載并㑹昌元年制勅比禁科率所由抑配人戸至於用州司公解及雜利潤天下州郡皆自有矩制縁未曽有明勅處分多被無良人吏百姓便致詞告云是贓犯自今已後應刺史下擔什物及除替送錢物但不率歛官吏不科配百姓一任各守州郡舊亦不得分外别有添置若輒率科斂故違勅條當以入已贓犯法餘望准前後勅處分勅㫖宜依仍編入格令永為常式六年五月中書門下奏嶺南桂管容管黔中安南等道刺史自今已後伏請於毎年終薦送各官選擇技量資序稍議饒本道或知有才能亦許論薦仍須管資相送厯任分明更不在奏散試官充司馬權知州事限勅㫖依奏其年十二月中書門下應諸州刺史並仰到任後一季以來尋訪凋瘵之由搜求疾苦之本兩季以後可以周知伏以古之報政備在典章後代因循曽無實效今請觀察使刺史到任一年即悉釐具革制置諸色公事逐件分析聞奏并申中書門下視其所司真偽自分能可辦事有可行者著為令典使久遵守既欲責其潔已須令俸禄少充以厚薄不同等級無制致使俸薄者無人願去禄厚者終日爭先應申下州司馬與軍事俸料共不滿一百千者請添至一百千其上州有不滿一百五十千者請添至百五十千其雄望州不滿二百千者請添二百千其先過者仍舊並於軍事雜錢中方員置本收利充給如别帶使額者並依舊不在添限其無明文額外徵求或送故迎新廣為率歛或因徵發頓近横有破除皆是貧戸出錢惟使姦人得計其他侵擾色目至多不問公私一切禁㫁其刺史為政必除其人瘼在官勵於公心目限纔終即議遷奬其或不出常流全無政績須知事分合守田園不可得替來求官稍遲即興怨謗自今已後應詣刺史得替求官者亦准前任年月為限滿者即量才除授使免饑寒未滿者任其東西使營生計其有課績殊異亷使薦論校勘不虚誠可優升者不在此限若授任之後聲實相乖即是廉使别帶私情或因權勢論說上罔明主下困齊人所罪並歸舉主勅旨卿等所條流廉問牧宰等實繋生靈之慘舒化源之切務並依所奏大中九年二月除醴泉縣令李君奭為懐州刺史非常例也初上校獵渭上見近縣父老於香林寺設齋為君奭祈福恐秩滿受代上異之踰年宰相以懐州缺刺史上聞御筆除之都督刺史已下雜録武徳元年六月七日諸州總管加號使持節刺史加號持節顯慶元年九月二十六日制督府及上州各置執刀五十人中州下州各置十人令於衙内祇承都督刺史至貞元元年廢從福建觀察使王雍奏也咸亨五年九月勅諸州都督刺史及上佐見執魚契者中間遷改須有分付其有選改無三官者且留知州事待攝官及三官内一人至任依常垂拱九年七月諸州置子録事二年正月諸州都督刺史宜准京官帶魚袋三年二月上州置市令先天二年正月勅河北諸州加團兵為本州刺史押當其年七月二十四日勅自今已後都督刺史毎欲赴任皆引面辭朕當與疇咨用觀方略至任之後宜待四考滿隨事褒貶與之改轉開元元年十二月三十日勅都督刺史都䕶毎欲赴任皆引面辭訖側門取候進止八年二月十二日勅都督刺史品卑者借緋魚袋十七年二月勅諸都督刺史上佐等官員缺非安穏者所授官在京一考已上宜謹與改轉乾元元年六月六日勅令冬入考刺史自今已後並宜停至大厯十四年六月一日勅諸州刺史上佐並許每年入計至七月四日勅宜起十五年已後已依常式至建中元年三月二十五日勅各委本州定上佐入考寳應二年七月十一日勅文自今已後改轉刺史三年為限縣令四年為限至貞元元年十一月十一日勅文自今已後刺史縣令未經三考不得改移至六年十一月八日勅文自今已後刺史縣令以四考為滿永泰二年九月二十二日諸府刺史都䕶大都督府長史有犯者自今已後降魚書停務訖然後推勘聞奏如未降魚書不在推限至大厯十二年五月十日勅諸州刺史替代及别追皆降魚書然後離任無事不得輒追赴使及出境刺史有故闕使司不得差攝但令上佐知州事宰相常充奏也至貞元三年十月勅刺史停務則降魚書先是此制自廣徳已後多不施行又將節帖權刺史悉由其令魚書皆廢至是彰州刺史張遜坐事轉鞫之有司請舉舊制也貞元四年正月一日勅文自今已後刺史不得輒離本界如是縁司使任以文牒計㑹應縁州事巨細聴聞奏如刺史闕上佐當日聞奏并牒報中書門下省十四年十一月十二日考功奏所在長吏請立徳政碑並須去任後申請仍須有灼然事蹟乃許奏成若無故在任申請者刺史縣令委本道觀察使勘問太和二年二月宰臣李絳進則天太后刪定兆人本業記三卷宜令諸州刺史寫本散配鄉村别駕武徳元年六月置别駕貞觀二十三年七月五日改别駕為長史上元二年十月十日又置别駕其長史如故上州從四品中州五品下州從五品止以諸王子為之至永隆元年又廢至永淳元年七月八日復置别駕官至景雲元年始用庶姓為之至開元六年二月十二日勅舊例别駕皆是諸親比年已來頗多諸色先授者未能煩輟已後者自循舊章去冬有因入計不可更令却往宜並量材受用至天寳八載八月二十六日勅諸郡各置三官别駕不煩更置政存省要豈在多員其别駕隨缺便停下州置長史一員上元二年九月二十一日勅文其别駕依却置六年四月勅别駕録事㕘軍有犯贓者禁身推問疾患者准式不稱所職者戸口流散者並委本處聞奏其贓犯者禁身推問疾患者令解所職老耄暗弱才不稱職者量資考改與員外官大厯十四年六月勅文諸州刺史上佐自今已後准入計建中元年正月十九日諸州府品已上正員内上佐宜待四考滿停左降官不在限太和元年正月宰相常處厚奏請復置六雄十望十𦂳三十四州别駕先是貞元中宰相齊抗奏减冗員罷諸州别駕其京百官合入别駕多處之朝列及元和已後兩河用兵偏禆立功者率以儲寀王官雜補之處厚乃復請置别駕以處焉七年八月九日勅諸王等今後相次出閣且授𦂳望已上州刺史上佐開成三年十二月勅今後諸道節度團練防禦等使不得更奏大將元巡内上佐官大中四年六月勅光州比是中州停廢司馬員額今以升為上州宜令却置司馬判司景雲三年八月二日勅諸州置司田㕘軍一員唐隆元年七月十九日廢上元二年九月二十一日又置并置田正三人開元十五年四月十三日朔方五城各置田曹㕘軍一員階品俸料一事已上同軍家判司專知營田乾元元年四月十四日勅文録事㕘軍自今已後宜升判司一人大厯十四年十二月五日諸州府學博士改為文學品秩同㕘軍位在㕘軍上縣令武徳元年六月八日大興長安二縣令改為正五品雍州諸縣令為從五品至天寳元年六月九日勅長安萬年縣令授任京判職在養人小有不躬甚妨緝理况道路遥逺往來淹滯遲日百姓披陳未免停止至於疏决固在及時自今已後專令在縣理事每五日聴一入朝開元四年十一月勅撫字之首在於縣令不許出使多不得考每年選補皆不説此官若不優矜何由奬勸其縣令在任戸口増益界内豐稔清勤著稱賦役均平者先與上考不在當州考額之限二十八年六月淮南道採訪使李知柔奏縣令考滿准格交付户口食糧臣近巡按諸州多有考秩向終替人未到請假便去望每至考滿年州司不得給假如有先請假未還考滿者勒到百日内却赴任准格交户口食糧違者量殿三數選勑㫖依奏諸道亦宜准此二十九年七月勅諸天下諸州縣望鄉上縣不得過二十人中縣不得過十五人下縣不得過十人仍委採訪使與州縣長官相知選申中書門下天寳九載三月十二日勅親人之官莫過於縣令比來選司取人必限書判且文學政事本是異科求備一人百中無一况古來良宰豈必文人自今已後郎官御史先於縣令中三考已上有政績者取仍永為恒式其載十二月勅郡縣官僚共為貨殖近聞有放債侵人互為徵收割剥黎庶自今已後更有此色并遣人影認一匹以上其放債官先解見任物仍納官有刺利者准發處分上元元年正月勅丞簿等有犯贓私連坐縣令其罪减所犯官一等使遞相管轄不敢為非乾元元年三月五日勅縣令録事㕘軍自今已後選司所擬宜准故事過中書門下更審詳擇仍永為恒式廣徳二年六月勅諸州府録事㕘軍及縣令其有帶職兼官判試權知檢校等官者自今已後吏部不在用缺之限永泰元年正月勅諸州府縣今後有才不稱職及犯贓私即任夲使及州府奏人請替餘並不任奏請其所許奏人仍須灼然公請曽經驅使考課効資厯當者兼具厯任申授年月并所替官合替事由同奏建中元年六月門下省奏録事㕘軍縣令三考無上考兩任共經五考以上無三上考及不帶清白陟狀者並請不重注令録勅㫖依奏貞元二年二月京兆尹鮑防奏狀准廣徳二年勅中書門下及兩省官五品已上尚書省四品已上諸司正員三品已上官諸王駙馬等周親已上親及女壻外甥等自今已後不得任京兆府判司及畿縣令兩京縣丞簿尉等者今咸陽縣令賈全是臣親外甥恐須停罷詔曰功勞近臣至親子弟既取繁劇或招過犯寛容則撓法恥責則虧恩不令守官誠為至當賈全等十人昨縁畿内凋殘親自選擇事非常制不合避嫌四年正月勅文户口増加刺史加階縣令减選優與處分諸色中有清白政術堪任刺史縣令者常㕘官各舉所知朕當親自䇿試其年十月上召京兆府諸縣令對於延英殿以人之疾苦具慰誨之各賜衣一襲八年八月勅薦官今年新授縣令宜准前後刺例待人計日四考後赴上元和六年正月勅江淮大縣每嵗據闕委三省御史臺諸司長官節度觀察使各舉堪任縣令不限選數並許赴集臺司省官及刺史赤縣令有闕先於縣令中採擇有能否與元舉人賞罰三年三月吏部奏應授三千里外縣替年終缺人等准元和二年五月十九日收量抽三千里外縣令至元和三年終計日成四考闕其新授三千里外縣令等合用待舊人成四考後至十二月二十五日赴請准元和三年三月二十四日勅其新授三千里外官人請從申下後不許程限但至十二月内赴上加出十二月内即連程例處分如授替人續有故事便請放授官人上止不必待至十二月仍請自今已後每年若有替年終缺人亦請准此勅㫖依奏五年四月勅元和三年勅書所舉縣令皆直言其事不得妄有文飾須吏部舉其事狀隨事檢勘者令主兵略勘資厯記未究人材自今已後宜委吏部精加考覈必使詳實不同早選人例酬官仍令四時注授其觀察使刺史所舉人不得授以本州府縣令到任後有犯罪其所舉主准前勅貶罪四年正月中書門下奏狀准元和六年制書舉薦縣令等前後勅文非一有司難於遵守今請中外所舉縣令並隨表狀十月三日到省省司精加磨勘依選人例分入三銓注擬平選人中有資序事跡人才與前舉縣令相類即先注其四時集望停從之令長人之吏也比以資授多不稱官故令庶僚薦舉所知以廣得人之路及舉薦上才或不省就薦者多不出其類徒以未涉資序超踐優秩論者以為啟倖門故稍復舊制焉六年十月中書門下奏准建中元年勅毎年授官人令舉自代狀者又臣聞周之羣寮委於冡宰漢之多士辟於有司故凡稱大僚皆得盡善陛下念黎元之困設令長之科羣僚舉知天下䝉福惟善薦延相繼敦勸大行茍或容私則利害攸伏請所舉縣令到任刑罸寃濫及有贓犯者其舉薦官削階及停見任書下考並准元和三年勅處分委御史臺諸道觀察使嚴加察訪不得容貸其諸道所奉官屬及有狀諭薦人如有贓犯過惡亦請具名聞奏量加殿罰所冀人知所懼不敢妄行為官擇人得賢報國從之七年四月勅諸道州府有田戸無桑處每約一畆種桑兩根勒縣令專勾當每年終委所在長史檢察量其功課具殿最聞奏十一年九月中書門下奉每舉薦縣令字人之官從官所重遂論許薦冀得循良自今已後舉人事跡與節文同及檢勘無憑據并到任後勅文雖條約比來銓不稱職及有負犯事並請量輕重坐其舉主如輕則削奪重則貶責伏以前授勅文雖有條約比來銓覆多務因循今重申明所貴畫一其所舉人到省後所司檢勘如節文不同仰具事由并舉人名御申中書門下如有司鹵莽使與判丞察知事狀有所違越則所司亦與舉主同坐從之長慶元年五月勅自今已後舉縣令宜停㑹昌元年三月制節文如聞比者縱情杯酒之間施刑喜怒之際致使薄書停廢刑獄滯寃其餘縣令每月非假日不得輒㑹賔客游宴六月五日勅縣令員數至廣朝廷難悉知諸吏部注擬只繫資考訪聞近日多不得人委觀察使刺史於前資官及承前攝官曽有課績人中精加選擇具名聞奏中書門下勘資厯記除本道縣令如後犯贓違法即連坐所舉人及判官重加懲貶其月勅自今已後縣令非因災旱交割之時失走二百戸以上者殿一選三百戸已上者書下考殿兩選如増加二百戸以上者减一選五百户以上者書上考减兩選已减者優與進改大中元年正月勅守宰親人職當撫字三載考職著在格言上元之中頻詔今縣令五考方得改移近者因循都不遵守諸州縣令得三考兩府畿亦罕及二年以此字人望其成化簿書案牘寧免姦欺道路有迎送之勞鄉里無蘇息之望自今已後刺史縣令除授後一例滿三十六箇月方得更換其責授遷擢即不在此限其替後量其課績作等聞奏其在第一等中書門下及吏部優與處分第二等依資改轉第三等量加降黜其授替後委刺史録事㕘軍比量等第申觀察使便與本判官勘覆請資申奏以後因事考覆有不如所奏觀察判官錄事㕘軍據人數節級懲罰觀察使奏取進止二年二月刑部起清節文起今後縣令有贓犯錄事㕘軍不舉者請减縣令二等給罪其録事㕘軍有罪刺史不舉刺史有罪觀察使不舉者並所司奏聴勅㫖三年九月中書門下奏兩府畿令及次赤令伏以古者為吏長子孫葢言其在官之久也然後備諳風俗政術可施近日入任門多替稍速近以降手勅續又面奏徳音應選擇者不得其人欲居撫字者久安其任臣等商量自今已後其兩府判司及縣丞尉不帶勅額事及不知捕賊不得非時奏請如或政績尤異與朝廷别有奬㧞及職事不修須議替者不在此限内勅㫖依奏其月勅諸道所舉縣令宜直言事跡不得妄飾虚詞委吏部精加覈實當有懲殿兩畿令未成三考不在替限四年正月勅節文應天下縣令有利於人而可舉行者有害於物而可革去者並委所在縣令具别於刺史刺史具列上聞委中書門下據事下刺史下觀察使詳酌聞奏當與改更或在官因循不舉必當重責罰更不得授縣令丞簿尉武徳七年正月勅每州置大中正一人掌知州内人物以本州人聞望者兼領無品秩至貞觀初廢其年三月二十九日改縣正為縣尉開元十六年五月二十五日勅州府及縣倉督府司佐史縣録事里正等若有理行明嫻案牘任經十年不在解限寳應元年五月十九日制州縣官自今已後三考一替其考滿皆令待替人不到宜校四考校停至六月九日勅准式凡經四考加年勞一階今既三考即替其階特許結敘其年十二月勅吏部侍郎張孚奏今年五月十九日制州縣官自今已後宜令三考一替者今數州申解疑三考後為待替到為便勒停今望令校三考官待替到替人不到請待校四考後停至貞元六年十二月二日勅刺史縣令以四考為限赤令既是常㕘官不在四考限次赤令既同京官宜以三考為限至九年七月十九日諸州縣令既以四考為限如無替者宜至五考後停貞元二年五月十九日勅州縣劇務不可缺人自今已後諸司諸使不得差兩府判司畿赤官出界勾當事如有籍其才能奏請改官任使者不在此限大中三年九月勅兩判司縣丞簿尉不帶勅額職事者及不知捕賊不得非時奏請如是故非常須行奬黜者不在此限州府及縣加减員天寳五載九月勅减劍南瓊山郡㕘軍兩員縣丞三員主簿三員八載昭應縣更加簿尉各一員寳應元年十月四日鳳翔府㕘軍六員請减兩員縣丞兩員减一員主簿兩員减一員簿尉六員天興縣准此大厯二年八月十三日隴鳳兩州除刺史外請各置别駕一員録事㕘軍一員司功司戸各一員每縣令尉各一員本道奏四年三月四日長安萬年縣丞各减一員主簿一員尉兩員昭應縣丞簿一員尉兩員好畤同官奏原各减丞尉一員至五年五月十四日省京兆田功兵士曹各一員㕘軍兩員至十四年三月五日並復置十一年六月十三日鳳翔府加㑹曹㕘軍一員普閏縣請加尉一員本府奏其年七月二十九日商州停司田㕘軍上洛商洛兩縣令外留主簿及尉一員其丞簿請停洛南等三縣唯留縣令及主簿餘並停本州奏建中二年四月幽州管内每縣置尉兩員餘並停本道奏貞元元年九月御史大夫崔縱奏内外官員臣伏以兵戎未息仕進頗多在官者既合序遷有功者必須褒賞比來每至選集不免據闕留人嘗歎遺才仍招怨望况縁頻有恩詔甄録功勞諸道敘優人數甚廣見須處置不可稽留若令停减吏員實恐未便於事非但承優者無官可授抑又序進者無路可容本冀便人翻成歛怨恐須仍舊以適其宜更待事平復議經制勅㫖依奏二年九月二十五日許州停减正員官五十四員本道奏十二月十九日申光管内停正員六十一員本道奏三年正月十七日勅東都畿内唐汝鄧三州停减官員准許蔡等州例其年五月宰相張延賞奏曰為政之本必先命官舊制官員繁而且費州縣殘破職此之由也臣在荆南所管州縣闕官員者少不下十數年吏部未嘗補授但令一官假攝公事亦理以此言之官員可减無可疑也請减官員收其禄俸以資幕士從之閏五月八日勅諸上等州刺史上佐一員録事㕘軍司戸司兵司士各一員中州刺史上佐一員録事㕘軍司户司兵各一員下州刺史上佐各一員録事㕘軍司戸各一員諸州㕘軍一半諸縣中等已上令一員尉一員下縣令一員京兆河南府司録判司及四赤縣丞縣尉量留一半㕘軍全留餘並停省其諸赤及畿縣每縣留令一員丞一員簿一員尉一員餘府准上等州縣例以諸州戸口减耗三分去二其官員合省今員缺偏併尚未均平宜令所司依前件額即分析州縣等第與奏其在降官且仍舊其餘一切權停至來年五月三十日續取分其應停减官俸糧禄職田雜料手力糧課等一切已上各宜令度支勘審檢收納送上都左藏庫收貯充賞戰士所用至七月其先减官員宜仍舊五年六月二十日興元府少尹司録戸法二曹各兩員功倉田兵士曹文學各一員㕘軍録事各四員南鄭令丞主簿兩員尉三員固城襄城縣令丞簿各一員尉各三員金牛三泉縣令丞簿各兩員八年四月容管經略使奏當管今請除刺史留官一百七十三員餘並請停减其課料請迴充將士資賜從之其年十二月汝州奏七縣更量復尉一員依奏十四年八月魏博節度使却置管内州縣官都八十一員倉曹㕘軍戸曹㕘軍兵曹㕘軍法曹㕘軍已上請依前置雙曹田曹㕘軍文學市令闕已上請依前置闕元城縣貴鄉縣闕已上請依前置更縣尉一員相州貝州博州澶州衛州司法㕘軍司士㕘軍司田㕘軍文學市令闕已上請依前置魏州昌樂縣魏縣冠氏縣館陶縣朝城縣草縣相州安陽縣鄴縣内黄縣臨河縣湯隂縣堯城縣洹水縣臨漳縣城安縣臨慮縣具州宗城縣臨清縣清河縣永濟縣厯亭縣徑城縣武縣夏津縣漳南縣州城縣堂邑縣清平縣博平縣武水縣髙唐縣漕州頓丘縣黄縣觀城縣清豐縣已上四十一縣請依前置尉丞勅㫖依奏十七年三月勅天下州府别駕及司田田曹㕘軍除京兆河南太原三府外其諸州府判司雙曹者各省其一録事㕘軍准判司例元和六年六月宰臣李吉甫奏請减職員量定中外俸糧伏以唐虞建官不過數十夏商官倍方及三百周禮漢志兼具胥吏其職員稍廣然約後漢命官數亦不過七八千員自漢至隋十有三代攝其官員皆少於國家所置事具史籍不敢備陳伏惟睿聖文武皇帝陛下稟上聖之姿啟中興之運光宅萬方富有天下及兹七年垂日月之明以搜俊乂崇勲華之俗以厚生靈然而人未富者葢由流品尚雜職員尚多存無事之官食至重之稅生人轉困冗食益繁臣等日夜計此非不至熟臣按晉時荀朂上疏稱省吏不如省官省官不如省事漢光武幷合吏員州郡縣邑纔十分置一此省官也魏大和中曽遣王人四出減吏員之半此省吏也晉武從之於是減州郡一半人吏以赴農務及周太祖於隴坁東敗齊用蘇綽為相釐改憲度議曰善官人者必先省其官蓋官省則事省事省則人清官煩則事煩事煩則人濁清濁之由在於官之煩省由是兼假之員悉皆罷黜國家自天寳以後中原宿兵見在軍士可計者已八十餘萬其餘去為商販度為僧道雜入色役不歸農桑者又十有五六是天下以三分勞筋苦骨之人奉七分待衣坐食之輩臣每念至此何嘗不中夜輟寢對案忘食幸遇陛下膺期撫運惟新盛業澄源正本孰急於斯臣竊計當今内外官見以兩稅錢給俸料者不下一萬員其間有職出異名事離本局府寺曠廢簮組因循者甚衆况歛賦日寡而授禄者漸多設官有限而入色者無數九流安得不雜萬務安得不煩况漢初置郡不過六十文景醲化百王莫先郡少則必不政紊郡多則必不事理分明之驗也今天下三百郡一千四百餘縣故有一邑之地虚設羣司一鄉之甿徒分縣職所費至廣所制全輕凡此之流並須釐革伏請勅吏部侍郎一人郎中一人兵部侍郎一人給事中中書舍人各一人錯綜利病詳定廢置其吏員可併省者併省之州縣可併合者併合之每年入仕之徒可停减者停减之此則利廣而易求官省而易理稍减冗食足寛疲甿從之遂命給事中段平仲中書舍人韋貫之兵部侍郎許孟容戸部侍郎李絳同詳定减省州縣等事其年九月吏部奏准勅併省内外職員諸州府共八百八員其中下判文學中下縣丞市令一例停减餘官並量减諸王府除五品已上官外録事㕘軍一員功曹㕘軍二員餘並請减至十三年正月省蔡州汝南尉十四年三月吏部奏請用鄆曹濮等一十三州縣官員其十二州諸各置録事及司局法等㕘軍各一員縣置令簿尉各一員待給復滿日依舊從之五年正月鎮州觀察使王承宗奏鎮冀深隨等四州請每州置録事㕘軍一員判司三員每縣置令録一員主簿一員尉一員又從之太和二年十月西州觀察使奏加减管内州官員彭州濛陽縣眉州彭山縣卭州安仁縣尉各兩員今請减一員漢州雒縣什邡縣尉各一員今請更加一員綿竹縣元無縣尉今請置尉一員眉州文學㕘軍共三員今請减㕘軍一員邛州文學㕘軍二員今請减一員漢州並無文學㕘軍今請各置一員其料課職田禄米等伏望各依元額支給從之九年九月淄青觀察使王彦威奏請停管内縣丞二十九員人從之㑹昌四年五月中書門下奏應諸州縣佐官近今約戸稅多少量佐官實欲漸去冗員以懲尸素今諸道所奏戸滿五千稅滿一萬不合停减者其類已多又假以當路為詞猶務占惜臣等商量當路頓亦不常有若遇大軍頓即權勾當餘所存例多如此望令吏部郎中栁仲郢據元勅額類㑹停减不得許其破除勅㫖依奏其年六月吏部奏准會昌三年十一月十三日及今年五月十日勅類㑹停减諸州府縣佐官冗員今以州府申闕解内戸稅多少及州府官員閒劇類會合减官員一千二百一十四員勅㫖依奏大和元年五月邠寧觀察使張寧緒奏當道新平三水永壽宜禄等四縣請各置主簿一員㑹昌四年六月十九日准勅以稅額數少悉减佐官今伏請依前每縣各置主簿一員勅㫖依奏諸處有佐官處並不得授引此例其年七月滄濟徳等州觀察使奏當道於諸舊减員縣各置縣尉一員從之十二月吏部奏諸州縣官准㑹昌四年六月十九日勅停减共一千二百二十四員伏奏今年十一月二十二日勅宜令吏部㨂擇縣邑有人戸五千稅錢一萬貫以上與一員官仍天下州縣所添不得過四百員者准勅條流諸添置外兼於州官内據税錢額定等第及觀察使節度州量各添置共三百八十三員天祐元年五月勅河南府畿縣先减尉一員可依京兆府例復置縣尉一員唐㑹要卷六十九
