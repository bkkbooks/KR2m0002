body:
  text: 唐㑹要卷五十三宋王溥撰舉賢貞觀元年三月上謂尚書右僕射封德彞曰比來令卿舉賢才未嘗有所推薦天下事重宜分朕憂對曰臣愚豈敢不盡心但今所見未有奇才異行上曰前代明王使人如器不借才於異代皆取士於當時何代無賢才但患遺之不知耳德彛慚而退三年太宗謂宰臣曰朕今孜孜求士欲専心正道聞有好人則抽擢驅使而議者多稱皆宰相親故公等至公行事勿避此言便為形迹古人內舉不避讎而為後代稱者以其舉得賢故也卿等但能舉用得才雖是子弟及有讎嫌不能不舉十三年桂州都督李𢎞節以清慎聞身殁之後其家賣珠上聞之乃宣言於朝曰此人生時宰相皆言其清白今日既然所舉者豈得無罪必當理之不可捨也特進魏徵諫曰陛下言此人不清未見受財之所聞其賣珠將罪舉者臣不知所謂自聖朝以來為國盡忠清正自守終始不渝者屈突通張道源而已通子三人來選有一匹羸馬道源兒子不能存立未見一言及至今𢎞節為國立功前後大䝉賞賚居官終末不言貪殘妻子鬻珠未為有罪審其清者無所存問疑其濁者傍罪舉人雖云疾惡情深亦實好善未篤臣竊思度未見其可恐有識聞之必生橫議伏惟再思上撫掌曰造次不思遂有此語方知談不容易十五年太宗謂宰臣曰致太平之運者惟在得賢才卿等既不能知朕又不可遍識日復一日無得人之理今欲令人自舉於事何如魏徴曰知人者智自知者明知人既以為難自知誠亦不易且矜能伐善恐長澆競之風上深然之開元四年黃門監盧懷慎上疏曰臣待罪樞密頗積年序報國之心空知自許推賢之志終未克申臣自染疾疢轉益危頓雖鳬雁之飛未為乏少而犬馬之志終莫上聞其鳴也哀乞垂聖察竊見廣州都督宋璟立性公直執心貞固文學可以經務試略可以佐時動惟直道詣不茍合聞諸朝野之說實為社稷之臣衢州刺史李朝隱操履堅正才識通瞻守文奉法頗懷鐵石之心事上竭誠實盡大臣之節豫州刺史盧從願清正謹慎理識周密始終若一朝野共知簡要之才不可多得並明時重器聖世良臣比經任使有愆然所坐者小所棄者大所纍者輕所貶者逺日月雖近譴責傷深望垂矜録漸加進用臣瞑目不遙厚恩未報黜殯之義敢不庶幾城郢之言思有聞薦謹令外生監察御史鄭齊嬰奉表以聞大厯十四年閏五月以河南少尹崔祐甫代常衮為門下侍郎平章事先是永泰之後四方既定而元載秉政公道隘塞官由賄成中書主事卓倩李榮輩用事官爵大者出元載小者出倩榮四方齎金帛者相屬於路綱紀大壞及載敗後楊綰尋卒常衮當國杜絶其門四方奏請莫有過者雖權與匹夫等非詞賦登科者莫得進用賄賂雖絶無所甄異而賢愚同滯及祐甫代衮薦延推舉無復凝滯作相未逾年除吏八百員多稱允當上嘗謂曰有人謗卿所除授人多涉親故何也對曰頻奉聖旨以所任庶官必須諳其才行者臣與相識方可粗諳若平生未相識何由知其言行獲謗之由在此上深然之太和元年文宗勤于聽政然無決斷宰相韋處厚論奏曰陛下不以臣等不肖用為宰相參議大政凡有奏請初䝉聽納尋乃中變若出自宸斷即示臣等不信若出于橫議臣等何名鼎司且裴度元勳舊德厯輔四朝陛下固宜親重竇易直長厚忠事先朝陛下固宜委信上深然之自是宰臣敷奏人不敢橫議委任貞觀元年尚書右僕射杜如誨奏言監察御史陳師合上狀論事兼言人之思慮有限一人不可總知數職以論臣等太宗謂戴胄曰朕以至公理天下今用𤣥齡如誨非為勳舊以其有才故也此人妄事毁謗上欲離間我君臣昔蜀後主昏弱齊文宣狂悖然國稱理者以能任諸葛亮楊遵彥不猜之故也朕今用如誨等亦復如此於是流師合於嶺外上元二年張文瓘加侍中或時在家朝廷每有大事上必問諸宰臣曰與文瓘議未奏云未者則遣共籌之奏云已議者皆即可奏永隆二年八月髙宗嘗謂中書令薛元超曰長得卿在中書不籍多人也建中元年六月中書侍郎平章事崔祐甫薨初祐甫疾輿入中書卧而承旨或休假在私第遷除大事必密咨以决焉元和三年十一月上鋭于為理既相裴垍等且喜得人聽政之暇遍讀列聖實録貞觀開元故事竦慕不能釋卷嘗謂垍等曰太宗之創業如此我讀國書始知萬倍不及當先聖之代猶須宰臣與百官同心輔助豈朕今日獨能為理哉事有乖宜望卿盡力匡救垍等蹈舞進賀曰陛下言及於此宗社無疆之福臣等駑劣不副聖心垍亦孜孜奉上每思敷奏伏引太宗躬勤聽覽以諷上上嘉納之自是延英議政晝漏率下五六刻自貞元十年以後朝廷威柄日削方鎮權重德宗不任宰臣以事人間細務多端臨決裴延齡等得以姦進而登台輔者備位而已上在藩纍月言事者頗以此為言上亦知其非及永貞監國羣臣謁見宰相杜黃裳首以君臣大義激起上心上既聞黃裳之言聳聽延納黃裳首建誅劉闢之䇿又李吉甫自翰林學士參定平蜀蜀平而吉甫出鎮垍又繼之故自臨御迄于元和軍國樞機盡歸之宰府由是咸理綱目用張焉十二年八月時以討元濟聚天下之兵四年矣財殫力屈宰相三人唯裴度獨言賊可滅上病之因使三相俱以狀陳利害唯度獨不言利害唯請以身自督戰明日延英對宰臣將出上獨止度謂曰卿必能行乎度稽首流涕曰臣誓不與此賊偕全上為之動度又言賊已困但以羣帥不一故未降耳上深嘉之即用度為淮西宣慰使但以彰義軍節度使韓𢎞故未為都統而度實行元帥事仍以郾城為理所崇奬總章二年諸宰臣以政事堂供饌珍美議减其料東臺侍郎張文瓘曰此食天子所以重機務待賢才也吾輩若不任其職當即陳乞以避賢路不可减削公膳以邀求名譽也國家之所以費不在於此苟有益於公道斯亦不為多也聖厯三年四月初三日敕同中書門下平章事賜食並同中書門下三品例開元十年八月有上書者以為國之執政同其休戚若不稍加崇重何以責其盡心至十一月二十八日敕曰侍中源乾曜中書令張嘉貞兵部尚書張說等忠誠輔弼以致升平褒德賞功先王制也自今已後中書門下冝供食實封三百戶自我禮賢為百代法仍令所司即令支給二十年十二月為宰臣兼官者並兩給俸料天寶五載六月三日敕三伏內令宰相辰時還宅天寶十三年正月中書侍郎平章事楊綰居位旬日為風恙所中優詔令就中書攝養每引于延英殿特許扶入及綰疾亟上日發中使就第存問又出內醫藥一日之中數輩相望于路臨終中使在門以凶問馳報本上驚悼久之即日下詔贈司徒發使柩前册授令及未斂宰臣百官就第弔喪上令宣旨謂百官曰天不使朕致太平何奪我楊綰之速也俯及大斂與卿等悲悼太常初諡曰文正有詔改諡曰文簡十四年九月二十四日敕自今已後宰臣出守方鎮中書門下并百官並許迎送不須聞奏建中四年正月故事每日出內㕑食以賜宰相家其實可食數人常衮特請罷之迄今便為故事又將固讓堂㕑食同列以為不可而止議者以為厚祿重賜所以優賢國政也不能辭位不宜辭祿食貞元十三年七月宰相盧邁請告四上表乞避位上命羣臣問疾於私第元和三年杜佑以去年春已乞致政上於舊臣極隆恩禮表再請上許遂减其朝謁居一嵗復令入中書議政事復以不逮為請遂許一月三度朝謁四年二月詔曰司徒兼中書令裴度盛有勳業纍踐台衡比緣疾恙仍未謝政須加優異用示恩榮其本官俸料所司起今日支給其年宰臣楊嗣復纍上表請退優詔不許尋又遣內官弓箭庫使張克已就第宣諭曰大臣引退或以年以疾未有尚勇退之名忘君臣大義卿心以為知止朕却以為近名大臣進退須繫朕心不可因儕列之一言決然捨朕於理未當卿更思之明日朕開延英即便須參假候對卿若不至朕亦不坐及翼日惶遽朝謁上又慰安勉勵曰我未放卿焉得舍我其委重如此七年六月以平章事杜佑為光祿大夫守太保致仕朝朔望春日遣中使就宅賜絹五百匹錢五萬貫以佑前後懇請休退遂有優賜長慶元年五月敕宰相裴度自今後不用早入以仗下赴中書及候對雜録貞觀元年五月二日敕中書令侍中於朝堂受辭衆庶已上有陳事者悉令封上朕將親覽焉顯慶三年七月上謂宰臣曰四海之廣唯在任賢卿等用人多作形迹護避親知不能盡意甚為不取昔祁奚舉子古人為美談即使卿等兒姪有材亦須依例進舉乾封三年八月髙宗引侍臣責以不進賢良司刑少常伯李安朝進曰臣聞聖帝明王莫不勞於求賢逸於任使且十室之邑必有忠信况天下至廣非無英彥但比來公卿有所薦引即遭毁謗以為朋黨沈屈者未申而在位者已損所以人思苟免競為緘默若陛下虛已招納務於搜訪不忌親讎唯能是用讒毁亦不能入誰敢不竭忠誠此皆事由陛下非臣等所能致也上深然之神功元年納言婁師德密薦狄仁傑除鸞臺侍郎平章事仁傑不知師德之薦也及為同列頗輕師德頻擠之外使則天覺之嘗問仁傑曰師德賢乎對曰為相謹守賢則臣不知又問師德知人乎對曰臣嘗同官未聞其知人則天曰朕之知卿師德薦也亦可謂知人矣仁傑既出歎曰婁公盛德我為其所容莫窺其際也聖厯三年則天曰朕欲卿各舉尚書郎一人狄仁傑獨薦男光嗣由是拜地官尚書郎蒞事有聲則天謂仁傑曰祁奚內舉果得人也長安二年則天令狄仁傑舉賢仁傑舉荆州長史張柬之其人雖老真宰相才也日久不遇若用之必盡節於國家矣乃召為洛州司馬他日又求賢仁傑曰臣前言張柬之猶未用也則天曰已遷之矣對曰臣薦之請為相也今為洛州司馬非用之也又遷秋官侍郎四年夏官尚書靈武道大總管姚崇將赴鎮則天命舉內外堪為宰相者崇乃對曰秋官侍郎張柬之沉厚有謀能斷大事且其人年老惟陛下急用之五年則天嘗令宰臣各舉為員外郎者鳳閣侍郎韋嗣立薦岑義拱元年四月司門員外郎房先敏纍左授衛州司馬詣宰相陳訴太史騫味道謂曰此是皇太后處分中書侍郎劉褘之謂先敏曰緣坐官列臣下奏請則天聞之以味道善則歸已過則推君貶青州刺史加褘之太中大夫因謂待臣曰夫為人臣之體實須揚君之德君德發揚豈非臣下美事且君為元首臣作股肱情同休戚義均一體豈聞手足有疾移于腹背而得一體安乎納言王德真奏曰昔戴至德雖有異行殊能為時所服然其每有善事必推於君太后曰先朝每稱至德此事逮其終沒有制褒崇為臣之道豈過斯也𫝊名萬代可不善歟蘇氏駁曰謹按房先敏通天二年三月自眉州長史除司門員外郎厯二年四月改曹州長史比垂拱元年在後十四年矣騫劉二相升出年月即同且稱皇太后非通天二年之事明矣先敏又不曽任衛州司馬恐是别人前史誤耳景龍元年中書侍郎蕭至忠上疏曰臣伏見貞觀永徽故事宰相子弟多居外職近來勢要親識罕有才藝遞相囑託虛踐官榮伏望降明敕令宰臣已下及諸司長官各通當家內外緦麻已上見任京官九品已上者精加簡擇每家量留一兩人在京餘並改授外官庶望分職四方其寧百姓開元九年四月侍中源乾曜上疏曰臣竊見勢要之家併求京職俊乂之士多在外官王道均平不合如此臣三男俱是京官望出二人與外官以叶均平之道上從之十三年正月國子祭酒楊綰拜中書侍郎平章事詔出朝野相賀綰素以德行顯著質性貞亷車服儉朴居廟堂未數日人心自化御史中丞崔寬家富於財别墅在皇城之南池館臺榭當時第一寬即日潜遣毁拆中書令郭子儀在邠寧行營聞綰拜相音樂減散五分之四京兆尹黎幹以承恩每出入騶馭百餘亦即日減損其餘望風變奢從儉者不可勝數建中三年正月詔曰古者天子不修下人罹其禍則內府損服御太常減膳以克責朕德信不著姦臣逆命致兩河之間兵革未戢郡道疲於徵斂百姓失業不得農桑朕是以對案輟食私自貶損其供常膳有司宜省之太子諸王已下食物亦各節其數於是宰臣上言堂㕑錢并百官月俸各請三分省一四年常衮為中書侍郎平章政事堂舊有後門蓋宰相過中書舍人院咨訪政事衮欲自尊大乃塞其門以絶往來貞元九年七月詔宰相以旬秉筆決事初至德中宰相迭秉筆處斷每十日一易及賈耽趙憬陸贄盧邁同平章政事百寮有司關白相讓不言於是奏議請旬秉筆者出應之其後又請每日更秉筆迭以應事十一年二月門下侍郎平章事趙憬進上審官六議憬初為尚書左丞甚有稱望時宰相竇參惡其不附已將加黜貶德宗不從及參逐以憬與陸贄同為宰相深於理道論議多正時裴延齡傾巧特承恩幸頗欲中傷良善憬每為保護而清正守約德宗尤器重之嘗於延英獨對開陳大體以任賢尚書為本至是又上審官六議上甚嘉納之闕貞元元年八月以尚書左丞鄭餘慶守本官平章事時滑渙猶干大柄宰臣等漠然不測遂與渙狎及餘慶當國復以胥吏畜之時論歸重元和二年七月上謂宰臣曰當今之政何者為急李吉甫對曰為政所重非一端自非事舉其中固不可致於政理然國以人為本親人之任莫先牧宰能否實繫一方若亷察得人委之臨撫列郡承式政化自宣苟或非才為蠧實甚由是而言觀察刺史之任為切自昔唐虞三載考績三考黜陟故得久於其事風化可成而末代命官多輕外任選授之際意謂逺棄藩部自然非才雜處上既非由慎擇加以更代匆遽人無安志迎送之費財耗不供此最為弊聖慮所及實窮政本伏望慎守良能以革前失則四海䝉福人無苟且之心矣上深納之十二年上謂宰臣曰朕覽國書見文皇帝行事少有過差諫臣論諍往復數四况朕之寡昧涉道未明今後事或未當卿等每事十論不可一二而止三年七月以御製前代君臣事跡十四篇書於六扇屏風宣示宰臣李藩等表謝八年六月時以積雨延英不開者十五日至是上使謂宰臣等曰每至三日雨一對來十年宰相裴度奏羣賊未誅宜延接庶士共為籌畫乃請就私第見客從之自德宗朝百官相過從多令金吾密奏故宰相不敢於私第見賓客至度始奏之十三年九月宰臣皇甫鎛奏舊例平章事判度並中書省借闕官􅈦置院臣以為事體非便今請權借外命婦院內舍十數間隔截置官典院又舊例置郎官二人於中書判案人中差定并兩量抽官典七人隨官勾檢文案伏以臣職在中書務兼司計錢穀事重須自躬親臣今酌量簡要並自判抽其餘尋常公事各有本判郎官今依條流勾當處置臣仍請每月三度候中書事簡入南省從之太和元年五月十一日敕元首股肱君臣象類義深同體理在坦懷然自魏晉已降參用霸制虛儀搜索因習尚存朕方推表大信置人心腹今後紫宸坐朝衆寮既退宰臣復進奏事其監搜宜停九年五月敕江西湖南共以縑資一百二十分送上都充宰臣顧召手力宰臣李石堅讓乞祗以金吾手力引從上從之時初誅李訓後也大中十二年七月除宰相夏侯孜為劍南節度時值中元假十四日三更三㸃通事舍人無在館者宣令捧麻皆兩省人吏自後令通事舍人雖遇假在館俟命唐㑹要卷五十三
