body:
  text: 唐會要卷一百宋王溥撰瑟匿國北接石國其俗不好商賈風俗與康國略同貞觀二十年三月使至朝貢與役槃國康國同鄰出好馬悉立國在吐蕃西南户五萬勝兵五千人其地有城邑村落咸依溪澗男夫以繒綵纒頭衣氊婦人辮髮著短裙婚姻簡略不行財禮以蒸報為俗多水牛宜粳稻喪制以黑為衣一年就吉羈事吐蕃自古未通中國貞觀二十年閏三月朝貢使至求拔國或云章揭拔本西羌種也在悉立西南居四山之內近西移出山西接東天竺遂改衣服變西羌之國因而附焉勝兵二千無城郭好為冦掠商旅患之貞觀二十五年因悉立而朝貢使至俱蘭國前亦名俱羅拏國與吐火羅接南抵雪山地險窄物産惟出金精貞觀二十年閏三月朝貢使至骨利幹國居回紇北方幹海之北二俟斤同居勝兵四千五百口萬餘人草多百合北出名馬其國北接溟海晝長夕短日沒後天色正曛煮一羊胛才熟而東方已曙蓋近日出之所也貞觀二十一年正月內附訶陵國在真臘之內海中洲王之所居堅木為城造大屋重閣以象為牀以椰花為酒飲之亦醉有毒人與常人居止宿處即令身上生瘡與之交會即死苦旋液露著草木即枯貞觀二十二年朝貢使至開元十八年訶陵國遣使獻僧祗僮及五色鸚鵡頻伽鳥並異香天寶十三載十一月獻僧耆女二人及玳瑁蓋生犀等婆登國在林邑之南海行一月東與訶陵西與迷梨連接北鄰大海風俗與訶陵國同種榖每月一熟有文字書于貝多葉其死者口實以金又以金釧貫于四肢然後加以婆律膏及沈檀龍腦等香積薪以燔之貞觀二十一年六月朝獻使至波斯國在京師西一萬五千里户數十萬其王初嗣位便密選諸子才堪承統者名字封而藏之王死後大臣與王之羣子共發封而視之奏所書名為王焉俗事天地日月水火諸神西域諸國事火祅者皆詣波斯受法焉以六月一日為歲首繫囚無年限惟王代立則釋之地多名馬駿者日行七百里又多駿犬今所謂波斯犬也出驢及大驢貞觀二十一年其王伊嗣俟遣使朝貢龍朔元年其國王畢路斯奏頻被大食侵擾請兵救援之詔遣隴州南田縣令王名逺使西域分置州縣因列其地陵城為波斯都督府授畢路斯為都督是後數遣使貢獻焉咸亨中畢路斯來朝貢髙宗甚加恩賜拜右武衛將軍儀鳳三年令吏部侍郎裴行儉將軍兵册送畢路斯還波斯國行儉以路逺至安西碎葉而還畢路斯獨返不得入其國漸為大食所侵客於吐火羅三十餘年部落數千人後漸離散至景龍二年來朝拜為左威衛將軍無病卒其國遂滅西部衆猶存自開元七年至天寶六載凡十遣使朝貢獻方物夏四月遣使獻瑪瑙牀九載獻大毛繡舞筵長繡舞筵無孔真珠至大厯六年九月遣使獻真珠等都播國鐵勒之别種也回紇南十三日行前代未之通也分為三部自祖統攝其俗結草為廬無牛羊不知耕種土多百合取其根以為糧衣豹鹿之皮貧者亦緝鳥羽為服婚姻富者用馬貧者用鹿皮為聘禮國無刑罰偷盜者倍徴其賦聞骨利幹來通亦遣使朝貢貞觀二十一年十一月朝貢使至結骨國在回紇西北三十里勝兵八萬口數十萬南阻貪縵山有水從回紇北流踰山經其國人並依水而居身悉長大赤色緑睛朱髮有黑髮以為不祥人皆徑勇鄰國憚之其大與突厥同而婚姻無財聘性多淫泆與外人通者不忌其壻死喪刀𠢐其面火葬收其骨踰年而葬以木為室覆以木皮天每雨鐵收而用之以為刀劍甚銛利若獵獸皆乘木馬升降山磴追赴若飛其北有騮馬國鄰北海畜騮馬而不乘但取其酪充飱而已貌類結骨而不敦鄰好交相侵伐貞觀二十一年二月結骨國君長逺遂身入朝云臣段一心歸國望得國家官職執笏而還遂授左衛大將軍堅昆都督開元中安西都護蓋嘉惠撰西域記云堅昆國人皆赤髮緑晴其有黑髮黑晴者則李陵之後故其人稱是都尉苗裔亦有由然今有改稱紇提斯者亦是當時舊號今按國史敘鐵勒種類云伊吾以西焉耆以北旁白山則有契弊烏護紇骨子其契弊即契弊苾也烏護則烏紇也後為回鶻其紇骨即紇提斯也由是而言蓋鐵勒之種嘗以稱回鶻矣其轉為黠戞斯者蓋夷音有緩急即傳譯語不同其或稱戞戞斯者語急而然耳於史譯云黠戞是黃頭赤面義即以為回鶻所呼今使者稱自有此名未知孰是會昌三年其國遣使注吾合索上聲呼之等七人來朝兼獻馬二匹以其久不修貢且莫詳更改之名中旨訪求唯賈耽所撰四夷述具載黠戞斯之號始知耽之通習荒服灼然不誤先是回鶻背恩德侵劫諸部落又擅入靈州上以為天亡不可容也乃命河東等道兵討之正月命河東兵大破回鶻于殺狐山就帳中奉太和公主歸於我軍可汗亦與數十騎踰山遁走黠戞斯乘其破亡遂有其國二月遣使注吾合索等七人來朝並獻名馬且憑大唐威德求册命焉四年上命太僕卿兼御史中丞趙蕃持節宣慰五年五月敕我國家光澤四海君臨八荒聲教所覃册命咸被况乎族稱宗姓地接封疆爰申建立之恩用廣懷來之道有加常典得不敬承黠戞斯國王生窮隂之鄉稟沍朔之氣少卿之後胄裔且異於蕃夷大漠之中英傑自雄於種落日者居於絶徼隔以強鄰空馳向化之心莫通事大之禮旋能奮其武勇清彼朔陲萬里歸誠重譯而至時既當於無外義必在於固存是用特降徽章載明深懇加其美號錫以册書貽厥後昆遂荒有北舉兹盛典彰示逺戎祗服寵光永孚恩化可册為宗英雄武誠明可汗命右散騎常侍兼御史中丞李葉持節册使仍命有司擇日備禮册命六年九月敕去歲先帝册立黠戞斯為可汗雖有成命旋屬朝廷變故未果遵行今欲遣使且展封告之儀續行先帝之意又慮深僻小國不足與之抗衡回鶻向殘不合遽有建置斯事體大須歸至當必詢於衆方免有疑宜令中書門下五品已上御史臺尚書省四品已上集議聞奏大中元年遂命鴻臚卿御史中丞李葉持節再册命焉天竺國即漢之身毒或云摩伽他或云婆羅門地在蔥嶺之南去月氐東南數千里地方三萬餘里其中分為五南天竺南際大海北天竺北距雪山四周有山為壁南面一谷通為國門東天竺東際大海與扶南連但隔小海而已西天竺與罽賔波斯相接中天竺據四天竺之間國並有王而俱以天竺為名隋煬帝志通西域諸國多至惟天竺不通貞觀初年中國沙門玄奘至其中國天竺王尸羅逸多謂玄奘曰吾聞中國有聖王作出秦王破陳樂試為我説秦王之為人也玄奘具言聖德王曰信如所言我當自朝也至十五年自稱摩伽他王遣使朝貢上乃遣雲騎尉梁懷璥往通其國尸羅多大驚問諸國人曰自古亦有摩訶震且使人至吾國乎皆曰未之有也乃遣使隨懷璥來朝至二十二年四月遣使右衛長史王玄䇿奉使天竺國至尸羅逸多死其國大亂發兵拒玄策遂率吐蕃兵犬破之虜其王以歸太宗大悅謂侍臣曰夫人耳目耽於聲邑口鼻耽于臭味此敗德之尤若天竺不劫我使人豈為俘虜耶昔中山以貪寶取敝蜀侯以牛金致滅莫不由之是時其國方士那邏邇婆娑自言年二百云有長生之術上深禮之館之金颷門內造延年藥令兵部尚書崔禮監主之發使天下采諸竒藥異石延厯歲月藥成服之無效後放還本國拜互巢為朝散大夫也天授三年東天竺王摩羅拔摩西天竺王尸邏逸南天竺王遮邏其跋羅婆北天竺王那那中天竺王地婆西那並來朝貢及中宗睿宗兩朝並獻方物開元三年二月遣使瞿曇惠成來朝八年五月南天竺遣使獻豹皮五色鸚鵡又奏請以戰象兵馬討大食吐蕃求所以名其軍制書嘉焉號為懷德軍九月南天竺王尸利那羅僧伽寶多拔摩為國造寺上表乞寺額敕以歸化為寺名十一月遣使册利那羅僧伽寶多為南天竺王遣使朝十七年六月北天竺國王三藏沙門僧密多獻質汗等藥十九年十月中天竺國王伊沙伏摩遣其大德僧來朝獻方物二十九年三月中天竺國王李承恩來朝授逰擊將軍放還天寶中纍遣使朝貢歌邏祿國本突厥之俗也城在金山之西與車鼻部落相接薛延陀破滅之後車鼻人衆漸大歌邏祿率其下以歸之及髙駢之經略車鼻也歌邏祿相繼來降仍發兵以討之後車鼻破滅歌邏祿摸剌婆蔔蹈實力三部落並詣朝見天寶初與回鶻拔悉密等攻殺突騎他鳥蘇采可汗三年與拔悉密可汗同著表兼獻馬至闕下其年冬又與回鶻同擊破拔悉密部落其可汗阿史那施奔北庭後朝于京師十三年授阿史那施左武衛將軍乾元中率拔悉密可汗南奔後葛祿與九姓部落復立回鶻敦葉護可汗焉朝廷尋遣使封為奉義王仍號懷仁可汗自此後葛祿在鳥往犍山左右者别置一都督𨽻屬九姓回鶻其在金山及北庭館內者别立葉護每歲朝貢十一年葉護頓略伽生擒突厥師阿布思送於闕庭授開府儀同三司改封金山郡王至德後其衆漸盛與回鶻為敵國仍移居十姓可汗之故地而碎葉阻還斯城新城盡為所踞然礙回鶻近歲朝貢不通泥婆羅國在吐蕃之西其俗剪髮與眉齊穿耳揎竹筒緩至肩者以為妙麗食用手其器皆銅多商賈少田作以銅為錢面文為人背文為馬牛不穿孔衣服以一幅布蔽身數日一盥浴以板為屋壁皆雕畫俗重博戲頗解推測盈虛皆通厯術事五天神鐫石為像每日清水浴神烹羊而祭其王那陵提婆身著真珠諸寶耳垂金鈎玉璫佩寶裝伏突坐獅子牀堂內散花燃香大臣及左右並坐於地有阿耆婆彌池周回二十餘步以物投之即煙熖懸釡而炊須臾而熟永徽二年其王尸利那連陀羅遣使朝貢大食國波斯之别種也大業中有波斯回紇合亡命渡恆曷水劫奪商旅其衆漸盛遂割據波斯西境自立為王其王姓大食氏名噉蜜莫末膩自云有國已四十四年厯三主矣俗勇于鬬戰土多沙石不堪耕種唯食駝馬肉西鄰大海常遣人乘船將衣糧入海經八年而未極西岸中有一方石上有樹幹赤葉青上總生小兒長六寸見人皆笑動其手腳既著樹枝若使摘取一枝小兒便死永徽二年八月大食遣使朝貢至龍朔中擊破波斯又破拂菻始有麵米之屬又南侵婆羅門吞併諸國勝兵四十餘萬開元初遣使來朝進良馬寶鈿帶其使謁見平立不拜云本國惟拜天神雖見王亦不拜所司屢詰責之其使遂依漢法致拜令康國石國皆臣屬十三年遣使蘇梨滿等十三人獻方物授果毅賜緋袍銀帶遣還其境東西萬里東與突騎施相接焉又按賈耽四夷述云隋開皇中大食族中有孤列種代為酋長孤列種中又有兩姓一號盆尼奚深一號盤泥末換其奚深後有摩訶末者勇健多智衆立之為王東西征伐開地三千里兼尅夏臘一名釤音所鑒反城摩訶末後十四代至末換末換殺其兄伊疾而自立復殘忍其下怨之有呼羅珊木粗人並波悉林舉義兵應者悉令著皂旬月間衆盛數萬鼓行而西生擒末換殺之遂求得奚深種阿蒲羅拔立之自末換以前謂之白衣大食自阿蒲羅拔以後改為黑衣大食阿蒲羅拔卒立其弟阿蒲恭拂至德初遣使朝貢代宗之為元帥亦用其國兵以收兩都寶應初其使又至恭拂卒子迷地立迷地卒子牟栖立牟栖卒弟阿論立貞元二年遂與吐蕃為徑敵蕃兵大半西禦大食故鮮為邊患其力不足也至十四年丁卯九月以黑衣大食使含崖烏雞沙北三人並為中郎將放還蕃大辭彌國與波斯接風俗亦與波斯同貞觀十九年三月遣使貢方物駁馬國其地近熱海在突厥北去京師一萬四千里經突厥大部落五所乃至勝兵三萬馬萬匹地寒積雪至冬樹木不雕者一二尺雪消以馬耕種五榖馬色並駁故以為國號其使云去鬼國六十日行其國夜逰晝飲眼鼻牙與中國人同口在頂上土無米粟噉鹿與蛇永徽二年十一月朝貢使至舍利毗迦國在京師西南四萬餘里行經祇洹國訶陵國摩訶國新國多薩國者埋國婆婁國多郎婆黃國摩羅迦國真臘國林邑國乃至廣州東去俱羅國二千里西去赤土國一千五百里南近婆庭舍衣朝霞白㲲每食先泥上鋪而後坐其國王名本多陽牙前有隊仗甲鍪甲用貝多樹皮風俗物産與真臘國同多摩長國居於南海島中使云其王先祖骨利龍之子利常得一鳥卵割之得一女子容色殊妙因以為妻今尸羅劬傭即其後地顯慶四年二月朝貢使至蝦夷國海島中小國也其使鬚至長四尺尤善弓矢插箭於首令人戴瓠而立數十步射之無不中者顯慶四年十月隨倭國使來朝波羅舍利國在南海之南接吐火羅國其王名蒲越摩伽精兵二萬人其使以顯慶五年發本國至龍朔二年五月到京日本國倭國之别種以其國在日邊故以日本國為名或以倭國自惡其名不雅改為日本或云本舊小國吞併倭國之地其人入朝者多自矜大不以實對故中國疑焉長安三年遣其大臣朝臣真人來朝貢方物朝臣真人者猶中國户部尚書冠進德冠其項為花分而四散身服紫袍以帛為腰帶好讀經史解屬文容止溫雅則天宴之授司善卿而還開元初又遣使來朝因請士授經詔四門助教趙元默就鴻臚教之乃遺元默濶幅布以為束修之禮題云白龜元年調布人亦疑其偽為題所得賜賚盡市史籍泛海而還其偏使朝臣仲滿慕中國之風因留不去改姓名為朝衡厯仕左補闕終右常侍安南都護師子國在西南大海中洲來使云其洲中有山名稜伽古佛逰處國中有王以一善化人皆以清淨學道為務天寶五載正月使至獻鈿金寶瓔珞及貝葉抄寫大般若經一部細白疊四十張多薎國居大海之北周回可兩月行南至海西俱逰國北波剌國東真陀洹國其王姓摩伽名失利户口極衆置四十州又役屬他國有城郭樓櫓宫殿並瓦木常侍衛兵可四千人雖有弓箭刀楯甲鞘而無戰陳有刑典書記及婚聘之禮事佛及神亦以十二月為歲畜有犀象馬牛果有檳榔子其桃棗瓜李及園蔬五榖與中國不殊龍朔元年八月朝貢使至耽羅國在海居山島上周回並接于海北去百濟可五日行其王姓儒李名都羅無城隍分作五部落其屋宇為圎墻以草蓋之户口有八千有弓刀楯矟無文記唯事鬼神常役屬百濟龍朔元年八月朝貢使至拘蔞密國在林邑之西陸路三月行山居饒象並養之以供用顯慶元年閏正月來朝貢在盤盤致物國東南海路一月行南去婆離國十日行東去不述國五日行西北去單國六日行風俗物産與赤土國墮和羅國略同永徽六年八月遣使獻五色鸚鵡驃國貞元十八年春正月南詔使來朝驃國王始遣其弟悉利移來朝華言謂之驃自謂突羅朱闍婆人謂之徒里拙自古來未嘗通中國魏晉間有見西南異方志及南中八郡者云永昌古哀牢國也傳聞永昌西南三千里有剽國君臣父子長幼有序然向無見史傳者其王聞南詔異牟尋歸附心慕之乃因南詔重譯遣子朝貢東北拒南詔咩苴城六千八百里凡去上都一萬四千里在永昌故郡南二千餘里其境東西三千里往來通聘者迦羅婆提等二十國役屬者道林王等九城食境土者羅君潛等二百九十八部落東鄰真臘國西接東天竺國南溟海北通南詔此樂城界其王姓困沒長名摩羅惹其國相名摩訶斯那其王近適則輿以金繩牀逺適則乘象嬪御甚衆傳御常數百人其羅城環以甎甓周一百六十里壕岸亦用甎相傳本是舍利佛城內有居人數萬家佛寺百餘區其堂宇皆金銀渥以丹彩地以紫礦覆以錦罽其俗好生惡殺其土宜菽粟稻梁無麻麥其理無刑名桎梏之具犯罪者以竹五本束之復犯者笞其背數止五輕者止三殺人者戮之男女七歲則落髮止寺舍依桑門至二十不悟佛理乃復為居人其衣服悉以白㲲與朝霞繞腰而已不衣繒帛云出于𧖟為傷生也又獻其國樂凡二十二曲與樂工三十五人來朝樂曲皆演釋氏經論之詞意二十一年四月封彌臣國嗣王樂道勿禮為彌臣國王焉咸通三年二月遣使貢方物占卑國大中六年二月占卑國佛邪葛等六人來朝兼獻象宰相魏謨以性不安中土請還其使從之咸通十二年二月復遣使朝貢雜録故事西蕃諸國通唐使處悉置銅魚雄雌相合各十二隻皆銘其國名第一至十二雄者留在內雌者付本國如國使正月來者賫第一魚餘月推此閏月賫本月而但校其雌雄今乃依常禮待之差謬則推案聞奏開元一十六年十一月五日鴻臚卿舉舊草奏日近緣突騎施背叛蕃國銅魚多有散失望令所司檢校貞觀二年六月十六日敕諸蕃使人所娶得漢婦女為妾者並不得將還蕃四年三月諸蕃君長詣闕請太宗為天可汗乃下制今後璽書賜西域北荒之君長皆稱皇帝天可汗諸畨渠帥有死亡者必下詔册立其後嗣焉統制四夷自此始也二十一年三月十一日以逺夷各貢方物其草木雜物有異于常者詔所司詳録焉葉護獻馬乳葡蔔一房長二尺子亦稍大其色紫摩伽獻菩提樹一名皮羅葉似白楊康國獻黃桃大如鵝卵其色如金亦呼金桃伽國獻鬱金香葉似麥門冬九月花開如芙蓉其色紫碧香聞數十步華而不實欲種取其根罽賔國獻俱物頭花其花丹白相間而香逺聞伽失畢國獻泥樓鉢羅花葉類朵荷圓缺其花色碧而蕊黃芳數十步達國獻佛土葉一莖五葉花亦中心正黃而蘂紫色泥婆國獻波稜數紅藍花實似蒺藜火熟之能益食味又鮮菜狀如菜濶而長味如美鮮苦菜狀如苣其葉濶味雖少苦久食益人胡芹狀如芹而味香渾提蔥其狀如蔥而白辛嗅藥其狀如蘭凌冬而青收乾作末味如桂椒其根能愈氣疾薛延陀獻凌蘭花毛如牛角大如麚西蕃突厥獻馬蹄羊其蹄似馬波斯國獻活縟蛇其狀如鼠而色青身長七八尺能入穴取鼠西畨咄祿可汗獻金卵雞鷇鳥鷇也雕刻作禽獸而悉塗以金西畨諸國出石蜜中國貴之太宗遣使至摩伽他國取其法令揚州煎蔗之汁于中厨自造焉色味愈于西域所出者葡萄酒西域有之前世或有貢獻及破髙昌收馬乳葡萄實于苑中種之並得其酒法自損益造酒酒成凡有八色芳香酷烈味兼醍醐既頒賜羣臣京中始識其味天寶二年四月二十五日上因問西畨諸國逺近鴻臚卿王中嗣上言曰臣謹按西域圗陀拔恩單國在踈勒西南二萬五千里至勃達國一月程西至溟滿國一月程南至羅剎支國十五日程北至海兩月程羅剎支國東至都盤國十五日程西至沙蘭國二十日程南至大食國二十程北至陀拔國十五日程都盤國東至大食國十五日程西至羅剎支國十五日程南至大食國二十日程北至渤達國一月程渤達國東至大食國兩月餘程西北至岐蘭國二十日程南至都盤國一月程北至大食國一月程河沒國東至南陀拔國十五日程西北至岐蘭國二十日程從南至沙蘭國一月程北至海兩月程岐蘭國東南至河沒國二十日程西至大食國兩月程南至涅國二十日程北至海五日程涅國東至陀拔國一月程西至大食國兩月程南至大食國一月程北至岐蘭國二十日程沙蘭國東至羅剎支國二十五日程南至大食國二十五日程北至涅國二十五日程石國東至拔汗那國一百里西南至東米國五百里罽賔國在踈勒西南四千里東至俱蘭他國七百里西至大食國一千里南至婆羅門國五百里北至吐火羅國二百里東米國在安國西北二千里東至碎葉國五千里西南至石國一千五百里南至拔汗那國一千五百里文國在蘇勒國西四千里東至俱蜜國一千里西至大食國二千里南吐火羅國一百里西北至康國七百里證聖元年九月五日敕畨國使入朝其糧料各配等第給南天竺北天竺波斯大食等國使宜給六個月糧尸利佛誓真臘訶陵等國使給五個月林邑國使給三個月聖厯三年六月六日敕東至髙麗國南至真臘國西至波斯土畨及堅昆都督府北至契丹突厥靺鞨並為八畨以外為繩域其使應給料各依式開元四年正月九日敕靺鞨新國吐蕃先無里數每遣使給賜宜凖七千里以上給付也大厯十四年七月詔回紇諸蕃在京師者各服其國之服不得與漢相恭歸降官位顯慶三年八月十四日置懷德大將軍正三品歸化將軍從三品以授初復首領仍𨽻屬諸衛不置員類及俸額總章元年十一月授婆羅門盧加逸多州酬其丹誠也貞元十二年正月十九日置懷化大將軍正三品每月料錢四十五千文雜料三十五千文歸德將軍從三品料錢四十千文懷化中郎將正四品料錢三十七千文歸德中郎將從四品料錢三十五千文懷化郎將正五品料錢三十三千文歸德郎將從五品料錢三十千文懷化司階正六品料錢二十五千文歸德司階從六品料錢二十三千文懷化中侯正七品料錢十八千文歸德中侯從七品料錢十七千文懷化司戈正八品料錢十五千文歸司戈從八品料錢十四千文懷化執戟長上正九品料錢正十一千文歸德執戟長上從九品料錢十千文敕凖六典應收募蕃官前承未置今蕃人向化近日漸多名位髙卑須有等級其增置官品及料錢等宜依前件其月以歸降吐蕃論乞髯湯沒藏悉諾硉為歸將軍會昌二年八月制歸義軍使特進檢校工部尚書兼右金吾衛大將軍同正懷化郡王唱沒斯賜姓李名思忠冠軍大將軍左衛大將軍同正寧邊郡公厯支賜姓李名思正冠軍大將軍左衛大將軍同正思化郡公習聞啜賜姓李名思義冠軍大將軍左衛大將軍同正寧朔郡公烏羅思賜姓李名思禮守右領軍大將軍同正寧塞郡公受邪勿可檢校右散騎常侍右領軍衛大將軍國正充歸義軍副使仍賜姓李名𢎞順制李思正弟冠軍大將軍右騎衛大將軍同正昌化郡公李思義母可封雁門郡君李思禮男可中散大夫檢校殿中少監仍賜紫金魚袋賜名繼美天祐元年六月授福建道佛齊國入朝進奉使都蕃長蒲訶粟寧逺將軍唐會要卷一百
