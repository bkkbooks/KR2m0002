body:
  text: 唐會要卷三十一宋王溥撰裘冕舊制天子之服則有大裘冕衮冕鷩冕毳冕黼冕玄冕通天冠武辨爵辨黑介幘白紗帽平幘翼善冠之服並出於殿中省皇后之服則有禕衣鞠衣鈿叉禮衣之制並出於內侍省太子之服則有衮冕具服逺逰冠公服逺逰冠烏紗帽辨服平巾幘進德冠之服並出於右春坊凡王公第一品服衮冕二品服鷩冕三品服毳冕四品服黼冕五品服玄冕六品至九品服爵辨武德四年七月定制凡衣服之令天子之服有二等大裘冕衮冕鷩冕毳冕黼冕玄冕通天冠武辨黑介幘白紗帽平巾幘白帢是也顯慶元年九月十九日修禮官臣無忌志寧敬宗等言凖武德初撰衣服令乘輿祀天地服大裘冕無旒臣勘前件令是武德初撰雖憑周禮理極未安謹按郊特牲云周之始郊日以至被衮以象天戴冕璪十有二旒則天數也而此二禮俱説周郊衮與大裘事乃有異按月令孟冬天子始裘用以禦寒理非當暑若啓蟄祈穀冬至報天行事服裘義歸通允至于孟夏迎氣龍見而雩炎熾方隆如何服之謹尋厯代惟服衮章與郊特牲義旨相協周遷輿服志云漢明帝永平二年詔採周官禮記始制祀天地服惟天子備十二章沈約宋書志云魏晉郊天亦皆服衮宋魏周齊隋禮令祭服悉同斯則百王通典炎涼無妨復與禮經事無乖舛今請憲章故實郊祭天地皆服衮冕其大裘請停仍改禮令又檢新禮皇帝祭社稷繡冕四旒衣三章祭日月服玄冕三旒衣無章謹按令文是四品五品之服也三公亞獻皆服衮衣孤卿助祭服毳及鷩斯乃乘輿章數同於大夫君少臣多殊為不可據周禮云祀昊天上帝則服大裘而冕五帝亦如之享先王則衮冕享先公則鷩冕祀四望山川則毳冕祭社稷五祀則絺冕祀諸小祀則玄冕又云公侯伯子男孤卿大夫之服衮冕已下皆如王之服所以三禮義宗遂有二釋一云公卿大夫助祭之日所服之服降王一等又云原闕天下禮惟從俗則命為制令詔曰乃秦皇之故事猶可以適于今矣若夫義取隨時則出稱警入稱蹕乃漢朝之舊儀猶可以行于後矣亦何取變周公之軌物改宣尼之法度者哉由是竟寢知機所請開元十一年冬將有事於南郊中書令張説奏稱凖令皇帝祭昊天上帝服大裘而冕事出周禮取其質也永徽二年髙宗享南郊用之顯慶元年修禮改用衮冕事出郊特牲取其文也自則天已來用之若遵古制則用大裘若便於時則衮冕為美令所司造二冕呈進上以大裘朴略冕又無旒既不可通用於寒暑乃廢而不用之自是元正朝會用衮冕及通天冠大祭祀依郊特牲亦用衮冕自餘諸服雖著在令文竟不施用二十六年肅宗為皇太子受册太常所撰儀注有服絳紗衮之文太子以為與大皇帝所稱同上表辭不敢當請有司以易之上令百官詳議尚書左丞相裴耀卿太子太師蕭嵩等奏曰謹按衣服令皇太子具服有逺逰冠三梁加金附蟬九首施珠翠黑介幘纓緌犀簮導絳紗衮白紗中單皂領褾􅙦白裙襦方心曲領絳紗蔽膝草帶劍佩綬等謁廟還宫元日冬至朔日入朝釋奠則服之其絳紗衮則是冠衣之內一物之數與裙襦劍佩等無别至于貴賤之差尊卑之異則冠為首飾名制有殊并珠旒及裳綵章之數多少有别自外不可事事差異亦有上下通服名制是同禮重則具服禮輕則從省今以至敬之情有所不敢衣服不可減省稱謂須更變名望所撰儀注不以絳紗衮為稱但稱為具服則尊卑有差謙光成德議奏上手敕改為朱明服下所司行用焉章服品第舊儀有服亦名具服一品已下五品已上陪祭朝享拜表大事則服之六品已下惟無劍珮綬又有公服亦名從省服一品已下五品已上朔望朝謁及見東宫則服之六品已下分鞶囊雙珮又九品已上朔望朝參者十月一日已後二月三十日已前並服袴褶五品已上著珂傘貞觀四年八月十四日詔曰冠冕制度已備令文尋常服飾未為差等宜令三品已上服紫四品五品已下服緋六品七品以緑八品九品以青婦人從夫之色仍通服黃至五年七月十一日敕七品已上服龜甲雙巨十花綾其色緑九品已上服絲布及雜小綾其色青至龍朔二年九月二十三日孫茂道奏凖舊令六品七品著緑八品九品著青深青亂紫非卑品所服望請六品七品著緑八品九品著碧朝參之處並依此服又朝參聽服黃從之咸亨五年五月十日敕如聞在外官人百姓有不依令式遂於袍衫之內著朱紫青緑等色短衫襖子或於閭野公然露服貴賤莫辨有蠧彛倫自今已後衣服下上各依品秩上不得通下下不得僭上仍令所司嚴加禁斷上元元年八月二十一日敕一品已下文武並帶手巾算袋刀子磨石其武官欲帶手巾算袋者亦聽文武三品已上服紫金玉帶十三銙四品服深緋金帶十一銙五品服淺緋金帶十銙六品服深緑七品服淺緑並銀帶九銙八品服緑九品服深青並鍮石帶八銙庶人服黃銅鐵帶六銙前令九品已上朝參及視事聽服黃以洛陽縣尉栁延服黃夜行為部人所毆上聞之以章服紊亂故以此詔申明之朝參行列一切不得著黃也儀鳳元年九月五日詔八品已下舊服青者並改為碧神龍二年九月二十七日敕停京官六品已下著緋袴褶令各依本品為定景雲二年四月二十四日敕文令內外官依上元元年敕文武官咸帶䩞鞢七事謂佩刀刀子磨石契苾真噦厥計筒火石袋等其腰帶一品至五品並用金六品至七品並用銀八品九品並用鍮石開元二年七月二十四日敕百官所帶算袋等每朔望參日著外官衙日著餘日停其年七月二十五日敕珠玉錦繡既令禁斷凖式三品已上飾以玉四品已上飾以金五品已上飾以銀者宜於腰帶及馬鐙酒林杓依式自外悉斷十九年六月敕應諸服袴褶者五品已上通用紬綾及羅六品已下小綾除幞頭外不得服羅縠及著獨窠繡綾婦人服飾各依夫子五等以上諸親婦女及五品已上母妻通服紫九品已上母妻通服朱五品已上母妻依腰襻領緣聽用錦繡流外及庶人不得著紬綾羅縠五色線靴履其襇色衣不過十二破渾色衣不過六破帽子皆大露面不得有掩蔽正朝會及大禮陳設事緣供奉官攝官者並宜攝官服之元和十二年六月九日太子少師鄭餘慶奏內外官合服朝服入祭服者其中五品多有疑誤宜與酌定請自今後其職事官是五品者雖帶六品已下散官即有劍珮綬其六品已下職事官縱有五品已下散官並不得服劍珮綬龍紀元年十一月將有事圜丘上宿齋於武德殿宰臣百寮朝服於位時有中尉楊復恭及兩樞密皆朝服侍上太常博士錢翊李綽等奏曰今皇帝赴齋內臣朝服竊詳國朝故事及近代禮令並無內官朝服助祭之文若須要冠服請據所兼正官隨資品依令式服本官之服從之內外官章服附舊制凡授都督刺史皆未及五品者並聽著緋珮魚離任則停之若在軍賞緋紫魚袋者在軍則服之不在軍不在服限若經敘録不合得者在軍亦停之開元三年四月敕宰臣自朝廷出鎮請朝官自侍御史已上者即許兼受章服便為久例其年八月詔駙馬都尉從五品階自今已後宜凖令式仍借紫金魚袋駙馬都尉借紫自此始也四年二月二十三日詔彰施服色分别貴賤茍容僭濫有乖儀式如聞內外官絶無官者詐著緑不以為事又軍將在陳賞借緋紫本是從戎裝銙之服一得之後遂别造長袍遞相倣效又入蕃使别敕借緋紫者使回合停自今已後衙內宜専定殿中侍御史糾察天授二年八月二十日左羽林大將軍建昌王攸寧賜紫金帶九月二十六日除納言依舊著紫帶金龜借紫自此始也八年二月二十日敕都督刺史品卑者借緋及魚袋永為常式二十五年五月三日敕緋紫之服班命所崇以賞有功不可僭濫如聞諸軍賞借人數甚多曾無甄别是何道理自今已後除灼然有戰功外餘不得輒賞緋紫仍永為令式大中元年九月中書門下奏幕府遷授章服貞元初年之間凡使府奏職至侍御史皆兼省官仍受章服近日攝殿中及戎卒便請朱紫數事俱行其中自緣腰金皆非典故今請自侍御史待年月足後更奏始與省官至於朱紫許於本使府有事績尤異者然後許奏請惟副使行軍奏職特加先著緑便許緋餘不在此限三年五月中書門下奏增秩賜金紫雖有故事如觀察使奏刺史善狀並須指事而言不得虛為文飾其諸道副使判官如事績尤異然後許奏論惟副使行軍先著緑便許賜緋其餘不在此限者諸使奏請或資品尚淺即請章服或賜緋未幾又請賜紫凖令入仕十六考職事官散官皆至五品始許著緋三十考職事官四品散官三品然後許衣紫除臺省清要牧守常典自今已後請約官品為例判官上檢校五品者雖欠階考量許奏緋副使行軍判官至侍御史已上者縱階考未至亦許奏緋如已檢校四品官兼中丞先賜緋經三周年已上者兼許奏紫其有職事尤異關錢穀者須指事上言監察已下量與減年限進改殿中已上然後可許賜章服公事尋常者不在奏限依奏雜録乾封二年二月禁工商不得乘馬神龍二年九月儀制令諸一品已下食器不得渾金玉六品已下不得用渾銀太和元年五月敕衣服器用車乘第室侈儉之制近日頗差宜凖儀制令品秩勳勞仍約今時所宜撰等級送中書門下參酌聞奏三年九月敕兩軍諸司內官不得著紗縠綾羅等衣服六年六月制度敕條禮部式親王及三品已上若二王後服色用紫飾以玉五品已上服色用朱飾以金七品已上服色用緑飾以銀九品已上服色用青飾以鍮石應服緑及青人謂經職事官食祿者其用勳官及爵直司依出身品各仍聽珮刀礪紛帨流外官及庶人服色用黃飾以銅鐵其諸朝祭宴會服飾各依所凖品又請一品二品許服玉及犀斑犀服青碧者許通服緑餘依禮部式又應三省御史臺兩京諸司及諸道在城職常官等不許用本官本品例並不得服犀玉又車馬不得飾以金銀又袍襖衫等曳地不得長二寸已上衣袖不得廣一尺三寸已上婦人制裙不得濶五幅已上裙條長曳地不得長三寸已上襦袖等不得廣一尺五寸已上又六典及禮部式諸文武官赴朝諸府道從職事一品及府三品及散官二品三騎四品五品二騎六品已上一騎其散官及以理去官五品已上不得過四騎若京城之外不在此限今約秩職事官一品從七騎二品及中書門下三品五騎中書門下御史臺五品尚書有四品三騎四品五品兩騎鞍通用銀裝六品一騎通用鍮石裝散官及以理去官者五品已上不得過一騎其若在京城外及勳績顯著職事繁重者不在此限七品已上非常參官並不得以馬從未仕者聽乘蜀馬鞍用烏漆裝又請一品二品九騎三品七騎四品五騎五品兩騎其京城內應職事繁重者不在此限六品以下非常參官不得馬從其六品已下常參官及周親未在仕者聽乘馬餘未仕者聽乘蜀馬小馬鞍用烏漆裝其胥吏及雜色人不在此限其鞍轡裝飾據所司條疏用銀者四品已下並不得許用垂頭押胯其用銀及鍮石者並不得閙裝其軍容隊件要資華飾不在此限餘並請依所司條疏又制節度使凖儀令制諸軍一品已下五品已上皆通用幰六品已下皆不得用幰者今非册拜及婚會並不得用幰又凖少府式公主出降犢車兩乘一銅裝又凖鹵簿令外命婦一品厭翟車從車六乘二品三品白銅飾犢一乘從車四乘四品白銅飾犢車一乘從車兩乘者今附前件令式參酌今時之宜且婦人本合乘車近來率用擔子今請外命婦一品二品中書門下三品母妻金銅飾犢車擔子舁不得過八人三品金銅飾犢車擔子舁不得過六人非尚書省御史臺即以白銅舁不得過四人也四品五品通用白銅飾犢車擔子舁不得過四人省吏及商賈妻並不得乘奚車及擔子其老者聽葦軬車及兜籠舁不得過二人庶人凖此伏緣白銅先已禁斷今請庶人合用白銅者通用鍮石其省吏及商賈妻女老病者聽乘座車及葦軬餘並凖所司條疏敕旨並依奏又奏婦人髙髻險粧去眉開額以金銀過為首飾並請禁斷仍請敕依貞元舊制敕下後諸司及州府榜示限一月內改革及吳越之間織造髙頭革履亦請切加禁絶任以彩帛縵成髙頭及平頭小花草履即任依舊餘請凖所司條疏又奏凖營繕令三公已下舍屋不得施重栱藻井三品已上堂舍不得過五間七架厦兩頭門屋不得過五間五品已上堂舍不得過五間七架厦兩頭門屋不得過三間兩架仍通作鳥頭大門勳官各依本品六品七品已下堂舍不得過三間五架門屋不得過一間兩架非常參官不得造抽心舍及施懸魚對鳳瓦獸乳梁裝飾其祖父舍宅門廕子孫雖廕盡聽依仍舊居住其士庶王公第宅皆不得造樓閣臨人家近者不守敕文因循制造自今後伏請禁斷又庶人所造堂舍不得過三間四架門屋一間兩架仍不得輒施裝飾又凖律諸營造舍宅於令有違者杖一百雖會赦亦皆令改去之其物可賣者聽賣若經赦百日不改去及不賣者論如律又奏商人乘馬前代所禁近日雕鞍銀鐙從以童騎最為僭越請一切禁斷庶人凖此師僧道士除綱維及兩階大德餘並不得乘馬又諸部曲客女奴婢服粗紬絹布色通用黃白飾以銅鐵客女奴婢通服青碧聽用庶人兼許夾纈丈夫許通服黃白如屬諸軍諸使諸司及屬諸道士依本色日流例其女人不得服紅絮為裙及銀泥罨畫繡等餘請依令式又制度內衣服車乘器用宫室等其請職掌官等並請約文武官例各委本道本軍大使以職掌髙下約為等第比數聞奏又應諸色條疏請委御史臺知彈御史兩巡使東都留守京兆河南尹留臺御史外州府長史凖條疏月日切加糾察如違沒入所犯仍量加決責其常參官具名聞奏其在城諸使各委本司勾當不及者委臺司覺察聞奏敕旨理道所關制度最切其喪葬婚嫁吉凶禮物雖不在條件之內亦要所司凖令定式勾當仍加捉搦其禁軍仗衛雜色及諸道節鎮等使軍裝衣服即不在此限餘並依奏其年七月度支户部鹽鐵三司奏凖今年六月敕令三司官典及諸色場庫所由等其孔目勾撿勿覆支對勾押權遺旨引進庫官門官等請許服細葛布折造及無紋綾充衫及袍襖依前通服緑暗銀藍鐵充腰帶不得乘毛色大馬鞍轡踏鐙用鍮石其驅使官有正官及在城及諸色倉場官等請許服細葛布折造及庶人紋綾充衫袍依前服緑鐵充腰帶乘小馬鞍轡銜鐙用鍮石其驅使官未有正官及與行按令史等請許粗葛布及官綾等充衫襖亦請依前通服緑銅鐵腰帶乘蜀馬其鞍用烏漆鐵從人每司各許三人著緑布衫其不行按令史並書手服白仍並不許乘馬及馬從通引官許衣前粗紫絁及紫布充衫袍藍鐵腰帶乘小馬鞍用烏漆鐵踏鐙其行官門子等請許依前服紫粗布絁充衫襖藍鐵腰帶仍不許乘馬其騾綱車綱等緣常押驢騾於諸州府搬運及送逺軍衣賜須應程期請許依前粗紫絁充襖藍鐵腰帶乘驢騾出塞即請許乘粗牡馬餘並不得違元敕胥役及諸色人所由並請服白布衫及應向外監院職掌所由請敕下後約省使條疏遞減一等處分除此外餘並凖元敕處分依奏七年八月九日敕今年十月服冬裘後其衣服與馬並宜凖太和六年六月十七日敕處分如固違制度九品已上量加黜責其布衣五年不得選舉開成四年二月淮南觀察使李德裕奏臣管內婦人衣袖先濶四尺今令濶一尺五寸裙先曳地四尺五寸今令減三寸從之五年六月御史中丞黎植奏伏以朝官出使自合驛馬不合更乘擔子自此請不限髙卑不得輒乘擔子如病即任所在陳牒仍申中書門下及御史臺其擔夫自出錢雇節度使有疾亦許乘擔子不得便乘卧輿宰相三公師保尚書令正省僕射及致仕官疾病者許乘之餘官並不得乘限其擔子任依漢魏故事凖載步輿步之制不得更務華飾其三品已上官及刺史赴任有疾亦任所在陳牒許暫乘病瘥日停不得驛中停止人夫並須自雇又中書門下奏臺司所奏條疏擔子事更須商量其常參官或是諸司長史品秩髙者有疾及筋力綿怯不能控馭望許牒臺暫乘擔子患愈勒停其出使郎官中路遇疾令自雇夫者若所請稍逺計費極多制檢身不合貸借輕賫則不濟所要重費則不可支持如中路遇疾者所在飛牒申奏差替去以此商量庶為折衷餘請依御史臺所奏冠唐制親王服逺逰三梁冠五品已上兩梁冠九品已上一梁冠武官凡中書門下九品已上服武辨平巾幘御史服法冠武德四年七月敕折上巾軍旅所服即今幞頭是也自後紗帽漸廢貴賤用之故事全復皂而向後幕髮俗謂之幞頭周武建德中裁為四腳其年十二月髙祖問祕書丞令狐德棻曰丈夫冠婦人髻競為髙大何也對曰在人之身冠髻為上所以古人方諸君上昔東晉之末君弱臣強江左之士莫不衣小而裳大及宋武正位之後君尊而臣卑俄亦變改此即近事之徴貞觀八年五月七日太宗初復冠辨遂賜貴臣進德冠因謂侍臣曰幞頭起於周武帝蓋取便於軍容耳今四方無虞當偃武事此冠頗採古法兼類幞頭乃宜常服至開元十七年廢不行用開元十九年六月敕應五品已上行六法冠去琪珠二十五年工部太常寺衣冠祭服并幘諸司供奉官衣冠履舄等所司七年一替三年一給未滿三年有損壞者並自修理乾元元年十月一日知司天臺事韓頴奏五品正奉敕創置其官職配五方上稽五緯臣請冠上加一星珠衣從本方正色每至正冬朔望會及諸大禮即服以朝見仍望永為恆式敕旨依貞元七年十一月上問冠冕于宰臣時董晉對曰古之人服冠冕者動有珮玉之響以節步也故大禹惡衣服而致美乎紱冕上然之巾子武德初始用之初尚平頭小樣者天授二年則天內宴賜羣臣髙頭巾子呼為武家諸王樣景龍四年三月內宴賜宰臣已下內樣巾子其樣髙而踣皇帝在藩時所冠故時人號為英王踣樣開元十九年十月賜供奉及諸司長官羅巾及官樣圓頭巾子永泰元年裴冕為左僕射自創巾號曰僕射樣太和三年正月宣令諸司小兒勿許裹大巾子入內魚袋永徽二年四月二十九日開府儀同三司及京官文武職事四品五品並給隨身魚袋五年八月十四日敕恩榮所加本緣品命帶魚之法事彰要重豈可生平在官用為褒飾才至亡沒便即追收尋其始終情不可忍自今以後五品已上有薨亡者其隨身魚袋不須追收咸亨三年五月三日始令京官四品五品職事佩銀魚是日出內魚袋賜之垂拱二年正月二十日赦文諸州都督刺史並凖京官帶魚袋天授元年九月二十六日改內外官所佩魚為龜至神龍元年二月四日京文武官五品已上依舊式佩魚袋久視元年十月十三日職事三品已上龜袋宜用金飾四品用銀飾五品用銅飾上守下行皆依官給神龍元年九月十七日赦文嗣王郡王有階級者許佩金魚袋至開元元年八月二十日諸親王長子先曽帶王官階級者亦聽著紫佩魚袋二年八月制京文官五品已上依舊式佩銀魚景龍三年八月令特進佩魚散職佩魚自兹始也蘇氏記曰自永徽以來正員官始佩魚其離任及致仕即去魚袋員外判試并檢校等官並不佩魚至開元八年九月十四日中書令張嘉貞奏曰致仕官及內外官五品已上檢校試判及內供奉官見占關者聽凖正員例許終身佩魚以為榮寵以理去任亦許佩魚自後恩制賞緋紫例兼魚袋謂之章服景雲二年四月二十四日敕文魚袋著紫者金裝著緋者銀裝開元二年閏二月敕承前諸軍人多有借緋及魚袋者軍中流品此色甚多無功邀賞深非道理宜敕諸軍鎮但是從京借并軍中權借者並委敕到收取待立功日據功合得郎將以上者委先借後奏其靈武和戎大武幽州鎮軍赤水河源潮海安西定逺等軍既臨賊衝事藉懸賞量軍大小各付金魚袋一二十枚銀魚袋五十枚並委軍將臨時行賞唐會要卷三十一
