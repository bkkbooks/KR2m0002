body:
  text: 唐會要卷七十五宋王溥撰選部下選限武德初因隋舊制以十一月起選至春即停至貞觀二年劉林甫為吏部侍郎以選限既促多不究悉遂奏四時選隨到注擬當時以為便貞觀十九年十一月馬周為吏部尚書以吏部四時持衡略無暇休遂奏請取所由文解十月一日赴省三月三十日銓畢按工部侍郎韋述唐書云貞觀八年唐皎為吏部侍郎以選集無限隨到注擬時漸太平選人稍衆請以冬初一集大集季春而畢至今行用之諸史又云是馬周未知孰是兩存焉開元二十年正月二十二日吏部尚書裴光庭奏文武選人承前三月三十日始畢比團甲巳至夏末自今以後並正月三十日內團甲至二月內畢六月二十八日蕭嵩奏吏部選人請準舊例至三月三十日團甲畢貞元八年春中書侍郎平章事陸贄始復令吏部每年禁選人舊事吏部常每年集人其後遂三數年一置選選人併至文書多不可尋勘真偽紛雜吏因得大為姦巧選人一蹉跌或十年不得官而官之闕者或纍歲無人贄令吏部分內外官為三分計闕集人歲以為常其弊十去七八天下稱之十五年六月敕六部奏選人依前三月三十日已前團奏畢其流外兵部禮部舉人等専委郎官恐不詳審共為取舍適表公平每至留放日皆就尚書侍郎對定既上下檢察庶在得人元和四年三月二十五日敕今後宗正寺修撰圖譜官知匭使判官至考滿日各宜減兩選藻鑑武德七年高祖謂吏部侍郎張鋭曰今年選人之內豈無才用者卿可簡試將來欲縻之好爵于是遂以張行成張知運等數人應命時以為知人咸亨中李敬玄為吏部侍郎時有楊炯王勃盧照鄰駱賔王並以文章見稱敬玄咸為延譽引以示裴行儉行儉曰才名有之爵祿蓋寡楊應至令長餘並鮮能令終時蘇味道王勮未知名因調選行儉一見深禮異之仍謂曰有晚年子息恨不見其成長二公十數年當居衡石願識此輩其後果如其言行儉嘗所引偏禆有程務挺張虔朂崔知辨王方翼黨金毗劉敬同郭待封李多祚黑齒常之盡為名將證聖元年劉竒為吏部侍郎注張文成司馬鍠為御史二人因申屠瑒以謝之竒正色曰舉賢本自無私二君何為見謝聖厯二年吏部侍郎鄭杲注韓思復為太常博士元希聲為京兆士曺嘗謂人曰今年掌選得韓元二人則吏部不負朝廷矣景雲二年盧從願為吏部侍郎杜暹自婺州參軍調集補鄭縣尉後為戶部尚書從願自益州長史入朝暹立在盧上謂曰選人定如何盧曰亦由僕之藻鑑遂使明公展千里足也開元八年七月王丘為吏部侍郎拔擢山陰尉孫逖桃林尉張鏡微湖城尉張普明進士王泠然李昂等不數年登禮闈掌綸誥焉十年十二月吏部侍郎崔琳掌銓收選人盧怡裴敦復于孺卿等數人無何皆入臺省衆以為知人非因銓選藻鑑附武德初李績得黎陽倉就食者數十萬人魏徴高季輔杜正倫郭孝怡皆客遊其所一見于衆人之中即和禮敬平武牢獲鄭州長史戴胄釋放推薦之當時以為有知人之鑒永徽元年中書舍人薛元超好汲引寒微嘗表薦任希古高知周郭正一王義方孟利貞十餘人時論稱美聖厯中狄仁傑為納言頗以藻鑑自任因舉桓彥範敬暉崔玄暐張柬之袁恕己等五人後皆有大勳復舉姚元崇等數十人悉為公相聖厯中則天令宰相各舉尚書郎一人仁傑獨薦其子光嗣由是拜地官員外蒞事有聲則天謂之曰祁奚內舉果得人也長安二年則天令雍州長史薛季昶擇察吏堪為御史者季昶以問録事參軍盧齊卿舉長安縣尉盧懷慎季休光萬年縣主簿崔湜咸陽縣丞倪若水盩厔縣尉田崇璧新豐縣尉崔日用後皆至大官景雲二年御史中丞韋抗加京畿按察使舉奏奉天縣尉梁升卿新豐縣尉王倕金城縣尉王氷華原縣尉王燾為判官其後皆著名位其年朔方總管張仁願奏用監察御史張敬忠何鸞長安縣尉寇泚鄠縣尉王易從始平縣主簿劉體微分判軍事義烏縣尉趙良正為隨軍後皆至大官先天元年侍中魏知古嘗表薦洹水縣令吕太一蒲州司功參軍齊浣右內率府騎曺栁澤及為吏部尚書又擢密縣尉宋遙左補闕袁暉封希顔伊闕縣尉陳希烈後咸居清要開元元年盧齊卿為幽州刺史時張守圭為果毅特禮接之謂曰十年內當知節度果如其言雜處置乾封三年十月敕司戎諸色考滿又選司諸色考滿入流人並兼試一經一史然後授官咸亨三年正月十八日許雍洛二州人任舉郡官天册元年十月二十二日敕品藻人物銓綜士流委之選曺責成斯在且人無求備用匪一途理當才地並升輪轅兼授或收其履厯或取其學行糊名考判立格注官既乖委任之方頗異銓衡之術朕厲精思化側席求賢必使草澤無遺方員曲盡改絃易調革故鼎新載想緝熙之崇式佇宏通之效其常選人自今已後冝委所司依常例銓注其糊名入試及令學上考判宜停神功元年十月敕選司抑塞者不須請不理狀任經御史臺論告不得輒于選司喧訴有凌突選司非理喧悖者注簿量殿尢甚者仍於省門集選人決三十仍殿立六選其年閏十月二十五日敕八寺丞九寺主簿三監丞簿城門符寶郎通事舍人大理司直評事左右衛千牛衛金吾衛左右率府羽林衛長史太子通事舍人親王掾屬判司參軍京兆河南太原判司赤城簿尉御史主簿校書正字詹事主簿協律郎奉禮太祝等出身入仕既有殊途望秩常班須從甄異其有從流外及視品官出身者不得任前官其中書主書門下録事尚書都事七品官中亦為緊要一例不許頗乖勸奬其考詞有清幹景行吏用文理者選日簡擇取厯十六考己上者聼量擬左右金吾長史及寺監丞聖厯元年二月二十二日敕選人無故三唱試三注不到者不在銓試重注之例其過門下三引不過者亦不在更注之限三年正月三十日敕監察御史左右拾遺赤縣簿尉大理評事兩幾諸縣丞簿尉三任已上及內外官經三任下考以上不改舊選品者選敘日各聽量隔品處分餘官必須依次授任不得超越大足元年正月十五日敕選人應留不須安論考等若諸事相似即先書上考如書判寥落又無善狀者雖帶上考亦宜量放開元二年二月十八日敕繁劇司闕官有灼然要籍者聽牒選司于應得官人內據材用資厯相當者先補擬三年六月八日敕吏部銓選委任尤重比雖守職務在循常既限之以選勞或失之于求士宜選日拔擢一二人不須限資次放四年六月十九日敕六品以下官令所司補授其外郎御史并餘供奉宜進名敕授其年七月敕如聞黔州管內州縣官員多闕吏部補人多不肯去成官已後或假解或從征考滿得資更别參選自餘管蠻獠州大率亦皆如此宜令所司于諸色選人內即召補並馳驛發遣至州令都府勘到日申所司如遲違牒管內都督決六十追毁告身更不須與官此其年九月十二日敕諸色選人納紙保後五日內其保識各于當司具名品并所在人州貫頭銜都為一牒報選司若有偽濫先用缺然後準式處分十二年四月十五日敕要官兒子少年未經事者不得作縣官親民十二年初定吏部員外郎專判南曺十四年十一月二十五日敕比來所注擬官多不慎擇或以資授或未適才宜令吏部每年先于選人內精加簡試灼然明嫺法理者留擬其評事已上仍令大理長官相加簡擇不得授非其人十五年九月敕令年敕吏部選人宜依例糊名試判臨時考第奏聞十七年二月敕邊逺諸州官多有老弱宜令吏部每年選人內簡擇強幹堪邊任者隨缺補授秩滿量減三兩選與留仍加優奬原缺八載六月十六日敕旨授官宜立攢符下諸郡府九載三月十三日敕吏部取人必限書判且文學政事本自異科求備一人百中無一況古來良宰豈必文人又限循資尤難奬擢自今以後簡縣令但才堪政理即甄取不得限以書判及循資格注擬諸圻望緊上中每等為一申委中書門下察問選擇堪者然後奏授大理評事緣朝要子弟中有未厯望圻縣使授此官既不守文又未經事自今以後有此色及朝要至親並不得注擬十一載七月敕吏部選人書判濫及雜犯不合得留者不限選數並放除此之外先後選深人一槩並留其選深被放人選淺得留人名且留放逗留榜示選人各令知委仍以單狀奏聞不須更起條目至十二月二日吏部尚書楊國忠奏請兩京選人銓目便定當放無長名遂詔文部選人調集者宜審定格限今集銓目各量官資書判狀迹功優據闕合留對衆集便定其宏詞博學或書判特優超流輩者不須定以選數聽集武部選人集試日校第功優亦對衆留放十三載三月二十八日敕旨授官取蜀郡大麻紙一張寫告身廣德元年二月敕諸州府及縣今後每有闕官宜委本州當日牒報本道觀察節度及租庸使司具闕由附便使牒中書門下送吏部依闕準式處分其所闕官有職稍重者委本府長官于見任及比司官中簡擇權令勾當正官到日停不得更差前資及白身等攝吏部及制敕所授官委中書門下及吏部出後三日內下本州準令式計程外一月不到任本州報中書門下吏部用闕如灼然事故準敕勒留不在此限其限程人六品已下本色內殿一兩選許同會闕不成人例五品已上停一二年其選人諸州諸使不得奏用大厯元年十二月敕許吏部選人自相舉如任官有犯罪舉主從吏部侍郎王廷昌奏十二年五月敕見任中書門下兩省五品已上尚書省三品已上子孫各授官者一切擬京官不得擬州縣官建中元年正月五日敕大理法官及太常禮官宜委吏部每選時簡擇才識相當與本司商量注擬貞元元年正月二十五日敕宜令清資常參官每年于吏部選人中各舉一人堪任縣令録事參軍者所司依資注擬便于甲厯具所舉官名銜仍牒御史臺如到任政理尤異及有贓犯事迹明著所司録舉官姓名聞奏當議褒貶仍長名後二十日舉仍永為常式七月吏部奏準今年五月敕節文緣選人淹留多時理且權宜發遣請量取建中四年授官至今計日成三考用闕注擬其受替人皆于常例稍屈亦冝量事優擢委所司選限畢後具所用闕人名銜聞奏至選日各減一選三年七月復置吏部小選九年十二月制自今以後應諸使行軍司馬判官書記參謀支使推官等使罷者如是檢校試五品已上不合于吏部選集並準罷使郎官御史例冬季聞奏十三年三月于吏部選人中簡擇通事舍人十九年七月敕以關輔飢罷今歲吏部選集元和三年正月吏部奏準去年六月敕元和元年下文狀人但有續闕即便注擬元和二年下文狀人切待有兩季下續闕至冬末合收用者注擬伏以非時選集見在無多待闕多年艱辛轉甚其元年二月十三日已前下文狀應未得官人並請依當年平選得選留人例一時注擬其十月以後及今年下文狀人如元敕即與處分亦請準前注擬其餘並請待注平選人畢有闕相當便與注擬如無闕相當即請許待續闕敕旨依奏三月敕祕省𢎞文館崇文館左右春坊司經局校書郎正字宜委吏部自今平流選人擇取志行亷退藝學精通注擬七年十二月魏博奏管內州縣官二百五十二員內一百六十三員見差假攝九十員請有司注擬從之八年八月吏部奏請差定文武官告紙軸之色物五品已上用大花異紋綾紙紫羅標檀木軸六品下朝官裝寫大花綾紙及小花綾標檀木軸命婦邑號許用五色箋小花諸雜色錦標紅牙碧牙軸其他團窠綾標金銀花箋紅牙發鏤軸鈿等除恩賜外請並禁斷敕旨依奏其年九月刑部奏準今年七月二十一日敕諸色左降官等經五考滿許量移者其降貶日授正員官或無責詞亦是責授並請至五考滿然後許本任處申闕並餘左降官緣任處多在遐逺至考滿日其申牒稽遲致使留滯者其刺史録事參軍等並請與下考如滿後雖己申牒未量移間其祿料並準天寶貞元兩度敕文依舊支給其本犯十惡等罪已有正名請從舊從之其年十一月敕有司奏申光蔡三州州縣官緣給復無稅應支俸料今量定員額及課料其六品以下官仍令吏部于選人中選優與注擬每月課錢委所司量與支給其員外及課料等并額待給復年滿一切仍舊十二年詔入粟助邊古今通制如聞定州側近秋稼方登念切效公不同常例有人能于定州納粟五百石者放同優比出身仍減三選一千石者無官便授解褐官有官者依資授官納二千石者超兩資如先有出身及官情願減選者每三百石與減一選十五年二月中書門下奏見任正官員充職掌等比限兩考及授官經二周年已上方許奏請然後與依資改轉有才在下位者不免留滯請自今後諸道使應奏請正員官充職掌經一年者即依資與改轉如未周者即量與類試官如此處分庶將得中敕旨依奏寶厯二年十一月敕旨京官百司應合帶職事奏正員官者自今已後宜于諸司及府縣見任官中選擇及府縣見令本官充職如見任無相當者即任于其年選人中奏用便據資厯與官不要待銓試仍永為常式三年正月山陵使奏伏以景陵光陵已來諸司諸使所差補押及雜掌官等皆據舊例合得減選其中有無選可減者便放非時選吏曺緣是承優放選例多判成有過格年深名身踰濫赴常選不得者多求減選掌職圖得非時赴集因緣優敕成此幸門其吏曺為弊頗甚于今請應差前資官充職掌不得取選數已過格人庶絶姦冒敕旨依奏太和四年七月吏部奏當司兩銓侍郎廳伏以吏部居文昌首曺侍郎為尚書二職銓庭所宜順序廳事固有等差舊以尚書廳之次為中銓其次為東銓自乾元中侍郎崔器以當時休咎為虞奏改中為西銓以久次侍郎居左以新次侍郎居右因循倒置議者非之伏請自今以後以久次侍郎居西銓以新除侍郎居東銓敕旨依奏其年七月吏部三銓正令史每銓元置七人今請依太和元年流外銓起請置五人減下兩人南曺令史一十五人今請依太和元年流外銓起請節文減下三人奉敕依奏五年二月吏部奏請量抽太和三年終已來至三年三月四月以來得資及計人成三考闕四十五員伏緣去冬諸色黃衣參選者倍多于常年其間十七人皆是勳臣貴戚及常參官子弟不可任逺處州縣官三銓以當年合用闕方員發遣之外每銓各有十餘人未得官今請準元和中及長慶初敕例據見在人數量抽前件闕注擬畢具所用闕聞奏敕旨宜依其年六月敕應選人未試已前南曺駁放後經廢置詳斷及準堂判却收比來南曺據給帖人數續到續試銓司更不考判便同平留選人例注擬稍涉僥幸自今已後應有此色並待正月十日準格詳斷限畢都引試判不及格并雜犯及續檢勘庫并前選文案不同並駁放不在更陳狀披訴及重詳斷之限其年五月吏部奏準貞元十八年四月一日敕諸親注得外官欲赴任自今已後每年須先奏聞者今請至時準敕檢勘聞奏其諸親薨歿子弟注得外官準先後敕合奏聞起自今已後請更赴集更不在重奏限其給勘處審勘仍于家狀一一具奏親等第如違駮放敕旨依奏其月五日敕應選人及冬集人案門下省檢勘畢後比來更差南曺令史權領却納門下甲庫在于公事頗甚勞擾自今已後諸勒吏部過院本令史便自分付甲庫以備他年檢勘請門下省勒甲庫令史每過選照勘收拾明立文案據官吏等遞相分付不得妄有破除南曺申請之時如有稱失落欠少本令史専知官準勘檢擅改違除流例處分七年五月二十五日中書門下奏今後請今京兆河南尹及天下刺史各于本府本道當選人中擇堪為縣令司録録事參軍人具課績才能聞薦其諸州先申牒觀察使都加考核申送吏部至選集者不要至試場更試書判吏部尚書引詣銓曺試時務狀一道訪以理民之術自陳厯任以來課績數條取其理識優長者以為等第便以大縣注擬如刺史所舉并兩人得上下考者就加爵秩在任年考已深者優與進改其縣令録事得上下考兼績狀者許非時放選如犯贓一百貫以下者舉主量削階秩一百貫以上者移守僻逺小郡觀察使委中書門下聽奏進止所舉人中兩人善政一人犯贓亦得贖免其犯贓官永不齒録從之開成元年十月中書門下奏兩畿及兩京奏六品以下官除敕授外並吏部注擬準太和五年正月二十六日敕中書門下奏近敕隔絶諸司奏六品以下官實免占吏部闕員亦稍絶邪濫其兩府司録及尉知捕賊皆藉幹能敏練用差專任吏部注或慮與事稍乖自今已後京兆尹及河南府司録及尉知捕賊滿據官資合入者充其餘並準太和元年九月十九日敕及太和四年五月七日敕處分會昌三年四月敕文準太和元年十二月十八日敕進士初合格並令授諸州府參軍及緊縣尉未經兩考不許奏職蓋制科之人必𢎞理化黎元之弊欲使諳詳近者諸州長史漸不遵承雖注縣寮多縻使職茍從知已不念蒸人流例寢成供費不少況去年選格改更新條許本郡奏官便當府充職一人從事兩請料錢虛占吏曺正員不親本任公事其進士宜至合年諸道依資奏授試官充職如奏授州縣官即不在兼職之限廣明元年敕吏部選人參錯長名人駮放者除有身名踰濫及欠選欠考外並以逺殘闕注擬東都選貞觀元年京師米貴始分于各州置選開耀元年七月𢎞文館直學士崔融議選事曰關外諸州道里迢遞洛河之邑天地之中伏望詔東西二曺兩京都分簡留放既畢同赴京師開元元年十二月遣黃門監魏知古黃門侍郎盧懷慎往東都分知選事便令擬宋璟為東都留守攝門監過官元和二年九月詔東都留守趙宗儒權知吏部今年東都選事銓試畢日停太和二年九月敕吏部今年東都選事宜令守河南尹王播權知侍郎銓試畢日停三年四月敕東都選事冝停闕南選上元三年八月七日敕桂廣交黔等州都督府比來所奏擬上人首領任官簡擇未甚得所自今已後宜準舊制四年一度簡擇清強正五品已上官充使選補仍令御史同往注擬其有應任五品已上官者委使人共所營督府相知具條景行藝能政術堪稱所職之處奏聞大足元年七月二十九日敕桂廣泉建賀福韶等州縣既是好處所有闕官宜依選例省補開元八年八月敕嶺南及黔中參選大曺名文解每限五月三十日到省八月三十日檢勘使了選使及選人限十月三十日到選所正月三十日內銓注使畢其領南選補使盛移桂州安置其年九月敕應南選人嶺南每府同一解嶺北州及黔府管內州每州同一解各命所管勘責出身由厯選數考課優勞等給作簿書先申省省勘應選人曺名考第一事以己明造厯子選使兼本司對勘定訖便結階定品署印牒付選使其每至選時皆須先使擬官受司團奏後所司覆同即憑進畫應給籖告所司為寫限使奏敕到六十日寫了差専使送付黔桂等州州司各送本州府分付天寶十三載九月敕如聞嶺南州縣近來頗習文儒自今已後去其嶺南五府管內白身有詞藻可稱者每至選補時任令應諸色鄉貢仍委選使準式考試有堪及第者具狀聞奏如有情願赴京者亦聽其前資官并常選人等有詞理兼通才堪理務者亦任北選及授北官大厯十四年十二月二日敕南選已差郎官固宜専達自今已後不須更差御史監臨興元元年敕吏部侍郎劉滋知洪州選事將京師寇盜之後天下蝗旱穀價翔貴選人不能赴調乃命滋江南興選以其便江嶺之人時稱舉職其年十一月嶺南選補使右司郎中獨孤愐奏狀伏準建中四年九月敕選補條件所注擬官便給帖放上至上都赴吏部團奏給告身敕旨準敕處分貞元二年十一月十日敕嶺南黔中選舊例補注訖給票放上其俸除手力紙筆園厨雜給之外餘並待奏申敕到後始據旨給付其福建選補使宜停其桂廣泉建福賀韶等州宜依選例稱補三年三月考功員外郎陳歸為嶺南選補使選人留放注官美惡違背令文唯意出入復供求無厭郵傳患之監察御史韓泰奏劾得罪配流恩州元和二年八月命職方員外郎王潔充嶺南選補使監察御史崔元方監焉長慶二年正月敕權停嶺南黔中今年選補寶厯二年二月容管經略使嚴公素奏當州普寧等七州乞準廣韶桂賀四州例南選從之太和三年敕嶺南選補雖是舊例但逺路行李未免勞人當處若有才能廉使宜委推擇待兵息事簡續舉舊章其南選使可更停一二年七年正月嶺南五管及黔中等道選補使宜更權停一二年開成二年正月又權停三年五年七月潮州刺史林郇苖奏州縣官請同漳河廣韶桂賀等州吏曺注官敕旨潮州嶺南大郡與韶略同宜下吏部準韶州例收闕注擬餘依其年十一月嶺南節度使盧鈞奏當道伏以海嶠擇吏與江淮不同若非諳熟土風即難搜求人瘼且嶺中往年弊是南選今之弊是北選臣當管一十五州唯韶廣兩州寮每年吏部選授道途遙逺瘴癘交侵選人若家事任持身名真實孰不自負無由肯來更以俸入單微每歲號為比逺若非下司貧弱令史即是逺處無能之流比及到官皆有積債十中無一肯識廉恥臣到任四年備知情狀其潮州官吏伏望持循往例不令吏部注擬且委本道求官若攝官廉慎有聞依前許觀察使奏準事堪經久法可施行敕旨依奏附科甲聖厯元年二月敕文武選人檢甲厯不獲者宜牒中書門下為檢如又不獲若在曺有官前後相銜可明者亦聽為敘開元二年二月敕諸色出身人銓試訖應常選者當年當色各為一甲團奏給告牒過百人已上分不滿五人附入甲十六年五月敕諸蕃應授內外文武官及留宿衛長上者共一甲其放還蕃者别為一甲仍具形狀年履同為一奏十九年四月敕應授官考校敘功纍勳有失錯者門下省詳覆有憑即為改注其年五月十一日敕附甲授官無闕者却牒中書門下改擬天寶二年十一月敕諸州醫學生等宜隨貢舉例申省補署十年與散官恐年深久檢勘無憑仍同流外例附甲大厯六年七月宰臣奏請自今已後敕授文武六品以下官敕出後附兵部附甲團奏貞元五年十二月敕除常參官及諸使判官等餘並附所司甲其兵部選人亦凖此八年二月户部奏內外官應直京內百司及禁中軍并國親勒留人等戶部侍郎盧徴奏伏以前件直司諸勒留官等若敕出便帶職事及勒留京官即合以敕出為上日外官比敕到為上自如本司未經奏聞即合同赴任官例準貞元六年二月二十四日敕待甲出後省符到任日支給俸料者甲出未帶勒留官簽符先下州府交替理例未免喧爭伏請起今以後並須挾多勒留敕到任方為上日支給料錢其附甲官有給甲依前勒留直諸司者待符甲後簽到州為上日支給課冀塞幸求庶絶論訴敕旨宜依冬集大厯十一年五月敕禮部送進士明經明法𢎞文及崇文生道舉等準式據書判資蔭量定冬集授散其春秋公羊穀梁周禮儀禮業人比緣習者較少開元中敕一例冬集其禮業每年授散自今已後禮人及道舉明法等有試書判稍優并蔭高及身是勳官三衛者準往例注冬集餘並授散貢舉上明經上元元年十二月二十七日天后上表曰伏以聖緒出自玄元五千之文實惟聖教望請三公以下內外百官皆習老子道德經其明經咸令集讀一準孝經論所司臨時䇿試請施行之至二年正月十四日明經咸試老子䇿二條進士試三條儀鳯三年三月敕自今已後道德經孝經並為上經貢舉皆須兼通其餘經及論語任依恆式長夀二年三月則天自製臣範兩卷令貢舉人習業停老子神龍元年二月二日敕文天下貢舉人停習臣範依前習老子開元十六年十二月國子祭酒楊瑞奏今之明習左氏者十無一二恐左氏之學廢又儀禮公羊穀梁亦請量加優奬遂下制明經習左氏及通周禮等四經者出身任散官至貞元元年五月二日敕自今已後明經習禮記及三傳者許冬集天寶元年四月三日敕自今已後應舉除崇玄學生外自餘所試道德經宜並停仍令所司更别擇一小經代之其年加爾雅以代道德經至貞元元年四月十一日敕比來所習爾雅多是草木鳥獸之名無益理道自今已後宜令習老子道德經以代爾雅其進士亦宜同大略例帖試至十二年三月十七日國子司業裴肅奏爾雅傳通詁訓綱維六經為文字之楷範作詩人之興咏備詳六親九族之禮多識鳥獸草木之名今古習傳儒林遵範其老子是聖人玄微之言非經典通明之旨為舉人所習之書伏恐稍乖本義伏請依前加爾雅奉敕宜凖天寶元年四月三日敕處分二年三月禮月令篇宜冠衆篇之首餘依舊次三年七月詔曰尚書古先所制有異他書今抄寫漸訛傳疑于後學永言刋革必在從宜尚書應是古字體並依今文建中二年十二月中書舍人權知禮部貢舉趙贊奏應口問大義明經等舉人明經之目義以為先比來相承唯務習帖至于義理少有能通經術寢衰莫不由此今若頓取大義恐全少其人欲且因循又慮無以勸學請約舉司舊例稍示考義之難承前問義不形文字落第之後喧競者多臣今請以所問録于紙上各令直書其義不假文言既與䇿有殊又事堪徴證憑此取舍庶歸至公如有義䇿全通者五經舉人請準廣德元年七月敕超與處分明經請減兩選伏請每歲甄奬不過數人庶使經術漸興人知教本敕旨明經義䇿全通者令所司具名聞奏續商量處分餘依貞元二年六月詔其明經有能習律一部以代爾雅者如帖經俱通于本色減兩選合集日與官十三年二月尚書左丞權禮部貢舉顧少連奏伏以取士之科以明經為首教人之本以義理為先至于帖書及以對䇿皆形文字並易考尋試義之時獨令口問對答之失覆視無憑黜退之中流議遂起伏請準建中二年十二月敕以所問録于紙上各合直書其義不假文言仍請依經疏對奉敕宜依元和二年十二月禮部貢院五經舉人請罷試口義準舊試墨義十條五經通五明經通六便放入第從之七年十二月權知禮部侍郎韋貫之奏試明經請停墨義依舊格問口義從之開成四年十月敕每年明經及第宜更與十人帖經條例貞觀九年五月敕自今已後明經兼習周禮并儀禮者于本色者量減一選永隆二年八月敕如聞明經射䇿不讀正經抄撮義條才有數卷進士不尋史籍唯誦文䇿銓綜藝能遂無優劣自今已後明經每經帖十得六已上者進士試雜文兩首識文律者然後令試䇿其書算舉人亦準此例即為常式永淳一年三月詔舉人並詔䇿三道即為永例開元八年七月國子司業李元瓘上言三禮三傳及毛詩尚書周易等並聖賢微旨生人教業必資事經逺則斯文不墜今明經所習務在出身咸以禮記文少人皆競讀周禮經邦之軌則儀禮莊敬之楷模公羊穀梁厯代從之今兩監及州縣以獨學無友四經殆絶事資訓誘不可因循其學生望請量配作業并貢人參試之日習周禮儀禮公羊榖梁並請帖十通五許其入䇿以此聞者或有敦勸仰望四海均集九經該備從之十六年十月準國子祭酒楊瑒奏近舉明經者主司不詳其述作之意每至帖試必取平頭年月孤經絶句自今以後考試者盡帖平文以存大典十七年三月國子祭酒楊瑒上言曰伏聞承前之例每年應舉常有千數及第兩監不過一二十人臣恐三千學徒虛費官廩兩監博士濫縻天祿臣竊見入仕諸色出身每歲向二千餘人方於明經進士多十餘倍自然服勤道業之士不及胥吏以之效官豈識先王之禮義陛下設學務以勸進之有司為約務以黜退之微誠實所未曉今監司課十已退其八九考功及第十又不收一二若長以為限恐儒風漸墜小道將興若以出身人多應諸色都減豈在獨抑明經進士也二十一年敕令士庶家藏老子一本每年貢舉人量減論語一兩條䇿加老子䇿二十五年二月敕今之明經進士則古之孝廉秀才近日以來殊乖本意進士以聲律為學多昧古今明經以帖誦為功罕窮旨趣安得為敦本復古經明行修以此登科非選士取賢之道其明經自今已後每經宜帖十取五已上免舊試一帖仍按問大義十條取六已上免試經䇿十條答時務䇿三道取粗有文理者與及第其進士宜停小經準明經帖大經十帖取通四已上乃準例試雜文及䇿考通與及第其明經中有明五經已上試皆通者進士中兼有精通一史能試䇿十條得六已上者委所司奏聽進止其應試進士等唱第訖其所試雜文及䇿送中書門下詳覆其所問明經大義仍須對同舉考試庶能否共知取舍無愧有功者逹可不勉歟天寶十一載七月舉人帖及口試並宜對衆考定更唱通否其載十二月敕禮部舉人比來試人頗非允當帖經首尾不出前後復取者也之乎頗相類之帖下為弊已久須有釐革今請每帖前後各出一行相類之處並不須帖唐會要卷七十五
