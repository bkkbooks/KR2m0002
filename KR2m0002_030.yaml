body:
  text: 唐會要卷三十宋王溥撰大內武德元年五月二十一日改隋大興殿為太極殿改隋昭陽門為順天門至神龍元年二月改為承天門顯慶五年八月有抱屈人賫鼓於朝堂訴上令東都置登聞鼓西京亦然景雲元年十月二十一日以京大內為太極宫𢎞義宫武德五年七月五日營𢎞義宫初秦王居中承乾殿髙祖以秦王有尅定天下功特給殊禮别命此宫以居之至九年七月髙祖以𢎞義宫有山林勝景雅好之至貞觀三年四月乃徙居之改為大安宫六月二十三日太宗正位於太極殿監察御史馬周上疏曰臣伏見大安宫在城之西其墻宇門闕之制方之紫極尚為卑小臣伏以皇太子之宅猶處城中大安乃至尊所居更在城外雖太上皇遊心道素志存清儉陛下重違慈旨愛惜人力蕃夷朝見及四方觀者有不足瞻仰焉臣願營築雉堞修起門樓務從髙敞以稱萬方之望則大孝昭乎天下矣通義宫武德六年四月二十四日幸龍潛舊宅改為通義宫祭元皇帝於舊寢以元貞皇后配享上悲不自勝也于是置酒髙會詔曰爰擇良辰言遵邑里禮同過沛事等歸譙故老咸臻旅姻斯會肅恭薦享感慶兼集焉其年十二月九日敕以奉義監為躍龍宫即髙祖舊居慶善宫武德元年十月十八日以武功舊宅為武功宫至六年十二月九日改武功宫為慶善宫太宗誕於此宫至貞觀六年九月二十九日太宗幸慶善宫賦詩在樂卷其年諌議大夫蘇世長侍宴於披香殿酒酣奏曰此殿隋煬帝所作邪何雕麗之若此髙祖謂曰卿好諫似直其心實詐豈不知此殿是我所造何須設詭而疑煬帝乎世長曰臣實不知若陛下作此誠非所宜臣昔在武功幸常陪侍見陛下宅宇才蔽風霜當此時焉肯為是今初有天下而於隋宫之內又加雕飾欲撥其亂寧可得乎太和宫武德八年四月二十一日造太和宫於終南山貞觀十年廢至二十一年四月九日上不豫公卿上言請修廢太和宫厥地清涼可以清暑臣等請徹俸祿率子弟微加功力不日而就手詔曰比者風虛頗積為弊至深况復炎景蒸時溫風播節沈疴屬此理所不堪久欲追涼恐成勞擾今卿等有請即相機行于是遣將作大匠閻立德就順陽王第取材瓦以建之包山為苑自栽木至於設幄九日而畢功因改為翠微宫正門北開謂之雲霞門視朝殿名翠微殿寢名含風殿并為皇太子搆别宫正門西開名金華門殿名安喜殿洛陽宫武德四年十二月七日使行臺僕射屈突通焚朝元殿應天門紫微觀以其太奢至貞觀三年太宗修洛陽宫民部尚書戴胄諫曰關中河外盡置軍團富室強丁並從戎旅重以九成作役餘丁向盡去京二千里內先配司農將作假有遺餘勢何足紀亂離甫爾户口單弱一人就役舉家便廢入軍者督其戎仗從役者責其餱糧盡室經營多不能濟以臣愚慮恐致怨嗟今丁役既盡賦調不減費用不止帑藏空虛且洛陽宫殿足蔽風雨數年功畢亦謂非晚若頓修營恐傷勞擾上嘉之因謂侍臣曰戴胄於我無骨肉之親但以忠直勵行情深體國事有機要無不上聞至七年六月二十二日發卒又修洛陽宫給事中張玄素諫曰陛下承百王之末屬雕敝之餘必欲節以禮制陛下宜以身為先東都未幸而即令補葺豈民人之所望也陛下初平東都之始層樓廣殿皆令撤毁天下翕然同心欣仰豈有初則惡其侈靡今乃襲其雕麗臣每承德音未即巡幸此則事不急之務成虛費之勞國無兼年之積何用兩都之好臣聞阿房成秦人散章華就楚衆離又乾陽畢功隋人解體以陛下今時功力何如隋日役瘡痍之人襲亡隋之弊深恐近於煬帝時矣願陛下思之無為由余所笑則天下幸甚上大悅謂房玄齡曰本修洛陽意在便於百姓今玄素上表實亦可依必事理須行露坐亦得何苦繕修宜即停之顯慶元年敕司農少卿田仁佐因舊餘材修乾元殿髙一百二十尺東西三百四十五尺南北一百七十六尺至麟德二年三月十二日所司奏乾元殿成其應天門先亦焚之及至造成號為乾天門神龍元年三月十一日避天后號改為應天門唐隆元年七月避中宗號改為神龍門開元敕又為應天門天寶二年十一月四日又改為乾天門垂拱四年二月十日拆乾天殿于其地造明堂至開元二十一年九月十日於明堂舊址造乾天殿上元二年髙宗將還西京乃謂司農少卿韋𢎞機曰兩都是朕東西之宅也見在宫館隋代所造歲序既淹漸將頺頓欲修殊費材力為之奈何𢎞機奏曰臣曹司舊式差丁採木皆有雇直今户奴採斫足支十年所納丁庸及蒲荷之直在庫見貯四十萬貫用之市材造瓦不勞百姓三載必成矣上大悅乃召𢎞機攝東都將少府兩司使事漸營之于是𢎞機始造宿宇髙山等宫其後上逰於洛之水北乘髙臨下有登眺之美乃敕𢎞機造一髙館及成臨幸復令列岸修廊連亘一里又於澗曲疏建隂殿機得古銅器終盆而殘中有蹙起雙鯉之狀魚背有四字長宜子孫至儀鳳四年車駕入洛乃移御之門即今之上陽宫也尚書左僕射劉仁軌謂侍御史狄仁傑曰古之陂池臺榭皆在深宫裏城之內不欲外人見之恐傷百姓之心也𢎞機之作列岸修廊在於宫城之外萬方朝謁無不覩之此豈致君堯舜之意哉𢎞機聞之曰天下百司各奉其職輔弼之臣則思獻替之事府藏之臣行詔守官而已吾不敢越分也大明宫貞觀八年十月營永安宫至九年正月改名大明宫以備太上皇清燕公卿百僚爭以私財助役至龍朔二年髙宗染風痺以宫內湫濕乃修舊大明宫改名蓬萊宫北據髙原南望爽塏六月七日制蓬萊宫諸門殿亭等名至三年二月二日兖雍同岐豳華寧鄜坊涇原絳晉滿慶等十五州率口錢修蓬萊宫二十五減京官一月俸助修蓬萊宫四月二十二日移仗就蓬萊宫親作含元殿二十五日始御宸宫聽政百僚奉賀新宫成也初遣司稼少卿梁孝仁監造悉於亭院列白楊樹左騎尉大將軍契苾何力同入宫中縱觀孝仁指白楊曰此木易長不過三二年宫中可得蔭映何力不答但誦古詩曰白楊多悲風蕭蕭愁殺人意謂此特冢墓木也孝仁遽令伐去之更植桐柏謂人曰禮失求之于野固不虛也東臺侍郎張文瓘諫曰人力不可不惜百姓不可不養養之逸則富以康使之勞則怨以叛秦皇漢武廣事四夷多造宫室致使土崩瓦解户口減半臣聞制治於未亂保邦於未危人罔常懷懷於有仁陛下不制之於未亂之前安能救於既危之後百姓不堪其弊必致禍難殷鑒不逺近在隋朝臣願稍安撫之無使生怨上深納其言永隆二年正月十日王公已下以太子初立獻食敕於宣政殿會百官及命婦太常博士袁利貞上疏曰伏以恩旨於宣政殿上兼設命婦坐位奏九部伎及散樂並從宣政門入臣以為前殿正寢非命婦宴會之處象闕路門非倡優進御之所望請命婦會於别殿九部伎從東門入散樂一色伏望停省若於三殿别所自可備極恩私上從之改向麟德殿至開元十六年五月六日唐昌公主出降有司進儀注於紫宸殿行五禮右補闕施敬本左拾遺張烜右拾遺李鋭等連名上疏曰竊以紫宸殿者漢之前殿周之路寢陛下所負黼扆正黃屋饗萬國朝諸侯人臣致敬之所猶玄極可見不可得而升也昔周女出降於齊而以魯侯為主但有外館之法而無路寢之事今欲紫宸殿會禮即當臣下攝行馬入庭醴升於牖主人授幣逡巡紫座之間賓使就筵登降赤墀之地又據主人辭稱我子有事至於寡人之室言詞僭越事理乖張既黷威靈深虧典制其問名納采等並請權於别所上納其言移於光順門外設次行禮咸享元年三月四日改蓬萊宫為含元殿長安元年十一月又改為大明宫十二月一日改含元殿為大明殿神龍元年二月復改為含元殿上元二年七月延英殿當御坐生玉芝一莖三花親制玉靈芝詩三章章八句曰玉殿肅肅靈芝煌煌重英發秀連葉分房宗廟之福垂其耿光元氣産芝明神合德紫微間彩白蕣呈色載啓瑞圖庶符皇極天心有眷王道惟直幸生芳本當我宸旒效此靈質寶玉獻猷神惟不愛道亦無求端拱思維永荷天休建中元年九月將作監言請修內廊是嵗孟冬為魁罡不利修作太史請卜他時上曰啓塞從時詭妄之書勿信乃命修之貞元三年十二月初作玄英門觀於大明宫北垣玉華宫貞觀二十一年七月十三日創造玉華宫於坊州宜君縣之鳳凰谷正門曰南風門殿名玉華殿皇太子所居南風門東正門曰嘉禮門殿名輝和殿正殿瓦覆餘皆葺之以茅意在清潔務從儉約至永徽二年九月三日廢玉華宫以為佛寺苑內舊是百姓田並還本主至二十二年四月二十四日太宗以新造離宫務從卑儉終費人力謂侍臣曰唐堯茅茨不剪以為儉德不知堯之時無瓦不得不以茅茨則於無瓦之晨為茅茨者未為儉德不剪之言蓋書史粉飾之耳朕今構采椽於椒風之日立茅茨於有瓦之時將為節儉自當不謝古者但宫室之廣人役之勞朕以此再思不能無愧其月徐充容上表曰妾聞為政之本貴在無為竊見土木之工不可兼遂北闕初建南營翠微曾未逾時玉華復興因山藉水非無架築之勞損之又損頗有工力之費縱以茅茨示約猶興木石疲民假使和雇取人不無煩擾之弊是以卑宫菲食聖王之所安金屋瑶臺驕主之為麗故有道之君以逸逸人無道之君以樂樂身願陛下使之以時則力不竭矣用而息之則人斯悅矣二十二年四月太宗御製玉華宫銘詔令皇太子已下並和九成宫永徽二年九月八日改九成宫為萬年宫至乾封二年二月十日改為九成宫三年四月將作大匠閻立德造新殿成移御之日謂侍臣曰朕性不宜熱所司頻奏請造此殿既作之後深懼人勞今既暑熱朕在屋下尚有流汗匠工暴露事亦可愍所以不令精妙意者祇避炎暑耳長孫無忌曰聖心每以恤民為念天德如此臣等不勝幸甚五年三月幸萬年宫上謂太尉無忌曰此宫非直涼冷宜人且去京不逺殿雖已十年屋宇無多損壞昨者不易一椽一瓦便已可安不知公等得曹司廨署周足否乃親制萬年宫銘并序七百餘字羣臣請刋石建於永光門詔從之奉天宫永淳元年七月造奉天宫於嵩陽仍置嵩陽縣監察御史李善感諫曰自古帝王莫不以登封為事天皇以封泰山告太平致羣瑞則與三皇五帝比崇但數年百穀不稔百姓餓死道路相望兼四夷交侵日有徴發天王恭默思譴方便營造宫室勞役不已天下聞之莫不失望臣聞不矜細行終纍大德臣忝任御史是國家耳目竊以此為憂上雖優容之竟不納其時承平已久諫諍殆絶善感既進諫書時人甚稱之𢎞道元年十二月遺詔廢之文明元年二月改為嵩陽觀三陽宫興泰宫附聖厯三年十一月二十八日造三陽宫於嵩陽縣久視元年七月三日左補闕張説以車駕在三陽宫不時還都上疏曰陛下出萬乘幸離宫暑退涼歸未降還旨愚臣固陋非為長䇿請為陛下陳其不可三陽宫至洛城一百六十里有伊水之隔愕坂之峻過夏涉秋水潦方積道壞山險不通轉運河廣無梁咫尺千里扈從兵馬日費資給連雨彌旬恐難周濟陛下太倉武庫並在都邑紅粟利器蘊若邱山奈何去宗廟之上都安山谷之僻處是猶倒持劍戟示人鐏柄夫禍變之生在人所忽故曰安心樂成無行所悔今國家北有強冦覷邉南有夷獠騷徼關西小旱耕稼是憂安東近平輸漕方始臣願陛下及時旋軫天下羣生莫不幸甚長安四年正月二十二日毁三陽宫取其材木造興泰宫於夀安縣之萬安山左拾遺盧藏用上表諫曰臣愚雖不達時變竊讀書見自古帝王之迹衆矣臣聞土階三尺茅茨不剪采椽不斫者堯舜之德也卑宫室菲飲食盡力乎溝洫者大禹之行也惜中人十家之産而罷露臺之制者漢文之明也並能垂名無窮為帝皇之烈豈不克念徇物博施濟衆以臻於仁恕哉今陛下崇臺邃宇離宫别館亦已多矣更窮人之力専事土木臣恐議者以陛下為不愛人務奉已也左右近臣多以順意為忠朝廷具寮皆以犯顔為患至令陛下不知百姓失業百姓亦不知左右傷陛下之仁也小臣固陋不識忌諱敢冒死上聞乞下臣此章與執政者議其可否興慶宫開元二年七月二十九日以興慶里舊邸為興慶宫初上在藩邸與宋王等同居於興慶里時人號曰五王子宅至景龍末宅內有龍池湧出日以浸廣望氣者云有天子氣中宗數行其地命泛舟以馳象蹈氣以厭之至是為宫焉後於西南置樓西面題曰花蕚相輝之樓南面曰勤政務本之樓至二十五年玄宗謂諸王曰我自奉先帝宫室不敢有加時時補葺已愧於勞人矣惟興慶創制乃朝廷百辟卿士以吾舊邸因欲修建不免羣卿考室之詞以俟庶民子來之請亦所以表休徴之地新作南樓本欲察氓俗採風謡以防壅塞是亦我闢四門達四聰之意時有作樂宴慰不徒然也又因大哥讓朱邸以成花蕚相輝之美厯觀自古聖帝明王有所興作欲以助教化也我所冀者式崇敦睦漸漬薄俗令其知信厚爾至十六年正月三日始移仗於興慶宫聽政二十年六月廣花蕚樓築夾城至芙蓉園十二月三日毁東市東北角道政坊西北角以廣花蕚樓前天寶十載四月二十一日興慶宫造交泰殿成元和十四年三月詔左右軍容各以官健二千人修勤政樓太和三年十月敕修南內天同殿十三間及勤政樓明光樓大中五年詔修明義樓華清宫開元十一年十月五日置溫泉宫於驪山至天寶六載十月三日改溫泉宫為華清宫至天寶九載九月幸溫泉宫改驪山為會昌山至十載又改為昭應山仍於秦坑儒之處立祠以祀遭難諸儒天寶元年十月造長生殿名為集靈臺以祀神六載十二月發馮翊華隂等郡丁夫築會昌羅城於湯所置百司七載十二月二日玄元皇帝降於朝元閣改為降聖閣八載四月新作觀風樓諸宫武德七年五月十七日造仁智宫於宜州宜君縣貞觀二年八月上每日視政西宫公卿奏以宫中卑濕請立一閣上曰若遂來請縻費良多昔漢文帝將起露臺而惜中人十家之産朕德不逮乎漢帝而所費過之豈為人父母之道哉竟不許十一年正月十四日新作飛仙宫七月二十日廢明德宫及飛仙宫之園囿以分給遭水之家十七年八月五日營襄城宫初太宗將幸洛陽遣將作大匠閻立德訪可清暑之地以建離宫遂於汝州西山前臨汝水旁通廣城擇以置宫焉役功一百九十萬雜費稱是至十五年三月七日幸襄城宫及至暑熱甚又多毒虺太宗大怒九日免立德官而罷其宫分賜百姓顯慶五年四月八日於東都苑內造八關涼宫五月二十二日改為合璧宫儀鳳三年正月七日於藍田縣新作涼宫宜名萬全宫至𢎞道元年十二月七日遺詔廢之四年五月十九日造紫桂宫於澠池縣西至永淳元年四月十三日改芳桂宫𢎞道元年遺詔廢之長安二年六月於雍州永安縣置涼宫以永安為名仍令特進武三思充使營造景龍三年十月敕宫城皇門京城門禁苑門左右內外各給交魚符一合巡魚符一合左廂給開門魚一合右廂給閉門魚一合皆左符付監門掌交番巡察每夜并非時開閉則用之開元十一年正月十四日改潞州舊宅為飛龍宫雜記武德三年七月八日敕隋代離宫别館逰憩所並廢九年六月改東宫𢎞禮嘉福等門為重光宣明門長安二年正月十七日太子左庶子王方慶上言請凖舊制改東宫殿及各門與皇太子名同者上疏曰謹按史籍所載人臣與人主言凡上表未有稱皇太子名者當為太子皇儲其名尊重不敢斥所以不言西晉僕射山濤啓事稱皇太子而不言名濤中朝名士必詳典籍故不稱名應有憑凖朝官尚猶如此宫臣諱則不疑今東宫殿及門名皆有觸犯事合論啓回避甚難孝敬皇帝為太子時改𢎞教門為崇教門沛王為皇太子時改崇賢館為崇文館皆避名諱以尊禮典此則成例足為軌模上從之神龍元年十一月二十五日有司奏以宫殿名與沛王諱同者悉改焉遂改昭慶殿章德殿昭賢侯廟三年八月二十一日改玄武門為神武制勝樓開元二十六年正月六日修望春宫至十月兩京路行宫各進造殿宇及屋千間貞元三年三月三日造會慶亭於麟德殿前四年十月二十五日户部侍郎班𢎞奉敕修延喜樓築夾城五年正月十九日𢎞又修玄武樓十二年八月六日户部尚書裴延齡奉敕修望仙樓至十三日令又築望仙樓東夾城其年十二月度支郎中兼御史中丞副知度支蘇辨奉敕改造三殿前會慶亭十二年九月上謂户部侍郎判度支裴延齡曰朕以浴堂院殿一所損壞欲換之而未能裴延齡曰陛下自有本分錢物用之不竭上驚曰本分錢物何也對曰凖禮經天下賦稅三分一分充乾豆一分充賓客一分充君之庖厨乾豆者供宗廟也亦不用分財賦至於諸國蕃客及回紇馬價皆極簡儉庖厨之餘其數尚多陛下本分也用修十數殿亦不合疑何况一堂邪上頷之而已又奏近於同州檢得一谷材木數可千條皆長七八十尺上曰人聞天寶中附近木長五六十尺者尚無今何近處忽有此木延齡曰生自關輔蓋為聖時豈前時合得有也其姦佞如此元和二年六月詔左神䇿軍新築夾城置玄化門晨輝樓三年十月敕修南內宫墻舍共一千六百間五年十一月上謂宰臣曰朕以禁中書殿歲久傾危欲漸修葺緣國用未足每務簡儉至於車服食飲亦畏奢侈不知竟可營造否權德輿對曰仲尼謂大禹卑宫室菲飲食惡衣服為無間漢文帝欲起露臺以百金中人十家之産吾奉先帝宫室常恐羞之何以臺為遂止是以文帝之代四海富庶俗知禮讓今陛下至誠恭儉有過前王當為天下幸甚六年四月詔毁興安門南行亭十二年四月詔右神䇿軍以衆二千築夾城自雲昭門過芳林門西至修德里以通於興福佛寺其年五月新造蓬萊池周廊四百間十三年四月詔六軍使創修麟德殿之右廊是月後龍首池起承暉殿雕飾綺煥徙植佛寺之花木充焉十五年二月詔於西廊內開便門以通宰臣自閣中赴延英路其年七月新作永安殿及寶慶殿修日華門通乾門并朝堂廊舍八月發神策六軍二千人浚魚藻池其年十月發右神䇿兵各千人於門下省東少陽院前築牆及造樓觀長慶元年五月禁中造百尺樓時帑藏未實內外多事土木之工屢興物議喧然寶厯元年五月神策軍於苑內古長安城中修漢未央宫掘地獲白玉一長六尺其年九月敕長春宫莊宅宜令內莊宅使營太和元年四月詔毁升陽殿東放鴨亭望仙門側看樓十間並敬宗所造也二十八年敕修安福殿及南院屋宇一百八十八間又修兩儀殿及甘露殿共一百七十二間九年七月敕造紫雲樓於芙蓉北垣其年九月內出新造紫雲樓彩霞亭額左軍中尉仇士良以鼓吹迎於銀臺門時上好詩每吟杜甫曲江行云江頭宫殿鎖千門細柳新蒲為誰緑乃知天寶已前曲江四面皆有行宫臺殿思復升平故事故為樓殿壯之會昌元年三月敕造靈符應聖院五年正月造仙臺其年六月修望仙樓及廊舍共五百三十九間大中元年二月敕修百福殿院八十間其年七月敕觀政樓號雍和殿别造屋宇廊舍七百間二年正月敕修右銀臺門屋宇及南面城牆至獻武樓天祐二年四月敕自今年五月一日後常朝出入取東上閣門或遇奉慰即開西上閣門永為定制其年五月四日敕改東都延喜門為宣仁門重明門為興教門長樂門為光政門光範門為應天門乾化門為乾元門宣政門為敷政門崇政門為觀政門日華門為左延福門萬夀門為萬春門積慶門為興善門平章門為膺福門金法門為延義門金鸞門為千秋門延和門為章善門以保寧殿為文思殿其見在門名與京門同名並宜復洛陽舊門名唐會要卷三十
