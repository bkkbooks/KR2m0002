body:
  text: 唐㑹要卷七十二宋王溥撰京城諸軍武德三年七月十一日高祖以天下未定將舉關中之衆以臨四方乃下詔曰周置六軍每習搜狩漢增八校畢選驍勇故能統臨九有威震百蠻况今伊洛猶蕪江湖尚梗各因部校序其統屬改復鉦鐸創造徽章取象天官作其名號於是置二十衛將軍分關內諸府𨽻焉每將軍一人副一人取威名素重者為之督以耕戰之事軍名傳奕所造萬年道為參旗軍長安道為鼓旗軍富平道為𤣥戈軍醴泉道為井鉞軍同州道為羽林軍華州道為官騎軍寧州道為折威軍岐州道為平道軍邠州道為招搖軍西麟道為逰奕軍經州道為天紀軍宜州道為天節軍至六年二月二十四日廢八年五月以突厥為患復置十二軍羽林軍貞觀十二年十一月三日於𤣥武門置左右屯營以諸衛將軍領之其兵名曰飛騎中簡才力驍健善騎射者號為百騎上逰幸則依五色袍乘六間馬賜猛獸衣韉以從之至永昌元年十月二十八日改百騎為千騎至景雲元年九月二十七日改千騎為萬騎垂拱元年五月十七日置左右羽林軍領羽林郎六千人至天授二年三月三十日改為左右羽林衛以武攸寧為大將軍神龍元年二月一日又改為左右羽林軍張柬之等將誅張易之兄弟引右羽林大將軍李多祚籌其事謂曰將軍在此間幾年曰三十年柬之曰將軍擊鍾鼎食腰懸金紫誠貴寵當代位極武臣豈非大帝之恩將軍既感大帝殊澤能有報乎大帝之子見在東宫逆豎張易之兄弟擅權朝夕危逼宗社之重將軍誠能報君正在此日多祚曰茍緣王室惟相君所使終不顧妻子性命因即引天地神祗為約誓辭氣感激義形於色及平內難封遼東郡王景雲元年八月二十五日又改為左右羽林軍乾元元年十月四日敕左右羽林軍左右龍武左右神武軍文武官並升同金吾四衛神龍元年田歸道為殿中監押千騎宿衛於武門敬暉之討張易之昌宗也遣使就索千騎歸道以先不預其謀拒而不與及事定暉等欲誅之歸道有辭免令歸中宗嘉其忠詔拜太僕少卿二年七月二日敕左右羽林飛騎射食准國子監例委軍司自定官典押當景龍元年十月停户奴為萬騎先天二年正月詔侍者計户充軍使二十一人募六丁出軍既憚劬勞咸欲避匿不有釐革將何致理應天下衛士取年二十五以上者充十五年即放出頻經征鎮者十年放出自今後羽林飛騎並於衛士中簡補開元十年九月二十七日敕駕在京右右屯營冝於順義景風門內安置北街亦著兩營大明北門安置一營大內北門安置駕在東都左右屯營於賔曜右渡門內安置兼於𤣥武左右廂各據地界繞營城分配宿衛十八年十一月五日敕應補萬騎冝待本使挾名録奏敕下然後給食糧者二十六年十一月五日析左右羽林軍置龍武軍以左右萬騎營𨽻焉天寶五載三月十八日敕應闕飛騎請委郡縣長官先取長六尺不足即選取五尺九寸以上灼然濶壯膂力申送七載七月二十日敕左右羽林軍飛騎請准後加數通舊一萬五千人為定額六畨上下至德二載十月十四日左右神武兩軍先取元扈從官子弟充如不足任於諸邑中簡取二千人為定額其帶品人並同四軍例自身准萬騎例仍賜名神武天騎永為恆式寶應二年六月以前淮西節度使安州刺史王仲升為右羽林大將軍知軍事仍兼御史大夫六軍將軍兼憲官自此始也廣德二年正月敕左右神武等軍各一千五百人為定額左右羽林軍各以二千人為定額貞元三年五月左右神武等軍各加將軍一員上以諸道大將軍有功勞者將擢掌禁兵故增其官員以待之仍以浙西大將王栖曜李長榮河東大將軍郭定元符璘充之四年八月敕左右羽林軍飛騎等兵部照補格敕甚明軍師不合擅有違越自今以後不得輒自召補元和二年正月敕左右羽林軍應管月畨飛騎總五千六百一十三人冝停其四月敕左右威逺營置來已久著在國章近置英武軍及加軍額冝從併省以正舊名其英武軍額宜停將士及當軍一切以上並合入左右威逺營依前置使二人勾當十三年十二月敕左右龍武等六軍營威逺營應納課户共一千八百人所請衣糧冝並勒停仍委本軍具名牒送府縣收管自貞元以來長安富戶皆𨽻要司求影庇禁軍挂籍十五六焉至有恃其多藏安處闤闐身不宿衛以錢代行謂之納課户至是禁絶天祐二年正月二十二日敕威逺軍冝停廢其所管兵士便𨽻六軍其軍使張勤宜却守本管歸班神䇿軍天寶初哥舒翰破吐蕃軍於臨洮城西二百餘里遂請以其地為神䇿軍朝廷以成如璆為洮陽太守兼神䇿軍使及安祿山反如璆使其將衛伯玉領神䇿軍千餘人赴難於相州城下官軍相州之敗伯玉收其兵與觀軍容使魚朝恩同保陜州時西邊土地已沒逐詔伯玉所領軍號神䇿軍以伯玉為軍使與陜州節度郭英乂同鎮於陜觀軍容使魚朝恩亦在㑹衛伯玉以其兵東討有力遂加號神䇿軍節度使伯玉歸朝郭英乂兼領神䇿軍節度使尋追郭英乂為僕射其軍遂統於觀軍容使屬廣德初代宗幸陜朝恩率神䇿軍以迎兼護車駕幸其營焉京師克平朝恩以所統軍歸於禁中至大厯五年朝恩得罪死以其將劉希暹代之是嵗希暹復得罪以朝恩舊將王駕鶴代之德宗即位以白琇圭為軍使賜名曰志貞及朱泚之亂上幸奉天志貞流貶李晟自山東詔駕神䇿行營興元克復晟出鎮鳯翔始分神䇿為左右廂令內官竇文場王希遷分知兩廂兵焉貞元二年九月二日神䇿左右廂冝改為左右神䇿軍每軍置大將軍二人秩正二品將軍各二人從三品殿前射生左右廂宜改為殿前左右射生軍各置大將軍二人秩正二品將軍二人秩從三品將軍二人從五品其職田俸錢手刀糧料等同六軍十二衛至三年四月十七日敕左右射生冝改為左右神威軍五月敕左右軍各加置將軍二員六年八月鑄藍田渭橋等鎮遏使印凡三十三顆七年詔武威神䇿六將軍自相訟委軍司推勘與百姓相訟委府縣推勘小事移牒大事奏取處分軍司府縣不得相侵十年京兆尹楊於陵奏諸軍影占編户無以别白請據挾名每五丁者得兩人入軍四丁三丁者差以條限從之十四年八月詔左右軍特為親近冝署統軍以崇禁衛其品秩俸祿料一事以上同六軍統軍例二十一年三月以檢校尚書右僕射右金吾大將軍范希朝為兼右軍京西諸城鎮行營節度使駐于奉天時王叔文欲專兵權藉希朝年老舊將使主其名又以其黨韓泰兼御史中丞充左右神䇿京西諸城鎮行營兵馬節度使行軍司馬且欲因而代之㑹邊上諸將各以狀辭中尉且言方屬希朝中尉始悟兵柄為叔文等所奪仍令其使歸告諸將曰無以兵屬及希朝至奉天諸將無至者韓泰馳歸白之叔文計無所出元和二年正月京兆尹李鄘奏三原髙陵涇陽興平等四縣兵管烽二十八所每年差烽子計九百七十五人逺近無虞畿內烽燧請停從之三年正月詔普潤鎮兵馬使𨽻左神䇿軍良原鎮兵馬使𨽻右神䇿軍其月罷左右神威軍額合為一軍號曰天威軍至八年廢天威軍以其騎士分屬左右神䇿衛穆宗嘗欲簡選武士復立此軍以為心腹謀於宰相裴度以為不便遂止十三年四月內出印二紐賜左右三軍辟仗使舊制內官為六軍辟仗使盤視刑賞奏察違謬猶外方征鎮之監軍使初不置印於時監軍使張奉國李文悅嘗見工徒出入官衙慮外患初息禁中營繕或多因白宰相兾以論諌宰相裴度遂諌之上怒奉國等不自陳而外議禁中事絶其朝請軍數日納度之諌乃釋之遂授奉國鴻臚卿文悅左威衛大將軍充威逺營使龍武軍既闕帥由是命辟仗使主軍印代其事其軍之佐吏或抗言以論或移疾請告於是特賜辟仗使專事焉其年六月京兆尹李逰奏諸司使諸軍所由官徒等共九十四人狀名伏檢元和二年二月敕委京兆府此後十年更無逃亡補替等處遂使影占文牒散在村坊凡欲差役皆無憑據臣所請諸司案舊名額自元和二年其逃亡補替挾名鄉縣牒臣府後復移知左右神䇿金吾軍伏乞聖恩一例處分度明區畫永久有常敕左右軍以後别敕處分餘並依長慶二年三月詔曰如聞近日武班之中淹滯頗久又有諸道薦送大將或隨節度使歸朝自今以後冝令神䇿六軍使及南衛常參武官各具由歷并前後功績牒送中書門下若勳伐素高人才特異者量加奬擢其常參武官准其依月限改轉勿令淹滯四年三月制敕應屬諸軍諸司諸使人等於城市及畿內村鄉店鋪經紀自今以後冝與百姓一例差科不得妄有影占開成三年九月敕左右神䇿軍所奏將吏改轉比多行牒中書門下使覆奏處置今後令軍司先具奏聞狀到中書然後檢勘進覆㑹昌元年二月敕左右神䇿軍先有奏正員官大將諸授管事起今後已冝依資改轉如無正員官者軍司欲為奏論須有功績者冝具事跡奏聞當為甄奬不在注擬之限五年七月敕左右神䇿軍定額軍各十員判官主員勾覆官支計官表奏計官一員孔目官二員馳改轉止於中下州司馬並不擬登朝官其驅使官從使挾名敕下各從補後計四年優放選其十員官如官滿及用闕本軍與奏中書門下依資擬官判以一十員如老弱不任選事須停解者終身不許更有參選如有殿犯即據官判以下或謫官或覆資或罪輕停解者亦須終身不許更有參選仍永為常式其元和二年十員定額官敕不在行用之限六年十一月敕左右神䇿軍自今以後如有奏判官以下官額十員請轉官者冝委中書門下依元和二年流例與覆奏進擬其㑹昌五年七月四日釐革定額轉官敕自今以後不要行大中五年十月京兆尹常驚奏京畿户於諸軍影占茍免府縣差役或有追計軍府紛然請准㑹昌五年十二月敕諸軍使不得强奪百姓入軍從之光啓六年四月以右金吾衛將軍齊國公田令孜為左右神䇿軍使時自蜀中護駕令孜詔募將軍五十四都每都千人左右神䇿各二十七都分為五軍令孜總領之府兵武德元年五月改隋鷹揚郎將為軍頭六月十九日改軍頭為驃騎將軍副為車騎將軍六年五月十六日車騎將軍府𨽻驃騎府七年三月六日改驃騎將軍為統軍車騎為副統軍至貞觀十年改統軍為折衝都尉副為毅果都尉凡府以衛士一千二百人為上府一千人為中府八百人為下府在赤縣為赤府在畿為畿府衛士以三百人為團有五千人為隊有三千人為大有長修六䭾為驢初置八䭾後改為六米糧介胄戎器鍋幕貯之府庫以偹武事關內置府三百六十一積兵士十六萬舉關中之衆以臨四道亦置府嵗十一月以衛士帳上於兵部以俟徴發天下衛士尚六十萬初置以成丁而入六十而出役其家不免正徭通計舊府六百三十三河東道府額亞於關中河北之地人遂漸逃散年月漸久逃死者不補關輔漸寡弱宿衛之數不給永徽三年十一月敕折衝果毅老弱簡退者冝同致仕開元六年五月二十七日敕請折衝府兵每年一簡黜宜至時所司具奏十一年十一月二十日兵部尚書張說置長從宿衛兵十萬人於南衙簡京兆蒲同岐等州府兵及白丁准尺八例一年兩畨州縣更不得雜使役仍令尚書左丞蕭嵩與本州長官同揀擇以聞至十三年二月二十一日始名彍騎分𨽻十二衛十六年二月二十五日彍騎弓手冝改為左右羽林騎二十六年八月十日敕三衛當畨逢閏併比諸色稍亦艱辛諸軍每至閏月以取次畨人循環當上庶免偏併二十九年閏四月敕應簡三衛彍騎冝令京畿採訪使御史中丞張倚兼知不須更别差使從今以後使有移改亦當令一中丞相知勾當天寶八年五月九日停折衝府上下兼書以無兵可交至末年折衝府但有兵額其軍士戎器六䭾鍋幕糗糧並發寶應元年四月十七日畿縣折衝府闕官本縣令攝判其手力每府不過一人軍雜録永徽元年四月敕衛士掌間幕士遭喪合期年上者冝聽終制三年景龍二年正月敕諸王駙馬不得參掌禁兵見任官者並令改職元和元年六月十三日敕單身百姓父年七十以上及無支其每年六十以上並不得差征鎮開元十三年四月二十一日敕四軍槍弰左飛騎用緑紛右飛騎緋紛左萬騎紅紛右萬騎碧紛十五年二月三日敕諸軍不得奏置參謀軍事天寶八年五月十八日於關遠門外作振旅亭以待兵回九載七月五日諸衛應隊仗所用緋色旗幡等並改為赤黃以符土運其諸節度使亦准此十一載八月十一日改諸衛士為武士十四載十一月二十七日於京師召募十萬衆號曰天武健兒天寶末天子以中原太平修文教廢武偹銷鋒鏑以弱天下豪傑於是挾軍器者有辟蓄圖䜟者有誅習弓矢者有罪不肖子弟為武官者父兄擯之不齒惟邊州置重兵中原乃包其甲戈示不復用人至老不聞戰聲六軍諸衛之士皆市人白徒富者販繒綵梁肉壯者角抵拔河翹關扛鐵日以寢鬭有事乃股栗不能甲其後盜乘而反非不幸也廣德二年三月禁王公百吏家及百姓著皂衫及壓耳帽子異諸軍官健也大厯二年二月二日敕皇王等以上親不許與軍將婚姻駙馬郡主壻不許與軍將交遊十年正月詔諸道軍甲每年秋末各首一申春夏不須申其官健逃亡非承正制敕不得輒召募十二年十月禁京畿持兵器捕獵建中四年四月有詔令京師募兵以神䇿使白志貞為之使令故節度觀察使武將家出僮馬具戎裝從軍自是京師人心震搖不保家室貞元元年六月詔槍甲之屬不蓄私家四年三月自武德東門䇿垣約左藏庫之比屬於宫城東城垣於是武庫入而廢焉其器械𨽻於軍器使元和元年三月敕京城內無故有人於街衢中帶戎仗及聚射委吏執送府縣科决其諸軍諸使禁身奏取進止六年三月京兆尹王播奏諸縣軍鎮放牧人等不得帶弓箭刀劍器仗從太和元年十一月敕如聞京城百戶多於坊曲習射宜令禁斷其諸軍諸使各仰有司自差人覺察開成元年正月敕坊市百姓其多著緋皂開後褑子假託軍司自今以後冝令禁斷其年三月皇城留守奏城內諸司衛所管羽儀法物數內有陌刀利器等伏以臣所管地俯近宫闕兼有倉庫法駕羽儀分投務繁守捉人少前件司衛皆有刀槍防禦所管將健並無寸刃其諸司衛所有陌刀利器等伏請納在軍器使如本司要立仗行事請給儀刀庶無他患敕㫖冝令送納軍器使令别造儀刀等充替大中六年九月敕京兆府奏條流坊市諸車坊客院不許置弓箭長刀如先有者並勒納官百姓所納到弓箭長刀等府縣不合收貯冝令旋納弓箭庫仍委司府切加覺察所守等不得輒有藏隱大順二年四月二十五日敕諸道軍人及在京諸司文吏並不得私置器械仍明出文榜曉示馬貞觀二十一年八月十七日骨利幹遣使朝貢獻良馬百匹其中十匹尤駿太宗竒之各為製名曰十驥其一曰騰雲白二曰皎雪驄三曰凝霜白四曰懸光驄五曰决波騟六曰飛霞驃七曰發電赤八曰流金􅚷九曰翔麟紫十曰奔虹赤上乃敘其事曰骨利幹獻馬十匹特異常倫觀其骨大叢粗鬛高意濶眼如懸鏡頭若側磚腿像鹿而差圓頸比鳯而增細後橋之下促骨起而成峯側韉之間長筋密而如瓣耳根纎鋭身材雄方尾本高起龍文非擬腹平膁小自徑驅馳之方鼻大喘疏不乏往來之氣殊毛共櫪狀花蕊之交林異色同羣似雲霞之間彩仰輪烏而競逐順緒氣而爭追噴沫則千里飛紅流汗則三條振血鹿上不及起塵影不假生顧見彎弓逾徑羽而先振遙瞻仗獸感人目而前知骨法異而應圖工藝竒而絶象方馳大宛固其駑蹇者歟永隆三年七月十六日夏州羣牧使安元璹奏言從調露九年九月以後至二月五日前失死馬一十八萬四千九十匹牛一萬一千六百頭開元二年九月太常少卿姜晦上疏請以空名告身於六湖州市馬率三十匹馬酬一遊擊將軍時廄中馬闕乃從之十三年張說為隴右羣牧使頌云大唐承周隋離亂之後貞觀初僅得牝牡三千從赤岸澤徙之隴右仍命太僕卿張萬嵗輯其政焉至麟德中四年至七十萬六千匹置八使以董之設四十八監以掌之跨隴右金城平凉天水四郡之地幅員千里猶為狹隘更析八監布於河曲豐曠之野乃能容之於斯之時天下以一縑易一馬及張氏中廢二十年間所殘蓋寡張氏三代由羣牧恩信行於隴右人以馬歲為齒避張氏諱也天寶六載十二月九姓堅昆及室韋獻馬六十匹令於西受降城使納之十三年六月一日隴右羣牧都使奏臣差判官殿中侍御史張通儒羣牧副使平原太守鄭遵意等就羣牧六人㸃總六十萬五千六百三十匹又三十二萬五千七百九十二匹又馬二十萬八千一匹羊七萬三千一百一十五頭牛一百四十五頭犛牛五百六十三頭駝二十萬四千一百三十四口十五載六月上幸蜀發扶風郡間廄使任沙門盜廄馬十餘匹以叛太子至平原郡遂搜諸監及私羣牧馬數萬匹軍威始振大厯七年八月回紇使還蕃以國信物一千餘乘遣之回紇特功自乾元後仍嵗來市以馬一匹易絹四十匹動至數萬馬其使候遣繼留於鴻臚寺者非一蕃人欲帛無厭我得馬無用朝廷甚苦之時特盈數遣之以廣恩惠使其知愧建中元年五月詔市關輔牝馬三萬匹以實內廄貞元元年八月吐蕃率羌渾之衆犯塞分遣中官於潼關蒲關武關禁大馬出十四年四月敕鑄左右軍征馬使印各一紐三十年四月罷閩中萬安監先是福建觀察使栁冕久不遷因事以求恩俸奏云閩中南朝放牧之地可致牛馬蕃息請置監牧許之大收境內畜産牧放其中羊之大者不過十斤馬之良者直數十不經時輒死又却牧以充之百姓怨苦之由是監觀察使閻濟美奏罷之元和四年三月詔內廄之馬其數尚多委飛龍使具條流減者聞奏十一年正月以討吳元濟命中使以絹萬匹市馬於河曲其月回紇使索槖駝及馬以內庫繒絹六萬匹償回紇馬直十三年十一月間廄使理岐陽舊馬坊地三百四十七頃盡歸之國家自貞觀至麟德中國馬四十萬匹皆出河隴開元中尚有二十七萬雜以牛羊等不啻百萬置八使四十八監占隴西金城凉平天水四郡幅員千里自長安至隴西置七萬坊為㑹計所諸部領岐隴間善水草及膏腴田皆屬七萬坊名額盡廢其地利歸於節度使長慶元年正月靈武節度使李聽奏請於淮南忠武寧等道防秋兵中取三千人衣糧月賜當道自召募一千五百八馬驍勇者以偹兵仍令五十人為社每一馬死社人共補之馬無闕從之其年三月范陽節度使劉總請進馬一萬五千匹大中六年六月河東節度使兼太原尹李業奏當管諸軍州羊馬准貞元三年十二月十三日敕文不許出界又准去年五月十五日司門轉牒諸道應有羊馬准敕並不命出界今緣近日諸道差人於當管市馬不依敕文並無羊馬伏乞天恩詔本道准元敕約勒㫖冝令本道准元敕處分如有違者即與區處聞奏諸監馬印凡馬駒以小官字印印左膊以年辰印印右髀以監名依右左廂印印尾側若形容端正擬送尚來者則須不印監名自一嵗至二嵗起酌量強弱俱以飛字印印右膞細馬次馬俱以龍形印印項左送尚乘者於尾側依左右間印以三花其餘雜馬幽上乘者以風字印左膊以飛字印左髀經印之後簡習别所者各以新人處監名印印左頰官馬賜人者以賜字印諸軍及充傳送者驛以出字印並印右頰景雲三年正月十四日敕諸王公主家馬印文冝各取本號諸蕃馬印骨利幹馬本俗無印惟割耳鼻為記結骨馬與骨利幹相似少不如印出悉密馬與結骨相似稍不如印葛邏祿馬與悉密相類在金山西印以上部落燕然及拔曵馬因與骨利幹馬相類由多黑㸃驄如豹文去瀚海南函陵山東拔曳固川同羅馬與拔曳固川相類亦出驄馬種在洪諾河東南曲越山北函陵山東印延陀馬與同羅相似駱馬驄馬種令部落頗散西出者多今在幽州北印僕固馬小於拔曳固與同羅相似住在幽陵山南印阿特馬與僕骨馬相類在莫賀庫寒山東安南置今雞田州印契馬與阿跌馬相從在閻洪達并以北獨樂永以南榆溪州印康固馬康居國也是大宛馬種形容極大武德中庸國契丹馬其馬極曲形小於突厥馬能馳走林木間今松漠都督印奚馬好筋節勝契丹馬餘並與契丹同今饒樂都督北印唐會要卷七十二
