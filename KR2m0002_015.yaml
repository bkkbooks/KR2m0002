body:
  text: 唐會要卷十五宋王溥撰廟議上貞觀九年十一月十八日詔太原之地肇基王業事均豐沛義等宛譙理宜别建寢廟以彰聖德詳覽漢典抑有成規但先皇遺旨務存儉約虔奉訓誡無忘啓處宜令禮官與公卿等詳議以聞祕書監顔師古議曰臣究觀祭典考驗禮經宗廟皆在京師不於下土别置至若周之酆鎬並為遷都乃是因事更營非云廣大别違典制是以貢禹韋玄成匡衡等招聚儒學博詢廷議據禮陳奏遂從廢毁自斯已後彌厯年代輟而不為今若增立寢廟别安神主有乖先旨靡率舊章垂裕後昆理謂不可固宜勉割深哀俯從大禮開元四年十二月太常卿薑皎與禮官陳正節等上表曰臣伏見太廟中則天皇后配天皇大帝題云天后聖帝武氏伏尋昔居后寵親承顧託因攝大政事乃從權神龍之初已去帝號岑羲等不嫺政體復題帝名若使帝號長存恐非聖朝通典夫七廟神堯皇帝之廟也父昭子穆祖德宗功非夫帝子天孫乘乾出震者不可得升祔於斯矣但皇后祔廟配食髙宗位號舊章無宜稱帝今山陵日近虞祔非遙請開陳告之儀因除聖帝之字直題云則天皇后武氏從之大厯十四年十月代宗神主將祔禮儀使顔真卿以元皇帝代數已逺凖禮合祧請遷於西夾室其奏議曰王制天子七廟三昭三穆與太祖之廟而七又禮器云有以多為貴者天子七廟又伊尹曰七世之廟可以觀德此經典之明證也七廟之外則云去祧為壇去壇為墠故厯代儒者制迭毁之禮皆親盡宜毁伏以太宗文皇帝七代之祖髙祖神堯皇帝國朝首祚萬葉所承太祖景皇帝受命于天始封于唐元本皆在不毁之典代祖元皇帝地非開統親在七廟之外代宗皇帝升祔有日元皇帝神主禮合祧遷或者以祖宗之名難於迭毁昔漢朝近古不敢以私滅公故前漢十二帝為祖宗者四而已至後漢漸逺經意子孫以推美為先光武已下皆有廟號則祖宗之名莫不違也安帝以讒害大臣廢太子及崩無上宗之奏後自建武已來無毁者因以陵號稱宗至桓帝失德尚有宗號故初平中左中郎蔡雍以和帝已下功德無殊而有過差不應為宗餘非宗者追尊三代皆奏毁之是知祖有功宗有德存至公之義非其人不居蓋三代立禮之本也自東漢已來則此道喪矣魏明帝自稱烈祖論者以為逆自稱祖宗故近代此名悉為廟號未有子孫踐阼而不祖宗先王者以此明之則不得獨據兩字而為不合祧遷之證假令傳祚百代豈可上崇百代以為孝乎請依三昭三穆之義永為通典寶應二年升祔玄宗肅宗則獻祖懿祖已從迭毁伏以代宗睿文孝皇帝卒哭而祔則合上遷一室元皇帝代數已逺其神主凖禮當祧至禘祫之時然後享祀于是祧元皇帝於西夾室祔代宗神主焉建中元年三月禮儀使上言東都太廟闕木主請造以祔初武后於東都立髙祖太宗髙宗三廟至中宗已後兩京太廟四時並享至德亂後木主多亡缺未祔于是議者紛然其大旨有三其一曰必存其廟遍立羣主時享之其二曰建廟立主存而不祭若皇輿時巡則就享焉其三曰存其廟瘞其主駕或東幸則飾齋車奉京師羣廟之主以往議皆不決而罷貞元十五年四月膳部郎中歸崇敬上疏曰東都太廟不合置木主謹按典禮虞主用桑練主用栗重作栗主則埋桑主所以神無二主猶天無二日土無二王今東都太廟是則天皇后所建以置武氏木主中宗去其主而存其廟蓋將以備行幸遷都之置也且殷人屢遷前八後五其凡遷都一十三度不可每都别立神主也議者或云東都神主已曾虔奉而禮之豈可一朝廢之乎虞祭則立桑主而虔祀練祭則立栗主而埋桑主豈桑主不曾虔祀而乃埋之又所闕之主不可更作作之不時非禮也永貞元年十一月德宗神主將祔禮儀使杜黃裳與禮官王涇等請遷髙宗神主于西夾室其議曰自漢魏已降沿革不同古者祖有功宗有德皆不毁之名也自東漢魏晉迄于陳隋漸違經意子孫以推美為先光武已下皆有祖宗之號故至於迭毁親盡禮亦迭遷國家九廟之尊皆法周制伏以太祖景皇帝受命於天始封於唐德同周之后稷也髙祖神堯皇帝國朝首祚萬葉所承德同周之文王也太宗文皇帝應天靖亂垂後立極德同周之武王也周人郊后稷而祖文王宗武王也聖唐郊景皇帝而祖髙祖宗太宗皆在不遷之典至髙宗皇帝今在三昭三穆之外謂之親盡既德宗皇帝神主新入廟禮合迭遷藏于從西第一夾室每至禘祫之月合食如常於是祧髙宗神主於西室祔德宗神主焉元和元年七月順宗神主將祔有司疑于遷毁太常博士王涇建議曰禮經祖有功宗有德皆不毁之名也惟三代行之漢魏已降雖曰祖宗親盡則遷無功亦毁不得行古之道也昔夏后氏十五代祖顓頊而宗禹殷人十七代祖契而宗湯周人三十六王以后稷為太祖祖文王而宗武王聖唐德厚流廣逺法殷周奉景皇帝為太祖祖髙祖而宗太宗皆在百代不遷之典故代宗升祔遷代祖也德宗升祔遷髙宗也今順宗升祔中宗在三昭三穆之外謂之親盡遷于太廟夾室禮則然矣或諌者以則天太后革命中宗復而興之不宜在遷藏之例臣竊未諭也日者髙宗晏駕中宗奉遺詔自儲副而陟元后則天太后臨朝廢為廬陵王聖厯元年太后詔復立為皇太子屬太后聖夀延長御下日久姦臣擅命紊其紀度敬暉桓彥範等五臣俱唐舊臣匡輔王室翊中宗而承天統此乃子繼父業是中宗得之而且失之母授子位是中宗失之而後得之二十三年間再為皇太子再踐皇帝位失之在已得之在已可謂革命中興之義殊也又以周漢之例推之幽王為犬戎所滅平王東遷周不以平王為中興不遷之廟其例一也漢吕后専權産祿秉政文帝自代邸而立之漢不以文帝為中興不遷之廟其例二也霍光輔宣帝再盛基業而不以宣帝為不遷之廟其例三也伏以中宗孝和皇帝於聖上為六代伯祖尊非正統廟亦親盡爰及周漢故事是與中興功德之主不同奉遷夾室固無疑也是月二十四日禮儀使杜黃裳奏曰順宗皇帝神主已升祔太廟告祧之後則合遞遷中宗皇帝神主今在三昭三穆之外凖禮合遷于太廟從西第一夾室每至禘祫之日合食如常于是祧中宗神主于西夾室祔順宗神主焉先是令有司今以山陵將畢議遷廟之禮有司以中宗為中興之君當百世不遷之位宰臣召吏蔣武問之武對曰中宗以𢎞道元年於髙宗柩前即位時春秋已壯矣及母后篡奪神器潛移其後賴張柬之同謀國祚再復此蓋同于反正恐不得號為中興之君凡非我失之自我得之謂之中興漢光武晉元帝是也自我失之因人復之晉孝惠孝安是也今中宗與惠安二帝事同即不可為不遷之主也有司又云五王有再安社稷功今若遷中宗廟則五王永絶配享之典武曰凡配享功臣每至禘祫年方合食太廟居常即無享禮今遷中宗神主而禘祫年毁廟之主並陳于太廟此則五王配食與前時如一也有司不能答十五年四月禮部侍郎李建奏上大行皇帝諡曰聖神章武孝皇帝廟號憲宗制曰敬依典禮先是淮南節度使李夷簡上議曰王者祖有功宗有德大行皇帝戡翦亂逆纍有武功廟號合稱祖陛下正當決在宸斷無信齷齪書生也遂詔下公卿典禮官同議大行皇帝廟號稱祖與稱宗孰宜太常博士王彥威奏議曰伏惟禮經及三代之制始封之君謂之太祖太祖之外又祖有功而宗有德故夏后氏祖顓頊而宗禹殷人祖契而宗湯周人郊祀后稷祖文王而宗武王自東漢魏晉漸違經意沿革不一子孫以推美為先故自始已下並有建祖之制蓋非典訓不可法也國朝祖宗制度本於周禮以景皇帝為太祖又祖神堯而宗太宗至髙宗已後則但稱宗謂之尊名著為成法不然則何以太宗造有區夏致理升平玄宗掃清內難翊戴聖父肅宗龍飛靈武收復兩京此皆應天順人撥亂反正至于廟號亦但稱宗謹按經義祖者始也宗者尊也故傳曰始封必為祖書曰德髙可宗故號髙宗今宜本三代之定制去晉魏之亂法守貞觀開元之憲章而擬議大名垂以為訓大行皇帝廟號宜稱宗從之其日禮部奏凖貞觀故事遷廟之主藏于夾室西壁今夾壁南北三間第一間代祖室第二間髙祖室第三間太宗室伏以山陵日近睿宗皇帝祧遷有期夾室西壁三室外無置室處凖江都集禮古者遷廟之主藏于夾室北壁之中今請於夾室北壁以西為上置睿宗皇帝神主石室制可長慶元年二月分司庫部貟外郎李渤奏太微宫神主請歸祔太廟敕付東都留守鄭絪商量聞奏絪奏云臣謹按詳三代典禮上稽髙祖太宗之制度未嘗有並建兩廟並享二主之禮天授之際祀典變革中宗初復舊物未暇詳考典章遂于洛陽創立宗廟是行遷都之制實非建國之儀乃西歸上都因循未廢德宗嗣統墜典克修東都九廟不復告享謹按禮記仲尼答曾子問云天無二日土無二王嘗禘郊社尊無二上所以明二主之非禮也陛下接千載之大統揚纍聖之耿光憲章先王垂法後嗣况宗廟之禮至尊至重違經黷禮時謂不欽特望擇三代令典守髙祖太宗之法度鑒神龍權宜之制遵建中矯正之禮依經復古允屬聖明伏以太微宫元皇帝三代睿宗聖文孝武皇帝神主參考經義不合祔享至于遷置神主之禮三代已降經無明文伏望委中書門下與公卿禮官質正詳定敕付所司太常博士王彥威奏議曰謹按國初故事無兩都並建宗廟並行享祭之禮伏尋周書召誥之説實有祭告酆廟洛廟之文是則周人兩都並建宗祧祭則告享然則兩都皆祭祖考興自神龍復因中宗嗣位廟既偕作享亦並行天寶末兩都傾陷神主亡失肅宗既復舊物但建廟作主於上都其東都神主大厯中始于人間得之遂寓於太微宫不復祔享臣等按經傳王者之制凡建宫室宗廟為先廟必有主主必在廟是則立廟兩都蓋行古之道主必在廟實依禮之經今按參詳理合升祔謹按元皇帝是追王髙宗中宗睿宗是祧廟之主神主合藏於太廟從西第二夾室髙祖太宗玄宗肅宗代宗是創業有功親廟之祖伏惟江都集禮正廟之主藏於太室之中禮記羣廟之主有故則聚而藏之祖廟伏以德宗之下神主未作代宗之上后主先亡若歸本室則有虛主事雖可據理或未安今髙祖已下神主並合藏于太祖之廟依舊凖故事不享如陛下賜覲東后移幸洛陽自非祧主合歸本室其餘闕主又當特作而祔享時祭禘祫如儀臣又按國家追王故事太祖之上又有德明興聖懿祖别廟今光皇帝神主即懿祖也伏緣東都先無前件廟宇光皇帝神主今請權祔於太廟夾室居元皇帝之上如駕在東都則請凖上都式營建别廟作德明興聖獻祖神主備禮升祔又于太廟夾室奉迎光皇帝神主歸廟第四室禘祫如儀或問曰禮作栗主瘞桑主漢魏並有瘞主之議大厯中亦瘞孝敬皇帝神主今祔而不瘞如之何答曰古者行師以遷主無則主命自非遷祖之主别無出廟之文凡邑有宗廟先君之主曰都則兩都宗廟合宜有主又問曰古者作主必因虞練若主必歸祔别室不可虛則當祔已亡之主創當時之主禮無其説如之何答曰虞練作主禮之正也非時作主事之權也王者遇時為法因事制宜茍無其文則思其變如駕或東幸廟仍虛主即凖肅宗廣德二年上都作主故事特作闕主而祔蓋主不可闕故禮貴從宜春秋之變而正之者也臣伏思祖宗之主神靈所憑寓于太微不入宗廟據經復本允屬聖明至是下尚書省集議而郎吏所議與彥威多同丞郎則各有所見或云神主合藏於太微宫或云並合埋瘞或云闕主當作或云乘輿東幸即載上都神主而東咸以意言之不本經據竟以紛議不定遂不舉行四年五月禮儀使奏謹按周禮天子七廟三昭三穆與太祖之廟為七荀卿子曰有天下者祭七代有一國者祭五代則知天子上祭七代典籍通規祖功宗德不在其數國朝九廟之制法周之文太祖景皇帝始為唐公肇基天命義同周之后稷髙祖神堯皇帝創業經始化隋為唐義同周之文王太宗文皇帝神武應期造有區夏義同周之武王也其下三昭三穆之外是親盡之祖雖有功德禮合祧遷禘祫之嵗則從合食制從之開成五年禮儀使奏謹按天子七廟祖功宗德不在其中國朝制度太廟九室伏以太祖景皇帝受封于唐髙祖太宗創業受命有功之主百代不遷今文宗元聖昭獻皇帝升祔有時代宗睿文孝武皇帝是親盡之祖禮合祧遷每至禘祫合食如常敕旨敬依典禮唐會要卷十五
