body:
  text: 唐會要卷九十三宋王溥撰北突厥上髙祖初起義兵晉陽劉文靜請與突厥相結資其士馬以益兵勢從之自為手啓遺始畢可汗云欲舉義兵迎主上若能與我俱南願勿侵暴百姓若但和親坐視受寶貨亦惟可汗所擇始畢得啓謂其臣曰隋主為人我所知也若迎以來必害唐公而擊我無疑茍唐公自為天子我當以兵馬助之即復書將佐皆請從突厥言帝不可裴寂乃請尊隋主為太上皇立代王為帝以安隋室旗幟雜用絳白以示突厥帝曰此掩耳偷鈴然逼于時事不得不然乃許之煬帝十三年六月遣使如北突厥突厥遣康鞘利等送馬千匹許發兵送帝入關帝受書命劉文靜報突厥以請兵帝私謂文靜曰突厥貪利無親本不足恃我所以欲得之者恐劉武周引之為患又蕃馬行牧不費芻粟聊欲藉為聲援數百人之外無所用之八月帝克臨汾絳郡劉文靜以突厥兵至遂下韓城帝即位之五月突厥遣使來時突厥強盛自契丹室韋西盡吐谷渾髙昌諸國皆臣之又恃功驕倨每遣使至多暴橫帝亦優容之武德元年八月遣鄭元璹以女妓賂始畢可汗始畢遣使來報帝宴之升引御座以寵之二年二月始畢死其弟處羅可汗立八月梁王師都與突厥合數千騎冦延州總管段德操擊破之十一月師都請為鄉導謀大舉入冦是月處羅死其弟頡利可汗咄苾立三年五月頡利恃其士馬雄盛有憑陵中國之志又王世充説之曰昔啓民奔隋賴文帝力有此土宇子孫享之宜奉楊政道煬帝孫伐唐以報文帝之德頡利然之求請無厭言辭驕慢至是冦汾陽四年三月頡利遣使送鄭元璹等還先是處羅與劉武周冦並州遣元璹往説之不從未幾處羅死疑璹毒之留不遣又遣漢陽公環使頡利欲令環拜不屈亦留之復遣使賂頡利且許結婚遂遣使送還六月冦定州八月冦並州遣鄭元璹詣頡利責以負約因説以得唐地不能居虜掠所得皆入國人於可汗何有不如還師修好坐受金幣孰與棄昆弟積年之歡結子孫無窮之怨頡利悅引兵還七年閏七月秦王世民引軍駐於幽州頡利突利二可汗率萬騎奄至城西秦王帥騎馳詣其陳告之曰國家與可汗和親何為負約深入我地我秦王也能鬪獨出與我鬪若以衆來我直以此百騎相當耳頡利不應又遣騎前告曰爾往與我盟有急相救今乃相攻何無香火之情耶頡利既見秦王輕出又聞香火之言疑突利與王有謀乃遣止之曰王不須渡我但欲申固盟約耳兵少却後雨久其弓筋膠俱解秦王潛師夜進頡利大驚乃請和親九年秋七月頡利冦邊先是與突厥書用敵國禮帝欲改用詔敕突厥遂冦靈相潞沁韓朔等州張瑾全軍沒溫彥博亦為所執靈州都督任城王道宗擊破之請和而退貞觀二年四月頡利以薛延陀回紇等叛遣突利討之敗還頡利拘而撻之突利怨表請入朝十一月突厥北邊多叛頡利歸薛延陀共推其俟斤奚男為可汗奚男不敢當上方圖頡利乃遣使間道册奚男為真珠毗可汗奚男建牙於大漠之鬱督軍山下回紇援野古阿跌同羅僕骨霫諸部皆屬遂遣弟入貢三年十一月頡利因薛延陀之封大懼始遣使稱臣請尚公主代州都督張公謹上突厥可取六狀乃命李靖為行軍總管討之公謹為副突厥俟斤九人及拔古僕骨同羅奚渠長並率衆來降復以李靖等分道出擊十二月突利入朝太宗喜曰朕治安中國逺人自服豈非上策乎四年二月李靖襲破突厥于隂山頡利遁依沙鉢羅設蘇尼失部落王道宗引兵逼之使蘇尼失孰頡利張寶相取之以獻蘇尼失舉衆降漠南遂空十年正月突厥阿史那社爾降社爾處羅之子年十一以智略聞處羅以為拓設建牙於磧北頡利亡西突厥亦亂社爾詐之襲取其地幾半衆十餘萬乃曰破我國者薛延陀也我當報仇擊滅之諸部皆諌不從大敗遂率衆降十三年四月突利之弟結社率衆降授為中郎將久不進秩隂結故部落四十餘人夜襲御營孫武開等帥衆擊之盜馬北走追斬之七月自結社之反羣臣皆言留河南不便乃賜懷化郡王阿史那思摩姓李氏立為泥孰俟利苾可汗賜鼓纛使率其種落突厥咸憚薛延陀不肯出塞上賜延陀璽書言前破突厥止為頡利為百姓今册還其故國爾薛延陀受册在前突厥受册在後當以先後為大小如敢抄掠發兵問其罪薛延陀奉詔乃遣王孝恭等齎册立之十八年十一月突厥俟利苾北渡河延陀惡之數相攻擊俟利苾有衆十萬不能撫御悉南渡河請處勝夏之間許之羣臣言陛下方逺征遼左而置突厥於河南距京師不逺豈得不為後患上曰夷狄亦人以德治之可使如一家且彼不北走延陀而歸我其情可見俟利苾既失衆輕騎入朝二十一年冬十一月突厥車鼻遣使入貢車鼻本頡利同族頡利敗諸部欲立之薛延陀方強不敢當率衆歸之延陀因其有勇略恐為後患欲殺之車鼻逃建牙金山之北餘衆稍歸之及延陀敗車鼻勢益張遣子入貢又請入朝遣使徵之卒不至正月遣驍衛郎將擊車鼻車鼻本無罪帝因安市班師欲立竒功以雪耻耳永徽元年九月遣髙侃擊車鼻侃至阿息山車鼻發諸部兵皆不應遂以百騎走侃追獲之送京師諸部盡內附置單于瀚海二都護府十都督二十二州分統之自是北邊無冦三十餘年咸亨元年三月敕突厥豪長子弟給事東宮調露元年十月單于大都護府突厥阿史德溫傳奉職二部俱反立阿史那泥孰匐為可汗一十四州豪長皆叛衆數十萬遣蕭嗣業等討之屢捷會大雪突厥襲其營乃為所敗永隆元年三月以裴行儉為定襄道大總管將兵以討之大破於黑山擒奉職泥孰匐為其下所殺以首來降開耀七年阿史那伏念自立為可汗與阿史德溫傳通連兵為冦詔復以行儉為大總管曹懷舜副之引兵討伏念先遣禆將程務挺掩金牙襲獲伏念妻子輜重伏念北走又使務挺等追躡之伏念遂執溫傳以降餘黨悉平歸斬伏念溫傳於都市永淳元年十月突厥餘黨阿史那骨篤祿阿史德元珍等招集亡散冦並州代州都督薛仁貴將兵擊之始以仁貴流象州死矣及免胄示之面乃失色下馬列拜引去仁貴因奮擊大破之𢎞道元年二月突厥寇定州圍單于都護府五月冦蔚州唐會要卷九十三
