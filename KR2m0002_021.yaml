令魏知古宣㫖令中書侍郎蘇頲為碑文頲因極言帝王及后禮無神道碑近則天皇后崇尚家代猶不敢稱碑刻為述聖紀且事不師古動不合法若靖陵獨建即陛下祖宗之陵皆湏追建上從其言而止二十三年十二月三日勅諸陵使至先立壝封内有舊墳墓不可移改自今以後不得更有埋葬大厯十四年十月代宗靈駕發引上號送於承天門見輼輬不當道指丁未間問其故有司對曰陛下本命在午故不敢當道上號泣言曰安有枉靈駕而謀身利乃命直午而行貞元六年十一月十八日勑諸陵栢城四靣合各三里内不得葬如三里内一里外舊塋須合祔者任移他處元和元年十二月太常奏隱太子章懐懿德節閔惠莊惠文惠靖恭昭靖九太子陵代數已遠官額空存今請除陵户外並停從之二年正月停諸陵留守四年閏三月二十八日勑諸陵臺令每季集宜令正衙辭見八年七月宗正卿至祠奏永康興寧順三陵及諸太子陵並請三百歩外任人興墓從之十五年二月山陵使奏準崇陵例當使合置副使兩員李翺官是宗卿職奉陵寢按行陵地公事已終便請兼充副使專於陵所勾當從之大和八年七月大雨雹定陵東郭下地裂一百三十七尺深五尺詔宗正卿李仍叔啟告修塞會昌二年四月二十三日勑節文諸陵栢裁今後每至嵗首委有司於正月二月七月八月四箇月内擇動土利便之日先下奉陵諸縣分明榜示百姓至時與設法栽植畢日縣司與守塋使同檢㸃據數牒報典折本户稅錢文德元年僖宗晏駕以左僕射平章事孔緯充山陵使祔廟畢準故事不入廟上遣中使日赴延英合令依舊視事唐㑹要卷二十一
