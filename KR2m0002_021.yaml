body:
  text: 唐會要卷二十一宋王溥撰縁陵禮物舊儀注品物時新將堪供進所司先進太常令尚食相知簡擇仍以滋味與斯物相宜者配之冬魚等凡五十六品永徽二年七月二十九日有司言謹按獻陵三年之後每朔望上食冬夏至伏臘清明社等節日亦準朔望上食來月之後改復平常昭陵所司上食請依獻陵故事從之景龍二年二月太常博士彭景真以為諸陵每日奠祭乖於古禮上疏謹按三禮正文無諸陵日祭之事唯著宗廟月祭之禮故祭法云天下有建國置都設為廟祧壇墠而祭之乃為親疎多少之數是故王立七廟一壇一墠曰考廟曰顯考廟曰祖考廟皆月祭之遠廟為祧有二祧享嘗乃止去祧為壇去壇為墠有禱焉祭之無禱乃止則古禮具在文義可求景直又按禮論譙周祭志云天子之廟始祖及高祖曾祖祖考皆每月朔望加薦以象平生朔食也謂之月祭二祧之廟無月祭此譙周所著與古義禮相附近亦無日祭之文今諸陵祭有朔望并節日料則古禮殷事之義也諸節日猶古薦新之義故鄭𤣥注禮記云殷事朔日月半薦新之奠也又註儀禮月朔月半猶平常之朝夕也大祥之後即四時祭此則古者祭皆在廟近代以來始有朔望及諸節日祭於陵寢在廟惟曰時正享及臘為五享前所奏定並依古廟正文且旁稽外𫝊考據禮經更無日祭惟漢七廟議京師自高祖下至宣帝與太上王皇悼皇考各自居陵旁立廟又園中各有寢殿日祭於寢月祭於廟時祭於便殿至元帝時貢禹以為太煩奏請罷郡國廟丞相韋𤣥成等議七廟外寢園皆無復祭奏可議者亦以祭不欲數數則黷宜復古禮四時祭於廟丞相匡衡亦奏七廟迭毁之義帝從之又數復數改劉歆以為禮去事殺引春秋外傳云日祭月祀時享嵗貢祖則禰日祭曾高則月祀二祧則時享壇墠則嵗貢至後漢陵寢致祭無明文以言魏氏三祖及晉皆不祭於墓至於江右亦不崇園寢及宋齊梁陳其祭無聞臣以為五禮者不刋之書懸諸日月外𫝊所記不與經合不可依凴國家率由典章計論正理模事作法垂裕將來擇善而行依經為允其諸陵日祭請準禮停疏奏上謂侍臣曰禮官奏言諸陵準禮不合日别進食但禮因人情事有沿革陵寢如昨祗薦是常乃援日月之期請停朝夕之奠乍覽此奏哀慕增懐乾陵宜依舊朝晡進奠昭獻二陵每日一進必若所司供辦辛苦可減朕膳以為常式開元二年四月十五日勑頃者别致鷹狗供奉山陵至於料度極多費損有乖儀式無益崇嚴其諸陵所有奉供鷹狗等並宜即停高宗時置三十三年四月獻昭乾定橋恭六陵朔望上食嵗冬至寒食各設一祭如節祭共朔望日相逢依節祭料橋陵除此日外仍每日進半口羊食二十八年七月十八日勑其建初啟運興寧永康四陵每年四時八節委所司别與陵署相知造食進獻天寳二年七月二十七日勑朕纂承丕業肅恭祀事至於諸節常修薦享且詩著授衣令存休澣在於臣子猶及恩私恭事園陵未標令式自今以後每至九月一日薦衣於陵寢貽範千載庶展孝思但仲夏端午事無典實𫝊之淺俗遂乃移風况乎以孝導人因親設教變遊衣於漢紀成獻服於禮文宜宣示庶僚令知朕意大厯十四年九月禮儀使顔真卿奏曰按後漢禮儀志云古不祭墓漢諸陵皆有園寢承秦所為也建武以來關西諸陵但四時特牲祠每帝幸長安諸陵乃太牢祠自洛陽諸陵至靈帝皆以晦望二十四氣伏社臘日及四時祠無每日上飯其親陵一所宫人隨皷漏理被枕其與洛陽諸陵及親陵降殺不同之文也又春秋傳曰祖禰則日祭曾高則月祭二祧則時享壇墠則嵗貢大禘則終王固以親疎相推遠近為制又祠部式獻昭乾定橋恭陵並朔望上食嵗及冬至寒食各設一祭唯橋陵除此日外每日供半口羊充薦是則𤣥宗之於親陵與諸陵且有異矣今請元陵除朔望及節祭外每日更供半口羊充薦準祠部式供擬㤗陵建陵則但朔望及嵗冬至寒食伏臘社日各設一祭每日更不合上食制曰可元和元年七月禮儀使杜黄裳奏引故事豐陵日祭崇陵唯朔望節日伏臘各設一祭制可十五年四月禮儀使奏按禮文令式皇祖以上至太祖陵寢朔望上食其元日寒食冬至臘社日各設一祭皇考陵朔望及節祭外每日進食今豐陵各停日祭景陵日祭如式供奉制曰可至其年五月殿中省奏尚食局供景陵千味食數内魚肉等品委皆肥鮮掩俎之後薫蒸頗極今請移魚肉食於下宫以時進饗仍令尚藥局據數以香藥代之勑脯醢猪犢肉等皆宜以香藥代其酒依舊供用諸僭號陵神龍二年四月十二日贈后父故上洛郡王𤣥貞為豐王廟號襃德陵置六品八品丞各一員韋庻人父也蘇氏曰天寳九年有詔發韋氏冡而平之其時差長安縣尉薛榮先專知及見銘誌發冡日月與葬日月同舊為陵號榮先又與專知官薛榮先名同自閉及開元四十五年而兆應若是足表僭溢過分殃咎宿成有以戒將來暴興者其中寳玉已經盜發罄矣而柩櫬狼狽徒生嘆嗟又足以戒將來厚葬者也三年三月二日制令武氏崇恩廟依舊享祭仍置五品令七品丞昊順二陵署令丞如太廟其年七月武崇訓將葬監䕶使司農少卿趙履温諷安樂公主奏依永㤗公主例為崇訓追陵制許之給事中盧粲駁奏曰伏尋陵之稱為本屬皇王及諸君自有國以來諸王及公主墓無稱陵者唯永㤗公主承恩特葬事越常塗不合引以為名左傳曰唯名與器不可以假人魯王哀榮之典誠别承㤙然國之名器豈可妄假借比貞觀以來諸王舊例是得豐厚乎勑曰安樂公主與永㤗公主無異縁此特為陵制不煩固執粲又奏曰臣聞陵之稱謂施於尊極不屬王公以下且魯王若欲論親等第則不親於守禮之父雍王之墓尚不稱陵豐王則不可因尚主而加號且君之舉事則載於方册或稱之往典或考之目前朝臣歴檢貞觀以來駙馬墓無得稱陵者且人君之禮服絶於朞葢為不獨子其子陛下以膝下之㤙愛施及其夫褒贈之儀哀榮足備其得使上下無辨君臣一貫者哉又安樂公主承兩儀之澤履福祿之源指南山以錫年仰北辰而永庇魯王之葬車服有章加等之儀備有常數塋兆之稱不應假永泰公主為名非所謂垂範將來作則羣辟者也上無以答竟從粲奏先是武氏昊陵順陵置守户五百人梁王三思及魯王崇訓墓各置守户六十人又韋氏褒德廟置守户至景龍三年三月十六日太常博士唐紹上疏曰謹按昊順二陵㤙勑特令依舊因隨前例守户與昭陵數同又先代帝王陵户準式二十人今雖外氏特恩亦須附近常典請準式量減取足防閑庻無逼上之嫌不失尊崇之道又親王守墓舊制例準得十人梁魯遂加贈不可超於本爵準令贈官用䕃各減正官一等故知贈之與正義有抑揚禮不可踰理須裁制請同親王墓户各置十人為限又太廟宿衞準備正兵縱令壖内掃除還以其兵應役褒德别廟户兼配軍人既益煩勞又虧常典縱使恩加極禮須準太廟汙隆别置百人亦請停廢疏奏不納至景雲元年七月一日廢昊陵順陵二名至二年五月五日復昊順二陵太平公主所請至先天二年正月二十七日又廢並稱太原王墓皇后諸陵議大厯十三年七月將葬貞懿皇后命起陵寢於章敬寺後嘗遊幸近地左右莫敢言於是右補闕姚南仲上疏曰臣聞人宅於家主宅於國夫長安城陛下皇居也分布十二辰即章敬寺北當帝城寅山之地陛下本命之所在其可穿鑿興動而建陵墓乎此非所宜一也夫葬者藏也欲人之不得見也蓋松栢常靜靈祇貴幽是以古帝前王之葬后妃莫不憑邱原遠郊郭夫豈不愛割情而已今則西俯宫闕南迫康莊事非國經義背神理若使近而可見歿而復生雖在西宫待之可也如骨肉歸土魂無不之章敬之寺北竟何所益空勞思想極乖王度示之兆庶彰於愛垂之萬代損於明此非所宜二也夫帝王者居高明燭幽滯登䑓榭候雲物晨鑒東作遐觀夏苗先皇所以因龍首之岡建望春之殿蓋為此也今若築陵其下種栢其中森然目前動傷宸慮天心一傷數日不平天子之尊豈不自惜且匹夫向隅滿堂為之不樂萬乘不樂國人其可歡心乎伏惟貞懿皇后坤德配天母慈逮下六宫是式九族載和故得家道克昌令聞不朽陛下所以切軫旒扆久俟蓍龜始諡之以貞懿終待之以昵近臣竊惑焉且皇后生而至賢歿而至靈豈願以墳之故累陛下聖明哉非所以稱述后德光被下泉也今國人皆曰貞懿皇后之陵邇於城下者主上將日省而時望焉乃有損於聖德無益於貞懿將欲寵之而反辱之此非所宜三也凡此數事實玷文獻天下咸知準臣獻議人皆愛死臣獨愛君伏惟陛下熟計而取其長也夫以帝王之貴令出惟行愜意於一時之間校德於千載之後陛下三光同耀五岳比崇方得偃武靖人登封頌聖一誤於此所傷寔多臣恐道路是非史官襃貶大明忽虧於掩蝕至德翻後於堯舜不其惜哉今指事尚遥改卜何害避當寅之位遠寧神之居抑皇恩之殊眷成貞懿之美號天下幸甚其疏奏上感悟超加南仲五階賜銀印朱紱元和十一年三月莊憲皇太后山陵禮儀使李逢吉上言昊天上帝五方帝五人帝皇地祇神州社稷之祀謹按禮記喪三年不祭惟祭天地社稷按周禮及開元禮圜鍾之均六變天神皆降林鍾之均八變地祇皆出謹按不廢天地之祭謂不敢以卑廢尊也將祭必作樂者所以降神也茍有所闕則祭不成禮伏請準元和元年二月勑用樂如舊三年之内不祭宗廟山陵祔廟後四時饗祀如式制曰可開成五年二月祭穆宗妃韋氏追諡為宣懿太后武宗母也時初嗣位後追諡之初武宗欲啟穆宗陵祔葬中書門下奏曰園寢已安神道貴靜光陵葬已二十餘載福陵近又修崇竊惟孝思足章嚴奉今若載因合祔須啟二陵或慮聖靈不安未合先㫖又以隂陽避忌實有所疑不移福陵寔合典禮從之乃詔就舊陵增築仍依舊名曰福陵會昌五年二月翰林待詔楊士端奏義安殿大行皇太后陵地準今月五日勑奉光陵準經今年太嵗在己丑季土王年不宜於先陵相城内興工動土宜於先陵封外東西北三靣有地平稳處别擇置陵吉制曰可其年三月太常寺博士崔立上言伏準正月二十九日勅除陵寢外其並約莊憲皇后山陵制度者伏以莊憲皇后合祔豐陵不别置宫殿今義安皇太后於先後陵東别擇陵地與莊憲皇后祔禮不同其宫寢并諸色官員等今與詳定等同商量伏恐合議建置勑㫖宜並不要置陪陵名位舊制凡功臣宻戚請陪陵葬者聽之以文武分為左右而列墳高四丈以下三丈以上若父祖陪陵子孫從葬者亦如之若宫人陪葬則陵户為之成墳凡諸陵皆致留守領甲土與陵令相知巡警左右兆城内禁人無得葬埋古墳則不毁之獻陵陪葬名氏楚國太妃萬氏館陶公主河間王孝恭襄邑王神符清河王誕韓王元嘉彭王元則道王元慶鄭王元懿虢王元鳯節王元亨徐王元禮滕王元嬰鄧王元裕魯王元䕫霍王元軌江王元祥宻王元曉并州總管張綸榮國公樊興平原郡公王楷譚國公邱和巢國公錢九隴刑部尚書劉德茂刑部尚書沈叔安昭陵陪𦵏名氏越國太妃燕氏趙國太妃楊氏紀國太妃韋氏賢妃鄭氏才人徐氏鄭國夫人彭城郡夫人蜀王愔趙王福紀王慎越王貞嗣紀王澄曹王明蔣王暉清河公主駙馬程知亮晉國公主駙馬韋思安豫章公主駙馬唐義識新興公主駙馬長孫㬢蘭陵公主駙馬竇懐哲髙宻公主駙馬段綸長樂公主駙馬長孫沖遂安公主駙馬王大禮南平公主駙馬劉𤣥懿衡陽公主駙馬阿史那社爾新城公主駙馬韋政舉城陽公主駙馬薛權長廣公主駙馬楊師道襄城公主駙馬蕭鋭長沙公主駙馬豆懐讓安康公主駙馬獨孤諶臨川公主駙馬周道務