body:
  text: 唐㑹要卷四十一宋王溥撰斷屠釣武德二年正月二十四日詔自今已後每年正月九日及每月十齊日並不得行刑所在公私冝斷屠釣如意元年五月禁天下屠殺聖厯三年斷屠殺鳯閣舍人崔融議曰春生秋殺天之常道冬狩夏苗國之大事豺祭獸獺祭魚自然之理也一乾豆二賔客不易之義也上自天子下至庶人莫不揮以鸞刀烹之鶴鼎所以充庖厨故能幽明感通人祗輯穆百王千帝殊途同歸今若禁屠宰斷弋獵三驅莫行一切不許便恐違聖人之達訓紊明主之善經一不可也且如江南諸州乃以魚為命河西諸國以肉為齊一朝禁止百姓勞弊富者未革貧者難堪二不可也又如貧賤之流刲割為事家業儻失性命不全雖復日戮一人終慮未能禁絶但益恐嚇唯長姦欺外有斷屠之名內誠鼓刀者衆勢利依倚請託紛紜三不可也雖好生惡殺是君子之用心而考古㑹今非國家之大體但使順月令奉天經造次合禮儀從容中刑典自然人得其性物遂其生何必改革方為盡善景龍元年遣使江淮分道贖生以所在官物充直中書舍人李義府疏曰江南水鄉採捕為業魚鱉之利黎元所資雖雲雨之施有沾於末類而生成之惠未洽於平人何則江湖之饒生育無限府庫之用支供易殫費之若少則所濟何成用之儻多則常支有闕在于拯物豈若優人且生鬻之徒唯斯是視錢刀日至網罟年滋弛之一朝營之百倍未若回救贖之錢物减貧戶之徭賦治國愛人其福勝彼景龍二年九月八日敕鳥雀昆蟲之屬不得擒捕以來贖生犯者先决三十冝令金吾及縣市司嚴加禁斷先天元年十二月敕禁人屠殺雞犬二年六月敕殺牛馬騾等犯者科罪不得官當䕃贖公私賤𨽻犯者先决杖六十然後科罪開元十八年三月二十八日敕諸州有廣造簺滬取魚並宜禁斷二十二年十月十三日敕每年正月七月十月三元日起十三日至十五日並宜禁斷宰殺漁獵二十三年八月十四日敕兩京五百里內宜禁捕獵如犯者王公以下録奏餘委所司量罪决責天寶五載七月河南道採訪使張倚奏諸州府今後應緣春秋二時私社望請不得宰殺如犯者請科違敕罪從之六載正月二十九日詔令屬陽和布氣蠢物懷生在于含養必期遂性其滎陽僕射陂陳留篷池自今以後特宜禁斷採捕仍改僕射陂為廣仁陂篷池為福源池七載五月十三日敕文自今已後天下每月十齊日不得輒有宰殺至德二年十二月二十九日敕三長齊月並十齊日並宜斷屠釣永為常式乾元元年四月二十二日敕每月十齊日及忌日並不得採捕屠宰仍永為式建中元年五月敕自今已後每年五月宜令天下州縣禁斷採捕弋獵仍令所司斷屠宰永為常式并委州府長吏嚴加搦捉其應合供陵廟並依常式貞元六年正月二十八日敕每年中和莭及九月九日自今已後逼節放三日開屠開元二年八月敕慶成莭宜令內外司及天下州府但以素食不用屠殺永為常式會昌四年四月中書門下奏正月五月九月斷屠伏以齊月斷屠出于釋氏緣國初風俗猶近梁陳卿相大臣頗遵此教又弛禁不一只斷屠羊宰殺驢牛其數不少鼓刀者坐獲厚利糾察者皆受賄財比來人情共知此弊臣等商量正月一嵗之首萬物生育之初諸起元日斷三日每遇列聖忌日斷一日家國崇𤣥祖之道竭嚴奉之誠既以𢎞闡其風即須參用其教仍望准開元二十二年十月二十日敕正月七月十月三元日各斷屠三日餘望並停緣斷屠日數既少法令所宜畫一望委御史臺别條流聞奏從之大中二年二月制爰念農耕是資牛力絶其屠宰須峻科條天下諸州屠牛訪聞近日都不遵守自今以後切宜禁斷委所在州府長官並録事參軍等嚴加捉搦如有牛主自殺牛並盜竊殺者宜准乾元元年二月五日敕先决六十然後准法科罪其本界官吏不鈐轄即委所在長吏莭級重加科責庶令止絶五年正月敕畿甸及天下州應屠宰牛犢宜起大中五年正月一日後三年內不得屠宰仍切加禁斷如郊廟饗祀合用牛犢者即以諸畜代之其年五月敕壽昌節天下不得屠殺咸通十一年六月敕文其京城久旱未降雨澤宜權斷屠宰天祐元年九月敕乾和節文武百寮諸道進奏官准故事于寺觀說齊不得宰殺許酒果脯醢左降官及流人貞觀十四年正月二十三日制流罪三等不限以里數量配邉要之州十五年四月敕犯反逆免死配流人六嵗之後仍不聽仕垂拱四年十一月一日敕犯罪諸色授以文武逺官年考未滿方便解退者宜令依舊重任績前考滿長壽三年五月三日敕貶降官並令于朝堂謝仍容三五日裝束至任日不得别攝餘州縣官亦不得通計前後勞考開元七年三月十六日敕左降入考未滿間重有犯應解免及放歸田里者並申奏更據狀輕重量貶若是五流及餘犯自依常法十年六月十二日敕自今以後準格及敕應合决杖人若有便流移左貶諸色决訖許一月內將息然後發遣其緣惡逆指斥乘輿者臨時發遣天寶五載七月六日敕應流貶之人皆負譴罪如聞在路多作逗留郡縣阿容許其停滯自今以後左降官量情罪稍重者日馳十驛已上赴任流人押領綱典畫時遞相分付如是更因循所由官當别有處分十三載二月初九敕文左降官承前遭憂皆不得離任孝行之道鬱而未通情禮之間深可哀恤如有此數並宜放還仍申省計至服滿日准法處分自今以後編入常式乾元元年二月五日敕莭文其左降官非反逆緣坐及犯惡名教枉法强盜賊如有親年八十以上及患在牀枕不堪扶侍更無兄弟者許停官終養其流移人亦准此建中三年正月敕諸流貶人及左降官身死並許親屬收之本貫殯葬其造蠱毒移鄉人不在此限其年四月御史臺奏天下斷獄一切請待讞報以正刑名唯除殺人當罪自徒以上結竟者並徙置邉州京兆尹嚴郢駁奏曰臣伏以徙置邉州者流之異名流罪者有三等一例移配或恐未當其死罪除殺人之外又有十惡重罪造僞刻印并主典僞用印及强盜光火等若一切免罪徙邉于法太輕不足懲戒其徒罪條目至多或鬭毆爭競小有傷損或夫妻離異不犯義絶或養男别姓或立嫡違式或私行度關或相冒合户如此之類不可悉數今一切徙邉與十惡造僞同等即輕重懸殊又准刑部格京城殷雜愆犯百端觸網陷刑徒罪偏廣若皆送覆繫滯實多其徒已下罪非除免官當及敕杖者准外州縣例量事處分今若天下徒罪悉申所司皆待讞報法司斷結准式有程州縣禁囚動盈千百計每月徒配必不啻五六十人此則百姓動搖刑章紊撓又邉州及近邊犯死及徒流者復何以處伏請下刪定使詳覆然後施行從之貞元三年五月詔停省天下州府官員其左降官仍舊十一年五月左降官于邵劉鄴並量移授官故事量移六品以下官皆吏部考授至是特授之元和三年閠十二月廬州奏量移官司户參軍員外置同正員顔䪻母在揚州十二月二十七日身亡今請奔喪者准貞元十八年五月十九日敕自今已後流人左降官稱遭憂奔喪者宜令所司先奏聽進止八年正月刑部侍郎王璠奏天德軍五城及諸邉城配流人臣等竊見諸處配流人每逢恩赦悉得歸還唯前件流人皆被本道重奏稱要防邉遂令沒身終無歸日臣又見比年邉城犯流者多是胥徒小吏或是鬭打輕刑據罪可原在邉無益伏請自今已後流人及先流人等准格例滿日六年後並許放還冀扺法者足以悛懲滿嵗者絶其愁怨從之十二年四月敕應左降官流人不得補職及留連宴賞如擅離州縣具名聞奏其年七月敕自今已後左降官及責授正員官等並從到任後經五考滿許量移今日以前左降官等及量移未復資官亦宜准此處分考滿後委本任處州府具元貶事例及到州縣月日申刑部勘責俾吏部量資望位量移者仍每季具名聞奏并申中書門下其曽任刺史都督郎官御史并五品以上及常參官刑部檢勘其所犯事由聞奏中書門下商量處分其月敕左降官等考滿量移先有勑令因循日久都不舉行遂使幽遐之中恩澤不及自今已後左降官及責授正員官等宜並從到後經五考滿量移今日已後左降謫逺等官量移未復省官亦宜准此處分如是本犯十惡及指斥乘輿妖言不順假托休咎反逆餘纍及贓賄數多情狀稍重者宜具事由奏聞其曽任刺史督都郎官御史五品以上常參官刑部檢勘具元犯事由聞奉並申中書門下商量處分未滿五考已前遇恩赦者准當時即處分其復資度數准元和二年六月二十七日敕諸道左降官等經五考滿日許量移者具貶降官日授正員官或無責授並請至五考滿然後許本任處申闕并餘左降官緣任處州府多是遐逺至考滿日其有申牒稽遲致留滯者其刺史本判官録事參軍等並請准天寶貞元兩度敕文依舊支給其本犯十惡等罪已有正名仍請依舊從之其年十月敕自今已後流人不得因事差使離本處十四年十一月吏部奏今請應責授官前制已改轉者各勒依今任考數停替日便放東西合選時任自參選不要及更有檢轄庶使人無凝滯事有指歸敕㫖依奏長慶元年正月三日制應亡官失爵及放還流人如先有莊田已經沒官被人請射作主如本主及子孫到並委州府却還務令安業四年四月刑部奏准其年三月三日起請准制以流貶量移輕重相懸貶則降秩而已流為擯死之刑部論理條件聞奏今謹詳赦文流為减死貶乃降資量移者却限年數流放者便議歸還准今年三月敕文放還人其中有犯贓死及諸色免死配流者如去上都五千里外量移校近處如去上都五千里已下者則約一千里內與量移近處如經一度兩度移六年未滿者更與量移亦以一千里為限如經三度兩度量移如本罪不是减死者請准制放還如左降官來復資遇恩滿五考者准元和十二年九月敕與量移又准今年正月德音諸色流人與减一年除減外滿五年即放還收叙其配流在德音已後者不在減限又天德五城流人准長慶元年正月三日制以十年為限又限准三月十二日敕縱違恩敕不在放歸限今請待十年滿即放歸仍任取配流日計年數不在援引德音減年之限制可之開成元年二月敕貶責降資授正員官及曽經誤纍停免未經引用者並與進改左降官有事情可恕才用足稱者中書門下量才處分四年五月敕諸州府有責授六品以下正員官起今已後宜委吏部許終四考滿與替仍先具事由申中書門下取指檢不得同尋常員闕使用其年十月五日敕節文今後流人宜准名例律及獄官令有身名者已後聽赦無官爵者六年滿日放歸㑹昌六年五月赦書莭文應徒流人在天德振武者官中量借糧種佃令耕田以為生業大中三年六月敕先經流貶罪人歿于貶所有情非惡逆任經刑部陳牒許令歸葬絶逺之處仍量事給棺槥四年正月敕徒流人比在天德者以十年為限既遇鴻恩許量减三年但使循環添換邉不闕人次第放歸人無怨苦其秦原威武諸州諸闕先准格徒流人亦量與立限止于七年如要住者亦聽其年十一月敕收復成維扶等三州建立已定條令制置一切合同其已罪配流人宜准秦原威武等州流人例七年放還其年五月御史臺奏起請赦書莭文流人該恩例須磨勘文書雖曰放還尚為拘絆其人經三度量移者赦書後委所在長吏子細檢勘無可疑者便任東西訖具名聞奏臣今條流其流人每每量移之時請委刑部具先流甚處相承牒准赦文當日放東西訖具名聞奏其流人未有處分者請委刑部准此磨勘牒報本道并其事由報臺庶免留滯五年十一月中書門下奏今後有配長流及本罪合死遇恩得减等者並勒將妻同去有兒女情願者亦聽如流人所在身死其妻等並許東西州縣不任勾留情願住者亦聽乾符元年九月十六日敕應殘疾篤廢犯徒流罪或是連纍即許徵贖如身犯罪不在免限其年十五以下者准律文處分五年五月二十六日刑部侍郎李景莊奏配州府流人流刑三等流二千里至流三千里每五百里為一等准律諸犯流應配者二流俱役一年稱加役流三千里役三年役滿及㑹赦免役者即于配所從户口例今後望請諸流人應配者依所配里數無要重城鎮之處仍逐罪配之唯得就近敕㫖從之酷吏載初元年九月來俊臣主制大獄每鞫囚不問輕重多以醋灌鼻禁地牢中或盛之于甕圍炙以火絶其餱糧至有袖衣絮以噉之者又令寢處糞穢備諸苦毒但入新開獄者自非身死絶不得出每有制書赦宥囚徒俊臣必遣獄吏盡殺之然後宣示公卿入朝默邅收捕故每出必與家人訣曰不知重相見否其月於都城麗景門內别置推事院謂之新開獄作大枷凡有十號一曰定百脈二曰喘不得三曰突地吼四曰著即承五曰失魂魄六曰實同反七曰反即是八曰死猪愁九曰求即死十曰求破家天授二年正月御史中丞知大夫事李嗣真以來俊臣等用法嚴酷上疏曰臣聞陳平事漢皇謀疏楚君臣乃用黃金五萬斤行反間之術項王果疑臣下陳平反間遂行今告事紛紜虛多實少當有凶慝焉知必無陳平先謀疏陛下君臣後謀國家良善陛下昨語臣云我比來已作此意是愚臣管測先天而天弗違至如羅織之徒即疏開之漸陳平反間其逺乎哉王制曰凡用刑史以獄成告于正正聽之以獄成告于大司冦大司冦聽之棘木之下與孤卿大夫公侯伯子男以獄成告于王王命三公參聽之三公以獄成又告于王王三宥之然後制刑臣竊見比日獄官一單車使推從萬事即定法家隨斷不令重推或有臨時使决不待聞奏此權由臣下非審懼之法儻有寃濫何由可知况乎九品之官専命推覆既不在秋官官省審復不由門下事非可久物情駭懼老子云國之利器不可以示人今日假此威權便是窺國家之利器也不可不慎長壽元年有上封事人言嶺南流人有隂謀逆者乃遣司刑評事萬國俊攝監察御史就案之若得反狀便許斬决國俊至廣州遍召流人擁之水濵以次加戮三百餘人一時併命然後煆錬曲成反狀仍誣奏云嶺南道流人咸有怨望若不推究為變不遙則天然其奏又命攝監察御史劉光業王德壽鮑思恭王大貞屈貞筠等分往劔南黔中安南嶺南等六道案鞫流人于是光業誅七百人德壽誅五百人其餘少者不减數百人時周興來俊臣相次受制推究大獄又與侯思止王𢎞義郭霸衛遂忠等招集告事者數百人共為羅織以陷良善又造羅織經一卷其意㫖皆網羅前人織成反狀海內震懼道路以目麟臺正字陳子昂上書曰臣聞之聖人出必有驅除蓋天人之符應休命也日者東南微孽敢謀亂常陛下順天行誅罪惡咸服豈非天意欲彰陛下神武之功哉而執事者不察天心以為人意惡其首亂唱禍法合誅屠將息奸源窮其黨與遂使陛下大開詔獄重設嚴刑兾以懲創于天下故大或流血小禦魑魅今朝廷惶惶莫有固志海內傾聽以相驚恐愚臣昧焉竊恐非五帝三皇伐罪弔人之意也頃年以來伏見諸方告密牽連至百千輩大抵所告以揚州為名及其窮竟百無一實遂使奸惡之黨快意相讐睚眦之嫌即稱有密一人被訟百人滿獄使者推捕冠蓋如市或謂陛下愛一人而害百人天下唱之莫知寧所伏願念之即天下幸甚萬年縣主簿徐堅上疏曰臣聞書有五聽之道慮失情實也令著三覆之奏恐致虛枉也比見有勑勘當反逆命使者得實便行决殺人命至重死不可生儻萬分之中有一不實欲訴無路懷枉誰明飲恨吞聲赤族從戮豈不痛哉此不足肅姦逆而明刑典適所以長威福而生疑懼臣望絶此處分依法覆奏則死者甘伏知泣辜之恩生人歡悅見詳刑之意鳯閣舍人韋嗣立上疏曰臣聞堯舜之日畫其衣冠文景之世幾致刑措厯兹千載以為美談今四海多銜寃之人九泉有抱痛之鬼並自揚蔡之後刑獄漸興用法之伍務于窮竟連坐相牽數年不絶遂使巨姦大猾伺隙乘間內包豺狼之心外示鷹鸇之跡隂圖潜結共相影㑹至以似是之言成不赦之罪皆深為巧詆恣行楚毒人不勝痛便乞自誣公卿士庶連頸受戮道路籍籍雖知非辜而鍛鍊已成辨占皆合縱皋陶為理于公定刑則謂汙宫毁柩猶未塞責雖陛下仁慈哀念恤獄緩死及覽辭狀便已周密皆謂勘鞫得情是其實罪雖欲寬舍其如法何于是小乃身誅大則族滅相緣共坐者不可勝言此豈宿構讐嫌將申報復皆圖茍成功效有求官賞當時稱贓謂為羅織弄法侮文傷人實甚且如仁傑元忠俱罹枉陷被勘鞫之際亦皆已自誣向非陛下至明無以省察則葅醢之戮已及其身欲望輸忠聖世安可復得陛下擢而升之遂名為良輔國之棟幹稱此二人何乃前非而後是耶誠由枉陷與甄明耳陛下倘録垂拱以來伏法者並追還官爵緣纍之徒普霑恩造如此則天下皆知比所陷罪元非陛下之意監察御史魏靖上疏曰夫酷吏者資矯佞以事君行刻薄以臨下矯佞似乎用意刻薄類乎無私侮憲害公弄權骩法臣見周興來俊臣等恣意騁暴縱虐含毒讐疾在位安忍朝臣罪隨情加刑隨意改當其時也囹圄如市朝廷以目既而神靈不昧寃魂有託竊見來俊臣身處極法者以其羅織良善屠陷忠賢籍沒以勸將來明戮以謝天下臣又聞之道路上至聖主傍洎貴臣明知有羅織之事矣使臣既死推者獲㓛胡元禮超遷裴談受榮賞中外稱慶朝野載安破其黨者既能賞不逾時被其陷者豈可銜寃纍嵗且稱反之徒須反狀唯據片辭即請行刑拷楚妄加疑似何限臣又聞之郭霸自刺而唱快萬國俊被傷而遽亡崔獻可臨終膝拳于項李仁敬將死舌至于臍備在人謡不為虛說伯有晝見殆無以過此亦羅織之一據也臣以至愚不識大體倘使平反者數人衆共詳覆來俊臣等所推大獄庶鄧艾獲申于今日孝婦不濫于昔時矣后悟乃下詔以來俊臣所推鞫人身死籍沒者令三司重檢勘有寃濫者並皆雪寃聖厯元年則天謂侍臣曰往者來俊臣等推制獄朝臣遞相牽引咸承反逆中間疑有枉濫更遣近臣就獄親問皆得手狀承引不虛近日俊臣死更無聞有反者然則已前受戮者不有寃濫耶夏官侍郎姚元崇對曰比破家者皆是枉酷自誣告者持以為功天下號為羅織甚至陛下令近臣就獄親問者近臣亦不得自保何敢動搖今日已後臣之一門百口保見在內外官吏無反者乞陛下得告狀收掌更不須推則天大恱曰以前宰相皆順成其事陷朕為淫刑之主萬嵗通天二年九月初契丹平命邠寧道大總管河內王懿宗按撫河內諸州懿宗所過殘酷有犯法應死者必生取膽然後殺之雖流血盈庭言笑自若先賊帥何阿小攻陷冀州亦多屠害士女故時人號懿宗阿小為兩河語曰唯此兩河殺人最多嫉之甚矣神龍元年三月二日制故司僕少卿徐有功執事平恕追贈越州都督特授一子官又以劉光業王德壽王處貞劉景陽屈貞筠丘神績來子珣周興來俊臣魚承曄王景昭索元禮傅遊藝王𢎞義張知默裴籍焦仁亶侯思止郭霸李敬仁皇甫文備鮑史恭等二十三人自垂拱已來枉濫殺人所有官爵並令追奪唐奉一李秦授依前配流至開元二年二月一日勑周利貞裴談張福正張思敬王承劉暉楊允姜暐封行已魚承曄張知默衛遂忠公孫琰鍾思廉等十三人皆為酷吏比周興來俊臣侯思止等事跡稍輕並宜放歸田野終身勿齒至十三年三月十一日敕周酷吏來子珣等身在者冝長流嶺南身沒子孫亦不許仕劉景陽丘神績劉暉王景昭李嘉言魚承暉皇甫文備傅逰藝宜配嶺南身沒子孫亦不許干仕進寶應元年貶御史中丞敬羽為道州刺史尋有詔殺之初肅宗收復兩京時刑官多以失出得罪自毛若虛敬羽以深文巧詆相繼為中丞皆為上所親信乃作大枷有鱉榆著即悶絶又掘地為坑實以棘刺以敗席覆之領囚臨坑訊之多墜其中萬刺攢之以就死又有裴升畢曜亦以酷聞當時有毛敬裴畢之稱貞元二十一年二月貶京兆尹李實為通州長史實為京兆尹目國哀已後殘害人吏悉不聊生無辜斃踣者甚衆及譴日市井歡呼爭投瓦礫間道乃免元和十四年七月沂海觀察使王遂為衆所殺遂初到鎮好以汙俗詆將卒日肆殘賊喜怒不中理其將王辨乘人心不堪率衆為亂遂竟遇害始遂每有笞撻其杖率過制既遇禍監使封其杖來獻上命出示于朝以作誡焉雜記貞觀十一年正月敕在京禁囚每月奏自立春至秋分不得奏决死刑十三年八月四日敕身體髮膚受之父母不合毁傷比來訴競之人即自刑害耳目自今以後犯者先决四十然後依法十六年十月二十六日詔盜賊之作為害實深州縣官人多求虛譽茍言盜發不欲陳告鄉村長正知其此情遞相勸止十不言一假有被論先拘物主爰及鄰伍久嬰縲絏有一于斯實虧正化自今以後勿使更然永徽五年三月制州胥吏犯贓一匹以上先决一百然後准法六年十一月二十七日詔投匿名書國有常禁凡厥寮庶咸應具悉近遂有人向朝堂之側投書于地藏其姓名誣人之罪朕察其所陳皆極虛妄此風若扇為蠧方深自今已後內外法司及别敕據事宜並依律文勿更别為酷法其匿名書亦宜准律處分永淳二年二月制官人犯法經斷後得雪者並申尚書省詳定若前被枉斷及有妄雪者具狀聞奏延載元年敕盜公私尊像入大逆條盜佛殿內物同乘御物神龍三年八月七日敕反逆緣坐人應沒官者年至十六以上並配嶺南逺惡州為城奴景雲二年九月二十六日敕新授官已上者不得更訴屈開元三年二月敕禁别宅婦人如犯者五品已上貶逺惡州婦人配入掖庭四年正月六日敕除長官以外因公事責决罰不過十下其私事専執當者不得過二十二十二年十月九日敕犯罪逃走者其贓即先徵納後捉獲推勘贓數减少不在却還之限天寶五載十一月五日其僞畫印宜用僞刻印鑄印之例處分永為常式九載十二月二十九日敕責情狀専知官有二十减十下自今已後判司縣令一人犯奪太守一季祿丞簿尉一人有犯與縣令中下考三人已上既量事貶黜建中元年二月十五日敕責情狀宜准格式處分至正元六年十一月八日敕自今已後太守縣令有犯贓者宜令加常式一等至元年建丑月二十一日京兆尹魏少逰奏令長職在親人丞簿尉有犯無不委悉比來各相䝉蔽悉狥人情百姓艱辛職由於此今已後丞簿尉有犯贓私連坐縣令其罪减所犯官二等冀遞相管轄不得為非敕㫖依天下諸州准此乾元元年二月五日敕節文州縣佐官已下笞杖不得過十下已上須取長官處分廣德元年七月十一日敕節文應天下刑獄大理正斷刑部詳覆下中書門下處分元和六年三月二十七日御史臺奏决囚准令以未後者不得申時如州府及諸司已至未後者許至來日仍請勒本司官准制與御史同監引决從之長慶二年九月敕應犯贓罪今後不得以散試官當罪元和三年四月敕應勳官及六品以下階宜准散試官例不得當罪大中五年四月應敕諸道州府及京諸司所有推勘奏狀宜令具小節目狀于大狀前同進今天下謂之小狀自此始也七年四月六日敕法司斷罪每脊杖一下折法杖十下臀杖一下折笞杖五下則吏無逾制法守常規唐㑹要卷四十一
