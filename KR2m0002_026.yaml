body:
  text: 唐會要卷二十六宋王溥撰册讓貞觀八年勅拜三師三公親王尚書令雍州牧開府儀同三司驃騎大將軍左右僕射並臨軒册授太子三少侍中中書令六尚書諸衛大將軍特進鎮國大將軍光禄大夫太子詹事九卿都督及上州刺史在京者朝當受册至光宅元年並停顯慶元年九月二十七日勅拜三師三公親王尚書令雍州牧開府儀同三司驃騎大將軍左右僕射侍中中書令諸曹尚書諸衛大將軍特進領軍鎮國大將軍光禄大夫太子詹事太常卿都督及上州刺史在京者詣朝堂受册至景雲九年八月十四日勅左右丞相侍中中書令六尚書已上欲讓者聴餘並不許至開元中宰相李林甫奏兩省侍郎及南省諸司侍郎左右丞雖是四品職在清要亦望聴讓大厯十四年五月臨軒册尚父子儀於宣政殿自神龍已來册禮乆廢凖天寳末册楊國忠為司空至是復行貞元三年四月御宣政殿備禮册拜太尉李晟受册訖具羽儀乗輅謁太廟遂赴上於尚書省故事臨軒册拜三公中書令讀册侍中奏禮畢如闕即宰相攝之時宰相張延賞欲輕其禮始奏令兵部尚書崔漢衡攝中書令讀册左散騎常侍劉滋攝侍中奏禮畢臨軒冊命宰臣不親行事自此始也延賞素與晟有隙至是故特降減其禮欲以輕之也舉人自代武徳五年三月勅令京官五品已上及諸州總管刺史各舉一人其有至行者録才用未申亦許聴自舉具陳藝能當加顯擢授以不次顯慶四年十一月詔凡百官僚郡公卿尹除命多再飭上自兹已後宜各舉所知以自代仍具才行送轉中書省叙用𢎞道元年正月京官六品已上清望官及諸州岳牧各以已之職推讓三人並以名聞隨即升擢上元二年九月二十一日勅文每除京官五品已上正員清望官及郎官御史諸州刺史皆令推薦一兩人以自代具録行能聞奏審其所舉以行殿最建中元年正月五日赦文常㕘官及節度觀察防禦軍使城使都知兵馬使諸州刺史少尹赤令畿令并七品已上清望官及大理司直評事授訖三日内於四方館上表讓一人以自代其外官委長吏勾當附驛聞奏其表付中書門下每官闕即以見舉多者量而授之貞元二年正月二十四日新授三日内上表舉人自代者比來所舉少有摭實殊乖求才之意自今已後每舉人皆令指陳其承前事跡分析言之元和六年十月中書門下奏准建中元年勅常㕘官舉人後便具所舉人兼狀上中書門下如官缺於此選擇進擬從之咸通四年正月勅中外官宜准建中元年勅授官後三日舉一人自代讀時令貞觀十四年正月二日命有司讀春令詔百官之長升太極殿列坐而聴焉長安四年司禮少卿崔融上表曰臣伏見去年元日明堂受朝讀時令謹按讀時令日自魏晉已來創有此禮每嵗立春立夏大暑立秋立冬常讀五時令帝升御坐各服五時之色尚書令已下就位尚書三公即奉時令就位伏讀凡五時皆如之所以祗迓天和至宋朝亦行斯禮此後尋廢迄至國初但存讀令之文亦不行其事自陛下御極創建明堂舊典缺本莫不補輯每至元日受朝布政因以時令之禮附於元日行之今布政等禮已停不合更讀時令所司因循去年元日尚讀有乖古典事類停廢臣謹與鸞臺鳯閣考古詳議已停讀訖不敢不奏開元二十一年四月一日命太常卿韋縚每月進月令一篇是後每孟月朔日上御宣政殿側置一榻東西置案令韋縚坐而讀之諸司官長每升殿列坐聴焉嵗餘罷之乾元元年十二月二十八日立春御宣政殿命太常卿于休烈讀春令常㕘官五品已下為升殿坐而聴之貞元六年二月制自今已後每至四孟月迎氣之日令所司宣讀時令朕當與百辟卿士舉行之太和八年六月中書門下奏漢丞相魏相奏云隂陽者王事之本羣生之命自古聖賢未有不由者也請選明經通知隂陽者四人各職一時時至各言所職宣帝納用遂至太平國朝開元中詔令春夏秋冬常以孟月於正殿受朝讀時令天寳已後盛典乆廢災沴之作實恐由斯臣等商量來年正月依禮讀時令命太常寺先撰儀法務於簡便從之命婦朝皇后國朝命婦之制皇帝妃嬪及皇太子良娣以下為内命婦公主及王妃已下為外命婦王之母妻為妃永徽五十一月武后初立羣臣命婦朝皇后國初以來始有此禮舊儀冬至元日百官不於光順門朝賀皇后至乾元元年張皇后遂行此禮禮儀使工部侍郎于休烈先奏曰據周禮有命夫朝人主命婦朝女君自永徽五年已來則天為皇妃始行此禮其日命婦又朝光順門朝官命婦並入雜處殊為失禮有詔乃停景龍四年六月勅文武官五品已上母妻未受邑號告身者不在朝㑹之限其月勅宗族命婦第一第二第三品並每月二十六日㕘又諸親命婦非應朝㕘及須辭見謝者皆不得輒奉其㑹即所司録人數送内侍省内謁者監前一日奏其日平明於宫城門外車馬集内謁者監㸃引至命婦朝堂下車訖又典定然後奏帳訖各報所由若辭見㕘謝及有獻奉亦􅊭明至宫門整比一時總奏如勅追唤者隨至聞奏又諸親五等已上内命婦才人已上并外命婦朝㕘乘馬者聴乘至命婦朝堂從人數凖乗車例即入内者令一人監門校尉内侍省髙品官對看然後六柱國入若從内出凖此其下從入者即監搜若有婦人男婦並不得入諸親第一第等次親王太妃妃下從婦女六人扶車三人散使二人外命婦二品已下上從婦女二人扶車親王及太妃妃公王遣阿嬭及内監泰下從扶車散一人諸親及外命婦朝賀辭見見㕘謝入内從聴依前件至内命婦朝堂及夫子官品髙於等從髙仍並不得乗擔子其尊屬年老勅賜擔子者不在此例又外命婦品大長公主長公主並視正一品郡主視從一品縣主視正三品王妻為妃嗣王郡王母妻亦同文武官一品及國公其非始封者帶三品已上者同母妻為國夫人三品已上母妻為郡夫人四品若勲官二品有勲母妻為郡君五品若勲官三品有封母妻為縣君帶職者若勲官四品有封母妻為卿君其母邑號皆如太字各視夫子之品即夫子兩有官及爵或准一人有官及爵者皆聴從髙䕃及内命婦四品已上母並加邑號一品二品母為正四品郡君三品四品母並為正五品縣君東宫命婦亦凖此其㑹朝依命婦制自外婦人不因夫子號别加邑號者夫人云某品郡君某縣君卿君並凖此諸因夫子應授妃已下者見任官從本司無本司從大貫陳牒所司申奏給告身其申奏者所司總為抄奏若未給授而夫子薨卒者不在給限諸庶子有五品已上官封者若嫡母在所生之母不得為太妃已下無者聴之承重者不合又諸親婦人并命婦應長㕘者每月二十六日及嵗冬至寒食五月五日並命所司於命婦朝堂供養入諸命婦朝㕘若行立次第各凖夫子同班則母在上非二王後夫子及職事五品已上命婦並不在朝㕘之例散官三品以上及王若國公得朝㕘者母妻凖夫子例常㕘自有制者依常㕘諸蕃人三品已上母妻應加邑號者並授諸外命婦每朝㕘光政景運永安等門車馬兩門放出入元和元年十月太常奏外命婦㕘賀皇太后儀制自今以後每年元日冬至外命婦有邑號者并准式赴皇太后所居宫殿門進名㕘賀其立夏立秋立冬并進名𠫭如泥雨即停依奏二年七月勅每年元日冬至立夏立秋立冬日外命婦朝謁皇太后自有常儀不合前却自今已後諸公主郡縣主宜委宗正寺勾當常㕘官母妻御史臺勾當如違天子奪一月俸無故頻不到者有司具狀聞奏十五年二月太常寺奏内外命婦請至朝賀㕘奉前五宗正寺光禄内侍省計㑹進名御史臺具集日轉牒諸司餘准元和元年勅處分依奏長慶四年三月禮儀使奏故事命婦有邑號者正至四立並合行起居之禮縁其日兩宫起居若依舊章事涉煩䙝今請正至日即詣興慶宫起居訖詣光順門起居制可天祐二年七月二十三日勅冊皇太后内外命婦比合朝賀今縁命婦未有完宇兼慮或闕禮衣若准舊儀恐難集事宜令各據章表稱賀皇太子冠貞觀三年正月有司上言皇太子將行冠禮宜用二月為吉請追兵備儀注上曰今東作方興恐妨農事令改用十月太子少保蕭瑀奏稱准隂陽家用二月為勝上曰隂陽拘忌朕所不行若動静必依隂陽不顧禮義欲求福祐其可得乎若行所當行皆遵正道自然當與吉㑹且吉凶在人豈假隂陽拘忌農時甚要不可蹔失開元六年侍中宋璟上表曰臣伏以太常狀以皇太子冠准東宫典記有上禮之儀謹按上禮非古從南齊後魏始有此事而垂拱神龍更扇其道羣臣斂錢獻食君上厚賜答之姑息施恩方便求利每縁一事有此再煩齊魏乃衰季之風故不足效而車轍有前事之戒應當取衷皇太子冠乃盛禮自然合有錫賚上臺東宫兩處宴㑹非不優厚其上禮乞停皇太子加元服貞觀八年二月三日皇太子加元服永徽六年二月五日皇太子加元服内外文武官為父後者賜爵一級顯慶四年十月十二日皇太子加元服開元八年正月十二日皇太子將加元服十二日太子謁太廟十三日宴百官於太極殿皇太子見三師禮貞觀十二年七月禮部尚書王珪兼魏王師上問黄門侍郎韋挺曰泰昨與珪相見若為禮節挺對曰見師之禮拜答如儀訖王問珪忠孝珪答曰陛下王之君也事君思盡忠陛下王之父也事父思盡孝忠孝之道可以享天祐餘芳可以垂後葉王曰忠孝之道已聞敎矣願聞其業答曰漢東􅊭王蒼云為善最樂上曰我常語泰汝之事師如事我也泰每先拜珪珪亦以師道自居物議善之十七年四月二十一日上謂房𤣥齡蕭瑀曰太子三師以徳導人者也若師傅禮卑則太子無所取則于是詔令撰三師儀注太子出殿門迎先拜三師答拜每門讓三師坐太子乃坐與三師書前名惶恐後名惶恐再拜其年皇太子承乾失德魏王有奪嫡之漸内外擬議上惡之謂侍臣曰當今朝臣忠謇無踰魏徴我遣傅皇太子用絶天下之望及草詔曰徴其辭乎皆曰徴已拜侍中必不受師傅上曰徴識吾此意當不固辭及詔為太子太師徴自陳有疾詔答曰漢之太子四皓為助我之賴卿即其義也知公疾病當卧䕶之即拜而奉詔其年四月英公勣為特進太子詹事乃同中書門下三品上謂勣曰我兒新登儲兩卿舊長史今以官事相委故有此授屈資勿怪也以孤思之無越卿者公往不遺李宻今豈有遺朕哉勣雪淚致詞以謝是月詔宰臣劉洎岑文本禇遂良往來東宫與皇太子逰處為賓客初洎上疏以皇太子初立宜尊師重學與正人逰故上嘉歎行焉太和八年十月太常禮院奏今月十七日皇太子與太師相見請前一日開崇明門内外門所司陳設依奏開元三年四月勅宣令師保賓客詹事左右春坊五品已上官每至朔望日仗下後與前件官請崇明謁見皇太子其一官兩貟已上者任分番如遇隂雨休假其輟放並權停其年八月勅太子太師鄭覃每月與賓詹左右春坊五品已上官謁見皇太子宣令每月更添一日以二十六日二十一日詣崇明門謁見若遇隂雨休假其輟朝放朝即取以次雙日餘准今年四月勅處分九月勅太子太師及東宫每月二十六詣崇明門謁皇太子宜停不許諸王及公主抗禮貞觀十一年中書舍人髙季輔上疏曰臣竊見宻王元曉等事懿親陛下友愛之懷義髙古昔分以車服委以藩維須依禮儀以副瞻望比見帝子拜諸叔諸叔亦答拜王爵雖同家人有禮豈合如此顛倒昭穆伏望一垂訓戒永循彞則顯慶三年正月二十一日詔父母之尊人倫以極舅姑之敬禮經攸重茍違斯義有斁彛倫如聞公主出適王妃作嬪舅姑之父母皆降禮答拜此乃子道亡替婦徳不修何以式序家邦儀刑列閫自今已後可明加禁斷一依禮法神龍元年二月十五日制曰朕臨兹寳極位在崇髙負扆當陽雖受宗枝之敬退朝私謁乃用家人之禮近代已來罕遵軌度王及公主曲致私情姑叔之尊下拜子姪違背禮典情用憮然自今已後宜從革弊安國相王及鎮國太平公主更不得輒拜衛王重俊兄弟及長寜公主等宣示尊屬知朕意焉鄉飲酒貞觀六年詔曰比年豐稔閭里無事乃有惰業之人不顧家産朋逰無度酣宴是躭危身敗徳咸由於此每覽法司所奏因此致罪實繁有徒静言思之良增軫歎自匪澄源正本何以革茲俗弊欲當約之軌物詢諸舊章可見録鄉飲酒一卷頒行天下每年令州縣長官親率長㓜齒别有序遞相勸勉依禮行之庶家識廉恥人知敬讓唐隆元年七月十九日勅鄉飲酒禮之廢為日已乆宜令諸州每年遵行鄉飲酒禮開元六年七月十三日初頒鄉飲酒於天下令牧宰每年至十二月行之至十八年宣州刺史裴耀卿上疏曰州牧縣宰所寄者宣揚禮樂典冊經籍所敎者返古還淳上奉君親下安鄉族聖朝制禮作樂雖行之日久而外州逺郡俗習未知徒聞禮樂之名而不知禮樂之實竊見鄉飲酒頒於天下比來惟貢舉之日畧用其儀閭里之間未通其事臣在州之日率當用所管縣一一與父老百姓勸遵行禮奏樂歌至白華華黍南陔由庚等章言孝子養親及庶物遂性之宜或有泣者則人心有感不可盡誣但州縣乆絶雅聲不識古樂伏計太常具有樂器大樂乆備和聲望天下二十五大州簡有性識人於太常調習雅聲仍付笙竽琴瑟之類各三兩事令比州轉次造習每年各備禮儀准令式行禮稍加勸奨以示風俗二十五年三月勅應諸州貢人上州嵗貢三人中州二人下州一人必有才行不限其數其所貢之人將申送一日行鄉飲酒禮牲用少牢以現物充大射武徳二年正月賜羣臣大射於𤣥武門四年八月賜三品已上射於武徳殿貞觀三年三月三日賜重臣大射禮於武徳門五年三月三日賜文武五品已上射於武徳殿六年三月三日賜羣臣大射於武徳殿十一年三月三日引五品已上大射於儀鳳殿十六年三月三日賜百僚大射於觀徳殿其年九月九日又賜文武五品已上射於𤣥武門永徽三年三月三日幸觀徳殿賜羣臣大射五年九月三日御丹霄樓觀三品已上行大射禮四日賜五品已上射於永光門樓以觀之麟徳元年三月三日展大射禮自後遂不行此禮景雲二年諫議大夫源乾曜請行射禮上表曰臣聞聖王之理天下也必制禮以正人情人情正則孝於家而序於國此道不替無不理也故君子三年不為禮禮必壞是以古之擇士先觀射禮所以明和容之儀非取樂一時夫射者别正邪觀徳行中祭祀辟冦戎古者哲王莫不遞襲臣竊見數年以來射禮便廢或縁所司惜費遂使大射亦虧臣愚以為所費者物所全者禮故孔子云爾愛其羊我愛其禮伏望令聖人之敎今古常行天下幸甚先天元年九月九日御安福門觀百僚射至八日乃止開元四年三月三日賜百官射時金部員外郎盧廙與職方員外郎李蕃俱非善射者雖引滿俱不及垜而互言工拙蕃戲曰與盧箭俱三十步左右不曉蕃箭去垜三十步盧箭去身三十步也八年九月七日制賜百官九日射給事中許景先駁奏曰近以三九之辰頻賜宴射已著格令猶降綸言但古制雖存禮章多缺官員累廢帑藏未充水旱相仍繼之師旅既不足以觀徳又未足以威邊耗國損人且為不急夫古之太平以射選士諸侯以射飾禮樂以射觀容志故有騶虞貍首之奏采蘋采蘩之樂天子則以備官為節諸侯以射為節卿大夫以循法為節士以不失職為節皆審志固行徳美事成隂陽充和景福咸備故諸侯貢士亦試於射宫容禮有虧則黜其地是以諸侯君臣皆重意於射射之禮也大矣哉今則不然衆官既多鳴鏑亂下以茍獲為利以偶和為能素無五善之容頗失三侯之禮冗官厚秩禁衛崇班勲盈累千其算無數近河南河北水澇處多林胡小蕃見冦郊壘聖人憂勤招恤猶未能安今一箭偶中見一下庸調用之既無惻隠獲之固無恥慙考古循今則為未可且禁衛武官隨番許射能中的者必有賞焉此則訓武習戎時亦不闕待冦寜嵗稔率由舊章則愛禮養人天下幸甚疏奏遂罷之至二十一年八月二十三日勅大射展禮先王創儀雖沿革或殊而遵習無曠往有陳奏遂從廢寢永鑒大典無忘舊章將射侯以觀徳豈愛羊而去禮緬惟古制罔不率由自我而闕何以示後其三九射禮即宜依舊遵行以今年九月九日賜射於安福樓下自此已後射禮遂廢講武武徳元年十月四日詔殺氣方嚴宜順天時申耀威武可依别勅大集諸軍朕將躬自巡撫親臨校閲至八年十一月十日講武於同官縣貞觀八年十二月二十九日皇帝從太上皇閲武於城西顯慶二年十一月二十一日講武於滍水之南行三驅之禮上設次於尚書䑓以觀之許州長史封道𢎞奏尚書䑓本因漢南郡太守馬融講尚書于此因以為名今陛下親降此臺以觀校習請改為講武䑓從之五年三月二十八日講武於并州城北上御飛閣引羣臣臨觀之左衛大將軍張延師為左軍左右驍武等六衛左羽林騎士屬焉左武侯大將軍梁建方為右軍威凌武侯等六衛右羽林騎士屬焉一鼓而示衆再鼔而整列三鼓而交前左為曲直圓鋭之陣右為方銳直圎之陣三挑而五變步退而騎進合而各復其位許敬宗奏曰延師整而堅建方敢而銳皆良將也李勣曰甲胄精新將士齊力觀之者猶震恐况當其事乎上曰講閲者安不忘危之道也梁朝衣冠甚盛文物亦多侯景以數千人渡江一朝瓦解武不可黷又不可棄此之謂也麟徳二年四月二十五日講武於邙山之陽上御北城樓以觀之聖厯二年十月欲以季冬講武有司稽緩延入孟春麟臺監王方慶上疏曰臣謹案禮記月令孟冬之月天子命將帥講武習射御角力此乃三時務農一時講武以習射御角校才力蓋王者常事安不忘危之道孟春之月不可以稱兵兵者干戈甲胄之總名兵皆金也金性尅木春盛徳在木而舉金以害盛徳逆生氣也孟春行冬令則水潦為敗雪霜大摯首種不入蔡邕月令章句云太隂新休少陽尚微而行冬令以導水氣故水潦至而敗物也雪霜大摯折傷者也太隂干時雨雪而霜故大傷首種首種謂宿麥也麥以秋種故謂之首種入收也春為盛寒所傷故至夏麥不成長也孟春講武是行冬令以陽時犯隂氣害發生之徳臣恐水潦敗物雪霜損稼夏麥不登無所收入也伏望天恩不違時令孟冬敎習以順天道制答曰循覽所陳深合典禮若違卿意此乃月令虚行佇起直言用依來表先天二年十月十三日講武於驪山下徴兵二十萬戈鋋金甲耀照天地列大陣於長川坐作退進以金鼓之聲節之三軍出入號令如一上親御戎服持大槍立於陣前兵部尚書郭元振以虧失軍容坐於纛下將斬之宰臣劉幽求張説跪於馬前諫曰元振翊戴上皇有大功於國雖犯軍令不可加刑願寛宥以從人望乃赦之配流新州給事中知禮儀使唐紹以草軍儀有失斬之上既怒唐紹左右猶望寛之㑹右金吾將軍李邈遽請宣勅斬之時人痛惜紹而深咎邈尋有制罷邈官遂擯廢終身薛訥為左軍節度衆以元帥及禮官得罪諸部頗亦失叙惟訥及解琬軍不動上令輕騎召訥等至軍門不得入禮畢特加慰勞開元八年八月勅國家偃武敎修文徳百年于兹矣自運屬清平人忘争戰俎豆之事則嘗聞之軍旅之禮我所未暇且五材並用誰能去兵四方雖安不可忘戰故周禮以軍禁糾邦國以蒐狩習戎旅不敎人戰是謂棄之宜差使於兩京及諸州簡取十萬人務求灼然驍勇不須限以蕃漢皆放番役差科准令團伍敎練辨其旗物簡其車徒習攻取進退之方陳威儀貴賤之等俾夫少長有禮疾徐有節將以招攜懷逺將以保大定功協于師貞以𢎞武備應須期集及有蠲免所司明為條制仍别作優賞法聞奏至徳二年八月御鳳翔府門大閲三年正月御翔鸞閣習武自後遂廢大中六年五月勅天下軍府有兵馬處宜選㑹兵法能弓馬人充敎練使每年依禮敎習仍於其時申兵部牋表例舊例上所及下其制六天子曰制曰勅曰牒皇太子曰令親王公主曰敎尚書省下州州下縣縣下鄉皆曰符下之達上其制有五上天子曰表其近臣亦為狀上皇太子曰牋啟於其長為之有品也諸曹上公文皆為牒庶人之言曰辭諸司相質問有三曰闗曰刺曰移通判之官皆連署貞觀十九年正月上征遼發定州皇太子奏請飛驛遞表起居又請遞勅垂報許之飛驛奏事自此始也其年五月十日髙士廉劉洎等表稱皇太子與百官書疏先無體式請定其儀詔凡是處分論事之書皇太子並畫令太子左右庶子已下署姓名宣奉行書案畫日其餘與親友師傅不在此限天冊二年二月一日勅自今已後施勅行制及内外官司奏狀文案並大字至聖厯元年四月十一日制勅公文錢物倉庫計贓科罪𫝊符過所各依式及别勅作大字餘尋常文按解牒進奏並依常式景龍三年二月有司奏皇帝踐阼及加元服皇太后加號皇后皇太子立及元日則例若京官五品已上在外者並奉表疏賀其長官逺者次官五品以上者賀表當州遣使餘並附表令禮部整比送中書録帳總奏又應上表啟及奏狀並大書一行不得過一十八字其署名不得大書諸奏軍國事者並須指陳實狀不得漫引古今凡須奏請者皆為表狀不得輒牒中書省若事少者即於表内具陳使盡事情若多不可盡書者任於表前作一事條表内不許重述景雲二年六月勅南衙北門及諸門進狀及封狀意見及降墨勅並於狀上書晝題時刻夜題更籌先天二年三月三十日誥制勅表狀書奏牋牒年月等數作一十二十三十四十字開元二年閏三月勅諸司進狀奏事並長官封題進仍令本司牒所進門并差一官送進諸奏事亦准此中書門下御史䑓不須引牒其有告謀大逆者任自封進除此之外不得為進如有違者并先决杖三十七年三月二十六日勅譯書進表並令西蕃所由州府翻訖封進十一年七月五日勅三都留守兩京每月一起居北都每季一起居並遣使即行幸未至所幸處其三都留守及京官五品已上三日一起居若暫出行幸發處留守亦准此並逓表二十三年八月儀制令皇帝天子夷夏通稱陛下對御及上表通稱至尊臣下内外通稱乘輿服飾所稱車駕行幸所稱行在所亦行幸通稱諸赴車駕所在者准此皇太子已下率土之内於皇帝皆稱臣皇后已下率土之内於皇帝太皇太后皇太后皆稱妾六宫以下率土婦人於皇后皆稱妾也百官上疏于太皇太后皇太后稱殿下自稱皆曰臣百官及東宫對皇太子皆稱殿下上啟表同百官自稱名宫官自稱臣天寳十年十一月五日勅比來牧守初上准式附表申謝或因便使或有差官事頗勞煩亦資取置自今已後諸郡太守等謝上表宜並附驛逓進務從省便至十三載十一月二十九日詔自今已後每載賀正及賀赦表並宜附驛逓進不須更差專使㑹昌五年八月御史䑓奏應諸道官内州合進元日冬至端午慶陽等四節賀表自今已後其管内州並仰付管道專使發遣仍及時催促同到如闕事知表狀判官罰本職一月俸料發表訖仍先於急逓中申御史䑓除四節外非時别有慶賀使司便牒支郡取表狀急遞至上都奏委留後官准式同進奏縁使司賀表並宜先發其支郡表則待齊到一時付遞中發遣如前却亦准四節制例處分舊例支郡不賀者即不用聚表賀奏大中三年應邊鎮及諸道奏事表時有不題事由舊制引進狀内每具所奏事由時變鎮節將以討伐党項羌兵機急速恐外人先知因有此請自後諸道率多為例亦無正勅及中書門下處分待制官貞觀元年閏三月二十九日太宗謂蕭瑀曰朕少硏弓矢自謂能盡其妙近得良弓十數以示弓工曰此皆非良材也朕問其故曰木心不正則脉理皆邪雖剛勁而遣箭不直非良弓也朕始悟焉朕以弓矢定天下四方用弓多矣而有天下日淺得為理之意固未及於弓弓猶失之何况於理自是遂延耆老問以政術京官五品已上更宿中書兩省太宗每延與語詢訪外事務知百姓疾苦政教之得失焉永徽六年十一月五日詔禮部尚書𢎞文館學士許敬宗每日待制於武徳殿之西門顯慶四年二月二十八日引諸色目舉人謁見下詔䇿問之凡九百人李巢張昌宗秦相如崔行功郭待封五人為上第令待詔𢎞文館每坐日令五人隨仗供奉文明元年九月五日勅文凡京官五品已上清官每日於章善明福門各一人待制證聖元年左衛胄曹㕘軍員半千充使吐蕃辭日則天謂之曰乆聞卿名謂是古人不意乃在朝列境外小事不足煩卿宜且留待制也遂與王劇石抱忠並為𢎞文館學士仍與著作佐郎路敬淳分日於顯福門待制先天三年十月五日勅京清官及朝集使六品已上每日兩人隨仗待制供奉及宿衛官不在此例至開元十四年七月詔曰比令百官更直待制斯亦讜議時納箴規不聞一言甚無謂也凡百僚庶宜體朕懷各盡昌言以副虚佇于是太子左庶子吴兢等各上疏極言得失永泰元年三月一日勅惟政之難非賢弗乂必稽於衆允執其中實使羣材用𢎞庶績朕以國步未康朝經或闕思與文武藎臣咨謀善道尚書左僕射冕右僕射英乂太子少傅遵慶太子少保兼御史大夫志直太子詹事兼御史大夫臧希讓左散騎常侍楊瓘檢校刑部尚書王昻檢校刑部尚書崔渙吏部侍郎李季卿王延昌禮部侍郎賈至把王傅吾令珪等並集賢待制大厯十四年六月八日門下侍郎崔祐甫奏伏以先天二年令羣臣直日待制以備顧問自今已後准元勅文官一品以下更直待制待奉事官盡退别無宣喚然後趨出便於内廊晝食待進止至酉時後放陛下閒暇之際時有召問庶或上禆聖政奉勅宜依其待制官每日未時放歸至建中二年五月二日勅宜令中書門下兩省分置待制官三十員仍於見任前資及同正兼試九品已上官中簡擇文學理道兵鋒法度優深者具名聞奏度支據品秩量給俸錢并置本收利供厨料所須幹力什物㕔宇等并計料處分左拾遺史館修撰沈既濟上疏論之曰伏以陛下今日之理患在官煩不患員少患在不問不患無人且中書門下尚書官自常侍諫議補闕拾遺總四十員及常㕘待制之官日有兩人皆備顧問亦不少矣中有二十一員尚闕人未充他官缺職累倍其數陛下若謂見官非才不足以議則當選求能者以待其人若欲廣務聰明畢收淹滯則當擇其可者先補缺員則朝無曠官俸不徒費且夫置錢息利是有司權宜非陛下經理之法今官三十員皆給俸錢幹力厨料什器建造㕔宇約計一月不減百萬以他司息利凖之當以錢二千萬為之本方獲百萬之利若均本配人當復除二百户反復計之所損滋甚當今關輔大病皆為百司息錢傷人破産積於府縣實思改革以正其源又臣常計天下財富耗斁之大者惟二事焉最多者兵資次多者官俸其餘雜費十不當二事之一所以黎人重困杼軸猶空方斯緝熙必藉裁減豈俾閒官復為冗食藉舊而置猶可言也若之何加焉疏奏從之貞元元年八月二十八日勅宜令每日待制官各陳所見一條仗下後封進觀古畧兼補闕拾遺有足匡時固宜無隱如事煩細非理道所切者不須其年十二月詔延英視事日令常㕘官七人對見問以時政有訐忤及不適事理者優容以遣之三年四月詔常㕘官各以所見封進每坐日三四人陳奏利害七年十月詔自今已後每御延英殿令諸司長官二人奏本司事俄又令常㕘官每日二人引見訪以政事謂之延對元和元年四月正衙待制官兩員御史中丞武元衡奏本置前件官以備顧問比來多不奏事有同虚設又貞元七年更有次對官難議兩置去嵗已停今惟以六品已下清官前例恐非盡善伏請自今已後兼以中書門下省御史臺拾遺監察御史及尚書省六品諸司四品已上職事官東宫師傅賔客詹事及王府諸𫝊等每坐日兩人待制正衙退後令於延英候對以為常式勅中書省御史䑓官故事並不待制如要論奏但於延英候對餘依其年九月詔自今兩省官每日令一人對二年三月起居舍人鄭隨次對面奉進止令宣與兩省供奉官自今已後有事則進狀其次對宜停四年十月御史䑓奏應諸色請對官及待制自今已後並令前一日進狀來者伏以延英開日羣臣皆不前知遇陛下坐時方進狀請對或本司各有要事便得聞奏令遣應候對官前一日進若以尋常公事不假面論但表章足以陳露倘臨時恐有切務文字不可進言更俟後坐動踰數辰處置之間便有不及又請狀入之時須在夘前如後時者聴不收覽依奏太和二年九月應令待制官御史䑓奏舊例諸司官署簿前三日具名銜報䑓司前一日具名銜聞奏近皆逼日方報録奏常恐失時請自今已後如不是先陳牒請假臨時不署簿者請凖朝㕘不到例一任加罰如併三度違犯即具名聞奏依奏開成五年三月勅制法官朔望不要候對初二年八月文宗御延英對刑部郎中丁千乗王合大理少卿李韋紓等自後朔望即對刑法官以詳重輕也至大中三年十月宣待制官與諫官法官循環對侍讀開元三年七月勅朕每讀史籍中有闕疑宜選耆儒博碩一人每日侍讀遂命光禄卿馬懷素右散騎常侍禇無量更日入開成元年十一月宰相李石奏太子有侍讀諸王亦曰侍讀無降殺之禮今後請改為諸王講讀從之大中十二年四月以諫議大夫鄭覃兵部郎中李鄴為鄆王侍讀居十六宅後數日改充夔王已下五王侍讀居大明宫仍五日一入乾符門講讀懿宗即位遂寢其事唐㑹要卷二十六
