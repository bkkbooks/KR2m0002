body:
  text: 唐會要卷十一宋王溥撰明堂制度貞觀五年太宗將造明堂太子中允孔穎達以諸儒立議頗乖故實上表曰伏尋前敕依禮部尚書豆盧寬國子助教劉伯莊等議以為從崑崙道上層祭天又尋後敕云為左右閣道登樓設祭臣謹按六藝羣書百家諸史皆名基上曰堂樓上曰觀未聞重樓之上而有堂名孝經云宗祀文王於明堂不云明樓明觀其儀一也又明堂法天聖王示儉或有翦蒿為柱緝茅作蓋雖復古今異制不可常然猶皆依大典貴在朴素是以席惟藁秸器尚陶匏用繭犢以貴誠服大裘以訓儉今若飛樓架迥浮閣凌空考古之文實堪疑慮按郊祀志漢武明堂之制四面無壁上覆以茅祀五帝於上坐祀后土於下防臣以上坐止於基上下防惟是基下既云四面無壁未審伯莊以何知上層祭神下有五室且漢武所為多用方士之説違經背正不可師祖又盧寬等議曰上層祭天下堂布政欲使人神位别事不相干臣以古者敬重大事與接神相似是以朝覲祭祀並皆在廟豈有樓上祭祖樓下視朝閣道升樓路便窄隘乘輦則接神不敬步陟則勞勤聖躬侍衛在旁百司供奉求之經訓全無此理臣非敢固執愚説欲求已長伏以國之大典不可不慎伏乞以臣愚表下付羣官詳議焉侍中魏徵議魏徵議見文苑英華曰稽諸古訓參以舊圖其上圓下方復廟重屋百慮一致異軫同歸洎當塗膺籙未遑斯禮典午聿興無所取則裴頠以諸儒持論異端蜂起是非舛互靡所適從遂乃以人廢言止為一殿宋齊即仍其舊梁陳遵而不改雖嚴配有所祭享不匱求之典則道實未𢎞英華本多一百一字夫孝因心生禮緣情立心不可極故備物以表其誠情無以盡故飾宫以廣其敬宣尼美歎意在兹乎英華本尚有九十四字臣等親奉德音得參大議思竭塵露增崇山海凡聖人有作義重隨時萬物斯覩事資通變若據蔡雍之説則至理失於文繁若依裴頠所為則大體傷於質略求之情禮未臻厥中今之所議非無用舍請為五室重屋上圓下方既體有則象又事多故實下室備布政之居上堂為祭天之所人神不雜禮亦宜之其高下廣袤之規几筵尺丈之度則並隨時立法因事制宜自我而作不必師古廓千載之疑議為百王之懿範不使太山之下惟聞黃帝之法汶水之上獨稱漢武之圖則通乎神明庶幾可俟子來經始成之不日至十七年五月祕書監顔師古議英華亦載此議曰竊以明堂之制爰自古昔求諸簡牘全文莫覩肇起黃帝降及有虞彌歷夏殷迄於周代各立名號别創規模衆説舛駮互執所見巨儒碩學莫有詳通斐然成章不知裁斷究其指要實有布政之宫也徒以戰國縱橫典籍廢棄暴秦酷烈經禮湮亡今之所存記傳雜説用為凖的理實蕪昧然周書之敘明堂紀其四面則有應庫雉門據此一塗固是王者之常居耳其青陽總章玄堂太廟及左個右個又與月令四時之次相同則路寢之義足為明證又文王居明堂之篇帶以弓韣禮於禖下九門磔禳禦止疾疫置梁除道以利農夫令國為酒以合三族凡此等事皆合月令之文觀其所班皆在路寢者也又禮記云昔者周公朝諸侯于明堂之位天子負斧扆南嚮而立明堂也者明諸侯之尊卑也周官又云周人明堂度九尺之筵東西九筵堂一筵據其制度即大寢也尸子亦曰黃帝曰合宫有虞曰總章殷曰陽館周曰明堂斯皆路寢之徵知非别處大戴所説初有近郊之言後稱文王之廟進退無據自為矛盾原夫負扆受朝常居出令既在臯庫之內亦何云於郊野哉孝經傳云在國之陽又無里數漢武有懷創造廣集縉紳言論紛紜終以不定乃于汶水之上而宗祀焉明其不拘逺近無擇方面孝成之代表行城南雖有其文厥功靡立平帝元始四年大議營起孔牢等乃以為明堂辟雍太學一實三名金褒等又稱經傳無明文不能分别同異中興之後蔡雍作論復云明堂太廟一物二名鄭玄則曰在國之陽三里之外淳于澄又云三里之外七里之內丙巳之地穎容字子嚴釋例亦曰明堂太廟凡有八名其體一也茍立同異競為巧説並出自胸襟曽無師祖審見且夫功成作樂理定制禮草創從宜質文遞變旌旗冠冕今古不同律度權衡前後莫一隨時之義斷可知矣英華本尚有一百五十四字假使周公舊章猶當擇其可否宣尼彝則尚或補其闕漏况乎鄭氏臆説淳于謏聞匪異守株何殊膠柱英華本尚有數十字愚謂不出墉雉邇接宫闈實允事宜諒無所惑但當上遵天旨祗奉德音作皇代之明堂永貽範於來葉區區碎議皆略而不論也又上議表曰明堂之制陛下已發德音又遣詳議但以學者專固人人異言損益不同是非莫定臣愚以為五帝之後兩漢以前高下方圓皆不相襲惟在陛下聖情創造即為大唐明堂足以傳於萬代何必論户牖之少多疑陛庭之廣狹若恣儒者互説一端久無斷決徒稽盛禮昔漢武欲草封禪傳問諸生所説不同莫知孰是惟御史大夫兒寬勸上令自決定于是遂成登封之禮臣之愚誠亦望陛下斟酌繁省自為節文不可謙讓以淹大典永徽二年七月一日詔朕聞上玄幽贊處崇高而不言皇王提象代神工而理物是知五精降德爰膺帝者之尊九室垂文用紀配天之業合宫靈府創洪規於上代太室總章標茂範於中葉雖質文殊制奢儉異時然其立天中作人極布政施教其歸一揆今國家四表無虞人和嵗稔作範垂訓今也其時宜令所司與禮官學士等考核故事詳議得失務依典禮造立明堂庶曠代闕文獲申於兹日因心展敬永垂于後昆其明堂制度宜令諸曹尚書及左右丞侍郎太常國子監祕書官𢎞文館學士同共詳議於是太常博士柳宣依鄭玄議以為明堂之制當為五室內直丞孔志約獻狀據大戴禮及盧植蔡雍等議以為九室曹王友趙慈皓祕書丞薛文思等各進明堂圖樣諸儒紛爭互有不同上以九室之議理有可依乃令所司詳定明堂形制大小階基高下及辟雍門闕等制度務從典故也明年六月二十八日禮官學士詳議制度久之不定上乃內出九室樣更令有司損益之有司奏言內樣堂基三重每基階各十二上基方九雉八角高一尺中基方百尺高一筵下基方三百六十尺高一丈三尺上基象黃琮為八角四面安十二階請從內樣為定基高下仍請準周制高九尺其共作司約準二百四十八尺中基下基並望不用又內樣室各方三筵開四闥八窗室圓楣徑二百九十一尺按春秋大饗五帝各在一室商量不便請依兩漢季秋合饗總於太室若四時迎氣之祀則各於其方之正其安置九室之制增損明堂故事三三相重太室在中央方六丈其四隅之室謂之左右房各方二丈四尺當太室四面青陽明堂總章玄堂等室各長六丈以應太室濶二丈四尺以應左右房室門並通巷各廣一丈八尺其鄭玄盧植説以前梁為楣其徑二百十六尺法乾之䇿圓楣之下所施圓柱旁出九宫四隅各七尺法天以七紀柱外餘基共作司約準面别各餘一丈內樣室别四闥八窗檢與古合請依為定其户仍在外設而不開內樣外有柱三十六每柱十梁內有七間柱根以上至梁高三丈梁以上至屋峻起計高八十一尺上圓下方飛簷應規請依內樣為定其蓋屋形制仍望據考工記改為四阿并依禮加重簷準太廟安鴟尾堂四向五色請依周禮白盛為便其四向各隨方色請施四垣及四門辟雍案大戴禮及前代説辟雍多無水廣內徑之數蔡雍云水廣二十四丈四周於外三輔黃圖云水廣四周與蔡雍不異仍云水外周隄又張衡東京賦稱造舟為梁禮記明堂隂陽録水左旋以象天商量水廣二十四丈恐傷於濶今請減為二十四步垣外量取周足仍依故事造舟為梁其外固以圓隄并取隂陽水行左旋之制殿垣案三輔黃圖殿垣四周方在水內高不蔽日殿門去殿七十二步準今行事陳設猶恐窄小其方垣四門去堂步數請準太廟南門去廟基逺近為制仍立四門八觀依太廟門别各安三門施玄閫四角造三重魏闕自後羣儒紛競各執異議九室五室俱有依憑上令所司於觀德殿前依兩議張設上觀之謂公卿曰明堂之制自古有之議者不同所以未造今令張設兩議公等以何者為宜工部尚書閻立德奏曰兩議不同俱有典故九室似暗五室似明取舍之宜斷在聖意上亦以五室為便後以制度未定而止乾封三年二月十二日詔郊社嚴配未安太室布政施化猶闕合宫所以日昃忘食中宵輟寢討論墳籍錯綜羣言採三代之精微探九皇之至賾斟酌前載制造明堂宜命有司及時起作務從折衷稱朕意焉于是大赦改元總章分萬年縣改明堂縣總章二年三月九日詔上考經籍制為明堂處二儀之中定三才之本治兹一宇臨此萬方屬嵗飢而止光宅元年十月梓州人陳子昂上疏曰臣伏見天皇大帝得天地之統封于泰山功德大業與天比崇矣然尚未建明堂之宫遂朝上帝使萬代鴻業至今猶闕陛下若欲調元氣睦人倫躋俗仁壽興風禮讓舍此道也于何理哉願陛下念先帝之休意作大唐之鴻基于國南郊建立明堂使宇宙黎元遐荒夷貊昆蟲草木天地鬼神粲然知陛下方興三皇五帝之事也與天下更始不其盛哉昔者黃帝合宫有虞總章唐堯衢室夏后太室羣聖之所以調元氣理隂陽于此也臣雖末學竊聞明堂之制有天地之則焉有隂陽之統焉二十四氣八風十二月四時五行二十八宿莫不率備故不順其時月之為政也則水旱興疾疫起蟲螟雨雹成災隂陽不和元氣以錯故昔者聖人順以為政成大業也臣願陛下為大唐建萬代之業者意在兹乎臣願陛下以臣此章與三公九卿賢士大夫議之於庭儻事便於今道不違古即請陛下徵天下鴻生碩儒博通古今皇王政禮之術者延問於庭與之案周禮月令而建之臣必知天下庶人子來可不日而成也乃月孟春陛下乘鸞輅駕蒼龍載青旗佩蒼玉三公九卿賢士大夫鴻儒碩老衣冠之侣朝于青陽左個天子負斧扆憑玉几南面以聽天下之政乃令太史守典奉法司天日月星辰之行無失經紀以初為常陛下躬耕籍田親蠶事以觀天下之農桑養三老五更以教天下之孝悌明訟恤獄以息天下之淫刑除殘去暴以登天下之仁壽修文尚德以止天下之干戈察孝興廉以除天下之貪吏鰥寡孤獨廢疾羸弱不能自存者振恤之後宫美人非三妃九嬪八十一御女之數者出嫁之珠玉錦繡雕鏤伎巧之飾非益於理者悉棄之巫鬼淫祀誣惑良民者悉禁之天人之際既洽鬼神之望允塞然後作雅樂潔粢盛宗祀天皇於明堂以配上帝使萬國各以其職來祭豈不休哉垂拱三年毁乾元殿就其地創造明堂令沙門薛懷義充使四年正月五日畢功凡高二百九十四尺東西南北各廣三百尺凡有三層下象四時各隨方色中層法十二辰圓蓋蓋上盤九龍捧上層法二十四氣亦圓蓋亭亭中有巨木十圍上下通貫栭櫨樘㮰藉以為本亘之鐵索蓋亦有鸑鷟黃金飾之勢若飛翥刻木為虬架梁漆之明堂之下施鐵渠以為辟雍之象號萬象神宫因改河南縣為合宫縣左史直𢎞文館劉允濟上明堂賦百官賀明堂成上表曰臣某以下若干人等言臣聞上帝高居懸太微之府先王建國闢宗祀之堂不有大聖誰能經始伏惟天册金輪皇帝陛下尊祖揚彌嚴禋之德最先統天順時布政之道尤急親紆睿思躬運玄謨故能上合乾坤下符龜策柱將扶而已立石未鑿而懸開丹鷟跂甍似鳴岡而逺至蒼虬繞棟疑出河而欲飛神光熠耀於向晚仙樂清泠而方晝月維孟夏時屬正陽張文物於闕庭震聲名於宇縣聖皇戾止諸侯在列穆穆焉顒顒焉交喜氣於三靈動歡心於萬類者也臣等竊窺朝典既逢嘗麥之辰旋顧野誠輕襲獻芹之禮謹上食若干舉如列滋疏鶴鼎味劣魚庖何以延萐蒲之涼契芝英之壽無任誠懇之至謹奉表隨進證聖元年正月詔十七日御端門賜酺宴十六日明堂後掖佛堂災延燒明堂至明並盡左拾遺劉承慶諫曰明堂宗祀之所今忽被災陛下宜輟朝停酺以答天譴天后欲責躬避正殿納言姚璹進曰此實人火非曰天災至如成周宣榭火卜代逾長漢武建章宫災盛德彌永今明堂乃是布政之所非宗廟之地陛下將避正殿於大禮有乖從之乃御端門賜宴二十二日以災告廟下制遣內外文武九品以下上封事極言正諫無有所諱于是劉承慶上疏曰日者變生人火損及神宫驚惕聖心震動黎庶臣謹按左氏傳曰人火曰火天火曰災人火因人而興故指火體而稱天火不知所起直以所災言之其名雖殊為害不别王者舉措營為必關幽顯幽謂天道顯謂人事幽顯迹通天人理合今工匠宿藏其火本無故燎之心明堂教化之宫復非延燼所及孽煨潛扇倐忽成災雖則因人亦關神理臣愚以為所營佛舍既僻在明堂之後又前逼牲牢之筵兼以厥治崇大功多難畢立像𢎞法本擬利益黎元傷財役人却且煩勞家國聖人動作必假天人之助一興功役二者俱違厥應昭然殆將緣此臣以為明堂是正陽之位至尊所居展禮班常崇化立政玉帛朝會神靈依憑營之可曰大功損之實非輕事既失嚴禋之所復傷孝理之情豈合承恩耽樂安然酺宴但以火氣初止尚多驚懼餘憂未息遽以歡事逼之臣恐憂喜相爭傷于情性故傳曰可憂而樂取憂之道夫火陽氣歡樂陽事火氣方勝不可復興陽事臣聞災變之興至聖不免聿修其德來患可禳也陛下垂制博訪詳求至理而左史張鼐以為火流王室彌表大周之祥通事舍人逢敏奏稱當彌勒成佛道時有天魔燒宫七寶臺須臾而壞斯實諂佞之邪言實非君臣之正論掩昧王化無益萬幾審其致災之理詳其降眚之由無戾天人之心而興不急之役則兆人蒙賴福祿靡窮其年三月又令依舊規制重造凡高二百九十四尺東西南北廣三百尺上施寶鳳俄以火珠代之明堂之下圜繞施鐵渠以為辟雍之象至天册萬嵗二年三月二日成號通天宫萬嵗通天元年四月三日鑄九鼎成置于明堂之庭各依四方列焉神州鼎名永昌高一丈八尺受一千八百石冀州鼎名武興雍州鼎名長安兖州鼎名日觀青州鼎名少陽徐州鼎名東源揚州鼎名江都荆州鼎名江陵梁州鼎名成都八州鼎各高一丈四尺受一千二百石用銅二十六萬七百一十二斤鼎上各寫本州山川物産之像仍令著作郎賈膺福殿中丞薛昌容鳳閣主事李元振司農録事鍾紹京等分題之左尚方令曹元畫仍令宰相諸王率南北宿衛共二十餘萬人并仗內大牛白象曳之自玄武門外曳入天后自製曳鼎歌調令曳者唱和焉其時又造大儀鐘斂天下三品金竟不成九鼎初成制令以黃金千兩塗之納言姚璹諫曰夫鼎者神氣貴在質朴自然無假别為浮飾臣觀其狀先有五彩輝煥錯雜其間豈待金色方為炫耀從之開元二年八月十八日太子賓客薛謙光獻東都九鼎銘其神州銘武后所制文曰羲農首出軒昊膺期唐虞繼踵湯禹乘時天下光宅海內雍熙上玄降鑒方建隆基紫微令姚崇等奏曰聖人啓運休兆必彰請宣付史館詔從之開元五年正月幸東都及將行大享之禮太常少卿王忠仁太常博士馮宗陳貞節陳貞節議載文苑英華等咸以則天所造明堂有乖典制奏議曰明堂之建其所從來逺矣天垂象聖人則之蒿柱茅簷之規上圓下方之制考之大數不踰三七之間定之方中必居丙巳之地者豈非得房心布政之所當太極上帝之宫乎按漢武初議立明堂于長安城南遭竇太后不好儒術事乃中廢孝成之代又欲立于城南議其制度莫之能決至孝平元始四年創造南郊以申嚴配其後常取丙巳者斯蓋百王不易之道也高宗天皇大帝議明堂制度久之不決因而遂止者何也非謂財不足力不堪也將以周孔既遙禮經且紊事不師古或爽天心難以作程神不孚祐者也則天太后總禁闈之政藉軒臺之威屬皇室中圯之期攝和喜從權之制以為乾元大殿承慶小寢當正陽已午之地實先聖聽斷之宫表順端門儲精營室爰從朝享未始臨御乃起工徒挽令摧覆既毁之後雷聲隱然衆庶聞之或以為神靈感動之象也于是增土木之麗因府庫之饒南街北闕建天樞大儀之制乾元遺址興重閣層樓之基煙焰蔽日梁柱排雲人斯告勞天實貽誡煨燼甫爾遽加修復况乎地殊丙巳未答靈心迹匪膺期乃申嚴命事昧彝典神不昭假英華本尚有數十字况兩京上都萬方取則而天子闕當陽之位聽政居便殿之中職司其憂豈容沈默當須審巧厯之計擇煩省之宜不便者量事改修可因者隨而適用削彼明堂之號克復乾元之名則當寧無偏人識其舊矣詔令所司詳議奏聞刑部尚書王仁惠等奏議咸請改易依舊造乾元殿乃下詔改明堂為乾元殿每臨御宜依正殿禮自是駕在東都常例以元日冬至于乾元殿受朝賀竟無改易唯改其門名而已至十年十月十五日復題乾元殿為明堂而不行饗祀之禮至二十六年十月二日詔將作臣康辨素往東都毁明堂辨素以毁拆勞人遂奏請且拆去上層卑于舊制九十五尺又去柱心木平座上署八角樓樓上有八龍騰身捧火珠珠又小于舊制周圍五丈覆以貞瓦取其永逺依舊為乾元殿其時訛言官遣取小兒埋于明堂之下以為厭勝之法村邑兒童藏于山谷上惡之乃令主客郎中王佩宣慰久之乃定先是貞觀十七年七月京師訛言遣棖掁殺人以祭天狗遽相驚怖月終乃定又天寶五年三月十七日冇流星如月墜于東南有聲京師訛言官遣棖棖捕人心肝以祭天狗人相驚恐發使安之乃定唐會要卷十一
