body:
  text: 唐㑹要卷九十六宋王溥撰契丹契丹居潢水之南黄龍之北鮮卑之故地君長姓大賀氏勝兵四萬三千人分為八部好與奚鬬死無服紀子孫死父母晨夕哭父母死子孫不哭餘風俗與突厥同武徳四年二月遣使貢名馬豐貂貞觀二十二年豪長窟哥等部落咸請内附又契丹有别部長名孫敖曹者武徳四年與靺鞨豪長突地稽俱請内附詔令營州城傍安置至曾孫萬榮通天年中與妺壻李盡忠殺營州都督趙翽據營州作亂盡忠本窟哥之壻也則天怒改萬榮為萬斬盡忠為盡㓕尋自稱無上可汗以萬榮為大将及盡忠死萬榮領其衆焉初令曹仁師討之全軍敗績又令王孝傑繼之孝傑没於陣攻陷冀州俄為奚及突厥掩擊其後張九節設伏以擊之遂單馬宵遁為其奴斬之開元二年李盡忠從父弟失活請歸欵復封失活為松漠都督授左金吾衛大将軍仍于其府置靜析軍五年十二月以永樂公主出降失活親迎之夜遣諸親髙品及兩蕃大首領觀花燭六年失活卒𤣥宗為之舉哀贈特進冊立其從父弟娑固為松漠郡王至十年十一月娑固與公主来朝宴于内殿及歸娑固衙官可突于勇悍得衆娑固欲除之而事泄可突于攻之娑固奔營州可突于立娑固從父弟鬱于為主鬱于遣使謝罪𤣥宗復冊立鬱于令襲娑固之位仍赦可突于之罪至十年鬱于朝請婚又封餘姚縣主長女慕容氏為燕郡公主以妻之封鬱于為松漠郡王授左金吾員外大将軍兼静析軍經畧大使鬱于死立其弟咄于襲其官爵復以燕郡公主為妻十三年咄于復與可突于相猜阻携公主来奔改封遼陽王國人立其弟邵固其冬邵固詣行在從至東嶽拜左羽林員外大将軍改封廣化郡王仍封宗室外甥陳氏女為東華公主以妻之十八年邵固為可突于所殺以其衆降突厥東華公主走投平盧軍詔遣信安王禕幽州長史薛楚平等討之皆不尅二十二年六月幽州節度使張守珪大破之遣使獻㨗勅曰邊境為患莫甚于東隅朝廷是虞㡬煩于将帥積年逋誅一朝剪滅則東方將寖以廓清河朔之人差寛征戍此皆上憑九廟之靈下賴羣帥之功今具凱旋敢不以獻冝擇日告九廟所司准式其年十一月幽州節度使張守珪發兵討契丹斬其王屈列及其大臣可突于等傳首東都餘衆及叛奚皆散走山谷立其豪長李遇折為契丹王仍授特進封東平郡王其年遇折又為可突于黨泥禮所殺唯一子刺乾走投安東獲免拜左驍衛将軍自後與奚王朝貢歲至蕃禮甚備貞元四年復犯我北鄙幽州以聞九年十二月遣使朝貢十年正月遣使朝貢其年二月勅幽州道入朝契丹大首領梅落拽河等五人並可果毅都尉次首領王下詔活薛儞君等一十六人並可别将放還國十一年十月契丹大首領熱蘇等二十五人来朝元和八年遣使朝貢九年十一月契丹大首領梅落鶻劣来朝十年十一月契丹遣使梅落饒劣等十九人来朝貢十二年十一月契丹首領介落等朝貢以告身一十九通賜其貴人太和九年十一月契丹大首領二十九人来朝賜物各有差開成元年十一月契丹大首領涅列壊等三十一人来朝四年十二月契丹大首領薛葛等三十人来朝㑹昌二年九月制契丹新立王屈戍可雲麾将軍守右武衛将軍員外同正幽州節度使張仲武奏契丹新立王屈戍等云契丹舊用迴鶻印今懇請當道聞奏乞國家賜印伏望聖慈允許勅㫖宜依乃以奉國契丹之印為文奚奚盖匈奴之别種所居亦鮮卑之故地在京師之東北勝兵三萬分為五部每部置俟斤風俗與突厥同通天年中契丹叛奚亦臣屬突厥兩國常為表裏號為兩蕃景雲元年其王李大輔遣使貢方物開元五年大輔入朝封饒樂郡王仍授為左金吾員外大將軍詔封外甥女辛氏為固安公主以妻之其年大輔與契丹首領李失活請復置都督府許之大輔卒弟魯蘇立十年詔魯蘇襲其兄官爵又封咸安公主之女韋氏為東光公主以妻之十四年改封魯蘇為奉誠王後為契丹衙官可突于所脅走投榆闗移其部落于幽州界安置五載又封其王娑固為昭信王仍授饒樂都督自大厯後朝貢時至貞元四年七月奚及室韋㓂振武十一年四月幽州奏破奚六萬餘衆太和元年其王饒樂府都督襲歸誠王梅落来朝加檢校司空放還蕃三年以奚首領索低為右武威衛將軍充檀薊兩州逰奕兵馬使仍賜姓李氏八年遣使朝貢十一年遣使獻名馬是後毎歲至今朝貢不絶或歲中三至故事嘗以范陽節度使為押奚契丹兩蕃使自至徳後其蕃臣多擅封壤毎優容之彼務自完不生邊事故二蕃亦少為冦其毎歲朝賀常各遣數百人至幽州則選其豪長三五十人走闕引見于麟徳殿賜以金帛遣還餘皆駐而舘之率以為常室韋室韋者契丹之别種附于突厥用角弓楛矢尤善射時聚弋獵事畢而㪚其人土著無賦稅人牽犁以種又按隋書室韋記云室韋有五部落一南室韋二北室韋三鉢室韋在北室韋之北四深莫怛室韋在北室韋之西北五大室韋在室建河之南深莫怛室韋之西北隋書曰大室韋之外名字改易不可詳悉突厥沙鉢可汗常以吐氏潘恎統領之然並契丹之别種也其南者為契丹在北者號室韋南室韋在契丹北三千里後魏書云自契丹路經啜水盖水犢了山莫山周囘三百里又經屈利水到其國也其地卑溼至夏則移向西貸勃次對二山多草木饒禽獸又多蚊蚋人皆巢居以避其患後漸分為二十五部其渠帥號餘莫不滿咄死則子弟代之無嗣則擇賢豪而立之盤髪衣服與契丹同乗牛車蘧蒢為室如突厥氊車之状渡水則束薪為栰或有以皮為舟者馬則織以草為韉結繩為轡寝則屈木為室以蘧蒢覆之移則載行以猪皮為服編木藉之氣候多寒田收甚薄無羊少馬多猪牛言語與靺鞨相通婚嫁之法二家相許婿輙盗婦持去然後送牛馬為聘婦人不再嫁以為死人之妻難以共居部落共為大棚人死置屍其上居䘮三年其國無鐵取給於髙麗南室韋北行十一日至北室韋分為九部落其渠帥號乞引莫賀咄氣候最寒冬則入山居穴中牛畜多凍死饒麞以射獵為務或沒水中而網取魚鼈地多積雪懼陷坑穽騎木而行俗皆捕貂為業冠以狐貉衣以魚皮又北行千里至鉢室韋依朔布山而住人衆多于北室韋不知為㡬部落用槿皮盖屋其餘同北室韋從鉢室韋西四日行至深末怛室韋因水為號也冬月穴居以避太隂之氣也又西北數千里至大室韋徑路險阻言語不同尤多貂及異䑕北室韋後魏武定隋開皇大業中並遣使貢獻大唐有九部焉所謂嶺西室韋山北室韋黄頭室韋大如者室韋小如者室韋娑葛室韋訥北室韋駱駝室韋並在栁城之郡東北近者三千五百里逺者六千二百里今室韋最西與迴鶻接界者有烏素固部落常居俱輪國之西南次東有移塞没部落次東又有塞曷支部落此部落有良馬人户亦多居啜河之南其河彼俗謂之燕支河又有和解部落次東又有烏羅䕶部落一名烏羅渾元魏謂之烏落居磨盖獨山北啜河之側此部落自魏太武真君四年厯北齊周隋及武徳已後朝貢不絶又有那禮部落與烏羅䕶犬牙而居又東北有山北室韋又有小如者室韋又北有娑葛室韋東又有嶺西室韋又東南至黄頭室韋北部落兵强人户亦多東北與達姤接嶺西室韋北又有訥北支室韋此部落小烏羅䕶之東北百餘里那河之右有古烏丸之遺人今亦自稱烏丸國武徳貞觀中亦遣使朝貢其國北大山之北亦有大車室韋部落其部落傍室建河居其河源出突厥東北界俱輪國屈曲東流經西室韋界又東經大室韋界又東經䝉兀室韋之北落怛室韋之南又東流與那河忽汗河合又東經南黑水靺鞨之北北黑水靺鞨之南東河注于海烏丸東南三百里又有東室韋部落在峱越河北東南流與那河合武徳八年遣使朝貢開元天寳中每數歲一遣使来朝及貢貂皮等物貞元八年閏十二月室韋都督和解熱素等一十人来朝貢太和五年至八年凡三遣使来朝貢九年十二月室韋大都督阿朱等三十人来朝貢開成元年十二月室韋大都督阿朱等三十人来朝進馬五十匹四年正月上御麟徳殿對入朝賀王室韋阿朱等十五人其年十二月室韋大都督秩蟲等三十人来朝貢㑹昌二年十二月上御麟徳殿引見室韋大首領都督熱論等十五人晏賜有差咸通元年正月上御紫宸殿受朝對室韋使靺鞨靺鞨者蓋肅慎之地也後魏謂之勿吉凡有數十部落各有豪長而黑水靺鞨最處北方尤稱徑㨗性凶悍無憂戚無文字其畜宜猪食其肉而衣其皮渤海靺鞨本髙麗别種後徙居營州其王姓大氏名祚榮子武藝貞觀十四年黑水靺鞨遣使朝貢以其地為黑水州武徳三年其部豪長突地稽遣使朝貢以其部置燕州拜突地稽為總管貞觀初髙開道引突厥来攻幽州突地稽力戰有功拜左衛将軍賜姓李氏封耆國公尋卒子謹行武力絶人麟徳中累遷營州都督右領軍大将軍為積石道經畧大使上元三年大破吐蕃衆數萬于青海之上降璽書勞仍賜燕國公永淳元年卒贈幽州都督陪𦵏乾陵自後或有豪長自来或遣使朝貢每歲不絶其白山部素附于髙麗因收平壤後郡衆多入于中國汨咄安居骨室等部亦因髙麗破後奔散㣲弱今無聞焉縱有遺人並為渤海編户惟黑水部全盛分為十六部落又以南北為柵開元十三年安東都䕶薛泰請于黑水靺鞨内置黑水軍續更以最大部落為黑水府仍以其首領為都督諸部刺史𨽻屬焉中國置長史就其部落監領之十六年其都督賜姓李氏賜名獻誠授獻誠雲麾将軍兼黑水經畧使仍以幽州都督為其押使自此朝貢不絶舊説黑水西北有思慕靺鞨正北㣲東十日程有郡利靺鞨東北十日程有窟説靺鞨亦謂之屈説東南十日程有莫曳皆靺鞨在黑水靺鞨界南近渤海國徳里府北至小海東至大海西至室韋南北約二千里東西約一千里其國少馬國人能步戰土多貂䑕皮尾骨咄角白兎白鷹等初太宗謂侍臣曰靺鞨逺來葢因突厥朕之所致也昔周宣之時獫狁孔熾出兵驅逐比之蚊蚋議者以為中䇿漢武帝北事匃奴中國虛竭議者以為下䇿秦始皇北築長城人神怨憤議者以為無䇿然則自古以来其無上䇿乎朕承隋之弊而四夷歸伏無為而治得非上䇿乎禮部侍郎李百藥進曰陛下以武功定四海以文徳綏萬物至道所感格于天地斯盖二儀降福以祚聖人豈與周漢失䇿校其短長哉太宗大悦其拂湼鐵利等諸部落自國初至天寳末亦嘗朝貢或隨渤海使而来唯郡利莫曳皆三兩部未至及渤海寖强黑水亦為其所屬貞元八年閏十二月渤海押靺鞨使楊吉福等三十五人来朝貢十年二月以来朝渤海王子大清允為右武衛將軍同正十一年十二月以靺鞨都督宻阿古等二十二人並拜中郎将放還蕃至十四年三月加渤海郡王兼驍衛大将軍忽汗州都督大嵩璘為銀青光祿大夫檢校司空冊為渤海國王依前忽汗州都督初嵩璘父欽茂以開元二十六年襲其父武藝忽汗州都督渤海郡王左金吾大将軍天寳中累加特進太子詹事寳應元年進封欽茂為渤海國王大厯中又累拜司空太尉及嵩璘嗣位但授以郡王将軍嵩璘遣使叙理故加冊命焉至元和四年以渤海國王大嵩璘男元瑜為銀青光祿大夫檢校秘書監忽汗州都督依前渤海國王七年十二月遣使朝貢八年又遣使朝貢十年二月黑水豪長十一人朝貢十一年三月渤海靺鞨遣使朝貢賜其使二十人官告鐵勒鐵勒者本匃奴之别種武徳初有薛延陁契苾迴紇都播骨利幹多覽葛僕骨㧞野古同羅渾部思結斛薩奚結阿跌白霫等散在磧北皆鐵勒之部内諸郡隋大業中西突厥處羅可汗強鐵勒諸部皆臣之後處羅徴税無度鐵勒相率而叛歸及頡利政亂皆屬于薛延陁貞觀二年既破延陁太宗幸靈州次涇陽縣鐵勒迴鶻抜野古同羅僕骨多覽葛思結阿跌契丹奚渾斛薩等十一姓各遣國歸貢獻乃稱延陁可汗不事大國暴虐無道不能為吾軰主以自死敗部落鳥散不知所之吾等各有分地不能逐延陁去也歸命天子願賜哀憐乞置漢官司養育是時太宗以破延陁欲遂空漠庭見其使至甚悦遣黄門侍郎褚遂良引至縣廳浮觴積肉以禮之夜分乃散異日召鐵勒等並入行宫張樂以宴之拜為郎将及昭武校尉等官乃降璽書勞其豪長及賫綾錦等以将厚意仍遣與乗輿㑹于靈州幷使右領軍中郎将安永夀往報焉十一月太宗至靈州鐵勒諸部俟斤頡利發等諸姓至靈州數千人咸請列其地為州縣又曰願得天至尊為臣等作可汗可汗子孫嘗為天至尊臣屬死無恨于是北荒悉平太宗為賦詩以叙其事公卿咸請勒于石從之二十一年正月鐵勒迴紇俟利兹等諸姓並同詣闕朝見太宗親賚其緋黄瑞錦及標領袍鐵勒等觀而驚駭以為未嘗聞見捧戴拜謝盤舞於塵埃中及還蕃太宗御天成殿陳十部樂而遣之麟徳中餘黨復叛乾封元年三月鐵勒道行軍大總管右武衛大将軍鄭仁泰左武衛大将軍薛仁貴破鐵勒之衆于天山初泰等将發賜内宴以餞之積甲于殿前令仁貴試之帝曰古之善射能有穿七扎者卿且射五重仁貴射而撤之帝大驚賞取甲以賜之時九姓有衆十餘萬令驍健數千人逆来挑戰仁貴發三矢射殺三人其餘一時下馬請降仁貴恐為後患並坑殺之更就磧北討餘衆擒其偽葉䕶兄弟三人而還軍中歌曰将軍三箭定天山戰士長歌入漢關是後遂絶薛延陁薛延陁者自云本姓薛氏其先擊滅延陁而有其衆因號薛延陁其風俗與突厥同延陁乙失鉢之孫曰奚男率其部落七萬家附于頡利頡利亂磧北諸姓多歸奚男共推為可汗貞觀二年太宗使喬師望冊為毘伽可汗賜之鼓纛奚男遂建衙于大漠之北鬱督軍山下三年遣其弟繞特勒来朝上賜以寳刀及寳鞭謂曰汝所部有大罪斬之小罪鞭之及平頡利奚男東反故國建庭于都尉犍山北獨邏河之南即古匈奴之故地勝兵二十萬仍立其子為南北部太宗恐其太盛冊其子皆為小可汗外示優崇實欲分其勢也㑹朝廷立李思摩為可汗處其部衆于漠南之北奚男心不悦十五年太宗将有事太山奚男謀于國曰天子東封士馬皆集我乗此擊思摩若拉朽耳因命其子大度設勒兵二十萬冦白道州詔李勣薛萬徹討之大敗其衆十六年遣使謝罪請婚許之妻以新興公主仍令備親迎之儀太宗欲幸靈武以㑹之奚男竟後期不至乃絶其婚十七年奚男卒其後子㧞灼襲位㧞灼性𥚹其下多不附尋舉衆復冦邊二十年三月上命夏州都督喬師望右領軍大将軍執失思力討延陁大破之斬獲二千餘人六月鐵勒僕骨同羅共擊延陁大敗之太宗以其數與思摩交兵乃降璽書責讓之又謂其使曰語爾可汗我天子能東征髙麗汝若能冦邊者但當来也可汗遣使致謝請發兵来助太宗答以優詔而止其兵及太宗㧞遼東諸城破駐蹕之陣降髙延夀聲震戎狄而莫離支潜令靺鞨誑惑延陁啗以厚利延陁氣懾不敢動太宗在安市城謂邊臣曰以我量之奚男其死矣聞者莫測俄然真珠毘伽可汗死其少子肆葉䕶殺其兄突利失可汗而自立是謂頡利俱利薛娑多彌可汗而車駕尚在遼東邊境闕備遂發兵㓂夏州執失思力擊敗之多彌可汗輕騎遁走部内騷然矣多彌可汗馭下少恩廢其父時貴臣任已親暱多所殺戮其下不附國中震恐皆不自安時太宗别令校尉宇文法詣烏羅䕶靺鞨部適遇延陁阿波設等于東境法乃率靺鞨進擊破之阿波設謂其國人曰唐兵至矣其衆轉相驚擾如是二旬諸部大亂多彌可汗與數十騎往投阿史那時健部落尋為迴紇所殺宗族殆盡其餘尚存五萬竄于西域而立真珠毘伽可汗猶子咄摩支為豪帥乃去可汗之號遣使奉表請居鬱督軍山之北使兵部尚書崔敦禮英國公李勣就安輯之太宗謂曰叛則擊之勣等就至咄摩支惶駭不知所為潜謀欲戰持兩端因縱兵遣擊前後斬五千餘級獲男女二萬餘人後咄摩支入朝拜為右武衛将軍及卒太宗為發哀初延陁請以其庶長子曳莽為突利失可汗居東方所統者雜種嫡子㧞灼為肆葉䕶可汗居西方所統者皆延陁詔許之並禮以冊命曳莽自知非正嫡部落又少恩意常不愜徃徃憂悚而輕用兵白道之役即曳莽唱首㧞灼貳之延陁之卒皆来㑹𦵏焚屍卒哭曳莽懼㧞灼圗已先還㧞灼引兵自後襲殺之延陁以貞觀初建衙于磧北厯三主凡二十年李勣崔執禮滅之總章二年十二月延陁部落餘衆擾亂詔發突厥進襲至烏羅徳健山大破之唐㑹要卷九十六
