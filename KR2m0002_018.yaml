body:
  text: 唐㑹要卷十八宋王溥撰緣廟裁制下貞元九年九月制昭德皇后廟神座褥改用紫初昭德廟褥出自禁中因以赭黃至是太常卿裴郁奏請九室神座褥並請用昭德色上謂以尊後卑不許十二月太常博士韋彤裴堪等議曰謹按禮經前代故事宗廟無朔望祭食之儀園寢則有朔望上食之禮國家自貞觀至開元修定禮令皆遵舊典至天寶十一年三月初别令上食朔望進食於太廟自太廟已下每室奠饗其進奠之禮內官主之在臣禮司並無著令或云當時祀官王璵不本禮意妄推緣坐之義請用宴私之饌此則可薦於寢宫而不可瀆於太廟一時之制久未變更至今論禮者貶王璵之議伏奉今月八日進止其朔望進食宗正與太常計㑹辦集者伏以陛下䖍奉宗廟齊心自中事歸有司各令盡敬然後詳議故實臣得竭誠謹按祭統云夫祭者非外至者也自中出生於心者也心怵而奉之以禮由是牲牢有定制籩豆有定數罄天生地長之物極昆蟲草木之異可薦者莫不咸在先王以此享宗廟交神明全孝敬也生人之食飲膳羞八珍異品可嗜之饌隨好所遷美脆㫖甘皆為䙝味先王以此宴賔客接人情示慈惠也則知薦享宴㑹於文已殊聖人别之以異為敬今若以熟食薦太廟恐違禮本又祭義曰祭不欲數數則煩煩則不敬祭不欲疏疏則怠怠則忘是故禴祠蒸嘗感時致享此聖人俯就之中制也今園寢每月二祭不為疏也太廟每嵗五饗不為數也則人臣執事在疏數之間得盡其忠也若令牲牢俎豆之司更備膳羞盤盂之饌朔日月半將以為常環四時之中雜五饗之禮為數既甚黷亦隨之雖曰不然臣不信也夫聖王之制必師於古訓不敢以孝思之極而過於禮不敢以殽膳之多而䙝於味伏願陛下遵開元萬代之則省天寶權宜之制園寢之上得極珍羞宗廟之中請依正禮臣等忝司禮職敢罄愚衷上令宣示宰相臣等曰此禮已經先朝所定朕未敢遽有改移待更商量期於允當至元和十四年二月太常丞王諲上疏請去太廟朔望上食詔令百官詳議開元禮太廟每嵗禴祀蒸嘗禮凡五饗天寶末𤣥宗以尚食錢每朔望具常饌而令宫闈令上食於太廟後遂為常由是朔望不視朝比於大祀故也國子博士史館修撰李翺奏議曰國語曰王者日祭禮記曰王立七廟皆月祭之周禮不載日祭月祭惟四時之祭禴祀蒸嘗漢氏皆雜而用之蓋遭秦火禮經燼滅編殘簡缺漢乃求之先儒穿鑿各申己見皆託古聖之名以信其語故其記各不同也古者廟有寢而不墓祭秦漢始建寢廟于園陵而上食焉國家因之而不改貞觀開元禮並無宗廟日祭月祭之禮蓋以日祭月祭既已行於陵寢矣故太廟之中每嵗五饗六告而已不然若房𤣥齡魏徴之徒皆一代名臣窮極經史豈不見國語禮記有日祭之辭乎斯足以明矣伏以太廟之享籩豆牲牢三代之通禮是貴誠之義園寢之奠改用常饌秦漢之權制乃食味之道也今朔望上食於陵寢循秦漢故事斯為可矣若朔望上食於太廟豈非用常䙝味而貴多品乎且非禮所謂至敬不饗味而貴氣臭意也𫝊稱屈到嗜芰其疾召其室老而屬之曰祭我必以芰及薦芰其子屈建命去芰而用羊饋籩豆脯醢君子韙之言事祖考一義不當以其生存所嗜為獻蓋明非食味也然則薦常饌於太廟無乃與薦芰為比乎且非三代聖王之所行也况祭器不設俎豆祭官不命三公執事者惟宫闈令與宗正卿而已謂之上食可也安得以為祭乎且時饗於太廟有司攝事祝文曰孝曾孫皇帝臣某謹遣太尉臣名敢昭告於髙祖神堯皇帝祖妣太穆皇后竇氏時維孟春永懷罔極謹以一元大武柔毛剛鬛明粢薌合薌萁嘉蔬薦嘉醴齊敬修時饗以伸追慕尚享此祝祠也前饗七日質明太尉誓百官於尚書省曰某月某日時享於太廟各揚其職不供其事國有常刑凡陪饗之官散齊四日致齊三日然後乃可以為祭也宗廟之禮非敢擅議雖有知者其誰敢言故六十餘年行之不廢今聖朝以弓矢既櫜禮樂為大故下百寮使得詳議臣等以為貞觀開元禮並無太廟上食之禮以禮斷情罷之可也至若陵寢上食採國語禮記日祭月祭之詞因秦漢之制循而存之以廣孝道如此則經義可據故事不遺大禮既明永息異論可以繼二帝三王而為萬代法與其黷禮越古貴因循而憚改作猶天地之相逺中書舍人武儒衡議曰臣謹按開元禮太廟九室每年惟五饗六告祭用牲牢俎豆而已劉歆祭義曰大禘則終王壇墠則嵗貢二祧則時享髙曾則月祀祖禰則日祭國語云王者日祭月祭饗時類嵗祀此則往古之明徴國朝之顯據蓋日祭者薦新也言物有可薦則薦之不必其擇時也故叔孫通云古有常果今櫻桃方熟可以為獻由是惠帝取以薦宗是不卜日矣當時叔孫通之言且曰有常果即明古禮非漢制也月享者告朔也論語子貢欲去告朔之餼羊孔子以為不可則告朔必具牲牢明矣春秋又譏閏月不告朔猶朝于廟此則月祭殷周已降皆有之也薦園寢者始於秦代漢氏因之而又改人君三年之際以日易月喪紀既已二十七日而除則朔望奠酎不復親執故既葬之後移之園陵祠殿月逰衣冠取象平生務從豐潔所以陵寢朔望上食與太廟日祭月享本㫖不同今王諲所引太廟同日時設祭以為越禮臣竊謂王諲但宜論太廟陵寢朔望奠祭可廢之㫖不當以用日時為議何者漢宗園陵一百六十七所郡國祠祝豈不與宗廟同日同時者乎在禮既祭於室又繹於祊蓋廣乎求神者也則宗廟陵寢嘗礿同時理固無害又韓臯引漢官儀古墓祭韓臯議狀檢不獲臣據周禮冡人之職凡祭墓則為之尸古亦墓祭但與漢家陵寢不同耳安得謂之無哉又王諲狀以太廟設祭别加常饌以為䙝味而韓臯則云法饌依經固非黷敬臣按春官太宗伯以三獻祼饗先王三者謂解牲體薦血腥灌之以鬱鬯者也又祭義曰祭之日君牽牲入廟門麗于碑卿大夫袒而割牛尚耳膟膋祭腥敬之至也夫豈謂常饌耶蓋盡其禮而無過失焉所以然也是簠簋有數籩豆有殺雖多更聖賢不敢加也今夫常饌庖人羞之膳夫㸐之揉以羶香雜以鹹辛不具有司之享黷神明于媟近意雖不䙝而事已䙝矣况古者天子立七廟又為壇墠以祭去祧之主近則起土逺則掃地蓋彌逺而彌尊益敬而益簡臣以為陵廟近也親親也朔望奠獻尚務豐潔宜備常膳以廣孝也宗廟逺也尊尊也禘祫時饗告朔薦新崇古制以正禮也惟太廟望祭無所本據蓋異時有司因其陵寢有朔祭望祭以為宗廟既有朔祭則望祭亦合行之殊不知宗廟朔祭乃告朔也臣以為宜罷此耳仲尼三年無改於父之道蓋言理有更改則三年之外斯可矣天寶之令行于一時而已今陛下紹十聖之景光廓八紘之氛祲風掃長彗神驅大妖銷金㦸以厚農直玉斗而序政博采羣議詳求典經將欲成一王之教垂萬代之法安可因陵寢緣情取象之禮黷宗廟薦鬯設饌之儀甚不然也事竟不行元和元年十二月禮儀使髙郢奏六典凡駕行幸有夜警晨嚴之别今署司所申是并警亦呼為嚴相承已久樂官不能辨伏奏開元禮皇帝時饗太廟及上辛祈穀於圜丘皆於正殿致齊第三日欲赴行宫前七刻五刻二刻有三嚴之儀並無五更三㸃以前四嚴及駕至橋一嚴之文伏請勒停凖禮依時刻三嚴又其時所設宫懸懸而不作鑾駕進發不鳴鼓吹至祀日太廟饗禮畢鑾駕欲發及南郊行事鑾駕還宫之時然後各有三嚴皇帝既還大次停一刻須捶一鼓為嚴三刻須捶二鼓為再嚴五刻須捶三鼓為三嚴往例儀注皆凖此禮鼓吹署所申並與禮文不同又都不知凖禮是行事畢有三嚴之制伏以立禮之㫖務於精誠鑾駕出宫在祀前之日猶懸而不作不鳴鼓吹况祠所齊潔明發行事此夜誠合清淨不應鉦鼓喧譁其鼓吹署所申四嚴及臨上壇一嚴伏請勒停其行事畢後南郊回請凖禮依時刻三嚴太廟宿其後不嚴及南郊回於明德門裏鼓吹引駕至丹鳳門二年九月中書門下上言先王制禮皆有著定之文後人沿情或狥一時之敬過猶不及遂至于煩有司參酌禮意若無釐革稍黷舊章其太廟諸陵薦新諸陵節日遣使臣等商量請每除太廟時饗及朔望上食諸陵朔望奠親陵朝莫脯外餘享祀及忌日告陵等並停其果實甘橘蒲桃菱梨逺方所進並請遣使於諸陵薦獻果實之中甘瓜特異亦請上薦其餘瓜果四時新物並委陵令與縣司計㑹及時薦獻其𫝊使亦停制可三年四月太常禮院上言太廟時享及告廟朔望薦食同日謹按禮經祭不欲數伏以太廟禘祫祭禮重於時享凖禮時享與禘祫同月即其月但行禘祫不行時享蓋不欲煩是禮先重者今時享重於朔望薦食稽求禮情參輕重於時享之月朔望薦食亦合便停若兩禮並行即祭恐煩黷伏請每至時享及臘享但行享禮其月朔望薦食請停餘月一凖舊例如告廟日與朔望薦食日同伏請先行告禮然後薦食即冀疏數有節合於禮令從之四年九月監察御史劉遵古奏太廟五享攝祭三公等伏凖開元二十五年七月八日敕每至五饗之日應攝三公令中書門下及丞相師傅尚書御史兼嗣郡王擇德望髙者通攝諸司不在差限者伏以太廟攝祭公卿凖敕令先差僕射尚書及師傅等如無此色官然後次差諸司三品比來吏部因循不守敕文用人稍輕伏請起今年冬季已後勒吏部凖敕差定如僕射尚書等闕即差京師三品職事官充敕宜依十五年六月敕今月十二日祔享太廟闕憲宗皇帝室祝版劃睿宗皇帝室祝版勾當點檢并進署官知廟宗正少卿嗣寧王李子鴻監察使監察御史崔鋭太常博士王彥威等各得欵狀敕宗廟之禮嚴肅是先薦告之詞精審為切方將升祔安可九室皆同既已祧遷豈宜四昭咸在李子鴻專司廟事錯進祝文罪有根源理難降減宜停見任博士既失於詳定御史又曠其監臨若不薄懲恐乖至當王彥威罰兩月俸料仍削一階崔鋭罰一季俸料仍削兩階餘並釋放已後有禮合變文事宜中節者太常博士不得更稱舊例致令差殊當舉嚴科别有處分故事將祔禮先告於廟庭跪奉八室曰以今吉辰某皇帝神主祔謁遂奉神主詣第七室祔享而不再告享畢祔於第九室設安神之奠而進之然則告太廟者以孫祔於祖尊不得伸也是時憲宗神主升祔宰臣不詳舊典令有司再告祔禮於太極殿禮官執議不定適屬宗正寺進祝版誤以憲宗尊號為睿宗御史博士職當省察不知其誤宰臣兼怒之下詔削罰而變其舊禮時甚非之長慶元年七月監察御史路羣奏今月九日孟秋時享太廟攝太尉國子祭酒韓愈凖式於太廟致齊今於本寺監省有違格式敕宜罰一季俸太和二年享敬宗皇帝祝文稱皇孝弟太常博士崔龜從奏議曰臣審詳孝字載在禮文儀本主于子孫理難施於兄弟按禮記卜虞之文子孫曰哀兄弟曰某然則虞之稱哀與祭之稱孝其義一也於祖禰則禮宜稱孝於伯仲則止可稱名又東晉溫嶠議宗廟祝詞言孝字非子孫則不稱若旁親則言告故當時朝議咸以為宜今臣上考禮經無兄弟稱孝之義下徴晉史有不稱旁親之文臣謂享敬宗廟宜去孝弟兩字從之五年五月太廟第四室六室缺漏上怒罰宗正卿李鋭將作監王堪乃詔中使補葺之右補闕韋溫上疏曰臣聞吏舉其職國家所以理事歸於正朝廷所以尊夫設制度立官司事存典故國有經費而最重者奉宗廟也伏以太廟當修詔下逾月有司弛慢曾不用心宜黜慢官以懲不恪之罪擇可任者責以繕完之功此則事歸於正吏舉其職也而聖思不勞百職無曠今慢官不恪止於罰俸憂軫所切使委內官是許百司之官公然廢職以宗廟之重為陛下所私羣官有司便同委棄此臣竊為聖朝惜也事關宗廟皆書史冊茍非舊典不可率然伏乞更下詔書委所司營繕則制度不紊官業交修疏奏乃罷中使修葺開成五年五月太常禮院奏宣懿皇太后祔廟伏惟開元禮有皇后祔廟牲牢樂懸典太廟享一室禮同今宣懿皇太后饗禮伏請宣下敕㫖宜依其年六月太常禮院奏宣懿皇太后寶冊函按晉太武帝追尊簡文鄭太后問冕旒璽綬歸藏何處徐邈答云臣按太始元年追尊四年太后崩及開陵合葬其綬藏於陵中是元不埋之也臣謂今藏於廟中宜合前事凖國朝故事讓皇帝及增諸太子寶册並隨神主于廟中安置敕㫖宜依大中三年十二月詔曰太常博士李稠所進狀言追尊順宗憲宗諡號禮官請别造神主及改題事請集通儒詳定者宜令都省集議聞奏于是右司郎中楊發都官郎中盧摶都官員外郎劉彥謨等五人議曰臣等伏以栗主升祔之後在禮無改造之文亦無重加尊諡改題神主之例求之曠古敻無其文周加太王季歷文王但以德合王周遂加王號未聞改諡易主且文物大備禮法可稱最在兩漢並無其事光武皇帝中興定都洛陽遣大司馬鄧禹入關奉髙祖已下十一帝后神主至洛陽當草昧之時兵力艱乏專遣奉迎時神主不合新造故也事厯魏晉下及周隋雖易代一旅之君亦有講學知禮之士皆不聞加諡追尊改主重題書在史策可覆視也今惟引東晉重造鄭太后神主事為證伏以鄭太后本琅邪王妃薨後已祔琅邪邸廟其後母以子貴將升祔太廟賀循請重造新主改題皇后之號備禮告祔當時用之伏以諸侯廟主與天子廟主長短不同若以王妃八寸之主配至極尤似不同時諂神貪君之私用此謬禮改造神主比量晉事又絶非宜且宣懿非穆宗之后實武宗之母以子之貴已祔别廟正為得禮享薦無虧今若從祀至尊題主稱為太后因臣因子正得其宜今乃别造新主題去太字即是穆宗止倦之後臣下追致妃嬪之禮黷亂正經實驚有職臣當時並列朝行知其謬戾伏以漢律擅論宗廟者以大不敬論又其時無詔下訪遂默塞不出言今又欲重用東晉謬禮穢媟聖唐大典猥䝉下問故敢盡言又謹徴盛唐前例甚有明文國史云武德元年五月備法駕于長安門具禮舊廟奉迎宣簡公懿王景皇帝神主升祔太廟既言於舊廟奉迎足明必奉舊主矣其加諡追尊之禮自古本無其事自則天皇后攝政之後纍纍有之自此之後數用其禮厯檢國史並無改造及重題之文若重題易主不書于䇿臣等以為即當告新諡於廟而止不重題易主明矣今改造神主自古並無其事惟重題之禮國史有開元初太常卿韋縚奏以宗廟題后主云天后聖帝武氏一廟二帝事不師古請削去舊號直題云則天順聖皇后武氏詔從之則不知其時削去舊題乎追用何代之禮耶今禮之疑者決在聖慮伏俟奏聞以臣等所識當以新諡典冊告于陵廟正得其宜神主不改造不重題為得禮中書門下上言改造改題並無所據酌情順理題則為宜况今士族之家通行此例雖尊卑有異而情理則同望就神主改題則為通允敕㫖宜依配饗功臣貞觀禮祫享功臣配享于廟庭禘享則不配後特令祫禘之日功臣並得配享初太常卿韋縚等議功臣祫享之日配享於廟庭禘及時饗則皆不預其議遂行至開元初復令禘之日亦皆配饗非舊典也髙祖廟六人贈司空淮安靖王神通贈司空河間元王孝恭尚書右僕射鄖節公殷開山贈人部尚書渝襄公劉政㑹並貞觀十四年十月十五日敕贈司徒周定公武士彠顯慶四年三月七日敕文明元年停贈太子太師魏國公裴寂贈禮部尚書魯國公劉文靖並天寶六載正月十二日敕太宗廟七人贈太尉梁文昭公房𤣥齡贈司徒申文獻公髙士廉贈尚書左僕射蔣忠公屈突通並貞觀二十三年九月二十四日敕至永徽四年二月房𤣥齡以子遺愛反停配享贈太尉鄭文貞公魏徴神龍二年閏二月十五日敕太尉趙國公長孫無忌贈司徒衛景武公李靖司空萊成公杜如晦並天寶六載正月十二日敕髙宗廟六人贈太尉貞武公李績贈開府儀同三司北平定公張行成贈揚州大都督髙陽恭公許敬宗贈尚書右僕射髙堂忠公馬周並垂拱二年正月十一日敕其許敬宗神龍二年閏二月一日有敕停尚書右僕射河南文忠公褚遂良贈司徒蓨縣憲公髙季輔贈司徒樂城文獻公劉仁軌並天寶六年正月十二日敕中宗廟八人侍中譙國公桓彥範侍中平陽愍王敬暉中書令漢南郡王張柬之贈太尉博陸文獻王崔𤣥暐中書令尚郡王袁恕己並開元六年六月二十二日敕贈司空梁文惠公狄仁傑贈尚書左僕射齊貞公魏元忠贈太子少保琅邪郡公王同皎並天寶六載正月十二日敕睿宗廟二人贈司空許文貞公蘇瓌尚書左丞相徐文獻公劉幽求並開元六年六月二十三日敕𤣥宗廟三人贈太師燕文貞公張說贈太子少師代國公郭元振中書令趙國公王琚檢年月未獲肅宗廟二人贈太師韓文憲公苗晉卿大厯四年十月七日敕贈太尉獻穆公裴冕元和四年八月敕代宗廟一人贈太尉汾陽忠武王郭子儀建中二年十一月敕德宗廟二人贈太師西平忠武王李晟贈太尉忠烈公段秀實並元和四年八月敕贈太師忠武公渾瑊元和四年九月四日敕憲宗廟四人贈司徒宣懿公杜黃裳贈太師裴度㑹昌六年十月敕贈司徒威武公髙崇文太尉李訴㑹昌六年十一月敕蘇氏駮議曰配食之義用旌元勳讓協經綸功成締構君臣義重終始禮崇生成帶礪之恩死陪嚴敬之祀憲章三代垂範百王配饗功臣必資故實惟肅宗一室理有未安且肅宗北狩之時師統一旅初至靈武人心尚搖裴冕于草創之中建大義以勸進肅宗登宸極之後定物情於有君收募驍雄整備文物十萬之師坐致三千之儀無闕定社稷計允天下心獨處廟堂親承睿算蓋其踰月房太尉乃來洎乎隔年苗太師方至論其前後較然可知詳以勳勞不言而辨且裴冕贈太尉制詞云臨喪之儀不及于小殮從享之禮將配于大蒸敢徴前祠以禆闕典謁城佐命蕭何首出於漢朝配饗議功裴寂豈遺于髙廟若以苗太師從祀之後裴太尉乃薨則合同享廟庭豈雅符前例雜録貞觀十六年四月二十九日有司言將行禘祭請集禮官學士等議太常卿韋挺等一十八人議曰古之王者富有四海而不朝夕上膳於宗廟者患其過禮也故曰春秋祭祀以時思之至于臣有大功享祿其後子孫率禮潔粢豐盛禴祀蒸嘗四時不輕國家大祫又得配焉所以昭明其勳尊崇其德以勸嗣臣也其禘及時享功臣皆不應及故周禮大功之官皆配大蒸而先儒皆以大蒸為祫祭髙堂隆庾蔚之等多遵鄭學未有將為時祭者又漢魏祫祀皆在十月晉朝禮官欲用孟秋殷祭右僕射孔安國啓彈坐免官者不一梁初誤禘功臣右丞何修之駮議武帝允而依行降暨周齊俱遵此義竊以五年再殷合諸天道一大一小通人雅論小則人臣不及大則兼及有功今禮禘無功臣誠謂理未可易乃詔改令從禮祕書監顔師古議曰謹按祫者合食禘乃禘祭禘小于祫理則非宜商書稱從與大享周禮著祭於大蒸是知小祀不及功臣其事又無可惑魏晉已降未嘗釐革今欲改更實謂非宜六經莫見斯文三雍不揚其跡悠悠之論蔑足云也又尋古之配祭皆在於冬據其時月益明非禘况乎臣之立功各因所奉享祀之日從立升配禘之為祭自於本室廟主毁者不至太祖之庭君既不來而臣獨當祀列對揚尊極乃非所事豈容山河之誓務乎殷重霜露之感從于簡略論情即理孰曰可安今請祫配功臣禘即不及依經合義進退為允元和四年八月詔曰朕聞昔日之佐制物者咸有大功惟五官以配五帝自時厥後有國家者莫不以輔弼社稷之勳登名大蒸陪享清廟茍非茂德孰允盛儀贈太尉冕望重巖廊時為楨幹靈武艱阻首贊經綸宣力股肱􅊭心鼎飪佐戡定之成業推翼戴之嘉猷贈太師晟識精韜鈐神假雄武建中冦孽躬踐憂虞垂餌虎狼致威樽俎刷宫廟之塵穢回日月之光輝贈太尉秀實氣全柔剛節固金石凶渠僭逆摧蹶根萌矯命還師蹈刃決死紓阽危于怵迫挫狂狡之姦謀並材為時生用當運否感雲龍而應變炳辰象以降靈光復寰區振揚風槩勳業藏于盟府寵飾備於前朝光隆不追盛烈如在朕頃因郊祀妥舉異常俾舉茂勳以配殷祭惟咸有一德允屬乎三臣庶昭示于將來式崇恩於既往冕宜配饗肅宗廟庭晟秀實宜配饗德宗廟庭九月四日詔曰旌勸是先允協念功之義薦羞爰舉聿追配饗之儀贈太師渾瑊鍾秀誕靈逢時翼聖銘鏤金石帶礪山河績既著於先朝業宜光於後𦙍俾之從祀用表遺勳宜配享德宗廟庭㑹昌六年十月太常禮院奏十月十三日太廟祫享廟庭配享功臣得修撰官朱儔狀自髙祖至德宗每室並有功臣配享伏以憲宗皇帝誅蕩淮蔡削定河朔武功英略赫耀中興啓沃謀謨必資元輔其配享功臣伏請聞奏定名降下敕㫖宜令尚書省御史臺四品已上兩省五品已上同詳議聞奏都省議曰伏以憲宗皇帝𤣥德英猷邁越千古神機睿算恢復四荒既戮惠琳聨誅闢錡眷求良輔果集大勳乃覆淮蔡之妖巢刈河朔之餘孽皇威震耀寰宇和寧偃武修文舉無遺事陛下宗嚴享禮爰軫孝思將舉元勳以顯丕績臣等伏以故司徒兼中書令贈太師裴度天縱公忠道𢎞匡濟始處司言之任屢陳憂國之誠嘗因列召深得聖㫖乃二邦憲使于藩方處嫌疑者盡付真誠懷顧慮者必得腰領俄升相位専任大事遂乃擒元濟梟師道承宗效順劉總叩頭間者程權來朝同揵就命蓋憲宗有知人之明而度盡致君之道也于是息瘡痏拉本根區宇無曠德之俗元和為盛明之代薰灼天下將明帝圗古往今來無所與讓即宜祗配聖德光揚大勳詳考功行無先於度敕㫖朕以憲宗皇帝道協中興威加寰海開啓聖德則有杜黃裳弼成功業則有裴度宜同配享祀其月敕論功配食文武宜兼元和一朝武臣功力最髙者定一人與裳度同配享憲宗皇帝室十一月敕李訴有平蔡之績髙崇文有收蜀之功較量二臣勳勞最重宜以李訴髙崇文同配享憲宗廟庭大中三年四月中書門下奏武德已來宰輔名跡在上等者及配享功臣子孫伏以勳德之後慶賞所延每有恩制多令訪録將以興廢繼絶尊賢報功事歸奬勸義主沈淪近日諸家自論頗衆史官曹闕合用者稀縱令比擬亦未詳悉應前件兩色子孫准前後制敕令搜訪與官者望許於吏部陳狀便委磨勘如審是嫡嗣未有官名者具狀聞奏非時與一人解褐官如有出身已曾任官選日優與處分如自以才行嘗登科第及是諸房子孫不承祭祀并先因存奬以授正官者並不在限即冀所加恩例式協本條敕㫖宜依四年五月宗正少卿李從易奏伏以周禮設六功之官皆配蒸祭漢晉已降或以祫配國朝禘祫二享功臣皆得配於廟庭蓋以崇勳表忠亦冀招賢廣類者也故自武德已來功臣列在祀典三十八人俾其接樽俎之榮列君臣之位祭神如在神因祭來况宗廟合祀之時元勳配享之禮茍非誠敬曷表告䖍竊見今年四月十三日禘享功臣配食者單微暴露列在殿庭雖有風雨亦不移避仰惟國之大典卑䙝至此伏讀國史開元十七年𤣥宗詔昭陵倣像見太宗立于神逰殿前及寢宫聞室中謦咳之音又于寢宫門外設奠以祭陪陵功臣將相蕭瑀房𤣥齡等如聞蹈舞之聲事驗神徴光輝史冊慢易乖敬則何以上副髙祖太宗待劉魏房杜之本意也臣本官宗司専奉廟事庶修職業不敢因循伏請自今已後勒有司先事修備幕次及新潔席褥以申如在之敬用展報功之恩唐㑹要卷十八
