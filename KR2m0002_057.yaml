body:
  text: 唐會要卷五十七宋王溥撰翰林院尚書省諸司上翰林院開元初置已前掌內文書武德已後有溫大雅魏徵李百藥岑文本褚遂良許敬宗上官儀等時召入草制未有名目乾封已後始號北門學士劉懿之禕之兄弟周思茂元萬頃范履冰為之則天朝以蘇味道韋承慶等為之後上官昭容至中宗朝獨任其事睿宗即位後以薛稷賈膺福崔湜為之其院置左右銀臺門內駕在興慶宮制在金明門內駕在大內制在明福門內翰林院者東在銀臺門內麟德殿西廂重廊之後蓋天下以藝能技術見召者之所處也學士院者開元二十六年之所置在翰林之南别户東向考視前代都無舊名貞觀中袐書監虞世南等十八人或秦府故寮或當時才彥皆以𢎞文館學士會于禁中內參謀猷延引講習出侍輿輦入陪宴私十數年間多至公輔當時號為十八學士其後永徽中故黃門侍郎顧悰復有麗正之稱開元初故中書令張說等又有集仙之比日用討論親侍未有典司𤣥宗以四隩大同萬樞委積詔敕文誥悉由中書或慮當劇而不周務速而時滯宜有偏掌列子宮中承遵邇言以通密命由是始選朝官有詞藝學識者入居翰林供奉敕㫖於是以中書舍人呂向諫議大夫尹愔元充焉雖有密近之殊亦未定名制詔書敕猶或分在集賢時中書舍人張九齡中書侍郎徐安貞等迭居其職皆被恩遇至二十六年始以翰林供奉改稱學士由是别建學士院俾掌內制於是太常少卿張垍起居舍人劉光謙等首居之而集賢所掌于是罷息自後給事中張淑中書舍人張漸竇華等相繼而入焉其後有丁雄閻伯璵孟匡朝陳兼蔣鎮李白等在舊翰林中但假其名而無所職至德以後軍國務殷其入直者並以文詞共掌詔敕自此北翰林院始無學士之名其後又置東翰林院於金鑾之西隨上所在而選用取其便穩大抵召入者一二人或三四人或五六人出于所命蓋不定數亦有以鴻生碩學經術優長訪問質疑為人主之所禮者頗厠其中初自德宗建置已來秩序未立延觀之際各趨本列暨貞元元年九月始别敕令明預班列與諸司官知制誥例同故事中書以黃白二麻為綸命輕重之辨近者所出猶得用黃麻其白麻皆北院自非國之重事拜授于德音赦宥者則不得由于斯矣建中四年十月德宗幸奉天時祠部貟外郎翰林學士陸贄隨赴行在天下騷擾逺邇徵發書詔一日數十下皆出贄贄操筆持紙成于須臾不復起草初若不經思慮既成無不曲盡事情中於機㑹倉卒填委同職皆拱手嗟嘆不能有所助常啓德宗云今書詔宜痛引過罪已以感動人心德宗從之故行在制詔下始聞者雖武人悍卒無不揮涕感激議者或以為德宗之克平冦難不惟神武成功爪牙盡力蓋亦文德廣被腹心有助焉貞元初李抱真來朝因前賀曰陛下之幸奉天倉卒時敕書至山東士卒無不感泣思奮者臣當時見之即知諸賊不足平也其月上倉黃自苑北便門出翰林學士姜公輔叩馬諫曰朱泚常帥涇原素得士昨以朱滔叛命坐奪兵權泚恆憂憤不得志不如使人捕之恐羣凶立之必貽國患上曰已無及矣及泚僭立中外稱其先覺興元元年十二月二十九日敕翰林學士朝服辨序冝凖諸司官知制誥例四年陸贄奏曰學士私臣𤣥宗初待詔內廷主于應和詩賦文章而已詔誥所出本中書舍人之職軍興之際庶務填委權令學士代之今朝野綏寧合歸職分其命將相制詔請付中書行遣物議是之貞元八年徵衛次公左補闕尋授學士二十一年正月德宗升遐時順宗居東宫疾恙方甚倉卒召學士鄭絪等於金鑾殿時中人或云內間商量所立未定衆人未對次公遽言曰皇太子雖有疾然地居冡嫡內外繫心必不得已當立廣陵王若有異圖禍難立成絪等隨而唱之衆議方定及順宗在諒暗外有王叔文輩操權樹黨無復經制次公與鄭絪處內廷多所匡正元和二年崔羣為翰林學士為憲宗奬賞嘗宣㫖云今後學士進狀並取崔羣連署方得進來羣以禁密之司動為故事自爾學士或惡直醜正其下皆無由上言堅不奉詔三疏論奏方罷其年二月制以浙江西道水旱相承蠲放去年兩稅上供錢三十四萬餘貫凡白麻制誥皆朝廷代言命輔臣除節將恤災患討不庭則用之宰臣于正衙受付通事舍人若命相之書則通事舍人承㫖皆宣讀訖下有司自是內詔既宣便令奉行三年淄青節度李師道進絹為魏徵子贖宅翰林學士白居易諌曰徵是陛下先朝宰相太宗嘗賜殿材成其正室尤與諸家第宅不同官中自可贖之而令師道掠美事實非宜憲宗深然之五年十二月以司勳郎中知制誥李絳為中書舍人依前翰林學士面諭吐突承璀用兵無功合加明責先是承璀于軍中立聖政碑絳又以為非舊制不可許上初甚怒色變絳執奏不已辭旨懇切因泣下上徐察其意其色稍和卒大開悟故有是拜亟命軍中拽去所立碑曰微卿言不知此為損我翼日又面賜紫衣金魚上親為絳擇良笏勉之曰爾他時無易此心八月九日以前朔方巡鹽節度使王佖為右衛將軍佖在鎮無智術又召至踰月而授以衛將軍凡將相出入皆翰林草制謂之白麻佖始以責罷中書草制自是凡進賢皆用此例也十三年二月上御麟德殿召對翰林學士張仲素段文昌沈𫝊師杜元穎以仲素等有伐叛奉書詔之勤賜仲素以紫文昌等以緋十五年閏正月翰林院奏學士及書待詔共九人每日各給雜買錢一百文以户部見錢充每月共米四石麵五石令司農供敕旨從之翰林院加給自此始也長慶元年翰林學士李德裕上疏曰伏見國朝故事駙馬緣是親密不合與朝廷要官往來開元中禁止尤切訪聞近日輒至宰相及要官私第此輩無他才技不可延接唯是泄漏禁密交通中外羣情所知似為甚弊其朝官素是雜流則不妨來往若職在清列豈可知聞伏望宣示宰臣其駙馬諸親今後公事即于中書見宰相不得更詣私第上然之初穆宗在東宫素間李吉甫之名及即位既見德裕尤重之禁中書詔大手筆多令德裕草之常與李紳元稹俱在翰林以學識才名深相欵密四年三月翰林學士韋處厚上疏曰臣聞汲黯在朝淮南不敢謀反干木在魏諸侯不敢加兵夫王霸之理皆以一士而止百億之師以一賢而制千里之難伏以裴度勳髙中夏聲聞外夷廷湊克融皆憚其用吐蕃回鶻悉服其名今若置之巖廊委其參決西夷北狄未測中華河北山東必禀廟算况幽鎮未靖尤資重臣管仲曰人離而聽之則愚合而聽之則聖理亂之本非有他術順人則治違人則亂伏承陛下當食嘆息恨無蕭曺今有一裴度尚不留驅䇿此所以馮唐感悟漢文雖有亷頗李牧不能用也大都宰相當委之信之親之禮之於事不效於國無勞則置之散寮黜之一郡如此則在位者不敢不勵將進者不敢苟求陛下存始終之分但不永棄則君臣之厚也今進者皆負四海責望退亦不失六曺尚書不肖者無因而懲賢者無因而勸臣于逢吉素無私嫌臣被裴度無辜貶官今之所陳上答聖明下達羣議披肝感激伏地涕泣伏乞鍳臣愛君矜臣體國則天下幸甚初山南東道莭度使牛元翼家屬悉為鎮州莭度使王廷湊所害穆宗深嘆宰輔之不才致使奸凶久不率化因是處厚疏薦裴度其年四月賜翰林學士髙釴錦綵七十匹以上在左軍夜宿直之故也其年七月翰林學士韋處厚于浴堂中因諫游畋及晏起曰臣有大罪願碎首于陛下前上曰何事處厚對曰臣不以死諫先聖令先聖好畋及色以致不夀合當誅戮所以不死諫者為陛下在春宫年十五今陛下皇子始一嵗臣是以不避死亡之誅上大恱深感其言賜錦綵一百匹銀器四事其年十二月翰林院侍講學士諫議大夫髙重侍講學士中書舍人崔郾中書舍人髙釴於思政殿中謝崔郾奏陛下授臣職以侍講已八箇月未嘗召問經義臣內慙尸祿外愧羣寮上答曰朕機務稍閒當召卿等請益髙釴對曰意雖求理臣恐萬方或未之信若未加躬親何以示憂勤之至上深納其言各賜錦綵五十匹銀器二事寶厯元年路隨為翰林學士有以金帛謝除制者必叱而去之曰吾以公事接私財耶終無所納二年敬宗以翰林學士崇重不可䙝狎乃别置東頭學士以備曲宴賦詩京兆尹劉栖楚薦前進士熊望文藝可充學士事未行而帝崩太和元年四月翰林院奏凖舊例學士每人每日於户部請雜買錢一百文伏以數目至少雜買不充伏請每人每日于户部更加一百文冀免缺闕敕旨依奏開成四年二月敕翰林學士宜凖舊例遇莭假每一人入直大中六年十二月敕翰林學士自今以後官至郎中令知制誥其餘並依本官月限及准外制例處分十年党項屢擾河西上召翰林學士問邉計學士畢諴即搜引古今論列破羌之計上恱曰吾方擇能帥安河西不期頗牧在吾禁署卿為朕行乎諴欣然從命即日授邠寧節度河西供軍安撫等使諴至軍遣使告諭叛徒諸羌率化又以邉境禦戎兵多積財為上䇿乃召募軍士開置屯田嵗收穀三十萬斛詔書嘉之十四年三月敕賜翰林院左拾遺劉鄴及第中和二年僖宗幸蜀時黃巢犯京畿關東用兵書詔叢委翰林學士杜讓能草制迅速筆無㸃竄動中事機上嘉之遷戶部侍郎承旨及涉陀逼京師僖宗倉皇出幸是夜讓能宿直禁中聞難作步出從駕出城十餘里得遺馬一匹無羈靮以紳絡而乘之駕在鳳翔朱玫兵遽至僖宗又幸寶雞縣近臣唯讓能獨從再幸梁洋棧道險阻之間不離左右帝顧之曰朕之失道再致播遷險阻之中卿常在側古所謂忠于所事卿無負矣讓能對曰臣家世厯重任䝉國厚恩陛下不以臣愚擢居近侍臨難苟免臣之恥也獲扞牧圉臣之幸也帝益嘉之大順二年十月宣每進書詔書别録小字本留內永為定式乾寧二年十月賜渤海王大瑋瑎敕書翰林稱加官合是中書撰書咨報中書三年二月承旨榜子凡中書覆狀奏錢物如賜召徵促但略言色額其數目不在言但云並從别敕處分中書覆狀如云中書門下行敕其詔語不得與覆狀語同其年七月翰林學士承旨陸扆拜中書侍郎平章事故事三署除拜有光署錢以宴舊僚內署即無例扆入相之日送學士光院錢三百貫特舉新例內署榮之仍定例將相各二百千使相五百千觀察使三百千度支三百千鹽鐵二百千户部一百千天復三年七月二十一日學士柳璨准宣於與政殿令到縣宣示待詔自今後寫敕書後面不得留空紙但奉詔書敕交日便當日示訖尚書省武德元年因隋舊制為尚書省龍朔二年二月四日改為中臺咸亨元年十二月二十三日改為尚書省光宅元年九月五日改為文昌臺垂拱元年二月二日改為都臺長安三年閏四月十五日改為十臺神龍元年二月四日改為尚書省故事內外百司所受之事尚書省皆印其發日為程限京諸司有符移關牒下諸州必由都省以遣之故事除吏部郎外共用都司印至聖厯二年二月九日初備文昌臺二十四司印本司郎官主之歸則收於家建中三年左丞趙㳙始令納于直㕔其假日及不及日即都用當郎官本司印餘印辨都不開故事叔父兄弟不許同省為郎官格令不載亦無正敕貞觀二十年十一月韋叔謹除刑部貟外郎三年四月韋季武除主爵郎中其年七月韋叔諧除庫部郎中太宗謂曰知卿兄弟並在尚書省故授卿此官欲成一家之美無辭稍屈階資也其後同者甚多近日非特恩除拜者即相回避龍朔三年六月十五日謂左肅機崔餘慶曰中臺政本衆務所歸分列曺僚司存是屬事無大小咸藉同心至如科料雜物須詳出處比來曺司曽不以留意致使科取不詳出處不料逺方百姓勞弊特甚當官若此豈無所愧自今以後不得更然上元三年閏三月二十日制尚書省頒下諸州下縣並宜用黃紙久視元年九月二十二日敕省諸行既有主事更不須著人帖直開元二年四月五日敕在京有訴寃者並于尚書省陳牒所由司為理若稽延致有屈滯者委左右丞及御史臺訪察聞奏如未經尚書省不得輒于三司越訴神龍二年九月一日敕門下及都省冝日别録敕目三日一進開元十九年四月二十六日敕尚書省諸司有敕後起請及敕付所司商量事並録所請及商量狀送門下及中書省各署于元敕後所申仍于元敕年月前云起請及商量如後永泰二年四月十五日制周有六卿分掌國柄各率其屬以宣王化今之尚書省即六官之位也古稱㑹府實曰政源庶務所歸比于喉舌猶天之有北斗也朕纂承丕緒遭遇多難典章故事久未克舉其尚書冝申明令式一依故事諸司諸使及天下州府事務准令式各申省者先申省司取裁并所奏請敕到省有不便于事者省司詳定聞奏然後施行自今以後其郎官有闕選擇多識前言備諸故事志業正直文史兼優者勿收虛名務取實用六行之內衆務畢舉事無巨細皆中職司灼于故實遵我時憲凡百在位悉朕意焉大厯五年三月二十六日敕西漢以三府分理東京以三公總務至于頒録天下之職練核萬事之要邦國善否出納之由莫不取正于㑹府也令僕以綜詳朝政丞郎以彌綸國典法天地而分四叙配星辰而統五行元元之本於是乎在九卿之職亦中臺之補大小之政多所關決自皇室多難內外經費徵求調發皆關于國計切于軍期卒以權便裁之新書從事且救當時之急殊非致理之道今外虞既平罔不率俾將明畫一之法大布維新之令甄陶化源去末歸本其度支使及諸道轉運常平鹽鐵等使宜停國之安危不獨注于將相政之理亂固亦在于庶官尚書侍郎左右丞參領要重朕所親倚固當朝夕進見以之裨益也又省寺之務多有所分簡而無事曠而不接今大舉綱目重頒憲章並宜詳校所掌明徵典故十四年六月敕天下諸使及州府須有改革處置事一切先申尚書省委僕射以下商量聞奏不得輒自奏請建中三年正月尚書左丞庾凖奏省內諸司文案凖式並合都省發付諸行判訖都省勾檢稽失近日以來舊章多廢若不由此發勾無以總其條流其有引敕及例不由都省發勾者伏望自今以後不在行用之限庶絶舛繆式正彛倫從之貞元二年正月宰相崔造奏請尚書省六職令宰臣分判乃以宰臣齊映判兵部承旨及雜事李勉判刑部劉滋判吏部禮部崔造判户部工部三月三日敕尚書郎除休暇宜每日視事自至德以來諸或以事簡或以餐錢不充有間日視事者尚書省皆以間日先是宰相張延賞欲事歸省司恐致稽壅准故事令每日視事無何延賞薨復間日矣八年敕令授臺省官者各具舉名于授官詔書先是郎官缺左右丞舉之御史缺大夫中丞舉之詔書不具所舉官名及趙鼎陸贄為相建議郎官不宜専于左右丞宜令尚書丞郎各舉本司其授官詔書仍具所舉官名御史亦如之異日考殿最以校舉主能否乃從之十一年十月罷吏部司封司勳寫急書告身官九十一員自天寶以來征伐多事每年以軍官功授官十萬數皆有司寫官告送本道兵部因置寫官告六十員給糧經五年後酬以官無何吏部司封司勳兵部各置十員大厯已後諸道多自寫官告急書官無事但為諸曺役使故宰臣請罷之元和二年正月尚書左丞鄭元祐請取河中羡餘三千貫充助都省㕑本錢從之三年五月尚書右僕射判度支裴均奏請取荆南雜錢一萬貫修尚書省從之州府羡餘而用之於尚書省以為功遂從其請其失亦甚十三年敕應同司官有大功已上親者非運判及勾檢之官長則不在回避改授之限况故事不必明文具存其有官署同職異司雖父子兄弟亦無所嫌起今已後冝准天寶二年七月敕處分時刑部貟外楊嗣復以父於陵新除刑部侍郎遂以近例避嫌請出省宰臣等舉令式奏請故有是命焉太和元年六月敕尚書元和長慶中皆因用兵權以濟事所下制敕難以通行宜令尚書省取元和以來制敕參詳删定訖送中書門下議定聞奏會昌五年六月敕漢魏以來朝廷大政必下公卿詳議博求理道以盡羣情所以政必有經人皆向道比凡事關禮法羣情有疑者令本司申尚書省下禮官參議如是刑獄亦先令法官詳議然後申刑部參覆如郎官御史有能駁難或據經史故事議論精當即擢授遷改以奬之如言涉浮華都無經據不在申聞六年八月大僕卿渾侃乘馬過都堂門敕旨渾侃久在班行合知典故致此論列須示薄懲宜罰俸一月大中四年兵部侍郎令狐綯拜中書門下平章事奏曰故事帶尚書省官合先宣旨同列集于少府監先是白敏中崔龜從曾為太常博士至相位欲榮其舊署乃改集于太常禮院今請依舊集少府監從之分行次第武德令吏禮兵民刑工等部貞觀令吏禮民兵刑工等部光宅元年九月五日改為六官准周禮分即今之次第乃是也故事以兵吏及左右司為前行刑户為中行工禮為後行每行各管四司而以本行名為頭司餘為子司顯慶元年七月二十一日改戶部尚書為度支尚書侍郎亦准此遂以度支為頭司户部為子司至龍朔二年二月四日復舊次第也尚書令武德初因隋舊制尚書令置官一員龍朔二年二月七日廢尚書令官員貞觀元年六月一日除秦王廣德元年七月十一日除雍王十一月三日除郭子儀大厯十四年閏五月十五日除太尉加尚父寶厯元年五月三日李輔國除司空加尚父國朝尚父惟此二人故附于尚書令之下也德宗既封雍王為天下兵馬元帥收復東都至廣德元年遂拜為尚書令自太宗為此官爾後廢省至是代宗以德宗有大勳特拜焉至建中二年十一月除郭子儀尋亦懇讓而罷左右僕射龍朔二年二月四日改為左右匡政咸亨元年十二月二十三日改為左右僕射光宅元年九月五日改為文昌左右相神龍元年二月四日又改為左右僕射開元元年十二月一日改為左右丞相天寶元年二月二十日復改為左右僕射尚書左右僕射自武德至長安四年已前並是正宰相初豆盧欽望自開府儀同三司拜左僕射既不言同中書門下三品不敢參議政事數日後始有詔加知軍國重事至景雲二年十月韋安石除左僕射東都留守不帶同一品自後空除僕射不是宰相遂為故事貞觀三年三月十日太宗謂房𤣥齡杜如晦曰公為僕射當須廣開耳目求訪賢哲有武藝謀略才堪撫衆者任以邉事有經明德修立性悟理者任以侍臣有明幹清慤處事公平者任以劇務有學通今古識達政術者任以理人此乃宰相之宏益也比聞聽受詞訟日不暇給安能助朕求賢哉因敕尚書細務屬于左右丞唯枉屈大事合聞奏者關于僕射上元二年劉仁軌為左僕射戴至德為右僕射每遇伸訴寃滯者仁軌輒美言許之至德即先據理難詰若有理者密為奏之終不露已之斷决由是時譽歸于仁軌常于仁軌更日受詞訟有老母陳詞至德已收牒省視老母前曰本謂是解事僕射所以來訴公乃是不解事僕射却付牒來也至德笑而還之議者尤稱長者或有問至德不露已斷决之事者至德曰夫慶賞刑罰人主之權柄凡為人臣豈得與人主爭柄哉建中元年三月於朝堂别置三司以决庶獄爭者輒擊登聞鼓右司郎中裴諝上疏曰夫諫鼓謗木之設所以達幽枉延直言輕猾之人援桴鳴鼓遽動天聽因競纎微若然者安用吏乎上然之悉命歸于有司貞元五年正月左司郎中嚴說奏按公式令應受事據文案大小道路逺近皆有程期如或稽違日多少差加罪今請程式常務計違一月日以上要務違十五日以上不報按典請决二十判官請奪見給一季料錢便牒户部收管符牒再下猶不報常務通違五十日以上要務通計違二十五日已上按典請决四十判官奪料外仍牒考功與下考如符牒至三度固違不報常務通計違八十日以上要務通計違四十日已上按典請决六十判官請吏部用闕長官及勾管既三度不存勾當五品以上請牒上中書門下殿罰六品以下亦請牒吏部用闕其急要文牒請付當道進奏院付送本使委觀察使判官一人發遣送州取領具月日先報常務請依常式以前御史臺奏伏奉去年二月三日敕宜付御史臺商量作條件聞奏者除京兆府州縣及城內百司伏讀並以符到京兆府日為程如往來纍路停滯日月懸逺者請兼勘責緣路所由准令式處分從之左右司貟外郎永昌元年十月五日置各一人以侍御史顧宗為左司員外郎洛州司户參軍元懷正為右司貟外郎神龍元年三月初八日廢二年十二月復置開元四年六月十九日敕部以下官令所司補授其貟外郎御史併供奉官宜進名敕授五年四月九日敕尚書省天下政本仍令有司各言職事吏部貟外元和三年四月裴均於尚書省都堂上僕射其送印及呈孔目唱案授案皆尚書郎為之文武三品以上官升階列坐四品五品郎官侍御史以次謁見拜于㕔下然後召御史中丞左右丞侍郎升階答拜初開元中張說為右丞相𤣥宗令其選日上因制儀注極其尊大自非中書門下及諸三品已上是日皆坐受其禮時人或徵其所從來答曰聖厯中王及善豆盧欽望同日拜文昌左右相亦嘗用此儀當時以說方承恩寵不敢復詰因為故事非舊典也六年十月御史中丞竇易直奏臣謹案唐禮諸册拜官與百僚相見無受拜之文又諫議大夫至拾遺御史中丞至殿侍御史並為供奉官不合異禮今僕射初上之日或答拜階上合拜庭中因循踳駁之制每致沸騰之議伏請下尚書太常禮院詳議永為定制使得遵行于是太常卿崔邠召禮官等參議禮官議曰按開元禮有册拜官上儀初上者咸與卑官答拜今左右僕射皆册拜官也今准此禮為定伏尋今之所行儀注且非典禮之文又無格敕為據斯乃越禮隨時之法有司尋合釐正豈待議而後革也伏以開元禮者其源太宗創之髙宗述之𤣥宗纂之曰開元禮後聖于是乎取則其不在禮者則皆不可以𫝊今僕射初上受百寮拜是舍髙宗𤣥宗之祖述而背開元之正文是有司失其𫝊而又云禮得無咎哉今既奉明詔詳定宜守禮文以正之議者或云致敬故或有三品拜一品四品拜二品如之何致敬則先拜所以下文云丞相令助教拜博士即今丞及助教必先拜之是也非不答拜何者禮記云大夫禮相見貴賤不敵主人敬客則先拜客客敬主人則先拜主人是謂致敬又曰非國君無不答拜者鄭𤣥注曰禮尚往來又曰君于士不答拜非其臣則答之鄭𤣥注曰不敢臣人之臣今僕射不答拜是臣其百僚不亦重乎又按漢制八座及丞郎初拜官並集都堂交禮僕射八座也本無不答之文伏以左右僕射舊左右丞相也位次三公三公答拜而僕射受之非也宜約三公上儀及開元禮而為儀注庶幾等威之序允歸至當之論太常卿崔邠博士衛中行馮宿等並同所見於是修改舊儀送都省集衆官詳議七年二月尚書左丞段平仲奏曰謹按開元禮應受册官初上儀並合與卑官答拜又准令文僕射班品在三公之次公上儀而嘗與卑僚答拜僕射上獨受侍郎中丞等拜考之國典素無明文因循乖越切在釐革太常所定儀制依據三公上儀其間或有增損事體深宜折衷酌為永制可以施行應同所見各得連署太常禮院儀注及兵部尚書王詔等三十三人參議所見如前制可十五年時以僕射上事儀注前後不定中丞李漢奏定朝議未允中書門下奏請依元和七年已前儀注左右僕射上日受諸司四品六品丞郎以下拜諌議大夫兼史館修撰王彥威奏論曰臣謹按開元禮凡受册官並與卑官答拜國朝官品令三師三公正一品尚書令正二品並是册拜授官上日亦無安受朝官再拜之文僕射班次三公又是尚書令副二之職雖端揆之重有異百僚然與羣臣比肩事主禮非其臣則答之又曰大夫之臣不稽首非尊家臣以避君也即僕射上曰受常參官拜事頗非儀况元和七年七月已經奏議酌為定制編在國章近年上儀有拜受之禮物論未安請依元和七年敕為定時李程為左僕射宰執難于改革雖不從其議論者稱之太和三年四月中書舍人李啓奏伏奉敕旨冝令左右常侍諫議大夫給事中中書舍人審同詳議僕射與御史中丞以下街衢相遇儀式奏聞者謹按儀制令諸文武官隔品卑者皆拜其准令致敬而非相統屬者則不拜致敬之式在途則斂馬側立又按舊儀僕射上日除兩省供奉官外尚書省御史臺及諸司四品以下皆拜於階下蓋以端揆之重師長百僚雖在别司皆為統屬故用隔品拜禮非為無據臣續准元和七年二月七日敕雖停拜禮每至上日臺官就僕射㕔事列班送上與尚書省官不異則途遇致敬禮在不疑臣等又按令文屬官于街衢相遇隔品者致敬禮絶者下馬無回避之文雜令所言轉避以重貴者止謂迂直之間各申遜讓非令藏匿惟車駕出入警蹕行人事關嚴上不屬臣下但卑僚自後多就他途百姓無知亦皆相效道途回避因此成例就中臺官以職在彈紏人情畏奉他官相遇苟務推崇始自私敬漸為公禮相循既久將謂合然籠街専道止絶行旅奔避不及即以為罪徵異說于前古訪近例于走卒國章明具不復檢尋遂于師長亦欲均禮臣等自奉敕詳定纍牒禮部及太常禮院御史臺檢詳武德以來禮令制敕各得牒報並無臺官於僕射合與司官不同之文臣等詳議伏請自今以後御史中丞以下與僕射相遇依令致敬斂馬立待僕射過僕射謝官日大夫中丞與三院御史就幕次參見其觀象門外立班既以後至為重大夫中丞列班後朝堂所由引僕射就立𫝊呼贊導如大夫就列之儀僕射朝退出宣政門朝堂所由贊引至幕次及興化門待與參從相見而退御史大夫與僕射既隔品目合分道而行庶輕重得宜典章不紊敕㫖僕射實百僚師長國初為宰相正國品秩至崇儀制特異近或勳臣居任遂使故事不得卑列上凌舊章僣上昨令參議頗為得中冝付有司永為定制四年九月中書門下奏左右僕射伏准僕射上儀故事自御史中丞吏部侍郎以下羅拜階下准元和七年雜定儀注全無受拜之禮當時蓋以僕射非其人所以殺禮臣等以為祗合係官之輕重不合為人而升降受中丞侍郎拜則似太重答郎官以下拜則似太輕臣等商量今諸司四品以下官及御史臺六品以下并郎官并望准故事餘依元和七年敕處分敕旨宜依其年十一月中書門下奏左右僕射上請受四品六品丞郎以下拜並望准元和七年以前儀注便令所司約此撰儀注從之會昌二年正月宰臣陳夷行崔珙等請改僕射上日受京官四品官拜儀注臣等伏尋禮令並無僕射上日受京四品官拜儀注近年禮變多𫝊舊例諸司四品官自左右丞部侍郎御史中丞皆羅拜階下以為隔品致敬按諸禮致敬是先拜後拜之儀非受拜之謂又准禮皇太子初見上臺羣官即行致敬之禮羣官先拜後答拜蓋以尊無二上禮須避嫌僕射與四品官並朝班比肩事主豈宜務修僣越獨示優崇况事有應變從權禮有沿革損益受拜既無根據隨俗則亂憲章臣等嘗見故吏部尚書鄭餘慶議僕射上日儀制不與隔品官抗禮其時竇易直為御史中丞奏駁鄭餘慶所議及易直為僕射貪榮近利忘棄前志羣情鄙之在列有拂衣而請告者臣等過蒙寵異擢任師長不願失禮取誚于時臣等又按禮記云大夫士非見國君無不答拜又曰君于士不答拜今僕射不答拜是臣其百僚𫝊為故事何所取法伏准開元元年改左右僕射為左右丞相位次三公三公答拜而僕射受之固非宜也臣等上日伏請依三公上儀垂為定制如䝉聽允望令所司約此撰儀注從之大中三年正月三日敕節文三公僕射不常除官每至上時須有聚會宜令度支户部准開貢例勾當局席取京兆府本色錢不得令府司差配百姓唐會要卷五十七
