body:
  text: 唐㑹要卷二十八宋王溥撰蒐狩武徳元年六月二十四日萬年縣法曹孫伏伽上書曰陛下龍舉晉陽天下響應計不旋踵大位遂崇陛下勿以唐得天下之易不知隋失天下之不難也陛下貴為天子富有天下動則左史書之言則右史書之既為竹帛所拘何可恣情不慎凡有蒐狩須順四時既代天理物安得非時妄動五年十二月九日諫議大夫蘇世長從幸涇陽之華池校獵上謂朝臣曰今日畋樂乎世長曰陛下逰獵薄廢萬幾不滿十旬未為大樂髙祖色變既而笑曰狂發耶世長曰為臣私計即狂為陛下國計即忠矣八年十月二十日校獵於周氏陂秦王文學禇亮以冦亂漸平每冬畋狩遂上疏諫曰陛下旰食思政廢寢憂民用農隙之餘遵冬狩之禮獲車之所逰踐虞旗之所涉厯網惟一面禽止三驅縱廣成之獵士觀上林之手搏斯固畋弋之常規而皇王壯觀至於親迫猛獸臣竊惑之何者筋力驍悍爪牙輕健弩一發未必挫其畏率然驚輳事生慮外如或近林藂未填坑谷駭屬車之後乗犯官騎之清塵小臣怯懦私懐悚慄陛下以至聖之姿垂將來之敎降情納下无隔直言敢縁天造冒陳丹懇上納之其年十二月髙祖謂侍臣曰蒐獵以供宗廟朕當躬其事以申孝享之誠于是狩於鳴犢泉之野貞觀五年正月十三日大蒐於昆明池夷落君長從上謂髙昌王麴文泰曰大丈夫在生樂事有三天下太平家給人足一樂也草淺獸肥以禮畋狩弓不虚發箭不妄中二樂也六合大同萬方咸慶張樂髙宴上下歡合三樂也今日王可從禽明當歡宴耳其年十月二十日上將逐兎於後苑左領軍執失思力諫曰天授陛下為華夷父母何得自輕倘使萬一馬有顛躓將若之何上顧而異之及又將逐兎思力乃脱帶刀跪而固請上為止焉十一年十月射猛獸洛陽苑羣豕突出林中上引弓四發殪四豕有雄彘突及馬鐙民部尚書唐儉收馬搏之上拔劔斷豕顧笑曰天策長史不見上將擊賊耶何懼之甚對曰漢祖以馬上得之不以馬上理之陛下以武定四方豈復逞雄心於一獸上納之因為罷獵特進魏徴上表諫曰臣聞漢孝武帝好格猛獸司馬相如諫曰力稱烏獲㨗言慶忌人誠有之獸亦宜然卒然遇逸材之獸駭不存之地雖烏獲逢䝉之伎不得用而枯木朽株盡為難矣雖萬全而無患然本非天子所宜近也臣伏聞車駕近出親格猛獸晨趨夜還以為萬乘之尊闇行荒野踐深林汚豐草甚非萬全之計願陛下割過情之娱罷格獸之樂則天下幸甚至十一月十五日狩於濟源之陵山上曰古者先驅以供宗廟今所獲鹿宜令所司造脯醢以充薦享祕書監虞世南諫曰陛下因聴覽之餘辰順天道以殺伐將欲躬摧班掌親御皮軒窮猛獸之窟穴盡逸材之林藪夷凶剪暴以衛黎元收革擢羽用充軍器舉旗郊獲式遵前古然黄屋之尊金轝之貴八方之所仰徳萬國之所係心清道而行猶戒銜橛斯盖重慎防微為社稷計也是以馬卿直諫於前張昭變色於後臣誠微末敢忘斯義且天弧星罼所殪已多頒禽賜獲皇恩亦溥伏願時息獵車且韜長㦸不拒芻蕘之請降納溝澮之流袒裼徒搏任之羣下則貽範百王永光萬世十六年十二月二十三日狩於驪山時隂寒晦㝠圍兵斷絶上乗髙望之欲捨其罰恐虧軍令乃逥轡入谷以避之永徽元年髙宗出獵在路雨因問諫議大夫谷那律曰油衣若為得不漏對曰能以瓦為之必不漏矣上悦因此不復獵龍朔元年十月五日狩于陸渾縣六日至飛山頓髙宗親御弧矢獲四鹿及兎數十頭晚次御營望見大官烹羊欲供百官之膳因問侍中許圉師曰朕目擊彼羊在於格下見其無罪就戮非無惻怛之情今欲以死獸易之可乎圉師曰昔齊宣王見人欲將牛以釁鐘因曰我觀此牛觳觫似無罪而就死地乃不釁鐘陛下取已死之鹿代欲刲之羊則堯舜之用心也遂釋其羊不殺九日又於山南布圍大順府果顔王萬興以輒先促圍集衆欲斬之上謂侍臣曰軍令有犯罪在不赦但恐外人謂我翫好畋獵輕棄人命又以其經從征遼有功特令放免上于是製冬狩詩總章二年九月車駕自九成宫還京仍西狩校習自麟逰西北達岐梁歴普潤至雍為兩圍殿中侍御史杜易簡賈言忠監圍山阜懸危躡蹻杖策不得暫停凡五日而合劾奏將軍劉𤣥意黄河上等處斷圍𤣥意竟抵罪黄河上圍日軍容齊整詔特原之先天元年十月七日幸新豐獵於驪山之下至十一月三日侍中魏知古上詩諫曰常聞夏太康五子訓禽荒我后來冬狩三驅盛禮張順時鷹隼擊講事武功揚奔走未及去翾飛豈暇翔非熊從渭水瑞翟想陳倉此欲誠難縱茲逰不可常子雲陳羽獵僖伯諫漁棠得失鑒齊楚仁恩念禹湯雍熙諒在宥亭毒非多傷辛甲令為史虞箴遂孔彰手制曰卿所進獵渭濱十韻三復研精良增歎美兹向温湯觀省風俗時因暇景掩羣而畋開一面之羅展三驅之禮無情校獵匪慕前禽卿有箴規輔予不逮合賜物十五段以申勸奬開元三年十月二十四日大蒐於鳯泉下制曰今四方無事百穀有成因孟冬之月臨右輔之地戒兹五校爰備三驅非謂獲多庶存除害乃者長圍已合大綏未舉而夜聞朔風天降微雪狐裘且御未免祁寒鶉衣不充寜堪深露朕為父母育彼黎元中宵耿然明發增惕其圍兵並放散各賜布二端綿一純七年十月右補闕崔向上疏曰臣聞千金之子坐不垂堂百金之子立不倚衡况居大寳之位也哉陛下宜保萬夀之體副三靈之望安可輕出入重盤逰乎天子三田前古有訓豈惟為乾豆賓客庖厨者哉亦將以閲兵講武誡不虞也詩美宣王之田徒御不驚有聞無聲謂畋獵時人皆銜枚有善聞而無譁喧也又曰悉率左右以燕天子謂悉驅禽順其左右之宜以安待王射也則知大綏將下亦有禮焉側聞畋於渭濱有異于是六飛馳騁萬騎騰躍衝翳薈蹴䝉蘢越嶃險靡榛藂紅塵坐昏白日將暗毛羣擾攘羽族繽紛左右戎夷並申勇敢攢鏑亂下交刃霜飛而降尊亂卑争㨗于其間豈不殆哉夫環衛而居暴客攸待清道而出行人尚驚如有墜駕之慮流矢之變獸窮則摶鳥窮則攫陛下復何以當之哉静言思之臣深為陛下戰慄也書曰不畏入畏又曰從諫則聖惟陛下深思逺慮以誡後圖則天下孰不幸甚貞元十一年十二月臘日畋于苑中止其多殺行三驅之禮軍士無不知感畢事幸神策軍左廂勞饗軍士而還元和三年七月上謂宰臣曰朕昨因閲秋稼行苑至東祇以鷹犬自隨本非畋獵于時雖覺行人聚觀亦無傷稼之意而諫官在外章疏頗煩意何為耶卿等知否李吉甫對曰陛下軫念黎元親問禾黍察閭里之疾苦知稼穡之艱難此則聖主憂勤天下幸甚但以弧矢前驅鷹犬在後田野縱觀見車從之盛以為萬乘校獵𫝊說必多諫諍之臣義當守職既有聞見理合上諫緘嘿則懷尸素之慙獻言又懼觸鱗之禍果決以諫實謂守官正當嘉尚非足致詰夫蒐狩之制古今不廢必在三驅有節無馳騁之危戒銜橛之變既不殄物又不數行則禮經所髙固非有害然逐兎呼鷹指顧之樂忘危履險易以溺人故老氏譬以發狂昔賢以為至誡陛下每與臣等討論古昔追踪堯舜固當棄常俗之末務詠聖祖之格言願以狥物為心克己為慮則昇平可致聖祚無疆羣臣異議不禁自息上曰卿言是也朕亦深悟矣五年十一月上頻出逰畋吏部郎中栁公綽欲因事諷諫乃獻醫箴一篇曰天布寒暑不私于人品類既一崇髙以均惟謹好愛能保其身清浄無瑕輝光以新寒暑滿天地之間浹肌膚于外好愛溢耳目之前誘心知于内端潔為隄奔射亦敗氣行無間隙不在大睿聖之姿清明絶俗心正無邪志髙寡欲謂天髙矣氛䝉晦之謂地厚矣横流潰之聖情超邁萬方頼之飲食所以資身也過則生患衣服所以稱徳也侈則生慢惟過與侈心則隨之氣與心流疾亦伺之聖心不惑孰能移之畋逰恣樂流情蕩志馳騁勞形叱咤傷氣天下之重從禽為戲不養其外前修所忌聖心非之孰敢違之乗氣而生嗜慾以萌氣離有患氣凝則成巧必喪真智必誘情去彼煩慮在此誠明醫之上者理于未然患居慮後防處事先心静樂行體和道全然後能徳施萬物以享祚億年聖人在上各有攸䖏庶政有官羣藝有署臣司大醫敢告諸御帝深嘉納之長慶四年三月赦文鷹犬之流本備蒐狩委所司量留多少其餘勅州府更不用進來㑹昌元年十月車駕幸咸陽校獵二年十月校獵於大白原諫議大夫髙少逸於閤内論奏曰陛下校獵太頻出城稍逺萬幾廢弛晨去暮歸况方用兵師尤宜停止上改容勞之少逸退上謂宰臣曰諫官甚要朕時聞其言庶幾減過也祥瑞上儀制令諸祥瑞若麟鳳龜龍之類依圖書大瑞者即隨表奏其表惟言瑞物色目及出處不得茍陳虚飾告廟頒下後百官表賀其諸瑞並申所司元日以聞其為獸之類有生獲者放之山野餘送太常若不可獲及木連理之類有生即具圖書上進詐偽瑞應者徒二年若灾祥之類史官不實對者罪三等武徳元年七月新豐鸚鵡谷水清世𫝊此水清天下平開皇初暫清復濁至是復清七年閏七月十三日長安古城監渠水生鹽色紅白而味甘狀如方印八年三月十三日赤雀巢於殿門九年四月二十五日甘露降於中華殿之桐樹泫如冰雪以示羣臣貞觀二年九月三日詔朕每見諸方表奏符瑞慙懼增深且安危在於人事吉凶繫於政術若時主昏庸靈貺未能成其美如理道休明庶徴不能致其惡以此而言未為可恃今以後麟鳳龜龍大瑞之類依舊表奏自外餘瑞宜申所司其大瑞應奏者惟録瑞物色目及出見處所更不得茍陳虚詞十二年六月六日滁州言野蠶成繭徧於山阜至十三年野蠶又食槲葉成繭大如奈其色緑凡收六千五百七十石至十四年六月又收八千三百石十四年二月十四日陜州刺史房仁裕奏所管界内二百餘里正月元日河水變清四日乃止十六年四月二日皇太子初立有雄雉飛集東宫明徳殿前上問禇遂良是何祥也遂良對曰昔秦文公時有童子化為雉雌者鳴於陳倉䧺者鳴於南陽童子言曰得雄者王得雌者霸文公遂以為寶雞祠漢光武得雄遂起南陽而有四海陛下舊封秦王故雄雌見於秦地此所以彰表明德也上大悦曰立身之道不可無學十七年九月皇太子寢室中産素芝十四莖並為龍鳳之形十八年十月八日山南獻木連理交錯玲瓏有司羅目一丈之餘并枝者二十餘所司徒長孫無忌曰自來嘉祥雜還陛下推而勿居遂令史臣閣筆無以示後因相率拜賀上曰朕觀古之帝皇覩妖災則懼而修徳者福自至見祥瑞則逸而行惡者禍必臻今瑞應之來朕當勞心苦力以答天地耳何煩致賀二十年十一月汾州上言青龍白龍見白龍吐物初在空中有光如火至地䧟入地二尺掘之則𤣥金也二十一年正月玉華宫李樹連理隔澗合枝顯慶四年八月二十五日司勲員外郎源行守家毛桃樹生李實太子詹事李寛等上表陳賀上謂侍臣曰凡厥休祥雖云美事若其不實取笑後人朕嘗見先朝說隋煬帝好聞祥瑞嘗有野雀集於殿上校尉唱云此是鸞鳥有衛士報云村野之中大有此物校尉乃笞衛士仍奏為鸞煬帝不究真虚即以為瑞仍名此殿為儀鸞嗤笑至今未弭人之舉措安可不思今李寛等所言得無類此凡祥瑞之體理須明白或龍飛在泉衆人同見雲色雕綺觀者非一如此之輩始號嘉祥自餘虚實難明不足信者豈得妄相牽率稱賀闕前龍朔三年十月十六日絳州麟見二十六日含元殿前麟趾見至來年正月一日改元麟徳長夀二年正月元日夜大雪質明而晴上謂侍臣曰俗云元日有雪則百穀豐未知此語故實文昌左丞姚璹對曰汜勝之書云雪是五穀之精以其協和則年穀大獲又宋孝武帝大明五年元日降雪以為嘉瑞上曰朕御萬方心存百姓如得年登嵗稔此即為瑞雖獲麟鳳亦何用焉三年十一月一日陳州上言宛邱縣鳳凰集衆鳥數萬前後翔從行列齊整色别為羣三日遂改元儀鳳開元十三年九月十三日潞州獻瑞應圖上謂宰臣曰朕在潞州但靖以恭職不記此事今既固請編録卿喚取藩僚舊邸問其實事然後修圖上又謂宰臣曰往昔史官惟記灾異將令王者懼而修徳故春秋不書祥瑞惟記有年聖人之意明矣遂勅天下諸州不得更奏祥瑞至大厯十四年閏五月十四日澤州進慶雲圖制曰朕以時和年豐為嘉祥以進賢遂忠為良瑞如慶雲靈草異木自今已後並不須進諸道亦宜凖此十九年四月一日揚州奏穭生稻二百一十五頃再熟稻一千八百頃其粒如常稻无異天寶三載三月六日武威郡奏番禾縣嘉瑞鄉天寶山有醴泉湧出石化為瑞麪逺近貧乏者取以給食遂改番禾縣為寶縣大厯二年嶺南節度使徐浩奏十一月二十五日當管懐集縣陽雁来乞編入史從之先是五嶺之外翔雁不到浩以為陽為君徳雁隨陽者臣歸君之象也五年九月太原奏文水縣冬蠶成繭八年七月解縣安邑兩池生乳鹽户部侍郎韓滉判度支請薦於清廟編之史冊從之至十二年十一月賜號寶應慶靈池興元元年八月亳州真元縣大空寺李樹植來十四年長一丈八尺今春枝忽上聳髙六尺周逥似蓋九十餘尺先天觀𤣥元皇帝太后陵槐樹下有靈泉湧出上有雲氣五色黄龍再見於泉中貞元八年正月鄂州觀察使何士幹獻白鹿上曰朕初即位即止祥瑞士幹致白鹿其謂我何還之彼當慚懼留之逺近復獻竟不視遂放于苑中焉十年正月西川奏當管甘露降松栢樹竹藂等二千四百四十二處其年懷州奏獲白雀二十一年二月同州進五色鷹八月潞州進白鶻十一月潭州進赤烏十二年七月東都留守奏苑内生芝草一株是月河陽進白鸜鵒二十八年八月滄州言白龍見唐㑹要卷二十八
