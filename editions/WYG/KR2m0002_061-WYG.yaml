body:
  text: 唐會要卷六十一宋王溥撰館驛使開元十六年七月十九日勅建𫝊驛宜因御史出使便令校察至二十五年五月監察御史鄭審檢校兩京館驛猶未稱今驛門前十二辰堆即審創焉乾元元年三月度支郎中第五琦充諸道館驛使大厯五年九月杜濟除京兆尹充本府館驛使自後京兆常帶使至建中元年停大厯十四年九月門下省奏兩京請委御史臺各定知驛使御史一人徃來勾當遂稱館驛使謹按六典及御史臺記並雜注即並不言臺中有館驛使貞觀十九年大宗親征遼發定州皇太子奏請飛驛遞表起居又請遞勅垂報並許之飛表奏事自兹始也大定元年五月六日勅諸軍節度大使聽將家口八人副大使六人萬人已上鎮軍大使四人副使三人五千人已上大使三人副使二人並給𫝊乗景雲二年八月四日勅諸使至京都經一日已上即停乗𫝊驛及供給長安四年五月二日乗𫝊使人事閒緩毎不得過四驛開元七年六月二十八日勅専知𫝊驛官一差定後年限未終所由得不輒迴改并别差使及别報當其年七月一日勅諸道按察使家口往過宜給𫝊遞十五年四月十日勅兩京都亭驛應出使人三品已上及清要官驛馬到日不得淹留過時不發餘並令就驛進發左右巡御史専知訪察十八年六月十三日勅如聞比來給𫝊使人為無𫝊馬還使乗驛徒押𫝊遞事頗勞煩自今已後應乗𫝊者宜給紙卷二十三年七月十七日新除都督刺史並闕三官州上佐並給驛發遣二十八年六月一日勅曰先置陸驛以通使命茍無闕事雅適其宜如聞江淮河南兼有水驛損人費馬甚覺勞煩且使臣受命貴赴程期豈有求安閒故為勞擾其應置水驛宜並停天寳十一載十一月五日自今諸郡太守謝上表並附驛遞進大厯十四年二月二十六日郎官請假拜掃宜凖開元天寳中舊例給公乘其年九月十七日門下省奏准公式令諸驛給馬職事三品及爵三品已上若王四疋四品已上及國公三品五品及爵三品已上二疋餘官爵各一疋伏望今後並約前件馬數給券其從人毎馬一疋許將一人從之其月勅節文兩京宜委御史臺各定知驛御史一人來勾當諸委節度觀察使各於本道判官中定一人専知差定訖並具名銜聞奏并牒奏建中四年正月十一日館驛置五等使科及人馬數其月詔商州度上津路館置舍貞元二年三月河南尹充河南水陸運使薛珏奏當州館驛凖永泰元年三月京兆尹兼御史大夫第五琦奏使人緣路無故不得於館驛淹留縱然有事經三日已上即于主人安置館存具供限如有家口相隨者自須於村店安置不得令館驛將什物飯食草料等就彼供給擬者伏以承前格勅非不丁寧嵗月滋深因循久弊今往來使客多是武臣踰越條流廣求供給府縣少闕悔吝坐至属當凋殘實難濟辦况都城大路耗費倍深伏乞重䧏殊恩申明前勅絶其僥濫俾懼章程庶郵驛獲全職司是守勅㫖宜付所司舉元勅處分其年六月二十二日勅諸道進奉却迴及凖勅發遣官健家口不合給驛券人等承前皆給路次轉達牒令州縣給熟食程糧草料自今以後宜委門下省檢勘憑據分明給𫝊牒發遣加切勘責勿容踰濫仍凖給券例毎月一度具狀聞奏其年十二月勅節文從上都至汴州為大路驛從上都至荆南為次路驛知大路驛官毎一周年無敗闕與减一選仍任累計次路驛官二周年無敗闕與減一選三周年減兩選八年門下省奏郵驛條式應給紙券除門下外諸使諸州不得給往還券至所詣州府納之别給令還其常參官府外除授及分司假寧往來並給劵從之元和四年正月勅凖元和三年諸道給劵道勅文總一百二十七道已上者州府長官宜奪一季俸祿其本州官曹官及錄事參軍付吏部用闕去任殿一選其年監察御史元稹劾徐州節度使王召𫝊送故監軍使孟升還京給劵乗驛仍于郵舍安喪柩有違典例五年正月考功奏諸道節度使觀察等使各選清强判官一人専知郵驛知一周年無違犯與上考如有違越書下考者伏以遵守條章纔為奉職便與殊考恐涉太優今諸不違勅文者書中上考其違越者依前書下考仍請永為常式勅㫖依奏其年四月御史臺奏御史出使及却廻所在館驛逄中使等舊例御史到館驛已於上㕔下了有中使後到即就别㕔如有中使先到上㕔御史亦就别㕔因循嵗年積為故實訪聞近日多不遵守中使若未諳往例責欲逾越御史若不守故事懼失憲章喧競道途深乖事體伏請各令遵奉舊例異其守分勅㫖其三品官及中書門下尚書省官或出銜制命或入赴闕庭諸道節度使觀察使赴本道或朝覲并前節度使觀察使追赴闕庭者亦凖此例先監察御史元稹自東臺赴闕至清水驛與中使仇士良争㕔之事因士良以鞭擊元稹之面跣而走故有是命九年四月自夏州至天徳復廢館一十一所通緩急是年春回鶻自部落南過磧取西城栁谷路討吐蕃西城防禦使周懐義表至朝廷大怒恐以回鶻入言討吐蕃意是入冦宰相李吉甫以為回鶻入冦且當暫絶和事不􅀿便來犯邊但願設備不定為例因請致之十一年十二月門下省奏事非急切者不得乗驛馬從之十二年十二月復以中書官為館驛使六典之制以監察第二御史主郵驛元和初嘗以中官曹進玉為使性剛躁遇四方使多倨詰之或至箠辱者内外屢以為言宰臣李吉甫等論罷之至是復置左補闕裴潾上䟽曰伏以館驛之務毎驛各有専知官主當又有京兆觀察使與本管遞相監臨臺中有御史充館驛使専察過闕伏知近有敗事上聞聖聰若明示科條切責官吏據其過犯明加貶黜敢不惕懼日夜勵精若令宫闈之臣出參館驛之務則内臣外務職分各殊竊惟塞侵官之源絶出位之漸事有不便必誡於初令或有妨不必在大當掃静妖氛之日開太平至理之風澄本正名正在今日䟽奏不報十三年庫部員外郎李渤為潞州弔祭使上言畿内諸驛馬多死上命以飛龍數百疋付之長慶元年九月中使二人充行營糧料館驛使左補闕蔣防等以非故事恐驚物聽上䟽切諫遂罷之其月復置行營糧料館驛等中使宰臣切論給事中封勅諌官上䟽不報二年四月勅如聞館驛遞馬死捐轉多欲令提舉吏人悉又推法中使驛吏稱不見券則隨所索盡供既無憑據安有定數自今以後中使乗遞宜將券示驛吏據券供馬如不見券分外索馬輒不得勒供今後從長樂臨臯等驛凖勘合如不遵守要聞知仍委所在長官當時具名銜聞奏其常參知官出使及諸道幕府軍將等合乗遞者並須依格式如有違越當加科貶三年九月特詔命授行營諸司方畧朝令夕改驛使相望京兆尹栁公綽獻狀訴云自幽鎮兵興使命繁并館驛貧虚鞍馬多闕又勅使專知都無限約驛吏不得視券牒隨口即供驛馬既盡遂奪鞍乗衣冠士庶驚擾怨嗟於是降勅中使𫝊劵素有定數如聞近日多越劵牒宜令諸司府具元和十四年四月五日勅分明曉示自今以後如更違越在府州縣俱當時具名聞奏寳厯二年二月鳯翔龍州觀察使上言當管州界縁興元新通斜谷路創置驛二所岐山縣南界置渭陽驛郿縣北界置過蜀驛寳鷄縣南界置安途驛其月山南西道觀察使上言當道新制斜谷其中須置館驛及創驛右界名者三甘亭館請改為懸泉驛駱駝館請改為武興驛坂下館請改為右界驛並可之太和四年十月御史臺奏伏凖六典故事外官授命皆便道之官葢緣任闕其人則朝廷切於總理近日皆顯陳私便不頋京國越理勞人逆行縣道或非𫝊置創設供承况毎道館驛有數使料有條則例常踰文計失素使偏州下吏何以支陪又凖假寧令官五考一給拜掃假令借稱幸從便路願謁枌榆則是展墓足以行私赴官皆枉道臣今月五日已於延英面奏伏幸聖㫖令將伏永狀乞起今公私行李勒依紀律敢有違越請委所司論列勅㫖依奏八年八月門下省奏常參官私事請假從來凖例並給券牒今商量或緣家事乞假各申私志須約公費自今後應有此色假官並任私行門下省不得給公券如或事出特恩不在此限勅㫖依奏開成四年二月門下奏常官寒食拜掃今月七日延英面奏進止今凖往例給公劵者臣等謹檢舊按常參官應為私事請假外州往來給券牒伏凖太和八年八月十日勅釐革應緣私事並不許給公券今臣等商量唯寒食拜掃著在令式䘖恩乗驛用表哀榮䖍奉聖㫖重頒新令其有拜掃不出府界假内往來者並不在給券限勅㫖依奏㑹昌元年二月御史大夫陳夷行商量條流奏所置館驛馬什物兼作人多少及功價資課毎年破用取何色錢物參拜修文遣其驛馬數勘人驛見欠多少具分析奏來者臣今商量請凖勅先牒諸府州勘鞍馬什物作人功價糧課并勘毎年緣館驛馬占留錢數諸色破用及使料粟麥遞馬草料待諸州府報到續具聞奏今具檢前後勅文行用相當者參立新格逐急條流除館驛等事事不多載其年三月門下省奏凖今月六日勅中使乗券人馬數訪聞近日皆守勅文不敢逾越施之久逺須令通濟其逺近送諸道春衣使須有大將衣任量加馬一疋勅㫖令貴必行理須通濟供奉官緣官傔人多宜加遞馬一疋春衣端午使例外更加一疋冬衣使例外更加兩疋餘並凖三月六日勅二年四月二十三日勅節文江淮兩浙毎驛供使水夫價錢舊例約十五千已來近日相仍取索無度蘇常已南毎驛使供四十餘千或界内有四五驛往來須破四五百千今後宜依往例不得數外供破如有長吏已下書罪大中五年七月勅如聞江淮之間多有水陸兩路近日乗劵牒使命等或使頭陸路則隨從船行或使頭乗舟則隨從登陸一道劵牒兩處祗供害物擾人為弊頗甚自今已後宜委諸道觀察使及出使郎官御史并在巡院切加覺察如有此色具名奏當議懲殿如州縣妄有祗候官吏所由節級科議無容貸六年二月汴州觀察使崔龜從奏當管三州水陸管驛先凖勅文條流水夫具有定制并不許行轉牒供券外捉人嵗月滋深元被過客外干求别索人夫别覺生料臣今欲條流諸道節度觀察使刺史及諸道監軍别勅判官赴任及歸闕庭若有家口及參從人即量事祇供其本官迎送軍將官健所由諸色受顧人等本道既有程限兼已受傭直並請不供狀如使客曾得館驛分外祇供忽此遵減必巧言謗讟上聞聖聽今欲凖此釐革不敢不奏勅㫖宜依其諸道亦凖此處分彈劾故事御史彈日坐曰仗彈至景雲三年已後皆先進狀聽進止許即奏不許即止儀鳯二年二月十九日勅凡有彈紏皆待大理斷招後錄入功過至徳元年九月十日詔御史彈事自今以後不須取大夫同置乾元二年四月六日勅御史臺所欲彈事不須先進狀仍服豸冠所被彈劾有稱讐嫌者皆冀遷延以求茍免但所舉當罪則讎亦無嫌如憲官不舉所職降資出臺儻涉阿容乃重貶責舊制凡事非大夫中丞劾而合彈奏者則具其事為狀大夫中丞押大事則豸冠朱衣纁裳白紗中單以彈之小事常服而已貞觀十一年呉王恪好畋獵損居人田苗侍御史栁範奏彈之太宗因謂侍臣曰權萬紀事我兒不能斥正其罪合死範進曰房𤣥齡事陛下尚不能諫止畋獵豈可獨罪萬紀乎永徽元年十一月二十四日中書令褚遂良抑買中書譯語人史訶擔宅監察御史韋仁約劾之大理丞張山夀斷以遂良當徴二十斤少卿張獻冊以為非當估宜從輕仁約奏曰官市依估私但兩和耳園宅及田不存而肆豈用應估獻冊曲憑估買斷為無罪大理之職豈可使斯人處之乃降遂良及獻冊官顯慶元年八月中書侍郎李義府恃寵用事聞婦人淳于氏有美色坐事繫大理乃諷大理寺丞畢正義枉法使出之將納為妾或有宻言其狀者上令給事中劉仁軌鞫之義府恐洩其謀遂逼正義自縊于獄中上知而特原義府御史王義方奏義府擅殺寺官陛下雖已釋放臣不應更有鞫問然天子置三公九卿二十七大夫八十一元士本欲水火相濟鹽梅相承然後庶績咸熙風雨時泰則知人主不得獨是獨非皆由聖㫖昔唐堯至聖失之於四凶漢祖深仁失之於陳豨光武聰明寛恕失之于逢萌魏武勇畧英雄失之於張邈此並英雄之主莫不失之於前得之於後陛下繼聖撫育萬方蠻陬夷落猶恐刑􅃠輦轂咫尺奸臣肆虐殺六品寺丞足使忠臣抗憤義士扼腕縱正義自取絞縊此事彌不可容使是畏義府之權勢能殺身以滅口此則生殺之威上非主出賞姦説佞臣恐履霜堅冰積小成大請乞重勘正義致死之由雪寃氣於幽泉誅姦臣於白日對仗叱義府令下義府頋望不退義方三叱上既無言義府趨出義方乃讀彈文曰義府善柔成性佞媚成姿昔事馬周分桃見寵後交劉洎割袖承恩生其羽翼長其光價因緣際㑹遂諧通達不能盡忠端節對揚王休䇿蹇勵駑祇承皇眷而反憑附城社蔽虧日月請託公行交逰羣小貪冶容之姣好原有罪之淳于恐漏洩其隂謀殞無辜之正義雖挾山超海之力望此稍輕回天轉日之威方斯尚劣此而可恕孰不可容金風戒節玉露啓寒霜簡與秋興共清忠臣將鷹鸇並擊碎首玉階庶盡臣節以申典憲龍朔二年三月鐡勒道行軍大總管鄭仁泰薛仁貴殺降九十餘萬更就磧北討其餘衆遇大雪兵士糧盡凍餓死者十八九御史大夫楊德裔劾奏曰謹按仁泰猥以非才謬荷㧞擢擁旌瀚海問罪天山理應䖍奉廟算恭行天罰而褊心無謀短懐愎諌乃肆凶殘恣行殺戮向若大軍初到明諭天㫖撫納前降招來後服則鐵勒支善不日斯平仁泰素闕逺圖莫曉機事師徒無紀軍令不明遂使稽顙屈膝者先被塗炭之誅懼死懐生者因成絶漢之計加以沙塞綿邈風雪嚴凝不量士馬疲疴不度糧食多少乃令班師凍餒征夫殞斃骸胔委積刳剔縱横暴骨交衢下實泉壤可悼成䂓失守明罰所誅自聖朝削平天下以來未有如仁泰此行損威挫鋭之甚豈可並恣誣㒺不寘凖繩撫悼存亡理宜懲肅仁泰等故殺降人餓殺兵士並請付法以申典憲通天元年五月監察御史紀履忠劾奏御史中丞來俊臣犯狀有五一擅弄國權二謀害忠善三贓賄貪濁四失義背禮五淫昏狼戾論兹五罪合至萬死請下獄理罪大足元年張易之縱恣益横常私相引進李𢎞泰占吉凶言涉不順御史中丞宋璟請窮究其狀則天曰易之等已自上聞璟曰謀反大逆無容首免易之等分外承恩臣知言出禍從義激于心雖死不恨則天不悦内史姚璹恐忤㫖遽宣勅令出璟曰天顔咫尺親奉徳音不煩宰相擅宣王命則天意解乃收易之等就臺俄有勅特原之仍令易之等就宅謝罪璟拒而不見曰公事當公言之若私見法無私也長安四年三月監察御史蕭至忠彈鳯閣侍郎同鳯閣鸞臺三品蘇味道贓汚貶官御史大夫李承嘉嘗召諸御史責之曰近日彈事不諮大夫禮乎衆不敢對至忠進曰故事臺中無長官御史人君耳目比肩事主各得彈事不相闗白若先白大夫而許彈則可如不許彈則如之何大夫不知曰誰也承嘉黙然而憚其剛直神龍三年吏部尚書蘇瓌按問鄭普恩其妻有寵於韋庶人特勅令對御辨析上屢抑瓌而理普恩侍御史范獻忠歴階而前曰臣請先罪蘇瓌上問其故忠曰蘇瓌國之大臣荷榮貴久矣不能斬逆賊而後奏聞令使眩惑天聰搖動刑柄致普恩反狀昭露陛下曲為申理此則王者不死令聖躬萬福豈有剰天子耶臣請先死終不能事普恩上意乃解獄遂定其年監察御史魏傳躬以内常侍輔信義縱暴將奏劾之御史大夫竇懐貞固正之𫝊躬曰今王綱漸壊君子道消正由此軰擅權耳若得今日殺之明日受誅無所恨矣至景龍元年九月十二日又劾奏銀青光祿大夫西明寺主惠範奸贓四十萬請寘於極法上不省𫝊躬進曰刑賞者國家大事陛下賞已妄加豈刑所不及削惠範官放歸于第景龍二年十二月御史中丞姚廷筠奏稱律令格式懸之象魏奉而行之事無不理比見諸司僚宷不能遵守章程事無大小皆悉奏聞臣聞為君者任臣為臣者奉法故云汝為君目將司明則知萬機務綜不可徧覽也所以設官分職委任責成百工惟時以成垂拱之化比者修一水牎或砍一枯木並皆上聞旒扆取斷宸衷豈代天理物至公之道也自今以後若緣軍國大事及條式無文者任奏取進止自餘據章程合行者各令凖法處分其故生疑滯致有稽失者望令凖御史隨行糾彈上從之三年二月九日娑葛入冦監察御史崔琬劾奏兵部尚書宗楚客侍中紀處訥曰性惟險詖志越溪壑幸以遭逢聖主累忝殊榮承愷悌之恩居弼諧之地不能克意砥操憂國如家遂乃潜通獫狁納貨取資公引頑凶受賂無限且境外之交情狀難測今娑葛反叛邊鄙不寧此賊臣取怨中國臣忝直指義在觸邪請黜巨蠧用答天造並請收禁差三司追鞫其年五月監察御史李懐讓同奏吏部侍郎崔湜鄭愔有所挾附贓汚狼籍詔監察御史裴漼按其事時安樂公主事諷漼遂對重彈奏愔竟從貶削一説衛恒所劾恐非開元二年崔日知為京兆尹貪暴犯法御史大夫李傑糾劾之反為日知所搆侍御史楊瑒廷奏曰劾彈之舉若遭恐脅以成奸人之謀御史臺固可廢却上以其言切直遽令傑依舊視事貶日知為黟縣丞其年三月殿中御史郭震劾刑部尚書趙彦昭太子賓客韋安石彦震以女巫趙五娘左道亂常託為諸姑潜相援引既以提挈遂踐台階或驅車造門著婦人之服或攜妻就謁申猶子之情同惡相濟一至於此又張易之兄弟勢傾朝野嗣立之際結為舅甥神龍之初已合誅死天網踈漏腰領誤全與安石托附阿韋編諸属籍中宗晏駕削太上皇輔政之制定阿韋臨朝之策此時朝野危懼人臣怨憤臣雖才識妄庸忝司清憲熟見奸佞敢不糾彈彦昭並請准法處分於是並罷官建中元年三月監察御史張著冠豸冠彈京兆尹兼御史大夫嚴郢於紫宸殿以郢奉詔浚陵陽渠匿詔不時行故使奔蹙以歸怨于上上即位初侍御朱放請復舊制置朱衣豸冠内郎有犯者御史服以彈又令御史得専彈劾不復白於中丞大夫至是著首行之乃削郢御史大夫著賜魚袋自是日懸衣冠於宣政之左廊然著希楊炎之意彈郢人頗不直之貞元元年三月宰相召諌官御史宣諭史㫖曰自今上封彈劾宜人自陳論不得羣署章奏若涉朋黨初京兆尹李齊運以公事詬萬年縣丞源遂左右捽扼不已遂竟死于廷京師不直其妻鄭氏告寃闕下御史大夫崔縱請窮究死狀上不許遂妻訴寃不已縱執奏如初御史中丞張彧繼論御史連章彈齊運乃奏云臣孤立為朋黨所擠故命宰臣宣諭焉九年正月待御史殷永免官初奉誠軍節度使康日知朝覲失儀為御史彈奏詔捨之因勅御史有節將始至朝禮小失勿劾及是邠寧節度使張獻甫入閣失儀永廷劾之獻甫素服待罪闕下召見慰諭以永忘其前命故免元和三年三月御史中丞盧坦舉奏前山南西道節度使栁晟授任方隅所寄尤重至於勅令首合遵行一昨歸朝固違明㫖復修貢獻有紊典章㐲請付法又奏前浙東觀察使閻濟美到城亦有進獻當時勘責稱離越州後方見敕書道路已遙付納無處者既經鴻霈須為商量已書罰乞伏准今年正月敕文自今已後諸道長史有赴闕廷者並不得取本道錢物妄稱進奉栁晟等既違新令不敢不奏初坦既奏舉晟與濟美皆待罪於朝堂上召坦對褒慰久之曰晟等所獻皆以家財已許原不可失信坦奏曰赦令天下之大信也天下皆知之今二臣僚是不畏法陛下奈何以小信而失天下之大事乎上曰朕已受之如何坦曰歸之有司不入内藏使四方知之以昭聖徳上稱善其言十五年三月御史中丞崔植奏云元和十二年御史臺奏請知彈侍御史被彈即請向下人承次監奏或有不到即殿中侍御史於侍御史下立以備其缺臣伏以朝官入閣失儀知彈侍御史合彈奏錯失向下侍御史及中丞大夫遞相彈奏事後入本班候監奏出閣然後合待御史罪此乃殿廷舊制于事為宜今若移一殿中放彈御史之下以防向上失錯或殿中自錯則擬更立何人向下監奏繫于瞬息只合知彈侍御史便了不必别差殿中既乖故實終慮駁雜伏請自今已後却依閣内故事縱知彈御史自有錯失不被彈奏候班退監奏畢方出待罪冀從易便永可遵行奏可長慶四年六月待御史温造於閣内奏彈左金吾大將軍李祐近違勅罷吏請進馬以論祐趨出待罪宣放之太和二年義成軍節度使李聽為魏博所敗喪師過半御史中丞温造殿中侍御史崔蠡彈之曰賞罰不立無以示天下李聽按甲遷延逗撓以致狼狽而敗自圖茍免伏請付法司論罪上特原之七年九月侍御史李欵閣内彈奏前邠州行軍司馬鄭注曰内通勅使外連朝官兩地往來卜射財貨晝伏夜動干竊化權人不敢言道路以目請付法司奏未報欵連上十餘䟽由是授注通王府司馬九年六月御史大夫李固言奏知彈侍御史自京城百司及天下諸州府等公事應闗文法者皆先申臺司舊例配知彈侍御史一人専掌其事至朝日入闕閣又對仗彈奏中外臣僚不如法者事最重自須精詳一人當之實恐不逮臣商量請知彈御史一人専掌京城百司公事稽彈侍御史一人分掌諸州府之事庶使官業各修無所遺闕從之唐㑹要卷六十一
