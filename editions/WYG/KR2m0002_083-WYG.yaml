body:
  text: 唐㑹要卷八十三宋王溥撰嫁娶貞觀元年二月四日詔曰昔周公治定制禮垂裕後昆命媒氏之職以㑹男女每以仲春之月順時行令蕃育之理既𢎞邦家之化攸在朕恭承天命為之父母永言亭育用切于懐若不申之以婚姻明之以顧復便恐中饋之禮斯廢絶嗣之弊尤深既生怨曠之情或致滛奔之辱憲章典故實所庶幾宜令有司所在勸勉其庶人男女無室家者並仰州縣官人以禮聘娶皆任其同類相求不得抑取男年二十女年十五之上及妻喪達制之後孀居服紀已除並皆申以婚媾令其好合若貧窭之徒将迎匱乏仰于親近縣里富有之家裒多益寡使得資送其鰥夫年六十寡婦年三十以上及婦雖尚少而有男女及守志貞㓗並任其情無勞抑以嫁娶刺史縣令以下官人若能婚姻及時鰥寡數少量准户口増多以進考第如導勸乖方失於配偶准户减少附殿六年御史大夫韋挺上表曰夫婦之道王化所先婚姻之禮人倫攸尚所以承紹家業嗣續祖妣静而思之安可不敬嫁女之室有不息火之悲娶婦之家有不舉樂之感今貴族豪家婚姻之始或奏管絃以極􅂬晏唯競奢侈不顧禮經非所謂嗣親之道念别離之意正始之本實在於兹兹若不訓以義方将恐此風愈扇十六年六月詔氏族之盛實繁于冠冕婚姻之道莫先於仁義自有魏失御齊氏云亡市朝既遷風俗凌替燕趙右姓多失衣冠之緒齊韓舊俗或乖德義之風名不著于州閭身未免於貧賤自號膏粱之胄不敦匹敵之儀問名惟在於竊貲結䄜必歸于富室乃有新官之軰豐財之家慕其祖宗競結婚媾多納貨賄有如販鬻或自貶家門受屈辱于姻婭或矜其舊族行無禮於舅姑積習成俗迄今未己既紊人倫實虧名教朕夙夜兢惕憂勤政道往代蠧害咸已懲革惟此敝風未能盡改自今已後明加告示使識嫁娶之序各合典禮知朕意焉其自今年六月禁賣婚永徽二年九月紀王慎等議堂姨母之姑姨及堂姑姨父母之姑姨父母之姑舅姊妹壻姊妹堂外甥雖並外姻無服請不為婚詔可之先是御史大夫李乾祐奏言鄭州人鄭宣道先聘李𤣥乂之妹為妻𤣥乂妹即宣道堂姨𤣥乂情不合請罷婚宣道經省陳訴省以法無禁判許成親于是紀王慎等因此有議云顕慶三年七月制王女出嫁者稱適不得稱降取王女者稱娶不得稱尚四年十月十五日詔後魏隴西李寳太原王瓊滎陽鄭温范陽盧子選盧渾盧輔清河崔宗伯元孫凡七姓十一家不得自為婚姻仍自今已後天下嫁女受財三品以上之家不得過絹三百匹四品五品不得過二百匹六品七品不得過一百匹八品以下不得過五十匹皆充所嫁女貲粧等用其夫家不得受陪門之財李義府奏也太極元年左司郎中唐紹上表曰士庶親迎之禮偹諸六禮所以承宗廟事舅姑當須昏以為期詰朝謁見往者下俚庸鄙時有鄣車邀其酒食以為戯樂近日此風轉盛上及王公乃廣奏音樂多集徒侶遮擁道路留滯淹時邀致財物動踰萬計遂使鄣車禮貺過于聘財歌舞喧譁殊非助感既虧名教又蠧風猷違紊禮經湏知節制望請勅令禁斷至十一月十二日勅王公已下嫁娶比来時有鄣車既虧風教特冝禁斷開元十九年四月四日于京城置一禮㑹院其年九月二十四日勅禮㑹院冝屬司農寺其什物合令所司供院在崇仁坊南街二十二年二月勅男年十五女年十三以上聴婚嫁諸州縣官人在任之日不得共部下百姓交婚違者雖㑹赦仍離之其州上佐以及縣令于所統屬官亦同其定婚在前居官在後及三輔内官門閥相當情願者不在禁限建中元年十一月十六日𠡠冝令禮儀使與博士及宗正卿李琬漢中王瑀光禄卿李涵約古今舊儀及開元禮詳定公主郡主縣主出降覿見之儀條件聞奏将以化行天下用正國風至十二月二日禮儀使顔真卿等奏郡縣主見舅姑請于禮㑹院過事明日早舅坐于堂東階上西向姑南向婦執笄竹噐𤣥表纁裏盛以棗栗升自西階東面再拜跪奠于舅席前舅舉之賛者徹以東婦退再拜降于姑階下受笄盛以暇修從者執于階下升進北面再拜跪奠于姑席前姑舉之賛者受以東婦退又再拜降詣東西階拜婿之伯叔兄弟姊妹訖便赴光順門謝恩壻之親族次第奉謝訖舊赴十六王宅觀花燭伏以婚禮主敬竊恐非宜並請停障車下壻却扇詩等庻行禮之夕可以感思至于聲樂尤恐非禮亦請禁斷相見行禮近代設以氊帳埽地而置此乃戎禮穹廬之制合于堂室中置帳請准禮施行今時俗以子卯午酉年謂之當梁年其年娶婦舅姑不相見盖理無所據亦請禁斷其年十一月𠡠婚禮皆用誕馬在禮經無其文案周禮玉人有璋諸侯以聘女禮云玉以比徳今請駙馬加以璋郡主壻加以璧以代用馬又其函書出自近代事無經據請皆勿用從之勑會昌元年十一月𠡠婚娶家音樂并公私局㑹花蠟並冝禁斷租税上舊制凡賦役之制有四一曰租二曰調三曰役四曰雜徭開元二十三年𠡠以為令天下旡事百姓徭役務從减省遂减諸司色役一十二萬二百九十四人武徳二年二月十四日制毎丁租二石絹二丈綿三兩自兹以外不得横有調歛七年三月二十九日始定均田賦税凡天下丁男給田一頃篤疾廢疾給四十畆寡妻妾三十畆若為戸者加二十畆所授之田十分之二分為世業餘以為口分世業之田身死則承戸者授之口分則收入官更以給人毎丁嵗入粟二石調則隨鄉土所差綾絹絁各二丈布加五分之一輸綾絹絁者兼調綿三兩輸布者麻三斤凡丁歳役二旬若不役收其傭毎日三尺有事而加役者旬有五日免其調三旬則租調俱免通正役不過五十日若夷獠之户皆從半税凡水旱蟲霜為災十分損四已上免租損六已上免調損七已上課役俱免貞觀十一年侍御史馬周上䟽曰自古明王聖主雖因人設教寛猛隨時而大要惟以莭儉于身二者是務今百姓承喪亂之後比于隋時纔十分之一而供官徭役道路相繼兄去弟還首尾不絶春秋冬夏略無休時陛下雖毎有恩詔令其减省而有司作既不廢自然湏人徒行文書役之如故臣毎訪聞四五年来百姓頗有嗟怨之言以為陛下不存養之今京師及益州諸處營造供奉器物并諸王之服飾議者皆不以為儉陛下少處人間知百姓辛苦前代成敗目所親見尚猶如此而皇太子生長深宫不更外事萬嵗之後固聖心所當憂也凡修政教當修之於可修之時若事變一起而後悔之則無益也故人主每見前代之亡則知其政之所由喪而皆不知其身之失是知殷紂笑夏桀之亡而幽厲亦笑殷紂之滅京房云後之視今亦猶今之視古此言不可不誡也往者貞觀之初率土霜儉一匹絹纔得一㪷米而天下帖然百姓知陛下甚愛憐之故人人自安曽無謗讟自五六年來頻嵗豐稔一匹絹得粟十餘石百姓皆以為陛下不憂憐之咸有怨言又今所營為者頗多不急之務故也自古已來國之興亡不由蓄積多少唯在百姓苦樂且以近事驗之隋家貯洛口倉而李宻因之東都積布帛而王世充據之西京府庫亦為國家之用至今未盡向使洛口東都無粟帛則王世充李宻未能聚大衆但積貯者固是有司之常事要當人有餘力而後收之若人勞而强歛之更以資㓂積之無益也然儉以息人貞觀之初陛下已躬為之故今行之不難也若人既勞矣而用之不息倘國中被水旱之災邊方有風塵之警狂狡因之以竊發則有不可測之事矣以陛下之明誠欲勵精為政不煩逺求上古之術但及貞觀之初則天下幸甚永淳元年太常博士裴守真上表曰夫榖帛者非造化不育非人力不成一夫之耕纔兼數口一婦之織不贍一家賦調所資軍國之急煩徭細役並出其中黠吏因公以貪求豪强恃私而逼掠以此取濟人無以堪又以征戍濶逺土木興作丁匠疲于徃來餉饋勞于轉運㣲有水旱道路遑遑豈不以課税殷繁素無儲積故也夫太府積天下之財而國用有缺少府聚天下之伎而造作不息司農理天下之粟而倉庾不充太僕掌天下之馬而中廏不足此數司者役人有萬數費損無限極調廣人竭用多獻少奸偽由此而生黎庻緣斯而苦此有國之大患也開元八年三月二十日勅頃者以庸調無慿好􅁖湏准故造作様以頒諸州令其好不得過精惡不得至濫任土作貢防源斯在而諸州送物作巧生端茍欲副于斤兩遂則加其丈尺至有五丈為匹者理甚不然濶一尺八寸長四丈同文共軌其事乆行立様之時亦載此數若求兩而加尺甚暮四而朝三冝令所司簡閲有踰于此比常例丈尺過多聞奏十六年七月勅諸州租及地税等冝令州縣長吏專勾當依限徴納訖具所納數及徴官名品申省如徴納違限及檢覆不實所由官並先與替仍准法申懲二十二年五月十三日勅定户之時百姓非啇戸郭外居宅及毎丁一牛不得将入貨財數其雜匠及幕士并諸色同類有畨役令免征行者一戸之内四丁巳上任此色役不得過兩人三丁巳上不得過一人其年七月十八日勅自今已後京兆府關内諸州應徴庸調及資課并限十月三十日畢至天寳三載十一月赦文毎載庸調起八月徴以農功未畢恐難卒辦自今已後延至九月三十日二十五年三月三日勅關輔庸調所税非少既寡蠶桑皆資菽粟常賤糶貴買損費逾深又江淮苦變造之勞河路增轉輸之弊毎計其運脚数倍加錢今嵗屬平和庻物穣賤南畆有十千之獲京師同水火之饒均其餘以减逺費順其便使農無傷自今已後關内諸州庸調資課並冝准時價變粟取米送至京逐要支用其路逺處不可運送者冝所在收貯便充隨近軍粮其河南河北有不通水利冝折租造絹以代關中調課所司仍明為條件稱朕意焉二十九年二月十二日勅自今已後應緣納物或有濫惡者更不徴折估但明為殿最責在所由者可准二十七年二月十七日敕文條例處分天寳元年正月一日赦文如聞百姓之内有戸髙丁多者為規避父母現在乃别籍異居冝令州縣勘㑹其家之中有十丁巳上者放兩丁征行賦役五丁巳上者放一丁即令同籍共居以敦風教其侍丁孝假與免差科九年十二月勅自今已後天下兩税其諸色輸納官典受一錢已上並同枉法賍論官人先觧見任典正等先决四十委採訪使廵察若不能舉按者採訪使别有處分廣徳二年七月十一日制一戸之中有三丁放一丁庸税地税依舊大厯四年正月十八日勅百姓及王公已下自今已後冝准度支長行㫖條毎年税錢上上戸四千文上中戸三千五百文上下戸三千文中上戸二千五百文中中戸二千中下戸一千五百下上戸一千下中戸七百文下下戸五百文其現任官一品准上上戸税九品准下下戸税餘品並准依此戸等税若一戸數處任官亦毎䖏依品納税其内外官仍㩀正員及占額内闕者税其賦及同正員文武官不在税限其百姓有邸店行舖及爐冶應准式合加本戸二等税者依此税數勘責徴納其寄莊戸准舊例從八等戸税寄卜住户從九等戸税比類百姓事恐不均冝各逓加一等税其諸色浮客及權時寄住戸等無問有官無官亦所在為兩等收税稍殷有者准八等戸税餘准九等戸税如數䖏有庒田及每䖏納税諸道將士庒田既縁防禦勤勞不可同百姓例並一切從九等輸税八年正月二十五日勅青苖地額錢天下毎畆率十五文以京師煩劇先加至三十文自今已後冝准諸州毎畆十五文十四年五月内庒宅使奏州府没人之田有租萬四千餘斛官中主之為冗費上令公給行在以為軍儲建中元年正月五日赦文冝委黜陟使與觀察使及刺史轉運所由計百姓及客等約丁産定等第均率作年支兩税如當䖏土風不便更立一限其比來徴科色目一切停罷至二月十一日起准條請令黜陟觀察使及州縣長官㩀舊徴税數及人戸土客定等第錢數多少為夏秋兩税其鰥寡惸獨不支濟者准制放免其丁租庸調並入兩税州縣常存丁額准式申報其應科斛斗准㩀大厯十四年見佃青苖地額均税夏税六月内納畢秋税十一月内納畢其黜陟使毎道定税訖具當州應税都數及徴納期限并支留合送等錢物斛斗分析聞奏并報度支金部倉部比其月水赦天下遣黜陟使觀風俗仍與觀察使刺史計人産等級為兩税法此外歛者以枉法論八月宰相楊炎上䟽奏曰國家初定令式有租賦庸調之法至開元中𤣥宗修道徳以寛仁為理本故不為版籍之書人戸寖溢隄防不禁丁口轉死非舊名矣田畆移換非舊額矣貧富升降非舊第矣戸部徒以空文搃其故書盖非得當時之實舊制人丁戌邊者蠲其租庸六嵗免歸𤣥宗方事夷狄戍者多死不返將怙寵而諱以不死申故其貫籍之名不除至天寳中王鉷為戸口使方務聚歛以丁籍且存則丁身焉往是隐課而不出耳遂按舊籍計除六年之外積徴其家三十年租庸天下之人苦而無告則租庸之法弊矣迨至徳之後天下兵起始以兵役因之飢癘徴求運輸百役並作人戸凋耗版圗空虛軍國之用仰給于度支轉運二使四方征鎮又自給于莭度團練使賦歛之司增數而莫相統攝綱目大壊朝廷不能覆諸使諸使不能覆諸州四方貢献悉入庫藏權臣猾吏縁以為姦或公託進獻私為􅂍盗者動萬計有重兵䖏皆厚自奉養上賦所入無㡬吏職之名隨人署置故科斂之名凡數百廢者不削重者不去新舊仍積不知其涯百姓受命而供之旬輸月送無有休息吏因其苛蠶食於人凡常人多丁率為官為僧以色役免貧人無所入則丁存故課免于上而賦增于下是以天下殘瘁蕩為流人鄉居地著百不四五如是迨三十年今請作兩税法以一其名曰凡百役之費一錢之歛度其數而賦於人量出以制入戸無主客以見居為簿人無丁中以貧富為差不居䖏而行商者在所郡縣税三十之一度所與居者均使無僥利居人之税秋夏兩徴之俗有不便者正之其租庸雜徭悉省而丁額不廢申報出入如舊式其田畆之税率以大厯十四年墾田之數為凖而均徴之夏税無過六月秋税無過十一月逾嵗之後有戸增而税减輕及人散而失均者進退長吏而以度支總統焉徳宗善而行之三年五月初加税時淮南莭度使陳少逰請于當道兩税錢毎一千加税二百度支因詔諸道悉如之貞元二年正月詔天下兩税錢委本州揀擇官典上都其應定色目程限脚價錢物委度支條流聞奏四年正月一日赦文其京兆府今年已後准當府毎年勅額應合給用錢物斛斗及草者冝便於兩税内比諸州府例尅留免其重叠請受餘送納度支其河南府亦宜准此八年四月劍南西川觀察使韋臯奏請加税什二以增給官吏從之十二年十月虢州刺史崔衍奏所部多是山田且當郵傳衝要屬嵗不稔頗有流離舊額賦租特乞蠲减其略曰伏見比來諸州應緣百姓間事患在典吏因循不為申請不患陛下不優恤患在申請不指實不患朝廷不施仁故有以不言受譴者未有以言得罪者陛下授臣以疲人臣用不敢廽顧茍求自安敢罄狂聲上凟聰聴辭理切直為時所稱元和四年二月度支奏諸州府應供上都兩税匹叚及留使錢物等伏望起元和四年已後據州縣官正料錢數内一半依京官例徴納見錢支給仍先以郭下兩税戸合納見錢充如不足即於當州兩税錢内㩀貫均配支給其餘留使留州雜給用錢即各委本州府並依送省輕貨中估折納匹叚充如本戸税錢較少不成端疋者任折納絲綿充數如舊例今徴納雜物斛斗支用者即任准舊例處分應帯節度觀察使州府合送上都兩税錢既須差綱發遣其留使錢又配管内諸州供送事頗重叠其諸道留使錢各委節度觀察先以本州舊額留使及送上都兩税錢充如不足即于管内諸州兩税錢内㩀貫均配其諸州舊額供使錢即隨夏税日限收送上都度支收入次年㫖符便為定制伏以諸道兩税徴歛不常閭井之間頗聞困弊臣今類會如前勅㫖自今已後送省及留使匹叚不得剝徴折估錢其供軍醤菜等價直合以留使錢充者亦令見錢匹叚均納仍具毎州毎使合納見錢數及州縣官俸料内一半見錢數同分析聞奏仍使編入今年㫖條以為恒制餘依先是方鎮皆以實估歛于人虚估聞于上宰相裴垍俾有司奏請釐革人受其賜六月令京兆府其兩税冝以粟麥絲絹等折納五年正月度支奏諸府州見錢准勅冝于營内州㩀都徴錢數逐貫均配其先不徴見錢州郡不在分配限定一州見錢數任刺史㸔百姓稳便䖏置其勅文不加减者即准州府所申為定額如于勅額見錢外輙擅配一錢及納物不依送省中估刺史縣令錄事参軍請與莭級科貶六年二月制編戸之征既有藝極字甿之要當恤有無茍徴歛之不時則困弊之無日近緣諸州送使錢物廽充上供合送使司又立程限所以毎至嵗首給用無資不免量抽夏税新陳未接營辦尤難觀察使且以供軍錢方圓借便輙不得量抽百姓夏貢有差先乎任土周幣殊等實在便人近日所徴布帛並先定物様一例作中估受納精麄不等退換者多轉將貨賣皆致損折其諸道留使留州錢數内絹帛等但得有用處隨其髙下約中估物價優饒與納則私無棄物官靡逋財其所納見錢仍許五分之中量徴二分餘三分兼納實估匹叚先是天下百姓輸賦于府一曰上供二曰留州建中初定税時貨重錢輕是後貨輕錢重齊人所出固以倍其初征矣其留州送使所在長吏又降省估使仍實估以自封殖而重賦于人及裴垍為相奏請天下留州送使物一切令于省估其所在觀察使仍以其涖之郡租賦自給若不足復許徴于支郡其諸州送使額悉變為上供疲人稍蘇十一年六月京兆府奏今年諸縣夏税折納綾絹絁紬絲綿等並請依本縣時價祗定上中一等毎疋加饒二百文綿毎兩加饒二十文其下等物不在納限小戸本錢不足任納絲綿斛㪷湏是本戸如非本户輒合集買成匹叚代納者所由决十五枷項令衆勅㫖依奏十四年二月勅如聞諸道州府長吏等或有本任得替後遂于當處買百姓庒園舍宅或因替代情弊便破除正額兩税不出差科今後有此色并勒依元額為定唐㑹要卷八十三
