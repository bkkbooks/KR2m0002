body:
  text: 唐會要卷一宋王溥撰帝號上獻祖宣皇帝諱熈凉武昭王暠曾孫嗣凉王歆孫𢎞農太守重耳之子也武德元年六月二十二日追尊為宣簡公咸亨五年八月十五日追尊宣皇帝廟號獻祖葬建初陵在趙州昭慶縣界儀鳯二年五月一口追封為建昌陵開元二十八年七月十八日詔改為建初陵懿祖光皇帝諱天賜宣皇帝長子武德元年六月二十二日追尊懿王咸亨五年八月十五日追尊光皇帝廟號懿祖葬啓運陵在趙州昭慶縣界儀鳯二年三月一日追封為延光陵開元二十八年七月十八日詔改為啓運陵太祖景皇帝諱虎光皇帝第二子武德元年六月二十二日追尊景皇帝廟號太祖葬永康陵在京兆府三原縣界世祖元皇帝諱昺景皇帝第三子武德元年六月二十二日追尊元皇帝廟號代祖葬興寧陵在京兆府咸陽縣界髙祖神堯大聖大光孝皇帝諱淵元皇帝第四子母曰元貞皇后獨孤氏隋義寧二年五月二十日受禪于太極殿年五十三武德九年八月八日傳位稱太上皇貞觀九年五月六日崩于大安宫垂拱前殿年七十其年十月庚寅葬獻陵在京兆府三原縣界諡曰大武皇帝廟號髙祖哀册文秘書監虞世南撰諡册文闕諡議闕咸亨五年八月十五日追尊髙祖神堯皇帝天寳八載六月十五日追尊髙祖神堯大聖皇帝十三載二月九日追尊髙祖神堯大聖大光孝皇帝年號一盡武德九年宰相十六人秦王裴寂劉文静蕭瑀竇抗陳叔達楊仁恭封德􅃔裴矩髙士亷齊王元吉宇文士及長孫無忌杜如晦房𤣥齡太宗文武大聖大廣孝皇帝諱世民髙祖第二子母曰太穆順聖皇后竇氏隋開皇十八年十二月戊午生于武功别館武德元年六月一日封秦王九年六月七日册為皇太子八月九日即位于東宫明德殿年二十七貞觀二十三年五月二十六日崩于翠微宫含風殿年五十二其年八月庚寅葬昭陵在京兆府醴泉縣界諡曰文皇帝廟號太宗哀册文中書令褚遂良撰諡議闕咸亨五年八月十五日追尊太宗文武聖皇帝天寳八載六月十五日追尊太宗文武大聖皇帝十三載二月九日加尊太宗文武大聖大廣孝皇帝年號一貞觀二十三年宰相二十五人裴寂蕭瑀陳叔達李靖封德􅃔宇文士及長孫無忌杜如晦房𤣥齡髙士亷温彦博岑文本魏徵侯君集楊師道戴胄劉洎李世勣張亮馬周褚遂良崔仁師楊𢎞禮王珪杜淹髙宗天皇大聖大𢎞孝皇帝諱治太宗第九子母曰文德順聖皇后長孫氏貞觀二年六月十三日生于東宫麗正殿二月封晉王十七年四月七日册為皇太子二十三年六月一日即位年二十二咸亨五年八月十五日稱天皇𢎞道元年十二月四日崩于東都貞觀殿年五十六文明元年八月庚寅葬乾陵在京兆府奉天縣界諡曰天皇大帝廟號髙宗哀册文天后武氏撰諡册文闕諡議闕天寳八載六月十五日加尊號髙宗天皇大聖皇帝十三載二月六日加尊號髙宗天皇大聖大𢎞孝皇帝年號十五永徽七年正月七日改為顯慶顯慶六年二月三十日改為龍朔龍朔四年正月一日改為麟德麟德三年正月五日改為乾封乾封三年二月二十九日改為總章總章三年三月十八日改為咸亨咸亨五年八月十五日改為上元上元三年十一月三日改為儀鳯儀鳯三年四月二十二日勅改来年正月一日為通乾元年十二月十日勅停不行至四年六月十五日改為調露調露元年八月二十三日改為永隆永隆二年十月六日改為開耀開耀二年二月十三日改為永淳永淳二年十二月四日改為𢎞道元年宰相四十七人長孫無忌褚遂良于志寧張行成髙季輔李世勣桞奭宇文節韓瑗来濟崔敦禮李義府許敬宗杜正倫辛茂將任雅相盧承慶許圉師上官儀劉祥道竇德𤣥樂彦暐孫處約姜恪陸敦信戴至德劉仁軌楊武李安期張文瓘趙仁本閻立本李敬𤣥郝處俊來恒薛元超李義琰髙智周張大安裴炎王德真崔知温郭待舉岑長倩郭正一魏𤣥同劉齊賢中宗孝和大聖大昭孝皇帝諱顯高宗第七子母曰則天順聖皇后武氏顯慶元年十一月五日生二月二日封周公儀鳯二年十月三日徙封英王改名哲永隆元年八月二十三日册為皇太子𢎞道元年十二月六日即位年二十八嗣聖元年二月六日太后廢帝為廬陵郡王房州安置聖厯元年六月遣職方員外郎徐彦伯迎于房州聖厯元年九月十五日册為皇太子依舊名顯二年臘月二十五日賜姓武氏神龍元年二十四日復位於通天宫端扆殿年五十二月五日國號依舊稱大唐十一月加尊號應天皇帝三年八月三日加尊號應天神龍皇帝景龍四年六月二十二日崩于神龍殿年五十五景雲元年十一月己酉葬定陵在京兆府富平縣界諡曰孝和皇帝廟號中宗哀册文工部侍郎徐彦伯撰諡册文闕諡議闕天寳八載六月追尊號中宗孝和大聖皇帝十三載二月追尊號中宗孝和大聖大昭孝皇帝年號三神龍三年九月改為景龍景龍四年六月四日改為唐隆元年宰相三十八人安國相王姚元之韋安石唐休璟崔𤣥暐楊再思張柬之房融韋承慶袁恕已桓彦範敬暉武三思祝欽明魏元忠李懷逺豆盧欽望韋巨源李嶠于惟謙蘇瓌宗楚客蕭至忠紀處訥張仁亶韋嗣立崔湜趙彦昭韋溫鄭愔睿宗𤣥真大聖大興孝皇帝諱旦髙宗第八子母曰則天順聖皇后武氏龍朔二年六月一日生于蓬莱宫含凉殿十一月十八日封殷王乾封元年七月徙封豫王總章二年十一月十二日徙封冀王改名輪上元三年正月徙封相王永隆二年又改封豫王仍名旦嗣聖元年二月七日即位年二十二太后臨朝天授元年九月降為皇嗣改名輪聖厯二年正月六日立為皇太弟固辭不就二月十四日改封安國相王唐隆元年六月二十四日即位于承天樓年四十九延和元年七月二十五日傳位開元四年五月二十日崩于百福殿年五十五其年十月庚午葬橋陵在京兆府奉先縣界諡曰大聖𤣥真皇帝廟號睿宗哀册文紫微侍郎蘇頲撰諡册文闕諡議闕天寳八載六月追尊號睿宗𤣥真大聖皇帝十二載二月加尊號睿宗𤣥真大聖大興孝皇帝年號三景雲二年正月十九日改為太極太極元年五月改為延和元年宰相二十五人平王李嶠蕭至忠張仁亶韋嗣立趙彦昭韋安石蘇􅉞唐休璟裴談張錫岑義崔湜劉幽求鍾紹京李日知薛魏姚元之崔日用宋璟郭元振張說竇懷正魏知古陸象先𤣥宗至道大聖大明孝皇帝諱隆基睿宗第三子母曰昭成順聖皇后竇氏垂拱元年八月五日生于東都之别殿以其日為千秋節後改為長天節三年閏正月二日封楚王長壽二年臘月降封為臨淄郡王唐隆元年六月二十一日進封平王七月二十六日册為皇太子延和元年七月五日即位年二十八先天二年十月一日加尊號開元神武聖烈皇帝開元二十七年二月七日加尊號開元聖文神武皇帝天寳元載二月十一日加尊號開元天寳聖文神武皇帝七載五月十三日加尊號開元天寳聖文神武應道皇帝八載閏六月五日加尊號開元天地大寳聖文神武應道皇帝十三載二月七日加尊號開元天地大寳聖文神武證道孝德皇帝至德元年七月二日傳位册為太上皇帝三年正月五日加號太上至道聖皇帝乾元元年正月改尊號太上聖皇天帝元年七月五日崩于神龍殿年七十八廣德元年辛酉葬泰陵在京兆府奉先縣界諡曰至道大聖大明孝皇帝廟號𤣥宗哀册文左散騎常侍王縉撰諡册文闕諡議闕年號三先天二年十一月一日改為開元開元三十年正月一日改為天寳天寳十五載七月十五日傳位宰相三十四人劉幽求韋安石魏知古崔湜陸象先竇懷正岑羲蕭至忠郭元振張說姚元之盧懐慎源乾曜宋璟蘇頲張嘉貞王俊李元紘杜暹蕭嵩宇文融裴光庭韓休裴耀卿張九齡李林甫牛仙客李適之陳希烈楊國忠韋見素崔圓房琯崔渙使相八人源乾曜張說王俊張嘉貞王正杜暹蕭嵩哥舒翰肅宗文明武德大聖大宣孝皇帝諱亨𤣥宗第三子母曰元獻皇后楊氏景雲二年九月三日生于東宫之别殿以其日為天平地成節初諱嗣昇先天元年九月封陜王開元十三年三月徙封忠王改諱浚二十六年三月改諱璵六月三日册為皇太子三十年九月改諱紹天寳二載改諱亨十五載七月十二日即位于靈武殿年四十六至德三年正月五日上尊號光天文武大孝感皇帝乾元元年正月加尊號乾元光天孝感皇帝二年正月一日加尊號乾元大聖光天文武孝感皇帝上元二年九月二十一日詔去皇號唯稱皇帝寳應元年四月十八日崩于長生殿年五十二寳應二年三月庚午葬于建陵在京兆府醴泉縣界諡文明武德大聖大宣孝皇帝廟號肅宗哀册文兵部侍郎裴士淹撰諡册文闕諡議闕年號五至德三年三月五日改為乾元乾元閏四月九日改為上元上元二年九月二日改為元年以今年十一月為歳首以斗所建辰為名建已月改元寳應復以正月為歳首建已月為四月宰相十六人韋見素崔圓房琯裴冕崔渙李麟苗晉卿張鎬王嶼吕諲李峴第五琦李揆蕭華裴遵慶元載使相八人裴冕郭子儀李光弼崔渙崔圓張鎬王嶼吕諲代宗睿文孝皇帝諱豫肅宗長子母曰章敬皇后吳氏開元十四年十月十三日生于中宫之别殿以其日為天興節二十年八月二十一日封廣平郡王諱俶至德二年十二月十五日進封楚王乾元元年三月改封成王五月十九日册為皇太子十月五日改諱豫寳應元年四月二十一日即位年三十七二年七月七日加尊號寳應元聖文武皇帝大厯十四年五月二十日崩于大明殿年五十四其年十月己酉葬元陵在京兆府富平縣界諡睿文孝武皇帝廟號代宗哀册文中書侍郎崔祐甫撰諡册文闕諡議闕年號三寳應二年七月二十日改為廣德廣德三年正月一日改為永泰永泰二年十月十二日改為大厯宰相六人雍王适苗晉卿裴遵慶元載李輔國劉晏使相十七人郭子儀李光弼李峴僕固懐恩李懷来王縉辛雲京第五琦杜鴻漸崔圓裴冕田承嗣朱泚李正已李寳臣李忠臣李抱玉德宗神武孝文皇帝諱适代宗長子母曰睿真皇后沈氏天寳元載壬戌歳四月十九日生于長安大内之東宫不置節名元年建丑月特拜進封奉節郡王寳應元年五月充天下兵馬元帥進封魯王八月改封雍王十月出鎮陜州廣德元年拜尚書令元帥如故食實封二千户賜鐵券圖形凌煙閣三年册為皇太子大厯十四年五月即位年三十八建中元年正月加尊號曰聖神文武皇帝貞元二十一年正月崩于會寧殿年六十四十月葬崇陵在京兆府雲陽縣界諡曰神武孝文皇帝廟號德宗哀册文刑部侍郎許孟容撰年號三建中盡四年興元一年貞元盡二十一年宰相三十人崔祐甫常衮李勉楊炎盧把馬燧關播蕭復喬琳劉從一姜公輔盧翰李晟張延賞韓滉崔造桞渾李泌董晉趙憬陸贄賈耽盧邁崔損趙宗儒鄭餘慶杜佑齊抗高郢鄭珣瑜使相二十人郭子儀朱泚李寳臣李正已李忠臣梁崇義李希烈李懷光陳少逰李抱真張孝思王武俊劉𤣥佐渾瑊李訥嚴震田緒劉滋韋臯李思古順宗至德𢎞道大聖大安孝皇帝諱誦德宗長子母曰昭德皇后王氏上元二年辛丑歳正月十二日生于長安之東内不置節名大厯十四年六月封為宣王建中元年正月册為皇太子貞元二十一年正月即位年四十五七月以疾未瘳令皇太子監國八月傳位居興慶宫稱誥元和元年正月上尊號曰應乾聖壽太上皇其月十九日崩于興慶宫年四十六七月葬豐陵諡曰至德𢎞道大聖大安孝皇帝廟號順宗哀册文吏部侍郎趙宗儒撰諡册文禮部侍郎崔汾撰諡議太常寺少卿崔樞撰大中三年十二月追崇尊諡曰至德𢎞道大聖大安孝皇帝諡册文中書侍郎馬植撰諡議兵部尚書歸融撰年號一永貞一年宰相七人賈耽杜佑鄭珣瑜高郢韋執誼杜黄裳袁滋使相五人劉滋韋臯李思古張茂昭吳少誠憲宗昭文章武大聖至仁孝皇帝諱純順宗長子母曰莊憲皇后王氏大厯三年戊午歳二月十四日生于長安之東内不置節名貞元四年六月封為廣陵王開府儀同三司名淳二十一年四月册為皇太子改諱純七月權勾當軍國政事永貞元年八月即位年二十八元和三年正月上尊號曰睿聖文武皇帝十四年七月又上尊號曰元和睿聖文武法天應道皇帝十五年正月二十七日崩于大明宫之中和殿年四十三五月葬景陵在京兆府奉先縣界諡曰聖神章武孝皇帝廟號憲宗哀册文門下侍郎令狐楚撰諡册文户部侍郎楊於陵撰諡議權知禮部侍郎李建撰大中三年十二月追崇尊諡曰昭文章武大聖至仁孝皇帝諡册文左僕射平章白敏中撰諡議兵部尚書太常卿歸融撰年號一元和盡十四年宰相二十一人賈耽韋執誼杜佑杜黄裳袁滋鄭餘慶于頔鄭絪武元衡李吉甫韓𢎞裴垍李藩權德輿李緯張𢎞靖李貫之裴度李逢吉王涯崔羣使相十一人劉濟李師古張茂昭吳少誠王士真田季安髙崇文裴均王鍔劉總田𢎞正穆宗睿聖文惠孝皇帝諱恒憲宗第三子母曰懿安皇后郭氏貞元十一年乙亥歳七月六日生于大明殿不置節名二十一年四月封為延安郡王名宥元和元年八月進封遂王七年十月册為皇太子改諱恒十五年正月即位年二十六長慶元年七月上尊號曰文武孝德皇帝四年正月二十二日崩于寢殿年三十十一月葬光陵在京兆府奉先縣界諡曰睿聖文惠孝皇帝廟號穆宗哀册文右僕射平章李逢吉撰諡册文中書侍郎平章事牛僧孺撰諡議闕年號一長慶四年宰相十四人韓𢎞裴度李夷簡皇甫鎛令狐楚張𢎞靖蕭俛段文昌崔恒杜元穎王播元稹李逢吉牛僧孺使相五人劉總田𢎞正李光顔李愬劉悟敬宗睿武昭愍孝皇帝諱湛穆宗長子母曰恭僖皇后王氏元和四年己丑歳六月九日生于東宫之别殿不置節名長壽元年三月封為鄂王尋改為景王二年十二月册為皇太子四年正月即位年一十六寳厯元年四月上尊號曰文武大聖廣孝皇帝二年十二月八日中官蘇明佐等作難帝遇害年十八太和元年七月葬莊陵在京兆府三原縣界諡曰睿武昭愍孝皇帝廟號敬宗哀册文司空平章事裴度撰諡册文右僕射竇易直撰諡議闕年號一寳厯盡二年宰相七人杜元穎王播李逢吉牛僧孺李程裴度竇易直使相三人李光顔劉浩烏重𦙍唐會要卷一
