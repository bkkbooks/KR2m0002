body:
  text: 唐㑹要卷八十六宋王溥撰奴婢舊制凡反逆相坐没其家為官奴婢反逆家男女及奴婢没官皆謂之官奴婢男年十四已下者配司農十五已上者以其年長令逺京邑配嶺南為城奴也一免為畨户再免為雜户三免為良人皆因赦宥所及則免之凡免皆因恩言之得降一等二等或直入良人諸律令格或有言官户者畨户雜户之總號非謂别有一色武徳五年安州刺史李大亮以破輔公祏功賜奴婢百人大亮謂曰汝輩多衣冠子女破亡至此吾亦何忍以汝為賤𨽻乎一一皆放還髙祖聞而嗟賞更賜奴婢二十人顯慶二年十二月勅放還奴婢為良及部曲客女者聽之皆由家長手書長子已下連署仍往本屬申牒除附諸官奴婢年六十已上及廢疾者並免刪永昌元年九月越王貞收諸家僮勝衣甲者千餘人于是制王公已下奴婢有數如意元年四月十七日勅逆人家奴婢及縁坐等色入官者不須充尚食尚藥驅使萬歳通天元年九月勅士庶家僮僕有驍勇者官酬主直並令討擊契丹時契丹首領李盡忠攻陷營州也大足元年五月三日勅北方縁邊州縣不得畜突厥奴婢景龍三年司農卿趙履温奏請以隋代畨户子孫數千家没為官奴婢仍充賜口以給貴倖監察御史裴子餘以為官户承恩始為畨户又是子孫不可抑之奏免之天寳八載六月十八日京畿及諸郡百姓有先是給役在私家驅使者限勅到五日内一切送付内侍省其中有自南口及契劵分明者各作限約定數驅使雖王公之家不得過二十人其職事官一品不得過二十人二品不得過十人三品不得過八人四品不得過六人五品不得過四人京文武清官六品七品不得過二人八品九品不得過一人其嗣郡王郡王縣主國夫人諸縣君等請各依本品同職事及京清資官處分其有别承恩賜不在此限其䕃家父祖先有者各依本䕃職减比見任之主其南口請比蜀蠻及五溪嶺南夷僚之類大厯十四年五月詔曰邕府歲貢奴婢使之離父母之鄉絶骨肉之戀非仁也宜罷之其年八月都官奏伏凖格式官奴婢諸司每年正月造籍二通一通送尚書一通留本司並每年置簿㸃身團貎然後闗金倉部給衣糧又凖格式官户有受勲及入老者並從良比來因循省司不立文案伏恐日月滋深官户逃散其受勲及入老者無定數便請令諸司凖式造籍送省並孳生及死亡者每季申報庶憑勘㑹􅃯㫖宜並凖式處分自今已後有處闕者委所司奏聞凖法科罪元和四年閏三月勅嶺南黔中福建等道百姓雖處遐俗莫非吾人多罹掠奪之虞豈無親愛之戀縁公私買賣奴婢宜令所在長吏切加捉搦并審細勘責委知非良人百姓方許文關有違犯者凖法處分八年九月詔自嶺南諸道輒不得以良口餉遺及將諸處博易又有求利之徒以良口博馬並􅃯所在長吏嚴加捉搦如長吏不曾勾當委御史臺訪察聞奏長慶元年三月平盧軍節度使薛平奏應有海賊誘掠新羅良口將到當管登萊州界及緣海諸道賣為奴婢者伏以新羅國雖是外蕃常禀正朔朝貢不絶與内地無殊其百姓良口等常被海賊掠賣于理實難先有制勅禁斷縁當營乆蹈域中承前不守法度自收復已來道路無阻逓相販鬻其獘尤深伏乞特降明勅起今已後緣海諸道應有上件賊誘賣新羅良人等一切禁斷請所在觀察使嚴加捉搦如有違犯便凖法斷勅旨宜依三年正月新羅國使金柱弼進狀先䝉恩勅禁賣良口使任從所適有老弱者栖栖無家多寄傍海村鄉願歸無路伏乞牒諸道傍海州縣每有船次便賜任歸不令州縣制約勅旨禁賣新羅尋有正勅所言如有漂寄固合任歸宜委所在州縣切加勘會責審是本國百姓情願歸者方得放囘寳厯二年十一月勅朝官及節度觀察使自今已後並不許更置私自身驅使太和二年十月勅嶺南福建桂管容邕管安南等道百姓禁斷掠買餉遺良口前後制勅處分重叠非不明衛中行李元志等雖云買致數實至多宜各令本道施行元和四年閏三月五日及五年九月十八日勅文切加約勒仍逐官各差判官奏當司應管諸司所有官户奴婢等處要典及令文有免賤從良條近年雖赦勅諸司皆不為論致有終身不霑恩澤今請諸司諸使各勘官户奴婢有廢疾及近年七十者請凖各令處分其新羅奴婢伏凖長慶元年三月十一日勅應有海賊誘掠新羅良口將到縁海諸道賣為奴婢並禁斷者雖有明勅尚未止絶伏請申明前勅更下諸道切加禁止旨宜依會昌五年四月中書門下奏天下諸寺奴婢江淮人數至多其間有寺已破廢全無僧家奴婢既無衣食皆自營生或聞洪潭管内人數倍一千人已下五百人已上處計必不少臣等商量且望各委本道觀察使差清强官與本州刺史縣令同㸃檢具見在口數及老弱嬰孩並須一一分析聞奏如先自營生及已輸納者亦别項分析深恐無良吏及富豪商人百姓綱維潜計會藏隐事須稍峻法令如有犯者便以奴婢計估當二十千已上者並處極法官人及衣冠奏聴進止如有人糺告便以奴婢充賞待勘知人數續具條流其京城委功徳亦凖此條流仍具數奏聞勅旨依奏其年八月中書門下奏應天下廢寺放奴婢從良百姓者今聞有細口恐刺史已下官人及富豪衣冠商人百姓計會藏隱及量與錢物索取勅下後如有此色並仰首出却還父母如有依前隱蔽有人糺告官人已下逺販商人百姓並處極法其告事人每一口賞錢一百千便以官錢充給續徴所犯人令填納勅旨宜依六年二月勅山南江淮間寺家奴婢比來有勅釐革或有父母贖男女將歸歳月既深今却捜檢情非違勅事恐擾人如有此色勘驗有憑並宜不要進收自會昌元年以後者不在此限大中五年二月勅邊上諸州鎮送到投來吐蕃􅂞鶻奴婢等今後所司勘問了宜並配嶺外不得𨽻内地九年閏四月二十三日勅嶺南諸州貨賣男女奸人乗之倍射其利今後無問公私上客一切禁斷若潜出劵書暗過州縣所在捜獲以强盗論如以男女傭賃與人責分口食任於當土五年限為滿不得將出外界大順二年四月二十日勅天下州府及在京諸軍或因收獲百姓男女宜給内庫銀絹委兩軍收贖歸還父母其諸州府委本道觀察使取上供錢充贖不得壓良為賤道路貞觀十四年七月三十日移五崤道于莎柵復舊路開元二十八年正月十三日令兩京道路並種果樹令殿中侍御史鄭審充使天寳三載五月京兆尹蕭昊奏請於要道築甬道載沙實之至於朝堂從之九月昊又奏廣之七年四月河南尹韋濟奏于偃師縣東山下開驛路通孝義橋北坡義堂路也廣徳元年八月勅如聞諸軍及諸府皆扵道路開鑿營種衢路隘窄行李有妨茍狥所資頗乖法理宜令諸道諸使及州府長吏即差官廵檢各依舊路不得輒有耕種并所在橋路亦令隨要修葺大厯八年七月勅諸道官路不得令有耕種及斫伐樹木其有官處勾當填補貞元七年八月商州刺史李西華請廣商山道又别開偏道以避水潦從商州西至藍田東抵内鄉七百餘里皆山險行人苦之西華役工十餘萬脩橋道起官舎舊時秋夏水盛阻山澗行旅不得濟者或數日粮絶無所糴西華通山間道謂之偏路人不留滯行者為便太和二年二月鄭州刺史楊歸厚奏當州郭下官路不置在州城内使命往來出入非便伏請凖汝州例置驛路于城西勅㫖冝依其年定州奏當管白石嶺南路管驛險峻請移于易州西紫荆嶺路修置從之開成元年四月昭義節度使奏請開夷儀山路通太原晉州從之大中三年十一月山南西道節度使鄭渥鳯翔節度使李玭等奏當道先凖􅃯新開文川谷路從靈泉驛至白雲驛共一十所并毎驛側近置私客舘一所其應縁什物糧料遞乘並作夫專知官及橋道等開修制置畢其斜谷路創置驛五所平州驛一所連雲驛一所松嶺驛一所靈谿驛一所鳯泉驛一所並已畢功訖􅃯㫖蜀漢道古今欹危自羊膓九曲之盤入鳥道三巴之外雖限戎隔夷誠為要害而人御馬匹常困險難鄭渥首創厥功李玭繼成巨績校兩路之逺近减十驛之途程人不告勞功已大就偃師開路祗為通衢桂陽列亭止于添驛此則通千里之險峻便三川之往來實為良能克當寄任冝依所奏仍付史館四年六月中書門下奏山南西道新開路訪聞頗不便人近有山水摧損橋閣使命停擁館驛蕭條縱遣重修必倍費力臣等今日延英面奏宣㫖却令修斜谷舊路及館驛者臣等商量望詔宣敖及鳯翔節度使觀察使令速㸃檢計料修置或縁館驛未畢使命未可徑通其商旅及私行任取稳便往來不得更有約勒勅㫖依奏其年八月山南節度使封敖奏當道先凖詔令臣檢討却修置斜谷路者臣當時差軍將領官健人夫併力修置道路橋閣等去七月二十日畢功通過商旅騾馬擔馱往來七月二十二日已具聞奏訖其館驛先多摧毁破壊併功修樹今並已畢臣已散牒縁路管界州縣及牒鳯翔劍南東西兩川觀察使並令取八月十五日以後于斜谷路過使命謹具如前勅旨冝依仍付所司街巷開元十九年六月勅京洛兩都是惟帝宅街衢坊市固須修築城内不得穿掘為窰燒造磚瓦其有公私修造不得於街巷穿坑取土廣徳元年九月勅城内諸街勿令諸使及百姓輒有種植永泰二年正月十四日京兆尹黎幹奏京城諸街種植大厯二年五月勅諸坊市街曲有侵街打墻接簷造舎等先處分一切不許並令毁拆冝委李勉常切勾當如有犯者科違勅罪兼須重罰其種樹栽植如聞並已滋茂亦委李勉勾當處置不得使有斫伐致令死損并諸橋道亦須勾當貞元四年二月勅京城内莊宅使界諸街坊墻有破壊冝令取兩税錢和僱工匠修築不得科歛人戸十四年官街樹缺所司植榆以補之京兆尹呉湊曰榆非九衢之玩亟命易之以槐太和五年七月左右廵使奏伏凖令式及至徳長慶年中前後勅文非三品已上及坊内三絶不合輒向街開門各逐便冝無所拘限因循既乆約勒甚難或鼓未動即先開或夜已深猶未閉致使街司廵檢人力難周亦令奸盜之徒易為逃匿伏見諸司所有官宅多是雜賃尤要整齊如非三絶者請勒坊内開門向街門戸悉令閉塞勅㫖除凖令式各合開外一切禁斷餘依其月左街使奏伏見諸街餔近日多被雜人及百姓諸軍諸使官健起造舍屋侵占禁街竊慮停止奸人難為分别今除先有勅文百姓及諸街鋪守捉官健等舍屋外餘雜人及諸軍諸使官健舍屋並令除折所兾禁街整肅以絶奸人勅㫖所折侵街舎冝令二箇月限移拆如不礙勅文者仍委本街使看便冝處分九年八月勅諸街添補樹並委左右街使栽種價直於京兆府取仍限八月栽畢其分析聞奏大中三年六月右廵使奏義成軍節度使韋讓前任宫苑使日固違勅文于懐真坊西南角亭子西侵街造舍九間勅㫖韋讓侵街造舍頗越舊章冝令毁拆橋梁顯慶五年五月一日修洛水月堰舊都城洛水天津之東有中橋及利渉橋以通行李上元二年司農卿韋機始移中橋自立徳坊西南置于安衆坊之左南當長夏門街都人甚以為便因廢利渉橋所省萬計然毎年洛水泛溢必漂損橋梁倦于繕葺内使李昭徳始創意令所司改用石脚鋭其前以分水勢自是無漂損之患至今初韋機橋畢上大悦令于中橋南刻一方石列其年辰簡速之跡紀一十六字蓋黄絹之辭也先天二年八月勅天津橋除命婦已外餘車不得令過開元九年十二月九日增修蒲津橋絙以竹葦引以鐵牛命兵部尚書張説刻石為頌十九年六月勅兩京城内諸橋及當城門街者並將作修營餘州縣料理二十年四月二十一日改造天津橋天寳元年二月廣東都天津橋中橋石脚兩眼以便水勢移斗門自承福東南抵毓財坊南百歩八年二月先是東京商人李秀昇於南市北架洛水造石橋南北二百歩募人施財鉅萬計自五年創其始至是而畢卜年十一月河南尹裴逈請税本府戸錢自龍門東山扺天津橋東造石堰以禦水勢從之大厯五年五月勅承前府縣並差百姓修理橋梁不逾旬月即被毁折又更差勒修造百姓勞煩常以為弊冝委左右街使勾當捉搦勿令違犯如嵗月深乆橋木爛壊要修理者左右街使與京兆府計㑹其事申報中書門下計料處置其坊市橋令當管修理諸街橋京兆府以當府利錢充修造其年八月勅其坊市内有橋不問大小各仰夲街曲當管共修仍令京兆府各差本管官及當坊市所由勾當毎年限正月十五日内令畢如違百姓决二十仍勒依前令修文武官一切具名聞奏節級科貶如後續有破壊仍令所由時看功用多少計定數修理不得輒剰料率及有隱欺貞元元年正月勅冝令京兆府與金吾計會取城内諸街枯死槐樹充修㶚滻等橋板木等用仍栽新樹充替闗市武徳九年八月十七日詔梁闗之設襟要斯在義止懲奸無取苛暴近代拘刻禁御滋章非所以綏安百姓懐來萬邦者也其潼闗以東縁河諸闗悉冝停其金銀綾絹等雜物其依格得出闗者並不須禁天授二年七月九日勅其雍州已西安置潼闗即冝廢省洛州南面北面各置闗長安二年正月有司表請税闗市鳯閣舍人崔融上議曰臣伏見有司税闗市事條不限工商但是行人盡税者臣謹按周禮九賦其七曰闗市之賦竊惟市縱繁巧闗通末游欲令此徒止抑所以咸增賦税夫闗市之税者惟斂出入之商賈不税往來之行人今若不論商人通取諸色事不師古法乃任情悠悠末代于何瞻仰又四海之廣九州之雜闗必據險路市必憑要津若乃冨商大賈豪宗惡少輕死重氣結黨連羣喑嗚則彎弓睚眦則挺劍小有失意且猶如此一旦變法定是相驚非惟流迸齊人亦自擾亂殊俗求利雖切為害方深而有司上言不識大體徒欲益帑藏助軍國殊不知軍國益擾帑藏愈空且如天下諸津舟航所聚洪舸巨艦千軸萬艘交貨往還昧旦永日今若江津河口置鋪納税税則檢覆覆則遲留此津纔過彼鋪復止非惟國家税錢更遭主司僦賂至如闗市之税史籍有文秦政以雄圖武力捨之而不用也漢武以覇畧英才去之而勿取也何則闗為詰暴之所市為聚人之地税市則人散税闗則暴興暴興則起異圖人㪚則懐不軌况澆風乆扇變法為難徒欲禁末逰規小利豈知失𤣥黙亂大倫乎古人有言王者藏於天下諸侯藏於百姓農夫藏於庾商賈藏於篋惟陛下詳之必若師興有費國儲多窘即請倍算商賈加斂平人如此則國保冨强人免憂懼天下幸甚天寳二年十月勅如聞闗已西諸國興販徃來不絶雖託以求利終交通外蕃因循頗乆殊非穏便自今已後一切禁斷仍委四鎮節度使及路次所由郡縣嚴加捉搦不得更有往來乾元元年八月勅大散闗冝依舊令鳯翔收管者寳應元年九月勅駱谷子午等路往來行客所將隨身器仗等今日以後除郎官御史諸州部進奉事官任將器伏隨身自餘私客等皆須過所上具所將器使色目然後放過如過所上不具所將器使色目數者一切於守捉處勒留元和九年五月豐州奏中受降城與靈州城接界請置闗從之十二年二月時討淮蔡既乆濟師十倍賊知其必屈毎思竊發於中以緩師期故有折陵闕之㦸爇芻蒿之塲流矢飛書往往不絶蓋闗防之罪也及平淄青後簿書獲賞蒲潼闗吏文案乃明吏卒取於賊而容其奸也大中三年七月涇州節度使康季榮奏六月二十七日收原州城及諸闗石門闗驛藏闗木峽闗制勝闗六盤闗石峽闗其月邠寧監軍小使張文鋭奏本道兵馬今月十三日收蕭闗六年三月隴州防禦使薛逹奏伏奉正月二十六日詔㫖令臣築故闗訖聞奏者伏以汧源西境切在故闗昔有隄防殊無制置僻在重岡之上苟務髙深令移要㑹之口實堪控扼舊絶泉井逺汲河流今則臨水挾山當川限谷危墻深塹克揚營壘之勢伏乞改為定戎闗鈐轄往來臣當界又有南由路亦是要衝舊水闗亦請凖前把捉去正月二十七日起功今月十七日畢謹畫圖進上勅㫖薛逹新置闗城得其要害形于圖畫頗見公忠冝依所奏市貞觀元年十月勅五品以上不得入市七年七月二十日廢州縣市印顯慶二年十二月十九日洛州置北市𨽻太府寺垂拱二年十二月勅三輔及四大都督并衝要當路及四萬戸已上州市令并赤縣錄事並冝省天授三年四月十六日神都置西市尋廢至長安四年十一月二十二日又置開元十一年六月二十三日又廢其口馬移入北市長安元年十一月二十八日廢京中市至天寳八載十月五日西京成逺營置南市華清宫置北市景龍元年十一月􅃯諸非州縣之所不得置市其市當以午擊鼔二百下而衆大會日入前七刻擊鉦三百下散其州縣領務少處不欲設鉦鼔聼之車駕行幸處即於頓側立市官差一人權檢校市事其月兩京市諸行自有正鋪者不得於鋪前更造偏鋪各聼用㝷常一様偏束諸行以濫物交易者没官諸在市及人衆中相驚動令擾亂者杖八十開元二年閏三月勅諸錦綾羅縠繡織成紬絹絲犛牛尾真珠金鐵並不得與諸蕃互市及將入蕃金鐵之物亦不得將度西北諸闗大厯八年七月勅京城内諸坊市門至秋成後冝令所由勾當修補十四年七月令王公百官及天下長吏無得與人争利先于揚州郅肆貿易者罷之先是諸道節度觀察使以廣陵當南北大街百貨所集多以軍儲貨財列置市肆名托軍用實私其利息至是乃絶貞元十四年八月右金吾將校趙洽田岩並配流天徳軍時屢有中官于京城市肆强買人間率用直百錢物買人數千錢物仍索脚價及進奉門户謂之宫市是時呉湊為京兆尹數上言初為修理無㡬中貴人等奏云百姓䝉官准戸部格式其市吏壁師之徒聼於當州縣供宫人市買每至市存養頗獲厚利呉湊再論奏者凑之金吾舊吏趙洽等獻計也故洽等坐焉湊代宗元舅早承恩顧上即位復寵遇之潔㢘謹慎未嘗不以公忠之言匡啟於上至是又以宫市事懇論于上前事雖不從時論歸美貞元以後京都多中官市物于㕓肆謂之宫市不持文牒口衘勅命皆以監估不中衣服絹帛雜紅紫之物倍髙其估尺寸裂以酬價謂之精供冨商皆匿名深居陳列㕓間唯粗厲苦窳市後又强驅入禁中傾車罄輦而去色少不甘有毆致血流者中人之出雖沽漿賣餅之家無不徹擔塞門以伺其去蒼頭女奴輕車名馬惴惴衢巷得免捕為幸京師之人嗟愁叫閽訴闕則左右前後皆其人也二十一年二月赦文應縁宫市並出正文帖依時價買賣不得侵擾百姓寳厯二年十月京兆尹劉栖楚奏術者數之妙苟利于時必以救患伏以前度甚雨閉門得晴臣請便令後毎隂雨五日即令坊市閉北門以禳諸隂晴三日便令盡開使啟閉有常永為定式從之開成五年十二月勅京夜市宜令禁斷㑹昌二年四月勅舊課種桑比有勅命如能増數毎嵗申聞近知並不遵行恣加剪伐列於㕓市賣作薪蒸自今委所由嚴切禁斷六年七月勅如聞十六宅置宫市已來稍苦于百姓成弊既乆須有改移自今已後所出市一物已上並依三宫直市不得損刻百姓大中三年九月勅比有無良之人于街市投匿名文書及于箭上或旗旛縱為奸言以亂國法此後所由潜加捉搦如獲此色使即焚瘞不得上聞五年八月州縣職員令大都督府市令一人掌市内交易禁察非偽通判市事丞一人掌判事佐一人史一人師三人掌分行檢察州縣市各令凖比其月勅中縣户滿三千以上置市令一人史二人其不滿三千戸以上者並不得置市官若要路須置舊來交易繫者聴依三千戸法置仍申省諸縣在州郭下並置市官城郭永徽五年十一月十一日和僱雍州夫四萬一千人修京羅城郭三十日畢九門各施觀明徳觀五門工部尚書閻立徳為治顯慶五年九月改東明門為賓耀門西明門為宣耀門長壽元年九月神都改造文昌臺及造定鼎上東等城門修築外郭並鳳閣侍郎李昭徳所制時人以為能開元十八年四月一日築京城九十日畢二十年都畿採訪使御史中丞張倚請整齊都城侵街墻宇二十三年七月勅兩京城皇城及諸門并助鋪及京城守把捉兵之處有城墻若門樓舎屋破壊須修理者皆與所司相知并量抽當處職掌衛士以漸修營若須登髙臨内即聞奏之天寳二年正月二十八日築神都羅城號曰金城六年十二月二十一日築會城於湯沐所置百司及公卿邸第十二年十月十七日和僱華隂扶風馮翊三都丁匠及京城人夫一萬三千五百人築興慶宫城並起樓四十九年畢至徳三年正月二十七日改丹鳳門為明鳳門通化門為達禮門安上門為先天門及坊名有安者悉改之㝷並却如後建中元年五月築奉天城四年十月上避難于奉天初術士桑道茂奏請城奉天為王者之居至是方騐貞元元年新作𤣥武門九年二月詔復築鹽州城先是貞元三年城為吐蕃所壊自後塞外無保障西戎入冦既城之後邊患頓息元和三年涇原節度使段佑請修臨涇城在涇州北八十里以扼西戎之衝詔從之八年河東節度使張𢎞靖奏修古舜城從之長慶四年三月夏州節度使李祐奏于塞外築烏延宥州臨塞隂河陶子等五城以備蕃㓂太和元年四月鳳翔府奏築臨汧城於汧陽縣西北八十里㑹昌六年正月閑廐宫苑使奏苑内諸面苑子等門共九十四所今伏縁大禮日近凖例鑾駕赴郊廟後並請鏁閉匙鑰各令進入候還宫日即便請却開應赴郊廟一物已上請宣下事件前並須搬載出盡其留司官健等令併支糧料鑾駕赴郊廟後不得出入勅旨依奏咸通六年四月西川節度使牛叢奏扵蠻界築新安城遏戎州功畢時南詔蠻入冦姚巂陳許大將顔復戍巂州奏築二城其年秋六姓蠻攻遏戎州為復所敗退去唐㑹要卷八十六
