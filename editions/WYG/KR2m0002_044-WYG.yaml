body:
  text: 唐㑹要卷四十四宋王溥撰水災下開元八年六月二十一日東都穀洛瀍三水溢損居人九百六十一家溺死八百一十五人許衞等州畨州掌管溺死者一千一百四十八人十四年七月十七日瀍水暴漲入洛損諸州租船數百艘損租米十七萬二千八百石十八日懐恵鄭汴滑濮大雨人皆巢居死者千計大厯四年京師大雨水斗米直八百他物稱是命閉市北門置一十一臺臺髙五尺上置五方壇壇上立一黄旛以祈晴貞元三年閏五月東都河南江陵大水壞人廬舎汴州尤甚揚州江水泛漲四年八月連雨灞水暴溢溺殺渡者百餘人八年八月河北山南江淮凡四十餘州大水漂溺死者二萬餘人又幽州奏七月大雨水深一丈已上鄚涿薊檀平等五州並平地水深一丈五尺十月徐州奏從五月二十五日雨至七月八日方止平地水深一丈二尺苗田屋宇漂蕩倒塌村閭向盡百姓多就髙處及移居鄰郡十一年復州竟陵等三縣遭郎蜀二水泛漲沒溺損户一千六百六十五田四百一十頃十二年福建等州大水六月嵐州暴雨大水深二丈餘損屋宇田苗十五年鄭滑大水十九年蔡申光等州水賜物五萬叚米十萬石鹽三千石以賑貧民永貞元年九月郎州武陵龍陽二縣江水暴漲漂萬餘家十一月京兆府長安等九縣山水泛漲害田苗元和元年十二月幽州徐州水損田苗二年蔡州上言大水平地水深八尺三年京師大雨水四年七月渭南縣暴水泛溢漂損廬舍二百一十三户秋田十有六頃溺死者千人命京兆府發義倉救命十年正月振武界黄河溢毁東受降城五月饒撫䖍吉信五州山水暴風沒毁廬舍䖍州水甚深處四丈餘八年許州大水摧大嵐山其年六月庚寅京師大水風雨毁屋揚瓦人有壓死者水積於城南深數丈餘入明徳門猶漸車輻辛卯渭水暴漲絶濟者一日時所在霖雨百源皆發川澮多不由故道九年十二月淮南宣州大水十三年五月昭應雨水流溺居人是月衢州山水湧出三丈餘蕩州郭百姓溺死損田千餘頃是月浮梁樂平二縣暴雨百姓溺死者一百七十人其為漂泛不知所在者四千七百户闕兩稅錢三萬五千貫十一月潤常陳許四州以水害聞田不發者萬餘頃十二月京兆府水害田苗潤常湖衢陳許六州大水十二年六月京師大雨含元殿一柱傾市中水深三尺壞坊民二千家河北水災邢洛尤甚平地或深二丈十三年六月淮水溢壞人廬舍十二月奉先等十一縣水害麥田十五年九月滄景大雨敗田三百頃壞屋舍二百九十間又江西奏吉州大水長慶二年七月好畤山水泛漲漂損居人三百餘家其月詔陳許兩州災頗甚百姓廬舍漂溺復多言念疲氓豈忘救恤宜賜米粟共五萬石充賑給令度支先於管内見收貯米粟充本道觀察使審勘責所漂溺貧破人户量家口多少作等第分給聞奏寶厯元年七月乙酉鄜坊大水其年九月蕐州暴水傷稼太和二年六月陳州水害秋稼其年八月京畿奉先等十七縣水三年七月宋亳水害秋稼四年九月舒州太湖宿松望江大水災溺民户六百八十詔本道以義倉斛斗賑貸其年十一月京畿河南江南湖南等道大水害稼詔本道節度觀察使出官米賑給五年六月蘓杭湖三州雨水害稼東川奏𤣥武江水漲二丈餘壞州城居人廬舍六年二月以去嵗蘓湖大水宜賜米二十二萬石以本州常平善倉斛平充給其年十一月滁州奏清流等三縣四月雨至六月諸山破洪水漂溺户一萬三千八百開成二年八月山南東道諸州大水田稼漂盡丁酉詔大河西南幅􅊷千里楚澤之北連亘數州以水潦暴至堤坊潰溢既壞廬舍復損田苗言念黎元罹此災沴宜令給事中盧允宣刑部郎中崔瑨宣慰火貞觀二十三年三月少府監甲弩庫火證聖元年正月十六日夜明堂災至明並為煨燼景龍四年二月東都凌空觀殿宇並煨燼唯一真人獨存目有淚迹開元十八年二月十一日大雨雪俄又震雷飛龍廐災天寶二年六月七日應天門觀災延至左右延福門經日火不滅九年三月西廟災十年正月陜州運船火燒船二百一十五隻損米一百萬石舟人死者六百人商人船數百隻八月六日夜武庫災二十八間十九架燒兵器四十七萬事廣徳元年十二月二十五日夜鄂州失火燒船三千隻延及岸上居人二千餘家死者四千餘人貞元七年四月蘇州大火十三年正月東都尚書省火十九年四月家令寺火二十年四月開業寺火元和四年三月御史臺佛舍火當直御史李應罰一季俸七年六月鎮州甲仗庫火延燒一十三間兵器皆盡王承宗久蓄叛謀至是凶器消息十年四月河隂轉運院火盗所為也是日昏暮有盗發于河橋凡數十人縱發弓矢人吏奔駭因坼毁院門又束藳爇火以焚之十一月盗發獻陵寢宮永巷十一年十一月元陵火罰守陵官一月俸十二月未央宫及飛龍草場火十二年五月缺十四年十一月戊寅度支火十五年正月京師西市火焚死者衆太和二年十一月禁中昭徳寺火延燒宣政殿之東垣及門下省至午北風起火勢益甚迨暮方息初火發上命神䇿兵士救之公卿内臣聚于日華門外御史中丞温造不到與兩巡使崔蠡姚合等各罰一月俸八年五日飛龍神駒中廐火九年六月西市火開成四年十二月乾陵火會昌三年六月萬年縣東市火燒屋貨財不知其數又西内神龍寺火大順二年七月汴州相國寺佛閣災是日晚微雨震電寺僧見塊火在三門藤􅃠中良久火發復飛越前殿延燒佛閣二夕方止木冰儀鳳三年十一月十四日雨木冰其月三十日黄門侍郎同三品來瑱卒四年正月十日户部尚書許圍師卒二十九日尚書右僕射戴至徳卒開元二十九年十一月二十二日雨木冰凝寒凍裂數日不解寧王憲見而嘆曰此俗謂之樹架諺曰樹架達官怕必有大臣當之而死矣二十四日寧王憲薨大厯二年十一月辛未紛霧如雪草木冰螟蜮貞觀二年六月十六日終南等縣蝗上至苑中見蝗掇數枚而呪之曰人以穀為命而汝食之是害于百姓也百姓有過在予一人爾其有靈但當蝕我無害百姓將吞之侍臣曰恐致疾遽來諫止上曰所冀移災朕躬何疾之避遂吞之自是蝗不為災開元四年五月山東諸州大蝗分遣御史捕而埋之汴州刺史倪若水拒御史執奏曰蝗是天災自宜修徳劉聰時除既不得為害滋深宰相姚崇牒報之曰劉聰偽主也徳不勝妖今日聖朝也妖不勝徳古之良守蝗蟲避境若言修徳可免彼豈無徳致然今坐看食苗忍而不救因此飢饉將何自安卒行焚瘞之法獲蝗一十四萬石投之汴水流下者不可勝數朝議喧然上復以問崇崇對曰凡事有違經而合道有反道而擇權者彼庸儒不足知之縱除之不盡猶勝養以成災上又曰殺蟲太多有傷和氣公其思之崇對曰若救人殺蟲因縁為禍崇所甘心八月己夘二十四日敕河南河北檢校殺蝗蟲使狄光嗣康瓘敬昭髙道昌賈彦璿等宜令待蟲盡看刈禾有次序即入京奏事諫議大夫韓思復以為蝗是天災當修徳以禳之恐非人力所能剪滅上疏曰臣聞河南河北蝗蟲頃日更益繁熾經厯之處苗稼都損今漸環飛向西游食至洛使命來往不敢昌言山東數州甚為惶懼且天災流行埋瘞難盡臣望陛下悔過責躬發使宣慰損不急之務召至公之人上下同心君臣一徳持此誠實以答休咎前後驅蝗使等伏望總停上出思復疏以付姚崇崇乃請思復往山東檢覈蝗蟲所損之處還具實奏貞元元年四月自春大旱麥枯死禾無苗闗中有蝗百姓捕之蒸暴颺去足翅而食之五月有蝗起自東海至西隴坻羣飛蔽天旬日不息所至苗稼無遺八月大旱闗中有蝗百姓捕之蒸暴颺去翅足而食人心大恐開成二年六月魏博淄青河南府並奏蝗害稼七月乙酉京兆尹李紳奏蝗入京畿不食民田詔書褒美仍刻石以紀之三年八月魏博六州蝗食秋苗並盡四年十二月鄭滑兩州蝗兖海中都等縣並蝗五年四月鄆州兖海管内並蝗又汝州有蟲食苗五月河南府有黒蟲生食田苗汝州管内蝗兖海臨沂等五縣有蝗蟲于土中生子食田苗六月淄青登萊四州蝗蟲河陽飛蟲入境幽州管内有地蝻蟲食田苗魏博河南府河陽等九縣沂宻兩州滄州易定鄆州陜府虢州六縣蝗會昌元年三月鄧州穰縣蝗咸通三年五月淮南河南蝗九年江夏飛蝗害稼光啓二年二月荆襄仍嵗蝗米斗三十千人相食雜災變貞觀十三年四月二十九日雲陽石燃方丈晝如灰夜即光見投草木于其上則焚厯年乃止十七年閏六月司農寺豕生子一首八足自頸分為二體其年七月京師訛言官遣棖棖殺人以祭天狗云其來也身衣狗皮指如鐵爪每于暗中捕人道路傳聞更相震怖皆彀弓矢以自防太宗惡其妖訛命夜間諸防宣㫖慰之稍定永徽五年七月萬年宫有小鳥生大鳥龍朔元年十二月二十八日洛州言猫鼠同居調露元年突厥温𫝊等未叛有鳴鵽羣飛入塞相繼蔽野邉人相驚曰此鳥一名雀南飛突厥犯塞之候也至二年正月還復北飛至靈夏已北悉墮地而死視之則無頭矣裴行儉問于右史苗神容曰鳥獸之祥乃應人事何也對曰人雖至靈而禀生含氣同于萬類故吉凶兆于彼而禍福應于此聖人受命龍鳳為嘉者和氣同也故漢髙斬蛇而驗秦之必亡仲尼感麟而知已之將死大鳥飛集昌邑以敗是以君子䖍恭寅畏動必思義雖在幽獨如承大事知明神之照臨懼患難之及已也雉昇鼎耳殷宗側身以修德鵩止坐隅賈生作賦以叙命卒無患者徳勝妖也􅂷拱元年九月二十四日揚州地生毛如馬鬛長壽三年三月大雪鳳閣侍郎蘓味道以為瑞修表將賀左拾遺王求禮止之曰三月降雪此災也乃誣為瑞若三月雪是瑞雪臘月雷為瑞雷乎乃止神龍二年三月九日洛陽東七里有水影側近樹車馬皆厯厯影見水中月餘乃滅四月己亥雨毛于越州之鄮縣景龍元年九月十八日有赤氣竟天其光燭地經三日止唐隆元年六月八日虹蜺竟天開元十五年七月四日雷震興敎門兩鴟吻欄檻及柱災蘓氏駿曰東海有魚虬尾似䲭因以為名以噴浪則降雨漢栢梁災越巫上厭勝之法乃大起建章宫遂設䲭魚之像于屋脊畫藻井之文于梁上用厭火祥也今呼為䲭吻豈不誤矣哉天寶元年十月一日魏郡上言猫鼠同乳經二十六日望編入史册詔從之寶應元年七月西北方有赤光亘天貫紫微漸流于東彌漫北方照耀數十里大厯三年六月二十四日隴右莭度使奏言隴州汧源縣趙貴家猫養鼠衆以為瑞中書舍人崔祐甫上議曰中使吳承倩宣進止以猫鼠示百寮者臣聞禮曰迎猫為其食田鼠也然則猫之食鼠載在禮典以除其害則雖㣲必録今猫對鼠而不食仁則仁矣無乃失其性乎猫受人養棄職不修亦何異乎法吏不勤觸邪疆吏不勤扞敵又按禮部式具列三瑞無猫不食鼠之目以兹稱慶臣所未詳建中四年天下地生毛貞元二年正月大雨雪平地深尺餘雪上有黄黒色狀如浮埃五月日有赤暈自辰及申方散四年正月上御丹鳳樓宣赥是日含元殿前階檻三十餘間崩甲士死傷者十餘人又陳留雨木皆大如指長寸餘每木有孔通中所下其立如植二月太僕郊牛犢生六足卿周浩白宰臣李泌請上聞泌戲答之而不許其時京城民家豕生子兩首四足以白御史中丞竇叅亦不許上聞七月自陜州至河隂水盡黒其黑水流入汴河止于汴州城下一宿而復又鄭汴二州羣鳥皆去界内入田緒李納境内銜木為城髙二三尺緒納令焚之信宿復如之鳥口多流血十年十一月有大鳥飛集宫中食雜物數月獲之不食而死十二年十二月大雪平地二尺竹多死環王國所獻犀牛甚珍愛之至是凍死十七年二月丁酉京師雨雹己亥雨霜戊申夜震霆雨霜庚戌大雨兼雹元和元年京師大風折樹三年四月大風毁含元殿西闕欄干十四間七月六日舒州上言桐城縣梅天陂内有青黄白三龍自陂中乘風雷躍起髙二百尺六里入浮塘陂八年三月丙子大風壞崇陵寢殿䲭吻折門㦸六月四日長安西市有豕生子三耳八足自尾分為二長慶二年六月乙丑大風震電墜太廟䲭吻及御史臺樹皆仆其年十一月頻雪後恒燠水不冰凍草木萌發如正二月四年六月庚辰大風吹敗延喜景風門寶厯元年十二月乙酉夜有霧起須臾遍天霧上有赤氛或深或淺久而乃散開成元年閏五月有羣鳥萬餘集唐安寺逾月方散四年四月壬戍有麞出太廟大中十一年十二月舒州奏有鳥人面緑毛喙皆紺色其聲曰甘人呼之為甘蟲咸通元年七月戊戌白虹横亘西方其年十一月丁酉戌時妖星初出如匹練亘空化為雲而沒在楚分廣明元年四月大雨雹大風抜京兩街樹十二三東都長夏門内古槐自拔而仆宫殿䲭吻皆墮地中和元年五月大風天雨土二年七月丙午夜西北有赤氣如絳竟天其年九月太原上言諸山桃杏有花結實其年十月西北方無雲而雷鳴天狗墮光啓二年九月白虹見西方光化二年春有白氣竟天如練自西南徹東北而旋天祐元年四月東京大風雨跬步不辨物色日晡稍止是年昭宗移洛陽車馬以其日入京城而有是變全忠革命之兆也其年十一月辛酉日有黄色白暈旁有青赤紐太史局久視元年五月十九日勅太史局為渾天監不𨽻秘書省天后召尚獻輔拜太史令固辭曰臣久從放誕不能屈事官長遂改為渾天監至七月六日又改為渾儀監長安二年八月二十八日獻輔卒渾儀監依舊為太史局𨽻秘書省縁進所置官員並廢景龍二年六月二十六日改為太史監罷𨽻秘書省景雲元年七月二十八日又改為太史局𨽻秘書省八月十日又改為太史監十一月二十一日又改為太史局二年閏九月十日又改為渾儀監開元二年二月二十一日又改為太史監十五年正月二十七日改為太史局𨽻秘書省至天寶元年十月三日改為太史監罷𨽻秘書省至乾元元年三月十九日太史監改為司天臺仍置五官正五人司天臺内别置一院名之曰通𤣥院應有道術人並徵辟到京皆于通𤣥院安置司天臺總置官六十員大監一名正三品少監二人正四品上丞三人正六品上主簿三人正七品上主事三人正八品下五官正各一人正五品上副正各一人正六品上五官靈臺郎各一人正七品下五官保章正各一人從七品上五官挈壺正各一人正八品上五官監候各一人正八品下五官司厯各一人從八品上五官司辰各三人正九品上觀生厯生七百二十六人其臺宜于永寧坊張守珪宅置制曰建邦設都必稽𤣥象分曺列局皆應物宜靈臺二星主觀察雲物天文正位在太㣲西南今興慶宫上帝廷也考符所合以致靈臺宜令所司量事修理舊置在秘書省南至寶應元年六月九日司天少監瞿曇譔奏司天丞請减三員監候减二員司辰减七員五陵司五員敕旨依至天寶十一年三月十四日敕太史監官除朔望朝外非别有公事一切不須入朝及充保識仍不在㸃檢之限大足元年九月十九日敕在史局厯生天文觀生等取當局子弟充如不足任于諸色人内簡擇開元二十三年九月八日敕太史局厯生每畨留兩人當上餘並七月一日上至十月三十日下乾元元年十月一日權知司天監韓穎奏司天臺五官正既職配五方上稽五緯臣請每至正冬朔望朝會及諸大禮并奏本方事各依本方正色其冠上加一星珠仍永為恒式從之大厯二年正月二十七日敕艱難已來疇人子弟流散司天監官員多闕其天下諸州官人百姓有觧天文𤣥象者各委本道長吏具名聞奏送赴上都開成五年十二月敕司天臺占候災祥理宜秘宻如聞近日監司官吏及所由等多與朝官并雜色人交游既乖慎守須明制約自今已後監司官吏並不得更與朝官及諸色人等交通往來仍委御史臺訪察雜録武徳九年八月詔私家輒立妖神妄設淫祀非禮祈禱一切禁㫁龜易五兆之外諸雜占亦皆禁止載初元年六月敕相書及測騐家書多妄論禍福並冝禁斷開元十年六月敕百姓不得與卜祝人交游往來唐㑹要卷四十四
