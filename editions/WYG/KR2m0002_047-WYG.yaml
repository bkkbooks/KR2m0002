body:
  text: 唐㑹要卷四十七宋王溥撰封建雜録下貞觀十一年六月十五日又以司空長孫無忌為趙州刺史改封趙國公尚書右僕射房𤣥齡為宋州刺史改封梁國公故司空杜如晦密州刺史封蔡國公特進李靖為濮州刺史改封衛國公特進髙士亷為申州刺史改封申國公趙郡王孝恭為觀州刺史改封河間郡王同州刺史尉遲敬徳為宣州刺史改封鄂國公光禄大夫李勣為蘇州刺史改封英國公左驍衛大將軍段志𤣥為全州刺史改封褒國公右領軍大將軍程知節為普州刺史改封盧國公兵部尚書侯君集為陳州刺史改封陳國公任城王道宗為鄂州刺史改封江夏郡王太僕卿劉𢎞基為朗州刺史改封夔國公金紫光禄大夫張亮為禮州刺史改封鄖國公詔曰周武定業胙茅土於子弟漢髙受命誓帶礪於功臣豈止重親賢之地崇其典禮抑亦固磐石之基寄以藩翰但今之刺史古之諸侯雖立名不同而監統一也故申命有司斟酌前代宣條委共理之寄象賢存代及之典司空無忌等並策名運始功㕘締構即令子孫世世承襲非有大故無或黜免餘官食邑並如故其後無忌將之國情皆係戀不願是行辭不獲免謬出怨言以激上怒云臣披荆棘以事陛下今海内寜一乃令世牧外州復與遷徙何異因上表固讓太宗謂之曰割地以封功臣古今之通義也意欲公之枝葉翼朕子孫長為藩翰𫝊之永乆情在此耳而公等薄山河之誓發言怨望朕亦安可强公以土宇耶太子左庶子于志寜以今古事殊恐非乆安之道上疏争之竟從志寜議劉秩政典曰我皇帝思侔前古永𫝊後裔下無山甫將明之才乃聴百藥偏昧之說從羣臣之小議挫為國之大經設爵無土署官不職王澤不布人無承化遂令刑辟未弭國用不殷權柄擅於后氏社稷絶而復存揆致此之由在於取順而難逆守絶欲奪之原在於單弱而無所憚此即事之明騐也百藥不詳秦漢晉宋齊隋得失之異謂不足法復忽耽於賈曹劉陸成敗之說委之天命天之所命人事而已棄人事捨天理滅聖智任存亡也故建侯者所以正冢嫡安父子之分使不相猜貳豈藩屏王室而已哉夫先王之尚封建也非止貴於永乆貴其從化而省刑故郡建則責督責督則刑生國開則教明教明則從化從化之行因於封建封建諸侯之制與天子備同備同而禮殺禮殺然後可宣化教宣化教則仁義長仁義長則尊卑别尊卑别則禍亂息此封建之所以易為理也郡縣之理可以小寜不可以乆安可以責成不可以化俗嗚呼上無堯舜猶可也有堯舜之徳欲廣其澤舍此何以哉自漢以降雖封建失道然諸侯猶皆就國今封建子弟有其名號而無國邑空封官僚而無莅事聚居京輦食租衣稅國用所以不足也二十日敇五等封加開國之稱十六年皇子年㓜者多任都督刺史諫議大夫禇遂良上疏曰昔兩漢以郡國理人除郡以外分立諸子剖土分疆雜用相制皇唐州縣粗依秦法皇子㓜年或授刺史陛下豈不以王之骨肉鎮捍四方比之造制道髙前列如臣愚見有小未盡何者刺史州郡之帥民仰以安得一善人部内蘇息遇一不善闔州勞弊是以人君愛恤百姓常為擇賢或稱河潤九里京師䝉福或人興歌詠生為立祠漢宣帝云與我共理者唯良二千石乎如臣愚見陛下皇子之内年齒尚㓜未堪臨人者且留京師教以經學一則畏天之威不敢犯禁二則觀見朝儀自然成立因此積習漸知為人審堪臨州然後遣出謹按漢明章和三帝能友愛子弟自兹以降取為準的封立諸王使各有國土年尚㓜小多留京師訓以禮法垂以恩惠訖三帝世諸王數千百人唯二王稍劣自餘餐和飲徳皆為善人此則前代事已騐惟陛下詳察焉上深納之大足元年二月冀州人蘇安恒上疏曰臣聞自古明王之孝理天下者不見二姓而俱王當今梁定河内建昌諸王等承陛下䕃覆並得封王臣恐千秋萬嵗之後於事非便臣請黜為公侯任以閒簡又聞陛下有二十餘孫今無尺土之封此非乆長之計也臣請四面都督府及要衝州郡分土而王之縱今年尚㓜小未聞養人之術臣請擇立師傅成其孝敬之道將以夾輔周室藩屏皇家使累業重光饗祀不輟斯為美矣豈不大哉神龍元年二月十四日追封后父韋𤣥正為上洛郡王左拾遺賈虚已上疏諫曰臣聞孔子曰惟名與器不可以假人且非李氏而王自古盟書所棄今陛下創制謀始垂範將來為皇王令圖子孫明鏡匡復未幾后族有私臣雖庸愚而知不可史官執簡必是直書先朝贈太原王殷監不逺如渙汗既行憚改成命臣望請皇后抗表固辭使天下知𢎞讓之風彤管著冲謙之徳不納其年五月十五日侍中敬暉等以唐室中興武氏諸王宜削其王爵乃率羣臣上表曰臣聞神器者天下之至公必歸於有徳王極者域中之大寳必順乎天命歴考前史詳觀帝業皆不並興莫不更王故三皇氏沒而五帝氏興夏殷氏息而周漢氏作何則帝王之歴數必應乎五行水盛則木衰木衰則金盛天地之氣運必順乎四時春往則夏來暑退則寒集則知五行之數帝王不可違違之則宗社不安生人不理四時之序天地不能變變之則霜露不時水旱交錯自有隋失徳海内分崩天厯之重誕歸於唐室萬方樂業荷撥亂之功三聖重光布生成之徳可謂有功於四海有徳於烝人自則天皇后臨御帝位明目逹聰躬親庶政則有讒邪㓙孽誣惑睿哲搆害宗枝誅夷殆盡忠臣義士實所痛心自天授之際時稱改革武家子弟咸預封建十餘年間實亦榮極於時國家藩屏豈得並封物不兩盛時使然也今神器大寳重歸陛下百姓謳歌欣復唐業臣又聞之業不兩盛事不兩大故天無二日土無二王前聖之格言先哲之明誡自皇階反正天命維新武氏諸王封建依舊生者既加茅土死者仍進賦邑萬夫失望卿士寒心何則開闢已來罕有斯理帝王之道實無此法陛下縱欲開恩以行私惠可違五行厯數乎乖四時寒暑乎又海内衆情朝廷竊議為武氏諸王身計適將有損何則處之未得所居之實恐未安陛下雖欲寵之翻乃禍之亦於事未立定分於理不遵古典故也且唐厯有歸周命已去爵重則難保禄輕則易全又武氏諸王並居京輦不降舊封天下之心竊將不可陛下縱欲敦崇外戚曲流恩貸奈宗廟社稷之計何奈卿士黎人之議何伏願陛下為社稷之逺圖抑私情之小愛上崇經邦之要外制遐邇之心又故韓魯霍舒紀澤等諸王並遭非命枉被誅戮今遺孤餘緒雖罕有存者繼絶興亡義無或闕伏望謀擇近親繼其禋祀更開茅土並列於朝豈不固宗社之本協人靈之願則陛下巍巍之業貫三光而洞九泉親親之義上有倫而下有序臣等並承榮寵固竭丹􅇆既為唐臣實為唐計伏乞聖慈俯垂矜納疏奏遂降武三思等為郡王懿宗等為國開元八年五月十八日敇準令王妻為妃文武官及國公妻為國夫人母加太字餘人有官及爵者聴從髙叙但王者名器殊恩或頒異姓妻合從夫授秩甲令無别條率循舊章湏依往例自今已後郡嗣及異姓王母妻宜準令為妃封諸嶽瀆垂拱四年七月一日封洛水神為顯聖侯享齊於四瀆封嵩山為神嶽天中王至萬嵗通天元年四月一日神嶽天中王可尊為神嶽天中皇帝至神龍元年二月復為天中王先天二年八月二十日封華嶽為金天王開元十三年二月封泰山神為齊天王禮秩加王公一等天寳五載正月二十三日詔曰五方定位嶽鎮總其靈萬化阜物雲雨極其潤上帝攸宅寰區是仰且岱宗西嶽先已封崇其中嶽等三方典禮尊崇未齊名秩永言光被用叶靈心其中嶽封為中天王南嶽封為司天王北嶽封安天王六載正月十二日敕文四瀆五嶽雖差秩序興雲播潤蓋同利物崇號載及錫命宜均其五嶽既已封王四瀆當昇公位逓從加等以荅靈心其河瀆宜封為靈源公濟瀆封為清源公淮瀆封為通源公仍令所司擇日差使告祭七載十二月九日封昭應山為𤣥徳公八載閏六月五日敕文封太白山為神應公其九州鎮山除入諸嶽並外宜封公十載正月二十三日封東海為廣徳公南海為廣利公西海為廣潤公北海為廣澤公對沂山為安東公㑹稽山為永興公嶽山為成徳公霍山為應聖公毉無閭山為廣寕公上元二年十月改華山為太山華隂縣為太隂縣至徳二年十二月十五日吳山宜改為吳嶽祠享官屬並準五嶽故事元和十五年閏正月敇北嶽宜改為鎮嶽避穆宗諱也開成二年四月十一日敇如聞京師舊說以為終南山興雲即必有雨若晴霽雖宻雲沱至竟不濡霑况兹山北面闕庭日當顧瞩脩其望祀寵敷宜及今聞都無祀宇炭谷湫却命祀終南山未備禮秩湫為山屬捨大從細深所謂闕於興雲致雨之祀也宜令中書門下且差官設奠先告致禮便令擇立廟處所向日以聞其命有司即時建立其年九月敇終南山宜封為廣恵公三年太常禮院奏準去年十月六日敇終南山封廣惠公册命訖宜準四鎮例以本府都督刺史充獻官者今合每年一祭仍請以季夏土王日祭之應縁祭事並令本州府備其祀文所司祭五日送京兆府乾寜五年十月一日敇封少華山為佑順侯天祐二年六月十六日封洞庭湖君為利涉侯青草湖君為安流侯議釋教上武徳七年七月十四太史令傅奕上疏請去釋教髙祖付羣官詳議太僕卿張道源稱奕奏合理尚書右僕射蕭瑀與之争論曰佛聖人也弈為此議非聖人無法請置嚴刑弈曰禮本事親而終於奉上而佛踰城出家逃背其父以匹夫而抗天子以繼體而悖所親蕭瑀非出空桑乃遵無父之教瑀不能荅合掌云地獄所設正謂是人其後上臨朝謂弈曰佛道𤣥妙聖迹可師卿獨不悟何也奕對曰佛是國中桀黠欺誑夷俗遵尚其道皆是邪僻小人模寫莊老𤣥言文飾妖幻之教耳於百姓無補於國家有害上然之至九年二月二十二日以沙門道士虧違教跡留京師寺三所觀二所選耆老髙行以實之餘皆罷廢至六月四日敕文其僧尼道士女冠宜依舊定貞觀八年上謂長孫無忌曰在外百姓大似信佛上封事欲令我每日將十箇大徳共逹官同入令我禮拜觀此乃是道人教上其事侍中魏徴對曰佛道法本貴清浄以退浮競昔釋道安如此名徳符永固與之同輿權翼以為不可釋恵琳非無才俊宋文帝引之升殿顔延之云三台之位豈可使刑餘之人居之今陛下縱欲崇信佛教亦不須道人日到㕘議顯慶二年詔曰釋典冲虚有無兼謝正覺凝寂彼我俱㤀豈自遵崇然後為法聖人之心主於慈孝父子君臣之際長㓜仁義之序與夫周孔之教異教同歸棄禮悖徳朕所不取僧尼之徒自云離俗先自遵髙父母之親人倫以極整容端坐受其禮拜自餘尊屬莫不皆然有傷名教實斁彛典自今以後僧尼不得受父母及尊者禮拜所司明為法制即宜禁斷至開元二年閏三月三日敇自今以後道士女冠僧尼等並令拜父母至於喪祀輕重及尊屬禮數一準常儀庶能正此頽弊用明典則開元二年正月中書令姚崇奏言自神龍以來公王及外戚皆奏請度人有出私財造寺者每一出敇則因為姦濫富户强丁皆經營避役逺近充滿損汚精藍且佛不在逺近在于心但發心慈悲行事利益使蒼生安樂即是佛身何用妄度姦人令壊正法上乃令有司精加銓擇天下僧尼偽濫還俗者三萬餘人大厯十三年四月劒南東川觀察使李叔明奏請澄汰佛道二教下尚書省集議都官員外郎彭偃獻議曰王者之政變人心為上因人心次之不變不因循常守故者爲下故非有獨見之明不能行非常之事今陛下以維新之政為萬代法若不革舊風令歸正道者非也當今道士有名無實時俗鮮耻亂政猶輕唯有僧尼頗為穢雜自西方之教被於中國去聖日逺空門不行五濁比丘但行麄法爰自後漢至於陳隋僧之興滅其亦數四或至坑殺殆無遺餘前代帝王豈惡僧道之善如此之深耶蓋其亂人亦已甚矣且佛之立教清浄無為若以色見即是形法開示悟入惟有一門所以三乗之人比之外道況今出家者皆是無識下劣之流縱其戒行髙潔在於王者已無用矣今聖明之心甚善然臣恐其奸吏詆欺而去者未必非留者不必是無益於國不能息奸既不變人心亦不因人心强制力持難致逺耳臣聞天生蒸民必將有職㳺行浮食王制所禁故有才者受爵禄不肖者出租稅此古之常道也今天下僧尼不耕而食不織而衣廣作危言險語以惑愚者一僧衣食嵗計三萬有餘五丁所出不能致此舉一僧以計天下其費可知陛下日旰憂勤將去人害此而不救奚其為政臣伏請僧道未滿五十者每年輸絹四疋尼及女道士未滿五十者輸絹二疋其雜色役與百姓同有才智者令入仕還俗為平人者聴但令就役輸課為僧何傷臣竊料其所出不下今之租賦三分之一然則陛下之國富矣蒼生之害除矣其年五十者請皆免之夫子曰五十而知天命列子曰不斑白不知道人年五十嵗嗜慾已衰縱不出家心已近道况戒律檢其性情哉臣以為此令既行僧尼規避還俗者固已大半其年老精脩者必盡為人師斯道釋二教益重明矣上深嘉之元和十三年功徳使奏鳳翔府法門寺有䕶國真身塔塔内有釋迦牟尼佛指骨一節其本𫝊以為當三千年一開開則嵗豐人安至來年合發詔許之命中使領禁兵與僧徒迎䕶至京上開光順門以納之留禁中三日乃送京城佛寺王公士庶瞻禮舎施如恐不及百姓有廢業竭産燒頂灼臂而云供養者又有開肆惡子不苦焚烙之痛請譎言供養而爇其肌膚繇是佛骨所在往徃盗發既擒獲皆向之自灼者農人多廢東作奔走京城於是刑部侍郎韓愈上疏極諫曰臣伏以佛者夷狄之一法耳自後漢時始流入中國上古未嘗有也黄帝在位百年百一十嵗少昊在位八十年年百嵗顓頊在位七十九年年九十八嵗帝嚳在位七十年年百五嵗帝堯在位九十八年年百一十八嵗帝舜及禹年皆百嵗此時天下太平百姓安樂壽考而中國未有佛法也後殷湯亦年百嵗湯孫太戊在位七十五年武丁在位五十九年書史不言其夀年數蓋亦不減百嵗周文王年九十七嵗武王年九十三嵗穆王在位百年此時佛法亦未入中國非事佛而致此也漢明帝時始有佛法在位纔十八年其後亂亡相繼運祚不永宋齊梁陳魏已下事佛漸謹年代尤促唯梁武帝在位四十八年前後三度捨身施佛宗廟之祭不用牲牢晝一餐止於菜菓其後竟為侯景所逼餓死臺城國亦尋滅事佛求福乃更得禍由此觀之佛不足信事亦可知矣髙祖始受隋禪則議除之當時羣臣材識不能深知先王之道古今之宜推闡聖明以救斯弊其事遂止臣常恨焉伏惟睿聖文武皇帝陛下聖神英武數千百年以來未有倫比即位之初即不許度人為僧尼道士又不許創立寺觀臣常以為髙祖之志必行于陛下之手今縱未能即行豈可恣之轉令盛也今聞陛下令京都僧於鳳翔迎取佛骨御樓以觀舁入大内令諸寺遞迎供養臣雖至愚必知陛下不惑於佛作此崇奉以祈福祥也直以年豐人樂為京師士庶設詭異之觀戯翫之具耳安有聖明若此而肯信此等事哉然百姓愚㝠易惑難曉茍見陛下如此將謂真心信佛皆云天子大聖猶一心敬信百姓賤微於佛豈合更惜身命焚頂燒指百千為羣解衣散錢自朝至暮轉相倣效惟恐後時老少奔波棄其生業若不即加禁遏更歴諸寺必有斷臂臠身以為供養者傷風敗俗𫝊笑四方非細事也夫佛夷狄之人與中國言語不通衣服殊製口不言先王之法言身不服先王之法服不知君臣父子之情假如其身尚在奉其國命來朝京師陛下容而接之不過宣政一見禮賔一設賜衣一襲衛而出之於境不令惑於衆也况其身死已乆枯朽之骨凶穢之餘豈宜以入宫禁孔子曰敬鬼神而逺之古諸侯行弔於國尚令巫祝先以桃茢祓除不祥然後進弔今無故取朽穢之物親臨觀之巫祝不先桃茢不用羣臣不言其非御史不舉其失臣實恥之乞以此骨付有司投諸水火永絶根本㫁天下之疑絶萬代之惑使天下知大聖之所作為出於尋常萬萬也豈不盛哉佛如有靈能作禍祟凡有殃咎請加臣身上天鑒臨臣不怨悔疏奏上怒甚間一日出以示宰臣將加重法裴度崔羣對曰韓愈上忤尊聴誠宜得罪然非内懐忠懇不避黜責豈能至此伏乞稍賜寛容以來諫者上曰愈言我奉佛太過我猶為容之至謂東漢奉佛之後帝王咸致天促何乖誕也愈為人臣而敢爾狂忽不可赦於是人情驚惋至於國戚亦以罪愈為人臣戒而給事中崔植洎諸諫官皆上疏論救不納遂貶潮州刺史㑹昌五年八月制朕聞三代以前未嘗言佛漢魏之後象法寖興是逢季時𫝊此異俗因縁染習滋蔓侈多以至於耗蠧國風而漸不覺以至於誘惑人心而衆益迷洎乎九有山原兩京城闕僧徒日廣佛寺日崇勞人力於土木之功奪人利為金寳之飾移君親於師資之際違配偶於戒律之間壊法害人莫過於此且一夫不田有受其餒一婦不織有受其寒者今天下僧尼不勝數皆待蠶而衣待農而食寺宇招提莫知紀極皆雲構藻飾僭擬宫殿晉宋齊梁物力凋瘵風俗澆詐莫不由是而致也况髙祖太宗以武定禍亂以文理華夏執此二柄足以經邦而豈可以區區西方之教與我抗衡哉貞觀開元亦嘗釐革剗除不盡流衍滋多朕博覽前言旁求輿議弊之可革㫁在不疑而中外正臣叶予至意條疏至當宜從所請懲千古之蠧源成百王之典法濟人利衆予不讓焉其天下坼寺四千六百餘所還俗僧尼二千六萬餘人収充兩稅户坼招提蘭若四萬餘収膏腴上田數千萬頃収奴婢為兩稅户十五萬人𨽻僧尼屬主客顯明外國之教勒大秦穆袄二萬餘人違俗不雜中華之風於戱前古未行已將有待及今盡去豈謂無時驅逰惰不業之徒已踰千萬廢丹雘無用之屋何啻億千自此清浄訓人慕無為之理簡易為政成一俗之功將使六合黔黎同歸皇化儻以革弊之始日用不知下制明廷宜體予志宣布中外咸使聞知唐㑹要卷四十七
