body:
  text: 唐會要卷十九宋王溥撰廟𨽻名額太廟署舊𨽻太常官有廟令丞各一員至開元二十一年二月二日勑宗廟所奉尊敬之極因以名署情所未安宜令禮官詳擇所宜奏聞至五月十六日太常少卿韋縚奏曰謹按經典竊尋令式宗廟享薦皆主奉常别置司薦事非稽古其太廟署望廢省本寺專奉其事許之至開元二十二年七月二十日勅宗正設官寔司屬籍而陵寢崇敬宗廟惟嚴别𨽻太常殊乖本系奉先之㫖深所未安自今以後諸陵廟署並𨽻宗正寺其宗正官屬並擇宗子為之永以薦奉園廟敦叙親親我之宗盟異姓為後至天寳十二載五月十二日太廟及諸陵署依舊𨽻太常寺至德二載十一月二日陵廟並依宗正寺收管至永泰元年二月十九日勑諸陵廟署並𨽻太常寺至大厯二年八月二十五日勑諸陵廟並宜依舊宗正寺檢校孝敬皇帝廟儀鳳二年四月二日勑孝敬皇帝神主再期之後宜祔於太廟之夾室遷祔之日神主徧朝六廟仍令禮官等考覈前經發揮故寔具為儀制副朕意焉神龍元年六月十五日祔孝敬皇帝神主於廟號義宗景雲元年十二月二十六日禮儀使中書令姚元之等奏稱準禮先帝即合祔廟其太廟第七室皇昆義宗孝敬皇帝哀皇后裴氏神主伏以義宗未登大位追尊神龍之初乃令升祔春秋之義國君之位未踰年者不合列叙昭穆又古者祖宗各别立廟孝敬皇帝恭陵既在洛陽州望於東都别立義宗之廟祔孝敬皇帝及哀皇后神主有司以時享祭則不違先㫖又協古制在此神主望入夾室安置伏願以義斷恩式存禮典從之開元六年正月二十六日將作大匠􅅊湊上疏曰臣聞禮祖有功而宗有徳祖宗之廟百代不毁殷太甲曰太宗太戊曰中宗武丁曰髙宗周有文王武王漢以文帝為太宗武帝為世宗其後代有稱宗皆以方制海内德澤可宗列於昭穆期於不毁稱宗之義不亦大乎况孝敬皇帝位止東宫未嘗南靣聖道誠冠於儲副德教不被於寰瀛立廟稱宗恐非合禮况别起寢廟不入昭穆稽諸祀典何義稱宗以臣庸識竊謂不可望更令所司詳議務合於禮於是太常請以本寺諡孝敬為廟稱從之至七年十月九日祔孝敬皇帝神主於東都從善里新廟故來庭縣署至十八年九月八日勑縁祫享孝敬神主當廟自為享祭大厯十四年十二月有司言孝敬皇帝尊非正統且不列於昭穆今廟廢而主存請毁之遂瘞主於廟其廟自天寳後祠享久絶讓皇帝廟開元二十九年十一月辛未太尉寧王薨追諡曰讓皇帝又追贈妃元氏為恭皇后立廟於京城啟夏門内立政坊廟制如德明四時有司行事至天寳三載四月勑讓皇帝今後四祭宜為大祀上元二年禮儀使太常卿劉晏奏讓皇帝廟請停四時享獻每至禘祫日則一祭焉樂用登歌一部牲牢樽豆之禮同太廟夾室之儀開成四年三月中書令門下奏伏以讓皇帝睿宗之子𤣥宗之兄位止列藩功非及物𤣥宗情深同氣恩起權宜贈王者之尊名申友于之私分别搆廟宇以時烝嘗求之古先則匪經制比及肅宗之代嵗月未深禮儀使杜鴻漸言其不可四時享獻從此並停每至禘祫之年猶令一祭伏以禘祫之禮義理甚明祫謂合祭祖宗禘謂審諦昭穆讓帝親非正統名是贈加久從禘祫頗疑乖爽臣等又以睿宗之尊𤣥宗之功德皆以親盡祧去藏主於夾室之中而讓帝宗祀依然廟宇仍舊曾無昭穆之序而有禘祫之儀惟情與禮俱所未可况自建立於今九廟比章懐孝敬名位猶輕與德明興聖則尊卑頓異豈可因循不毁享獻無窮者也伏以今年夏禘祭俯臨輒敢舉明特請廢革如或以臣等所見不至乖繆望下禮官詳議聞奏其年四月太常寺奏議曰臣等伏以讓皇帝追尊位號恩出一時别立廟祠不渉正統既非昭穆禘祫所及又無子孫享獻之儀蓋親盡則䟽嵗久當革杜鴻漸所議禘祫之月時一祭者固以時近恩深未可頓忘故也今睿宗𤣥宗既已祧去又文敬等七太子其中亦有追贈奉天承運皇帝之號皆已停廢則讓帝之廟不宜獨存臣等㕘詳伏請準中書門下狀便從廢毁沿情定禮實謂協宜制從之儀坤廟先天二年十月六日祔昭成肅明二皇后於儀坤廟坤儀廟在親仁里開元四年十一月十六日昭成皇后祔於太廟至八月九日勑肅明皇后依前儀坤廟安置初欲祔於太廟太常博士陳正節等以肅明皇后不合與昭成皇后配祔於睿宗遂奏議曰臣聞於禮宗廟父昭子穆皆有配座每室一帝一后禮之正儀自夏殷而來無易茲典伏惟昭成皇后真姒之德已配食於睿宗則肅明皇后無帝母之尊自合别立一廟謹按周禮云奏夷則歌中吕以享先妣者姜姬也姜是帝嚳之妃后稷之母特立廟名曰閟宫又禮論云晉伏系之議云晉簡文鄭宣妃既不配食乃築宫於外嵗時之薦就廟享祭而已今昭成皇后神主祔於睿宗之室惟應留肅明皇后神主於儀坤宫廟八月二日勑儀坤廟𨽻入太廟不宜更置官屬至二十一年正月六日遷祔肅明皇后神主於太廟其儀坤廟為肅明觀諸太子廟舊制諸贈太子廟令各一人從八品上丞一人正九品下録事以下準隱陵署例神龍二年十一月十九日嗣雍王守禮奏勑賜臣父廟號陟岡乞𨽻太常寺仍請安國相王書額開元三年右拾遺陳正節以諸太子廟不合官供祀享上䟽曰王者祀典義存德坊猶且遠廟為祧去壇為墠親盡則毁此皆為繼體之君焉茍非斯文並從咸秩伏見章懐太子四廟逺則從祖近則堂昆並非有功於人立事於代而寢廟數薦獻祼連時事不師古以克永代臣實疑之今章懐太子等乃為陵廟分署官寮八處修營四時享祭物須官給人必公差合樂登歌咸同列帝夫金奏所以頌功德登歌所以颺輝光以感神祇以和邦國故詩曰鐘鼓既設一朝享之錫有功也若使無功而頌無德而颺乃以姑洗為宫㽔賔為羽聲含六代式類五郊奏咸和以降神歌肅雍以延祉便是舞詠非䖍金石乖義謹按周禮始祖以下猶稱小廟未知此廟厥名惟何臣請八署司存員寮且省四時祭祀供給咸停臣又聞磐石維城有封建之典别子為祖非大小之宗其四陵廟等應須祭祀者並令承後子孫自修其事崇此正典冀合禮經上令有司集羣官詳議奏聞駕部員外郎裴子餘議曰謹按前件四廟等並前皇嫡嗣殞身昭代聖人哀骨肉之深錫烝嘗之享憲章往昔垂範將來昔嫄廟列周戾園居漢並位非七代置在一時斯並前史宏規後賢令範故知父子之愛兄弟之恩情有所殺方崇大教又按春秋狐突適下國遇太子使登僕曰將以晉畀秦秦將祀予此則太子之言無後明矣對曰神不歆非類民不祀非族君祀無乃殄乎此則晉有其祀立廟必矣雖史有詳畧而微㫖見存又定公元年立煬宫經傳更無異說鄭𤣥注云煬公伯禽之子季氏禱而立其宫也竊以宫廟同號建立不殊季氏陪臣煬公遠祖因禱立廟尚不為嫌豈與夫睿聖因心闡揚至化在篤維親之祀垂永久之法考之漢儲晉嫡則如彼言乎周廟魯公又如此豈可使晉求秦祀戾匪漢司所枉者深所宜者鮮黷神慢禮理必不然且尊以儲后位絶諸侯諡號既崇官吏有典去羊存朔非禮所安狥利忘禮何以為國太常博士段同泰議曰伏據隱太子等皆特禀殊恩式創陵寢一差蘋藻而驟移檀柘豈非睦親繼絶悼往推㤙者歟況漢置戾園晉修虞祀書稱咸秩禮祀百神紛綸葳蕤可畧言矣隱太子等並特降絲綸别營祀宇義殊太廟恩出當時借如逝者之錫蘋藻亦猶生者之開茅土寵章所及誰謂非宜且自古帝王封建子弟寄以維城之固咸登列郡之榮豈必有功於人立事於代生者曾無異議逝者輒此奏停雖存歿之跡不同而君臣之恩何别此則重輕非當情禮宜均神道固是難誣人情孰云其可又謹按隱太子是皇帝曾伯祖本服緦麻章懐是伯父本服周年懿德節愍咸是堂昆本服大功親並未盡廟不合廢又班彪云貢禹毁宗廟匡衡改郊祀皆復紛紜不定者何禮文缺微古今異制各為一家未易可編定也按匡衡之議戾太子等以親未盡不毁斯則遠窺青史無可廢之文上固皇枝有深根之美一朝廢罷竊為不可臣愚以為置之則睦族廢之則收恩睦族則廟存收恩則享絶事關聖慮奏定為宜禮部尚書鄭惟忠等二十七人議稱隱太子等四廟諸祠如舊陵廟既在官不可削其府史等各請減半從之開元二十二年七月二十六日勑贈太子頃年官為立廟并致享祀雖欲歸厚而情且未安烝嘗之時子孫不及若專令官祭是以踈間親遂比為常豈為敦孝其諸贈太子有後者但官置廟各令子孫自主祭其署及官悉停若無後者宜依舊至天寳六載正月十一日赦文諸廟之主禮有遵於合祭同等則祔義亦取於旁通其章懐節愍惠文惠宣等太子雖官為立廟比來子孫自祭或時物有闕禮儀不備宜與隱太子及懿德太子列次諸室簡擇一寛處同為一廟應縁祭事所須及樂饌並令官供每差祭官宜準常式仍都置田廟令丞自餘所廢廟官宜停按􅅊遂兩京記此廟地本是夔萬等六州即後為乾封縣移於永樂坊神龍初遂立為懿德太子廟其後諸太子廟比各别坊今並移就此廟號為七太子廟也上元二年二月禮儀使太常卿杜鴻漸奏議曰讓帝七太子廟等停四時享獻每至禘祫之月則一祭焉樂用登歌一部時獻俎樽之禮同太廟二室之儀貞元十五年九月置文敬太子廟於常安坊祭令各一人四時獻葬太子家令為祭主牲牢樂饌所司供備太常博士一人相禮至太和四年四月太常寺奏文敬太子廟準太和元年十一月二十三日勑停祼獻從太和二年四時享獻並停伏準七太子及靖恭太子例廟享既絶神主理合埋瘞從之元和元年太常寺奏七太子廟文敬恭懿太子兩京皆是旁觀伏詳禮經無文享祀官所設深恐非宜其兩京官吏並請勒停其屋宇請令宗正等勾當者勑㫖依準其見任官至考滿日停其日又勑文敬太子廟量留令一員府史一人三衞二人餘並停寳厯二年二月太常奏進文敬太子廟在常安坊惠昭太子廟在懐真坊各置官吏四時置享禮經無文况𤣥廟遞遷族屬彌遠推恩降殺祼獻宜勒停又贈奉天皇帝廟贈貞順皇后廟及永崇坊隱太子以下七室同為一廟并贈靖恭太子亦祔此廟凡此置制皆是追崇或狥一時且非禮意日月既遥停其神主望準故事奏於廟庶情禮終始不失經訓請下中書省及禮部官議起居郎劉敦儒議曰謹按禮記云殤與無後者從祖祔食又曰王下祭殤五又曰有隂厭有陽厭隂厭謂祭嫡殤也注云謂宗子之殤祭於奥爾雅云西南隅謂之奥此明幼殤而死故祭於祖廟隂闇之處也陽厭謂祭庶殤也䟽云祭於宗子之家祖廟之内當室顯露之處故曰陽厭所以明嫡庶也過此以往則不祭矣伏以惠昭太子位登儲闈業當主鬯於親則髙祖神堯皇帝之宗子屬則於皇帝為伯祖父雖禮文於旁親無服而骨肉之恩不移於宗子若置室於德宗皇帝廟内於西南隅遷祔神主以特牲展祭不舉樂無加爼去𤣥酒不告利成庶合古禮若準魏晉故事即留愍懐太子殤太子哀太孫沖太孫皆於祖廟北牖西置隂室嵗時祔享以至親盡今固已變三代之典從東漢之制九廟既有周殿之隘一室難修處奥之儀况别隂室俱為變禮儀前享獻於事為宜其廟請不置禮官或云惠昭太子棄東宫之日已過殤年若合祼享宜同正祭臣以為古處於奥今祭祀於廟雖不以成而列亦過殤之禮矣又或云若此成人合有主後臣以為惠昭太子裔嗣皆在宫中若未勝冠自宜抱奠又有以同姓為尸者今但令宫正宗屬主奠即雅符祀典矣其文敬太子生非繫木之重歿有追命之榮今於皇帝為曾叔祖非大功之親詳禮經為庶子而服屬已遠列於常祀實為非經請依太常所奏又隱太子以下神主或累朝嫡嗣或聖代名藩今者子孫用蕃皆名列土因縁食禄亦謂承家各令自列廟祧用伸嚴配臣伏詳開元中勑諸贈太子有後者咸令自主其祭今請復行此祭各使子孫奉迎神主歸祔私廟庶别子為祖祔列國不祧之尊其無後之廟及正順皇后神主即請依太常所奏其贈奉天皇帝神主既有常號禮不可黷葢王者不享於下士諸侯不敢祖天子之儀縱有主後法不當亦請依太常所奏制享從之開成三年二月兵部尚書判太常卿事王起等奏准堂帖天寳初置七太子廟異室同堂國朝故事足以師法今欲以懐懿太子神主祔惠昭及悼懐太子廟宜選太常寺典禮官同議狀者伏以三代已降廟制不同光武為總立一堂神主異室親盡廟毁宗廟久逺昭穆遞遷此蓋祖宗之廟也然則太子廟出於近代或散在他處别置一室或尊以序列共立一堂伏惟國初太子廟各在諸坊天寳六載赦文章懐節愍惠莊惠宣等太子宜與隱太子列次同為一廟號七太子廟應縁祭事並令官給又準大厯三年五月以靖恭太子神主祔七太子廟加一室今懐懿太子以姪祔叔享得宜請於惠昭太子廟添置一室擇日升祔從之大中六年十一月太常博士白𢎞儒奏伏以惠昭太子廟元和七年立悼懐太子廟太初四年立懐懿太子廟開成三年入惠昭太子廟莊恪太子廟開成三年立前件太子四室共置三廟每當修飾至其費用極多四時奠享所司雖必豐潔三處行事人力寔謂勞煩將欲求其便宜莫若移就一廟且今太廟九室尚在一處太子各置廟宇禮寔非宜伏以莊恪太子廟地寔高敞建立又新只添一間可容三室所費益寡其利寔繁非止即安可以永逸請待修理畢擇日備禮遷諸太子神主皆祔莊恪廟中列位次居匪失彛倫之叙祀事同享無虧長幼之儀其廢廟瓦木極多諸廟添修計亦合足其廢廟官等未得資者望許非時參選臣官守儀秩職忝參詳事關禮文合當舉請勑白𢎞儒所奏頗為得宜令太常卿集禮官重議聞奏於是禮院奏議曰伏以列聖祖宗尚同太廟追册儲嗣不合别祠蓋以年月各殊寵恩有異嵗時已久即宜改更况春秋薦享之時禮樂牲牢之用重煩人力寔近皇居今據從卑就尊剏置年月即合移懐懿太子以下三廟就惠昭太子廟地既卑下多有浸溼非可經久莊恪太子廟地居高敞屋更寛廣若移同一廟只要增置廟室謹詳遷就誠謂久安增其便宜移廟未虧於典故今列次增室祔禮尊崇庻酌中之道可行申奠之儀不失巨典官寮等集議請依𢎞儒所奏事誠允當寔舉舊章奉勑宜依公主廟貞元十五年七月十五日追册故唐安公主為韓國貞穆公主故義章公主為鄭國莊穆公主後詔令所司擇地置廟祔祭之日官給牲牢禮物太常博士一人贊相四時仲月則子孫自備其禮貞穆廟在清安里貞元十七年十一月十四日追祔神主於廟莊穆廟在嘉會里貞元十七年三月二十五日追祔神主於廟莊穆貞穆二主德宗皇帝愛女悼念甚特為立廟權制也百官家廟侍中王珪通貴漸久而不營私廟四時烝嘗猶祭於寢貞觀六年坐為法司所糾太宗優容之因為立廟以愧其心廟在永樂坊東北角貞元八年修唐安寺移於寺西開元十三年勑一品許祭四廟三品許祭三廟五品許祭二廟嫡士許祭一廟庶人祭於寢天寳元年四月太子太師致仕蕭嵩以私廟逼近曲江因上表請移就他處其辭曰臣嵩言昨日大將軍高力士奉口宣俯令存問以臣私廟逼近曲江人物喧雜非安神之所許臣移轉更就幽閒又憐臣田園知無力手擬令將作與臣營造伏䝉殊渥感戴交深臣叨沐朝榮獲崇私廟禮尊祖考祀奉烝嘗而地接勝遊域連禁御伏以神道靜謐久議遷移豈謂理會事宜天從人願聖情下逮宏奬曲成遂使澤及幽明慶沾存歿丘山易負恩惠難勝今日已令下手移拆訖所令官作豈敢當之臣為衰老昏拙將攝十數日來加風氣發動猶尚虚腫未堪拜伏不獲詣闕奉謝批答云卿立廟之時此地閒僻今傍江修築舉國勝遊與卿同之須避喧雜事資改作遂令官司承已折除終須結搆已有處分無假致辭建中宰臣楊炎不知其事又買之為廟炎既與盧把嚴郢有隙因宻奏曰此地有王氣是以𤣥宗勑蕭嵩拆已成之廟今炎復興之必有異圖把後贊其言上大怒既竄於崖州遂殺之十載正月十日赦文天子七廟諸侯五廟大夫三廟士一廟今三品以上乃許立廟永言廣敬載感於懐其京官正員四品清望官及四品五品清官並許立私廟貞元三年勑贈太傅馬燧祔廟宜令所司供少牢仍給鹵簿元和二年六月淄青節度使李師道立私廟追祔曾祖祖父三代及兄師古神主詔下太常議曰伏以師古雖是師道親兄師古身存之日先未祔廟今廟因師道而立即師道便合是百代不遷之宗謹按封爵令傳襲之制皆子孫以下相繼並無兄弟相繼為後之文則明師古神主不合入師道之廟若師古男自有四品三品官兼有封爵準開元禮合持三年喪終禮祭畢後别立廟宇設師古神主座行祔祭之禮自承宗祀庶合禮經勑㫖依奏七年十一月太子少傅判太常卿事鄭餘慶建立私廟將祔四代神主廟有二夫人疑於祔配請下詳議定修撰官太學博士韋公肅議曰古者一娶九女所以於廟無二嫡自秦漢以下不行此禮遂有再娶之說前取後繼並是正嫡則偕祔之義於禮無嫌謹按晉驃騎大將軍温嶠相繼有三妻疑並為夫人以問太學博士陳舒議以妻雖既歿榮辱並隨夫也禮祔於祖姑祖姑有三人則各祔舅之所生如其禮意三人皆夫人也秦漢以來諸侯不復一娶九女既生娶以正禮歿不可貶自後諸儒咸用舒議且嫡繼於古則有殊制於今則無異昔今王公再娶無非禮聘所以祔配之議不得不同至於卿士之家寢祭亦二妻位同几席豈廟享之禮而有異乎是知古者廟無不嫡防姪娣之爭競今無所施矣古之繼室皆媵妾也今之繼室並嫡妻也不宜援古一娶九女之制而遂使子孫祭享不及或曰春秋聲子不入魯侯之廟如之何謹按魯惠公先妃孟子卒繼室以聲子姪娣非正也自不合入魯公之廟明矣又武公生仲子則仲子歸於魯生桓公而惠公薨立宫而奉之追成父志别為公也尋求禮意則當然矣未見前例如之何謹按魯南昌府君廟有荀氏薛氏景帝有夏侯氏羊氏聖朝睿宗廟有昭成皇后竇氏肅明皇后劉氏故太師顔魯公祖廟有夫人殷氏繼夫人桞氏其流甚多不可悉數畧稽禮文叅諸故事二夫人並祔於禮為宜寳厯二年七月十二日太禮院奏狀奉四月二十八日勑前同州朝邑縣尉韓約進狀請祔亡父故金紫光禄大夫守尚書左僕射贈太子太保臯神主付禮院議定聞奏者謹按禮經諸侯二品以上祠四廟五品以上祠三廟今據韓臯祖體先已立先祖廟主室今子孫見繼昭穆享祭臯父滉是衆子官至二品身歿後長子羣官至國子司業已别立禰廟祔滉神主入廟今子孫承襲自為一宗臯是滉次子官雖一品身歿無升祔廟又伏準禮記云别子為祖繼别為宗繼禰者為小宗若臯子約官至五品清資郎合别置禰廟祔臯神主自列昭穆庶合禮經勑㫖依奏㑹昌五年二月初自今以後百寮不得於京城内置廟如欲於坊内置者但準古禮於所居處即不失敬親之禮大中五年四月武昌軍節度使檢校户部尚書韋損奏臣四代祖湊開元中於上都立政坊立廟至建中四年亡失木主其廟屋及樹並在今臣官階至三品合立私廟請祔享前件廟勑㫖宜依先是韋損之門吏左司員外郎楊師復以此事問於禮官太常寺主簿韋孺實對曰準何修之禮問答云始安靖王廟東城事亂神主不存廢祠來久今欲造木主升祔於禮如何答曰新造木主成便合奉迎入室當設酒脯之奠然後即安也又準禮文武官二品以上祠四廟五品以上祠三廟今韋尚書官至三品自合得立三廟縁四代祖河東節度使先立私廟太師已曾祔廟訖至建中四年失木主自後子孫位卑其祠久廢今韋尚書官位三品準祠祭令各立三廟即合祭太師中丞及使君三神主便合營造廟宇以安木主今河東節度舊廟木主亡失廟宇見存其河東節度是四代神祖不合更祭今祔太師以下三神主於其廟在禮無嫌其年十一月太常禮院奏據中書侍郎兼吏部尚書平章事崔龜從奏臣官準式合立私廟伏準會昌五年二月一日勑㫖百官並不得京内置廟如欲於京内置廟者但準古禮於所居處置即不失敬親之廟禮者伏以武宗時縁南郊行事見天門街左右諸坊有人家私廟遂令禁斷其本不欲令御路左右有廟宇許令私第内置則近北諸坊漸逼宫闕十年之内悉是人家私廟今若人家居第寛廣或隣里可吞併者必使置廟以展孝思或居處偏狹隣近無可開廣者便是終身廢廟享之榮公私情禮皆極不便國朝二百餘年在私家側近者不過三數家今古殊禮頗為䙝黷其餘悉在近南遠坊通行已久今若縁南路不欲令置私廟却合居處建立廟宇即須種植松栢及白楊樹近北諸坊竊恐非便以臣愚見天門街左右諸坊不許置廟其餘園林遠坊本是隙地并舊是廢廟者許令建立則天門街側近既無私廟近北諸坊又免百官占地立廟并官至三品盡得升祔祖禰無乖禮經中外官寮已至三品者皆望有此釐革伏請下太常禮院重定立廟制度及去處應得使禮可遵行事無乖當奉今月一日勑宜依所奏下太常禮院詳審制度分析奏聞者伏以事亡如存典禮攸重今百官悉在京師若不許於京内置廟則烝嘗之禮難復躬親孝思之心或乖薦奠若悉令於居處置廟又縁近北諸坊便於朝謁百官第宅布列坊中其間雜以居人棟宇悉皆連接令廣開則鄰無隙地廢廟貌則闕禮敬親若今依會昌五年勑文盡勒於所居置廟兼恐十數年間私廟漸逼於官墻齊人必致於吞併臣具詳本末冀便公私今請夾天門街左右諸坊不得立私廟其餘圍外遠坊任取舊廟及擇空閒地建立廟宇應立廟之初先取禮司詳定兼請準開元禮二品以上祠四廟三品祠三廟三品以上不須爵者四廟外有始封祖通祠五廟三品以上不得過九架並廈兩頭其三室廟制合造五間其中三間隔為三室兩頭各厦一間虚之前後並虚之每室中西壁三分之一近南去地四間開一埳室以石為之可容兩神主廟垣合開南門東門並有門屋餘並準開元禮及西臺禮為定制其享獻之禮除依古禮用少牢特牲饋食外有設時新及今時熟饌者並聽仍請永為定式勑㫖宜依天祐三年十月兩浙節度使錢鏐請依本鎮立三代私廟從之唐㑹要卷十九
