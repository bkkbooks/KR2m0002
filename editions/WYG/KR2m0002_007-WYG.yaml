body:
  text: 宋王溥撰封禪上兖州刺史薛胄以天下太平登封告禪帝王盛烈遂遣博士登泰山觀古跡撰封禪圖及儀上之高祖謙讓不許冊府元龜貞觀五年正月癸未朝集使請封禪舊唐書太宗本紀貞觀五年正月朝集使趙郡王孝恭等僉議以為天下一統四夷來同詣闕上表請封禪帝手詔省表具懷自有隋失道四海横流王伯之弊於斯為甚朕提劒鞠旅首啟戎行扶翼興運克成鴻業遂荷慈睠恭承大寳每日昃思治弗敢康寧兢兢夕惕用忘興寢履薄馭朽不足為喻賴三靈顯命百辟同心海外無塵逺夷慕義但流遁永久凋殘未復田疇多曠倉廩猶虚家給人足尚懷多愧豈可遽追前代取譏虚美所望恂恂濟濟叶力盡誠輔其不逮致之王道如得雅頌形於金石菽粟同如水火反朴還淳當如來議冊府元龜十二月己亥朝集使荆州都督武士彠等詣朝堂又上表請封禪帝曰隋末分離羣凶競逐我提三尺劍數年之間正一四海是朕武功所定也突厥强梁世為紛更今乃襲我衣冠為我臣吏殊方異類輻輳鴻臚是朕文教所來也突厥破滅君臣為俘安養之情同於赤子是朕仁愛之道也林邑貢能言鳥新羅獻女樂憫其離本皆令反國是朕敦本也酬功錄效必依賞格懲惡罰罪必據刑書割親愛捨嫌隙以宏至公之道是朕崇信也非朕茍自矜伐欲明聖人之教不徒然也比年穀稼頻登疾疚不作誠宜展禮名山以謝天地但以喪亂之後民物凋殘憚於勞費所未遑也冊府元龜貞觀六年平突厥年穀屢登羣臣上言請封泰山太宗曰議者以封禪為大典如朕本心但使天下太平家給人足雖闕封禪之禮亦可比徳堯舜若百姓不足夷狄内侵縱修封禪之儀亦何異於桀紂昔秦始皇自謂徳洽天心自稱皇帝登封岱宗奢侈自矜漢文帝竟不登封而躬行儉約刑措不用今皆稱始皇為暴虐漢文為有徳之君以此而言無假封禪禮云至敬不壇掃地而祭足表至誠何必逺登高山封數尺之土也侍中王珪曰陛下發徳音明封禪本末非愚臣之所及秘書監魏徵曰隋末大亂黎民遇陛下始有生望養之則至仁勞之則未可升中之禮須備千乘萬騎之費動役數州户口蕭條何以能給太宗深嘉徵言而中外表章不已上問禮官兩漢封山儀注因遣中書侍郎杜正倫行泰山上七十二帝壇迹是年兩河水潦其事乃寢舊唐書禮儀志貞觀中百官上表請封禪太宗許焉唯魏徵切諫以為不可太宗謂魏徵曰朕欲封禪卿極言之豈功不高耶徳不厚耶逺夷不服耶嘉瑞不至耶年穀不登耶何為不可徵對曰陛下功則高矣而人未懷惠徳雖厚矣而澤未旁流諸夏雖安未足以供事逺夷慕義未足供其求符瑞雖臻罻羅猶密積嵗豐稔倉廩尚虚此臣所以竊謂未可臣未能逺譬但喻於人今有人十年長患療治且愈皮骨僅存便欲使負米一石日行百里必不可得隋氏之亂非止十年陛下之良醫除其疾苦雖已乂安未甚充實告成天地臣竊有疑且陛下東封萬國咸集要荒之外莫不奔走自今伊洛洎於海岱灌莽巨澤茫茫千里人煙㫁絶雞犬不聞道路蕭條進退艱阻豈可引彼夷狄示之虚弱殫府竭財未厭逺人之望加年給復不償百姓之勞或水旱之災風雨之變庸夫横議悔不可追豈獨臣言兆人咸爾太宗不能奪乃罷封禪大唐新語太宗謂房𤣥齡曰封禪是帝王盛事比奏請者不絶公等以為何如魏徵對曰帝王在徳不在封禪自喪亂以來近泰山州縣彫殘最甚若車駕既行不能令無使役此便是因封禪而勞役百姓太宗曰封禪之事不自取功績歸之於天譬如𤣥齡等功臣雖有益於國能自謙讓歸之於朕豈以不言而欲自取今向泰山功歸於天有似於此然朕意常以嵩高既是中嶽何謝泰山公等評議貞觀政要貞觀六年公卿百寮以天下太平四夷賓服詣闕請封禪者首尾相屬帝不許嘗從容而言曰朕本諸公子也始望不及此屬天下喪亂遂有救焚拯溺之志義師入闗之始羣凶鼎沸當此之時但得三分天下亦為足矣朕以不武内稟太上皇之謀外假士大夫之力數年之間六合大定升中告禪信亦其時然朕往昔䝉犯霜露遂嬰氣疾但恐登封之後彌増誡懼有乖營衛非所以益朕也少欲自怡用安年壽公卿等勿復為言册府元龜貞觀十一年羣臣復勸封山始議其禮於是國子博士劉伯莊睦州刺史徐令言等各上封禪之事互設疑議所見不同多言新禮中封禪儀注簡畧未周太宗勅秘書少監顔師古諫議大夫朱子奢等與四方名儒博物之士參議得失議者數十家遞相駁難紛紜久不決於是左僕射房𤣥齡特進魏徵中書令楊師道博採衆議堪行用而於舊禮不同者奏之其議昊天上帝壇曰將封先祭義在告神且備謁敬之儀方展慶成之禮固當於壇下阯先申齊潔贊享已畢然後登封既表重慎之深兼示行事有漸今請祭於泰山下設壇以祀上帝以太祖景皇帝配享壇長一十二丈高一丈二尺又議製玉牒曰金玉重寳質性貞堅宗祀郊禋皆充器幣豈嫌華美寔貴精確况乎三神壯觀萬代鴻名禮極殷崇事資藻縟玉牒玉檢式緼靈竒傳之無窮永存不朽今請玉牒長一尺三寸廣厚各五寸玉檢厚二寸長短濶狹一如玉牒其印齒請隨璽大小仍纒以金繩五周又議玉策曰封禪之祭嚴配作主皆奠玉策肅奉䖍誠今玉策四枚各長一尺三寸廣一寸五分厚五分每策五檢俱以金編其一奠上帝一奠太祖座一奠皇地祇一奠高祖座又議金匱曰嚴配之策盛以金匱歸格藝祖之廟室今請長短令容玉策高廣各六寸形制如今之表函纒以金繩封以金泥印以受命璽又議方石再累曰舊藏玉牒止用石函亦猶盛書筴笥所以或呼石篋今請方石三枚以為再累其十枚石簡刻方石四邊而立之纒以金繩封以石泥印以受命璽又議泰山上圜壇曰四出開道壇場通議南面入升於事為允今請介丘上圜壇廣五丈高九尺用五色土加之四面各設一階御位在壇南升自南階而就上封玉牒又議圜壇上土封曰凡言封者皆是積土之名利建分封亦以班社立號謂之封禪厥義可知今請於圜壇之上安置方石璽緘既畢加土築以為封高一丈二尺而廣二丈以五色土益封牒書藏於其内祀禪之所土封制亦同此又議玉璽曰謹詳前載方石緘封玉檢金泥必資印璽以為秘固今請依令用受命璽以封石檢其玉檢既與石檢大小不同請更造璽一枚方一寸二分文同受命璽以封玉牒石檢形制依漢建武時故事又議立碑曰勒石紀號顯揚功業登封降禪肆覲之壇立碑又議設告至壇曰既至山下禮行告至柴於東方上帝望秩徧禮羣神今請其壇方八丈一尺高三尺陛仍四出其禪方壇及餘儀式請從今禮仍請柴祭望秩同時行事又議廢石闕及大小距石曰距石之設意取牢固本資實用豈云雕飾今既積土厚封足與天長地久其小距環壇石闕迴建事非經誥無益禮儀煩而非要請從減省太宗從其議仍令附之於禮舊唐書禮儀志案顔師古𫝊帝將有事泰山詔公卿博士雜定其儀而論者爭為異端師古奏臣譔定封禪儀注書在十一年於時諸儒謂為適中於是以付有司多從其說貞觀十一年顔師古封禪議將封先祭義在告神且備欵謁舊唐書作謁敬之儀方展慶成之禮固當為唐書作於壇下距唐書作趾預杜佑通典作先申齊潔賛饗已畢然後登封既表重慎之深兼示行事有漸今請祭于山下封于山上四出開壇道場通議南面入升于事為允今請山上圓壇廣五尺高九尺用五色土為之唐書作加四面各設一陛唐書作階御位在壇南升自南陛唐書作階而舊本作宜就行事二字唐書作上附玉牒舊藏玉牒止用石函亦猶書盛篋笥所以或呼為石篋然其形大質重轉徙非易岱宗倘無此石皆應取自他山所以不為混成累輯而作大要在于周固稽其縝舊本作緝密而近代儀注更名石䃭䃭非稽古之文舊本作稱本無義訓可尋贏舊本作盈縮之間貴在折中舊本作衷不煩紛議更増疑惑今請方石三枚以為再累其十枚石檢刻方石四邊而立之纒以金繩用備檢約凡言封者皆是積土之名利建分封亦以班社立號謂之封禪厥義可知今若置牒壇上止因累石不加繕築即以為封匪唯嚴秘之道有如簡率亦乃名實不副理恐乖爽今請于圜壇之上安置方石封印唐書通典作璽緘既訖舊本作畢加五色土築以為封高一丈二尺而廣二丈金玉重寳質性堅貞宗祀嚴禋皆充器幣豈嫌華靡寔貴精確况乎三神壯觀萬代鴻名禮極殷崇事資藻縟玉牒玉檢式韞靈琦舊本作事韜靈琦傳之無窮永存舊本作在不朽至于廣袤之數足以載文辭緘束之方務在申膠固今宜立制隨時損益豐功厚徳既以跨躡前蹤盛典宏規無勞一遵曩式今請玉牒長一尺三寸廣厚各五寸玉檢厚二寸唐書有長短濶狹一如玉牒其印齒疎密隨印大小距石之設意取牢固本資實用豈云巧唐書作雕飾今既積土厚封更無差動天長地久寧假支持斜設横安請並弗舊本作不置勒石紀號垂裕後昆美盛徳之形容闡后王之休烈其義逺通典作大矣其事尚焉我皇聲暢九垓威横八極靈祇不愛其寳兆庶無得而稽但當賛述希夷以攄臣下之至具舊本作其祭壇之例舊本作制登封之所肆覲萬國受記舊本作職百神固宜刻頌顯舊本作播通典作明揚功業至如小距環舊本作圜壇石闕别樹唐書作迴建事非經據無益禮儀煩而非要請從減省神靈璽寳而弗用由來無所施行其六璽雖以封書莫不披于羣下受命之璽登封則用昭事上𤣥表兹介福休徵緯兆豈因常貫又封檢之璽分寸不同即事而言請並更造既順肅䖍之理永垂創制之名禪壇制度請從新禮行事儀式亦並依之自外委曲不載于文者職在所司隨事量定議曰謹率愚管其錄如前庸疑之言不足觀採但封禪大禮舊典不存秦漢以來頗有遺跡闕而不備難可甄詳昔在元封兒寛専賛其決逮乎光武梁松獨尸其事縉紳雜議不知所裁至如流俗𫝊聞記注臆說未嘗從事徒有空言乖殊不一曷足云也且夫沿革不同著之前誥自君作古聞諸往冊方今台鉉佐逺超風后秩宗典職追邁伯夷究六經之妙㫖畢天下之能事納于聖徳稟自宸衷果㫁而行文質斯允詔㫖集公卿及儒生學士議登封事謹依訪聞具件如右但封禪大禮舊典不存秦漢以來頗有遺跡闕而不備難可甄詳昔在元封時主博採羣論建武有司亦稟成規至如記注近書委巷浮說不足憑據無所取材且夫沿革不同著于往冊自君作古寔惟令範聖朝丕業方貽萬載臣下庸蔽不敢専決請垂鑒察克㫁宸衷謹錄奏聞伏聴裁擇謹議文苑英華貞觀十四年十月甲戌趙王元景等表請封禪奏曰夫功成道合古今以為隆平登封降禪聖賢謂之大典是以出震則天之后革夏變商之君繼韶夏而施尊名崇號諡而廣符瑞顧遲遲焉羣臣區區誠為此也原夫大始云構生靈厥萌黎庶布乎穹壤皇王司其右契遐哉上古以迄於兹歴選休徵未有如今日之盛也所以敢罄窺管無懼觸鱗瀝膽披肝言亦備矣援天引聖辭亦殫矣幸䝉亭育之澤降以聴覽之恩大賚雖敷猶申後命未便渙汗方事逡巡懷生之徒不遑寧處伏乞皇帝陛下則天成務應物為心協三才之㑹昌乃霈然而動色遂萬姓之延首俯凝旒而改容雖復龍圖告徵龜書襲吉尚諮諏於四岳建明謨於兆人欲使六合之中沃心通於朝野八紘之内下問浹於華戎凡在人靈疇無抃躍今兹百辟咸集九有攸同並執玉以來庭俱式歌而且舞逺則重譯僉議近則端笏參謀欣覩増天之高願逢加地之厚絶域忘生而越險華髮忍死而爭趨中外之心克諧愚智之情允睦掌故事者草登封而待期執羈勒者儼車徒而俟命庶官承職三事夙興逺邇昌言明靈幽賛莫不傾視俯聴希陪肆覲之禮效祉呈祥欽承告成之慶山稱萬嵗企和鑾而發竒雲浮五彩佇華蓋而交䕃兩間之情轉迫萬國之望愈深臣又聞之屈已從衆至人所以稱仁絲言顯發哲王以之敷信昨奉明詔許以試之寔降皇情俯同人欲寛仁之利斯溥示信之道宜𢎞即日庶尹馳心咸奉章而守闕列藩翹足各伏地以祈恩所冀天慈深加昭察制可羣寮之奏尅以發軫之期頒示普天申明絶典使夫一時之士欣獨高於萬代八荒之域荷周露於再造則臣等死日猶生之年不任誠懇之至謹與連牽方牧等奉表詣闕固請以聞帝沖讓不許至於再三於是下詔曰自古明王君臨區宇功濟天下道被生民内外無虞年穀豐稔莫不歸功上𤣥致禮厚地騰茂實於六合飛英聲於百代今公卿在列屢屬虚心岳牧具僚固陳僉願理在難奪敬依來請顧循諸已仍懷慙徳冊府元龜貞觀十五年四月辛卯詔以來嵗二月有事于泰山六月己酉有星孛于太微丙辰停封泰山唐書太宗本紀唐太宗已平突厥年穀屢豐羣臣請封泰山太宗初頗非之已而遣中書侍郎杜正倫行泰山上七十二君壇迹以是嵗兩河大水而止其後羣臣言封禪者多至十五年將東幸行至洛陽而彗星見乃止唐書禮樂志貞觀十五年庚辰肅州言所部川原遍生芝草先是百僚及雍州父老詣朝堂上表請封禪四月辛卯朔下詔曰肇有蒸庶樹之司牧載籍所記風烈猶存至於道洽品物功成宇縣天眷彰於符瑞人事表於隆平莫不増封岱宗廣禪梁甫榮光六合對越三神前聖所以垂其尊名後王所以仰其休烈蓋由此也自火徳既衰三光分裂金行失御九鼎沈淪諸華競逐彞倫大壞雖周室削平趙魏隋氏混一文軌而金革之事未戢於封疆雅頌之音弗聞於朝廷遂使至教闕如淳風莫反齊郊絶類帝之禮日觀缺升中之儀其已久矣朕丕膺景命嗣守洪基承大亂之餘當率土之責負扆興惕納隍在慮上憑宗社之靈下資士庶之力草昧伊始援干戈以靖亂區夏既平引禮樂以緯俗尉候無警菑畬有年比屋咸保其歡含氣不違其性殊方異域盡地界而來庭應圖合牒殫天符而表瑞緬懷前載詳求諸已豈伊寡徳能致此乎固乃上𤣥所叶賛也而羣公卿士百辟庶僚因陳人祇之意請遵封禪之典推而不居至於數四文武之情彌切内外之議日聞誠請頻繁淹歴年載朕繼跡百王因心萬物上奉蒼昊義在薦功下撫黎元方祈厚福既迫兹理敢不祗從猥以眇身齊美上代永言夙志凜乎増惕可以來年二月有事泰山所司宜與公卿并諸儒士及朝臣有學業者詳定其儀博考聖賢之㫖以允古今之中務盡誠敬稱朕意焉於是詔太常卿韋挺為檢校封禪大使禮部侍郎令狐徳棻副焉朝廷參議其儀異端競起秘書少監顔師古乃奏稱臣撰定封禪之禮書在十一年春於時諸儒參詳以為適中詔公卿定其可否多從師古之禮六月己酉有星孛于太微宫犯帝位辛亥朝散大夫行起居郎褚遂良進曰陛下撥亂反正功超前烈告成升岳天下幸甚而行至洛陽彗星輒見此或有所未允合者也且漢武優柔數年始行岱禮臣愚伏願詳擇丙辰詔曰自古皇王受天之命建顯號於封禪揚功名於竹帛者莫不功濟夷夏道叶人祇然後登泰山之高刋梁甫之石未有七徳靡記九部寂寥而欲齊聲於聖哲垂美於篆籀者也朕承宗廟之重當區宇之責寅畏三靈憂勤萬姓雖戡翦禍亂克定遐荒而至教猶鬱刑典未措勝殘之化未洽於率土和平之風多慙於往烈是以覽經籍而自失想壇場而増懼亟寢縉紳之奏屢拒公卿之請逡巡大典荏苒歴載近者文武百僚州縣庶尹頻繁抗表殷勤固陳咸以為兩儀交泰四夷賓服禮樂興行年穀豐稔蒼昊呈符於上靈符不可以久替黎獻協心於下衆欲不可以固拒朕迫兹羣議敢不敬從欲薦功上𤣥大報后土升中之儀已具省方之期有日今太史奏有彗星出于西方朕撫躬自省深以戰慄良由功業之被六合猶有未著徳化之覃八表尚多所闕遂使神祇垂祐警戒昭然朕畏天之威寢興靡措且曠代盛典禮數非一行途之間勞費不少冬夏凋敝多未克復將送儀仗轉運糧儲雖存節省之義終煩黎庶之力非惟上虧天意亦恐下失人心解而更張抑有故實前以來年二月有事泰山宜停庶夙夜自修遂其罪已之志勤恤匪懈申其納隍之情倘䝉靈祇迴睠宗社介福朝廷同於大道風俗歸於樸素告成之美更思其宜仍命所司泰山有前代帝王因封禪立碑及石函檢之類往遭離亂被賊毁發並修立瘞藏之冊府元龜二十年十一月司徒長孫無忌與百官及方岳等上表請封禪不許司徒長孫無忌與百僚又請封禪詔曰朕念逺役初寧頗須休息深知所請甚合機宜即事省方恐生勞擾俟百姓閒逸可徐議之十二月己丑司徒長孫無忌等又詣順天門抗表請封禪曰臣聞隂陽不測陶冶生靈之謂神道徳𤣥通仁育黎元之謂聖聖也者自天之攸縱也神也者代天之理物也是以惟天稱辟靈心作其㑹昌惟辟奉天至誠表其封禪升中之道抑斯之謂歟由是先王急焉當仁不讓景中必熭時至則行務在告於成功故無俟於終日伏見綸㫖辭逺役之初寧緩此嘉期託俟人之逸豫豈容前歌拔距戢武之後辭勞拓境開疆太平之秋有倦誠如睿慮未昭百姓之心假此空言實乖千里之應臣等服膺麟閣縱觀太始之初沈研鳥文歴選橧巢之上悠悠栗陸未辦犧牲淼淼大庭孰知罇俎袞衣為飾尚報太帝之功茹毛充薦輕展介丘之禮西敘窮乎積石東漸迫乎滄江化未覃於九夷貢有闕於三脊猶且範圍天地斡運羲舒揚翠旌於奉高撫朱絃於岱岳迓百神而賓上帝契三靈而謁太壇玉牘靈文飛英華於萬古金繩秘檢騰清輝於八埏是知紀號垂名崇高莫加於肆類推功輯瑞廣厚莫大於登封若乃靈貺所集人謀允洽雖固執於撝謙諒無得而辭也伏惟皇帝陛下研精探賾神無不照唯幾所鑒洞出象帝之初先天成則超貫混元之際由是大明揚彩麗雕軒於再中景宿騰輝藻璇題以霄映奔山車而叠軫促日馭之鳴鑾躍澤馬而相趨徵天駟之徐軔煙川清野蓄洩於奕奕之阿薰風驚途扇蕩於云云之嶠其㝠兆也如彼其顯應也若斯而陛下因事逡巡方稽大典使尊名顯號韜光於琰碑絶異殊尤沮絢於瓊簡孰謂畏天之命順人之欲者歟率土悽悽深所未喻臣又聞之游海若者馮夷之宫為陋登泰山者魯侯之邦蓋小是知絳霄不極九垓網絡於胷中赤縣無涯四海括囊於度内何者升山巢睫竊比所以懸殊朝菌靈椿長短自然相度也若夫大樂云替封豨盜鐘大禮既湮長鯨裂冕酌拊石於無體鈞天之響鬱興採掃地於無形禋宗之道愈劭則女希慙其創制軒后歸其正名矣至若比屋見誅農夫化為京觀稟噍無類芻牧窮於染鍔重興粒食頌棲畝之餘糧首建驂騵詠徒行之兼乘則農皇貶於推轂羲氏退以扶輪矣既而凝旒闡化中外禔福負扆勝殘飛沈遂性亭育侔於宇宙就望體於雲日荷其徳以難名用其功而無謝故乃邈高辛之順義孕顓頊之疏通矣加以刑清政肅委金科而罔施毁犴空囹設畫衣而莫犯通闗梁於夐服共苑囿於黎蒸擊壤而謠傳清音於戎狄耕田而食建可封於皂隸外户設而不扃神獸馴而靡觸故以光融伊帝景煥虞廷至於卑宫菲膳孝享通於鬼神大路越席致敬極於嚴配黄屋建三辰之旂垂範裕於千祀𤣥􅒐垂九旒之藻設法懸於萬代小正調其玉燭應祥蓂而不虧中天朗其金鏡與真明而同晷則文命以是服膺𤣥王於兹負笈矣洎乎翦商除害夷項墾災戮冀野而復皇猷誅疇華而清帝道提倚天之長劍拯塗炭於游魂揮駐日之雕戈暢懷生於仁壽則駭文武之仍代吞高光之累葉矣論彼數君時聞一善能兼之者實歸仁聖若乃提封海外總一寰中日域窮芳華之津月竁跨濛波之表喁喁向内並為冠帶之倫飄飄駕風總萃王庭之㑹賮北荒之明月物天府以摛光筐南州之火毛鬻旗亭而吐曜龍伯釣鼇之旅咸編列於武臣鳳洲君子之渠各委質於文吏斯乃書契之所未覩超古先而絶類矣竊惟域中三大義均一體感通由乎影響彌綸切乎交際是知徳逾厚者貺逾深功尤高者祥尤著當今皥穹儲祉浹天紘以宅心后土錫符總坤維而服化由是百官累息萬國聳神僉發叩閽之請佇副上靈之望伏願時紆睿紱逺振天聲徵鴻儒聘鯢齒考逸義緝遺編摭秦煨之逸文採魯壁之餘蠧酌雲經而定議憲河圖而繕儀然後五路乘春金鑣肅景五牛翻其析羽六龍輝其鏤鍚鼓豐隆而驚翠微振列缺而清綠野凝笳發岫合萬嵗於山言飛蓋登巒錯五松於林秀登圜壇而接武降曜魄而齊尊俾夫一代衣冠寘其名於冊府四方夷狄鑿其竅於靈宫則普天欣賴懷生再造朝聞夕死抃若登仙臣等深荷玉成不勝至願重竭愚瞽昧死以聞詔曰朕遐觀哲王煥在方冊功既成矣咸備禮以升中道既行焉必奉符而告禪所以發揮天命昭格上靈其有建顯號以創鴻徽施尊名而騰茂烈者莫不揚輝於鏤玉絢景於塗金昭昭然麗三辰而並運滔滔焉播四溟而極深朕誠寡徳良深景慕曩者氓俗凋敝國步甫安勉致隆平日不暇給而槐卿守闕請繼美於云亭岳牧叩閽祈踵武於梁岱自惟菲薄至道未凝抗禮皥穹實懷疑懼緬尋幼齒運鍾交喪忘其家以徇天下委其體以濟寰中翊戴先皇削平諸夏出於萬死首導五横之源不顧一生光錫兆人之命越自罏炭獲返營魂拔於鬼錄並登仁壽竊惟天地之大徳存於施生朕以徑寸之小心襲於造育降期體泰諒或繇兹不然者何能致於此也遂得池隍象浦苑囿龍沙置一候於鶼林同六爻於鰈水寔資天睠賁以咸亨豈朕微庸而能及此今兹列辟卿士鴻生碩徳各述靈徵累陳丹款既迫羣議當事敬從乃詔有司廣召縉紳先生議方石圜壇之制草封禪射牛之禮修造羽儀輦輅並送之雒陽宫册府元龜貞觀二十一年正月丁酉詔以來嵗二月有事于泰山八月泉州海溢壬戌停封泰山唐書太宗本紀貞觀二十一年正月丁酉詔曰朕聞天高地大首播黎方媧皇燧人肇參𤣥籙是知施生為徳處崇高而不言亭毒攸資委欽明以司契洎乎三正迭建五運相遷休烈存乎典墳至道流乎雅頌其有仰齊七政俯會百神察靈眷於祥符服𤣥功於昭告莫不罄情梁岱繼踵云亭對越兩儀盡先聖之能事揚蕤三統垂曩哲之尊名懸鏡天衢罔不繇於此也自中陽絶組堙白水於窮流宫孽紹興阻黄星於天塹永嘉東播化金馬以為牛道武南徂飛蒼鵝以登祚周吞岳裔逮三葉而巢傾隋并舜後及二帝而舟覆莫不以凶易亂以暴代昏各肆巨壑之心規享上靈之佑卻行求進其可得乎由是寂寥千祀無懷之風不嗣泯棄七經子長之言殆絶遂使成山日觀久闕升中之儀汶上明堂疇聞類帝之義顧瞻禮樂深有可嗟朕幼踐危機愍斯窮運上同負翼下靡息肩負荷休徵投旗鞠旅肅恭儲祉吟雲躍鱗順朱鳥以行誅鶱丹鳳而遐舉射九烏而懸日月區品物以煦陽和鍊五石以造乾坤濟摧角以令眉壽於是尊奉先帝凝旒於廟堂躬履兵鋒憂勤於燮輔既而仰逼威命俯順樂推越自唐侯言膺下武深惟憂責之重自勗若厲之懷遂致靈貺無涯掃欃槍而降錫游魂歸化窮荒服以開疆東苑蟠桃西池昧谷咸覃正朔並充和氣較凝禎於往代窮今古而罕聞考光澤於前皇罄縑緗而莫覩豈朕眇身勤勞所逮諒由高明垂鑒祚此隆平今兹三事大夫百僚庶尹各述天人之意請躡封禪之蹤顧惟寡薄推而不有杜絶羣言至於數四中外之情尤切企佇之望逾深朕又詳思荷財成於穹昊自古賢哲並歸功於大帝迫斯至理弗獲固辭展禮上𤣥實増慙懼可以貞觀二十二載仲春之月式遵故實有事于泰山諸内外具僚岳牧卿士既相敦喻將事告成各罄乃心無虧政道恪居職務以協時雍所司宜與縉紳先生載筆彈冠之士詳求通典裁其折中深加嚴敬稱朕意焉乃今天下諸州明揚側陋其有學藝優洽文蔚翰林政術甄明才膺國器者並宜總集泰山庶令作賦擲金不韞天庭之掞披褐懷玉無溺屠釣之間務得英竒當加不次也遣太常卿楊師道為檢校封禪大使户部侍郎盧承慶為副後改令禮部尚書江夏郡王道宗為大使司空梁國公房𤣥齡等議云梁甫社首二山並是古昔禪祭之所前十五年議奏請禪梁甫今更奉詔詳議梁甫去太山七十里又在東南至於行事未為穏便社首去太山五里是周家禪處臣等參詳請禪社首有詔依奏餘並依十五年議八月壬戌詔曰朕聞探𤣥賾者先實而後賓體至公者本仁而末禮名歸於已往哲存而弗務徳利於人前聖徇而為急是用範圍天地權輕重以㑹時宜取則隂陽適變通以從衆欲由古之封禪無奪事機所謂奉天咸資務隙朕仰窺前志歴選哲王無懷有巢緬逾繩契之末龜文鳳紀越在俎豆之先扣寂寞以𫝊疑故可畧而言也至如三元立統百物正名步驟之軌非遙損益之源可挹雖堯心廣運局疆域於流沙禹跡遐宣限提封於碣石猶且先引即敘次展玉帛之儀首創賓門方備云亭之典告成之義罔弗由兹况朕奄有方輿閫域該於千古仰承靈睠降福超於百王巨海所環莫非臣妾長河攸括並入封疆日者夷夏同文禎符狎至謂可鳴鑾日觀勒牒仙閭許以來春親行告禪而今延陁一姓流竄西陲控弦萬計初歸正朔新就縶維又以公卿庶僚各陳誠請遂有翠微之役非無板築之勞既而山谷阻深朝宗有礙重披丹懇請建玉華且復頻有興造恐致煩勞兼聞河北數州頗傷淹澇朕為人父母思濟黎元順動升中理無兼遂其介丘之禮宜且權停其玉華宫制度務從菲薄更令卑陋庶免風雨稱朕意焉冊府元龜案唐書謝偃傳太宗時偃為𢎞文館直學士撰玉牒真紀以勸封禪唐實錄貞觀五年正月朝集使趙王孝恭等請封禪手詔不許十二月己亥朝集使表請帝曰未遑六年百僚又請不許十一年帝將有事封禪國子博士劉伯莊等皆上封禪事言新禮簡畧勅諸儒及顔師古朱子奢參議得失議者數十家遞相駁難不決於是𤣥齡徵師道采衆議以為永式十四年十月甲戌趙郡王元景等表請壬辰詔從十五年三月庚辰肅州言所部川原遍生芝草先是百僚及雍州父老詣朝堂表請四月辛卯朔詔以來嵗二月有事于泰山詔太常卿韋挺為檢校封禪大使禮部侍郎令狐徳棻副焉秘書少監顔師古奏臣撰禮書在十一年春詔公卿定可否多從師古之禮六月己酉有星孛太微宫辛亥起居郎褚遂良進曰行至洛陽彗星輒見或有未允合者丙辰停封泰山顯慶四年六月詔許敬宗議封禪儀敬宗請以高祖太宗俱配昊天上帝太穆文徳二后並配地祇從之通鑑麟徳元年七月丁未詔以三年正月有事于泰山唐書高宗本紀麟徳元年七月丁未朔詔宜以三年正月式遵故實有事于岱宗所司詳求茂典以從折衷其諸州都督刺史以二年十二月便集岳下諸王十月集東都緣邊州府襟要之處不在集限天下諸州明揚才彦或銷聲幽數或藏器下僚並隨岳牧舉選九月乙丑詔曰來年行幸岱宗州縣不得浪有煩擾其水淺可涉不可繕造橋梁所行之處亦勿開道路諸州及寺觀并百姓不得輒獻食冊府元龜麟徳二年二月壬午如東都十月丁卯如泰山唐書高宗本紀麟徳二年春正月壬午幸東都丁酉幸合璧宫甲子以發向泰山停選五月以司空英國公李勣少師高陽郡公許敬宗右相嘉興縣子陸敦信左相鉅鹿男竇徳𤣥為檢校封禪使冬十月戊午皇后請封禪司禮太常伯劉祥道上疏請封禪丁卯將封泰山發自東都十一月丙子次于原武以少牢祭漢將紀信墓贈驃騎大將軍十二月丙午御齊州大㕔乙卯命有司祭泰山丙辰發靈巖頓舊唐書高宗本紀麟徳二年十月丁卯帝發東都赴東岳從駕文武兵士及儀仗法物相繼數百里列營置幕彌亘郊原突厥于闐波斯天竺國罽賓烏萇崑崙倭國及新羅百濟高麗等諸蕃部長各率其屬扈從穹廬氊帳及牛羊駝馬填候道路是時頻歲豐稔斗米至五錢豆麥不列於市議者以為古來帝王封禪未有若斯之盛者也十二月丙午至齊州停十日丙辰發靈巖頓至于泰岳之下庚申帝御行宫牙帳以朝羣臣冊府元龜乾封元年正月戊辰封于泰山庚午禪于首社以皇后為亞獻壬申大赦改元唐書髙宗本紀乾封元年封泰山為圜壇山南四里如圜丘三壝壇上飾以青四方如其色號封祀壇玉策三以玉為簡長一尺二寸廣一寸二分厚三分刻以金文玉匱一長一尺三寸以藏上帝之冊金匱二以藏配帝之冊纒以金繩五周金泥玉璽璽方一寸二分文如受命璽石䃭以方石再累皆方五尺厚一尺刻方其中以容玉匱䃭旁施檢刻深三寸三分濶一尺當繩刻深三分濶一寸五分石檢十枚以檢石䃭皆長三尺濶一尺厚七分印齒三道皆深四寸當璽方五寸當繩濶一寸五分檢立於䃭旁南方北方皆三東方西方皆二去䃭隅皆一尺䃭纒以金繩五周封以石泥距石十二分距䃭隅皆再累皆濶二尺長一丈斜刻其首令與䃭隅相應又為壇于山上廣五丈高九尺四出陛一壝號登封壇玉檢玉牒石䃭石距玉匱石檢皆如之為降禪壇于社首山上八隅一成八陛加方丘三壝上飾以黄四方如其色其餘皆如登封其議畧定而天子詔曰古今之制文質不同今封禪以玉牒金繩而瓦尊匏爵秸席宜改從文於是昊天上帝褥以蒼地祇褥以黄配褥皆以紫而尊爵亦更焉是嵗正月天子祀昊天上帝於山下之封祀壇以高祖太宗配如圜丘之禮親封玉冊置石䃭聚五色土封之徑一丈二尺高九尺已事升山明日又封玉冊于登封壇又明日祀皇地祇於社首山之降禪壇如方丘之禮以太穆皇后文徳皇后配而以皇后武氏為亞獻越國太妃燕氏為終獻率六宫以登其帷帟皆錦繡羣臣瞻望多竊笑之又明日御朝覲壇以朝羣臣如元日之禮乃詔立登封壇曰萬嵗臺降禪壇曰景雲臺以紀瑞焉其後將封嵩岳以吐蕃突厥冦邊而止禮樂志高宗即位公卿數請封禪則天既立為皇后又密贊之麟徳二年二月車駕發京東巡狩詔禮官博士撰定封禪儀注有司於乾封元年正月戊辰朔先是有司齋戒於前祀七日平旦太尉誓百官於行從中臺云來月一日封祀二日登封泰山三日禪社首各揚其職不供其事國有常刑上齋於行宫四日致齋三日近侍之官應從升者及從事羣官諸方客使各本司公館清齋一宿前祀一日諸衛令其屬未後一刻設黄麾半仗於外壝之外與樂工人俱清齋一宿至其年十二月車駕至山下及有司進奏儀注封祀壇以高祖太宗同配禪社首以太穆皇后文徳皇后同配皆以公卿充亞獻終獻之禮於是皇后抗表曰伏尋登封之禮逺邁古先而降禪之儀竊為未允其祭地祇之日以太后昭配至於行事皆以公卿以妾愚誠恐未周備何者乾坤定位剛柔之義既殊經義載陳中外之儀斯别瑤壇作配既合於方祇玉豆薦芳實歸於内職况推尊先后親饗瓊筵豈有外命宰臣内參禋祭詳於至理有紊徽章但禮節之源雖興於昔典而升降之制尚缺於遙圖且往代封岳雖云顯號或因時省俗意在尋仙或以情覬名事深為己豈如化被乎四表推美於神宗道冠乎二儀歸功於先徳寧可仍遵舊軌靡創彝章妾謬處椒闈叨居蘭掖但以職惟中饋道屬於烝嘗義切奉先理光於蘋藻罔極之思感結於因心祗肅之懷實深於明祀但妾早乖定省已闕侍於晨昏今屬崇禋豈敢安於帷帟是故馳情夕寢睠嬴里而翹魂叠慮宵興仰梁郊而聳念伏望展禮之日總率六宫内外命婦以親奉奠冀申如在之敬式展䖍拜之儀積此微誠已淹氣序既屬鑾輿將警奠璧非賒輒効丹心庶裨大禮冀聖朝垂則永播於芳規螢燭末光増輝於日月於是祭地祇梁甫皆以皇后為亞獻諸王太妃為終獻丙辰前羅舍府果毅李敬貞論封禪須明水實樽淮南子云方諸見月則津而為水高誘注云方諸隂燧大蛤也熟摩拭令熱以向月則水生以銅盤受之下數石王充論衡云陽燧取火於日方諸取水於月相去甚逺而火至水來者氣感之騐也漢書儀云八月飲酎車駕夕牲以鑑諸取水於月以陽燧取火於日周禮考工記云金有六齊金錫半謂之鑑燧之齊鄭𤣥注云鑑燧取水火於日月之器凖鄭此注則水火之器皆以金錫為之今司宰有陽燧形如圓鏡以取明火隂鑑形如方鏡以取明水但比年祀祭皆用陽燧取火應時得以隂鑑取水未有得者嘗用井水替明水之處奉勅令禮司研究敬貞因說先儒是非言及明水乃云周禮金錫相半自是造之法鄭𤣥錯解以為隂鑑之制依古取明水法合用方諸引淮南子等書用大蛤也又稱敬貞曽八九月中取蛤一尺二寸者依法試之自人定至夜半得水四五斗者敬貞所陳檢有故實又稱先經試驗確執望請差敬貞自取蚌蛤便赴泰山與所司對試是日制曰古今典制文質不同至於制度隨世代沿革惟祀天地獨不改張斯乃自處於厚奉天以薄又今封禪即用玉牒金繩器物之間復有瓦罇秸席一時行禮文質頓乖駁而不倫深為未愜其封祀降禪祈穀上帝后土位先設藳秸瓦甒瓢杯等物並宜改用裀褥罍爵每事從文其諸郊祀亦宜准此於是昊天上帝之座褥以蒼皇地祇褥以黄配帝及后褥以紫五方上帝及大明夜明席皆以五色内官以下席皆以莞舊唐書禮儀志乾封元年正月戊辰朔有事于泰山親祀昊天上帝於封祀之壇己巳帝登于泰山封玉牒於介丘庚午降禪於社首山皇后為亞獻越國太妃燕氏為終獻先是李勣許敬宗等議封禪儀注請以高祖太宗二座俱配昊天上帝詔從之壬申帝御朝覲壇受朝賀大赦天下癸酉帝謂羣官曰升中大禮不行來數千載近代帝王雖稱封禪其間事有不同或謂求仙克禋或以逡巡望拜皆非尊崇祖業近在隋朝喪亂最甚老者填溝壑少壯染兵鋒高祖發自晉陽撥亂反正先朝躬擐甲胄纉成大業掃除氛祲廓清區宇遂得四海宅心萬方仰徳朕丕承寳厯十有七年終日孜孜夙夜無怠屬國家無事天下太平華夷乂安逺近輯睦所以躬親展禮褒賛先勲情在歸功固非為已遂得上應天心下允人望今大禮既畢深以為慰公等休戚是同故應共有此慶欲與公等飲宴盡歡各宜在外更衣即求相見仍勅所司撤幄帳施玉牀三品以上升壇四品以下縱列坐壇下從酒設樂羣臣及諸岳牧競來上壽起舞日晏方止戊寅詔兖州置寺觀各三所觀以紫雲仙鶴萬嵗為稱寺以封巒非煙重輪為名丙戌發自泰山改號封祀壇為舞鶴臺介丘壇為萬嵗臺降禪壇為景雲臺以祀日各有雲鶴及山呼萬嵗之瑞故也冊府元龜乾封三年正月帝親享昊天上帝於山下封祀之壇如圜丘之儀祭訖親封玉策置石䃭聚五色土封之圜徑一丈二尺高九尺其日帝率侍臣以下升泰山翌日就山上登封之壇封玉策訖復還山下之齋宫其明日親祀皇地祇於社首山上降禪之壇如方丘之儀皇后為亞獻越國太妃燕氏為終獻翌日上御朝覲壇以朝羣臣如元日之儀禮畢讌文武百寮大赦改元案本紀是年三月改元總章舊唐書禮儀志案大唐新語高宗乾封初封禪岱宗行初獻之禮畢執事者趨下而宫官執帷天后率六宫升壇行禮帷席皆以錦繡為之識者咸非焉上元三年二月詔今冬有事于嵩岳閏三月以吐蕃犯塞停之案本紀是年十一月改元儀鳳上元三年二月詔以今冬有事于嵩岳命有司修撰儀注務從典故閏三月詔以吐蕃犯塞停嵩岳封禪之禮冊府元龜調露元年秋七月己卯詔以今年冬至有事嵩岳禮官學士詳定儀注冬十月單于大都䕶府突厥阿史徳温𫝊及奉職二部相率反叛庚申詔封嵩山宜停舊唐書高宗本紀永淳二年春正月甲午朔幸奉天宫遣使祭嵩岳少室箕山具茨等山西王母啟母巢父許由等祠十一月癸亥幸奉天宫時天后自封岱之後勸上封中岳每下詔草儀注即嵗饑邊事警急而止至是復行封中岳禮上疾而止舊唐書髙宗本紀高宗既封泰山之後又欲徧封五岳至永淳元年於洛州嵩山之南置崇陽縣其年七月勅其所造奉天宫二年正月駕幸奉天宫至七月下詔將以其年十一月封禪于嵩岳詔國子司業李行偉考功員外郎賈大隠太常博士韋叔夏裴守貞輔抱素等詳定儀注於是議立封祀壇如圜丘之制上飾以𤣥四面依方色為圓壇三成高二丈四尺每等高六尺壇上徑一十六步三等各闊四步設十二陛陛皆上闊八尺下闊一丈四尺為三重壝距外壝三十步内壝距五十步燎壇在壇東南外壝之内高三尺方一丈五尺南出陛登封壇圓徑五丈高九尺四出陛為一壝飾以五色凖封祀壝禪祭上飾以金四面依方色為八角方壇再成高一丈二尺每等高四尺壇上方十步每等廣四步設八陛其上壇陛皆廣八尺中等陛皆廣一丈下等陛皆廣一丈二尺為三重壝之大小凖封祀為埋埳在壇之末地外壝之内方深取足容物南出陛朝覲壇於行宫之前為壇宫方三分壝二在南壇方二十四丈高九尺南面兩陛餘三面各一陛封祀登封五色土封石䃭為圜封上徑一丈二尺下徑三丈高九尺禪祭五色土封為八角方封大小凖封祀制度所用尺寸凖厯東封並用古尺諸壇並築土為之禮無用石之文並度影以定方位登封降禪四出陛各當四方之中陛各上廣七尺下廣一丈二尺封祀玉帛料有蒼璧四圭有邸圭璧禪祭有黄琮兩圭有邸無璧又定登封降禪朝覲等日凖禮冬至祭天于圜丘其封祀請用十二日凖東封祀故事十二日登封十三日禪祭十四日朝覲若有故須改登封已下期日在禮無妨又輦輿料云封祀登封皇帝出乘玉輅還乘金輅皇太子往還金輅禪祭皇太子加封祀又衣服料云東封祠祭日天皇服衮冕近奉制依貞觀禮服大裘又云衮冕服一具齋服之通天冠服一具迴服之翼善冠服一具馬上服之皇太子衮冕服又齋則服逺遊冠受朝則公服逺遊冠服馬上則進徳冠服禮儀志永淳二年七月庚申詔以今年十月有事于嵩岳宜令禮官學士等審定儀注務展誠敬仍令天下岳牧及京官五品以上各舉所知有孝行儒學文武之士於是詔禮官議射牛之事太常博士裴守真真通典作貞英華亦作真作永淳元年奏議曰據周禮及國語郊祀天地天子自射其牲漢武惟封泰山令侍中儒者射牛行事至於餘祀亦無射牲之文但親舂射牲雖是古禮久從廢省不可英華作難以復行據封禪祀禮英華作禮祀日未明十五刻宰人以鸞刀割牲質明而行事比鑾駕至祠所祠所英華作時牢牲總畢天皇通典作陛下惟奠玉酌獻英華作獻酌而已今若祀前一日射牲事即傷早祀日方始射牲事又傷晚若依漢武故事即非親射之儀事貴隨時不可行英華作事不可行請從減罷謹議用神功破陣樂及功臣慶善樂二舞每奏上皆立對守真又議曰竊惟二舞肇興謳吟攸屬贊九功之茂烈叶萬國之歡心義均韶夏用兼賓祭皆祖宗聖徳而子孫享之詳覽傳記未有皇王立觀之禮况升中大事華夷畢集九服仰垂拱之安百蠻懷率舞之慶陶甄化育莫匪神功豈於樂舞别申嚴禁臣等詳擬奏二舞時天皇不合起立詔並從之尋以帝不豫改用來年正月行封禪之禮十月癸亥車駕幸奉天宫十一月丙戌詔曰朕聞仁者徳之本叶亭育之至途禮者道之末乃帝王之餘事歴選往初詳觀曩躅惻隠以孚其化變通以㑹其神朕以虚薄祗膺寳位旰食宵衣懼忝於宗社如傷若厲佇濟於黎元每以皇基肇闢範圍覆載遺惠所覃照格區宇䖍荷靈命嘗慮下虧鴻業遍刊羣岳不足上報𤣥功已升聞於日觀思欵謁於天臺志在告成諒非為已屬今兹豐稔方有事于嵩丘崇累聖之丕績祈兆人之嘉祜頃者分使出巡存問風俗河南河北尚有十餘州旱澇加以朔方冦盜時或侵邊闗内流離未能復業一物失所獨甚納隍數郡不寧豈宜備禮前欲以來年正月封禪中岳者宜停冊府元龜嗣聖十三年即武后萬通天元年嵗臘月甲戌如神岳甲申封于神岳丁亥禪于少室山冊府元龜案王元感傳天授中元感直𢎞文館武后時已郊遂享明堂封嵩山紹興韋叔夏等草儀具衆推練洽唐會要卷七
