body:
  text: 唐㑹要卷三十六宋王溥撰修撰武徳七年九月十七日給事中歐陽詢奉勅撰藝文類聚成上之貞觀五年九月二十七日祕書監魏徴撰羣書理要上之太宗欲覽前王得失爰自六經訖于諸子上始五帝下盡晉年徵與虞世南禇亮蕭徳言等始成為五十卷上之諸王各賜一本十三年十一月三日揚州長史李襲譽撰忠孝圖二十卷奏之十四年五月二十一日詔以特進魏徴所撰類禮賜皇太子及諸王并藏本於祕府初徴以禮經遭秦滅學戴聖編之條流不次乃刪其所説以類相從為五十篇合二十卷上善之賜物一千段十五年正月三日魏王泰上括地志百五十卷上嘉之賜物一萬段其書宣付祕閣初泰好學愛文章司馬蘇朂勸奉表請修撰詔許之於是大開館宇廣召時俊遂奏引著作郎蕭徳言祕書郎顧𦙍記室參軍蔣亞卿功曹參軍謝偃等人物輻輳門庭若市泰稍怙過盛欲其􅄩成於是分道計州披檢䟽録凡四年而成其年四月十六日太常博士吕才及諸陰陽學者十餘人撰陰陽書凡五十三卷并舊書行者四十七卷詔頒下之太宗以陰陽書行之日久近代以來漸至訛偽穿鑿既甚拘忌亦多遂令有司重加修撰其妄穿作拘忌者才駁之曰易曰上古穴居而野處後世聖人易之以宫室蓋取諸大壯逮於殷周之際乃有卜宅之文故詩稱相其陰陽書云卜惟洛食此則卜宅吉凶其來尚矣至於近代師巫更加五姓之説言五姓者謂宫商角徴羽等天下萬物悉配屬之行事吉凶依此為法至於張王等為商武庾等為羽欲以同韻相求及其以栁為宫以趙為角又非四聲相管其間亦有同是一姓分屬宫商復有複姓數字徴羽不别騐於經典本無斯説即陰陽書亦無此語直是野俗口傳竟無所出之處惟按堪輿經云黄帝對於天老乃有五姓之言且黄帝之時不過姬姜數姓暨於後代賜族者多至如管蔡郕霍魯衛毛􅆅郜雍曹滕畢原酆郇並是姬姓子孫孔殷宋華向蕭亳皇甫並是子姓苗裔自餘諸國凖例皆然因邑因官分枝分葉未知此等諸姓是誰配屬又檢春秋以陳衛及秦並同水姓齊鄭及宋皆為火姓或承所出之祖或繫所屬之星或取所居之地亦非宫商角徴共相管攝此則事不稽古義理乖僻者也叙禄命曰謹按史記宋忠賈誼譏司馬季主云夫卜筮者髙人禄命以悦人心矯言禍福以盡人財又按王充論衡云見骨體而知命禄見禄命而知骨體此則禄命之書行之久矣言多或中人乃信之今更研尋本非實録但以積善餘慶不假建禄之吉積惡餘殃豈由刼殺之災皇天無親常與善人禍福之應其猶影響故有夏多罪天命勦絶宋景修徳妖孛夜移學也禄在豈待生當建王憂勤損夀不聞月值空亡長平坑卒未聞共犯三刑南陽貴士何必俱當六合厯陽成湖非獨河魁之上蜀郡炎燎豈由災厄之下今時有同建禄而貴賤懸殊共命胎而夭夀更異按春秋魯桓公六年九月魯莊公生今檢長厯莊公生當乙亥之嵗建申之月以此推之莊公乃當禄之空亡依禄命書法合貧賤又犯勾絞六害背驛馬生身刻驛馬三刑當此生者並無官爵火命七月生當病鄉為人尫弱身合矬陋今按齊詩譏莊公倚嗟昌兮頎若長兮美目揚兮巧趨蹌兮惟有向命一條法當長夀依撿春秋莊公薨時計年四十五矣此則禄命不騐一也又按史記秦莊襄王四十八年始皇帝生宋忠注云因正月生為此名政檢襄王四十八年嵗在壬寅此年正月生者命當背禄法無官爵假得禄合奴婢寡少始皇又當破驛馬生驛馬三刑身尅驛馬法當望官不到金命正月生當絶下為人無始有終老而彌吉今檢史記始皇乃是有始無終老更彌凶唯建命生法合長夀計其崩時不過五十禄命不騐二也檢漢武故事武帝以乙酉嵗七月七日平旦時亦當禄空亡下法無官爵雖向驛馬尚隔四辰依祿命法少無官榮老而方盛今騐漢書武帝即位年始十六末年以後户口減半禄命不騐三也又檢後魏書云髙祖孝文皇帝興元元年八月生今按長厯其年嵗在丁未以此推之孝文皇帝背禄并驛馬三刑身尅驛馬依禄命書法無官爵當父死中生法當生不見父今檢魏書孝文皇帝身受其父之禪禮云嗣主位定於初喪踰年之後方始正號是以天子無父事三老也獨孝文受禪異於常禮躬為天子以事其親而禄命倒云不合識父禄命不騐四也又按沈約宋書云宋髙祖癸亥三月生依此推禄與命並當空亡依禄命書法無官爵又當子墓中生惟宜嫡子假有次子法當早卒今據宋書髙祖長子先被簒弑次子義隆享國多年髙祖又當禄祖下生法得嫡孫財禄今檢宋書其孫劉邵劉濬並為簒逆幾失宗祧禄命不騐五也叙葬書曰易曰古之葬者厚衣以薪不封不樹喪期無數後世聖人易之以棺槨葢取諸大過禮云葬者藏也欲人之不見也然孝經云卜其宅兆而安厝之以其復土事畢長為感慕之所窀穸禮終永作魂神之宅朝市遷變豈得先測於將來泉石交侵不可先知於地下是以謀及龜筮庶無後艱斯乃備於慎終之禮曽無吉凶之義暨於近世已來加之陰陽葬法或選年月便利或量墓田逺近一事失所禍及死生巫者利其貨賄莫不擅加妨害遂令葬書一術乃有百二十家各説吉凶拘而多忌且天覆地載乾坤之理備焉一剛一柔消息之義詳矣或成晝夜之道感於男女之化三光運於上四氣通於下斯乃陰陽之大經不可失於斯須也至於喪葬之吉凶乃附此為妖妄傳云王者七日而殯七月而葬諸侯五日而殯五月而葬大夫經時而葬士逾月而葬此貴賤不同禮亦異數欲使同盟助弔有期量事制宜遂為常式法既一定不得違之也故先期而葬謂之不懷後期而不葬譏之非禮此則葬有定期不擇年月一也春秋又云丁巳葬定公雨不克葬至戊午襄事禮經善之禮記云卜葬先逺日葢選月終之日所以避不懷也今檢葬書以己亥之日用葬最凶謹按春秋之際此日葬者凡有二十餘件此則葬日不擇日二也禮記云周尚赤大事用平旦殷尚白大事用日中夏尚黒大事用昏時鄭𤣥注云大事者何謂喪葬也此則直取當代所尚不擇時之早晚春秋又云鄭卿子産子太叔葬鄭簡公於時司墓大夫室當葬路若壞其室即平旦而葬不壞其室即日中而葬子産不欲壞室而待日中子太叔云若至日中而葬恐久勞諸侯大夫來㑹葬者然子産既云博物君子太叔乃為諸侯之選國之大事無過喪葬必是義有吉凶斯等豈得不用今乃不問時之得失惟論人事可否曾子問云葬逄日蝕捨其路左待明而行所以備非常也若依葬書多用乾艮二時並在半夜此即文與禮違今檢禮傳葬不擇時三也葬書云富貴官品皆由安葬所致年命延促亦由墳壠所招今按孝經云立身行道揚名於後世以顯父母易曰聖人之大寳曰位何以守位曰仁是以日慎一日則澤及於無疆茍徳不建則人無後此則非由安葬吉凶而論福祚延促臧孫有後於魯不闗葬得吉日若敖絶祀於荆不由遷厝失所此則安葬吉凶不可信用其義四也今之喪葬吉凶皆依五姓便利古之葬者並在國都之北兆域既有常所何取姓墓之義趙氏之葬並在九原漢之山陵散在諸處上利下利蔑爾不論大墓小墓其義安在及其子孫富貴不絶或與三代同風或分六國而王此則五姓之義大無稽考吉凶之理何從而生其義五也且人生名位進退何常亦有初賤而後貴亦有始泰而終否是以子文三巳令尹展禽三黜士師葬期一定更不迴改冡墓既成曾不革易何因名位無時暫安故知官爵𢎞之在人不由安葬所致其義六也野俗無識皆信葬書巫者誑其吉凶愚人因此僥倖遂使擗踊之際擇葬地而希官品荼毒之秋選葬時以覬財禄或云辰日不宜哭泣遂睆爾而受弔問或云同屬忌於臨壙乃吉服而不送其親聖人設教豈其然也葬書敗俗一至於斯其義七也蘇氏曰今世之人正惑於此故載吕才駁議用矯正之庶乎惑者少悟也貞觀十五年十月二十五日尚書左僕射申國公髙士廉撰文思博要成凡一千二百卷詔藏之祕府同撰人特進魏徴中書令楊師道中書侍郎岑文本禮部侍郎顔相時國子司業朱子奢給事中許敬宗國子博士劉伯莊太常博士吕才祕書監房𤣥齡太學博士馬嘉運起居舍人禇遂良晉王友姚思㢘太子舍人司馬宅相祕書丞李淳風二十三年正月二十日太宗撰帝範十三篇賜皇太子顧謂王公曰禔躬闡政之道備在其中矣永徽三年三月三日符璽郎顔揚庭上其父師古所撰匡謬正俗八卷令付祕閣顯慶元年十月詔禮部尚書𢎞文館學士許敬宗等修東殿新書上曰畧㸔數卷全不如抄撮文書又日月復淺豈不是卿等用意至此因親製序四百八十字二年六月上製元首前星維城股肱論令敬宗等注釋名曰天訓至三年正月五日修新禮成一百三十卷頒於天下其年五月九日以西域平遣使分往康國及吐火羅等國訪其風俗物産及古今廢置畫圖以進令史官撰西域圖志六十卷許敬宗監領之書成學者稱其博焉十月二日許敬宗修文館詞林一十卷上之六年正月二十七日右内率府錄士參軍崇賢馬真學士李善上注文選六十卷藏於祕府龍朔元年六月二十六日許敬宗等撰累璧六百三十卷上之三年十月二日皇太子𢎞遣司元太常伯竇徳𤣥進所撰瑶山玉彩五百卷上之詔藏書府儀鳳元年十二月二日皇太子賢上所注後漢書初太子右庶子張太安洗馬劉訥言洛州司户參軍格希𤣥學士許叔牙成𤣥一史藏諸周寳寧等同注范曄後漢書詔付祕書省調露二年二月一日詔故符璽郎李延夀撰政典一部冩兩本一本付祕書省一本賜皇太子永隆元年十二月太史李淳風進注釋五曹孫子等十部等經分為二十卷垂拱二年四月七日太后譔百寮新誡及兆人本業記頒朝集使大足元年十一月十一日麟臺監張昌宗撰三教珠英一千三百卷成上之初聖厯中以上御覽及文思博要等書聚事多未周備遂令張昌宗召李嶠閻朝隠徐彦伯薛曜李尚隱魏知古于季子王無競沈佺期王適徐堅尹元凱張説馬吉甫元希聲李處正高備劉知幾房元陽宋之問崔湜常元旦楊齊哲富嘉謩蔣鳳等二十六人同撰於舊書外更加佛道二教及親屬姓名方域等部開元七年五月左庶子劉子𤣥上議今之所注老子是河上公注其序云河上公者是漢文帝時人結草菴於河曲因以為號以所注老子授文帝因冲空上天不經之鄙言流俗之虚語漢書藝文志注老子者有三家河上所釋後無聞焉王弼詣㫖為優請黜河上公升輔嗣所注司馬徽亦注云漢史實無其人然所注以養神為宗以無為為體請河王注令學者俱行從之九年十一月十三日左散騎常侍元行冲上羣書四部錄二百卷藏之内府凡二千六百五十五部四萬八千一百六十九卷分為經史子集四部經庫是殷踐猷王恢編史庫韋述余欽子庫毋照劉彦直集庫王灣劉伸其序例韋述撰其後母照又畧為四十卷為古今書錄十年六月二日上注孝經頒於天下及國子學至天寳二年五月二十二日上重注亦頒於天下十三年詔康子元等注解東封儀注以進十五年五月一日集賢學士徐堅等纂經史文章之要以類相從上制名曰初學記至是上之欲令皇太子及諸王檢事綴文十七年九月十一日上令左丞相張説修八陣圖十卷及經二卷成十九年二月禮部員外郎徐安正等撰文府二十卷上之其年十二月十一日侍中裴光庭上瑶山往則維城前軌各一卷上以賜皇太子及慶王二十三年正月勅中書令張九齡光禄卿韋縚與禮官就集賢院撰籍田儀注其年三月二十七日上注老子并修䟽義八卷并製開元文字音義三十卷頒示公卿二十七年二月中書令張九齡等撰六典三十卷成上之百官稱賀天寳十四年四月内出御撰韻英五卷付集賢院行用其年十月八日頒御注道徳經并䟽義分示十道各令巡内傳冩以付宫觀乾元二年十一月四明山人沈若進廣孝經十卷制授祕書郎集賢院待詔大厯十二年十一月二十五日刑部尚書顔真卿授撰韻海鏡原三百六十卷表獻之詔付集賢院建中元年十月濠州刺史張鑑撰五經㣲㫖十四卷孟子音義三卷上之貞元十一年八月國子司業裴澄撰乗輿月令十二卷上之十二年二月夏州節度使韓澤進統載四十卷其年十月昭義節度判官賀蘭正九進用人權衡輔佐記各十卷舉選衡鏡三卷十四年十月左僕射平章事賈耽撰郡國别錄六卷通錄四卷上之十一月西川節度使韋臯進開復西南夷事狀十卷十七年七月太常寺進大唐貞元新集開元復禮二十卷其年十月宰臣賈耽撰海内華夷圖一軸并序古今郡國縣道四夷述四十卷上之耽好地理學四方之使自蕃方來者必問其土地山川之所終始凡三十年問既備因撰海内華夷圖廣三丈縱三丈二尺率以一寸圻一百里人有披圖以問其郡人者皆得其實無虚詞焉十九年二月淮南節度使杜佑撰通典二百卷上之其書凡九門食貨十二篇選舉六篇職官二十二篇禮一百篇樂七篇兵十五篇刑八篇州郡十四篇邊防十六篇佑精厯代之要修通典識者知其必登公卿之位書既出遂行於時其後杭州刺史蘇弁撰㑹要四十卷弁與兄冕纘國朝故事為是書弁先聚書至二萬卷皆手自刋正今言蘇氏書次於集賢芸閣焉給事中陸䞇著集注春秋二十卷君臣圖翼三十五卷上之元和二年十二月李吉甫等撰元和年國計簿十卷上之總計天下方鎮凡四十八道管州府二百九十五鎮縣一千四百五十三見定户二百四十四萬二百五十四其鳳翔鄜坊邠寧振武涇原寧夏靈鹽河東易定魏鎮冀范陽滄州淮西淄青等一十五道合七十一州並不中户口數目四年四月給事中馮伉著三傳異同三卷其年七月製君臣事跡十四篇上以天下無事留意典文毎覽前代興亡得失之事皆三復其言又讀貞觀開元實錄見太宗撰金鏡書及帝範上下篇𤣥宗撰開元訓誡思維前躅遂採尚書春秋後傳史記范班漢書三國志晏子春秋吳越春秋新序説苑等書君臣行事可為龜鑑者集成十四篇一曰君臣道二曰辨邪正三曰誡權諍四曰戒㣲行五曰任賢臣六曰納忠諫七曰慎征伐八曰慎刑法九曰去奢泰十曰崇節儉十一曰奬忠直十二曰修政教十三曰諫田獵十四曰錄勲賢分為上下卷上御製其序曰前代君臣事跡至是以其書冩於屏風列之御座之右書屏風六扇於中宣示宰臣李藩裴洎曰朕近撰此屏風親所觀覽故令示卿藩等進表稱賀八年二月宰臣李吉甫撰元和州縣郡國圖三十卷百司舉要一卷成上之吉甫又常綴錄東漢魏晉元魏周隋故事記其成敗損益因為六代畧凡三十卷分天下諸鎮絶域山川險易故事各冩其圖於篇首為五十四卷號為元和郡國圖九年四月檢校左拾遺李渤撰御戎新錄二十卷上之十二年十二月翰林學士沈傳師等奏元和辨謗略兩部各十卷一部進上一部請付史館從之其年處州刺史馬總進武徳至貞元年奏議二十卷十三年六月宰臣袁滋撰雲南紀五卷上之其年八月洛陽尉禮院檢討官王彦威撰元和曲臺新禮三十卷上之自開元二十一年至元和十三年正月已前新撰定禮與舊儀不同者謹備集録并禮勒成三十卷其年十二月祕書少監史館修撰馬宇撰鳳池録五十卷成上之長慶元年十一月商州刺史王公亮進新撰兵書一十八卷上之二年四月翰林侍講學士韋處厚路隨撰六經法言三十卷成上之寳厯元年三月翰林侍講學士髙重崔郾進纂要十卷二年五月祕書省著侍郎韋公肅注太宗文皇帝帝範一十二篇上之太和元年六月國子直講徐郿上周易新義三卷八年四月集賢學士裴潾撰通撰三十卷其年九月宰相李徳裕進御臣要畧次栁氏舊史九年五月御集春秋左氏列國經傳三十卷其年宰臣兼集賢大學士李宗閔准宣與校理修撰等撰五常傳二十卷并目録一卷進上二年二月户部侍郎王彦威以所撰唐典七十卷上之起武徳年終永貞其年十月勅改天后朝所撰三教珠英為海内珠英開成三年八月右拾遺韋籌上唐書唐史解表共五通㑹昌二年七月宰臣徳裕進異域歸忠傳兩卷大中五年十一月太子詹事姚思廉撰通史三百卷上之統史自開闢至隋末編年纂帝王美政善事詔令可别於時者必載於時政監秩茶鹽和糴賑貨錢陌兵數虚實貯粮用兵利害邊事戎狄無不備載下至釋道燒煉妄求無騐皆叙之矣其年十二月太子詹事姚思㢘又撰帝王政統十卷上之七年十月尚書左僕射門下侍郎平章事崔𤣥上續㑹要四十卷修撰官楊綴復崔瑑薛逢鄭言等賜物有差氏族氏族者古史官所記故官有世胄譜有世官過江則有僑姓王謝袁蕭為大東南則有吳姓朱張顧陸為大山東則有郡姓王崔盧鄭為大闗中亦有郡姓韋裴桞薛楊杜為大代北則有蕃姓元長孫宇文陸源竇為大各於其地自尚其姓為四姓今流俗相傳獨以崔盧李鄭為四姓加太原王為五姓不經之甚也武徳元年髙祖嘗謂内史令竇威曰昔周朝有八柱國之貴吾與公家咸登此職今我已為天子公為内史令本同末異無乃不可乎威曰臣家昔在漢朝再為外戚至於後魏三處外家今陛下龍興復出皇后臣又階縁皇戚位忝鳳池自惟叨濫曉夕兢懼髙祖笑曰比見關東人與崔盧為婚猶自矜伐公世為帝戚不亦貴乎三年髙祖嘗從容謂尚書右僕射裴寂曰我李氏昔在隴西富有龜玉降及祖彌姻婭帝王及舉義兵四海雲集纔涉數月升為天子至如前代皇王多起㣲賤劬勞行陣下不聊生公復世胄名家厝職清要豈若蕭何曹參起自刀筆吏也惟我與公千載之後無愧前修矣蘇氏議曰創業君臣俱是貴族三代以後無如我唐髙祖八柱國唐公之孫周明懿隋元貞二皇后皆外娶周太師竇毅女毅則周太祖之壻也宰相蕭瑀陳叔達梁陳帝王之子裴矩宇文士及齊隋駙馬都尉竇威楊恭仁封徳彛竇抗並前朝師保之𦙍其將相裴寂唐儉長孫順徳屈突通劉政㑹竇軌竇琮柴紹殷開山李靖等並是貴胄子弟比夫漢祖蕭曹韓彭門第豈有等級以計言乎武徳中李守素與虞世南論及氏族初言江左世南獨相酧對及言北地諸姓次第如流陳其事業皆有援証世南但撫手而已不復能答歎曰肉譜實可畏許敬宗曰肉譜非雅名也世南曰昔任彦升善談經籍梁代稱為五經笥今日號倉曹為人物笥矣守素以請時氏族時人謂之肉譜貞觀十二年正月十五日修氏族志一百卷成上之先是山東士人好自誇矜以婚姻相尚太宗惡之以為甚傷教義乃詔吏部尚書高士㢘御史大夫韋挺中書侍郎岑文本禮部侍郎令狐徳棻及四方士大夫諳練族姓者普收天下譜約諸史傳考其真偽以為氏族志以崔幹為第一等書成太宗謂曰我與山東崔盧家豈有舊嫌也為其世代衰㣲全無官宦人物販鬻婚姻是無禮也依托富貴是無恥也我不解人間何為重之我今定氏族者欲崇我唐朝人物冠冕垂之不朽何因崔幹為一等合二百九十三姓千六百五十一家分為二等頒於天下顯慶四年九月五日詔改氏族志為姓録上親製序仍自裁其類例凡二百四十五姓二百八十七家以皇后四家酅公介公贈台司太子三師開府儀同三司僕射為第一等文武二品及知政事者三品為第二等各以品位為等第凡為九等並取其身及後𦙍若親兄弟量計相從自餘枝屬一不得同譜初貞觀氏族志稱為詳練至是許敬宗以其書中不取皇后武氏本望李義府又恥其家無名乃奏改之於是委禮部侍郎孔志約著作郎楊仁卿太子洗馬史𤣥道太常丞吕才等十二人商量編錄遂立格以皇親得五品者盡入譜不入譜者縉紳士大夫咸以為恥議者號其書為勲格李義府又奏收貞觀氏族志焚之長安四年鳳閣舍人劉知幾撰劉氏家史十五卷譜考三卷推漢氏為陸終苖裔非堯之後彭城叢亭里諸劉出自宣帝子楚孝王囂曾孫司徒居巢侯劉愷之後不承楚元王交皆按據明白正前人所誤雖為流俗所譏學者服其該博神龍元年五月十八日左散騎常侍栁冲上表曰臣聞姓氏之初世本著其義昭穆之序周譜列其風漢晉之年應摰明宗系之説齊梁之際王賈述衣冠之源使夫士俗區分懲勸攸寄昭之後世實為盛典臣今願叙唐朝之崇修氏族之譜使九圍仰止百代承風豈不大哉上從之遂令尚書左僕射魏元忠工部尚書張錫吏部侍郎蕭至忠岑義兵部侍郎崔湜刑部侍郎徐堅工部侍郎劉洎左補闕吳兢等重修至先天二年三月栁冲奏所備姓族録成上之凡二百卷又於今判定至開元二年七月二十一日畢上之上元二年九月二十一日敕文其氏族並得之乆逺有餘俗諱及僻疾同聲者宜改與本族望所出大姓任自遂便穏其時桓彦範孫改姓姜氏乾元元年著作郎賈至撰百家類例十卷其序㫖曰以其婚姻承家冠冕備盡則存譜大譜所紀者惟尊官清職傳記本元分為十卷爰列百氏其中須有部折各於當族注之通為百氏以隴西李氏為第一至貞元中左司郎中栁芳論氏族序四姓則分甲乙丙丁頒之四海望族則先山東載在唐厯永泰二年十月七日宗正卿吳王祇奏修史館太常博士栁芳撰皇室永泰譜二十卷上之大厯三年正月二十四日太子中允李良佐及諸房譜依舊姓獨孤氏從之元和七年七月尚書兵部員外郎知制誥王涯撰姓纂十卷上之開成四年正月勅大理寺少卿李衢修撰王后譜諜其年閏正月勅翰林學士栁璟修續皇家永泰譜以永泰初璟祖考為史官常撰皇家永泰譜二十卷成上之至是復令璟修續其書焉大中六年十二月宗正寺奏得當司修國譜官李𢎞簡伏以徳明皇帝之後興聖皇帝以來宗祊有序昭穆無差近日修撰率多紊亂遂使冠履􅄽儀𤣥黄失位數從之内昭序便乖今請宗子自常參官并諸州府及縣官等各俱具始封建諸王及五代祖及見在子孫録一家狀送圖譜院仍毎房納於官取高處昭穆取尊即轉送至本寺所司磨勘屬籍稍獲精詳依奏蕃國請經史垂拱二年二月十四日新羅王金政明遣使請禮記一部并雜文章令所司冩吉凶要禮并文館詞林採其詞涉規誡者勒成五十卷賜之開元十九年正月二十四日命有司冩毛詩禮記文選各一部以賜金城公主從其請也祕書正字于休烈上表申昭諫匭言曰臣聞和戎國之權也經籍國之典也國之利器不可以示人晉東平王求史記諸子漢朝不與葢以史記多兵謀諸子雜詭術夫以東平帝之懿戚尚不欲示征戰之書况西戎國之逺藩曷可貽經典之事且魯秉周禮齊不加兵吳獲乗車楚屢奔命故曰惟名與器不可以假人必不得已請去春秋當周徳既衰諸侯强盛則有以臣召君之事取威定霸之謀若與此書國之患也表入勅下中書門下議侍中裴光庭等曰西戎不識禮經心昧徳義頻負明約孤背國恩今所請詩書隨時給與庶使漸陶聲教混一車書文軌大同斯可使也休烈雖見情偽變詐於是乎生而不知忠信節義於是乎在上曰善乃以經書賜與之二十六年六月二十七日渤海遣使求冩唐禮及三國志晉書三十六國春秋許之附學讀書神龍元年九月二十一日勅吐蕃王及可汗子孫欲習學經業宜附國子學讀書永徽二年正月十四日國子祭酒蕭昕上言請從儒學以正風教其月二十九日勅曰頃以戎冦方急虞於經畧太學空設諸生益寡絃誦之地寂寥無聲函丈之間殆將不掃念每及此甚用憫焉其諸道節度觀察都防禦使等朕之腹心各鎮方面誡兹子弟各奉義方并宰相朝官及神策六軍欲習業者自今已後並令補國學生欲其業重籝金器成琢玉日新厥徳世不乏賢其中身雖有官欲附學讀書者聴就學宫委中書門下郎揀擇堪為師範者充學生員數多少所習經業考試第等并所供糧及縁修理各委本司作事件開奏開成元年六月勅新羅宿衛生王子金義宗等所請留任學生員仰准舊例留二人衣糧准例支給二年三月渤海國隨賀正王子大俊明并入朝學生共一十六人勅渤海所請生徒習學宜令青州觀察使放六人到上都餘十人勒迴又新羅差人朝宿衛王子并准舊例割留習業學生首及先任學生等共二百十六人請時服糧料又請舊住學習業者放還本國勅新羅學生内許七人准去年八月勅處分餘時服馬畜糧料等既非舊例並勒還唐㑹要卷三十六
