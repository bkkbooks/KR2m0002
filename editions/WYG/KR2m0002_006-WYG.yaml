body:
  text: 唐㑹要卷六宋王溥撰公主凡公主封有國名者鄎國代國霍國是也有以郡名者平陽宣陽東陽是也有以美名者太平樂安長寧是也惟𤣥宗之女皆以美名名之髙祖十九女長沙降馬少師襄陽降竇鋋平陽降柴紹髙密降長孫孝政後降段綸長廣降趙慈景後降楊師道長沙本封萬春降豆盧懷讓房陵降竇奉節後降賀蘭僧伽九江降執失思力廬陵降喬師望南昌降蘇朂安平降楊思敬淮南降封道言貞定降崔恭禮衡陽降阿史那社爾丹陽降薛萬徹臨海降襄師律館陶降崔宣度安定降温挺後降鄭敬𤣥長樂降趙瓌太宗二十女襄城降蕭銑汝南早薨南平降王敬直後降劉𤣥意遂安降竇逵後降王大禮長樂降長孫沖豫章降唐義識巴陵降柴令武普安降史仁表東陽降高履行臨川降周道務清河降程處亮蘭陵降竇懷悊晉安降韋思安後降楊仁輅安康降獨孤諶新興降長孫曦城陽降杜荷又降薛瓘高陽降房遺愛晉陽早薨常山未及降薨顯慶時新城降長孫銓後降韋正矩髙宗三女義陽降權毅髙安降王朂鎮國太平降薛紹後降武攸暨中宗八女新都降武延暉宜城降裴巽定安降王同胶後降韋濯三降崔銑長寧降楊慎交後降蘇彦伯永壽降韋鑄永泰降武延基安樂降武崇訓後降武延秀成安降韋捷睿宗十女壽昌降崔真安興早亡淮陽降王承慶代國降鄭萬鈞涼國降薛伯陽後降温儀嶭國降裴守一後降裴巽鄎國降薛敬後降鄭孝義金仙入道玉真入道霍國降裴虚已𤣥宗二十八女永穆降王繇常芬降張去奢孝昌早薨靈昌早薨常山降薛譚後降竇澤唐昌降薛鏽萬安入道寧親降裴垍上仙早薨新昌降蕭衡髙都降裴惠童臨晉降鄭潛曜建平降豆盧建後降楊說封衞國貞陽降源清後降蘇震信成降獨孤明宜春早薨壽春降吳澄後入道封楚國昌樂降竇鍔永寧降裴齊丘平昌降温西華後降楊徽蘇明封宋國太華降楊錡興信本封髙陽降張垍後降裴穎三降楊敷改封齊國壽昌降郭液樂成降薛履謙新平降裴玪後降姜慶初廣寧降程昌裔後降蘇恬咸宜降楊泗後降崔嵩萬春降楊朏肅宗七女長樂降豆盧諶改封宿國寧國降鄭巽又降嶭康衡封蕭國後降回紇可汗和政降桞潭大寧降張清封剡國宜寧降鄭沛封紀國永和降王詮延光降裴徽後降蕭升封郜國代宗二十女靈仙真定並贈永清降裴倣昇平十餘歳降郭曖封虢國華陽入道玉清贈嘉豐降髙怡上霄贈永樂降田華長林降沈明太和追封嘉明降田緒初封武清贈趙國諡莊懿玉虚追封普寧降吳士廣晉陽降裴液義清降桞杲壽昌降竇克正新都降王潛後降田華西平章寧並殤德宗十女唐安降韋宥早薨册贈韓國諡貞穆義陽降王士平贈魏國諡憲穆義興降張茂宗尋薨贈鄭國諡莊穆臨真降嶭釗永陽降崔諲文安早亡咸安降回紇武義成功可汗贈燕國諡襄穆宜都降栁昱義川晉平早亡順宗十一女漢陽始封徳陽降郭鏦臨汝早亡普安降鄭何贈梁國諡恭靖東陽降崔把西河降沈翬雲安降劉士涇襄陽降張克禮潯陽入道邵陽入道虢國降王承系平恩入道憲宗十九女普寧降于季友改封永昌贈梁國諡曰惠康永嘉入道衡陽早亡汾陽降韋讓贈鄭國諡温儀宣城降沈􅔲岐陽降杜琮贈晉國諡曰惠康陳留降裴損真寧降嶭翃南康降沈汾普康早亡臨真降衛洙真源降杜中立永順降劉𢎞景安平降劉異壽安降王元逹本琛王女永安義寧入道定安初封太和降回紇可汗貴卿早薨贈穆宗八女義豐降韋處仁淮陽降栁正元延安降竇澣金堂降郭仲恭初封晉陵清源早亡鐃陽降郭仲詞義昌入道安康入道敬宗三女永興天長寧國文宗四女興唐西平朗寧光化武宗七女昌樂夀春永清延慶静樂樂温長寧宣宗十一女萬夀降鄭顥廣徳降于琮永福西華降嚴祁義和饒安盛唐平原唐陽許昌降栁陟豐陽懿宗女同昌降韋保衡追封衛國諡曰文懿僖宗二女唐興永平昭宗女永明雜録高祖第三女平陽公主義兵起公主于鄠縣莊散家資招引山中亡命得數百人起兵以應高祖略地至盩厔武功始平皆下之每申明法令禁兵無得侵掠故逺近奔赴甚衆得兵七萬人公主間使以聞使者至髙祖大悅及義軍渡河公主引精兵萬餘與太宗㑹于渭北與其駙馬柴紹各置幕府營中號為娘子軍京城平封為平陽公主獨有軍功每賞賜異于他主及薨諡曰昭太宗長女襄城公主出降中書令蕭瑀子銑公主雅有禮度太宗每令諸公主凡厥所為皆視其楷則又令所司别為營第公主辭曰婦事舅姑如事父母若居處不同則定省多闕再三固讓乃止令于舊宅而改創焉即薦福寺是也貞觀五年長樂公主出降太宗以皇后所生勅有司資送倍于嫁長公主秘書監魏徵諫曰不可昔漢明帝欲封其子云我子豈得與先帝子等乎可半楚淮陽前史以為美談天子姊妹為長公主天子之女為公主既加長字即是有所尊崇或可情有淺深無容禮有踰越上然其言長孫皇后遣使賫絹五百疋詣徵家賜之十一年侍中王珪子敬直尚南平公主禮有婦見舅姑之儀近代以来公主出降此禮皆廢珪曰今主上欽明動循法制吾受公主謁見豈為身榮所以成國家之美耳遂與其妻就位而坐令公主親執笲行盥饋之道禮成而退物議韙之自是公主下降有舅姑者皆備禮自珪始也十六年七月三日勅晉王宜班于朝列晉陽公主哽噎不自勝晉王及晉陽公主幼而偏孤上親加鞠養晉王或暫出間公主必送出䖍化門涕淚而别至是公主言於太宗曰兄一與百寮同列將不得在内耶言訖哽噎不自勝上為之流涕永徽元年正月衡山公主欲出降長孫氏議者以時既公除合行吉禮侍中于志寧上疏曰伏見衡山公主出降欲就今秋成禮竊按禮記云女十五而笄二十而嫁有故二十三年而嫁鄭𤣥云有故謂遭喪也固知須終三年其有議者准制公除之後並須從吉此漢文創制其儀為天下百姓至于公主服是斬縗使服隨例除不宜情隨例改心喪之内乃便成婚非惟違于禮經亦是人情不可陛下方奬仁孝之日敦崇名教之秋此事行之若難猶宜抑而守禮况行之甚易何容廢而受譏伏願遵髙宗之令軌略孝文之權制國家于法無虧公主情理得畢則天下幸甚于是待三年服闋然後降咸亨二年五月十六日城陽公主薨公主初適杜荷坐承乾誅公主改適薛瓘太宗使卜之卜人曰兩火俱食始則同榮末亦雙悴若晝日行合巹之禮則終吉上將從之馬周諫曰臣聞朝謁以朝思相戒也講習以晝思相成也讌飲以昃思相歡也婚合以夜思相親也是以上下有成内外有規動息有時吉㐫有儀先王之教不可黷也今陛下欲謀其始而亂其紀不可為也夫卜筮者所以決嫌疑若黷禮亂常先王所不用上從其言瓘後為房州刺史公主隨之及薨雙柩齊引而還顯慶三年九月十九日詔古稱釐降唯屬王姬比聞縣主適人皆云出降娶王女者亦云尚主濫假名器深乖禮經其縣主出嫁宜稱適取王女者稱娶仍改令文神龍二年閏正月一日勅置公主設官屬鎮國太平公主儀比親王長寧安樂唯不置長史餘並同親王宜城新都安定金城等公主非皇后生官員減半其金城公主以出降吐蕃特宜置司馬至景龍四年六月二十二日停公主府依舊置邑司唐隆元年六月二十六日勅公主置府近有勅總停其太平公主有崇保社稷功其開太平公主府即宜依舊酸棗縣尉袁楚客奏記于中書令魏元忠曰女有内男有外男女有别剛柔分矣中外斯隔隂陽著矣豈可相濫哉然而幕府者丈夫之職非婦人之事今諸公主並開府建僚崇置法官秩若以女處男職所謂長隂而抑陽也而望隂陽不愆風雨不爽其可得乎竊謂非致逺之計乖久安之䇿書曰事不師古以克永世匪說攸聞此之謂也君侯不正誰正之哉開元十年永穆公主出降勅有司優厚發遣依太平公主故事僧一行諫曰髙宗末年唯有一女所以殊其禮又太平驕僭竟以得罪不應引以為例上納其言天寳七載皇女道士萬安公主出就金仙觀安置仍賜實封一千户奴婢所司准公主例給付上元三年正月十九日永昌縣主壻韋嗣道宜付吏部與散官自今以後縣主壻出身者並准此為恒例建中元年九月詔婚嫁函書出于近代既無經據即可停之時縣主將嫁既有吉日所司供設已備矣而襄王之幼女卒上從妹也命改用中旬或奏曰禮物已備供帳已設撤之倍勞且殤服不足以廢事上曰爾愛其費我愛其禮卒罷之十二月出嫁岳陽等十一縣主初開元中置禮㑹院于崇仁里自興兵以来廢而不修公郡縣主不時降嫁殆三十年凡皇族子弟皆散棄無位或流落他縣上即位始叙用枝屬以時婚嫁公族老幼莫不悲感及縣主將嫁小大之物必周其用于是有司度用一人籠花計錢七十萬上使損之及三萬乃止上曰吾非有所愛但不欲無益之費耳各以其餘錢賜之以備他用舊例皇姬下嫁舅姑反拜而婦不答至是乃刋去慝禮率由典訓貞元二年二月太常奏長林公主出降凖開元禮合乘厭翟車去年嘉誠公主出降得駕部牒造来多年不堪乘駕又得内侍省報舊例相沿乘金根車其時便已行用今縁禮㑹日逼創造必不及請凖嘉誠公主例乘金根車勅宜依自是公主出降相承金根車至今不改至四年二月七日太常卿董晉奏曰今月八日正衙册新都長公主凖開元禮其日皇帝御正衙命使行册禮陳樂懸伏凖貞元元年五月册嘉誠公主二年二月册長林公主皇帝並不御正殿亦不設樂懸遂為典故又奏今月十日新都長公主出嫁行五禮凖舊例並合前一日於光順門行五禮今奉勅其日早於光順門便行册禮遂為故事至十五年七月三日有司奏册公主儀注伏凖開元之儀侍中合宣制今儀注譔以中書令宣制則其日侍中闕行事之儀中書令合受册又合以册授與冊使今儀注譔以中書侍郎授册使則其日闕中書令授册之儀内册案自東上閣出詣橫街北合宣付中書門下其侍中中書令其日並行事今儀注譔獨宣付中書令則侍中無慿宣付今欲改正制曰可至二十一年四月七日勅禮部禮儀使奏舊制例正衙命使使出含元殿西廊側門外登輅車從光範門入詣光順門進册伏縁諸王及公主並同日内册其載册輅車車數不足今商量册使出宣政門便自興禮門出各赴延英光順門進册既便於事又合禮經制曰可五年十二月十八日諸郡縣主壻每停官後郡主每季給錢七十千文縣主每季五十千文如受官後即停其郡縣主壻已亡歿者依凖此仍令度支隨季折給綾絹六年十一月詔郡主壻檢校四品京官者户部月給俸錢三十千文度支歳給禄米一百二十石縣主壻檢校五品京官給俸錢二十千文禄米百石其有出身及先任正官并負才學政術欲從上舉選者聽之如官已登朝不用此制又勅諸公主每年各給封物七百段疋此依舊例春秋兩限支給諸郡主每季各賜錢一百貫文諸縣主每季各賜錢七十貫文其郡縣主壻見任前資正員外員官等一依支給十一年十月義陽公主出降秘書少監王士平士平武俊之子也上慎重其事先時令宰臣訪于禮官令參定見舅姑之儀禮又武俊在鎮仍定公主遣使儀十四年故懐澤縣主壻檢校右贊善大夫竇克搆狀言臣頃以國親超受寵禄及縣主薨逝臣官遂停臣陪位出身未授檢校官日自有本官伏乞宣付所司許取前銜婺州司户參軍隨例調選詔許赴集仍委所司比類前任正員官依資注擬自今以後郡縣主壻除丁憂外有曾任正員官停檢校官俸料後者准此處分其餘先是兼試同正員等不在選序者停檢校俸料後便任赴集有司據檢校官量三資與正員官元無官者與解褐正官員十五年七月勅駙馬郡縣主如實無子凖式養男並不得用母䕃永貞元年正月度支奏故永昌公主薨凖貞元中義陽義章公主葬料一切磚瓦等充給上令度支都支三千萬于數内圓融造作元和三年三月勅縣主壻請授外官如赴任縣主不得離京自此以後永為常例六年十一月京兆尹元義方奏永昌公主祠堂制度勅宜減制宰臣李吉甫奏竊以祠堂之設禮典無文盖德宗皇帝恩出一時事因習俗當時人間不無竊議昔漢章帝欲為光武原陵明帝顯節陵各起邑屋東平王蒼上疏疏其不可東平王則光武之愛子明帝之愛弟賢王之心豈惜費于父兄哉誠以非禮之事人君所當慎也今者依義陽公主欲起祠堂恐不如量置墓户以充守奉翌日謂吉甫曰昨日所奏罷祠堂深惬朕心初疑其冗費縁未知故實是以量減及覽所奏方知無據然朕不破三二十户百姓常揀官户謹信委之十二月詔曰王者教化本于婚姻由親以理疎自内而刑外故詩稱好合所以成子姓也禮有待年明其必及時也恭惟累聖之後子孫衆多教于公宫已知婦順而從人之義重擇配之才難以兹兢兢久曠嘉禮况時方無事年及有行宜加禄邑之榮以俟御輪之吉言念于此惕然興懐思𢎞厚恩用協敦叙恩王等女六人可並封縣主仍委中書門下與宗正卿及吏部尚書侍郎計㑹諸親之内及常選之中精求其人副我誠意時十六王宅諸王女久不降嫁德音初下人感歎焉九年八月岐陽公主出降杜琮發左右神䇿兵三百赴光範門翼道至其宅京兆尹裴武充禮儀使太和三年正月勅潯陽平恩邵陽三公主皆捨俗入道宜令每年各賜封物七百段疋仍凖舊例春秋兩限支付四年五月勅出降縣主粧粉錢宜令所司自今以後從出降日支開成二年十二月勅駙馬嘗為公主行服三年頗乖典法自此凖禮夫妻服齊縗杖期時岐陽公主既薨駙馬杜琮因禮文不為重服時論推美故有是詔三年十二月勅駙馬都尉尚公主後宜令守檢校官二周年滿則量人材資序改轉正員官仍為定例四年正月勅駙馬竇瀚公主衣服逾制從夫之義過有所歸宜罰兩月賜錢㑹昌五年七月中書門下奏伏見公主上表稱妾李氏者伏以臣妾之義取其賤稱家人之禮即宜區别臣等商量公主上表請如長公主之例並云某邑公主第幾女上表郡縣主亦望依此例稱從之大中二年十二月以起居郎駙馬都尉鄭顥尚萬夀公主其年詔曰女人之德雅合慎修嚴奉舅姑夙夜勤事此婦之節也先王制禮貴賤同遵既以下嫁臣寮儀則須依古典萬壽公主婦禮宜依士庶四年二月勅諸縣主壻選尚之初多無官緒或正員初秩授檢校朝官從前條流都未詳備自今以後縣主壻如先有官宜超資與進改如未有官者且授檢校官待三周年後與第二任正員官仍委宗正卿檢勘聞奏五年四月勅夫婦之際教化之端人倫所先王猷為大况枝連帝戚事繫國風茍失常儀即紊彛典其有節義乖當須資立制如或情有可愍即務從權俾協通規必惟中道起自今以後先降嫁公主縣主如有兒女者並不得再請從人如無兒者即任陳奏宜委宗正等凖此處分如有兒女妄稱無有輒請再從人者仍委所司察獲奏聞别議處分并宣付命婦院永為常式其月勅親王公主葬宜凖故事輟朝一日大中五年八月勅公主邑司擅行文牒恐多影占有紊朝章今後公主除縁徴封外不得令邑司行文書牒府縣如縁公事令邑司申宗正寺與酌量事體施行咸通十二年二月葬衞國公主於少陵原先是詔百寮為挽歌詞仍令駙馬韋保衡自撰公主神道碑京兆尹薛能為外監䕶供奉官楊復璟為内監䕶儀注甚盛上與郭淑妃御延興門哭送和蕃公主𢎞化宗室女貞觀十三年十一月降吐谷渾慕容諸曷鉢文成宗室女貞觀十五年正月十五日封降于吐蕃贊普贊普親迎于河源見主行子壻禮甚謹歎大國服飾禮儀之美俯仰有愧沮之色謂所親曰我祖父未有通婚大國者今我得尚大唐公主當築一城以誇示後世仍遣渠豪子弟請入國學以習詩書從之金城雍王守禮女神龍三年四月十四日降于吐蕃贊普寧國肅宗女乾元元年七月十七日出降回鶻英武威逺可汗乃置公主府二年八月二十三日自蕃還至貞元五年四月十二日議罷公主府置邑司永樂宋室女開元二十五年十一月三日出降契丹松羅郡王李失活燕郡餘姚公主女慕容氏開元十五年閏五月十九日出降契丹松羅郡王李鬱子焉固安從外甥女辛氏開元五年二月出降奚首領李大輔至八年大輔戮死共立季弟魯蘇為主仍以公主為妻時魯蘇牙官塞黙羯謀害魯蘇翻歸突厥公主密知之遂誘而殺之上嘉其功賞賜累萬公主嫡母妒主榮寵乃上言云主是庶生請别以所生主嫁魯蘇上怒乃令離婚東光咸安公主女韋氏降奚首領魯蘇交河十姓可汗史懐道女開元五年十二月出降突厥騎施可汗蘇禄和義宗室女天寳三載十二月十四日出降寧國奉化王静樂天寳四載三月十四日封外孫獨孤氏降松漢都督懐順王李懐節宜芳外甥女楊氏天寳四載三月十四日出降饒樂都督懐信王李延寵崇徽僕固懐恩女大厯四年五月二十四日出降囬鶻可汗咸安德宗女貞元四年十月出降囬紇天親可汗其月二十六日勅置咸安公主府凖親王太和憲宗女長慶元年二月出降囬紇崇德可汗雜録景龍四年正月二十七日幸始平縣送金城公主以驍衞大將軍楊矩為使上初謂侍中紀處訥曰昔文成公主出降即江夏王送之卿識蕃情又有安邊之畧可為朕充北使也處訥辭以不練邊事上又使中書侍郎趙彦昭代行司農卿趙履温謂之曰公國之宰輔而為一介之使不亦鄙乎彦昭曰計將安出履温因為託安樂公主密奏留之至是命矩行二月一日改始平縣為金城縣又改地為鳯臺鄉愴别里開元二十九年公主薨吐蕃使来告哀開元二十一年正月命工部尚書李暠持節于吐蕃以國信一萬匹私覿物二千匹皆雜以五綵遺之尋而金城公主上言請今年九月一日樹碑于赤嶺定蕃漢界詔張守珪李行禕與吐蕃使莽布支同觀樹焉既樹吐蕃遣其臣隨我使人分往劔南及河西磧歴告邊州曰兩國和好無相侵掠我使人隨入蕃告亦如之貞元二年四月二十九日太常卿董晉奏公主出降蕃國請加玉册制曰可三年九月遣囬紇使合闕將軍歸其國初合闕將其君命請婚于我許以咸安公主嫁之命公主見合闕于麟德殿且命中謁者賫公主畫圖就示可汗以馬價絹五萬疋還之計其牙布而去以殿中監嗣王湛然為送咸安公主使仍兼婚禮使四年十月囬紇公主兼使者至自本蕃上御延喜門禁婦人及車輿觀者時囬紇可汗喜于和親其禮甚盛乃上言曰昔為兄弟今即子壻子壻半子也上猶父我猶子也父若患于西戎子當遣兵除之又罵辱吐蕃使者乃使其宰相等率衆千餘人及其妹骨禄毗伽公主姨妹迷敘骨吐禄公主及職使大首領等妻妾凡五十六婦人来迎可敦納聘馬二千匹上令朔州及太原分留囬紇七百餘人其宰相大首領至者館于鴻臚寺將作監囬紇使者見于宣政殿上召囬紇公主及使對于麟德殿頒賜有差元和三年正月咸安公主薨廢朝三日初王師平史朝義蕃人微有功恃此不修臣禮至貞元四年囬紇武義成功可汗始遣使獻方物仍求結親德宗與羣臣議許之遂以公主降焉命使册可汗為勇猛分相智惠長壽天親可汗册公主為孝順端正智惠長壽可敦御製詩送之事具德宗實録天親可汗卒子忠正可汗立忠正可汗卒子奉誠可汗立奉誠可汗卒國人立其相是為懐相可汗皆從其俗尚主主在蕃二十一年卒册贈燕國太長公主諡曰襄穆太和公主長慶元年二月封為公主册為囬紇可敦出降愛登里邏骨沒密施合毗伽保義可汗以中書侍郎平章事崔植充册使户部侍郎平章事杜元穎充五禮使五月詔縁改定太和公主出降囬紇事宜令中書舍人王起赴鴻臚寺宣示囬紇等使保義可汗既立遣使求婚遂封第九妹為永安公主將以降嫁焉其年三月保義可汗卒四月册九姓回紇為崇德可汗五月遣使請迎所許嫁公主朝廷封第五妹為太和公主以降焉囬紇雖狄人固請永安而終不許故命中書舍人王起充鴻臚寺以宣諭焉又詔左金吾大將軍胡証充送公主為囬紇可敦歸國及加册可汗等使光禄卿李憲充副使太常卿李銑充婚禮使公主置府官屬凖親王例仍鑄邑司印一面及發上以半仗御通化門送之勅常參官于章敬寺前立班儀衞甚盛仍令京兆府權置公主幕次暫駐受之百寮謁見士女傾城觀焉㑹昌元年十一月勅縁囬紇國中離亂頗甚太和公主恐未安寧須遣文臣專往訪問宜差通使舍人苗綰充使三年二月太常禮院奏太和公主到日百寮于章敬寺門立班舊例並以邑司承命入拜命承命出答拜今商量邑司官秩至卑若令承命恐事太輕今請公主左右一人戴鬢帛拜背襠將命出入以代邑司官謂得禮之變從之其月二十五日公主自蕃還京詔左右神䇿各出軍二百人及太常儀仗鹵簿從長樂驛迎公主入城其日改封定安大長公主罷太和公主府宰臣及文武百寮于章敬寺門立班候參參畢太和公主便赴太廟謁憲宗穆宗二室回從光化門入内其日宰相及文武百寮赴宣政衙于東上閣門進名奉賀赴興慶宫賀太皇太后二十七日勅定安大長公主自蕃還京莫不哀憫百辟卿士皆出拜迎宣城真寧臨真真源義昌等公主並宗室近親合先慰問晏然私第竟已不至度于物體稍似非宜各罰封絹一百匹以塞愆違雲安長公主既不與定安光順相見又兩日就宅宣事皆不在家罰封物三百匹三月中書門下奏伏聞定安大長公主二月二十五日以囬紇背叛恩德侵軼邊陲于光順門内脫去簪珥變服請罪陛下釋其愆負方敢對見又以宣城公主等違勅不到各罰封物伏以禮法之行始此中壼王化盛事人倫美談周易云正家而天下定矣臣等忝在樞近不任忭賀踊躍之至伏望宣付史館紀述為百代典制從之唐㑹要卷六
