body:
  text: 唐㑹要卷五十宋王溥撰尊崇道教武徳三年五月晋州人吉善行於羊角山見一老叟乘白馬朱鬛儀容甚偉曰為吾語唐天子吾汝祖也今年平賊後子孫享國千嵗髙祖異之乃立廟於其地乾封元年三月二十日追尊老君為太上𤣥元皇帝至永昌元年却稱老君至神龍元年二月四日依舊號太上𤣥元皇帝至天寳二年正月十五日加號太上𤣥元皇帝為大聖祖𤣥元皇帝八載六月十五日加號為大聖祖大道𤣥元皇帝十三年二月七日加號大聖髙上大道金闕𤣥元皇帝開元二十九年正月河南採訪使汴州刺史齊澣奏伏以至道冲虗生人宗仰未免鞭撻孰瞻儀型其道士僧尼女冠等有犯望准道格處分所由州縣官不得擅行决罰如有違越請依法科罪仍書中下考𠡠㫖宜依五月上夢𤣥元告休期因令冩貌分送天下天寳元年正月七日陳王府參軍田同秀上言𤣥元皇帝降於丹鳯門之通衢告賜靈符在尹喜之故宅上遣使就函谷故闗尹喜䑓而得之於是置𤣥元皇帝廟扵大寜坊西南角東都置扵積善坊臨淄舊邸廟初成命工人扵大白山砥石為𤣥元皇帝聖容又採白石為𤣥宗聖容侍立扵𤣥元皇帝之右衣以王者衮冕之服又于像東設立白石為李林甫陳希烈之狀甫犯事又改刻石為楊國忠代焉至徳中克復上都盡毁瘞之其年二月二十日勑曰古今人表𤣥元皇帝升入上聖自今已後每有薦新先獻𤣥元廟其縁告享所奏樂宜令所司詳定奏聞并差宗正寺官一員及差户灑掃兩京崇𤣥學各置博士助教一員學生一百人資䕃正同國子學例每祠享所齋郎便以學生充補其年五月宰臣奏兩京及諸郡崇𤣥學生等准開元二年正月二十五日制前件舉人合習道徳南華通𤣥冲虗四經又准天寳元年二月二十九日制改庚桑子為洞𤣥真經准請條補崇𤣥學生亦合習讀其洞靈真經人間少本臣近令諸觀寺尋訪道士全無習者夲既未廣業實難成并通𤣥沖虗二經亦恐文字不定𤣥教方闕學者宜精其洞靈等三經望付所司各冩千卷較定訖付諸道採訪使頒行其首舉司及兩京崇𤣥學生亦望各付一夲令今各崇𤣥學人望且准開元二十九年正月詔條考試其洞靈真經等請業成後准試從之六月勅大道先於兩儀天地生扵萬物是以賢哲之後咸竭其誠今後應縁國家制命表䟽簿書及所試制策文章一事已上語指道教之事及天地乾坤之字者並一切平闕宜宣示中外九月二十五日勅西京𤣥元廟改為太上𤣥元皇帝宫天下准此至二年三月十二日制聖祖所理夲在諸天將欲降靈固宜取象况惟帝號豈可名言其在京𤣥元宫宜改為太清宫柬都改為太㣲宫天下諸郡改為紫極宫二年二月勅兩京𤣥元宫及道院等宜委崇𤣥館大學士都檢校務在精修勿令喧雜仍不更𨽻宗正其道士等名籍任依常式三月十一日勅古之制禮祭用質明義無取於尚幽情實縁於既沒我聖祖澹然常在為道之宗既殊有盡之期須展事生之理自今已後每聖祖宫有詔宜改用卯時以前行禮四載四月十七日勅比太清宫行事官皆具冕服及奏樂未易舊名并告獻之時仍陳策祝既非事生之禮皆從降神之儀且真俗殊倫幽明異􅂾理有非便亦在從宜自今已後每太清宫行禮官宜改用朝服兼停祝版改為清詞於紙上其告獻辭及新奏樂章朕當别自修撰仍令所司具議儀注奏聞十三載正月十二日令有司每至春日則修薦獻上香之禮仍永為常式上元二年正月置漆園監官生員興元元年十二月十九日詔以太常卿亞上香光禄卿終上香改三禮拜為再拜貞元元年正月二日勅薦享太清宫亞獻太常卿充終獻光禄卿充仍永為常式元和九年二月内出道教神仙圖像經法九舉以賜興唐觀長慶二年五月勅諸色人中有情愿入道者但能暗記老子經及度人經灼然精􅌻者即任入道其度人經情愿以黄庭經代之者亦聴宣令所司具令立文狀條目限降誕月内投名請試今年十月内試畢寳厯元年上有事於南郊將謁太清宫長安縣主簿鄭翦時主役於御院忽於縣之西隅見一白衣老人云此下有井正道真皇帝過路汝速識之不然罪在不測翦惶懼領役人修之其處已陷􅂾尺命發之則古井存焉驚顧之際已失老人所在始悟神告黙不敢告輾轉傳布功徳使䕶軍中尉劉𢎞規以事上聞上既至宫朝賀畢赴南郊於宫門駐馬宰臣及供奉官扵馬前蹈舞稱賀遂命翰林學士兵部侍郎韋處厚撰記令起居郎桞公權書石於井之上以表神異焉其名曰聖瑞感應記乃賜翦緋魚袋㑹昌元年二月十五日勅𤣥元皇帝降誕日近覧天寳二年勅我聖祖澹然常在為道之宗既殊有盡之期須展事生之禮今太清宫薦告皆用朝謁之儀即降誕昌辰理難停廢宜改為降神聖節休假百官庶表貽謀之慶以申嚴敬之誠其年六月道士趙歸真等八十一人入内於三殿造九天塲便令上食供食駕幸三殿九天壇道塲受籙其月右拾遺王哲進狀請度進士明經為道士不從其月右補闕劉彦謀又上䟽求仙事貶河南府士曹叅軍二年十一月以道士趙歸真為歸道門兩街都教授博士時武宗志學神仙歸真乘間排毁釋氏言非中國之教宜盡去之帝然之乃澄汰天下僧尼五年九月勅取東都𢎞聖寺改脩太㣲宫其年十月𠡠傳度道門法籙歸衡嶽道士劉𤣥靜可加銀青光禄大夫崇𤣥館學士仍賜號廣成先生其年十一月東都留守奏太㣲宫畢𤣥元館真容即欲移就𤣥宗玉像便合從遷伏以聖祖尊崇嚴奉須備移動之日宜擇良辰伏乞天恩降勅有司擇日奉勅宜令所司擇日聞奏六年十月中書門下奏東都新置太㣲宫初成𤣥元皇帝玉聖容𤣥宗肅宗玉真容今已就位望差右散騎常侍裴泰章充使薦獻從之其年九月衡嶽道士賜紫劉𤣥靜奏皇帝十月十五日授三洞法籙請禁斷屠釣百司不决死刑伏請宣下勑㫖從之十月十一日至十八日禁斷大中元年二月道門威儀劉𤣥静賜諡通𤣥先生觀京龍興觀在崇教坊貞觀五年太子承乾有疾勑道士秦英祈禱得愈遂立為西華觀垂拱三年改為金䑓觀神龍元年又改為中興觀三年三月二十四日復改為龍興觀昊天觀在全一坊地貞觀初為髙宗宅顯慶元年三月二十四日為太宗追褔遂立為觀以昊天為名額髙宗題東明觀在普寜坊顯慶元年孝敬升儲後所立𢎞道觀在畫一坊地夲脩仁坊舊有隋國子學及右屯衞大將軍麥鐡道宅顯慶二年盡併一坊為雍王第王升儲後永隆元年八月立為觀崇褔觀在頒政坊夲楊士逺宅咸亨元年九月二十三日皇后為母度太平公主為女冠因置觀初名太清宫垂拱三年改為魏國觀載初元年改為崇福觀太平觀在大業坊夲徐王元禮宅太平公主出家初以頒政觀坊宅為太平觀尋移於此公主居之時頒政坊觀改為太清觀光天觀在務夲坊夲司空房𤣥齡宅景龍二年閏九月十三日韋庶人立為觀名翊聖觀景雲二年改為景雲女冠觀天寳八年改為龍興道士觀至徳三載改為光天觀景雲觀在脩業坊景龍二年韋庶人立為翊聖觀景雲元年改名景雲觀景龍三年四月大理少卿盧懐慎上疏曰伏准去年閏九月十三日勑宜扵兩京及荆揚益蒲等州各置景龍翊聖等觀圖樣内出候農隙起作者近聞所在已有起作率計一觀將􅂾萬功併而言之為役凡㡬日計未見其損嵗終或受其弊謹㨿元勑重人遵道式稽老氏無為者飬神亦何在其速就哉又月令云日短至可以伐木今孟夏而採斫林藪夭害昆蟲既違順時之宜且非好生之義夫脩建塔廟不在朝夕務兹稼穡如救水火安可急其所閒有妨農要伏望天恩重申前勑使移此功力咸勤播殖待及有秋式遵揆日又諸州申請欲用當處官錢既違成規亦不可允景龍觀在崇仁坊夲申國公髙士亷宅西北方金吾衛神龍元年併為長寜公主宅韋庶人敗後遂立為觀仍以中宗年號為名福唐觀在崇業坊夲新都公主宅景雲元年公主子武仙官出家為道士立為觀金仙觀在輔興坊景雲元年十二月十七日睿宗為第八女西寜公主入道置至至徳元年四月十四日為公主改封金仙所造觀便以金仙為名玉真觀在輔興坊與金仙觀相對夲工部尚書竇誕宅武后時為崇先府景雲元年十二月七日為第九女昌隆公主立為觀二年四月十日公主改封玉真所造觀便以玉真為名諌議大夫甯悌原曰臣觀老尚虗無釋崇寂㓕義極幽𤣥之㫖思逰通方之外故入道流者則虚室生白靜慮𤣥門該釋教者則春池得寳澄心凈域然後法貫羣有道垂兼濟過此以往莫非邪教其鬻販先覺説飾浮言以複殿為經坊用層䑓為道法皆無功於𤣥慮誠有害於生人梁武靡報於前先朝殷鑒非逺咸耳目所接黎元憤咎伏以公主入道京城置觀雖昭報之誠有功扵天㫖而社稷之計難踰於安人若使廣事脩營假飾圖像盡宇内之功力傾萬國之資儲為邀褔則靡効於先朝樹怨則取謗於天下又自隋室以降寺觀尤多禪定東明之域足受緇黄之衆更為建立罕見其宜後失請收前弊未逺上覽善之闕陛下為公主造觀將樹功徳以祈福祐季夏之月興土功犯時忌欲益反損何功徳之有焉况兩觀之地皆百姓之宅卒然逼廹令其轉移扶老㩦㓜投竄無所剔椽發瓦吁嗟道路乖人事違天時起無用之作崇不急之務羣心揺揺衆口籍籍陛下為人父母何以安之臣愚必以為不可伏願俯順人心仰稽天意降徳音下明勑速罷力役收之桑榆則天下幸甚吏部員外郎崔蒞上奏曰伏承陛下縁兩公主造觀可為尊徳敬道矣割慈忍愛上為七聖崇褔下為萬邦作因豈不願神力潛資靈功宻祐社稷永固宗廟長崇者乎無至功奪其成凶與其敗寜邦致亂脩福招殃何則季夏事殷時多禁忌斬木發土移石開山非直苦人必是傷物欲益反損求安乃危臣知其否未見其可然則救犯不暇何福助之有焉且季夏者土徳正王之月炎陽方暑之月草木茂盛之月昆蟲繁育之月天地鬱蒸之月黍稷鋤耨之月夫土徳正王之月不可發洩地氣恐犯時禁則必有天殃有天殃則人心不附禍亂作矣炎陽方暑之月不可興動版築恐致霖潦則必無成功無成功則人力不存怨望結矣草木茂盛之月不可以斬伐山林恐非堅實則速蠧敗速蠧敗則人勞不衷奬勸阻矣昆蟲繁育之月不可以穿鑿原隰恐乖惻隠乖惻隠則必生災變生灾變則人業不安逃亡衆矣天地鬱蒸之月不可以徭役丁夫恐為痁癘則必多夭枉多夭枉則人情不樂風俗離矣黍稷鋤耨之月不可以妨奪農桑恐傷禾稼則必闕嵗計闕嵗計則食用不足盗賊聚矣行此六者謂之六殃書曰徳惟善政政在飬人傳曰新作南門書不時也又曰凡土功龍見而興務成事也火見而致用水昏正而裁日至而畢此言功作從時者所以順於天地也詩曰定之方中作于楚宫此言宫室合時也禮曰季夏之月樹木方盛無有斬伐無揺飬氣不可以興土功妨農事則有天殃違此四者謂之四犯陛下營兩觀而降六殃損萬人而招四犯欲將致理不亦難乎臣望順時從人休功罷役候定中以建事占水正而脩裁仰順天地鬼神降福臣聞漢明帝永平三年夏大旱是時大起室室尚書僕射鍾離意免冠上疏曰昔成湯遭旱以六事自責政不節耶使人疾耶宫室營耶女謁盛耶苞苴行耶䜛夫昌耶竊見此宫大作人失農時此所謂宫室營也自古非苦宫室小狭直患人不安寜上感天心請罷勞役帝善而從之諸作减省即日㴻雨今者雖非宫室起功終是觀寺興造伏望俯從臣請待冬初庶得伐木各宜役功無犯矣必以天文應神理須然用厭機祥事資興建與其積怨傷國孰若施恩飬人往者宋景一言熒惑猶能退舍但令陛下從諌凶咎定不為灾中書舍人裴漼上疏曰臣按禮記春夏月令曰無聚大衆無起大役不可興土功恐妨農事若號令乖戾役使不時則人加疾疫之危國有水旱之變此五行之必應也今自春將夏時雨愆期下人憂心莫知所出陛下雖降哀矜之㫖兩都仍有寺觀之作時旱之應實此之由且春令告期東作方始正是丁壯就功之日而土木方興臣恐所妨尤多所益甚少耕夫蠶妾飢寒之源故春秋莊公三十年冬不雨五行傳以為嵗三築臺僖公二十一年夏大旱五行傳以為不時作南門勞人興役伏望陛下䧏明詔發徳音順天時副人望兩京公私營造及諸司市木並請且停則蒼生幸甚右補闕辛替否上疏曰臣往見明詔自今已後一依貞觀故事且貞觀之時豈有今日之造寺營觀加僧尼道士益無用之勞行不急之務而亂政者也臣聞出家脩道不參人事專其身心以虗淡為高以無為為妙依兩卷老子視一軀天尊無欲無營不損不害何必璇䑓玉榭寳像珍龕使人困窮然後為道哉伏願陛下以兩觀之財為公主施貧乏填府庫則公主之福徳無窮矣不然臣恐下人怨望不减於前朝矣太極元年二月十七日制為金仙玉真出家造觀報先慈也外議不識朕意書奏頻煩將謂公主所致其造兩觀宜停其觀使充金仙玉真公主邑司令竇懐貞檢校所有財物瓦木一事已上附公主邑司收掌朕别更創造終不勞煩百姓此度脩營公私無損若有干誤當寘嚴刑大理少卿韋湊上表曰臣竊計即時庫物如此日常用畧支一嵗殊恐不足而觀寺興功土木所料動至鉅萬更空竭乏必不攴一世矣今所造觀寺者盖謂為善造福將以禳害延祥也以臣寡聞稽諸史䇿人君脩徳有異於是昔殷太戊時桑糓合生於朝七日大拱太戊問於伊陟陟曰臣聞妖不勝徳帝其脩徳大戊懼早朝晏退務撫百姓三年逺方重譯而至者十六國桑糓自枯死殷道中興此豈由造寺觀哉宋景公時熒惑守心公召子罕而問焉子罕曰禍當君雖然可移於宰相曰宰相所與理國家也無宰相誰乃為之理乎曰可移於人公曰人死寡人將為誰君曰可移於嵗曰嵗饑餓人必死為人君而殺其人誰以我為君乎子罕曰君有至徳之言三天必三賞君熒惑必三徙舍行七星一星當一年君延年二十一年矣果如子罕之言此由仁發於𠂻亦非造寺觀也且脩徳者行至公於萬姓不徇於一已任忠直退諂諛輕其賦省其役也自陛下御極脩徳乆矣何灾不禳何祥不至而欲忽生靈之重命崇棟宇於空祠適足為憂何益聖徳此臣竊為陛下不取也况道徳之宗興乎𤣥元皇帝其經曰聖人後其身而身先外其身而身存又曰我好靜而人自我正我無事而人自冨又曰人之飢以其上食税之多人之難理以其上之有為此皆抱素守真薄已厚物輕稅節用清净無為之㫖也今欲困人病國峻宇雕墻思竭班輸飾窮壯麗以希至道其可得乎况有駕鶴登天驂龍上漢玉京金闕自建於神功紫府清都不資於人力廣為廊廡又何益哉近古修黄老術者漢之文㬌豈造寺觀乎寡欲清心愛人省費此得之矣臣伏見勑停兩觀以救農時可謂為得矣今承使司市木仍舊又太清觀内所費不停諸觀脩營見將錢物農工所急雖軫皇情國用將空未聞天聴度支一失天下不安臣忝職司敢忘寜寢竇懐貞弟詹事府司直維鍌嘗謂懐貞曰兄位極台衮當思獻可替否以輔明主柰何校量瓦木厠迹工匠之間欲令海内何所瞻仰懐貞不能對及尹思貞為將作大匠懐貞調發夫匠思貞减之懐貞大怒思貞曰公盛興土木害及黎元受小人之譛輕辱朝臣今日之事不能茍免請從此辭拂衣而去杜門不出上聞特令視事及懐貞被誅代懐貞為御史大夫咸宜觀在親仁坊夲是睿宗藩國地開元初置昭成肅明皇后廟號儀坤後昭成遷入太廟開元四年九月八日勑肅明皇后前於儀坤廟安置二十一年五月六日肅明皇后祔入太廟遂為道士觀寳厯元年五月以咸冝公主入道與太真觀換名焉太真觀在道徳坊夲隋秦王浩宅都𤣥觀在道徳坊夲隋秦王浩宅天后朝置永昌縣神龍元年縣廢遂為長寕公主宅㬌雲元年置道士觀開元五年金仙公主居之改為女冠觀十年七月改為都𤣥觀安國觀在正平坊夲太平公主宅長安一年睿宗在藩國公主奉焉至景雲元年置道士觀仍以夲行為名十年玉真公主居之改為女冠觀𤣥都觀夲名通逹觀周大象三年於故城中置隋開皇二年移至安善坊有道士尹崇通三教積儒書萬卷開元年卒天寳中道士荆朏亦出道學為時所尚太尉房琯毎報師資之禮當代知名之士無不由荆公之門初宇文愷置都以朱雀門街南北盡郭有六條髙坡象乾卦故於九二置宫闕以當帝之居九三立百司以應君子之數九五貴位不欲常人居之故置𤣥都觀興善寺以鎮之三洞觀在醴泉坊夲靈應道士觀開皇七年立貞觀二十三年朱崇坊移換於此清虛觀在豐邑坊隋開皇七年文帝為道士吕師辟穀鍊氣故以清虚為之名天長觀在侍賢坊夲名㑹聖觀隋開皇七年文帝為秦孝王俊所立開元二十八年改千秋觀天寳七載改為天長觀五通觀在安定坊隋開皇八年為道士焦子順能役鬼神告隋文受命之符及立隋授子順開府柱國辭不受常咨謀軍國帝恐其往來疲困每遣近宫置觀以五通為名旌其神異也號曰焦天師崇真觀在新昌坊夲李齊古宅開元初置立興唐觀在長樂坊夲司農園地開元十八年造觀其時有勅令速成之遂拆興慶宫通乾殿造天尊殿取大宫乗雲閣造門屋樓白蓮花殿造精思堂屋拆甘泉殿造老君殿昭成觀在頒政坊夲楊士建宅咸亨中為太平公主置太平觀尋移於大業坊遂改為魏國觀載初元年改為崇福觀開元二十七年為昭成皇后追福改立此名九華觀在通義坊開元二十八年蔡國公主捨宅置其地夲左光䘵大夫李安逺宅開元初為左羽林大將軍李思順宅玉芝觀在延褔坊夲越王貞宅為新都公主宅公主捨宅為新都寺廢為郯王府天寳二年立名為玉芝觀新昌觀在崇業坊天寳六載新昌公主因駙馬蕭衡亡奏請度為女冠遂立此觀華封觀在平康坊天寳七載永穆公主出家捨宅置觀其地西北隅夲梁公姚元崇宅以東都太平公主宅其後勅賜西都䕶郭䖍曜今悉并為觀號華封𤣥真觀在崇仁坊半以東左僕射髙士亷宅西北隅左金吾衛神龍中為長平公主宅又吞人数百屋主既承恩盛加雕飾朱樓綺閣驚絶一時韋氏敗後公主隨夫外住遂奏為景龍觀初欲出賣官估木二十萬山池仍不為數天寳十三載改為𤣥真觀福祥觀在布政坊夲開府竇瑊宅天寳十二年置宗道觀在永崇坊夲興信公主宅賣與劍南節度使郭英乂其後入官大厯十二年為華陽公主追福立為觀元和八年七月命中尉彭忠獻師徒三百人脩興唐觀賜錢十萬使壯其舊制其觀北距禁城因是開複道為行幸之所是日又命以内庫絹千匹茶千觔為興唐觀􅃨道夫役之賜又以莊宅錢五十萬雜榖千石充脩齋醮之費雜記永徽四年四月勅道士女冠僧尼等不得為人療病及卜相文明元年二月十一日金闕亭置一女冠觀並度内人奉天宫置一道士觀芳桂萬全等各為僧寺各以舊官為名其年九月册𤣥元皇帝妻為先天太后尊像於老君廟所先天二年五月十四日勅王公以下不得輙奏請將莊宅置寺觀開元九年十二月天䑓山道士司馬承禎上言今五嶽神祇山林之神非正真之神也五嶽皆有洞府有上清真人降任其職山川風雨隂陽氣序是所理焉冠冕章服佐從神仙皆有名數請别立齋祠之所上竒其説因勅五嶽各置真君祠一所二十二年十月十三日詔道家三元誠有科戒朕嘗精意久矣而初未䝉福今月十五日是下元齋日禁都城内屠宰自今已後及天下諸州每年正月七月十月凡三元日起十三日至十五日並宜禁斷屠宰二十四年五月十三日勅每年春季鎮金龍王殿功徳事畢合獻投山水龍璧出日宜差散官給驛送合投州縣便取當處送出准式投告二十五年十月二十七日勅諸州𤣥元皇帝廟自今已後每年二月降生日宜凖都福唐觀例一設齋二十六年六月一日勅每州各以郭下定形勝觀寺改以開元為額至天寳元年四月八日開元觀主李昭宗奏夲觀先是清都觀勅改為開元觀屬𤣥元降符陛下加號往年改額題開元文字今日崇便合兼天寳之名其額望請改為大唐開元天寳之觀勅依其天下諸州開元觀並加天寳字二十七年五月二十八日勅祠部奏諸州縣行道散齋觀寺准式以同華等八十一州郭下僧尼道士女冠等國忌日各就龍興寺觀行道散齋復請改就開元觀寺勅㫖京兆河南府宜依舊觀寺為定唯千秋節及三元行道設齋宜就開元觀寺餘依至正元五年八月十三日處州刺史齊黄奏當州不在行香之數伏乞同衢婺等州行香勅㫖依其天下諸上州未有行香處並宜准此仍為恒式二十九年九月七日勅諸道真容近令每州扵開元觀安置其當州及京兆河南太原等諸府有觀處亦各令夲州府冩貌分送安置至天寳三載三月兩京及天下諸郡於開元觀開元寺以金銅鑄𤣥宗等身天尊及佛各一軀天寳元年二月二十二日勅文追贈莊子南華真人所著書為南華真經文子列子庚桑子宜令中書門下更討論奏聞至其年三月十九日宰臣李林甫等奏曰莊子既號南華真人文子請號通𤣥真人列子號沖虗真人庚桑子號洞虗真人其莊子文子列子庚桑子並望隨號稱從之二年三月二十八日上親祀𤣥元皇帝廟追尊𤣥元皇帝父周上御史大夫敬為先天太上皇母益夀氏號先天太后其年十二月二十日太子賔客賀知章請為道士還鄉捨㑹稽宅為千秋觀至七年八月十五日勅兩京及諸郡所有千秋觀寺宜改天長名四載十月二十三日詔其墳籍中有載𤣥元皇帝及南華真人舊號者並宜改正其餘編録音義等書宜以道徳經在諸經之首南華等經不宜編子書五載二月十三日太清宫使門下侍郎陳希烈奏大聖祖𤣥元皇帝以二月十五日降生既是吉辰請四月八日佛生日唯令休假一日從之七載五月十三日後漢張天師册贈太師梁貞白先生陶𢎞景冊贈太保八載閏五月五日制文宣王與聖祖同時俱為教首雖考言比徳理在難名而問禮序經跡親授受思廣在三之義用崇徳一之尊宜於太清太㣲宫聖祖前更立文宣王道像與四真列侍左右其年八月二十日司封奏道士籍每一載一度永為恒式至徳二載十一月二十七日勑道士女冠宜依前屬司封貞元七年四月吉州刺史閻闕上言請為道士從之賜名遺榮元和二年二月詔僧尼道士同𨽻左右街功徳使自是祠部司封不復關委其年三月詔男丁女工耕織之夲雕墻峻宇耗蠧之源天下百姓或冐為僧道士茍避徭役有司宜備為科制脩例聞奏大中五年五月河中節度使鄭先奏永樂縣道士侯道華上昇詔改所居道淨院為昇仙院仍賜絹五百疋以飾廊房八年八月勅改望仙臺為文思院始㑹昌中武宗好神仙之事於大明宫築臺號曰望仙及上即位殺趙歸真以懲其弊是年復命葺之右補闕陳嘏抗論立罷脩營遂改為文思院十一年九月上命中使齎詔就羅浮山迎道士軒轅集左拾遺王縉右拾遺薛延傑上疏極諫上謂宰相崔慎由曰為朕言於諫臣雖少翁欒大復生不能相惑但聞軒轅生高士欲與之一言爾至十二年正月至京師上召入禁中謂曰長生可致乎對曰徹聲色去滋味哀樂如一徳施周洽自然與天地合徳何必别求長生耶上深嘉羙之唐㑹要卷五十
