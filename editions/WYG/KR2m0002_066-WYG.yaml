body:
  text: 唐㑹要卷六十六宋王溥撰太僕寺龍朔元年改為司馭寺卿為正卿咸亨中復為太僕寺光宅中改為司僕寺神龍元年復為太僕寺少卿自景雲元年八月加一員韓思復為之丞自大足元年三月六日加一員開成三年卿趙蕃奏請差少卿一人用隨年鐡印印見在牛羊堪祠祭及鳴牛並不印勅㫖從之羣牧使貞觀十五年尚乗奉御張萬嵗除太僕少卿勾當羣牧不入官銜至麟徳元年十二月免官三年正月太僕少卿鮮于匡裕檢校隴右牧監雖入衛未置使上元五年四月右衛中郎將丘義除檢校隴右羣牧監儀鳳三年十月太僕少卿李思文檢校隴右諸牧監使自兹始有使號其後蘇幹夏侯亮陽道昕張仁徳張思廉宗𤣥爽周履氷魏文忠李道廣賀蘭爽姚元之宗楚客平王隆基宋王成器王皎王毛仲牛仙客席楚珍薄承姚韋衢章仇兼瓊王鉷安禄山王鳳翊董唐欽吕崇賁李輔國彭禮盈藥子昻相次為之暨至徳後西戎陷隴右國馬盡沒監牧使與七馬坊名額皆廢今又有樓煩監牧使龍陂監牧使等開元三年四月八日勅諸道牧監官有闕交要者委本使簡擇明開牧養者奏付選司勘責補擬如非其材所由科貶經負犯者不在奏補之限牧尉有闕亦委使司差補申牒所由有如不足並申省司速訪補擬天寶十二載十一月二十五日勅兩京去城五百里内不得置私牧地如有一切官收貞元十二年福建觀察使栁冕奏置萬安監牧於泉州界悉索部囚馬五千七百匹并驢牛三千口以為監牧之資人情大擾經年無所聲息詔罷之元和十一年正月樓煩監牧使中官黨文楚以供征馬羸瘠為諸軍所奏奪緋没其家財配𨽻南衙十四年五月於襄州穀城縣置臨漢監牧兼之至太和二年十一月廢其年八月於襄州穀城縣置臨漢監牧以牧馬仍令山南東道節度使兼充監牧使至太和七年正月山南東道節度使裴度奏先置牧養馬三千三百匹廢百姓田四百餘頃詔許定停之太和七年十一月度支鹽鐡等使奏以銀州是牧放之地水草甚豐國家自艱虞以來制置都闕每西戎東牧于此置頓致外蕃寖驕邊備不立臣得銀州刺史劉源狀計料於河西道側近市孳生堪牧養馬毎匹上不過絹二十疋下至十五疋臣已於鹽鐡司方圓收拾羡餘絹除正進外排比得五萬疋約得三千餘疋今於銀州置銀州監使委劉源充使勾當冀得三數年外蕃息必多勑㫖劉源宜兼充銀州監牧餘委度支使條流訖聞奏開成二年七月夏綏銀宥等州節度使劉源奏伏准大和七年十一月勅委臣於銀州監置監城一所收管羣牧自立務以後今計蕃息孶生草父馬約七千餘匹若雨澤及時水草豐茂即並於當監四逺牧放或遇天時亢陽水草枯竭即湏散將監馬直至綏州界内以來就逺水草伏以所管官馬其數益多出於逺界須有憑倚今訪擇得綏州南界有空地周迴二百餘里堪置馬務四面懸險賊路不通縱有突過剽掠臨時度其要害只著三五十人防捍即可固守其地是臣當管界内空地並非百姓見佃田疇今請割𨽻永屬監司伏乞聖慈允臣所奏勅㫖宜委本道人差人與本州刺史勘騐如實無主便任監司收管大理寺龍朔中改為詳刑寺卿為正卿咸亨中復為大理寺光宅元年改為司刑寺至神龍元年復為大理寺少卿自本一員永徽六年八月十二日加一員以侯善業為之正自龍朔年改為詳刑大夫咸亨年復舊丞初本八員天冊三年十月二十八日省兩員司直自武徳初因隋舊制置六員評事自貞觀二十二年十二月九日置十員掌出使推事貞觀元年二月二十八日上謂封徳彛曰大理之職人命所懸此官極須妙選公宜陳其堪者徳彛未對上曰戴胄忠正清直每事用心即其人也於是除大理少卿咸亨三年十月張文瓘兼大理卿旬日决疑事四百餘莫不允當皆無怨言文瓘嘗有疾繫囚相與設齋願其視事上元二年改侍中大理諸囚一時慟哭開元八年勅内外官犯贓賄及私罪枉法為人所控及赴闕陳訴合雪及减罪者並令大理審詳犯狀申刑部詳覆如實寃濫仍録名送中書門下其有逺年斷雪近請除名亦准此其餘具刑部格二十一年七月大理卿袁仁敬暴卒繫囚聞之皆慟哭悲歌曰天不恤寃人兮何奪我慈親兮有理無由申兮痛哉要訴陳兮天寳九年三月十三日勅大理評事今後子弟及至親中有未厯畿縣者不得注授建中元年正月勅大理評事司直授訖三日内於四方館上表讓一人以自代貞元四年十月大理卿于頎奏諸處推事不盡須重勘覆或有誣告等每失程期稽滯既多寃濫難息諸司及諸館驛多以大理為閒司文牒逓報頗至稽失望今後各令别置文厯切約所由稍涉稽遲許本寺差官累路勘覆如所稽違處州縣本判官請書下考諸司使本推官奪一季俸料勅㫖依奏元和四年九月勅刑部大理覆斷繫囚過為淹滯是長奸倖自今以後大理寺檢㫁不得過二十日刑部覆下不得過十日如刑部覆有異同寺司重申不得過十五日省司重覆不得過七日如有牒外州府㸔勘節目及於京城内勘本推即以報牒到後計日數被勘司却報不得過五日仍令刑部大理寺具初授文牒月日及有牒勘者具遣牒及報牒到月日牒報都省及牒分察使各准勑文勾舉糺訪如有違越奏聴進止其有獄情所疑宜再三詳審非限内可畢者即别狀分析寺司每月具已斷未㫁囚姓名事日聞奏並申報中書門下五年二月大理寺奏當寺獄丞四員准六典合分直守獄承前雖俸料寡薄當寺自有諸色錢物優賞免至虚貧十年以來曹司貧迫無肯任者遂令獄務至重檢校絶官今伏請省兩員置兩員取所省員料錢併以優給見置者庻令吏曹可注職事得人勅㫖依奏十五年六月大理寺奏當司府史許七考入流㫖依奏其年六月勅减大理評事兩員以增六丞之俸太和元年十月大理寺奏准吏部起請當司府史二十員减下三員又勒轉選請准勅附申及不减員勅㫖依奏開成四年二月刑部奏大理司直張堯年在寺宿直以婢自隨合判官一任當徒一年從之其年十一月勅節文刑法之官人命所繫頃有詔㫖令擇才能每當朔望須備顧問宜令中書門下更加選擇㑹昌元年六月大理寺奏當寺司直評事應准勅差出使請廢印三面比縁無出使印每經州縣及到推院要發文牒追攝等皆是自將白牒取州縣印用因兹事狀多使先知為弊頗深久未釐革臣今將請前件廢印收牒在寺庫如有出使官便令賫去庻免刑獄漏泄州縣煩勞勅㫖依奏仍付所司其年十一月又奏請創置當寺出使印四面臣于六月二十八日伏縁當寺未有出使印每准勅差官推事皆用州縣印恐刑部漏泄遂陳奏權請廢印三面伏以廢印經用年多字皆刓缺臣再與當司官吏等商量既為久制猶未得宜伏請准御史臺例置前件出使印其廢印却送禮部勅㫖宜量置出使印三面二年十月中書門下奏大理寺法官伏見衛覬稱刑法者國家之所貴重而私議之所輕賤獄吏者百姓之所懸命而選任之所卑下王政之弊未必不由此也臣等商量望委中書門下精擇法官選任不得在文學官之後如有缺員兼委大理卿自舉所知舉不得人顯加殿罰向後御史臺取御史數至三人以上即須取法官一人所冀刑法之官皆知勸勵勅㫖從之大中三年三月大理寺奏當寺司直評事從前不循公理到官便求分司迴避出使致令官職失守勞逸不均伏請從今以後待次充使後即往分司如未出使不在分司限勅㫖依奏四年七月大理寺卿劉濛奏准文明元年四月勅律令格式為政之先有類凖繩不可乖越如聞内外官寮多不習律退食之暇各宜尋覽仍以當司格式書於㕔之壁俯仰觀瞻免使遺忘今以年代遐曠屋壁改移文字不脩瞻仰無所就中大理寺評斷之司尤為要切臣已於本寺㕔粉壁重寫今式格後勅㫖尚書省郎官亦委都省檢勘依舊抄撮要即寫於㕔壁其年十月大理少卿崔把奏當寺官人今後在寺詳斷或出使推案有犯贓私者請於常式加罪一等餘犯即准舊式從之鴻臚寺龍朔中改為司賔寺卿為正卿咸亨元年復為鴻臚寺光宅中改為司賔寺神龍元年復為鴻臚寺少卿初本一員景雲二年十一月四日加一員以劉興為之開元十九年十二月十三日勅鴻臚當司官吏以下各施門籍出入其譯語掌客出入客館者於長官下狀牒館門然後與監門相兼出入天寳八載三月二十七日勅九姓堅昆諸蕃客等因使入朝身死者自今後使給一百貫充𦵏副使及妻數内减三十貫其墓地州縣與買官給價直其墳墓所由營造十三年二月二十七日禮賔院自今後宜令鴻臚勾當檢校應縁供擬一物已上並令鴻臚大厯四年七月詔罷給客省之廩每嵗一萬三千斛永泰已後益多事四方奏討或連嵗不遣仍於右銀臺門置客省以居之上書言事者常百餘人蕃戎將吏又數十百人其費甚矣至是皆罷建中元年七月以鴻臚寺左右威逺營𨽻金吾元和九年六月置禮賔院於長興里之北司農寺龍朔二年改為司稼寺咸亨元年改為司農寺少卿武徳之初四員貞觀二年减兩員木炭使天寳五年九月侍御史楊釗充木炭使永泰元年閏十月京兆尹黎幹充木炭使自後京兆尹常帶使至大厯五年停貞元十一年八月戸部侍郎裴延齡充京西木炭使採造使十二年九月停景雲二年六月十三日勅中書門下御史臺尚書省造食戸衣糧令司農每季給付天寳元年六月司農少卿王翼奏應諸司諸禄望准開元二十八年十月十五日勑並令孟月三旬内給了仍望預分請日每司一時分付訖其厯便封送當寺若逢隂雨倉司灼然事故未得給者當日牒上所由待給諸司畢後准前勘㑹分付勅㫖依奏天寳五載三月勅司農錢穀是司其官人等並不在差使限乾元元年十月司農寺奏舊規名額仍為中署特望升入上署勅㫖依奏七年十月司農卿李模有罪免官初司農當供三宫各菜二千車以度支給車直稍賤又隂雨不時菜多傷敗模以度支為辭上責不先聞奏故免之於是模奏司農菜不足請京兆市之京兆尹薛珏萬年令韋彤禁有菜者私賣上令奪珏俸一月彤俸三箇月元和三年八月司農少卿崔酆奏停倉一員監事二員從之太和七年八月九日勅司農寺每年供宫内及諸廚各藏菜並委本寺自供其菜價委京兆府約每年時價支更不得配京兆府和市大倉出給納貞元五年司農少卿李堅立太倉石柱記云貞元五年四海文明天子唯穀是恤思富國使人之事莫若端本以尊農事故廪庾囷倉尤切聖慮俾少卿一人專領其署葢欲難其任而重其事也太府寺龍朔二年改為外府寺卿為正卿咸亨元年復為太府寺光宅中改為司府寺神龍元年復為太府寺少卿自武徳初置二人貞觀元年省兩員龍朔二年正月十五日加一員以韋思齊為之太極元年十二月十八日又加一員分為兩京檢校以崔諤為之丞自武徳初五員貞觀元年省一員常平署自顯慶三年十月三日置武徳八年九月勅諸州斗稱經太府較之開元九年勅格權衡度量并函脚雜令諸度以北方秬黍中者一黍之廣為分十分為寸十寸為尺二寸為大尺諸量以秬黍中者容一千二百粒為籥十籥為合十合為升十升為斗三斗為大斗十升為斛諸權衡以秬黍中者百黍之重為銖二十四銖為兩三兩為大兩十六兩為斤諸積秬黍為度量權衡者調鐘律測晷景合湯藥及冕服制用之外官私悉用大者京諸司及諸州各給秤尺及五尺度斗升合等様皆銅為之關市令諸官私斗尺稱度每年八月諸金部本府寺平較不在京者詣所在州縣平較並即署然後聽用十二年九月二十五日勅左右藏官典職在出納不得判攝外事及帖諸司天寳九載二月十四日勅自今以後麵皆以三斤四兩為斗鹽並勒斗量其車軸長七尺二寸除陌錢每貫二十文餘麪等同大厯十年三月二十二日勅自今以後應付行用斗秤尺度准式取太府寺較印然後行用至十一年十月十八日太府少卿韋光輔奏稱今以上黨羊頭山黍依漢書律厯志較兩市時用斗毎斗小較八合三勺有餘今所用稱每斤小較一兩八銖每銖六黍今請改造銅斗斛尺秤等行用制曰可至十二年二月二十九日勅公私所用舊斗秤行用已久宜依舊其新較斗秤宜停太和五年八月太府奏斗稱舊印本是真書近日已來假偽轉甚今諸省寺各撰新印改篆文勅㫖依奏六年四月勅金部所奏條流諸州府斗秤等諸州皆有太府寺先頒下銅升斗及秤見在每年較勘合守成規今若忽重條流又須别有徵歛無益於事徒為擾人宜並仍舊但令所在長吏切加㸃檢不得致有差殊少府監武徳初以兵革未定置軍器監廢少府監貞觀元年正月分太府中尚方左尚方右尚方織染方掌治方五署置少府監通將作國子為三監龍朔二年改為内府監咸亨二年復為少府監光宅年改為尚方監神龍元年復為少府監其官名隨監名改復也少監本一員太極元年二月十八日加一員以孔仲思為之至開元十一年罷軍器監𨽻入少府監為中弩坊更置少監一員統之以馮紹正為之十四年八月二十八日省一員中尚省初本中尚方天后時去方字避監號開元已來别置中上使以檢校進奉雜作多以少府監及諸司髙品為之永徽六年十一月詔曰少府監非軍國所須宗廟之用並不須飾以珠玉顯慶六年二月十六日勅南中省諸國舶宜令所司每年四月以前預支應須市物委本道長史舶到十日内依數交付價值市了任百姓交易其官市物送少府監簡擇進内景龍二年四月十四日勅少府每季先出錢二千貫别庫貯每别勅索物庫内無者即令市進皆須對主付值不得且令供物於後還錢其錢兼以絹布絲綿充數其祠祭明衣及布亦用此物充將作監龍朔二年改為膳工監咸亨年復為將作監光宅年為營膳監神龍元年復為將作監大監初本為大匠龍朔年為大監咸亨年為大匠天寶十二年為大監依舊少監初本一員大足元年二月六日加一員以楊務廉為之中校署自開元二年置天寳四載四月勅將作監所置且合取當司本色人充直者宜即簡擇發遣内作使典亦不得輒取外司人充其諸司非本色直及額外直者亦一切並停自今後更不得補置如嵗月深久尚或因人所由長官量事貶降其所應直决一頓配糴邊軍建中元年九月將作監上言宣政内廊有摧壊者今當脩之准隂陽書謂是嵗孟冬為魁剛不利脩作請卜他時上曰春秋之義啟塞從時若脩毁完敗何時之擇詭妄之書勿徵乃脩國子監武徳初為國子學𨽻太常寺貞觀元年五月改為監龍朔二年改為司成館咸亨元年復為國子監光宅元年改為成均監神龍元年復為國子監東都國子監龍朔二年正月十八日置學官學生分於兩教授祭酒自龍朔年改為大司成咸亨年復為祭酒光宅年改為成均祭酒神龍年復為祭酒貞觀中孔頴達為祭酒准故事上日開講五經題至天后朝諸武駙馬為祭酒乃判祥瑞案王道非舊典也司業自武徳初省貞觀六年二月二日置一員龍朔二年改為司成咸亨元年復為司業本一員太極元年二月十八日加一員以蕭憲為之國子博士自龍朔中改為司成宣業咸亨中復舊丞自武徳初因隋之舊置一員長安四年四月四日勅國子監宜置侍講四人四考聽選大厯五年八月皇太子於國學行齒胄之禮國子司業歸崇敬以國學及官名不稱請改之上疏曰禮記王制曰天子學曰辟雍又五經通義云辟雍養老教學之所也以形制言之雍壅也辟璧也壅水環之圜如璧形以義理言之辟明也雍和也言以禮樂明和天下禮記亦謂之澤宫射義云天子將祭必先習射於澤宫故前代文士亦呼為璧池亦曰璧沼亦謂之學省後漢光武立明堂辟雍靈臺謂之三雍至明帝躬行養老于其中晉武帝亦作明堂辟雍行鄉飲酒之禮又别立國子學以殊士庻永嘉南遷唯有國子學不立辟雍北齊立國子寺隋初亦然至煬帝大業十三年改為國子監今國家富有四海聲名文物之盛唯辟雍獨闕伏請改國子監為辟雍省又以祭酒之職非學官所宜按周禮師氏掌以媺詔王教國子請改祭酒為大師氏位正三品又司業者義在禮記云樂正司業正長也言樂官之長司主此業爾雅云大板謂之業按詩周頌設業設簴崇牙樹羽則業是懸鐘磬之簴也今大學既不教樂於義則無所取請改司業一為左師一為右師正四品上又以五經六籍古先哲王致理之式也國家創業取士之法立明經發微言于衆學釋回増美選賢與能自艱難以來取人額易考試不求於文藝及第先取於帖經遂使顓門業廢請益無從師資禮虧傳授義絶今請以禮記左傳為大經周禮儀禮毛詩為中經尚書周易為小經各置博士一員其公羊穀梁文疏既少請共准一中經通置博士一員所擇博士兼通孝經論語依憑章疏講解分明注引旁通問十得九兼徳行純㓗文辭雅正儀刑規範可為師表者令四品已上各舉所知在外者給驛年七十已上者備禮徵聘其國子四門太學三館各立五經博士品秩上下生徒之數各有差其舊博士助教直講直經及律館筭館書館助教請皆罷省其教授之法學生至監謁同業師其所贄脩一束清酒一壺衫布一段其色隨師所服師出中門延入與坐割脩酌酒三爵而止乃發篋出經摳衣前請師為依經辨理舉一隅然後就室每朝晡二時居講堂說釋道義發明大體兼教以文行忠信之道示以孝悌睦友之義旬省月試時考嵗貢以生徒及第多者為博士考課上下疏奏不從元和元年正月勅自今以後國子祭酒司業及學官並須取有徳望學識人充四月國子祭酒馮伉奏應解學生等國家崇儒本於勤學既居庠序宜在交脩其有藝業不勤逰處非類樗蒲六博酗酒喧争凌慢有司不脩法度有一於此並請解退又有文章帖義不及格限頻經五年不堪申送者亦請解退其禮部所補生到日亦請准格帖試然後給廚後每日一度試經一年等第不進者停廚庻以上功示其激勸又准格九年不及第者即出監聞比來多改名却入起今以後如有此類請類送法司准式科處勅㫖依奏二年八月國子監奏准勅今月二十四日諸州府鄉貢明經進士見訖宜令就國子學官講論質定疑義仍令百寮觀禮者伏恐學官職位稍卑未足飾揚盛事伏請選擇常叅官有儒學者三兩人與學官同為講說庻得聖朝大典輝映古今於是命兵部郎中蔣武考功員外郎劉伯芻著作郎李藩太常博士朱頴郯王府諮議張廷珪同赴國子監論講其年十二月國子監奏兩京諸館學生縂六百五十員請每館定額如後兩監學生總五百五十員國子館八十員太學七十員四門館三百員廣文館六十員律館二十員書館十員筭館十員又奏伏見天寳以前國館學生其數至多並有員額至永泰後西監置五百五十員東監近置一百員未定每館員額今謹具定額如後伏請下禮部准額補置勅㫖依奏其年十二月勅東都國子監量置學生一百員國子館十五員太學館十五員四門館五十員廣文館八員律館五員書館三員筭館二員十三年十一月祭酒鄭餘慶以太學荒墜日乆生徒不振遂請率文官俸禄脩廣兩京國子監時論美之十四年十二月鄭餘慶又奏京見任文官一品以下九品以上并外使兼京正員官每月所請料錢請毎貫抽一十文以充國子監脩造文宣王廟及諸屋宇并脩理經營監中公廨雜用有餘添充本錢及諸色遂便宜處置勅㫖依奏長慶二年閏十月祭酒韋乾度奏當監四館學生每年有及第闕員其四方有請補學生人並不曽先於監司陳狀便自投名禮部計㑹補署監司因循日久官吏都不稱舉但准禮部關牒收管有乖太學引進之路臣忝守官請起今已後應四館有闕其每年請補學生者須先經監司陳狀請替某人闕監司則先考試通畢然後具姓名申禮部仍稱堪充學生如無監司解申請不在收管之限舊例每給付厨房動多喧競請起今已後當監進士明經等待禮部置闕畢牒到監司則重考試其進士等若重試及格當日便給㕑及房其明經等考試及格後待經監司牒送則給廚房庻使息喧爭當監四館學生有及第出監者便將本住房轉與親故其合得房學生則無房可給請起今已後學生有及第出監者仰館子先通狀納房待有新補學生公試畢後便給令居住當監承前並無專知館博士請起今已後毎館衆定一人知館事如生徒無故喧競者仰館子與業長通狀領過知館博士則准監司條流處分其中事有過誤衆可容恕監司自議科决如有悖慢師長强暴鬬打請牒府縣錮身逓送鄉貫勅㫖冝依大和五年十二月國子祭酒裴通奏當司所授丞簿及諸館博士助教直講等謹按六典云丞掌判監事凡六學生毎嵗月業成上於監者以其業與司業祭酒試之明經帖經口試䇿經義進士帖中經試雜文䇿時務徵故事注云其試法皆依考功口試明經帖限通八以上明法算皆通九以上主簿掌印勾檢凡學生有不率師教者則舉而免之其頻三年下第九年在學無成者亦如之注云假如違程限及作樂雜戲者亦同惟彈琴習射不禁諸博士助教皆分經教授學者每授一經講未終不得改業諸博士助教皆計當年講授多少以為考課等級應補當司諸學生等按學令云諸生先讀經文通熟然後按文講義毎旬放一日休假前一日博士考試其試讀每千言内試一帖二三言講義者每二千言内問大義一條總試三條通二為及第通一及不全通者斟量决罰謹具當司官吏及學生令典條件如前伏望勑下有司允臣所奏勅㫖宜依七年八月國子監起請准今月九日徳音節文令監司於諸道搜訪名儒置五經博士一人者伏以勸學專門復古之制博採儒術以備國庠作事之初須有奬進伏請五經博士秩比國子博士今左氏春秋禮記周易尚書毛詩為五經若論語爾雅孝經等編簡既少不可特立學官便請依舊附入中經勅㫖依奏其年十二月勅於國子監講堂兩廊創立石壁九經并孝經論語爾雅共一百五十九卷字様四十九卷開成元年宰相兼國子祭酒鄭覃奏請置五經博士各一人縁無禄俸請依王府官例給禄粟從之二年八月國子監奏得覆定石經字體官翰林待詔唐𤣥度狀伏准太和七年二月五日勅覆九經字體者今所詳覆多依司業張叅五經字為准其舊字様嵗月將久畫㸃參差傳寫相依漸致乖誤今並依字書與較勘同商較是非取其適中纂録為新加九經字様一卷請附於九經様之末用證紕誤勅㫖依奏四年二月中書門下奏伏以朝廷興復古制置五經博士以奬顓門之學為訓胄之資必在得人不限官次今定為五品俸入四方有經術相當而秩卑身賤者不可以超授有官重而通詩達禮者不可以退資從今已後並請勑本色人中選擇據資除授令兼博士其見任博士且仍舊勅㫖宜依大中三年十一月國子祭酒馮審奏孔子廟堂碑是太宗皇帝建立睿宗皇帝書額備稱唐徳具賛鴻猷文翰顯然貞石斯在洎武后權政國號僣竊於篆額中間謬加大周兩字今豈可尚存偽號以紊清朝疑誤將來流傳僣謬其大周兩字伏望天恩許令琢去謹録奏聞勅㫖馮審所請刋正訛文頗協事體宜依廣文館天寳九年七月十三日置領國子監進士業者博士助教各一人品秩同太學以鄭䖍為博士至今呼鄭䖍為鄭廣文書算學博士貞觀十三年十二月二十一日置𨽻國子學律學博士顯慶元年十二月十九日尚書左僕射於志寧奏置令習李淳風等注釋五曹孫子等各部武經分為二十卷行用顯慶三年九月四日詔以書算學業明經事唯小道各擅專門有乖故實並令省廢至龍朔二年五月十七日復置律學書算學官一員至三年二月十日以書學𨽻蘭臺算學𨽻秘書局律學𨽻詳刑寺軍器監武徳元年置貞觀六年三月十日廢併入少府監開元三年十二月二十四日以軍器使為監領弩甲二坊十年十一月二十五日罷𨽻入少府監為甲弩坊如少監一員以統之天寳六年五月二十八日復置乾元元年六月十三日又廢却置使其監已下並停北京軍器庫開元十一年五月五日置二十六年五月十八日廢依舊為甲坊乾元元年六月勅軍器監改為軍器使大使一員副使二員判官二員其使以内官為之貞元四年二月自武徳束門築垣約在藏庫之北屬於官城東垣於是武庫遂廢其軍式器械𨽻於軍器使都水監武徳年置𨽻將作監貞觀六年八月六日置監罷將作監龍朔二年改為司津監咸亨元年復置垂拱元年二月改為水衡監神龍元年復為都水監使者自武徳初為都水令貞觀八年改為使者龍朔年改為監咸亨年改為使者垂拱年改為都水府神龍年改為使者諸津其在京兆河南府界者𨽻都水監外州者𨽻當界州縣大厯六年十一月三日勅應祠祭乾魚宜令都水監依様每年起十月造掌隨祭供用其醢魚肉據用數依限送光禄寺令供造宫苑監武徳九年七月十九日置洛陽宫監顯慶二年十二月十日廢洛陽總監改青城宫監為東都苑北面監明徳宫監為東都苑南面監洛陽宫農圃監為東都苑東面監食貨監為東都苑西面監天寳十年八月二十七日勅白獸日華叡武南辟伏等門宜令宫苑通管捉西京苑總監永淳元年五月十日置東都監管諸囿苑未置已前𨽻司農寺先天元年十月十日勅總監每年支雜物到其抄數於本門進若宫内所須别索供訖每月終宜令監司具破用數進開元七年七月十一日勅總監破用錢物一事已上須南衙勾當宜令總監自勾每月進一本厯來内自勾勘寶厯二年十二月勅總監職掌官員並宜停廢一百二十四人先屬諸軍各歸本司餘七百三人勒納牒身放歸本管開成五年四月勅總監宜令内官司管仍别置使其管監及丞簿共四員宜並停唐㑹要卷六十六
