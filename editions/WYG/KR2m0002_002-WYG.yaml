body:
  text: 唐會要卷二宋王溥撰帝號下文宗元聖昭獻孝皇帝諱昻穆宗第二子母曰貞獻皇后蕭氏元和四年己丑歳十月十日生以其日為慶成節長慶元年二月封為江王名涵寳應二年十二月即位改名昻年十八開成五年正月四日崩于大明宫之太和殿年三十二八月葬章陵在京兆府富平縣界諡曰元聖昭獻孝皇帝廟號文宗哀册文中書侍郎平章事鄭覃撰諡册文中書侍郎平章事李珏撰諡議太常少卿楊敬之撰年號二太和盡九年開成五年宰相二十三人杜元穎王播李逢吉牛僧孺李程竇易直裴度韋處厚楊嗣復李珏路隋李宗閔段文昌宋申錫李德裕李固言鄭覃王涯李訓賈餗舒元輿李石陳夷行使相五人烏重𦙍史憲誠王智興李載義劉從諫武宗至道昭肅孝皇帝諱炎穆宗第五子母曰宣懿皇后韋氏元和九年甲午歳六月十一日生于東宫以其日為慶陽節長慶元年三月封潁王名瀍開成五年正月立為皇太子其年即位年二十七會昌二年正月上尊號曰仁聖文武至仁大孝皇帝五年正月又上尊號曰仁聖文武章天成功神德明道至神太孝皇帝六年三月改名炎其月二十三日崩年三十三八月葬端陵在京兆府三原縣界諡曰至道昭肅諡議禮部侍郎陳商撰年號一㑹昌盡六年宰相十五人李固言李石楊嗣復李珏崔鄲牛僧孺崔珙李德裕陳夷行李紳李讓夷崔鉉杜悰李曰鄭肅使相四人劉從諫王達王起何𢎞敬宣宗聖武獻文孝皇帝諱忱憲宗第十三子母曰孝明皇后鄭氏元和五年庚寅六月二十三日生于大明宫以其日為夀昌節長慶元年辛丑封光王名怡會昌六年丙寅三月二十一日武宗不豫立皇太弟勾當軍國翌日即位改名忱年三十七大中二年戊辰正月上尊號曰聖敬文思和武光孝皇帝大中三年己夘八月七日崩于大明宫年五十大中十四年二月庚辰葬貞陵在京兆府雲陽縣界諡曰聖武獻文孝皇帝廟號宣宗哀册文中書侍郎蔣伸撰諡册文門下侍郎平章事夏侯孜撰諡議兵部侍郎鄭穎撰咸通十三年壬申追崇尊號曰元聖至明成武獻文睿智章仁神聰懿道孝皇帝年號一大中十三年宰相二十三人李讓夷李紳鄭肅李回白敏中韋琮崔元式李德裕盧商馬植周墀崔龜從任銘魏扶令狐綯裴休魏謩崔慎由鄭朗蕭鄴劉瑑夏侯孜蔣伸使相十一人魏謩杜惊崔鄲王元達何𢎞敬王起張仲武崔慎由盧耽白敏中鄭注懿宗昭聖恭惠孝皇帝諱漼宣宗長子母曰元昭皇后晁氏太和七年癸丑十一月十四日生于藩邸以其日為延慶節大中元年丙寅封鄆王名温大中十三年己夘八月立為皇太子監國改名漼翌日宣宗崩即位年二十七咸通三年壬午正月上尊號曰睿文明聖孝德皇帝咸通十二年壬午正月上尊號曰睿文英武明德至仁大聖廣孝皇帝咸通十四年癸巳七月崩于咸寧殿年四十一乾符元年二月甲午葬簡陵在京兆府富平縣界諡曰睿文昭聖恭惠孝皇帝廟號懿宗哀册文中書侍郎平章事崔彦昭撰諡册文門下侍郎平章事王鐸撰諡議禮部侍郎崔沆撰年號一盡咸通十四年宰相二十一人令狐綯白敏中蕭鄴夏侯孜蔣伸杜審權杜悰畢諴楊收曺確髙璩蕭寘徐商路巖于琮韋保衡王鐸劉瞻劉鄴趙隱蕭倣崔彦昭使相十人盧耽何𢎞敬張允伸何全皥李福崔慎由崔鉉康承訓曺確韋宙僖宗惠聖恭定孝皇帝諱儇懿宗第五子母曰惠安皇后王氏咸通三年壬午五月八日生于東内以其日為應天節初封晉王名儼咸通十四年癸巳七月立為皇太子改名儇是月懿宗崩即位年二十乾符二年乙未正月上尊號曰聖神聰睿仁哲明孝皇帝文德元年戊申二月又上尊號曰聖文睿德光武𢎞孝皇帝三月崩于武德殿年二十七文德元年十二月葬靖陵在京兆府奉天縣界諡曰惠聖恭定孝皇帝廟號僖宗哀册文中書侍郎平章事孔緯撰諡册文門下侍郎平章事韋昭度撰諡議右丞權知禮部侍郎桞玭撰年號五乾符七年改廣明元年廣明二年改中和元年中和五年改光啟元年光啟四年改文德元年宰相二十三人蕭倣崔彦昭鄭畋盧携王鐸李蔚鄭從讜崔沆豆盧瑑王徽裴澈蕭遘韋昭度鄭昌圖杜讓能孔緯張濬韋保衡趙隱劉鄴裴坦鄭昭業裴流使相六十人王鐸鄭從讜髙駢李可舉王重榮李克用陳敬璌朱玫孫惟晟李巨威張均李孝德陳珮鍾傅李鋌李茂貞朱全忠王處存東方達令狐綯杜悰路巖曹確杜審權趙隱李蔚韋昭度鄭畋李都崔安潛周寳張允伸王銘劉鄴王重盈王行瑜李昌言李昌仁李昌符齊克儉齊克讓楊師立朱瑄滿存樂彦貞劉臣客李希昌韓君雄韓簡在王思恭朱最安師儒周秦宗權楊全正楊守亮楊守忠楊守信崔彦明曹晟昭宗聖穆景文孝皇帝諱曄懿宗第七子母曰安惠皇后王氏咸通八年三月二十三日生于東内以其日為嘉會節十三年壬辰四月封壽王名傑乾符四年丁酉遥鎮幽州又名敏文德元年戊申三月立為皇太弟監國翌日即位并改名曄年二十二大順元年庚戌正月上尊號曰聖文睿德光武𢎞孝皇帝天祐元年甲子八月梁王密令蔣𤣥暉等弑于東都椒殿年三十八葬和陵在河南府緱縣界諡曰聖穆景文孝皇帝廟號昭宗哀册文中書侍郎平章事栁璨撰諡册文右僕射平章事裴樞撰諡議太常卿王溥撰年號七龍紀二年改大順大順三年改景福景福三年改乾寜乾寧五年改光化光化四年改天復天復四年改天祐宰相二十五人韋昭度孔緯杜譲能張濬劉崇望崔昭緯徐彦若鄭廷昌王摶崔𦙍李磎陸扆孫偓鄭綮朱樸崔逺裴贄裴樞王溥獨孤損桞璨陸希聲蘇檢盧光啟韋貽範使相三十九人李鋌張全義孫惟晟王重盈錢鏐羅𢎞信李罕之雷滿王建趙匡凝成汭孫德昭周承誨李匡威楊守信張鈞陳鳯趙德禋崔安潛董彦張漢瑜韋昭度王鎔王處直陳敬宣朱瑄時溥王拱杜漢劉崇望朱全忠李思恭王行瑜李茂貞王正李守亮楊守忠顧彦明曹晟哀皇帝諱柷昭宗第九子母曰積善太皇后何氏景福元年壬子九月三日生于大内以其日為乾和節乾寜四年丁巳封輝王名祚天復三年癸亥二月拜開府儀同三司充諸道兵馬元帥天祐元年甲子昭宗崩翌日蔣𤣥暉矯遺詔以帝即位改今名年十三天祐四年丁夘三月禪位于梁梁奉帝為濟隂王遷於曹州明年二月遇害前刺史氐叔琮之第年十七葬濟隂之定陶鄉諡曰哀皇帝後唐莊宗初就故陵置園邑有司請諡曰昭宣光烈孝皇帝廟號景宗中書復奉據少帝行事不合稱宗存諡而已知禮者亦以昭宣之諡非宜年號一盡天祐四年宰相六人張樞獨孤損崔逺桞璨張文蔚楊涉使相十三人王師範錢鏐韓建張全義王鎔羅紹威劉仁恭朱全忠王處直李茂貞趙德諲王建趙匡凝雜録大厯十四年七月禮儀使吏部尚書顔真卿上言髙祖至肅宗七聖廟號尊號名文字繁多皇帝則悉有大聖之號皇后則盡有順聖之名使言之者惑於今行之者異於古請髙祖以下累聖諡號悉取初諡為定謹按舊制上諡號髙祖為武皇帝太宗為文皇帝髙宗為天皇大帝中宗為孝和皇帝睿宗為聖真皇帝𤣥宗為孝明皇帝肅宗為孝宣皇帝其廟號如故仍請凖漢魏及國朝故事於尚書省議定奏御乃令尚書省議之時以諡號前後繁多不經儒學之臣思改者久矣會真卿上奏皆謂必克正焉而兵部侍郎袁傪官以兵達不詳典故乃上言陵廟中玉册既刋矣不可輕改遂罷之傪曾不知陵中玉册實紀其初號後雖追尊而册文如故興元元年正月上在奉天頒罪已之詔讓去徽號其後雖翦大盜復天步羣臣屢請終不許焉元和十五年四月禮儀使奏羣臣告天請大行皇帝諡凖禮及故事合集中書門下御史臺五品以上尚書省四品以上于南郊告天畢議定然後連署奏聞太和七年十二月宰臣王涯等四人上表請册徽號不許至開成二年二月因御紫宸殿宰相鄭覃李固言李石等以請諸道節度觀察使頻有表章以加徽號為請上固謙抑不允其月自朔至晦諸道節度觀察使請上徽號者凡二十餘道或再請三請者皆報不許焉大中三年十二月二十五日追尊順宗憲宗諡號初羣臣以河湟既復請加尊號上深執謙讓三表不許曰河湟已復繼承先志朕欲追尊順宗憲宗諡號以成功烈其事如何宰臣白敏中等對曰臣等愚昧思慮所不及故遂行之至册日上御宣政殿百僚拜訖乃降階受玉册于太尉拜受訖授禮官將奉迎以退上俯僂不瞬目送使者流涕嗚咽俟太尉奉策出升殿羣臣莫敢動焉先是中書門下奏追尊二祖儀注皇帝行事與差官展禮舊記不同禮許從宜不必法古臣等商量其日皇帝于宣政殿受玉册遣宰相已下持節奉册赴太廟庶協典禮詔可之天祐二年三月起居郎蘇楷議昭宗諡號曰皇帝御宇宙治亂以審汙隆宗祀配天資諡以定升降故臣下君上皆不得而私也有司先定尊諡曰聖穆景文孝皇帝廟號昭宗按後漢和帝安帝順帝縁非功德遂加尊稱亦允臣下之請今郊禋有日祫祭惟時伏望别議新廟之稱庶協先朝罪已之德于是太常卿張廷範改諡曰恭靈莊閔孝皇帝廟號襄宗楷禮部尚書循之子凡劣無藝乾寧二年應進士登第物論以為濫昭宗命翰林學士陸扆祕書監馮渥復試黜落不許再入舉塲楷負愧銜怒至是與起居郎羅扆起居舍人盧鼎連署議楷目不知書其文羅扆所作盖時政出賊臣哀帝亦不能制之也追諡皇帝孝敬皇帝諱𢎞髙宗第五子永徽六年正月封代王七年六月六日册為皇太子上元二年四月二十五日薨于合璧宫倚雲殿正月五日贈諡曰孝敬皇帝殤皇帝重茂中宗第四子聖厯三年臘月封北海郡王神龍元年二月改封温王景龍四年六月册為皇太子七日即王位二十四日讓位于睿宗降封温王景雲二年正月改封襄王集州安置開元二年四月薨于房州年十七追諡殤皇帝讓皇帝憲睿宗長子本名成器文明元年立為皇太子及睿宗降為皇嗣更改為皇孫後為蔡王又為宋王復為寧王開元二十九年薨追册讓皇帝葬惠陵奉天皇帝琮𤣥宗長子本名嗣直封剡王改名潭又名琮天寳十載薨諡靖徳皇太子肅宗元年追册為奉天皇帝葬齊陵承天皇帝倓肅宗第三子本封建寧郡王薨寳慶初贈封齊王大厯三年追封承天皇帝葬順陵雜録龍朔元年孝敬命太子賔客許敬宗等于文思殿博採古今集摘其英詞麗句以類相從勒成五百卷名曰瑤山玉彩表上之賜物三萬段總章元年二月勅征遼軍逃亡限内不首及更有逃亡者身並處斬家口沒官孝敬上表切諫請免其配沒從之其月親釋奠司成館因請贈顔回太子少師曾參太子少保制並從之咸亨二年駕幸東都太子監國時屬大旱闗中饑乏取廟下兵馬糧視之見有食榆皮蓬實者乃令衆寺各給米使足時義陽宣城二公主以母得罪幽于掖庭太子見之驚惻遽奏請出降又請以同州沙地分借貧人詔並許之承天皇帝倓既為張良娣所譖肅宗怒而幽死又欲搖動代宗時代宗收復兩京遣判官李泌入朝獻捷從容語及倓事泌曰臣幼稚時念得黄臺瓜辭陛下聞其說乎髙宗天帝有子八天后所生子自為行第故睿宗第四長曰孝敬皇帝𢎞為太子監國仁明孝悌天后方圖臨朝乃鴆殺之立雍王賢賢每自憂惕知必不保全與二子同侍父母之側無由敢諫乃作黄臺瓜辭令樂工歌之冀天后聞之哀愍辭曰種瓜黄臺下瓜熟子離離一摘使瓜好再摘令𤓰稀三摘尚自可四摘抱蔓歸太子賢終為天后所逐死于黔中陛下有今日運祚已一摘矣慎無再摘上愕然曰卿安得有是言自是奪宗之計不行𤣥宗嘗與讓帝憲及岐王範等書曰昔魏文帝詩云西山一何髙髙髙殊無極上有兩仙童不飲亦不食賜我一丸藥光輝有五色服藥四五日身體生羽翼朕每思服藥而生羽翼何如骨肉兄弟非天生之羽翼乎夫陳思王有超代之才堪任經國之務絶其朝謁卒令憂死魏祚未終􅇜司馬宣王之奪豈神丸之効也虞舜之聖捨傲象之􅄽以親九族九族既睦平章百姓此為帝王之軌則于今數千歳天下歸善焉朕未嘗不廢寢忘餐欽歎也頃因餘暇妙選仙經得此神効方古老云服之必騐今分此藥願與兄弟同保長齡永無限極時申王等皆先薨唯憲獨在上尤加恩貸每至憲生日必幸其宅移時宴樂居常無日不賜憲酒酪及異饌等尚食總監及四方有所進獻食稍甘即皆分以賜之憲奏請年終録付史館每年至數百紙開元二十九年冬十月京城寒甚凝霜封樹學者以為春秋雨木冰即是亦名樹介言其象介胄也憲見而歎曰此俗為樹架者也諺曰樹生架達官怕必有大臣當之我其死矣其年十一月薨上聞之號呼失聲左右莫不掩淚唐會要卷二
