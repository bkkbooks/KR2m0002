body:
  text: 唐㑹要卷三十八宋王溥撰服紀下貞元二年十一月德宗王皇后崩上及百官已釋服唯皇太子及舒王誼以下則皆否將及三年之制也初禮官議大行皇后䘮服節攝太常博士桞冕等七人奏請皇太子依魏晉故事為大行皇后䘮服既𦵏而虞虞而卒哭卒哭而除心䘮終制庶存厭降之禮既而事下中書宰臣召問禮官曰今豈可令皇太子衰服侍膳直至于既塟乎博士張薦等請依宋齊皇后為父母䘮三十日公除例為皇太子䘮服之節既及公除詣于正内則服墨縗至本院縗麻如故庻允通變之情宰臣具以聞奏右補闕穆質上䟽曰臣謹按禮經兼徵近古皇太子居母后之䘮並無降殺之禮唯西晉杜元凱有既𦵏除服之論葢穿鑿詭詞以媚時主誠不足為後王法也臣愚以為遵三年之制則太重從三十日之服則太輕唯行古之道以周年乃得禮之中矣詔宰臣更與所司議之宰臣以穆質所奏召問禮官而不言質名禮官桞冕張薦對曰准禮三年之喪無貴賤一也豈有父母貴賤而差降喪服節乎且禮有公門脫齊衰開元亦云皇后為父母服十三月其禀朝㫖則十三日而除又皇太子為外祖父母服五月其從朝㫖則五日而除所以然者恐喪服侍奉有傷至尊之意也故從權制變昭著國章公門脫縗義亦在此豈皆為金革乎皇太子今若抑哀公除墨縗朝覲至本院依舊縗麻酌而變通庶可𫝊繼宰臣然其對遂命太常卿鄭叔則草議奏曰准禮子為母齊衰杖周更無貴賤降殺之别伏以聖上以大中立教以至孝興理憲章古道肅慎禮文皇太子禀訓睿哲因心孝敬緣情酌禮復古為宜准禮既塟卒哭十一月小祥十三月大祥十五月禫至于昏定晨省問安視膳不可服衰麻宻近宸扆伏請每詣正内覲謁暫服墨縗歸至本院依舊縗麻庶適變通允叶情禮上令宰臣召穆質議焉對曰雖不能遂皇太子三年之志且逺依古禮猶愈魏晉之文請降制命宜行於外亦不妨皇太子在内墨縗也制可之其月詔百官及宗室諸親舉哀兩儀殿臨畢百辟素服視事及大殮成服百官服三日及甲辰之夕釋之用晋文明皇后崩天下發哀三日止之義其文武六品已上非常參官及士庶等各於本家素服臨外命婦各於本家素縵朝夕臨五日六年正月詔百官有私喪公除者聼赴宗廟之祭初御史監察者以開元禮凢有緦麻以上喪不得饗廟移牒吏部告以奏差祭官有私喪者勿預吏部奏曰准禮諸侯絶周大夫緦者所以殺旁親不敢廢大宗之祭事則緦不祭者謂同官未𦵏欲人之吉凶不相凟也魏晉已來降變而從權緦已上喪服内衣縗謂之喪服假滿則吉謂之公除凢既𦵏公除則無事不可故江右潭殷仲堪並云既𦵏公除廢祭者非也故其時公除者則行公祭蓋大夫不敢以家事辭王事春秋之義也今國家行公除之令既以即吉於祭無妨私家之祭則無廢者公家之祭則猶禁之是有司限文進退唯谷若以服為禁即懼虧祭禮若以例奏差則懼違令文先王立禮所以進人為善也立法所以禁人為非也彼公除者各思君親莫不欲祭使子得祭其父孝莫大焉臣得祭其君義莫重焉茍祭而不許是禁人為善也茍私祭不禁則公祭無嫌是則垂之空文不若行其變禮今請申明舊令使行之可守凡有縗服既𦵏公除及聞哀假滿者許吉服赴宗廟之祭其尚未塟雖公除者請依前禁之庶輕重有倫以一王法從之八年九月以前太子賔客李愿為太子賔客前衛尉少卿李怤為韶王少傅愿怤皆太尉晟之子居母喪既大祥而除官晟以二子未禫訪於諸相趙璟陸贄謂曰故事有大祥授官者皆終禫而後朝請晟乃奏行之貞元十一年河中府倉曹参軍蕭據􅃺稱堂兄姪女子適李氏壻見居喪今時俗婦為舅姑服三年恐為非禮請禮院詳定垂下詳定判官前太常博士李岩議曰謹按大唐開元禮五服制度婦為舅姑及女子適人為其父母皆齊衰不杖周稽其禮意抑有其由也蓋以婦人之道以専一不得自逹必繫於人故女子適人服其夫斬而降其父母喪服𫝊曰女子子適人為父母何以周也婦人不二斬婦人從人無専用之道故未嫁從父既嫁從夫夫死從子父者子之天也夫者妻之天也先聖格言歴代不易以此論之父母之喪尚止周歳舅姑之服無容三年且服者報也雖有加降不甚相懸故舅姑為婦大功九月以卑降也婦為舅姑齊衰周年以尊加也其父母舅姑除變之節十二月小祥除服絰十三月大祥除衰寝去絰十五月而禫踰月後吉永貞九年九月禮儀使奏孫為祖母合服齊衰五月漢魏以來時君皆行易月之制皇帝為曽太皇太后沈氏合五日而除内外百寮並令從服以五日為制其在興慶宮當侍奉太上皇者十三日而除從之開成三年十月中書門下奏皇太子今月十六日薨十六日舉哀二十八日公除臣等參詳惠昭太子例蓋緣在公除内今從舉哀日數至二十八日十三日滿合公除不合更待輟朝日滿臣等商量望令百寮二十九日槩行參假便赴延英奉慰勅㫖宜依㑹昌五年正月兵部尚書歸融奏伏覩義安殿皇太后遺令皇帝三日不聼政十三日小祥二十五日大祥二十七日釋服者皇帝遵奉遺㫖將欲施行臣等商量事貴得中禮從順變伏以宣懿皇太后常奉太皇太后之命追尊徵召祔配廟室今之議禮合有等差伏請皇帝降服朞行以日易月之制十三日釋服其内外臣寮亦請以此除釋至于營奉陵寢制度法物即請准舊例更無降制從之大中六年十月詔有司宰臣周親䘮故欲行宣弔之禮宜令叅酌太常禮院奏曰宰臣周親如是伯叔及親兄弟或曽居重任或位列朝行七品已上官則請行宣弔之禮如年齒㓜官位卑及其餘周親事並請不用遣使庶輕重之宜有節降殺之義得中若宣弔例以朞年伏慮有煩聖聴從之奪情武德二年正月四日尚書左丞崔善奏曰欲求忠臣必于孝子比為時多金革頗遵墨縗之義丁憂之士例從起復無識之輩不復戚容如不糾劾恐傷風俗至九月制凡文官遭父母喪聴去職儀鳯二年十一月六日太常少卿韋萬石奏太常博士弟子等有遭憂者請百日之後量追赴上奉勅依侍御史劉思立奏曰竊以移風易俗莫善于樂睦親化人莫先于孝所以三年之禮貴賤咸遵金革之事始有墨縗縱此輩小人先無俯就猶有在其上者朂以企及若遣釋服作樂則甚紊禮經帶絰理音又全虧國體豈以其居家不能執禮遂欲曺司約為非法萬石身居禮樂之官輙昧吉凶之本頒之庶士理恐未安既爽風化之源請舉糺繩之典萬石請付法司科斷音聲人請停追至開元十三年車駕將赴東岳太常追孝假音聲人從駕華州刺史楊瑒奏曰臣竊考經𫝊喪記有文歴代相因損益無替斯事體大人誰敢違國家孝理天下超跡百王焉可以苴絰之人叶鐘磬之樂既傷徃教復玷清猷良史見書難為直筆臣職惟宣化期不奉詔上嘉之調露二年中書舍人歐陽通起復本官每入朝必徒跣至城門外始著鞾靺而朝直宿在省則席地藉藁非公事不言亦未嘗啟齒歸必衣衰絰號慟無常國朝奪情者多矣惟通能合典禮長安三年正月二十六日勅三年之喪自非從軍要籍者不得輙奏請起復至廣德二年二月二十一日勅三年之喪謂之逹禮自非金革不可從權其文官自今已後並許終制一切不得輙有奏聞景龍三年以前工部侍郎張說起復為黄門侍郎說乞終喪制三表許之其年十一月以前昭容上官氏起復為媫妤貞元十三年七月張茂宗將尚公主太常博士裴堪上䟽曰伏見駙馬都尉張茂宗猶在母喪聖恩念其亡母遺表所許公主今年八月出降仍令茂宗借吉就昏者伏以夫婦之義人倫大端所以關雎冠詩之首者王化之先也天屬之親孝行為本所以齊衰在服之重者人道之厚也聖王知二端為訓之本不可變也故制昏禮曰納采問名納吉納徵皆主人几筵聽命於廟稱事立禮通謂之嘉所以上承宗廟下繼後嗣也又制喪禮曰創巨者其日久痛甚者其愈遲三年之喪二十五月而畢稱情立文通謂之凶所以送死有已復生有節也然後夫義婦聼父慈子孝馴致不失臻于太和歴代寳之以為至教昔魯侯改服晉襄墨縗事重於奪情義許其權變又兵法鑿門而出以喪禮處之以情相因體或有類若茂宗釋縗服而衣冠裳去堊室而行親迎雖云輟哀借吉是亦以凶凟禮豈惟失先王之重典抑亦為國家之爽法儻茂宗留俟免喪則日月非逺今公主指期下嫁又儀注有嫌固不可廢重而就輕捨大而取小伏惟皇帝陛下體天撫運綂天立法何嘗不守先王之至徳徃聖之明謨下盡羣言上留𤣥鍳尋倫式序懿範昭明所以八表肅清四夷歸化方宏禮義之日大敦名教之時于無為之朝有興議之事衆情未逹疑懼交深伏願抑茂宗亡母之誠顧典章不易之義待其終制然後賜婚收天情于至難察有司之懇守垂之史册聖徳彌光則天下幸甚大中五年八月宰臣奏伏以通喪三年臣庻一致金革無避軍旅從權近日諸使及諸道多奏請與人吏職掌官并進奏官等起復因循既久訛弊轉深非唯大啓倖門實亦頗紊朝典臣等商量自今已後除持勑及翰林并軍職外其諸司諸使人吏職掌官并諸道進奏官並不在更請起復授官限其間或要藉驅使官任准舊例暫追署職令勾當公事待服闋日即任依前奏官從之十二年二月以前右金吾將軍鄭漢璋前鴻臚少卿鄭漢卿並起復授本官以國舅光之子也塟舊制銘旌三品已上長九尺五品已上長八尺六品已下七尺皆書云某官封姓名之柩舊制凡治喪大臣一品則鴻臚卿䕶其喪事二品則少卿三品丞一人徃皆命司儀以示制舊制應給鹵簿職事四品已上散官二品已上及京官職事五品已上凡婚塟皆給之舊制碑碣之制五品已上立碑螭首龜跌上髙不過九尺七品已上立碑圭首方趺上髙不過四尺若隠倫道素孝義著聞雖不仕亦立碣凢石人石獸之類三品已上用六五品已上用四武德六年二月十二日平陽公主𦵏詔加前後皷吹太常奏議以禮婦人無鼓吹髙祖謂曰鼓吹是軍樂也徃者公主于司竹舉兵以應義軍既嘗為將執金鼓有克定功是以周之文母列于十亂公主功參佐命非常婦人之匹也何得無皷吹宜特加之以旌殊績至景龍二年十二月皇后上言自妃主及五品已上母妻并不因夫子封者請自今婚𦵏之日特給鼓吹宮官准此左臺侍御史唐紹上䟽諫曰竊聞鼓吹之作本為軍容昔黄帝涿鹿有功以為警衛故棡鼓曲有靈䕫吼鵰鶚爭石墜崖壯士怒之類自昔功臣備禮遂得用之丈夫有四方之功所以恩加寵錫假如郊社祀天地誠是重儀唯有宮懸而無案架故知軍樂所備尚不給于神祗鉦鼓之音豈得接于閨閫准式公主王妃以下𦵏唯有團扇綵幃錦帳之色加之鼓吹歴代無聞又准令主官婚塟先無鼓吹京官五品得借四品鼓吹儀今特給五品已下母妻五品官則不當給限便是班秩本因夫子儀飾乃復過之事非倫次難為定制參詳義理不可常行請停前勑各依常典至元年建卯月三日婚𦵏鹵簿據散官封至一品事職官正員三品并駙馬都尉許隨事量給餘一切權停太極元年六月右司郎中唐紹上䟽曰臣聞王公已下送終明器等物具標格令品秩髙下各有節文孔子曰明器者備物而不可用以芻靈者善為俑者不仁𫝊曰俑者面目撥發似于生人者也以此而塟殆將于殉故曰不仁比者王公百官競為厚塟偶人象馬雕飾如生徒以炫燿路人本不因心致禮更相扇動破産傾資風俗流行下兼士庶若無禁制奢侈日増望請王公已下送塟明器皆依令式並陳于墓所不得衢路舁行開元二年六月二日勅緣喪塟事非宗舊德别有處分不得輙請官供七年王仁皎卒將葬其子駙馬都尉守一請同昭成皇后父竇孝諶故事墻髙五丈一尺侍中宋璟中書侍郎蘇頲上表曰臣聞儉德之恭侈惡之大高墻乃昔賢所誡厚塟實君子所非則知奢侈過度故非達識故周孔設齊斬緦免之差衣衾棺槨之度賢者俯就不肖者企及或云竇太尉墻最髙取則不逺者縱令徃日無極言者其事偶行令出一時故非常式豈若韋庶人父追加王位擅作酆陵禍不旋踵為天下笑况令之所設先作于紀綱情既無窮故為之制度不因人以揺動不變法以愛憎所謂金科玉條蓋以此也儻中宮情不可奪陛下不能苦違即准令一品合陪陵塟者墻髙三丈已上四丈已下降勅使同陪陵之例即極是髙下得宜臣忝樞近不敢不奏二十九年正月十五日勅古之送終所尚乎儉其明器墓田等令于舊數内遞减三品已上明器先是九十事應减至七十事五品已上先是七十事應减至四十事九品已上先是四十事應减至二十事庶人先無文限十五事皆以素瓦為之不得用木及金銀銅錫其衣不得用羅繡彩畫其下帳不得有珍禽竒獸魚龍化生其園宅不得廣作院宇多列侍從其輀車不得用金銀花結綵為龍鳯及垂流蘇畫雲氣其别勅優厚官供者准本品數十分加三等不得别為華飾其墓田一品塋地先方九十歩今减至七十歩墳先髙一丈八尺减至一丈六尺二品先方八十歩减至六十歩墳先髙一丈六尺减至一丈四尺三品墓田先方七十歩减至五十歩墳先高一丈四尺减至一丈二尺其四品墓田先方六十歩减至四十歩墳髙一丈二尺减至一丈一尺五品墓田先方五十歩减至三十歩墳先髙一丈减至九尺六品已下墓田先方二十歩减至十五歩墳髙八尺减至七尺其庶人先無歩數宜方七歩墳四尺其送塟祭盤不得作假花菓及樓閣數不得過一牙盤大厯五年五月十五日勅應准勅供百官喪塟人夫幔幕等三品已上給夫一百人四品五品五十人六品已下三十人應給夫須和雇價直委中書門下同義處置其幔幕鴻臚衛尉等供者所須載幔幙張設人並合本司自備如特有處分定人夫數不在此限十四年八月二十六日勅如聞士庶在外身亡將櫬還京多被所司不放入城自今已後不須止遏貞元九年十二月故太尉西平郡王太師晟備禮塟于鳯凰原是日廢朝上御南望春宮臨祭令中使宣弔于柩車文武常參官皆素服送至長樂坡哭拜于路時太常卿裴郁草儀發引令式書隔品致敬之文乃請宰臣及二品已上官者哭而不拜禮官失也十一年十一月勅故司徒兼侍中贈太傅燧今月九日塟七日發引百官不須入朝便于城外送發引十三年五月宗正卿嗣義王巘奏簡王府諮議参軍嗣寕王子塟請鹵簿宰臣議以子官卑不合特給詔令給其年七月勅自今已後嗣王薨塟日宜令所司並供鹵簿仍永為常式十四年十一月勅自今已後應緣喪塟俱給鹵簿即逐便于街中宿幔元和三年五月京兆尹鄭元修奏王公士庶喪塟節制一品二品三品為一等凢命婦各准本品如夫子官髙聼從夫子其無邑號者准夫子品廕子孫未有官者降損有差其凶器悉請以瓦木為之是時厚塟成俗久矣雖詔命頒下事竟不行六年十二月條流文武官及庶人喪塟三品已上明器九十事四神十二時在内園宅方五尺下帳髙方三尺共置五十舁挽三十六人輀車用開轍車油幰朱絲􅃠絡兩廂畫龍幰竿諸末庸流缺深衣輴車誌石車任畫雲氣不得置幰竿額帶等方相車除載方相外及魂車除幰網裙簾外不得更别加装飾並用合轍車纛竿九尺不得安火珠帖金銀立鳥獸旗幡等五品已上明器六十事四神十二時在内園宅方四尺下帳髙方二尺共置三十舁减至石車輀竿减四尺流蘇减二十道帶减一重披引鐸翣各减二挽歌一十六人並無朱絲絡網方相用魌頭車纛竿减一尺魂車准前九品已上明器四十事四神十二時在内園宅方三尺下帳共置一十舁减輴車轜車幰竿减三尺流蘇减一十五道披引鐸翣各减二帶减一重挽歌十人纛竿减一尺幃額魌頭魂車准前已前明器並用瓦木為之四神不得過一尺餘人物等不得過七寸並不得用金銀雕鏤帖毛髪装飾其散試官但取散官次第如散官品卑者即據試官品第五品已上逓降一等六品已下依本官制度内侍省品秩高各隨本族有章服者紫同三品緋同五品已上緣及廕官並用九品已上命婦及文武官母妻無邑號命婦各准本品如夫子髙官聴從夫子無邑號者各准夫子品輀車准令合用緣及紫色有品廕家子孫未有官品者三品已上降三等五品已上降二等九品已上降一等所用品䕃以祖父職為升降庶人明器一十五事共置三舁喪車用合轍車幰竿减三尺流蘇减十道帶减一重幃額魌頭車魂車准前挽歌鐸翣四神十二時等並請不置所造明器並令用瓦不得過七寸以前刑部尚書兼京塟給素有章程嵗月滋深名教差異使人知禁須重發明制度可經乆伏以喪塟條件明示所司如作行及工匠之徒有犯者自今准前後勅文科繩所由不得輒據喪孝之家或妄有捉獲其作工人亦不得勾留令過時日勅㫖宜依十五年閏正月時宰相公卿僉議憲宗皇帝山陵前勅用十二月二十八日太逺待詔僧惟英請改用五月十九日太常博士王彦威復奏曰臣按禮記天子七月而塟國朝故事髙祖六月而塟太宗四月而塟髙宗九月而𦵏中宗六月而塟睿宗五月而塟順宗七月而塟𤣥宗肅宗二聖山陵以聖誕吉凶相屬有司懼不給故並十二月而塟葢有為而然非常典也今國哀在正月并閏至六月即合禮經七月之數按春秋之義天子告廟不志塟塟必其時也舉天下而塟一人其道不疑故過期不塟春秋譏之待詔楊士端逺卜十二月二十八日今計塟訖而虞凡虞用九日虞訖而卒哭卒哭而祔廟並擇日行事計至來年正月中旬方畢即改元及朝賀宴賜之禮須發於始自國哀以至虞祔凶毁之儀首尾十四月國朝且無此故事豈惟禮經不合臣謹參詳禮文用六月為便長慶三年十二月浙西觀察使李徳裕奏應百姓厚塟及于道途盛陳祭奠兼設音樂等閭里編甿罕知報義生無孝飬可紀殁以厚塟相矜器仗僣差祭奠奢靡仍以音樂榮其送終或結社相資或息利自辦生業儲蓄以之皆空習以為常不敢自廢人戸貧破抑此之由今百姓等喪塟祭並不許以金銀錦繡為飾及陳設音樂其塟物渉于僭越者並勒毁除結社之類任充死亡喪服糧食等用伏以風俗之弊誠冝改張縁人心好侈莫肯循守纔知變革尋則隳違臣今已施行人稍知勸若後人不改闕清伏請自今已後如有人犯者准法科罪其官吏已下不能糾察請加懲責仍請常委出使郎官御史訪察所冀遐逺之俗皆知憲章勅㫖冝依太和元年十月勅故太尉王武俊妻晉太夫人李氏以武俊横流之中致有奔潰屬當塟事宜加贈䘏宜令有司特給儀仗事㑹昌元年十一月御史臺奏請條流京城文武百寮及庶人喪塟事三品已上輀用濶轍車方相魂車誌石車並須合轍油幰流蘇等任准令式挽歌三十六人六鐸六翣明器並用木為之不得過一百事數内四神不得過一尺五寸餘人物等不得過一尺舁止七十舁内外官同五品已上輀車及方相魂車等同三品帷不得置誌石車其油幰等任准令式挽歌十六人四鐸四翣明器不得過七十事數内四神不得過一尺二寸餘人物不得過八寸舁止五十舁内外官同九品已上輀車魂車等並同合轍車其方相魌頭並不得用楯車及誌石車其輀車除油幰流蘇等各准令式外不得用繒綵結絡兼銀器裝飾挽歌一十人一鐸二翣明器不得過一尺餘人物不得過七寸舁止三十舁内外官同散試官等任于階官之中取最髙品第五品已上逓降一等六品已下依令式有品䕃家子孫未有官者用三品已上䕃者降三等用五品已上䕃者降二等用八品已上䕃者降一等用九品者不降仍並須是祖父母䕃内外官同工商百姓諸色人吏無官者諸軍人無職掌者喪車魌頭同用合轍車喪車不用油幰流蘇等飾兼不得以繒綵結絡銀器裝飾挽歌鐸翣並不得置喪車之前不得以鞍馬為儀其明器任以瓦木為之不得過二十五事四神十二時並在内每事不得過七寸舁十舁伏以喪塟之禮素有等差庶士之家近罕遵守踰越既甚糜費實多臣忝職憲司理當禁止雖每令舉察亦怨謗隨生茍全廢糺繩又典章立隳竊以從前令式及制勅皆縁務從儉省减刻過多遂令人情易于踰禁將求不犯實在稍寛臣酌量舊儀創立新制所有高卑得禮置給器物等免令無知之人更懐不足之意伏乞聖恩宣下京兆府令准此條流普示諸色作行人散榜城市及諸城門令知所守如有工作仍違犯先罪供造行人賈之悉按律科斷蘄於達情守典永無僣差以前條件臣㝷欲陳論伏候進止本月二十一日已於延英具奏訖勅㫖宜依辰日貞觀六年二月御史大夫韋挺論風俗失禮表曰臣聞父母之恩昊天㒺極創巨之痛終身何已喪服之數哭泣之哀聖人作範布在方策世禄之家鮮克由禮今朝廷貴臣縉紳士族衣冠遞襲教義是聞而遭遇重哀拘攣俗忌至辰日不哭謂之重喪信隂陽之書惑吉凶之說忽仁孝之至道忘聖哲之丕訓浸以成俗為日已久有斁皇風事須懲革至四月茹國公張公謹卒太宗聞之將出次發哀有司奏日在辰不可哭太宗曰君臣之義同於父子情發于哀安避辰日遂哭之雜記聖厯元年十月鳯閣侍郎王方慶奏言准令朞喪大功未塟並不得參朝賀仍終喪不預宴㑹比來朝官不依禮法身有哀慘陪列朝賀手舞足蹈公違憲章名教既虧實玷皇化請申明式更令禁斷詔曰可唐㑹要卷三十八
