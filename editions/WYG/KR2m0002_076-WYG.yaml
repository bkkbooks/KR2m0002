body:
  text: 唐會要卷七十六宋王溥撰貢舉中進士貞觀八年三月三日詔進士試讀一部經史二十二年九月考功員外郎王師旦知舉時進士張昌齡王公瑾並有俊才聲振京邑而師旦考其大䇿全下舉朝不知所以及奏等第太宗怪無昌齡等名因召師旦問之對曰此輩誠有文章然其體性輕薄文章浮豔必不成令器臣若擢之恐後生相效有變陛下風雅帝以為名言後並如其言調露二年四月劉思立除考功員外郎先時進士但試䇿而已思立以其庸淺奏請帖經及試雜文自後因以為常式開元二十四年十月禮部侍郎姚奕請進士帖左氏傳禮通五與及第乾元初中書舍人李揆兼禮部侍郎揆嘗以主司取士多不考實徒峻其隄防索其書䇿殊不知藝不至者居文史之囿亦不能摛其詞藻深昧求賢者也及其試進士文章日于中庭設五經及各史一切詔本于牀而引貢士謂之曰國家進士務得才經籍在此務㝷檢由是數日之間美聲上聞上元中劉曉上疏曰國家以禮部為孝㢘之門考文章于甲乙故天下響應驅于才藝不務于徳行夫徳行者可以化人成俗才藝者可以約法立名故有朝登甲科而夕陷刑制制法守度使之然也陛下焉得不改而張之至如日誦萬言何闗禮體文成七步未足化人昔子張學干禄仲尼曰言寡尤行寡悔祿在其中矣又曰行有餘力則以學文今舍其本而修其末況古之作文必諧風雅今之末學不近典謨勞心于丹朱之間極筆于烟霞之際以此成俗斯大謬也昔之採詩以觀風俗咏卷阿則忠臣喜頌蓼莪而孝子悲温良敦厚詩教也豈有淫文哉夫人之愛名如水之就下上有所好下必甚焉陛下若以徳行為先文藝為末必須勵行以佇甲科酆舒俊才擯而没齒陳寔長者拔而用之則多士雷奔四方風動從欲于下聖理于上豈有不變者哉永徽元年始制兩都舉禮部侍郎官號皆以兩都為名毎歲兩地别放及第自大厯十二年停東都舉是後不置建中二年十月中書舍人權禮部貢舉趙贊奏先是進士試詩賦各一篇時務䇿五道明經䇿三道今請以箴論表賛代詩賦仍試䇿二道三年四月勅禮部進士舉人等自今已後如有試官及不合選并諸色出身人等應舉者先于舉司陳狀准例考試如才堪及第者送名中書門下重加考覈如實才堪即令所司進納告身注毁官身准例與及第至選日仍稍與處分其正員官不在舉限元和二年十二月勅自今已後州府所送進士如跡涉疎狂兼虧禮教或曾任州府小吏有一事不合清流者雖薄有辭藝並不得申送如舉後事發長吏奏停現任如已停替者二年本試官及司功官見任及已停替並量事輕重貶降仍委御史臺常加察訪長慶元年勅今年錢徽下進士鄭朗等一十四人宜令中書舍人王起主客郎中知制誥白居易重試覆落十一人三月丁未詔國設文學之科本求實才茍容僥倖則異至公訪聞近日浮薄之徒扇為朋黨謂之闗節干擾主司每歲䇿名無不先定永言敗俗深用興懷鄭朗等昨令重試意在精覈藝能不於異書之中固求深僻題目貴令所試成就以觀學藝淺深孤竹管是祭天之樂出于周禮正經閲其程式之文都不知其本事辭律鄙淺蕪累可知其孔温業等三人粗通可與及第其餘落下今後禮部舉人宜准開元二十五年勅及第人所試雜䇿先送中書門下詳覆三年正月禮部侍郎王起奏曰伏以禮部放榜已是成名中書重覆尚未及第重覆之中萬一不定則放牓之後逺近誤傳其于事理實為非便臣伏請今年進士堪及第者本司考試訖其詩賦先送中書門下詳覆候勅却下本司然後准舊例大字放榜從之太和七年八月禮部奏進士舉人先試帖經并畧問大義取經義精通者次試議論各一首文理髙者便與及第其所試詩賦並停者伏請帖大小經各十帖通五通六為及格所問大義便與習大經内准格明經例問十條仍對衆試口義伏使准新制進士畧問大義縁初釐革今以通三通四為格明年以後並依明經例其所試議論請限五百字以上成勅旨依奏八年正月中書門下奏進士放牓舊例禮部侍郎皆將及第人名先呈宰相然後放牓伏以委在有司固當精慎宰相先知取舍事匪至公今年以後請便令放牓不用先呈人名其及第人所試雜支及鄉貢三代名諱並當日送中書門下使令定例勅旨依奏其年十月禮部奏進士舉人自國初以來試詩賦帖經時務五道中問或蹔改更旋即仍舊盖以成格可守所取得人故也去年八月勅節文先試帖經義議論等以臣商量取其折𠂻伏請先試帖經數通依新格處分勅㫖依奏九年十二月中書門下奏今月九日閣内面奉進止令條流進士數及減下諸色入仕人等准太和四年格及第不得過二十五人今請加至四十人明經准太和八年正月勅令減下人數外及第不得過一百一十人今請再減下十人開成元年二年三年並髙鍇知貢舉每年皆恩賜題目放及第並四十人㑹昌三年正月勅禮部所放進士及第人數自今後但據才堪即與不要限人數毎年止於十人五人亦可四年二月權知貢舉左僕射太常卿王起下及第二十五人續四人堪放及第楊知至竇緘楊嚴鄭朴源重勅祗放楊嚴及第餘並落下其年十月中書門下奏朝廷設文學之科以求髦俊臺閣清選莫不由兹近縁覈實不在于鄉閭趨名頗雜于非類致有跋扈之徒請託交通將澄化源在舉明憲臣等商量今日以後舉人于禮部納家􅃺後望依前五人自相保其衣冠則以親姻故舊久同遊處者其江湖之士則以封壤接近素所諳知者為保如有缺孝弟之行資朋黨之勢跡由邪徑言涉多端者並不在就試之限如容情故自相隱蔽有人糾舉其同舉並三年不得赴舉仍委禮部明為戒勵編入舉格勅依奏五年二月諌議大夫權知貢舉陳商放及第二十七人其年三月勅户部侍郎翰林學士向敏中重試覆落七人其月中書門下奏貢舉人並不許于兩府取解仰于兩都國子監就試大中元年正月禮部侍郎魏扶放及第二十三人續堪放及第三人封彦卿崔琢鄭延休等皆以文藝為衆所知其父皆在重任不敢選取其所進詩賦奉進止令翰林學士户部侍郎知制誥韋琮等考盡合程度其月二十三日奉進止並付所司放及第有司考試祇合在公如涉徇私自有典刑從今以後但依常例取舍不得别有奏聞其年六月中書門下奏貢舉人取解宜准舊例于京兆河南府集試從之二年正月中書門下奏從貞元元年太和九年秋冬前皆是及第便從諸侯府奏試官充從事兼史館集賢𢎞文諸司諸使奏官充職以此取人常多得士由是長不乏材用太和末會昌中通四選諸方得奏州縣官充職如未合選並不在申奏限臣等昨已奏論面奉進止自今已後及第後第三年即任奏請勅㫖依奏天祐三年三月勅今年禮部所放進士依去年人數外更放兩人緣舉雜集長夀二年二月左拾遺劉承慶上疏曰伏見比年以來天下諸州所貢物至元日皆陳在御前惟貢人獨于朝堂列拜則金帛羽毛升于玉階之下賢良文學棄彼金門之外恐所謂貴財而賤義重物而輕人伏請貢人至元日列在方物之前以備充庭之禮制曰可開元五年九月勅諸州鄉貢進士見訖宜令引就國子監謁先師學官為之開講質問疑義仍令所司優厚設食兩館及監内得解舉人亦准此其日清官五品已上及朝集使並往觀禮為常式謁先師自此始也十九年六月勅諸州貢舉皆于本貫籍分明者然後依例不得于所附貫便求申送如有此色所由州縣即使催科不得遞相容許二十四年九月二十日禮部以貢舉請别置印天寶十二載七月十三日天下舉人不得充鄉試皆須補國子學士及郡縣學生然後聴舉至至徳元年已後依前鄉貢永泰元年七月以京師米貴遂分兩京集舉人至大厯十年五月十九日勅今年諸色舉人悉赴上都准舊例十月二十五日隨考試興元元年中書省有栁樹建中末枯至是再榮人謂之瑞栁禮部侍郎呂渭試進士以瑞栁為題上聞而惡之貞元七年兵部侍郎陸䞇權知貢舉時崔元翰梁肅文藝冠時䞇輸心於肅與元翰推薦藝實之士升第之日雖衆望不愜然一歲選士纔十四五數年之内居臺省者十餘人十六年十二月勅禮部别頭舉人宜委禮部考試不須置别頭十八年五月勅明經進士自今已後毎年考試所拔人明經不得過一百人進士不得過二十人如無其人不必要補此數十九年勅禮部舉人自春已來久􅄽時雨念其旅食京邑資用屢空其禮部舉人今年宜權停元和十三年十月權知禮部侍郎庾承宣奏臣有親属應明經進士舉者請准舊例送考功試從之自貞元十六年高郢掌貢舉請權停考功别試識者是之自今始復太和元年二月勅自今已後天下勲臣節將子弟有能修詞尚學應進士明經及通史學者委有司務加奬引其年七月勅今年宜權于東都置舉其明經進士便在東都赴集其上都國子監舉人等合在上都試及節目未盡者條流奏聞八年正月禮部侍郎李洪奏准太和七年八月勅貢舉人不要試詩賦䇿且先帖大經小經共二十帖次對正義十道次試議論各一首訖考覈放及第九月勅吏部禮部兵部今年選舉並縁伏末蟲旱相因恐致災荒權令停罷及斂藏之後物力且任念彼求名之人必懷觖望之念寧違我令以慰其心宜依常例却置應縁所納文狀及銓試等期限仍准今年格文遞延一月大中元年正月勅自今放進士牓後杏園任依舊宴集所司不得禁制先是武宗始遊巡曲江亭禁人宴聚故也十年四月禮部侍郎鄭頴達諸家科目記十三卷勅付翰林自今放榜後即寫及第姓名及所試詩賦題目進入内仍付所司逐年編次以用軍之際權停貢舉一年咸通十一年四月勅去年屬以用軍之際權停貢舉一年今既偃戈却宜仍舊來年宜别許三十人及第進士十人明經進士二十人已後不得援例制舉科顯慶三年二月志烈秋霜科韓思彦及第乾封元年幽素科蘇瑗解琬苗神容格輔元徐昭劉納言崔谷神及第上元三年正月詞殫文律科崔融及第永隆元年岳牧舉武涉縣尉員半千及第上御武成殿親問曰兵書云天陣地陣人陣各何謂也半千對曰臣謂載籍多謂天陣謂星孤虛也地陣謂山川向背也人陣謂編伍彌縫也以臣愚見謂不然矣夫師出以義有若時雨得天之時此天陣也兵在足食且耕且戰得地之利此地陣也士卒輕利將帥和睦此人陣也使三者去矣其何以戰上深賞之垂拱四年十二月辭標文苑科房晉皇甫瓊王旦及第永昌元年正月蓄文藻之思科彭景直及第抱儒素之業科李文愿及第長夀三年四月臨難不顧徇節寜邦科薛稷寇泚及第證聖元年長才廣度沈迹下僚科張漪及第通天元年文藝優長科韓琬及第神功元年九月絶倫科蘇頲崔𤣥童袁仁敬何鳳孟温禮洪子輿盧從愿趙不欺及第大足元年理選使孟詵試拔萃科崔翹鄭少微及第疾惡科馮萬石及第長安二年龔黄科馬克麾及第神龍二年才膺管樂科張大求魏啟心魏愔盧絢張文成禇璆成㢞業郭鄰趙不為及第才高位下科馮萬石晁良正張敬及第三年才堪經邦科張九齡康元懷及第賢良方正科蘇晉宋務光寇泚盧怡吕恂及第景龍二年抱器懷能科夏侯銛及第茂才異等科王敬從盧重𤣥及第景雲二年文以經國科袁暉韓朝宗及第藏名負俗科李俊之及第先天二年文經邦國科韓休及第藻思清睿科趙冬曦及第寄以宣化則能興化變俗科郭璘之及第道侔伊吕科張九齡及第手筆俊拔超越流輩科杜昱張子漸張秀明常無名趙居正賈登邢巨及第開元二年直言極諫科梁昇卿袁楚客及第哲人竒士逸倫屠釣科孫逖及第良才異等科邵閏之崔翹及第文儒異等科崔偘禇庭晦及第文史兼優科李昇期康子元達奚珣及第六年博學通議科鄭少微蕭誠及第七年文辭雅麗科邢巨苗晉卿禇思光趙良器及第十二年將帥科裴敦復房自謙及第十五年武足安邊科鄭昉樊衡及第高才沈淪草澤自舉科鄧景仙及第十七年才高未達沈迹下僚科呉鞏及第十九年博學宏詞科鄭昉陶翰及第二十一年多才科李史魚及第二十三年王伯科杜綰及第智謀將帥科張重光崔圓李廣琛及第天寶元年文辭秀逸科崔明允顔真卿及第六年風雅古調科薛據及第十三年二月辭藻宏麗科楊綰及第大厯二年樂道安貧科楊膺及第六年諷諫主文科鄭珣瑜李益及第建中元年賢良方正能直言極諫科姜公輔元友直樊澤吕元膺及第文辭清麗科奚陟梁肅劉公亮鄭轅沈封呉通𤣥及第經學優深科孫泚黎逢白季隨及第高蹈邱園科張紳魏良儒蘇哲及第軍謀越衆科夏侯審平知鄭儋凌正周渭丁俛及第孝弟力田聞於鄉閭科郭黄中崔浩李牧及第貞元元年九月賢良方正能直言極諫科韋執誼鄭利用穆質楊鄬裴復桞公綽歸登李方崔邠鄭敬魏𢎞簡沈迴元祐徐衮及第博通墳典達于教化科熊執易劉簡甫及第識洞韜畧堪任將帥科許䞇及第四年四月賢良方正能直言極諫科崔元翰裴次元李彝崔農史牟陸震栁公綽趙參徐𢎞毅韋彭夀鄒儒立王乃杜綸元易王真及第清㢘守節政術可稱堪縣令科李巽及第孝弟力田聞於鄉閭科張皓及第十年十二月賢良方正能直言極諫科裴垍王播朱諫裴度熊執易許堯佐徐𢎞毅崔羣皇甫鏄王仲舒許季同仲子陵鄭仕材邱頴及第博通墳典達于教化科朱頴及第詳明政術可以理人科張平敬李敬亮及第元和元年四月才識兼茂明于體用科元稹韋惇獨孤郁白居易曹景伯韋慶復崔綰羅讓崔䕶薛存慶韋珩李蟠元修沈傳蕭俛柴宿及第達于吏理可使從政科陳岵及第三年四月賢良方正能直言極諫科牛僧孺皇甫湜李宗閔李正封吉𢎞宗徐晦賈餗王起郭球姚衮庾威及第博通墳典達于教化科高苞陸旦及第軍謀宏達材任將帥科樊宗師及第達於吏理可使從政科蕭睦及第長慶元年十二月賢良方正能直言極諫科龎嚴任畹吕述姚中立韋曙李回崔龜從韋正貫崔知白陳𤣥錫及第詳明政術可以理人科崔郢及第軍謀宏達材任將帥科呉思李商卿及第博通墳典達于教化科李思𤣥及第寶厯元年四月賢良方正能直言極諫科唐紳楊儉韋端符舒元褒蕭敞楊魯士來擇趙祝裴惲韋繇李昌寶嚴楚封李涯蕭夷中馮球元晦及第詳明吏理達于教化科韋正貫及第軍謀宏達材任邊將科裴儔侯雲章及第太和二年閏三月賢良方正能直言極諫科李邵裴休裴素南卓李甘杜牧馬植鄭亞崔博崔璵王戎羅邵京崔渠韓賓崔慎田愔韋昶崔煥崔讜及第詳明吏理達于教化科宋昆及第軍謀宏逺堪任將帥科鄭冠李式及第載初元年二月十四日試貢舉人于洛城殿前數日方畢殿前試人自兹始也天授三年右補闕薛謙光上疏曰國以得賢為寶臣以貢士為忠是以子皮之讓國僑鮑叔之推管仲燕昭委兵于樂毅苻堅托政于王猛此由識士之深也若宰我見遇于仲尼逢萌被知于文叔韓信無聞于項氏毛遂不齒于平原此失士之故也何者比來薦舉多不以才假譽馳聲互相推奬希潤身之小計忘臣子之大猷非所以報國求賢副陛下翹翹之望也古之取士有異于今先觀名行之源考其鄉邑之譽崇禮讓以勵已揚信義以標聲以敦材為先最以雕蟲為後科故人崇勸讓之風俗去輕浮之行希古者必修確然不拔之操行難進易退之規衆議已定其高下郡將難誣于曲直故計貢賢愚即州將之榮辱穢行彰露亦鄉人之厚顔是以李陵降而隴西慙段干隠而西河美故名勝于利則小人之道銷利勝于名則貪暴之風扇是知化俗之本須擯輕浮昔冀缺以蹈禮升朝則晉人知禮文翁以儒林奬俗則蜀士從儒未有上之所好而下不從其化者也自七國之計雖雜縱横而漢世求才猶徴百行是以禮節之士道徳自修里閭推高然後為府寺所辟魏氏取人尤愛放達晉宋之後祇重門資奬為人求官之風乖授職惟賢之義有梁薦士雅愛属辭陳氏簡賢特珍賦詠故其以詩酒為重不以修身為務逮至隋室餘風尚存開皇中李諤疏論之曰魏之三祖雅好文辭世俗以此相高朝廷以兹擢士故文章日煩其政日亂帝納李諤之䇿由是下制禁㫁文華浮辭其年泗州刺史司馬幼之以表不典實得罪于是風俗改勵政化大行煬帝嗣興又變前法置進士等科于是後生之徒復相倣傚緝綴小文名之䇿學不指實為本而以虚浮為貴有唐纂厯雖改革于前非陛下君臨治察方于共理樹本崇化唯在旌賢今之舉人有乖事實議論決小人之筆行修無長者之風第䇿喧競于州府祈恩不勝于拜伏或明制纔出試遣捜􅏡馳驅府寺之門出入王公之第察其行而度其才則人品于兹見矣徇已之心切則至公之理乖貪仕之性彰則㢘潔之風薄是知府命雖高異叔度勤勤之讓黄門已貴無秦嘉耿耿之辭縱不能挹已推賢亦不肖待于三命祇如才應經邦之流准令試䇿武能制敵之列祇驗彎弧若其文擅清竒便充甲第藻思㣲減旋即告歸以此牧人恐乖事實且曠代鴻筆則潘岳靈運辭雄百夫矣平津文劣于長卿子建才麗于荀彧或以射䇿為最則司馬必居公孫之右若使協賛機猷則安仁靈運亦無禆益之補由此言之不可一槩取也至如武藝則趙雲雖勇資諸葛之指撝周勃雖雄乏陳平之計畧若使樊噲居蕭何之任必無指縱之機使蕭何典戲下之軍亦無免主之效是知謀將不取于弓馬良相不資于射䇿伏願降明詔頒峻科斷浮虚之餘辭取實用之良䇿文則試以効官武則令其守禦初既察言觀行終則循名責實謹按漢法所舉之主終身保之揚雄之坐田儀責其冒薦成子之居魏相酬于得賢賞罰之令行則請謁之心絶退讓之義著則貪競之路銷不實免王丹之官得人加翟璜之賞自然舉得真才則君子之道長矣景雲元年十二月制四方選集羣才輻湊操斧伐柯求之不逺其有能習三經通大義者綜一史知本末者通三教宗㫖究精微者善六經文字辨聲象者博雅曲度和六律五音者韜畧學孫呉識天時人事者暢于辭氣聪于受領善敷奏吐納者咸令所司博採明試朕親擇焉開元八年三月上親䇿試應制舉人于含元殿謂曰古有三道今減從一道近無甲科朕將存其上䇿務收賢俊仍令有司設食二十六年正月勅孝弟力田風化之本比來將同舉人考試辭䇿今後兩事兼著狀迹殊尤者委所由長官特以名薦更不須隨考便例申送天寶十三年十月一日御勤政樓試四科舉人其辭藻宏麗問䇿外更試詩各一道制舉試詩賦從此始元和三年三月勅制舉人試訖有逼夜納䇿計不得歸者並于光宅寺止宿應巡檢勾當官吏并隨從人等待舉人納䇿畢並赴保夀寺止宿仍各仰金吾街使若人監引送至宿所如勾當勿令喧雜其年四月以起居舍人翰林學士王涯為都官員外吏部員外郎韋貫之為果州刺史先是䇿賢良詔楊于陵鄭敬李益與貫之同考覈是時牛僧孺皇甫湜李宗閔條對甚直無所畏避考官第其䇿皆居三等權倖或惡其詆已而不中第者乃註解其䇿同為唱誹又言涯居翰林其甥皇甫湜中選考覈之際不先上言故同坐焉居數日貫之再出巴州司馬涯虢州司馬楊于陵遂出為廣州節度使裴垍時為翰林學士居中覆視無所同異乃為貫之泣訴情罪于上上不得已罷垍翰林學士除户部侍郎十五年二月勅先帝所徴賢良方正能直言極諫等科目朕不欲親試宜令中書門下尚書省四品已上官就尚書省同試吏部尚書趙宗儒奏奉勅以先朝所徴制科舉人令與中書門下四品已上官同于尚書省就試者伏以制科所試本在親臨南省䇿試亦非舊典況今山陵日近公務繁迫臣商量且宜停罷從之太和三年以散騎常侍馮宿太常少卿賈餗庫部郎中龎嚴為考官䇿第二十二人而前進士劉蕡䇿果切直不居是選其間指陳時事不避貴近言辭激切士林感動雖賈董無以過也而考官有所畏忌不敢上聞隨例擯斥識者議之喧然不平守道正人𫝊其文至有相對而泣者諫官等或將其䇿白于宰臣宰臣怯憚亦不敢為之明白登科人李郃者深有所愧抗表請讓官于蕡事竟不行又天復初劉季述敗起居郎羅衮上疏請追贈蕡于是下詔贈左諫議大夫仍訪子孫叙用初蕡條對制䇿言宦官權盛後必為患及是而果然也四年正月徳音節文天下諸色人中有賢良方正能直言極諫及經術優深可為師法詳明吏理達于教化等科委常忝官及方牧郡守各舉所知草澤無人舉者亦聴自舉限來年正月至上都五年正月十七日詔以兵戈未息權停大中元年二月吏部宏辭舉人漏洩題目為御史臺所劾侍郎裴諗改國子祭酒郎中周敬復罰兩月俸料考試官刑部郎中唐扶出為䖍州刺史監察御史馮顓罰一月俸料其登科十人並落下十二年三月中書舍人李藩知舉下博學宏詞科陳琬等三人及進詩賦論等召藩謂曰所賦詩中重用字何如潘曰錢起湘靈鼓瑟詩有重用字乃是庶幾上曰此詩似不及起乃落下孝㢘科貞觀十八年二月六日引汴鄜諸州所舉孝㢘賜坐于御前上問以皇王政術及皇太子問以曾參孝經並不能答太宗謂曰自楚莊王以羣臣莫逮退而有憂色曰諸侯能自得師者王自謀而莫已若者亡今以不穀之不徳羣臣言莫我逮我國能免于亡乎朕發詔徴天下俊異纔以淺近問之咸不能答海内賢哲將無其人耶朕甚憂之寶應二年六月二十日禮部侍郎楊綰奏請毎歲舉人依鄉舉里選察秀才孝㢘勅令公卿以下集議中書舍人賈至議曰楊綰所奏實為正論然衣冠遷徙人多僑寓士居鄉土百無一二今依古制恐取士之道未盡今禮部毎歲擢甲乙之科祇足長浮薄之風開僥倖之路矣其國子博士等望加員數十道大郡量置太學令博士出外兼領郡官召致生徒依乎故事保桑梓者鄉里舉焉在流寓者庠序推焉如此則青青不復興刺擾擾由其歸本焉勅㫖毎州每歲察孝㢘取在鄉閭有孝弟㢘恥之行薦焉委有司以禮待之試其所通之學五經之内精通一經兼能對䇿達于理體者並量行業授官其明經進士並停道舉亦宜准此定所司作條件處分七月二十六日禮部侍郎楊綰奏貢舉條毎州毎嵗察孝㢘各令精通一經共取左氏傳公羊穀梁禮記周禮儀禮毛詩尚書周易任通一經毎經問義二十條皆取旁通諸義務窮根本試格䇿三道問古今理體及當時要務取堪行用者仍毎日問一道凡三道畢日經義及䇿全通為上第其上第者望付吏部便與官其問義毎十條通七䇿通二為中第與出身下者罷之又論語孝經皆聖人深㫖孟子亦儒門之達者其學官望兼習此三者共為一經其試如上秀才舉望令精通五經問義二十條對䇿五道全通者為上第上第者送名中書門下請超與處分問義十條通七䇿通四為中第中第者送吏部與官下者罷之孝弟力田但能熟讀一經言音典切即令所司舉送試通使與出身至夲年舉人或舊業既成理難速改或逺州所送身已在途事須收奬不可中廢其今秋舉人中有情願依舊舉業者亦聴今年之後一依新格勅㫖進士明經置來日久今頓令改業恐難其人諸色舉人宜與舊法兼行至建中元年六月九日勅孝㢘科宜停開元禮舉貞元二年六月十一日勅開元禮國家盛典列聖增修今則不列學科藏在書府使勅官者昧于郊廟之儀理家者不達冠婚之義移風固本合正其源自今已後其諸色舉人中有能習開元禮者舉人同一經例選人不限選數許習問大義一百條試三道全通者超資與官義通七十條䇿通兩道已上者不在放限其有散官能通者亦依正官例處分又奉九年五月二十日勅其習開元禮人問大義一百條試䇿三道全通者為上等大義八十條已上䇿兩道已上為次等餘一切並准三禮例處分仍永為常式元和八年四月吏部奏應開元禮及學究一經登科人等舊例據等第高下量人才授官近日縁校書正字等名望稍優但霑科第皆求注擬堅待員闕或至踰年若無科條恐長僥倖起今已後等第稍高文學兼優者伏請量注校正其餘置開元禮人太常寺官有闕相當通經人國子監官闕相當者並請先授以備講討如不情願即通注他官庶幾實有紀律可守其今年以前待闕人亦請依此條限使為常制勅㫖依奏三禮舉貞元五年五月二日勅王者設教勸學攸先生徒肄業執禮為本然則禮者務學之本立學之端居安之大猷致理之要道姑務𢎞奬以廣儒風自今已後諸色人中有習三禮者前資及出身人科目選吏部考試白身依貢舉吏禮部考試毎經問大義三十條試䇿三道所試大義仍委主司于朝官學官中揀選精通經術三五人聞奏主司于同試問義䇿全通為上等特加超奬大義毎經通二十五條以上䇿通兩道已上為次等依資與官如先是員外試官者聴依正員例其諸館學生願習三禮及開元禮者並聴仍永為常式三傳舉三史附長慶二年二月諫議大夫殷侑奏謹按春秋二百四十二年行事王道之正人倫之紀備矣故先師仲尼稱志在春秋厯代立學莫不崇尚其教焉伏以左傳卷軸文字比禮記多較一倍公羊穀梁與尚書周易多較五倍是以國朝舊制明經授散若大經中能通習一傳即放冬習然明經為學者猶十不一二今明經一例冬集人之常情趨少就易三傳無復學者伏恐周公之微㫖仲尼之新意史官之舊章將墜于地伏請置三傳科以勸學者左傳問大義五十條公羊穀梁各問大義三十條䇿三道義通七以上䇿通二以上與及第其白身應者請同五經例處分其先有出身及前資官應者請准學究一經例處分又奏厯代史書皆記當時善惡係以褒貶垂示勸戒司馬遷史記班固范曄兩漢書音義詳明懲惡勸善亞于六經堪為世教伏惟國朝故事國子學有文史直者𢎞文館𢎞文生並試史記兩漢書三國志又有一史科近日以來史學都廢至于有身處班列朝廷舊章昧而莫知況乎前代之載焉能知之伏請置前件史科毎史問大義一百條䇿三道義通七䇿通二以上為及第能通一史者請同五經三傳例處分其有出身及前資官應者請同學究一經例處分有出身及前資官稍優與處分其三史皆通者請錄奏聞特加奬擢仍請頒下兩都國子監任生徒習讀勅㫖宜依仍付所司童子科廣徳二年五月二十四日勅孝弟力田科其毎歲貢宜停童子毎歲貢者亦停童子仍限十歲以下者至大厯三年三月二十五日勅童子舉人取十歲以下者習一經兼論語孝經毎卷誦文十科全通者與出身仍毎年令本貫申送禮部同明經舉人例考試訖聞奏至十年十月二十五日勅童子科宜停開成三年十二月勅諸道應薦萬言及朝廷設科取士門目至多有官者合詣吏曹未仕者即歸禮部文詞學藝各盡其長此外更或招延則為冗長起今以後不得更有支薦俾由正路禁絶倖門雖有是命而以童子為薦者比比有之明法科貞元二年六月勅明法舉人有能兼習一小經帖義通者依明法例處分唐會要卷七十六
