body:
  text: 唐㑹要卷八十一宋王溥撰勲舊制勲官上柱國已下至武騎尉為十二等有戰功者各隨髙下以受岑文本謂資髙而勲卑者皆從卑叙至貞觀十九年四月九日太宗欲重征遼之賞因下制授以勲級本據有功若不優異無申勸奨今討髙麗其從駕爰及水陸諸軍戰陣有功者並可聼從髙品上累加六軍大悦顯慶元年九月二十二日置驃騎大將軍為武官散位從一品五年八月二十四日制郡公出身正六品下縣公從六品上侯正七品上伯正七品下子從七品上男從七品下龍朔五年七月詔諸王子承嫡者封郡王出身從四品下衆子封郡王出身從五品下咸亨五年二月以國初勲官名號與今日不同乃下詔申明各以類相比武德初光禄大夫比今日上柱國左光禄大夫比柱國右光禄大夫及上將軍比上䕶軍金紫光禄大夫及大將軍比䕶軍銀青光禄大夫及上開府比上輕車都尉正議大夫及開府比輕車都尉通議大夫上儀國比上騎都尉朝請大夫及儀同比騎都尉上大都督比驍騎尉大都督比飛騎尉郎都督比雲騎尉都督比武騎尉神龍亢年十月三日勑賜爵准式與國公者累至郡公外餘爵聼廽授子孫若制勑四階先是四品已上者每階廽賜爵一級如及郡公外亦許廽授即計升至正六品上及正四品上准格例未合入五品三品者每一階廽賜勲一轉開元十七年十月諸叙勲應加轉者皆于勲官上加若無勲官一品驍騎尉叙三品于飛騎尉叙四品于雲騎尉叙五品已下于武騎尉叙其官當及免官免所居官計隆卑于此法者聼從髙叙司勲格加累勲湏具小勲攤銜送中書省及門下省勘㑹并注毁小勲甲然許累加授武騎尉每一轉加一等諸勲官犯除名應叙者二品于驍騎尉等官二十四年二月五日勑凡刺史縣令與朕共理百姓寄任尤切等數宜加諸州都督刺史五府長史都䕶及縣令每有制加勲階賜物并同京官太和四年五月十五日司勲奏應考少未合叙三品階人准格請廽階充勲者每階聼廽充勲一轉如申文解到省檢勘差錯其勲便請落下㑹昌五年正月制上柱國前代勲謂之八柱國品居第一宜峻寵章自後非特恩不在累叙之限天祐二年六月十六日勅司勲所掌勲及十一月二轉上柱國柱國上䕶軍䕶軍上輕車都尉輕車都尉上騎都尉騎都尉驍騎尉飛騎尉雲騎尉武騎尉等勲有遷陟以顯勤勞近年以來止叙柱國耻轉輕車殊不知一柱國已比二品上輕車已比四品官既叙烈勲頗亦近降今後宜復故事施行庶止僥倖之路階舊制叙階之法有以封爵謂嗣王郡王初出身從四品下叙親王諸子封郡王者從五品王國公縣公侯及伯子男遞减一等有以親戚謂皇親緦麻已上及皇太后周親正六品上叙皇太后大功親皇后周親従六品上皇􅃝免皇太后小功緦麻皇太后大功正七品上皇后小功緦麻皇太后妃周親從七品上外戚各依本降二等娶郡主正六品上娶縣主正七品上郡主出身從七品上縣主子從八品上叙有以勲庸謂上柱國正六品上叙柱國已下逓减一等有以資䕃謂一品子正七品上叙至從三品子逓降一等四品五品各有從正之差亦逓降一等從五品并國公子八品下叙三品已上䕃曽孫五品已上䕃孫孫降子一等曽孫降孫一等贈官降正官一等散官同執事若三品帶勲官即依勲官品同職事䕃四品降一等五品降二等郡縣公子准從五品孫縣男已上子降一等勲官一品子又降一等二王後子孫准正三品䕃有以秀孝謂秀才上上第正八品上叙以下逓降一等明經通一經進士明法甲第從九品上乙第降一等明經通二經已上每經加一階凡孝義旌表門閭者出身從九品上叙有以勞考内外六品已下四考滿皆中中考者進一階每中上考又進一階每一上下考進兩階若兼有下考得以上考除之應入三品五品者皆待别制而進之不然則否乾封元年正月十日勅文内外官九品以下加一階七品以上宜加一階八品已下更加勲一轉泛階自此始也至𢎞通元年十二月四日赦文見任内外官五品已上經四考及守五品經三考六品已下兩三考政有清勤状無私犯者各加一階蘇氏記曰乾封已前未有泛階之恩應入三品者以恩舊制特拜入五品者因選叙計階至朝散大夫已上奏取進止每年量多少進取餘並從本品授官若滿三計者即一切聼人乾封以後始有泛階入五品三品者永淳元年正月詔曰比來文武官計至五品一計至者多未甄擢再計至者隨例必升賢愚一貫深乖奨勸今後一計至已上有在官清愼材堪應務者所司具狀録奏當與進階若公正無聞循然自守及未經任州縣官雖已屢經計至亦不在加階之限萬嵗通天元年七月四日制文武官加階應入五品者並湏出身厯十三考已上進階之時見居六品及七品已上清官者應入三品取出身二十五考已上進階之時見居四品者自外縱計階應入並不在進階限其奇才異行别効殊功者不拘此例至開元十一年二月五日勅自今以後泛階應入五品以十六考為定及三品以三十考為定其名賢宿徳及異跡殊狀雖不逄泛階或應改至次年始與節限同者亦以名聞仍永為恒式至其月二十八日内外官承泛階應入五品者制出日經三十考見任四品官本階正四品上其考湏先己申考訖階湏已授告身其新考雖未校成檢勘無勾留别犯亦許通計為考其校中侍御史補闕詹事司直京兆河南府判司太常博士應入品並同六品官例證聖元年懷州獲嘉縣尉劉知幾上表曰臣聞君不虛授臣無虛受授受無失是曰能官又曰妄受不為忠妄施不為惠此皆聖賢之通論也准漢世有賜爵一級恩澤封侯此曠古殊逄千載一遇非是頻煩渥澤每嵗常行者也今皇家始自文明迄于證聖其間不過十餘年耳海内具竂九品已上每嵗逄赦必賜階勲無功復獲賞徼倖實為深矣其釐務當官尸素尤衆無論官途規求仕進不希考第取達唯擬遭遇便遷或言得一品未脱碧衣待一階方被朱服遂乃早求笏帶先辦衫􅂁今日御承天門必是加勲一轉明日饗賔宣陽宫多應賜給一班既而於願果諧依期必獲得之者自謂已力受之者不以為慙至于野外宴聚公私集㑹緋服衆于青􅂁象板多于木笏望自今後稍節斯恩使士林載清人倫有叙聖厯二年三月制有能通九經者授朝議大夫通三經已上者進兩階並隨材擢用神龍元年八月二十一日勅六品以下官緣州縣改入上中下階品與元授不同者宜依舊任考滿日依本資選叙不須改動開元三年八月十七日勅官不濫昇才無虛授惟名與器不可以假人左賢右戚豈資于繆賞駙馬都尉從五品階受自光朝頗虧前式迨穠華甫降紫艾先登不循舊章有紊彛典宜遵古訓已革踰弊俾九族無私千官有叙自今以後駙馬階宜依令式仍借紫金魚袋大厯十三年正月特加朝議郎守門下侍郎同平章事常衮九階為銀青光祿大夫貞元二年十月庫部郎中知制誥張濛奏伏准貞元元年十一月制三品已上賜爵一級四品以下加一階者臣謹詳制㫖本以三品已上其階已貴故賜爵四品以下其階未貴故加階伏緣請條不標所限司封據品通取職官其有官是三品已上階是四品以下者遂以階叙官又以官叙階爵比于官階等者受賜偏優臣欲准狀覆成則慮于比濫檢條破格復無以依慿官既隨用則遷階乃累考方至泛恩叙爵理合從階若許參約職官伏恐競為僥覬臣今謹具賜爵例如前望為永式勅㫖依奏三年正月中書舍人髙参奏准貞元二年一月勅准制三品已上賜爵一級並以三品階為限者其有以五品受賜者並未標格限所司檢勘不備其貞元元年十二月制五品已上賜爵一級亦請以五品為限仍望為常式依奏六年六月吏部奏准格内外官承泛階應入五品者制出日須經一十六考見任六品官正階正六品上應入三品者制出日經三十考見任四品官本階加正四品自建中元年六月初有特勅諸道将士准制加泛階爵勲等特許不檢勘注擬其正員官不在此限日後有司因循以例破格應試官叙階並不限官品其中或官是九品階稱朝議郎或官是六品階稱正議大夫加一泛階並入三品五品伏以元勅令或不檢勘無不限官階之文若以例判或即隱違格令請别立條限漸歸舊章應将士兼試官叙泛階奏勅已到令入三品者矜其勞效湏有優奨其官階相當並請不限考數檢當任一衘委實許與結叙其階髙官卑者請准格處分十年五月勅諸軍功状内其判官等既各有年限并諸色文資官不合軍行自今以後更不得叙入戰功其掌書記及禮目官等亦宜准此如有灼然功効可録任具状奏聞十二年四月裴延齡自朝請大夫特加銀青光禄大夫十五年十二月勅内侍省自今以後髙品官白身等官至五品已上合結朝散大夫等階及准各母妻合得邑號并結階累勲階者並宜當司磨勘具状衘奏來元和十三年六月制書云舊例皆云三品以上賜爵三品為銀青光禄大夫雲麾将軍已上若職是官雖是三品散官四品以下並不得叙爵但有三品以上散官雖四品職事官並合叙爵其所叙爵止于郡公其郡公更䝉賜爵即聼廽授其國公及封王並湏特㤙云在叙限其國公及封王准賜爵亦聼廽授其制書中有諸色職掌臨時處分其職掌即不限髙卑准制便叙有司更不得妄授湏三品階例近日有司起請中徃徃有言其效叙爵須限職事三品官此乃深昧典章紊亂綱紀其叙階據制書舊例四品已下階四品謂正議大夫征武将軍部冗繁職官内外官叙三品者皆須文武散官至四品上叙五品者皆須文武散官至六品上如四品階幷是通議大夫比武将軍以下六品階承議郎昭武副尉以下雖制書中累加散階亦在不叙三品五品之限如一制中累加散階亦不得先叙一階至正議大夫忠武将軍朝議郎昭武校尉因續取制書中所賜皆叙三品五品永宜禁斷如兩制書日月相近亦准前不得直湏制書出時以正議大夫忠武将軍朝議郎昭武校尉已成方得叙三品縱制書中有優勞合加數階入三品止于銀青光祿大夫雲麾将軍入五品至于朝散大夫游撃将軍不在累叙金紫光祿大夫冠軍大将軍以上階並湏特㤙不合累叙其外命婦封内外官母妻各視其夫及子散官品今不得約職事官品文武五品階為縣君四品階為郡君三品以上階為郡夫人即止其國夫人湏待特㤙不在叙例如至郡夫人又有制書賜封即改為郡夫人受新恩履厯而已十三年六月中書省奏應叙録将士兼試官加泛階入正三品五品伏准貞元六年六月二十七日吏部所奏具有科條近日因循多不遵守遂名器踰濫昇進無章湏重申明冀絶僥倖自今以後應叙録入五品三品階者並請准前勅處分其餘正三品以上階准格式湏有特恩不在用考累叙之限從之㑹昌四年正月内侍省奏内侍省叙階長定格著紫供奉官及衘内有賜紫官叙階不得過金紫光祿大夫著緋供奉官及衘内有賜緋官叙階不得過正議大夫著緑供奉官及衘内有賜緋官叙階不得過朝議郎勅㫖内侍省官叙階起今以後宜依前件其有㑹昌二年四月准制合與擬階者便依此處分其衘内無賜緋官先校朝散大夫以上階者宜令仍舊不得輒與改轉以後如有特恩勅别宣與改轉者即不在此限永為定規用廕景龍二年七月七日皇后表請諸婦人不因夫子而加邑號者許同見任執事官聼子孫用廕制令施行開元四年十二月勅諸用廕出身者一品子正七品上二品子正七品下正三品子從七品上從三品子從七品下正四品子正八品上從四品子正八品下正五品子從八品上從五品子從八品下三品以上廕曽孫五品以上廕孫孫降子一等曽孫降孫一等贈官降正官廕一等死王事者與正官同散官同職事若三品帶勲者官即依勲官廕四品降一等五品降二等四品五品帶勲官者不在廕曽孫之限郡縣公子准從五品孫縣男已上子降一等勲官二品子又降一等即二王後子孫准正三品廕户部格勅應用五品以上官廕者須頭衘告身三道若厯任官少據所厯任勘如申送入色有假濫者州縣長官上佐判官録事参軍並與下考仍聼人糺告每告一家賞錢五十千錢出廕人及與廕家天寳二年九月二十七日詔頃叙功勞累増勲級上柱國外許及周親是請賞延載榮宗族廽充賜物匪厚朝恩其准格上柱國外有餘勲無周親析給賜物宜停仍永為恒式六年正月十二日赦文内外文武官五品已上官父祖無替廕者其所用廕宜同子孫用廕之例大中十四年十二月鄭勲為吏部侍郎時有徳音官階至朝散大夫許封贈至正議大夫廕一子至光祿大夫門設棨㦸一日内侍省髙品以階至正議請廕子仍校大厯中魚朝恩舊例上批曰正議大夫誠宜廕子比同髙品不拘此例自是無復請者考上武徳二年二月上親閲羣臣考績以李綱孫伏伽為上第上初受禪以舞人安叱奴為散騎侍郎綱上䟽論諌伏伽亦諌賞獻琵琶弓箭者及請擇正人為太子諸王師友皆言詞激切故皆陟其考第以旌寵之貞觀三年尚書右僕射房𤣥齡侍中王珪掌内外官考治書侍御史權萬紀奏其不平追按勘問王珪不伏舉按上付侯君集推問秘書監魏徴奏稱必不可推鞫且𤣥齡王珪國家重臣俱以忠直任使其所考者既多或一人兩人不當終非有阿私若即推繩此事便不可信任何以堪當重委假令錯謬有實未足虧損國家窮鞫若虛失委大臣之體且萬紀比來恒在考堂必有乖違足得論正當鑒見切無陳説身不得考方始糺彈徒發在上瞋怒非是誠心為國無益于上有損于下所惜傷于理體不敢有阿疏奏遂釋不問六年監察御史馬周上䟽曰臣竊見流内九品已上令有等第而自比年入多者不過中上未有得上下以上考者臣謂今設九等正考當今之官必不施之于異代也縱朝廷實無好人猶應于見在之内比校其猶善者以為上第豈容皇朝之士遂無堪上下之考者朝廷獨知貶一惡人可以懲惡不知褒一善人足以勸善臣謂宜每年選天下政術尤最者一二人為上上其次為上中其次為上下則中人以上可以自勸十一年正月十五日勅散仕一切以門廕結階品然依勞進叙凡入仕之後遷代則以四考為限四考中中進年勞一階每一考進一階一考上上進二階五品已上非特恩刺史無進階之令上元二年大理寺丞狄仁傑考中正上考使尚書左僕射劉仁軌以新任不録大理卿張文瓘稱獨知理司之要仁軌大驚問分斷幾何獄文瓘曰嵗竟凡斷一萬七千八百人仁軌乃權為上下考高宗時滕王元嬰為金州刺史頗縱驕逸動作無度高宗書戒之極為至切又勅之曰朕以王骨肉至親不能致王于理今書王下下考以媿王心開耀元年十一月二十三日勅縣令有聲績可稱先宜進考員外郎侍御史京兆河南判司及自餘清望官先于縣令内簡擇開元三年正月五日勅内外官考未滿所司預備替人名為守闕特宜禁斷縱後有闕所由不得令上其年六月八日勅刺史能否郎官御史出日較量殿最定為五等奏聞考集日考使與左右丞戸部長官重詳覆類例考限内録奏以憑升黜四年四月七日勅選人既多比銓注過謝了皆不及考遂使每年選人即虛破一年闕在于公私俱不利便自今以後官人初上年宜聴計年終已來滿二百日許其成考仍准遷考例至來年考時併較永為恒式十四年御史大夫崔隱甫充校外官考事舊例皆委參問經春未定隱甫召天下朝集使一時集省中一日校考便畢時人伏其敏斷十七年三月中書舍人張垍其父左丞相説知京官考時注垍考曰父教子忠古之善訓祁奚舉午義不務私至潤色王言章施帝道載參墳典例絶常功㳟聞前烈尤難委任豈以嫌疑敢撓綱紀考以上下時刑部尚書盧從愿頻年充校京官考使中丞宇文融承恩用事以檢户口功本司校上下考從愿抑不與之頗以為恨遂宻奏從愿廣占良田至有百頃上甞擇宰相有薦從愿者以此遂寢十八年勅京官考滿帶禄選有本司要籍奏留請不用闕者所有選數不湏與成勞二十二年十二月十三日勅諸州考使六品已下朔望日朝宜准例賜食二十八年三月二日勅先是内外六品應補授官四考滿待替為滿是日制今以嵗為滿不待替縣令知倉庫供奉伎術及權充綱領等不在此限至其年十二月十六日勅内外六品已下官依舊待替其無替者五考滿後停天寳二年八月五日考功奏准考課令考前釐事不滿二百日不合成考者釐事謂都論在任日至考時有二百日即成考請假停務並不合破日比來多不㑹令文以為不入曹局即不為釐事因此破考臣等参量但請俸禄即同釐事請假不滿百日停務不至解免事雪却上其考並令不破若有停務逾年不可更請祿料兼與成考勅㫖從之八年正月二十三日勅所校内外官考准令京官正月二十日進單數二月二十日進挾名外官二月三十進單數三月三十日進挾名自今以後並了日一時挾名奏不須更進單數六月七日吏部侍郎李彭年奏准例出身以來並合檢覆中間已叙五品勘責皆有所憑今重檢尋恐為煩擾如曾經勘責叙任者請從五品以下勘檢其五品已前但勘考數足即為進叙勅㫖依乾元二年二月御製郭子儀李光弼苗晉卿李麟李輔國考辭寳應元年十月吏部奏准今年五月勅州縣官自今以後宜令三考一替者今數州申解疑三考後為復待替到為復便勒停請處分者今望令已校三考官待替到如替人不到請校四考後停二年正月考功奏請凡京外按察司京察連御史䑓分察使外察連諸道觀察使各訪察官吏善惡其功過稍大事當奏者使司案成便奏每年九月三十日以前具状報考功其功過雖小理堪懲勸者按成即報考功至校考日参事跡以為殿最閠月考功奏凡内外員外郎官等除合在定數外准勅並任其所適既不入曽無憑檢者比來或中者即與見在同奏檢勘之時或破不一文案混雜條流未明臣等啇量望請自今以後内外文武員外同正及試官除合在任外一切不在申校之限並聼從授日計考准中中例叙用從之大厯十三年正月勅捉獲造偽及光火強盗等賊合上考者本州府當申刑部建中初嚴震為興鳯両州團練使治行為山南第一特賜上下考封鄖國公其年六月門下侍郎平章事盧躭奏准六典中書舍人給事中充監中外官考使依奏至三年閠正月復置監考使貞元元年九月以刑部尚書闗播吏部侍郎班寵為校内外曹考使其年十二月勅六品已下本州申中上考者納銀錢一千市筆墨朱膠等者元置本五分生利吏部見有餘自今以後其外官京官考錢並停二年九月考功奏校京官外官考使准舊例差定聞奏勅其校考使宜停其考課赴所司准式校定三年三月詔以停减天下官員其停官計日成兩考者准舊成貫資准常式両考以下至來年三月三十日處分四年正月𠡠文九品已上正員及額内官得省替者委諸長吏聞薦見任者三考勒停七年八月考功奏准考課今諸司官皆據每年功過行能定其考第又准開元天寳以前𠡠朝官每司有中上考亦有中中考自三年來諸司並一同申中上考亦且課績之義不合雷同事乆因循遂廢朝典自今以後諸司朝官皆須據每年功過行能仍比類格文定其升降以書考第不得一例申中上考應諸司官長書考不當三品已上具衘牒上中書門下四品已下依格令各准所失輕重降考是月考功奏准諸司皆據功過三考過自至徳後一切悉申中上考今請覆其能否以定升降過於至徳從之自諌議大夫給事中郎官有書中中考者尚書左丞趙憬言前薦果州刺史韋正坐􅂍廢請降其考校考使吏部尚書劉滋以憬能言過奏中上考其年十二月校外官考使奏准考課今三品以上官及同中書門下平章事考並奏取裁注云親王及大都督亦同伏詳此文則職位崇重考績褒貶不在有司皆合上奏今緣諸州觀察刺史大都督府長史及上中下都督都䕶等有帶節度使者方鎮既崇名禮當異每嵗考績亦請奏减其非節度觀察等州府長官有帶䑓省官者請由吏部八年七月班寵遷刑部侍郎兼京官校考使時右僕射崔寧兵部侍郎劉廼上下考究正議曰今要荒靖難專在節制尺籍伍符不校省司夫上多虛美之名下開趨競之路上行阿容下必朋黨因削去之廼謝之曰廼雖不美敢掠一美以徼二罪乎其年十月以刑部尚書劉滋為校外官考使吏部侍郎杜黃裳為校京官考使給事中李巽宜監京官考中書舍人鄭珣瑜宜監外官考九年七月制縣令以四考為限無替者宜至五考十年二月刑部奏准建中元年正月十七日勅諸司州五品以上正員及額内上佐宜四考停其佐降官不在此限者五品不降既不許停祿料六品已下未復資已經四考者未量移間其祿料伏望亦許准給勅㫖祿料宜准天寳六載七月十四日勅處分餘依常式十四載六月盧邁自司門郎中遷右諌議累上表言時事轉給事中属校定考課邁固讓以授官日近未有政績不敢當上考時人重之元和二年五月中書門下舉今年正月勅文上言國家故事于中書置具員簿以序内外庻官爰自近年因循遂廢清源正本莫急于斯今請京常参官五品已上前資見任起元和二年量定考數置具員簿應諸刺史次赤府少尹次赤令諸陵令五府司馬及東宫官除左右庶子王府官四品已下並請五考其䑓官先定月數今請侍御史滿十三月殿中侍御史滿十八月監察侍御史依前二十五箇月與轉三省官並三考外餘官並四考外其文武官四品已下並五考商量與改尚書省四品已上餘文武官三品已上縁品秩已崇不可限以此例湏有進改並聼特奏取進止其權知官須至両考然後正授未經正授不得權用權知官資改轉其中縁官闕要人及縁事須有改移者即不在常格叙遷之限諸道及諸司副使行軍司馬判官参謀掌書記支使推官廵官等有勅充職掌帶檢校五品以上官及䑓省官三考與改轉餘官四考與改轉元和七年勅使府参佐檢校試官從元授官月日計如是五品已上官及䑓省官經三十箇月外任與改轉餘官經二十箇月奏改轉若是未經考使有故事及停替官本限之外更加十箇月即任申奏十四年十二月考功奏自今以後應注考状但直言某邑行能某邑異政某邑樹置某邑勞効推斷某邑獄糺舉某邑事便言善惡不得更有虛美閒言其中以下考亦各言事状然注考並不得失于褒貶如違據所失輕重准令降書考官考又奏自今以後其有政能卓異清苦絶倫者不在止于上下考限依奏尋又奏據寳應二年勅御史䑓御史䑓分察使及諸道觀察使訪察官吏善惡功過稍大事當奏聞者每年九月三十日具状報考功至校日参騐事跡以為殿最伏以近日功過都不牒報今後諸司不申報者州府本判官便與下考在京諸司追節級紏處本判官勅課日量事大小黜陟勅㫖從之十五年刑部郎中權判考功馮宿奏宰相及三品已上官故事内校考别封以追翰林學士職居内署事莫能知請依前書上考課官御史亦仍舊並書中上考長慶元年正月考功員外郎李渤書宰相等下考太和六年七月勅今後諸州五品長馬權知者權知正授通計六考滿停其勒留官未滿六考停給課料准此却給唐㑹要卷八十一
