body:
  text: 唐㑹要卷三十三宋王溥撰雅樂下乾元元年三月十九日上以太常舊鐘磬自隋以來所制五聲或有差錯謂太常少卿于休烈曰古者聖人作樂以應天地之和以合隂陽之序和則人不失禮物不疵癘且金石絲竹樂之器也比親享郊廟毎聴樂聲或宫商不倫或鐘聲失度可盡將鐘磬來朕當於内自定太常進士集樂工考試數日審知差錯然後令再造及磨刻二十五日一部先畢召太常樂工上臨三殿親觀考撃皆合五音送太常二十八日上又於内造樂章三十章送赴太常郊廟歌之廣明初黄巢干紀樂工淪散金奏幾亡及昭宗即位將親謁郊廟有司請造樂懸詢於舊工莫知制度時太常博士殷盈孫按周官考工記之文究其欒銑于鼓鉦舞甬之法用筭法乗除鎛鐘之輕重髙低乃定懸下編鐘正黄鐘九寸五分倍應鐘三寸三分半凡四十八等口項之量徑衡之圍悉圖進遣金工依法鑄之凢二百四十口修奉使宰臣張濬求知聲者令先校定石磬合而擊拊之八音克諧觀者聳聴時議者論樂懸之架不同濬復奏議曰臣伏凖舊制太廟含元殿並設宫懸三十六架太清宫南北郊社稷及諸殿庭並二十架今修奉樂懸太廟合造三十六架臣今參議請依古禮用二十架伏自兵興已來雅樂淪缺將為修奉事實重難變通宜務於酌中損益當循於寧儉臣聞諸舊史昔武王定天下至周公相成王始暇制樂魏初無樂器及伶人後稍得登歌㑹舉之樂明帝太寧末詔増益之咸和中鳩集遺逸尚未有金石之音至孝武太元中四廂金石始備郊祀猶不舉樂宋文帝元嘉九年初調金石二十四年南郊始設登歌廟舞尚闕孝武孝建中有司奏郊廟宜設備樂始為詳定故後魏孝文太和初司樂上書陳樂章有闕請集羣官議定廣修器數正立名品詔雖行之仍有殘缺隋文踐阼太常議正雅樂九年之後唯奏黄鐘一宫郊廟止用一調據禮文毎一代之樂二調並奏六代樂凡十二調其餘聲律皆不復通髙祖受隋禪軍國多務未遑改創樂尚用隋氏舊文武徳九年命太常考正雅樂貞觀二年考畢上奏葢其事大故厯代不能速成今俯逼郊天式修雅樂制度之間亦宜撙節伏凖儀禮宫懸之制陳鎛鐘十二架當十二辰之位甲丙庚壬各設編鐘一架乙丁辛癸各設編磬一架合為二十架樹建鼓於四隅當乾坤艮㢲之位以象二十四氣宗廟殿廷皆用此制無間異同漢魏晉宋齊六朝並用二十架隋氏平陳檢梁故事乃設三十六架國初因之不改髙宗皇帝初成蓬萊宫充庭七十二架尋仍省之則簨簴架數太多本近於侈止於二十架正協禮經從之古制雅樂宫懸之下編鐘四架十六口近代二十四口正聲十二倍聲十二各有律呂凡二十四聲登歌一架亦二十四鐘雅樂淪滅至是復全太常樂章太清宫薦獻大聖祖𤣥元皇帝奏混成之舞天寳元年四月十四日有司奏請降神用混成之樂送神用太一之樂樂章十一饗徳明興聖皇帝廟酌獻並奏長發之舞樂章九獻祖宣皇帝室酌獻奏光大之舞貞觀十四年祕書監顔師古議皇祖𢎞農府君宣簡公懿皇三廟之樂請同奏長發之舞至開元十三年封禪定廟樂改用光大之舞樂章闕懿祖光皇帝室酌獻奏長發之舞開元十三年定議依舊用長發之舞至貞元十四年四月太常奏與徳明興聖獻祖廟並同用宫懸祭月享之樂章闕太祖景皇帝室酌獻奏大政之舞貞觀十四年祕書監顔師古定議請奏永錫之舞給事中許敬宗議奏大有之舞至開元十年改定用大成之舞樂章闕世祖元皇帝室酌獻奏大成之舞高祖神堯皇帝室酌獻奏大明之舞貞觀十四年祕書監顔師古議奏大明之舞太宗文武大聖大廣孝皇帝室酌獻奏崇徳之舞先是文徳皇后廟樂貞觀十四年顔師古請奏光大之舞許敬宗議同及太宗祔廟遂停光大之舞髙宗天皇大聖大𢎞孝皇帝室酌獻奏鈞天之舞中宗孝和大聖大昭孝皇帝室酌獻奏太和之舞睿宗𤣥真大聖大興孝皇帝室酌獻奏景雲之舞以上廟貞觀十四年六月顔師古許敬宗已定樂章廟舞之號至開元二十九年六月太常又奏凖十三年封禪日有司所定九廟酌獻用舞之號皆列於次𤣥宗至道大聖大明孝皇帝室酌獻奏廣運之舞中書令郭子儀撰樂章肅宗文明武徳大聖大宣孝皇帝室酌獻奏惟新之舞吏部尚書劉晏撰樂章代宗睿文孝武皇帝室酌獻奏保大之舞中書令郭子儀撰樂章徳宗神武孝文皇帝室酌獻奏文明之舞尚書左丞平章事鄭餘慶撰樂章順宗至徳大聖大安孝皇帝室酌獻奏大順之舞中書侍郎平章事鄭絪撰樂章憲宗聖神章武孝皇帝室酌獻奏象徳之舞中書侍郎平章事段文昌撰樂章穆宗睿聖文惠孝皇帝室酌獻奏和寧之舞中書侍郎平章事牛僧孺撰樂章敬宗睿武昭愍孝皇帝室酌獻奏大鈞之舞中書侍郎韋處厚撰樂章文宗元聖昭獻孝皇帝室酌獻奏文成之舞中書侍郎崔琳撰樂章武宗至道昭肅孝皇帝室酌獻奏大定之舞中書侍郎李回撰樂章宣宗聖武獻文孝皇帝室酌舞號懿宗昭聖恭惠孝皇帝室酌舞號僖宗惠聖恭定孝皇帝室酌舞號昭宗聖穆景文孝皇帝室酌獻奏咸寧之舞饗讓皇帝廟樂章六吏部侍郎李紓撰饗諸太子廟樂章六儀坤廟樂章十二惠昭太子廟樂章六左散騎常侍徐彦伯及職方郎中知制誥王涯等撰悼懷太子廟樂章六莊恪太子廟樂章六祀五帝樂章十五顯慶元年左僕射于志寧撰立春日祀青帝壇降神奏角音之舞六變立夏日祀赤帝壇降神奏徴音之舞六變季夏土王祀黄帝壇降神奏宫音之舞六變立秋日祀白帝壇降神奏商音之舞六變立冬日祀黒帝壇降神奏羽音之舞六變夏至日祭皇地祇樂章三奏順和之舞六變開元十二年禮部侍郎賀知章撰祭神州地祗樂章三奏順和之舞八變貞觀七年太府卿蕭璟撰春分日祀朝日樂章三奏元和之舞六變顯慶元年禮部侍郎許敬宗撰祭大社大稷樂章四貞觀十七年左僕射于志寧撰祭風師樂四章降神奏元和之舞貞元六年祕書監包佶撰祭雨師雷師樂章奏元和之舞蜡祭百神樂章四降神奏豫和之舞禮部侍郎許敬宗撰祭先農樂章三奏豐和之舞二變顯慶三年太子洗馬郭瑜撰祭先蠶樂章二奏永和之舞文宣王廟釋奠樂章八奏宣和之舞三變顯慶三年國子博士范頵等撰武成王廟樂章五奏宣和之舞三變貞元六年原王𫝊于邵撰祀九宫貴神樂章六奏元和之舞祭龍池樂章十開元二年内出編入雜樂十六年築壇於興慶宫以仲春之月祭之殿庭元日冬至朝㑹樂章七元日迎送皇帝奏太和開元十三年侍中源乾曜撰羣官行奏舒和上公上壽奏休和皇帝受酒登歌奏昭和中宫朝㑹樂章四迎送皇后奏永和東宫朝㑹樂章五迎送皇太子奏永和皇太子受酒登歌奏昭和鄉飲酒樂章十七檢撰人名未獲鹿鳴三奏南陔一奏嘉魚四奏崇丘一奏闗雎五奏鵲巢三奏大射樂章四檢撰人姓名未獲皇帝射騶虞二奏王公射貍首一奏迎送皇帝入閣奏太和凱樂大和三年八月太常禮院奏謹按凱樂鼓吹之歌曲也周官大司樂王師大獻則奏凱樂注云獻功之樂也又司馬之職師有功則凱樂獻於社注引兵樂曰凱司馬法曰得意則凱樂所以示喜也左氏傳載晉文公勝楚振旅凱以入魏晉以來鼔吹曲章多述當時戰功是則厯代獻㨗必有凱歌太宗平東都破宋金剛其後蘇定方執賀魯李勣平髙麗皆備軍容凱歌入京師今參酌今古備其陳設及奏歌曲之儀如後凡命將征伐有大功獻俘馘者其日備神䇿兵衛於東門外如獻俘常儀其凱歌用鐃吹二部笛篳篥簫笳人鐃鼓毎色二歌工二四人也樂工等乗馬執樂器次第陳列如鹵簿之式鼓吹令丞前導分行於兵馬俘馘之前將入都門鼓吹振作迭奏破陣樂應聖期賀朝歡君臣同慶樂等四曲破陣樂詞曰受律辭元首相將討叛臣咸歌破陣樂共賞太平人應聖期詞曰聖徳期昌運雍熈萬㝢清乾坤資化育海嶽共休明闢土欣耕稼銷戈遂偃兵殊方歌帝澤執贄賀昇平賀朝歡詞曰四海皇風被千年徳水清戎衣更不著今日告功成君臣同慶樂詞曰主聖開昌厯臣忠奏大猷君看偃革後便是太平秋候行至大社及太廟門工人下馬陳列於門外據周禮大司樂注云獻於祖大司馬云先凱樂獻於社謹詳禮義則社廟之中似合奏樂伏以尊嚴之地鐃吹讙譁既無明文或乖肅敬今請並各於門外陳設不奏歌曲俟告獻禮畢復導引奏曲如儀至皇帝所御樓前兵伏旌門外二十步樂工皆下馬徐行前進兵部尚書介胄執鉞於旌門内中路前導周禮師有功則大司馬左執律右秉鉞以先凱樂注云律所以聴軍聲鉞所以示將威今吹律聴聲其術乆廢惟以秉鉞得存禮文次協律郎二人公服執麾亦於門外分導鼓吹令丞引樂工等至位立定太常卿於樂工之前跪具官臣某奏事請奏凱樂協律郎舉麾鼓吹大振作徧奏破陣樂等四曲樂闋協律郎偃麾太常卿又跪奏樂畢兵部尚書太常卿退樂工等並出旌門外訖然後引俘馘入獻及稱賀如别儀别有獻俘儀注如俘囚引出方退伏請宣付所司編入新禮仍令樂工教習依奏讌樂武徳初未暇改作毎讌享因隋舊制奏九部樂一讌樂二清商三西涼四扶南五髙麗六龜兹七安國八踈勒九康國至貞觀十六年十二月宴百寮奏十部先是伐髙昌收其樂付太常乃増九部為十部伎今通典所載十部之樂無扶南樂祇以天竺樂轉冩其聲焉其後分為立坐二部立部伎有八部一安樂周平齊所作周代謂之城舞二太平樂亦謂之五方師子舞三破陣樂四慶善樂五大定樂亦謂之八紘同軌樂太宗平遼時作也六上元樂高宗所作也七聖夀樂武后所作舞時行列成字字有聖超千古道泰百王皇帝萬年寳祚彌昌八光聖樂𤣥宗所造自安樂已下毎奏皆擂大鼓雜以龜兹樂並立奏之其大定樂加以金鉦唯慶善樂獨用西凉樂最為閒雅其破陣上元慶善三舞皆易其衣冠合之鐘磬以享郊廟自天后臨朝此禮遂廢神龍二年八月勅立部伎舞人以後更不得改補入諸色役坐部伎有六部一讌樂張文收所作也又分為四部有景雲慶善破陣承天等樂二長夀樂武太后長夀年所作三天授樂武太后天授年所作四鳥歌萬嵗樂武太后所作因養吉了鳥嘗稱萬嵗故為樂以像之五龍池樂𤣥宗所作帝在藩邸時居崇慶坊宅中經雨地忽為池及即位以宅為宫故為樂以表其祥六小破陳樂𤣥宗所作生於立部伎舞用四人被金甲自長夀樂以下皆用龜兹樂人皆著靴唯龍池用雅樂而無鐘磬舞人盡躡履行其樂章又有破陳樂詞七首中和樂詞五首五方師子詞五首南詳舞聖樂詞五首聖夀荷皇恩樂詞四首聖夀樂詞四首大定樂詞六首上元樂詞一十五首文武順聖樂詞九首貞觀未有裴神符者妙解琵琶作勝蠻奴火鳳傾盃樂三曲聲度清羙太宗深愛之髙宗末其伎遂盛於是自天后至神龍之際但増加立坐部伎部諸舞尋亦廢焉清樂清樂九代之遺聲其始即清商三調是也並漢氏已來舊曲樂器形制并歌章古調與魏三祖所作者皆被史籍自晉氏播遷其音分散不復存於内地苻堅滅涼得之傳於前後二秦及宋武定闗中收之入於江南及隋平陳後獲之隋文聴之善其節奏曰此華夏正聲也因更損益去其哀怨考而補之乃置清商署總謂之清樂至煬帝乃立清樂西涼等為九部隋室喪亂日益淪缺天后朝猶有六十三曲今其詞存者有白雪公莫舞巴渝明君明之君鐸舞白鳩子夜呉聲四時歌前溪阿子歡聞團扇郎懊憹白紵玉樹後庭花春江花月夜長史變丁督護讀曲烏夜啼石城樂莫愁襄陽栖烏夜飛估客樂楊叛兒雅歌驍壺常林歡三洲採桑度堂堂泛龍舟等三十二曲明之君雅歌各二首四時歌四首合三十七曲又七曲有聲無詞上林鳯鶵平調清調瑟調平折命嘯通前四十四曲存焉當江南之時巾舞白紵巴渝等衣服各異至梁武改省之宋以江左諸曲淫哇然而從容雅緩猶有古士君子之風焉長安以後朝廷不重古曲工伎漸缺能合於管弦者惟明君楊叛驍壺春歌秋歌白雪堂堂春江花月夜等八曲舊樂章多或數百言明君尚能四十言今所傳二十六言漸漸訛失與呉音轉逺冝取呉人使之傳習開元中有歌工李郎子北人也云學聲調于江都俞才生郎子亡後清樂唯𫝊一曲詞典而音雅自周隋以來多用西涼樂鼓舞曲兼用龜兹樂其曲度皆時俗所知惟弹琴家猶𫝊楚漢舊聲清調瑟調蔡邕五弄楚調四弄謂之九弄非朝廷郊廟所用故不載自唐虞迄三代舞用國子樂用瞽師漢魏後皆以賤𨽻為之惟雅樂尚選良家子國家毎嵗閱司農戸容儀端正者歸太樂與前代樂戸總名音聲人歴代滋多至於萬數散樂散樂歴代有之其名不一非部伍之聲伶優歌舞雜奏總謂之百戲跳鈴吞劍透梯戲繩縁竿弄盌弄珠代面撥頭窟􅓓子幻伎激水化魚龍齊王捲衣笮䑕夏育扛鼎巨象行乳神龜負岳挂樹白猿畫地成川之伎至于斷手足剔腸胃之術自漢安帝時幻伎始入中國其後或有或無至國初通西域復有之髙宗惡其驚俗勅西域闗津不令入中國其百戲後魏道武明元二帝増修之毎大設於殿前後周武帝保定初罷之至宣帝復令作於殿庭晝夜不息隋文時並放遣之煬帝大業二年又總追集於東都命太常教習毎嵗正月於建國門内廊八里為戲場百官起棚夾觀昏以繼曉十五日而罷兩都各一親王主之自彈弦吹管以上萬八千人𤣥宗以其非正聲置教坊於禁以處之若尋常饗㑹先具其坐立部樂名太常上奏御注其下㑹日先奏坐部伎次奏立部伎次奏蹀馬次奏散樂先後奏部次第並取當時進止舊制之内散樂一千人其數各繫諸州多少輪次隨月當畨遇閏月六畨人各徴資錢一百六十七文一補之後除老假輪半次外不得妄有破除貞觀二十三年十二月詔諸州散樂太常上者留二百人餘並放還神龍三年八月勅太常樂鼓吹散樂音聲人並是諸色供奉乃祭祀陳設嚴警鹵簿等用須有矜恤宜免征徭雜科破陣樂貞觀三年正月三日宴羣臣奏秦王破陣樂之曲太宗謂侍臣曰朕昔在藩邸屢有征伐世間遂有此歌豈意今日登於雅樂然其發揚蹈厲雖異文容功業由之致有今日所以被于樂章示不忘本也尚書右僕射封徳彜進曰陛下以聖武戡難立極安人功成化定陳樂象徳實𢎞濟之盛烈為將來之壮觀文容習儀豈得為比太宗曰朕雖以武功定天下終當以文徳綏海内文武之道各隨其時公謂文容不如蹈厲斯為過矣七年正月七日上製破陣樂舞左圓右方先偏後伍魚麗鵝貫箕張翼舒交錯屈伸首尾回互以象戰陣之形起居郎吕才依圖教樂工百二十人被甲執㦸而習之九舞三變毎變為四陣有來往疾徐擊刺之象以應歌節數日而就其後令魏徴虞世南禇亮李百藥改制歌詞更名七徳之舞十五日奏之於庭觀者覩其抑揚蹈厲莫不扼腕踴躍懍然震悚武臣列將咸上夀云此舞皆陛下百戰百勝之形容於是皆稱萬嵗永徽二年十一月二日上祀南郊黄門侍郎宇文節奏言依舊儀明日朝羣臣陳樂懸請奏九部樂上曰披甲而舞者情不忍觀所司更不宜設言訖慘愴乆之至顯慶元年正月一十五日詔改破陣樂舞為神功破陣樂儀鳳三年七月八日上在九成宫咸亨殿宴韓王元嘉霍王元軌及南北軍將軍等樂作太常少卿韋萬石奏言破陣樂舞者是皇祚發跡所由宣揚祖宗盛烈傳之於後永永無窮自天皇臨御四海寢而不作既縁聖情感愴羣臣不敢開言臣忝職樂司廢缺是懼依禮祭之日天子親總干戚以舞先祖之樂與天下同樂也今破陣樂乆廢羣下無所稱述將何以發孝思之情臣望毎大宴㑹先奏此舞以光祖宗之功烈上瞿然改容俯遂所請樂闋上歔欷乆之顧謂韓王等曰不見此樂垂三十年乍此觀聴實深哀感追思往日王業艱難朕今嗣守洪業豈可忘武功也古人云富貴不與驕奢為期而驕奢自至朕謂時見此舞以自誡朂冀無盈滿之過非為歡樂陳奏之耳侍臣咸稱萬嵗先是毎奏神功破陣樂及功成慶善樂二舞上皆立對至永淳元年二月太常博士裴守貞議曰竊惟二舞肇興謳吟攸屬義均韶夏用兼賔祭皆祖宗盛徳而子孫享之詳覽傳記未有皇帝立觀之禮况升中大事華夷必集九服仰垂拱之安百蠻懷率舞之慶甄陶化育莫非神化豈於樂府别申嚴敬臣等議毎奏二舞時天皇不合起立詔從之慶善樂貞觀六年九月二十九日幸慶善宫在武功縣即髙祖舊宅也宴從臣於渭濱其宫即太宗降誕之所上賦詩十韻云夀丘唯舊跡酆邑乃前基粵余承累聖懸弧亦在兹弱齡逄運改提劍鬱匡時指麾八荒定懷柔萬國冝梯山咸入欵駕海亦來思單于陪武帳日逐衛文端扆朝四岳無為任百司霜節明秋景輕氷結水湄芸黄逼原禾穎即京坁共樂還鄉宴歌此大風詩賞賜閭里有同漢之宛沛焉於是起居郎吕才播于樂府被之管弦名曰功成慶善樂之曲令童兒八佾皆冠進徳冠紫袴褶為九功之舞毎冬至讌及國有大慶與七徳之舞皆進于庭諸樂太常梨園别教院法歌樂章曲等王昭君樂章思歸樂一章傾盃樂一章破陣樂一章聖明樂一章五更轉樂章玉樹後庭花樂章從龍舟樂章萬嵗長生樂樂章飲酒樂一章鬭百草樂章雲韶樂章二十章諸樂並不言音調數目上雲曲自然真仙曲明一曲難思曲平珠曲無為曲有道曲調元曲立政曲獻夀曲髙明曲聞大曲儀鳳曲同和曲閑雅曲多稼曲金鏡曲貞觀四年景雲見河水清協律郎張文收採古朱雁十天馬之義製景雲河清歌曰讌樂奏之管弦為諸樂之首今元㑹第一奏者是也顯慶二年以琴中雅曲古人歌之近代以來此聲頓絶令所司修習舊曲至三年十月八日太常丞吕才奏按張華博物志白雪是天帝使素女鼓五十絃瑟曲名以其調髙人和遂寡自宋玉以來迄今千祀未有能歌白雪曲者臣今准勅依琴中舊曲定其宫商然後教習並合於歌輒以御製雪詩為白雪歌詞又樂府奏正曲之後皆有送聲君唱臣和事彰前史輒取侍中許敬宗等奉和雪詩十六首以為送聲各十六節上善之仍付太常編於樂府龍朔元年三月一日上召李義府任雅相許圉師張延師蘇定方阿史那忠于闐王休闍及上官儀等讌於城門觀屯營新教之舞名曰一戎大定樂皆新征遼東以象用武之勢調露二年正月二十一日御洛城南樓賜宴太常奏六合還淳之舞延載元年正月二十三日製越古長年樂一曲大足元年天后幸京師同州刺史蘇瓌進聖王還京樂舞御衡宫樓觀之賜以束帛令編於樂府天寳十三載七月十日改諸樂名大簇宫時號沙陁調龜兹佛曲改為金華洞真因度王改為歸聖曲承天順天景雲君臣相遇九真九仙天册永昌樂永代樂慶雲樂冬樂長夀樂紫極萬國歡封禪曜日光舍佛兒和歌改為欽明引河東婆改為燕山騎俱倫僕改為寳倫光色俱騰改為紫雲騰摩醯首羅改為歸真火羅鶬鴿鹽改日蛤鹽羅利未羅改為合浦明珠怱薑賤改為無疆夀蘇莫刺邪改為玉京春阿箇槃陀改為天元昭慶急龜兹佛曲改為急金華洞真蘇莫遮改為萬宇清舞仙鶴乞婆婆改為仙雲昇太簇商時號太食調破陣樂大定樂英雄樂歡心樂山香樂年年樂武城昇平樂興明樂黄騘䮜人天雲倦白雲邊帝釋婆野娑改為九野歡優婆師改為泛金波半射渠沮改為高唐雲半射沒改為慶惟新邪婆色雞改為司農寳雞野鵲鹽改為神鵲鹽捺利梵改為布陽春蘇禪師和歌改為懷思引萬嵗樂太簇羽時號般涉調大和萬夀樂天統九勝樂元妃貞元妃急元妃太監女采樂貞女采樂山水白鶻郎刺邪改為芳桂林移師都改為大仙都借渠沙魚改躍泉魚俱倫朗改為日重輪蘇刺邪改為未央年吒鉢羅改為芳桂苑達磨支改為泛蘭叢悉你都改為瓊臺花春楊桞天離寳引蘇刺邪和歌改為寳廷引太簇角大同樂六合來庭安平樂戎服來賓安公子紅藍花林鐘宫時號道調道曲垂拱樂萬國歡九仙步虚飛仙景雲欽明引玉京寳輪光曜日光紫雲騰山剛改為神仙急火鳳改為舞林鐘商時號小食調天地大寳迎天歡心樂太平樂破陣樂五更轉聖明樂卷白雲凌波神九成樂汎龍舟月殿蟬曲英雄樂山香㑹羅仙迎祥翊聖司農寳和九野歡訖陵加和歌改來賓引和殘改儀鳯蘇羅密改昇朝陽須婆栗特改芳苑墟撥洛背陵改為北戎還淳汎金波借席改為金鳳厥磨賊改為慶淳風慶惟新林鐘羽時號平調火鳳真火鳳急火鳳舞媚娘長命西河三臺和行天急行天濮陽女神白馬春楊桞無愁改為長歡因地利支和歌改為玉闗引大仙都春臺東祇羅改為祥雲飛文明新造勝蠻奴改為塞塵清林鐘角調紅藍花緑沈杯赤白桃李花大白紵堂堂十二時天下兵改為荷來蘇黄鐘宫大封山樂黄鐘商時號越調破陣樂天授樂無為傾盃樂文武九華急九華大疉瑞蟬曲北雒歸淳慶淳風杜蘭烏多回改為蘭山吹老夀改為天長寳夀春鸚囀吹急蘭山髙麗改為來賔引耶婆地和歌改為静邊引婆羅門改為霓裳羽衣歸思達牟雞和歌改為金方引昇朝陽三部羅改為三輔安黄鐘羽時號黄鐘調火鳳急火鳳春楊桞飛仙大仙都天統思歸達菩提梵改為祠洞靈章明鳳樂真明鳳阿濫堆百舌鳥改為濮陽女中吕商時號雙調破陣樂太平樂傾盃樂大輔樂迎天樂蟬曲山香月殿大百嵗老夀改為天長寳夀五更轉同昌還城樂慶惟新金風泛金波司農寳鷄金方引俱磨尼佛改紫府洞真神雀鹽北洛歸淳南吕商時號水調破陣樂九野歡泛金波凌波神昇朝陽蘇幙遮歡心樂蟬曲來賓引天地大寳五更轉金風調蘇幙遮改為感皇恩日天月天風天水天火天五天婆伽兒改為流水芳菲司空國中左相希烈奏中使輔璆琳至奉宣進止令臣將新曲名一本立石刋於太常寺者今既傳之樂府勒在堅珉仍望宣付所司頒示中外勅㫖所請依貞元三年四月河東節度使馬燧獻定難曲御麟徳殿閱試之十二年十二月昭義節度使王䖍休獻繼天誕聖樂一曲大抵以宫為調表五音之奉君也以土為徳知五運之中也凡二十四遍法二十四氣而成一嵗之功也不聞惉懘之聲以叶中和之樂其曲譜同進上先是太常人劉玠流落至潞州䖍休因令造此曲以進今中和樂起於此十四年二月上自制中和舞是也又奏九部樂及禁中歌舞妓者十數人布列在庭上製中春麟徳殿㑹百僚觀新樂詩仍令太子書示百官序曰朕以中春之望紀為令節聴政之暇韻於詩歌象中和之容作中和之舞聊復成篇以言其志詩曰芳嵗肇嘉節物華當仲春乾坤既昭泰烟景含氤氲徳淺荷嘉貺樂成思治人前庭列鐘鼓廣殿延羣臣八封隨舞意五音轉曲新顧非咸池奏庶叶南風薫式宴禮所重浹歡情必均同和詩在兹萬國希可親中書門下等稱賀謝賜觀製中和樂詩請付所司頒示天下仍編入樂府之中可之太和八年十月宣太常寺凖雲韶樂舊用人數令於本寺閲集進來者至開成元年十月數成其年太常卿李程進上至三年武徳司奉宣索雲韶樂懸圖二軸進上光化四年正月宴於保寧殿上制曲名曰讚成功時鹽州雄毅軍使孫徳昭等殺劉季述帝反正乃制曲以褒之仍作樊噲排君難戲以樂焉四方樂周禮鞮氏掌四夷之樂與其聲歌祭祀則和而歌之讌亦如之國家以周隋之後與陳北齊相近故音聲歌舞雜有四方云東夷二國髙麗百濟髙麗百濟宋朝初得之至後魏太武滅北燕亦得之而未具周武滅齊威振海外二國各獻其樂周人列於樂部謂之國伎隋文平陳及文康禮曲俱得之百濟貞觀中滅二國盡得其樂至天后時髙麗樂猶二十五曲貞元末唯能習一曲衣服亦漸失其本風矣其百濟至中宗時工人死散開元中岐王範為太常卿復奏置焉文康禮曲者東晉庾亮殁後伎人所作因以亮諡為樂之名流入樂府至貞觀十一年黜去之今亡矣南國諸侯扶南南詔天竺驃國扶南天竺二國樂隋代全用天竺列於樂部不用扶南因煬帝平林邑國獲扶南工人及其匏琴因陋不可用但以天竺樂轉冩其聲南詔樂貞元十六年正月南詔異牟尋作奉聖樂舞因西川押雲南八國使韋臯以進時御麟徳殿以閲之驃國樂貞元十八年正月驃國王來獻凡有十二曲以樂工三十五人來朝樂曲皆演釋氏經論之詞驃國在雲南西與天竺國相近故樂多演釋氏之詞毎為曲皆齊聲唱各以兩手十指齊開齊歛為赴節之狀一指一抑未嘗不相對有類中國柘枝舞驃一作僄其西别有彌臣國樂舞亦與驃國同多習此伎以樂後制使袁滋都土美至南詔並皆見此樂西戎五國髙昌康國龜兹安國䟽勒髙昌樂西魏與髙昌通始有此樂至隋開皇六年來獻聖明曲至太宗朝討其國盡得其樂事見十部伎門也龜兹樂自吕光破龜兹得其聲吕氏亡其樂分散至後魏有中原復獲之至隋有兩國龜兹之號凡三部開元中大盛於時曹婆羅門者累代相承傳其業至孫妙達尤為北齊文宣所愛毎彈常自擊羯鼔和之及周武帝聘突厥女為后西域諸國皆來賀遂備有龜兹疎勒康國安國之樂北狄三國鮮卑落稽吐谷渾部北狄樂皆馬上樂也鼓吹本軍旅之音自漢以來總𨽻鼓吹署至後魏始有此歌即魏史所謂真人歌是也周隋之代與西涼樂雜奏今存者五十三章其名目可解者數章而已解在通典按今太角即後魏簸邏迴是也其曲多可汗之詞又吐谷渾亦鮮卑别種之一歌曲皆勾卑勾奴中出也但土音不可曉耳與北歌較之其音異開元中歌工長孫元忠習北歌相傳如此雖譯者不能通知其詞其音既難曉漸乆亦失其真唯琴有胡笳之聲太角者金吾所掌工人謂之角手備鼓吹之列唐㑹要卷三十三
