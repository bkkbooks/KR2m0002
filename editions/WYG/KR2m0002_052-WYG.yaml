body:
  text: 唐㑹要卷五十二宋王溥撰識量下元和五年八月上謂宰臣曰神仙長生之說可信乎李藩對曰神仙之說出於道家然道之所宗以𤣥元五千言為本按其文皆去華尚樸絶棄健羡以執柔見素為道少思寡欲為貴其言皆於六經符協是故厯代寳之以為理國理心之要未曾有神仙不死之説後代虚誕之徒假託聖賢之言為怪譎之論末流漸廣及秦始皇漢武帝志求長生延召方士於是有盧生韓生少君欒大之類售其欺詐以為禱祠神仙可求不死二主溺信之始皇遣方士入海求三山靈藥遂外匿不歸漢武以女妻方士欒大後亦無驗欒大竟坐腰斬此則前代帝皇惑於虚説者著在前史其事甚明貞觀末年有西僧自天竺至中國自言能治長生之藥文皇帝頗信待之數年藥成文皇帝因試服之遂致暴疾及大漸之際羣臣知之遂欲戮此僧慮為中外所笑而止載在國史實為至誡古人云服食求神仙多為藥所誤誠哉是言也君人者據宇宙之廣撫億兆之衆但當嚴恭夙夜務為理安則四海樂推無思不服天命所佑自知延長不可聴誘惑之虛説陛下春秋鼎盛方志昇平倘能深鑒流弊斥逺方士則百福自生坐臻永年伏願詳考古今以保至正天下幸甚十月以前河中節度使王鍔為檢校司徒充太原節度使初鍔以錢千萬賂中貴求兼相位宰相李藩與權徳輿奉宻㫖曰王鍔可兼宰相宜即擬來藩以為不可遂以筆塗兼相字復奏上德輿失色曰縱不可别宜作奏豈可以筆塗詔耶藩曰勢迫矣出今日便不可止日且暮何暇别作奏權徳輿又續有疏曰夫平章事非序進而得國朝方鎮帯相者盖有大忠大勲大厯已來又有跋扈難制者不得已而與之今王鍔無大忠大勲又非姑息之時欲假此名實恐不可從崔氏曰此乃不諳事故者之妄傳史官之謬記耳既稱奉宻㫖宜擬來則是得擬狀中陳論固不假以筆塗詔矣凡欲降白麻若商量於中書門下皆前一日進文書然後付翰林草麻制又稱藩曰勢迫矣出今日便不可止尤為疏濶盖由史氏以藩有直亮之名欲委曲成其美豈所謂直筆哉六年上謂宰臣曰卜筮之事習者罕精或中或否近日風俗尤更崇尚何也宰相李綘對曰臣聞古先哲王畏天命示不敢専邦有大事可疑者故先謀於卿士庶人次及於卜筮俱協則行之末俗浮偽幸以徼福正行慮危邪謀覬安持疑昬惑謂小數能決之而愚夫愚婦假時日鬼神者欲利欺詐參之見聞用以刺射小近其事神而異之近者夙俗近誣成此弊俗聖㫖所及實辨邪源存而不論弊斯息矣七年五月上謂宰臣曰比者見卿等累言吳越去嵗水旱昨有御史推覆至自江淮乃言不至為災人非甚困不知竟有此否李絳對曰臣昨見浙西東及淮南奏狀云本道水旱稻麥不登至有百姓逐食多去鄉井各請設法招携意懼朝廷罪責苟非事實何敢上陳况天災流行年嵗代有方隅授任皆朝廷信重之臣此固非虛説也御史官卑選擇非必能覽奏報之間或容希媚此正當奸佞之日近有兩輩御史至江淮推鞫今理當請逐不知言者之名伏望眀示典法推誠於人夫本任大臣以事不可以小臣之言問之上曰卿言是也朝廷大體以恤人為本苟一方不稔當即日賑救濟其飢寒况可疑之耶向者不思而有此問朕知言之過矣絳等稽首陳命於是命自今凡有被飢饉之境速蠲其賦其年十一月敕王稷家告事奴付京兆府決一頓處死初奴告稷换其父鍔遺表隠沒所進錢物即令鞫其奴於内仗有發中使就東都檢責其家財宰臣裴度奏曰王鍔亡歿之後其家進獻已多今因奴上告又命檢責其家事臣恐天下將帥聞之必有以家為計者於是亟罷其使而殺其奴十四年上謂宰臣曰聴受之間大是難事推誠委任謂所委必盡心及至所行臨事無不偏黨朕命學士集前代曖昧之事為謗畧每欲披閲以為鑒戒耳崔羣對曰無情曲直辨之至易稍懐欺詐審之實難故孔子衆好衆惡之論浸潤膚受之説葢以曖昧難辨也若擇賢而任之待之以誠糾之以法則人自歸公孰敢行偽陛下詳觀載籍以廣聰眀實天下幸甚十五年十月上謂宰臣曰用兵者必有勝敗之道乎蕭悦對曰兵者凶器戰者危事聖王不得已而用之必以仁討不仁義討不義先務招懐不施掩襲古之明王之討叛不斬祀不殺厲不獲二毛不犯田稼安人禁暴如救人於水火之中故曰王者之師有征無戰此必勝之道也如或肆小忿輕動衆敵人結怨師出無名非唯不勝乃自危之道固可深戒上深嘉其言長慶元年穆宗謂宰臣曰前史稱文帝惜十家之産而罷露臺又云身衣弋綈足履革舄集上書嚢以為殿惟何太儉也信有此乎宰臣崔植對曰良史所記必非妄言漢興承亡秦殘酷之後項氏戰争之餘海内彫弊生人力竭漢文仁明之主起自代邸知稼穡之艱難是以即位之後躬行儉約繼以景帝猶遵此風由是海内黔首咸樂其生家給戸足迨至武帝公私殷富用能出師征代威行四方錢至貫朽穀至紅腐上務侈靡資用復竭末年税及舟車六畜人不聊生戸口減半乃下哀痛之詔封丞相為富人侯皆漢史明徵用為事實且耕􅁞之勤出自人力用既無度何由以致富雖據武帝嗣位之初物力阜殷前代無比固當因文帝勤儉之致也上甚善其言開成三年文宗御延英謂宰臣曰人𫝊符䜟之語自何而來宰相楊嗣復對曰漢光武好以符䜟之書決事近代隋文帝亦信此言自是符䜟日滋只如班彪王命論所引盖矯意以止賊亂非所重也李珏曰喪亂之時佐命者務伸命符理平之代只合推諸人事上又曰天后用人有布衣至宰相者當時還得力否楊嗣復對曰天后重行刑辟輕用官爵皆自圗之計耳凡用人之道厯試方見其能否當艱難之時或須拔置無事之日不如且循資級古人拔卒為將非治平之時葢不獲已而用之也上又問新修開元至要叙置何如嗣復對曰臣昔末見陛下若欲𫝊之子孫請付外參詳可否𤣥宗好遊畋或好聲色與貞觀之政不同故取舎須當方可流𫝊從之四年文宗謂宰臣曰朕在位十四年屬天下無事雖未至理平亦少有如今日也李珏對曰邦國安危如人身四體平和之時長宜調養如恃安自忽則疾患旋生朝廷當無事之時思省闕失而補之則禍亂不作矣㑹昌三年澤潞節度使劉從諫卒軍人以其姪稹擅總留後事上令宰臣議可否宰臣李德裕曰澤潞國家内地不同河朔前後命帥皆用儒臣頃者李抱眞成立此軍身殁之後德宗尚不許繼襲令李緘䕶喪歸洛洎劉悟作鎮長慶中頗亦自專屬敬宗因循遂許從諫繼襲今若不加征伐何以號令四方若因循授之則藩鎮相效自兹威令去矣上曰卿若用兵必尅否德裕曰劉稹所恃河朔三鎭但得魏鎮不與稹同破之必矣請遣重臣一人傳逹聖㫖言澤潞命帥不同河朔三鎮自艱難以來列聖皆許三鎮嗣襲已成故事今國家欲加兵誅稹其山東三州委魏鎮出兵攻之至四年果平劉稹徳裕以功兼太尉進封衛國公大中三年以户部侍郎魏謩兼平章事中謝日奏曰臣無夔契之才居夔契之任将何以仰報今邉戍粗安海内寜息臣愚所切者陛下未立東宮俾正人傅導以存儲貳之重因泣下宣宗感而聽之先是累朝人君不欲人言立儲貳若非人主已欲臣下不敢獻言宣宗春秋髙嫡嗣未辨謩作相之日率先啟奏人士重之天祐元年四月和王傅張廷範善音律求為太常卿汴滑節度使朱全忠以廷範舊將吏薦用宰相裴樞以廷範非樂卿之才不允所薦忠諫貞觀元年太宗嘗閒居與侍中王珪語時有美人侍側本廬江王瑗之嬪太宗指示之曰廬江不道賊殺其夫而納其室暴虐之甚豈有不亡乎珪曰陛下以廬江取此婦人為是耶為非耶上曰殺人而取其妻卿乃問朕是非何耶珪曰臣聞於管仲曰齊桓公之郭問其父老曰郭何故亡父老曰以其善善而惡惡也桓公曰若子之言乃賢君也何至於亡父老曰郭君善善而不能用惡惡而不能去所以亡也今此婦人尚在左右臣竊以聖心為是之耳若以為非所謂知惡不去也太宗雖不出美人而甚重其言六年十二月四日上臨朝有誡懼之言中書令温彦愽曰陛下為政若貞觀之初則無憂於不理矣上曰朕其怠乎侍中魏徴進曰陛下貞觀之初勵精思理從諫如流每因一事觸類為善志懐節儉無所營求比者造作微多諫者頗忤以此為異耳上拊掌大笑曰良有是夫十五年於益州造綾錦金銀等物特進魏徴諫曰金銀珠玉妨農事者也錦繡纂組害女工者也一夫不耕天下有受其饑一女不織天下有受其寒古人或投深谷或焚之通衢而陛下好之臣實深恥之永徽五年召長孫無忌李勣于志寜禇遂良等李勣稱疾不至皆曰當緣昭儀事或曰長孫太尉當先言之遂良曰太尉上之元舅脫事有不如意使上有怒舅之名不可又曰英公勣上之所重當先言之遂良曰司空國之元勲有不如意使上有罪功臣之名不可遂良躬奉遺詔若不盡其愚誠何以下見先帝及入上謂長孫無忌曰莫大之罪絶嗣為重皇后無𦙍息昭儀有子今欲立為皇后公等以為何如遂良曰皇后出自名家先朝所娶服事先帝無愆婦德先帝疾甚執陛下手以語臣曰我好兒好新婦今將付卿陛下親承德音言猶在耳皇后未有愆過恐不可廢臣今不敢曲從上違先帝之命上不悅翌日又言之遂良曰陛下必别立皇后伏請妙擇天下令族何必要在武氏且昭儀經事先帝衆所共知陛下豈可蔽天下耳目使萬代之後何以稱傳此事陛下倘虧人子之道自昭不善之名敗亂之端自此始也臣上忤聖顔罪合萬死倘得不負先帝則甘從鼎鑊遂置笏於殿階叩頭流血曰還陛下此笏乞放歸田里上大怒命引出之侍中韓瑗因奏事涕泣諫曰皇后是陛下在藩府時先帝所娶今無愆過即便廢出四海之士誰不惕然且國家累有廢立非長久之計也願陛下為社稷大計上不納及禇遂良貶官瑗復上疏理之曰遂良竭志公家親承顧託一德無二千古凜然此不待臣言陛下自知之矣無聞罪狀斥去朝廷上曰遂良悖戾犯上以此責之朕豈有過耶卿言何若是之深也瑗曰遂良可謂社稷忠臣昔微子去之而殷國以亡張華不死而綱紀不亂國之欲謝善人其衰伏願違彼覆車救以徃過不納表請歸田里不許瑗又上疏曰臣聞王者立后作配天地比德日月若日月並明則照臨四海若日月薄蝕則天地昏矣且匹夫匹婦尚相簡擇况天子乎夫皇后母儀家國善惡之由故嫫母輔佐於黄帝妲己傾覆於殷王前載之事殷鑒不逺詩云赫赫宗周褒姒滅之每覽前古未嘗不輟卷太息不謂今日塵黷聖世如今不法後嗣何觀伏惟陛下詳之無為後人所笑若使殺身以益國家葅醢之戮臣之分也昔呉王不用子胥之言子胥云臣見麋鹿逰於姑蘇臣恐海内失望之後有荆棘生於闕庭宗廟不血食期有日矣中書侍郎來濟又密表諫曰臣聞王者之立后也将以上合乾坤之道象二儀敷育之義主承宗廟母臨天下匹配后土執饋皇姑必擇禮教名家幽閒淑令副四海之望稱神祇之意自古周文造周姒氏興關雎之化百姓䝉祚漢孝成任心從欲以婢為后遂使皇統中絶社稷淪傾有周之崇既如彼大漢之禍又如此惟陛下詳察顯慶元年四月二十五日上謂侍臣曰馭下之道前王深以為難稽古先王應有其要公等宜思此術為我且論之中書令來濟對曰臣聞齊桓公出遊見一飢寒老人命食之老人曰請食天下食公遺之衣老人曰請遺天下衣桓公曰府庫有限安能周及老人曰不然春不奪農時人即有食夏不奪􅁞工人即足衣由此言之省其徭役人自安之近者為山東役丁年别有數萬人將為煩擾欲取其庸直在京僱人充役復恐非宜臣等商量望長久法依舊役丁為便凡所施令貴在長行令正課外無别徭役足為穏便神龍元年二月侍中桓彦範上疏曰昔孔子論詩以關雎為始言后妃者人倫之本理亂之端也故皇英降而虞道興任姒歸而周宗盛桀奔南巢禍階妹喜魯桓滅以齊媛伏見陛下每臨朝聽政皇后必施帷幔坐於殿上得聞政事臣愚歴選列辟詳求往代帝皇有與婦人謀及政事者莫不破國亡身傾輈繼路且以隂乘陽違天也以婦凌夫違人也違天不祥違人不義由是古人譬以牝雞之晨惟家之索易曰無攸遂在中饋言婦人不可參預國政伏願陛下覽古人之言察古人之意上以社稷為重下以蒼生為念宜令皇后無往正殿干及外朝專在中宮聿修隂教則坤儀式固鼎命惟永又道路籍籍皆云西僧惠範矯託佛教詭惑后妃出入禁闈撓亂國政陛下微行數幸其私第上下媟黷有虧尊嚴又聞興化致理必由進善康國寜人莫大弃惡故孔子曰執左道以亂政者殺假鬼神以疑衆者殺今惠範之罪甚於此也若不急誅必生變亂除惡務本去邪勿疑實賴天聰早加裁貶上不納景雲元年六月睿宗初即位與侍臣議立皇太子中書舍人參知幾務劉幽求進曰臣聞除天下之禍者享天下之福拯天下之危者受天下之安伏以平王除社稷之危救君親之難論功則莫大語德則最賢臣又聞宋王已下以平王有大功咸懐推讓上意乃定開元二十一年萬年縣尉李美玉得罪上令流於嶺外黄門侍郎韓休進諌曰今朝廷有大奸尚不能去豈得捨大而取小也臣竊見金吾大將軍程伯獻恃怙恩寵所在貪冒第宅輿馬僭擬過甚臣請先出伯獻而後罪美玉上不許休固爭曰美玉微細尚猶不容伯獻臣猾豈能無罪陛下若不出伯獻臣即不敢奉詔流美玉上以其言切直竟從之宋璟聞之曰不謂韓休乃能如此是仁者之勇也二十四年崔希逸代牛仙客為河西節度奉河西軍資儲蓄萬計遂令刑部員外郎張利貞覆之有實上悅将與之尚書中書令張九齡諫曰不可尚書古之納言若非歴踐内外清貴之地妙選有德者不得充之仙客河湟一使典耳㧞升清流齒班常伯此官邪也又将與之封九齡曰邉将積糓帛繕兵器葢将帥之常耳陛下賞之金帛則可必不可裂地而封上怒曰卿以仙客寒士嫌之耶卿豈有門籍九齡頓首謝曰臣荒陬賤類陛下以文學用臣仙客起自胥吏目不知書韓信淮隂一壮士羞與絳灌齊列陛下必大用仙客臣亦恥之元和六年上謂宰臣曰大凡行事恒患不通於理已然之失追悔誠難古人處此復有道否李絳對曰行事過差聖哲之所不免故天子致羣臣以匡其失故主心治於中臣論正於外制理於未亂銷患於未萌主或有過則諫以正之故上下同體猶手足之於心膂交相為用以致康寕此亦常理非難遵之事但矜得䕶失常情所蔽古人貴改過不吝從善如流良為此也臣等備位無所發明但陛下不廢芻言則端士賢臣必當自效上曰朕擢用卿等所欲兾直言各宜盡心以匡不逮無以䕶失為慮也九年十二月釋下邽令裴寰之罪初每嵗冬以鷹犬出近畿習狩謂之外按使領徒數百軰恃恩恣横郡邑懼擾皆厚禮迎犒恣其所便止舍畱邸百姓畏之如冦盜每畱旬日方更其所至是行恣下邽寰為令嫉其强暴擾人但據文供饋使者歸乃譖寰有慢言上大怒將以不敬論宰相武元衡等於延英救理之上怒不改及出逄御史中丞裴度入元衡等謂曰裴寰事上意不開恐不可論度唯唯而入抗陳其事謂寰無罪上愈怒曰如卿言罪則當决坊小使如小使無罪則當决寰度曰誠如聖㫖但以裴寰為令長憂惜陛下百姓如此豈可罪之上怒稍解初令書罸翌日釋十三年二月上以淮蔡既平將欲内宴因是稍恢宫觀廣制度詔六軍使剏修麟德殿之名廓公費不足至有出家財以助軍使張奉國白於執政裴度從容上言曰陛下有將作内作營搆之役有司具存豈可使功臣破産修造上怒奉國軰漏洩令奉國致仕斥李文悅梁希逸歸私第俄釋不問其年十月杖殺五方使楊朝汶初有賈人張渉負五坊息利錢徴理經時不獲朝汶遂取張渉私家簿記有姓名者雖已償訖悉囚捕重令償之其間或不伏者即列諸拷捶之具於庭平人恐懼遂稱寔負渉錢互相牽引繫囚至數十百人中書門下御史臺皆為追捕又於渉家得盧載初負錢文記云是盧大夫書跡遂追故東川節度使盧坦家僮促期使納坦男不敢理盡以償訖徴其手記乃鄭滑節度使盧羣筆也羣字載初既而坦男理其事五坊使曰此錢已上進不可得矣於是御史中丞蕭俛洎諫官累上疏陳其暴蠧之状宰臣裴度崔羣因對又極言之上曰且欲與卿等商量東軍此小事我自處置裴度進曰用兵小事也五坊使追捕平人大事也兵事不理只憂山東五坊使横暴恐亂輦轂上初不悦及對罷乃大悟召五坊使數人曰嚮者為爾使吾羞見宰臣遂杖殺之即日原免坐繫者其年十二月上嘗與宰臣議及人臣事主當力行善事自致公望何乃好樹朋黨朕甚惡之裴度對曰臣聞方以類聚物以羣分故君子小人未有無徒者但君子為徒則是同心同德小人為徒則是朋黨此事外甚相似中實相逺在聖主觀其所行事以辨之耳上良久曰他人有言亦與卿等相似豈易辨之度等退相謂曰聖上今日所論君子小人之事可謂誠言是則聖㫖以為難辨則難矣但陛下以為辨之難則君子小人彌久當自區别矣他日宰臣或以當今利病欲有所釐改及陳為臣事君之道上往復詰問既盡理之後則曰凡好事口說則易躬行則難卿等既為朕言之當須行之勿空陳說而已宰臣起而對曰書曰非知之艱行之惟艱陛下今日處分可為至言臣等敢不䇿勵以副天心然亦以天下之人從陛下所行不從陛下所言臣亦願陛下無言之在行之耳十四年九月上謂宰臣曰朕讀𤣥宗實錄見開元之初銳意求理至十五六年則稍懈至開元末又似不及中年其故何也崔羣對曰𤣥宗生長人間身經屯難故即位之初知人疾苦躬恤庻政有姚崇宋璟盧懐愼輔以道德蘇頲張嘉貞李元紘杜暹韓休張九齡皆孜孜守正以故稱理其後承平日久安於逸樂漸逺正士而近小人宇文融以聚歛媚上心李林甫以奸邪惑上志而終任楊國忠故及於亂今陛下以開元初為法以天寳末為戒是乃社稷無疆之福也時有以諂刻欺蔽在相位者故羣以是諷焉長慶元年八月上謂宰臣曰國家貞觀中致理昇平盖太宗文皇帝躬行至德以啟王業及至開元累有内難𤣥宗臨御興復不易而聲明最盛厯年最久何以致之也崔植對曰前代創業之君多起自民間知百姓之疾苦初承丕業皆能勵精太宗又特稟上聖之資同符堯舜是以貞觀一朝四海寧泰又有房𤣥齡杜如晦魏徵王珪之比為輔佐動皆直言事無不理𤣥宗守文繼體嘗經天后朝危懼久遭艱危開元初得宋璟姚崇委之為政此二人皆上材公直動每推公又每進忠言致君於道璟嘗自寫尚書無逸篇為圖以獻𤣥宗置之内殿出入觀省常記在心故任賢戒慾朝夕孜孜開元末因無逸圖壊始以山水圖代之自後既無座右箴規又奸臣用事希恩養慾實兆亂萌建中初德宗皇帝嘗問先臣開元天寳間事先臣具以此事陳奏臣在童丱即聞其說信知古人以韋弦作戒其益𢎞多伏願陛下以無逸為元龜天下幸甚上深納其言四年五月敬宗以富有春秋畋獵之暇好治宫室嘗建别殿以新讌遊及庀徒蕆事功用至廣宰臣李程諫曰自古聖帝明王率資儉德以化天下况諒隂之内豈宜興作願陛下悉以見在瓦木及工役之費囘奉陵寢上嘉納焉咸通八年懿宗命伶官李可及為左威衞将軍中書侍郎監修國史曺確執奏曰臣覽貞觀故事太宗初官品令文武官共六百四十三員顧謂𤣥齡曰朕設此官員以待賢士商工雜色之流假令術踰儕類止可厚給財物必不可授之官秩太和中文宗欲以伶官尉遲璋為王府率拾遺竇洵直極諫乃改光州長史伏望以兩朝故事别授可及之官疏奏不從十一年同昌公主薨懿宗尤所鍾愛以翰林醫官韓宗邵等用藥無效繫之獄宗族連引三百餘人宰相劉瞻召諫官令上疏皆無敢言之者瞻乃自上章極言帝怒貶為康州刺史唐㑹要卷五十二
