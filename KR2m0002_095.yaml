body:
  text: 唐會要卷九十五宋王溥撰髙昌髙昌者漢車師前王之庭後漢戊巳校尉之故地漢時興師西討軍中羸憊者留居焉地形髙敞故因名髙昌壘有八城本皆中國人也後魏時為郡以闕爽為太守尋為且渠無諱所奪居數世髙昌滅之以燉煌人張孟明為國王國人殺之共立馬儒又殺之乃立其長史金城麴嘉為王嘉自云河東人世修職貢於中國有文字知書計置官亦採中國之號其王伯雅即嘉之六世孫武德七年獻拂菻狗雌雄各一髙六寸長尺餘中國有拂菻狗自此始也貞觀四年其王文泰來朝泰即伯雅子也妻宇文氏即隋煬帝所賜華容公主也請入宗親詔賜姓李氏封常樂公主其後與突厥連結諸國朝貢者皆路出髙昌文泰稍壅絶之至十三年太宗謂其使曰髙昌數年來朝貢脫略無藩臣之禮今兹歲首萬國來朝而文泰不至我使人至彼文泰云鷹飛于天雉竄于蒿貓逰于堂鼠安于穴各得其所豈不理耶明年當發兵以擊爾也十四年八月十日交河道行運大總管侯君集副總管牛進達平髙昌國下其郡三縣五城二十二户八千四十六口萬七千七百三十八馬四千三百匹太宗欲以其地為州縣魏徵諌曰未若因撫其人而立其子所謂伐罪弔民威德被于遐外為國之善者也今若利其土壤以為州縣常須千餘兵鎮守數年一易往來交替死者十有三四遣辦衣資離别親戚十年之後隴右空虛陛下終不得髙昌撮粟尺布以助中國所謂散有用而資無用太宗不從以其地為西昌州又改為西州以交河城為交河縣始昌城為天昌縣田城為栁中縣東鎮城為蒲昌縣髙昌城為髙昌縣並為部護府留軍以鎮之初西突厥遣其葉護屯兵于可汗浮圗城與髙昌為影響至是懼而來降以其地為庭州並置蒲類縣國威既震西域大懼焉耆王詣軍門請謁留兵鎮守刻石紀功而還每歲調發千人防邊黃門侍郎褚遂良上疏曰臣聞古者哲后必先華夏而後夷狄務廣德化不事遐荒是以周宣薄伐至境而止始皇逺塞中國分離漢武負文景之聚財玩士馬之餘力始通西域將五十年復得天馬于宛城采蒲桃于安息而海內空竭生人物故所以租至六畜算至舟車因之凶年盜賊並起搜粟都尉桑𢎞羊復主意請遣士卒達舊輪臺築城以威西域武帝慨然追悔情發于衷棄輪臺之野下哀痛之詔人神咸悅海內乂康向使武帝復用桑𢎞羊之言天下生靈皆盡之矣是以光武中興不踰蔥嶺孝章即位都護來歸陛下誅滅髙昌威加西域收其鯨鯢以為州縣然則王師被發之歲河西供役之年飛芻挽粟十室而九數部蕭然五年不復陛下歲遣千餘人逺事屯戍經年離别萬室思歸去者資裝自須營辦既費芻粟停其機杼經途死亡復在言外兼遣罪人增其防護彼罪人者生于敗肆終朝墮業犯禁違公謂之浮薄徒能擾于邊城必無益于行陳所遣之內復有逃亡官司捕捉為國生事設令張掖塵飛酒泉烽舉陛下豈能得髙昌一人升粟而及事平終須發隴右諸州星馳電擊由斯而言此河西者已之腹心彼髙昌者他人手足豈得縻費中原以事無用書曰不作無益害有益此之謂也陛下平頡利于沙塞滅吐渾于西海突厥餘衆為竒渾汗遺氓更樹君長復立髙昌非無前例此所謂有罪而誅之既復而立之四海百蠻誰不聞見蠕動懷生畏威慕德宜擇髙昌可立者而立之徵給首領兼還本國負戴漢恩長為藩翰中國不擾既富且寧傳之子孫以貽永世初平髙昌君集至京師有司劾其私取寶物詔下獄中書侍郎岑文本上疏曰髙昌昏迷人神共棄在朝議者以其地在遐荒咸欲置之度外惟陛下運獨見之明授決勝之略君集奉行聖算刻期平殄陛下謙而不居乃推功于將帥露布初至便降大恩從征之人皆霑滌蕩內外文武咸德陛下賞不踰時不盈數日並付大理雖君集等自挂網羅恐海內疑陛下惟録其過以遺其功古之人君出師命將克敵則獲重賞不克則加嚴刑當其有功也雖貪殘淫縱必蒙青紫之寵當其無功雖勤功潔已不免鈇鉞之誅故周書曰記人之功忘人之過宜為君也昔漢二師駿馬三十匹雖斬宛王之首而罪惡甚多武帝以為萬里征伐不録其過遂封海西侯又校尉陳湯矯詔興師雖斬郅支單于而湯盜所收康居財物為司𨽻所繫湯乃上疏曰臣與吏人共誅郅支幸得擒滅今司𨽻乃收繫按驗是為郅支報讎也元帝赦其罪封湯關內侯又晉龍驤將軍王濬有平吳之功而王渾苛論濬軍人得皓寶物濬上表曰今年平吳誠為大慶于臣之身更為咎纍武帝赦而不推封襄陽侯近隋新義郡公韓擒虎平陳之日縱士卒暴亂取寶宮內帝亦不問罪加上柱國由斯觀之將帥之臣廉慎者少貪求者衆也古之軍勢曰使智使勇使貪使愚故智者樂立其功勇者好行其志貪者邀趨其利愚者不計其死是知前王莫不收人之長棄人之短良為此也陛下若降雨露之澤收雷電之威録其微勞忘其大過是使立功之士因兹而皆勸負罪之將由斯而改節乃釋君集等先是文泰已死國人立其男智盛為王竟為君集執獻于觀德殿初其國童謡曰髙昌兵馬如霜雪漢家兵馬如日月日月照霜雪回首自消滅文泰使人捕其首唱者不能得麴氏有國至智盛凡九代一百四十四年而滅尋拜智盛為左武衛將軍封金城郡公弟智湛為右武衛中郎將封天山縣公智湛後終于左驍衛將軍西州刺史天授初其子崇裕授左武衛大將軍交河郡王崇裕卒封襲遂絶髙句麗髙句麗者出自扶餘氏其後有蒙孫莫來者滅扶餘都平壤即玄菟之故地俗頗知書記而恆與中國通武德七年二月七日遣使內附受正朔請頒厯許之八年三月十一日髙祖謂羣臣曰名實之間理須相副髙麗稱臣以自尊大可即詔述朕此懷也裴矩溫彥博進曰遼東之地周為箕子之國漢時之玄莬郡耳魏晉以前近在提封之內不可許以不臣若與髙麗抗禮四方必當輕漢且天朝之于諸國猶日月之于列星理無降尊俯同藩服乃止貞觀十八年太宗謂侍臣曰髙麗莫離支賊殺其主盡誅大臣用刑有同坑穽夫出師弔伐須有其名因其內亂而取之為易諌議大夫禇遂良進曰兵若渡遼事須尅捷萬一不獲無以威示逺方必更發怒再動兵衆若至於此安危難測太宗然之兵部尚書李績曰近者延陀犯邊陛下必欲追擊但為魏徵之諌所以遂用其言此之失機亦由徵之誤訃倘若仰申聖䇿延陀無一人生還可五十年間邊境無事至十一月十六日以刑部尚書張亮為平壤道行軍大總管自萊州泛海趨平壤又以特進李績為遼東道行軍大總管趨遼東兩軍合勢以其月之三十日征遼之兵集於幽州安州人彭惠通請出布帛五千段以資征人上嘉之比漢之卜式拜宣義郎十九年四月李績攻拔蓋牟城獲口二萬以其城置蓋州五月上渡遼水詔徵橋梁以堅士卒之心上親率甲騎與李績攻遼東城拔之以其城為遼州六月攻拔白岩城以其城為岩州遂引軍次安市城進兵以攻之會髙麗北部耨薩髙延夀南部髙惠真率靺鞨之衆十五萬來援于安市城東南八里依山為陳上令所司張受降幕於朝堂之側曰明日午時納降人于此上夜召文武躬自指麾是夜有流星墜賊營中明日及戰大破之延夀惠真率三萬六千八百人來降上將豪首三千五百人授以軍職遷之內地餘三萬人悉放還平壤城靺鞨三千人並坑之獲馬五萬匹牛五萬頭甲一萬領因名所幸山為駐蹕山命許敬宗為文勒石以紀其功遂移軍于安市城南久不尅九月遂班師先遣遼蓋二州户口渡遼乃召兵馬厯其城中而旋城主升城拜辭太宗嘉其堅守賜縑百匹以勸事君者十一月至幽州初入遼也將十萬人各有八馱兩軍戰馬四萬匹及還死者一千二百人八馱及戰死者十七八張亮水軍七萬人沈海溺死者數百人凡渡遼蓋二州戶口五日入內地前後七萬餘人二十年李績復大破髙麗于南蘇班師至頗利城渡白狼黃岩二水皆不勝舟楫績怪二水淺狹問契丹遼源所在云此二水更行數里即合南流即稱遼水更無遼源可得也二十二年七月太子太傅知門下省事房玄齡謂諸子曰吾自度危篤以東討不停豈可使吾銜恨北地遂封表上諌曰臣詳觀方今為中國患者無過突厥遂能坐運神䇿不下殿堂大小可汗相次束手分典禁衛執戟行間其後延陀鴟張尋就夷滅鐵勒慕義請置州縣沙漠已北萬里無塵如髙昌叛渙于流沙吐渾首竄于積石偏師薄伐俱從平蕩髙麗歷代逋誅莫能討擊陛下責其逆亂殺王虐人親總六軍問罪遼碣未經旬日即滅遼東前後虜獲數十萬人分配諸州無處不滿雪往代之宿恥掩崤陵之枯骨比功校德萬倍前王此聖主之所自知微臣安敢備記今臣深為陛下惜之重之愛之寶之周易曰知進退存亡而不失其正者其惟聖人乎由此言之進有退之義存是亡之幾得有喪之理老臣所以為陛下惜之蓋謂此也陛下威名功德亦可足矣拓地開疆亦可止矣彼髙麗者邊夷之賤類不足待以仁義不可責以常理古來以魚鱉畜之宜從闕略若必欲絶其種類恐獸動則摶陛下每決死囚必令三覆五奏進素食停音樂蓋以人命所重感動聖慈也况今兵士之徒無一罪戾無故驅之于戰陳之間委之于鋒刃之下使肝腦塗地魂魄無歸令其老父孤兒寡妻慈母望輜車而掩泣抱枯骨而椎心足以變動隂陽感傷和氣實天下之寃痛也且兵凶器也戰危事也不得已而用之向使髙麗違失臣節而陛下誅之可也使失百姓而陛下滅之可也久長能為中國患而陛下除之可也有一于此雖日殺萬夫不足為愧今無此三條坐煩中國內為舊主雪怨外為新羅報讎豈非所存者小所損者大願陛下遵皇祖老子止足之誡保後代巍巍之名發沛然之恩降寬大之詔順陽春以布澤許髙麗以自新臣老病三公朝夕入地所恨竟無塵露以增海嶽謹罄殘魂餘息先代結草之誠倘蒙録此哀鳴即臣死且不朽八月徐充容上表曰竊見頃年已來力役兼總東有遼海之軍西有昆邱之役士馬疲于甲胄舟車倦于轉輸且召募投戎去留懷生死之病因風阻浪存沒有漂溺之危一夫力耕卒無數十之獲一船致損則傾數萬之糧是猶運有盡之農功填無窮之巨浪圗未獲之他衆喪已成之我軍雖除凶伐暴有國常規然黷武玩兵先哲所戒昔秦王並吞六國返速危亡之期晉武奄有三方翻成覆敗之業是知地廣非久安之術人勞乃易亂之原願陛下布澤流仁矜弊恤乏減行役之煩增湛露之惠龍朔元年四月十六日兵部尚書任雅相為江道行軍大總管三十六軍水陸分途先觀髙麗之釁上將親率六軍以繼之蔚州刺史李君球上疏曰臣聞司馬法曰國雖大好戰必亡天下雖平忘戰必危戰者危事兵者凶器故聖主明王重行之也憂人力之盡恐府庫之殫懼社禝之危生中國之患故古人云務廣德者昌務廣地者亡昔秦始王好戰不已至于失國是不愛其內而務其逺故也漢武逺討朔方始平萬里廣拓南海入部給符户口減半國用空虛至于末年方垂哀痛之詔自悔其失彼髙麗者僻側小醜潛藏山海之間得其人不足以彰聖化棄其地不足以損天威何至疲中國之人傾府庫之實使男子不得耕耘女子不得蠶織陛下為人父母不垂惻恤之心傾其有限之資貪彼無用之地設令髙麗既滅即不得不發兵鎮守不多兵威不足多發即人心不安是乃疲于轉戍萬姓無聊生則天下敗矣天下既敗即天子何以自安故臣以為征之不如不征滅之不如不滅惟陛下裁斷焉乾封元年李績攻拔無餘城遂與諸軍相會時侍御史賈言忠充支度遼東軍糧使還上問以軍事言忠畫其山川地勢且言遼東可平之狀上問曰卿何以知其平也對曰昔隋主親率六軍覆于遼東者人事然也煬帝無道軍政嚴酷舉國皆役天下離心玄感一唱狼狽而返身死國亡自取之也及先帝親往問罪所以不得志者髙麗未有釁也諺曰賊無隙中道回今髙麗已失其政人心不附男女兄弟相為攻擊脫身來奔為我鄉導彼之情偽盡知之矣以國家富強陛下明聖將士盡心滅之必矣且臣聞髙麗祕記云不及千年當有八十老將來滅之自前漢之髙麗氏即有國土及今九百年矣李績年登八十亦與其記符同又髙麗頻歲飢荒賣鬻男女無故地裂狼狐入城蚡鼠穴于國門之下其俗信妖迭相驚駭天意如此人事如彼臣竊以為是行不再舉矣上曰卿觀遼東諸軍孰賢對曰李績先朝舊臣聖鑒所悉龎同善雖非鬭將而持軍嚴整薛仁貴勇冠三軍威名逺震髙侃勤儉自處忠果有餘契苾何力沈毅持重統御之才雖頗有忌前之癖而臨事能斷然諸將夙夜小心忘身憂國者莫逮于李績上深然其言總章元年夏四月彗星見于五章許敬宗以為星孛于東北王師問罪此髙麗將滅之徵九月李績拔平壤城虜髙藏男建等十二月至新豐詔取使道俘于昭陵乃備軍容奏凱樂獻于太廟詔以髙藏政不由已赦其罪授司平太常伯男産授司宰少卿男建配流黔州分其地置都督府九州三十二縣一百鎮又置安東都護以統之移其户二萬八千于內地儀鳳中髙宗授髙藏遼東都督府封朝鮮王居安東與本蕃為主髙藏至安東潛與靺鞨相通謀叛事覺召還配流卭州以永淳初卒贈衛尉卿聖厯二年又授髙藏男德武為安東都督以領本蕃自是髙句麗舊户在安東者漸寡少分投突厥及靺鞨等其舊地盡入于新羅髙氏君長遂絶元和十三年四月其國進樂物兩部百濟百濟者本扶餘之别種當馬韓之故地其後有髙仇台為髙麗所破以百家濟海因號百濟焉大海之北小海之南東北至新羅西至越州南渡海至倭國北渡至髙麗其王所居有東西城其所置官有內佐平掌宣納事內頭佐平掌庫藏事內法佐平掌禮儀事衛士佐平掌宿衛兵事朝廷佐平掌刑獄事兵官佐平掌兵馬事又外置六方管十郡其用法叛逆者死殺人者以奴婢三人贖罪官人受財及盜者三倍追贓餘多與髙麗同武德四年其王扶餘璋遣使獻果下馬與新羅世為仇讎貞觀十六年與髙麗通和以絶新羅入朝之道太宗親征髙麗百濟懷二數年之間朝貢遂絶至五年八月十三日左衛大將軍蘇定方討平之虜其王義慈及太子善將校五十八人送于京師其國分為五部統郡三十七城二百户七十六萬至是以其地置熊津馬韓東明金漣德安等五都督各統州縣立其酋長為都督刺史縣令命左衛郎將王文度為都統總兵以鎮之義慈事親以孝聞友于兄弟時人號為海東曾閔及至京數日病卒葬于孫皓陳叔寶墓側至麟德三年已後其地為新羅靺鞨所分百濟之種遂絶新羅新羅者本辨韓之地其風俗衣服與髙麗百濟略同而朝服尚白好祭山神國人多金朴兩姓他姓不為婚姻重元日以其日拜日月諸神髮長繞地其先出髙麗魏將毌邱儉之破髙麗也其衆遁保沃泔後歸故國其留者號新羅永徽元年新羅王金真德大破百濟遣使金法敏來朝乃織錦作五言太平詩以獻帝嘉之拜法敏為太府卿五年真德卒髙宗為舉哀放永光門使太常卿張文收持節弔祭之贈開府儀同三司仍賜綾綵二百段詔其子春秋嗣位顯慶元年三月又破百濟兵遣使來告龍朔元年春秋卒詔以其子法敏嗣位三年四月詔以新羅國置雞林大都督仍授法敏雞林大都督麟德二年八月法敏與熊津都督扶隆盟于百濟之熊津城且盟百濟儋羅倭人四國使浮海西還以赴太平之約上元元年二月新羅王金法敏既納髙句麗叛亡之衆又封百濟故地遣兵守之帝大怒詔削法敏官爵遣宰臣劉仁軌討之仍以法敏弟右驍衛員外大將軍臨海郡公金仁問為新羅王時仁問在京師詔令歸國以代其兄仁問行至中路聞新羅降仁問乃還二年二月雞林道行軍大總管劉仁軌大破新羅之衆于七重城而還新羅于是遣使入朝伏罪並獻方物前後相屬意復法敏官爵既盡有百濟之地及髙麗南境髙麗東西約九百里南北約一千八百里於界內置上良康熊金武漢朔溟等州所輸物産為新羅之最開耀元年法敏卒遣使册立其子政明為王仍襲父官爵長夀二年政明卒册立其子理洪為王三年遣使來朝其年理洪卒册立其弟崇基為王仍令襲兄輔國大將軍左豹韜大將軍雞林州都督神龍三年授驃騎大將軍先天元年改名興光開元十年頻遣使獻方物十二年興光遣使獻果下馬二匹牛黃人參頭髮朝霞紬魚牙紬細鏤鷹鈴海豹皮金銀等仍上表陳謝至十二年遣其臣金武勳來賀正及武勳回降書賜之又使其弟金嗣宗來朝並貢方物至二十一年加興光寧海軍使其年命太僕卿員外置金思蘭使于新羅思蘭本新羅之行人恭而有禮因留宿衛及是委以出疆之任且便之也前年帝賜興光白鸚鵡雌雄各一及紫羅繡袍金銀鈿器物瑞文繡緋羅五色羅綵綾共三百餘段至興光遣使從姪志亷奉表陳謝仍奏國內有芝草生畫圗而獻二十年又遣其大臣金竭丹來賀正又遣姪志亷來獻方物授志亷鴻臚少卿員外置賜絹百匹留宿衛二十三年十一月遣從弟大阿食金忠相來朝死於路贈衛尉卿二十五年興光卒其子承慶嗣位遣使來告帝悼惜之又贈太子太保命贊善大夫邢璹攝鴻臚少卿往其國行弔祭册立之禮至二十八年册承慶妻朴氏為新羅王妃天寶三年承慶卒命弟憲英嗣位仍襲開府儀同三司都督雞林州刺史兼持節寧波軍事是載四月遣使謝恩并獻方物十月遣使來賀正授莊清道率府員外長史賜緑袍銀帶放還蕃自後頻來朝七年遣使獻金銀及六十總布魚牙紬朝霞紬牛黃頭髮人參寶應二年憲英遣使朝貢授其使校檢禮部尚書放還大厯二年憲英卒册立其子乾運為王三年二月命倉部郎中歸宗敬兼御史中丞持節册命又册乾運母為太妃七年遣使金標石來賀正授衛尉員外少卿放還八年遣使來朝並獻金銀牛黃魚牙紬朝霞紬等方物建中四年乾運卒無子國人立其上相良相為王貞元元年授良相檢校太尉都督雞林州刺史寧海軍使新羅國王仍令户部郎中蓋損持節册命其年良相卒立上相敬信為王令襲其官爵信即相之從兄弟也十四年敬信卒其子先敬信亡國人立敬信嫡孫權知國事俊雍為王十六年授俊雍開府儀同三司檢校太尉新羅王令司封郎中兼御史中丞韋丹持節册命明年至鄲州聞俊雍卒其子重興立詔丹還永貞元年詔遣兵部郎中李元先持節册興為王元和元年十一月放宿衛新羅王子金忠獻歸本國仍加試祕書監二年遣使金力竒來朝其年七月力竒上言奉恩册臣故主俊雍為王母申氏為太妃妻叔氏為王妃册使韋丹至中路知俊雍薨其册即迥回在中書省令臣還國伏請授臣以歸敕金俊雍等册宜令鴻臚寺于中書省受領至寺宣授與金力竒令奏歸國仍賜其叔升門戟令本國準例給四年遣使金陸珍等來朝貢五年其王子金憲章來朝貢七年重興卒其相金彥升遣使金昌南等來告哀其年授彥升開府儀同三司檢校太尉侍郎大都督雞林州諸軍事兼持節寧海軍上柱國新羅王彥升妻朴氏册命為妃仍賜其宰相金崇斌等三人戟亦令本國凖給兼命職方員外郎攝御史中丞崔延持節弔祭册立其質子金士臣副之十一年十一月其入朝王子金士臣等遇惡風飄至楚州鹽城縣界淮南節度使李鄘以聞是歲新羅飢其衆一百七十人求食于浙東十五年遣使朝貢長慶二年十二月遣使金柱弼朝貢寶厯元年其子王金明來朝兼充宿衛太和四年彥升卒五年四月詔以新羅王金景徽為開府儀同三司檢校太尉使持節大都督雞林州諸軍事兼充寧海軍使景徽母朴氏冝册為太妃妻朴氏册為妃太子左諭德兼御史中丞源寂持節弔祭册立焉開成元年遣使金義琮來謝恩兼宿衛二年四月十一日放還蕃賜物有差五年四月鴻臚寺新羅國告哀質子及年合歸國學生等共一百五人並放還會昌元年七月敕歸國新羅前入新羅宣慰副使前充兖州都督府司馬賜緋魚袋金雲卿為淄州長史唐會要卷九十五
