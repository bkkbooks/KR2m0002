body:
  text: 唐會要卷八十四宋王溥撰租税下元和十五年八月中書門下奏伏凖今年閏正月十七日𠡠令百僚議錢貨輕重者今據郡官户部尚書楊於陵等伏請𣙜天下兩税酒塩利等悉以布帛絲任土所産物充税並不徴見利則物漸重錢漸輕農人且免賤賣疋帛者伏以郡官所議事皆至當深利公私請商量付度支據諸州府應徴兩税供上都及留州留使舊額起元和十年以後並改配端疋斤兩之物為税額如大厯以前租庸課調不計錢令其折納使人知定制供辦有常仍約元和十五年徴納布帛等估價其有舊納虚與估依虛估逥計如舊納實估物並見錢即于端疋斤兩上量加估價廽計變法在長其物價價長則永利公私雖㣲有加税法行即當就實比舊給用因利而不害仍作條件處置編入旨符其塩利酒利本以𣙜率計錢有殊兩税之名不可除去錢額但舊額中有令納錢者亦請令折納時估疋叚官既不專以錢為税人得以所産用輸則錢貨必均其輕重農畝自廣于蠶織便時惠下庻得其冝其土乏絲麻或地連邊塞風俗既異賦入不同請商量委所司裁酌隨便宜處置𠡠旨宜依太和二年二月興元尹王涯奏興元府南鄭兩税錢額素髙每年徴科例多懸欠今請于管内四州均攤代納二千五百貫文配蓬州七百五十貫巢州七百五十貫通州五百貫巴州五百貫𠡠旨宜付所司四年五月劍南西川宣撫使諌議大夫崔戎奏准詔旨例置西川事條令與郭釗商量兩税錢税内三分二分納見錢一分折納疋叚每一貫加饒五百文計優饒百姓一十三萬四千二百四十三貫文依此曉喻百姓訖經賊州縣准詔三分减放一分計减放錢户萬七千六百二十貫文不經賊處先徴見錢令三分一分折納雜物計優饒百姓一十三萬舊有税薑芋之類每畝至七八百徴歛不時令併省税名盡依諸處為兩限等第戸給户帖餘一切名目勒停𠡠旨冝依六年天平軍奏請起太和七年嵗供兩税𣙜酒等錢十五萬貫粟五萬石自元和末収復李師道十二州朝廷務安反側征賦所入盡留贍軍至是方歸王府開成二年二月𠡠節度諸州府或遇水旱有欠税額合供錢物斛㪷可即委州縣長官設法招携及召户承佃其錢陸續填納年終後具歸復塡補錢物數聞奏并報度支其刺史縣令得替須代替人交割仍須分明具見在主客户交付後人不得逓相推注用破税錢其所招之日不得將當處大户擘為小户别有配率四年十月中書門下奏准開成元年三月十日𠡠冝令兩税州府各于見任官中揀擇清強長定綱徃來送五萬至十萬為一綱綱官考滿本州便與依資奏改通計十年徃來優成與依資選遷當處令鈐長焉如本州官資望無相當者許優成奏他處官者伏以諸道有上供兩税錢物者大小計百餘處舊例差州縣官充綱亦不聞過有敗闕若依勑以長定綱為名則命官不以才能賦禄難憑僦運况江淮財賦大州每年差綱十餘軰若令長定則官員長占于此流若祗取數人綱運當虧其大半臣等商量長定綱起來年已後勒停臣又准開成元年以前旨條州縣官充綱送輕貨四萬已上無欠少不逾程限者書上考十萬减一選其於優奨猶似稍輕送二萬至五萬依舊書上考五萬至七萬與减一選七萬至十萬减二選十萬至十五萬减三選如一度充綱優勞未足考秩之内情願再差者旨條先有約約絶此後望今開許如年少及材質不當但令准舊例以課料資陪不必一例依次差遣其餘並望准前旨條處分𠡠旨宜依其年十二月邕管經畧使唐𢎞實當管上供兩税錢一千四百七十三貫文其見錢請毎年附廣州綱送納𠡠邕管兩税錢八百餘千自令輸納頗甚艱弊宜委嶺南西道觀察使每年與受領廻易輕貨附綱送省其僦運脚錢仍令於放送内抽折會昌元年正月制租歛有常王制斯具徴率無藝齊民何依内外諸州府百姓所種田苗率税斛㪷素有定額如聞近年長吏不守法制分外徴求致使力農之人轉加困弊亦有每年差官廵檢勞擾頗深自今已後州縣每年所徴科斛㪷一切依額為定不得隨年檢責數外如有荒閒陂澤山原百姓有人力能墾闢耕種州縣不得輙問所收苗子五年不在税限五年之外依例收税於一鄉之中先塡貧户欠闕如無欠闕即均减衆户合徴斛㪷但令不失元額不得隨田加率仍委本道觀察使每年秋成之時具管内墾田頃畝及合徴上供留州使斛㪷數分折聞奏如所奏數外有剰納人戸斛㪷刺史以下并節級重加懲貶觀察使奏聼進止仍令出使郎官御史及度支塩鐵知院訪察聞奏大中二年正月制諸州府縣等納税祗合先差優長户車牛近者多是權要及富豪之家悉請留縣輸納致使单貧之人却湏僱脚䭾載從今已後其留縣並湏先饒貧下不支濟户如有違越節級官吏量加科殿四年正月制其令天下諸州府百姓兩税之外輒不許分外更有差率已頻申飭尚恐因循宜委御史䑓切加糺察其諸道州府應所徴兩税匹叚等物並留州使錢物納匹叚虚實估價及見錢從前皆有定制如聞近日或有於虚估匹叚數内徴實估物及其間分數亦不盡勅條宜委長吏切加遵守如有違越必議科䋲本判官專知官當重懲責又青苗兩税本繫田土地既属人稅合隨去後前教令累有申明豪富之家尚不恭守皆是承其急切私勒契書自今已後勒州縣切加覺察如有此色湏議痛懲其地仍便勒還本主更不在論理價直之限六年三月勅先賜鄭光鄠縣及雲陽縣庄各一所府縣所有兩税及差科色役並特宜放者中書門下奏伏以鄭光是陛下元舅寵待固合異等然而據地出税天下皆同隨户雜徭乆已成例將務致理實為本根近日陛下屢發德音欲使中外畫一凡在士庻無不仰戴聖慈今獨忽免鄭光莊田則似稍乖前意况征賦所入經費有常差使不均怨嗟斯起事雖至㣲繫體則多臣等備位台司每承誡勵茍有管見合具啟陳謹錄奏聞伏聼勅㫖奉批答省所奏具悉朕以鄭光元舅之尊貴欲優異令免征税初不細思卿等列位股肱每存匡益事無大小必竭公忠况親戚之間人所難議茍非愛我豈進嘉言庻事能盡如斯天下何憂不理有始有卒當共守之省覧再三良増慰悦所奏依雜税建中元年九月戸部待郎趙賛請置常平輕重本錢從之賛於是條奏諸道津要都會之所皆置吏閲商人財貨計錢每千税二十文天下所出竹木茶漆器什一税之充常平本錢時軍用稍廣常賦不定所税亦隨盡竟莫得充本儲積焉四年六月判度支戸部待郎趙賛請置大田天下田計其頃畝官収十分之一擇其上腴樹桑環之曰公桑自王公至於匹庻差借其力得榖絲以給國用詔從其説賛熟計之自以為非便皆寢不下請復常平税茶之法又以軍須廹蹙常平利不時集乃請税屋間架除筭陌錢間架法凡屋兩間為一間屋有貴賤約價三等上價出錢二千中價一千下價五百所由吏秉筆執籌入人之廬舍而計其數衣冠士族或貧無他財獨守故業坐多屋出筭者動數十萬人不勝其苦凡沒一間杖六十告者賞錢五十貫取於犯家除陌法天下公私給與貿易率一貫舊筭二十益加筭為五十給與他物或兩換者約錢為筭率之市牙各給印紙人有買賣隨日署記翌日合筭之有自貿易不用市牙者給其私簿無簿者投状自集其有隱錢百者沒入三千杖六十告者賞十千出於犯罪人家法既行而主人市牙得專其柄率多隱盗公家所入曽不得半而怨讟之苦囂然滿於天下至興元元年正月一日赦悉停罷貞元九年正月初税茶先是諸道塩鐵使張滂奏曰伏以去嵗水災詔令减税今之國用湏供儲仗請於出茶州縣及茶山外商人要路委所由定三等時估每十税一充所放兩税其明年已後所得税錢外貯若諸州遭水旱賦税不辦以此代之詔曰可仍委張滂區處條目每嵗得四十萬貫茶之有税自此始也然税無虛嵗遭水旱處亦未甞以税茶錢拯贍元和三年十月禁採銀一兩已上者笞二十逓出界州縣官更節給科罪長慶元年塩鐵使王播奏茶税一百増之五十左拾遺李珏上䟽論之曰設法救弊起自干戈天下無虞即冝蠲省况税茶之事尤出近年在貞元中不得不爾今四海鏡净八方砥平厚歛於人殊傷國體其不可一也又茶為食物無異米塩人之所資逺近同俗既祛渴乏難捨斯須田閭之間嗜好尤切今増税既重時估必増流弊於人先及貧弱其不可二也且山澤之饒固無定數量斤論税所兾售多價髙則市者希價賤則市者廣歲終上計其利幾何未見阜財徒云歛怨其不可三也臣不可逺徴故事直以目前所見陳之伏望暫留聰明少垂念慮時追勅更賜商量陛下即位之初已徴歛外官押貫旋即勅停洋洋徳音千古不朽今若𣙜茶加税頗失人情臣忝諌事不敢緘黙時禁中造百尺樓國計不充王播希恩増税䟽奏不省太和七年四月御史臺奏伏准太和三年十月十八日赦文天下除兩税外不得妄有科配其擅加雜𣙜率一切冝停令御史臺嚴加察訪者臣伏以方今天下無事聖政日修務去煩苛與人蘇息臣昨因嶺南道擅置竹綀場税法至重害人頗深博訪諸道乃知自太和三年准赦文兩税外停廢等事旬月之外内或以督察不嚴或以長吏更改依前却置重困齊民伏望起今後應諸道自太和三年准勅文所停税外科配雜𣙜率等復有郤置者仰勅到十日内具郤置事由聞奏仍申報臺司每有出使郎官御史令嚴加察訪茍有此色本判官重加懲責長史奏聼進止勅㫖宜依開成二年十二月武寧軍節度使薛元賞奏泗口税場應是經過衣冠商客金銀羊馬斛㪷見錢茶塩綾絹等一物已上並税今商量其雜税並請停絶勅㫖淮泗通津向來京國自有雜税頗聞怨讟薛元賞到鎮之初首請除去表章適至深愜朕懐泗口税據元賞所奏並停所置當官司所由並罷委元賞當日牓示其泗口税額淮徐泗觀察使今年前後兩度奏状内監收共得錢一萬八千五十五貫文内十驛一萬一千三百貫文委户部每年以實錢逐近支付泗口其他未贍委在才臣息怨咨以奉施行大中六年正月䀋鐵轉運使兵部侍郎裴休奏諸道節度觀察使置店停止茶商每斤収搨地錢并税經過商人頗乖法理今請釐革横税以通舟船商旅既安課利自厚又正税茶商多被私販茶人侵奪厚利今請强幹官吏先於出茶山口及廬壽淮南界内布置把曉諭招収量加捉半税給陳首帖子令其所在公行從此通流更無苛奪所兾招懷窮困下絶奸欺使私販者免犯法之憂正税者無失利之歎尋究根本須舉綱條勅㫖冝依其年四月淮南及天平軍節度使浙西觀察使皆奏軍用困竭伏乞且賜依舊税茶勅㫖裴休條流茶法事極精詳制置之初理須畫一並冝凖今年正月二十六日勅處分租庸使開元十一年十一月宇文融除殿中侍御史勾當租庸地税使天寳三年四月陜郡太守韋堅加兼知勾當租庸使六年十一月楊國忠兼知諸郡租庸使至德元年十月第五琦除監察御史充江淮租庸使中書侍郎房琯諫曰徃者楊國忠厚歛取怨天下陛下即位以來人未見德琦聚歛臣也今復寵之是國家斬一國忠而用一國忠矣将何以示逺方歸人心乎上曰天下方急六軍之命若倒懸無經費則人散矣卿惡琦可也何所取財琯不能對自此恩减於舊矣廣德元年十月代宗居陜考功郎中裴諝遷考功及南曹二任赴行在上将以為御史中丞為元載所排出為河東道租庸塩鐵等使時關輔大旱諝請入計召見便殿問諝𣙜酤之利一嵗出入幾何乆之不對上復問之對曰臣有所思上曰何思對曰臣自河東來其間所厯三百里見農人愁懷榖菽未種臣謂陛下軫念先問人之疾苦而乃責臣以利孟子曰理國者仁義而何以利為是以未敢即對上前坐曰㣲公言吾不聞此拜左司郎中永貞元年三月京兆尹第五琦奏租庸使請一切並停唯差判官一人廵官二人催遣從之兩税使建中三年八月初分置汴東西水陸運兩税塩鐵使至十二月二十日包佶崔縱分為之焉貞元七年六月太常卿崔縱為汴西水陸運兩税塩鐵等使田悦軍敗魏州嬰城自守河東朔方昭義河陽及神䇿兵圍之軍乏食乃以縱兼魏城四節度都粮料使軍食稍給涇原兵及上居奉天四方握兵未有至者時縱先知乃潜告朔方節度使李懷光説令奔命懷光從之縱乃悉歛軍財與懷光俱來調給甚備懷光軍士乆戰河外及次河中遷延未進縱以貨幣先渡河謂懷光軍士曰若濟河悉所齎以分將士衆利之乃肯西濟八年四月以東都河南江淮嶺南山南東道兩税等錢物令户部侍郎轉運使張滂主之東渭橋以東道兩税諸道廵院悉𨽻滂以關輔河東劍南山南西道財物令户部尚書奏之使班宏主之其後宏滂互有短長宰相趙憬陸贄具以其事上聞由是参用大厯故事如劉晏韓滉所為焉元和四年六月勅兩税法搃諸税物極是便人但緣約法之初不定物佑粟帛轉賤賦税自加人力不堪國所切湏務冝通濟令其便安欲遣使臣廵行國邑郵驛所屇豈免煩勞軺車遽馳曽未周悉度支塩鐵泉貨是司各有分廵置於都會爰命帖職周視四方簡而易從庻恊權便政有所獘事有所宜皆得舉聞副我憂寄其塩鐵使揚州留後宜兼充淮南浙西浙東宣歙福建等道兩税使其江陵留後冝兼充荆南山南東道鄂岳江西湖南嶺南等兩税使其江陵留後冝兼充荆南山道兩税使度支山南西道分廵院官宜兼充劍南東西州山南四道兩税使其陜内五監舊属塩鐵使宜割属度支使便委山南西道兩税使兼知糶貨各奉所職期於盡心五年誅李師道收復淄青十二州未定户籍乃命諫議大夫王彦威充十二州勘定兩税使朝法振舉人不以為煩七年七月荆南兩税使崔陵賜紫金魚袋浙江東道兩税使程异賜朝散大夫以入計叙勞也十五年閠正月命度支郎中趙佶使淄青兖海鄆曹濮蔡申光等州勘兩税户口數永徽三年七月户部尚書髙履行奏計戸三百八十萬神龍元年十一月二十五日户部尚書蘇瓌奏計户六百一十五萬六千一百四十一開元十四年户部進計帳今年管戸七百六萬九千五百六十五二十年户部計戸七百八十六萬二千二百四十六二十六年計户八百一萬八千七百一十天寳元年計户八百五十二萬五千七百六十三十三年計戸九百六萬九千一百五十四至德元年計戸八百一萬八千七百一乾元三年計戸一百九十三萬一千一百二十五建中元年十二月定天下兩税戸凡三百八十萬五千七十六元和戸二百四十七萬三千九百七十三長慶戸三百九十四萬四千九百八十二太和戸四百三十五萬七千五百七十五開成四年計戸都管四百九十九萬六千七百五十二會昌戸四百九十五萬五千一百五十一雜錄貞觀二十年太宗問民部侍郎盧承慶厯代戸口多少之數承慶叙夏殷之後迄於周隋皆有依據太宗嗟賞乆之永徽三年七月二十二日上問戸部尚書髙履行去年進户多少履行奏言去年進戸搃十五萬已上天下進户漸多謂長孫無忌曰比來天下無事户口稍多二三十年足堪殷實因問隋有㡬户今見在幾户履行奏隋開皇中有八百七十萬即今見户三百八十萬上曰自隋末亂離户口减耗邇來雖復蘇息猶大少於隋初開元二十四年三月勅朕以百姓為心固非一人獨理委之牧宰輯寧兆庻若考論政績在户口存亡不有甄明何憑賞罰自今以後天下諸州户口或刺史縣令有離任者並宜分明交付州縣仍每至年終各具存乏及増加實數同申並委採訪使重覆報省所司明為課最具條件奏聞隨事褒貶以旌善惡貞元三年五月詔曰諸州户口减耗三分去二其官員亦合减省元和二年十二月史官李吉甫等撰元和國計簿十卷搃計天下方鎮凡四十八道管州府二百九十三縣一千四百五十三見定户二百四十四萬二百五十四其鳯翔鄜坊邠寧振武涇原凉夏靈塩河東易定魏博鎮兾范陽滄景淮西淄青十五道七十一州並不申戸口數每嵗縣賦入倚辦止於浙西浙東宣歙淮南江西鄂岳福建湖南等道合四十州一百四十四萬戸比量天寳供税之户四分有一天下兵戎仰給縣官八十三萬餘人比量士馬三分加一率以兩戸資一兵其他水旱所損徴科妄歛又在常役之外六年二月制自定兩税以來刺史以户口増减為其殿最故有析戸以張虛數或分産以繫户兼招引浮客用為増益至於税額一無所加徒使人心易揺土著者寡觀察使嚴加訪察必令詣實會昌三年八月制朕聞三代已前未甞言佛漢魏之後像教寖興是遭逄季時傳此異俗且一夫不耕有受其餒者一婦不織有受其寒者今天下僧尼不可勝數皆待農而食待蠶而衣貞觀開元亦常釐革剗除不盡流衍滋多中外諸臣恊予正意濟人利衆予不讓焉天下所還俗僧尼二十六萬五千餘人奴婢為兩税戸十五萬人移户貞觀元年朝廷議戸殷之處聼徙寛鄉陜州刺史崔善為上表曰畿内之地是謂户殷丁壯之人悉入軍府若聼移轉使出關外此則虚近實逺非經通之義其事遽止天授二年七月二十四日徙關外雍同泰等七州户數十萬以實洛陽開元十六年十月勅諸州客户有情愿属縁邉州府者至彼給良沃田安置仍給永年優復宜令所司即與所管客户州計會召取情願者隨其所樂具數奏聞寳厯元年五月勅黔首如有願于所在編附籍帳者宜令州縣優恤給與閒地二周年不得差遣唐會要卷八十四
