body:
  text: 唐會要卷八十四宋王溥撰租稅下元和十五年八月中書門下奏伏凖今年閏正月十七日敕令百僚議錢貨輕重者今據郡官户部尚書楊於陵等伏請𣙜天下兩稅酒鹽利等悉以布帛絲任土所産物充稅並不徴見利則物漸重錢漸輕農人且免賤賣匹帛者伏以郡官所議事皆至當深利公私請商量付度支據諸州府應徴兩稅供上都及留州留使舊額起元和十年以後並改配端匹斤兩之物為稅額如大厯以前租庸課調不計錢令其折納使人知定制供辦有常仍約元和十五年徴納布帛等估價其有舊納虛與估依虛估回計如舊納實估物並見錢即于端匹斤兩上量加估價廽計變法在長其物價價長則永利公私雖微有加稅法行即當就實比舊給用因利而不害仍作條件處置編入旨符其鹽利酒利本以𣙜率計錢有殊兩稅之名不可除去錢額但舊額中有令納錢者亦請令折納時估匹假官既不專以錢為稅人得以所産用輸則錢貨必均其輕重農畝自廣于蠶織便時惠下庶得其冝其土乏絲麻或地連邊塞風俗既異賦入不同請商量委所司裁酌隨便宜處置敕旨宜依太和二年二月興元尹王涯奏興元府南鄭兩稅錢額素髙每年徴科例多懸欠今請于管內四州均攤代納二千五百貫文配蓬州七百五十貫巢州七百五十貫通州五百貫巴州五百貫敕旨宜付所司四年五月劍南西川宣撫使諌議大夫崔戎奏準詔旨例置西川事條令與郭釗商量兩稅錢稅內三分二分納見錢一分折納匹假每一貫加饒五百文計優饒百姓一十三萬四千二百四十三貫文依此曉喻百姓訖經賊州縣準詔三分減放一分計減放錢户萬七千六百二十貫文不經賊處先徴見錢令三分一分折納雜物計優饒百姓一十三萬舊有稅薑芋之類每畝至七八百徴斂不時令併省稅名盡依諸處為兩限等第戶給户帖餘一切名目勒停敕旨冝依六年天平軍奏請起太和七年嵗供兩稅𣙜酒等錢十五萬貫粟五萬石自元和末收復李師道十二州朝廷務安反側征賦所入盡留贍軍至是方歸王府開成二年二月敕節度諸州府或遇水旱有欠稅額合供錢物斛斗可即委州縣長官設法招携及召户承佃其錢陸續填納年終後具歸復填補錢物數聞奏并報度支其刺史縣令得替須代替人交割仍須分明具見在主客户交付後人不得遞相推注用破稅錢其所招之日不得將當處大户擘為小户别有配率四年十月中書門下奏準開成元年三月十日敕冝令兩稅州府各于見任官中揀擇清強長定綱往來送五萬至十萬為一綱綱官考滿本州便與依資奏改通計十年往來優成與依資選遷當處令鈐長焉如本州官資望無相當者許優成奏他處官者伏以諸道有上供兩稅錢物者大小計百餘處舊例差州縣官充綱亦不聞過有敗闕若依勑以長定綱為名則命官不以才能賦祿難憑僦運况江淮財賦大州每年差綱十餘輩若令長定則官員長占于此流若祗取數人綱運當虧其大半臣等商量長定綱起來年已後勒停臣又準開成元年以前旨條州縣官充綱送輕貨四萬已上無欠少不逾程限者書上考十萬減一選其於優奬猶似稍輕送二萬至五萬依舊書上考五萬至七萬與減一選七萬至十萬減二選十萬至十五萬減三選如一度充綱優勞未足考秩之內情願再差者旨條先有約約絶此後望今開許如年少及材質不當但令準舊例以課料資陪不必一例依次差遣其餘並望準前旨條處分敕旨宜依其年十二月雍管經略使唐𢎞實當管上供兩稅錢一千四百七十三貫文其見錢請每年附廣州綱送納敕雍管兩稅錢八百餘千自令輸納頗甚艱弊宜委嶺南西道觀察使每年與受領回易輕貨附綱送省其僦運腳錢仍令於放送內抽折會昌元年正月制租斂有常王制斯具徴率無藝齊民何依內外諸州府百姓所種田苗率稅斛斗素有定額如聞近年長吏不守法制分外徴求致使力農之人轉加困弊亦有每年差官巡檢勞擾頗深自今已後州縣每年所徴科斛斗一切依額為定不得隨年檢責數外如有荒間陂澤山原百姓有人力能墾闢耕種州縣不得輒問所收苗子五年不在稅限五年之外依例收稅於一鄉之中先填貧户欠闕如無欠闕即均減衆户合徴斛斗但令不失元額不得隨田加率仍委本道觀察使每年秋成之時具管內墾田頃畝及合徴上供留州使斛斗數分折聞奏如所奏數外有剩納人戶斛斗刺史以下并節級重加懲貶觀察使奏聼進止仍令出使郎官御史及度支鹽鐵知院訪察聞奏大中二年正月制諸州府縣等納稅祗合先差優長户車牛近者多是權要及富豪之家悉請留縣輸納致使單貧之人却須雇腳馱載從今已後其留縣並須先饒貧下不支濟户如有違越節級官吏量加科殿四年正月制其令天下諸州府百姓兩稅之外輒不許分外更有差率已頻申飭尚恐因循宜委御史臺切加糾察其諸道州府應所徴兩稅匹假等物並留州使錢物納匹假虛實估價及見錢從前皆有定制如聞近日或有於虛估匹假數內徴實估物及其間分數亦不盡敕條宜委長吏切加遵守如有違越必議科繩本判官專知官當重懲責又青苗兩稅本繫田土地既屬人稅合隨去後前教令纍有申明豪富之家尚不恭守皆是承其急切私勒契書自今已後勒州縣切加覺察如有此色須議痛懲其地仍便勒還本主更不在論理價直之限六年三月敕先賜鄭光鄠縣及雲陽縣莊各一所府縣所有兩稅及差科色役並特宜放者中書門下奏伏以鄭光是陛下元舅寵待固合異等然而據地出稅天下皆同隨户雜徭久已成例將務致理實為本根近日陛下屢發德音欲使中外畫一凡在士庶無不仰戴聖慈今獨忽免鄭光莊田則似稍乖前意况征賦所入經費有常差使不均怨嗟斯起事雖至微繫體則多臣等備位台司每承誡勵茍有管見合具啓陳謹録奏聞伏聼敕旨奉批答省所奏具悉朕以鄭光元舅之尊貴欲優異令免征稅初不細思卿等列位股肱每存匡益事無大小必竭公忠况親戚之間人所難議茍非愛我豈進嘉言庶事能盡如斯天下何憂不理有始有卒當共守之省覽再三良增慰悅所奏依雜稅建中元年九月戶部待郎趙贊請置常平輕重本錢從之贊於是條奏諸道津要都會之所皆置吏閲商人財貨計錢每千稅二十文天下所出竹木茶漆器什一稅之充常平本錢時軍用稍廣常賦不定所稅亦隨盡竟莫得充本儲積焉四年六月判度支戶部待郎趙贊請置大田天下田計其頃畝官收十分之一擇其上腴樹桑環之曰公桑自王公至於匹庶差借其力得榖絲以給國用詔從其説贊熟計之自以為非便皆寢不下請復常平稅茶之法又以軍須迫蹙常平利不時集乃請稅屋間架除算陌錢間架法凡屋兩間為一間屋有貴賤約價三等上價出錢二千中價一千下價五百所由吏秉筆執籌入人之廬舍而計其數衣冠士族或貧無他財獨守故業坐多屋出算者動數十萬人不勝其苦凡沒一間杖六十告者賞錢五十貫取於犯家除陌法天下公私給與貿易率一貫舊算二十益加算為五十給與他物或兩換者約錢為算率之市牙各給印紙人有買賣隨日署記翌日合算之有自貿易不用市牙者給其私簿無簿者投狀自集其有隱錢百者沒入三千杖六十告者賞十千出於犯罪人家法既行而主人市牙得專其柄率多隱盜公家所入曽不得半而怨讟之苦囂然滿於天下至興元元年正月一日赦悉停罷貞元九年正月初稅茶先是諸道鹽鐵使張滂奏曰伏以去嵗水災詔令減稅今之國用須供儲仗請於出茶州縣及茶山外商人要路委所由定三等時估每十稅一充所放兩稅其明年已後所得稅錢外貯若諸州遭水旱賦稅不辦以此代之詔曰可仍委張滂區處條目每嵗得四十萬貫茶之有稅自此始也然稅無虛嵗遭水旱處亦未嘗以稅茶錢拯贍元和三年十月禁採銀一兩已上者笞二十遞出界州縣官更節給科罪長慶元年鹽鐵使王播奏茶稅一百增之五十左拾遺李珏上疏論之曰設法救弊起自干戈天下無虞即冝蠲省况稅茶之事尤出近年在貞元中不得不爾今四海鏡淨八方砥平厚斂於人殊傷國體其不可一也又茶為食物無異米鹽人之所資逺近同俗既祛渴乏難捨斯須田閭之間嗜好尤切今增稅既重時估必增流弊於人先及貧弱其不可二也且山澤之饒固無定數量斤論稅所兾售多價髙則市者希價賤則市者廣歲終上計其利幾何未見阜財徒云斂怨其不可三也臣不可逺徴故事直以目前所見陳之伏望暫留聰明少垂念慮時追敕更賜商量陛下即位之初已徴斂外官押貫旋即敕停洋洋德音千古不朽今若𣙜茶加稅頗失人情臣忝諌事不敢緘默時禁中造百尺樓國計不充王播希恩增稅疏奏不省太和七年四月御史臺奏伏準太和三年十月十八日赦文天下除兩稅外不得妄有科配其擅加雜𣙜率一切冝停令御史臺嚴加察訪者臣伏以方今天下無事聖政日修務去煩苛與人蘇息臣昨因嶺南道擅置竹綀場稅法至重害人頗深博訪諸道乃知自太和三年準赦文兩稅外停廢等事旬月之外內或以督察不嚴或以長吏更改依前却置重困齊民伏望起今後應諸道自太和三年準敕文所停稅外科配雜𣙜率等復有郤置者仰敕到十日內具郤置事由聞奏仍申報臺司每有出使郎官御史令嚴加察訪茍有此色本判官重加懲責長史奏聼進止敕旨宜依開成二年十二月武寧軍節度使薛元賞奏泗口稅場應是經過衣冠商客金銀羊馬斛斗見錢茶鹽綾絹等一物已上並稅今商量其雜稅並請停絶敕旨淮泗通津向來京國自有雜稅頗聞怨讟薛元賞到鎮之初首請除去表章適至深愜朕懷泗口稅據元賞所奏並停所置當官司所由並罷委元賞當日榜示其泗口稅額淮徐泗觀察使今年前後兩度奏狀內監收共得錢一萬八千五十五貫文內十驛一萬一千三百貫文委户部每年以實錢逐近支付泗口其他未贍委在才臣息怨咨以奉施行大中六年正月鹽鐵轉運使兵部侍郎裴休奏諸道節度觀察使置店停止茶商每斤收拓地錢并稅經過商人頗乖法理今請釐革橫稅以通舟船商旅既安課利自厚又正稅茶商多被私販茶人侵奪厚利今請強幹官吏先於出茶山口及廬壽淮南界內布置把曉諭招收量加捉半稅給陳首帖子令其所在公行從此通流更無苛奪所兾招懷窮困下絶姦欺使私販者免犯法之憂正稅者無失利之歎尋究根本須舉綱條敕旨冝依其年四月淮南及天平軍節度使浙西觀察使皆奏軍用困竭伏乞且賜依舊稅茶敕旨裴休條流茶法事極精詳制置之初理須畫一並冝凖今年正月二十六日敕處分租庸使開元十一年十一月宇文融除殿中侍御史勾當租庸地稅使天寶三年四月陜郡太守韋堅加兼知勾當租庸使六年十一月楊國忠兼知諸郡租庸使至德元年十月第五琦除監察御史充江淮租庸使中書侍郎房琯諫曰往者楊國忠厚斂取怨天下陛下即位以來人未見德琦聚斂臣也今復寵之是國家斬一國忠而用一國忠矣將何以示逺方歸人心乎上曰天下方急六軍之命若倒懸無經費則人散矣卿惡琦可也何所取財琯不能對自此恩減於舊矣廣德元年十月代宗居陜考功郎中裴諝遷考功及南曹二任赴行在上將以為御史中丞為元載所排出為河東道租庸鹽鐵等使時關輔大旱諝請入計召見便殿問諝𣙜酤之利一嵗出入幾何久之不對上復問之對曰臣有所思上曰何思對曰臣自河東來其間所厯三百里見農人愁懷榖菽未種臣謂陛下軫念先問人之疾苦而乃責臣以利孟子曰理國者仁義而何以利為是以未敢即對上前坐曰微公言吾不聞此拜左司郎中永貞元年三月京兆尹第五琦奏租庸使請一切並停唯差判官一人巡官二人催遣從之兩稅使建中三年八月初分置汴東西水陸運兩稅鹽鐵使至十二月二十日包佶崔縱分為之焉貞元七年六月太常卿崔縱為汴西水陸運兩稅鹽鐵等使田悅軍敗魏州嬰城自守河東朔方昭義河陽及神䇿兵圍之軍乏食乃以縱兼魏城四節度都糧料使軍食稍給涇原兵及上居奉天四方握兵未有至者時縱先知乃潛告朔方節度使李懷光説令奔命懷光從之縱乃悉斂軍財與懷光俱來調給甚備懷光軍士久戰河外及次河中遷延未進縱以貨幣先渡河謂懷光軍士曰若濟河悉所齎以分將士衆利之乃肯西濟八年四月以東都河南江淮嶺南山南東道兩稅等錢物令户部侍郎轉運使張滂主之東渭橋以東道兩稅諸道巡院悉𨽻滂以關輔河東劍南山南西道財物令户部尚書奏之使班宏主之其後宏滂互有短長宰相趙憬陸贄具以其事上聞由是參用大厯故事如劉晏韓滉所為焉元和四年六月敕兩稅法總諸稅物極是便人但緣約法之初不定物佑粟帛轉賤賦稅自加人力不堪國所切須務冝通濟令其便安欲遣使臣巡行國邑郵驛所屇豈免煩勞軺車遽馳曽未周悉度支鹽鐵泉貨是司各有分巡置於都會爰命帖職周視四方簡而易從庶協權便政有所斃事有所宜皆得舉聞副我憂寄其鹽鐵使揚州留後宜兼充淮南浙西浙東宣歙福建等道兩稅使其江陵留後冝兼充荆南山南東道鄂嶽江西湖南嶺南等兩稅使其江陵留後冝兼充荆南山道兩稅使度支山南西道分巡院官宜兼充劍南東西州山南四道兩稅使其陜內五監舊屬鹽鐵使宜割屬度支使便委山南西道兩稅使兼知糶貨各奉所職期於盡心五年誅李師道收復淄青十二州未定户籍乃命諫議大夫王彥威充十二州勘定兩稅使朝法振舉人不以為煩七年七月荆南兩稅使崔陵賜紫金魚袋浙江東道兩稅使程異賜朝散大夫以入計敘勞也十五年閠正月命度支郎中趙佶使淄青兖海鄆曹濮蔡申光等州勘兩稅户口數永徽三年七月户部尚書髙履行奏計戶三百八十萬神龍元年十一月二十五日户部尚書蘇瓌奏計户六百一十五萬六千一百四十一開元十四年户部進計帳今年管戶七百六萬九千五百六十五二十年户部計戶七百八十六萬二千二百四十六二十六年計户八百一萬八千七百一十天寶元年計户八百五十二萬五千七百六十三十三年計戶九百六萬九千一百五十四至德元年計戶八百一萬八千七百一乾元三年計戶一百九十三萬一千一百二十五建中元年十二月定天下兩稅戶凡三百八十萬五千七十六元和戶二百四十七萬三千九百七十三長慶戶三百九十四萬四千九百八十二太和戶四百三十五萬七千五百七十五開成四年計戶都管四百九十九萬六千七百五十二會昌戶四百九十五萬五千一百五十一雜録貞觀二十年太宗問民部侍郎盧承慶厯代戶口多少之數承慶敘夏殷之後迄於周隋皆有依據太宗嗟賞久之永徽三年七月二十二日上問戶部尚書髙履行去年進户多少履行奏言去年進戶總十五萬已上天下進户漸多謂長孫無忌曰比來天下無事户口稍多二三十年足堪殷實因問隋有幾户今見在幾户履行奏隋開皇中有八百七十萬即今見户三百八十萬上曰自隋末亂離户口減耗邇來雖復蘇息猶大少於隋初開元二十四年三月敕朕以百姓為心固非一人獨理委之牧宰輯寧兆庶若考論政績在户口存亡不有甄明何憑賞罰自今以後天下諸州户口或刺史縣令有離任者並宜分明交付州縣仍每至年終各具存乏及增加實數同申並委採訪使重覆報省所司明為課最具條件奏聞隨事褒貶以旌善惡貞元三年五月詔曰諸州户口減耗三分去二其官員亦合減省元和二年十二月史官李吉甫等撰元和國計簿十卷總計天下方鎮凡四十八道管州府二百九十三縣一千四百五十三見定户二百四十四萬二百五十四其鳯翔鄜坊邠寧振武涇原涼夏靈鹽河東易定魏博鎮兾范陽滄景淮西淄青十五道七十一州並不申戶口數每嵗縣賦入倚辦止於浙西浙東宣歙淮南江西鄂嶽福建湖南等道合四十州一百四十四萬戶比量天寶供稅之户四分有一天下兵戎仰給縣官八十三萬餘人比量士馬三分加一率以兩戶資一兵其他水旱所損徴科妄斂又在常役之外六年二月制自定兩稅以來刺史以户口增減為其殿最故有析戶以張虛數或分産以繫户兼招引浮客用為增益至於稅額一無所加徒使人心易搖土著者寡觀察使嚴加訪察必令詣實會昌三年八月制朕聞三代已前未嘗言佛漢魏之後像教寖興是遭逄季時傳此異俗且一夫不耕有受其餒者一婦不織有受其寒者今天下僧尼不可勝數皆待農而食待蠶而衣貞觀開元亦常釐革剗除不盡流衍滋多中外諸臣協豫正意濟人利衆豫不讓焉天下所還俗僧尼二十六萬五千餘人奴婢為兩稅戶十五萬人移户貞觀元年朝廷議戶殷之處聼徙寬鄉陜州刺史崔善為上表曰畿內之地是謂户殷丁壯之人悉入軍府若聼移轉使出關外此則虛近實逺非經通之義其事遽止天授二年七月二十四日徙關外雍同泰等七州户數十萬以實洛陽開元十六年十月敕諸州客户有情願屬緣邉州府者至彼給良沃田安置仍給永年優復宜令所司即與所管客户州計會召取情願者隨其所樂具數奏聞寶厯元年五月敕黔首如有願于所在編附籍帳者宜令州縣優恤給與間地二周年不得差遣唐會要卷八十四
