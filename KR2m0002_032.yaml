body:
  text: 唐㑹要卷三十二宋王溥撰笏武徳四年七月十六日詔五品已上執象笏已下執竹木笏舊制三品已上前挫後直五品已上前挫後屈武徳已來一例上圎下方其日勅凡笏周制七周禮諸侯以象大夫以魚須文竹晉宋以來謂之手板自西魏後五品已上通用象竹六品以下兼用竹木近惟尚書郎執笏公卿但以手板後周保定四年百官始執笏至晉宣時内外婦人執笏其制大同小異開元八年九月勅笏三品已上前屈後直五品已上前屈後挫并用象九品已上竹木上挫下方男以上聴依品爵執笏假百官亦依例異文袍武徳四年七月十六日勅三品已上服大科細綾及羅其色紫飾用玉五品已上服小科細綾及羅其色朱飾用金六品已下服細布雜小綾交椶及雙紃其色黄六品七品飾銀八品九品鍮石流外庶人之服細綾絁布其色通用黄白飾用銅鐵天授三年正月二十二日内出繡袍賜新除都督刺史其袍皆刺繡作山形繞山勒囬文銘曰徳政惟明職令思平清慎忠勤榮進躬親自此每新除都督刺史必以此袍賜之延載元年五月二十二日出繡袍以賜文武官三品已上其袍文仍各有訓誡諸王則飾以磐石及鹿宰相飾以鳳池尚書飾以對鴈左右衛將軍飾以對麒麟左右武衛飾以對虎左右鷹揚衛飾以對鷹左右千牛衛飾以對牛左右豹韜衛飾以對豹左右王鈐衛飾以對鶻左右監門衛飾以對獅子左右金吾衛飾以對豹文銘亦皆各為八字回文其辭曰忠公正直崇慶榮職文昌翊政勲彰慶陟懿沖順彰義思寵光廉貞躬奉謙感忠勇開元十一年六月勅諸衛大將軍中軍郎將袍文千牛衛瑞牛文左右衛瑞馬文驍衛大蟲文武衛鷹文威衛豹文領軍衛白澤文金吾衛辟邪文監門衛獅子文每正冬陳設朝日宜按品服貞元七年三月初賜節度觀察使等新制時服上曰頃來賜衣文綵不常非制也朕今思文併有定稱節度使文以鵰銜綬帶取其武毅以靖封内觀察使以鷹銜威儀取其行列有序冀人人有威儀也其年十一月九日令常㕘官復衣綾袍金玉帶至八年十一月三日賜文武常㕘官大綾袍太和六年六月勅三品已上許服鶻銜瑞草雁銜綬帶及對孔雀綾袍襖四品五品許服地黄袍交枝綾六品已下常㕘官許服小團窠綾及無紋綾隔織獨織等充除此外應有竒紋異制袍襖綾等並禁斷其中書門下省尚書省御史䑓及諸司三品官並勅下後許一月内改易應諸司常㕘官限勅下後兩月内改易除非常㕘官及供奉官外州府四品已上官許通服絲布仍不得有花文一切禁斷其花絲布及紬綾除供御服外委所在長吏焚毁訖聞奏其不可服絲布者許勅下後限一月並須改易輅車武徳初著令天子鑾輅五等玉金象革木以供服乗用之屬車十乘指南車記里鼓車白鷺車鸞旗車辟惡車皮軒安車耕根車四望車羊車貞觀元年十一月始加豹尾車黄鉞車通為十二乘也以為儀仗之用大駕行幸則分前後施於鹵簿之内若大陳設則分左右施於儀仗之中髙祖太宗大禮則乘大輅髙宗不喜乘輅每有大禮則御輦至則天以為常𤣥宗中以輦不中禮廢而不用舊制輦有七一曰大鳳輦二曰大芳輦三曰仙逰輦四曰小輕輦五曰芳亭輦六曰大玉輦七曰小玉輦轝有三一曰五色轝二曰常平轝其用如七輦之儀三曰腰轝則常御焉開元十一年冬祀南郊乘輅而往禮畢騎還自是行幸郊祀皆騎於儀仗之内其五輅腰轝陳於鹵簿而已貞元十一年十一月十三日户部侍郎裴延齡奉進止脩造法駕御輅排城等元和十年十月止關新作指南車記里車於麟徳殿㑹昌六年十一月太僕寺奏請重脩御輅鼓法駕等車二十四乘并調馬拖車一十三乘乘車雜記貞觀十三年上幸九成宫時中郎將結社率衆犯御營馬騎得踰長幕宿衛官拒之方敗走太宗乃遣造為漆盾於三衛幕外徧以為城于盾面綵畫為獸頭咸外向令馬騎見之不敢進遂為永式至顯慶三年九月二十四日有司奏請造排車七百乘擬車駕行幸運載排城上以為勞煩乃令於舊營築牆為固顯慶元年十月左僕射于志寜奏請駕行日須三部張設更造九十連帳及三梁等上曰九十連帳非惟營造費功又大須車牛運輦朕坐小帳足以自安行日止用兩部帳幕不須辦三部其殿中帳幕兩部外宜迴與衛尉無忌奏曰陛下每事儉約非惟不造大帳又減一部事多省約彌彰聖徳抃舞稱賀二年十一月詔朕近尋殿中舊帳寳鞍轡甚多既非所須徒煩貯掌其殿中供奉及妃嬪已下寳鈿并金裝鞍轡韉鞦等並宜令毁剔各依儀式須賜人者量留開元十五年七月勅殿中鞍具繖扇及諸司雜物須修理造作者本司送至作所修理訖自往請受不得追匠就本司其不可送作司者給匠修理其物應納庫藏亦本司自送天寳元載正月勅黄鉞古乘以金為飾金者應五行之數其黄鉞宜改為金鉞威武之儀也七載正月二十八日太常卿韋縚奏御案樽牀帳望去紫用赤黄制曰可十載七月勅近改旗幟為赤黄以符土徳其諸衛隊仗緋色者宜令所司依内出黄色様即造其槍並用赤稠木仍依本色不須更染别色長一丈四尺為限其諸軍職掌有先用火焰緋幡處宜各依一様送付諸道凖此改換先用赤色宜停羃䍦武徳初襲齊隋舊制婦人多著羃䍦雖發自異域而全身障蔽至永徽已後稍有帷帽施裙到頸即漸為淺露矣龍朔三年有勅禁斷初雖暫息旋又仍舊咸亨二年八月二十二日又勅下百官家口咸是士流至于衢路之間豈可全無障蔽比來多著帷帽遂棄羃䍦曾不乘車别坐擔子遞相倣效寖成風俗過為輕率深失禮容前者已令漸改如聞猶未止息理須禁斷自後不得更然㦸景龍三年七月皇后表請婦人不因夫子而加邑號者請同見任職事官聴子孫用䕃門施棨㦸制從之開元八年九月勅廟社宫門正一品開府儀同三司嗣王郡王上柱國柱國帶職事二品已上及京兆河南尹大都督上都䕶開國及䕶軍帶職事三品若下都督諸州門其門㦸幡有破壊五年一易百官門不在官易之限薨者葬訖追納若子孫合給者聴凖數或不足更給其以理去任及改為四品官非被貶責並不合追收𤣥宗朝衛尉卿張介然為河隴行軍司馬因入奏上言曰臣今三品合立棨㦸臣河東人若得本鄉立之百代榮盛上曰卿且將㦸歸故鄉朕更别給卿㦸列于京宅本鄉立㦸介然始也檢年月未獲天寳六載四月八日初改儀制令廟社門宫殿門每門各二十四㦸東宫每門各十八㦸一品門十六㦸嗣王郡王右上柱國柱國帶職事二品散官光禄大夫已上鎮軍大將軍上各司職事品及京兆河南太原尹大都督大都䕶門十四㦸上柱國柱國帶職事三品上䕶軍帶職事二品若中都督上州上都䕶門十二㦸國公及上䕶軍帶職事三品若下都督中下州門各十㦸並官給上元元年閏正月宰臣吕諲令立㦸有司送㦸至宅或曰吉慶之事不宜以凶服受之諲遂權釋襂服衣吉當中而拜識者譏其失禮貞元四年七月詔試大理評事兼監察御史李愿為銀青光禄大夫兼太子賓客仍賜上柱國以晟功髙故寵異之賜勲俾與父並列門㦸五年十二月十九日中書門下奏應請列㦸軍凖儀制令正一品開府儀同三司嗣王郡王并勲官上柱國等帶職事三品已上並許列㦸凖天寳六載勅六年四月八日勅文散官光禄大夫鎮軍大將軍已上各同職事品近日散試官使帶髙階者衆恐須商量者伏請凖舊制今本文取帶三品已上正員職事官為定勅㫖宜依元和六年十二月勅立㦸官階勲悉至三品然後申請仍編於格令又勅立㦸官京兆尹上柱國賜紫金魚袋元義方朝議大夫户部侍郎䕶軍賜紫金魚袋盧坦立㦸雖令式所著似有闕文造次而行殊違審慎宜令各罰一月俸料其㦸仍令所司收納左司郎中陸則勾檢不精禮部員外郎元佑等守官假器其過尤深各罰一季俸料縁兵興以來勲賞超越其所立㦸須有明文宜令所司凖舊制待官階勲並至三品然後申請仍編於格令近列㦸官率有銀青階而義方獨據令文上柱國柱國三品十二㦸無以階勲之文牒省申請省司不能告凖式立㦸之後轉為四品官者自非貶受兼削勲階其㦸不奪既而盧坦以前任宣州刺史是三品兼大䕶軍又請立㦸並以列於門議者以坦居四品官狀亦無據吏部尚書鄭餘慶以為不可臺司彩離無誥禮部狀稱令文納祇言勲官並不言自貞元已來立㦸一十八人並無銀青已下階遂以上聞故皆逮坐續劾陸則及崔元佐一季俸料十一年十月禮部奏宣武軍節度使李愿奏云貞元三年立㦸一十二竿經今三十餘年㦸竿及衣幡破壞凖儀制令官㦸五年一換勅㫖李愿立㦸年深稱要修換有司詳檢在格無文以其家承忠勲身著勞効特宜賜與用示恩榮即與重換其㦸收納舊者十五年三月左右神䇿軍䕶軍中尉馬進潭梁守謙左右監門衛將軍魏簡陳𢎞慶劉承偕韋元素仇士良李藏用李朝盛等奏臣等凖格令合有棨㦸之榮事下禮部而員外郎賈以為進潭等三人合立棨㦸其陳𢎞慶已下六人縁官是員外郎置與節文不同奏罷之長慶二年十月以禮部尚書韋綬為山南西道節度使辭曰請門㦸十二竿自持赴鎮從之咸通二年楊汝士與諸子位皆至正卿所居静恭里兄弟並列門㦸時人榮之天祐四年太常禮院奏兩浙節度使錢鏐受冊訖舊立門㦸一十二枝合凖禮例更添四枝仍五年一易從之蘇氏駁曰按禮上古祭名不聞有㦸神與節神近代受節鉞置一室朔望必祭之拜之非也凡㦸天子三十四諸侯十今之藩鎮古之諸侯也在其地則施於公門府爵位崇顯者亦許列之私第茍祭之拜之不經之甚也雅樂上髙祖受禪軍國多務未遑改樂樂府尚用隋氏舊文所創武徳九年正月十日始命太常少卿祖孝孫考正雅樂貞觀二年六月十日樂成奏之太宗謂侍臣曰禮樂之作蓋聖人縁物設敎以為撙節治之興替豈此之由御史大夫杜淹對曰前代興亡實由於樂陳之將亡也為玉樹後庭花齊之將亡也而為伴侣曲行路聞之莫不悲泣所謂亡國之音也以是觀之蓋樂之由也太宗曰不然夫音聲感人自然之道也故歡者聞之則悦憂者聴之則悲悦之情在於人心非由樂也將亡之政其民必苦然苦心所感故聞而悲耳豈樂聲哀怨能使悦者悲乎今玉樹後庭花伴侣之曲其聲俱存朕當為公奏之知公必不悲矣尚書右丞魏徴進曰古人稱禮云禮云玉帛云乎哉樂云樂云鐘鼓云乎哉樂在人和不由音調上然之初孝孫以陳梁舊樂雜用吳楚之音周齊舊樂多涉從戎之伎於是斟酌南北考以古音而作大唐雅樂以十二律各順其月旋相為宫按禮記大樂與天地同和又云治世之音安以樂其政和故制十二和之樂合三十一曲八十四調祭圜丘以黄鐘為宫方澤以林鐘為宫宗廟以太簇為宫五郊朝賀饗宴則隨月用律為宫初隋但用黄鐘一宫惟叩七鐘餘五鐘虚懸而不叩及孝孫建旋宫之法凡鐘皆叩無虚懸矣凡祭天神奏元和之樂地祇奏順和宗廟奏永和天地宗廟登歌俱奏肅和皇帝臨軒奏太和上公出入奏舒和皇帝禮㑹登歌奏昭和郊廟爼入奏雍和皇帝祭享酌酒讀祝文及飲福受胙奏夀和五郊迎氣各以月律而奏其音又郊廟祭享奏化康凱安之舞周禮旋宫之義亡絶已久莫能知之一朝復古自孝孫始也貞觀初張文收善音律嘗覽蕭吉樂譜以為未甚詳悉乃取厯代沿革截竹為十二律吹之乃盡旋宫之義太宗召文收于太常令與少卿祖孝孫㕘定雅樂大樂有古鐘十二近代惟用其七餘有五鐘俗號啞鐘莫能通者文收吹律調之聲皆響徹時人咸服其妙尋授協律郎又孝孫率文收復採三禮更加釐革依周禮祭昊天上帝以圜鐘為宫黄鐘為角太蔟為徴姑洗為羽奏元和之舞若封泰山同用此樂祭地祇方丘以黄鐘為宫太蔟為角姑洗為徴南吕為羽奏順和之舞禪梁父同此樂禘祫宗廟以黄鐘為宫大吕為角太蔟為徴應鐘為羽奏永和之舞五郊日月星辰及類上帝黄鐘為宫奏元和之曲大蜡大報以黄鐘太蔟姑洗㽔賓夷則無射等調奏元和順和永和之舞明堂雩以黄鐘為宫奏元和之曲神州社稷籍田宜以太蔟為宫雨師以姑洗為宮山川以㽔賓為宫並奏順和之曲饗先妣以夷則為宫奏永和之舞大饗讌奏姑洗㽔賓二調皇帝食舉以月律為宫並奏休和之曲皇帝郊廟出入奏太和之曲臨軒出入奏舒和之樂並以姑洗為宫皇帝大射以姑洗為宫奏騶虞之曲皇帝大狩奏貍首之曲皇太子軒懸以姑洗為宫奏永和之曲凡奏黄鐘歌大吕奏太蔟歌應鐘奏姑洗歌南吕奏㽔賔歌林鐘奏夷則歌中吕奏無射歌夾鐘凡黄鐘㽔賔為宫其樂九變大吕林鐘為宫其樂八變太蔟夷則為宫其樂七變夾鐘南吕為宫其樂六變姑洗無射為宫其樂五變中吕應鐘為宫其樂四變天子十二公侯伯子男六卿五大夫四士三然後樂教大備貞觀十四年六月一日詔曰殷薦祖考以崇功徳比雖加以誠潔而廟樂未稱宜令所司詳諸故實制定奏聞祕書監顔師古議曰近奉徳音俾令釐革嘉名創立實宜允副伏惟皇祖𢎞農府君宣簡公懿王並積徳累仁重光襲軌化覃行葦慶衍𤓰瓞詩云濬哲維商長發其祥言殷之先祖乆有深智虞夏二代發其祥也三廟之樂請同奏長發之舞其登歌則各為辭太祖景皇帝迹肇沮漆敎漸豳岐胥宇之志既勤靈䑓之萌始附詩云君子萬年永錫爾祚今遐邇之期惟天所命長與福祚流於子孫廟樂請奏永錫之舞世祖元皇帝丕承鴻緒克紹宏猷實啟蕃昌用集寳命易大有彖曰其徳剛健而文明應乎天而時行言徳應天道行不失時剛健靡滯文明不犯也廟樂請奏大有之舞髙祖大武皇帝應期馭厯揖讓受終奄有四方以齊七政介以景福申兹多祜式崇勿替誕保無疆易曰大明終始六位時成謂終始之道皆能大明故不失時成六位也詩有大明之篇稱文王有明徳廟樂請奏大明之舞文徳皇后厚徳載物凝暉麗天易曰含𢎞光大品物咸亨言坤道主静柔順利貞資生庶類皆暢達也廟樂請奏光大之舞給事中許敬宗議曰臣聞七廟觀徳義冠于宗祀三廟在天式彰于嚴配前聖所履莫大於兹鐘律革音播鏗鏘於享薦羽籥成列申蹈厲於烝嘗爰至典司加崇稱號循聲覈實敬闡尊名謹備樂章式昭彜範皇祖𢎞農府君宣簡公懿王廟樂請同奏長發之舞太祖景皇帝廟樂請奏大明之舞文徳皇后廟樂請奏光大之舞七廟登歌請每室别奏詔曰可麟德二年十月二十四日詔國家平定天下革命創制紀功旌徳乆被樂章今郊祀四懸猶用干戚之舞先朝作樂韞而未申其郊廟享宴等所奏宫懸文舞宜用功成慶善之樂皆著履執拂衣舊服袴褶童子冠武舞宜用神功破陣之樂皆衣甲持㦸其執纛之人亦著金甲人數並依八佾仍量加簫笛等於懸南列坐若舞即與宫懸合奏其宴樂内二色舞者仍依舊别設咸亨四年十一月十五日上自製樂十二首有上元二儀三才四時五行六律七政八風九宫十州得一慶雲之曲詔有司諸大祀享並奏之上元三年十一月三日勅新造上元之舞先令大祀享皆將陳設自今已後圜丘方澤太廟祀享然後用此舞餘祭並停儀鳳二年十一月六日太常少卿韋萬石奏據貞觀禮郊享日文武奏元和順和等樂其舞人著委貌冠服手執籥翟其武舞奏凱安其舞人著平冕手執干戚准麟徳二年十月勅文舞改用功成慶善樂武舞改用神功破陣樂并改器服但以慶善不可降神神功破陣樂又未入雅樂雖改用器服其舞依舊迄今不改事既不安恐須别有處分詔曰舊文舞武舞既不可廢並器服總宜依舊若懸作上元舞曲仍奏神功破陣樂及功成慶善樂并殿庭用武舞並須引出懸外而作其安置舞曲直更商量作安穏法并録凱安六變法象奏聞二十二日萬石又與刋正樂官奏曰謹按凱安舞是貞觀年中所造武舞凖貞觀禮及今禮但郊廟祭享奏武舞之樂即用之凡有六變一變象龍興于野二變象尅靖關中三變象夷夏服從四變象江淮寜謐五變象獫狁讋服六變復位兵圜振旅謹按貞觀禮祭享曰武舞惟作六變亦如周之大武慶成樂上謹按樂有因人而作者則有因人而止如禮云諸侯相見揖讓而入門入門而懸興揖讓而升堂升堂而樂闋是也有著成數者數終則止不得取行事賖促為樂終早晚即禮云三闋六成八變九變是也今禮奏武舞六成而數終未止既非師古不可依行武舞凱安望請依古禮及貞觀禮六成樂止立部伎内破陣樂五十二遍修入雅樂只有兩遍名曰七徳立部伎内慶善樂七遍修入雅樂只有一遍名曰九功上元舞二十九遍今入雅樂一無所減每見祭享日三獻已終上元舞猶自奏畢令更加破陣樂慶善樂恐酌獻已後歌舞更長其雅樂内破陣樂慶善樂及上元舞三曲並望修改通融令長短與禮相稱樂望于事為便破陣樂有象武事慶善樂有象文事按古六代舞有雲門大咸大夏大韶等是古之文舞殷之大濩周之大武是古之武舞先儒相傳國家以揖讓得天下則先奏文舞若以征伐得天下則先奏武舞望請應用二舞曰先奏神功破陣樂次奏功成慶善樂先奉勅於圜丘方澤太廟祀享日則用上元舞臣據見行禮欲於天皇酌獻降復位已後即作凱安六變樂止其神功破陣樂功成慶善樂上元之舞三曲待修改訖以次通融作之即新舊並行前後有序詔從之開元八年九月瀛州司法㕘軍趙慎言論郊廟用樂表曰祭天地宗廟樂合用商音又周禮三處大祭俱舞商調鄭𤣥云比舞商調者祭商樂商堅剛也以臣愚智斯義不當但商金聲也周家木徳金能尅木作者去之今皇唐土王即殊周室五音損益須逐便宜豈可將木徳之儀施土徳之用又說者以商聲配金即作剛柔理解殊不知聲無定性音無常主剛柔之體實由其人人和則音柔人怒則聲烈故禮稱怒心感者其聲粗以厲愛心感者其聲和以柔祗如宫聲為君商聲為臣豈以臣位配金金為臣道便為剛乎是知周制無商不為堅剛見闕盖以扶木徳應金行故國祚靈長後業昌盛下代七百八十八年是去金之應也即人神之心可見剛柔之理全乖原夫聖人之情詳夫作者之㫖車服器械為易代之通規郊禋聲調避徳王之刑尅此不疑之理也其三祭並請加商調去角調又郊廟三舞人不依古制未協人神按周禮以樂舞敎國子舞雲門大咸大濩大武是知古之舞者即諸侯之子孫容服鮮麗故得神祇降福靈光燭壇之舞人並容貌蕞陋屠沽之流用以接神欲求降福固亦難矣有隋之祭猶以品子為之號為二舞即逮乎聖朝遂變斯制誠願章兹近誤考復古道其二舞人望取品子年二十已下顔容修正者先令太常博士主之凖國子學給科行事之外習六樂之道學五禮之儀經十周年量文武授散官號曰雲門生又按周禮奏太蔟歌應鐘以享地祇注云地祇謂神州社稷也太蔟陽也位在寅應鐘隂也位在亥故斗建亥則日月㑹於寅斗建寅則日月㑹於亥是知聖人之制取合於隂陽歌奏之儀用扶于交㑹今之祭社即乖古法乃下奏太蔟上歌黄鐘俱是陽律上下歌奏不異仍是陽合於陽豈特違其禮經抑亦乖於㑹合其社壇歌黄鐘望改為應鐘又五郊工人舞人衣服合依方色按周禮以蒼璧禮天以黄琮禮地以青圭禮東方以赤璋禮南方以白琥禮西方以𤣥璜禮北方是知五天帝徳色王不同四時文物各隨方變蓋以同色相感同事相宜隂陽交泰莫不由此今祭器茵褥總隨於五方五郊衣服獨乖其方色舞者常持皂飾工人恒服給衣以臣愚知深為不便但五行相尅賢愚共悉絳為火色有忌于金方皁為水位則妨於火徳事理乖迕居然可明其工人舞人衣望各依方色其宗廟黄色仍各以所主色様袖又以樂理身心禮移風俗請立樂敎以化兆民周禮曰以樂徳敎國子中和祇庸孝友其國子諸生望敎以樂經同於禮𫝊則人人知禮家家知樂然後風移俗易灾害不生其樂經章目雖詳稍乖旨要望委通明博識修撰訖然後頒下二十五年太常卿韋縚令博士韋通直樂季尚冲樂正沈元福郊社令陳慶申懐操等銓叙前後所行用樂章為五卷以付大樂鼓吹兩署令工人習之時太常寺相𫝊有讌樂五調歌詞各一卷或云貞觀中侍中楊恭仁趙方等所詮集詞多鄭衛皆近代詞人雜詩至是縚又令大樂令孫𤣥成更加釐革編為七卷開元三年詔燕國公張説改定樂章上自定聲度説為之詞令太常樂工就集賢院敎習數月方畢因定封禪郊廟詞曲及舞至今行焉司徒杜佑論曰夫音生於人心心懆則音哀心舒則音和然人心復因音之哀和亦感而舒懆故韓娥曼聲哀哭一里愁悲曼聲長歌衆皆喜抃斯之謂也是則哀樂喜怒敬愛六者隨物感動播於形氣叶律吕諧五聲舞也者咏歌不足故手之舞之足之蹈之動其容象其事而謂之樂樂者聖人之所樂可以喜人心焉古之諸侯卿大夫無故不撤樂士不去琴瑟以平其心以暢其志則和氣不散邪氣不干古先哲后立樂之方也周衰政失鄭衛是興秦漢已還古樂淪缺代之所存韶舞而已下不聞振鐸上不聞謳謠但更其名示不相襲知音復寡罕能制作而况古雅莫尚俗樂薦臻其聲怨思其狀迂怪方之鄭衛又何逺乎爰自永嘉末年之亂事有先兆其在于兹貞觀初作破陣樂舞有發揚蹈厲之容歌有粗和振發之音以表興王之盛烈比于周之大武豈近古相習所能思擬哉而人間淫濫之樂乆而未革古者因樂以著教其感人深乃移風俗將欲閑其邪正其頽惟樂而已矣太宗文皇帝留心雅正勵精文敎命考隋氏所傳南北之樂梁陳盡吳楚之聲周齊皆殺伐之音乃命太常卿祖孝孫正宫調起居吕才習音韻協律郎張文收考律吕平其散濫為之折衷西漢以來郊祀明堂有夕牲迎神登歌等曲近代加祼地迎牲飲福酒今夕牲祼地不用樂公卿攝事又去飲福酒之樂周享神諸樂多以夏為名宋以永為名梁以雅為名後周以夏為名隋氏因之國朝以和為名旋宫之樂乆喪漢章帝建初二年鮑鄴始詳之順帝陽嘉二年復廢累代習黄鐘一均變極七音則五鐘廢而不撃謂之啞鐘孝孫以旋宫之法造十二和樂合四十曲八十四調至開元中又造三和樂製文舞武舞文舞朝廷謂之九功舞武舞朝廷謂之七徳舞樂用鐘磬柷敔晉鼓琴瑟筝竽笙簫笛篪塤鐃鐸舞拍舂牘等謂之雅樂惟郊廟元㑹冬至及冊命大祀則辨其曲度章服而分始終之次二十九年太常寺奏東封泰山日所定雅樂其樂曰元和六變以降天神順和八變以降地祇皇帝行用太和之樂其封泰山登歌奠玉幣用肅和之樂進俎用雍和之樂酌酒飲福用福和之樂送文迎武用舒和之樂亞獻終獻用凱安之樂送神用夾鐘宫元和之樂禪社首送神用林鐘順和之樂享太廟迎神用永和之樂獻祖宣皇帝酌獻用光大之舞懿祖光皇帝酌獻用長發之舞太祖景皇帝酌獻用大政之舞世祖元皇帝酌獻用大成之舞髙祖神堯皇帝酌獻用大明之舞太宗文皇帝酌獻用崇徳之舞髙宗天皇大帝酌獻用鈞天之舞中宗孝和皇帝酌獻用太和之舞睿宗大聖真皇帝酌獻用景雲之舞徹豆用雍和之舞送神用黄鐘宫永和之樂臣以樂之殘缺積有嵗時自有事東巡親謁九廟聖情慎禮精祈感通皆祠前累月考音律請編入史冊萬代施行乃下制曰王公卿士及有司頻詣闕上言請以唐樂為名者斯至公之事朕安得辭之焉然則大咸大韶大濩大夏皆以大字表其樂章今之所謂宜曰大唐樂唐㑹要卷三十二
