body:
  text: 唐㑹要卷九十一宋王溥撰内外官料錢上武徳已後國家倉庫猶虚應京官料錢並給公廨本錢當司令史畨官迴易給利計官員多少分給貞觀十二年二月諫議大夫褚遂良上疏曰為政之本在于擇人不正其源遂差千里漢家以明經拜職或四科辟召必擇器任使量才命官然則市井子孫不居官吏大唐制令憲章古昔商賈之人亦不居官位陛下近許諸司令史捉公廨本錢諸司取此色人號為捉錢令史不簡性識寜論書藝但令身能估販家足貲財録牒吏部即依補擬大率人捉五十貫已下四十貫已上任居市肆恣其販易每月納利四千一百年凡輸五萬送利不違年滿受職然有國家者嘗笑漢代賣官今開此路頗類于彼在京七十餘司大率司引九人更三載後年别即有六百餘人輸利受職伏惟陛下理致升平任賢為政或文學高第或諸州進士皆䇿同片玉經若懸河奉先聖之格言慕昔賢之廉恥拔十取五量能授官然猶犯禁違公輙罹刑法况捉錢令史主於估販志意分毫之末耳目廛肆之間輸錢于官以獲品秩荏苒年歳陛下能不使用之乎此人習與性成慣于求利茍得無恥莫蹈廉隅使其居職從何而可將來之弊宜絶本源臣每周遊人間為國視聽京師寮庶爰及外官異口同詞皆言不便伏願勅朝臣遣其詳議上納之其月二十三日勅並停改署胥士七千人以諸州上户充准防閣例輸課二年一替計官員多少分給之二十一年二月七日令在京諸司依舊制公廨給錢充本置令史府史胥士等迴易取利以充官人俸永徽元年四月二日廢京官諸司捉錢庶士其官俸料以諸州租脚價充麟徳二年八月十九日詔文武五品已上同武職班給仗宜以掌閑募士充之咸亨元年四月十二日停給乾封元年八月十二日京文武官應給防閣庶僕俸料始依職事品其課及賜各依本品儀鳳三年八月二日詔廩食為費同資于上農歲俸所頒並課于編户因地出賦則沃瘠未均據丁收物則勞逸不等俾之富教其可得乎永念于斯載懷釐剔如文武内外官應給俸料課錢及公廨料度封户租調等逺近不均費錢有異輸納簡選於事甚難運送脚錢損費實廣公廨出舉迴易典吏因此侵漁字人之方豈合如此宜令王公已下百姓已上率口出錢以充防閣庶僕邑士白直折衝府仗身并封户内官人俸食等料既依户次貧富有殊載詳職務繁簡不類率錢給用須有差宜具條例并各逐便光宅元年九月以京官八品九品俸料薄諸八品年年給庶僕三人九品從二人長夀三年三月豆盧欽望請輟京官九品以上兩月俸物以助軍左拾遺王求禮奏曰陛下富有四海足以儲畜軍國之用何藉貧京官九品俸而令欽望欺奪之臣竊不取欽望執曰秦漢皆有稅等以贍求禮不識大體妄有爭議求禮曰秦皇漢武税天下使虛空以事邊奈何使聖朝倣習也不知欽望此言是識大體耶遂寢不行開元元年七月秘書少監崔沔議州縣官月料錢狀曰養賢之禄國用尤先税取齊人未為剥下何用立本息利皇運之初法商賈之計託本取利以繩富家國乃一切權宜諒非聖道彞典頃以州縣典吏併捉官錢收剰數多破産者衆散諸編户本少利輕其於一時或有所便付本收利患乃及人然則議國事者亦當憂人為謀恤下立計天下州縣積數既大抵皆然為害不少且五千之本七分生利一年所輸四千二百兼等勞費不過五千在于平人已為重賦富户既免其徭貧户則受其弊傷人刻下俱在其中未若大率羣官通計衆户據官定料均户出資常年發賦之時每丁量加升尺以近及逺損有益無合而籌之所增少而不擾簡而易從庶乎流亡漸歸倉庫稍實則當咸出正賦罷所新加天下坦然十一而税上下各足其不逺乎十年正月二十一日令有司收天下公廨錢其官人料以萬户税錢充毎月準舊分利數給至二十二日省王公以下視品官參佐及五品已上㐲身職員十六年十一月十五日勅文武百官俸料所給物宜依時價給十八年九月四日御史大夫李朝隱奏請薄税一年税錢充本依舊令高户典正捉隨月收利供官人料錢二十二年四月十四日勅京官兼外州都督刺史大都督府長史俸料並宜兩給至天寶二年十一月十六日勅外官兼太守等官俸料兩給者宜停其外官太守兼京官準式親王帶京官任外官副大將軍副大使知軍及知政事京官兼外官知政事據文合兼給者餘並從一處給仍任逐穏便二十四年六月二十三日勅百官料錢宜合為一色都以月俸為名各據本官隨月給付其貯粟宜令入祿數同申應合減折及申請時限並依常式一品三十一千月俸八千食料一千八百防閣二十千雜用一千二百文二品二十四千月俸六千食料一千五百防閣十五千雜用一千文三品十七千月俸五千食料一千一百防閣十千雜用九百文四品一十一千八百六十七文月俸四千五百食料七百防閣六千六百文雜用六百文五品九千二百月俸三千食料六百防閣五千雜用五百文六品五千三百月俸二千三百食料四百庶僕二千二百雜用四百文七品四千五百月俸一千五百七十食料三百五十庶僕一千六百雜用三百五十文八品二千四百七十五文月俸一千三百食料三百庶僕六百二十五文雜用二百五十文九品一千九百一十七文月俸一千五十食料二百五十庶僕四百一十七文雜用二百文天寶三年十三日勅郡縣闗職錢送納太府等自今已後納當都充員外官料錢不足即取王官料錢分若無員外官當縣分五年三月二十日勅郡縣官人及公廨白直天下約計一載破十萬丁巳上一丁毎月輸錢二百八文毎至月初當處徴納送縣來往數日功程在于百姓尤是重役其郡縣白直計數多少請用料錢加税充用其應差丁充白直望請並停一百姓准卒二省國家丁壯十四年八月四日詔文武九品以上官員既親職務可謂勤心自今已後毎月給俸食料雜防閣庶僕等宜十分加二分其同正官加一分仍永為常式至徳二年已後内外官並不給料錢乾元元年外官給半料與職田不給料仍勅度支使量閒劇同給手力課員外官一切無料至二年九月五日詔京兆無俸料桂玉之費將何以堪宜取絳州新錢給冬季料即仰所由申請計㑹支給其艱難之際國家是同頃者給在軍戎所以久虧祿俸眷言憂恤恒愧于懷今甫及授衣畧為賙給庶資時要宜悉朕懷大厯十二年四月二十八日度支奏給京百司文武官及京兆府縣官毎月料錢等具件如後太師太傅太保太尉司徒司空侍中中書令毎月各一百二十貫文中書門下侍郎各一百貫文東宫三太左右僕射各八十貫文東宫三少各七十貫文尚書御史大夫太常卿各六十貫文常侍宗正卿太子詹事國子祭酒各五十貫文左右丞及諸司侍郎給事中舍人中丞賓客殿中秘書監司農等卿將作等監各四十五貫文太子左右庶子太常少卿各四十貫文諫議諸司少卿少監各三十五貫文國子司業内侍東宫三卿各三十貫文郎中侍御史司天監少詹事諸王傅國子博士諭徳中允中舍殿中秘書太常宗正丞各二十五貫文侍御史著作郎大理正都水使者總監内常侍内納事各二十貫文員外郎通事舍人起居王府長史各十八貫文監察御史臺主簿補闕王府司馬司天少監太子典内太常博士主簿宗正主簿門下錄事中書主書各十五貫文拾遺司議太子文學秘書著作佐郎國子太學四門廣文等博士大理司直詹事府丞及諸寺監丞謁者監中書門下主事各十二貫文洗馬賛善諸寺監主簿詹事府司直各十貫文評事八貫文諸校正各七貫文諸奉御九成宫總監諸王諮議及諸陵令各六貫二百文城門符寶國子助教六局郎三府掾属太常侍醫文學錄事參軍主簿記室諸衛及六軍長史兩市令諸副總監武庫署令太公廟令各五貫三百文太子通事舍人東宫寺丞太學廣文助教内坊丞諸直長内寺伯千牛衛及諸率府長史諸陵丞諸陵署諸王府判司司行温泉監尚書都士都水及諸總監丞司天臺丞太子侍醫諸司上局署令王府國令苑四面副監公主邑司令各四貫一百一十六文國子四門助教律醫學博士協律郎内謁者諸衛六軍左右衛率府等衛佐諸王府參軍大農都省兵吏禮考功主事春坊錄事司行副監諸司中局署令都水主簿諸司上局署令及監廟邑司丞司天臺靈臺郎保章挈壺正太常針醫監尚藥局司監各千四百七十文太祝奉禮省中諸行主事門下典儀御史臺殿中秘書内侍省春坊詹事府主事諸寺監諸衛六軍諸司錄事諸司中局署丞及大理獄丞諸司監作監事諸率府錄事殿中書醫佐食醫奉輦司庫司廩奉乗鴻臚寺掌客司儀太僕寺主乗内坊典百一司天臺司辰司厯監内侍府宫教博士東宫三寺主簿太常大樂鼓吹丞醫正案摩咒禁卜筮博士及針醫卜助教國子書等宴士及助教諸王府國丞尉諸總監主簿各一千九百一十七文武官左右金吾衛大將軍各四十五貫文六軍大將軍左右金吾將軍各三十貫文諸衛及六軍中郎諸率府率副各二十貫五百六十文諸衛及六軍郎軍將諸王府典軍副典軍各九千二百文諸衛及六軍司陛千牛及左右備身各五千三百文諸衛及六軍中候太子千牛各四千一百一十六文諸衛及六軍司戈太子備身各二千四百一十五文諸衛及六軍執㦸及長上各一千九百一十七文京兆及諸府尹各八十貫文少尹兩縣令各五十貫文奉先昭應醴泉等縣令司錄各四十五貫文畿令各四十貫文判司兩縣丞各三十五貫文兩縣簿尉奉先等縣丞各三十貫文奉先縣簿尉諸畿令各二十五貫文畿簿尉各二十貫文參軍文學博士錄事各二十貫文應給百司正員文武官月料錢外官員准式例合支給料錢如後檢校官同中書門下平章事毎月一百一十貫文准大厯十二年六月七日勅檢校官同中書門下平章事并同正官例就一高處給殿中省進馬准開元十七年五月十四日勅置毎人准二月納料錢一千九百一十七文僕寺進馬與殿中進馬同内侍省每月四十五貫文省監與諸少監同度支奏約加一十五萬六千貫文准舊給都當二十六萬貫文來伏望准數起六月一日給付勅㫖依仍令所司起五月一日支給待豐年無事即准常式處分至六月七日户部侍郎判度支韓滉奏准今年四月二十八日恩勅如京文武官九品已上貞元官月俸其目中書門下平章事不帶正官勅内無額應撿校官同中書門下平章事並請同正官例就一高處給勅㫖依建中二年閏正月四日文武百官毎月料錢一百貫以上者三分減八掌輦太僕主乘寺典乘軍衛率府親勲翌府兵曺典膳兩令司天臺司農司厯監候内坊典直内侍省官教博士太常侍樂正及醫卜正九品陵廟丞苑四面監丞王府國丞尉按摩咒禁卜筮博士及針醫助教諸總主簿國子書等及律助教各三十千文八百五十二員武官七十二員四品各十七千三百五十文一百三十六員五品各一十三千八百文九十六員六品各七千九百五十文九十八員七品各六千一百七十四文一百三十六員八品各五千七百十二文五分五百五十八員九品各三千八百五十文五分並雜給校簿每貫加五百文支給一十六員諸衛上將軍左右衛本料各六十千加料四等毎月各粮米七斗鹽七合五勺手力七人資二千五文私馬五匹草三百束料九石七斗五升隨身十五人粮米九石鹽一斗一升二合五勺春衣布一十五端絹二十疋冬衣絶紬一十五疋絹三十疋綿三十屯二員左右金吾衛並准上一十二員左右武衛等本料三十五千加粮料等毎月手力五人資六千五百私馬四匹草二百三十束料六石六斗隨身一十三人粮米七石八斗春衣布十三端絹二十四疋冬衣絶紬十三疋絹二十六疋綿二十四屯一十六員諸衛大將軍左右衛左右金吾衛本料四十千五百續加等以上准隨衣一人隨物隨人減料左右武衛等雜衛本料三十六千文續加等毎月手力各四人資六千文私馬三匹草一百六十束料四石九斗五升隨身十人粮米六石春衣布一十疋冬衣絶紬十疋綿二十七屯三十員諸衛將軍左右金吾衛本料三十六千續加准上左右武衛等雜衛本料三十六千續加等毎月手力各二人資四千五百私馬兩匹草一百一十束料三石二斗隨身八人粮米四石八斗春衣布八端絹十六疋冬衣絶紬八疋綿一十六屯六員統軍本料各六十五千加續等春衣一付毎月粮米六斗鹽七合五勺私馬五匹草粮隨金吾同金吾隨身餘准諸衛上將軍六員大將軍本料六十千文續加并准諸衛大將軍六軍將軍本料三十千續加准左武等雜衛將軍射生神策大將軍本料五十六千文續加私馬五匹草粮准上隨身十四人七人給衣不給粮七人給粮米四石五斗鹽一斗五升春衣布十四疋絹二十八疋鞋十重冬衣絶紬十四疋絹二十八疋綿二十八屯射生神䇿將軍本料三十千文續加私馬二匹草料准上隨身十四人六人給衣不給粮八人全給粮米三石六斗鹽九升春衣布十二端絹二十四疋鞋十二重冬衣絶紬十三疋絹二十四疋綿二十四屯京兆府縣官准兩縣簿尉檢五千文餘并同大厯十年四月二十八日勅右中書門下准去年十一月二十八日勅京官宜加料錢准勅商量謹條件如前勅㫖依其年五月中書門下奏得蘇州刺史兼御史大夫知臺事李涵東都河南江淮山南等道轉運使兵部兼御史大夫劉晏户部侍郎専判度支韓滉守狀釐革諸道觀察使團練及判官錢觀察使令兼使不在加給限每月除刺史正俸料外毎使每月請給一百貫文雜給准時價不得過五貫文都練使副使毎月料錢八十貫文雜給准時價不得過三十貫文觀察判官與團練判官同都毎月料錢四十貫文准官毎月料錢三十貫文巡官准觀察推官例已上毎員毎月雜給准時估不得過二十貫文如州縣見任官充者月給料雜給減半刺史知軍事毎月除正俸外請給七十貫文如帶别使不在加限雜給准時估不得過二十貫文州縣給料其大都督府長史准七府尹例左右司准上州别駕例支給料錢刺史八十貫文别駕五十五貫文長史司馬各五十貫錄事參軍四十貫判司三十貫參軍博士各一十五貫錄事市令各一十三貫縣令四十貫丞三十貫尉簿各二十貫右謹具條件如前其舊准令月俸雜料紙筆執衣白直值納資諫等色并在此數内其七府准四月二十八日勅文不該者並請依京兆例處分其中州中縣已下三分減一分其額内釐務比正官減半其州縣官除差充推官巡官及司馬掌軍事外如更别帶職亦不加給限勅㫖宜依建中四年正月宰臣常衮與同列楊綰道不同先是百官俸料寡薄綰與衮奏請加之韓滉判度支衮與滉各騁私懷所加俸料厚薄由已舊時諸少列各定月俸料為三十五千滉怒司業張參惟止給三十千衮惡少詹事趙堪給二十五千又太子洗馬視司經局長官文學為之貳衮有親戚任文學者給二十千而給洗馬十千其輕重任情不通時政多如此類興元元年十二月詔京百官及畿内官料俸准元數支給自幸奉天後運路阻絶百官俸料或至闕絶至是全給貞元三年六月中書侍郎同平章事李泌奏加百官俸料各具品秩以定月俸隨曹署閒劇加置手力資課雜職等議者稱之十年二月詔應文武朝官有薨卒者自今已後其月俸料宜皆全給仍更准本官一月俸錢以為􅉠贈若諸三品已上官及尚書省四品官仍令有司舉舊令聞奏行弔祭禮務從優備初左庶子雷咸以是月朔卒有司以故事計其月俸以日數給之上聞之故有是命十五年十二月詔今年十月三日權減諸道諸州刺史判軍事料及專知别當官加手力課并減州縣官手力門倉庫獄囚子驛館廨宇等錢宜一切卻仍舊初獻計者言收諸道軍事錢及手力資課等當得百數十萬貫可以助軍于頔時判度支賛成之及算計大數止于三十萬貫而數中更有耗折雜破纔得十餘萬貫輿議甚以為不便韋皐張建封又相次上言所得甚微所失體大又用此人心頗不安故令復古元和六年閏十二月勅河東河中鳳翔易定四道州縣殘破俸給至微吏曺注官將同北逺在于物體切要均融宜以户部錢五萬五千貫充加四道州縣官課七年五月加賜澤潞磁邢洺五州府縣官料錢二萬貫文其年十二月以麟坊邠三州官吏近邊俸薄各賜料錢其年中書門下奏國家舊章依品制俸官一品月俸三十千其餘職田祿米大約不過千石自一品以下多少可知艱難以來網禁漸弛于是增置使額厚請俸錢故大厯中權臣月俸有至九十貫者列郡刺史無大小給皆千貫常衮為相始立限約至李泌又量其閒劇隨事增加時謂通濟理難減削然有名存職廢額去俸存閒劇之間厚薄頓異將為定式須立常規制從之乃命給事中段平仲中書舍人韋貫之兵部侍郎許孟容户部侍郎李絳等詳定減加從之十二年四月勅京百官俸料從五月以後並宜給見錢其數内一半先給元估疋段者即據時估實數迴給見錢其年十一月勅工部尚書邢士美以疾未任赴京宜就東都將息疾損日赴任其料錢準上官例令有司支給十三年六月以徳棣滄景四州值遭水潦給復一年遂定四州官吏俸錢料刺史毎月一百五十千望緊上縣令毎月四十千餘有差十四年四月重定淮西州縣俸祿以蔡州為𦂳刺史月俸一百八十千申光州為中刺史月俸一百五十千長史已下有差十五年六月刺曰朕聞帝王所重者國體所切者人情茍得其體必臻于太和如失其情是由于小利況設官求理頒祿責功既有常規寜宜就減近者以每歲經費糧入外官俸料據數抽貫朕再三思度中所未安念彼遐方或從卑官一家所給三載言歸在公當甘于㢘潔受祿又苦于減尅待我庻吏豈其然乎雖憂國之誠固須瞻助而恤人之慮將起怨咨必若水旱為虞干戈未戢事非獲已亦何辭今則幸遇豐登八方寜謐九州之内永絶妖氛三邊之土冀除烽警自宜尅己以足用安可剥下而謀安臨軒載圖實所增愧其度支所準五月二日勅應給用錢毎貫抽五十文都計一百五十萬貫文並宜停初宰相以國用不足故權請抽減諫官及言事者累陳表章以為非便故復下此詔以罷之唐㑹要卷九十一
