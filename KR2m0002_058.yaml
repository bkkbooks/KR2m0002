body:
  text: 唐㑹要卷五十八宋王溥撰尚書省諸司中左右丞武徳元年因隋舊制不改至龍朔二年二月四日改為左右肅機咸亨元年十二月二十三日復為左右丞舊左丞正四品上右丞正四品下永昌元年三月二十四日敕綸閣㑹府樞揆寔繁都省勾稽管轄輜重還依仍舊之職未協惟新之政其文昌左右丞進為從三品階其盧獻李景諶並宜三品依舊任如意元年八月十六日復為四品至今從之貞觀元年左僕射蕭瑀免官右僕射封徳彛卒太宗謂尚書左丞戴胄曰尚書省天下綱維百司所稟若一事有失必有其弊今無令僕係之於卿當稱所望也二年魏徵為尚書右丞或有言徵阿黨親戚者上使御史大夫温彦博按驗無狀彦博奏曰徵為人臣須存形迹不能逺避嫌疑遂招此謗雖情在無私亦有可責上令彦博讓徵且曰自今已後不得不存形迹他日徵入奏曰臣聞君臣協契義同一體不存公道唯事形迹若君臣上下同遵此路則邦之興喪或未可知上矍然改容曰吾已悔之徵再拜曰願使臣為良臣勿使臣為忠臣也上曰忠良豈有異乎徵曰良臣稷契咎陶是也忠臣龍逢比干是也良臣使身獲美名君受嘉號子孫𫝊世福祿無疆忠臣身受誅夷君陷大惡家國並喪空有其名以此而言相去逺矣帝深納其言其年侍御史張𤣥素奏慶州樂蟠縣令叱奴騭盗用官食推逐並實上令决之中書舍人楊文瓘奏據律不合死上曰食糧朕之所重若不加法恐犯者更多尚書右丞魏徵對曰陛下設法與天下共之今若改張皆將法外畏罪且後有重者又何以加之其年太宗謂侍臣曰人皆以祖孝孫為知音今其所敎聲曲多不諧音韻此由未至精妙人亦以許崇為良醫今不識藥性尚書右丞魏徵對曰陛下生平不愛音聲今忽為敎女樂差舛責孝孫臣恐天下怪愕上怒曰卿是朕腹心應須進忠直何乃附下㒺上為孝孫分疏彦博等拜謝徵與王珪進曰祖孝孫學問立身乃何如曰明達陛下平生禮遇孝孫復何如曰明達今過聴一言何便謂孝孫可疑明達不可信臣恐羣臣衆庶有以窺陛下者上意乃解三年正月放裴寂還郷表乞住京師乆不肻去上令問稽留所由韋挺奏留一十九日長安縣令王文楷又不准敕發遣令决杖三十尚書右丞魏徵諫曰裴寂所為事合萬死但以陛下念其舊功不致于法惟解其官止削半封今流人尚得装束假况寂放還郷宅古人有言進人以禮退人以禮文楷識陛下恩寛見寂大臣不即蹙迫論其此情未合得罪上曰放寂拜掃豈非禮耶乃釋而不問焉十年治書侍御史劉洎上書曰臣聞尚書萬㡬實為政本伏尋此選受授誠難是以八座比於文昌二丞方於管轄爰至曺郎上應列宿苟非稱職竊位興譏伏見比來尚書省詔敕稽停文案壅滯臣雖庸劣請述其源貞觀之初未有令僕於時省務繁雜倍多于今而左丞戴胄右丞魏徵並曉達吏方質性平直事應殫舉無所迴避陛下又假以恩慈自然率物百司匪懈抑此之由及杜正倫續任右丞頗亦厲下比者綱維不舉並勲親在位不能㫁决故事稽延案難理窮仍更盤下去無程限來不責遲一經出手便涉年載天工人代焉可妄加至于懿戚元勲宜優禮秩久妨賢路殊為不可將欲救兹交弊且宜精簡尚書左右丞及左右郎中如並得人自然綱維克舉亦當矯正趨競豈惟息其稽滯哉二十年宇文節為尚書左丞明習法令以幹局見稱時江夏王道宗以私事見託節奏之太宗大悦勞之曰朕所以不置左右僕射者以卿在省耳龍朔二年有宇文化及子訴理資䕃所司理之至于勾曹右肅機楊昉未詳案状訴者自以道理已成無復疑滯劾而逼昉昉謂曰未食食畢詳之訴者曰公云未食亦知天下有累年羇旅訴者乎昉遽命案立判之曰父殺隋主子訴䕃資生者永配逺方死者無冝使慰儀鳳四年韋仁約除尚書左丞約奏曰陛下為官擇人無其人則闕今不惜美錦令臣製之此陛下知臣之深矣微臣盡命之日矣仁約遂整舉綱目畧無留事羣臣肅然元和八年六月裴佶為左丞時兵部尚書李巽兼鹽鐵使將以使局置于本行經理已半會佶拜命堅執以為不可遂令撤之巽恃恩而强時重佶之有守十三年淄青鎮李師道平鎮州王承宗懼上章請割徳棣二州自贖又令二子入侍憲宗選使臣宣諭以尚書右丞崔從中選議者以承宗罪惡貫盈每多奸譎入朝侍子必非血忱人頗憂之從次魏州節度使田𢎞正以路由㓂境欲以五百騎衞之從辭之以童奴十數騎往至鎮州于鞠塲宣敕三軍大集乃諭以順逆辭情慷慨軍士無不感動承宗泣下禮貌甚㳟遂按徳棣户符節而還十五年三月呂元膺為左丞時度支使潘孟陽與太府少卿王遂互相奏論孟陽除散騎常侍遂為鄧州刺史皆假以美詞元膺封還詔書請明示枉直江西觀察使裴堪奏䖍州刺史李將順贓狀朝廷不覆按遽貶將順道州司户元膺曰亷使奏刺史罪不覆驗即謫去總堪之詞足信而亦不可為天下法又封還詔書請發御史按問宰臣不能奪會昌二年十月左丞孫簡奏伏以班位等差本繫品秩近者官兼臺省立位稍逺已是從權頗乖儀制况據敕例理亦未通今據臺司重舉元和元年所奏敕常㕘官兼大夫中丞者准檢校官在本品同類官之上自後諸行侍郎兼大夫並在左右丞之上者仍前例左侍郎兼大夫者至少唯京兆尹則往往帶此官當時講論非不至當其京兆尹是從三品至今班位列在本品同類官從三品卿監之上左太常宗正卿正三品之下其左丞是正四品上户部侍郎是正四品下今戸部侍郎兼大夫祗合在本品同類正四品下諸曺侍郎之上不合在正四品丞郎之上與京兆尹在正三品卿監之下無異又據右丞是正四品下吏部侍郎是正四品上今吏部侍郎在右丞之下葢以右丞官居省轄職在糾繩吏部侍郎品秩雖髙猶居其下推此言之則左丞品秩既髙又居綱轄之地户部侍郎雖兼大夫豈得驟居其上今據散官自將仕郎上至開府特進每品正從上下名級各異則正從上下又不得謂之同品今又取其於理切近者用以比方今京兆河南司録及諸州府録事㕘軍皆操紀律糾正諸曹與尚書省左右丞紀綱六聯畧同設使諸曺或有以功勞朝廷就加臺省官立位豈得便在司録及録事㕘軍之上施于州部尚書為非宜况在朝倫實為倒置且左丞官業至重得彈劾八座主省内業令及宗廟祠祭之事御史糾劾不當得彈奏之豈可不究是非輕為建置今臺司所奏但言成例曽不揣摩事若循理雖無往例亦合遵行事若非宜雖有往例便合改正今據元和元年臺司所奏敕户部侍郎兼大夫班位合在兵部侍郎之上左右丞吏部侍郎之下若令因循往例不議改正遣戸部侍郎兼大夫在左右丞之上有紊典章實恐重違元敕謹具貞元以後敕旨如前伏乞重賜㕘詳庶得盡理敕旨御史臺與都省各執所見因此須為定制令兩省官詳議聞奏者三年三月庫部郎中知制誥崔于等言文武常㕘官兼御史大夫中丞班位奉敕縁御史臺省各執所見因此須為定制冝令兩省官詳議聞奏者伏以御史大夫中丞掌邦國憲法朝廷紀綱崇其班位以峻風望兼此官者皆以所領務重特為寵異須敕諸行侍郎兼御史大夫者並在左右丞之上相承不改行之已久况今使下監察御史裏行朝謝時列在左右司郎中之上以此㕘彼足可辨明况奉去年十月二十八日敕御史大夫進為正三品中丞進為正四品即官望等差允為重任合崇憲職式協朝章諸准前例諸行侍郎兼御史大夫中丞者列于尚書左右丞之上敕旨班序相循已久故事足可遵行昨者務廣詢謀理宜從衆依崔于等狀便為定制左右司郎中隋朝但稱左右司郎本朝加中字武徳元年八月裁省貞觀二年正月十三日復置龍朔二年二月四日改為左右丞務咸亨元年十二月二十日復為左右司郎中開元十六年六月十六日敕郎中皆從省正門出入若泥雨聴隨便門永泰二年四月二十六日詔自今已後郎中與中州刺史員外郎褚璆等十人案牘稽滯璆稽四道户部員外郎呂大一四道刑部員外郎崔廷玉二道兵部員外郎李廷言刑部員外郎張悟倉部員外郎何鸞祠部郎中孔立言刑部郎中楊孚虞部郎中楊再思各一道虞部員外郎崔賞三道且六官分事四方取則尚書郎皆是上選須稱職司焉可尸禄悠悠曽無㫁决昨者試令借問遂有稽逋動即經年是何道理至如行判程限素標令式今日以後各宜懲革再若有犯别當處分吏部尚書武徳元年因隋舊制龍朔二年改為司列太常伯咸亨元年復為吏部尚書光宅元年改為天官尚書神龍二年復為吏部尚書天寶二載三月二十七日改為文部尚書至徳二載十二月十五日復為吏部尚書皇朝因隋舊吏部尚書掌銓六品七品選侍郎掌銓八品九品選至景雲元年宋璟為吏部尚書始相通與侍郎分知因為故事者也蘓氏駁曰貞觀二十二年二月民部侍郎盧承慶兼檢校兵部侍郎仍知五品選事承慶辭曰五品選事職在尚書臣今掌之便是越局太宗不許曰朕今信卿卿何不自信也由此言之即尚書兼知五品選事明矣故事選授之制每嵗集于孟冬去王城五百里之内以上旬千里之内以中旬千里之外以下旬尚書侍郎分為三銓尚書為尚書銓侍郎二人分為東銓西銓也故事注擬必先正其官階團甲送門下大厯十四年七月十九日敕流外出身人今後勿授刺史縣令録事㕘軍諸軍諸使亦不得奏請仍委所由檢勘雖恩制所授並不得與上同㑹缺不成赴集如須要甄録者牒中書門下吏部改與别官元和七年吏部尚書鄭餘慶請復置吏部考官三人吏部侍郎楊於陵執奏以為不便乃詔考官韋顗等二人只考及第科目人其餘吏部侍郎自定十五年十一月有醫士崔環自淮南小將為黄州司馬敕至南省吏部尚書鄭餘慶執奏封還以為諸散將無故受正員五品官是開僥倖之路且無闕可供言或過理由是少忤時宰改太子少傅大中六年十一月吏部奏條流諸司流外入流令史等請减下四百五十四員敕旨應属流外銓人所减員額並宜依吏部侍郎武徳初因隋舊制至七年二月省貞觀二年正月十日復置龍朔二年改為司列少常伯咸亨元年改為吏部侍郎光宅元年改為天官侍郎神龍二年復為吏部侍郎天寶十一年三月二十七日改為文部侍郎至徳二年十二月十五日復為吏部侍郎本一員總章二年四月一日加一員以裴行儉為之本員為中銓新加員為東銓永昌元年三月二十一日又加一員以李景諶為之通前三員聖厯二年五月八日减一員乾元二年八月二十日侍郎崔器以中銓闕承前多貶降遂奏改為西銓仍轉㕔居之其侍郎事迹具在選部吏部郎中武徳元年因隋舊號為選部郎三年加中字至五年六月一日又改為吏部郎中七年廢侍郎加郎中秩正四品上掌流内選事貞觀二年復置侍郎乃䧏依本秩亦罷掌選事龍朔二年改為司列大夫已後並隨省改復載初元年加一員以李元素為之通前三員聖厯二年八月却减一員元和八年六月罷吏部郎中張惟素一月俸料懲慢官也吏部素以郎中主印時房啓除桂管觀察使其本道邸使潜賂印令使得印啟官誥飛逓送之及上命中使賜啓官誥畏使者邀重賂乃戲曰先五日得之矣中人紿請視之因懐歸以進既而令都省覆訊罰郎中而杖令史吏部員外郎官名改復與郎中同一員判廢置一員判南曺南曺起于總章二年司列少常伯李敬𤣥奏置己前銓中自勘責故事兩轉㕔至建中元年侍郎邵說奏各挾闕替南曺郎王鋗已後遂不轉㕔貞元十一年閏八月一日侍郎杜黄裳奏當司郎官判南曺廢置請准舊例轉㕔載初元年加一員以周雉為之聖厯二年八月省開元十二年四月十六日敕兵吏各専定兩人判南曺以陳希烈吕豫為之尋却一人判貞元元年九月十六日又以兩人判南曺以庫部員外郎崔銳比部員外郎劉執經權判事畢日停至十一年閏八月二日又却以一員判也貞元十一年閏八月吏部奏當司郎官判南曺廢置准舊例轉㕔敕旨依奏長慶元年正月左武衞大將軍張克勤奏近准赦文許五品官一子官恩今臣子幼請迴授外甥狀至中書下吏部員外郎判廢置裴夷直執奏曰一子官恩在念功貴于延賞若無己子許及宗男張克勤自有息男妄以外甥奏請苟渉賣官實為亂法所請望宜不許仍永為定例從之司封郎中武徳元年因隋舊號為主爵郎中龍朔二年改為司封大夫咸亨元年改為主爵郎中垂拱元年二月二日改為司封郎中神龍元年九月五日改為主爵郎中開元二十四年九月六日復故司封員外郎與郎中改復同開元十五年閏九月十一日敕王公以下子孫應承襲者先申無子輒首正不在承襲之限寶厯元年八月膳部員外郎王惇史上言中外官僚准制封贈多請授祖父母臣謹詳古禮及國朝故事追贈出于鴻恩非由臣下之求不繋子孫之便開元新詔唯許宰相迴贈于祖葢以宰相位髙封贈崇極故㢠廻授近日常僚率援此例夫推讓于祖在父則然改奪于朝於子何忍伏望宣付宰相重依典法詳議從之元和十二年十月司封奏文武官五品以上請准式叙母妻邑號乖濫稍多或國叙軍功妄㕘勲籍或偶逢慶澤冒引詔條今請應在城諸軍衞官未至將軍使在外未至都知兵馬押衙都虞候縱有散官與敕文相當者並不許叙封其流外官諸司諸吏職務并伎術官等跡涉雜類並請不在封限從之司動郎中隋為司勲郎武徳初加中字龍朔二年二月四日改為司勲大夫咸亨元年復改為司勲郎中司勲員外郎改復與郎中同貟外郎今一員長安二年閏四月十二日文昌丞李嶠奏加一員以楊祗令為之永徽五年十二月四日夜司勲大火甲厯並盡矣天寶四年六月十三日敕准制及格式叙勲今復宜令司勲員外郎二人除曺務之外每有勲甲團進後専知磨勘所須主事令史任簡擇差定如有疎畧委本官奏録考功郎中隋為考功郎武徳初加中字龍朔二年改為司績大夫咸亨元年復為考功郎中舊郎中知貢舉其外官考貞觀以後每年定諸司長官一人判校京官即考功郎中自判至貞元二年九月二十日停考使其考課付所司准式授定遂令員外校外官考貞元六年正月以司勲員外郎判考功趙宗儒復行貶考之令自至徳以來考績之司事多失實常㕘官及諸州刺史未嘗分其善惡悉以中上考褒之及是褒貶稍明人知戒懼上善之遷宗儒考功郎中其年六月三日考功奏准天寶七載六月敕内外官初考無赴上日未考不具得替日便注破不在校限其月又奏諸使下兼憲官及檢校郎官并諸色官職掌者並仰本使每年具在使功課兼具考第申省七年八月考功奏前時諸司官皆校功過定其考第自至徳後一切悉申中上考今請覆其能否以定升䧏從之自諫議大夫給事郎官有書中考者尚書左丞相趙憬自言薦果州刺史韋正坐贓廢請降其考校使吏部尚書劉滋以憬能知其過奏中上考元和十四年十一月十二日考功奏外官應申考解先無限約請自今以後限十一月十五日到省畢如違牒本使罰本判官决本典考功員外郎改復與郎中同貞觀以後知貢舉至開元二十四年三月十二日以員外郎李昻為舉人李權所訟乃移貢舉於禮部也開元二十九年十一月十九日禮部侍郎韋陟奏准舊例掌舉官親族皆于本司差郎官一人考試有及第者尚書覆定然後附奏臣本司今闕尚書縱差郎官是臣麾下事在嫌疑所宜釐革伏望天恩許臣移送禮部差考功員外郎試揀侍郎覆定任自聞奏庶幾令浮議止息敕㫖依長慶元年五月貶考功員外郎李渤為處州刺史渤既請書宰相等下考時人以宰輔曠官不上疏陳列而越職釣奇非盡事君之道至是杜元穎等奏渤賣直沽名動多狂躁遂出之户部尚書武徳元年因隋為民部尚書貞觀二十三年六月二十日改為户部尚書顯慶元年七月二十一日改為度支尚書龍朔二年改為司元太常伯咸亨元年復為戸部尚書光宅元年改為地官尚書神龍元年復為戸部尚書武徳元年十月二十九日民部尚書裴矩奏突厥殘暴之處户請給絹一疋太宗謂曰朕于天下惟誠與信不欲空有存恤之名而無其實但户大小各須存濟給物雷同豈公之至也治書侍御史孫伏伽進曰裴矩受國恩賞未聞陳議救恤百姓則欲苟釣虗名用心若此豈當朝寄請鞫其罪太宗從之令計口為率貧戸賴焉開元六年五月四日敕諸州每年應輸庸調資課租及諸色錢物等令尚書省本司豫印紙送部每年分為一處每州作一簿預皆量留空紙有色數並于脚下具書綱典姓名郎官印置如替代其簿遞相分付二十四年敕以每年租稅雜支輕重不類令戸部修長行㫖條五巻諸州刺史縣令替日並合令遞相交付省司每年但據應支物數進畫班行附驛遞送其支配處分並依㫖文為定元和五年二月户部尚書李仁素准元和四年五月敕釐革諸道州府應徵留使留州錢物色目并帶使州合送省錢便充留州給用等據諸道申報除與敕文相當外或稱土宜不同須重頒令起置者諸州府先配供軍錢迴令送省帶使州府先配送省以便留供軍即供軍見錢盡在帶使州府事頗偏併宜令于管内州據都徵錢數逐貫均配其元不徵見錢州郡不在分配限如坊郭户配見錢須多郷村戸配見錢須少即但都配定見錢一州數任刺史於數内看百姓穩便處置其敕文不加減者即准州數申為定額如于敕額見錢外輒擅配一錢及納物不依送省中者刺史縣令録事㕘軍節級科貶焉户部侍郎改復名號與尚書同本員垂拱四年四月十一日加一員以武攸寧為之蘓氏駁曰故事度支案郎中判入員外郎判出侍郎總統押案而已官銜不言専判度支至乾元二年十月第五琦改户部侍郎帶専判度支自後遂為故事至今不改若别官來判度支即云知度支事或云専判度支貞元四年二月上以度支自有兩稅及鹽鐵𣙜酒錢物以充經費遂令收除陌錢及闕官料并外官闕官職禄及减員官諸料令户部侍郎竇㕘専掌以給文武官員料錢及百司紙筆等用至今行之元和六年四月户部奏請置巡官二人從之其年七月户部請减使及判案郎官每月雜給錢從之八月户部侍郎李程奏請諸州府闕官職田禄米及見在任官抽一分職田所在收貯以備水旱從之十二年十二月户部奏淮西以虺蜥攸居厯年貢賦不入有司羞之今則化被齊人便為善地其申光蔡等州今所貢鸂鶒綾金石斛等並同日到其諸道貢物舊例於今月十五日已進納訖臣今便欲取申光蔡貢物以元日陳于樂懸之南示中外禮畢請准式送納從之十三年十月中書門下奏户部度支鹽鐵三司錢物皆繫國用至于給納事合分明比來因循都不剖析嵗終㑹計無以凖繩葢縁根本未有綱條所以名數易為盈縮伏請起自今以後每年終各令具本司每年正月一日至十二月三十日所入錢數及所用數分為兩狀入來年二月内聞奏併牒中書門下其錢如用不盡須具言用外餘若干見在如用盡及侵用來年錢并收闕並須一一具言其鹽鐵使所收議利具一年都收數并已支用及送到左藏庫入錢數其所欠宜具監院額縁某事欠未送到户部出納亦約此為例條制既定庶絶隱欺如可施行望為常典從之寶厯二年正月户部侍郎崔元畧奏准賦役今内外六品以下官及京司諸色職掌人合免課役請自今以後應諸司見任官及准式合蠲免職掌人等並先于本司陳牒責保待本司牒到然後給符其前資官即請于都省陳狀准前勘責事若不實准詐偽律論其孝子順孫義夫節婦及割股奉親比來州府免課役不由所司今後請應有此色敕下後亦須牒當司如不承户部文符其課役不在免限從之開成元年湖南觀察使盧周仁進羡餘錢十萬貫户部侍郎歸融奏曰天下一家何非君土中外財賦皆陛下府庫也周仁輒陳小利妄說異端言南方火災恐成灰燼進于京國如循私恩臣恐天下倣傚以羨餘為名刻剥生人其所進錢請還湖南代貧下租稅三年四月敕戸部侍郎兩員自今已後先授上者宜令便判錢穀如帶度支事及判鹽鐵度支兼中丞翰林學士即不在此限仍為永例五年三月户部侍郎崔蠡奏天下州府應合管係户部諸色斛斗自今以後刺史觀察使除授到任交割後並須分析聞奏敕旨宜依大中二年十一月兵部侍郎判户部魏秩奏下州應管當司諸色錢物斛斗等前件錢物斛斗散在天下州府縁當司無巡院覺察多被官吏専擅破除嵗久之後即推在所腹内徒煩勘詰終無可徵今後諸州府錢物斛斗文案委司録事㕘軍専判仍與長吏通判每至交替各具申奏並無懸欠至考滿日遞相交割請准常平義倉斛斗例與减選仍每月量支紙筆錢若盗使官錢及將借貸與人並請准元敕以贜論加徵收欠折及違限省條並請量加懲殿如缺司録即請令選諸强正官員専知毋得令假攝官權判從之開成四年六月河南江淮等道分巡院荆襄江西道分巡院並宜敕停唐㑹要卷二十八
