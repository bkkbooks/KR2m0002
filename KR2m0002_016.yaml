body:
  text: 唐㑹要卷十六宋王溥撰廟議下㑹昌元年三月中書門下奏請尊憲宗為不遷廟曰謹按祖有功宗有德夏之祖宗經𫝊無文殷則一祖三宗成湯為始祖太甲為太宗太戊為中宗武丁為髙宗劉歆曰天子七廟茍有功德則宗之所以勸帝者功德博矣故周公作無逸舉殷之三宗以勸成王漢景帝詔曰孝文皇帝德厚侔天地利澤施四海廟樂不稱朕甚懼焉其為孝文皇帝廟奏昭德之舞以明休德然後祖宗之功施於萬代其與丞相列侯二千石禮官具儀禮奏焉丞相申屠嘉等奏曰功莫大於髙皇帝德莫盛於孝文皇帝髙皇帝廟宜為帝者太祖之廟孝文皇帝廟為帝者太宗之廟天子宜代代獻祖宗之廟又漢宣帝詔曰夙夜惟念孝武帝躬履仁義選明將討不服功德茂盛不能盡宣廟樂未稱時有司奏請尊孝武廟為代宗廟奏盛德文始五行之舞天子請代代獻之此子孫崇褒祖宗之明據也自天寶之後兵宿中原强愎締交髖髀甚衆貢賦不入刑政自出包荒含垢至於貞元德宗承奉天之難厭征伐之事戎臣優以不朝終老於外其卒則以幕吏將校代之兩河藩鎮或倉卒易師甚於奕碁憲宗攄宿憤舉升平之典法始命將帥順天行誅元年戮琳暨闢季年梟元濟及師道豈有去天下之害不享其名致生人之安不受其報者臣等敢遵古典請憲宗章武孝皇帝為百代不遷之廟表奏留中不出其年六月制朕近因載誕之日展承顔之敬太皇太后謂朕曰天子之孝莫大於丕承人倫之義莫大於嗣續穆宗睿聖文惠孝皇帝厭代已久星霜屢遷禰宫曠合食之禮惟帝深濡露之感宣懿太后長慶之際德冠後宫夙表沙麓之祥實茂河洲之範先朝恩禮之厚中壼莫偕况誕我聖君纘承昌運已協華於先帝方誕祚于後昆思廣詒謀庶宏博愛爰遵舊典以慰孝思當以宣懿皇太后祔太廟穆宗睿聖文惠孝皇帝率是彞訓其敬承之朕祗奉慈㫖載深感咽宜令盡宣中外咸使明知五年八月中書門下奏東都太廟九室神主共二十六座自祿山叛後取太廟為軍營神主棄於街巷所司潛收聚見在太微宫內新造小屋之內其太廟屋室並在可以修崇太和中太常博士王彥威議以為東都不合置神主車駕東幸即載主而行至今因循尚未修建望即令尚書省集公卿及禮官學官詳議如不要更置須有收藏去處如合置望以所拆大寺材木修建李石既是宗室官為居守便望令充修東都太廟使勾當修繕奉敕宜依六年三月太常博士鄭路等奏東都太微宫神主二十六座去二月二十九日禮院分析聞奏訖伏奉今月七日敕此禮至重須遵典故宜令禮官學官同議聞奏者臣今與學官等詳議訖謹具分析如後獻祖宣皇帝宣莊皇后懿祖光皇帝光懿皇后文穆皇后髙宗天皇大帝則天皇后中宗大聖大昭孝皇帝和思皇后昭成皇后孝敬皇帝孝敬哀皇后已前十二座親盡迭毁宜遷諸廟祔於興聖廟禘祫之嵗乃一祭之東都無興聖廟可祔伏請且權藏於太廟夾室未題神主十四座况神主既無題號之文難伸祝告之理今與禮官等同商量伏請告遷之日但瘞於舊太微宫內空閒之地參酌事理庶協從宜制可太常博士段瓌等三十九人奏議曰禮之所立本於誠敬廟之所設實在尊嚴既曰薦誠則宜統一昔周之東西有廟亦可徴其所由但緣卜洛之初既須營建又以遷都未决因議兩留酌其事情匪務於廣祭明矣伏以東都太廟廢已多時若議增修少乖前訓何者東都始制寢廟于天后中宗之朝事出一時非貞觀開元之法爾後因循不廢者亦踵鎬京之文也記曰祭不欲數數則煩天寶之中兩京悉為冦陷西都廟貌如故東都因此散亡是知九廟之靈不欲歆其煩祀也自建中不葺之後彌厯嵗年今若東廟惟新即須室别有主舊主雖在大半合祧必几筵而存之所謂宜祧不祧也孔子曰當七廟五廟無虛主也謂廟不得無主也舊主如有當去新廟别合創添謹按左傳云祔練作主又大戴云虞而主几筵如何過時成之便是以凶干吉創添既不典虛廟又非儀考諸禮文進退無守或曰漢於郡國置宗廟凡百餘所今止東西立廟有何不安者當漢氏承秦焚燒之餘不識典故至于廟制率意而行比及元成二帝之間貢禹韋𤣥成等繼出果有正論竟從毁除是知漢初不本於禮經又安可程法也或曰几筵不得復設寢廟何妨修營候車駕時巡便舍于所載之主者究其終始又得以論之昨者降敕參詳本為欲修舊主主既不立廟何可施假令行幸九州一一皆立廟乎愚臣以為廟不可修主宜藏瘞或就塗於坎室或瘞於兩階之間此乃百代常行不易之道也其年九月敕段瓌等評議東都不可立廟李福等狀又有異同國家制度須合典禮證據未一則難建立並令赴都省對議須歸正當工部尚書薛元賞等議伏以建中時公卿奏請修建東都太廟當時之議大㫖有三其一曰必存其廟備立其主時享之日以他官攝行二曰建廟立主存而不祭皇輿時巡則就享焉三曰存其廟瘞其主臣等立其三議參酌禮經禮宜存廟不合置主謹按禮祭義曰建國之神位右社稷而左宗廟禮記曰君子將營宫室宗廟為先是知王者建邦改都必先宗廟社稷况成周受命始都於豐武王相宅又卜於洛蒸祭嵗於新邑策周公於太室故書曰戊辰王在新邑蒸祭嵗王入太室祼成王厥後復歸于豐雖成洛邑未嘗久處逮于平王始定東遷則周之豐鎬皆有宗廟明矣又按曾子問廟有二主夫子告以天無二日土無二王嘗禘郊社尊無二上未知其為禮者昔齊桓公作二主夫子譏之以為僞主是知二主不可並設亦明矣夫聖王建社以厚本立廟以尊祖所以京邑必有宗社今國家定周秦兩地為東西之兩宅闢九衢而立宫闕設百官而嚴拱衛取法𤣥象號為京師既嚴帝宅難虛神位若無宗廟何謂皇都然依人者神在誠者祀誠非外至必由中出理合親敬用交神明位宜存於兩都廟可偕立誠難專于二祭主不並設或以禮云七廟五廟無虛立是謂不可無主所以天子巡狩亦有所遵尚飾齊車載遷主以行今考修廟瘞主則東都太廟九室皆虛既違於經須徴其說臣復探賾禮意因得盡而論之所云七廟五廟無虛主是論見饗之廟不可虛也今之兩都雖各有廟禘祫享獻斯皆親奉於上京神主几筵不可虛陳于東廟且禮云惟聖人為能享帝孝子為能享親昔漢韋𤣥成議廢郡國祀亦曰立廟京師躬親承事四海之內各以職來祭人情禮意於此較然二宅既不並居二廟豈宜皆祔但所都之國見享之廟既無虛室則協道經議者又欲置主不享以候巡幸昔魯作僖公之主不於虞練之時春秋書而譏之合祔之主作非其時尚為所譏今若置不合祔之主不因時而作違經越禮莫甚於此豈有九室合享之主而有置而不享之文兩廟始創於周公二主獲譏於夫子自古制作皆範周孔舊典猶在足可明徴臣所以言東都廟則合存主不合置今將修建廟宇誠不虧於典禮其見在太微宫中六主請待東都修建太廟畢具禮迎置于西夾室閟而不饗式彰陛下嚴祀之敬以明聖朝尊祖之義吏部郎中鄭亞等五人議據禮院奏以為東都太廟既廢不可復修見在太微宫神主請瘞於所寓之地有乖經訓不敢雷同臣所以别進議狀請修祔主並依典禮兼與建中元年禮儀使顔真卿所奏事同臣與公卿等重議皆以為廟故合修主不可瘞即與臣等别狀意同但衆議猶疑東西二廟各設神主恐涉有二主之義請修廟虛室以太微宫所寓神主藏於夾室之中伏以六主神位有不祧之宗今用遷廟之儀猶未合禮臣等猶未敢署衆狀蓋為闕疑太學博士直𢎞文館鄭遂等七人議曰夫論國之大事必本於正而根乎經以臻乎中道聖朝以廣孝為先以得禮為貴而臣不敢不以經對三論六故以詳於前議矣再捧天問而陳乎諸家之說求於典訓考乎大中廟有必修之文主無可置之理何則正經正史兩都之廟可徴禮稱天子不卜處太廟擇日卜建國之地則宗廟可知若廢廟之說恐非所宜按詩書禮三經及漢朝正史兩都並設廟而載主之制久已行之敢不明徴而去其文飾援據經文不易前見東都太廟合務修崇而舊主當瘞請瘞於太微宫所藏之主皇帝有事於洛則奉齊車載主以行太常博士胡德章議曰夫禮雖緣情事貴乎道將明厥要實在得中必過禮而求多則反虧於誠敬伏以神龍之際天命有歸移武氏廟於長安即其地也而置太廟天寶初復不為建都而議者曰中宗立廟於東都無乖舊典徴其此意不亦謬乎又曰東都太廟至于睿宗𤣥宗猶奉而不易者蓋緣常所尊奉不敢輒廢也今則廢已多時宜循莫舉之典也又曰雖貞觀之始草創未暇豈可謂此事非開元之法者謹按定開元六典敕曰德政之暇錯綜古今法以周官作為唐典鑒其本末千載一時春秋謂考古之法也行之可久不曰然歟此時東都太廟見在六典序兩都宫闕西都具太廟之位東都則存而不論足明事出一時又安得云非開元之法也又三代禮樂莫盛于周作者論議之時便宜細大取法周遷都而立廟今立廟不因遷都何美之而不能師之也又曰建國神位右社稷而左宗廟君子將營宫室宗廟為先者謹按六典永昌中則天以東都為神都爾後漸加營構宫室百司於是備矣今之宫室百司乃武氏改命所備也上都已建國立宗廟不合引言又曰東都洛陽祭孝宣等五帝長安祭孝成等三帝以此為置廟之例則又非也當漢兩處有廟所祭之帝各别今東都建廟作主與上都盡同詳而論之失之甚者又曰今或東洛復置太廟有司同日侍祭以此為數實所未解者謹按天寶十載詔曰須四時有事於太廟兩京同日自今已後兩京各宜别擇日既載祀典可得而詳且立廟造主所以祭神而曰嚴而勿祀出自何經當七廟五廟無虛而欲立虛廟法於何典前稱廟貌如故者即指建中之中就有而言以為國之先前以非時不造主者謂見有神主不得非時造也若江左至德之祭主並散亡不可拘以例也或曰廢主之瘞請在太微宫者謹按天寶二年敕曰古之制禮祭用質明義兼取於尚幽情實緣於既沒我聖祖淡然常在為道之宗既殊有盡之期宜展事生之禮自今已後每至聖祖宫有昭告宜改用卯時者今欲以主瘞於宫所既與此敕全乖又曰主不合瘞請藏夾室者謹按前代藏主頗有異同至如夾室儀用以序昭穆也今廟主俱不中禮則無禘祫之文又曰君子將營宫室以宗廟為先則建國營宫而宗廟必設東都既有宫室而太廟不合不營泛以論之其義斯勝而西周東漢並列兩都各有宗廟之證經史昭然又得以極思於揚榷詩曰其繩則直縮板以載作廟翼翼大雅瓜瓞言豐廟之作又曰於穆清廟肅雍顯相洛邑既成以率文王之祀此詩豐洛之廟也書曰成王既至洛蒸祭嵗文王騂牛一武王騂牛一又曰祼於太室康王又居豐命畢公保釐東郊豈有無廟而可蒸祭非都而設保釐則書東西之廟也逮於後漢卜洛西京之廟亦存建武二年於洛陽立廟而成哀平三帝祭於西京一十八年親幸長安行禘禮當時五室列於洛都三帝留於京廟行幸之期與合食之期相㑹不逢齊車又安可以成此禮則知兩廟周人成法載主以行漢家通制或以當虛一都之廟為不可而引七廟無虛主之文禮言一都之廟室不虛主非謂兩都各廟而不可虛也聨出征之詞更明載主之意因事而言理實相統非如詩人便可斷章以取義也古人求神之所非一奉神之意無二故廢栗主作桑主廢桑主作栗主既事理之以明其一也或又引左氏𫝊築郿凡例謂有宗廟先君之主曰都而立建主之論按魯莊公二十八年冬築郿左𫝊為築發凡例穀梁譏因藪澤之利公羊稱避凶年造邑之嫌三𫝊異同左氏為短何則當春秋二百年間魯凡城二十四邑惟郿一邑稱築城其二十三邑豈皆有宗廟先君之主乎執此而建主之端又非通論或又曰廢之瘞何以在於太微宫所藏之所宜舍故依新前已列矣按瘞主之位有三或於北牖之下或在西階之間廟之事也其不當立之主但隨其所在以瘞之夫主瘞於當立之廟斯不然矣以所在而言則太微宫所藏之所與漢之寢園無異厯代以降建一都者多兩都者少今國家崇東西之宅極嚴奉之典而以各廟為疑合以建都古事以相質正前資即周漢是也今詳議所徴究其年代率皆一都之時豈可以擬議亦孰敢獻酬于其間詳考經㫖古人謀寢必及於廟未有設寢而不立廟者國家承隋氏之弊草創未暇後雖建於垂拱而事有所未合其後當干戈寧戢之嵗文物大偹之朝厯於十一聖不議廢之豈不以事雖出于一時廟有合立之理不可改革也今洛都上自宫殿樓觀下及百辟之司與西京無異鑾輿之至也雖厮役之賤必歸其所理豈先帝之主獨無其所安乎時也虞主尚瘞廢主宜然或以馬融李周二人稱寢無傷於偕立廟不妨於暫虛是則馬融李周可法于宣尼矣以此擬議乖當則深或稱凡邑有宗廟先君之主曰都無曰邑邑曰築都曰城者謹按春秋二百四十年間惟郿一邑稱築如城郎費之類各有所因或以他防或以自固謂之盡有宗廟理則極非或稱聖主有復古之功簡冊有考文之美五帝不同樂三王不同禮遇時為法因事制宜此則改作有常非有司之事也如有司之職但合一一據經變禮從時則須候明詔也凡不修之證略有七條廟立因遷一也已廢不舉二也廟不可虛三也非時不造主四也合載遷主行五也尊無二上六也六典不書七也謹按文王遷豐立廟武王遷鎬立廟成王遷洛立廟今東都不因遷而立欲立廟是違立廟因遷也謹按禮記曰凡祭有其廢之莫舉也有其舉之莫廢也今東都太廟廢已八朝若果建之是違已廢不舉也謹按禮記曰當七廟五廟無虛主今欲立虛廟是違廟不可虛也謹按左𫝊丁丑作僖公主書不時也記又曰過時不祭禮也合禮之祭過時猶廢非禮之主可以作乎今欲非時作主是違非時不作主也謹按曾子問古者師行必以遷廟行乎孔子曰天子巡狩必遷廟主行載于齊車言必有尊也今也取七廟之主以行則失之矣皇氏云遷廟主者惟載新遷一室之主也今欲載羣廟之主以行是違載遷之主也謹按禮記曰天無二日土無二王嘗禘郊社尊無二上也今欲兩都建廟作主是違尊無二上也謹按六典序兩都宫闕及廟宇此時東都有廟不載是六典不書也遍考書𫝊並不合修竊以武德貞觀之中作法垂範之日文物大備儒彥畢臻若可修營不應議不及矣記曰樂由天作禮以地制天之體動也地之體止也此明樂可作禮難變也伏惟陛下誠明宰物莊敬御天孝方切於祖宗事乃求於根本再令集議俾定所長臣實職司敢不條白以對德章又有上中書門下及禮院詳議兩狀並同載於後其一曰伏見八月六日敕欲修東都太廟令㑹議此事時已有議狀凖禮不合更修尚書丞郎已下三十八人皆同署狀德章官在禮寺實忝司存當聖上嚴禋敬事之時㑹相公尚古黜華之日脫國祀典有乖禮文豈惟受責于曠官竊懼貽恥於明代所以勤勤懇懇將不言而又言昨者異同之意盡可指陳一則以有都之名使合立廟次則欲崇修廟宇以候時巡殊不知廟不合虛主惟載一也謹按貞觀九年詔曰太原之地肇基王業事均豐沛義等宛譙約禮而言須議立廟時祕書監顔師古議曰臣旁觀祭典遍考禮經宗廟皆在京師不于下土别置昔周之豐鎬實為遷都乃是因事更營非云一時别立太宗許其奏即日而停由是而言太廟豈無都號太原是時猶廢東都不立可知且廟室惟新即須有主主既藏瘞非虛而何是有都立廟之言不攻而自破矣又按曾子問曰古者師行必遷廟主行乎孔子曰天子巡狩必以遷廟主行載於齊車言必有尊也今也取七廟之主以行則失矣皇氏云遷廟主者惟載新遷一室之主也如祧廟之主無載行之文假使將候時巡自可修營一室議構大室有何依憑夫宗廟尊事也重事也至尊至重安得以疑文而定論言茍不經則為擅議近者敕㫖凡以議事皆須一一據經若無經文任以史證如或經史皆無據者不得率意而言則立廟東都正經史無據果從臆說無乃前後相違也書曰三人占則從二人之言㑹議者四十八人所同者六七人耳比夫二三之喻又何其多也夫堯舜之為帝迄今稱咏之者非他術異智者也以其有賢臣輔翼能順考古道也故堯之書曰若稽古帝堯舜之書曰若稽古帝舜孔子傳曰傅說佐殷之君亦曰事不師古匪說攸聞考之古道既如前驗以國章又如此將求典實無以易諸伏希必本正經稍抑浮議踵臯蘷之古道法周孔之遺文則天下守真之儒實所幸甚其餘已具前議其二曰夫宗廟之設原于誠敬旋觀典禮二則非誠是以匪因遷都更不别立廟宇記曰天無二日土無二王嘗禘郊社尊無二上又曰凡祭有其廢之莫舉也有其舉之莫廢也則東都太廟廢已多時若議增修稍違前志何者聖厯神龍之際武后始復明辟中宗取其廟易置太廟焉本欲權固人心非經久制也伏以所存神主既請祧藏今廟室惟新即須有主神主非時不造廟寢人無虛議如修復以候時巡又時巡惟載主備在方䇿可得而詳又引經中就有數等或是弟子之語或是他人之言今廟不可虛尊無二上非時不造主合載一主行皆大聖祖及宣尼親所發明者比之常據不可同塗又邱明修春秋悉以君子定褒貶至陳泄以忠獲罪晉文以臣召君于此數條復稱君子將評得失特以宣尼斷之傳曰危疑之理須聖言以明也或以東都不同他郡地有壇社宫闕欲議構葺似是無妨此則酌于意懷非曰經據也但以遍討今古無壇社立廟之證用以為說實所未安謹按上自殷周旁稽故實除因遷都之外無别立廟之文制曰自古儀禮皆酌人情必若輔嗣知幾賈生達識才可發揮大政潤色皇猷其他管窺蓋不足數公卿之議實可施行德章所陳最為淺近豈得茍申獨見妄有異同事貴酌中禮宜從衆宜令有司擇日修崇太廟以留守李石充使勾當六年三月擇日既定禮官既行旋以武宗登遐其事遂寢至五月宣宗登位復詔東都備法駕迎木主歸祔太廟兩都太廟木主自此始也其年十一月太常博士任疇上言前月十七日饗德明興聖廟太廟直候論狀稱懿祖室在獻祖之上當時雖以為然便依行事猶牒報監祭使及宗正寺請遇祭詳窺玉牒如有不同即相知聞奏爾後復伏檢髙祖神堯皇帝本紀伏審獻祖為懿祖之昭懿祖為獻祖之穆昭穆之位天地極殊今廟室奪倫不即陳奏尚為茍且罪不容誅乃制修撰朱儔檢討王皥研精詳覆得報稱天寶二年制追尊咎繇為德明皇帝凉武昭王為興聖皇帝十載立廟至貞元十九年制從給事中陳京右僕射姚南仲等一百五十人之議以為禘祫是祖宗以次序之祭凡有國者必尊太祖今國家以景皇帝為太祖太祖之上施于禘祫不可為位請接德明興聖廟共成四室祔遷獻懿二祖謹尋儔等所報即當時表奏並獻居懿上伏以國之大事宗廟為先禘祫之禮不當失序四十餘載理難尋詰伏祈聖鍳即垂詔敕具禮遷正其月疇又奏曰伏奉今月十三日敕以臣所奏獻祖懿祖二室例置事宜令禮官集議聞奏者去年十七日緣遇太廟祫享太祖景皇帝已下羣饗之年凖貞元十九年所祔獻祖懿祖於德明廟共為四室凖貞元敕各于本室行享禮審知獻祖合居懿祖之上昭穆者正其時親見獻祖之室例居懿祖之上于後遍檢圖籍實見殊差遂敢奏聞今奉敕宜令禮官集議聞奏者臣得奉禮郎李岡太祝栁仲年協律郎諸葛玫李僅檢討官王皥修撰官朱儔博士閔慶之等七人狀稱謹按髙祖神堯皇帝本紀及皇帝圖譜并武德貞觀永徽開元已來諸禮著在甲令者並云獻祖宣皇帝是神堯之髙祖懿祖光皇帝是神堯皇帝之曾祖以髙祖辨之則獻祖是懿祖之父懿祖是獻祖之子即博士任疇所奏改祀不虛臣等伏乞即垂敕詔其禮遷正其事遂行大中六年正月吏部尚書李景讓上疏言穆宗敬宗文宗武宗四廟當遷出且穆宗是陛下兄敬宗已下是猶子陛下拜兄尚不可拜姪可乎使陛下不得親事七廟宜升代宗已下八廟以正三昭三穆之序下百寮集議不定而止中和元年黃巢犯闕僖宗避狄於成都夏四月有司請享太祖已下十一室詔公卿議之太常卿牛叢與儒者議其事或曰王者巡狩以遷廟主行如無遷廟之主則祝史奉幣帛皮圭告於祖廟遂奉以出載於齊車每合奠焉今非巡狩是失守宗廟則當罷宗廟之事叢疑之時將作監王檢太子賓客李臣乂禮部員外郎袁皓建議異同及左丞崔厚為太常卿遂議立行廟以𤣥宗幸蜀時道宫𤣥元殿之前架幕為十一室又無神主題神版位而行事達禮者非之明年乃特造神主祔於行廟天祐二年二月二十七日左僕射裴贄等二百六十七人奏竊以昭宗皇帝山陵虞祭畢祔太廟合定祧遷下尚書省集議聞奏者伏以廟朝大禮宜循故實今據太常博士李侗栁莊議狀證引不同只請近朝例祧順宗一室入祔昭宗神主從之唐㑹要卷十六
