body:
  text: 唐會要卷二十五宋王溥撰輟朝開元十八年十二月左丞相燕國公張説薨輟朝五日廢元日朝會二十九年十一月寧王憲薨輟朝十日貞元十五年七月以黔府觀察使王礎卒輟朝一日故事團練觀察使卒未有廢朝者自礎始焉其年九月義成軍節度使盧羣卒輟朝故事節度使卒時皆先廢朝然後除代至是先除尚書右丞李元素然後輟朝非也十六年以徐泗濠等州節度使張建封卒輟朝近例節度使帶僕射以上卒輟朝三日尚書以上次之都團練觀察使則否洎貞元八年嗣曺王臯下一年李自長皆以節度使帶尚書卒各輟朝三日至十四年樊澤以僕射卒輟朝一日十五年黔府觀察使王礎卒時為輟朝一日元和九年六月丙子天德軍經略使周懷義卒輟朝一日經略使廢朝自懷義始也太和九年七月太常博士崔龜從奏大臣薨輟朝曰伏以廢朝軫怛義重君臣所貴及哀尤宜示信自頃以來輟朝非奏報之時備禮於數日之外雖遵常制似不本情臣不敢逺徵古書請引國朝故事貞觀中任環卒有司對仗奏聞太宗責其乖禮岑文本既歿其夕為罷鼓嚴張公謹之亡哭之不避辰日是知憫悼之意不宜過時臣謂大臣薨禮合輟朝縱有疑務急速便殿須召宰臣不臨正朝無爽事體如此則由衷之信載感於幽明彌情之文無虧於禮典太常寺奏定伏以近日文武三品以上官薨卒皆為輟朝其間有未經輕重之官今任又是列散者為之變禮誠恐非宜自今以後文武三品以上非曾任將相及曾在密近宜加恩禮者皆請不必輟朝其餘並請依元敕又中書門下奏覆古有當祭告喪義在申請同體過時而哭於禮為乖禮院所請合輟朝者各以聞哀之時明日請依餘酌太常寺所奏别具品例輕重進定謹按儀制令百官正一品喪皇帝不視事一日又凖官品今太師太傅太保太尉司徒司空以上正一品太子太師太子太傅太子太保以上從一品侍中中書令以上正二品左右僕射太子少師太子少傅太子少保三京牧大都護上將軍統將以上從二品門下中書侍郎六尚書左右散騎常侍太常宗正卿左右衛及金吾大將軍左右神䇿神武龍武羽林大將軍內侍監以上正三品御史大夫殿中袐書監七寺卿國子祭酒少府監將作監京兆河南尹以上從三品緣令式舊文三品以上薨歿通有輟朝之制伏以君臣之間禮情所及事必繁於委遇官則以時重輕一用舊儀咸乖中道臣等參配色目如前其留守節度觀察都護防禦經略等使並請各據所兼官為例依奏其年九月中書門下奏近奏定合輟朝官品敕已尋行其致仕官多是優禮合同貞觀敕例未該須有處分自今以後其致仕官如非曾任三品以上正官及歷四品清望並不在此例依奏敕應官至丞郎亡歿合有廢朝况班在諸司三品之上自今以後宜凖諸司三品官例處分因尚書左丞庾散休薨乃降是敕也太和八年七月太僕卿段伯綸卒伯綸秀實之子自古歿身以利社稷無如秀實者文宗乃特加贈仍輟朝一日以禮忠臣之嗣會昌三年八月中書門下奏親王公主葬日凖德宗以前實録並合輟朝一日請自今以後凖故事處分又京官一品尚書省二品及時舊相方臻此位比來同刺史曾任監例輟朝一日恐輕重不倫起今後並望輟朝兩日又二王後為國賔又是一品前年方與輟朝請編入令式又駙馬登朝之初例除四品既是國戚不合繫於品秩望輟朝一日並依奏大中十一年右羽林統軍鄭光卒上之元舅也詔贈司徒輟朝三日御史大夫李景儉上疏曰鄭光是陛下親舅外族之愛誠軫聖心今以輟朝之數比于親王公主即前例所無縱有似不可施用何者先王制禮所貴防微大凡人情于外族則深于宗屬則薄先王制禮割愛厚親據開元禮外祖父母親舅喪止服小功五月若親伯叔親兄弟即服齊衰周年所以疏其外而密於內也有天下者尤不可使外戚強盛今鄭光輟朝日數望速改詔命輟朝一日或兩日示其升降有差恩禮無僭垂之百王永播芳烈疏奏乃詔罷朝兩日雜録開元元年十二月敕諸文武官三品以上及中書黃門侍郎若遇雨聽著雨衣及帽至殿門外并聽著出入又諸文武三品以上帶職事者欲向田莊不出四面關者不須辭見致仕朝朔望者凖此三年閏二月七日敕每受朝日平明後仗未下前皇城內正南街宜斷人馬來往十五年十月敕文諸道遙授官自非路便即不須赴謝天寶十三載七月敕自今以後應正衙引辭官當日不發委御史臺察訪聞奏貞元十三年六月詔自今以後時暑及雨雪泥潦亦量放朝參十五年正月丁亥不視事以公卿等朝拜諸陵故也初是月七日拜陵官發其日本視事適會董晉卒廢朝至十六年二月公卿拜陵發日遂不親視事迄今因循行之元和元年三月御史中丞武元衡奏中書門下御史臺五品以上官尚書省四品以上官諸司正三品以上官及從三品職事官東都留守轉運鹽鐵節度使觀察都團練防禦招討經略等使河南尹同華州刺史諸衛將軍三品以上官除授皆入閣謝其餘官許于宣政南門拜訖便退從之三年六月百官初入待漏院候禁門啓入朝故事建福望仙等門昏而閉五更而啓與諸里門同時至德中有吐蕃自金吾仗亡命因敕晚開宰相待漏太僕寺車坊至是始令有司各據班品置院於建福門五年十二月義武軍節度使張茂昭舉族歸朝至京師故事雙日不坐是日特開延英十四年八月上謂宰臣曰今天下雖漸平尤須勤於政理若遇休假頻不坐朝有事即詣延英請對勿拘常制十五年正月十三日延英閣宰臣及羣官往對已而上却不坐以中書侍郎令狐楚有事于太清宫故也其年十月下元假召宰臣對于延英議邊事也太和七年正月户部侍郎庾敬休奏當司未有待漏院今請於鹽鐵度支待漏院側創造依奏九年八月御史臺奏應文武朝參官新除授及諸道節度觀察經略防禦等使及入朝赴鎮並合取初朝謝日先就廊下參見臺官然後赴正衙辭謝或有於降官之日及朝覲到城忽遇連假三日以上近例便許於宣政門外見謝訖至假開亦須特到廊下參臺官者請自今以後如遇連假巳見謝訖至假開亦須特到廊下參臺官依奏開成元年正月敕自今以後每遇入閣日次對官未要隨班並出並於東階松樹下立待宰臣奏事退令齊至香案前各奏本司公事左右史侍次對官奏事訖同出其年五月中書門下奏自今以後除刺史並望延英對了奏發日限縱不遇坐日許於臺司通將待延英開日辭了進發從之三年二月御史臺奏宣自今以後遇延英開假中謝官委司臺前一日依官班具名列奏如先奏即不在中謝限又敕新授方鎮延英開日便令中謝其兩省官中謝即不在本司前一日奏聞例餘依其年二月堂帖奉宣新授刺史於閣內及延英中謝不必須候延英開其月中書門下奏僕射尚書侍郎左右丞並監九寺大卿監凖開成元年三月敕每遇延英開並令候對如入閣日班退後各紫宸殿前東西松樹下依位立本司有公事即聞奏者伏以兩衙坐日宰臣及決對官奏事比及退朝已是辰巳之間若更祗候即廢闕公務今日延英面論並請停罷如須顧問隔宿及臨時宣召必不稽遲依奏其年十月莊恪太子薨中書門下奏輟朝合至月末舊無起居之禮頗乖臣子之心臣等商量隔三日一赴延英進問起居應協情禮從之四年正月中書門下奏尚書省四品以上官及諸卿監等遇兩衙坐日宜令兩人循環於閣內及延英祗候者敕前件官等若當待制之日重差定憲慮妨公事起今以後合祗候官請不在待制之限依奏其年二月御史中丞髙元裕奏伏以近日丞郎以上官未就食之前時有稱疾便請先出請自今合候對官遇延英開日有事要與宰臣商量者即請拜食後先出仍須事前牒臺司或年齒衰遲不任每度就食者量許三度仗下後先出其餘官不在此限如違請每月終一度具名聞奏依奏百官奏事舊制六品以下官奏事皆自稱官號臣姓名然後陳通事舍人侍御史殿中侍御史則不稱官號貞觀四年五月五日上謂房玄齡等曰君於臣子情亦無别前如晦亡朕為不視事數日惻愴之兹念任環亡豈有內外殊異所司不進狀乃對仗便奏此豈識朕意如朕子弟不幸死亡公等可如此奏耶今日後不得如此永徽二年十二月詔五品以上上封事不能進聽仗下面奏景龍二年二月七日敕仗下奏事人宜對中書門下奏若有祕密未應揚露及太史官不在此限至三年二月二十六日敕諸司欲奏大事並向前三日録所奏狀一本先進令長官親押判官對仗面奏其御史彈事亦先進狀至開元五年九月十二日詔比來百司及諸使奏陳皆待仗下頗乖公道須有革正自今以後非灼然祕密不合彰露者並令對仗如文書浩大理文雜著仍先進狀其太史官自依舊例至六年七月二十八日詔曰百司及奏事皆合對仗公言比日以來多仗下獨奏宜申明舊制告語令知如緣曺司細務及有祕密不可對仗奏者聽仗下奏開元十八年四月二十一日敕五品以上要官若緣兵馬要事須面奏陳聽其餘常務並令進狀興元元年九月上謂宰臣曰近者朝官諫言都不陳奏時之利病何以知之自今每正衙及延英坐日當令朝官三兩人面奏時政得失庶有𢎞益貞元十四年二月太常卿齊抗奏元日朝賀奏事户部禮部尚書司天監奏開元禮並令於橫班同羣官拜訖然後依次奏事自後並未拜以前先就階上立奏事畢隨例便退既無禮度則有闕儀今請依開元禮部户部尚書以上於南班再拜訖便隨上公升于階就東向位立凖儀注奏事以補舊儀可之十八年七月嘉王府咨議髙𢎞本正衙奏事自理逋債因下敕曰比來百官每於正衙奏事至於移時為弊亦甚自今以後不須於正衙奏事如要陳奏者並於延英進狀請對正衙奏事不易之制貞觀之間孜孜理道講陳政事其後正衙奏御凡在列位無不上逹今𢎞本贖理罪之可也因人而廢其事不可長慶二年七月御史臺奏文武常參官閣內奏事近年無例昨者威衛將軍高扶援引德音迥出班位緣非彈奏本條未敢舉勘起今以後其文武常參官應有諫論合守進狀常例有違即請奏彈從之會昌元年六月敕今後應有朝官及上封事人進章表論人罪惡並須證驗明白狀中仍言請付御史臺不得更云請留中不出如軍國機要事關密切不在此例親王及朝臣行立位貞觀十二年正月十五日禮部尚書王圭奏言三品以上遇親王於途皆降乘違法申敬有乖儀注上曰卿輩皆自崇貴卑我兒子乎特進魏徴進曰自古迄兹親王班在三公之下今三品皆天子列卿乃八座之長為王降乘非王所宜當也求諸故事則無可並行于令又乖國憲上曰國家所以立太子者擬以為君也然則人之修短不在老幼設無太子則母弟次立以此而言安得輕我子也徴又曰殷家尚質有兄終弟及之義自周以降立嫡以長所以絶庶孽之窺窬塞禍亂之源本為國者宜知所慎於是遂可圭奏開元六年八月一日右散騎常侍禇無量上疏曰臣謹詳諸史氏案以禮經有親親之義尊尊之道所以重王室敬耆年今陛下纘舊惟新睦親尚齒朝儀品列宜更申明至若命以嗣主用崇主祭養夫國老蓋在乞言會於朝班合從上列準令嗣主正一品今乃居庶官之次頗為間雜須有甄明臣伏見開府儀同三司在三品前立望請嗣王亦與開府同行諸致仕官各於本司之上則重親尚齒典禮式存五日敕九族既穆百官有序至于班列宜當分位嗣王實光於主祭國老有貴於乞言比在朝儀尚為間雜非所謂睦親敦舊之義也嗣王宜與開府儀同三司等致仕官各居本司之上永為常式七年八月敕諸王入朝及别恩追至朝參日未入間於便近處坐仍令所司陳設建中元年十一月詔親王出閣就本列坐至三年七月詔宗廟尚爵朝廷尚官今嗣郡王爵雖居高官或在下列於本官之上非制也至四年七月敕自今以後嗣郡王列于本官之下也至元二年十月九日御史臺奏每有慶賀及須上表並合上公行之如無上公即尚書令僕以下行之其嗣王合隨宗正若有班立位合依三品四年七月二十七日敕今後嗣郡王列於官班之上庶子宜在卿之上文武百官朝謁班序貞元二年六月御史中丞竇參奏起今以後班七人以上同日不到者請具名聞奏從之其年九月五日敕應文武百官朝謁班序中書門下侍中書令同中書門下平章事各以本官序供奉官左右散騎常侍門下中書侍郎諫議大夫給事中中書舍人起居即及舍人左右補闕左右拾遺通事舍人在橫班序若入閣即各隨左右省其御史大夫中丞侍御史左右殿中侍御史左右通事舍人分左右立若橫行參賀辭見御史大夫在散騎常侍之上中丞在諫議大夫之下御史臺御史大夫在三品官之上别立中丞在五品官之上别立留守副元帥都統節度使觀察使都團練都防禦使并大都督大都護持節兼者即入班在正官之次餘官兼者各從本官班序御史在六品班之後也諸使司下無本官準授內供奉裏行者即入班亦在正官之次有本官兼者各從本官班序如本官不是常參官并憲官是攝者惟御史班中辭見殿中省宮監少監尚衣尚舍尚輦奉御分左右隨􅓫扇立若入閣亦如之一品班三太三公太子三太嗣郡王散官開府儀同三司國公等同班二品班尚書左右僕射太子三少京兆河南牧大都督大都護散官特進光祿大夫爵開國郡公開國縣公并上柱國同三品班六司尚書太子賓客九寺卿國子祭酒三監京兆等七府尹詹事親王傅中都督上都護下都護都督上州刺史五大都督府長史上都督府都護散官金紫光祿大夫爵開國侯勳上護軍下護軍四品班尚書左右丞六司侍郎太常少卿宗正少卿左右庶子祕書少監餘七寺少卿國子司業少府將作少監京兆河南太原少尹少詹事左右諭德家令率更令僕親王長史司馬鳳翔等少尹中州刺史下州刺史大都督護司馬散官正議大夫通議大夫大中大夫中大夫爵開國伯勳官上輕車都尉五品班尚書諸司郎中國子博士都水司使者萬年等六令太常宗正祕書丞著作郎殿中丞尚食尚藥尚舍尚輦奉御大理正中允左右贊善中書舍人洗馬親王咨議散官中散大夫朝請大夫朝散大夫爵開國子開國男勳官上騎都尉武班供奉宣政殿前立位從北千牛連行立次千牛中郎將次千牛將軍一人次過狀中郎將一人次接狀中郎將二人次押柱中郎將一人次又押柱中將一人次排階中郎將一人次又押散手仗中郎將一人以上在橫街北次南金吾左右大將軍入閣升殿夾階座左右從南千牛將軍一人次千牛郎將一人次千牛將軍一人次千牛連行立柱外過狀中郎將一人接狀中郎將一人次押柱中將一人排階中郎一人階下押散手仗中郎將一人金吾將軍分左右立應當本日入閣人各依前件立其不入閣人各依本職事立非當上人遇合入日並從本官品第班序其入閣升殿除千牛衛將軍中郎將外餘並以左右中郎將充其諸衛及率府中郎將不得升殿一品班諸郡王散官驃騎大將軍爵國公二品班散官輔國大將軍鎮國大將軍爵開國郡公開國縣公勳官上柱國柱國三品班左右衛左右金吾衛左右驍衛左右武衛左右威衛左右將軍衛左右監門衛左右千牛衛大將軍諸衛將軍散官冠軍大將軍雲麾將軍爵開國侯勳官上護軍護軍四品班左右千牛衛左右監門衛中郎將親勳翊衛中郎將太子左右衛太子左右衛司率清道內率監門副率太子親勳翊衛中郎將上府折衝都尉中府折衝都尉散官忠武將軍壯武將軍宣威將軍明威將軍爵開國伯勳上輕車都尉輕車都尉五品班親勳翊衛郎將軍太子親勳翊衛郎將親王典軍親王府副典軍下府折衝都尉上府果毅都尉散官定逺將軍寧逺將軍遊騎將軍遊擊將軍爵開國子開國男勳官上騎都尉騎都尉尚書省官據周禮先敘六官準六典尚書為百官之本今每班請以尚書省官為首東宫官王府官外官東宫官既為宫臣請在上臺官之次左府官又次之三太三少賓客右庶子王傅既為師傅賓相不同官屬請仍舊太常宗正丞並隨寺望合在祕書丞上尚書奉御尚藥奉御本局既𨽻殿中省合在殿中丞之下諸王府官行列合以王長幼為序檢校教官兼官及攝試知判等官並在同類正官之次其有行守檢校兼試攝判等官職事者即依正官班敘除留守副元帥都統節度觀察使都團練都防禦使并大都督大都護持節兼外餘應帶武職事位在西班仍各以本官品第為班序含元殿前龍馬道下敘班舊典此意惟合於通乾觀象門南敘班自李若水任通事舍人奏更於龍尾道下敘班既非典故今請停文武官行立班序通乾觀象門外序班武次文至宣政門文由東門而入武由西門而入至閣門亦如之其退朝即並從宣政西門出文官充翰林學士皇太子侍讀諸王侍讀武官充禁軍職事準舊例並不朝參其翰林學士大朝會日準興元元年十二月二十九日敕朝服班序宜準諸司官知制誥例在集賢史館等諸職事者並請朝參訖各歸所務辭見宴集班列先後請依天寶三載七月二十八日禮部詳定所奏敕公式令諸文武官朝參行立二王後位在諸侯王上餘各依職事官品為序職事同者以齒致仕官各居本色之上若職事與散官勳官合班列文散官在當階職事者之下武散官次之勳官又次之官同者異姓為後若以爵為班爵同者亦準此其男以上任文武官者從文武班若親王嗣王任卑者職事仍依本品郡王班三品以下職事者在同階品上自外無文武官者嗣王在太子太保下郡王次之國公在正一品下郡公在從三品下縣公在正四品下侯在從四品下伯在正五品下子在從五品上男在從五品下即前官被召見及赴朝參致仕者在本品見任上以理解者在同品下其在本司參集者各依職事諸散官三品以上在京者正冬朝會依百官例自餘朝集及别使臨時聽儀制令諸在京文武官職事九品以上朔望日朝其文武官五品以上及監察御史員外郎太常博士每日常參武官五品以上仍每月五日十一日二十一日二十五日參三品以上九日十九日二十九日又參當上日不在此例其長上折衝果毅若文武散官五品以上直諸司及長上者各準職事參其𢎞文館崇文館及國子監學生每季參若雨露失容及泥潦並停諸文武九品以上應朔望朝參者十月一日以後二月二十日前並服袴褶五品以上著珂繖周喪未練大功未葬非供奉及宿衛官皆聽不趍常參文武官準令每日參自艱難以來人馬劣弱遂許分日望許依前分日參待戎事稍平加其俸祿即依常式其武官準令五品以上每月六參三品以上更加三參頃並停廢今請準令却復舊儀其朔望朝參及𢎞文館崇文館國子監學生每季參等請續商量聞奏以前御史中丞竇參等奏伏奉今年四月三日敕宜付所司與御史臺以近日體例參議禮文務從簡正詳定訖聞奏者臣等準敕詳定如前敕旨二品武班宜以左右金吾等下六衛上將軍依次為班首其檢校官兼及攝試知判等本官二品以上者位望崇重禮異羣僚宜依本班朝會餘依十三年十月徐泗節度使張建封入朝覲詔參令入大夫班亦優禮也二十年十月御史中丞武元衡奏準貞元二年班序敕使下三院御史有本官是常參官兼者即入本官班如內供奉裏行即入御史班緣使下御史近例並不在內供奉班內請自今以後諸使下御史內供奉者入閣日並依宣政殿前班位次員外郎之後在正臺監察御史之上便為常式從之二十一年五月御史臺奏準貞元二年九月班序敕已有定制其橫行位次請一切依本班先後如遇雨泥廊下立班即依舊位又常參官辭見班序緣各御史多帶兼官髙下不等今請兼大夫者在諸司四品之上丞郎及供奉官五品之下兼中丞者在諸司五品之上供奉官五品之下兼侍御史者在諸司六品之上供奉官六品之下兼殿中監察者在諸司七品之上及供奉官本品之下如本官帶常參官攝御史者依本官班序仍舊例準入辭見如本官不是常參官攝御史者不在此例又諸文武官朝參行立各依職事官品為序者緣有檢校官高職事官卑及嗣王郡王任職事官高卑不等今請應檢校僕射尚書以上及嗣王郡王任職事官者一切在職事本品之上又準紫宸門外班除供奉官其餘一切宣政殿前班序登階後任依舊位如違請準乾元元年三月敕奪一月俸依奏元和元年四月御史中丞武元衡奏貞元二年御史中丞竇參奏凡諸使兼憲官職除元帥都統節度使觀察都團練防禦等使餘並列在本官之位請自今以後常參官御史大夫中丞等準檢校省官例立在本品同類官之上從之會昌二年十月中丞李回奏準元和元年四月敕常參官兼御史大夫中丞立在本品同類官之上自後尚書諸司侍郎兼憲官與左右丞不當並置至於序立式有所疑臣伏請依前遵守永為定制依奏尚書左丞孫簡奏伏以班位等差本係品秩近者官兼臺省立位稍遷頗紊彞制理亦未通今據臺司重舉元和元年所奏敕常參官兼大夫中丞者準檢校官立在左右丞之上者承前列曹侍郎兼大夫者至少惟京兆尹往往帶此官其京兆之從三品至今班位只在本品同類官從三品卿監之上在太常宗中正卿三品之下其尚書左丞是正四品上戶部侍郎是正四品下今戶部侍郎兼大夫只合在本品同類官正四品下諸曹侍郎之上不合在正四品丞郎之上與京兆尹在正二品卿監之下無異又據尚書右丞是正四品下吏部侍郎是正四品上今吏部侍郎班位在右丞之下蓋以右丞官居省轄職在糾繩吏部侍郎品秩雖高猶居在下推此言之則左丞品秩既高又處綱轄之地戶部侍郎雖兼大夫豈驟居其上今據散官自將侍郎上至開府特進每品從上下名級各異則從上下又不得謂之同品今取於理切近者用以比方今京兆河南司録及諸州録事參軍皆操紀律糾正諸曹與尚書省左右丞綱紀六典略同設使諸曹掾因其功勞朝廷就加臺省官立位豈得使在司録及録事參軍之上施於州縣尚謂非宜况在朝廷實為倒置且尚書左丞自置此官職業至重按六典得彈射八座主省內禁令及宗廟祠祭之事御史糾劾不當得彈奏之豈可不究是非輕為措置今臺司所奏但言往例曾不揣摩事若循理雖無往例亦合遵行事若非宜雖有往例便合改正今據元和元年臺司所奏敕戶部侍郎兼大夫班位合在兵部侍郎之上在左右丞吏部侍郎之下今若因循往例不即改正遣戶部侍郎兼大夫位在左右丞之上則京兆尹兼御史大夫班位合在太常宗正卿之上不唯有紊典章實恐重違元敕謹具貞元二年以後敕旨如前伏乞重賜參詳庶合事理敕旨緣御史臺與臺省各執所見因此須為定制其宜令兩省官詳議聞奏三年二月庫部郎中知制誥崔平奏兼御史大夫中丞一班位奉敕宜令兩省官詳議聞奏者伏以御史大夫中丞掌邦國憲法朝廷紀綱兼此官者皆以所領務重特為寵奬近來諸司侍郎兼大夫者並在左右丞之上相承不改待之已久况今使下監察御史裏行朝謝之時列在左司郎中之上以此參比足可辨明况奉去年十月敕御史大夫進為正三品寺丞進為正四品下郎官望等裏行蓋往時酌從宜之文定可久之法合崇憲聨式叶朝儀請準前例諸司侍郎兼御史大夫中丞者在尚書左丞之上敕宜依崔平等所奏唐會要卷二十五
