body:
  text: 唐會要卷三十四宋王溥撰論樂武德元年六月二十四日萬年縣法曹孫伏伽上書曰百戲散樂本非正聲有隋之末大見崇用此謂淫風不可不改近者太常官司於人間借婦女裙襦五百餘具以充散樂之服云擬於玄武門遊戲竊以為非貽厥孫謀為萬世法也又論語曰樂則韶舞以此言之散樂定非功成之樂如臣愚見請並廢之則天下幸甚至其年十月拜舞人安叱奴為散騎侍郎既在朝列禮部尚書李綱諫曰臣按周禮大樂胥不得參於士伍雖復才如子野妙等師襄皆終身繼世必不易其業故魏武帝欲使禰衡擊鼓先解朝服露體而擊之曰不敢以先王之法服為伶人衣惟齊末髙緯封曹妙達為王授安馬駒為開府有國家者以為殷鑒今新定天下之業起義功臣行賞未遍髙才碩學猶滯草萊而先令舞人致位五品鳴玉曵組趨馳廊廟恐非創規模貽子孫之道也四年九月二十九日詔太常樂本因罪譴沒入官者藝比伶官前代以來轉相承襲或有衣冠繼緒公卿子孫一霑此色纍世不改婚姻絶於士庶名籍異於編氓大恥深疵良可矜愍其大樂鼓吹諸舊樂人年月已久時代遷移宜並蠲除一同民例但音律之伎積學所成傳授之人不可頓闕仍令依舊本司上下若已經仕宦先入班流勿更追補各從品秩自武德元年配充樂户者不在此例樂工之雜士流自兹始也太常卿竇誕又奏用音聲博士皆為大樂鼓吹官僚於後筝簧琵琶人白明達皆以庸才積勞計考並至大官自是聲伎入流品者蓋以百數貞觀六年監察御史馬周上疏曰臣聞致化之道在於求賢審官為政之本在於揚清激濁故孔子曰惟名與器不可以假人是言慎舉之為重也臣見王長通白明達本自樂工輿皂雜類韋槃提斛斯正則更無他材獨解調馬縱使術踰儕輩伎能可取乍可厚賜金帛以富其家豈得列在士流超授官爵遂使朝會之位萬國來庭騶子伶人鳴玉曵綬與夫朝賢君子比肩而立同坐而食臣切恥之岑文本謂所親曰我見馬君論事多矣援引事類揚榷古今舉要刪蕪會文切理一字不可加一言不可減昔之蘇張終賈之儔耳永徽元年正月有司奏依禮享祀郊廟並奏宫懸比停教習恐致廢忘伏尋故實兩漢升祔之後庶事如故國之大禮祀典為先今既踰年理冝從吉若不肄習實慮不調誠敬有虧致招罪責並從之上元元年九月髙宗御含元殿東翔鸞閣觀大酺時京城四縣及大常音樂分為東西兩朋帝令雍王賢為東朋周王顯為西朋務以角勝為樂中書侍郎郝處俊諫曰臣聞禮所以示童子無誑者恐其欺詐之心生也伏以二王春秋尚少意趣未定當須推多讓美相敬如一今忽分為二朋遞相誇競且俳優小人言辭無度酣樂之後難為禁止恐其各爭勝負譏誚失禮非所以導仁義示和睦也上瞿然曰卿之逺識非衆所及也遽令止之調露二年皇太子使樂工於東宫新作寶慶之曲咸命工者奏于太清觀始平縣令李嗣真謂道士劉槩輔儼曰此樂宫商不和君臣相阻之徵也角徵失位父子不協之兆也殺聲既多哀調又苦若國家無事太子受其咎矣居數月而皇太子廢為庶人槩儼奏其事擢嗣真為太常丞使使知三禮儀注嗣真私謂人曰禍猶未已主不親庶務事無巨細決於中宫將權與人攻之不易宗室雖衆皆在敗位居中制外其勢不敵我恐諸王藩翰將為中宫所蹂踐矣有隋以來樂府有堂堂之曲再言堂者是唐氏再受命也中宫僣擅復歸子孫則為再受命矣近日閭里又有側堂堂撓堂堂之謡側者不正之辭撓者不安之稱我見患難之作不復久矣神龍元年正月給事中嚴善思上表曰臣伏見太常奏公除後請習樂以供郊廟享祀奉敕不允臣與衆官詳審以為樂主氣化所以感天地動鬼神調五行均四序故哲王垂制被之樂章六變而神祗降饗九成而祖考來格今陛下以服未一周久停六律稽象德於太廟寢祈福於近郊何以昭永厯於上玄紹成功於先聖考之典禮恐或未安臣以漢魏喪禮以日易月者蓋為三年不為禮禮必壞三年不為樂樂必崩是也以樂因陽來禮由陰作樂崩則陽伏禮廢則隂愆風雨或違粢盛遂闕豐年之祠育養兆庶於是不安所以度諒暗之舊儀遵適時之新禮斯實存至公於天下割巨痛於私情祈社稷之永安庶宗廟之長享孝道之大何以加之使漢魏之禮未然則當自我作古况其得禮之變詎可越而不從伏請準太常所請訐其教習其年正月享西京太廟大樂令裴知古謂萬年令元行沖曰金石諧和當有吉慶之事其在唐室子孫乎其月中宗即位復國為唐二年三月并州清源縣尉吕元泰上疏曰比見都邑城市相率為渾脫駿馬戎服名為蘇幕遮旗鼓相當軍陳之勢也騰逐喧譟戰爭之象也錦繡誇競害女紅也徴斂貧弱傷政體也戎服相效非雅樂也渾脫為號非美名也安可以禮儀之朝法彼陋俗軍陳之勢列庭闈之下竊見諸王亦有此好自家刑國豈若是也詩云京邑翼翼四方是則非先王之禮樂而將則四方者斯實愚臣之所未諭也夫樂者動天地感鬼神移風易俗布德施化重犬戎之曲不足以移風也非宫商之度不足以施化也四者無一何以教人臣本凡愚不識忌諱忠於國者以臣為讜言佞於朝者以臣為誹謗惟陛下少留意焉先天元年正月皇太子令宫臣就率更署閲女樂太子舍人賈曽諌曰臣聞作樂崇德以感人神韶夏有容咸英有節婦人媟黷無厠其間者昔魯用孔子幾致於霸齊人懼之饋以女樂魯君既受孔子遂行戎有由余兵強國冨秦人反間遺之女樂戎王耽悅由余乃奔斯則大聖名賢疾之已久矣良以婦人為樂必務冶容哇姣動心蠱惑喪志上行下效淫俗將成敗國亂人實由兹起殿下監撫餘間宴私多豫後庭妓樂古或有之至於所司教習彰示羣僚曼妓淫聲實虧睿化伏願並令禁斷至開元二年八月敕天生黎蒸區别男女外則導之以禮中則和之以樂茍或不臧孰云致理自有隋頽靡庶政凋缺徴聲遍于鄭衛衍色矜於燕趙廣場角抵長袖從風聚而觀之寖以成俗所以戎王奪志夫子遂行也朕方大變澆訛用除災蠧眷兹技樂事切驕淫傷風害政莫斯為甚既違令式尤冝禁斷二年正月西僧婆陀請開宫門燃百子燈其夜太上皇御安福樓門觀樂凡四日方罷是月又追作先天元年大酺太上皇御諸樓觀之以夜繼晷盡月不息左拾遺嚴挺之疏諫乃止大厯十四年十二月十五日禮儀使部尚書顔真卿奏謹按周禮大司樂職云諸侯薨令去樂大臣死令弛樂鄭注云去謂藏之弛謂釋之也是知哀輕者則釋哀重者則藏又晉元后初崩武帝咸寧元年饗萬國不設樂晉博士孔恢議朝廷遏密懸而不樂恢以為宜都去懸設樂為作不作則不宜懸國喪尚近謂金石不可陳於庭伏請三年未畢朝會不設懸如有大臣薨殁則量事輕重懸而不作敕付所司永貞元年十月太常奏內外公私聲樂奉祠等漢魏已來既葬祔廟之後皆復其常朝行之以為故事今德宗皇帝十一月四日行升祔之禮訖事請皆如舊詔可雜録武德元年相國參軍盧子牟獻琵琶萬年縣法曹孫伏伽上疏曰陛下貴為天子富有四海動則左史書之言則右史書之既為竹帛所拘恣情不慎盧子牟所獻頻蒙賞勞但普天之下莫非王土率土之濵莫非王臣陛下必有所欲何求不得陛下少者豈此物哉顯慶元年正月御安福門觀大酺有伎人欲持刀自刺以為幻戲詔禁之龍朔元年正月禁婦人倡優雜戲皇后所請也二月六日敕太常寺六日停教音樂太宗皇帝文德皇后忌日故也乾封元年五月敕音聲人及樂户父母老病應侍者取家內中男及丁壯好手者充若無所取權停其本文樂署博士及别教子弟應充侍者先取户內人及近新充如意元年五月二十八日內教坊改為雲韶府內文學館教坊武德以來置在禁門內神龍二年三月并州清源縣尉吕元泰上疏曰臣謹按洪範曰謀時寒若君能謀事則燠寒順之何必祼露形體澆灌衢路鼓舞跳躍而索寒也禮曰立秋之月行夏令則寒暑不節夫陰陽不調政令之失也休咎之意君臣之感也理均影響可不戒哉其年九月敕三品已上聽有女樂一部五品已上女樂不過三人皆不得有鐘磬樂令凡教樂淫聲過聲凶聲慢聲皆禁之淫聲者若鄭衛過聲者失哀樂之節凶聲者亡國之音若桑間濮上慢聲者惰慢不恭之聲也景雲三年左拾遺韓朝宗諫曰傳曰辛有適伊川見被髮野祭者曰不及百年此其戎乎其禮先亡矣後秦晉遷陸渾之戎於伊川以其禮樂之鄉廢俎豆之事一言以貫百代可知今之乞寒濫觴成俗伏乞三思籌其所以至先天二年十月中書令張説諫曰韓宣子適魯見周禮而歎孔子會齊數倡優之罪列國如此况天朝乎今外國請賀選使朝謁所望接以禮樂示以兵威雖曰戎狄不可輕易焉知無駒支之辨由余之賢哉且乞寒之説未聞典故祼體跣足盛德何觀揮水授泥失容斯甚法殊魯禮褻比齊優恐非干羽柔逺之義樽俎折衝之道願擇芻言特罷此戲至開元元年十月七日敕臘月乞寒外蕃所出漸浸成俗因循已久自今已後無問上下即宜禁斷開元二年上以天下無事聽政之暇于梨園自教法曲必盡其妙謂之皇帝梨園弟子其年十月六日敕散樂巡村特宜禁斷如更有犯者并容止主人及村正決三十所由官附考奏其散樂人仍遞送本貫入重役二十三年敕內教坊博士及弟子須留長教者聽用資錢陪其所留人數本司量定申考為簿音聲內教坊博士及曹第一第二博士房悉免雜徭本司不得驅使又音聲人得五品已上勳依令應除簿者非因征討得勳不在除簿之列天寶十載九月二日敕五品已上正員清官諸道節度使及太守等並聽當家畜絲竹以展歡娛行樂盛時覃敷中外大厯十四年五月詔罷梨園伶使及官冗食三百餘人留者𨽻太常永貞元年九月詔除教坊樂人授正員官之制元和五年二月宰臣奏請不禁公私樂從之時以用兵權令斷樂宰臣以為太過故有是請至六月六日詔減教坊樂官衣糧六年太子少傅兼判太常卿鄭餘慶奏太常習樂請復用大鼓從之先是德宗自山南還宫繼有懷光吐蕃之虞都下人情驚擾遂詔太常習樂去大鼓至是復用之八年四月詔除借宣徽院樂人官宅制自貞元以來選樂工三十餘人出入禁中宣徽院長入供奉皆假以官第每奏伎樂稱旨輒厚賜之及上即位令分畨上下更無他錫至是收所借其年十月蔡州節度使韓𢎞惟獻聖朝萬嵗樂曲譜凡三百首十四年正月詔徙仗內教於布政里十五年賜教坊本錢五千貫文長慶四年三月賜教坊樂官綾綃三千五百匹又賜錢一萬貫以備行幸樂官十三人並賜紫衣魚袋其年八月以太常卿趙宗儒為太子少師先是太常有師子五方之色非嘗朝聘饗不作焉至是教坊以牒取之宗儒不敢違以狀白宰相以事止有司不合關白而宗儒憂恐不已宰相責以怯懦故換秩焉寶厯二年九月京兆府奏伏見諸道方鎮下至州縣軍鎮皆置音樂以為歡娛豈惟誇盛軍戎實因接待賓旅伏以府司每年重陽上已兩度諸王及大臣出領藩鎮皆須求雇教坊音聲以申宴餞今請並於當司錢中每年方圓三二十千以充前件樂人衣糧伏請不令教坊收管所冀公私永便從之京兆尹劉栖楚所請也栖楚出河北小吏不讀書史不知從前非物力不足而闕於制置也蓋以京邑四方取則之地務繁權重豈以聲樂倡優方鎮宴遊為事哉屬宰臣有黨于栖楚者遂可其奏時議惜之太和九年文宗以教坊副使霍朝霞善吹笛新聲變律深愜上旨自左驍衛將軍宣授兼率府司馬宰臣奏率府司馬品髙郎官不可授伶人上亟稱朝霞之善左補闕魏謨上疏論奏乃改授潤州司馬開成三年四月改法曲名仙韶曲仍以今官所處為仙韶院四年三月敕每月賜仙韶院樂官料錢二千貫文支用不盡令數內宜停三百貫文會昌二年四月二十三日敕節文京畿諸院太常樂及金吾角手今後只免正身一人差使其家丁並不在廕庇限三年十二月京兆府奏近日坊市聚會或動音樂皆被臺府及軍司所由恐動妄有申聞自今已後請皆禁斷從之大中六年十二月右巡使盧藩等奏準四年八月宣約教坊音聲人於新授觀察節度使處求乞自今已後許巡司府州縣等捉獲如是屬諸使有牒送本管仍請宣付教坊司馬遵守依奏咸通中伶官李可及善音律尤能轉喉為新聲及豔辭聽者無倦京師屠沽少年效之謂之拍彈時同昌公主除喪懿宗與郭妃悼之可及為歌百年舞曲舞人皆盛飾珠翠仍畫魚龍地衣以列之曲終樂闋珠翠覆地詞語悽惻聞者流涕又常於安國寺作菩薩蠻舞上益憐之可及常為子妻婦帝賜酒二銀樽啓之乃金翠也時宰相曹確屢論之懿宗不納至僖宗即位宰相崔彥昭奏逐死於嶺表唐會要卷三十四
