body:
  text: 唐會要卷九十八宋王溥撰回紇回紇在薛延陀北境居近娑陵水去京師六千九百里勝兵五萬口十萬先屬于突厥初有特健俟斤死有子曰菩薩部落以為賢而立之由是大振菩薩徑勇有膽氣善籌䇿常以少制衆其母烏羅渾主知諍訟之事平決嚴明其地沙鹵有大羊而足長五寸貞觀二十一年正月率衆內附顯慶三年十二月以回紇故燭龍州刺史吐迷度子婆閏授右衛大將軍龍朔三年二月移燕然都護府于回紇都落仍改名瀚海都護府其瀚海都護府移雲中古城改名雲中都護府仍以磧為界磧以北者為蕃州悉𨽻瀚海磧南並𨽻雲中婆閏卒妹比栗毒代立比栗毒卒子獨解支立其都督親屬及部落征戰有功者並自磧北移居甘州界故天寶末取驍壯以充赤水軍騎士在磧北者自則天後並為默啜所役屬仍别立都督以統之獨解支卒子伏帝匐立為河西經略副使兼赤水軍使開元七年伏帝匐卒贈特進遣使弔祭子承宗立承宗為涼州都督王君㲋誣奏長流瀼州而死其部落猶存天寶初回紇葉護逸標苾襲滅突厥小殺之孫烏蘇木施可汗未幾自立為九姓可汗由是至今兼九姓之號因而南徙居突厥舊地依烏德健山嗢昆河居焉雖行逐水草大抵以北山比中國之長安城直南去西城一千七百里西城即漢之髙闕塞北去磧口三百里有十一都督九姓部落一部落置一都督于本族中選有人望者為之破拔悉蜜及葛邏祿皆收一部落各置都督一人每行止戰鬬以二客部落為鋒其九姓一曰回紇二曰僕固三曰渾四曰拔曳固即拔野古五曰同羅六曰思結七曰契苾以上七姓部自國初以來著在史傳八曰阿布思九曰骨崙屋骨恐此二姓天寶後始與七姓齊列天寶三載三月朝廷以逸標苾有誅烏蘇木施功封為奉義王及破拔悉蜜自稱骨咄祿毗伽闕可汗又遣使朝貢四載加授特進五載册為懷仁可汗六年逸標苾卒子磨延啜立國人號為葛勒可汗磨延啜勇悍善用兵十五載回紇吐蕃各使請和親助國討逆葛勒可汗棄于葉護以精騎三千隨朔方節度使郭子儀討賊至德元載七月肅宗即位于靈武二載五月朔駕在彭原四月官軍為賊將安守忠所敗于清渠北乃遣中官竇議使於回紇令發其兵九月回紇遂遣太子葉護領蕃兵四千餘人來助討賊葉護入見肅宗親宣慰賜以金帛廣平王豫領朔方安西回紇南蠻大食之衆十五萬討安慶緒既戰大敗逆賊遂收東京十一月回紇至東京敕百官于長樂驛迎上御宣政殿引葉護宣慰其餘豪長列于階下賜錦繡繒綵銀品物甚多葉護辭歸帝謂曰能為國家就大事者卿力也何遽去耶葉護奏曰回紇戰兵留在沙苑欲更為陛下收范陽馬少不足以討除餘孽請且歸靈夏已北取馬用濟其事優詔答之仍許和親乾元元年六月遣達亥阿波刺史來迎公主拜開府儀同三司並獻馬五百匹貂裘白㲲等又遣宰相諦德領驍將三十人助國討賊七月册命葛勒可汗為英武威毗伽可汗封幼女為寧國公主以降焉八月遣三子骨啜特勒九月遣大首領蓋將軍等謝主下降又賜三婦人來朝二年四月威武毗伽可汗卒長子葉護先被害小子移地建立是為登里可汗寶應元年四月回紇演者裴羅等十八人來朝八月可汗自將精騎五千南踰太原晉絳屯兵于陕州平陸縣遣使奏請助王師討平殘冦是日引其使宴于延英殿賜物有差命左散騎常侍兼御史大夫尚衡使于回紇軍宣慰可汗遣弟右殺領精騎三千以行營節度使僕固懷恩破逆賊史朝義于北邙山二年正月可汗辭還蕃六月册命為頡咄登密于合俱録英義建功毗伽可汗大厯十三年六月河中府朔方將士劫回紇使輜重因大掠河中坊土回紇格戰死者數千人十月回紇冦太原河東節度留後鮑防出師與回紇戰于曲陽我師敗績死萬餘人十四年英義建功可汗為其下所殺建中元年六月册回紇合骨咄祿毗伽可汗為武義成功可汗命京兆尹源休持節册立初德宗遣中官梁文秀告哀于回紇且修舊好可汗移地健不為禮而九姓部落屬于回紇者又陳中國便利以誘其心其相頓莫賀達干諌不聽思人怒擊殺之並殺其親信及九姓之所誘來者凡三十人頓莫有立號為合骨咄祿毗伽可汗使其豪長聿達于隨文秀來朝故命休册拜焉二年六月以兼光祿卿李涵為散騎常侍充弔册回紇使貞元三年八月回紇使合闕將軍歸蕃初合闕將使命請婚于我許以咸安公主嫁之命公主見合闕于麟德殿直令中謁者賫公主畫圗賜其可汗四年十一月回紇公主及使至自本藩德宗御延喜門以觀之可汗喜于和親其禮甚恭乃喜言曰子壻半子也父患西戎我子也當遣兵除之又罵辱吐蕃使乃使其宰相等率衆千餘人及妹吐骨祿毗伽公主姨迷叔咄祿公主及職使大首領等妻妾凡五十六婦人來迎可敦聘馬三千匹敕令朔州及太原分留回紇七百餘人其宰相大首領等至者館于鴻臚寺召回紇公主及使者對于麟德殿頒賜有差詔以咸安公主出降回紇可汗仍特置府官屬並同親王府十一月册令骨咄祿武義成功可汗為天親可汗五年七月公主至衙帳回紇使李義進請因咸安公主下降改紇字為鶻字蓋欲夸國俗俊健如鶻也德宗允其奏自是改為回鶻其年九月天親可汗卒子多邏斯立國人謂之判官特勒詔册為登里邏沒密施俱祿忠貞毗伽可汗以鴻臚卿兼御史中丞郭鋒為弔册回鶻使至六年四月忠貞可汗卒子阿啜立十月郭鋒至自回鶻初鋒奉使册忠貞可汗是歲忠貞為弟所殺而篡立時回紇大將頡利迦斯西擊吐蕃未回及四月其次相率國人殺篡者而立忠貞之子為可汗方年十六七及六月頡子迦斯西討回將至牙帳次相等懼其復有廢立不欲漢使知之留鋒數月回及頡子迦斯之至也可汗等迎于郊野盛陳鋒所送國信器幣可汗與次相等皆俯伏自言廢立之由且請命曰今日惟大相生死之悉以所陳器幣贈頡子迦斯以悅之可汗又拜泣曰兒愚幼無知今幸得立惟仰食阿爹國政悉不敢聞也回鶻謂父曰阿爹七年二月詔册阿啜為奉誠可汗遣鴻臚少卿御史大夫庾挺持節弔祭册命之四月回鶻遣使聿支達于等來朝且告小寧國之喪小寧國榮王琬之女寧國將有行肅宗念其逺去故遣媵之及歸寧遂留之故國人號為小寧國公主也九月敗吐蕃于北庭使來獻捷十一年十一月奉誠可汗卒奉誠無子國人立其相骨咄祿將軍詔册命為滕里邏朋祿沒密施合和祿多利邪毗伽懷信可汗五月令祕書少監兼御史中丞史館修撰張薦持節弔祭册立之其骨咄祿將軍本姓􅎤跌少孤為回鶻大首領所養及長有武藝辨慧自天親可汗時已掌兵馬衙官諸大首領多敬服之奉誠無嗣國因奉為王其天親以上諸可汗有子見幼小者並送闕庭至德後回鶻于中原有功故懷信可汗不敢言奉誠從人望也永貞元年懷信可汗卒遣使來告喪十一月册命可汗為愛登里邏洎德密施俱録毗伽可汗未詳愛登里邏與懷信何親史並不載以鴻臚少卿兼御史中丞孫杲持節充弔祭册立使至元和元年二月凡三朝貢三年二月回鶻使來告咸安大長公主之喪廢朝三日公主德宗第八女也本降天親可汗卒子忠正可汗立忠正可汗卒子奉誠可汗立奉誠可汗卒國人立其相是為懷信可汗皆從其國俗尚公主在蕃凡二十一年卒册贈燕國大長公主諡曰襄穆三月御麟德殿對回鶻使多覽將軍等賜白綵錦衣服銀器有差自回鶻請修蕃臣之禮五年後常遣使朝貢六年回鶻可汗卒遣使掘野居葛勒將軍來告喪七年正月册命可汗為軍登里邏骨德密施合毗伽可汗命檢校工部尚書鴻臚卿兼御史大夫張茂宣持節弔祭册立之八年四月回鶻使和親伊珠難還蕃宴于三殿贈銀器繒帛九年僕固昌來朝十一年正月御麟德殿引對回鶻使賜錦綵銀器有差三月又遣使押進橐駝九頭馬八十匹十一年回鶻可汗卒遣使來告喪十一月册回鶻可汗為愛登里邏骨沒密施合毗保義可汗命宗中正少卿兼御史中丞李孝誠持節弔祭册立之十五年三月御麟德殿引見回鶻使合達子等許其尚主其月封第九妹為永安長公主降嫁回鶻可汗長慶元年三月保義可汗卒輟朝三日四月册回鶻可汗為君登里邏羽祿密施勾主祿毗伽可汗五月所遣回鶻宰相都督公主麾尼等至迎所降公主也初保義可汗求婚許降以永安公主保義既卒則宜改定而使人固請永安尋以第五妹封太和公主出降回鶻命中書舍人王起就鴻臚寺宣諭焉上御麟德殿對回鶻使及公主五十人等賜錦繒銀器有差六月敕太和公主宜特置府命宰相杜元頴充五禮使回鶻宰相並公主獻駝褐白錦白練貂鼠裘鴨頭子玉腰帶等馬一千匹駝五十頭口七月册太和公主為仁孝端麗明智上夀可敦命左金吾衛大將軍兼御史大夫何證為送公主及册可汗使光祿卿兼御史大夫李憲為之副三年回鶻可汗卒其從父弟曷薩可汗立遣使來告喪册曷薩可汗為君登里汨囉沒密施合毗伽可汗命工部尚書兼御史大夫鄭權弔祭册立之寶厯中頻使朝貢至太和六年為其下所殺其從子和特勒立遣使告喪為之廢朝詔册和特勒為君登里邏汨沒密施合毗伽可汗命左驍衛將軍兼御史大夫唐𢎞實持節弔祭册立之開成四年其相勿薦公引山北沙陀攻圍之可汗自殺國人立勿薦公為署颯可汗未受册命連年飢疫羊馬死者被地又大雪為災武宗即位遣時澤王溶告喪始知易代其年為黠戛斯所害其國分散有烏希特勒者曷薩之弟和特勒之叔也亦率衆南奔至錯子山乃自立為可汗居塞上朝廷遣鴻臚賈耽右將軍王會往宣諭分邊偹以振食之兼就大同川還其馬價絹直册為可汗遣將作少監兼御史中丞苗鎮持節駐于河東待其底定然後受而可汗違背恩德侵劫諸部落旋又擅入雲州將入振武上以為天亡數盡不可容也乃命河東等道兵討之會昌三年正月諸軍大破回鶻於薩呼山就其帳中奉太和公主歸於我軍其特勒以下大衆數萬人盡降獲其前後所賜敕書可汗亦被瘡與百騎踰山遁走捷書至宰相率百僚闕中稱賀先是回鶻宰相唱沒斯特勒將其家屬及麾下數千人來降上嘉之降書撫宥仍賜姓李氏封懷化郡王改名思忠賜中第于永樂坊並家屬遣所在給傳赴闕其軍士分于諸鎮收管用壯騎兵西㸑西㸑者南寧之渠帥自云本河東安邑人七代祖事晉人為南寧州太守屬中國亂遂王其地梁元帝時南寧州刺史徐文威徵詣荆州有㸑瓚者遂據南寧之地延袤二千餘里既死其子震玩統其衆髙祖受禪拜玩子𢎞達昆州刺史令持其父喪歸葬于祖瑩既又遣俞大施至南寧諭之部落歸欵武德七年七月二十四日來貢方物昆彌國昆彌國者一曰昆明西南夷也在㸑之西洱河為界即葉榆河也其俗與突厥略同去京師九千里勝兵數萬人相傳云與胸奴本是兄弟國也漢武帝得其地入益州郡而其後復絶諸葛亮定南中亦所不至武德四年巂州治中吉𢎞偉使南寧因至其國諭之至十二月遣使朝貢因求內附自是每歲不絶其使多由黔南路而至近又封其别帥為滇王代襲其國貞觀十九年四月二十日右武衛將軍梁建方討之降其諸屯七十二所户十萬九千三百遣使往洱河有數十百部落大者五六百户小者二三百户無大君長有數十姓以楊李趙董為名家各擅一州不相統攝自云其先本漢人有城郭村邑自夜郎滇池以西皆云莊蹻之餘種也其土五榖與中夏同以十二月為歲首林邑國漢日南象郡之地其先因漢女子徵側之亂是後功曹子區連殺縣令自號為王無子其甥熊代立晉宋已來恆通中國其地恆溫不識氷雪常多霧雨人能用弩以藤為甲王出則列象千頭信佛法以二月為歲首稻歲再熟有結遼鳥能解人語亦謂之結了鳥蓋土音訛也武德六年二月其王梵志遣使朝貢貞元四年又貢大珠大如雞卵圎白皎潔狀若水晶正午向日以艾承之即火燃八年又獻白鸚鵡情識辨慧善于應答太宗憫之並付其使令放歸林藪十四年其國獻通天犀一十枚諸寶稱是永徽總章中有玊鉢迦含波摩纍獻馴象先天開元中其王建多達摩又獻馴象沈香琥珀等天寶八載其王盧陀羅使獻真珠一百顆沈香三十斤鮮白㲲二十隻自至德後遂改稱環王國不以林邑為號貞元九年環王因遣使貢犀牛上令見于太廟元和四年八月安南都護張舟奏破環王國偽歡愛州都統殺三萬餘人獲其王子五十九人器械戰船戰象稱之咸通二年十二月攻安南府遣神䇿將軍康承訓率禁軍並江西湖南之兵赴援先是大中末安南都護李琢貪暴侵刻獠民羣僚引蠻攻安南至咸通三年大徵兵赴援天下騷動其年東蠻境陷交趾真臘國在林邑之西南本扶南之屬國也東接車渠西屬驃南濵海王姓劉利氏其俗東向開門國以東為上有戰象五千頭梁大同中始並扶南而有其國都伊奢那城風俗與林邑同武德六年十月遣使來朝貞觀二年十一月又與林邑國俱來朝貢太宗嘉之賜賚甚厚今南方人謂真臘國為善國自神龍已後真臘分為二半以南近海多陂澤處今謂之水真臘半以北多山阜處今謂之陸真臘亦謂之文單國貞觀中纍遣使朝貢永徽二年遣使獻馴象聖厯元年開元五年天寶九載並遣使朝貢並獻犀牛水真臘國者其境東西南北約皆八百里東至奔陀浪洲西至墮羅鉢底國南至小海北至陸真臘國其王所處城號娑羅城提拔國之東有小城皆謂之國其國甚多象餘所出物産及言語與真臘同元和八年遣使李摩那等來朝白狗羌西羌之别名與會州連接勝兵一千白蘭羌亦西羌之别種風俗並與黨項國同武德六年十二月遣使朝貢貞觀五年十二月其渠帥並來朝永徽二年十一月特浪生羌卜樓莫各率衆萬餘户詣茂州歸附其年正月生羌大首領凍就率部落內附以其地置建州顯慶中白蘭為吐蕃所併收其兵以為軍鋒開元二十九年春益州刺史仇兼瓊奏其國及索摩等諸州籠官三百餘來至秦州望準女國等例簡擇許令入奏餘並就秦州宴賞放還從之其年十月白狗國四品籠官蘇唐封及狗子川五品籠官薛阿封管至各賜紫金及帛以遣之貞元九年七月其王羅陀蔥又與女國等詣劍南西川節度使韋臯內附謁授試太常卿兼保州司馬至今子孫承襲其爵曹國理那蜜水古康居之地俗與康國同附于突厥勝兵千餘人好淫祠罄資産而無悔去瓜州六千里武德七年七月朝貢使至云本國以臣為健兒聞秦王為神武願在麾下髙祖大悅貞觀十一年至開元中朝貢不闕天寶元年其王哥邏僕使獻方物三年詔封其主為懷德王四載哥邏僕羅上表自陳曾祖以來回天可汗忠赤常受徵發望乞恩慈將臣土國同于唐國小子所須驅遣臣身一心為國征討十一載其王設阿忽與國副王野解及九國王並上表請同心擊黑衣大食玄宗晏賜慰諭遣之又有中曹國在西曹國之東康國之北其所治謂之迦布底真城在平川其人長大工于戰又有西曹國理那蜜水南瑟底痕城東南去康國一百里西北至河國二百里南與史國界接北與波覽國界接其城東北四十里有越于底城內有得悉神逺近敬信之有金義金破羅濶一丈五尺每日所祭羊馬千人食之不盡並有金銀器其上題云漢天子所賜神器隋大業中始通武德以後常修蕃禮殊奈國崑崙人也在林邑南去交趾海行三月餘日習俗文字與婆羅門同絶逺未常朝中國貞觀二年十月使至朝貢拔野古國在僕骨東境勝兵一萬户六萬人皆殷富其地東北一千里曰康干河有松木入水一二年而化為石其色青有國人居住其人謂之康干石人皆著木腳上山逐鹿其國東北六日行至鞠國有樹無草無羊馬有鹿如中國牛馬使鹿牽車可勝三四人衣鹿皮鹿食地苔自鞠國東行十五日並俞折國土地廣大百姓多風俗與拔野古同地少牛馬而多豹鼠鞠國北有大漠國饒羊馬其人極長大長者至丈三四其國云北有骨帥國與大漠國相接戶萬五千勝兵三萬霫國胸奴之别種亦與靺鞨為鄰勝兵萬人並臣于頡利習俗與突厥略同其渠帥號為俟斤貞觀三年朝貢至二十一年列其地為寶顔州即以其渠長為刺史先是太宗蕩平突厥其豪帥多授以侍衛之官沙漠之人素愛錦罽太宗既招來遐域特賜其好者因錦文所用舊縷而錯綜其色花葉翔走事多殊形每頒賜其渠長大為榮寵顯慶五年以其首領李含珠為居延都督含珠死以其弟厥都為居延都督自後無間焉黨項羌在古析支之地漢西羌之别種魏晉已降西羌微弱周滅宕昌鄧至之後黨項始強南雜春桑迷桑等羌北連吐谷渾其種每姓别自為部落一姓之中復分為小部落大者萬餘騎小者數千騎不相統一有細封氏費聰氏往利氏頗超氏野辭氏旁當氏米貪氏拓拔氏最為強族俗皆土著有棟宇織犛牛及羊毛覆之俗尚武無法令賦役其人多夀年至百五六十歲不事生産好為竊盜互相凌劫尤重復讎如未可得蓬頭垢面洗足蔬食要斬讐人而復故常男女並皆衣裘褐仍被大氊不知耕稼土無五榖氣候多風寒以犛牛馬騾羊豕為食五月草始生八月霜雪降求大麥于他界醖以為酒妻其庶母及伯叔母嫂子姪之婦淫穢蒸報諸夷中最為甚然不婚同姓老死者則仰天椎胸而悲哭焚之名為火葬無文字但俟草木以記歲時貞觀三年南會州都督鄭元璹遣招諭其長細部賴舉部內附亦自入朝列其地為軌州拜部賴為之刺史其後諸部相次內附列其地為崌奉巗逺四州各拜首領為刺史五年詔遣使開其河曲地為六十州內附者三十四萬口有羌豪拓拔赤詞者甚為渾主伏尤所昵與之結婚屢抗官軍後與其從子思頭並率衆與諸首領歸欵列其地為懿嵯麟可等三十二州以松州為都督府羈縻存撫之拜赤詞為西戎州都督賜姓李氏自是從阿首大積石山以來並為中國之境後吐蕃強盛拓拔氏漸為所逼遂請內徙始移之于慶州因置靜邊等州以處之故地陷于吐蕃其處者為其役屬吐蕃謂之彌事又有黑黨項在水之西李靖之西討也渾主乞伏奔之處以空間之地及吐谷渾舉國內屬其黑黨項首領號敦善其年因貢方物其雪山黨項姓破丑氏居山之下貞觀初亦常朝貢又有白狗赤桑白蘭等諸羌自龍朔以後並為吐蕃所破而服屬焉其在西北邊者天授三年內附凡二十萬口分其地置朝吳浮歸等十州仍散居靈夏等界內自至德已後常為吐蕃所誘密以官告授之使為偵導故時或侵叛尋亦底寧至寶應初其首領來朝請助國供靈州軍糧優詔贊美其在涇隴州界者至後上元元年率其衆十餘萬詣鳳翔節度使崔光逺請降寶慶元年十二月其歸順州部落乾封州部落歸義州部落順化州部落和寧州部落和義州部落寶善州部落寧定州部落羅雲州部落朝鳳州部落並詣山南西道都防禦使梁州刺史臧希讓請册印讓以聞詔從之貞元三年十二月初禁商賈以口馬器械于黨項部落貨易十二年二月六州黨項自石州奔過河西黨項有大府部落曰野利越詩龍兒野利厥律兒黃野海野窣等居慶州者號為東山部落居夏州者號為平夏部落永泰大厯以後居石州依水草至永安城鎮將阿使那思暕擾其部落求取駝馬無厭中使又贊成其事黨項不堪其弊遂率部落奔過河元和元年七月宰相杜佑上疏曰伏見近者黨項與西戎潛通屢有降人指陳事迹而公卿廷議以為宜當謹兵備戒侵軼益發申卒邀其冦暴此蓋未達事機匹夫之常論耳夫蠻戎為患自古有之周宣以獫狁為害但命南仲往城朔方驅之太原及是而止誠不欲弊中國怒逺人也秦平六國恃其兵力北築長城以拒胸奴西逐諸羌出于塞外勞力擾人結怨階亂中國未靜賊徒競起海內雲擾實生謫戍漢武因文景之富命將興師遂至户口減半竟下哀痛之詔罷役輪臺前史書之為嘉其迷而能復蓋聖王之理天下也惟務綏靜蒸人西至流沙東漸于海在南與北示存聲教不以逺物為珍重求遐方入貢蓋疲內而事外終得少而失多故前代納忠之臣並有諌君之議淮南王請息師于閩越賈捐之願棄地于珠崖安危利害髙懸前史昔馮奉世矯漢帝之詔擊莎車傳其王首于京師威振西域宣帝大悅議加爵土之賞蕭望之獨以為矯制違命雖有功效不可為法恐後之奉使者爭遂發兵為國家生事述理明白其言遂行國家自天后以來突厥默啜兵強氣勇屢冦邊城為害頗甚開元初邊將郝靈筌親捕斬之傳首闕下自以為功伐莫二坐自望寵爵宋璟為相慮武臣邀功為國生事止授以郎將由是訖開元間無人復議開邊中國遂寧外藩亦靜此皆成敗可徴鑒誡非逺其黨項小蕃雖處中國本懷我德當示撫綏間者邊將非亷亟有侵刻或利其羊馬或取其子女使竭其方物徴為役徒怨苦既多叛亡遂起或與北蕃通使或與西戎冦連有為使然固當懲革傳曰逺人不服則修文德以來之管子曰國家無使勇猛為邊境此誠聖哲識微知著之逺略也今戎醜方強邊備未實誠慎擇良將誡之完輯使知誠信絶其求取用示懷柔來則懲禦去則謹偹自然彼懷我德革其姦謀何必遽圗興師坐致勞費陛下上聖至仁覆育羣類動必師古謀無不臧伏望堅保永圗置之袵席實天下幸甚上深嘉納之九年五月復置宥州以護黨項十五年七月鹽州送劫烏自池鹽女子拓拔三娘並婢二人召入內詰之赦罪送本州其年十一月命太子中允李寮為宣撫黨項使以部落繁富至今逺近商賈賫雜繒諸貨入其部落貨其牛馬至太和開成之際其蕃鎮統領無緒恣其貪婪不顧危亡或強市其羊馬者不時償其直以是部落苦之遂相率為盜靈鹽之路小梗會昌初上頻命使安撫之兼命憲臣為使分三印以統之在邠寧鄜延者以侍御史內供奉崔彥曾統之唐會要卷九十八
