body:
  text: 唐會要卷七十宋王溥撰量戶口定州縣等第例武德令三萬戶以上為上州永徽令二萬戶以上為上州至顯慶元年九月十二日敕戶滿三萬以上為上州二萬以上為中州先已定為中州下州者仍舊至開元十八年三月十七日敕太平時久户口日殷宜以四萬戶以上為上州二萬五千户為中州不滿二萬户為下州其六雄十望州三輔等及别敕同上州都督及畿內州並同上州緣邊州三萬戶以上為上州二萬戶以上為中州其親王任中州下州刺史者亦為上州王去任後仍舊武德令户五千以上為上縣二千戶以上為中縣一千户以上為中下縣至開元十八年三月七日以六千户以上為上縣三千户以上為中縣不滿三千户為中下縣其赤畿望緊等縣不限戶數並為上縣去京五百里內并緣邊州縣户五千以上亦為上縣二千以上為中縣一千以上為下縣州縣分望道貞觀元年三月十日併省州縣始因關河近便分為十道一曰關內古雍州之地二曰河南道古兖豫青徐四州之地三曰河東道古兾州之地四曰河北道古幽兾二州之地五曰山南道古荆梁二州之地六曰隴右道古雍梁二州之地七曰淮南道古掦州之地八曰江南道古揚州之地九曰劍南道古梁州之境十曰嶺南道古揚州之境凡天下三百六十州自後并省迄於天寶凡三百三十一州存焉凡羇縻之州八百京兆府尹有三京兆河南太原大都督有五潞揚益荆幽都護府有六單于安西安北為大都護安南安東北庭為大都護又有上中下都督府凡天下軍有四十府有六百三十四鎮有四百五十戍五百九十守捉有三十五景雲二年五月出使者以山南控帶江山疆界濶遠於是分為山南東西兩道又自黃河以西分為河西道關內道新升都督府鹽州永泰元年十一月升新升雄州寧州至德元年十月二十九日升原州乾元三年正月十一日升新升望州寧州原州並會昌四年四月十日升新上州會州永泰元年十一月升丹州大厯六年五月升宥州元和九年五月復置夏州新升赤縣京兆府雲陽縣元和二年十月升以崇陵故也奉先縣開元十七年十一月十日升以奉陵寢以張願為縣令醴泉縣廣德元年五月一日升以崔演為縣令富平縣貞元四年正月十六日升以薛兟為縣令三原縣同上年月升以王鄫為縣令咸陽縣天授二年四月二十一日以管武氏陵升以宇文意為縣令神龍元年十月二十九日復為畿奉天縣興元元年正月一日升以杜元為縣令新升次赤縣華州鄭縣光化元年六月升至天祐四年閏十一月復為一縣華州鄭縣華隂下邽三縣開元四年二月二十六日升同州馮翊朝邑蒲城澄城白水等縣開元四年二月二十六日升岐州雍縣扶風陳倉三縣同上年月日升靈州回樂縣至德元年七月十二日升寧州安定縣至德元年十二月九日升邠州新平縣正元十年十二月升新升緊縣靈州懷遠縣至德元年十月三日升寧州彭原縣至德元年二月九日升鄜州洛交縣正元六年三月三十日升新升上縣靈州靈武𢎞靜溫池鳴沙等縣至德元年七月十三日升原州平高縣乾元三年正月十一日升夏州朔方縣貞元四年十二月二十八日升鹽州五原白池縣永泰二年十月升丹州汾川縣大厯六年五月升延州膚施門山縣同上年月日升河南道新升都督府登州大厯九年五月升新升雄州汝州會昌四年四月升虢州同上年月日升新升望州青州大厯九年五月升新升緊州鄆州徐州並會昌四年五月升蔡州元和十四年四月重定淮西州縣及官吏祿俸以蔡州為緊其刺史俸錢一百八十千長史以下有差新升上州縣海州密州貞元五年八月六日升泗州貞元二十年正月內升宿州元和四年正月以徐泗符離蘄虹三縣置亳州元和三年九月升潁州會昌二年十一月升唐州貞元十五年四月升新升赤縣河南府緱氏縣天祐二年四月四日升以奉昭宗和陵故也新升望縣虢州閿鄉汴州浚儀尉氏開封等縣並開元四年二月二十六日定雍邱縣開元十二年九月八日升滑州酸棗縣開元四年二月二十五日定白馬縣大厯五年三月升許州扶溝縣開元四年二月二十六日定鄭州管城陽武新鄭滎澤等縣並開元四年二月二十六日升宋州宋城縣開元四年二月二十六日升襄邑縣會昌四年十一月升陜州陜縣桃林河北芮城等縣開元四年二月二十六日升兖州金鄉縣開元四年二月二十六日升汝州梁縣開元十二年七月八日升仙州襄城縣同上年月日升蔡州汝安縣貞元七年正月二十二日升徐州彭城縣貞元六年十月升鄲州須昌巨野縣等貞元二年二月一日升青州益都縣大厯五年正月升新升緊縣虢州𢎞農縣乾元三年二月一日升鄆州鄆城東阿壽張盧縣貞元二年二月一日升兖州曲阜縣會昌二年二月升宿州符離縣會昌四年十二月升宋州括城縣同上年月日升潁州汝隂縣同上年月日升青州臨淄壽光縣大厯五年正月升新升上縣虢州盧氏朱陽玉城縣乾元三年四月十四日升汝州臨汝縣正元八年二月二十六日升蔡州遂平縣元和十二年四月內置潁州潁上縣元和六年九月升唐州方城縣貞元十五年四月升陜州垣縣太和三年十一月升河東道新升次赤縣河中府河東河西縣乾元三年三月改新升望縣蒲州河東安邑桑泉汾隂虞鄉縣等並開元四年二月二十六日升猗氏解縣開元十二年二月二十六日升絳州正平翼平龍門聞夏縣開元同上年月日升汾水孝義隰城介休平遙等縣同上年月日升洪洞縣等同上年月日升并州太原晉陽祁縣等縣同上年月日升潞州上黨縣同上年月日升河北道新升望州貝州大厯七年正月升新升上州媯州貞元七年五月七日升定州元和四年六月改涿州大厯五年十一月升新升望縣瀛州河間縣開元四年二