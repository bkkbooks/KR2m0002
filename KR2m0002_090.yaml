body:
  text: 唐會要卷九十宋王溥撰閉糴開元二年閏二月十八日敕年歲不稔有無須通所在州縣不得閉糴各令當處長吏檢校上元元年九月敕先緣諸道閉糴頻有處分如聞所在米粟尚未流通宜令諸節度觀察使各將管內捉搦不得輒令閉糴大厯十一年六月十三日敕自今已後所在一切不得閉糴及隔絶榷稅貞元九年正月詔諸州府不得輒有閉糴太和三年九月敕河南河北諸道頻年水患重以兵役農耕多廢粒食未豐比令使臣分路賑恤兾其有濟得接秋成今諸道穀尚未減賤而徐泗管內又遭水潦如聞江淮諸郡所在豐稔榖因甚賤以致傷農州縣長吏茍思自便潛設條約不令出界雖無明榜以避詔條但商旅不通米價異致今水旱之處種植兼資宜令御史臺揀擇御史一人于河南巡察使每道每州界首物價不等米商不行即是潛有約勒不必更待文榜為驗便具事狀及本界刺史縣令觀察判官名銜聞奏河南通商之後淮南諸郡米價漸起輾轉連接之處直至江西湖南荆襄以來並須約勒依此舉勘聞奏仍各委觀察使審詳前後敕降與御史相知切加訪察不得容蔽咸通七年十月二十三日御史臺奏今後如有所在聞閉糴者長吏必加貶降及判官録事參軍並停見任書下考仍令州縣各以版榜寫録此條懸知百姓每道委觀察判官每州委録事參軍勾當逐月具不閉糴事由申臺從之和糴證聖元年三月二十一日敕州縣軍司府官等不得輒取和糶物亦不得遣人替名代取興元元年閏十月詔江淮之間連歲豐稔迫于供賦頗亦傷農收其有餘濟彼不足宜令度支于淮南浙東西道加價和糴三五十萬石差官般運于諸處減價出糶貴從權便以利于人貞元二年九月度支奏京兆河南河中同華陕虢晉絳鄜坊丹延等州府夏秋糧稅青苗等錢物悉折糴麥所在儲積以偹軍食京兆府兼給錢收糴每計于時估外更加錢納于太倉詔可之其年十一月度支給添成四千萬貫令京兆府今年內收糴粟麥五十萬石以偹軍食詔從之四年八月詔京兆府于時價外加估和糴差清強官先給價直然後貯納續令所司自般運載太倉并差御史分路訪察有違敕文令長以下當重科貶先是京畿和糴多被折配或物估輕于時價或先輸而後給直追集停擁百姓苦之及聞是詔莫不歡忭樂輸焉元和七年七月户部侍郎判度支盧坦奏今冬諸州和糴貯粟澤潞四十萬石鄭滑易定各一十五萬石夏州八萬石河陽一十萬石太原二十萬石以今秋豐稔必資畜偹其澤潞易定鄭滑請委本道差判官和糴各于時價每斗加十文所兾人知勸農國有常偹從之長慶元年二月敕春農方興種殖是切其京兆京西糴使宜勒停先是度支以邊儲無偹請置和糴使經年無效徒擾邊人故罷之四年八月詔于關內及關外折糴和糴一百五十萬石用偹飢歉其和糴價以户部錢充收貯尋常不得支用寶厯元年八月敕以兩京河西大稔委度支和糴二百萬斛以偹災沴大中六年五月敕自收關隴便討黨項邊上生人皆失活業連屬艱食遂不寧居兼軍儲未得豐殷切在多方贍助今年京畿及西北邊稍似時熟即京畿人家竟搬運斛斗入城收為蓄積致使邊塞粟麥依前踊貴兼聞省司和糴亦頗艱難其弊至深須有釐革其京西北今年夏秋斛斗一切禁斷不得令入京畿之界其年六月敕近斷京北夏秋斛斗入京如聞百姓多端以麥造麵入城貨易所費亦多切宜所在嚴加覺察不得容許食實封數舊例凡有功之臣賜實封者皆以課户先凖户數州縣與國官邑官執帳供其租調各凖配租調逺近州縣官司收其腳直然後國邑官司其數凖此入國邑者收其庸安國相王太平公主各一萬户神龍元年十一月六日敕安樂公主四千户長寧公主三千五百户神龍元年十二月二日敕衛王溫王各二千五百户同上月敕寧王憲薛王業慶王潭忠王亨棣王洽鄂王清各二千户開元二十一年四月一日敕榮王琬已下各三千户開元二十三年七月二十三日敕楚王豫一千户至德二年十二月十五日敕雍王適二千户寶應二年七月十一日敕郭子儀二千户大厯十四年閏五月十五日敕渾瑊一千八百户檢年月未獲裴寂一千五百户貞觀二十三年九月八日敕荆王元二千五百户武德九年十月八日敕武三思一千五百户神龍元年正月五日敕李光弼一千五百户寶德二年七月十一日敕僕固懷恩一千五百户同上月日敕長孫無忌王君廓尉遲敬德房玄齡杜如晦並武德九年十月八日敕至永嶶元年十一月二十八日詔房玄齡所封不須依例減降新都宜城定安公主各一千三百户並神龍元年十月一日敕長孫順德柴紹羅藝趙郡王孝恭各一千二百户同上月日敕王武俊一千二百户撿敕未獲劉𢎞基一千一百户顯慶元年敕李績一千一百户總章元年十二月敕韓遊瓌一千一百户檢敕未獲侯君集張公謹劉師立各一千户武德九年十月八日敕武士彠一千户顯慶四年七月敕武攸暨一千户神龍元年正月十八日敕宣城公主一千户神龍元年十二月二日敕薛崇簡一千户唐隆元年六月二十五日敕邠王守禮一千户唐隆元年七月四日敕永穆公主一千户開元十年敕樂安王瑗開元二十四年七月十四日敕髙都公主已上各一千户開元二十五年四月二十七日敕魚朝恩一千户大厯五年三月敕田承嗣一千户大厯八年二月三日敕髙士亷九百户假志玄九百户貞觀元年敕魏徴九百户貞觀十七年正月敕李晟李元諫各九百户檢敕未獲李湛八百户神龍元年正月十八日敕李輔國八百户寶應元年三月三日敕宇文士及秦叔寶程知節各百户武德九年十月八日敕李多祚敬暉桓彥範張東之崔元暐並七百户神龍元年十二月二日敕薑皎七百户先天二年七月十八日敕劉幽求七百户先天二年八月十一日敕馬燧七百户唐朝臣五百五十户檢敕未獲安興貴安修仁唐儉竇軌屈突通蕭瑀封德彞劉義節各六百户武德九年十月八日敕溫嘉順六百户檢敕未獲魏元忠五百五十户神龍元年十二月二日敕李靖五百户貞觀四年八月敕永徽二年十月九日詔李靖所食封不須減假秀實五百户李抱真五百户興元元年二月敕陳仙竒五百户貞元二年四月敕以殺李希烈功也李訴五百户元和十二年十一月敕劉悟五百户元和十四年二月敕以殺李師道功也田𢎞正三百户張子良田少卿李奉仙各一百五十户元和二年十一月敕以檎李錡功也史奉敬五十户長慶元年二月敕以破吐蕃功也緣封雜記貞觀二十三年九月八日敕諸王並宜食一千户封霍王元軌使國令徵封令請依諸國賦物貿易取利元軌曰汝為國令當正吾失反説吾以利耶神龍二年四月十四日制功臣段志玄屈突通蕭瑀李靖秦叔寶長孫順德劉𢎞基宇文士及錢九隴程知節龎卿博惲竇琮苑君璋李子和張平髙張公謹梁恪仁安修奏行師獨孤卿雲蘇定方李安逺鄭仁泰杜君綽李孟嘗等二十五家所食實封並依封給其年十一月一日敕皇太子在藩府日所食衛府封物每年便納東宫給事中盧燦駁奏曰伏以皇太子處繼明之重當主鬯之尊嵗時限用自可有司供擬又據周禮諸司應財器嵗終則會凖王及太子不會此則儲蓄之費咸與王同今與列國諸侯齊衡入封豈所謂憲章古昔垂法將來者也上納其言十一月五日敕停景龍二年九月敕諸色應食實封一定已後不得輒有移改三年敕應食封邑者一百四十餘家應出封户凡五十四州皆天下膏腴物産其安樂太平公主封又取富户不在蠲免限百姓著封户者甚于征行十一月監察御史宋務光上疏曰臣聞分圭裂土各有方位通邑大都不以封錫前猷未逺古義亦深自頃命侯莫居磽瘠專擇雄奧徐州貢土方色已乖寢邱辭封讓德不嗣且滑州者國之近甸密邇帝畿地出縑稅人多趨附所以列縣惟七分封有五王賦少于侯租入家倍于輸國求諸既往實所未聞每科封丁有甚征戎因而失業莫返其居此土風逃者舊少頃日波散良緣封多伏願稍減封户散配餘州下息疲氓上尊古制則公侯不失于采地流蕩得還于故鄉諸州封户亦望凖此又徴封使者往來相繼既勞傳驛甚擾公私請附租庸每年送納望停封使以靜下人仍編入新格庶為永例又聞五等崇榮百王盛典自非若邢茅近屬寇鄧鴻勳無以誓彼山河酬其爵土近者封建頗緣恩澤功非橫草人已分茅遂使奧壤名區多入侯國邑收家稅半于天府經費不足蓋亦有由竊見武德之初建侯故事于時天寶新定王業創開佐命如雲謀臣如雨然而封者不過十數人今禮樂承平邦家綏定世家賢舊之裔無野戰攻城之勤至于命封不合全廣論功謝于前葉食邑踰於往時既減邊儲實虧國用伏惟酌宗周之前訓咨武德之舊章地匪宗盟勳殊社稷不宜加于食邑自可寵以虛名如此則庶績其凝彛倫攸敘臣忝當亷問偹採風謡見此不安豈敢自默知必被封家所疾顧嘗以報國為心乞擇愚言訪諸朝宰秋毫有益夕死無恨兵部尚書韋嗣立上疏曰臣竊見食封之家其數甚衆昨聞户部云用六十餘萬丁一丁兩支計一百二十萬匹已上臣頃在太府知每年庸調絹數多不過百萬少則七八十萬以外比諸封家所入全少臣聞自古封茅土裂山河皆須業著經綸功申草昧然後配宗廟之享承帶礪之恩往者皇運之初功臣共定天下當時食封才祗三二十家今以恩澤受封至百十四家已上國家租賦大半私門私門資用有餘國家支計不足有餘則或是官典或是奴僕多挾勢騁威凌突州縣凡是封户不勝侵漁若户必限丁物送太府封家但于左藏請受不得輒自徴催則必免侵漁人兾蘇息唐隆元年六月十三日敕安國相王鎮國太平公主宜各食一州全封其州公主自簡太極元年正月制皇太子妃王氏預聞祕策潛圖義舉父仁皎食實封三百户開元三年五月敕封家總合送入京其中有别敕許人就領者待州徴足然後一時分付徴未足者封家人不得輒領出封州亦不得因有舉放違者禁身聞奏四年三月十八日宰臣奏對諸國請自始封至曽孫者其封户三分減一制可也十年十一月敕中書門下宜共食實封三百户自我禮賢為百代法其年加永穆公主封一千户初永穆等各分五百户左右以為太薄上曰百姓租賦者非吾有也斯乃宗廟社稷蒼生是為爾邊隅戰士出萬死不顧一生所賞賜才不過一二十匹此輩何功于人頓食厚封約之使知儉嗇不亦可乎左右以長公主皆二千户請與比上曰吾嘗讀後漢書見明帝曰朕子不敢望先帝子車服皆下之吾未嘗不廢卷歎息汝奈何欲令此輩望長公主乎左右不敢復言至是公主等車服始不給故加焉令自後公主皆封一千户遂成常例至乾元元年三月一日諸公主宜各給五百户郡主縣主據元賜户數三分各給二分並以宣越明衢婺等州給之其年五月十日敕諸食實封並以給戶為限不須一分入官其物仍令出封州隨庸調送入京其腳以租腳錢充並于太府寺納然後凖給封家其年九月十二日敕親王公主等封物宜隨官庸調隨駕所在送至京都賜坊令封家就坊請受餘食封家不在此限仍令御史一人及太府寺官檢校分付使給了牒二十二年九月敕諸王公以下食封薨子孫應承襲者除表後十分減二仍具所食户數奏聞無後者百日後除諸名山大川及畿內縣並不封天寶六載三月六日户部奏諸道請食封人凖長行二日三百户以下户部給符就郡請受三百户已上附庸使送兩京太府寺賜坊給付者今緣就州請受有損于人今三百户以下尚許彼請公私之間未免侵擾望一切送至兩京就此給付即公私省便侵擾無由矣又凖户部式節文諸食實封人身沒已後所得封物隨其男數為分承嫡者加一分至玄孫即不在分限其封總入承嫡房一依上為分者有如此則玄孫諸物比于嫡男計數之問多支數倍舉輕明重理實未通望請至玄孫已下凖玄孫直下一房許依令式餘並請停唯享祭一分百代不易自然爭競永息勳庸無替永泰二年正月十六日敕自今已後子孫襲實封宜減半永為恆式至三月十八日敕應請封家三分給二分待兵策稍寧即當全給大厯十一年九月二十四日敕諸公主封物公主薨後三年不須停興元元年正月敕諸軍諸道諸使應付奉天及進收京城將士等或百年摧敵或萬里勤王扞固金城驅除大憝濟危難者其節著復社稷者其業榮我圖有功特加彛典錫名疇賦永代無窮宜並賜名奉天定難功臣其有食實封者子孫相繼代代不絶貞元二年五月故尚父汾陽王子儀實封二千户宜凖式減半餘以分襲曖可襲代國公通前襲三百户晞可襲二百五十户曙可襲二百五十户映可襲二百二十五户七年三月户部奏伏以周漢故事有功即加地有罪即奪國既明賞罰方申沮勸其犯除名以上罪有實封凖法合除比來因循兼不申降自今以後應實封人或人緣罪犯其堂省及本軍本使本貫奏狀請令並標食封户數本配州名同奏敕下户部以為憑據其犯徒罪三分望奪一分流罪奪一半除名以上罪即凖法悉除並以本犯條論不在減贖之限其奉特敕貶謫稔制詞內所犯無正條者伏請凖流罪奪一半敕旨依奏其年十一月敕諸公至每年各給封物七百端匹皆依舊例春秋兩限支給諸郡主每季各賜錢一百貫文縣主每季賜錢七十貫文八年八月户部奏凖貞元七年三月二十日敕節文比來食實封人多不依令式皆身沒之後子孫自申請傳襲伏請自今以後并今日以前應食實封人并一年內凖式具合襲子孫官品年名并母氏嫡庶于本貫陳牒如無本貫即于食封人本任本使申牒如合襲人有罪疾及身死者亦限一周年內申牒請立以次合襲人仍具家口陳牒請附籍帳本貫勘責當家及近親如實是嫡長即與責保準式附貫然後申省到後即取文武職事三品正員一人充保敕旨宜依二十一年七月六日敕應食實封其節度使宜令百户給八百端匹若是絹兼給綿六百兩伏以實封本因賞功封之多少視功之厚薄不以官位散要别置等差其節度使兼宰相凖貞元二十年以前舊例處分從之元和四年六月户部侍郎判度支李夷簡奏應給食實封官自貞元十三年以後節度使宰相每百户給八百端匹若是絹更給綿六百兩節度使下兼宰相每百户給四百匹軍使及金吾諸衛將軍大將軍每百户給二百五十端匹內外官祿武德元年十二月隨制文武官給祿正一品七百石從一品六百石正二品五百石從二品四百六十石正三品四百石從三品三百六十石正四品三百石從四品二百六十石正五品二百石從五品一百十石正六品一百石從六品九十石正七品八十石從七品七十石正八品六十石從八品五十石正九品四十石從九品三十石並每年給貞觀二年二月二十日詔官人得上考給一季祿至三年正月十一日官得上下其年六月詔官人出使皆廩其妻子至十二月詔外官新任多有匱乏凖品計日給糧八年中書舍人髙季輔上表曰仕以應務亦以代耕外官卑品猶未得祿既離鄉井理必貧匱但妻子之戀賢逹其猶纍懷飢寒之切夷惠罕全其行為政之道期于易從若不恤其匱乏唯欲利其清儉凡在末品中庸者多正恐巡察歲出輶軒繼軌不能肅其侵漁何以求其政術今户口漸殷廪倉已具斟量給祿使得養親然後督以嚴科責其報效則庶官畢力物議斯允永徽元年八月詔文武五品以上解官充待者宜凖致仕人例給半祿光宅元年十月二十日敕諸內外官祿料賜會二事已上皆據上日給新授官未上所司及承敕使差充使者祿料并考第一事已上並不在與限如别敕應差使者京官以敕出日外官以敕符到日為上日若新授外仍直諸司者上日同京官即舊人應替先别敕定名充使未廽兩應給而無正課料者以當處官料充職申據新人上日為斷不給别舊人因使應别給者經一季雖未了不在給限其制敕授官雖敕符先到未上者舊人無犯不在停限天寶二年十一月十六日敕京官兼太守等官俸料兩給者宜停其外官太守兼京官除凖式親王帶京官外任官副大將軍副使知軍及正事京官兼內外官知政事據文各兼給考餘並從一處給任遂穩便十四年八月敕在京文武九品已上正員官既親于職務可謂勤上自今以後每月給俸食雜用關防奴僕等宜十分為率加二分其官加一分仍永為常式至德二年四月敕天下郡府及縣官祿侍直品子等衛從今年正月一日已後並量給一半事平之後當續支還貞元七年十二月敕郡主壻授檢校四品京官户部每月給料錢三十貫文度支給祿粟一百二十石縣主壻檢校五品京官户部每月給料錢一十貫文度支給祿米一百石大中三年九月敕秦州刺史祿粟每月給五十一石原州威州刺史祿粟每月各給四十一石唐會要卷九十
