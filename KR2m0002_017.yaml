body:
  text: 唐㑹要卷十七宋王溥撰祭器議永徽二年禮部尚書許敬宗議籩豆之數曰謹按光祿式祭天地日月嶽鎮海瀆先蠶籩豆各四宗廟籩豆各十二社稷先農等籩豆各九風師雨師等籩豆各二尋此式文事實乖戾社稷多於天地似不貴多風雨少於日月又不貴少且先農先蠶俱為中祀或四或六理不可通謹按禮記郊特牲云籩豆之薦水土之品不敢用䙝味而貴多品所以交於神明之義也此即祭祀籩豆以多為貴宗廟之數不可踰郊今請大祀同為十二中祀同為十小祀同為八釋奠凖中祀自餘從祀並請依舊詔從之開元二十三年正月十八日赦文宗廟致享務在豐潔禮經沿革必本人情籩豆之薦或未能備物宜令禮官學士詳議具奏太常卿韋縚請宗廟之奠每座各加十二又酒爵制度全無一合執持甚難請稍令寬大仍望付尚書省集衆官詳議兵部侍郎張均及職方郎中韋述等議曰謹按祭統曰凡天之所生地之所長茍可薦者莫不咸在聖人知孝子之情深而物類之無限故為之節制使有常禮物有其品器有其常數上自天子下至公卿貴賤差降無相踰越百代常行無易之道也左𫝊曰饗以訓恭儉宴以示慈惠恭儉以行禮慈惠以布政享之與宴猶莫異文祭奠所陳固不同矣今欲取甘㫖之物肥濃之味隨所有者充祭用茍踰舊制其何限焉雖籩豆有加豈能備也𫝊曰大羮不致粢盛不鑿昭其儉也若以今之珍饌平生所習求神無方何必師古自漢以降諸陵皆有寢宫嵗時朔望薦以常饌此既常行亦足盡至孝之情矣宗廟正禮宜依典故率意變革人情所難又按舊制一升曰爵五升曰散禮器稱宗廟之祭貴者獻以爵賤者獻以散此明貴小賤大示之節儉豈可舍先王之道以狥一時之所尚廢棄禮經以從流俗裂冠毁冕將安用之且君子愛人以禮不求茍合况在宗廟敢忘舊章請依古制庶可經久太子賓客崔沔議曰竊聞識禮樂之情者能作知禮樂之文者能述述作之義聖賢所重古今所崇變而通之所以久也所謂變者變其文也所謂通者通其情也祭祀之典肇於太古人所飲食必先嚴獻未有火化茹毛飲血則有毛血之薦未有麴糵汙尊抔飲則有𤣥酒之奠施及後王禮物漸備作為酒醴用其犧牲以致馨香以極豐潔故有三牲八簋之盛五齍九獻之殷然以神道至𤣥可存而不可測也祭禮之敬可備而不可廢也是以毛血腥爓𤣥樽犧象靡不畢登于明薦矣然而薦貴於新味不尚䙝雖則備物猶存節制故禮云天之所生地之所長茍可薦者莫不咸在備物之情也夫曰三牲之俎八簋之實美物備矣昆蟲之異草木之實隂陽之物備矣此節制之文也鉶俎籩豆簠簋樽罍實皆周人之時饌也其用通於燕享賔客而周公制禮咸與毛血𤣥酒同薦於先晉中郎盧諶近古之知禮者著家祭禮皆晉時常食不復純用舊文然則當時飲食不可闕于祭祀明矣是變禮文而通其情也我國家由禮立訓因時制範考圖史於前典稽周漢之舊義清廟時享禮饌畢陳用周制也而古式存焉園寢上食時饌具設遵漢法也而珍味極焉職貢來祭致逺物也有新必薦順時令也苑囿之內躬稼所收搜狩之時親發所中割鮮擇美薦而后食盡誠敬也若此至矣復何加焉但當申敕祭神如在無或簡怠增朂䖍誠其盡貢珍羞或及時鮮美考諸祀典有所漏略皆詳擇名目編諸甲令因宜而薦以類相從則新鮮肥濃盡在是矣不必加於籩豆之數也至於祭器隨物所宜故太羮古食也盛于登登古器也若夫和羹則時饌也盛於鉶鉶時器也亦有古饌而盛於時器故毛血盛於盤𤣥酒盛於樽未有薦時饌而追用古器者由古質而今文便于事也雖加籩豆十二未足以盡天下美物而措諸清廟有加倍之名近於侈矣又據漢書藝文志墨家之流出於清廟是以貴儉由此觀之清廟之不尚於奢舊矣太常所請恐未可行又稱酒爵全小須加廣大竊據禮文有以小為貴者貢獻以爵貴其小也若大而踰制敬而非禮是有司之失其𫝊也固可隨失釐正無待議而后革未知今制何所依凖請兼詳今式據文而行禮部員外郎楊仲昌議曰鄭𤣥云生人尚䙝食鬼神則不然春秋曰蘋蘩薀藻之菜潢汙行潦之水可薦于鬼神又曰大羮不致粢盛不鑿此明君人者有國奉先敬神嚴享豈肥濃以為尚將儉約以垂則陸海之物鮮肥之類既乖禮文之情而變作者之法皆充祭用非所宜也易曰樽酒簋二納約自牖此明祭尚簡易不在繁奢所以一樽之酒二簋之奠為明祀也薦肥濃則䙝味有登加籩爵則事非師古與其别行新制寧如僅守舊章又漢家園陵八節上食自茲以降代行其典貞觀之後禮法刋定今陵寢見有八節之奠兼朔望常食聖心追逺每物加薦不敢黷於宗廟請施行之於園陵愚忝典司顧非知禮布之執事惟裁擇焉户部郎中楊伯成左衛兵曹參軍劉秩皆建議以為請依舊禮故宰臣具沔述等議以奏上曰享祀粢盛實思豐潔不應法制者亦不可用于是更令太常量加品味韋縚又請每室加籩豆各六每四時異品以時新果及珍羞同薦制可之又酌獻酒爵上令用藥汁一升合於古義而多少適中自是常依行焉大厯元年七月五日敕南郊太廟祭器令所司造兩副供用一副貯庫諸壇廟祭器更别造一副諸雜用者亦宜别造不得效廟及諸壇祭器廟災變開元五年正月二日太廟四室崩上素服避正殿迎神主于太極殿初將幸東都而太廟崩召宰臣宋璟蘇頲問其故對曰今三年之制未畢不可巡幸凡災變之發皆所以明教陛下宜增崇大道以答天意且停幸東都上又召姚崇對曰太廟殿本是苻堅時所造隋文帝創立新都移宇文廟故殿改造此廟嵗月滋深朽蠧而毁山有朽壤尚不免摧木朽而崩偶與行期相㑹不為緣行乃崩且天子以四海為家陛下為關中不熟所以為人行幸上曰卿言正合朕意遂幸東都右散騎常侍禇無量請修德諫曰臣聞尚書洪範傳曰王者隂盛陽微則先祖見其變昔成湯遇旱引事自責云女謁盛耶今太廟毁壞即是先祖見變後宫之中非所幸者親享之後量宜减損以應其變又竊聞左右近臣妄奏云國家太廟其材木本是苻堅時舊殿隋文帝創立新都移宇文廟故殿改造此廟臣按地志隋文帝開皇初創置長安城即造此廟元非苻堅宇文氏所作况我國家及隋文帝貴為天子富有四海豈復遞取苻堅之舊殿以充太廟者乎此則言僞而辨殊不足採納伏願精選舉用賢良節奢靡輕賦稅緒絶代慎刑罰納諫諍察諂諛夫如是則人和人和則氣和氣和則天地和矣人天和㑹災異自銷伏願䖍奉神心克謹天誡十月七日伊闕縣人孫平子上封事曰臣竊見今年正月太廟毁此乃躋聖賢之所致也臣按左𫝊云君薨卒哭而祔祔而作主特祀于主蒸嘗禘於廟今日有違於此也昔魯文公二年宗伯弗忌躋僖公於閔公上後致太室壞春秋異而書之今日有同彼也君子以弗忌為失禮又按五行志書僖公雖兄嘗為閔公臣臣居君上是為失禮遂致太室壞且兄臣於弟猶不可躋之弟上况弟臣於兄豈可躋弟於兄上邪昔莊公三十二年薨閔公二年吉禘自薨至禘向有二年春秋猶非之失禮况夏崩冬禘不亦太速乎且太廟中央曰太室尊髙象也魯自是陵夷將墮周公之祀臣據此斷之即太廟毁亦今日將欲陵夷之象墮先帝之祀也斯亦上天祐我唐國見災以陛下去年禘孝和於别室告祭於太廟未祭孝和先祭太上皇此乃與僖閔事同先臣後君也昔躋兄弟上今令弟先兄祭過有甚於古也昔登臣君上今亦如之事豈不同耶昔太室壞今太廟毁變豈不同邪若以兄弟同昭則不合出致别廟若以臣子一例則孝和合進為昭昔武氏篡國二十餘年孝和挺劍龍飛再興唐祚使正朔服色咸依貞觀故事此即有大功於天下也今禘於别室是廢先聖之訓棄中興之功下君上臣輕長重幼昔晉太康五年宣帝廟地陷梁折八年正月太廟殿陷改作殿宇更營新廟逺致名材雜以銅柱自八年九月造至十年四月乃成十一月又梁折毁壞由此言之天降災譴非枯朽也晉不知過天下分崩王室大亂特望天恩少垂詳察速召宰相已下謀議移孝和入廟何必苦違禮典以同魯晉詔下禮官議太常博士陳正節馮宗蘇等獻議曰王制天子七廟三昭三穆并太祖而七昭穆者父子之位則知七世之親無兄弟之義矣殷紀成湯至於帝乙父子兄弟十有二君其正代止六而已易乾鑿度曰殷之帝乙六代王也此則兄弟不數為代之明據也又殷人六廟親四并祖而六殷代兄弟四人相次為君若以為代便當上毁四室如此則無復祖禰之祭矣古之廟位自禰已上極於太祖雖數溢迭毁隨而上遷三昭三穆未嘗有闕也又禮太宗無子則立支子之為人後者為之子無兄弟相為後之文所以舍至親取逺屬蓋以兄弟一體無父子之道故父子曰繼兄弟曰及禮兄弟不相入廟者假如兄弟代立孫姪承統告享之日不得稱嗣子嗣孫則當上列亡伯考伯祖下繫亡姪子姪孫此乃成七廟之位號不成繼統之義焉斯又不可之甚也又殷十二代惟三祖三宗明兄弟相及自别立廟不必繼之七代後漢世祖列序七廟而惠帝不入其數豈非文帝之嫡兄乎及文武代立子孫克昌為漢之太宗晉景亦晉文之兄緣景帝絶嗣不列七廟之數何以知之據永熙元年告諡世祖稱景帝為從祖也若以晉武越次尊崇其父而致廟壞遂及亂亡何因漢氏遷出惠帝宗尊文帝而享世二十有四年四百三十殷廟何嘗見崩漢廟未始經折殷漢之盛委而不言魯晉之災引以為喻是以春秋書太室壞者乃垂明誡何必閔僖晉太廟所以毁折者天誅奢麗不以遷廟然天子七廟諸侯五廟辨貴賤之差也父子相繼一萬人之心也昭穆列序重繼統之義也今孝和皇帝若與聖真皇帝相亞在廟止成六世何以辨貴賤乎𦙍嗣不明何以示後代乎昭穆失序何以成繼統之義乎况國家逺遵殷之湯甲近法漢之成帝特以孝和實中興之明主開百代不毁之廟别立寢廟永以寧神嵗時蒸嘗與國終始有何不可乎平子云太廟崩緣躋聖賢所致引僖公薨遷居閔公之上稱為逆祀取類當今然孝和升新寢之後聖真皇帝方上祔髙宗斯則未嘗一日躋居孝和之上引茲為證豈非誣罔朝廷耶平子不識忌諱肆其狂瞽危言髙論謗訕朝廷引衰晉之朝比聖明之代言僞而辨禮所不容狀入久不决上令宰臣召平子與禮官對定可否博士固執前議平子口辨所引咸有經據獻等又不能屈之時蘇頲知政事以獻是從祖之兄頗黨之議竟不行平子上論不置遂以平子為亷州都城縣尉議者以平子之議是也至德三年十一月十五日新作九廟神主於長安殿安置上親享之先是京師宗廟被焚上在彭原嗣又陷沒於鳳翔先作神主及是迎享初肅宗將復宫闕遣左司郎中李巽先行告廟之禮工部尚書顔真卿謂禮儀使崔器曰春秋時新宫焚魯成公三日哭今太廟為盜焚毁宜築壇於野皇帝向東哭然後遣使事竟不行又曰告廟祝文稱嗣皇帝上皇在蜀稱嗣可乎遽奏改之中㫖嘆重宣勞焉先是御史大夫嚴郢為協律郎知東都太廟時安祿山陷東都郢潛奉九廟神主於私第至至德三年東都收復有司備法駕迎神主歸於太廟以功遷大理司直廣德初代宗自陜將還尚書右丞顔真卿請皇帝先謁五陵廟然後還宫宰相元載謂真卿曰用舍在相不言者何罪朝廷事豈禁公破除邪建中二年二月復肅宗神座於寢宫初寶應中西戎犯京師焚建陵之寢至是始創復焉元和十一年正月宗正寺奏建陵黃堂南面丹景門去年十一月被賊斫破門㦸四十七竿詔曰所由闕於周防敢爾侵犯各據事狀宜有科懲知山門押官决六十削一任官彍騎三衛並决四十陵令馬叙罰一季俸料陵丞李建罰一月俸宗正卿李上公罰一月俸大中五年十二月景陵有賊驚動斫損神門㦸架等至六年四月下詔曰景陵神門盜傷法物其賊既抵極法官吏等須有懲責宗正卿及陵令縣令已從别勑處分京兆尹邦畿不能肅清封部責帥之義其何以逃宜罰兩月俸料其日貶宗正卿李文舉為睦州刺史陵令姜閲為嶽州司馬奉先縣令裴讓為隨州司馬權知縣事主簿張行之為郡州司户陵丞李咸停見任仍殿三選所由節級科責光啓元年三月中書門下奏曰伏以前年冬月有震俄致巡幸主司宗祏迫以倉徨移蹕鳳翔未敢陳奏今將回鑾輅皆舉典章清廟再營孝思式備伏請降勑命委所司參詳典禮修奉詔從之修奉太廟使宰相鄭延昌奏太廟大殿十一室二十三間十一架功績至大兼宗廟制度有素難為損益今不審依元料修奉為復更有商量下禮官詳議太常博士殷盈孫議曰如依元料難以速成况帑藏方虛須資變禮竊以至德二年以新修太廟未成其新造神主權於長安殿安置便行享告之禮如同宗廟之儀以俟廟成方為迎祔今京城除充大內及正衙外别無殿宇伏聞先有詔㫖欲以少府監大㕔權充今廟其㕔五間伏緣十一室於五間之中陳設隘狹請更接續建成十一間以備十一室薦向之所其三太后即於監內取西南屋三間為三王室告享之所詔從之其年十二月僖宗再幸寶雞其太廟十一室并祧廟八室及孝明太皇太后等别廟三室神主緣室法物宗正寺官屬奉之隨駕至鄠縣為盜所劫三年二月車駕自興元還京以宫室未備權駐鳳翔太常禮院奏皇帝還宫先謁太廟今宗廟焚毁神主失墜請凖例修奉者禮官議曰按春秋新宫災三日哭𫝊曰新宫宣公廟也三日哭禮也按國史開元五年正月二十日太廟四室摧毁時神主皆存迎奉於太極殿安置𤣥宗素服避正殿寶應元年肅宗還京師以宗廟焚毁於光順門外設次向廟哭厯檢故事不見百官奉慰之儀然上既素服避殿百官奉慰亦合情理竊循故事比附參詳恐須宗正寺具宗廟災毁神主失墜事由申奏皇帝素服避殿受慰訖輟朝三日下詔委少府監擇日依禮改造列聖神主詔從之緣廟裁制上乾封元年六月二十三日詔朕每凖宗廟致敬䖍誠祼享而三年一奠情有未安思革舊章用崇嚴配自今已後宗廟薦享爵及簠簋登鉶各宜别奠其餘牢饌並依常典儀鳳二年二月二十九日太常以仲春告祥瑞於太廟上令禮官徴求故實太常博士賈大隱對曰古者祭以首時薦用仲月近代相承元日奏祥瑞二月然後告太廟蓋緣告必有薦便於禮也又檢貞觀已來敕令無文禮司因循不知所起上令依舊行焉開元十五年二月十五日敕享宗廟差左右丞相尚書嗣王郡王攝三公行事若人數不足通取諸司三品以上長官自餘祭享差諸司長官及五品已下清官至二十三年正月二十日自今已後有大祭宜差丞相特進少保少傅尚書賓客御史大夫攝行事至二十五年七月八日勑太廟每至五饗之日應攝三公令中書門下及丞相師傅尚書御史大夫嗣王郡王中揀擇德望髙者通攝餘司不在差限至二十七年二月七日制宗廟致敬必先於如在神人所依無取于非族其應太廟五享宜於宗子及嗣王郡王中揀擇有德望者令攝三公行事其異姓官更不須差攝二十一年二月十日勑太廟九室室長各三人于見任齊郎中揀擇有德行諳嫺儀注者送名禮部奏補仍給厨食滿十年與官至天寶十載正月十日赦文廟者貌也取象存焉是禮由情起因心則感太廟宜制內官以備嚴奉仍于廟外造一院安置庶申罔極之恩無忘事生之禮宜於舊中宗廟安置內官其室長停不須更補內官自肅宗尅復京城後遂廢至乾元元年四月二十八日宗正卿李遵奏每室凖格各置室長三人至十年並皆與官中間李彭奏停伏望凖格更置勑㫖依貞元元年四月十三日勑建中三年二月二十三日勑東都祠祭既停其郊社齊郎不合更置並停者其東都太廟齊郎室長請凖郊社例停廢二十四年七月二十九日敕宗廟祭享籩豆宜加麞鹿鶉兔野雞等料夏秋供臘春冬供鮮仍令所司祭前十日具數申省凖料令殿中省供送至天寶三載四月十六日詔祭神如在𫝊諸古訓以多為貴著在禮經膟膋之儀蓋昔賢之尚質甘㫖之品亦孝子之盡誠既切因心方資變禮其已後享太廟宜料外每室加常食一牙盤仍令所司務盡豐潔至十一載閏三月二十九日敕每月朔望日宜令尚食薦太廟每一室一牙盤內官薦享仍五日一開門灑掃至貞元十二年十月十三日敕太廟九室及昭德皇后廟每月朔望兩享祭食共一十臺盤先是尚食造供今月八日中書門下奉宣進止宜令宗正與太常計㑹各令所司辦集不須更待尚食供送天寶三載四月五日詔頃四時有事於太廟兩京同日告享雖卜吉辰俱遵上日而義深如在禮或有乖自今已後兩京宜各别擇吉日告享九載十一月敕自今已後每親告獻太清太微宫及太廟改為朝獻所由行事為薦獻巡陵為朝拜告宗廟與祭天地饗祀祝文改昭告為昭薦以為告者臨下之制故也貞元元年十一月有事于郊廟太常博士陸贄奏請凖禮用祝板祭畢焚之六年正月七日祭官有重服既葬公除及聞哀假滿者請許吉服赴宗廟之祭其同宫未葬雖公除者請依前禁之唐㑹要卷十七
