body:
  text: 唐會要卷八十五宋王溥撰團貌武德六年三月令以始生為黃四嵗為小十六嵗為中二十一為丁六十為老開耀二年十二月七日敕百姓年五十者皆免課役至神龍元年五月十八日制二十二成丁五十九免役因韋庶人所奏至景雲元年七月二十一日敕韋庶人所奏成丁入老宜停省司舉徴租調殿中侍御史楊瑒執之曰韋庶人臨朝當國制書非一或進退卿士或赦宥罪人何獨于已役中男重徴丁課恐非保人之術省司遂依瑒所執天寶三載十二月二十三日赦文比者成童之嵗即挂輕徭既冠之年便當正役憫其勞苦用軫于懷自今以後百姓冝以十八已上為中男二十三已上成丁至廣德元年七月十一日赦文天下男子冝二十五嵗成丁五十五入老九載十二月二十九日敕天下郡縣雖三年定户每年亦有團貌計其轉年合入中男成丁五十九任退團貌雜録武德九年十一月簡點使左僕射封德彛等以中男十八已上簡取入軍敕三四出給事中魏徴執奏報不可上怒乃召徴作色謂中男若實小自不點入軍若實大是其詐妄依式點入於理何嫌卿遂如此固執徴正色曰臣聞竭澤而漁非不得魚明年無魚矣焚林而畋非不獲獸明年無獸矣若次男以上並點入軍租賦雜徭將何取給且比來國家衛士不堪攻戰豈為其少但為禮遇失所遂使人無鬭心若多點取人遽充其數雖多終是無用若精簡壯健遇之以禮人百其勇何必在多陛下每云誠信待物欲使官人百姓並無矯詐之心今之共理所寄惟在縣令刺史年常團貌並悉委之至於簡點即疑詐偽望下誠信不亦難乎上曰初見君固執疑君蔽於此事今論國家不信乃是人情不通所今取中男宜停延載元年八月敕諸户口計年將入丁老疾應免課役及給侍者皆縣親貌形狀以為定簿一定以後不得更貌疑有姦濫者聼隨時貌定以付手實開元二十九年三月二十六日敕天下諸州每嵗一團貌既以轉年為定復有籍書可憑何至勞頓不從簡易於人非便事資釐革自今已後每年小團宜停待至三年定户日一時團貌仍令所司作條件處分天寶四載七月二十日敕今年諸郡因團貌宜便定户自今已後任依恆式應緣察問對衆取平準今載三月五日敕處分八年閠六月五日制其天下百姓丈夫七十五已上宜各給中男一人充侍仍任自簡擇至八十已上依常式處分定户等第武德六年三月令天下户量其資産定為三等至九年三月二十四日詔天下户三等未盡升降宜為九等永徽五年二月八日敕天下二年一定户萬嵗通天元年七月二十三日敕天下百姓父母另外繼別籍者所析之户等第並須與本户同不得降下其應入役者共計本户丁中用為等級不得以析户蠲免其差科各從析户祇承勿容遞相影護開元十八年十一月敕天下户等第未平升降須實比來富商大賈多與官吏往還遞相憑囑求居下等自今已後不得更然如有囑請者所由牧宰録名封進朕當處分京都委御史外州委本道如有隱弊不言隨事彈奏天寶四載三月敕朕聽政之餘精思治本意有所得庶益於人且十一而稅前王令典農商異宜舊制猶闕今欲審其户等拯貧乏之人賦彼商賈抑浮惰之業優劣之際有深察之明閭里之間無不均之歎頃以人不欲擾法貴從寬所以比來未全定户今已經數載産業或成適可因兹平于賦稅自今已後每至定户之時宜委縣令與村鄉對定審於衆議察以資財不得容有愛憎以為髙下徇其虛妄令不均平使每等之中皆稱允當仍委太守詳覆定後明立簿書每有差科先役髙等矜兹不足庶協彛倫廣德二年二月十一日赦文天下户口委刺史縣令據見在實户量貧富作等第差科不得依舊籍帳貞元四年正月赦文下兩稅更審定等第仍令三年一定以為常式元和六年正月衡州刺史吕溫奏當州舊額户一萬八千四百七除貧窮死絶老幼單獨不支濟等外堪差科户八千二百五十七臣到後團定户稅次檢清出所由隱藏不輸稅户一萬六千七伏緣聖恩録臣在道州微效擢授大郡令撫傷殘臣昨尋舊案詢閭里承前徴稅並無等第又二十餘年都不定户存亡孰察貧富不均臣不敢因循設法團定檢獲隱戶數約萬餘州縣雖不徴科所由已私自率斂與其潛資於姦吏豈若均助於疲人臣請作此方員以救凋瘵庶得下免偏枯上不闕供敕旨宜付所司元和十五年正月穆宗即位敕曰天下百姓自屬艱難棄於鄉井户部版籍虛繫姓名建中元年以來改軍舊制悉歸兩稅法久即弊姦濫益生自今已後宜準例三年一定兩稅無論土著客居但據資産差率户口使開元十二年八月宇文融除御史中丞充諸色安輯户口使天寶四年二月户部郎中王鉷加勾當户口色役使籍帳舊制凡丁新附於籍帳者春附則課役並徴夏附則免課從役秋冬附則課役俱免其詐冒隱避以免課役不限附之早晚皆徴之武德六年三月令每嵗一造帳三年一造籍州縣留五比尚書省留三比儀鳯二年二月二十四日敕自今已後裝潢省籍及州縣籍景龍二年閠九月敕諸籍應送省者附當州庸調車送若庸調不入京雇腳運送所須腳直以官物充諸州縣籍手實計帳當留五比省籍留九比其逺年依次除皇宗祖廟雖毁其子孫皆於宗正附籍自外悉依百姓例開元十八年十一月敕諸户籍三年一造起正月上旬縣司責手實計帳赴州依式勘造鄉别為卷總寫三通其縫皆注某州某縣某年籍州名用州印縣名用縣印三月三十日納訖并裝潢一通送尚書省州縣各留一通所須紙筆裝潢並皆出户內每口一錢其户每以造籍年豫定為九等便注籍腳有析生新附者于舊户後以次編附二十九年二月敕自今已後應造籍宜令州縣長官及令録事參軍審加勘覆更有踈遺者委所司具本判官及官長等名品録奏其籍仍寫兩本送户部天寶元年正月制節文如聞百姓之內或有户髙丁多茍為規避父母見在別籍異居宜令州縣仔細勘會其一家之中有十丁巳上放兩丁征行賦役五丁巳上者放一丁即令同籍共居以敦風教如更犯者準法科罪三年正月十六日敕天寶三年改為載者所論前後年號一切為載具後造籍記嵗月云若千載自餘表狀文章並準此其年二月二十五日制天下籍造四本京師東京尚書省户部各貯一本五載六月十一日敕自今已後應造籍帳及公私諸文書所言地四至者改為路十二載正月十二日敕送東京籍宜停寶應二年九月敕客户若住經一年已上自貼買得田地有農桑者間有移於莊蔭家住及自造屋舍勒一切編附為百姓差科比居人例量減一半庶免逃散者大厯四年八月敕名籍一家輒請移改詐冒規避多出此流自今已後割貫改名一切禁斷逃户證聖元年鳯閣舍人李嶠上表曰臣聞黎庶之數户口之衆而條貫不失按此可知者在於各有管統明其簿籍而已今天下流散非一或違背軍鎮或因緣逐糧茍免嵗時偷避徭役此等浮衣寓食積嵗淹年王役不供簿籍不挂或出入關防或往來山澤非直課調虛蠲闕於恆賦亦自誘動愚俗堪為患禍不可不慮也或逃亡之户遇有檢察即轉入他境還行自容所司雖具設科條頒其法禁而相沿為例莫肯遵承縱欲糾其愆違加之刑罰則百州千郡庸可盡科前既依違後仍積習檢獲者無賞停止者獲免浮逃不悛亦由於此今縱使搜檢而委之州縣則仍襲舊蹤卒於無益臣以為宜令御史督察檢校設禁令以防之垂恩德以撫之施權衡以御之為制限以一之然後逃亡得還浮寓可絶所謂禁令者使閭閻為保遞相覺察前後規避皆許自新仍有不出輒聼相告每糾一人隨事加賞明為科目使知勸沮所謂恩德者逃亡之徒久離桑梓糧儲空闕田地荒廢即當賑其乏少助其修營雖有欠賦懸徭背軍離鎮亦皆捨而不問寬而勿徴其應還家而貧乏不能致者乃給程糧使達本貫所謂權衡者逃人有絶家去鄉離失本業心樂所在情不思還聼於所在𨽻名即編為戶夫顧小利者失大計存近務者忘逺圖今之議者或不達於變通以為軍府之地户不可移關輔之人貫不可改而越關繼踵背府相尋是聞其逃亡而禁其割𨽻也就令逃亡者多不能總許割𨽻猶當計其户口等量為節文殷冨者令還貧弱者令住檢責已定計科已明户無失編人無廢業然後案前躅申舊章嚴為防禁與人更始所謂限制者逃亡之人應自首者以符到百日為限限深不出依法科罪遷之邉州如此則戶無遺人無匿矣景雲二年監察御史韓琬上疏曰往年人樂其業而安其土頃年人多失業流離道路若此者臣粗言之不可勝數然流離之人豈愛羇旅而忘桑梓顧不得已也皆以軍戎屢興賦斂重數上下逼促因為遊人遊惰既多窮詐乃作既窮而詐犯禁相仍又以嚴法束之法嚴而犯者愈衆古人譬之亂繩則已結矣而不務解結乃急牽引之則結逾固矣今刻薄之吏是能為結者強舉之吏是能牽引者解結者未見其人開元九年正月二十八日監察御史宇文融請檢察免役偽濫并逃户及籍田因令充使於是奏勸農判官數十人華州録事參軍慕容琦長安縣尉王永太原司録張珦大原兵曹宋希玉大理評事宋詢長安主簿韋利涉汾州録事參軍韋洽汜水縣尉薛侃三原縣尉喬夢松大理寺丞王誘右拾遺徐楚璧安成縣尉徐鍔長安縣尉裴寬萬年縣尉崔希逸同州司法邉沖寂大理評事班景倩榆次縣尉郤庭倩河南府法曹元將茂洛陽縣尉劉日正至十二年又加長安縣尉王夀河南縣尉于儒卿左拾遺王惠翼奉天縣尉何千里伊闕縣尉梁勛富平縣尉盧怡咸陽縣尉庫狄履溫渭南縣尉賈晉長安縣尉李證前大理評事蕭廙業皆當時名士判官得人於縣獨盛分道安輯户口檢括田疇並客户議者深以為擾人不便陽翟縣尉皇甫憬上疏曰太上務德以靜為本其次務化以安為上但責其疆界嚴立隄防山水之餘即為見地何必聚人阡陌親遣檢量故奪農時遂令受弊又應出使之輩未識大體所由殊不知陛下愛人至深務以勾剝為計州縣懼罪據牒即徴逃户之家鄰保代出鄰保不濟又使更輸急之則都不謀生緩之則憲法交及臣恐逃逸從此更深至如澄流在源止沸由火不可不愼今之具官尚逾萬數蠶食府庫侵害黎民户口逃亡莫不由此縱使伊臯申術管晏陳謀豈息兹弊若以此給將何以堪雖東海南山盡為粟帛亦恐不足豈括田稅客能周給也上方委任融侍中源乾曜中書舍人陸堅贊成其計貶憬為盈州尉于是諸道招得客戶凡八十餘萬田亦稱是州縣希旨務於多獲皆虛張其數有以實户為客者嵗終得客戶錢百萬一時進入官中由是擢拜御史中丞言事者猶稱括客損居人上令集百寮於尚書省議公卿以下懼融恩深皆雷同不敢有異詞惟户部侍郎楊瑒獨建議以為搜客不利居人徴籍外田稅使百姓困敝所得不補所失未幾瑒又出為外職二月二十八日敕檢獲招誘得户口應合酬者其有課戶皆須待納租庸然後論功十八年宣州刺史裴耀卿論時政上疏曰竊見天下所檢客戶除兩州計會歸本貫已外更合所在編附年月句滿須準居人更有擾務即此輩僥幸者令徴課稅即目擊未堪竊料天下諸州不可一例處置且望從寬以天下大勢而言竊計有剩田者不減三四十州取其剩田通融支給其剩地者三分請取一分已下其浮户任其親戚鄉里相就每上户已上合作一坊每户給五畝充宅并為造一兩口屋開巷陌立閭伍種桑棗築園蔬使緩急相助親鄰不失丁别量給五十畝已上為私田任其自營種率其户於近坊更共給一頃以為公田共令營種每丁一月役功三日計十丁一年共得三百六十日營公田一頃不啻得足計平收一年不減一百石便納隨近州縣除役功三百六十日外更無租稅既是營田户且免征行安樂有餘必不流散官司每丁收納十石其粟更不别支用每至不熟年斗别二十價然後支用計一丁一年還出兩石已上亦與正課不殊則官收其役不為務縱人緩其稅又得安舒倉廪日殷久逺為便其狹鄉無剩地客户多者雖此法未該準式許移窄就寬不必須要留住若寬鄉安置得所人皆悅慕則三兩年後皆可改塗剩地盡作公田狹鄉總移寬處倉儲既實水旱無憂二十四年七月敕諸州應歸首復業者比來每至年終皆當州録奏自今以後宜令牒報本道採訪使同勘當歸首人每州略單數同一狀奏仍挾名報所由天寶八載正月敕朕永念黎元務𢎞愛育所以惠政頻及善貸相仍亦將克致和平登于仁夀如聞流庸之輩漸亦歸復浮食未還其數未足靜言此色蓋亦有由皆為牧宰等授任親人職在安輯稍有逃逸耻言減耗籍帳之間虛存户口調賦之際旁及親鄰此弊因循其事自久寤寐興念良用憮然不有釐革孰致殷阜其承前所有虛挂丁户應賦租庸課稅令近親鄰保代輸者一切並停應令除削各委本道採訪使與外州相知審細檢覆申牒所由處分其有逃還復業者宜有優恤使得安存縱先為代輸租庸不在酬還之限十四年八月制天下諸州逃户有田宅産業妄被人破除并緣欠負租庸先已親鄰買賣及其歸復無所依投永言此流須加安輯應有復業者宜並却還縱已代出租稅亦不在徴賠之限國之役力合均有無比來應定門夫殊非得所每縣中男多者纍嵗方始一差中男少者一周遂役數遍既緣編併豈可因循自今以後諸郡所差門夫宜于當郡諸縣通率準式納課分配令得均平至德二年二月敕諸州百姓多有流亡或官吏侵漁或盜賊驅逼或賦斂不一或徴發過多俾其怨咨何以輯睦自今以後所有科役須使均平本户逃亡不得輒徴近親其鄰保務從減省要在安存乾元二年四月敕逃户租庸據帳徴納或貨賣田宅或攤出鄰人輾轉誅求為弊亦甚自今已後應有逃户田宅並須官為租貨取其價直以充課稅逃人歸復宜並却還所由亦不得稱欠租賦别有徴索寶應元年四月敕近日已來百姓逃散至於户口十不半存今色役殷繁不減舊數既無正身可送遣鄰保祗承轉加流亡日益艱弊其實流亡者且量蠲減見在者節級差科必兾安存庶為均濟其月敕百姓田地比者多被殷富之家官吏吞併所以逃散莫不由兹宜委縣令切加禁止若纍日再有違犯當倍科責其年五月十九日敕逃户不歸者當户租賦停徴不得率攤鄰親髙户廣德二年四月敕如有浮客情願編附請射逃人物業者便準式據丁口給授如二年以上種植家業成者雖本主到不在却還限任別給授大厯元年制逃亡失業萍泛無依時宜招綏使安鄉井其逃户復業者宜給復二年不得輒有差遣如有百姓先貨賣田宅盡者宜委本州縣取逃死户田宅量丁户充給貞元十二年六月趙州刺史皇甫政奏貞元十年進綾縠一千七百匹至汴州值兵逆叛物皆散失請新來客户續補前數上使謂宰臣曰百姓有業則懷土失業則離鄉客户者咸以遭罹苛暴變成瘡痍之人豈可重傷哉可罷其率特免所失物長慶元年正月赦文應諸道管內百姓或因水旱兵流離死絶見在桑産如無近親承佃委本道觀察使於官健中取無莊有人丁者據多少給付便與公驗任充永業不得令有力職掌人妄為請射其官健仍借種糧放三年租稅會昌元年正月制安土重遷黎民之性茍非難窘豈至逃亡將部招綏必在資産諸道頻遭災沴州縣不為申奏百姓輸納不辦多有逃亡長吏懼在官之時破失人户或恐務免正稅減尅料錢祇于見在户中分外攤配亦有破除逃戶桑地以充稅錢逃戶産業已無歸還不得見在户每年加配流亡轉多自今已後應州縣開成五年已前流亡之户宜即令所在觀察使刺史差強明官就村鄉詣實檢會桑田屋宇等仍勒令長加檢校租佃悉勿令荒廢據所得與納户內征稅有餘即官為收貯待歸給還付如欠少即與收破至歸還日不須徴理自今已後二年不歸復者即仰縣司召人給付承佃仍給公驗任為永業其逃户錢草斛斗等計留使錢物合十分中二分已上者並仰於當州當使雜給用錢內方圓權落下不得尅正員官吏料錢及館驛使料遞乘作人課等錢仍任本戶歸復日漸復元額大中二年正月制所在逃户見在桑田屋宇等多有暫時東西便被鄰人與所由等計會推云代納稅錢悉將斫伐毁折及願歸復多已蕩盡因致荒廢遂成間田從今以後如有此色勒令老人與所由并鄰近等同檢勘分明分析作狀送縣入案任鄰人及無田産人且為佃事與稅納如五年內不來復業者便任佃人為主逃戶不在論理之限其屋宇桑田樹木等權佃人逃户未歸五年內不得輒有毁除斫伐如有違犯者據糧口量情與科責并科所由等不檢校之罪咸通十一年七月十九日敕諸道州府百姓承佃逃亡田地如已經五年須準承赦文可便為佃主不在論理之限仍令所司準此處分唐會要卷八十五
