body:
  text: 唐會要卷四宋王溥撰儲君太子建成髙祖長子武德元年六月七日册為皇太子九年六月四日見殺追封息王初武德元年六月萬年縣法曺孫伏伽上疏諫曰臣聞性相近而習相逺以其所好相染故也皇太子及諸王等左右羣僚不可不擇而任之但是無德義之人家門不能雍睦及好奢華馳騁嫚逰聲色不得使親而近之臣歷觀往古下覽近代至于子孫不孝兄弟離間莫不為左右亂之願陛下選賢才以為皇太子僚友如此則克崇磐石永固維城矣中山王承乾太宗長子武德三年六月封恆山郡王五年八月徙封中山郡王九年十月立為皇太子貞觀十七年四月六日廢為庶人居黔州十八年十二月二日薨開元二十四年追封恆山郡王諡曰愍初貞觀十三年黃門侍郎劉洎上疏曰太子生于深宫之中長于婦人之手未嘗識憂懼無由曉風俗雖復神機不測天縱生知而開物成務終由外奬是故周儲上哲思望奭而加裕漢惠深仁引綺園而昭德原夫太子宗祧是繫善惡之際興亡斯在茍不勤始將悔于終故朝錯上書令先通政術賈誼獻策務前知禮教臣今不曲陳故事請以聖德言之陛下多才多藝允武允文尚且雖休勿休日慎一日求異聞于振古勞睿思于當年乙夜觀書事髙漢帝馬上披卷勤過魏后陛下自勵如此而令太子優游臣所未喻一也加以暫屏機務即寓目雕蟲屈宋不足以升堂鍾張何階于入室陛下好古如此而令太子悠然靜處不尋篇翰臣所未喻二也備該衆妙獨秀寰中猶晦天聰俯詢凡識聽朝之隙引見羣臣降以溫顔訪以今古陛下自行如此而令太子久入趨侍不接正人臣所未喻三也若謂無益則何事勞神若謂有成則宜申貽厥蔑而不急未見其可上遂敕劉洎令與岑文本馬周遞日往東宫與太子談論十六年二月諫議大夫禇遂良諫曰昔聖人制禮尊嫡卑庶謂之儲君道亞霄極其為崇重用物不計泉貨財帛與王者共之庶子體卑不得為例所以塞嫌疑之漸除禍亂之源也先王必本人情然後制法知國家必有嫡庶然後庶子雖愛不得超越嫡子正禮特須尊崇如當親者疏當尊者卑則佞巧之奸承機而動私恩害公或至亂國臣伏見東宫料物歲得四萬段出市貨賣凡直一萬一千貫魏王年别封及廩物一年凡直一萬六千貫文此便儲君料物翻少藩王朝野聞見以為非是昔漢明帝披輿地圖等諸國户口令諸子租歲不過二千萬明德馬后為言亦不偏得此則防其嗜欲節其驕恣伏願陛下頗擇漢法𢎞此無偏儲君之用微附古昔則天下幸甚因詔曰儲二不會自古常式近代以來多為節限求之故實深非事宜自今皇太子出用庫物所司勿為限制至其年八月十四日上謂侍臣曰當今國家何事最急各為我言之右僕射高士亷曰養百姓最急黃門侍郎劉洎曰撫四夷最急中書侍郎岑文本曰行禮義最急諫議大夫褚遂良曰即日四方仰德誰敢為非但太子諸王須有定分陛下宜為萬代法以遺子孫上曰此言是也朕年將五十已覺衰怠既以長子守器東宫弟及庶子數將五十心常憂慮頗在此耳但自古嫡庶無良佐何嘗不傾敗家國公等為朕搜訪賢德以輔儲君爰及諸王咸求正士且人事歲久則分義情深非意窺覬多由此作于是限王府官寮不得過四考十七年三月左屯衛中郎將季安儼上表言皇太子及諸王陛下處置未為得所太子國之本也伏願深思逺慮以安天下之情上曰我識卿意我兒雖患腳猶是長嫡豈可舍嫡立庶乎燕王忠髙宗長子貞觀二十年八月封陳王永徽三年七月册為皇太子六年十一月武后既立禮部尚書許敬宗奏曰臣聞元儲以貴立嫡之義尤彰罔敢同名正本之文愈顯既而皇后生子合處少陽出自塗山是為吾君之子夙嫻胎教宜展問豎之心乃復為孽奪宗降居藩邸臣以愚誠竊所未喻且今之守器素非皇嫡永徽爰始國本未生權引彗星越升明兩近者元妃載誕嫡嗣降神重光日融爝火宜息安可以濫兹皇統叨據大器國有諍臣孰逃其情竊惟息姑克讓可以思齊劉强守藩宜遵往軌追踪泰伯不亦可乎踵武延陵固當安矣寧可反植枝幹久易位子天庭倒襲衣裳使違方于震位蠢爾黎元于誰係心垂裕後昆將何播美且父子之際人所難言事或犯鱗必嬰嚴憲伏自思忖荷盼前朝引于陋巷之中申以後車之禮雲臺畫像十有八人三紀于兹惟臣僅在常思勉力少報鴻恩今兹冢嗣執圭下枝當璧孟侯淪屈大典未申臣既分職文昌典司嘉禮位陪宗伯不敢曠官效命之秋宜在兹日及召見上曰卿朕之伯夷立嫡之義在禮何如對曰正國本則萬事理皇太子國之本也本猶未正萬國無以係心東宫者所出本微今知國家已有正嫡必不自安竊位而懷疑恐非宗廟之福也願陛下熟計之上曰忠已自讓對曰能為泰伯願速從之顯慶七年正月六日降為梁王官寮皆懼罪亡匿無敢見者太子右庶子李安仁獨候忠泣涕拜辭而去時論美之章懷太子賢髙宗第六子永徽六年正月封潞王龍朔元年九月二十日改封沛王咸亨二年五月十三日敕尚書省與奪事及須商量拜奏事等文案並取沛王賢通判其應補擬官及廢置州縣并兵馬刑法等事不在判限三年九月改名德徙封雍王上元二年六月三日改名賢册為皇太子調露二年八月二十日廢為庶人唐隆元年七月七日追贈太子諡曰章懷賢初封潞王為幽州都督始出閣容止端雅髙宗深所歎賞謂司空李績曰此兒已讀得尚書禮記誦古詩賦復千餘篇暫經領覽遂即不忘我曾遣誦論語至賢賢易色遂再三覆誦我問何為如此乃云性愛此言及為皇太子令監國處分明審為時所稱儀鳯中手敕褒美賢又令右庶子張大安等注范氏後漢書表上之賜物三萬段仍以其書付祕閣時正議大夫明崇儼以符劾之術為則天任使密稱英王狀類太宗又宫人潛議云賢是后姊韓國夫人所生賢亦自疑懼則天又嘗撰少陽政範及孝子傳以賜之仍數作書以責讓及崇儼為盜所殺則天疑賢所為又使人發其隂事詔中書侍郎薛元超黃門侍郎裴炎御史大夫髙智周與法官推鞫之于東宫馬坊搜得皂甲數百領乃廢為庶人幽于别所節愍太子重俊中宗第三子聖厯三年臘月封義興郡王神龍元年二月十九日徙封衛王二年七月五日册為皇太子三年七月五日兵敗自殺唐隆元年六月二十五日贈太子景雲元年七月諡節愍十一月陪葬定陵廢太子瑛𤣥宗第二子本名嗣謙景雲元年九月二日封真定郡王先天元年八月十一日進封郢王開元二年十二月十七日册為皇太子十三年三月十日改名鴻二十三年七月改名瑛二十五年四月二十二日廢為庶人初二十三年將廢太子謀于宰臣張九齡曰太子天下之本也動之則搖人心且太子之在東宫未聞大惡臣聞父子之道天性也有過父恕而掩之無宜廢絶且其狀未著恐外人窺之傷陛下慈父之道寶應元年五月十九日敕宜復舊封皇太子初瑛母趙麗妃有才貌善歌舞𤣥宗在潞州甚寵遇及武惠妃寵幸麗妃恩顧漸薄時鄂王瑶母皇甫德儀光王琚母劉才人皆𤣥宗在臨淄邸得幸及惠妃承恩鄂光之母亦漸疏薄于是瑛與鄂光自謂母氏失職常有怨望遂為李林甫及駙馬楊回所誣𤣥宗震怒並廢為庶人俄又賜死天下寃之後惠妃屢見三庶人為祟惠昭太子憲寧宗長子元和元年八月封為郢王四年閏三月立為皇太子六年十二月薨諡曰昭惠莊恪太子永文宗長子太和四年四月封魯王七年八月立為皇太子開成三年十月薨諡曰莊恪皇太子裕昭宗長子大順三年六月二十八日封德王乾寧四年二月十一日册為皇太子天祐元年薨雜録貞觀十六年六月西苑丞穆格農囿不修太宗怒甚命于朝堂斬之侍臣戰栗莫敢進言太子承乾諫曰人者有生最靈一死不可復活命即斬之理恐未盡請付法司推鞫太宗意解即笞而釋之長孫無忌進曰陛下發天威之怒太子犯顔進諫斯誠四海之福太宗曰自朕御天下虛心正人即有魏徵朝夕納諫自徵云亡劉洎繼之太子幼在朕前每見規諫者常心悅之染以成性故有今日之諫耳十七年閏六月詔曰皇太子地惟儲副寄深監撫兼統禁旅是允舊章宜知左右屯營兵馬事大將已下並受處分十九年髙士亷劉洎等表稱皇太子與百官書疏先無禮式請詳定其儀詔曰皇太子地在震方禮絶羣后而令書法式未著彛章近代以來例皆明白謙過逼下書依衆庶無以别貴賤之差將何顯尊卑之序理非通允宜有更張凡事處分論事之書皇太子並宜畫令左右庶子以下署名宣奉行書按畫日其餘與諸親及師傅等書不在此限二十年太宗于寢殿側置一院令太子居之絶不遣往東宫門下侍郎兼太子賔客褚遂良上疏諫曰臣聞周家問安三至必退漢儲視膳五日乃來禮曰男子十年出就外傅出宿于外學書計然則古之達者豈無私愛欲使成立凡人尚猶如此况君之世子乎且朋友不可以深交深交必有怨父子不可以溺愛溺愛或生愆伏願逺覽殷周近遵漢魏常許旬日半月遣還宫專學藝以潤身布芳聲于天下則微臣雖死如生之年太宗從之長安三年太子詹事崔神慶上表曰臣伏思五品以上所以帶龜者比為别敕徴召恐有詐妄內出龜合然後應命况太子元良國本萬方所瞻古來徴召皆用玉契此誠重慎之極防萌之慮臣昨見緣突厥使見太子合預朝參直有文符下宫曾不降敕處分太子當時又報臣曰昨日至晚侍奉不見聖人諭及遣來今者直凖臺符入朝事得妄否臣伏思禮司儀注例皆奏聞臺符所下必將非妄臣又自到朝堂審知是實所以太子遽往當今人禀淳化內外同心然古人慮事于未萌之前所以長無悔吝之咎臣愚見太子既與陛下異宫伏望召太子先報來日非朔望朝參應須宣喚伏望降墨敕及玉契以符重慎之道開元十六年五月敕所選皇太子及諸王等妃既是百官子女禮合避人今追就府縣及過本司未為得所其應預妃者宜令所司具名録奏各令女及近親隨使于命婦朝堂待進止乾元元年四月代宗自楚王改封成王張皇后有子數歲隂有奪宗之議宰臣李揆因見對肅宗從容謂曰成王嫡長有功今當命嗣卿意如何揆拜賀曰陛下言及于此社稷之福天下幸甚不勝大慶肅宗喜曰朕計決矣建中元年二月國子司業歸崇敬上言凖制皇太子時幸太學行齒胄之禮者伏請每至春秋國學釋奠之時所司先奏聽進止其釋奠齒胄之禮如開元禮或有未盡請委禮儀使更以古議詳定聞奏貞元中裴延齡韋渠牟以姦佞相次選用延齡尤狡險判度支務尅剝聚斂自以為功天下怨怒陸贄李充以讒毁受譴陽城等伏闕懇諭幾至得罪順宗在東宫每進見輒言延齡輩不可用而諫臣可奬德宗卒不相渠牟延齡而宥城等者東宫之力也德宗嘗泛舟魚藻宫水嬉命皇太子升舟舟具皆飾以金碧丹青婦人盛飾操舟光彩耀燭衆樂俱發德宗顧太子今日如何曰極盛然後退以奢諫德宗不悅焉貞元二十一年四月册廣陵王為皇太子時德宗即位已久而臣下未有親奏對者內外咸言王伾王叔文專行斷決日有異說又屬頻隂雨皆以為羣小用事之應及將行册禮之時雨乃止天景清明有慶雲見識者以為天意所歸及覩皇太子儀表班行悚動退無不相慶至有感而泣者道路歡悅遞相傳告中外有屬焉元和五年二月太常禮院奏百官避皇太子名諱詳禮經公卿大夫與太子同名無嫌蓋尊統于上太子同在臣子之列國朝故事東宫官號并東宫殿及門名與太子名同皆改然無百官避東宫名者德宗在春宫處州舊名不改并御史院中同名者亦不改伏以宫臣名及宫殿門名并百官宗姓中有與皇太子名同者即于儀制體合回避臺官及王公爵土名號推義比例並無改文詔可六年閏十二月皇大子薨前四年有司將行册禮以孟秋再卜日臨事皆以雨而罷至十月方就廷册才二周歲而薨十二月三十日皇太子侍讀諫議大夫韋綬奉皇太子學書至依字輒去其傍人字臣問其故答曰君父每以此字可天下之奏臣子豈合書之上深嘉歎之其年五月韋綬罷侍讀綬好諧戲兼通人間小說太子因侍上或以綬所能言之上謂宰臣曰侍讀者當以經術𫝊導太子使知君臣父子之教今或聞韋綬談論有異于是豈所以傅導太子者因此罷其職尋出為處州刺史其年十二月惠昭太子薨命國子司業裴茝議廢朝禮茝奏故事無皇太子薨禮請輟視朝十二日蓋用期服易月之制也七年惠昭太子既薨穆宗時為遂王憲宗以澧王居長又多內助將建儲二命翰林學士崔羣與澧王作讓表羣執奏曰大凡已合當之則有陳讓之義若不合當因何遽有讓表今遂王嫡子長所宜正位青宫乃從之及後穆宗即位拜吏部侍郎召見别殿謂之曰我升儲位之時卿為羽翼羣奏曰先帝之意元在陛下頃者授陛下淮西節度使臣奉命草制且曰能辨南陽之牘允符東海之貴若不知先帝深㫖臣豈敢輕言長慶二年十二月上御紫宸殿册皇太子故事册太子御宣政殿時以聖體未康慮勞登御故從便也是日備宫懸于殿庭列內仗于兩閣門內羣臣辨色序立于宣政門外俄就外廊食訖始具衣冠劒履入自月華門列位于正衙辰後一刻方入閣上臨軒復以中官列侍太子步自崇明門以宫寮翼從駙馬二人扶衣冠禮儀使導以進及樂作扇開羣臣拜訖太子進至龍墀東南再拜受册攝中書令杜元穎跪讀册文訖以授太子太子再拜舞蹈乃歸于崇明門幕殿羣臣賀皇帝訖退詣崇明門謁太子太子命舉簾執笏答拜宫寮拜則受之開成元年五月中書門下奏臣等纍奉德音令與皇太子於甲族選妃家今商量于兩都及側近精擇甲族可以選尚者敕冢嗣元良家國之慶人倫之始在娶元妃雖吉事尚更于待年而嘉偶宜深于善教至于先定冀選義方屬在德門遂成好合在東京委裴度西京委宰臣各申㫖諭兩月內送中書門下三年十月莊恪太子薨太常禮院奏皇太子薨禮儀至重諸祠祭除天地社稷之外並合權停其天地社稷祭日懸而不樂虞祭已後却依常式從之追諡太子懿德太子重潤中宗長子本名重照惠莊太子撝睿宗第二子惠文太子範睿宗第四子惠宣太子業睿宗第五子靖恭太子琬𤣥宗第六子恭懿太子紹肅宗第十二子昭靖太子邈代宗第三子文敬太子諒德宗之子本順宗子上愛念之養為子懷懿太子湊穆宗第三子悼懷太子普敬宗長子靖懷太子渼宣宗第二子會昌六年封王大中六年薨追諡靖懷雜録懿德太子生于東宫內殿髙宗甚悅及滿月大赦改元永淳是歲立為皇太孫開府置官屬及申宗遷于房州其府廢中宗為皇太子封為邵王大足元年為人所搆與其妹永泰郡主壻魏王武延基等竊議張易之兄弟何得恣入宫中則天命杖殺之年十八重潤風神俊朗早以孝友知名既死非其罪大為當時所惜中宗即位追贈皇太子諡曰懿德陪葬乾陵仍為聘國子監丞裴粹亡女為冥婚與之合葬惠莊太子撝初生則天嘗以示僧萬回萬回曰此兒是西域火樹之精養之宜兄弟則天甚悅始令列于兄弟之次惠文太子範好學工書雅愛文章之士無貴賤皆盡禮接待與閻朝隱劉延琦張諤鄭繇篇題唱和又多聚書畫古蹟為時所稱上禁約王公不令與外人交結駙馬都尉裴虛已坐與範逰宴兼私挾䜟緯之書配徙嶺外萬年尉劉雅稱風格委整時士庶冀有所成功忽然殂謝逺近失望焉皇太孫貞觀十七年十一月二十八日誕皇太孫宴宫寮于𢎞教門太宗幸東宫自殿北門入謂宫臣曰頃來生業稍可非乏酒食而唐突公等宴會朕有甲觀之慶故就卿為樂耳謂太子曰爾國之儲二府藏是同金玉綺羅不足為賜但先聖典籍可為鑑誡耳因賜尚書毛詩孝經各一部太子太傅蕭瑀曰今所賜書請陳其要㫖申明義趣可為深誡者皆委曲言之上大悅以為師傅得人永淳元年三月十五日立皇孫重照為皇太孫將置府寮上召吏部侍郎裴敬尋郎中王方慶問今立太孫前代故事如何方慶進曰臣按周禮有嫡孫漢魏以來皇太子在亦不立太孫但封王耳晉太康元年立愍懷太子第二子臨淮王臧為皇太孫永寧元年立愍懷太子第三子襄陽王尚為皇太孫太子官屬即轉為太孫官屬齊永明十年立文惠太子長子南郡王昭業為皇太孫使居東宫今皇太子在而立太孫旁求載籍未有前例上曰自我作古可乎對曰可三王不襲禮五帝不沿樂苟不失上下之序虧政理之道亦何事而不可詩曰詒厥孫謀以燕翼子禮曰君子抱孫不抱子孫可以為王父尸以其昭穆同也今陛下肇建皇孫創斯盛典所以彰子孫千載之盛福祚靈長之應也上悅使方慶詳求典故官屬員品乃奏太孫府置師傅及文學祭酒及左右長史東西曹掾主簿管記司録以下六曹從事等官各加王府一級上後頗以為疑竟不補授而止也憲宗皇帝六七歲時德宗抱置膝上謂曰汝是何人在吾懷中對曰第二天子也上大驚喜由是重之唐會要卷四
