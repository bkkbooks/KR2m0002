body:
  text: 唐㑹要卷四十宋王溥撰君上慎恤武德二年二月武功人嚴甘羅行刼為吏所拘髙祖謂曰汝何為作賊甘羅言飢寒交切所以為盗髙祖曰吾為汝君使汝窮乏吾罪也因命捨之貞觀七年十月三日殿中監盧寛持私藥入尚食厨所司議當重刑上曰秖是錯誤遂赦之三年三月五日大理少卿胡演進每月囚帳上覧焉問曰其間罪狀亦或情有可矜何用皆以律斷對曰原情宥過非臣下所敢上謂侍臣古人曰鬻棺之家欲歳之疫非惡於人而利於棺故今之法司覆理一獄必求深文欲成其考今作何得使平允王珪奏曰但選良善平恕人斷獄允當者賞之即姦偽自息上曰古者斷獄必訊于三槐九棘之官今三公九卿即其職也自今天下大辟罪皆令中書門下四品已上及尚書議之至三月十七日大理引囚過次到岐州刺史鄭善果上謂胡演曰鄭善果等官位不卑縱令犯罪不可與諸囚同列自今三品已上犯罪不須將身過朝堂聽進十四年十一月十七日制决罪人不得鞭背初太宗以暇日閲明堂見五臓之系咸附于背乃嘆曰夫箠五刑之最輕者也豈容以最輕之刑而或致戕之古帝王不悟不亦悲夫即日遂下此詔五年八月二十一日詔死刑雖令即决仍三覆奏在京五覆奏遂以决前一日三覆奏决日三覆奏惟犯惡逆者一覆奏著于令初河内人李好德風疾瞀亂妖妄之言詔大興丞張藴古按其事藴古奏好徳顛病有徴法不當坐治書侍御史權萬紀劾藴古貫屬相州好德兄厚為其刺史情在阿縱遂誅好徳既而悔之故有此詔上元元年閏四月十九日赦文自今已後其犯極刑宜令本司依舊三覆其年十一月九日勅前勅在京决死囚日進𬞞食自今已後决外州囚第三日亦進𬞞食因謂三品已上曰今曺司未能奉法在下仍多犯罪數行刑戮使朕數食空飯公等豈不為媿宜各存心以盡匡救六年十二月十日親録囚徒放死罪三百九十人歸于家令明年來秋就刑其後應期畢至詔悉原之七年十二月十二日詔三品已上犯公罪流私罪徒送問畢日須進身總章二年五月十一日上以常法外先决杖一百或致殞斃乃下詔曰别於律外决杖一百者前後應五十九條决杖既多或至於死其五十九條内有盗竊及蠧害尤甚者今後量留一二條自餘四十七條並宜停開元十二年四月勅比來犯盗先决一百雖非死刑大半殞斃言念於此良用惻然今後抵罪人合滿杖並從寛决杖六十一房家口移𨽻磧西其嶺南人移𨽻安南江淮人移𨽻廣府劔南人移𨽻姚巂州其磧西姚雋安南人各依常式天寳元年二月二十一日勅官吏准律應枉法贓十五疋合絞者自今已後特宜加至二十匹仍即編諸律著為不刋四年八月十二日勅刑之所設將以閑邪法不在嚴貴於知禁今後應犯徒罪者並量事宜於諸軍効力貞元八年十一月勅比來所司斷罪拘守科條或至死刑猶先决杖處之極法更此傷殘惻隱之懐實所不忍自今已後罪之死者先决杖宜停十三年四月勅農事方興時雨猶少言念囚繫慮有滯寃京城百司及畿内有禁囚李士政等六人合處極法從寛典宜各决四十配流諸州其餘禁繫者委御史臺與諸司計㑹勅到後五日内清理訖聞奏元和四年二月勅自今已後在京諸司應决死囚不承正勑並不得行决如事迹凶險須速决遣并有别處分者亦令一度覆奏時右街功德使吐突承璀牒京兆府稱奏勅令杖死殺人僧惠寂府司都不覆奏故有是詔八年九月詔書减死戍邊前代羙政量其逺近宜有便宜自今已後兩京及關内河南河東河北淮南山西東西兩道州府犯罪繫囚除大逆及手殺人外其餘應入死罪並免死配流天德五城諸鎮有妻兒者亦任自隨又緣頃年已來所有配𨽻或非重辟使至逺遷有司上陳又煩年限今後如有輕犯更不得配流五城開成四年五月勅京城百司及府縣禁囚動經嵗月推鞫未畢其有絶小事者亦數個月不速竆詰遷延時日由官吏因循致茲留獄炎蒸在候寃滯難堪宜付御史臺委裴元裕選强明御史三兩人各本司分閲文案清理踈决聞奏如官吏稽慢亦具名銜聞奏其年十月勅自今已後將勅决死囚不令覆奏者有司亦須准故事覆奏太和二年二月刑部奏伏准今年正月三日制刑獄之内官吏用情推斷不平因成寃濫者無問有贓無贓並不在原免之限又准律文出入人罪合當坐者不言有贓無贓令請准律科本罪不得原免勅㫖依三年三月勅京畿之内萬類聚居觸刑章者多于天下加以百役牽應由斯致咎若一一不恕則殺戮滋多應京畿内見禁囚犯死者降一等從流當徙者以逺近節級逓减一等處分四年四月勅法寺用法或持巧詐分律兩端遂成其罪既奸吏得計則黎庶何安今後宜令每書罪定刑但直指其事不得舞文妄有援引仍須頒示天下長吏嚴加覺察不得輙用奸吏如有此色當令停觧八年四月勅朕比屬暇日周覧國史伏覩太宗因閲明堂見五臓之系咸附于背乃制决罪人不得鞭背且人之有生託於臓腑針炙失所尚致夭傷鞭撲茍施能無枉横况五刑之内笞最為輕豈可以至輕之刑致重之命朕恭承丕業思奉貽謀言念于茲載懐惻隱其天下州府應犯輕罪人除罪伏巨蠧法所難原者其他過誤罪狀及尋常公事違犯並宜准貞觀四年十一月十七日制勅處分不得用鞭背刑自今年以後每立夏至立秋已前犯罪人就州府常條之中亦宜量與務减仍速為䟽理不得久令禁繫仍並委御史臺切加糾察永為常式咸通十四年五月勅慎恤刑獄大易格言語云如得其情則哀矜而勿喜而獄吏苛刻務在舞文守臣因循罕聞親事以此械繫之輩溢於狴牢逮捕之徒繫於簡牘實傷和氣用致沴氛况時屬熇蒸化先茂育宜覃赦宥以順生成其諸州府罪人並委本道十日内速理或信任人吏任情繫留觀察使判官本曺官必加懲譴光化元年八月二十七日勅近日用刑皆隳舊例多黷斧鑕鮮行鞭笞今後應天下州縣科斷罪人切湏明於格律不得以軍法戮人臣下守法武德四年王世充竇建徳平大赦天下既而責其黨與並令遷配治書侍御史孫伏伽上表諫曰今年十三日發雲雨之制既云常赦不免皆赦除之非直赦其有罪亦是於天下斷當許以更新因何世充建德部下赦後又欲遷之此是陛下自違本心欲遣下人若何取法如臣愚見經赦合免責諸欲遷配者並請放之則天下幸甚貞觀元年太宗欲正奸吏乃遣人以財物試之有司門令史受餽絹一疋上怒將殺之民部尚書裴矩諌曰此人受賂誠合受誅但陛下以物試之即行極法所謂陷人於罪恐非道德齊禮之義上納其言謂百寮曰矩能廷折不肯面從每事如此天下何憂不理其年温州司户參軍桞雄於隨資妄加階級人有言之上令其自首若不首與爾死罪因言是真竟不肯首大理推得其偽處雄死罪少卿戴胄奏據法止合徒上曰我已與之斷當合與死罪胄曰陛下既不即殺付臣法司罪不至死不可酷濫上作色遣殺胄言之不已至四五然後赦之仍謂之曰曹司但能為我如此守法豈畏濫有誅夷也七年貝州鄃縣令裴仁軌私役門夫上欲斬之殿中侍御史李乾佑奏曰法令者陛下制之於上率土遵之於下與天下共之非陛下獨有也仁軌犯輕罪而致極刑便乖畫一之理臣忝憲司不敢奉制十四年尚書左丞韋悰勾司農木橦七十價百姓者四十價奏其乾没上責有司召大理卿孫伏伽亟書司農罪伏伽曰司農無罪上驚問之伏伽曰只為官木橦貴所以百姓者賤倘官木橦賤百姓者無由賤矣但見司農識大體而不知其過上悟謂悰曰卿識用不逮伏伽逺矣遂罷司農罪焉永徽元年正月有洛陽人李𢎞泰誣告太尉長孫無忌謀反上令不待時而斬之侍中于志寧上䟽諫曰陛下情篤功臣恩隆后戚以無忌横遭誣告事並是虛故戮告人以明賞罰竊據左𫝊聲子曰賞以春夏刑以秋冬順天時也又按禮記月令曰孟春之月無殺昆蟲省囹圄去桎梏無肆掠止獄訟又漢書董仲舒曰王者欲有所為宜求端於天天道之大者在於隂陽陽為徳隂為刑刑主殺而徳主生陽常居大夏以生育長養為事隂常居大冬而積於虛空不用之處以此見天之任德不任刑也臣伏願陛下暫迴聖慮察古人言儻䝉垂納則生靈幸甚䟽奏從之上元三年九月七日左威衛將軍權善才右監門中郎將范懐義並為斫昭陵栢木大理奏以官减外並除名上特令殺之大理丞狄仁傑執奏稱不當死上引入謂曰善才斫陵上栢是我不孝必須殺之仁傑又執奏上作色令出仁傑進曰臣聞逆龍鱗忤人主自古以為難臣愚以為不然居桀紂時則難堯舜時則易臣今幸逢堯舜不懼比干之誅昔漢文時有盗高廟玉環張釋之廷諍罪止棄市魏文將斬一人辛毗引𥚑而諌亦見納用且明主可以理奪忠臣不可以威懼今陛下不納臣言臣恐瞑目之後羞見釋之辛毗於地下也陛下作法縣之於象魏徒罪死罪具有等差豈有犯非極刑即令賜死法既無常則萬姓何以措手足陛下必欲變法請從今日為始古人云假使盗長陵一坏土陛下何以加之今陛下以昭陵一株栢殺二軍將千載之後謂陛下為何主此臣所以不敢奉詔殺善才陷陛下於不道上意乃觧謂仁傑曰既能為善才正我豈不能為我正天下也神龍元年正月韋月將上變告武三思謀逆中宗大怒命斬之大理卿尹思正以發生之月執奏以為不可行刑竟决杖流嶺南三思令所由因以非法害之思正又固爭之三年節愍之誅武三思事變之後其詿誤守門者並配流未行有韋氏黨宻奏請盡誅之上令鞫斷大理卿鄭惟忠奏曰今大獄始决人心未寧若更改推必遞相驚恐則反側之子無由自安遂依舊斷開元二年八月監察御史蔣挺有犯勅朝堂杖之黄門侍郎張廷珪執奏曰御史憲司清望耳目之官有犯當殺即殺當流即流不可决杖以士可殺不可辱也十八年四月日冀州武强縣令裴景仙犯乞取贓積五千匹事發上大怒令集衆殺之大理卿李朝隱奏曰景仙緣是乞贓罪不至死又景仙曽祖故司空寂徃屬締構即首参元勲載初年中家陷非罪凢其兄弟皆被誅夷唯景仙獨存今見承嫡據贓未當死坐准犯猶入議條十世宥賢功實宜録一門絶祀情或可哀願寛暴市之刑俾就投荒之役則舊勲不棄平典斯允手詔不許朝隐又奏曰有命自天處之極法生殺之柄人主合専輕重有條臣下當守枉法者枉理而取十五匹便抵死刑乞取者因乞為贓數千匹止當流坐若今乞取得罪便處斬刑後有枉法當科欲加何辟所以為國惜法期守律文非敢以法隨人曲矜仙命射兎魏苑驚馬漢橋初震皇赫竟從廷議豈威不能制而法貴有常又景仙曽祖實為元勲恩倍常數若寂勲都弃仙罪特加則叔向之賢何足稱者若敖之鬼不其餒而捨罪念功乞垂天聼遂决杖一百配流元和三年三月御史中丞盧坦奏前山南西道節度使桞晟授任方隅所寄尤重至於敕令理合遵行一意歸朝固違明㫖復修貢賦有紊典章伏請付法又奏前浙東觀察使閻濟羙到城亦有進獻當時勘者稱離越州後方見敕文道路已遥付納無處既經恩赦須為商量將誡來者之心必舉贖刑之典已書罰訖伏准今年正月制自今已後諸道長吏有離任赴閤庭者並不得取本道財物妄稱進奉茍有違越必舉憲章桞晟等既違新令不敢不奏上曰山南所進與桞晟不相關先釋放訖閻濟羙制書頒下之時㝷離本道身已在近物須有歸以此奏請進納非敕文所革之意其罰亦宜釋放坦既奏晟濟美二人皆當罪上召坦等褒慰久之曰晟等所獻皆是家財朕已許原不可失信坦奏曰敕令陛下大信也天下皆知之今二臣違令是不畏法陛下奈何受小利而失大信乎上曰朕已受之如何坦曰歸之有司不入内蔵使四方知之以昭聖德上嘉納之六年九月富平縣人梁悦為父報仇殺人自投縣請罪勅復讎殺人故有彞典以其申寃請罪視死如歸自詣公門發於天性志在殉節本無求生寧失不經特减死宜决一百配流循州於是史官職方員外郎韓愈獻復讎議曰伏奉今月五日勅復讎據禮經則義不同天徴法令則殺人者死禮法二事皆王教大端有此異同固宜辨論宜令都省集議聞奏者伏以子復父讎見於春秋見於禮記見於周官見於諸子史不可勝數未有非而罪之者也最詳於律而律無其條非闕文也蓋以為不許復讎則傷孝子之心而乖先王之訓許復讎則人將倚法專殺無以禁止其端矣夫律雖本於聖人然執而行之有司也經之所明者制有司者也丁寧其義於經而深没其文於律者其意將使法吏一斷於法而經術之士得引經而議也周官曰凢殺人而義者令勿讎讎之則死義宜也明殺人而不得其宜者子得讎也如百姓相讎者也公羊𫝊曰父不受誅子復讎可也不受誅者罪不當誅也誅者上施於下之辭非百姓相殺者也又周官曰凡報讎者書於士殺之無罪言將復讎必言于官則無罪也今陛下垂意典章思立定制惜有司之守憐孝子之心示不自専訪議羣下臣愚以為復讎之名雖同而其事各異或百姓相讎如周官所稱可議于今者或為官吏所誅如公羊所稱不可行於今者又周禮所稱將復讎先告於士則無罪者若孤稚羸弱抱㣲志而伺敵人之便恐不能自言於官未可以為斷於今也然則殺之與赦不可一例宜定其制曰凡有復父讎者事發具其事由下尚書省集議奏聞酌其宜而處之則經律無失其㫖矣八年二月僧鍳虚付京兆府决重杖一頓處死仍籍其財産鍳虛在貞元中以􅊰說丐斂用貨利交權貴恣為姦濫事發中外掌權者便欲揺動之有詔復命釋其罪時御史中丞師存誠不受詔翌日又宣旨吾要此僧面詰其事非赦之也存誠又奏曰鍳虛陛下欲召之請先貶臣然後取上嘉其有守遂令杖殺之開元二年八月上御紫宸殿召御史中丞狄兼謩問李伯展獄如何兼謩奏曰不知陛下疑何事李伯展盧行簡及和州知場官盧元度已結奏訖並合處極法臣是法官只知有法陛下若欲原宥時降恩即得上歎曰卿守法如此吾無憂矣定贓估開元十六年五月三日御史中丞李林甫奏天下定贓估互有髙下如山南絹賤貴不等賤處計贓三百即入死刑貴處至七百已上方至死刑即輕重不侔刑典安寄請天下定贓估絹每匹計五百五十價為限勅依其應徵贓入公私依常式至上元二年正月二十八日勅先准格例毎犯五百五十價估當絹一匹自今已後應定贓數宜約當時絹估並准實錢庶叶從寛俾在不易刑部尚書盧正已奏天寳六年四月八日勅節文其贖銅如情愿納錢毎斤一百二十文若欠官物應徴正贓及贖物無財以備官役折庸其物雖多止限三年一人一日折絹四疋若㑹恩其物合免者停役上元二年正月勅名利律評贓者皆據犯處當時物價及上絹估評功庸者計一人一日為絹三尺牛馬驢騾車亦同其船及碾磑邸店各依當時賃直庸雖多不得過其本價自今已後應定贓數宜約當時絹估並准實錢元和三年正月勑今後應坐贓及他罪當贖者諸道委觀察判官一人専勾當及時申報如蔽匿不申者節級科貶如罪不應奏官長量情處置者其贓但准前申送御史臺充本色給用仍差御史一人専知贓贖不得以贓罰者其觀察判官差定後先具名聞奏太和九年十月大理丞周太元奏准㫖條云雜物依工估絹結贓所犯若干匹並無估定計折字者伏以監利物與兩税物好惡有殊一例科决慮猶有屈今請盗換兩税紬綾絹等物請依元盗換匹數結罪科斷更不估定如盗换監利物雜麻布焦葛匹段絲線紙及諸色進貢物不是兩税匹段等請准法式估定數依上絹結贓科斷勅㫖依奏大中六年閏七月勅應犯贓人其平贓定估等取所犯處及所犯月上絹之價假有蒲州盗監巂州事發監以價使依令懸覈即蒲州中估之監准蒲州上絹之價於巂州决斷之類縱有賣價貴賤不同者亦宜依估為定其年十月中書門下奏其犯贓人平贓定估等其外州府比者雖准律文取當處上估絹或有不出土絹處縱有出處亦慮結獄之時須為勘估因其貴賤便生異端兼以州府絹價除果閬州外無貴於宋亳州上估絹者則外州府不許有土絹及無土絹處並請一例取宋亳州土絹估毎匹九百丈結計如所取得絹已費使及不記得色目即請取犯處市肆見貨當處中估絹價平之如不出絹處亦請以當處見貨雜用中估絹價平之庶推勘有准斷覆無疑從之論赦宥貞觀二年七月上謂侍臣曰凡赦唯及不軌之輩古言赦者小人之幸君子不幸一歳再赦善人喑啞凡養稂莠者傷禾稼惠奸宄者賊良人昔文王作罰刑茲無赦夫小仁者大仁之賊故我有天下已來不甚放赦今四海安静禮義興行數赦即愚人常冀僥倖唯欲犯法不能改過當須慎赦證聖元年獲嘉縣主簿劉幾道上表曰臣聞小不忍亂大謀小仁者大仁之賊竊以赦之為用復何益于國哉若乃皇業權輿天地初闢嗣君即位黎元更始則時藉夫非常之慶申以再造之恩必求之政術猶為未允况乃時非變革代屬清平而輙降彼􅍝恩原茲罪罰者乎是以歴觀夐古兩漢舊事匡衡儒學之俊才呉漢弼諧之良輔至於讜言規主惟願勿赦劉先主亦嘗謂諸葛亮曰我周旋陳元方鄭康成間每見啟告理亂之道備矣曽不語赦也若劉景叔季玉父子歳歳赦宥何益于理及後主嗣業蜀赦漸多故孟卿於衆中責費禕曰夫赦者偏枯之物非明世所宜有也今主上仁賢百寮稱職有何旦夕之急而數惠奸宄之徒上違天時下違人理豈具瞻之羙所望於明德哉自是蜀政凌遲浸以彫弊自皇家受命赦宥之澤可謂多矣近則一年再降逺則毎歳無遺至若違法悖禮之徒無頼不仁之輩編户則敓攘為業當官則贓賄是求莫不公然故犯了無疑憚設使身嬰桎梏跡窘狴牢而元日之朝指其天澤重陽之節佇降皇恩如其忖度或果釋免且下愚不移習性難改雖頻肆𤯝毎放自新而見利忘義終焉不易用使俗多頑悖時罕亷隅為善者不沐恩光作惡者獨承徼倖若乃方正直言之士守善嫉惡之夫每欲攬轡埋輪效鷹鸇而報國褰帷露冕去蝥賊以安人而遇赦無以效其功閲恩無所施其巧古語云小人之幸君子不幸其斯之謂也伏望逺覧匡呉陳鄭之說近㝷劉葛費孟之談望今後頗莭於赦庻使黎民知警奸宄肅清開成元年五月上御紫宸殿問宰臣曰為政之道自古所難宰臣李石曰但朝廷法行即理上曰凡犯罪過人不得赦宥唐㑹要卷四十
