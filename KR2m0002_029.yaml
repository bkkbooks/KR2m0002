body:
  text: 唐會要卷二十九宋王溥撰祥瑞下永貞元年八月荆南進毛龜二詔曰朕以所寶惟賢至如嘉禾神芝竒禽異獸蓋虛美也所以建武形於詔令春秋不書祥瑞但凖令式申報有司不得輒有聞獻珍禽竒獸亦宜停進元和二年八月中書門下奏諸道草木祥瑞及珍禽異獸等凖永貞元年八月敕自今已後宜並停進者伏以貢獻祥瑞皆緣臘饗告廟及元會奏聞若例停奏進即恐闕於盛禮凖儀制令其大瑞即隨表奏聞中瑞下瑞申報有司元日聞奏自今已後望凖令式從之七年十一月梓州上言龍州界嘉禾生有麟食之每來一鹿引之羣鹿隨焉光華不可正視使畫工就圖之并嘉禾一函以獻九年八月夏州奏修城掘得釜大小二百五十四如新器物伏以錡釜之用火化是因今大軍始集此物自出望宣付史館從之十年四月滑州上言青龍見於新開河其年五月臨碧縣使奏夀昌殿南獲白鹿麑進之十三年八月鹽鐵使奏郾城上蔡等三縣生菽䔄草引蔓結實味甘人賴為食長慶元年正月二日有事于南郊出東省門日抱珥五色宰臣供奉官並於駕前稱賀其年六月鄆州奏濮州雷澤縣界有烏巢因風墜二雛鵲引而哺之其年七月夀昌殿內礎柱上産玉芝一莖長六尺九月靈州奏黃河清從硤口至定逺界二百五十里見底二年五月有自吐蕃至者稱隴上自去嵗已來出異獸如猴而腰尾皆長色青赤迅猛見蕃人即捕而食之遇漢人則否三月二日詔近日諸道多奏祥瑞自今已後除合準式申奏外餘一切不得妄有進獻其年七月幽州奏有李樹兩根並生相去七寸連理其樹去地二尺合為一幹向上一體外分布枝葉髙一丈三尺有實二百二十一顆四年五月淄青奏登州蓬萊山谷間約四十里野蠶成繭其絲可織太和元年十一月河中奏當管虞鄉有白虎入雲峯觀樓瑞應圖義獸也一名騶虞王者德至鳥獸澤洞幽冥則見今并圖奉進二年福建進瑞粟一千莖中書門下奏伏以陛下勤求理本澄清化源不以靈芝白雁為瑞應方將時安人和為嘉祥宸翰昭宣睿情斯屬伏請自今已後祥瑞俱申有司更不令進獻依奏四年八月太原節度使栁公綽奏雲蔚代三州山谷間石化為麵人取食之六年七月廣州奏慶雲見開成二年十月陳許秦界內野蠶自生桑上三遍成繭連綿九十里百姓收拾得並抽絲得絲綿并織成紬絹三年五月敕朕以慈惠恭儉為休徴以人和年豐為上瑞至於嘉穎連理之祥飛禽走獸之異出於郡國來獻闕庭讓美推功非豫所尚嵗晏奏陳於清廟元正列上於太廟探討古今亦無明據恭惟靈聖豈俟聞薦諸道應有三等祥瑞並不得更有聞奏亦不要申牒所司其臘饗太廟及薦獻太清宫并元日受朝奏祥瑞儀注並停大中二年七月十六日福建觀察使殷儼進瑞粟十一莖莖有五六穗中書門下奏請今後諸道所有瑞物俱報有司不得進獻從之六年九月二日淮南節度使杜悰奏海陵髙郵兩縣百姓于官河中漉網得異米煮食呼為聖米十一年十二月舒州吳塘堰有衆禽成巢濶七尺髙一丈而水禽山鳥鷹隼鸞雀之類無不馴狎于其中乾符三年三月奉天鎮上言金龍書見自河升天文德元年九月雲昭殿前穿井得甘泉天祐元年九月二十日汴州進白兔一其年七月河南府奏榖水村地內嘉禾合穗追賞貞觀十七年十一月詔曰天下宜賜酺三日自漢魏以來或賜牛酒牛之為用耕稼所資多有宰殺深乖惻隱其男子年七十已上量給酒米麵先天二年八月二十五日敕賜酺合宴止欲與人同歡廣為聚斂固非取樂之意今後宴會所作山車醴泉船綵樓閣寶車等俱是無用之物並宜禁斷開元十八年正月二十九日敕百官不須入朝聽尋勝逰宴衛尉供帳太常奏集光祿造食自宰臣及供奉官嗣王郡王諸司長官少卿少監少尹左右丞侍郎郎官御史朝集使皆會焉因下制曰至春末巳來每至假日百司及朝集使任追逰賞至十九年二月八日敕至春末已來每至假旦宜凖去年正月二十九日敕賜錢造食逐勝逰賞至二十年二月十九日許百僚於城東官亭尋勝因置檢校尋勝使以主其事至二十五年正月七日赦文朝廷無事天下大和百司每旬節休假並不須入朝皆任追勝為樂至天寶十載正月十七日敕自今已後非惟旬及節假百官等曹務無事之後任追遊宴樂至十四年三月一日許常參官分日入朝尋勝宴樂二十二年六月敕自今已後宜所聽五日一辰盡其歡宴餘兩日但休假而已任用當處公廨不得别更科率兼有宰殺採捕等天寶八載正月敕今朝廷無事思與百辟同兹宴賞其中書門下及百官等賜絹二萬匹其外官取當處官物量郡大小及官人多少節級分賜至春末巳來每旬日休假任各追勝為樂貞元一年五月詔曰今兵革漸息夏麥又登朝官有假日逰宴者令京兆府不須聞奏四年九月二日敕正月晦日三月三日九月九日前件三節日宜任文武百僚擇地追賞為樂每節宰相已下及常參官共賜五百貫翰林學士共賜一百貫左神威神策龍武等三軍共賜一百貫金吾英武威逺及諸衛將軍共賜一百貫各省諸道奏事官共賜一百貫委度支每節前五日準此數支付仍從本年九月九日起給永為定制十四年正月敕比來朝官或有諸處過從金吾衛奏自今已後更不須聞奏元和二年十二月宰臣奉宣如聞百官士庶等親友追遊公私宴會乃晝日出城餞送每慮奏報人未舒自今已後各暢所懷務從歡泰天祐二年三月敕命宰臣文武百寮自今月二日後至十六日令取便選勝追逰節日顯慶二年四月十九日詔曰比至五月五日及寒食等諸節日并有歡慶事諸王妃公主及諸親等營造衣物雕鏤雞子以進貞觀中已有約束自今已後並宜停斷龍朔元年五月五日上謂侍臣曰五月五日元為何事許敬宗對曰續齊諧記云屈原以五月五日投汨羅而死楚人哀之每至此日以竹筒貯米投水祭之漢建武中長沙歐回白日忽見一士人自稱楚三閭大夫謂歐回曰常所遺多為蛟龍所竊今若允惠可以棟樹葉塞筒并五采絲縛之則不敢食矣今俗人五月五日作粽并帶五采絲及棟葉皆汨羅遺風上曰我見一記有云五色絲可以續命刀子可以辟兵此言未知真虛然亦俗行其事今之所賜住者使續命行者使辟兵也神龍三年四月二十七日制自今應是諸節日及生日並不得輒有進奉又所在五月五日非大功已上親不得輒相贈遺景雲二年十一月敕太子及諸王公主諸節賀遺並宜禁斷惟降誕日及五月五日任其逰奉仍不得廣有營造但進衣裳而已諸親及百官一切不得進開元十七年八月五日左丞相源乾曜右丞相張説等上表請以是日為千秋節著之甲令布于天下咸令休假羣王當以是日進萬夀酒王公戚里進金鏡緩帶士庶以結絲承露囊更相問遺村社作夀酒樂名賽白帝報諸神制曰可至天寶二載八月一日刑部尚書兼京兆尹蕭昊及百寮請改千秋節為天長節制曰可至寶應元年八月三日敕八月五日本是千秋節改為天長節其休假三日宜停前後各一日二十五年六月敕五月五日細碎雜物五色絲算並宜禁斷二十六年正月敕比來流俗之間每至寒食日皆以雞鵝鴨等更相餉遺既順時令固不合禁然諸色雕鏤及造假花果及樓閣之類並宜禁斷天寶十年三月二十六日敕禮標納火之禁語有鑽燧之文所以燮理寒燠節宣氣候自今以後寒食並禁火三日乾元元年九月三日上降誕日宜為天平地成節休假三日至寶應元年九月一日其休假三日宜停前後各一日永泰元年太常博士獨孤及上表曰臣聞天有春夏秋冬之氣時也時有分至啓閉之候節也至若寒食上已端午重陽或以因人崇尚亦播風俗况厯運光啓聖人降生固宜紀載誕之辰與八節同號故玄宗生自命曰天平地成並以飲食宴樂布慶萬方使賜及同軌風流後代陛下纂祖宗之純懿與天地同德禮樂必循憲章咸備而誕聖日未有嘉名伏願以十月十二日為天興節王公士庶上夀作樂並如開元乾元故事表奏不報建中元年四月癸卯上誕之日也初代宗時每嵗端午及降誕日四方貢獻者數千悉入內庫及是上以為非旨不納貞元四年九月重陽節賜宰臣百寮宴於曲江亭帝賦詩錫之云早衣對庭燎躬化勤意誠時此萬幾暇適與佳節并曲池潔寒流芳菊舒金英乾坤爽氣澄臺殿秋光清朝野慶年豐髙會多歡聲永懷無荒誡良士同斯情仍敕中書門下簡定有文辭士應制同用清字上自考其詩以劉太真李紓等四人為上等鮑防于邵等四人為次張蒙殷亮等二十三人為下李晟馬燧李泌三宰相詩不加考第五年正月十一日敕四序嘉辰厯代增置漢宗上已晉紀重陽或説攘除維因舊俗與衆宴樂誠洽當時朕以春方發生候維仲月勾萌畢達天地同和俾其昭蘇宜均暢茂自今已後以二月一日為中和節內外官司並休假一日先敕百寮以三令節集會今宜吉制嘉節以徴之更晦日於往月之終揆明辰於來月之始請令文武百寮以是日進農書司農獻穜稑之種王公戚里上春服士庶以物相遺村社作中和酒祭勾芒神聚會宴樂名為饗勾芒祈年穀仍望各下州府所在頒行六年二月百官以中和節宴於曲江亭上賦詩以錫之其年以中和節始令百官進太后所撰兆人本業記三卷司農獻黍粟種各一升八年正月詔在京宗室每年三節宜集百官列宴會若大選集賜錢一百千非大選集錢三分減一又詔三節宴集先已賜諸衛將軍錢其率已下可賜錢百千九年二月中書門下奏狀以中和節初賜宴錢給百官宰臣已下於曲江合宴供辦為府縣之弊請分給是錢令諸司各會於他所從之自是三節宴悉分矣十二年二月以寒食節御麟德殿內宴於宰臣位後施畫屏風圖漢名臣仍紀其嘉言美行題之於下其年四月庚午上降誕之日近嵗常以此時會沙門道士於麟德殿講論至是命召儒官講論三教十四年三月上已日賜宰臣百官宴於曲江亭時徐州節度使張建封來朝上寵遇之特令與宰相同榻而食十五年九月詔自今已後二月一日九月九日每節前放開屠一日永貞元年十二月太常奏太上皇正月十二日降誕並請休假一日從之元和二年正月詔停中和重陽二節賜宴其上已日仍舊其年二月御史大夫李元素太常卿髙郢等上言玄宗肅宗降誕日據太常博士王涇奏按禮經及厯代典故並無降誕日為節假之説惟國朝開元十七年左丞相源乾曜以八月五日是玄宗降誕之辰請以此日為千秋節休假一日羣臣因獻甘露萬嵗酎酒士庶村社宴樂由是天下以為常乾元元年太子太師韋見素以九月三日肅宗降誕之辰又請以此日為天平地成節休假一日自後代宗德宗順宗即位雖未别置節日每至降誕日天下亦皆休假臣以為乾曜見素等所奏以為節假者蓋當時臣子之心喜君父聖夀無疆以為榮慶今園陵既修升祔將畢謹尋禮意不合更存休假之名請付尚書省集百官與學官參議敕宜依者臣等聞君子之名之必可言言之必可行故可言不可行君子不言伏以玄宗肅宗代宗德宗順宗五聖威靈在天已久而當時慶誕猶存正可言不可行之禮請依王涇奏議並停制可檢首議臣名不獲四年閏三月敕其諸道進獻除降誕端午冬至元正任以土貢修其慶賀其餘雜進除二日條所供外一切勒停如違越者所進物送納左藏庫仍委御史臺具名聞奏七年二月癸卯降誕節宰臣舊例進衣一副惟李吉甫方固恩澤别進馬二匹賜通天犀帶以答之九年十月敕停臘日京兆府饗狐進獻十五年七月敕今月六日是朕降誕之辰奉迎皇太后宫中上夀其日並賜於光順門內殿與百官相見永為常式後竟以禮無所據罷之長慶元年七月六日敕自降誕之辰百官於紫宸殿稱賀畢詣昭德門外命婦光順門並進名奉賀皇太后緣去年降誕稱賀百官與命婦同集光順門羣情以為非便故改其儀二年九月敕蕃客等使皆逺申朝聘節遇重陽宜共賜錢二百貫文以充宴賞仍給太常音樂其年九月尚書左丞兼集賢學士韋綬因奏重陽日百官有曲江宴時請以修撰校理等自為一會從之仍别賜宴錢三年三月敕內侍省每年上已重陽日如有百官宴會者宜每節賜錢五百十貫文令度支支給其年四月中書門下奏皇帝降誕日準故事休假一日從之其年五月詔停諸親端午恭賀太和五年敕端午節辰方鎮例有進奉其雜綵匹段許進生白綾絹七年十月中書門下奏請以十月十日為慶成節著於甲令是日上於宫中奉迎皇太后與昆弟諸王宴樂羣臣詣延英門奉觴上千萬夀天下州府並置宴一日從之開成元年二月京兆尹歸融奏甫近上已凖故事曲江賜宴今緣兩公主出降府司供帳事殷望請改日上曰去年重陽取九月十九日未失重陽之義今宜取十三賜宴二年九月敕慶成節朕之生辰不欲屠宰宴會蔬食任陳脯醢仍為永制至四年復令其日肉食其年九月敕慶成節宜令京兆府凖上已重陽例於曲江會文武百官其延英奉觴宜停三年十月京兆府奏慶成節及上已重陽百官於曲江亭子宴會泛觴船隻諸以舊船上杖木為舫子過會拆收遇節即用者敕其上已節置慶成節及重陽節停五年四月中書門下奏請以六月一日為慶誕節休假三日著於令式其天下州府每年常設降誕齋行香後便令以素食宴樂惟許飲酒及用脯醢等京城內宰臣與百官就請大寺共設僧一千人齋仍望田里借教坊樂官充行香慶讚各移木厨兼下令京兆府别置歌舞依奏是年文宗崩武宗纂嗣以慶誕日為慶陽節會昌元年二月敕我聖祖降誕昌辰宜改為降聖節休假一日其年六月中書門下奏慶陽節凖敕其日設齋錢臣等請以百官共率料錢三百貫文充從之二年五月敕今年慶陽節宜凖例中書門下等並於慈恩寺設齋行香後以素食合宴仍别賜錢三百貫文委度支給付令京兆府量事陳設不用追集坊市歌舞六年六月中書門下奏請以降誕日為壽昌節天下州府並置宴一日以為慶樂前後休假三日永著令式從之龍紀元年二月中書門下奏請今月二十二日降聖日為嘉會節天祐元年八月中書門下奏皇帝降誕日請為乾和節從之唐會要卷二十九
