body:
  text: 唐㑹要卷四十九宋王溥撰像久視元年八月十五日將造大像税天下僧尼人出一錢内史狄仁傑上疏曰今之伽藍制逾宫闕功不使鬼必役於人物不天來終須地出不損百姓將何以求生之有時用之無度編户所奉恒苦不充痛切肌膚不辭箠楚僧道一説矯陳禍福剪髪解衣仍嫌其少亦有離間骨肉事均路人身自納妻謂無彼我皆託佛法詿誤生人里閈動有經坊闤闠亦有精舎化誘倍急切於官徴法事所須嚴於制勑逃丁避罪併集法門無知之僧凡有幾萬且一夫不耕猶受其弊浮食者衆又刼人財臣每思惟實所悲痛今之大像若無官助義無得成若費官財又盡人力一旦有難將誰救之大足元年正月成均祭酒李嶠諫曰臣以法王慈敏菩薩䕶持唯擬饒益衆生非要營修土木佛殿處處皆有見在足憑供養無煩更有修營竊見白司馬坂欲造大像雖税非户口錢出僧尼不得州縣私承必是不能濟辦終須科率豈免勞擾但天下編戶貧弱者衆亦有傭力客作以濟餱糧亦有賣舎貼田以供王役伏聞造修之錢見有一十七萬餘貫若將散施廣濟貧窮人與一千自然濟得一十七萬餘户拯飢寒之弊省勞役之勤順諸佛慈悲之心沾聖君亭毒之意人神胥悅功徳無窮方作過後因縁豈如見在果報垂九霄之澤收萬姓之心聞此㤙造誰不感悦長安四年十月九日勅大像宜於白司馬坂造為定仍令春官尚書建安王攸寧充撿校大像使監察御史張廷珪諫曰夫佛者以覺知為義因心而成不可以諸相窺也故云若以色見我以音聲求我是人行邪道不能見如來此眀真如來不外求也陛下信心歸依裝其塔廟已遍於天下矣盖有住於相而行布施非㝡上第一希有之法何以言之經云若人滿三千大千世界七寳以用布施及恒河沙等身命布施其福甚多若人於經中受持及四句偈等為人演説其福勝彼如佛所言則陛下傾四海之財殫萬人之力窮山之木以為塔極冶之金以為像雖勞則甚矣費則多矣而所獲福縁不逾於殫勞之匹夫沙門之末學受持精進端坐思惟理亦眀矣臣竊為陛下小之今陛下廣樹薰修又置精舎則經云菩薩所作福徳不應貪著蓋有為之法不足尚也况此營造事殷土木或開發磅礴峻築階陛或填塞川澗通轉採斫碾壓蟲蟻動盈巨億豈佛標坐夏之義慜蠢動而不忍害其生哉今陛下何以為之又役鬼不可唯人是營通計工匠率多貧窶朝驅暮役勞筋苦骨簞食瓢飲晨炊星飯飢渴所致疾疫交集豈佛標徒行之義慜畜獸而不忍殘其刀哉今陛下何以為之伏惟慎之重之思菩薩之行為利益一切衆生應如是布施則經所謂不作色布施不作聲香味觸法布施其福徳東西南北四維上下虚空不可思量矣何必勤勤於住相彫蒼生之財崇不急之務臣以時政論之則宜先邉境蓄府庫養生力以釋教言之則宜救苦厄滅諸相崇無為伏惟陛下察臣之愚行佛之意務以理為上不以人廢言建中元年四月妃父王景仙駙馬髙怡獻金銅佛像以為夀上使謂曰有為功徳吾不欲為久矣舁而還之元和五年十月新羅王遣其子獻金銀佛像勅祠部主客為復合令鴻臚寺收管宜分析奏來者天下僧尼國朝已來並𨽻鴻臚寺至天寳二年𨽻祠部臣等據大唐六典祠部掌天下宗廟大祭與僧事殊不相及當萬務根本合歸尚書省為鴻臚寺亦未允當又據六典掌朝首之國七十餘畨五天竺國並在數内釋氏出自天竺國今陛下以其非中國之教已有釐革僧尼名籍便令係主客不𨽻祠部及鴻臚寺至為允當從之六年五月制僧尼依前令兩街功徳使收管不要更𨽻主客所度僧尼令祠部給牒雜録貞觀二年五月十九日勅章敬寺是先朝創造從今已後每至先朝忌日常令設齋行香仍永為恒式開元二年二月十九日勅天下寺觀屋宇先成自今已後更不得創造若有破壊事須條理仍經所司陳牒檢騐先後所詳七月十三日勅如聞百官家多以僧尼道士等為門徒徃還妻子等無所避忌或詭託禪觀禍福妄陳事渉左道深斁大猷自今已後百官家不得輙容僧尼等至家縁吉凶要須齋者皆依州縣陳牒牒寺觀後依數所云二十九日勅佛教者在乎清净存乎利益今兩京城内寺宇相望凡欲歸依足申禮敬如聞坊巷之内開鋪冩經公然鑄佛自今已後村坊市等不得輙更鑄佛冩經為業須瞻仰尊顔者任就寺禮拜須經典讀誦者勒於寺贖取如經本少僧為冩供諸州寺觀亦宜准此十二年六月二十六日勅有司試天下僧尼年六十已下者限誦二百紙經每一年限誦七十三紙三年一試落者還俗不得以坐禪對䇿義試諸寺三階院宜入寺大院十九年六月二十八日勅朕先知僧徒至弊故先塞其源不度人來向二十餘載訪聞在外有二十已下小僧尼宜令所司及府縣檢責處分又㑹昌五年七月中書門下奏以天下廢寺銅像及鐘磬等委諸道鑄事具泉貨門其月又奏天下士庶之家所有銅像並限勅到一月内送官如違此限並准鹽鐵使舊禁銅條件處分其土木等像並不禁所由不得因此擾人其京城及畿内諸縣衣冠百姓家有銅像並望送納京兆府自拆寺已來應有銅像等衣冠百姓家収得亦限一月内陳首送納如輙有隠藏並準舊條處分勅㫖宜依八月中書門下奏諸道廢毁寺鐵像望令所在銷為農器鍮石之像望令銷付度支勅㫖依六年八月勅準今年五月三日赦書節文如緣修飾佛像但用土木足以致敬不得用金銀銅鐵及寳玉等如有犯衣冠錄名聞奏僧道立位貞觀十一年正月十五日詔道士女冠宜在僧尼之前至上元元年八月二十四日詔凡有公私齋㑹及参集之處道士女冠在東僧尼在西不須更為先後至天授二年四月二日勅釋教宜在道教之上僧尼處道士之前至景雲二年四月八日詔自今已後僧尼道士女冠並宜齊行並集僧尼所𨽻延載元年五月十一日勅天下僧尼𨽻祠部不須屬司賔開元二十四年七月二十八日中書門下奏臣等商量緣老子至流沙闡化而佛法本西方興教使同客禮割屬鴻臚自爾已久因循積久聖心以𤣥元本系移就宗正誠如天㫖非愚慮所及㐲望過元日後承春令便宣其道僧等既緣改革亦望此時同處分從之至二十五年七月七日制道士女冠宜𨽻宗正寺僧尼令祠部檢校至天寳二年三月十三日制僧尼𨽻祠部道士宜令司封檢校不須𨽻宗正寺元和二年二月詔僧尼道士同𨽻左街右街功德使自是祠部司封不復聞奏㑹昌五年七月中書門下奏奉宣僧尼不𨽻祠部合係屬各有寺觀自宜住持如聞逺就山林别為蘭若兼亦聚衆公然來往妄說生緣輒在俗家居止即宜一切禁斷天寳五載二月二十五日京兆尹蕭炅奏私度僧尼等自今已後有犯請委臣府司男夫並一房家口移𨽻磧西唐㑹要卷四十九
