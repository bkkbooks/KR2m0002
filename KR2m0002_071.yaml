將軍李大亮曰公敦懿其心誠善事主每行夜自當丙夜遣郎將中郎將行甲乙丁戊等夜身先於人真將軍也開元六年六月四日敕左右武衛郎將及諸四色官等不在外配雜差之限左右驍衛左右武衛光宅元年改為左右鷹揚衛神龍元年二月四日復改為左右武衛左右威衛光宅元年改為左右豹韜衛神龍九年復左右威衛其年七月又改為左右屯衛景雲二年八月二十八日又改為左右威衛左右領軍衛龍朔二年改為左右戎衛咸亨元年十二月二十四日復為左右領軍衛光宅元年改為左右玉鈐衛神龍元年復左右領軍衛左右金吾衛武德四年因隋舊制為左右武候府龍朔年改為左右金吾衛貞觀十年十二月馬周奏諸衛鋪並令左右金吾中郎將自延仍各加果毅兩人助延隊景雲二年五月七日敕左右衛將軍縱非當上日每日一人押仗其左右金吾衛將軍亦一人押仗一人奏平安乾元元年二月二十二日敕左右金吾內外廊所緣墻壁廊宇器械等破碎並宜於當色月番人中簡擇巧兒隨事修理如更為創造緣墻宇所須一切以上俱録狀奏仍永為恆式寶應元年十月二十八日左金吾將軍臧希晏奏諸街鋪鼓比來依漏刻發從朝堂發遠處每至夜才到伏望今日以後減常式一刻發聲度絶違犯敕㫖依奏大厯三年十月三日左右金吾引駕仗自今以後每仗置判官兩人左右街使置判官一人並取金吾將軍衛佐二軍周年放選優與處分至十三年六月八日敕考滿後任依常式不在成優放遣至十四年七月敕左右金吾引駕仗三衛等承前以來抽充三畨將軍手力及都知判官等處并承㫖省承符區使仍取資課供用禁衛之人不合擅離職掌自今以後宜一切停建中元年七月詔以鴻臚寺所統左右威邊營𨽻金吾貞元二年九月敕諸衛上將軍自今以後每朝下馬致朝堂以來宜令左右金吾作等級差人引接其朝退一送至上馬處至二年閏二月人日敕四月一日以後五更二㸃放鼓契九月一日以後五更三㸃放鼓契日出後二刻傳㸃三刻進坐碑元和十三年十二月左右金吾引駕仗奏以舊例驅儺侲子等金吾將軍以下並具襴笏引入閣門謹案大儺者所以驅除羣厲合資威武其光儀襴笏之制常參朝服舊制未稱今後伏請各衣錦繡其中襪帶儀刀部引出入則與事合宜從之太和二年三月左右金吾引駕仗奏臣伏以宿衛官建素有名額因循相習漸慢常經自始授仕以來每隱懷憂懼縱寬尸祿猶患敗官况臣丙夜自當竊希往躅酉占親至遍閲前規據人數才二百以來凖元額不及大半去二月十三日已具陳奏令臣搜求諸頭冗剩量減所由資課詢謀舊例勘酌事情遂遺抽牧四百四十七人數既足他處驅使亦無缺闕輒具條流伏乞敕臣當司永為參守敕㫖依奏㑹昌三年十一月中書門下奏金吾左右衛副使近者未一年即以替換皆因請託莫展勤劬後望令三考滿即與換非時不得替換敕㫖依奏籍左右監門衛皇朝左右監門府置大將軍中郎將等龍朔二年改為監門衛舊置制凡京司應以籍入宫殿門者皆大司具其官爵姓名以移牒其門流外官雜色人等具記年紀顔狀門人送於監門者皆勘同然後聽入其財物器用應入官者所由以籍傍取右監門將軍判門司檢以出之其籍月一換左右千牛衛武德初為左右府顯慶元年改為左右千牛衛龍朔年改為左右奉宸衛咸亨年復為左右千牛衛延和元年五月二十八日敕千牛將軍中郎將等若自假故每日通融一人揮杖大將軍神龍元年二月十九日置以安國相王為之千牛龍朔年改為鳯咸亨年復為千牛龍朔年又改為奉裕神龍元年二月復為千牛至今不改永徽元年尚書左僕射禇遂良請千牛不簡嫡庶上表曰臣聞主祭祀之𦙍必貴於嫡長擢文武之才無限於正庶故知求賢之務有異承家前王制禮緣情務極永嘉以來王塗不競風俗頓乖嫡待庶而若奴妻遇妾而如婢廢情虧禮轉相因習搆怨於室取笑於朝莫能自悛死而無悔降及隋代斯流遂逺獨孤后罕雎鳩之德司牝雞之晨普禁庶子不得近侍自始及末怨聲未弭聖朝御厯深革前弊人以才進不論嫡庶於兹二紀多士如林今者簡千牛舍人為此制臣竊思審於理未安何者以父貴子不緣母也今以母非正室令子無貴仕則趙衰孕於越婢遙集産于胡嫗田文枚臯皆妾子也文則播美於強齊臯則有聲於大漢未聞前載有所間然儻側室之子負材而不用君棄之於上家輕之於下忠孝莫展友愛無施如此等人豈不懷怨憤雖隔千牛之選仍許二衛之官色類乃復稍殊捍禦至竟無别至如昨來檢責族人公孫父達及崔仁師等兒多是嫡子故知善惡由乎積習邪正寧限嫡庶必然之理不言可明開元十一年三月二十八日准令千牛二中上考始進一階既是衛官又須簡試全依職事頗亦傷煩今若五考滿考折為四考四考折為三二考不在折减其進六考既稱第宜倍折貞元七年十二月五日兵部奏事條取門地清華容儀整肅年十一以上十四以下試讀一小經兼薄解弓馬其䕃取嗣王任常品四品以上清資官宰輔及文武職事正二品以上官御史大夫諸司卿監國子祭酒京兆河南尹子孫主男見任左右丞諸司侍郎及左右庶子應前任并身役䕃者三品以上官仍須兼三品以上階其見任官䕃兼不須階庶孽酗酒掖疾等並不應限一䕃之下不得其人應補並周親有見任千牛亦不在應限所用䕃若是攝試檢其外兼管等非正闕釐務者並不在應補限應用贈䕃者須承前廢歷任清資事兼門地與格文相當者其贈䕃降品請凖格式處分敕㫖依奏諸衛中郎將永徽三年八月二十日避太子諱改中郎為旅賁郎將改為翊軍郎司階二員中候三員司戈執㦸各五員並天授二年四月五日置胄營舊為鎧曹垂拱元年二月改為胄統軍興元元年正月二十九日敕六軍宜各置統軍一人秩從三品上將軍貞元二年九月一日敕六軍先已有敕各置統軍一人十六衛冝各置上將軍一人秩從二品其左右衛及左右金吾衛上將軍俸料隨軍人馬等同六軍統軍其諸衛上將軍次于統軍支給自今已後內文武官闕於文武班中才望相當者相參叙用仍待以後各故事於本衛量置衛兵所司續商量條件奏聼進止仍舉故事置武班朝參其廊下食亦宜加給稍令優厚大厯四年七月敕入閣升殿中郎將等帶刀升殿職掌不輕冝委中書門下精加選擇仍叙品第於廊下别與置厨其千牛郎將宜准此貞元年九月十二日左右衛左右武衛左右驍衛左右威衛左右領軍衛左右監門衛左右千牛衛等上將軍大將軍宜于入宿至四年二月敕選人南北衛宿衛前任京官等前御帶衛者依資並與京官十一年正月敕置四品以下武官以授四夷歸附者仍定懷化大將軍以下俸錢有差初顯慶三年以四夷君長來朝者多乃置懷德歸化將軍以授之仍𨽻諸衛至是上以降附者名位有差故增置中郎將以下員按國史本紀及實録並為懷德歸化將軍而職官全及六典為歸化懷德將軍二說不同當必有誤者太和四年五月兵部奏伏以三衛皆出入禁署本署子弟期於恭恪近日頑弊皆非正身諸衛公然納者訪問亦不雇召士庶假䕃混雜搢紳隟院一開姦邪濫入實宜杜絶以序彞倫其資䕃三衛並請停廢兾清流品式茂皇猷敕㫖依奏開成元年五月中書門下奏入閣升殿接狀中郎准故事合是左右千牛衛中郎比緣用人未精去年一時除縣主壻四人臣昨日令勘尋乃仗一人身亡准舊例便是金吾仗司於諸位中郎差替並不申中書門下臣等商量從今以後左右千牛中郎將闕人及在假故遇入閣日望令金吾司申中書門下於南省郎官中擢定擇差訖先具名預申中書門下如臨日揀擇差遣不及則闕而不補兾免乖雜其郎官兼中郎有假故都督便於郎官中權定充替仍先具狀申中書門下敕㫖依奏天復三年二月以宰相崔轍守司徒兼侍中判六軍十二衛四月崔轍奏六軍十二衛名額空存實無兵士京師侍衛亦籍親請每軍召募一千一百共置六千六百人從之乃令六軍副使京兆尹鄭元規立格召募東宫諸衛左右衛率府龍朔二年二月四日改為典式衛咸亨元年十二月十四日復舊左右司御率府龍朔二年為左右司御衛咸亨元年改宗衛景雲二年八月二十八日改復為司御率府左右清道率府龍朔年為左右清道衛咸亨年改為虞武神龍元年復為左右清道率府左右監門率府龍朔年改為崇掖衛垂龍元年二月二日改為左右鶴禁府神龍元年復舊興元元年十月詔軍衛及率府五品以上正員武官得替及以理去任者冝令兵部准五品以上文官例每年作限條件聞奏唐㑹要卷七十一
