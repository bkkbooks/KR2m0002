  text: 唐㑹要卷七十一宋王溥撰州縣改置下河北道幽州開元十三年正月初一日改為大都督府無終縣萬歲通天元年移就玉田驛改為玉田縣漁陽縣武德元年置𤣥州貞觀元年廢來屬良鄉縣聖厯元年閏臘月二十九日改為固節縣神龍元年二月復為良鄉縣雍奴縣天寶元年八月二十四日改為武清縣三河縣武德初改為潞縣開元四年三月改為三河縣㑹昌縣如意元年置武崇縣景雲三年改為㑹昌縣瀛州高陽縣武德四年置蒲州貞觀元年州廢來屬博野縣武德二年置蠡州貞觀元年廢來屬莫州景雲三年六月十四日分瀛州置鄚州開元十三年十二月初二日始單用莫字唐興縣如意元年置武昌縣神龍元年二月四日改唐興縣長豐縣開元十年置鄚州開元十一年閏六月一日割漁陽玉田三門置媯州武德三年置北燕州貞觀三年改媯州長安三年移就清夷軍涿州新城縣太和六年十一月置古督亢之地恆州興元六年六月一日升為大都督府元和十五年二月改恆州為鎮州恆陽縣為曲陽縣恆嶽為鎮嶽避穆宗諱也井陘縣貞觀十七年六月十七日廢并州興鹿泉房山屬行唐縣長壽二年改為章武縣神龍元年二月四日改為行唐縣槀城縣天祐二年九月改為槀平縣信都縣同上年月改為堯都縣欒城縣同上年月改欒氏縣阜城縣同上年月日改漢阜縣臨城縣同上年月改為房子縣冀州龍朔二年十二月十六日改為魏州咸亨三年九月二十五日復為冀州癭陶縣天寶元年八月二十四日改為寧晉縣房子縣同上年月改臨城縣大陸縣武德四年改為象城縣深州貞觀十七年六月十七日廢先天元年四月十日又復置深州大厯三年八月割恆州行唐縣置以恆州靈壽定州恆陽二縣屬焉尋廢博州青平縣武德四年置博平縣貞觀十七年廢聊城天授三年更置天祐三年四月割𨽻鄆州聊城武陽武水高唐縣天祐三年四月並割𨽻鄆州昭義縣開成四年八月移於固鎮驛貝州宗城縣武德四年廢宗州來屬宗州置在徑城縣天祐三年八月割𨽻魏州鄃縣天寶元年八月二十四日改為夏津縣永濟縣大厯七年正月以張店為縣天祐三年八月割𨽻魏州易州五回縣開元二十三年三月十六日置遒縣天寶元年八月二十四日改為容城縣永樂縣同年月改為蒲城縣滄州胡蘇縣天寶元年八月二十四日改為臨津縣清池縣太和五月十日本道移奏於南羅縣內南皮縣武德初屬景州貞觀十七年廢景州來屬魏州龍朔二年十二月二十六日改為冀州仍置大都督府咸亨三年九月二十五日仍舊元城縣貞觀十二年六月十七日廢證聖二年三月二十一日又置開元十三年十二月二日移於郭下也昌樂縣武德五年八月置朝城縣貞觀十七年廢永昌縣元年又置改名聖武開元七年又改為朝城縣華縣貞觀元年廢華州來屬頓丘縣貞觀元年廢澶州來屬大厯七年廢置澶州澶州大厯七年正月析魏州頓丘縣之觀城店置觀城縣清豐店置清豐縣並割魏州臨黃縣並𨽻相州湯隂縣武德四年置林慮縣武德元年置五年廢貞觀十七年六月又置臨河內黃洹水縣並天祐三年八月割𨽻鄆州棣州武德四年七月十六日置貞觀六年十二月九日廢十七年六月十七日復置陽信縣㑹昌元年十一月淄青觀察使韋平奏棣州申請移陽信縣并鎮於縣南七十里八角寺南二里置城從之邢州柏仁縣天寶元年八月十四日改為堯山縣青山縣開成四年八月廢洺州曲周縣武德四年析洺州置清漳縣㑹昌元年三月並省分入肥鄉平思州等三縣衛州黎陽縣貞觀十七年六月十七日廢黎州來屬同日廢清淇縣至長安四年十二月二十三日於淇門復置縣景州長慶二年正月敕滄州弓高縣宜依舊為景州仍𨽻滄州觀察使至太和四年十二月滄州觀察使殷侑奏廢為景平縣乃從之德州歸化縣開元十三年橫海軍節度使鄭權奏當道管德州安德縣渡黃河南與齊州臨邑縣鄰接有灌家口草市一所頃者成德軍於市北十里築城名福城割管內安德平原平昌三縣五都置都知管勾當臣今請於此置前件城緣隔黃河與齊州臨邑縣對岸又居安德平原平昌三縣界疆境濶遠易動難安伏請於此置縣為上縣請以歸仁為名從之修縣安陵縣貞元十七年廢觀州來屬安州安平縣貞觀十七年六月十七日廢深州來屬北平縣改為徇中縣義豐縣改為立節縣並神功元年十月改至神龍元年二月五日各復本名唐昌縣至天寶元年八月二十四日改為陘邑縣毋極縣通天元年改為無極縣安喜望都二縣並武德四年置山南道荆州本大都督府上元元年九月改為江陵府荆門縣貞元二十一年六月置長元縣上元元年七月二十三日析枝江縣置為赤縣二年六月十四日廢枝江縣𨽻入長寧縣大厯六年十月七日廢為枝江襄州率道縣天寶七載三月二十七日改為宜城縣臨沮縣武德三年置重州貞觀元年廢州來屬開元十年五月二十八日改為南漳縣樂鄉縣本鄀州貞觀元年州廢來屬鄧城縣貞元二十一年五月以襄州為襄府改臨漢縣於古城為鄧城縣隨州開元二十五年六月十五日以客户編成十二鄉置城縣屬焉房州武德元年改為仙州又於竹山置房州貞觀八年廢州入仙州後郤置貞元元年五月𨽻山南東道天祐元年九月以金州為昭戎軍管房州至三年四月却𨽻山南道金州泉石縣聖厯三年改為武安縣神龍元年改為泉石後廢貞元元年十二月刺史姜公輔請復置從之黃丘縣天寶二年八月二十四日改為清陽縣大厯六年八月併入洵陽縣洵陽縣武德元年置洵州七年州廢來屬平利縣廢入西城縣唐州本顯州貞觀九年改唐州天祐三年四月刺史孫審符奏移理所於泌陽縣焉平民縣武德三年置荆州五年州廢縣割入湖州貞元元年廢州來