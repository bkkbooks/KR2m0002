body:
  text: 唐會要卷六十宋王溥撰御史臺武德初因隋舊制為御史臺龍朔二年四月四日改為憲臺咸亨元年十月二十三日復為御史臺光宅元年九月五日改為左肅政臺専在京管百司及監軍族更置右肅政臺其職員一準左臺令按察京城外文武僚以中宗英王府材石營之殿中御史石抱貞繕造焉神龍元年二月四日改為左右御史臺景雲三年二月二日廢右臺先天二年九月一日又置右臺諸按察使宜停其年十月二十五日又廢右臺依舊置按察使初置兩臺每年春秋發使春曰風俗秋曰廉察令地官尚書韋方質為條例方質刪定為四十八條以察州縣載初以後奉敕及巡每年不出使故事云臺門北開者法司主隂取冬殺之義或云隋初移都之時兵部尚書李圓通兼御史大夫欲使向者便近故開北門蘇氏駁曰此説或近之矣若取冬殺之義則東都臺門亦合北開何故南啓况本置臺司以察寃濫是有國者好生之德豈創冬殺之意以入人罪者乎故事御史臺無受詞訟之例有詞狀在門御史狀有可彈者即略某姓名皆云風聞訪知其後御史公方者漸少遞相推倚通狀人頗壅滯至開元十四年始定受事御史人知一日收收遂題告事人名乖自古風聞之義至今不改蘇氏駁曰御史臺正朝廷綱紀舉百司紊失有彈邪佞之文無受詞訟之例今則重于此而忘于彼矣故事臺中無獄須留問寄繫于大理寺至貞觀二十二年二月李乾祐為大夫别置臺獄由是大夫以下始各自禁人至開元十四年崔隱甫為大夫引故事奏掘去之以後恐罪人於大理寺隔街來往致有漏泄獄情遂於臺中諸院寄禁至今不改西臺舊東鄰宗正寺後移寺於廢右御史臺其寺舊地並隸臺司故事其百僚有姦非隱伏得専推劾若中書門下五品已上尚書省四品已上諸司三品已上則書而進之並送中書門下故事凡天下之人有稱寃而無告者令三司詰之三司御史大夫中書門下大事奏裁小事専遣開元二十七年二月二十七日敕御史臺宜置主事二人貞元七年六月二十七日敕御史臺每月别給料錢二百貫文充公廨雜費用八年正月御史臺奏伏以臺司推事多是制獄其中或有準敕便須處分要知法理又緣大理寺刑部斷獄亦皆申報臺司儻或差錯事須詳定比來却令刑部大理司直較勘必恐自相扶會縱有差失無由辨明伏請置司直一員冀斷結之際事無闕遺其糧料請取臺中諸色錢物量事支給其功優等請凖刑部例處分敕旨依奏九年二月御史臺奏今後府縣諸司公事有推問未畢輒捶鼓進狀者請却付司推問斷訖猶稱抑屈便往詣臺司按覆若實抑屈所由官録奏推典量決責如告事人所訴不實亦凖法處分元和四年御史臺奏諸道州府有違法徴科者諸委鹽鐡轉運度支巡院察訪報臺以憑舉奏從之五年三月御史中丞王播奏監察御史舊例在任二年五月轉凖具員不加今請仍舊殿中侍御史舊例在任十三月轉凖具員加至十八月今請減至十五月侍御史舊例在任十月轉凖具員加至三月今請減至十月從之十二年九月御史臺奏御史同制除官承前以名字髙下為班位先後或名在前身在外及到却在舊人之上後先有紊勞逸不均今請以上日為先後未上不得計月數從之十五年三月御史中丞崔植奏當臺新除三院御史受旨職事先後去闕元和十二年御史臺奏請應除御史職事但據上日為先後未上日不得計月數者其年九月七日敕不逾一箇月不在此限行立班次即以敕內先後為定臣伏以御史除官之時據來處各有逺近若據一月便為懲創恐乖舊制殊未合儀伏緣臺司職事各有定分先後次第不可逾越若行立班次既依敕名公事先後須繫到日則院長本職翻然在下制置錯亂無所遵承行之纍年轉見其弊伏請自今以後三院御史職事行立一切依敕文先後為定除拜上日便為月數須觀積效豈繫旬時如有除官以後赴職稽慢量道路逺近令臺司别其名聞奏須議懲責豈止顛倒職事而已從之長慶元年十一月御史臺奏應十惡及殺人鬭毆官典犯贓并偽造誣良隱盜竊盜及府縣推斷訖重論訴人等皆是姦惡之徒推鞫之時盡皆伏罪臨刑之次即又稱寃每度稱寃皆須重推與證平常被其追擾苦無懲革為弊實深伏請今後有此色賊臺及府縣并外州但計三度推問不同人皆有伏欵及三度斷訖結更有論訴一切不重推問限其中縱有進狀敕下如是己經三度結斷者亦請受敕處聞奏執論如本推官典受賄賂推斷不平及有寃濫詞狀言訖便可立驗者即請以重推如所告及稱寃推勘又虛除本犯是死刑外餘罪於本條更加一等如官典取受有實亦請本罪更加一等如所訴寃屈不虛其第三度推官典請於本法外更加一等貶責其第三度官典亦請節級科處從之二年正月御史中丞牛僧孺奏諸道節度觀察等使請在臺御史充判官臣伏見貞元二年敕在中書門下兩省供奉官及尚書省御史臺見任郎官御史諸司諸使並不得奏請任使仍永為常式近日諸道奏請皆不守敕文臣昨十三日已于延英面奏伏蒙允許舉前敕不許更有奏請制曰可時段文昌自宰相出鎮庸蜀奏諫官柱史南宫郎三人為僚佐以其職帶台鉉上故可之不逾年又奏侍御史王神伯監察蘇景胤留中不可執法舉舊章議者以為當三年十一月御史臺奏伏以臺司奏報並無舊條昨因左巡奏踈闕已凖敕科罰聞奏訖臣今檢尋條件本不該詳事須添改令可遵守請添一節文應諸司科決人致死雖不死而事異於常稍涉非理者並凖前條奏聞禁城內不在此限庶得從今已後免有遺闕敕旨依奏寶厯元年九月御史臺奏常參官及六品以下分司官比來淹延動經纍月今後常參官分司敕下後二十日發其六品以下分司官請待臺牒到發限若妄稱事故不發常參官聽進止六品以下官臺司舉罰兩月俸料從之太和元年十二月御史臺奏伏以京城囚徒凖敕科決者臣當凖舊例差御史一人監決如囚稱寃即收禁聞奏便令監決御史覆勘者伏慮監決之時各懷疑憚務求省便難究寃辭恐至無告屈之人失陛下好生之理且臺司本定四推以讞疑獄六察職事以重不合分外領推伏請自今以後有囚稱寃者監察御史聞奏敕下便配四推所冀獄無寃滯事得倫理從之四年九月御史奏諸司諸使及諸州府縣監院等公事申牒臣當臺各令遵守時限并臣當司行牒勘事多緣凖敕勘刑獄或是逺方人事有寃抑凡於關繫盡須勘逐事節不精即慮滯屈比來行牒有纍月不申兼頻牒不報者遂使刑獄淹恤懼涉慢官其間或有須且禁身動經時月者若無條約弊恐轉深臣等今勘責各得逺近程限及往復日數限外經十日不報者其本判官勾官等各罰三十直如兩度不報者其本判官勾官各罰五十直如三度不報者其本判官勾官各罰一百直如涉情故違敕限者本判官勾官牒考功書下考如經過所由輒有停滯其所由官等節級别舉處分其間如事須轉行文牒諸處追尋亦須具事由先報敕旨依奏九年八月御史臺奏京兆尹及少尹兩縣令合臺參官等舊例新除大夫中丞府縣官自京兆尹以下並就臺參見其新除三院御史並不到臺參亦不於廊下參見此為闕禮尤甚伏請自今以後應三院有新除御史等並請敕京兆尹及少尹兩縣令就廊下參見冀使稟奉之禮不虧臨制之儀可守臺司令史及驅使官并諸色所由有罪犯須科決等或有罪犯稍重者皆是愚人常態不可奏聞便欲隨事科舉又緣臺杖稍細以細杖而正大罪必凶狡不懲自今後如有情故難容不足上塵聖聽者許臣等據所犯判決枤下數勒送京兆府用常行杖科決訖報冀得戒懼之意稍嚴姦欺之心可革敕旨依奏大中元年四月御史臺奏伏以御史臺臨制百司紏繩不法若事簡則風憲自肅事煩則綱紀轉輕至如婚姻兩競息利交關凡所陳論皆合先陳府縣如屬諸軍諸使亦合于本司投論近日多便詣臺論訴煩褻既甚為弊頗深自今已後伏請應有論理公私債負及婚田兩競且合于本司本州府論理不得即詣臺論訴如有先進狀及接宰相下狀送到臺司勘當審知先未經本司論理者亦請送本司如已經本司論理不平即任臺司論訊若臺司推勘寃屈不虛其本司本州元推官典並請追赴臺推勘量事情輕重科斷本推官若罪輕即罰直書下考稍重即停任貶降以此懲責庶免曠官臣今月三日已於延英面奏令臣將狀來敕旨依奏三年十一月御史臺奏應三院御史新除授月限伏以當司官三十餘員朝廷舊例月限守官年勞考績今監察御史以二十五月為限殿中侍御史十八月侍御史十三月所主公事起自出使推劾諸色監當經厯六察紏繩官司知左右巡使監臨倉庫四推鞫獄兩彈舉事皆無敗闕方得轉遷承前逺地除官或三月五月然始到京所務逗留遷延時月年終考課使繫虛月官事勞苦併在舊人侍御史周嵗而遷或到城欲及滿嵗監察二年為限或在外有至半年致此依違曾無督責臣請起今已後應當司官除新授者並請以上後繫月仍以上日在後者為新人不更數虛月不唯分月直之勞苦抑亦促逺來之道途又三館奏請御史充職等伏以臺司三院御史職在専臨如繫他曹必有所紊况推鞫公事察視百司無不急急以副期限倘或官留此地志徇異銜固非便宜實亦乖當如書府或須奏請南宫可輟郎官兩館忽將闕人北省自有遺補事理至便兼不曠官伏乞聖慈察臣當司公事繫重特敕中書門下自此更不許三館奏取御史充職兼見有者亦乞落職放還敕旨依奏其年十二月御史臺奏三院令史凖請刑部大理寺例許七考放選敕首出使及推制獄減二年勞餘依四年二月御史臺奏應文武常參官本朝及入閣退朝不到并連請假故久闕參朝等臣今月二十一日延英面奏進止以班行務在嚴肅令臣切加提舉者臣伏見元和元年御史中丞武元衡奏止于禮部兵部吏部尚書侍郎郎官等選舉限內久廢朝參雖事在奉公猶奏請釐革近者以久絶提舉稍涉因循應文武常參官多妄請假故不妨人事無廢宴逰多務便安有虧誠敬以至上勞聖念俾肅朝行臣忝憲司親承睿旨茍或避事實虞曠官臣請起今以後文武常參官等除式假及疾病的然為衆所知外有以事故請假者並望許臣舉察録奏其所陳假牒請凖常條書罰再不到臣請倍罰頻三朝不到便請具名銜奏聽進止其進朝入閣近例全合赴班一不到凖常條書倍罰頻兩朝不到便請具名銜奏聞所冀臣僚稍加惕厲班列得以整齊敕旨依奏東都留臺舊制中都留臺官自中丞已下元額七員中丞一員侍御史一員殿中侍御史二員監察御史三員天寶十四年安祿山陷東都殺留臺御史中丞虞奕奕臨難不茍免居位守死太常諡曰貞烈大厯十年以檢校駕部郎中兼侍御史何運出納使蔣沇兼為御史中丞仍東都留臺十四年七月以吏部郎中房宗偃為御史中丞仍東都留臺充東都畿汝觀察處置使建中二年六月以檢校祕書少監永平軍節度副使鄭升則為御史中丞東都留臺充東都畿汝觀察處置使貞元十六年十二月以給事中姚齊梧為御史中丞仍東都留臺元和二年四月以刑部郎中兼侍御史知雜事盧坦為御史中丞東都留臺十三年三月以權知御史中丞崔元略為東都留臺自後但以侍御史殿中侍御史監察御史共主留臺之務而三院御史亦不常備焉御史大夫龍朔二年二月十四日改為大司憲咸亨九年十二月二十三日復為御史大夫至今不改故事侍御史以下與大夫抗禮光宅元年九月韋思謙除右肅政大夫遂坐受其拜或以為言思謙曰國家班列自有等差奈何以姑息為事耶其後監察又與之抗禮至開元十八年有敕申明隔品致敬其禮不改至二十四年六月李適之為大夫又坐受拜其後監察又與之抗禮至今不改故事大夫與監察競為官政略無承稟至開元十四年崔隱甫為御史大夫一切督責之事無小大悉令資決稍有忤意列上其罪前後貶出者過半羣僚惕然上常謂曰卿為大夫深副朕所委也會昌二年十二月檢校司徒兼太子太保牛僧孺等奏狀奉十一月二十八日敕中書門下奏御史大夫秦為上卿漢為副相又漢末復為大司空與丞相俱為三公掌邦國刑憲肅政朝廷其任至重品秩殊峻望凖六尚書例升為正三品御史中丞為大夫之二緣大夫秩崇官不常置中丞為憲臺之長今九寺少卿及祕書少監與國子監司業京兆尹并府寺省監之二皆為四品唯御史中丞官業雖重品秩未崇升為正四品下為大夫之二令不隔品亦與丞郎出入秩同以重其任緣關朝廷典制須行之可久必得博盡羣議詢謀僉同望令兩省御史臺五品已上尚書省四品以上太子太保太常卿參議聞奏者伏以前代帝王建官設位之制互有沿革升降廢置蓋取于一時所宜茍得其宜則為當代之美臣等伏據六典故事御史大夫御史中丞等官厯代之制位不常定至於刑憲之所倚則古今之任不殊今陛下方𢎞約法之道俾增崇品秩同秩丞郎蓋千載一時之盛美也臣等又據故事御史大夫總朝廷刑憲掌邦國紀綱峻其秩位亦計所宜御史中丞雖官二大夫多不並置専席既稱獨坐隔品豈合迭居今命秩資升遷實為允當臣等參詳事理衆議僉同伏請著于典章永為定制敕旨依奏御史中丞隋以國諱改中丞為治書侍御史武德初因隋舊制不改貞觀二十三年七月三日避髙宗諱改為御史中丞龍朔二年二月四日改為司憲大夫咸亨元年十二月二十三日改為御史中丞西臺中丞同一廳至開元二十一年有制以賦餘修百司𪠘宇西臺中丞裴寬始以舊監察創置中丞東廳東臺二中丞亦同廳開元二十一年十一月大夫崔琳奏割祕書省東北地回改卜造二中丞遂各别廳開元二十二年二月置京畿採訪處置使以中丞為之自是不改時御史大夫李尚隱不充使以中丞盧奐為之至永泰元年以後遂以大夫王翃崔寧盧杞等為使元和四年七月御史中丞李夷簡奏京兆尹楊憑前為江西觀察使贓罪及他不法事敕付御史臺刑部尚書李鄘大理卿趙昌鞫問貶憑賀州臨賀縣尉又追捕憑前江西判官監察御史楊瑗繫在臺命大理少卿胡珦左司員外郎胡證侍御史王顗同推初夷簡自御史出巡官屬憑頗踈縱不顧接之夷簡常切齒又憑歸朝參修第永寧里廣蓄妓妾於永樂里夷簡乘衆議舉劾前事及下獄置對數日未得其事夷簡持之益急上聞且貶焉上即位以法制臨下夷簡首舉憑罪故時議以為宜然繩之太過物論又譏其深切矣二年八月僧鑒虛付京兆尹府決重杖一頓處死仍籍其財産鑒虛在貞元中以講説為斂用貨利交權貴為姦濫事發中外掌權者更欲搖動之有詔初命釋其罪時御史中丞薛存誠不受詔翌日又宣旨曰吾要此僧面詰其事非赦之也存誠又奏曰鑒虛罪狀已具陛下將召之請先貶臣然後可取上嘉其有守遂令杖殺之其年洪州監軍誣奏信州刺史李位謀大逆追赴京師上敕令伏仗內鞫問御史中丞存誠一日三表請付位於御史臺及推按無狀位竟得雪未幾授存誠給事中數月中丞闕上謂宰相曰宜無如存誠遂復授之九年裴度為御史中丞奏崔從為侍御史知雜事及度作相奏自代為御史中丞從正色立朝彈奏不避權幸事關臺閣或付仗內者必抗章疏論列請歸有司凡所取御史必先質重亷退者時論嘉之開成元年五月上御紫宸殿宰相李固言奏曰御史中丞李珝在臺雖無甚過以為人踈易不稱此官天下紀綱有司繩凖茍用人非當則紊亂典章上曰李珝官業應不甚舉然為人豈不長厚耶固言對曰臣所奏緣與御史中丞不相宜人即長厚彈憲奏司事若至難官要得宜者會昌二年十二月中書門下奏諸道諸使奏兼御史中丞伏以御史中丞近升品秩向外兼攝亦宜相重臣等商量今日已後諸道節度使及度支解縣權鹽鐵副使等並須帶檢校四品官方得奏請其正郎以下不在奏限諸郡刺史亦須地望雄重兵額稍多處方得兼授如在前已兼中丞須再除者不在此例從之大中三年以御史中丞魏謨兼户部侍郎判本司事謨奏曰御史臺紀綱之地不宜與泉貨吏雜處乞罷中司專綜户部公事從之乾符三年二月四日御史中丞李造奏外州府有禁繫罪人關連京百司請委本州除合抵極法外踈理訖關奏從之侍御史四員長安二年始置內供奉在正員之外仍不得過本數庶僕減正員舊有六員奏彈三司西推東推贓贖理匭其三司理事則與給事中中書舍人更直朝堂受表今有四職謂知雜公廨彈事謂之推彈廨雜今知雜侍御史多兼省官以為之武德四年李素立為監察御史丁憂髙祖令所司奪情授一七品清要官所司擬雍州司戶參軍上曰此官要而不清又擬祕書郎上曰此官清而不要遂授侍御史貞元六年盧羣入拜侍御史有人誣告故尚父子儀嬖人張氏宅中有寶玉者張氏兄弟又與尚父家子孫相告訴詔促具獄羣上奏言張氏以子儀在時分財子弟不合爭奪然張氏宅與親仁宅皆子儀家素有大勳伏望陛下特赦而勿問使私自退省上從之時人稱其知大體二年六月侍御史竇羣奏常參官假滿惟三品官至王府傅已上即於正衙參假其餘不在此限臣伏見諸司官或位列通班職居要劇其左右丞諸司侍郎御史中丞給事中中書舍人並是四品五品清要官不在參假例或彌旬懸曠皆不上聞或未滿一日例不舉奏臣今請尚書省四品官御史臺五品官中書門下五品官請假並同三品例參假度故必知勤惰無隱臣職當彈奏故輒陳事宜敕旨依奏太和三年華州刺史宇文鼎户部員外郎盧允中坐贓文宗怒將殺之侍御史盧𢎞正奏曰鼎為近輔刺史以贓汚聞死固恆典但取受之首罪在允中監司之責鼎當連坐帝然之減鼎三等殿中侍御史隋末不置武德五年三月二十二日置四員貞觀二十二年十二月九日大夫李乾祐奏增兩員以李文禮張敬一為之文明元年又制殿中裏行以楊啓王侍徴為之凖吏部式以三員為定額監倉庫本是察院職務近移入院第一人監倉庫第三監庫檢所移日月未獲龍朔三年五月雍州司户參軍韋絢除殿中侍御史或以為非遷中書侍郎上官儀聞而笑曰此田舍翁擬論殿中侍御史赤墀下供奉接武夔龍簉羽鵷鷺奈何以雍州判左相比時以為清議貞元十年四月敕凖六典殿中侍御史兩京城分知左右巡察其不法之事謂左降流移停匿不去及妖訛宿宵蒱博盜竊獄訟寃濫綱典貨易賦斂違法如此之類方合奏聞比者因循務求細事既甚煩碎頗失大猷宜令自今已後據六典合舉之事所司有隱蔽者即具狀奏聞其餘常務不須更聞太和元年六月御史大夫李固言奏監太倉殿中侍御史一人監左藏庫殿中侍御史一人臺中舊例取殿中侍御史從上第一人充監太倉使第二人充監左藏庫使又各領制獄伏緣推事皆有程限監使遂不専精往往空行文牒不到倉庫動經纍月莫審盈虛遂使錢穀之司狡吏得計至于出入多有隱欺臣今商量監倉御史若當出納之時所推制獄稍大者許五日一入倉如非大獄許三日入倉如不是出納之時則許一月兩入倉檢校其左藏庫公事尋常繁閙監庫御史所推制獄大者亦許五日一入庫如無大獄常許一旬內計會取三月入庫勾當庶使當司公事稍振綱條錢穀所由亦知警懼敕旨依奏監察御史武德初因隋舊制置八員貞觀二年二月九日御史大夫李乾祐奏加兩員以李義琛韋務靜為之龍朔元年八月圻州定襄縣尉王本立為監察御史裏行裏行之名始於此六典云裏行始于馬周未知孰是初皆帶本官祿俸於本官諸如未即真有故停即以本官赴選文明元年自王賓以後不復更銜本官且以裏行為名至今不改天后時又有臺使八人俸亦于本官請餘並同監察時人呼為六指吏部式監察裏行及試以七員為定額開元初又置裏行使無員數監察御史職知朝堂正門無籍非因奏事不得入至殿庭在栖鳯閣南望殿中侍御史以從觀象門出若從天降至開元七年三月敕並令隨仗入閣西監察院即今中丞東廨是也中丞裴寬因修廨宇遂移監察院于十道使院置之舊院遂為中丞𪠘宇杜易簡御史臺雜注云監察御史自永徽以後多是敕授雖有吏部注擬門下過覆大半不成至龍朔中李義府掌選寵任既崇始注得御史李義府敗無吏部注者凡左右通事舍人等亦然蘇氏駁曰員外郎御史并供奉官進名敕授是開元四年六月十九日敕杜易簡著雜注以後猶四十年為吏曹注擬矣興元元年十月四日敕監察御史六人承前所定皆是從下次舊例從下又合出使若一人出使兼有故則六察御史遞相移改今請令監察從上第一人察吏部禮部第二人察兵部工部第三人察戶部刑部每年終議其殿最貞元二年五月御史中丞竇參奏得監察御史鄭襄狀凖六典應郊廟祀祭皆御史監之蓋職在省其器服閲其牲牢有不修敬則舉劾聞奏主者薦獻交神明者所務不同凖式齋官有故許通融行事公事數人可得通攝其監察御史唯有一人舊例有故便闕者伏以祀事肅恭國家大典苟無糾察恐虧慎重却請以後監察御史誓戒後有假及改轉者許續差御史令沐浴潔服往所冀官次有常禮物嚴備從之四年八月檢校司徒兼太子太保李勉薨至德初勉從上至靈武拜監察御史屬朝廷用勳勉舉劾不敬拘之有司肅宗原之而謂左右曰吾有李勉始知朝廷之尊矣十一年二月黔中監察御史崔穆為部人告贓二十七萬貫及他犯遣監察御史李直方往黔州覆按近事雨晦無對見者是日雨止重至延英召見直方遣焉十九年十二月監察御史崔逺笞四十配流崖州建中元年敕京城諸軍諸使及府縣季終命御史分曹巡按繫囚省其寃濫以聞近年以北軍職在禁密但移牒而已御史未嘗至逺在官近不諳故事至右神䇿軍云奉制巡按軍使等以為特有制命傾軍驚愕奏之上發怒故有此命元和四年五月御史臺奉凖舊例監察御史從下第六各察尚書省一司又凖興元元年十月敕令監察御史從上第一人察吏部禮部第二人察兵部工部第三人察戶部刑部伏以監察第一二人已充監察御史及館驛等使新人除出使外並無職掌無以觀其能否今請守舊制新人分察從之太和二年郊廟告祭差攝三公行事多以雜品監察御史栁璟奏曰凖開元二十三年敕宗廟大祠宜差左右丞相嗣王特進少保少傅尚書賔客御史大夫又凖二十五年敕太廟五享差丞相師傅尚書嗣郡王通攝餘司不在差限又元和四年敕太廟告祭攝官太尉以宰相充其攝司徒司空以僕射尚書師傅充餘司不在差限比來吏部因循不守前後敕文用人稍輕請自今年冬季敕吏部凖開元元和敕例差官從之八年九月御史臺奏當司應六察官伏凖元和四年五月二十日敕監察御史六人分察尚書省從下一人察吏部其次察御部省伏以監察在臺職當使役或有出入推按例合差遣新人每因一人奉使須數員轉職既頻移易使致因循舉察之務難得精審今請除監察館驛兩處以次人便専察吏部其下便依次轉差所冀察務有常公事知守敕旨依奏開成元年正月中書門下奏監察太倉左藏庫御史請於新入臺監察中擇清強幹用兩人分監倉庫全放朝謁每月除本官俸錢外别給見錢三十千隔日早入敕旨依奏大中四年九月十六日御史臺奏凖舊例京兆府凖敕科決囚徒合差監察御史一人到府門監決御史未至其囚已至科決處縱有寃屈披訴不及今後請許令御史到府引問如囚不稱寃然後許行決其河南府準此諸州有囚死仍委長官差官監決並先引問從之唐會要卷六十
