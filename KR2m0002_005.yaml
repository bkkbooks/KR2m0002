body:
  text: 唐會要卷五宋王溥撰諸王舊制親王食封八百户有至一千户公主三百户長公主加十户有至六百户髙宗朝以沛英豫三王及太平公主武后所生食封逾於常制垂拱中太平公主一千二百户聖厯初相王太平公主各三千户長安中壽春王兄弟五人各三百户神龍初相王太平公主各加至五千户衛王三千户溫王二千户成王七百户壽春公主加至七百户嗣雍王衡陽王臨淄王巴陵王中山王加至七百户安樂公主二千户長寧公主一千五百户宣城公主宜城公主以下各一千户定安公主一千户相王女為縣主者各三百户衛王升儲位相王又加至七百户太平公主加至五百户前已封五千户此特更加耳安樂公主加三千户長寧公主加至二千五百户宜城公主以下各加至二千户唐隆初嗣雍王壽春王封為親王各加至一千户開元中寧王二千五百户岐王薛王各五百户申王四千户邠王一千八百户皇妹為公主一千户咸宜公主加至一千户其後皇子封王者二千户皇女為公主者五百户又諸皇女為公主者例加一千户其封數神龍中相王太平長寧安樂公主皆以五千為限雖水旱亦不破色以正租庸充數開元以後以四千為限初貞觀中髙宗為晉王以文德皇后最小子於后崩後纍年太宗憐之竟不令出閣髙宗朝睿宗為殷豫王雖長成亦以則天最小子不令出閣嗣聖纂大位聖厯初封為相王始出閣中宗時以燕王重福失愛出遷外藩衛王重俊為太子又與成王千里等起兵將誅韋后故溫王重茂雖年十六七竟亦居宫中先天之後皇子幼則居東內封後以年漸長成乃於安國寺東附苑城同為大宅分院居之名為十王宅令中官押之於夾城中起居每日家令進膳又引詞學工書之士入教謂之侍讀十王謂慶忠棣鄂榮光儀潁永濟蓋舉全數其後盛儀壽陳豐恆凉六王又就封入內宅開元二十五年鄂光得罪忠王繼大統天寶中慶棣又歿唯榮儀十四王居內而府幕列于外坊歲時通名起居而已外諸孫長成又於十宅外置百孫院每歲幸華清宫側亦有十王宅百孫院十王宫人每院四百餘人百孫院三四十人又於宫中置維城庫諸王月俸物納之以給用諸孫納妃嫁女亦就十宅中太子不居於東宫但居于乘輿所之别院太子之子亦分院而居婚嫁則同親王公主於崇仁里之禮院髙祖二十一王衛王𤣥霸追諡懷巢王元吉建成同謀伏法諡刺楚王智雲荆王元景房遺愛同謀伏法漢王元昌承乾同謀伏法豐王元亨周王元方徐王元禮韓王元嘉事具雜録彭王元則諡曰忠鄭王元懿諡惠霍王元軌虢王元鳯道王元慶諡孝鄧王元裕諡康魯王靈夔舒王元名丘神績所陷死非其罪江王元祥諡安密王元曉諡貞滕王元嬰太宗十三王楚王寬吳王恪事具濮雜録王泰諡恭齊王祐庶人蜀王愔庶人諡悼蔣王惲為人誣告惶恐自殺越王貞事具雜録紀王慎江王囂諡殤趙王福曹王明庶人賢通謀徙於黔州而自殺代王簡髙宗三王原王孝諡悼澤王上金周興誣告恐懼自殺許王素節事具雜録中宗一王譙王重福謀反伏法睿宗一王隋王隆悌𤣥宗十九王棣王琰鄂王瑤得罪自殺光王琚為人誣告死非其罪夏王一事具雜録儀王璲潁王璬懷王敏諡哀永王璘事具雜録壽王瑁延王玢盛王琦濟王環義王玼信王理豐王珙言不遜賜死恆王瑱涼王璿汴王璥肅宗十一王越王係西平王佖追封衛王彭王僅兖王僴涇王侹襄王僙靈昌王榮杞王倕邵王偲定王侗淮陽王僖追封宋王代宗十八王均王遐追封睦王述丹王逾恩王連韓王逈簡王遘欣王造韶王暹嘉王運端王遇恭王通循王遹原王逵雅王逸隋王迅益王乃荆王選追封蜀王遡德宗九王舒王誼本名謨通王諶䖍王諒肅王詳資王謙代王諲始王縉雲昭王誡欽王諤珍王諴順宗二十王郯王經均王緯溆王縱密王網莒王紓郇王綜邵王約宋王結集王緗冀王絿和王綺欽王績衡王絢舊唐王在欽王績上會王纁福王綰舊唐書福王綰下有珍王繕撫王紘嶽王緄袁王紳桂王綸翼王綽舊唐書翼王綽下有蘄王緝憲宗十五王澧王惲深王悰洋王欣絳王悟建王恪鄜王憬瓊王悅沔王恂婺王懌茂王愔淄王協衡王憺澶王㤝彭王惕棣王惴穆宗一王安王溶敬宗四王梁王休復襄王執中紀王言揚陳王成美開成四年十月立為皇太子求行册禮尋降為陳王文宗一王蔣王宗儉武宗四王益王峴兖王岐德王嶧昌王嵯宣宗十一王郢王洞雅王涇衛王灌夔王滋慶王沂濮王澤鄂王潤懷王洽昭王汭康王汶廣王澭懿宗六王魏王佾凉王侹蜀王佶威王侃吉王保文德九年授開府儀同三司檢校太𫝊食邑三百户睦王倚僖宗二王建王震益王升昭宗八王䖍王禊沂王禋遂王禕景王祕祁王祺雅王禎瓊王祥棣王祤並乾寧五年四月封雜録韓王元嘉少好學聚書至萬卷皆文句詳定祕府不及又愛碑文古跡多得異本閨門修整有類寒素與其弟靈夔相友愛兄弟相見如布衣之禮修身潔已內外如一當代諸王莫能及者唯霍王元軌抑其次焉元嘉子黃國公撰少以文才稱諸王子之中與琅琊王沖為一時之秀霍王元軌初為蜀王徙封吳王後為霍王太宗嘗問羣臣曰朕子弟孰賢侍中魏徴對曰臣愚昧不盡知其能唯吳王數與臣言未嘗不自失上曰朕亦器之卿以為前代誰比徵曰經學文雅亦漢之閒平也由是寵遇彌厚因令妻徴女焉又嘗從太宗逰獵遇羣獸命元軌射之矢不虛發太宗撫背曰汝武藝過人恨今無所施焉當天下未定我得汝豈不安乎太宗崩去職毁瘠過禮自後常布衣示有終身之戚焉每至忌辰輒數日不食後徙封霍王為絳州刺史遷徐州元軌前後為刺史唯閉閣讀書吏事責成於長史司馬謙慎自守與物無忤不妄接士在徐州日唯與一處士劉𤣥平為布衣之交人或問𤣥平王之所長答曰無問者往而復之𤣥平曰夫人有短所以見其長至於霍王無所不備吾何以稱之哉為定州刺史有突厥來寇元軌令開門偃旗寇疑有伏懼而宵遁州人李嘉運與賊連謀事泄髙宗令收按其黨元軌以强寇在境人心不安唯殺嘉運餘無所及因自劾違制上覽表大悅謂使者曰朕亦悔之向無王則失定州矣有王文操者遇賊二子鳳賢以身蔽捍文操獲全二子皆死縣司抑而不申元軌察之遣使弔祭表其事詔並贈朝散大夫令加旌表其禮賢愛善如此後因入朝屢上表陳時政得失多有匡益髙宗甚尊重之及在外藩朝廷每有大事皆密制問焉髙宗崩與侍中劉齊賢等知山陵事齊賢服其諳練謂人曰非我輩所及元軌嘗使國令徵封令白請依諸國賦物貿易取利元軌曰汝為國令當正吾失反說吾以利耶拒而不納道王元慶歷趙豫滑徐沁衛州刺史皆以政聞事無不謹及母薨請躬修墳墓優詔不許鄧王元裕好學善談名理與典籖盧照鄰為布衣之交舒王元名聰悟髙祖在大安宫時太宗晨夕使尚宫起居送珍饌元名保傅等謂元名曰尚宫有品秩髙者見宜拜之元名曰此我二哥婢也何用拜為太宗聞而壯之曰此真我弟也封王之後歷數郡刺史元名性髙潔罕問家人産業朝夕矜莊門庭清肅嘗誡其子豫章王亶等曰藩王所乏不慮無錢財官職但勉行善事忠孝持身此吾志也及亶為江州刺史以善政聞髙宗手敕褒美元名以賞其義方之訓髙宗每欲授元名大州刺史固辭曰忝預藩戚豈以州郡户口為仕進之資辭情懇到故在江州向二十年賞玩林泉有塵外之意垂拱中轉青州又拜鄭州州境鄰接都畿諸王及帝戚涖官者或不檢攝家人為百姓所苦及元名到大革其弊江王元祥貪鄙多聚金寶營求無厭為吏人所患時滕王元嬰蔣王惲虢王鳯亦以貪暴為人惡之有授得其府官者以比嶺南惡處謂之語曰寧向儋崖象白不事江滕蔣虢滕王元嬰為金州刺史頗驕縱動作無度髙宗與書誡之曰王地在宗支寄深磐石幼聞詩禮夙奉義訓實冀孜孜無怠漸以成德豈謂不遵軌轍踰越典章且城池作固以備不虞關鎖閉開須有常凖鳩召散樂并集府寮嚴關夜開非復一度遏密之悲尚纒比屋王以此情事何紛紜又巡省百姓觀風問俗遂乃驅率老幼借狗求鷹志從禽之娛忽黎元之重時方農要屢出畋逰以擾百姓將為笑樂取適之方亦應多緒何必此事方得娛歡晉靈虐主未可取則趙孝文趨走小人張四郎優倡賤𨽻王親與博戲極為輕脫一府官寮何所瞻望凝寒方甚以雪埋人虐物既深何以為樂家人奴僕侮弄官人至於此事彌不可長朕以骨肉至親不欲致王於法今與王下上考以愧王心人之有過貴在能改國有憲章私恩難再興言及此慙抱盈懷吳王恪授安州都督及將赴職太宗以書誡之曰吾君臨億兆表正萬邦汝地居茂親當維藩屏勉思橋梓之道善侔間平之德以義制事以禮制心三風十愆不可不慎如此則勉固磐石永一維城外為君臣之忠內有父子之孝宜自勵志以朂日新汝方違膝下悽戀何已欲遺汝珍玩恐益驕奢故誡此一言以為庭訓恪有文武才太宗嘗稱其類已既名望素髙甚為物情所向長孫無忌輔立髙宗深所忌嫉永徽中會房遺愛謀反遂因事誅恪以絶衆望四海寃之太宗以魏王泰愛好文學特令就府别置文學館任自召引學士又以泰腰股洪大趨拜稍難復令以小輿舁至於朝所其寵異如此後司馬蘇朂以自古名王多引賔客以著述為美勸泰請撰括地志遂奏引著作郎蕭德言等就府修撰數歲方畢及上表之日詔令付祕閣賜泰物萬段德言等賜物有差貞觀十六年四月詔泰移居武德殿泰為太宗所愛禮秩如嫡魏徴上疏諫曰陛下愛魏王宜使知定分抑其驕奢不處嫌疑之地今武德殿近儲后焉上陵下替不可以訓太宗曰我幾錯誤遂遣泰歸本第十七年五月上親謁太廟以謝承乾之過魏王泰以罪降爵為東萊郡王太宗因謂侍臣曰自今太子不道藩王窺伺者兩棄之𫝊之子孫以為永制於是列宫寮等各以大義責之流降有差初承乾既廢魏王泰因入侍奉太宗面許立為太子翌日謂侍臣曰泰昨入見自投我懷中云臣今日始得與陛下為子是更生之日臣有一孽子臣百年之後當為陛下殺之傳國晉王父子之道固當天性我見其如此甚憐之褚遂良進曰陛下失言伏願審思無令錯誤也安有陛下百年之後魏王持國執權為天下主而能殺其愛子傳國晉王者乎陛下比者立承乾為太子復寵魏王愛之踰嫡嫡庶不分所以至今日既立魏王伏願陛下别安置晉王始得全矣太宗涕泗交下曰我不能因起入內是日太宗御兩儀殿羣臣盡出詔司徒長孫無忌司空房𤣥齡兵部尚書李績諫議大夫褚遂良謂曰我三子一弟所為如此我心無聊因自投於床無忌等爭趨抱持太宗抽佩刀無忌驚懼遂良於太宗手中爭取佩刀以授晉王無忌等請太宗所欲立曰我欲立晉王無忌曰謹奉詔有異議者臣請斬之太宗謂晉王曰舅許汝矣汝宜拜謝晉王因下拜太宗於是御太極殿召文武六品以上告立晉王為太子羣臣皆蹈舞稱慶詔幽魏王於北苑蜀王愔纍授襄州刺史益州都督嘗非理數繫所部縣令又畋獵無度數為非法太宗怒曰禽獸調伏可以馴擾於人鐵石鐫鍊可以成方圓之器至如愔者曾不如禽獸鐵石乎乃削封邑及國官之半貶為虢州刺史後復加實封滿千户愔在州數逰獵不避禾稼深為百姓所怨典軍楊道整叩馬諫愔曳而捶之後為御史大夫李乾祐所劾髙宗謂荆王元景曰先朝櫛風沐雨平定四方逺近肅清車書混一上天降禍奄棄萬邦朕纂承洪業懼如馭朽與王共戚同憂為國家主蜀王畋獵無度侵奪黎氓縣令無故被罰阿諛即喜忤㫖便嗔如此居官何以共理歷觀古來諸王若能動遵禮度則流慶子孫違越朝章則誅不旋踵愔為法司所劾朕實恥之帝又引楊道整勞勉之拜為匡道府折衝都尉賜絹五十匹貶愔為黃州刺史蔣王惲自安州都督除梁州惲在安州多造器用玩具及將行有車四百兩州縣不堪其勞越王貞纍授相州刺史貞善騎射涉文史兼有吏幹但信讒言官寮有正直者多被貶退又縱諸僮豎侵暴部民由是皆伏其才而鄙其行則天臨朝加太子太傅除豫州刺史自則天稱制貞與韓王元嘉魯王靈夔霍王元軌等密有匡復之志垂拱三年七月遂各起兵赴神都則天命左豹韜衛大將軍麴崇裕等率兵十萬討之其衆大潰貞等首並梟闕下貞將起兵與壽州刺史駙馬都尉趙瓌書曰佇總義兵來入貴境瓌甚喜復許率兵相應瓌妻常樂公主髙宗第七女和思皇后之母也謂其使者曰為我報王與其進不與其退爾諸王若是男兒不應至許時尚未舉動我嘗見耆老云隋文帝將篡奪周室尉遲迥是周室外甥猶能起兵相州天下響應况爾諸王並國之懿親宗社是託豈不學尉遲迥感恩效節舍生取義耶夫為臣子若救國難則為忠不救為逆諸王必須以匡救為急不可虛生浪死以笑於後代及貞等敗瓌與公主伏誅貞長子沖好文學善騎射歷密齊博三州刺史皆有能名與父貞相次舉兵七日而敗神龍初侍中敬暉等以沖父子翼戴皇家義存社稷請復其官爵武三思令昭容上官氏代中宗下手詔不許開元四年詔追復爵土令備禮改葬太常請諡曰敬昭從之五年又下詔封貞姪孫琳為嗣越王以奉其祀仍為立碑至開成四年六月其裔孫女道士𤣥真護先代數喪歸葬時論稱之因降敕曰越王事蹟國史著明枉陷非辜尋已昭雪其孫珍子他事配流數代漂蓬不還京國𤣥真女弱孝節卓然啓護四喪綿歷萬里况是近屬必在加恩行路猶或嗟稱朝廷固用恤助宜委宗正寺京兆府與訪越王墳報知如不是陪陵任祔塋卜葬其事仍令京兆府接應必使備禮葬畢𤣥真如願往京城使配咸宜觀安置紀王慎為襄州刺史以善政聞璽書勞勉百姓為之立碑慎少好學於文史與越王貞齊名時人號為紀越許王素節六歲封雍王尋授雍州牧素節能誦古詩賦五百餘言受業於學士徐齊聃精勤不倦髙宗甚愛之則天立為皇后每被讒嫉出為申州刺史乾封初詔曰素節既患舊疾宜不須入朝而素節實無疾自以久乖朝覲遂著忠孝論以見意時王府倉曹張柬之因使潛封此論以進則天見之不悅誣以贓賄降封鄱郡王仍於袁州安置纍進封為許王舒州刺史天授中與澤王上金同被誣告追赴都臨發州聞遭喪哭者謂左右曰病死何由可得更何須哭行至都城南被縊死夏王一母貞順武皇后為惠妃時生鍾愛無敵故名為一孩孺而薨時駕在東都葬於城南龍門東岑欲宫中舉目見之永王璘數歲失母肅宗收養夜自抱之眠及𤣥宗幸蜀詔璘為山南東路及嶺南等道採訪使江陵郡大都督璘至江陵召募將士數萬人恣情補署江淮租賦破用巨億以薛璆李臺卿蔡駉為謀主因有異志肅宗聞之詔令歸覲於蜀璘不從命遂擅領舟師東下甲仗五千趨廣陵以季廣琛為將璘生宫中不更人事其子襄城王蕩又勇而有力既握兵權為左右眩惑遂謀狂亂璘雖有窺江左之心未露其事吳郡採訪使李希言乃平牒璘大署其名璘遂激怒牒報曰寡人上皇天屬皇帝友于地尊侯王禮絶寮佐而簡書來往應有常儀今乃平牒抗威落筆署字漢儀隳紊一至於斯乃使渾惟明取希言季廣琛取廣陵採訪使李成式希言等各以兵拒之先是肅宗以璘不受命使內官啖廷瑶等招討之後兵敗將南投嶺南為江西採訪使皇甫侁下防禦兵所擒因中流矢而死壽王瑁母貞順武皇后初后頻産夏王懷王及上仙公主皆襁褓不育瑁之初生讓帝與妃武氏請於𤣥宗就宅收養自乳之名為己子十餘年在寧邸故封建晚於諸王邸中常呼為十八郎及讓帝薨瑁請制服以報乳養之恩𤣥宗從之恆王瑱性好道常服道衣天寶末從駕幸蜀不復衣道衣矣越王係乾元二年七月為天下兵馬元帥後與張皇后搆異謀得罪肅王詳德宗第五子建中五年薨性聰慧上尤憐之追念無已詔如西域法造塔安置禮儀使判官司門郎中李岩上疏曰墳墓之義經典有常自古至今無聞異制層磚起塔始於天竺名曰浮圖行之中華竊恐非禮况肅王天屬名位尊崇喪葬之儀存乎簡册舉而不法垂訓非輕伏請凖令造墳庶遵典禮從之唐㑹要卷五
