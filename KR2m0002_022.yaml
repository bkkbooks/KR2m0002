body:
  text: 唐會要卷二十二宋王溥撰社稷舊儀注祭犧牲不得捶撲傷損死則埋之若有創病者别卜武德九年正月親祀太社詔曰吉日惟戊親祠太社率從百僚以祈五榖今既南畝俶載東作方興州縣致祀宜盡祗肅四方之人咸勤殖藝别其姓類命為宗社京邑庶士臺省羣官里閈相從共遵社法以時供祀各申祈報具立節文明為典制咸亨五年三月十日詔春秋二社本以祈農比聞除此之外别立當宗及邑義諸色等社遠集人衆别有聚斂遞相承糾浪有徴求雖於吉凶之家小有禆助在於百姓非無勞擾自今以後宜令官司禁斷神龍元年五月詔於東郊建置太社禮部尚書祝欽明問禮官博士曰周禮田主各用所宜之木今太社主用石何也禮官太常少卿韋叔夏國子司業郭山暉太常博士張齊賢尹知章議曰春秋傳曰君以軍行祓社釁鼓祝奉以從書曰不用命戮於社社主蓋用石為之奉謂將行也鄭玄亦以社主用石崔靈恩三禮義宗曰社之主用石以土地所主最為實故用石也又呂氏春秋云殷人之禮其社用石後魏書云天平四年四月太社石主遷於社宮是社主用石古有明説周禮田主各用所宜之木者彼謂人間之社非太社也又檢舊社主長今尺六寸方一尺七寸付禮官博士等議其制度禮官韋叔夏等又議曰社主制度長短在禮無文且天子親征又載社主謂之社事則社之神主可載而行今詳議以為主既可載明非過重案郊特牲云社祭土而主隂氣韓詩外傳又云天子太社方五丈諸侯半之蓋以五是土數故壇方五丈其社主望準五數長五尺準隂之二數方二尺剡其上以象物生方其下以象地體埋其半以根在土中而本末均也則神道設教法象有憑其尺請用古尺又檢舊社稷壇上四方設以方色惟中央數尺以黃土韋叔夏等又議曰韓詩外傳云天子太社廣五丈各分置四方色訖上冒以黃土説者云冒以黃土者象王者覆被四方據此則合用黃土遍覆壇上今檢舊壇之上亦被方色唯中央數尺飾以黃土則是覆被之道有所不及既乖舊制望請準古改造於是以方色飾壇之四面及四陛其上則以黃土覆之祝欽明又建議曰周頌載芟篇敘曰春藉田而祈社稷也禮記天子為藉千畝諸侯藉百畝即此緣有藉田自為立社王社侯社因此有名卿大夫以下無藉田所以成羣置社藉田壇祭止是王社往者直云藉田近日改名先農之祭不知王社根本魏代妄設三牢羣説紛紜乍毁乍立晉氏徒云省廢不知仍在藉田千畝共迷其目因久不詳經典致此喧譁今者創立社稷理宜正名典故請改儀注及式將先農以為帝社使人聽不惑古義具存移前代之末學表當今之準繩豈不美歟諸禮官審加詳議禮官韋叔夏博士張齊賢等議曰謹按祭法云王者立大社然王社所祭之處書傳無文漢書郊祀志漢興已有官社未立官稷遂於官社後立官稷以夏禹配食官社以后稷配食官稷臣瓚云案高紀立漢社稷所謂大社也時又有官社配以夏禹所謂王社也見漢祠令而未立官稷至此始立之光武中興不立官稷相承至今魏以官稷為帝社故摯虞議曰魏氏故事立大社帝社是也晉初或廢或置皆不言當時所置之處或云兩社同處王社在大社之西崔氏皇甫氏並云王社在藉田引詩藉田而祈社稷為證本謹案衛宋漢舊義春始東耕於藉田官祀先農則神農也又五更要義云立壇於田所以祠先農其制度如社魏秦靜議云風伯雨師靈星先農與社稷為國之六神晉太始四年上耕於東郊以太牢祀先農又周隋舊儀及皇朝新禮先農皆祭帝神農配以后稷是則王社先農其來自遠各在祀典不可合而為一今欲崇立帝社實會禮經望於藉田之中别立帝社帝稷配以禹棄則先農帝社兩祠咸秩協載芟之義符祭法之文祝欽明又議曰藉田之祭本是王社承前若祠先農共是勾龍后稷烈山之子亦謂之農周棄繼之皆祀為稷共工之子后土主名湯既勝夏欲遷不可社稷主祭唯此二神祭法所載祀典皆自皇帝以下羲農二皇不列常祀豈有社稷祭上取炎皇正經典籍曾無此語膚淺諸儒妄為曲説假如蠟主先穡鄭玄云若神農徒見易之揉木即云若神農耳如其遠推邃古磨蜄在神農前將為先穡有何不可此鄭之謬妄不尋祭法根源後儒守株即以為定始立社稷祈報唯祭共工烈山神農來報大工功何不遠取祈報即明三皇以上朴略洪荒帝王之道無取為教魏秦靜者又何知社稷先農妄分為二且六宗之義先儒猶且紛然六神之言秦靜憑何分析習俗迷謬殊不可依豈有一藉田中置四壇墠先農王社同貫異名一種后稷勾龍道更無形影分祭四牢徒費豈是爾愛其羊又言漢祀禹神此義更殊未得若將禹平水土功大於勾龍成湯革夏社時何不替勾龍祀周棄既將易祀夏禹寧可獨遺漢德不逮殷湯祀禹無乃為諂後王更無遵用明其一時謬僻禮官今欲效法張禹無乃不究於前以王社沒於先農欲依祀典正號今乃更加兩祀亦恐刺謬增多退傳禮官更重詳度其依經典勿據俗儒於是韋叔夏張齊賢等又奏曰謹按經典無先農之文禮記祭法云王自為立社曰王社先儒以為其社在藉田之中詩載芟云春藉田而祈社稷是也永徽年中猶名藉田垂拱以後刪定始改為先農與社本是一神妄有改張以惑人聽其先農壇且請改為帝社壇以應禮記王社之義其祭先農禮改為帝社禮準令用孟春吉亥祀后土以勾龍氏配之從之於是改先農壇為帝社壇於帝社壇西置帝稷壇禮同太社太稷其壇不備方色所以異於太社也至開元定禮除章稷之議祀神農氏於壇配以后稷至今以為常典也開元十九年正月二十日勑普天率土崇德報功饗祀惟殷刲割滋廣非可以全惠養之道協靈祇之心其春秋二時社及釋奠天下諸州府縣等並停牲牢惟酒用脯務存修潔定展誠敬自今以為常式至二十二年三月二十五日勑春秋祈報郡縣常禮比不用牲豈云血祭隂祀貴臭神何以歆自今以後州縣祭祀特以牲牢宜依常式其年六月二十八日勑大祀中祀及諸州縣社稷依式合用牲牢餘不用牲牢合並用酒脯至貞元五年九月十二日國子祭酒包佶奏春祭社稷準禮天子社稷皆太牢至大厯六年十月三日勑中祀少牢社稷是中祀至今未改勑旨宜準禮用太牢天寶元年十月九日勑社為九王之尊稷乃五榖之長春祈秋報祀典是尊如聞祭官祗事不全備禮朕永惟典故務在潔誠俾官吏之盡心庶蒼生之蒙福今後祭官等庶事之間倍宜精潔兩京委御史臺諸郡委採訪使有違犯者社壇側近仍禁樵牧其百姓私社亦宜與官社同日致祭所由檢校三載二月十四日詔社稷列為中祀頗紊大猷自今以後社稷及日月五星並升為大祀仍以四時致祭諸星為中祀長慶三年正月祠部員外充太常禮院修撰王彥威奏謹按禮云社者神地之道也郊特牲而社稷太牢鄭玄以為國中之神莫貴於社故前古為大祀至天寶三載二月十四日勑云祭祀之典以陳至敬名或不正實相奪倫况社稷孚祐百代蒙福列為中祀頗紊大猷自今以後升為大祀爾後因循又依開元禮為中祀然而牲用太牢太尉攝行事祭之日不坐並是大祀之儀足知列為中祀是因循謬誤教人報本未極崇嚴有國之儀唯此厭屈今請準勑升為大祀庶合禮中從之開成五年十一月吏部奏準四年正月詔書大祠並差三品以上官充祭太社太稷攝司徒司空並合差三品官行事伏緣請司三品官員額絶少其中或有假故無官可差其每年祭太稷攝司徒司空請準舊例取左右庶子少詹事及諸司少卿監通攝制可祀風師雨師雷師及夀星等天寶四載七月二十七日勑風伯雨師濟時育物謂之小祀頗紊彛倫去載衆星以為中祀永言此義固合同升自今以後並宜升入中祀仍令諸郡共各置一壇因春秋祭祀之日同申享祀至九月十六日勑諸郡風伯壇請置在社壇之東雨師壇在社壇之西各稍北三數十步其壇卑小於社壇造其祀風伯請用立春後丑祀雨師立夏後申祀所祭各請用羊一籩豆各十簠簋爼一酒三斗應緣祭須一切已並以當郡公𪠘社利充如無即以當處官物充其祭官準祭社例取太守以下充五載四月十七日詔曰發生振蟄雷為其始畫卦陳象威物效靈氣實本於隂陽功大施於動植今雨師風伯久列於常祠唯此震雷未登於羣望其以後每祭雨師宜以雷師同壇祭共牲别置祭器至貞元二年四月二十三日詔問禮官其風師雷師祝版署訖合拜否太常博士陸淳奏曰以是小祀準禮又無至尊親祭之文今雖請御署校詳經據並無拜禮詔曰風師雨師為中祀有烈祖成命况在風雨至切蒼生今禮雖無文朕當屈己再拜以申子育之意仍永為常式本是小祀開元禮無樂章及升為中祀乃用登歌一部天寶以來嘗借天帝樂章用之本太常卿董晉奏請補其闕至貞元六年五月十四日詔祕書監包佶補之雨師亦準此風師壇舊在通地門外道北二里貞元三年閏五月二十一日以宫城喧呼虧於宿敬又近章敬寺恐神靈不安詔有司於滻水東擇地移之其年七月二十一日遣太常少卿裴郁致祭告移之四年四月詔有司自開元以來升風師雨師為中祀假郊廟樂章未奏撰遂令于邵等分撰之六年五月以風師雨師武成王等樂章付有司施行之元和十五年太常禮院奏來年正月三日皇帝有事於南郊同日立春後丑祀風師按周禮大宗伯官猶以燎祀風師鄭玄云風箕星也故令禮立春後丑於城東北就箕星之位為壇祭之禮祀昊天上帝於圜丘有神咸秩箕星從祀之位在壇之地三等伏以皇帝有事於南郊遍祭之義百神咸在其五方帝并日月神州以下緣對昊天上帝皇地祇尊不得申並為從祀悉無上公行事并御署祝版之儀風師既是星神厭降之儀便當陪祭如非遇郊祀其時祭祀如常儀開元二十四年七月十二日有上封事者言月令云八月日月會於壽星請於太社壇享之敕宜令所司特置夀星壇常以千秋節日修其祀典二十六日勑夀星壇宜祭老人星及角亢七宿著之常式嶽瀆武德二年十月二十九日親祀華嶽舊儀嶽瀆以上祝版御署訖北靣再拜證聖元年有司上言曰伏以天子父天而母地兄日而姊月於禮應有再拜之儀謹按五嶽視三公四瀆視諸侯天子無拜公侯之禮臣愚以為失尊卑之序其日月以上請依舊儀五嶽以下署而不拜制可之開元十一年四月二十六日勑霍山宜崇飾祠廟秩視諸侯蠲山下十户以為灑掃晉州刺史春秋致祭二十五年十月八日勑三時不害百榖用成遂使京坻遍於天下和平之氣既無遠而不通禋祀之典亦有祈而必報宜令中書令李林甫等分祭郊廟社稷尚書左丞相裴耀卿等分祭五嶽四瀆至二十八年十月三日敕感而遂通神之鑒也祈而必報禮之經也今農已畢功嵗則大稔京坻之積寰海攸同用陳蠲潔之薦以答明禋之祉宜令侍中牛仙客等分祭郊廟社稷嶽瀆等其四海四鎮及名山嶽瀆使有道路由過者亦宜便祭至天寶元年十二月二十八日詔今嵗西成頗為善熟宜令光祿卿嗣鄭王希言等分祭五嶽其四瀆名山並委所由郡長官擇日致祭至天寶七載十一月十七日朕祗肅郊祀祈在三農冀幽贊之有憑必昭報而無闕宜令工部尚書郭虛已等分祭五嶽四瀆八載九月三十日詔稼穡豐穰羣官樂業思崇聖秩用展虔誠宜令崇正卿褒信王璆分祭五嶽四瀆又至天寶十載二月二十一日遣嗣吳王祇等分祭五嶽四瀆具行册禮至元二年八月詔太常卿裴郁等十人各就方鎮祭嶽瀆等舊禮皆因郊祀望而祭之天寶中始有遣使祈福之祀至德中又加西嶽金天王中嶽中天王及諸嶽瀆王公之號今用遣使之禮非正也其年五月十五日太常卿董晉奏五嶽四瀆伏準開元禮每年各以五郊迎氣日祭之其祝版並合御署自上元元年中祀小祀一切權停自後因循不請御署其祝版應至饗祭日所司準式先進取御署附驛發遣勑旨宜依仍委所司每至時先奏附中使送往十二年二月太常博士裴堪奏謹按舊儀嶽瀆以祝版御署訖北靣再拜證聖元年有司上言曰伏以王者父天而母地兄日姊月於禮應有再拜之儀謹按五嶽視諸侯之禮其日月以上請依舊儀五嶽以下署而不拜制可至元修理五嶽四瀆皇帝無親祭禮儀其祝文皆云嗣天子某謹遣某官敢昭告於某嶽某瀆之神讀訖皆申再拜祭五龍神但云獻官再拜此則有司行事皆有拜文今臣與禮官等通詳典制整辨所宜蓋聞禮擬於時議則求古無文可質正者則推類以明之臣愚以為三才之尊各申所極尊有所統禮亦宜差若無比視何以辨等故禮云五嶽視三公四瀆視諸侯其餘山川視伯子男議者以嶽瀆既比公侯則禮如人臣矣其於祭也則人君不合有拜臣之儀謹按五經義云星辰日月五嶽四瀆皆天地之别神從官也因郊而祭者緣天地之意亦欲及之也又禮記云非其臣則答拜鄭玄注云不臣人之臣也則星辰嶽瀆既是天地從官恐人君不得如公侯之禮而臣下之也何以言之王者父天母地兄日姊月星辰視昆弟嶽瀆視公侯以此明之星辰嶽瀆是天地之臣故秩視人臣也陛下與天地為子遣使申祭恐不合令受天父地母從官之拜宜有以答之故開元禮祭嶽瀆祝文皇帝稱名又云謹遣於義有必拜之文是國家著禮以明神為敬不以臣下為禮以臣等所見並請依證聖元年定制有司行事須申拜禮前代帝王顯慶二年七月十一日太尉長孫無忌議曰謹按祭法云聖王之制禮也法施於人則祀之以死勤事則祀之以勞定國則祀之能御大災則祀之能捍大患則祀之又堯舜禹湯文武皆有功烈於人及日月星辰人所瞻仰非此族也不在祀典準此帝王合與日月同例常加祭享義在報功爰及隋代並尊斯典其漢髙祖祭法無文但以前代及今多行秦漢故事始皇無道所以棄之漢髙興章法垂於後自隋以上亦在祀例大唐稽古垂化罔羅前典唯此一禮咸秩未申令新禮及今無祭先代帝王之文今請幸遵故實修附禮文令三年一祭仍以仲春之月祭唐堯於平陽以契配之祭虞舜於河東以臯陶配祭夏禹於安邑以伯益配祭殷湯於偃師以伊尹配祭周文於酆以太公配祭武王於鎬以周公召公配祭漢祖於長陵以蕭何配詔可麟德二年車駕東幸將封岱嶽十一月至滎陽祭紀信墓追贈驃騎大將軍開元二十一年正月一日詔自古聖帝明王嶽瀆海鎮用牲牢餘並以酒脯充奠祀其年十一月六日雲州置魏孝文帝祠堂有司以時享祭州有魏故明堂遺址乃於其上置廟也天寶二年三月二十八日追尊臯陶為德明皇帝涼武昭王為興聖皇帝各與立廟每嵗四季月享祭至寶應年禮儀使杜鴻漸請停四時享獻三年五月二十二日置周文王廟以同德十人四時配享六嵗正月十一日敕三皇五帝創物垂範永言殷祀宜有欽崇三皇伏羲以句芒配神農以祝融配軒轅以風后力牧配五帝少昊以蓐收配顓頊以玄冥配高辛以稷契配唐堯以羲仲和叔配虞舜以夔龍配其擇日及置廟地量事營立其樂器請用宫懸祭請用少牢仍以春秋二時致享共置令丞令太常寺檢校七載五月十五日詔上古之君存諸氏號雖事先書契而道著皇王緬懷厥功寧忘咸秩其三皇以前帝王宜於京城內共置一廟仍與三皇五帝廟相近以時致祭天皇氏地皇氏人皇氏有巢氏燧人氏其祭料及樂請準三皇五帝廟以春秋二時享祭厯代帝王肇迹之處未有祠宇者所由郡置一廟享祭仍取當時將相德業可稱者二人配享夏禹王都安邑今夏縣以虞伯益秩宗伯夷配殷王湯都亳今穀縣以阿衡伊尹左相仲虺配周文王都酆今咸陽縣見有廟以師鬻熊齊太公望配之周武王都鎬請入文王廟同享太師周公太保召公配秦始皇帝都咸陽丞相李斯將軍王翦配漢高祖起沛今彭城縣太傅張良相國蕭何配後漢光武皇帝起南陽司徒鄧禹將軍耿弇配魏武皇帝都鄴侍中荀彧太尉鍾繇配晉武帝都故洛陽司空張華大將軍羊祜配後魏道武皇帝起雲中太尉長孫嵩尚書崔玄伯配周文帝起馮翊尚書蘇焯大將軍于謹配隋文帝封隋漢東僕射高熲大將軍賀若弼配令郡縣長官春秋二時擇日粢盛蔬饌時果配酒脯潔誠致祭其忠臣義士孝婦烈女史籍所載德行彌高者所在宜置祠宇量事致祭殷相傅説汲郡殷太師箕子汲郡宋公微子睢陽郡殷少師比干汲郡齊相管夷吾濟南郡晉卿羊舌叔向絳郡魯卿季孫行父魯郡鄭卿東里子産滎陽郡燕上將軍樂毅上谷郡趙卿藺相如趙郡楚三閭大夫屈原長沙郡漢大將軍霍光平陽郡漢太傅蕭望之萬年郡漢丞相丙吉魯郡蜀丞相諸葛亮南陽郡以上忠臣一十六人周太王子吳太伯吳郡伯夷叔齊並河東郡吳延陵季札丹陽郡魏將段干木陳郡齊高士魯仲連濟南郡楚大夫申包胥富水郡漢將軍紀信華陽郡以上義士八人周太王妃太薑新平郡周王季妃太任扶風郡周文王妃太姒張掖縣配享文王之廟魯大夫妻敬薑魯郡鄒孟軻母魯郡陳國孝婦睢陽郡曹世叔妻大家扶風郡以上孝婦七人周宣王齊薑長沙郡衛太子共薑汲郡楚莊樊姬富水郡楚昭王女富水郡宋公伯姬睢陽郡梁宣髙行母陳留郡齊杞梁妻濟南郡趙將趙括母趙郡漢成帝班婕妤扶風郡漢元帝馮昭儀咸陽郡漢太傅王陵母彭城郡漢御史張湯母萬年縣漢河尹嚴延年母東海郡漢淳于緹縈濟南郡以上烈女一十四人並令郡縣長官春秋二時擇日準前致祭厯代帝王廟每所差側近人不課户四人有闕續填仍關户部處分至十二載七月二十八日有勑停廢九載十一月十六日周武王漢高祖於京城內各置一廟并置官吏貞德二年八月道士李國正奏皇室仙系修崇靈路請於昭應縣南三十里山頂置天華上宫露臺天地三婆父皇道君太古天皇中古伏羲媧皇等祠堂并置灑掃宫户一百人又於縣之南義扶國故湫置祠堂並許之昭應縣令梁鎮上疏其略曰天地婆父祀典無文言甚不經義無可取若陛下將並天地祖宗之廟必上天貽向背之責又夫湫者龍之窟也龍得水則神無水則螻蟻之匹也故知水存則龍在水竭則龍亡今湫竭已久龍安所存何必崇飾祠宇豐潔奠享其三皇五帝則兩京及所都之處已建宫觀祠廟時設齋醮饗祀其湫既竭不可更置祠堂又不當更為天地建立祖宗廟臣並請停其三皇道君天皇伏羲女媧等既先各有廟望於本祠依禮齋祭制曰可大厯五年四月鄜坊節度使臧希讓上言坊州軒轅皇帝陵闕請置廟四時饗祭列於祀典詔從之永泰二年五月詔道州舜廟宜蠲近廟兩京充掃除從刺史元結所請也元和十四年正月勑周文王武王祠宇在咸陽縣宜令有司精加修飾天祐二年六月十五日封楚三閭大夫屈原為昭靈侯舜帝二妃祠為懿節祠龍池壇開元二年閏二月詔令祀龍池六月四日右拾遺蔡孚獻龍池篇公卿以下一百三十篇太常寺考其詞合音律者為龍池篇樂章共録十首紫微令姚元崇右拾遺蔡季太府少卿沈佺期黃門侍郎盧懷慎殿中監薑皎吏部尚書崔日用紫微侍郎蘇頲黃門侍郎李義府工部侍郎薑晞兵部侍郎裴崔等文為樂章十六年詔置壇及祠堂每仲春將祭則奏之十八年十二月二十九日有龍見於興慶池因祀而見也勑太常卿韋縚草祭儀縚奏曰臣謹按周禮以疈辜祭四方百物祭法曰能出雲為風雨者皆曰神龍者四靈之畜亦百物也能為雲雨亦曰神也禮有公食大夫饗之文即生曰食亦曰饗矣其饗之日合用仲春之月易曰震為龍震者東方春用於時二月也饗之法請用二月有司筮日池傍設壇官致齋設籩豆如祭雨師之儀以龍致雨也其牲用少牢樂用鼓鐘奏姑洗歌南吕鄭玄云風師雨師及小祀用此樂凡六變者三變而致鱗物今享龍亦請三變舞用武舞樽用散酒以一獻周禮曰凡祭羣小祀用之也詔從之二十三年五月一日宗子請率月俸於興慶宫建龍池聖德頌以紀符命望令皇太子中書令張九齡禮部尚書李林甫充檢校使從之五日宗子請令寧王憲題額侍中裴耀卿充摸勒使至天寶二年五月五日明皇建立殿中監裒信王璆撰文皇太子書并題額貞元六年六月復祭五龍壇元和十二年四月上以自春以來時雨未降正陽之月可雩祀遂幸興慶宫堂祈雨忽有一白鸕鷀浮沉水際羣類翼從左右咸異之俄而不見方悟龍神之變化遂相率蹈舞稱慶後大雨果下唐會要卷二十二
