body:
  text: 唐會要卷八十二宋王溥撰考下大中五年吏部奏準今年選格節文經考停罷者一選集準舊格兩選集今據格文一選即當年許集其京官及外官如有假故官人等請準舊格前兩選集敕旨宜依如是别敕除替及非因假故者即許一選集六年七月考功奏近年諸州府及百司官長所書考第察屬並不得知升黜之間莫辨當否自今以後書考後但請勒名牒于本司本州之門三日其外縣官則當日下縣如有升黜不當便任披陳其考第便須改正然後申省如勘覆之後事無乖謬則論告之人亦必懲殿又準考課令凡官人申考狀不得過兩紙三紙刺史縣令至於賦稅異集判斷不滯户口無逃散田畝守常額差科均平廨宇修飭館驛如法道路開通如此之類皆是尋常職分不合計課自今後但云所勾當常行公事並無敗闕即得唯職分乖失及開田招戶辨獄雪寃及新置之事則任録其由申上亦須簡要不得繁多又近年以來刺史皆自録課績申省矜衒者則張皇其事謙退者則緘默不言自今以後其巡內刺史請並委本道觀察使定其考第然後録申本州不得自録課績申省又州府申官人覆得寃獄書殊考者其元推官人多不懲殿或云書考日當書下考至時又不提舉請自今以後書辨獄官人殊考日便須書原推官下考如元推官自以為屈任經亷使及臺省陳論其官人先有殿犯官長斷云至書考日與下考者如之如不舉其本判官當書下考其所申到下考省司校其所犯如與令式相符便校定申奏至敕下之後並須各牒府州又近日諸州府所申奏録課績至兩考以後皆重具從前功課申省以冀褒升省司或檢勘不精便有僥幸請自今以後不得輒又具從前功績申上又近日諸州府所申考解皆不指言善最或漫稱考秩或廣説門資既乖令文實為繁弊自今以後如有此色並請準令降其考第又準考課令在中上以上每進一等加祿一季中中者守本祿中下以下每退一等奪祿一季準令以此勸懲事在必行近年以來與奪幾廢或有申請之處則言無本色可支徒挂簿書終無給與今按倉庫令諸給糧祿皆以當處正倉充無倉之處則申省隨近有處支給又無者許以稅物及和糴屯收等物充令式昭然不合隳廢自今以後每省司校考畢符牒别州後仰當時便具申降與奪事由申請如違令式不舉明者其所由官請奪祿一季其已去任官遇奪祿事並請準令式處分又準考課令官人因加戶口及勸田農並緣餘功進考者于後事若不實從經恩宥其考皆從追改之事近皆不行自今以後並請準令式處分其因此得官者仍請奪又諸道所申考解從前十一月二十五日到都省開拆郎官押尾至十二月之末方得到本司開拆多時情故可見自今以後伏請準南曹及禮部舉選解例直送當司開拆又從前以來應得考之人並給考牒以為憑據近年考事容易給牒不一或一人考牒數處請給或數年之後方始來請自今以後校考敕下後其得殊考及上考人省司便據人數一時與修寫考牒請準吏部告身及禮部處關牒每人告出錢收贖其得殊考者出一千文上考者出五百文其錢使充寫考牒紙筆雜用以前件事條等或出于今文或附以近敕酌情揣事不至乖張謹並修例進上伏乞宣付中書門下請更參詳茍禆至公願賜收采仍請三年一度準與選格例修定頒下敕考功所條流校考公事頗詳悉唯一件難便允從近日俗尚務能人少亷恥若牒關許其論告則自此必長紛爭當否之間固有公議其一件宜落下餘依奏咸通十四年考功員外郎王徽以舊例考簿上中下字朱書吏緣為姦多有揩改請以墨書從之冬薦貞觀五年六月十一日敕準貞觀四年正月一日制春秋舉薦官中書門下奏常參官八品以上外官五品以上正員及額已得替並停薦其使下郎官御史丁憂廢省官在外者望委諸道觀察使及州府長史其在京城委中書門下尚書省御史臺常參清官並諸使三品已上左庶子詹事少卿監司業少尹諭德國子博士長安萬年縣令著作郎中允中書祕書太常丞贊善洗馬等每年一度聞薦至六年十二月一日敕自今以後王府官宜停薦其見任宰相及勳臣子弟亦不須舉人至八年每冬薦官比來所舉人數頗多自今以後中書門下內省御史臺五品已上如尚帶職掌授臺省官兩考者不在冬薦限如其中實有故罷免者亦須待授官周嵗然後許冬薦狀中具言罷免事故其他據品秩合冬薦者則依元敕七年五月中書門下奏諸使停罷郎官御史望令罷後其所在官經兩考已上方得冬薦如文學才行堪奬用者不在此限其諸州上佐罷後經二年方得聞薦其非時替者許一年後聞薦大中五年正月敕右輔闕宋球等奏冬薦狀引敕文年月不同各罰一季俸仍委吏部長以元和七年八月二十一日及太和七年七月二十六日敕著為定制甲庫開元十九年五月十一日敕尚書省內諸制敕庫及兵部吏部考功刑部簿書品迹並甲庫每司定員外郎主事各一人中書門下制敕甲庫各定主書録事已下各一人專知周年一替中間不得改移建中元年七月八日吏部奏比來冬集申門下省吏部有官甲內庫無本今請依官甲例更寫一本進內收貯縱三庫斷裂即檢內庫本從之二年十月十一日中書門下奏中書門下及吏部制敕甲庫等準式中書舍人給事中吏部員外郎並合專判緣官望清髙兼外有職事不得躬親所以比來文厯多有罪過今請每庫採擇一公清勤幹專押甲庫冀事得精詳其經知四周年無負犯仍望依資與改官奉敕依至三年四月三日給事中關播奏三省甲庫官各一人或屬假故即中書省四品已上諸司三品已上應合舉人冬令每人薦不得過兩人餘官不得過一人準前敕處分至九年十一月二十九日敕每年冬薦官吏部準式檢勘或成者令諸司尚書左右丞本司侍郎引于都堂訪以理術兼商量時務狀考其理識通者及考第事迹定為上等並舉主姓名録奏試日仍令御史一人監試貞元十一年正月敕本置冬薦務在得人自今以後所薦官考試奏聞上等人如無他故者準前敕類例處分其下等人有司使以時罷退任待他年重薦如情願同吏部六品以下選不合得留大例請授逺慢官者任經都省陳狀吏部勘責限等第敕出後一月內送名中書門下商量進擬元和七年八月中書門下奏諸州府五品已上官替後委本道觀察使及長史量其才行幹能堪奬用者其人才資厯每年冬季一度聞薦其罷使郎官御史委中書門下兩省御史尚書省常參官及諸司職事三品已上文官左右庶子詹事諸司少卿監國子司業少尹國子博士長安萬年縣令太常博士著作郎祕書丞等每年冬準此聞薦從之太和元年八月敕諸道諸軍諸使應奏判官並每年冬薦等所奏判官除新開幕府據元額署外其向後奏請如是元闕即云闕某職今奏某人充如已有令更奏即云某職某人緣某事停奏某人替某前下臺省官合冬薦者除府使罷外既有薦用當具要籍不合便稱去職自今以後如廢闕請名更置一人其吏部行內考功司封司勳敕庫內仍請兩人分掌臨時事故即勒通知奏敕宜依至貞元八年十一月九日吏部侍郎杜黃裳奏以前資官充專知既無本官俸料頗亦難卒請入庫日便依資與官仍許四官年不用闕奉敕前資官未有功勞不合改轉既無俸料又慮難卒入庫日宜與同類官貞元八年閠十二月給事中徐岱中書舍人奚陟髙郢等奏比來甲敕祗下刑部不納門下省甲庫如有失落無處檢覆今請準制敕納一本入門下甲庫以憑檢勘敕旨依奏十年三月八日司封奏當司與司勳考功敕甲庫同一專知官先無庫印今請鑄造仍以封勳考甲庫印六字為印從之十三年正月關播遷給事中舊例請司甲庫皆是胥吏掌知為弊頗久播始建議並士人知之元和八年五月吏部侍郎楊於陵奏臣伏以銓選之司國家重務根本所繫在于簿書承前諸色甲敕等緣嵗月滋深文字凋缺假冒踰濫難于辨明因循廢闕為弊恐甚若據見在卷數一時修寫計其功直煩費甚多竊以大厯以前嵗序稍逺選人甲厯磨勘漸稀其貞元二十一年以後敕旨尚新未至訛謬縱須倫理請待他時臣今商量從大厯十年至貞元二十年都三十年其間出身及仕宦之人要檢覆者多在此限之內且據數修寫冀得精詳今冬選曹便獲深益其大厯十年向前甲敕請待此一件修畢續條貫補緝臣內省庸薄文忝選司庶效涓埃以禆朝典謹具量補年月及應須差選官吏并所給用紙筆雜項費用分析如前敕旨依奏太和三年四月敕甲庫官舊例初入授同類官考滿去職則與依資改轉此事參差有擾有屈今宜並同諸色職事帶正員官者準寶厯二年十一月九日敕處分其改轉亦同前件如已在甲庫授官者即宜且依舊敕處分五年六月敕應選人及冬集人文案門下省檢勘異後比來吏差南曹今史收領却納門下甲庫在於公事頗甚勞擾自今以後謹敕吏部過選院本令史便自分付甲庫以備他年檢勘仍請門下省勒甲庫令史每過選時常切檢點收拾明立文案據官吏等遞相分付不得妄有破除南曹申詣之時如有妄稱失落欠少本令史及專知官請準檢報揩抹違越條例處分九年十二月敕中書門下吏部各有甲庫厯名為三庫以防踰濫如聞近日諸處奏官不經所司檢尋未免姦偽起今以後諸司諸使諸道應奏六品以下諸色人稱舊有官及出身請改轉並請授官可與商量者除進士登科衆所聞知外宜令先下吏部中書門下三庫委給事中中書舍人吏部格式郎中各與本庫官同檢勘具有無申報中書門下審無異同者然後依資進擬如諸司諸使諸道奏論不實以為無有臨時各重加懲罰當直故事尚書省官每一日一人宿直都司執直簿轉以為次諸長官應通判者及上佐縣令不直凡內外官日出視事午而退有事則直官省之務繁者不在此限故事左右丞及尚書祕書監九寺卿少府監將作匠御史大夫國子祭酒太子詹事國子司業少監御史中丞大理正外官二佐已上及縣令準開元式並不宿直貞觀五年十二月二十日敕文武官兼雜職免宿直左衛大將軍李大亮領太子右率衛工部尚書身居三職宿衛兩宫至宿直太宗勞之曰至宫宿直我便安卧天册萬嵗元年三月令宰相每日一人宿直其後與中書門下官通直至開元二年姚崇為紫微令紫微官直次下讓宰相崇以年位已髙時亦違直其次省官多不從所由吏數持直簿詣之崇題其簿曰告直令吏遣去又來必欲取人有同司命老人年事給終不擬當諸官皆歡笑不復逼以直也至十一年停宰相當直景龍三年九月蘇瓌拜右僕射同中書門下三品與男中書舍人頲聫事奏請出為外官遂進祕書監御筆批云僕射不綰中書蘇頲不必改也明日固讓上曰欲得卿長在中書遂與父聫事通直開元二十年九月二十一日是中書舍人梁升卿私忌二十日晚欲還即令傳制報給事中元彥沖令宿衛會彥沖已出升卿至宅令狀報彥沖以旬假與親朋聚宴醉中詬曰汝何不直升卿又作書報云明晨是先忌比往復日已暮矣其夜有中使賫黃敕至直官不見回奏上大怒出彥沖為邠州刺史因新昌公主進狀申理公主即彥沖甥張垍之妻云元不承報此是中書省之失由是出升卿為莫州刺史貞元元年正月給事中袁髙既宿直時盧杞由新州司馬移吉州長史是月上命為饒州刺史髙既宿直當草杞制遂執以謁宰相盧翰劉從一曰盧杞作相三年矯誣隂賊退棄忠良朋附者咳唾登青雲睚眥者顧盼擠溝壑致使鑾與播越天下瘡痍皆杞之為也幸免族誅已為漏網若更授大郡恐失天下之望惟相公執奏之事尚可救翰從一皆杞所引用不從髙之言遂命舍人草制及詔出髙又執之不下仍上奏盧杞為政極惡窮凶六軍將校願食其肉百辟卿士嫉之若讐疏未納明日諌官陳京趙需裴佶宇文炫盧景亮張薦等上疏上良久謂曰若與盧杞刺史太優與上佐可皆曰可遂追杞饒州制翌日上遣中使宣慰髙云朕徐思卿言深覺愜當依卿所奏會昌四年三月御史臺奏今月三日左右金吾仗當直將軍髙漢貞季邱並不到準會昌三年二月四日敕比來當日多歸私第近晚方至本仗宿直事頗容易須有提撕今日以後晝日並不得離本仗縱有公事期集當直人亦不得去仍令御史臺差朝堂驅使官覺察如有違者録名聞奏敕旨宜各罰一月俸休假貞觀元年十月少府監奏丞閻立行妹喪準令假給二十日立行專知羽儀工作未了請止給三日上曰同氣之情義不可奪自喪亂以來風俗弛壞特敦奬命依次令給假差人代之永徽三年二月十一日上以天下無虞百司務簡每至旬假許不視事以便百僚休沐四年五月二十一日敕髙祖太武皇帝既開洪業不可限以常禮忌日特宜廢務天授元年四月敕遊客官人子弟勒還本貫十日外杖一百居停同罪須覲問即陳牒給假發遣開元二十二年六月十七日敕諸州千秋節多有聚斂頗成縻費自今以後宜聼五日一會盡其歡宴餘兩日休假而已任用當處公廨不得别有科率至寶應元年八月三日敕八月五日本是千秋節後改為天長節舊給假三日其前後一日假權停至九月一日敕天平地成節準乾元元年九月一日敕休假三日望準八月三日敕前後日權停二十四年二月十一日敕寒食清明四月四日為假至大厯十二年二月十五日敕自今以後寒食通清明休假五日至貞元六年三月九日敕寒食清明宜準元日節前後各給三日二十五年正月七日敕許自後百官每旬節假不須入曹司至天寶五年五月九日敕頃自宴賞已放入朝節假常參未聞申命公私協慶千年一時自今已後每至旬假休假中書門下及百官並不須入朝亦不須衙集其年正月內外官五月給遊假九月給授衣假分為兩畨各十五日其遊假若風土異宜各種不等通隨便給之天寶四載六月十四日敕頃以鄉閭侍丁優給孝假官吏等仍科雜後天寶初已遣優矜如今聞比來乃差征鎮豈有務其輕而不恤其重放其役而更苦其身永言及此良用憮然自今後侍丁孝假不須差行五年二月十三日中書奏大聖祖以二月十五日降生請同四月八日佛生之時休假一日大厯三年七月十三日敕七月十五日前後各一日宜準舊例休假貞元五年四月十五日敕四月十九日降誕之辰宜休假一日二十一年五月御史臺奏伏準承前舊例諸司三品以上長官請假滿日正衙參見其餘品秩卑自有本司官長不曾于正衙參假去年六月侍御史竇羣奏令尚書省四品中書門下御史臺五品同三品例正衙參假訖既失舊章又煩聖聼今請準例三品以上假滿日正衙見如有違越請準乾元元年三月敕每犯奪一月俸依奏元和二年八月御史臺奏新授常參官在城未上及在外未到假故等準令式職事官假滿百日即合停解其未上官等並無正文或滿百日無憑舉奏自今以後如有在城授官疾病未上者在外授官敕到後計水陸程外滿百日者並請停解從之四年四月貶沈逹為泉州參軍徐肇為建州參軍二人為率府掾各請演州愛州婚姻假御史臺奏州皆萬里之外量其秩滿猶有假程請量黜以懲慢易七年十一月敕自今後遇輟朝日中書門下宜同假日不須入長慶二年四月御史臺奏檢校司空兼太子少傅嚴綬疾病假滿百日合停敕嚴綬年位俱髙須加優異宜依舊秩未要舉停又其年六月右金吾衛大將軍郭鏦疾假滿百日上以忠勇許未停官太和八年九月御史臺奏三班常參官舊例每月得請兩日事故假今許請三日仍不得在盡入衆集並臨朝等日一品二品官如合朝不朝及盡入衆集不到臨朝時請假等並請假舊例每季終仍具請事故假日録狀聞奏兼申中書門下文武常參官每月終比校其中請事故假多人三品六品各罰兩人四品五品人數稍多各罰三人請各罰一月俸如合罰人數稍多即從下罰亦不過罰兩人及三人如實疾患已連請假十日以上為衆所知不在此限每至次月具狀申中書門下文武常參應請期年喪假者除準式假滿連許請三日事故假仍五箇月內每朔望日各許請事故假一日其大功喪假者準式假滿連許請事故假兩日仍三箇月內朔望日各許請事故假一日敕旨依奏會昌元年二月敕二月十五日玄元皇帝降誕之日宜為降聖節休假一日二年十二月御史臺奏應諸司六品以下官請外州婚禮周親以上侍省等假節目應當司牒諸司諸州府及節度使觀察使度支鹽鐵監院等節目伏以前後敕文非嚴切致兹輕犯蓋未必行臣等今稍重科條庶令知懼敕旨依奏大中四年正月制設官分局各有主張具于在公責辦斯切諸州府及縣官到任已後多請逺假或言周親疾病或言將任婚姻令式假名長吏輒為隱蒙遂使本曹公事併委比廳手力俸錢盡為已有勤勞責罰則在他人須有條流俾其兼濟其諸州府縣官請出界假故一月以下即任權差諸廳通判一月以上即勾當留官例其課料等據數每貫尅二百與見判案官咸通十四年正月御史丞韋蟾奏應諸州刺史除授正衙辭謝後託故陳牒請假實為容易自今後如實有故為衆知者三日外不在陳牒之限應內外蔭官入京合更朝謝如遇假日且合在都亭驛近日多請假便歸私家既犯條章頗乖禮敬自今以後望準故事如未朝謝須于都亭驛俟日如違越臺司糾勘從之醫術武德中關中多骨蒸病得之必死遞相染著許胤宗每療皆愈或曰公醫若神何不著書以貽將來胤宗答曰醫乃意也在人思慮有脈候幽微若其難别意之所解口莫能宣古之名手唯是别脈既精然後識疾人之於藥有正相當者唯須單用一味直攻彼病即可愈今人不能别脈莫識病源以情臆度多寡樂味譬之於獵不知兔處多發人馬空地遮圍或冀一人偶然逄也如此療病不亦踈乎脈之深逺既不可言故不能著述甄權貞觀中年百餘嵗太宗幸其第賜以几杖撰經針方明堂人形圖其弟立亦達醫術撰本草音義七卷古今録驗方五十卷貞觀三年九月十六日諸州治醫學至開元十一年七月五日詔曰逺路僻州醫學全無下人疾苦將何恃賴宜令天下諸州各置職事醫學博士一員階品同於録事每州本草百一集驗方與經史同貯至二十七年二月七日敕十萬户以上州置醫生二十人十萬户以下置十二人各于當界巡療二十二年九月十六日右衛率府長史王玄䇿奉使天竺得方士那羅邇婆寐自言夀二百嵗云有長生之術上頗信之深加禮敬館之金飈門內造延年之藥竟不放還死于長安顯慶二年右監門長史孫敬上言陶𢎞景所撰本草事多乖謬請加刪補詔令中書令許敬宗大常寺丞吕才太史令李淳風禮部郎中孔志約尚藥奉御許季崇並諸名醫等二十人增損舊本徴天下郡縣所出藥物並書圖之仍令司空李績總監定之並圖五十卷成上之至四年正月十七日撰成及奏上問曰本草行來自久今之改修何所異也于志寧對曰舊本草是陶宏景合神農本經及名醫别録而注解之宏景僻在江南不能遍識藥物多有紕謬其所談及録功不盡四百有餘種今皆考而正之本草之外新藥行用有效者復百餘種今附載之此所以為勝也上稱善詔藏于祕府三年詔徴太白山人孫思邈至居于鄱陽公主廢府時年九十餘視聼不衰盧照鄰宋令文孟詵皆執師贄之禮照鄰嘗問曰名醫愈疾其道何也思邈曰吾聞善言天者必資之於人善言人者亦本之於天天有四時五行日月相推寒暑迭代其轉運也和而為雨怒而為風散而為露亂而為霧凝而為霜雪張而為虹霓此天地之常數也人有四肢五臟一覺一寐呼吸吐納精氣往來流而為榮衛彰而為氣色發而為音聲此人之常數也陽用其聲隂用其形天人之所同也及其失也蒸則生熱否則生寒結而為瘤贅陷而為癰疽奔而為喘乏渴而為焦枯神發乎面變動乎形推及天地則亦如之故五緯盈縮星辰錯行日月薄蝕彗孛流飛此天地之危變也寒暑不時此天地之蒸否也石立土踊此天地之瘤贅也山崩地陷天地之癰疽也衝風暴雨天地之奔走也雨澤不降川瀆涸竭天地之焦枯也良醫𨗳之以針石救之以藥劑如聖人和之以良德輔之以人事故身有可愈之疾天地有可消之災通乎數也照鄰曰人事何如思邈曰膽欲大而心欲小智欲圓而行欲方照鄰曰何謂也思邈曰心為五臟之君君以恭愼為主故心欲小膽為臟之將將以果決為務故膽欲大智者動象天故欲圓仁者靜象地故欲方詩曰如臨深淵如履薄氷謂小心也紏紏武夫公侯干城謂大膽也傳曰不為利回不為義疚仁之方也易曰見幾而作不俟終日智之圓也照鄰又問曰養性之要何也思邈曰天道有盈缺人事多屯厄茍不自愼而能濟于屯厄者未之有也故養性之士先知自慎自慎者以憂畏為本經曰人不憂畏大威至矣憂畏者生死之門存亡之由禍福之本吉凶之元也故士無憂畏則仁義不立農無憂畏則稼穡不滋工無憂畏則規矩不設商無憂畏則貨殖不盈子無憂畏則孝敬不篤父無憂畏則慈愛不著臣無憂畏則勳庸不成君無憂畏則社稷不安故飬性者失其憂畏則心亂而不理形躁而不寧神散而氣越志蕩而意昏應生者死應存者亡應成者敗應吉者凶夫憂畏者其猶水火不可暫忘也人無憂畏子弟為勍敵妻妾為寇仇是故太上畏道其次畏天其次畏物其次畏人其次畏身憂於身者不拘于人畏于心者不懾于人畏于已者不制于彼慎于小者不懼于大戒于近者不悔于逺能如此者水行蛟龍不能害陸行虎兕不能傷五兵不能及疫癘不能染讒賊不能謗毒螫不能加善知此者則人事畢矣照鄰自傷強仕之年而嬰沉疾乃作病梨樹賦以傷稟受之不同也至四年思邈授承務郎直上藥局開元十一年九月七日親製廣濟方頒示天下天寶五年八月敕朕所撰廣濟方宜令郡縣長官選其切要者録于大版上就村坊要路榜示仍委採訪使勾當無令脫錯乾元元年二月五日制自今以後醫行入仕者同明經例處分至三年正月十日右金吾長史王淑奏醫術請同明法選人自今以後各試醫經方術䇿十道本草二道脈經二道素問十道張仲景傷寒論二道諸雜經方義二道七通已上留以下放又尚食藥藏局請同典膳局太醫院請同太樂署貞元二年九月山人鄧思齊獻威靈仙草出商州能愈衆疾上於禁中試用有效令編附本草授思齊太醫丞八年八月加殿中省侍御醫藥藏局丞俸錢仍令侍御醫及尚藥直長藥藏郎並留授翰林醫官所司不得注擬十二年二月十三日上親製貞元廣利方五卷頒於州府至三月十五日敕貞觀初諸州各置醫博士開元中兼置助教簡試醫術之士申明巡療之法比來有司補擬雖存職員藝非専精少堪施用緬思牧守實為分憂委之採擇當悉朕意自今以後諸州應闕醫博士宜令長史各自訪求選試取藝業優長堪效用者具以名聞已出身入試吏部更不須選集十二年八月敕其見任醫術官應非翰林供奉不在加料錢限十七年十二月敕翰林醫官及藥童自今以後縱考滿并不得于所司選其見選人亦宜停二十一年正月罷翰林隂陽士醫相射覆碁諸待詔三十二人初王叔文以碁進既用事惡其與已儕類相亂故罷之長慶元年正月處士張臯上疏曰臣聞神慮淡則血氣和嗜欲勝則疾病作和則必臻于夀考作則必致于傷殘是以古之賢聖務自頥飬不以外物撓耳目不循聲色改性情由是和平自臻福慶斯集故易曰旡妄之疾勿藥有喜詩曰自天降康降福穰穰此皆理合天人著在經術然則藥以攻疾無疾固不可餌之髙宗時有處士孫思邈者精識髙逺保逹攝生其所著千金方三十卷行之於代序論云此人無故不宜服藥偏有所助令人藏氣不平思邈此言可謂洞於事理也或寒暑為寇節宣有乖事資醫方尚須重慎故禮云醫非三代不服其藥施於凡庶猶且如此况在天子豈得自輕先朝暮年頗好方士徴集非一嘗試已多纍致危疾聞於中外足為殷鑒陛下素所詳知必不可更踵前車自貽後悔今朝野之人紛紜竊議直畏忤旨莫敢獻言臣蓬艾微生麋鹿同處既非邀寵亦又何求但以曾覽古今粗知忠義有聞而默於理不安願陛下無忽芻蕘庶禆萬一時穆宗頗好金石之藥疏奏上喜歡久之竟訪臯不獲唐會要卷八十二
