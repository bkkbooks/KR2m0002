body:
  text: 唐會要政書類一通制之屬提要臣等謹案唐會要一百卷宋王溥撰溥字齊物并州祁人漢乾祐中登進士第周廣順初拜端明殿學士恭帝嗣位官右僕射入宋仍故官進司空同平章事監修國史加太子太師封祁國公卒諡康定事迹具宋史本𫝊初唐蘇冕嘗次髙祖至徳宗九朝之事為㑹要四十卷宣宗大中七年又詔楊紹復等次徳宗以來事為續會要四十卷以崔鉉監修段公路北户錄所稱會要即冕等之書也惟宣宗以後記載尚缺溥因復採宣宗至唐末事續之為新編唐㑹要一百卷建隆二年正月奏御詔蔵史館書凡分目五百十有四於唐代沿革損益之制極其詳核官號内有識量忠諫舉賢委任崇奬諸條亦頗載事蹟其細項典故不能概以定目者則别為雜録附於各條之後又間載蘇冕駁議義例該備有禆考證今僅𫝊抄本脱誤頗多八卷題曰郊儀而所載乃南唐事九卷題曰雜郊儀而所載乃唐初奏疏皆與目録不相應七卷十卷亦多錯入他文蓋原書殘缺而後人妄摭竄入以盈卷帙又一别本所缺四卷亦同而有補亡四卷採摭諸書所載唐事依原目編類雖未必合溥之舊本而宏綱細目約畧麤具猶可以見其大凡今據以録入仍各註補字於標目之下以示區别焉乾隆四十六年十一月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:4fd665d2f5c13adaf55ac48500c0e62916f045bd14a88434a49c7e07326c2c1b
