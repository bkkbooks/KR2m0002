body:
  text: 唐會要卷七十七宋王溥撰貢舉下科目雜録太和元年十月中書門下奏凡未有出身未有官如有文學祗合于禮部應舉有出身有官方合于吏部赴科目選近年以來格文差誤多有白身及散官并稱鄉耆者並赴科目選及注擬之時即妄論資次曾無格例有司不知所守其有宏辭拔萃開元禮學究一經則有定制然亦請不用在散試官限其三禮三傳一史三史明習律令等如白身並令國學及州府同明經一史三禮三傳同進士三史當年闕送吏部使授第二任官如有出身及有正官本是吏部常選人則放于吏部不限選數應科目選仍須檢勘出身及授官無踰濫否緣取學藝其餘文狀錯謬則不在駮放限如考試登科並依資注與好官唯三史則超一資授官如制舉人暨諸色人皆得選試則無出身無官人並可亦請不用散試官伏以散試偶于諸道甄録處得便第二第三任官既用虛銜及授官則勝進士及諸色及第登科人授官實恐僥幸敕㫖依奏大中十三年二月中書門下奏據禮部貢院見置科目內開元禮三禮三傳三史學究道舉明算童子等九科近年取人頗濫曾無實藝可採徒添入仕之門須議條流俾精重業臣等已于延英面奏伏奉聖㫖將文字奏來者其前件九科臣等商量望起大中十年權停三年滿後至將赴科試者令有司據所司人先進名令中書舍人重覆問過如有本業稍通堪備朝廷顧問即作等第進名候敕處分如事業荒蕪不合送名而妄送者考官先議朝責其童子近日諸道所薦送者多年齒已過考其所業又是常流起今後望令天下州薦童子並須實年十一十二已下仍須精擇經㫖全通兼自能書寫者如違條例本道長史亦宜議懲罰從之咸通四年二月進士皮日休上疏請以孟子為學科曰臣聞聖人之道不過乎經經之降者不過乎史史之降不過乎子子不異乎道者孟子也今國家有業莊列之書者亦登于科其誘善也則深而懸科也未正伏望命有司去莊列之書以孟子為主有能精通其義者其科選視明經同號奏不答𢎞文崇文生舉開元二十六年正月八日敕𢎞文崇文學生緣是貴胄子孫多不專經業便與及第深謂不然自今已後一依令式考試天寶十四年二月十日𢎞文館學生自今已後宜依國子監例帖試明經進士帖經並減半雜文及䇿皆須粗通仍求為恆式廣德元年七月二十六日敕𢎞文崇文兩館生皆以資蔭補充所習經業務須精熟楷書字體皆得正樣通者與出身不通者罷之貞元四年正月敕應補𢎞文崇文學生員闕至少請補者多就中商量須有先後伏請准建中三年十一月敕先補皇緦麻已上親次及宰輔子孫仍于同類之內所用蔭先儘門地清華履厯要近者其餘據官蔭高下類例處分六年九月敕本置兩館學生皆選勳賢胄蓋欲令其議藝紹襲家風固非開此幸門隳紊典教且令式之內具有條章考試之時理須精核比聞此色幸冒頗深或假市門資或變易昭穆殊愧教化之本但長僥競之風未補者務取闕員已補者自然登第用䕃既已乖實試藝又皆假人誘進之方豈當如此自今已後所司宜據式文考試定其升黜如有假貸並准法處分太和七年八月九日敕𢎞文兩館生今後並依式試經畢日仍差都省郎官兩人覆試須責保任不得輒許替代九年十二月中書門下奏奉進止令減下諸色入仕人其𢎞文館學生見定十六人今請減下一人敕㫖依奏開成三年二月兩軍使狀稱請准太和元年五月十七日以前敕文官階至三品便許用䕃與子孫補兩館出身三月敕神䇿大將軍用蔭補兩館生宜准左右金吾大將軍例處分崇𤣥生道舉附開元二十五年正月十五日于𤣥元皇帝廟置崇𤣥學令習道德經莊子文子列子待習成後每年隨舉人例送名至省准明經考試通者准及第人處分其博士置一員天寶元年五月中書門下奏兩京及諸郡崇𤣥學生等准開元二十九年正月制前件人合習道德及南華通𤣥沖虛等四經又唯天寶元年二月制改庚桑子為洞靈真經准請條補崇𤣥學亦合習讀伏准後制合通五經其洞靈真經人間少本臣近令諸親尋訪道士全無習者本既未廣業實難成并沖虛通𤣥二經亦恐文字不定𤣥教方闡學者宜精其洞靈等三經望付所司各寫十本校定訖付諸道採訪使頒行其貢舉司及兩京崇𤣥學生亦望各付一本今冬崇𤣥學人望其准開元二十九年正月制考試其洞靈真經請待業成後准式從之二年三月十六日制崇𤣥生試及帖䇿各減一條三年業成始依常式七載五月十三日詔崇𤣥生出身至選時宜減于常例一選以為留放十三載十月十六日道舉停習道德經加周易命以來年為始至寶應二年六月二十日道舉敕停七月二十六日禮部奏道舉就停其崇𤣥生望付中書門下商量處分大厯三年七月增置崇𤣥生員一百建中元年二月中書門下奏准制崇𤣥館學生試日減䇿一道者其崇𤣥館附學官見任者既同行事例合霑恩惟䇿一道不可更減大義兩條從之論經義貞觀十二年國子祭酒孔頴達撰五經義疏一百七十卷名曰義贊有詔改為五經正義太學博士馬嘉運每稍托之有詔更令詳定未就而卒永徽二年三月十四日詔太尉趙衛公長孫無忌及中書門下及國子三館博士𢎞文學士故國子祭酒孔頴達所撰五經正義事有遺謬仰即刋正至四年三月一日太尉無忌左僕射張行成侍中高季輔及國子監官先受詔修改五經正義至是功畢進之詔頒于天下每年明經依此考試長安三年三月四門博士王元感表上尚書糾謬十卷春秋振滯二十卷禮記繩愆三十卷并所注孝經史記漢書並請官給紙筆寫上祕閣制令𢎞文崇𤣥兩館學士及成均博士詳其可否𢎞文館學士祝欽明崇𤣥館學士李憲趙元亨成均博士郭山惲皆専守先儒章句深譏元感元感掎托舊義不之屈唯鳳閣舍人魏知古司封郎中徐堅左史劉知幾右史張思敬雅好異聞每為元感申理其義由是擢拜太子司議郎開元七年三月一日敕孝經尚書有古文本孔鄭注其中㫖趨頗多踳駮精義妙理若無所歸作業用心復何所適宜令諸儒并訪後進達解者質定奏聞其月六日詔曰孝經者德教所先自頃已來獨宗鄭氏孔氏遺㫖今則無聞又子夏易傳近無習者輔嗣注老子亦甚甄明諸家所傳互有得失獨據一說能無短長其令儒官詳定所長令明經者習讀若得理解亦可並行其作易者並帖子夏易傳共寫一部亦詳其可否奏聞時議以為不可遂停四月七日左庶子劉子𤣥上孝經注議曰謹案今俗所行孝經題曰鄭氏注爰自近古皆云鄭即康成而魏晉之朝無有此說至晉穆帝永和十一年及孝武帝太和元年再聚羣臣共論經義有荀昶者撰集孝經諸說始以鄭氏為宗自宋梁以來多有異論陸澄以為非𤣥所注請不藏于祕省王儉不依其請遂得見傳于時魏齊明立于學官著在律令蓋由膚俗無識故致斯訛舛然則孝經非𤣥所注其驗十有二條據鄭自序云遭黨錮之事逃難注禮黨錮事解注古文尚書毛詩論語為袁潭所逼來至元城乃注周易都無注孝經之文其驗一也鄭𤣥卒後其子弟追論師注所述及應對時人謂之鄭志其言鄭所注者惟有毛詩三禮尚書周易都不言鄭注孝經其驗二也又鄭志目録記鄭之所注五經之外有中候書博士政論乾象厯六藝論毛詩譜答賔難三禮駁許慎異義發墨守針膏肓及答甄然子等書寸紙片札莫不悉載若有孝經之注無容匿而不言其驗三也鄭之弟子分授門徒各述師言更不問答編録其録謂之鄭記唯載詩書禮易論語其言不及孝經其驗四也趙商作鄭先生碑銘具稱其所注箋駮論亦不言著孝經晉中經簿周易尚書中候尚書大傳毛詩周禮儀禮禮記論語凡九書皆云鄭氏注名𤣥至于孝經則稱鄭氏解無名𤣥二字其驗五也春秋緯演孔圖云康成注三禮詩易尚書論語其春秋孝經别有評論宋均于詩譜序云我先師北海鄭司農則均是𤣥之傳業子弟也師所著無容不知而云春秋孝經唯有評論非𤣥之所注于此特明其驗六也又宋均孝經緯注六藝論敘孝經云𤣥又為之著司農論如是而均無聞焉有義無辭令余昏惑舉鄭而語云無聞其驗七也宋均緯注云𤣥為春秋孝經略疏非注之謂所言𤣥又為之注者泛辭耳非事實序春秋亦云𤣥又為之注也寧可復責以實注春秋乎其驗八也後漢史書存于代者有謝承薛瑩司馬彪袁嵩等具為鄭𤣥傳者載其所注皆無孝經其驗九也王肅孝經傳首有司馬宣王之奏並奉詔令諸儒注述孝經以肅說為長若先有鄭注亦應言及而不言鄭其驗十也王肅著書發揚鄭短凡有小失皆在聖證若孝經此注亦出鄭氏被肅攻擊最應煩多而肅無言其驗十一也魏晉朝賢辨論時事鄭氏諸注無不撮引未有一言引孝經之注其驗十二也凡此證驗易為考核而代之學者不覺乘彼謬說競相推舉諸解不立學官此注獨行于世觀夫言語鄙陋固不可示彼後來𫝊諸不朽至如古文孝經孔傳本出孔氏壁中語其詳正無俟商確而曠代亡逸不復流行殊不可解至開皇十四年祕書學士王孝逸于京市賈人取置得一本送與著作郎王邵以示河間劉炫仍令按定而此書更無兼本難可依憑炫輒以所見率意刋改因著古文孝經稽疑一篇邵以為此書經文盡在正義甚美而厯代未嘗置于學官良可惜也然則孔鄭二家雲泥致隔今綸㫖發問校其短長愚謂孔行鄭廢于義為允又今俗所行老子是河上公注其序云河上公者漢文帝時人結草菴于河曲乃以為號所注老子授文帝因沖空上天此乃不經之鄙言流俗之虛語按漢書藝文志注老子者三家河上所釋無聞焉爾豈非注者欲神其事故假造其說耶豈如王弼所著義㫖為優必黜河上公升王輔嗣在于學者實得其宜又按漢書藝文志講易十三家初無子夏作傳者至梁阮氏七録始有子夏易六卷或云韓嬰作或云丁寬作然據漢書藝文志韓易有二篇丁易有八篇求其符會則事殊隳刺者矣歲越千齡時經百代其所著述沈翳不行豈非後來假憑先哲亦猶石崇謬稱阮籍鄭瓊濫名周寶必欲行用深以為疑竊以鄭氏孝經河上公老子二書訛舛不足流行孔王兩家實堪師授每懷此意其願莫從伏見去月十日敕令所司詳定四書得失具狀聞奏臣等尋草議請行王孔二書牒禮部訖如狀為允請即頒行國子祭酒司馬貞議曰今之孝經是漢河間王所得顔芝本至劉向以此本參校古文省除煩惑定為此一十八章其注相承云是鄭𤣥所著而鄭志及目録等不載故往賢共疑焉唯荀昶范曄以為鄭注故昶集解孝經具載此注而其序云以鄭為主是先達博選以此注為優其注縱非鄭氏所作而義㫖敷暢將為得所其數處小有未穩實亦非爽經㫖其古文二十二章先出孔壁先是安國作傳緣遭巫蠱世未之行荀昶集注之時尚有孔傳中朝遂亡其本近儒欲從古學妄作此傳假稱孔氏輒穿鑿改更又僞作閨門一章劉炫詭隨妄稱其善且閨門之義近俗之語非宣尼之正說案其文云閨門之內具禮矣乎嚴親嚴兄妻子臣妾繇百姓徒役也是比妻子于徒役文句疵鄙不合典經又分庶人章從故自天子以下别為一章仍加子曰二字然故者連上之辭既是章首不合言故古人既亡後人妄闢此等數以應二十二章之數非但經文不真抑且傳習淺僞又注因天之時因地之利其略曰脫衣就功暴其肌體朝暮從事露髮跣足少而習其安焉此語雖傍出諸子而引之為注何言之鄙俚乎與鄭氏所云云分别五土視其高下高田宜黍稷下田宜稻麥優劣懸殊曾何等級今議者欲取近儒諸說殘經缺傳而廢鄭注理實未可望請准式孝經鄭注與孔傳依舊俱行又注老子河上公蓋憑虛立號漢史實無其人然其注以養人為宗以無為為體其辭近其理𢎞小足以修身潔誠大可以寧人安國且河上公雖曰注書即文立教皆首闡明體用可謂知言矣王輔嗣雅善𤣥談頗深道要窮神用于槖籥守靜默于機緘其㫖深微在于𤣥學頗是所長至若近人立徴修身𢎞道則河上為得今望請王河二注令學者俱行又按劉向七略有子夏易𫝊但此書不行已久今所存者多非真本又荀勗中經簿云子夏𫝊四卷或云丁寬所作是先達疑非子夏矣又隋書經籍志云子夏傳殘缺梁時六卷今三卷是知其書錯謬多矣無益後學不可將帖正經五月五日詔曰間者諸儒所𫝊頗乖通議敦孔學者冀鄭門之息滅尚今文者指左傳為誣僞豈朝廷並列書府以廣儒術之心乎其河鄭二家可令依舊行用王孔所注𫝊習者稀亦存繼絶之典子夏傳逸篇令帖易者停十四年八月六日太子賓客元行沖等撰禮記義疏五十卷成奏上之先是右衛長史魏光乘上言今禮記章句踳駮故太師魏徴更編次改注堪立學𫝊授上遽令行沖集學者撰義疏將立學官行沖于是引國子博士范行恭四門助教施敬本檢討刋削及疏成右丞相張說駮奏曰今之禮記是前漢戴德戴聖所編厯代傳習已向千年著為經教不可刋削至魏徴孫炎始改舊本以類相比有同抄書先儒所以竟不行用貞觀中魏徴因孫炎所修更加釐改兼為之注雖加賞賜其書竟亦不行今行沖等奉敕撰疏勒成一部欲與先儒義理章句隔絶若欲行用竊恐未可上然其奏遂留其書貯于內府竟不得立學行沖怨諸儒排已退而著論以自釋其年八月十四日上讀洪範至無頗以聲不協韻因改頗為陂詔曰朕思文皆協韻惟頗一字實覺不倫又周易中無平不陂考陂字亦有頗音陂之與頗訓詁無别為陂則文亦會意為頗則聲不成文應由煨燼之餘編簡遂缺傳授之際差誤相沿原始要終須有刋革洪範無頗字宜改為陂庶使先儒之義去彼膏肓後學之徒正其魚魯仍宣示國學天寶五載正月二十三日詔曰禮記垂訓篇目攸殊或未盡于通體是有乖于大義借如堯命四子所授惟時周分六官曾不繫月先王行令蓋取于斯茍分至之可言何弦望之足舉其禮記月令宜改為時令其載二月二十四日詔曰朕欽承聖訓覃思𤣥經頃改道德經載字為哉仍隸屬上句及乎廷議衆以為然遂錯綜真詮因成注解又孝經書疏雖粗發明幽賾無遺未能該備今更敷暢以廣闕文仍令集賢院具寫送付所司頒示中外貞元七年十二月祕書監包佶奏開元刪定禮記月令為時令其音及義疏並未刋正其開元禮所與月令相涉者請選通儒詳定從之開成二年八月敕新加九經字樣一卷國子監奏定得覆定石經字體翰林待詔唐𤣥度狀伏准太和七年二月敕覆定九經字體者令所詳覆多依司業張參五經字為准其舊字樣歲月將久畫㸃參差傳寫相承漸致乖誤今並依字樣書參詳改邪就正訖諸經之中分别疑闕舊字樣未載者古今體異隸篆不同如總據說文即古體驚俗若近代之文字或傳寫乖謬乞令與校勘官同商較是非取其適中纂録為新刋九經字樣一卷或經典相承與字義不同者引文以注解今刋削成請附于九經字樣之末敕㫖宜依諸使上觀風俗使自貞觀八年以後不置貞觀八年正月二十九日詔曰昔者明王之御天下也內列公卿允釐庶績外廷侯伯司牧黎元惟懼淳化未敷名教或替故有巡狩之典黜陟幽明行人之官存省風俗時雍之化率由兹道宜遣大使分行四方申諭朕心延問疾苦觀風俗之淳澆察政刑之苛弊務盡使乎之㫖俾若朕親覿焉于是分遣蕭瑀李靖楊恭仁竇靜王圭李大亮劉德威皇甫無逸韋挺李襲譽張亮杜正倫趙智等巡省天下巡察按察巡撫等使貞觀十八年遣十七道巡察諫議大夫禇遂良諫曰臣以為自去年九月不雨經冬無雪至今年二月下澤麥苗始似小可使人今出正是農時普天之下不能無事東州追掩西郡呼集兼復送迎使人供擬飲食道路遑遑廢于田種使人今猶未發時節如是小遲望更過今夏至來年正月初發遣書曰萬方有罪在于一人國家但得四方整肅何必要須罪罰二十年正月遣大理卿孫伏伽等二十一人以六條巡察四方多所甄别太宗命禇遂良以其類具狀以聞及是親臨決牧守以下以能官進擢者二十人罪死者七人流罪以下免黜數百人儀鳳二年五月河南河北旱遣御史中丞崔鑑等分道存問賑給侍御史劉思正上疏曰今麥序方秋蠶功未畢三時之務萬姓所先敕使巡撫人皆悚忭忘其家業冀此天恩踴躍奉迎必難抑止集衆既廣妨廢亦多加以逾程往還兼之晨夕停滯既緣賑給須立簿書本欲安存却成煩擾又無驛之處取馬稍難簡擇公私須先追集雨後農要特切常情暫廢須臾即虧歲計每為一馬遂勞數家從此相承恐更滋甚望且委州縣賑給待秋後閒時出使褒貶垂拱元年祕書省正字陳子昂上疏曰臣伏見陛下憂勞百姓恐不得其所將降九道大使巡察天下諸州兼申黜陟以求人瘼臣竊以為未盡善也何以言之陛下所以降明使豈非欲天下黎元衆庶知陛下夙興夜寐憂勤念之陛下必若以此而發使乎則愚臣竊見陛下之使又未盡善也若愚臣所請使者先常雅合時望為衆所推慈愛足以勤恤孤惸賢德足以振拔幽滯剛直足以不避强禦明智足以照察奸邪然從使天下奸人畏其明而不敢為惡也天下强禦憚其直而不為過也天下英傑慕其德而樂為之用也天下孤寡賴其仁而欣戴其德也夫如是然後可以論出使故輶軒未動于京師天下翕然皆已知矣今陛下使猶未出朝廷行路市井之人皆以為非在朝廷之有職者亦不稱之天子之使未出魏闕朝廷之人皆已輕之何況天下之衆哉而欲黜陟求賢未可得也陛下所以有此失者在不選人亦輕此使非天下之任故陛下遂大失于此茍以出使為名不求任使之實使愈出而天下愈弊使彌多而天下彌不寧其故何哉是朝廷輕其任也徒使天下百姓修飾道路送往迎來無益于聖教耳臣久為百姓實委知之臣願陛下與宰相更妙選朝廷百官素有威重名節為衆所推者陛下因大朝日親御正殿集百寮公卿設禮儀以使者之禮見之告以出使之意遂授以旌節而遣之先從京師遍訪豺狼然後攬轡登車以清天下若如是臣知陛下聖教不旬月之間天下家見而户聞也此之一使是陛下為政之大端諺曰欲知其人先觀其所使不可不慎也若陛下必知不可得其人不如不出使以煩數無益于化但勞天下之人是猶烹小鮮而數撓之耳四月六日尚書左丞狄仁傑充江南安撫使吳楚多淫祠仁傑一切焚之凡除一千七百所天授二年發十道存撫使以右肅政御史中丞知大夫事李嗣真等為之舉朝有詩送之名曰存撫集十卷行于世杜審言崔融蘇味道等詩尤著焉萬歲通天元年鳳閣舍人李嶠上疏曰陛下創置左右臺分巡天下察使人善否觀風俗得失斯政途之綱紀禮法之準繩無以加也然猶有未折衷者臣請試論之夫禁網尚疏法令宜簡簡則事易行而不煩雜疏則所罹寡而無苛碎竊見垂拱二年諸道巡察使科目凡四十四件至于别作格敕令訪察者又有三十餘條而巡察使率是三月之後出都十一月終奏事時限迫促簿書委積晝夜奔逐以赴限期而每道所察文武官多至二千餘人少尚一千已下皆須品量才行褒貶得失欲令曲盡行能則皆所不暇此非敢惰于職而慢于官也實才有限而力不及耳臣望量其功程與其節度使器周于用力濟于時然後進退可以責成得失可以精核矣聖厯元年十月納言狄仁傑為河北河朔安撫使及回上疏曰臣聞朝廷議者以契丹作梗始明人之順逆或有迫脅或有願從或授僞官或為招慰或兼外賊或是土人跡雖不同心實無别誠以山東强猛由來重氣一顧之勢至死不回近緣軍機調發傷重家道悉破或至逃亡剔屋賣田人不為售內顧生計四壁皆空重以官典侵漁因事而起當州役使十倍軍機官私不矜期之必取加杖之下痛切肌膚事迫情危不修禮義愁苦之地不樂其生有利則歸且圖賖死此乃君子之愧辱小人之常行今以負罪之位必不在家露宿草行潜竄山澤赦之則出不赦則逃山東羣盜因緣聚結臣以邊塵雖起不足為憂中國不安以此為事臣聞持大國者不可以小道理事廣大者不可以苛細分人主恢宏不拘常法罪之則衆情恐懼恕之則反側自安伏願曲赦河北諸州一無所問自然人神通暢率土歡心神龍二年二月敕左右臺內外五品已上官識理道通明無屈撓者二十人分為十道巡察使二周年一替以廉按州部景龍二年置十道按察使分察天下至開元八年五月復置十道按察使以陸象先等為之開元元年二月禮部侍郎張庭圭上疏曰天下至大郡邑至多賢牧良宰誠難盡得兼下僚貪暴小吏侵漁黎庶不安窮困衆矣縱其發使廉問暫往速還假令申寃却招後患各思矢口無敢率心臣竊見國家比置十道按察使不限年月懲惡勸善激濁揚清孤窮獲安風俗一變伏望復下明制重選使臣秋冬之後令出巡察自然貪吏望風懲革陛下視聽恆遍于海內矣三年三月敕巡察使出宜察官人善惡其有户口流散籍帳隱沒賦役不均者不務農桑倉庫減耗者妖訛宿習姦猾盜賊不事生業為公私蠧害者德行孝弟茂才異等藏器晦迹堪應時用者並訪察聞奏興元元年正月詔令門下平章事肅復充山南東西荆湖淮南江西鄂州浙江東西福建嶺南等道宣慰安撫使嗚呼往率乃職敬敷朕命慰勉征戍勞來困窮訪其所安察其所弊滯淹必達寃濫必申無憚幽逺而不被無忽細微而不恤貞元八年八月詔曰朕以薄德托于人上勵精庶政思致雍熙而誠不動天政或多闕陰氣作沴暴風荐臻自江淮而及乎荆湘厯陳宋而施于河朔其間郡邑連有水災城郭多傷公私為害損壞廬舍浸敗田苗或親戚漂淪或資産沈溺言念于此當食忘餐宜令中書舍人奚陟往江陵及襄郡隨復鄂申光蔡等州左庶子姚齊語往陳宋亳頴徐泗濠等州祕書少監雷咸往鎮冀德隸深趙等州京兆少尹常武往揚楚廬潤夀滁蘇常湖等州宣撫應諸州百姓因水不能自存者委宣撫使賑給死者各加賜物在官為收理埋瘞其田苗所損委宣撫使與所在長吏速具聞奏於戲一夫不獲一物失所刑罰不中賦役不均皆可以失陰陽之和致雨旱之沴繫囚疑獄訴久不決者委所在長吏即與昭雪務從寬簡俾絶寃滯貪官暴吏苛法害公特加懲罰用明典憲災傷之後切在撫綏咨爾方鎮之臣洎乎守宰咸宜悉乃心力以恤凶災宣布朕懷使各知悉永貞元年八月詔曰理天下者先修其國國命之重寄在方鎮方鎮共理實准列城為政繫于屬縣然則一夫之耕匹婦之織積微至著以供國計永為蒸庶厥惟難哉頃年以上准租賦徭役𣙜稅委在藩服使其均平在太上皇君臨之初務從省便遂令今使府歸在中朝或恐巡按院既多職因交替新制未立舊綱已紊況河汴而東瀕海之右名都奧壤疆理接連如或徭賦不均徴輸難濟物輕貨重法弊人勞又開江淮數道比愆時兩深憂黎庶之不足軍國之缺供政有所不宣事有所未便牧宰有課績官吏有臧否爰使使臣申我休命宜令度支及諸道鹽鐵轉運户部侍郎兼御史大夫潘孟陽専往宣諭慰安疲氓詢訪便益蠲除疾苦安人利國稱朕意焉元和四年正月以左司郎中鄭敬使湖南宣歙吏部郎中崔芁使浙東司封郎中孟簡使山南東道荆南湖南京兆少尹襄武使江西鄂嶽等道宣撫將行並召對上告之曰朕宫中用度一匹以上皆有簿厯惟拯救百姓則不計所費焉卿等今者賑恤災旱當勤于奉職勿如潘孟陽所到務飲酒遊山寺而已仍許敬等以便宜行事以孟簡獨衣緑遣使追賜緋袍銀魚十四年二月東都知兵馬使劉悟斬逆賊李師道淄青兖鄆等十二州平詔户部侍郎楊於陵以本官充淄青等州宣撫使唐會要卷七十七
